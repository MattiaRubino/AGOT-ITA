 #Pirates
pirate_tax_rate_law: "[pirate_port_rates|e]"
pirate_tax_rate_01: "Amichevole"
pirate_tax_rate_01_effects: "$EFFECT_LIST_BULLET$[GetCouncilTaskType('task_find_secrets').GetName|V] [councillor_task|E]: probabilità aggiuntiva di apprendere un [secret|E] #P +10%#!\n#underline #underline [agot_landless_pirate_domiciles|e] pagheranno#!:#!\n$EFFECT_LIST_BULLET$ [GetDomicileBuilding('agot_pirate_ship_main_01').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_02').GetName]: tassa d'attracco di 5 @gold_icon! e tassa annua di 20 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_03').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_04').GetName]: tassa d'attracco di 10 @gold_icon! e tassa annua di 40 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_05').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_06').GetName]: tassa d'attracco di 15 @gold_icon! e tassa annua di 60 @gold_icon!."
pirate_tax_rate_02: "Standard"
pirate_tax_rate_02_effects: "#underline [agot_landless_pirate_domiciles|e] pagheranno#!:\n$EFFECT_LIST_BULLET$ [GetDomicileBuilding('agot_pirate_ship_main_01').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_02').GetName]: tassa d'attracco di 7.5 @gold_icon! e tassa annua di 30 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_03').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_04').GetName]: tassa d'attracco di 12.5 @gold_icon! e tassa annua di 50 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_05').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_06').GetName]: tassa d'attracco di 17.5 @gold_icon! e tassa annua di 70 @gold_icon!."
pirate_tax_rate_03: "Alta"
pirate_tax_rate_03_effects: "$EFFECT_LIST_BULLET$[agot_landless_pirate_domiciles|e] riceveranno maggiore protezione dai [schemes|E] [GetScheme('agot_raid_pirate_domicile').GetTypeName]\n#underline [agot_landless_pirate_domiciles|e] pagheranno#!:\n$EFFECT_LIST_BULLET$ [GetDomicileBuilding('agot_pirate_ship_main_01').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_02').GetName]: tassa d'attracco di 10 @gold_icon! e tassa annua di 40 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_03').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_04').GetName]: tassa d'attracco di 15 @gold_icon! e tassa annua di 60 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_05').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_06').GetName]: tassa d'attracco di 20 @gold_icon! e tassa annua di 80 @gold_icon!."
pirate_tax_rate_04: "Estorsiva"
pirate_tax_rate_04_effects: "$EFFECT_LIST_BULLET$[agot_landless_pirate_domiciles|e] avranno meno probabilità di avviare [schemes|E] [GetScheme('agot_raid_pirate_domicile').GetTypeName]\n#underline [agot_landless_pirate_domiciles|e] pagheranno#!:\n$EFFECT_LIST_BULLET$ [GetDomicileBuilding('agot_pirate_ship_main_01').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_02').GetName]: tassa d'attracco di 12.5 @gold_icon! e tassa annua di 50 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_03').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_04').GetName]: tassa d'attracco di 17.5 @gold_icon! e tassa annua di 70 @gold_icon!.\n$EFFECT_LIST_BULLET$[GetDomicileBuilding('agot_pirate_ship_main_05').GetName] e [GetDomicileBuilding('agot_pirate_ship_main_06').GetName]: tassa d'attracco di 22.5 @gold_icon! e tassa annua di 90 @gold_icon!."
