l_spanish:
 #ROBERT'S REBELLION
  agot_scenario_events_rr.loyalists.t:0 "La Guerra del Usurpatore"
  agot_scenario_events_rr.rebels.t:0 "La Ribellione di Robert"
 #Rhaegar Targaryen
agot_events_scenario_rr_exp.1.desc: 0 "L'amore sorto tra [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] e me arse profondo nei nostri cuori fin dal primo incontro. La mia Regina d'Amore e Bellezza, con la sua corona di rose invernali, azzurre come il gelo. Il nostro amore ha fatto infuriare molti, e più di tutti il suo promesso sposo, [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName]. La sua ira getta l'ombra più nera sui Regni, ma non ha potuto impedirci di affrettarci verso Dorne e fuggire insieme lontano dagli occhi giudicanti delle nostre famiglie. Il mio amore è al sicuro nella Torre della Gioia, e non v'è esercito tanto forte da strapparci l'uno all'altra. Il nostro destino è stato profetizzato; nostra è la canzone del Ghiaccio e del Fuoco..."
  agot_events_scenario_rr_exp.1.a:0 "Il Drago non si spezza così facilmente."
 #Aerys II Targaryen
agot_events_scenario_rr_exp.2.desc: 0 "Traditori! Traditori, tutti quanti! Chi è [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName] per negarmi il mio diritto alla giustizia, per infrangere la pace del Re? Gli [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName], che con tanta insolenza reclamano la vita di mio figlio, solo perché egli ha protetto la ragazza lupo da quel libidinoso signorotto di [GetTitleByKey('c_storms_end').GetNameNoTier]! E anche i [GetScriptedCharacterByHistoryID('Tully_1').GetHouse.GetName], che devono tutto ciò che possiedono alla mia casa, ora si levano in aperta ribellione contro il loro Re! E intanto quell'ingrato, [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName] [GetScriptedCharacterByHistoryID('Lannister_1').GetHouse.GetName], si nasconde sotto [GetTitleByKey('c_casterly_rock').GetNameNoTier], che gli Estranei lo prendano! La pagheranno! #bold La pagheranno con Fuoco e Sangue! #"
  agot_events_scenario_rr_exp.2.a:0 "#bold Bruciateli! Bruciateli tutti! #"
 #Mace Tyrell
agot_events_scenario_rr_exp.3.desc: 0 "[GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] e i suoi seguaci si sono levati contro il nostro legittimo signore, [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName]. I [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName] sono i legittimi signori dei Sette Regni, e noi [GetScriptedCharacterByHistoryID('Tyrell_8').GetHouse.GetName] dobbiamo a loro il nostro posto nel regno. Non siamo giunti fin dove siamo prendendo decisioni avventate, ma scegliendo con cura le nostre battaglie e compiendo il nostro dovere. Ora difenderemo la corona contro i ribelli, come conviene a qualunque vassallo leale."
  agot_events_scenario_rr_exp.3.a:0 "E facendolo, diventeremo sempre più forti."
 #Doran Martell
agot_events_scenario_rr_exp.4.desc: 0 "[GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] è nostro alleato per sangue, grazie al matrimonio di mia sorella [GetScriptedCharacterByHistoryID('Martell_7').GetFirstNamePossessive] con il Principe della Corona [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName]. Lord [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] si è levato contro la tirannia del re crudele dopo l'esecuzione del fratello e del padre di [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName], così come dopo il rapimento di [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName] da parte del Principe [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstNamePossessive]. La sua causa potrà anche essere giusta, ma con i miei nipoti sotto la diretta custodia del re nella capitale abbiamo ben poca scelta se non marciare in sostegno della corona."
  agot_events_scenario_rr_exp.4.a:0 "I Signori di Dorne marceranno."
 #Robert Baratheon
agot_events_scenario_rr_exp.5.desc: 0 "La mia amata [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] è stata rapita dal vile [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName]. Dopo aver protestato contro questo atto crudele presso [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName], [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName] è stato crudelmente arso vivo mentre suo figlio [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] assisteva. Ora Ned ed io, insieme ai nostri alleati, ci ergiamo contro la tirannia del Re Folle. Forse non sappiamo ancora chi debba succedere al re, ma una cosa è certa: il regno del drago è finito!"
  agot_events_scenario_rr_exp.5.a:0 "I Targaryen cadranno per mano mia..."
 #Eddard Stark
agot_events_scenario_rr_exp.6.desc: 0 "Mia sorella è nelle mani di [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName], e il folle [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] ha arso vivo mio padre mentre [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName], mio fratello maggiore, assisteva disperato. Robert, il promesso sposo di [GetScriptedCharacterByHistoryID('Stark_5').GetFirstNamePossessive], si è levato contro la tirannia del re, e farò tutto ciò che è in mio potere per aiutare il mio amico a portare giustizia."
  agot_events_scenario_rr_exp.6.a:0 "Lyanna sarà al sicuro di nuovo..."
 #Jon Arryn
agot_events_scenario_rr_exp.7.desc: 0 "I miei antichi pupilli, [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName] e [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName], si sono levati contro la tirannia di [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName]. Il Re Folle ha arso [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName] e ha permesso che [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName], promessa sposa di Robert, venisse rapita. Non lascerò che i miei compagni restino soli. I cavalieri della Valle sono pronti, e Casa [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName] aiuterà a portare giustizia nel regno."
  agot_events_scenario_rr_exp.7.a:0 "Prevarremo"
 #Hoster Tully
agot_events_scenario_rr_exp.8.desc: 0 "[GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName], in un altro accesso di follia, ha crudelmente giustiziato [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] e [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_2').GetHouse.GetName]. [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName] ha inoltre rapito [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName]. Siamo legati agli Stark per sangue, poiché mia figlia [GetScriptedCharacterByHistoryID('Tully_4').GetFirstName] è andata sposa a Lord [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName]. È chiaro che il regno del Re Folle ha da tempo esaurito ogni legittimità, e che l'ordine dev'essere restituito al regno a qualunque costo."
  agot_events_scenario_rr_exp.8.a:0 "I signori dei fiumi sono pronti"
 #Tywin Lannister
agot_events_scenario_rr_exp.9.desc: 0 "Il mio vecchio amico [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] ha spinto [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName], [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] e i loro alleati alla ribellione con le sue azioni avventate. Il Re mi ha ripetutamente offeso nonostante il mio leale servizio come Primo Cavaliere del Re. Se pensa di trovare un alleato zelante nelle Terre dell'Ovest, si sbaglia gravemente. Per ora siederò, attenderò e osserverò."
  agot_events_scenario_rr_exp.9.a:0 "Il leone dorme... per ora..."
 #Quellon Greyjoy
  agot_events_scenario_rr_exp.10.desc:0 "La guerra è tornata a Westeros. I miei figli, coinvolti nella loro incessante ricerca di gloria e saccheggio, hanno cercato di convincermi a impugnare la spada. Ma sono un uomo anziano, un uomo malato. Ho vinto la mia gloria in battaglie ormai decenni fa. Sono stanco della guerra, del bagno di sangue, e temo che i miei progressi nel far cessare le abitudini di saccheggio e conquista del mio popolo sarebbero vanificati al momento in cui una singola lunga nave dovesse partire dalle nostre scogliere frastagliate. Non pagheremo il prezzo del ferro; almeno per ora..."
  agot_events_scenario_rr_exp.10.a:0 "Almeno per ora..."
