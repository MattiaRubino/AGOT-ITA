l_spanish:

 #########################
 # DO A FLIP (0001-0004) #
 #########################
 # 0001
agot_travel_events_dragon.0001.t: 0 "Capriole nel Cielo"
agot_travel_events_dragon.0001.desc: 0 "Mentre [pet_dragon.GetName] ed io sorvoliamo le terre sottostanti, la noia comincia a insinuarsi in me. La novità del decollo è ormai passata, e il mio equilibrio si è ormai assestato. I draghi sono celebri per la loro capacità di manovrare in aria durante la battaglia o la caccia, ma tali acrobazie comportano la loro parte di rischi per un cavaliere di drago.\n\nEppure, potrebbe ravvivare il mio viaggio concedermi un poco di svago."
agot_travel_events_dragon.0001.a: 0 "Che ne dici di una capriola?"
agot_travel_events_dragon.0001.b: 0 "Meglio prudenti che spiacenti."
agot_travel_events_dragon.0001.injury_warning: 0 "@warning_icon! #X Potresti ferirti.#!"
agot_travel_events_dragon.0001.success: 0 "Successo!"
agot_travel_events_dragon.0001.success.flip_past: 0 "[pet_dragon.GetName] fa una capriola!"
agot_travel_events_dragon.0001.success.flip: 0 "[pet_dragon.GetName] si impenna all'indietro, e sento il suo peso mutare sotto di me mentre mi aggrappo ancor più forte. Per alcuni istanti mozzafiato, l'alto è basso e il basso è alto, e la terra corre sopra di me mentre il cielo minaccia d'inghiottirmi dal basso. Ben presto tutto torna come dev'essere, mentre [pet_dragon.GetNameNoTooltip] raddrizza [pet_dragon.Custom('GetDragonHerselfHimself')] e riprende a volare diritto, sebbene il mio cuore martelli nel petto per l'eccitazione."
agot_travel_events_dragon.0001.failure: 0 "Fallimento!"
agot_travel_events_dragon.0001.failure.flip_past: 0 "[pet_dragon.GetName] non riesce a fare una capriola..."
agot_travel_events_dragon.0001.failure.flip: 0 "[pet_dragon.GetName] comincia a impennarsi all'indietro, ma io mi ritrovo a dibattermi mentre il drago non riesce a spostare correttamente [pet_dragon.Custom('GetDragonHerHis')] peso e si torce scomodamente nel cielo. Per poco non precipito incontro alla mia rovina, ma la mia gamba resta dolorosamente impigliata nelle cinghie della sella. Risalire è un brivido ben poco piacevole, ma per fortuna riusciamo a riprendere la rotta."
agot_travel_events_dragon.0001.no_attempt: 0 "Non ne vale la pena."
agot_travel_events_dragon.0001.no_attempt.flip: 0 "Non vale il rischio..."


 ############################
 # BEAUTIFUL UP HERE (0005) #
 ############################
 # 0005
agot_travel_events_dragon.0005.t: 0 "Bellezza dei Cieli"
agot_travel_events_dragon.0005.desc: 0 "Mentre volo con [pet_dragon.GetName], trapassiamo le nuvole e uno spettacolo meraviglioso si offre a entrambi. Da ogni lato siamo circondati dal dominio stesso degli dèi, morbide pareti di bianco segnate da feroci striature grigie, mentre la terra sottostante si stende come una mappa fatta vita."
agot_travel_events_dragon.0005.a: 0 "È tutto così quieto, così lontano da ogni altra cosa."
agot_travel_events_dragon.0005.b: 0 "Quanto è glorioso! Condivido il dominio degli antichi cavalieri di drago!"
agot_travel_events_dragon.0005.c: 0 "Stare quassù mi avvicina agli dèi."


 ############################
 # ANTSY DRAGON (0006-0010) #
 ############################
 # 0006
agot_travel_events_dragon.0006.t: 0 "Drago Irrequieto"
agot_travel_events_dragon.0006.desc: 0 "Tutto procede bene nel nostro volo finché, all'improvviso, [pet_dragon.GetName] non inizia a scalciare e sbuffare, facendosi irrequieto mentre sorvoliamo dei boschi!\n\nChe sia per fame, noia o disagio, [pet_dragon.GetNameNoTooltip] sembra di certo preoccupato per ciò che si trova là sotto. Che cosa dovrei fare?"
agot_travel_events_dragon.0006.a: 0 "Abbiamo questioni più importanti cui badare. Continua a volare."
agot_travel_events_dragon.0006.a.tt: 0 "Non subirai ritardi, ma il tuo drago sarà contrariato perché hai ignorato [pet_dragon.Custom('GetDragonHerHim')]."
agot_travel_events_dragon.0006.b: 0 "Atterra, [pet_dragon.GetNameNoTooltip]. Che cosa ti turba?"
agot_travel_events_dragon.0006.b.tt: 0 "Subirai un ritardo."

 # 0007
 agot_travel_events_dragon.0007.t:0 "$agot_travel_events_dragon.0006.t$"
agot_travel_events_dragon.0007.desc: 0 "[pet_dragon.GetName] atterra con un tonfo, scuotendomi sulla sella. Mentre cerco la fonte del malcontento del mio drago, scopriamo...\n\nNulla... [pet_dragon.GetNameNoTooltip] sembra ancora agitato, ma posso sentire la tensione che lentamente inizia a svanire mentre il suo corpo si rilassa sotto di me. Qualunque cosa possa aver spaventato il mio drago è svanita o non è mai esistita, e non posso fare a meno di avvertire una fitta di delusione mentre riprendo di nuovo le redini."
agot_travel_events_dragon.0007.a: 0 "Tutti sbagliamo, di tanto in tanto. Nessun male è stato fatto."
agot_travel_events_dragon.0007.b: 0 "Bestia insipida. Farai meglio a non farci tardare."

 # 0008
 agot_travel_events_dragon.0008.t:0 "$agot_travel_events_dragon.0006.t$"
agot_travel_events_dragon.0008.desc: 0 "[pet_dragon.GetName] atterra con un tonfo, scuotendomi sulla sella. Mentre cerco la fonte del malcontento del mio drago, scopriamo...\n\n"
agot_travel_events_dragon.0008.desc.pred: 0 "Un[ROOT.Char.Custom('RegionalFerociousAnimal')] feroce, chiaramente agitato dall'improvvisa intrusione mia e di [pet_dragon.GetNameNoTooltip]. In una dimostrazione di sfida forse vana, ma non per questo meno feroce, la grossa bestia ringhia un cupo avvertimento. La prima scelta di un drago fra combattere e fuggire è di solito combattere, e [pet_dragon.GetNameNoTooltip] sembra davvero disposto ad accettare questa ardita sfida."
agot_travel_events_dragon.0008.desc.prey: 0 "Nient'altro che un[ROOT.Char.Custom('GetRandomRegionalSmallGame')] spaventat[ROOT.Char.Custom('DE_PRO_PER_S_3P_G')]a, irrigidit[ROOT.Char.Custom('DE_PRO_PER_S_3P_G')]a dalla presenza improvvisa di un superpredatore come [pet_dragon.GetNameNoTooltip]. Basterebbe un solo comando perché [pet_dragon.GetNameNoTooltip] facesse presto strazio di quella povera creatura terrorizzata, ma ne vale davvero la pena?"
agot_travel_events_dragon.0008.a.valyrian: 0 "#emp Dracarys!#!"
agot_travel_events_dragon.0008.a: 0 "Riducil[Select_CString(ROOT.Char.Custom('GetRandomRegionalSmallGame')='','a','o')] in cenere, [pet_dragon.GetNameNoTooltip]!"
agot_travel_events_dragon.0008.b: 0 "Vola, [pet_dragon.GetNameNoTooltip]!"
agot_travel_events_dragon.0008.c: 0 "Lascia in pace quella povera creatura..."

 # 0009
agot_travel_events_dragon.0009.t: 0 "A caccia di uomini"
agot_travel_events_dragon.0009.desc: 0 "Viaggiare in groppa a un drago può talvolta essere noioso; nessuna compagnia se non qualche rara nuvola, e non sono certo grandi conversatrici. Spesso passo il tempo scrutando il suolo sottostante in cerca di qualche altro essere umano, osservando quali tratti distintivi riesca a scorgere — impresa non proprio semplice da quassù.\n\nOggi noto una figura di passaggio, appena distinguibile. Ma [pet_dragon.GetName] pare attratto da [Select_CString(Or(good_commoner.IsFemale,bad_commoner.IsFemale,noble.IsFemale),'lei','lui')], così sprono [pet_dragon.Custom('GetDragonHerHim')] a scendere per osservare meglio."
agot_travel_events_dragon.0009.desc.good: 0 "Atterrando nei paraggi, vengo accolto calorosamente da una [Select_CString(good_commoner.IsFemale,'donna','uomo')] che si presenta come [good_commoner.GetFirstNameNicknamed]. [pet_dragon.GetNameNoTooltip] sembra a proprio agio in sua presenza, così balzo giù dalla sella. Di certo ho il tempo per una breve conversazione?"
agot_travel_events_dragon.0009.desc.bad: 0 "Atterrando nei paraggi, vengo accolto con ostilità da una [Select_CString(bad_commoner.IsFemale,'donna','uomo')] che non ha nemmeno le buone maniere di presentarsi. [pet_dragon.GetNameNoTooltip] si irrigidisce con nervosismo, e condivido il cupo presentimento che questo popolano non prometta nulla di buono..."
agot_travel_events_dragon.0009.desc.noble: 0 "Atterrando nei paraggi, vengo accolto da [noble.Custom('IT_NAM_COL3')][noble.GetTitledFirstNameNicknamed], che dev'essere una persona del luogo in queste terre. Forse [Select_CString(noble.IsFemale,'si è smarrita','si è smarrito')], oppure forse ha solo bisogno di una conversazione decente."
agot_travel_events_dragon.0009.a: 0 "Dunque, parlami un po' di te!"
agot_travel_events_dragon.0009.b: 0 "Non ho tempo per questo."
agot_travel_events_dragon.0009.c: 0 "C'è un solo modo per trattare le mele marce!"
agot_travel_events_dragon.0009.d: 0 "Questo finirà in una cella..."
agot_travel_events_dragon.0009.e: 0 "Questa gente del popolo non dovrebbe riguardarmi."
agot_travel_events_dragon.0009.f: 0 "Posso aiutarvi a tornare a casa, mio [noble.GetLadyLord]."
agot_travel_events_dragon.0009.g: 0 "Forse avete tempo per una chiacchierata?"
agot_travel_events_dragon.0009.g.modifier_desc: 0 "Hai conversato con [noble.GetName]."
agot_travel_events_dragon.0009.h: 0 "È meglio che io mi rimetta in cammino..."
agot_travel_events_dragon.0009.h.modifier_desc: 0 "Hai ignorato [noble.GetName]."


 ###############################
 # STORM ENCOUNTER (0011-0012) #
 ###############################
 # 0011
agot_travel_events_dragon.0011.t: 0 "Una Tempesta!"
agot_travel_events_dragon.0011.desc: 0 "Per quanto i cieli siano belli e sconfinati, possono spesso essere insidiosi quanto la terra o il mare. Me ne rendo conto in prima persona quando [pet_dragon.GetName] ed io ci imbattiamo in una tempesta che sembra formarsi proprio mentre le passiamo sotto.\n\n[pet_dragon.GetNameNoTooltip] fa del suo meglio per volare contro i venti che si fanno più forti, mentre il tuono brontola sopra le nostre teste. Un lampo squarcia l'orizzonte lontano, ricordandomi il pericolo della tempesta. È chiaro che questa furia non passerà presto, ma con un po' di fortuna potremmo attraversarla illesi, se non desideriamo subire ritardi."
agot_travel_events_dragon.0011.a: 0 "Dovremmo atterrare e aspettare che passi."
agot_travel_events_dragon.0011.a.tt: 0 "Subirai un ritardo da tre a sette giorni, ma non riporterai ferite."
agot_travel_events_dragon.0011.b: 0 "Attraversiamola in volo!"
agot_travel_events_dragon.0011.b.tt: 0 "Rischierai ferite, ma non ritardi."


 ###########################################
 # DRAGON TAKES YOU OFF COURSE (0013-0014) #
 ###########################################
 # 0013
agot_travel_events_dragon.0013.t: 0 "Direzione Sbagliata!"
agot_travel_events_dragon.0013.desc: 0 "Questo tratto del nostro viaggio è terribilmente privo d'avvenimenti, tanto che [pet_dragon.GetName] sembra essersi annoiato. Mentre mi rilasso sulla sella, [pet_dragon.Custom('GetDragonSheHe')] devia bruscamente dalla rotta!\n\nL'improvviso cambio di direzione mi scuote dal mio torpore, costringendomi ad afferrare in fretta le redini. Grido ordini mentre [pet_dragon.GetNameNoTooltip] comincia con esitazione a tornare verso il percorso previsto."
agot_travel_events_dragon.0013.a: 0 "Sarai libero di fare ciò che vuoi una volta arrivati, [pet_dragon.GetNameNoTooltip]."
agot_travel_events_dragon.0013.tt: 0 "Il tuo viaggio subirà un ritardo."


 ##############################
 # PLAYFUL DRAGON (0021-0024) #
 ##############################
 # 0021 - In air
agot_travel_events_dragon.0021.t: 0 "Drago Giocherellone"
agot_travel_events_dragon.0021.desc: 0 "Mentre voliamo sopra una distesa di terra particolarmente insignificante, [pet_dragon.GetName] comincia a guardarmi in modo strano. È un'espressione che il mio drago mi rivolge sin da quando era soltanto un cucciolo appena schiuso, e significa che vuole giocare. Difficilmente posso biasimare [pet_dragon.Custom('GetDragonHerHim')]; un drago si annoia in fretta quando non caccia, non mangia e non combatte. Ma se [pet_dragon.GetNameNoTooltip] si distrae troppo, potremmo fare tardi."
agot_travel_events_dragon.0021.a: 0 "Che male c'è?"
agot_travel_events_dragon.0021.a.tt: 0 "Giocherai con [pet_dragon.GetName]"
agot_travel_events_dragon.0021.b: 0 "No, abbiamo dei luoghi dove andare."
agot_travel_events_dragon.0021.b.tt: 0 "Non giocherai con [pet_dragon.GetName]"

 # 0022
agot_travel_events_dragon.0022.t: 0 "Drago Giocherellone"
agot_travel_events_dragon.0022.desc.played: 0 "Sorrido e allungo la mano verso le mie bisacce da sella. Giocare a riportare carne cruda è un vecchio passatempo per noi, ma [pet_dragon.GetNameNoTooltip] ed io lo amiamo ancora. Una coscia di capra, un fianco d'uro, perfino un petto di pollo: i pezzi volano nell'aria solo perché [pet_dragon.GetNameNoTooltip] li afferri, li abbrustolisca e li inghiotta interi. Talvolta [pet_dragon.GetNameNoTooltip] s'impenna per afferrarli subito; altre volte [pet_dragon.Custom('GetDragonSheHe')] attende e insegue la carne mentre cade verso il suolo. Alla fine [pet_dragon.GetNameNoTooltip] si calma, e torniamo al nostro viaggio rinvigoriti."
agot_travel_events_dragon.0022.desc.no_play: 0 "[pet_dragon.GetNameNoTooltip] continua a rivolgermi quello sguardo supplichevole, e i suoi occhi si fanno quasi malinconici mentre un basso brontolio esce dalla gola del drago in segno di protesta. Tuttavia, dopo qualche altro ordine, [pet_dragon.GetNameNoTooltip] alla fine rinuncia e distoglie lo sguardo, continuando a volare verso la nostra meta."
agot_travel_events_dragon.0022.desc.fallback: 0 "Onestamente non credo che questo sia necessario, ma nel dubbio, per il bene di una buona struttura del codice. /shrug."
agot_travel_events_dragon.0022.a: 0 "È stato divertente. Ben fatto, [pet_dragon.GetNameNoTooltip]."
agot_travel_events_dragon.0022.b: 0 "Un simile atteggiamento supplichevole si addice ben poco a un drago."

 # 0023 - Camped out
agot_travel_events_dragon.0023.t: 0 "Drago Giocherellone"
agot_travel_events_dragon.0023.desc: 0 "Mentre siamo accampati per la notte, [pet_dragon.GetNameNoTooltip] si avvicina pesantemente al punto in cui siedo accanto al fuoco e mi spinge con il muso in un modo esitante ma impaziente che mi dice chiaramente che il mio drago si annoia. Naturalmente, il suo primo istinto è cercare di farmi giocare. Tra loro, i draghi spesso giocano a una sorta di tiro alla fune con il cibo, e con i loro cavalieri non è molto diverso. Ma l'ora è tarda e il sonno non è lontano, dunque potrei semplicemente cercare di far sì che [pet_dragon.GetNameNoTooltip] se ne vada."
agot_travel_events_dragon.0023.a: 0 "Perché no? Va' a trovare qualcosa da tirare, [pet_dragon.GetNameNoTooltip]."
agot_travel_events_dragon.0023.a.tt: 0 "Aumenta il legame, e il tuo drago potrebbe stancarsi, rendendolo meno incline a disturbare il tuo accampamento."
agot_travel_events_dragon.0023.b: 0 "No, lasciami dormire, [pet_dragon.GetNameNoTooltip]."
agot_travel_events_dragon.0023.b.tt: 0 "Diminuisce il legame, e il tuo drago non sarà stanco, rendendo [pet_dragon.Custom('GetDragonHerHim')] più incline a combinare guai per conto proprio."

 # 0024
agot_travel_events_dragon.0024.t: 0 "Drago Giocherellone"
agot_travel_events_dragon.0024.desc.played: 0 "Seguendo i miei ordini alla lettera, [pet_dragon.GetNameNoTooltip] vola via eccitato e ritorna con un[ROOT.Char.Custom('GetRandomRegionalSmallGame')] mort[ROOT.Char.Custom('DE_PRO_PER_S_3P_G')]a, che [pet_dragon.Custom('GetDragonSheHe')] ha senza dubbio fiutato con facilità. [pet_dragon.GetNameNoTooltip] mi porge la testa della creatura, e io l'afferro per le orecchie e comincio a tirare. È un gioco finto, naturalmente, poiché [pet_dragon.GetNameNoTooltip] possiede una forza naturale di gran lunga superiore alla mia, e nondimeno [pet_dragon.GetNameNoTooltip] si trattiene finché alla fine non strappa la carcassa dalle mie mani e si allontana goffamente per godersi in trionfo il suo spuntino notturno."
agot_travel_events_dragon.0024.desc.no_play: 0 "Poso una mano sul muso con cui [pet_dragon.GetNameNoTooltip] mi sta pungolando e sospiro. Il mio Alto Valyriano è chiaro, ma servono parecchi ordini prima che [pet_dragon.GetNameNoTooltip] si volti e infine mi lasci in pace, così che io possa riposare. Il giorno e la notte sono stati lunghi, e lottare con un drago per qualche carcassa è davvero chiedere troppo."
agot_travel_events_dragon.0024.desc.fallback: 0 "Onestamente non credo che questo sia necessario, ma nel dubbio, per il bene di una buona struttura del codice. /shrug."
agot_travel_events_dragon.0024.a: 0 "Ah, legarsi a un drago è davvero qualcosa di speciale."
agot_travel_events_dragon.0024.b: 0 "Mi spiace, [pet_dragon.GetNameNoTooltip], ma anche un cavaliere di drago deve riposare."


 ##########################
 # TURBULENCE (0031-0032) #
 ##########################
 # 0031
agot_travel_events_dragon.0031.t: 0 "Turbolenza!"
agot_travel_events_dragon.0031.desc: 0 "L'aria è calma e stabile, finché all'improvviso [pet_dragon.GetName] ed io non ci imbattiamo in un inatteso vortice di turbolenza! L'aria sferzante quasi mi sbalza dalla sella mentre mi assicuro alle cinghie, e [pet_dragon.GetNameNoTooltip] ringhia in segno di protesta, tentando di raddrizzare [pet_dragon.Custom('GetDragonHerselfHimself')] contro quell'improvvisa e violenta resistenza.\n\nLa turbolenza colpisce più forte e più a lungo di quanto mi aspettassi, e mi stringo al mio drago mentre il suolo mi fissa dal basso in modo fin troppo invitante durante tutta la prova."
agot_travel_events_dragon.0031.a: 0 "Abbassati, schiva, tuffati, avvita e schiva!"
agot_travel_events_dragon.0031.a.tt: 0 "Hai una probabilità di subire ritardi e ferite"


 #############################
 # HUNGRY DRAGON (0046-0055) #
 #############################
 # 0047 - Flock of Birds
agot_travel_events_dragon.0047.t: 0 "Drago Affamato!"
agot_travel_events_dragon.0047.desc: 0 "Benché i cieli siano per lo più vuoti, oggi [pet_dragon.GetName] ed io ci imbattiamo in uno stormo di uccelli nel pieno della migrazione, e in un impeto di fame il mio [pet_dragon.Custom('GetDragonColor')] destriero scatta contro di loro con zanne affilate in cerca di uno spuntino! È un comportamento un po' indisciplinato, ma talvolta non si può porre freno agli istinti omicidi di un drago."
agot_travel_events_dragon.0047.a: 0 "Strappali dal cielo, [pet_dragon.GetNameNoTooltip]!"
agot_travel_events_dragon.0047.a.tt: 0 "Subirai un ritardo, ma il tuo drago lo apprezzerà."
agot_travel_events_dragon.0047.b: 0 "Controllati!"
agot_travel_events_dragon.0047.b.tt: 0 "Non subirai ritardi, ma il tuo drago non lo apprezzerà."

 # 0048 - Fish / Dolphin / Whale
 agot_travel_events_dragon.0048.t:0 "$agot_travel_events_dragon.0047.t$"
agot_travel_events_dragon.0048.desc_fish: 0 "Benché spesso voliamo alti tra le nuvole, oggi [pet_dragon.GetName] scende vicino all'acqua, dove soffia una salmastra brezza marina. Mentre scivoliamo sopra le limpide onde azzurre, qualcosa cattura l'attenzione di [pet_dragon.GetNamePossessiveNoTooltip] là sotto.\n\nSospetto si tratti d'un pesce, data la distinta sagoma scura che nuota sotto di noi. Forse un merluzzo, forse un dentice. Non è la preda più grande, ma basta comunque a tentare lo stomaco vuoto di [pet_dragon.GetNamePossessiveNoTooltip]."
agot_travel_events_dragon.0048.desc_dolphin: 0 "Benché spesso voliamo alti tra le nuvole, oggi [pet_dragon.GetName] scende vicino all'acqua, dove soffia una salmastra brezza marina. Mentre passiamo sopra il mare azzurro e limpido, lo stomaco di [pet_dragon.GetNamePossessive] brontola tanto forte che quasi ne sento il fremito attraverso [pet_dragon.Custom('GetDragonHerHim')].\n\nScrutando le acque sottostanti, scorgo uno spettacolo comune: dei delfini che emergono dalle onde per respirare. Anche [pet_dragon.GetNameNoTooltip] li nota, ed è chiaro che per il mio drago affamato si tratta di una visione appetitosa."
agot_travel_events_dragon.0048.desc_whale: 0 "I battiti delle grandi ali di [pet_dragon.GetNamePossessive] sopra il mare aperto fanno eco per intensità ai flutti che s'infrangono sotto di noi. Un drago grande quanto [pet_dragon.GetNameNoTooltip] può essere davvero vorace, e me ne rendo dolorosamente conto quando [pet_dragon.Custom('GetDragonSheHe')] si lancia all'improvviso verso il basso, spinto dalla fame, alla vista di un'enorme balena che emerge sotto di noi!\n\nNon sarebbe impresa da poco strappare una balena dal mare come se fosse un grappolo spropositato, ma [pet_dragon.GetNameNoTooltip] è tanto grande e forte che quel povero leviatano potrebbe non diventare altro che un banchetto regale per la regalità dei cieli."
agot_travel_events_dragon.0048.a: 0 "Getta la tua rete, [pet_dragon.GetNameNoTooltip]!"
 agot_travel_events_dragon.0048.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
agot_travel_events_dragon.0048.b: 0 "Controllati!"
 agot_travel_events_dragon.0048.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"

 # 0049 - Farm Animals
 agot_travel_events_dragon.0049.t:0 "$agot_travel_events_dragon.0047.t$"
agot_travel_events_dragon.0049.desc: 0 "Mentre sorvoliamo i dolci pascoli sottostanti, [pet_dragon.GetName] nota con vivo interesse il bestiame sotto di noi. Un campo di [ROOT.Char.Custom('RegionalFarmAnimalPlural')] al pascolo si stende davanti agli occhi e allo stomaco di [pet_dragon.GetNamePossessiveNoTooltip] come un vero banchetto, e la grande bestia [pet_dragon.Custom('GetDragonColor')] quasi sbava nell'aria mentre [pet_dragon.Custom('GetDragonSheHe')] attende il mio comando."
agot_travel_events_dragon.0049.a: 0 "I contadini non sentiranno la mancanza di uno o due capi..."
 agot_travel_events_dragon.0049.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
agot_travel_events_dragon.0049.b: 0 "Controllati!"
 agot_travel_events_dragon.0049.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"

 # 0050 - Game Animal
 agot_travel_events_dragon.0050.t:0 "$agot_travel_events_dragon.0047.t$"
agot_travel_events_dragon.0050.desc: 0 "Mentre sorvoliamo le ombrose foreste sottostanti, [pet_dragon.GetName] lascia uscire un grido agitato che riconosco subito come il solito tono di [pet_dragon.Custom('GetDragonHerHis')] quando è affamato e desideroso di cacciare. L'impulso è tanto forte che [pet_dragon.GetNameNoTooltip] rallenta sopra gli alberi e individua un[ROOT.Char.Custom('GetRandomRegionalSmallGame')] solitari[ROOT.Char.Custom('DE_PRO_PER_S_3P_G')]o che visibilmente si tende — persino da quassù — all'ombra improvvisa che gli passa sopra. Sarebbe cosa da nulla lasciare che il mio [pet_dragon.Custom('GetDragonColorGrade')] destriero lo divori in un sol boccone, ma abbiamo dei luoghi dove andare..."
agot_travel_events_dragon.0050.a: 0 "Non c'è alcun male. Un drago può solo essere un drago, dopotutto."
 agot_travel_events_dragon.0050.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
agot_travel_events_dragon.0050.b: 0 "Bah, non vale il nostro tempo. Avanti!"
 agot_travel_events_dragon.0050.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"

 # 0051 - Predator
 agot_travel_events_dragon.0051.t:0 "$agot_travel_events_dragon.0047.t$"
agot_travel_events_dragon.0051.desc: 0 "Mentre [pet_dragon.GetNameNoTooltip] ed io proseguiamo il nostro viaggio, noto il mio drago guardare sempre più spesso verso il suolo. È evidente che [pet_dragon.GetNameNoTooltip] stia cominciando ad avere fame mentre mi trasporta attraverso la terra, e ben presto scorgo sotto di noi un grande [ROOT.Char.Custom('RegionalFerociousAnimal')] intento nella propria caccia. A piedi, una simile [ROOT.Char.Custom('RegionalFerociousAnimal')] sarebbe un grave pericolo, ma per [pet_dragon.GetNameNoTooltip] non è altro che un'altra bestia vincolata alla terra, alla mercé di [pet_dragon.GetHerHis] zanne e fiamme."
agot_travel_events_dragon.0051.a: 0 "Possiamo abbatterlo, [pet_dragon.GetNameNoTooltip]!"
 agot_travel_events_dragon.0051.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
agot_travel_events_dragon.0051.b: 0 "A ripensarci, là fuori potrebbero esserci prede più appetitose..."
 agot_travel_events_dragon.0051.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"


 ################################
 # BIRD ATTACKS YOU (0056-0057) #
 ################################
 # 0056
agot_travel_events_dragon.0056.t: 0 "Attacco dall'Alto!"
agot_travel_events_dragon.0056.desc: 0 "Mi godo la serenità del cielo quando all'improvviso [pet_dragon.GetName] ed io veniamo assaliti da un rapace impazzito che pare ritenersi pari al mio drago! Strilla furiosamente e becca alla cieca, preso da cieca rabbia, mentre [pet_dragon.GetNameNoTooltip] ed io lo respingiamo con valore."
agot_travel_events_dragon.0056.a: 0 "Via, creatura immonda!"
agot_travel_events_dragon.0056.a.tt: 0 "Hai una probabilità di subire ritardi e ferite."


 ###########################
 # MAINTENANCE (9000-9999) #
 ###########################
 # 9000
  agot_travel_events_dragon.9000.t:0 "Lasciati Indietro"
agot_travel_events_dragon.9000.desc: 0 "[awkward_entourage_member.GetName] mi si avvicina con nervosismo mentre preparo [dragon.GetFirstName] per il viaggio. "Sfortunatamente, poiché avete scelto di portare [dragon.GetFirstNameNoTooltip] con voi alla vostra destinazione, coloro fra noi che non sono cavalieri di drago non potranno unirsi ai vostri viaggi. Attenderemo con impazienza il vostro ritorno a corte, mi[ROOT.Char.GetLadyLord|l].""
  agot_travel_events_dragon.9000.a:0 "Peccato."
agot_travel_events_dragon.9000.tt: 0 "[entourage_member.GetFirstName] lascia il seguito."
