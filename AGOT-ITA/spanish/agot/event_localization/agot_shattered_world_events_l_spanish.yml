l_spanish:

  agot_shattered_world.1000.t:0 "Un nuovo futuro"
  agot_shattered_world.1000.desc:0 "Pagine di storia ancora da scrivere mi chiamano, e finalmente ho i mezzi per riempirle. Ho radunato i miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], ampliato la mia influenza e guidato il mio reame tra pericolo e promessa.\n\nOgni mia scelta ora accende una nuova era; ogni vittoria scrive il racconto del mio dominio. Devo accogliere la sfida e forgiare il mio futuro in leggenda — ma come farò?"
  agot_shattered_world.1000.a:0 "Fonderò una nuova [Concept('administrative','Città Libera')|E]."
  agot_shattered_world.1000.b:0 "Istaurerò una [Concept('feudal','Monarchia Feudale')|E]."
  agot_shattered_world.1000.c:0 "Creerò un grande [pirate_government|E]."
