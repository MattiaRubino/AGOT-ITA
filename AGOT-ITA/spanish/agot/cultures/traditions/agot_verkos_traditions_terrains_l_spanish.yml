l_spanish:

tradition_agot_frozen_flats_name: 0 "Su distese di ghiaccio"
tradition_agot_frozen_flats_desc: 0 "Questo popolo ha fatto la propria dimora sulle grandi pianure gelate che si trovano nelle regioni più fredde del mondo. Traendo il massimo da queste terre invernali, è sopravvissuto dove altri sarebbero periti."
  culture_in_frozen_flats_desc:0 "La [culture|E] non è presente in alcuna [county|E] con il terreno Pianure Ghiacciate [terrain|E]"

tradition_agot_glacier_name: 0 "Su ghiaccio e pietra"
tradition_agot_glacier_desc: 0 "Sulle montagne e sui ghiacciai del mondo, questo popolo si è scavato una vita aspra. Fredda e dura, proprio come la terra che abita."
  culture_in_glacier_desc:0 "La [culture|E] non è presente in alcuna [county|E] con il terreno Ghiacciaio [terrain|E]"

tradition_agot_cloudforest_name: 0 "Nella foresta delle nubi"
tradition_agot_cloudforest_desc: 0 "Nelle profonde foreste delle nubi, la vita è ben diversa. All'ombra dei grandi alberi, lontano persino dal sole, questo popolo si guadagna da vivere."
  culture_in_cloudforest_desc:0 "La [culture|E] non è presente in alcuna [county|E] con il terreno Foresta delle Nuvole [terrain|E]"

tradition_agot_highlands_name: 0 "Tra gli Altipiani"
tradition_agot_highlands_desc: 0 "La vita negli altipiani è più tradizionale, lontana com'è dal trambusto delle città, e permette alla gente di conservare i propri usi."
  culture_in_highlands_desc:0 "La [culture|E] non è presente in alcuna [county|E] con il terreno Altipiani [terrain|E]"

tradition_agot_taiga_bog_name: 0 "Tra le Paludi"
tradition_agot_taiga_bog_desc: 0 "Nelle paludi dei climi settentrionali i pericoli abbondano. Ma questi luoghi contorti forgiano un popolo forte."
  culture_in_taiga_bog_desc:0 "La [culture|E] non è presente in alcuna [county|E] con il terreno Palude della Taiga [terrain|E]"

tradition_agot_urban_name: 0 "Abitanti delle Città"
tradition_agot_urban_desc: 0 "Benché molti li disprezzino, gli abitanti delle città sanno che la loro vita non è luminosa quanto appare a prima vista. I pericoli di una grande città non hanno nulla da invidiare agli spazi selvaggi della natura, perché nella giungla urbana i vicoli oscuri sono insidiosi quanto le paludi fangose e possono firmare la tua morte con la stessa certezza di un passo falso presso un burrone."
  culture_in_urban_desc:0 "La [culture|E] non è presente in alcuna [county|E] con il terreno Urbano [terrain|E]"

tradition_agot_the_bog_name: 0 "Abitanti dell'Incollatura"
tradition_agot_the_bog_desc: 0 "Quando i Figli cercarono di spezzare di nuovo la terra, il Maglio delle Acque creò l'Incollatura: un luogo unico al mondo per i suoi pericoli, tanto nella fauna quanto nella flora."
  culture_in_the_bog_desc:0 "La [culture|E] non è presente in alcuna [county|E] con il terreno Palude [terrain|E]"
