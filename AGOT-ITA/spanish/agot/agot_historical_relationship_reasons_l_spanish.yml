 #Nemesis Reasons
  nemesis_bsteel_bloodraven:0 "L’odio [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] prese avvio quando [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'eravate', 'erano')] entrambi soltanto bastardi in cerca d’uno sguardo da parte d’un re che aveva troppi figli. Cominciò nei cortili d’addestramento e nel bosco sacro, là dove le differenze delle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] nature divennero un campo di battaglia. [CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'consideri', 'considera')] [TARGET_CHARACTER.GetShortUIName] come un marciume insanabile, un rivale la cui sola presenza è un insulto al [CharYourHerHis(CHARACTER)] orgoglio."
  nemesis_aerys_ddarklyn:0 "Un odio profondo fra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] nacque nel preciso istante in cui [CharYouSheHe(TARGET_CHARACTER)] imprigionò il [TARGET_CHARACTER.GetHerHisYour] re. [Select_CString(CHARACTER.IsLocalPlayer, 'L’atto supremo di tradimento — un vassallo che osò mettere le mani sul Signore dei Sette Regni e spogliare', 'Un atto disperato contro un tiranno i cui capricci erratici minacciavano di dissanguare Casa Darklyn, la prigionia servì a ricordare')] [CharYouHerHim(CHARACTER)] della [CHARACTER.GetHerHisYour] [Select_CString(CHARACTER.IsLocalPlayer, 'dignità divina, un insulto cui si può rispondere soltanto con fuoco e sangue', 'fragile umanità, una cupa lezione sul fatto che persino i draghi possano essere ingabbiati e fatti sanguinare')]."
