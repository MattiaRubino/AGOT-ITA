  rival_daemon_rhea:0 "Un’unione forzata che nessuno dei due desiderava, un patto politico che legò un drago inquieto alle pietre della Valle. Fin dal [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] primo incontro, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] si rivelaste incompatibili in ogni cosa; il fiero stoicismo di [CHARACTER.GetShortUINamePossessive] quale Lady di [GetTitleByKey('c_runestone').GetNameNoTier] era il contrappunto perfetto alla volatile ambizione di [TARGET_CHARACTER.GetShortUINamePossessive]."
