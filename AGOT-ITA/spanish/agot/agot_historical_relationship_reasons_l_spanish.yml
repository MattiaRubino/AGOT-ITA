lover_rhaena_efarman: 0 "Mentre [CHARACTER.GetShortUIName] trovò in [TARGET_CHARACTER.GetShortUIName] un raro rifugio di sincero affetto in una vita segnata dalla tragedia, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'Elissa')] trov[Select_CString(TARGET_CHARACTER.IsFemale,'ò','ò')] un mecenate per i [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuoi','suoi')] sogni più selvaggi. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] storia d'amore è un disperato tentativo di trovare la felicità alle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] condizioni."
lover_rhaena_efarman_corresponding: 0 "Mentre [TARGET_CHARACTER.GetShortUIName] trovò in [CHARACTER.GetShortUIName] un raro rifugio di sincero affetto in una vita segnata dalla tragedia, [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'Elissa')] trov[Select_CString(CHARACTER.IsFemale,'ò','ò')] un mecenate per i [Select_CString(CHARACTER.IsLocalPlayer,'tuoi','suoi')] sogni più selvaggi. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] storia d'amore è un disperato tentativo di trovare la felicità alle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] condizioni."
lover_jerry_alysanne: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] storia ebbe inizio nel cuore della notte quando, ancora poco più che bambini, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'fuggiste', 'fuggirono')] dalla reggenza di [GetTitleByKey('c_kings_landing').GetNameNoTier] per sposarsi in segreto sulle scogliere di [GetTitleByKey('c_dragonstone').GetNameNoTier]. Quell'atto di sfida definì il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame da quel giorno in avanti."
lover_baelon_alyssa: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Il vostro', 'Il loro')] amore è qualcosa di selvaggio e ridente, nato molto prima che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'scambiaste', 'scambiassero')] i voti matrimoniali. Cresciuti come compagni inseparabili, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] furono una coppia di terrori nel [GetTitleByKey('b_the_red_keep').GetNameNoTier], evolvendosi in una focosa storia d'amore che non ha mai perduto l'energia giocosa della [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] giovinezza."
lover_daemonrp_mysaria: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] relazione ebbe inizio negli angoli oscuri della Via della Seta, dove [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'trovaste', 'trovarono')] un'intimità funzionale. [CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'tratti', 'tratta')] [TARGET_CHARACTER.GetShortUIName] come un lusso che [CharYouSheHe(CHARACTER)] può permettersi e un'arma che [CharYouSheHe(CHARACTER)] può brandire, mentre [CharYouSheHe(TARGET_CHARACTER)] si rese indispensabile, assicurandosi i vantaggi che questa relazione comporta."
lover_daemonrp_mysaria_corresponding: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] relazione ebbe inizio negli angoli oscuri della Via della Seta, dove [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'trovaste', 'trovarono')] un'intimità funzionale. [TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tratti', 'tratta')] [CHARACTER.GetShortUIName] come un lusso che [CharYouSheHe(TARGET_CHARACTER)] può permettersi e un'arma che [CharYouSheHe(TARGET_CHARACTER)] può brandire, mentre [CharYouSheHe(CHARACTER)] si rese indispensabile, assicurandosi i vantaggi che questa relazione comporta."
                                                                                                                                                                                                     lover_daemonrp_nettles:0 "Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame nacque come rapporto di apprendistato, ma fiorì in intimità. [CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono una storia di istanti rubati, lontani dalla carneficina della guerra civile."                                                                                                                                                                                                     lover_aemond_alys_corresponding:0 "Tra le rovine svuotate di [GetTitleByKey('c_harrenhal').GetNameNoTier], [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] trovarono un rifugio che il resto del mondo non avrebbe mai potuto comprendere. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame è un intreccio di profezia e passione, forgiato nelle ombre d'un castello maledetto, là dove [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'il Principe')] trovasti una confidente che non temeva il fuoco che ardeva in [CharYouHerHim(TARGET_CHARACTER)]."
lover_rhaenyra_criston: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] storia ebbe inizio quando [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'la giovane Principessa')] scelse [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'l'affascinante Criston Cole')] come [Select_CString(CHARACTER.IsLocalPlayer,'tuo','suo')] protettore personale, elevando il [Select_CString(CHARACTER.IsLocalPlayer,'tuo','suo')] cavaliere prediletto a una posizione di costante vicinanza. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] è l'infatuazione giovanile di una principessa per il suo cavaliere."
lover_rhaenyra_criston_corresponding: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] storia ebbe inizio quando [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'la giovane Principessa')] scelse [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'l'affascinante Criston Cole')] come [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuo','suo')] protettore personale, elevando il [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuo','suo')] cavaliere prediletto a una posizione di costante vicinanza. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] è l'infatuazione giovanile di una principessa per il suo cavaliere."
lover_rhaenyra_harwin: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] relazione ebbe inizio quando un cavaliere s'imbatté in una principessa respinta, e quella notte trovarono conforto l'uno nella compagnia dell'altra. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] storia è fatta di presenza incrollabile, con [TARGET_CHARACTER.GetShortUIName] che offre l'amore divenuto il battito stesso della vita personale di [Select_CString(CHARACTER.IsLocalPlayer,'te','[Select_CString(CHARACTER.IsFemale,''lei'',''lui'')]')]."
lover_rhaenyra_harwin_corresponding: 0 "[Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] relazione ebbe inizio quando un cavaliere s'imbatté in una principessa respinta, e quella notte trovarono conforto l'uno nella compagnia dell'altra. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'La vostra', 'La loro')] storia è fatta di presenza incrollabile, con [CHARACTER.GetShortUIName] che offre l'amore divenuto il battito stesso della vita personale di [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'te','[Select_CString(TARGET_CHARACTER.IsFemale,''lei'',''lui'')]')]."
lover_aemond_alys: 0 "Fra le rovine svuotate di [GetTitleByKey('c_harrenhal').GetNameNoTier], [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] trovarono un rifugio che il resto del mondo non avrebbe mai potuto comprendere. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Il vostro', 'Il loro')] legame è un intreccio di profezia e passione, forgiato nelle ombre di un castello maledetto dove [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'il Principe')] trovò una confidente che non temeva il fuoco in [CharYouHerHim(CHARACTER)]."
lover_aemond_alys_corresponding: 0 "Fra le rovine svuotate di [GetTitleByKey('c_harrenhal').GetNameNoTier], [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] trovarono un rifugio che il resto del mondo non avrebbe mai potuto comprendere. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Il vostro', 'Il loro')] legame è un intreccio di profezia e passione, forgiato nelle ombre di un castello maledetto dove [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'il Principe')] trovò una confidente che non temeva il fuoco in [CharYouHerHim(TARGET_CHARACTER)]."
  lover_maegor_tyanna:0 "Tra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] vi è una tetra intesa: il potere si mantiene attraverso il timore e la forza. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] vincolo è forgiato nel silenzio delle camere di tortura e nel calore del fuoco di drago, là dove la violenza manifesta di [CharYourHerHis(CHARACTER)] trova perfetto compimento nella rete di occhi e orecchie di [CharYourHerHis(TARGET_CHARACTER)], che fa sì che nessun nemico rimanga nascosto."
  lover_maegor_tyanna_corresponding:0 "Tra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] vi è una tetra intesa: il potere si mantiene attraverso il timore e la forza. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] vincolo è forgiato nel silenzio delle camere di tortura e nel calore del fuoco di drago, là dove la violenza manifesta di [CharYourHerHis(TARGET_CHARACTER)] trova perfetto compimento nella rete di occhi e orecchie di [CharYourHerHis(CHARACTER)], che fa sì che nessun nemico rimanga nascosto."
  lover_petyr_lysa:0 "Un legame nato da una notte nelle tenebre, un'intimità segreta che né il nome dei [GetScriptedCharacterByHistoryID('Tully_1').GetHouse.GetName] né le leggi degli uomini avrebbero mai potuto sancire. [CHARACTER.GetShortUIName|U] [CharAreIs(CHARACTER)] l'unica persona che comprenda davvero la profondità del desiderio di [TARGET_CHARACTER.GetShortUINamePossessive], trovando in [CharYouHerHim(TARGET_CHARACTER)] una devozione salda, mentre il [CharYourHerHis(CHARACTER)] cuore cerca altrove."
  lover_petyr_lysa_corresponding:0 "Un legame nato da una notte nelle tenebre, un'intimità segreta che né il nome dei [GetScriptedCharacterByHistoryID('Tully_1').GetHouse.GetName] né le leggi degli uomini avrebbero mai potuto sancire. [TARGET_CHARACTER.GetShortUIName|U] [CharAreIs(TARGET_CHARACTER)] l'unica persona che comprenda davvero la profondità del desiderio di [CHARACTER.GetShortUINamePossessive], trovando in [CharYouHerHim(CHARACTER)] una devozione salda, mentre il [CharYourHerHis(TARGET_CHARACTER)] cuore cerca altrove."

 #Soulmate reasons
  soulmate_dunksmall_jenny:0 "Due anime che trovarono rifugio nella pioggia lieve e tra antiche pietre, barattando una corona per la libertà d'una libellula. Per [CHARACTER.GetShortUIName], [TARGET_CHARACTER.GetShortUIName] [CharAreIs(TARGET_CHARACTER)] una donna che profuma di fiori selvatici e antichi segreti, e l'unica persona che faccia sentire [CharYouHerHim(CHARACTER)] [Select_CString(CHARACTER.IsFemale,'donna','uomo')] anziché una pedina su una scacchiera dinastica."
  soulmate_dunksmall_jenny_corresponding:0 "Due anime che trovarono rifugio nella pioggia lieve e tra antiche pietre, barattando una corona per la libertà d'una libellula. Per [TARGET_CHARACTER.GetShortUIName], [CHARACTER.GetShortUIName] [CharAreIs(CHARACTER)] una donna che profuma di fiori selvatici e antichi segreti, e l'unica persona che faccia sentire [CharYouHerHim(TARGET_CHARACTER)] [Select_CString(TARGET_CHARACTER.IsFemale,'donna','uomo')] anziché una pedina su una scacchiera dinastica."

 #Grudge Reasons
  grudge_cersei_robert:0 "Cominciò la notte stessa delle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] nozze, quando il rito nuziale non si concluse con una promessa d'amore, bensì con un sussurro di tradimento. Il vino era pesante e il banchetto era finito, e [TARGET_CHARACTER.GetShortUIName] mormorò all'orecchio di [CHARACTER.GetShortUINamePossessive] il nome di un'altra donna: "[GetScriptedCharacterByHistoryID('Stark_5').GetFirstName]"."
  grudge_cersei_robert_corresponding:0 "Cominciò la notte stessa delle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] nozze, quando il rito nuziale non si concluse con una promessa d'amore, bensì con un sussurro di tradimento. Il vino era pesante e il banchetto era finito, e [CHARACTER.GetShortUIName] mormorò all'orecchio di [TARGET_CHARACTER.GetShortUINamePossessive] il nome di un'altra donna: "[GetScriptedCharacterByHistoryID('Stark_5').GetFirstName]"."
  grudge_catelyn_jsnow:0 "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'vedi', 'vede')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Jon')] come un costante ricordo dell'infedeltà di [GetScriptedCharacterByHistoryID('Stark_3').GetShortUINamePossessive], un risentimento che si fa più profondo ogni volta che [Select_CString(CHARACTER.IsLocalPlayer, 'posi lo sguardo', 'posa lo sguardo')] sui [CharYourHerHis(TARGET_CHARACTER)] capelli scuri e gli occhi grigi, più [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName] che [CharYourHerHis(CHARACTER)] primogenito. [CharYouSheHe(CHARACTER)|U] non avrebbe mai potuto comprendere la decisione di portare un bastardo in casa, e preferirebbe sopportare mille bastardi nascosti piuttosto che uno solo sotto il [CharYourHerHis(CHARACTER)] tetto."
  grudge_catelyn_jsnow_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'vedi', 'vede')] [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Jon')] come un costante ricordo dell'infedeltà di [GetScriptedCharacterByHistoryID('Stark_3').GetShortUINamePossessive], un risentimento che si fa più profondo ogni volta che [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'posi lo sguardo', 'posa lo sguardo')] sui [CharYourHerHis(CHARACTER)] capelli scuri e gli occhi grigi, più [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName] che [CharYourHerHis(TARGET_CHARACTER)] primogenito. [CharYouSheHe(TARGET_CHARACTER)|U] non avrebbe mai potuto comprendere la decisione di portare un bastardo in casa, e preferirebbe sopportare mille bastardi nascosti piuttosto che uno solo sotto il [CharYourHerHis(TARGET_CHARACTER)] tetto."
  grudge_oberyn_mountain:0 "Cominciò quando i leoni furono scatenati nella capitale, trasformando una città in un mattatoio e [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'una principessa in una vittima', 'una principessa in una vittima nelle mani di una bestia senza mente')]. [CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'non vuoi', 'non vuole')] né scuse né terre; [Select_CString(CHARACTER.IsLocalPlayer, 'vuoi', 'vuole')] la vita del responsabile: [TARGET_CHARACTER.GetShortUIName], [Select_CString(CHARACTER.IsLocalPlayer, 'un debito di sangue ambulante il cui unico scopo è morire urlando il nome della donna che ha distrutto,', 'un debito di sangue che la Vipera Rossa intende reclamare di persona per vendicare')] [GetScriptedCharacterByHistoryID('Martell_7').GetFirstName]."
  grudge_oberyn_mountain_corresponding:0 "Cominciò quando i leoni furono scatenati nella capitale, trasformando una città in un mattatoio e [Select_CString(CHARACTER.IsLocalPlayer, 'una principessa in una vittima', 'una principessa in una vittima nelle mani di una bestia senza mente')]. [TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'non vuoi', 'non vuole')] né scuse né terre; [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'vuoi', 'vuole')] la vita del responsabile: [CHARACTER.GetShortUIName], [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'un debito di sangue ambulante il cui unico scopo è morire urlando il nome della donna che ha distrutto,', 'un debito di sangue che la Vipera Rossa intende reclamare di persona per vendicare')] [GetScriptedCharacterByHistoryID('Martell_7').GetFirstName]."
  grudge_oberyn_alorch:0 "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'nutri', 'nutre')] un velenoso disprezzo per [TARGET_CHARACTER.GetShortUIName]. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Il Sacco non fu un incidente, ma un dovere compiuto. Non ti voltasti mai indietro, limitandoti a eseguire l’ordine di', 'Tutto ebbe inizio quando Amory Lorch trascinò la piangente Rhaenys da sotto un letto, dimostrando che il suo servizio a')] [GetScriptedCharacterByHistoryID('Lannister_1').GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'come qualunque buon soldato avrebbe fatto', 'non conosce fondo d’abiezione')]."
  grudge_oberyn_alorch_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'nutri', 'nutre')] un velenoso disprezzo per [CHARACTER.GetShortUIName]. [Select_CString(CHARACTER.IsLocalPlayer, 'Il Sacco non fu un incidente, ma un dovere compiuto. Non ti voltasti mai indietro, limitandoti a eseguire l’ordine di', 'Tutto ebbe inizio quando Amory Lorch trascinò la piangente Rhaenys da sotto un letto, dimostrando che il suo servizio a')] [GetScriptedCharacterByHistoryID('Lannister_1').GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'come qualunque buon soldato avrebbe fatto', 'non conosce fondo d’abiezione')]."
  grudge_oberyn_tywin:0 "[CHARACTER.GetShortUIName|U] non può dimenticare che mentre [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'venivi', 'veniva')] accolto come alleato da un nuovo re, [GetScriptedCharacterByHistoryID('Martell_7').GetFirstName], [GetScriptedCharacterByHistoryID('Targaryen_10').GetFirstName] e [GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] venivano massacrati all’ombra di quel medesimo trono. [Select_CString(CHARACTER.IsLocalPlayer, 'Tu vedi', 'Oberyn vede')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'l’atto come pura crudeltà, ma con esso ti sei assicurato un futuro per l’Ovest e per i Sette Regni', 'oltre la sua facciata d’onore, scorgendo soltanto il macellaio che si nascose dietro il proprio rango mentre i suoi mostri compivano l’opera')]."
  grudge_oberyn_tywin_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] non può dimenticare che mentre [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'venivi', 'veniva')] accolto come alleato da un nuovo re, [GetScriptedCharacterByHistoryID('Martell_7').GetFirstName], [GetScriptedCharacterByHistoryID('Targaryen_10').GetFirstName] e [GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] venivano massacrati all’ombra di quel medesimo trono. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu vedi', 'Oberyn vede')] [Select_CString(CHARACTER.IsLocalPlayer, 'l’atto come pura crudeltà, ma con esso ti sei assicurato un futuro per l’Ovest e per i Sette Regni', 'oltre la sua facciata d’onore, scorgendo soltanto il macellaio che si nascose dietro il proprio rango mentre i suoi mostri compivano l’opera')]."

 #Rival Reasons
  rival_robert_rhaegar:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] divennero nemici giurati dopo che [TARGET_CHARACTER.GetShortUINameNoTooltip] rapì [GetScriptedCharacterByHistoryID('Stark_5').GetShortUIName], [CHARACTER.GetShortUINamePossessiveNoTooltip] [Select_CString(CHARACTER.IsLocalPlayer, 'amata', 'promessa sposa, cosa che fu vista come un grave insulto')]. [Select_CString(CHARACTER.IsLocalPlayer, 'Quell’offesa spinse metà del regno a levarsi in ribellione contro il Trono di Spade, per trovare il bastardo e riportare Lyanna fra le tue', 'Senza saperlo, quell’atto precipitò i Sette Regni in una sanguinosa ribellione sotto la')] [CHARACTER.GetShortUINamePossessiveNoTooltip] [Select_CString(CHARACTER.IsLocalPlayer, 'braccia', 'guida')]."
  rival_robert_rhaegar_corresponding:0 "Il nome di [CHARACTER.GetShortUINamePossessive|U] divenne una maledizione sulle labbra di [TARGET_CHARACTER.GetShortUINamePossessive] dopo che [Select_CString(CHARACTER.IsLocalPlayer, 'tu, inseguendo il destino, fuggisti con', 'la scomparsa di')] [GetScriptedCharacterByHistoryID('Stark_5').GetShortUIName] in seguito al Torneo di [GetTitleByKey('c_harrenhal').GetNameNoTier]. [TARGET_CHARACTER.GetShortUINameNoTooltip|U] [Select_CString(CHARACTER.IsLocalPlayer, ', quella rozza bestia dalla lingua lurida, ti accusò d’avergli sottratto', 'incolpò il principe ereditario della scomparsa di')] [CharYourHerHis(TARGET_CHARACTER)] amata, e levò i vessilli della ribellione."
  rival_aerys_tywin:0 "La radice dell’inimicizia tra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] risiede nella [Select_CString(CHARACTER.IsLocalPlayer, 'crescente ambizione e insubordinazione', 'meschinità e invidia')] che infranse un’amicizia durata molti decenni. Tutto ebbe inizio con [CHARACTER.GetShortUINamePossessiveNoTooltip] [Select_CString(CHARACTER.IsLocalPlayer, 'interesse per', 'ossessivo desiderio di')] [GetScriptedCharacterByHistoryID('Lannister_17').GetShortUIName], [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip] [Select_CString(CHARACTER.IsLocalPlayer, 'signora, cosa che portò ad anni di pubblici insulti', 'moglie, un affronto personale che condusse ad anni di pubblici insulti')]."
