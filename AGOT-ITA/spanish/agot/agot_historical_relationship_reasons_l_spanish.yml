l_spanish:
 #Friends reasons
  friend_jarryn_robert:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un legame d'amore paterno che trascende il sangue. [CHARACTER.GetShortUIName|U] allevò [TARGET_CHARACTER.GetShortUIName] a [GetTitleByKey('c_the_eyrie').GetNameNoTier] accanto a [GetScriptedCharacterByHistoryID('Stark_3').GetShortUIName], come fossero suoi figli. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Credi', 'Robert sostiene')] che, sebbene gli dèi abbiano dato a [CharYouHerHim(TARGET_CHARACTER)] due fratelli e un padre che [CharYouSheHe(TARGET_CHARACTER)] conobbe appena, [Select_CString(CHARACTER.IsLocalPlayer, 'tu sia', 'Jon Arryn sia')] l'uomo che ha davvero formato [CharYouHerHim(TARGET_CHARACTER)]."
  friend_jarryn_robert_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un legame d'amore paterno che trascende il sangue. [TARGET_CHARACTER.GetShortUIName|U] allevò [CHARACTER.GetShortUIName] a [GetTitleByKey('c_the_eyrie').GetNameNoTier] accanto a [GetScriptedCharacterByHistoryID('Stark_3').GetShortUIName], come fossero suoi figli. [Select_CString(CHARACTER.IsLocalPlayer, 'Credi', 'Robert sostiene')] che, sebbene gli dèi abbiano dato a [CharYouHerHim(CHARACTER)] due fratelli e un padre che [CharYouSheHe(CHARACTER)] conobbe appena, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu sia', 'Jon Arryn sia')] l'uomo che ha davvero formato [CharYouHerHim(CHARACTER)]."
  friend_jarryn_ned:0 "[CHARACTER.GetShortUIName|U] allevò [TARGET_CHARACTER.GetShortUIName] a [GetTitleByKey('c_the_eyrie').GetNameNoTier] accanto a [GetScriptedCharacterByHistoryID('Baratheon_2').GetShortUIName], come fossero suoi figli, fungendo da mano salda che guidò [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Ned')] da silenzioso secondogenito a uomo d'onore, donando il peso morale che [CharYouSheHe(TARGET_CHARACTER)] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tieni', 'tiene')] sopra ogni altra cosa."
  friend_jarryn_ned_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] allevò [CHARACTER.GetShortUIName] a [GetTitleByKey('c_the_eyrie').GetNameNoTier] accanto a [GetScriptedCharacterByHistoryID('Baratheon_2').GetShortUIName], come fossero suoi figli, fungendo da mano salda che guidò [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Ned')] da silenzioso secondogenito a uomo d'onore, donando il peso morale che [CharYouSheHe(CHARACTER)] [Select_CString(CHARACTER.IsLocalPlayer, 'tieni', 'tiene')] sopra ogni altra cosa."
  friend_davos_salladhor:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un'amicizia forgiata nel contrabbando e nelle fughe disperate, legati dalle acque insidiose del mare Stretto, un contrabbandiere e un pirata sgargiante. Sebbene le [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] opinioni spesso si scontrino, [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'Davos')] e [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'Salla')] condividono un'intesa che trascende ogni cosa."
  friend_davos_salladhor_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un'amicizia forgiata nel contrabbando e nelle fughe disperate, legati dalle acque insidiose del mare Stretto, un contrabbandiere e un pirata sgargiante. Sebbene le [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] opinioni spesso si scontrino, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'Davos')] e [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'Salla')] condividono un'intesa che trascende ogni cosa."
  friend_robert_thoros:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono compagni di baldoria, uniti da un comune amore per il vino, il canto e la caccia. Sebbene [TARGET_CHARACTER.GetShortUINameNoTooltip] [CharAreIs(TARGET_CHARACTER)] un sacerdote rosso di R'hllor, la [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tua','sua')] presenza è apprezzata per la [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tua','sua')] sfrenatezza e per la sorprendentemente feroce abilità con la [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tua','sua')] spada fiammeggiante."
  friend_robert_thoros_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono compagni di baldoria, uniti da un comune amore per il vino, il canto e la caccia. Sebbene [CHARACTER.GetShortUINameNoTooltip] [CharAreIs(CHARACTER)] un sacerdote rosso di R'hllor, la [Select_CString(CHARACTER.IsLocalPlayer, 'tua','sua')] presenza è apprezzata per la [Select_CString(CHARACTER.IsLocalPlayer, 'tua','sua')] sfrenatezza e per la sorprendentemente feroce abilità con la [Select_CString(CHARACTER.IsLocalPlayer, 'tua','sua')] spada fiammeggiante."
  friend_robert_alysanne:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono cugini e compagni d'infanzia. Il [CharYourTheir(CHARACTER)|U] legame affonda le radici nella storia condivisa dei [CharYourTheir(CHARACTER)] primi anni, quando [CharYouThey(CHARACTER)] giocavano insieme da bambini."
  friend_tywin_kevan:0 "Il legame tra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] si fonda su una lealtà assoluta. [CHARACTER.GetShortUINameNoTooltip|U] si è sempre affidato a [CharYouHerHim(TARGET_CHARACTER)] non soltanto come fratello, ma come più importante comandante e braccio destro. [TARGET_CHARACTER.GetShortUINameNoTooltip|U] ha sempre accolto la fiducia di [CHARACTER.GetShortUINamePossessiveNoTooltip] come la più alta forma di riconoscimento."
  friend_tywin_kevan_corresponding:0 "Il legame tra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] si fonda su una lealtà assoluta. [TARGET_CHARACTER.GetShortUINameNoTooltip|U] si è sempre affidato a [CharYouHerHim(CHARACTER)] non soltanto come fratello, ma come più importante comandante e braccio destro. [CHARACTER.GetShortUINameNoTooltip|U] ha sempre accolto la fiducia di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip] come la più alta forma di riconoscimento."
  friend_jaime_tyrion:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'hai', 'ha')] sempre considerato [CHARACTER.GetShortUIName] come il [Select_CString(TARGET_CHARACTER.IsFemale,'tuo campione','tuo campione')] e una rara fonte di gentilezza contro il disprezzo di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] padre e sorella, trattando [CharYouHerHim(TARGET_CHARACTER)] con il rispetto che gli altri [GetScriptedCharacterByHistoryID('Lannister_7').GetHouse.GetName] non [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'vogliono offrirti', 'vogliono offrirgli')]."
  friend_jaime_tyrion_corresponding:0 "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'hai', 'ha')] sempre considerato [TARGET_CHARACTER.GetShortUIName] come il [Select_CString(CHARACTER.IsFemale,'tuo campione','tuo campione')] e una rara fonte di gentilezza contro il disprezzo di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] padre e sorella, trattando [CharYouHerHim(CHARACTER)] con il rispetto che gli altri [GetScriptedCharacterByHistoryID('Lannister_7').GetHouse.GetName] non [Select_CString(CHARACTER.IsLocalPlayer, 'vogliono offrirti', 'vogliono offrirgli')]."
  friend_admarbrand_jaime:0 "Una compagnia radicata nella storia condivisa della [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] giovinezza. [CHARACTER.GetShortUIName|U] servì come paggio a [GetTitleByKey('c_casterly_rock').GetNameNoTier], dove [CharYouSheHe(CHARACTER)] divenne amico di [TARGET_CHARACTER.GetShortUIName], assicurandosi un buon rapporto con l'erede designato e il [Select_CString(CHARACTER.IsLocalPlayer, 'tuo', 'suo')] presunto futuro signore."
  friend_admarbrand_jaime_corresponding:0 "Una compagnia radicata nella storia condivisa della [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] giovinezza. [TARGET_CHARACTER.GetShortUIName|U] servì come paggio a [GetTitleByKey('c_casterly_rock').GetNameNoTier], dove [CharYouSheHe(TARGET_CHARACTER)] divenne amico di [CHARACTER.GetShortUIName], assicurandosi un buon rapporto con l'erede designato e il [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tuo', 'suo')] presunto futuro signore."
  friend_aerys_tywin:0 "Un legame di camerateria nato quando [TARGET_CHARACTER.GetShortUIName] servì come paggio reale e scudiero a [GetTitleByKey('c_kings_landing').GetNameNoTier], insieme a [GetScriptedCharacterByHistoryID('Baratheon_1').GetShortUIName], cugino di [CHARACTER.GetShortUINamePossessive]. [TARGET_CHARACTER.GetShortUINameNoTooltip|U] e [CHARACTER.GetShortUINameNoTooltip] finirono col diventare inseparabili, vedendosi l'un l'altro come alleati indispensabili."
  friend_aerys_tywin_corresponding:0 "Un legame di camerateria nato quando [CHARACTER.GetShortUIName] servì come paggio reale e scudiero a [GetTitleByKey('c_kings_landing').GetNameNoTier], insieme a [GetScriptedCharacterByHistoryID('Baratheon_1').GetShortUIName], cugino di [TARGET_CHARACTER.GetShortUINamePossessive]. [CHARACTER.GetShortUINameNoTooltip|U] e [TARGET_CHARACTER.GetShortUINameNoTooltip] finirono col diventare inseparabili, vedendosi l'un l'altro come alleati indispensabili."
  friend_steffon_aerys:0 "Un legame di camerateria nato quando [CHARACTER.GetShortUIName] servì come paggio reale e scudiero a [GetTitleByKey('c_kings_landing').GetNameNoTier], insieme a [GetScriptedCharacterByHistoryID('Lannister_1').GetShortUIName], erede di [GetTitleByKey('c_casterly_rock').GetNameNoTier]. [CHARACTER.GetShortUINameNoTooltip|U] e [TARGET_CHARACTER.GetShortUINameNoTooltip] finirono col diventare inseparabili, vedendosi l'un l'altro come alleati indispensabili."
  friend_steffon_aerys_corresponding:0 "Un legame di camerateria nato quando [TARGET_CHARACTER.GetShortUIName] servì come paggio reale e scudiero a [GetTitleByKey('c_kings_landing').GetNameNoTier], insieme a [GetScriptedCharacterByHistoryID('Lannister_1').GetShortUIName], erede di [GetTitleByKey('c_casterly_rock').GetNameNoTier]. [TARGET_CHARACTER.GetShortUINameNoTooltip|U] e [CHARACTER.GetShortUINameNoTooltip] finirono col diventare inseparabili, vedendosi l'un l'altro come alleati indispensabili."
  friend_steffon_tywin:0 "Un rapporto fondato sul rispetto reciproco, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] furono compagni inseparabili accanto a [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] durante la [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] giovinezza a [GetTitleByKey('c_kings_landing').GetNameNoTier], fino a diventare amici."
  friend_steffon_tywin_corresponding:0 "Un rapporto fondato sul rispetto reciproco, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] furono compagni inseparabili accanto a [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] durante la [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] giovinezza a [GetTitleByKey('c_kings_landing').GetNameNoTier], fino a diventare amici."
  friend_rhaegar_joncon:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'occupi', 'occupa')] un posto unico nel circolo più ristretto di [CHARACTER.GetShortUINamePossessive], come amico fidato e risorsa preziosa. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Il tuo servizio nasce da una passione segreta per il Principe.', 'Essendo compagni e alleati di lunga data,')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Questo amore celato ti rende', 'questo legame stretto rende')] [CharYouHerHim(TARGET_CHARACTER)] il sostenitore più devoto, spesso disposto a sacrificare i [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuoi','suoi')] stessi interessi per la causa di [CHARACTER.GetShortUINamePossessiveNoTooltip]."
  friend_rhaegar_joncon_corresponding:0 "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'occupi', 'occupa')] un posto unico nel circolo più ristretto di [TARGET_CHARACTER.GetShortUINamePossessive], come amico fidato e risorsa preziosa. [Select_CString(CHARACTER.IsLocalPlayer, 'Il tuo servizio nasce da una passione segreta per il Principe.', 'Essendo compagni e alleati di lunga data,')] [Select_CString(CHARACTER.IsLocalPlayer, 'Questo amore celato ti rende', 'questo legame stretto rende')] [CharYouHerHim(CHARACTER)] il sostenitore più devoto, spesso disposto a sacrificare i [Select_CString(CHARACTER.IsLocalPlayer,'tuoi','suoi')] stessi interessi per la causa di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]."
  friend_mooton_rhaegar:0 "Come parte del circolo più ristretto di [TARGET_CHARACTER.GetShortUINamePossessive], un rapporto forgiato attraverso anni di quotidiana vicinanza, [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'sei', 'è')] la testimonianza vivente della crescita stessa di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]. Essendo stat[Select_CString(CHARACTER.IsFemale,'a','o')] addestrat[Select_CString(CHARACTER.IsFemale,'a','o')] dalla [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tua','sua')] stessa mano, [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'porti', 'porta')] la [Select_CString(CHARACTER.IsLocalPlayer,'tua','sua')] lealtà come un distintivo d'orgoglio personale."
  friend_mooton_rhaegar_corresponding:0 "Come parte del circolo più ristretto di [CHARACTER.GetShortUINamePossessive], un rapporto forgiato attraverso anni di quotidiana vicinanza, [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'sei', 'è')] la testimonianza vivente della crescita stessa di [CHARACTER.GetShortUINamePossessiveNoTooltip]. Essendo stat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] addestrat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] dalla [Select_CString(CHARACTER.IsLocalPlayer,'tua','sua')] stessa mano, [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'porti', 'porta')] la [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tua','sua')] lealtà come un distintivo d'orgoglio personale."
  friend_lonmouth_rhaegar:0 "Ciò che ebbe inizio come il servizio di uno scudiero è maturato in una potente amicizia tra pari. [CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'vedi', 'vede')] [TARGET_CHARACTER.GetShortUIName] non soltanto come amico, ma come l'uomo che diede a [CharYouHerHim(CHARACTER)] la [Select_CString(CHARACTER.IsLocalPlayer,'tua','sua')] fiducia e il [Select_CString(CHARACTER.IsLocalPlayer,'tuo','suo')] scopo."
  friend_lonmouth_rhaegar_corresponding:0 "Ciò che ebbe inizio come il servizio di uno scudiero è maturato in una potente amicizia tra pari. [TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'vedi', 'vede')] [CHARACTER.GetShortUIName] non soltanto come amico, ma come l'uomo che diede a [CharYouHerHim(TARGET_CHARACTER)] la [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tua','sua')] fiducia e il [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuo','suo')] scopo."
  friend_ned_howland:0 "L'amicizia di [TARGET_CHARACTER.GetShortUINamePossessive|U] con [CHARACTER.GetShortUIName] è l'eredità della bontà mostrata a [CharYouHerHim(TARGET_CHARACTER)] dai fratelli [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName] durante l'anno della falsa primavera. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame è fatto di storia condivisa, nella consapevolezza che, qualunque cosa riservi il futuro, l'uno troverà sempre rifugio nella fiducia dell'altro."
  friend_ned_howland_corresponding:0 "L'amicizia di [CHARACTER.GetShortUINamePossessive|U] con [TARGET_CHARACTER.GetShortUIName] è l'eredità della bontà mostrata a [CharYouHerHim(CHARACTER)] dai fratelli [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName] durante l'anno della falsa primavera. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame è fatto di storia condivisa, nella consapevolezza che, qualunque cosa riservi il futuro, l'uno troverà sempre rifugio nella fiducia dell'altro."
  friend_robb_greatjon:0 "Benché il rapporto abbia avuto inizio con una sfida all'autorità, [TARGET_CHARACTER.GetShortUIName] ora [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'ti ergi', 'si erge')] come il più devoto sostenitore di [CHARACTER.GetShortUINamePossessive], avendo trovato la vera tempra di un capo in [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'il giovane lupo')]."
  friend_robb_greatjon_corresponding:0 "Benché il rapporto abbia avuto inizio con una sfida all'autorità, [CHARACTER.GetShortUIName] ora [Select_CString(CHARACTER.IsLocalPlayer, 'ti ergi', 'si erge')] come il più devoto sostenitore di [TARGET_CHARACTER.GetShortUINamePossessive], avendo trovato la vera tempra di un capo in [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'il giovane lupo')]."
  friend_jsnow_robb:0 "Da quando [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'eravate', 'erano')] abbastanza piccoli da reggere spade di legno, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'siete stati', 'sono stati')] una sola forza, condividendo lo stesso sangue, ma non lo stesso nome. Cresciuti forti sotto l'occhio vigile di [GetScriptedCharacterByHistoryID('Stark_3').GetShortUINamePossessive], [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] condivisero le stesse lezioni e le cure di un padre, ma con pesi diversi sulle spalle."
  friend_jsnow_arya:0 "Come i due che non si adattarono mai del tutto ai ruoli imposti a [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')], [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] trovarono uguaglianza nella reciproca compagnia, donandosi a vicenda la forza di essere dei disadatti in un mondo di rigide aspettative. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Voi', 'Loro')] trovarono un legame profondo nel [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] temperamento condiviso, crescendo come [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'confidenti','confidenti')] prediletti e amici più veri l'uno dell'altra."
  friend_jsnow_sam:0 "Benché il mondo vedesse soltanto un bastardo con troppo orgoglio e un grasso nobile con troppo poco coraggio, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] trovarono un equilibrio che non era mai stato pensato per [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]. [Select_CString(CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] divenne la spada che si frappone tra [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Sam')] e le [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tue','sue')] paure, mentre [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu offri', 'Sam offre')] il consiglio che mantiene [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Jon')] saldo."
  friend_jsnow_sam_corresponding:0 "Benché il mondo vedesse soltanto un bastardo con troppo orgoglio e un grasso nobile con troppo poco coraggio, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] trovarono un equilibrio che non era mai stato pensato per [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] divenne la spada che si frappone tra [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Sam')] e le [Select_CString(CHARACTER.IsLocalPlayer,'tue','sue')] paure, mentre [Select_CString(CHARACTER.IsLocalPlayer, 'tu offri', 'Sam offre')] il consiglio che mantiene [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Jon')] saldo."
  friend_jsnow_grenn:0 "[Select_CString(CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] aiutasti i [Select_CString(CHARACTER.IsLocalPlayer,'tuoi','suoi')] fratelli a resistere alle loro paure, mentre [TARGET_CHARACTER.GetShortUIName] e gli altri offrirono la lealtà che impedì ai pesi di [CharYourHerHis(CHARACTER)] di schiacciare [CharYouHerHim(CHARACTER)]. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Voi', 'Loro')] trovarono un'intesa che trasformò gli insulti pungenti e l'attrito del [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] primo incontro in amicizia."
  friend_jsnow_grenn_corresponding:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] aiutasti i [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuoi','suoi')] fratelli a resistere alle loro paure, mentre [CHARACTER.GetShortUIName] e gli altri offrirono la lealtà che impedì ai pesi di [CharYourHerHis(TARGET_CHARACTER)] di schiacciare [CharYouHerHim(TARGET_CHARACTER)]. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Voi', 'Loro')] trovarono un'intesa che trasformò gli insulti pungenti e l'attrito del [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] primo incontro in amicizia."
  friend_jsnow_pyp:0 "[Select_CString(CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] aiutasti i [Select_CString(CHARACTER.IsLocalPlayer,'tuoi','suoi')] fratelli a resistere alle loro paure, mentre [TARGET_CHARACTER.GetShortUIName] e gli altri offrirono la lealtà che impedì ai pesi di [CharYourHerHis(CHARACTER)] di schiacciare [CharYouHerHim(CHARACTER)]. Le [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] risate condivise divennero un'ancora necessaria, uno scudo per le [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] menti contro ciò che si stende oltre la Bariera."
  friend_jsnow_pyp_corresponding:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] aiutasti i [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuoi','suoi')] fratelli a resistere alle loro paure, mentre [CHARACTER.GetShortUIName] e gli altri offrirono la lealtà che impedì ai pesi di [CharYourHerHis(TARGET_CHARACTER)] di schiacciare [CharYouHerHim(TARGET_CHARACTER)]. Le [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] risate condivise divennero un'ancora necessaria, uno scudo per le [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] menti contro ciò che si stende oltre la Bariera."
  friend_jsnow_edd:0 "[Select_CString(CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] aiutasti i [Select_CString(CHARACTER.IsLocalPlayer,'tuoi','suoi')] fratelli a resistere alle loro paure, mentre [TARGET_CHARACTER.GetShortUIName] e gli altri offrirono la lealtà che impedì ai pesi di [CharYourHerHis(CHARACTER)] di schiacciare [CharYouHerHim(CHARACTER)]. L'umorismo cupo divenne un conforto improbabile, una comprensione condivisa che, se il mondo è destinato a finire, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] tanto vale affrontarlo insieme."
