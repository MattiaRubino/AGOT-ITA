  friend_jsnow_toad:0 "[Select_CString(CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] aiutasti i [Select_CString(CHARACTER.IsLocalPlayer,'tuoi','suoi')] fratelli a resistere alle loro paure, mentre [TARGET_CHARACTER.GetShortUIName] e gli altri offrirono la lealtà che impedì ai pesi di [CharYourHerHis(CHARACTER)] di schiacciare [CharYouHerHim(CHARACTER)]. L'iniziale spirito ribelle e scontroso si trasformò in amicizia. Un signorottino e Rospo, un ragazzo dei vicoli, trovarono un terreno comune in quel luogo gelido."
  friend_jsnow_toad_corresponding:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu', 'Jon')] aiutasti i [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuoi','suoi')] fratelli a resistere alle loro paure, mentre [CHARACTER.GetShortUIName] e gli altri offrirono la lealtà che impedì ai pesi di [CharYourHerHis(TARGET_CHARACTER)] di schiacciare [CharYouHerHim(TARGET_CHARACTER)]. L'iniziale spirito ribelle e scontroso si trasformò in amicizia. Un signorottino e Rospo, un ragazzo dei vicoli, trovarono un terreno comune in quel luogo gelido."
  friend_egg_aemon:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] trovarono un linguaggio comune nella [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] curiosità condivisa verso il mondo. Che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'giochiate', 'giochino')] nei giardini o che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'siate', 'siano')] separati dall'estensione del regno, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi due', 'loro')] rimanete legati da una fiducia mai spezzata."
  friend_gendry_arya:0 "Sulla lunga strada verso la Bariera, [CHARACTER.GetShortUIName] venne a conoscere Arry, un ragazzo feroce e testardo, più soldato di qualunque cavaliere [CharYouSheHe(CHARACTER)] avesse mai incontrato. Con sorpresa di [CHARACTER.GetShortUINamePossessiveNoTooltip], il ragazzo era [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'il travestimento che dovesti assumere, mentre il regno ti dava la caccia', 'la maschera di Arya,')] la figlia del defunto Primo Cavaliere. La scoperta indusse [CharYouHerHim(CHARACTER)] a interrogarsi sui [CharYourHerHis(CHARACTER)] stessi legami con quegli eventi che culminarono nella [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] fuga da [GetTitleByKey('c_kings_landing').GetNameNoTier]."
  friend_gendry_arya_corresponding:0 "Sulla lunga strada verso la Bariera, [TARGET_CHARACTER.GetShortUIName] venne a conoscere Arry, un ragazzo feroce e testardo, più soldato di qualunque cavaliere [CharYouSheHe(TARGET_CHARACTER)] avesse mai incontrato. Con sorpresa di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip], il ragazzo era [Select_CString(CHARACTER.IsLocalPlayer, 'il travestimento che dovesti assumere, mentre il regno ti dava la caccia', 'la maschera di Arya,')] la figlia del defunto Primo Cavaliere. La scoperta indusse [CharYouHerHim(TARGET_CHARACTER)] a interrogarsi sui [CharYourHerHis(TARGET_CHARACTER)] stessi legami con quegli eventi che culminarono nella [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] fuga da [GetTitleByKey('c_kings_landing').GetNameNoTier]."
  friend_beric_thoros:0 "Un tempo lord e sacerdote rosso, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] divennero spettri, uniti da uno scopo che ha consumato tutto ciò che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi due', 'loro')] un tempo [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'eravate', 'erano')]. Per [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Beric')], [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu sei', 'Thoros è')] il solo a conoscere il prezzo di ogni vita data e sottratta, mentre [Select_CString(CHARACTER.IsLocalPlayer, 'tu sei', 'Beric è')] al tempo stesso un amico e un peso, il cui sangue grava sempre sulle mani di [CharYourHerHis(TARGET_CHARACTER)]."
  friend_beric_thoros_corresponding:0 "Un tempo lord e sacerdote rosso, [TARGET_CHARACTER.GetShortUIName] e [CHARACTER.GetShortUIName] divennero spettri, uniti da uno scopo che ha consumato tutto ciò che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi due', 'loro')] un tempo [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'eravate', 'erano')]. Per [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Beric')], [Select_CString(CHARACTER.IsLocalPlayer, 'tu sei', 'Thoros è')] il solo a conoscere il prezzo di ogni vita data e sottratta, mentre [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu sei', 'Beric è')] al tempo stesso un amico e un peso, il cui sangue grava sempre sulle mani di [CharYourHerHis(CHARACTER)]."
  friend_dany_wdarry:0 "[TARGET_CHARACTER.GetShortUIName|U] portò le ultime braci di Casa [GetScriptedCharacterByHistoryID('Targaryen_9').GetHouse.GetName] nella notte, fuggendo dalle lame dell'Usurpatore che avevano oltrepassato le spesse mura di [GetTitleByKey('c_dragonstone').GetNameNoTier]. [Select_CString(CHARACTER.IsLocalPlayer, 'È l\'unico padre che tu abbia mai conosciuto, l\'uomo che trasformò l\'esilio in una casa con una porta rossa e un albero di limoni alla finestra', 'Per la giovane Principessa, questa lealtà è un resto del loro prestigio perduto, un cavaliere fedele che consuma le proprie forze perché il drago possa crescere lontano dall\'ombra di una gabbia')]."
  friend_dany_wdarry_corresponding:0 "[CHARACTER.GetShortUIName|U] portò le ultime braci di Casa [GetScriptedCharacterByHistoryID('Targaryen_9').GetHouse.GetName] nella notte, fuggendo dalle lame dell'Usurpatore che avevano oltrepassato le spesse mura di [GetTitleByKey('c_dragonstone').GetNameNoTier]. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'È l\'unico padre che tu abbia mai conosciuto, l\'uomo che trasformò l\'esilio in una casa con una porta rossa e un albero di limoni alla finestra', 'Per la giovane Principessa, questa lealtà è un resto del loro prestigio perduto, un cavaliere fedele che consuma le proprie forze perché il drago possa crescere lontano dall\'ombra di una gabbia')]."
  friend_faegon_joncon:0 "Per [CHARACTER.GetShortUIName], [TARGET_CHARACTER.GetShortUIName] [CharAreIs(TARGET_CHARACTER)] l'artefice del [CHARACTER.GetHerHisYour] destino, il padre che [CharYouSheHe(CHARACTER)] non conobbe mai, colui che sacrificò sia il [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuo','suo')] nome sia il [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'tuo','suo')] onore per allevare un re dalle ceneri. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Per te, il ragazzo è una seconda occasione, l\'immagine vivente di un principe d\'argento che fallisti molto tempo fa', 'L\'uomo più anziano è un severo pilastro del dovere, che insegna a guidare, a combattere e a ricordare')]."
  friend_faegon_joncon_corresponding:0 "Per [TARGET_CHARACTER.GetShortUIName], [CHARACTER.GetShortUIName] [CharAreIs(CHARACTER)] l'artefice del [TARGET_CHARACTER.GetHerHisYour] destino, il padre che [CharYouSheHe(TARGET_CHARACTER)] non conobbe mai, colui che sacrificò sia il [Select_CString(CHARACTER.IsLocalPlayer,'tuo','suo')] nome sia il [Select_CString(CHARACTER.IsLocalPlayer,'tuo','suo')] onore per allevare un re dalle ceneri. [Select_CString(CHARACTER.IsLocalPlayer, 'Per te, il ragazzo è una seconda occasione, l\'immagine vivente di un principe d\'argento che fallisti molto tempo fa', 'L\'uomo più anziano è un severo pilastro del dovere, che insegna a guidare, a combattere e a ricordare')]."
  friend_faegon_rduckfield:0 "Un rapporto forgiato sui ponti assolati della Shy Maid. Come cavaliere di umili natali al servizio di un principe in esilio, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] trovarono una sincera amicizia nel sudore condiviso del [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] addestramento, nell'onestà di scherzi bruschi e nel greve peso di una segreta eredità."
  friend_faegon_illyrio:0 "[TARGET_CHARACTER.GetShortUIName|U] [CharAreIs(TARGET_CHARACTER)] il generoso benefattore che trasformò una vita d'esilio in un'educazione regale, fornendo l'oro e i tutori necessari a reclamare il diritto di nascita rubato di [CHARACTER.GetShortUINamePossessive]. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Il ragazzo è il premio supremo in una partita di cyvasse giocata nell\'arco di decenni, un pezzo drago accuratamente scolpito dalla tua stessa mano', 'Il Magister è considerato un alleato incrollabile e un vero amico, un uomo la cui bontà è stata il fondamento silenzioso di un\'intera vita')]."
  friend_faegon_illyrio_corresponding:0 "[CHARACTER.GetShortUIName|U] [CharAreIs(CHARACTER)] il generoso benefattore che trasformò una vita d'esilio in un'educazione regale, fornendo l'oro e i tutori necessari a reclamare il diritto di nascita rubato di [TARGET_CHARACTER.GetShortUINamePossessive]. [Select_CString(CHARACTER.IsLocalPlayer, 'Il ragazzo è il premio supremo in una partita di cyvasse giocata nell\'arco di decenni, un pezzo drago accuratamente scolpito dalla tua stessa mano', 'Il Magister è considerato un alleato incrollabile e un vero amico, un uomo la cui bontà è stata il fondamento silenzioso di un\'intera vita')]."
  friend_varys_illyrio:0 "Un tempo noti come il Principe dei Ladri e il Tagliatore, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] divennero presto compagni nei vicoli di [GetTitleByKey('c_pentos').GetNameNoTier], in un legame di fiducia e ambizione reciproca, dove uno raccoglie i sussurri del mondo mentre l'altro fornisce l'acciaio e l'oro per agire di conseguenza."
  friend_aegon_orys:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] sono fratellastri uniti da un'amicizia spogliata di ogni cerimonia. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu', 'Orys')] [CharAreIs(TARGET_CHARACTER)] la forte mano destra, inevitabile come una montagna, il primo a combattere e il primo a consigliare, mentre [Select_CString(CHARACTER.IsLocalPlayer, 'tu sei', 'Aegon è')] l'unico uomo che [CharYouSheHe(TARGET_CHARACTER)] seguirebbe fino alla bocca stessa di un vulcano."
  friend_aegon_orys_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono fratellastri uniti da un'amicizia spogliata di ogni cerimonia. [Select_CString(CHARACTER.IsLocalPlayer, 'Tu', 'Orys')] [CharAreIs(CHARACTER)] la forte mano destra, inevitabile come una montagna, il primo a combattere e il primo a consigliare, mentre [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu sei', 'Aegon è')] l'unico uomo che [CharYouSheHe(CHARACTER)] seguirebbe fino alla bocca stessa di un vulcano."
  friend_aemon_baelon:0 "Avendo visto i [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostri', 'loro')] genitori affrontare i pesi del comando, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] giunsero presto a un accordo: [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] non avreste mai permesso alla corona di frapporsi tra [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]."
  friend_viserys_daemonrp:0 "Fin dalla [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] giovinezza, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] furono uno studio di contrasti, eppure l'amore fraterno continuò a legare [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] ancora e ancora. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu sei', 'Daemon è')] l'unica persona che possa far ridere [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Viserys')] e spingere [CharYouHerHim(CHARACTER)] alla furia nel medesimo istante."
  friend_viserys_daemonrp_corresponding:0 "Fin dalla [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] giovinezza, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] furono uno studio di contrasti, eppure l'amore fraterno continuò a legare [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] ancora e ancora. [Select_CString(CHARACTER.IsLocalPlayer, 'Tu sei', 'Daemon è')] l'unica persona che possa far ridere [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Viserys')] e spingere [CharYouHerHim(TARGET_CHARACTER)] alla furia nel medesimo istante."
  friend_daemonrp_corlys:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] alleanza ebbe inizio come un'intesa tattica, ma maturò in una profonda venerazione personale; [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'rispetti', 'rispetta')] il fuoco che Daemon si rifiuta di spegnere, e [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'rispetti', 'rispetta')] la volontà di ferro che costruì la più grande flotta della storia."
  friend_daemonrp_corlys_corresponding:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] alleanza ebbe inizio come un'intesa tattica, ma maturò in una profonda venerazione personale; [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'rispetti', 'rispetta')] il fuoco che Daemon si rifiuta di spegnere, e [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'rispetti', 'rispetta')] la volontà di ferro che costruì la più grande flotta della storia."
  friend_targtower_siblings:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono una fratellanza temprata dalle aspettative di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] madre. Essendo coloro ai quali fu negato il diritto di nascita, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vi ergete', 'si ergono')] come il più devoto sostegno l'uno dell'altro."
  friend_aegoniii_viserysii:0 "Per anni, il mondo fu un luogo freddo e vuoto, definito dal trauma d'una guerra che strappò [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'la vostra', 'la loro')] famiglia. [CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un legame fraterno costruito sul ricordo condiviso della fine di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] madre e sul peso d'una corona che sembra più un sudario di lutto. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Il tuo ritorno', 'Il ritorno del fratello minore')] da oltre il mare fu l'unica luce in un regno d'ombre."
  friend_aegoniii_viserysii_corresponding:0 "Per anni, il mondo fu un luogo freddo e vuoto, definito dal trauma d'una guerra che strappò [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'la vostra', 'la loro')] famiglia. [CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un legame fraterno costruito sul ricordo condiviso della fine di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] madre e sul peso d'una corona che sembra più un sudario di lutto. [Select_CString(CHARACTER.IsLocalPlayer, 'Il tuo ritorno', 'Il ritorno del fratello minore')] da oltre il mare fu l'unica luce in un regno d'ombre."
  friend_aemondk_naerys:0 "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'hai', 'ha')] fatto del [CharYourHerHis(CHARACTER)] primo dovere l'essere la luce nell'ombra di [TARGET_CHARACTER.GetShortUINamePossessive], scoprendo presto che nulla è bello quanto il sorriso di [CharYourHerHis(TARGET_CHARACTER)]. Che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'stiate', 'stiano')] insieme a un banchetto o trascorrano del tempo nei giardini, la [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] devozione pone l'altro al di sopra di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi stessi', 'loro stessi')]."
  friend_aemondk_naerys_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'hai', 'ha')] fatto del [CharYourHerHis(TARGET_CHARACTER)] primo dovere l'essere la luce nell'ombra di [CHARACTER.GetShortUINamePossessive], scoprendo presto che nulla è bello quanto il sorriso di [CharYourHerHis(CHARACTER)]. Che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'stiate', 'stiano')] insieme a un banchetto o trascorrano del tempo nei giardini, la [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] devozione pone l'altro al di sopra di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi stessi', 'loro stessi')]."
  friend_daeronii_aemondk:0 "Tra la saggezza erudita del Principe e l'incomparabile acciaio del Cavaliere, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] hanno forgiato un sodalizio che rappresenta la speranza del regno per un futuro stabile, segnato dall'amara verità che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'siate', 'siano')] gli unici a conoscere davvero il prezzo del restare fedeli a un re che odia [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]."
  friend_daemonbf_aegor:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un sodalizio incrollabile, nel quale il naturale carisma del principe guerriero è temprato dalla risolutezza d'acciaio del fratello minore. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Voi', 'Loro')] compresero presto che, per sopravvivere alla complessa eredità di [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] padre, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'dovevate', 'dovevano')] ergervi come gli unici veri parenti l'uno dell'altro."
  friend_saera_redroy:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un rapporto definito dal rifiuto di lasciarsi vincolare dalla morale del re, creando un mondo privato nel quale le rigide leggi del regno sono soltanto fastidi. È un legame di segreti condivisi e dell'esaltante brivido di ingannare gli occhi vigili di [GetTitleByKey('b_the_red_keep').GetNameNoTier]."
  friend_bran_meera:0 "Mentre [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'possiedi', 'possiede')] una curiosità che si spinge fino all'orizzonte, [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'rimani', 'rimane')] una guardiana leale, assicurandosi che la [CharYourHerHis(TARGET_CHARACTER)] mano salda e il [CharYourHerHis(TARGET_CHARACTER)] sguardo acuto siano sempre presenti a proteggere i sentieri che percorrono insieme."
  friend_bran_meera_corresponding:0 "Mentre [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'possiedi', 'possiede')] una curiosità che si spinge fino all'orizzonte, [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'rimani', 'rimane')] una guardiana leale, assicurandosi che la [CharYourHerHis(CHARACTER)] mano salda e il [CharYourHerHis(CHARACTER)] sguardo acuto siano sempre presenti a proteggere i sentieri che percorrono insieme."
  friend_bran_jojen:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono legati da un vincolo che pare scritto dai wierwood molto prima che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi due vi incontraste', 'si incontrassero')]: un veggente verde e uno storpio, in ascolto d'un antico canto che nessun altro può udire."
  friend_bran_hodor:0 "[CHARACTER.GetShortUIName|U] e [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'Hodor')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'vi conoscete', 'si conoscono')] da quando [Select_CString(CHARACTER.IsLocalPlayer, 'nascesti', 'Bran nacque')]; ma dopo la caduta di [CharYourHerHis(CHARACTER)], [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'sei divenuto', 'il semplice stalliere è divenuto')] le [CharYourHerHis(CHARACTER)] gambe e la [CharYourHerHis(CHARACTER)] forza. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Con il tuo aiuto', 'Con l\'aiuto del gigantesco amico')], colui che non poteva più camminare si levò al di sopra del suo vecchio mondo."
  friend_bran_hodor_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] e [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'Hodor')] [Select_CString(CHARACTER.IsLocalPlayer, 'vi conoscete', 'si conoscono')] da quando [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'nascesti', 'Bran nacque')]; ma dopo la caduta di [CharYourHerHis(TARGET_CHARACTER)], [Select_CString(CHARACTER.IsLocalPlayer, 'sei divenuto', 'il semplice stalliere è divenuto')] le [CharYourHerHis(TARGET_CHARACTER)] gambe e la [CharYourHerHis(TARGET_CHARACTER)] forza. [Select_CString(CHARACTER.IsLocalPlayer, 'Con il tuo aiuto', 'Con l\'aiuto del gigantesco amico')], colui che non poteva più camminare si levò al di sopra del suo vecchio mondo."
  friend_meera_jojen:0 "Tra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] vi è un legame di feroce amore protettivo e di profonda fiducia, definito da una comprensione reciproca che separa [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi due', 'loro')] dal resto del mondo."
  friend_meera_hodor:0 "Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] è un legame improbabile, nato da pesi condivisi e dalla cura reciproca. Mentre [Select_CString(CHARACTER.IsLocalPlayer, 'ti concentri', 'Meera si concentra')] sul sentiero e sulla caccia, [Select_CString(CHARACTER.IsLocalPlayer, 'trovi', 'ella trova')] un compagno saldo e sereno [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'nella tua quieta lealtà', 'nell\'uomo che semplicemente compie ciò che gli viene chiesto con cuore mite')]."
  friend_meera_hodor_corresponding:0 "Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] è un legame improbabile, nato da pesi condivisi e dalla cura reciproca. Mentre [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'ti concentri', 'Meera si concentra')] sul sentiero e sulla caccia, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'trovi', 'ella trova')] un compagno saldo e sereno [Select_CString(CHARACTER.IsLocalPlayer, 'nella tua quieta lealtà', 'nell\'uomo che semplicemente compie ciò che gli viene chiesto con cuore mite')]."
  friend_jojen_hodor:0 "Tra [CHARACTER.GetShortUIName] e [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Hodor')] vi è un tacito giuramento di fiducia reciproca e necessità; mentre [Select_CString(CHARACTER.IsLocalPlayer, 'osservi', 'il ragazzo dell\'Incollatura osserva')] il mondo con occhi stanchi, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'lo percorri', 'il gigante gentile lo percorre')] con un'innocente lealtà."
  friend_jojen_hodor_corresponding:0 "Tra [TARGET_CHARACTER.GetShortUIName] e [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Hodor')] vi è un tacito giuramento di fiducia reciproca e necessità; mentre [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'osservi', 'il ragazzo dell\'Incollatura osserva')] il mondo con occhi stanchi, [Select_CString(CHARACTER.IsLocalPlayer, 'lo percorri', 'il gigante gentile lo percorre')] con un'innocente lealtà."
  friend_rickon_osha:0 "Tra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] giace un legame forgiato nella fuga da una dimora in fiamme e nella realtà d'una vita da fuggiaschi. Mentre il resto del mondo vede una dinastia spezzata, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] trovate un nuovo, più piccolo branco edificato sulla necessità della sopravvivenza."
  friend_ramsay_reek:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Hai', 'Reek ha')] un odore ripugnante e una mente contorta, cosa che fa di [CharYouHerHim(TARGET_CHARACTER)] un reietto; ma per [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Ramsay')], [CharYouSheHe(TARGET_CHARACTER)] [CharAreIs(TARGET_CHARACTER)] l'unico vero amico. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Voi', 'Loro')] siete fatti della stessa pasta, uniti da un comune amore per la caccia e l'uccisione."
  friend_ramsay_reek_corresponding:0 "[Select_CString(CHARACTER.IsLocalPlayer, 'Hai', 'Reek ha')] un odore ripugnante e una mente contorta, cosa che fa di [CharYouHerHim(CHARACTER)] un reietto; ma per [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Ramsay')], [CharYouSheHe(CHARACTER)] [CharAreIs(CHARACTER)] l'unico vero amico. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Voi', 'Loro')] siete fatti della stessa pasta, uniti da un comune amore per la caccia e l'uccisione."
  friend_theon_robb:0 "[CHARACTER.GetShortUIName|U] non può dimenticare che, sebbene [Select_CString(CHARACTER.IsLocalPlayer, 'tu fossi', 'egli fosse')] tecnicamente un ostaggio, [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'fosti', 'fu')] il primo a offrire a [CharYouHerHim(CHARACTER)] un posto all'alto desco e un luogo alla [CharYourHerHis(TARGET_CHARACTER)] destra. Un rapporto nato da una storia nella quale un ragazzo del sale e del ferro trovò i suoi parenti più veri tra i lupi del Nord."
  friend_theon_robb_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] non può dimenticare che, sebbene [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu fossi', 'egli fosse')] tecnicamente un ostaggio, [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'fosti', 'fu')] il primo a offrire a [CharYouHerHim(TARGET_CHARACTER)] un posto all'alto desco e un luogo alla [CharYourHerHis(CHARACTER)] destra. Un rapporto nato da una storia nella quale un ragazzo del sale e del ferro trovò i suoi parenti più veri tra i lupi del Nord."

 #Best Friends Reasons
  best_friend_robert_ned:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono fratelli in tutto fuorché nel nome, un legame forgiato a [GetTitleByKey('c_the_eyrie').GetNameNoTier] durante i [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostri', 'loro')] anni formativi. Mentre [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu sei uomo di quieta risolutezza e ferreo onore', 'Ned è uomo di quieta risolutezza e ferreo onore, freddo come il Nord,')] e [Select_CString(CHARACTER.IsLocalPlayer, 'tu sei uomo di passioni impetuose', 'Robert è uomo di passioni impetuose, fragoroso come una tempesta')], tali differenze non fanno che stringere ancor più il nodo che lega [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]."
  best_friend_robert_ned_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono fratelli in tutto fuorché nel nome, un legame forgiato a [GetTitleByKey('c_the_eyrie').GetNameNoTier] durante i [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostri', 'loro')] anni formativi. Mentre [Select_CString(CHARACTER.IsLocalPlayer, 'tu sei uomo di quieta risolutezza e ferreo onore', 'Ned è uomo di quieta risolutezza e ferreo onore, freddo come il Nord,')] e [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu sei uomo di passioni impetuose', 'Robert è uomo di passioni impetuose, fragoroso come una tempesta')], tali differenze non fanno che stringere ancor più il nodo che lega [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]."
  best_friend_arthur_rhaegar:0 "Il legame più profondo che [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'condividi', 'condivide')] nel [CHARACTER.GetHerHisYour] circolo più ristretto è con [CHARACTER.GetShortUIName]. [CharYouSheHe(CHARACTER)|U] [CharAreIs(CHARACTER)] spesso [Select_CString(CHARACTER.IsLocalPlayer,'partecipe','partecipe')] dei pensieri più intimi di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip], condividendo la [TARGET_CHARACTER.GetHerHisYour] singolare visione del dovere e del destino."
  best_friend_arthur_rhaegar_corresponding:0 "Il legame più profondo che [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'condividi', 'condivide')] nel [TARGET_CHARACTER.GetHerHisYour] circolo più ristretto è con [TARGET_CHARACTER.GetShortUIName]. [CharYouSheHe(TARGET_CHARACTER)|U] [CharAreIs(TARGET_CHARACTER)] spesso [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'partecipe','partecipe')] dei pensieri più intimi di [CHARACTER.GetShortUINamePossessiveNoTooltip], condividendo la [CHARACTER.GetHerHisYour] singolare visione del dovere e del destino."
  best_friend_egg_dunk:0 "Quando [TARGET_CHARACTER.GetShortUIName] posò lo sguardo su un ragazzo ostinato che pareva del tutto ordinario, [CharYouSheHe(TARGET_CHARACTER)] non poteva sapere che quell'istante avrebbe mutato il corso delle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] vite. Quel ragazzo era [CHARACTER.GetShortUIName], celato sotto abiti semplici e un capo rasato. Fu allora che [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'Dunk')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'potesti', 'poté')] insegnare a un principe che cosa significhi aver fame, patire il freddo ed essere onesto."
  best_friend_egg_dunk_corresponding:0 "Quando [CHARACTER.GetShortUIName] posò lo sguardo su un ragazzo ostinato che pareva del tutto ordinario, [CharYouSheHe(CHARACTER)] non poteva sapere che quell'istante avrebbe mutato il corso delle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] vite. Quel ragazzo era [TARGET_CHARACTER.GetShortUIName], celato sotto abiti semplici e un capo rasato. Fu allora che [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'Dunk')] [Select_CString(CHARACTER.IsLocalPlayer, 'potesti', 'poté')] insegnare a un principe che cosa significhi aver fame, patire il freddo ed essere onesto."

 #Lover reasons
  lover_cersei_jaime:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un'intimità che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'va oltre ciò che il resto del regno ritiene lecito', 'va ben oltre ciò che è ritenuto lecito')]. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'I vostri destini si sono intrecciati ancor prima della nascita, come due metà della medesima anima', 'Il loro rapporto è una vile trasgressione contro le leggi degli dèi e degli uomini, e una macchia sul loro lignaggio')]."
  lover_ned_cat:0 "Benché [CharYouSheHe(TARGET_CHARACTER)] fosse giunt[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] al Nord come [Select_CString(TARGET_CHARACTER.IsFemale,'un\'estranea vincolata','uno straniero vincolato')] dal dovere di unire due regni, [TARGET_CHARACTER.GetShortUIName] trovò calore nel [TARGET_CHARACTER.GetHerHisYour] matrimonio con il gelido Nord. Col tempo, [CharYouSheHe(TARGET_CHARACTER)] sviluppò un sincero amore per [CHARACTER.GetShortUIName], scoprendo che dietro quel volto severo si cela una persona di profonda tenerezza."
  lover_ned_cat_corresponding:0 "Benché [CharYouSheHe(CHARACTER)] fosse giunt[Select_CString(CHARACTER.IsFemale,'a','o')] al Nord come [Select_CString(CHARACTER.IsFemale,'un\'estranea vincolata','uno straniero vincolato')] dal dovere di unire due regni, [CHARACTER.GetShortUIName] trovò calore nel [CHARACTER.GetHerHisYour] matrimonio con il gelido Nord. Col tempo, [CharYouSheHe(CHARACTER)] sviluppò un sincero amore per [TARGET_CHARACTER.GetShortUIName], scoprendo che dietro quel volto severo si cela una persona di profonda tenerezza."
  lover_robb_jeyne:0 "Dopo una notte condivisa di vulnerabilità nata dal dolore, [CHARACTER.GetShortUIName] scelse il sentiero più arduo, ponendo l'onore di [TARGET_CHARACTER.GetShortUINamePossessive] al di sopra del [CHARACTER.GetHerHisYour] proprio. Piuttosto che lasciare [CharYouHerHim(TARGET_CHARACTER)] con un nome macchiato, [Select_CString(CHARACTER.IsLocalPlayer, 'tu', 'Robb')] rese [CharYouHerHim(TARGET_CHARACTER)] regina, infrangendo la [CHARACTER.GetHerHisYour] promessa alla casa [GetScriptedCharacterByHistoryID('Frey_1').GetHouse.GetName]. [Select_CString(CHARACTER.IsLocalPlayer, 'Hai ritrovato in lei una dolcezza che avevi dimenticato potesse esistere, e una sposa leale e devota', 'La sua scelta ha, in cambio, disonorato le promesse da lui fatte ai lord che versano sangue per la sua causa')]."
  lover_robb_jeyne_corresponding:0 "Dopo una notte condivisa di vulnerabilità nata dal dolore, [TARGET_CHARACTER.GetShortUIName] scelse il sentiero più arduo, ponendo l'onore di [CHARACTER.GetShortUINamePossessive] al di sopra del [TARGET_CHARACTER.GetHerHisYour] proprio. Piuttosto che lasciare [CharYouHerHim(CHARACTER)] con un nome macchiato, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu', 'Robb')] rese [CharYouHerHim(CHARACTER)] regina, infrangendo la [TARGET_CHARACTER.GetHerHisYour] promessa alla casa [GetScriptedCharacterByHistoryID('Frey_1').GetHouse.GetName]. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Hai ritrovato in lei una dolcezza che avevi dimenticato potesse esistere, e una sposa leale e devota', 'La sua scelta ha, in cambio, disonorato le promesse da lui fatte ai lord che versano sangue per la sua causa')]."
  lover_jsnow_ygritte:0 "Tra i picchi coperti di gelo e il tepore delle pellicce condivise, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] trovarono un calore che apparteneva soltanto a [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]. Benché il mondo [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vi chiamasse', 'li chiamasse')] nemici, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] trovarono l'uno nell'altra una devozione ardente che spogliò di menzogna nomi, titoli e onore."
  lover_jsnow_ygritte_corresponding:0 "Tra i picchi coperti di gelo e il tepore delle pellicce condivise, [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] trovarono un calore che apparteneva soltanto a [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]. Benché il mondo [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vi chiamasse', 'li chiamasse')] nemici, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] trovarono l'uno nell'altra una devozione ardente che spogliò di menzogna nomi, titoli e onore."
  lover_bloodraven_shiera:0 "[Select_CString(CHARACTER.IsLocalPlayer, 'Tu', 'Bloodraven')], con [CHARACTER.GetHerHisYour] mille occhi e uno, vedevi tutto nel regno, ma non potevi mai scrutare davvero il cuore della donna che amavi. Per [CharYouHerHim(CHARACTER)], [TARGET_CHARACTER.GetShortUIName] [CharAreIs(TARGET_CHARACTER)] l'unica donna che davvero eguagli la [CHARACTER.GetHerHisYour] intelligenza e la [CHARACTER.GetHerHisYour] spietatezza."
  lover_bloodraven_shiera_corresponding:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Tu', 'Bloodraven')], con [TARGET_CHARACTER.GetHerHisYour] mille occhi e uno, vedevi tutto nel regno, ma non potevi mai scrutare davvero il cuore della donna che amavi. Per [CharYouHerHim(TARGET_CHARACTER)], [CHARACTER.GetShortUIName] [CharAreIs(CHARACTER)] l'unica donna che davvero eguagli la [TARGET_CHARACTER.GetHerHisYour] intelligenza e la [TARGET_CHARACTER.GetHerHisYour] spietatezza."
  lover_egg_betha:0 "Per [TARGET_CHARACTER.GetShortUIName], [CHARACTER.GetShortUIName] [CharAreIs(CHARACTER)] la prova vivente di una scelta rara e bellissima compiuta dal cuore: [ Select_CString(CHARACTER.IsFemale,'una donna','un uomo') ] che vide la bellezza del mondo comune e scelse [CharYouHerHim(TARGET_CHARACTER)] per percorrerlo assieme a [CharYouHerHim(CHARACTER)]. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame è una vivida sfida alla tradizione, un'unione tra eguali che scelsero di edificare un lascito sull'affetto piuttosto che sull'ambizione."
  lover_egg_betha_corresponding:0 "Per [CHARACTER.GetShortUIName], [TARGET_CHARACTER.GetShortUIName] [CharAreIs(TARGET_CHARACTER)] la prova vivente di una scelta rara e bellissima compiuta dal cuore: [ Select_CString(TARGET_CHARACTER.IsFemale,'una donna','un uomo') ] che vide la bellezza del mondo comune e scelse [CharYouHerHim(CHARACTER)] per percorrerlo assieme a [CharYouHerHim(TARGET_CHARACTER)]. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame è una vivida sfida alla tradizione, un'unione tra eguali che scelsero di edificare un lascito sull'affetto piuttosto che sull'ambizione."
                                                                                                                                                                                                    lover_renly_loras:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] condividono un legame che profuma di pesche e pioggia d'estate, un giardino segreto e colmo di colori fiorito inaspettatamente tra le cupe pietre delle Terre della Tempesta. [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'Voi due', 'Loro')] trovate l'uno nell'altro il riflesso della [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] stessa vitalità, barattando le opprimenti aspettative delle [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostre', 'loro')] grandi casate con la semplice gioia della reciproca compagnia."
lover_aegon_rhaenys: 0 "Mentre [CHARACTER.GetShortUIName] prese in moglie [GetScriptedCharacterByHistoryID('Targaryen_28').GetShortUIName] per dovere, [CharYouSheHe(CHARACTER)] sposò [TARGET_CHARACTER.GetShortUIName] per amore, trovando in [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'la sorella minore')] uno spirito vasto quanto i cieli che [CharYouSheHe(TARGET_CHARACTER)] dominava. Sebbene [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'la vostra', 'la loro')] unione fosse forgiata secondo la tradizione dell'Antica Valyria, fiorì nei cieli del Westeros, una devozione condivisa nel volo."
