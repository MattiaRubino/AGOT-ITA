  rival_daeronii_daemonbf:0 "Fra [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] giace un vincolo infranto dalla diffidenza, legato alla lama leggendaria che passò fra [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')]. Il colpo finale [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'per te fu perdere il tuo amore fra le sabbie — una principessa barattata per una fragile pace dorniana — lasciando nel tuo cuore solo il peso di Blackfyre e l’amaro sapore del tradimento', 'fu la consapevolezza che esiste una frattura che nessun sangue può colmare. Benché gli siano state offerte terre, onori e un posto a corte, il fantasma di Re Aegon IV e del suo dono perseguiterà sempre Daemon')]."
