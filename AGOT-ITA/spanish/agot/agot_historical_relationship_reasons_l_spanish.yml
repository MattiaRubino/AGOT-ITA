  rival_dmallister_cpyke_corresponding:0 "In quanto comandanti di due diverse fortezze, [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi', 'loro')] avete trascorso anni a contendervi risorse e influenza, ciascuno persuaso che l’altro sia indegno del proprio posto. [TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'vedi', 'vede')] nient’altro che un rozzo pirata analfabeta, mentre [CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer, 'consideri', 'considera')] [CharYouHerHim(CHARACTER)] un vecchio pavone che ha più a cuore il [CharYourHerHis(CHARACTER)] nome che la sopravvivenza dei Guardiani."
  rival_tywin_rreyne:0 "La lotta fra i due leoni dell’Ovest ebbe inizio quando [TARGET_CHARACTER.GetShortUIName] credette che [CharYouSheHe(TARGET_CHARACTER)] potesse schernire la Roccia senza temere ritorsioni. Sprezzante, [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'mostrasti gli artigli, poiché il leone dorato non possiede più il potere di un tempo', 'il leone rosso mostrò gli artigli, minacciando il proprio signore')]. [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'Eppure, alcuni si aggrappano ancora al loro presunto glorioso passato — l’erede,', 'Eppure egli non prevedeva che il leone dorato avesse ancora denti — nella figura di')] [CHARACTER.GetShortUIName] — [Select_CString(CHARACTER.IsLocalPlayer, 'portando il dileggio sulla tua casata', 'che considera quella sfida')] come un debito ancora da riscuotere."
