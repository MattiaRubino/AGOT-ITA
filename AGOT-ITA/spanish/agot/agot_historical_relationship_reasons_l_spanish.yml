  rival_daemon_otto:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono legati da un reciproco disprezzo che sfiora l’ossessione. Per [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Otto')], [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu sei', 'il principe è')] un fuoco caotico che dev’essere spento per preservare l’ordine, mentre [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'tu vedi', 'Daemon vede')] [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Otto')] come un opportunista che succhia il sangue del drago per il guadagno della [CharYourHerHis(CHARACTER)] stessa casata."
  rival_daemon_otto_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono legati da un reciproco disprezzo che sfiora l’ossessione. Per [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Otto')], [Select_CString(CHARACTER.IsLocalPlayer, 'tu sei', 'il principe è')] un fuoco caotico che dev’essere spento per preservare l’ordine, mentre [Select_CString(CHARACTER.IsLocalPlayer, 'tu vedi', 'Daemon vede')] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Otto')] come un opportunista che succhia il sangue del drago per il guadagno della [CharYourHerHis(TARGET_CHARACTER)] stessa casata."
  rival_rhaenyra_alicent:0 "Fin dalla nascita di [GetScriptedCharacterByHistoryID('Targaryen_65').GetShortUINamePossessive], [CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] furono rinchiusi in una guerra fredda d’influenza attorno a [GetScriptedCharacterByHistoryID('Targaryen_60').GetShortUIName]. Il [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostro', 'loro')] legame dimostra come il potere e l’orgoglio possano trasformare una famiglia in un nido di vipere, dove l’unica cosa che [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'condividete', 'condividono')] è il nome dell’uomo che non seppe mantenere [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'voi tutti', 'loro')] in pace."
  rival_rhaenyra_criston:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] storia è quella d’un protettore divenuto persecutore. [TARGET_CHARACTER.GetShortUIName|U], l’uomo che un tempo portava il favore di [CHARACTER.GetShortUINamePossessive], è divenuto il [CHARACTER.GetHerHisYour] più grande tormento, una fiducia infranta che ha inasprito la [TARGET_CHARACTER.GetHerHisYour] antica devozione mutandola in fredda malizia. Ciò che fu un tempo un legame di lealtà ora giace corrotto, oltre ogni speranza di riparazione."
  rival_rhaenyra_criston_corresponding:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] storia è quella d’un protettore divenuto persecutore. [CHARACTER.GetShortUIName|U], l’uomo che un tempo portava il favore di [TARGET_CHARACTER.GetShortUINamePossessive], è divenuto il [TARGET_CHARACTER.GetHerHisYour] più grande tormento, una fiducia infranta che ha inasprito la [CHARACTER.GetHerHisYour] antica devozione mutandola in fredda malizia. Ciò che fu un tempo un legame di lealtà ora giace corrotto, oltre ogni speranza di riparazione."
  rival_rhaenyra_aemond:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] rivalità è una ferita aperta che si rifiuta di rimarginarsi, nata nell’aria salmastra di [GetTitleByKey('b_high_tide').GetNameNoTier]. [CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono vincolati dal ricordo d’un occhio perduto e dalla tagliente accusa di bastardia che quasi costò a [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'te', 'Aemond')] la [CharYourHerHis(TARGET_CHARACTER)] lingua: un debito inciso nel sangue, e ancora non pagato."
  rival_rhaenyra_aemond_corresponding:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] rivalità è una ferita aperta che si rifiuta di rimarginarsi, nata nell’aria salmastra di [GetTitleByKey('b_high_tide').GetNameNoTier]. [CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] sono vincolati dal ricordo d’un occhio perduto e dalla tagliente accusa di bastardia che quasi costò a [Select_CString(CHARACTER.IsLocalPlayer, 'te', 'Aemond')] la [CharYourHerHis(CHARACTER)] lingua: un debito inciso nel sangue, e ancora non pagato."
  rival_rhaenyra_aegonii:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] storia cominciò con una nascita che il regno salutò come una benedizione, ma che [CHARACTER.GetShortUIName] pianse come una maledizione: fratellastri cresciuti sotto il medesimo tetto, eppure divisi da una montagna di risentimento. Quel risentimento si indurì in odio la notte in cui [GetScriptedCharacterByHistoryID('Targaryen_76').GetShortUIName] prese l’occhio di [GetScriptedCharacterByHistoryID('Targaryen_67').GetShortUINamePossessive], e qualunque fragile speranza di pace ancora restasse andò in frantumi."
  rival_rhaenyra_aegonii_corresponding:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] storia cominciò con una nascita che il regno salutò come una benedizione, ma che [TARGET_CHARACTER.GetShortUIName] pianse come una maledizione: fratellastri cresciuti sotto il medesimo tetto, eppure divisi da una montagna di risentimento. Quel risentimento si indurì in odio la notte in cui [GetScriptedCharacterByHistoryID('Targaryen_76').GetShortUIName] prese l’occhio di [GetScriptedCharacterByHistoryID('Targaryen_67').GetShortUINamePossessive], e qualunque fragile speranza di pace ancora restasse andò in frantumi."
  rival_aemond_lucerys:0 "La [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vostra', 'loro')] rivalità ebbe davvero inizio al funerale di [GetScriptedCharacterByHistoryID('Velaryon_35').GetShortUINamePossessive], dove una lite infantile degenerò in una faida di sangue dinastica. Quella notte, [CHARACTER.GetShortUIName] si allontanò furtivamente per reclamare il più grande drago del mondo, e in cambio perdette un occhio per il coltello di [TARGET_CHARACTER.GetShortUINamePossessive] coltello."
