l_spanish:
  agot_bm_group_8284:0 "284 A.C."
  agot_bm_8284:0 "Il Cervo Incoronato"
  agot_bm_8284_desc:0 "La Guerra dell'Usurpatore, la Ribellione di Robert — poco importa come la chiamino i popolani, purché #italic sia finita.#!\n\nI Targaryen sono ormai quasi annientati; gli ultimi rampolli sono dispersi nelle Città Libere, nelle vesti di un giovane e di una neonata in fasce. Robert I Baratheon ora siede sul Trono di Spade di Westeros, ma presto capisce che essere re non è così facile come si aspettava.\n\n“Onore? Ho Sette Regni da governare! Un Re, Sette Regni! Credete che l'onore li tenga in riga? Credete che sia l'onore a mantenere la pace? #bold È la paura! Paura e sangue!#!”"

  bookmark_284_robert_baratheon:0 "Re Robert I"
  bookmark_284_robert_baratheon_subheading:0 "$BOOKMARK_SUBHEADING_IRON_THRONE_DEFAULT$"
  bookmark_284_robert_baratheon_desc:0 "Salute a Robert I di Casa Baratheon, Re degli Andali, dei Rhoynar e dei Primi Uomini, Lord dei Sette Regni e Protettore del Reame di Westeros! Ora seduto sul Trono di Spade, Robert deve unire il reame per assicurarsi un governo pacifico e prospero. Legato ai Lannister da un matrimonio reale con la bellissima — sebbene insidiosa — Cersei Lannister, Robert si ritrova circondato da adulatori e di peggio.\n\n#bold In che modo il Cervo Incoronato creerà un'eredità duratura per Casa Baratheon sul trono?#!"
  bookmark_284_cersei_lannister:0 "Regina Cersei"
  bookmark_284_jon_arryn:0 "Lord Jon"

  bookmark_284_tywin_lannister:0 "Lord Tywin"
  bookmark_284_tywin_lannister_subheading:0 "Lord Protettore dell'Ovest"
  bookmark_284_tywin_lannister_desc:0 "Tywin Lannister, Lord di Casterly Rock, Scudo di Lannisport e Lord Protettore dell'Ovest, ha assicurato l'eredità del leone: un patto di matrimonio con il neo-incoronato Re di Westeros, Robert I Baratheon. Ma sua figlia, Cersei, si cura ben poco delle macchinazioni del padre, preferendo i propri intrighi e le proprie trame. Il suo figlio d'oro, Jaime, sarà per sempre noto come l'Uccisore di Re. E il suo erede, il giovane Tyrion il Folletto, non potrà mai ergersi alto agli occhi di suo padre.\n\n#bold Come migliorerà il grande leone il futuro della sua Casa, al servizio del reame?#!"
  bookmark_284_tyrion_lannister:0 "Tyrion"
  bookmark_284_jaime_lannister:0 "Ser Jaime"

  bookmark_284_renly_baratheon:0 "Lord Renly"
  bookmark_284_renly_baratheon_subheading:0 "Lord Protettore delle Terre della Tempesta"
  bookmark_284_renly_baratheon_desc:0 "Renly Baratheon, un fanciullo di soli sette anni e nuovo lord di Capo Tempesta nonché Lord Protettore delle Terre della Tempesta, reca grande promessa al seggio ancestrale della sua famiglia. Bambino carismatico che si fa amici con facilità, Renly sembra destinato a rispecchiare forza e statura di Robert a tempo debito. Ma prima deve districarsi nel tumulto del nuovo regno del fratello maggiore e forgiare nuove alleanze per sé.\n\n#bold In che modo Renly potrà dimostrare il proprio valore a suo fratello, il Re — e a tutti i lord e le lady di Westeros bramosi d'attenzione reale?#!"

  bookmark_284_stannis_baratheon:0 "Lord Stannis"
  bookmark_284_stannis_baratheon_subheading:0 "Lord di Roccia del Drago"
  bookmark_284_stannis_baratheon_desc:0 "Stannis Baratheon, uomo taciturno e nuovo Lord di Roccia del Drago, sopravvisse alla guerra grazie a pura tenacia e determinazione. Là dove altri uomini sarebbero morti di fame e si sarebbero spezzati, Stannis resistette nella difesa di Capo Tempesta per buona parte di un anno. Onorato da Robert con il seggio tradizionale dell'erede del Re — senza il titolo principesco — ora prende posto al fianco del fratello per aiutare a guidare il regno verso una rinnovata prosperità.\n\n#bold Ma una nuova influenza alla corte di Roccia del Drago plasmerà le vedute del giovane lord e il regno che verrà?#!"
  bookmark_284_davos_seaworth:0 "Ser Davos Seaworth"
  bookmark_284_cressen:0 "Maestro Cressen"

  bookmark_284_balon_greyjoy:0 "Lord Balon"
  bookmark_284_balon_greyjoy_subheading:0 "Lord delle Isole di Ferro"
  bookmark_284_balon_greyjoy_desc:0 "Balon Greyjoy, Lord delle Isole di Ferro e capitano del Grande Kraken, brama un ritorno alla Vecchia Via. Dopo che suo padre, Quellon, trascorse il regno migliorando i rapporti con le terre verdi — ponendo fine alle razzie e alla presa di schiavi — il nuovo sovrano degli Uomini di Ferro vede un'opportunità sotto il nuovo re per tracciare la propria rotta nella scia agitata del detronizzato regno Targaryen.\n\n#bold Con i venti del cambiamento alle spalle, come si prenderà Balon il proprio posto negli annali della storia westerosi?#!"
  bookmark_284_euron_greyjoy:0 "Euron"
  bookmark_284_victarion_greyjoy:0 "Victarion"
