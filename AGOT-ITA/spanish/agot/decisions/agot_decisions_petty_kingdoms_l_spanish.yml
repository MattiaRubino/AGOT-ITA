l_spanish:

 ### Petty Kingdom Proclamations
  I_PROCLAIM_PK:0 "Devi [completely_control|E] almeno due [duchies|E]"
  I_PROCLAIM_IT:0 "Devi [completely_control|E] almeno cinque [empires|E] all'interno di Westeros"

 # Proclaim the Kingdom of Runestone
  agot_proclaim_pk_runestone:0 "Proclama il Regno di Runestone"
  agot_proclaim_pk_runestone_tooltip:0 "Questa decisione ti consentirà di formare il Regno di Runestone" # Tooltip che appare quando passi sopra la decisione
agot_proclaim_pk_runestone_desc: 0 "Runestone, antica terra dei Primi Uomini, è stata riunita sotto il vessillo di Casa [ROOT.Char.GetHouse.GetName].\n\nUn tempo governata dai Re di Bronzo, questa terra possiede grande importanza storica e strategica nella Valle. In quanto suo [ROOT.Char.GetLadyLord], devi essere tu a chiamare a raccolta i tuoi vassalli e a dare origine a una nuova stirpe di Re di Bronzo.\n\nSaprai raccogliere la sfida e reclamare l'onore per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_runestone_confirm: 0 "Mandate i corvi"

 # Proclaim Pirate Kingdom of the Sisters
raise_pirate_kingdom_decision: 0 "Dichiara un Regno Pirata"
raise_pirate_kingdom_decision_desc: 0 "Gli abitanti delle Tre Sorelle furono un tempo re pirati indipendenti, prima dello Stupro delle Sorelle e della Guerra d'Oltremare durata mille anni. Ora la nostra potenza è cresciuta ancora una volta, ed è tempo di scrollarci di dosso il giogo di [ROOT.Char.GetLiege.GetNameNicknamedRegnal]!"
raise_pirate_kingdom_decision_tooltip: 0 "Dichiarerai la tua indipendenza, innalzando le Tre Sorelle al rango che spetta loro di regno pirata."
raise_pirate_kingdom_decision_confirm: 0 "Per le Onde e per i Cieli!"

 # Proclaim the Kingdom of Bear Island
  agot_proclaim_pk_bear_island:0 "Proclama il Regno dell'Isola dell'Orso"
  agot_proclaim_pk_bear_island_tooltip:0 "Questa decisione ti consentirà di formare il Regno dell'Isola dell'Orso"
agot_proclaim_pk_bear_island_desc: 0 "L'Isola dell'Orso, le cui rive boscose sono governate dalla nobile Casa [ROOT.Char.GetHouse.GetName], si erge da lungo tempo come baluardo contro le razzie degli Uomini di Ferro nel Nord.\n\nGrazie a guerrieri feroci e a una lealtà incrollabile, Casa [ROOT.Char.GetHouse.GetNameNoTooltip] si è dimostrata una salda protettrice della sua gente. In quanto loro [ROOT.Char.GetLadyLord], è tuo dovere compiere il passo successivo e porre una corona sull'isola.\n\nSaprai raccogliere la sfida e rivendicare la gloria?"
agot_proclaim_pk_bear_island_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of the Stony Shore
agot_proclaim_pk_the_stony_shore: 0 "Proclama il Regno della Costa Pietrosa"
agot_proclaim_pk_the_stony_shore_tooltip: 0 "Questa decisione ti permetterà di formare il Regno delle Greystones"
agot_proclaim_pk_the_stony_shore_desc: 0 "Il Regno della Costa Pietrosa, governato da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dalla nobile Casa [ROOT.Char.GetHouse.GetName], è una regione di grande importanza strategica nel Nord.\n\nNota per il suo terreno aspro e per la resilienza della sua gente, la Costa Pietrosa è stata da lungo tempo una roccaforte degli uomini del nord. In quanto [ROOT.Char.GetLadyLord], è tuo dovere unire la terra e portare la Costa Pietrosa a nuova grandezza.\n\nSaprai raccogliere la sfida e conquistare onore per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_the_stony_shore_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of Great Wyk
  agot_proclaim_pk_great_wyk:0 "Proclama il Regno del Great Wyk"
  agot_proclaim_pk_great_wyk_tooltip:0 "Questa decisione ti consentirà di formare il Regno del Great Wyk"
agot_proclaim_pk_great_wyk_desc: 0 "L'isola di Great Wyk, governata da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dalla nobile Casa [ROOT.Char.GetHouse.GetName], è la più grande e una delle più importanti isole delle Isole di Ferro.\n\nNoti per la loro fiera indipendenza e per il loro valore marziale, i suoi abitanti sono da lungo tempo saldi difensori dello stile di vita degli Uomini di Ferro. In quanto [ROOT.Char.GetLadyLord], è tuo dovere riunire le terre e formare un regno che conduca l'isola alla gloria.\n\nSaprai raccogliere la sfida e conquistare gloria per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_great_wyk_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of Old Wyk
agot_proclaim_pk_old_wyk: 0 "Proclama il Regno di Old Wyk"
agot_proclaim_pk_old_wyk_tooltip: 0 "Questa decisione ti permetterà di formare il Regno di Old Wyk"
agot_proclaim_pk_old_wyk_desc: 0 "Il Regno di Old Wyk, governato dalla nobile Casa [ROOT.Char.GetHouse.GetName], si erge nel cuore delle Isole di Ferro.\n\nRinomata per i suoi fieri guerrieri e per la sua padronanza dei mari, Casa [ROOT.Char.GetHouse.GetNameNoTooltip] occupa una posizione di rilievo tra gli Uomini di Ferro. In quanto [ROOT.Char.GetLadyLord], è tuo dovere riunire le terre e condurre il Regno della Baia dell'Uomo di Ferro alla gloria.\n\nSaprai raccogliere la sfida e conquistare onore per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_old_wyk_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of the Blackwood Vale
agot_proclaim_pk_blackwood_vale: 0 "Proclama il Regno della Valle dei Blackwood"
agot_proclaim_pk_blackwood_vale_tooltip: 0 "Questa decisione ti permetterà di formare il Regno della Valle dei Blackwood"
agot_proclaim_pk_blackwood_vale_desc: 0 "I Blackwood, governati da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dalla nobile Casa [ROOT.Char.GetHouse.GetName], costituiscono una regione di grande importanza storica e strategica nelle Terre dei Fiumi.\n\nNoti per il loro antico lignaggio e la loro feroce fedeltà agli Antichi Dèi, i suoi abitanti sono da lungo tempo simboli di resilienza e onore. In quanto loro [ROOT.Char.GetLadyLord], è tuo dovere riunire le terre e forgiare un glorioso regno nella Valle dei Blackwood.\n\nSaprai raccogliere la sfida e conquistare onore per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_blackwood_vale_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of Fair Isle
  agot_proclaim_pk_fair_isle:0 "Proclamare il Regno dell'Isola del Vento"
  agot_proclaim_pk_fair_isle_tooltip:0 "Questa decisione ti consentirà di formare il Regno dell'Isola del Vento"
agot_proclaim_pk_fair_isle_desc: 0 "Fair Isle, governata da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dalla nobile Casa [ROOT.Char.GetHouse.GetName], è una regione di grande importanza commerciale per le Terre dell'Ovest.\n\nLa sua potente flotta e le sue pittoresche coste hanno reso Casa [ROOT.Char.GetHouse.GetNameNoTooltip] la potenza dominante della regione. In quanto [ROOT.Char.GetLadyLord], è tuo dovere unire le terre e fondare il Regno di Fair Isle.\n\nSaprai raccogliere la sfida e conquistare onore per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_fair_isle_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of Southstone
agot_proclaim_pk_southstone: 0 "Proclama il Regno di Southstone"
  agot_proclaim_pk_southstone_tooltip:0 "Questa decisione ti consentirà di formare il Regno di Southstone"
agot_proclaim_pk_southstone_desc: 0 "Southstone, governata da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dalla nobile Casa [ROOT.Char.GetHouse.GetName], è una regione di grande importanza storica e strategica nelle Terre dei Fiumi.\n\nNota per le sue fertili terre lungo il Tridente, Casa [ROOT.Char.GetHouse.GetNameNoTooltip] governa da lungo tempo come simbolo di resilienza e forza. In quanto loro [ROOT.Char.GetLadyLord], è tuo dovere riunire le terre e restituire al Regno di Southstone il suo antico splendore.\n\nSaprai raccogliere la sfida e riconquistare l'onore di Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_southstone_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of Stone and Sky
  agot_proclaim_pk_stone_and_sky:0 "Proclama il Regno di Pietra e Cielo"
  agot_proclaim_pk_stone_and_sky_tooltip:0 "Questa decisione ti consentirà di formare il Regno di Pietra e Cielo" # Tooltip che appare quando passi sopra la decisione
agot_proclaim_pk_stone_and_sky_desc: 0 "La Via Ampia, dominata da Casa [ROOT.Char.GetHouse.GetName] da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], è la via più sicura per entrare a Dorne.\n\nUn tempo governata dai Re della Pietra e del Cielo, Casa [ROOT.Char.GetHouse.GetNameNoTooltip] ha ormai acquisito abbastanza controllo da poter rivendicare una tale eredità. In quanto [ROOT.Char.GetLadyLord], è tuo dovere compiere questo passo e restituire grandezza a questo trono spento da lungo tempo.\n\nSaprai raccogliere la sfida e reclamare l'onore per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_stone_and_sky_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of the Torrentine
  agot_proclaim_pk_the_torrentine:0 "Proclama il Regno del Torrentine"
  agot_proclaim_pk_the_torrentine_tooltip:0 "Questa decisione ti consentirà di formare il Regno del Torrentine"
agot_proclaim_pk_the_torrentine_desc: 0 "La Torrentine, governata da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dall'onorevole Casa [ROOT.Char.GetHouse.GetName], è una regione di grande importanza storica e strategica in Dorne.\n\nRinomata per i suoi cavalieri leggendari, Casa [ROOT.Char.GetHouse.GetName] incarna la cavalleria e il valore marziale della sua gente. In quanto [ROOT.Char.GetLadyLord], è tuo dovere riunire le terre e restituire alla Torrentine il suo antico splendore.\n\nSaprai raccogliere la sfida e conquistare gloria per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_the_torrentine_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of the Godsgrace
agot_proclaim_pk_godsgrace: 0 "Proclama il Regno di Godsgrace"
agot_proclaim_pk_godsgrace_tooltip: 0 "Questa decisione ti permetterà di formare il Regno di Godsgrace"
agot_proclaim_pk_godsgrace_desc: 0 "Il Regno di Godsgrace, governato da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dalla nobile Casa [ROOT.Char.GetHouse.GetName], giace nel cuore della linfa vitale di Dorne.\n\nSituato alla confluenza dello Scourge e del Vaith, il controllo di questo passaggio ha da lungo tempo rappresentato un cardine difensivo di Dorne. In quanto [ROOT.Char.GetLadyLord], è tuo dovere unire queste terre e forgiare un vero Regno del Sangueverde.\n\nSaprai raccogliere la sfida e conquistare onore per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_godsgrace_confirm: 0 "Mandate i corvi"

 # Proclaim the Kingdom of the Tor
  agot_proclaim_pk_the_tor:0 "Proclama il Regno del Tor"
  agot_proclaim_pk_the_tor_tooltip:0 "Questa decisione ti consentirà di formare il Regno del Tor"
agot_proclaim_pk_the_tor_desc: 0 "Il Tor, governato da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] da Casa [ROOT.Char.GetHouse.GetName], è una regione di grande importanza storica e strategica in Dorne.\n\nNota per il suo antico lignaggio e il suo ricco retaggio culturale, Casa [ROOT.Char.GetHouse.GetNameNoTooltip] si erge a simbolo della resilienza e della nobiltà di Dorne. In quanto loro [ROOT.Char.GetLadyLord], è tuo dovere unire le terre e forgiare il Regno del Tor.\n\nSaprai raccogliere la sfida e conquistare gloria per Casa [ROOT.Char.GetHouse.GetNameNoTooltip]?"
agot_proclaim_pk_the_tor_confirm: 0 "Mandate i corvi"
