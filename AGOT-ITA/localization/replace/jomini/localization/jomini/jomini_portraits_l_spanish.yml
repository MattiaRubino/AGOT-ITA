l_spanish:
 SETTING_ANIMATED_PORTRAITS: "Personaggi animati"
 SETTING_ANIMATED_PORTRAITS_TOOLTIP: "#T $SETTING_ANIMATED_PORTRAITS$\n#!Determina se i personaggi principali debbano essere animati.\n\nDisattivarlo può aumentare le prestazioni."
 SETTING_PORTRAITS_SSAO: "SSAO personaggi"
 SETTING_PORTRAITS_SSAO_TOOLTIP: "#T $SETTING_PORTRAITS_SSAO$\n#!Determina se l'occlusione ambientale in spazio schermo debba essere applicata ai ritratti.\n\nDisattivarla può aumentare le prestazioni."
 SETTING_PORTRAITS_BLOOM: "Bloom personaggi"
 SETTING_PORTRAITS_BLOOM_TOOLTIP: "#T $SETTING_PORTRAITS_BLOOM$\n#!Determina se il bloom debba essere applicato ai ritratti.\n\nDisattivarlo può aumentare le prestazioni."
