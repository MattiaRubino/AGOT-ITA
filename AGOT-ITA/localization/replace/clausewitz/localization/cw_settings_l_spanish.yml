 SETTING_AUDIO_OPTION_NIGHTMODE: "Modalità notte"
 SETTING_AUDIO_OPTION_NIGHTMODE_TOOLTIP: "#T $SETTING_AUDIO_OPTION_NIGHTMODE$\n#!Attenua il suono per il gioco notturno, smorzando le frequenze più alte e comprimendo la gamma dinamica."
 SETTING_MUSIC_DENSITY: "Densità musica"
 SETTING_MUSIC_DENSITY_TOOLTIP: "Controlla l'equilibrio tra brani completi, silenzio e segmenti di musica d'atmosfera.\n\nIntensa = Per lo più brani riprodotti uno dopo l'altro, simile a una ‘stazione radio’.\nBilanciata = Il perfetto equilibrio tra brani, silenzio e atmosfera\nRilassata = Per lo più segmenti musicali rilassanti che offrono una migliore esperienza d'atmosfera e una minore sensazione di ripetizione dopo diverse ore di gioco"
  # Game
 SETTING_AUTOSAVE: "Intervallo salvataggio automatico"
 SETTING_AUTOSAVE_TOOLTIP: "#T $SETTING_AUTOSAVE$\n#!Imposta la frequenza con cui il gioco salverà automaticamente."
 SETTING_AUTOSAVE_TO_CLOUD_TOOLTIP: "Determina se i salvataggi automatici vengano salvati sul cloud o meno."
 SETTING_CAMERA_FACE_NORTH_TOOLTIP: "Determina se la visuale sia sempre rivolta a nord o meno."
 NO_AUTOSAVE: "Nessun salvataggio automatico"
 # Multiplayer
 SETTINGS_FILE_TRANSFER_SPEED: "Velocità trasferimento file"
 SETTINGS_FILE_TRANSFER_SPEED_TOOLTIP: "#T $File Transfer Speed$\n#!Imposta la velocità massima per i trasferimenti dei file di salvataggio nella lobby multigiocatore.\n\nImpostazioni inferiori possono migliorare la stabilità della rete per chi si unisce alle partite multigiocatore, ma hanno un effetto negativo sui tempi di caricamento multigiocatore.\n\nL'host multigiocatore determina la velocità massima.\n"
