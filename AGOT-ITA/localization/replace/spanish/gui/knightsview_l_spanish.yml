 MAX_KNIGHT_TOOLTIP:1 "#T Numero Massimo di $knight_culture_player_plural_no_tooltip$: [knight_i][GetKnightLimit( GetPlayer.Self )|V]#!\n[GetKnightLimitBreakdown( GetPlayer.Self )]"
 KNIGHT_EFFECTIVENESS:1 "$knight_culture_player_no_tooltip$ Efficacia: #high [GetPlayer.GetKnightEffectiveness|%0]#!"
 KNIGHT_EFFECTIVENESS_TOOLTIP:2 "#T [knight_effectiveness|E]: [GetPlayer.GetKnightEffectiveness|V%0]#!\nBase: #V 100%#!\n[GetPlayer.GetKnightEffectivenessBreakdown]"
 KNIGHTS_VIEW_TITLE_FORBID_TT:2 "#T Vieta ad [Character.GetShortUIName] di essere un $knight_culture_player$#!\n\n[Character.GetShortUIName] non può unirsi #emphasis mai#! ai tuoi [armies|E] come $knight_culture_player_no_tooltip$. Questo lo protegge dal morire in [battle|E]."
CREATE_ACCOLADE_FORBID_TT: "#T Proibisci a [CreateAccoladeView.GetSelectedKnight.GetShortUIName] di essere un $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] non potrà #emphasis mai#! unirsi alle tue [armies|E] come $knight_culture_player_no_tooltip$. Ciò protegge [Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale,'lei','lui')] dalla morte in [battle|E]."
 KNIGHTS_VIEW_TITLE_BY_PROWESS_TT:2 "#T Permetti a [Character.GetShortUIName] di essere un $knight_culture_player$#!\n\n[Character.GetShortUIName] può unirsi ai tuoi [armies|E] come $knight_culture_player_no_tooltip$ se la sua [prowess|E] è una delle più alte nel [realm|E]"
CREATE_ACCOLADE_BY_PROWESS_TT: 2 "#T Permetti a [CreateAccoladeView.GetSelectedKnight.GetShortUIName] di essere un $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] può unirsi alle tue [armies|E] come $knight_culture_player_no_tooltip$ se la [prowess|E] di [Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale,'lei','lui')] è tra le più alte del [realm|E]"
 KNIGHTS_VIEW_TITLE_FORCE_TT:2 "#T Costringi [Character.GetShortUIName] ad essere un $knight_culture_player$#!\n\n[Character.GetShortUIName] #emphasis deve#! unirsi ai tuoi [armies|E] come $knight_culture_player_no_tooltip$, a dispetto della sua [prowess|E]. [Character.GetSheHe|U] potrebbe prendere il posto di un $knight_culture_player_no_tooltip$ con una maggiore Maestria."
CREATE_ACCOLADE_FORCE_TT: "#T Forza [CreateAccoladeView.GetSelectedKnight.GetShortUIName] a essere un $knight_culture_player$#!\n\n[CreateAccoladeView.GetSelectedKnight.GetShortUIName] #emphasis deve#! unirsi alle tue [armies|E] come $knight_culture_player_no_tooltip$, a prescindere dalla [prowess|E] di [Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale,'lei','lui')]. [Select_CString(CreateAccoladeView.GetSelectedKnight.IsFemale,'Lei','Lui')] può prendere il posto di un $knight_culture_player_no_tooltip$ con Prodezza più alta."
 KNIGHTS_CURRENT_MAX:0 "[GetKnightCount( GetPlayer.Self )|V]/[GetKnightLimit( GetPlayer.Self )|V]"
