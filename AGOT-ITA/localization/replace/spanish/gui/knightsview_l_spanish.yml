 # this is can_be_knight_trigger in 00_war_and_peace_triggers.txt
KNIGHT_RESTRICTIONS_TT: "#T Restrizioni dei Cavalieri#!\nSolo i tuoi [vassals|e], [courtiers|e] o [followers|e] diretti possono servire come [knights|e].\nLa tua [culture|e] o [faith|e] determina quali generi possono agire come [knights|e].\n\nUn Cavaliere non può essere:\n - Giocatore, [child|e], [prisoner|e] o [GetTrait('incapable').GetName(GetPlayer.Self)]\n - membro del [clergy|e] (a meno che la [faith|e] o la [culture|e] lo consenta)\n - [master_assassin|e] o [GetTrait('blind').GetName(GetPlayer.Self)] (a meno che la [culture|e] lo consenta o sia un [GetTrait('order_member').GetName(GetPlayer.Self)])\n - [diarch|e] o [ceremonial_liege|e]\n - [governor|e] di un [duchy|e] (o [title|e] superiore) o [house_head|e] di una [noble_family|e]\n\nLe [traditions|e] culturali e gli eventi possono rimuovere alcune restrizioni"
 
KP_CULTURE_MINIMUM_PROWESS: "@alert_icon! La tua [culture|e] richiede almeno 12 [prowess|e]"
KP_CULTURE_ADMIN_FAMILY_KNIGHTS: "@check_icon! La tua [culture|e] rimuove alcune restrizioni di genere per le [wars|e] difensive"
KP_CULTURE_HIGH_PROWESS: "@check_icon! La tua [culture|e] rimuove la maggior parte delle restrizioni per i [knights|e] con almeno 10 [prowess|e]"
