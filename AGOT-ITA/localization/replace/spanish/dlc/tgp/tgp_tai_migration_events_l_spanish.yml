l_spanish:

# Flight of the Tai, Mass migration main event
tgp_tai_migration_event.1000.t: "La fuga dei Tai"
tgp_tai_migration_event.1000.desc: "Durante la riunione del consiglio odierna, sono stato informato di una migrazione di massa di coloni Tai. [migration_leader.GetName], l'anziano rappresentante della loro comunità, ora mi sta davanti, mentre [Select_CString(migration_leader.IsFemale,'lei','lui')] presenta umilmente il proprio caso.\n\n«Mio [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip], cerchiamo guida e una nuova dimora, in quanto ex sudditi di [migration_origin_holder.GetName]. Parlo a nome di molti clan e di migliaia di persone che sperano in un rifugio. Proteggeteci dai pericoli e dateci uno scopo, affinché possiamo essere servitori utili e degni della vostra generosità.»\n\nIl loro destino pende dalle mie labbra."
tgp_tai_migration_event.1000.a: "Vi accolgo tutti, non come ospiti, ma come miei sudditi."
tgp_tai_migration_event.1000.b: "Solo i più abili tra voi risiederanno nel mio [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
tgp_tai_migration_event.1000.c: "Più persone portano più problemi; trovate un'altra porta a cui supplicare."
tgp_tai_migration_event_1000.c_shooed_immigrants_tt: "Gli immigrati potrebbero chiedere riparo a un altro sovrano vicino nel prossimo futuro."
tgp_tai_migration_skilled_development_county_modifier: "Fuga di Artigiani"
tgp_tai_migration_migration_happened_county_modifier: "Coloni Tai"
tgp_tai_migration_migration_happened_character_modifier: "Accolto una Miriade di Immigrati"
tgp_tai_migration_migration_rejected_character_modifier: "Immigrati Respinti"

# Lone skilled Tai character offers services
tgp_tai_migration_event.2000.t: "Un Tai di talento"
tgp_tai_migration_event.2000.desc: "[Select_CString(migrant_skilled_character.IsFemale,'Una','Un')] abile [migrant_skilled_character.GetWomanMan] che afferma di provenire dalle terre [migrant_skilled_character.GetCulture.GetNameNoTooltip] mi sta davanti come [Select_CString(migrant_skilled_character.IsFemale,'una','un')] competente cercatore d'impiego. Le sue maniere sembrano riflettere le recenti notizie sulla fuga del suo popolo.\n\n"
tgp_tai_migration_event.2000.wet_nurse.desc: "«Vostra Santità, sono [migrant_skilled_character.GetName], [Select_CString(migrant_skilled_character.IsFemale,'una nutrice esperta pronta','un tutore esperto pronto')] a servire. Sono [Select_CString(migrant_skilled_character.IsFemale,'sana, ben nutrita','sano, ben nutrito')] e comprendo i bisogni degli infanti. Permettetemi di aiutare la vostra stirpe a prosperare.»"
tgp_tai_migration_event.2000.champion.desc: "«Maestoso signore, nella mia terra natia sono [Select_CString(migrant_skilled_character.IsFemale,'nota','noto')] come [migrant_skilled_character.GetName], [Select_CString(migrant_skilled_character.IsFemale,'guerriera giurata e vincitrice','guerriero giurato e vincitore')] di molti tornei. Il mio braccio è saldo e la mia lealtà è fuori discussione. Lasciate che sia [Select_CString(migrant_skilled_character.IsFemale,'la vostra campionessa','il vostro campione')].»"
tgp_tai_migration_event.2000.travel_leader.desc: "«Mio [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip], sono [migrant_skilled_character.GetName]; avendo viaggiato attraverso deserti, le stelle mi servono da mappa e i venti da alleati. Sotto la mia guida, nessuna carovana si perde mai e nessun sentiero dà pena.»"
tgp_tai_migration_event.2000.master_of_hunt.desc: "«Nat[Select_CString(migrant_skilled_character.IsFemale,'a','o')] per la caccia, temprat[Select_CString(migrant_skilled_character.IsFemale,'a','o')] dalla natura selvaggia, conosco l'odore di ogni bestia e il silenzio di ogni bosco. Leggo le impronte come nessun altro. Che ne dite, mio [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]?»"
tgp_tai_migration_event.2000.court_physician.desc: "«Unguenti tratti da antichi tomi e destrezza nell'agire sotto pressione: sono [Select_CString(migrant_skilled_character.IsFemale,'l'unica donna','l'unico uomo')] di cui avete bisogno per calmare il vostro corpo celestiale, mio [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]. Mi chiamano [migrant_skilled_character.GetName].»"
tgp_tai_migration_event.2000.antiquarian.desc: "«I miei occhi hanno veduto il mito e le mie mani hanno toccato antichi imperi. Lasciatemi restare, affinché la saggezza degli antichi possa raggiungere la vostra corte.»"
tgp_tai_migration_event.2000.court_tutor.desc: "«Ho influenzato molti guerrieri e uomini di Stato, mio [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]. Anche la vostra progenie raggiungerà la grandezza sotto la mia guida, se lo permettete.»"
tgp_tai_migration_event.2000.end.desc: "\n\n[Select_CString(migrant_skilled_character.IsFemale,'Sembra disperata','Sembra disperato')] in cerca di rifugio, probabilmente per le ragioni che [Select_CString(migrant_skilled_character.IsFemale,'l'hanno condotta','l'hanno condotto')] qui, ma chiaramente conosce bene il proprio mestiere. Dovrei fare uso delle sue capacità?"
tgp_tai_migration_event.2000.a: "Potrei aver bisogno dei tuoi servigi."
tgp_tai_migration_event.2000.b: "Non ancora, ma dovresti restare con noi."
tgp_tai_migration_event.2000.b.success: "[migrant_skilled_character.GetNameNoTooltip] si unisce alla tua corte"
tgp_tai_migration_event.2000.b.failure: "[migrant_skilled_character.GetNameNoTooltip] rifiuta la tua offerta"
tgp_tai_migration_event.2000.c: "Devo rifiutare."

# Noble Tai character and his family are asking for a spare county
tgp_tai_migration_event.3000.t: "La proposta di un padre di famiglia"
tgp_tai_migration_event.3000.desc: "Uno straniero integro si avvicina alle mie sale con notevole sicurezza per formulare un'offerta amministrativa.\n\nDopo un saluto sorprendentemente sincero, diverso dai soliti modi rustici, e un racconto dettagliato del doloroso viaggio della sua famiglia verso le mie terre, giunge a una conclusione audace.\n\n«...briganti e predoni, ve lo dico, mio [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]. Ciò che mi resta dei miei averi saccheggiati è un talento provato, acuta percezione per sorvegliare, lealtà e una famiglia bisognosa del vostro aiuto. Io e il mio sangue saremo vostri servitori finché non ci giudicherete indegni.»"
tgp_tai_migration_event.3000.a: "Il tuo desiderio è concesso, purché tu sia leale."
tgp_tai_migration_event.3000.b: "Questo non mi sembra uno scambio equo."

# A family of lowborn peasant characters offer services
tgp_tai_migration_event.4000.t: "Una famiglia Tai"
tgp_tai_migration_event.4000.desc: "Le mie guardie conducono nella sala una famiglia indigente di stranieri provenienti dalle terre settentrionali.\n\nDopo una lunga sessione di suppliche, il capofamiglia mi guarda nell'anima e offre tutto ciò che non possiede per pulire i pavimenti del mio palazzo in cambio di rifugio sotto le mie possenti ali. A giudicare dalla sua storia, pare che molti della sua gente stiano affluendo nelle nostre terre, sperando in nuovi protettori."
tgp_tai_migration_event.4000.a: "Vi darò riparo in questi tempi nefasti."
tgp_tai_migration_event.4000.b: "La mia corte non ha alcun bisogno della tua famiglia."
