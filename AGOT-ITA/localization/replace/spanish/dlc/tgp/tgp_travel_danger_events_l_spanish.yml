l_spanish:
tgp_travel_danger_events.0001.t: "Vita tra le rovine"
tgp_travel_danger_events.0001.intro: "Viaggiando attraverso [ROOT.Char.GetCurrentLocation.GetName], vedo ovunque l'impatto [disaster_situation.GetType.GetNameNoTooltip|l]."
tgp_travel_danger_events.0001.flood: "Detriti disseminano la riva del fiume, case galleggiano lungo la corrente come foglie in un ruscello. Un intero villaggio è stato inghiottito dalla corrente furiosa."
tgp_travel_danger_events.0001.earthquake: "La terra un tempo fertile e il villaggio vivace giacciono silenziosi tra disordine e macerie, inghiottiti dalla terra stessa."
tgp_travel_danger_events.0001.desc: "\n\nQuando raggiungiamo i margini di una cittadina in rovina, scorgo [Select_CString(peasant_character_child.IsFemale,'una bambina solitaria','un bambino solitario')] tra le macerie. [Select_CString(peasant_character_child.IsFemale,'Lei','Lui')] non mi nota, mentre tenta disperatamente di ricostruire quella che sembra essere stata una fattoria."
tgp_travel_danger_events.0001.a: "I miei uomini sgombreranno le macerie."
tgp_travel_danger_events.0001.b: "[Select_CString(peasant_character_child.IsFemale,'La','Lo')] prenderò sotto la mia ala."
tgp_travel_danger_events.0001.c: "Non ho tempo per questo!"
impressed_by_kindness: "Impressionato dalla Gentilezza"
