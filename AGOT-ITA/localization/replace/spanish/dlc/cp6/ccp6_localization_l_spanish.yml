l_spanish:

 #St Peter's Basilica
 building_type_holy_site_st_peters_basilica_01: "$building_holy_site_st_peters_basilica_01$"
 building_type_holy_site_st_peters_basilica_01_desc: "$building_holy_site_st_peters_basilica_01_desc$"
building_holy_site_st_peters_basilica_01: "Basilica di San Pietro"
building_holy_site_st_peters_basilica_01_desc: "Costruita sul sito della tomba di San Pietro sul Colle Vaticano per ordine dell'imperatore Costantino I dopo la sua conversione al cristianesimo, la Basilica di San Pietro funge da centro della cristianità in Occidente. \n\nQuesta chiesa serve tradizionalmente da sede del Papa cattolico romano e nel corso dei secoli è cresciuta fino a diventare un vasto complesso, protetto dalle Mura Leonine."
 
 
 #Mont-Saint-Michel
building_type_mont_st_michel_01: "Mont-Saint-Michel"
 building_type_mont_st_michel_01_desc: "$building_mont_st_michel_01_desc$"
building_mont_st_michel_01: "Oratorio di Sant'Auberto dedicato a San Michele"
building_mont_st_michel_01_desc: "Nel 708, Sant'Auberto, vescovo di Avranches, vide in sogno una visione dell'Arcangelo Michele, che gli ordinava di costruire un oratorio su una vicina isola tidale. Dapprima Auberto ignorò la visione, attribuendola a un inganno del Diavolo. Alla fine l'Arcangelo riuscì a convincerlo — secondo la leggenda, praticandogli un foro nel cranio con un tocco — e il vescovo ordinò la costruzione di un nuovo santuario sul Mont Tombe. \n\nCosì ha inizio la storia di Mont-Saint-Michel."
building_mont_st_michel_02: "L'Abbazia Romanica di Mont-Saint-Michel"
building_mont_st_michel_02_desc: "La nuova chiesa dell'abbazia si trova sulla sommità dell'isola, come testimonianza del potere di Dio sopra ogni cosa in Cielo e in Terra, e dell'ingegno dell'umanità. \n\nSotto l'abbazia, un piccolo borgo di pellegrini e pescatori cresce lentamente."
building_mont_st_michel_03: "La Merveille"
building_mont_st_michel_03_desc: "L'abbazia è stata ampliata con una serie di chiostri, una cappellania, una cantina, la Sala dei Cavalieri e numerosi alloggi, formando un complesso gotico che può essere descritto solo come una meraviglia d'ingegneria. \n\nL'abbazia dispone di nuove e formidabili fortificazioni, e l'insediamento ai suoi piedi è ormai una vera città, che ospita molti pellegrini e abitanti del luogo."
building_mont_st_michel_04: "Monastero Fortificato di Mont-Saint-Michel"
building_mont_st_michel_04_desc: "Le guerre recenti hanno reso chiaro che persino un'isola di pace come Mont-Saint-Michel può essere un punto d'interesse strategico essenziale. Per questo, la rocca è stata fortificata a fondo con pesanti mura e bastioni, e sono stati creati diversi nuovi alloggi per la guarnigione. \n\nLa città costiera è ora vivace, con quasi tutta l'isola coperta di case."
 
 
 #Sanchi Stupa
 building_type_sanchi_stupa_01: "$building_sanchi_stupa_01$"
 building_type_sanchi_stupa_01_desc: "$building_sanchi_stupa_01_desc$"
building_sanchi_stupa_01: "Grande Stupa di Sanchi"
building_sanchi_stupa_01_desc: "Il Grande Stupa fu costruito dall'imperatore maurya Ashoka nel III secolo a.C., vicino al luogo del suo matrimonio con la moglie Devi. La grandiosa struttura che custodisce reliquie del Buddha è una delle più antiche del suo genere ed è celebre anche per i suoi portali torana finemente scolpiti."
 
 
 #Boudhanath
 building_type_boudhanath_01: "$building_boudhanath_01$"
 building_type_boudhanath_01_desc: "$building_boudhanath_01_desc$"
building_boudhanath_01: "Boudhanath"
building_boudhanath_01_desc: "Lo Stupa Boudha di Kathmandu, noto anche come Jarung Kashor e Khāsa Chaitya, è uno dei più grandi stupa del buddhismo e potrebbe essere il luogo d'origine di ciò che divenne il ramo tibetano del buddhismo. La sua enorme cupola e il suo mandala custodiscono i resti di molti buddha e innumerevoli reliquie sacre di varie forme. \n\nPoiché si trova su un'antica via commerciale tra Nepal e Tibet, viaggiatori e mercanti vi si fermano spesso per riposare e pregare."
 
 
 #Grand Mosque of Yazd
 building_type_yazd_mosque_01: "$building_yazd_mosque_01$"
 building_type_yazd_mosque_01_desc: "$building_yazd_mosque_01_desc$"
building_yazd_mosque_01: "Grande Moschea di Yazd"
building_yazd_mosque_01_desc: "Costruito sul sito di un Tempio del Fuoco del IV secolo, questo illustre edificio stupisce viaggiatori e pellegrini con i suoi grandi iwan, la cupola piastrellata e il maestoso portale d'ingresso affiancato da una coppia di minareti altissimi."
 
 
 #Qutb Minar
 building_type_qutb_minar_01: "$building_qutb_minar_01$"
 building_type_qutb_minar_01_desc: "$building_qutb_minar_01_desc$"
building_qutb_minar_01: "Pilastro di Ferro di Delhi"
building_qutb_minar_01_desc: "Il possente Pilastro di Ferro di Delhi si erge a simbolo della gloria del re Chandragupta II, benché anche sovrani successivi vi abbiano inciso i propri nomi. Nonostante sia rimasto in piedi per lungo tempo, non mostra traccia di ruggine: una testimonianza dell'abilità dei fabbri indiani!"
building_qutb_minar_02: "Qutb Minar"
building_qutb_minar_02_desc: "La Quwwat-ul-Islam, una grande moschea che circonda l'antico sito del Pilastro di Ferro di Delhi, è coronata da un minareto davvero enorme chiamato Qutb Minar. \n\nUn magnifico monumento al potere dei sovrani di Delhi."
building_qutb_minar_03: "Moschea Quwwat-ul-Islam Ampliata"
building_qutb_minar_03_desc: "Il complesso attorno al Qutb Minar è stato ampliato con vari altri cortili, portali e mausolei, raggiungendo proporzioni leggendarie."
building_qutb_minar_04: "Alai Minar"
building_qutb_minar_04_desc: "Un secondo minareto è stato aggiunto al complesso, progettato a immagine del Qutb Minar ma grande il doppio. Questo colosso che domina Delhi è il vertice dell'architettura indo-islamica."
