l_spanish:

 #Goguryeo Tomb
 building_type_goguryeo_tomb_01: "$building_goguryeo_tomb_01$"
 building_type_goguryeo_tomb_01_desc: "$building_goguryeo_tomb_01_desc$"
building_goguryeo_tomb_01: "Tomba di un Re di Goguryeo"
building_goguryeo_tomb_01_desc: "Si dice che questa grande tomba rettangolare di pietra squadrata appartenga a un antico re di Goguryeo, benché il ricordo del suo nome sia ormai perduto. I corridoi che conducono alla tomba sono dipinti con affreschi colorati, e in cima alla piramide si erge un piccolo padiglione di legno in onore del sepolto."
 #Great Buddha of Kamakura
 building_type_buddha_kamakura_01: "$building_buddha_kamakura_01$"
 building_type_buddha_kamakura_01_desc: "$building_buddha_kamakura_01_desc$"
building_buddha_kamakura_01: "Grande Buddha di Kamakura"
building_buddha_kamakura_01_desc: "Il #italic Daibutsu#! di Kamakura è una venerabile statua bronzea del Buddha Amitābha, pesante diverse tonnellate e decorata con dettagli dorati. È racchiusa da una grande sala ispirata ai templi del sud-ovest e circondata da trentadue petali di loto."
 #Lingapura Pyramid
 building_type_pyramid_lingapura_01: "$building_pyramid_lingapura_01$"
 building_type_pyramid_lingapura_01_desc: "$building_pyramid_lingapura_01_desc$"
building_pyramid_lingapura_01: "Piramide di Lingapura"
building_pyramid_lingapura_01_desc: "Questa grande piramide a gradoni sorge dalla giungla come una montagna sacra, e ciascuna delle sue sette terrazze ospita santuari e altari sempre più ornati. Il santuario superiore corona la struttura e custodisce al suo interno il sacro #italic lingam#! di Shiva, centro di un complesso piano assiale di disegno religioso."
 #Maijishan Grottoes
 building_type_maijishan_grottoes_01: "$building_maijishan_grottoes_01$"
 building_type_maijishan_grottoes_01_desc: "$building_maijishan_grottoes_01_desc$"
building_maijishan_grottoes_01: "Grotte di Maijishan"
building_maijishan_grottoes_01_desc: "Il monte Maijishan è da lungo tempo un luogo di venerazione, e lungo le sue rupi meridionali, considerate geomanticamente propizie, centinaia di santuari sono stati scavati nella roccia rossastra, custodendo statue e affreschi colorati di sereni Buddha e bodhisattva. Molti sono stati commissionati dalle famiglie urbane vicine, per le quali il sito è un occasionale luogo di pellegrinaggio e meditativa contemplazione."
 #Three Pagodas of Dali
 building_type_three_pagodas_dali_01: "$building_three_pagodas_dali_01$"
 building_type_three_pagodas_dali_01_desc: "$building_three_pagodas_dali_01_desc$"
building_three_pagodas_dali_01: "Tre Pagode di Dali"
building_three_pagodas_dali_01_desc: "Dal vasto complesso templare della famiglia regnante della città si ergono tre alte pagode di mura in mattoni e piedistalli di pietra. Esse formano le estremità di un triangolo isoscele, segnando la geometria sacra del sito e incorniciando le montagne e il lago circostanti."
 #Iron Lion of Cangzhou
 building_type_iron_lion_cangzhou_01: "$building_iron_lion_cangzhou_01$"
 building_type_iron_lion_cangzhou_01_desc: "$building_iron_lion_cangzhou_01_desc$"
building_iron_lion_cangzhou_01: "Leone di Ferro di Cangzhou"
building_iron_lion_cangzhou_01_desc: "Il leone monumentale è la più grande scultura in ghisa di tutta la Cina e sul suo forte dorso sorregge un bodhisattva dolcemente seduto su un piedistallo di loto e riccamente decorato con dettagli dorati. Posto vicino alla pianura soggetta alle inondazioni, è divenuto noto tra gli abitanti del luogo come guardiano contro le maree crescenti."
 #Gaocheng Observatory
 building_type_dengfeng_observatory_01: "$building_dengfeng_observatory_01$"
 building_type_dengfeng_observatory_01_desc: "$building_dengfeng_observatory_01_desc$"
building_dengfeng_observatory_01: "Osservatorio di Gaocheng"
building_dengfeng_observatory_01_desc: "Questo sito è stato favorito per l'osservazione astronomica per secoli, grazie alle sue qualità geomantiche e alla sua centralità geografica simbolica all'interno della Cina. La struttura attuale, di complessa forma trapezoidale, serve da vasto quadrante solare, con l'alta regola centrale che proietta la propria ombra nella trincea che divide la piattaforma e segna il passaggio del sole."
 #Candi of Muara Takus
 building_type_muara_takus_01: "$building_muara_takus_01$"
 building_type_muara_takus_01_desc: "$building_muara_takus_01_desc$"
building_muara_takus_01: "Candi di Muara Takus"
building_muara_takus_01_desc: "Molte strutture compongono il complesso templare, tutte costruite in mattoni e ornate da dettagli in arenaria. Al centro sorgono i grandi stupa di #italic Mahligai#! e #italic Tuo#!: il primo alto e slanciato, il secondo vasto come una montagna, torreggiante sui santuari e sulle terrazze minori che li circondano."
 #Stone Pagoda of Mireuksa
 building_type_stone_pagoda_01: "$building_stone_pagoda_01$"
 building_type_stone_pagoda_01_desc: "$building_stone_pagoda_01_desc$"
building_stone_pagoda_01: "Pagoda di Pietra di Mireuksa"
building_stone_pagoda_01_desc: "Una pagoda di nove piani che si erge su un ampio piedistallo di pietra, con la sua chiara muratura che risplende sotto il cielo illuminato dal sole. È la prima delle pagode di pietra della Corea, e la sua forma e le sue proporzioni equilibrate l'hanno resa un modello per i costruttori di templi in tutta la penisola."
 #Thuriang Kilns
 building_type_thuriang_kilns_01: "$building_thuriang_kilns_01$"
 building_type_thuriang_kilns_01_desc: "$building_thuriang_kilns_01_desc$"
building_thuriang_kilns_01: "Fornaci di Thuriang"
building_thuriang_kilns_01_desc: "Oltre duecento grandi fornaci coprono il sito, il più grande centro di produzione di celadon della regione. Le ceramiche qui cotte sono note per la loro consistenza grezza e dura e per la caratteristica invetriatura giallo-verde, e sono commerciate in tutti i mercati del Sud-est asiatico."
 #Yuelu Academy
 building_type_yuelu_academy_01: "$building_yuelu_academy_01$"
 building_type_yuelu_academy_01_desc: "$building_yuelu_academy_01_desc$"
building_yuelu_academy_01: "Accademia Yuelu"
building_yuelu_academy_01_desc: "Una delle più prestigiose accademie del sapere in Cina, Yuelu è da lungo tempo un centro di studio ed esame. La sua disposizione è incentrata su un cortile principale, dal quale si estendono in equilibrata simmetria sale e padiglioni secondari, dove generazioni di studiosi si sono preparate al servizio civile."
 #Chocolate Hills #NOTE: today are called "Chocolate" Hills, but of course chocolate didn't exist in the Philippines back then. This is a random name I thought out, but it is not based on native names (none of which seem to have survived from then)
 building_type_chocolate_hills_01: "$building_chocolate_hills_01$"
 building_type_chocolate_hills_01_desc: "$building_chocolate_hills_01_desc$"
building_chocolate_hills_01: "Pendii Fulvi"
building_chocolate_hills_01_desc: "Questa formazione geologica è caratterizzata da un gran numero di colline arrotondate e coniche che si estendono uniformemente attraverso il paesaggio. Sono ricoperte da uno strato d'erba che, durante la stagione secca, assume una vivida tonalità bruna e arancione, conferendo al terreno un insolito arrossamento autunnale."
 #Fanfang of Guangzhou
 building_type_fanfang_guangzhou_01: "$building_fanfang_guangzhou_01$"
 building_type_fanfang_guangzhou_01_desc: "$building_fanfang_guangzhou_01_desc$"
building_fanfang_guangzhou_01: "Fanfang di Guangzhou"
building_fanfang_guangzhou_01_desc: "Il #italic Fanfang#! è un'importante comunità di mercanti stranieri — soprattutto arabi musulmani e persiani giunti qui attraverso le rotte commerciali marittime — a cui è stato concesso un quartiere proprio a ovest della città, con funzionari e consuetudini proprie. Al suo centro sorge una moschea dalle pareti rosse, coronata da un alto minareto e faro, che guida navi e anime verso la sicurezza del porto."
 #Wilwatikta Palace
 building_type_wilwatikta_palace_01: "$building_wilwatikta_palace_01$"
 building_type_wilwatikta_palace_01_desc: "$building_wilwatikta_palace_01_desc$"
building_wilwatikta_palace_01: "Palazzo di Wilwatikta"
building_wilwatikta_palace_01_desc: "Un vasto complesso palaziale di padiglioni, sale, templi e cortili, il Wilwatikta è abbastanza esteso da somigliare a una città a sé. Mura rettangolari di mattoni cingono i terreni, e l'ingresso al viale processionale è segnato da una serie di torreggianti porte #italic Paduraksa#!."
 #Ha Long Bay
 building_type_ha_long_bay_01: "$building_ha_long_bay_01$"
 building_type_ha_long_bay_01_desc: "$building_ha_long_bay_01_desc$"
building_ha_long_bay_01: "Baia di Ha Long"
building_ha_long_bay_01_desc: "Questo stupefacente paesaggio di isolotti carsici e calcarei emerge dalle calme acque smeraldine del golfo, dove i pescatori locali vanno alla deriva in cerca di pescato sotto l'ombra dei pilastri."
 #My Son Sanctuary
 building_type_my_son_sanctuary_01: "$building_my_son_sanctuary_01$"
 building_type_my_son_sanctuary_01_desc: "$building_my_son_sanctuary_01_desc$"
building_my_son_sanctuary_01: "Santuario di My Son"
building_my_son_sanctuary_01_desc: "Il più grande e raffinato dei complessi templari cham, il santuario è composto da una serie di recinti disseminati l'uno vicino all'altro nel territorio boscoso, ciascuno con i propri portali, santuari e stupa. Le strutture sono tutte costruite in mattoni rossi, disposte secondo motivi geometrici e decorate con architravi in arenaria."
 #Gunung Api
 building_type_gunung_api_01: "$building_gunung_api_01$"
 building_type_gunung_api_01_desc: "$building_gunung_api_01_desc$"
building_gunung_api_01: "Gunung Api"
building_gunung_api_01_desc: "Questa montagna che si innalza dalla selva della giungla è sacra alla popolazione locale. Tra l'umidità e la nebbia, i suoi pendii sono coperti da sorprendenti pinnacoli calcarei e profonde caverne scavate dall'acqua nel corso di innumerevoli ere."
 #Sulawesi Megaliths
 building_type_suwalesi_megaliths_01: "$building_suwalesi_megaliths_01$"
 building_type_suwalesi_megaliths_01_desc: "$building_suwalesi_megaliths_01_desc$"
building_suwalesi_megaliths_01: "Megaliti di Sulawesi"
building_suwalesi_megaliths_01_desc: "Sparse nelle valli di Sulawesi Centrale giacciono molte figure e icone megalitiche erette dalla popolazione locale per i rituali e per onorare gli spiriti. Queste effigi, note come #italic arcas#!, sono scolpite con precisione minimalista, le loro forme tracciate con linee sottili ed eleganti."
 #Izumo Taisha
 building_type_izumo_taisha_01: "$building_izumo_taisha_01$"
 building_type_izumo_taisha_01_desc: "$building_izumo_taisha_01_desc$"
building_izumo_taisha_01: "Kizuki Taisha"
building_izumo_taisha_01_desc: "Questo grande santuario shintoista — un #italic taisha#! — è stato costruito vicino alla riva, rivolto al mare. Si erge su una serie di enormi pilastri di legno e grossi tronchi, sollevando le sue sale al di sopra del suolo dove camminano i mortali, e verso il cielo dove dimorano gli dèi e gli spiriti della terra."
 #Temple of Confucius
 building_type_confucius_temple_01: "$building_confucius_temple_01$"
 building_type_confucius_temple_01_desc: "$building_confucius_temple_01_desc$"
building_confucius_temple_01: "Tempio di Confucio"
building_confucius_temple_01_desc: "Il più antico e influente di tutti i templi confuciani, questo vasto complesso di sale e cortili è stato modello di riferimento e fonte d'ispirazione per i costruttori di templi in tutta la Cina e oltre, con la sua armoniosa disposizione geometrica e i suoi dettagli raffinati. Nei pressi si trova una quieta foresta dove riposano le tombe di Confucio e dei suoi discendenti, formando un importante luogo di pellegrinaggio per i devoti."
 #Imperial Citadel of Lin'an
 building_type_citadel_linan_01: "$building_citadel_linan_01$"
 building_type_citadel_linan_01_desc: "$building_citadel_linan_01_desc$"
building_citadel_linan_01: "Cittadella Imperiale di Lin'an"
building_citadel_linan_01_desc: "Costruita lungo i pendii settentrionali del Colle della Fenice, la cittadella imperiale funge da sede della corte e della sua amministrazione, ospitando innumerevoli studiosi e funzionari nelle sue immense sale e nei suoi corridoi cavernosi. Pur non essendo vasta quanto i palazzi delle capitali settentrionali, la raffinatezza e l'eleganza dei suoi giardini terrazzati e dei suoi padiglioni li eguagliano ampiamente."
 #The Temples of Angkor
 building_type_temples_angkor_01: "$building_temples_angkor_01$"
 building_type_temples_angkor_01_desc: "$building_temples_angkor_01_desc$"
building_temples_angkor_01: "Templi di Angkor"
building_temples_angkor_01_desc: "Nella prospera città di Indra, i tetti dorati e i pinnacoli dei suoi templi sono innumerevoli, ciascuno decorato più sontuosamente dell'altro con rilievi scolpiti e statue di divinità e devaraja."
building_temples_angkor_02: "Angkor Wat"
building_temples_angkor_02_desc: "Angkor Wat è un immenso complesso templare dedicato alla divinità Vishnu. È concepito come una rappresentazione del Monte Meru, dimora degli dèi nella mitologia induista. Il complesso è circondato da un imponente fossato e possiede diversi templi a gallerie, traboccanti di arte religiosa, sculture e rilievi."
