l_spanish:
elder_events.1000.t: "Un tempo mi conoscevi"
elder_events.1000.desc: "«[confusion_target.GetFirstName], mi[confusion_target.Custom('DE_END_ADJ_NUL_S_N')] car[confusion_target.Custom('DE_END_ADJ_NUL_S_N')] [elder.Custom2('RelationToMeShort', SCOPE.sC('confusion_target'))] — è bello vederti!» [Select_CString(elder.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] [elder.GetFirstName] mi guarda negli occhi, con un lampo d'incertezza dietro il suo sorriso. «Sei sempre stat[Select_CString(confusion_target.IsFemale,'a','o')] [confusion_target.Custom('ComplimentAdjective')]. Per questo amo te più di tutti.»\n\nNella sua [GetTrait('withering_mind').GetName( GetNullCharacter )], oggi sono [Select_CString(confusion_target.IsFemale,'mia','mio')] [confusion_target.Custom('SisterBrother')]...\n\nDomani, potrei essere un estraneo."
elder_events.1000.a: "Ti prego, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('elder'))] — sono [ROOT.Char.GetFirstNameNoTooltip]!"
elder_events.1000.b: "Che... sì, è bello vedere anche te..."
elder_events.1100.t: "La scalinata verso..."
elder_events.1100.desc: "Ho salito queste scale tante volte. Perché, allora, oggi mi sembra di scalare le montagne di [mountain_reference.GetName]?\n\nLe gambe mi tremano. Le ginocchia mi cedono. Non c'è nulla a fermare la mia caduta.\n\nRotolo verso il fondo."
elder_events.1100.a: "Aaargh!"
elder_events.1100.bodyguard: "Aiuto! Salvatemi!"
EVENT_WINDOW_OPTION_AVAILABLE_BODYGUARD: "Questa opzione è disponibile perché hai un [GetCourtPositionType('bodyguard_court_position').GetName()]"
EVENT_WINDOW_OPTION_AVAILABLE_TUTOR: "Questa opzione è disponibile perché hai un [GetCourtPositionType('court_tutor_court_position').GetName()]"
partially_mute_modifier: "Parzialmente Muto"
partially_mute_modifier_desc: "Questo personaggio ha grandi difficoltà a parlare a causa di malanni legati all'età."
elder_events.1200.t: "Intorpidimento"
elder_events.1200.desc: "Colpisce senza preavviso. Il lato sinistro del mio corpo si intorpidisce. Provo a sorridere, ma le mie labbra non si muovono.\n\nProvo a parlare. Non ci riesco.\n\nAlla fine, la voce ritorna. Ma la paura di [ROOT.Char.GetFaith.NegativeAfterLife] rimane."
elder_events.1200.a: "..."
elder_events.1300.t: "Lezioni disimparate"
elder_events.1300.desc: "Ho letto questi rotoli su [ROOT.Char.Custom('education_scroll_subject')]? Io... non riesco a ricordare. Forse sì?\n\nDi certo facevano parte dei miei studi, della mia istruzione...\n\nSì. La mia... istruzione..."
elder_events.1300.a: "Non può essere stato così importante..."
elder_events.1300.tutor: "Ho bisogno di aiuto per ricordare."
elder_events.1400.t: "Una bella rotolata"
elder_events.1400.desc: "«Vieni a letto, mi[ROOT.Char.Custom('DE_END_ADJ_NUL_S_N')] [ROOT.Char.Custom('RomanticComplimentAdjective')] [ROOT.Char.Custom('RaunchyComplimentNoun')]», [Select_CString(lover.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('lover'))] [lover.GetFirstName] [lover.Custom('PurrGrowl')], con gli occhi ardenti di lussuria. «Non sei almeno un po' curios[ROOT.Char.Custom('DE_END_ADJ_NUL_S_N')] di sapere cosa ha imparato il tuo [lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]?»\n\nCon un sorriso malizioso, [Select_CString(lover.IsFemale,'lei','lui')] si morde il labbro e sprofonda tra le lenzuola.\n\n«Prendimi. Ora.»"
elder_events.1400.a: "Mille cavalli non potrebbero fermarmi!"
elder_events.1400.b: "[ROOT.Char.GetFaith.HighGodName] mi salvi da quest[lover.Custom('DE_PRO_PER_S_3P_N')] [lover.GetWomanMan]."
death_best_sex_of_their_life: "ha subito un attacco di cuore mentre faceva il miglior sesso della sua vita"
purrs: "fa le fusa"
growls: "ringhia"
raunchy_little: "piccolo"
raunchy_sweet: "dolce"
raunchy_pretty: "grazioso"
raunchy_bold: "audace"
raunchy_wild: "selvaggio"
raunchy_fiery: "ardente"
raunchy_young: "giovane"
raunchy_eager: "bramoso"
elder_events.1500.t: "Una rotolata da morire"
elder_events.1500.desc: "«Un tempo mi chiamavano "[lover.Custom('GetRaunchyPrefix')] [lover.Custom('RaunchyComplimentNoun')]"», [Select_CString(lover.IsFemale,'mia','mio')] [lover.GetWifeHusband] [lover.GetFirstName] sospira, con un debole sorriso sulle labbra. «Ora riesco a malapena a salire le scale senza restare senza fiato...»\n\nCon il mio vigore giovanile, potrei aiutarl[Select_CString(lover.IsFemale,'a','o')] a ricordare che cosa significhi sentirsi desiderat[Select_CString(lover.IsFemale,'a','o')].\n\nMa... il suo [GetTrait('faltering_heart').GetName( GetNullCharacter )] potrebbe reggerlo?"
elder_events.1500.a: "Le darò la rotolata della sua vita!"
elder_events.1500.b: "Meglio di no."
elder_events.1600.t: "Non si sfugge al tempo"
elder_events.1600.desc: "Corro. Devo fermarmi. Già senza fiato.\nUn tempo correvo in cerchio attorno [ROOT.Char.Custom('ResidenceBuilding')]...\n\nRicomincio. Quasi cado. Mi fermo, di nuovo.\n\nMaledetto questo corpo fragile."
elder_events.1600.a: "I miei giorni da corridore sono finiti."
elder_events.1600.b: "#EMP Devo#! spingermi oltre il dolore."
