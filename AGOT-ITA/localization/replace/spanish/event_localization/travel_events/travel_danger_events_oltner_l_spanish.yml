l_spanish:
 travel_danger_events.9000.t:1 "$travel_danger_prefix$ Un Flagello Ronzante"
 travel_danger_events.9000.desc:0 "I/gli/le [location.Custom('GetTerrainTypePlural')] di [location.GetName] #EMP brulicano#! di piccoli insetti neri e succhiasangue. Non importa cosa facciamo o dove andiamo, loro sono lì, a succhiare il nostro sangue,  — come una nube malefica inviata dal [ROOT.Char.GetFaith.DevilName] in persona!\n\nNon solo i cavalli stanno diventando irascibili, ma anche il mio seguito... Soprattutto ([mosquito_victim.Custom('DE_ART_DEF_P_A')]) mi[mosquito_victim.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('mosquito_victim'))] [mosquito_victim.GetFirstName], che agita furiosamente le braccia ricoperte di sangue."
 travel_danger_events.9000.deviant:0 "#EMP Fantastico!#! Spogliamoci tutti!"
 travel_danger_events.9000.herbalist:0 "Penso che questa pianta potrebbe aiutarci..."
 travel_danger_events.9000.a:0 "Continuate a muovervi! Sono solo #EMP insetti!#!"
 travel_danger_events.9000.b:0 "[mosquito_victim.GetFirstNameNoTooltip]! Spogliati, camminerai davanti."
 drained_by_mosquitoes_modifier:0 "Prosciugato dalle zanzare"
 drained_by_mosquitoes_modifier_desc:0 "Questo personaggio è stato assalito da uno sciame di insetti succhiasangue, che hanno succhiato una quantità significativa del suo sangue."
 
 travel_danger_events.9010.t:1 "$travel_danger_prefix$ Ostacolo sul Cammino"
 travel_danger_events.9010.desc:0 ""[location.Custom('GetRandomRegionalDanger')|U]!" Sento [irritated_character.GetFirstName] gridare in preda al panico. Poco dopo, sento uno scricchiolio. Se non è il legno a cedere, è la mia pazienza.\n\nEsco dalla [location.Custom('GetProvinceGroundDesc')] per vedere i resti frantumati di una ruota del carro... Del #EMP mio#! carro!\n\n"Mi dispiace, [irritated_character.Custom2('RelationToMeShort', SCOPE.sC('root_scope'))]. Era il mio turno di guidare, ma mi sono addormentato...""
 travel_danger_events.9010.strong:0 "#EMP *Sospiro mentre sollevo il carro da terra*#!"
 travel_danger_events.9010.a:0 "[root_scope.Custom('CulturalCurse')|U]... Faremo tardi."
 travel_danger_events.9010.b:0 "Distribuite le provviste, d'ora in poi sarò brusco..."
 
 travel_danger_events.9020.t:1 "$travel_danger_prefix$ Emaciazione Emergente"
 travel_danger_events.9020.desc.first:0 ""Noi... Noi siamo #EMP completamente#! a corto di [ROOT.Char.Custom('GetExpensiveDessert')]!"Balbetta nervosamente ([mosquito_victim.Custom('DE_ART_DEF_P_A')]) mi[mosquito_victim.Custom('DE_END_PRO_S_N')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('emaciated_character'))]. "E senza [ROOT.Char.Custom('GetExpensiveMeal')], [ROOT.Char.Custom('GetExpensiveMealAlt')],  [ROOT.Char.Custom('GetLocalStreetFoodPlural')], e perfino senza #EMP [ROOT.Char.Custom('get_region_root_vegetable_plural')]!#!"\n\n"
 travel_danger_events.9020.desc.war:0 ""I soldati in cerca di cibo hanno preso tutto nella notte! Non ci è rimasta nemmeno #EMP una briciola!#!" grida [emaciated_character.GetSheHe]. "Moriremo di Fame!""
 travel_danger_events.9020.desc.other:0 ""Avremmo dovuto caricare più cibo. Non ci è rimasta nemmeno una briciola, e non c'è nulla da mangiare a perdita d'occhio!!" grida [emaciated_character.GetSheHe]. "Moriremo di Fame!""
 travel_danger_events.9020.desc.last:0 "\n\nForse ieri non avrei dovuto mangiare quella tripla porzione di [ROOT.Char.Custom('GetExpensiveMeal')] con salsa?"
 travel_danger_events.9020.desc.last.alt:0 "\n\nMa... ho mangiato come un uccellino, come può essere giusto?"
 travel_danger_events.9020.a:0 "Se solo potessimo nutrirci di parole..."
 travel_danger_events.9020.b:0 "Quel poco che ci resta è #EMP mio!#!"
 travel_danger_events.9020.hunter:0 "Ci deve essere della selvaggina da qualche parte!"
 travel_danger_events.9020.cannibal:0 "O [emaciated_character.GetFirstNameNoTooltip], daresti la tua vita per [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]?"
 emaciated_modifier:0 "Emaciato"
 emaciated_modifier_desc:0 "Questo personaggio ha viaggiato a lungo senza cibo."
 cannibalicus_maximus:0 "Se non siete già Cannibali, Tu e tutti i membri del tuo seguito riceverete il [secret|E] Cannibali"
 
travel_danger_events.9030.t: "$travel_danger_prefix$ Bloccati nel Fango"
travel_danger_events.9030.desc: "La pioggia di oggi non è forte, ma è persistente: la strada davanti a noi si sta trasformando in fango denso. I carri affondano, e la nebbia rende difficile vedere.\n\nNon andremo da nessuna parte per un po'."
travel_danger_events.9030.caravan_master: "Il mio [GetCourtPositionType('travel_leader_court_position').GetNameNoTooltip()] può gestire un po' di fango."
travel_danger_events.9030.a: "Maledetto questo tempo."
EVENT_WINDOW_OPTION_AVAILABLE_CARAVAN_MASTER: "Questa opzione è disponibile grazie al tuo [GetCourtPositionType('travel_leader_court_position').GetName()]"
 
travel_danger_events.9040.t: "$travel_danger_prefix$ Tempesta di Pioggia"
travel_danger_events.9040.desc: "Non vedo nulla: la pioggia è troppo fitta. Siamo fradici fino alle ossa, e ogni tuono manda i cavalli nel panico.\n\nPoi mi rendo conto di qualcosa di terribile...\n\nDov'è [Select_CString(victim.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))], [victim.GetFirstName]?"
travel_danger_events.9040.caravan_master: "[travel_leader.GetFirstNameNoTooltip], trova [Select_CString(victim.IsFemale,'lei','lui')]!"
travel_danger_events.9040.a: "Che [ROOT.Char.GetFaith.HighGodName] abbia pietà di [victim.GetFirstNameNoTooltip]."
low_aptitude_caravan_master_reason_tooltip: "L'[aptitude|E] di [travel_leader.GetFirstNamePossessive|U] come [GetCourtPositionType('travel_leader_court_position').GetName()] è solo [travel_leader.GetCourtPositionAptitude( GetCourtPositionType( 'travel_leader_court_position' ) )]"
 
travel_danger_events.9050.t: "$travel_danger_prefix$ Mente Errante"
travel_danger_events.9050.desc: "Viaggiare con [Select_CString(victim.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))], [victim.GetFirstName], è diventato una sfida: il [GetTrait('withering_mind').GetName( GetNullCharacter )] di [Select_CString(victim.IsFemale,'lei','lui')] si affievolisce sempre più di giorno in giorno.\n\nContinuo a dover ricordare a [Select_CString(victim.IsFemale,'lei','lui')]: #EMP «Siamo diretti a [ROOT.Char.GetTravelPlan.GetData.GetFinalDestination.GetProvince.GetName]! Il [ROOT.Char.GetTravelPlan.GetData.GetActivity.GetShortName], ricordi?»#! Ma non resta mai impresso.\n\nE ora il vecchio sciocco se n'è andato, e non si trova da nessuna parte..."
travel_danger_events.9050.caravan_master: "Il mio Maestro della Carovana [travel_leader.GetFirstNameNoTooltip] può trovare [Select_CString(victim.IsFemale,'lei','lui')]."
travel_danger_events.9050.a: "[victim.GetFirstNameNoTooltip] si è perdut[Select_CString(victim.IsFemale,'a','o')], dobbiamo andare."
travel_danger_events.9050.b: "Fermi! Dobbiamo cercare [victim.GetFirstNameNoTooltip]."
death_lost: "si allontanò e non fu mai più vist[Select_CString(CHARACTER.IsFemale,'a','o')]"
9050_lost: "[victim.GetFirstName] si è perdut[Select_CString(victim.IsFemale,'a','o')] per sempre"
9050_found: "[victim.GetFirstName] è scoss[Select_CString(victim.IsFemale,'a','o')], ma ritrovat[Select_CString(victim.IsFemale,'a','o')]"
 
travel_danger_events.9060.t: "$travel_danger_prefix$ Passeggero Fragile"
travel_danger_events.9060.desc: "«Ahi, ahi! Fermate la carrozza, vi supplico!» grida al cocchiere [Select_CString(victim.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] [victim.GetFirstName]. «Il mio [elder_trait.GetName(GetNullCharacter)] non sopporta più sobbalzi, pietre e scossoni!»\n\nLe strade dissestate di [location.GetName] stanno logorando il fragile corpo di [Select_CString(victim.IsFemale,'lei','lui')].\n\nForse dovremmo rallentare il passo, almeno un poco."
travel_danger_events.9060.sadistic: "#EMP ...dobbiamo andare più veloci.#!"
travel_danger_events.9060.a: "Non ci fermeremo."
travel_danger_events.9060.b: "Dobbiamo considerare il benessere di [victim.GetFirstNamePossessiveNoTooltip]."
traveling_slowly_modifier: "Viaggio Dolorosamente Lento"
traveling_slowly_modifier_desc: "Questo seguito sta viaggiando molto lentamente, diventando un facile bersaglio per i briganti."
9060_wounded: "[victim.GetFirstName] è ferit[Select_CString(victim.IsFemale,'a','o')]"
