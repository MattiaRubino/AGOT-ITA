l_spanish:

 #Lessons of the heart
intrigue_events_bjorn.5100.t: "Lezioni del cuore"
intrigue_events_bjorn.5100.desc: "Osservando [the_lover.GetFirstName], mi[the_lover.Custom('DE_END_ADJ_NUL_S_N')] amat[the_lover.Custom('DE_END_ADJ_NUL_S_N')], mi rendo conto che potrei imparare molto da una persona così meravigliosa. La sua mente è come un tesoro da depredare; e anch'io ho una o due cose da insegnare a [the_lover.GetFirstName].\n\nSenza contare che è un modo così delizioso di trascorrere il nostro tempo insieme!"
intrigue_events_bjorn.5100.a: "Il mio amore ha così tanto da insegnarmi."
intrigue_events_bjorn.5100.b: "[Select_CString(the_lover.IsFemale,'Lei','Lui')] sarà [Select_CString(the_lover.IsFemale,'un'allieva meravigliosa','un allievo meraviglioso')]."
intrigue_events_bjorn.5100.c: "Mi basta trascorrere del tempo insieme."
 
 #shared interests
intrigue_events_bjorn.5101.t: "Interessi condivisi"
intrigue_events_bjorn.5101.desc: "[the_lover.GetFirstName] mi intriga così tanto! Voglio godere di ciò che dà gioia [Select_CString(the_lover.IsFemale,'a lei','a lui')].\n\nOh, trascorrere giorni beati insieme:\n\nMani che lavorano all'unisono, menti rivolte a interessi condivisi.\n\nI nostri cuori che battono come uno solo."
intrigue_events_bjorn.5101.a: "Mostrami ciò che infiamma le tue passioni, dolcezza mia."
intrigue_events_bjorn.5101.b: "Vieni, condividi questa gioia con me."
intrigue_events_bjorn.5101.c: "E se imparassimo qualcosa di nuovo insieme?"
  
 #Dark depths of the soul
intrigue_events_bjorn.5102.t: "Amare l'ombra"
intrigue_events_bjorn.5102.desc: "Man mano che ci avviciniamo, ora ci troviamo su una soglia. Forse è tempo di condividere davvero ogni cosa l'uno con l'altra, così da sapere tutto ciò che c'è da sapere. Condividere cose che di solito... non si condividono.\n\nOltre questo punto non vi è ritorno, ma [the_lover.GetFirstName] accetterà tutto ciò che c'è da sapere su di me?"
intrigue_events_bjorn.5102.a: "Ho simili cose da mostrarti."
intrigue_events_bjorn.5102.b: "Dimmi ciò che non hai condiviso con nessun altro."
intrigue_events_bjorn.5102.c: "Esploriamo le nostre fantasie più oscure."
intrigue_events_bjorn.5102.d: "No! Alcune cose non dovrebbero mai venire alla luce."
