l_spanish:

 internal_affairs.10.t: "Una Rivolta in Vista"
internal_affairs.10.desc: ""E questa è la situazione attuale nella [barony_title.GetName], [ROOT.Char.Custom('FormOfAddressForLiege')]." mi informa [provider_character.GetFirstName]. Pare che ultimamente ci siano state piccole sommosse nelle strade, nate dall’indignazione per "
 internal_affairs.10.desc.control: "della diffusa indignazione per il banditismo dilagante che mette in pericolo i cittadini."
 internal_affairs.10.desc.opinion.other: "dell'odio che i cittadini nutrono per [county_holder.Custom('DE_ART_DEF_P_A')] loro Signor[county_holder.Custom('DE_END_ADJ_IND_S_A')], [county_holder.Custom('IT_NAM_COL3')][county_holder.GetTitledFirstName]."
 internal_affairs.10.desc.opinion.me: "del mio governo sulla regione."
 internal.affairs.10.desc.outro: "\n\nL'unica persona che è riuscita a evitare che le violenze andassero del tutto fuori controllo è stat[barony_holder.Custom('DE_END_PRO_S_N')] [barony_holder.Custom('IT_NAM_COL3')][barony_holder.GetTitledFirstName], che a quanto pare è piuttosto popolare tra i locali. Oltre a tenere sotto controllo i cittadini, [barony_holder.GetSheHe] ha inviato una richiesta per organizzare una festa nella zona, per calmare ulteriormente le acque."
 internal_affairs.10.a: "Allora lasciamo che sia [barony_holder.Custom('IT_NAM_COL3')][barony_holder.GetTitledFirstNameNoTooltip] a occuparsene..."
 internal_affairs.10.b: "...[county_holder.Custom('IT_NAM_COL3')][county_holder.GetFirstNameNoTooltip] verrà addirittura risarcito per questo!"
 internal_affairs.10.c: "[barony_holder.GetSheHe|U] potrà tenere la sua festa."
 internal_affairs.10.d: "Non dovrebbe essere [county_holder.Custom('IT_NAM_COL3')][county_holder.GetFirstNameNoTooltip] a occuparsi di questo?"

 internal_affairs_local_uprising_appeasement_modifier: "Gli Abitanti Locali Sono Soddisfatti"
 internal_affairs_local_uprising_appeasement_modifier_desc: "Gli abitanti della contea sono stati placati dopo il cambio di governo nella zona."

 internal_affairs_local_uprising_festival_modifier: "Festa Rurale"
 internal_affairs_local_uprising_festival_modifier_desc: "Ogni anno viene organizzata una piccola festa rurale per soddisfare, e tenere tranquilli, gli abitanti locali."

 internal_affairs.20.t: "Un[county_holder.Custom('DE_PRO_POS_P_2P')] Signor[county_holder.Custom('DE_END_ADJ_IND_S_A')] Inadeguat[county_holder.Custom('DE_END_PRO_S_N')]"
 internal_affairs.20.desc: "Per la terza volta, nel giro di una settimana, un altro messaggero mi riferisce della pessima situazione [county_title.Custom('IT_COU_COL')][county_title.GetNameNoTier]."
 internal_affairs.20.desc.both: "Criminalità dilagante, cittadini morti per le strade e un clima generale di paura e infelicità."
 internal_affairs.20.desc.control: "Criminalità dilagante, strade insicure e cittadini terrorizzati dall'uscire di casa dopo il tramonto."
 internal_affairs.20.desc.opinion: "Un profondo malcontento per il modo in cui la contea viene governata e ricorrenti manifestazioni di protesta nelle strade."
 internal_affairs.20.desc.outro: "\n\nAl riguardo, ho già inviato un messaggero [county_holder.Custom('IT_NAM_COL4')][county_holder.GetTitledFirstName], eppure i problemi sembrano non aver fine. È questa la gestione di una contea di qualcuno che merita di essere uno dei #emp miei#! vassalli?"
 internal_affairs.20.dread: "Se volete tenerli sotto il vostro gioco, fatelo nel modo giusto. Dilettante."
 internal_affairs.20.a: "È inaccettabile."
 internal_affairs.20.a.tt: "Avete il diritto di [revoke|e] un [title|e] [title_i] [county_holder.Custom('IT_NAM_COL2')][county_holder.GetTitledFirstName]"
 internal_affairs.20.b: "Lascerò perdere... per questa volta."

 opinion_unfitting_ruler_opinion: "Governante Inadeguato"
 MODIFIER_DEFINITION_UNFITTING_RULER_DESC: "\nQuesto modificatore aumenta quanto più alta è la [dread|e] del [holder|e]"

 inspection_unfitting_ruler_modifier: "Contea Spremuta Fino all'Osso"
 inspection_unfitting_ruler_modifier_desc: "Questa contea viene dissanguata con le tasse e i cittadini se ne vanno in massa ogni giorno."

 inspection_unfitting_ruler_desc: "\t#weak Aumento per ogni punto di #bold Dread#! del [holder|e]#!"

 internal_affairs.30.t: "Voltarsi dall'Altra Parte"
internal_affairs.30.desc: ""Vedi, [ROOT.Char.Custom('FormOfAddressForLiege')], alcune aspettative locali poste su di noi sono #emp piuttosto#! dure per gli affari..." Vengo avvicinat[Select_CString(merchant_character.IsFemale,'a','o')] da [merchant_character.GetFirstName], rappresentante del [SCOPE.Custom('LocalGuildsLoc')] di [guild_province.GetName]. [Select_CString(merchant_character.IsFemale,'Lei','Lui')|U] mi ha parlato a lungo delle difficoltà che il [Select_CString(merchant_character.IsFemale,'suo','suo')] sodalizio ha dovuto affrontare.\n\n"Ho pensato che forse potremmo sistemare la cosa tra noi due." [Select_CString(merchant_character.IsFemale,'Lei','Lui')|U] posa un piccolo sacchetto sul tavolo davanti a me e mi lancia uno sguardo d’intesa."
 internal_affairs.30.a: "Oh, ma io non ho alcuna intenzione di chiudere gli occhi..."
 internal_affairs.30.b: "Bene, ma solo per questa volta."
 internal_affairs.30.c: "Uscite di qui prima che vi faccia uccidere, sanguisuga!"

 internal_affairs.40.t: "Fili Sciolti"
 internal_affairs.40.follower_intro: "Facendo da messagger[secret_giver.Custom('DE_END_ADJ_NUL_S_N')], [secret_giver.GetFirstName] mi riferisce le notizie della zona, tenendomi informato mentre sono altrimenti occupato in altre faccende. Sebbene gran parte di ciò che [Select_CString(secret_giver.IsFemale,'lei','lui')] menziona non abbia nulla di straordinario, nella sua voce si avverte una nota di preoccupazione ogni volta che viene fatto il nome di [secret_haver.GetName].\n\nInfine, "
 internal_affairs.40.courtier_intro: "Mentre cammino avanti e indietro per l'accampamento, una voce sconosciuta giunge alle mie orecchie, intenta a conversare con uno dei miei compagni nelle vicinanze. Mi fermo e tendo l'orecchio. All'inizio lo scambio pare insignificante, ma poi viene improvvisamente nominato [secret_haver.GetName].\n\n"
 internal_affairs.40.desc: "[secret_giver.GetFirstName] si addentra in questioni più delicate che riguardano [secret_haver.GetFirstNameNoTooltip], rivelando fatti che potrebbero benissimo macchiare la sua reputazione..."
 internal_affairs.40.a: "Forse potresti tornarmi utile, [secret_giver.GetFirstName]."
 internal_affairs.40.blackmail: "Posso senz'altro volgere la cosa a mio vantaggio."
 internal_affairs.40.expose: "Tutti dovrebbero sapere che cosa sta combinando [secret_haver.GetFirstName]!"
 internal_affairs.40.move_zealous: "[GetPlayer.GetFaith.HighGodName] mi richiama lontano da qui..."
 internal_affairs.40.move: "Potrebbe essere giunto il momento di lasciare [GetPlayer.GetDomicile.GetLocation.GetName]..."

 internal_affairs.50.t: "La protesta [target_faith.GetAdherentNameNoTooltip]"
 internal_affairs.50.desc: "I contadini di [tensions_county.GetNameNoTier] non paiono aver riposto né fiducia né affetto in [tensions_county.GetHolder.GetName]. Non vi sono dubbi sulla causa di tale malcontento: i monumenti [target_faith.GetAdherentNameNoTooltip] vengono profanati e aumentano le risse che coinvolgono tanto [target_faith.GetAdherentNamePluralNoTooltip] quanto [opposing_faith.GetAdherentNamePluralNoTooltip]. "
 internal_affairs.50.desc.holder_faith: "Sebbene [tensions_county.GetHolder.GetNameNoTooltip] possa schierarsi [Select_CString(tensions_county.GetHolder.IsFemale,'essa stessa','egli stesso')] con i [target_faith.GetAdherentNamePluralNoTooltip], la sua sola fede non può placare la presenza di un [opposing_faith.GetAdherentNameNoTooltip] [target_liege.GetTitleTierName]."
 internal_affairs.50.desc.root_faith: "\n\nMi chiedo se non dovrei vigilare sulla condizione dei miei correligionari [GetPlayer.GetFaith.GetAdherentNamePluralNoTooltip], se non altro per garantire che il nostro culto di [GetPlayer.GetFaith.HighGodName] non sia ostacolato. "
 internal_affairs.50.desc.neutral_faith: "\n\nBenché io non professi né [opposing_faith.GetNameNoTooltip] né [target_faith.GetNameNoTooltip], vale la pena vedere che cosa si possa fare qui. "
 internal_affairs.50.desc_end: "Nel migliore dei casi, potrei adoperarmi per placare queste tensioni, prima che comincino a mettere a repentaglio la mia sicurezza."
 internal_affairs.50.tolerance: "Lascia che i [target_faith.GetAdherentNamePluralNoTooltip] conservino le loro credenze."
 internal_affairs.50.conversion: "[tensions_county.GetNameNoTierNoTooltip] dovrebbe diventare interamente [opposing_faith.GetAdherentNameNoTooltip]!"
 internal_affairs.50.neutral_cynic: "Perché mai la gente lascia che la religione eserciti un simile potere sulle proprie vite?"
 internal_affairs.50.neutral: "D'altra parte, la cosa non mi riguarda..."
 internal_affairs.tolerance_desc: "Cerchi di aiutare i contadini a far valere il loro diritto a praticare [target_faith.GetNameNoTooltip]."
 internal_affairs.conversion_desc: "Cerchi di convertire i contadini di [tensions_county.GetNameNoTierNoTooltip] a [opposing_faith.GetNameNoTooltip]."
 local_zealots_appeased_tt: "I [target_faith.GetAdherentNamePluralNoTooltip] locali sono placati"
 religious_tension_continues_tt: "I disordini [target_faith.GetAdherentNameNoTooltip] continuano"
 religious_county_converted_tt: "[tensions_county.GetNameNoTierNoTooltip] viene indotta a seguire [opposing_faith.GetNameNoTooltip]"

 internal_affairs.60.t: "Il Bottino del Bandito"
 internal_affairs.60.desc: "Mentre percorro i passaggi di [bandit_location.GetNameNoTier], noto con la coda dell'occhio una figura che sguscia furtiva. Voltato l'angolo, scorgo una banda di uomini dall'aspetto rude che riempie un carro con ogni sorta di refurtiva, muovendosi in fretta come se [GetPlayer.GetFaith.DevilName] [GetPlayer.GetFaith.DevilHerselfHimself] fosse alle loro calcagna.\n\nLa maggior parte degli uomini lascia la zona per recuperare altro bottino, e [bandit_character.GetFirstName] resta sol[Select_CString(bandit_character.IsFemale,'a','o')] a fare la guardia. Nel carro noto una bisaccia che reca il sigillo di [bandit_holder.GetName], ma anch'io ho bisogno di ciò che contiene..."
 internal_affairs.60.force: "Che cosa pensa di fare [bandit_character.GetName]?"
 internal_affairs.60.force_tt: "Affronto il bandito solitario e cerco di prendere il suo bottino per me"
 internal_affairs.60.force_tt_succ: "Rubo con successo il bottino dei banditi"
 internal_affairs.60.force_tt_fail: "[bandit_character.GetNameNoTooltip] mi respinge"
 internal_affairs.60.snitch: "[bandit_holder.GetFirstName] vorrà sentirne parlare."
 internal_affairs.60.snitch_tt: "Informo [bandit_holder.GetNameNoTooltip] delle attività dei banditi, e [Select_CString(bandit_holder.IsFemale,'lei','lui')] mi ricompensa con una parte della merce rubata."
 internal_affairs.60.sus: "Forse [bandit_character.GetNameNoTooltip] può farmi prendere parte a qualcuna delle sue imprese..."
 internal_affairs.60.sus_tt: "Crea #V 3#! [criminal_task_contracts|E] sulla mappa"
 internal_affairs.60.neutral: "Non è un mio problema."

 MODIFIER_DEFINITION_LOCAL_CORRUPTION_DESC: "\nQuesto modificatore aumenta quanto più è basso il [county_control|E]"
 internal_affairs_local_corruption_desc: "\t#weak Aumento per ogni punto di #bold Controllo della Contea#! al di sotto dei 100#!"

 internal_affairs_local_corruption_modifier: "Corruzione Santificata"
 internal_affairs_local_corruption_modifier_desc: "Una corporazione di mercanti locali detiene un potere quasi illimitato sul commercio del luogo, erodendo sempre più la burocrazia e l'organizzazione della contea."

 internal_affairs_camp_momentum_modifier: "Slancio dell'Accampamento"
 internal_affairs_camp_momentum_modifier_desc: "Quest[GetPlayer.Custom('DE_PRO_PER_S_3P_N')] avventurier[GetPlayer.Custom('DE_END_ADJ_NUL_S_N')] è stat[GetPlayer.Custom('DE_END_ADJ_NUL_S_N')] chiamat[GetPlayer.Custom('DE_END_ADJ_NUL_S_N')] al viaggio e forse a stabilire il proprio accampamento altrove."

 internal_affairs_county_religious_tensions_modifier: "Tensioni Religiose Accresciute"
 internal_affairs_county_religious_tensions_modifier_desc: "Questa contea sta vivendo tensioni religiose, esasperate dall'interferenza di un'entità influente.\n[convert_county|E] Progresso mensile: #N -0.2#!"

 RELIGIOUS_TENSIONS_DESC: "[GetModifier( 'internal_affairs_county_religious_tensions_modifier' ).GetNameWithTooltip]"
 RELIGIOUS_TOLERANCE_DESC: "[GetModifier( 'internal_affairs_county_religious_tolerance_modifier' ).GetNameWithTooltip]"

 internal_affairs_county_religious_tolerance_modifier: "Tolleranza Religiosa"
 internal_affairs_county_religious_tolerance_modifier_desc: "Le voci della minoranza religiosa in questa contea sono state ascoltate, e il loro diritto di professare le proprie credenze è rispettato, almeno per il momento.\n[convert_county|E] Progresso mensile: #N -0.1#!"

 internal_affairs_character_religious_tolerance_modifier: "$internal_affairs_county_religious_tolerance_modifier$"
 internal_affairs_character_religious_tolerance_modifier_desc: "Questo personaggio ha mostrato agli altri il valore del rispetto per le altrui credenze; forse potrebbero fare lo stesso, a loro volta."

