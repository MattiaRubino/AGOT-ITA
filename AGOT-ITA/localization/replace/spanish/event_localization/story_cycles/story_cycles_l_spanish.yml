SITUATION_LIST_STORY_CYCLE_DECISIONS_HEADER: "Decisioni"

not_yet_chosen: "non ancora scelto"
story_cycle_pet_dog: "Cane domestico"
story_cycle_pet_dog_desc: "#F Un fedele compagno canino cammina al tuo fianco, offrendo protezione e un legame di lealtà che pochi umani possono eguagliare.#!"
DOG_INFORMATION_STRING: "Il nome del tuo cane è #V [Story.Custom('DogStoryNameAll')].#!\nIl suo pelo è [Story.Custom('DogFurColorAll')], i suoi occhi sono [Story.Custom('DogEyeColorAll')] e [Story.Custom('DogStorySheHeAll')] ha [Story.Custom('DogStoryPuppyOrAgeAll')].\n[Story.Custom('DogStorySheHeAll')|U] è davvero un[Story.Custom('DE_PRO_PER_P_3P_G')] [Story.Custom('DogStoryGirlBoyAll')] bravissim[Story.Custom('DE_END_ADJ_NUL_S_N')]."
dog_age_puppy: "un cucciolo"
dog_age_proper: "[Story.MakeScope.Var('dog_age_variable').GetValue|0] anni"
cat_age_kitten: "un gattino"
cat_age_proper: "[Story.MakeScope.Var('cat_age_variable').GetValue|0] anni"
story_cycle_pet_cat: "Gatto domestico"
story_cycle_pet_cat_desc: "#F Un fiero felino ti tiene compagnia, un agile cacciatore che offre affetto solo alle proprie condizioni.#!"
CAT_INFORMATION_STRING: "Il nome del tuo gatto è #V [Story.Custom('CatStoryNameAll')].#!\nIl suo pelo è [Story.Custom('CatFurColorAll')], i suoi occhi sono [Story.Custom('CatEyeColorAll')] e [Story.Custom('CatStorySheHeAll')] ha [Story.Custom('CatStoryKittenOrAgeAll')].[Story.Custom('CatStupidOrNotStupidAll')]"
dumb_but_sweet_orange_boy: "\n[Story.Custom('CatStorySheHeAll')|U] è un[Story.Custom('DE_PRO_PER_P_3P_G')] stupid[Story.Custom('DE_END_ADJ_NUL_S_N')] [Story.Custom('CatStoryGirlBoyAll')] dal pelo [Story.Custom('CatFurColorAll')], ma molto dolce."
story_cycle_pet_eagle: "Aquila da caccia"
story_cycle_pet_eagle_desc: "#F Sul tuo guanto posa un'aquila da caccia, sempre vigile, sempre affamata, che porta la morte dall'alto.#!"
EAGLE_INFORMATION_STRING: "Il nome della tua aquila è #V [Story.Custom('EagleStoryNameAll')].#!\n[Story.Custom('EagleStorySheHeAll')|U] ha [Story.MakeScope.Var('eagle_age_variable').GetValue|0] anni."
bp2_hostage_loyalty: "Un ostaggio leale"
bp2_hostage_loyalty_desc: "Uno dei tuoi [hostages|E] sta iniziando ad affezionarsi a te e ai tuoi modi."
hostage: "[hostage|E]"
HOSTAGE_STORY_PRACTICAL_INFORMATION_STRING: "Il tuo [hostage|E], [Story.MakeScope.Var('hostage_target').Char.GetUIName], sta crescendo nella tua [court|E], influenzando la sua fedeltà. Mantieni alta la sua [opinion|E] e scegli le opzioni giuste negli eventi per rendere più probabile che sia leale nei tuoi confronti quando [Select_CString(Story.MakeScope.Var('hostage_target').Char.IsFemale,'diventerà adulta','diventerà adulto')].\n\nLealtà attuale: [Story.MakeScope.Var('theon_points').GetValue|0+]"
LOYALTY_LABEL: "Punti Lealtà"
claimant: "[claimant|E]"
diverted_crusaders: "Crociati Deviati"
frankokratia_story: "Francocrazia"
frankokratia_story_desc: "Un pretendente a [GetTitleByKey('e_byzantium').GetName|l] ha attirato opportunisti occidentali lontano dalla loro crociata, volgendo spade avide verso il cuore stesso della cristianità..."
FRANKOKRATIA_STORY_PRACTICAL_INFORMATION_STRING: "Una [war|E] contro [GetTitleByKey('e_byzantium').GetHolder.GetShortUIName] determinerà il futuro di [GetTitleByKey('e_byzantium').GetName|l]. O [Story.MakeScope.Var('byz_claimant').Char.GetUIName], [claimant|E], conquisterà il trono, pagando i crociati per i loro sforzi — oppure sarà fondato un nuovo [GetTitleByKey('e_latin_empire').GetBaseName] sotto il dominio [GetFaithByKey('catholic').GetAdjective]."
story_conqueror: "Conquistatore"
story_conqueror_desc: "La tua ambizione non conosce limiti! Il mondo giace davanti a te, maturo per essere preso."
CONQUEROR_STORY_PRACTICAL_INFORMATION_STRING: "I conquistatori ricevono molti potenti bonus, come una riduzione delle [factions|E], accesso al [vassalize_casus_belli|E] e occasionali eventi potenti.\n\nSmetterai di essere un Conquistatore se:\n$BULLET_WITH_TAB$Non sei [independent|E]\n$BULLET_WITH_TAB$Il tuo rango viene ridotto a [count|E]\n$BULLET_WITH_TAB$Diventi [unlanded|E]\n$BULLET_WITH_TAB$Non sei in [war|E] per #V 10#! anni\n$BULLET_WITH_TAB$Sei profondamente in [debt|E]\n$BULLET_WITH_TAB$Perdi #V 3#! o più [wars|E]\n$BULLET_WITH_TAB$Diventi [GetTrait('incapable').GetName( GetNullCharacter )]"
story_destiny_child: "Figlio del Destino"
story_destiny_child_desc: "È nato un bambino di grande promessa, come se fosse stato scelto dal destino stesso."
DESTINY_CHILD_STORY_PRACTICAL_INFORMATION_STRING: "Una volta ogni morte di papa, nasce un bambino destinato alla grandezza. Si sviluppa più rapidamente del normale e raggiunge vette che altri non raggiungeranno.\n\nAbbi grande cura di [Story.MakeScope.Var('destiny_child').Char.GetUIName] e valuta di adoperarti per renderl[Select_CString(Story.MakeScope.Var('destiny_child').Char.IsFemale,'a','o')] il tuo [player_heir|E] — per esempio, rendendol[Select_CString(Story.MakeScope.Var('destiny_child').Char.IsFemale,'a','o')] il tuo [designated_heir|E]."
CHILD_OF_DESTINY: "Il Figlio del Destino"
story_cycle_martial_lifestyle_warhorse: "Destriero"
story_cycle_martial_lifestyle_warhorse_desc: "Hai a tua disposizione un destriero particolarmente ben addestrato. Che i tuoi nemici tremino davanti alla tua carica."
WARHORSE_STORY_PRACTICAL_INFORMATION_STRING: "Il tuo destriero si chiama #V [Story.Custom('WarhorseStoryNameAll')]#!. [Story.Custom('HorseStorySheHeAll')|U] è [Story.Custom('HorseStoryMareStallionAll')]."
DOPPELGANGER: "Il tuo [Glossary( 'Doppelgänger', 'DOPPELGANGER_GLOSS' )]"
story_doppelganger: "Specchio nel fango"
DOPPELGANGER_GLOSS: "Un sosia o doppio di una persona vivente, spesso incontrato per caso. Nel folclore tedesco è un'apparizione inquietante e un cattivo presagio: vedere il proprio doppio può preannunciare malattia o morte."
story_doppelganger_desc: "È stato trovato un contadino che reca la tua esatta somiglianza — un autentico [Glossary( 'doppelgänger', 'DOPPELGANGER_GLOSS' )]..."
DOPPELGANGER_STORY_PRACTICAL_INFORMATION_STRING: "Un contadino che sembra e parla proprio come te può essere un'opportunità... o una maledizione. Per ora, [Story.MakeScope.Var('doppelganger_character').Char.GetUIName] risiede nella tua [court|E]."
story_cycle_hunt_mystical_animal: "Caccia a un Animale Mistico"
story_cycle_hunt_mystical_animal_desc: "Durante una caccia hai intravisto una mistica bestia bianca. Catturarla sarebbe come trovare il Santo Graal!"
WHITE_ANIMAL_INFORMATION_STRING: "Sei sulle tracce di un #V [Story.MakeScope.Var('animal_type').GetFlagName|U] Bianco#!.\n\nCatturarlo porterebbe grandi ricompense — ma guadagni [stress|E] ogni volta che il [Story.MakeScope.Var('animal_type').GetFlagName] ti sfugge. Di tanto in tanto, un [GetModifier('hunt_sighting_legendary_modifier').GetNameWithTooltip] ti permetterà di continuare la caccia.\n\nIncontri con il [Story.MakeScope.Var('animal_type').GetFlagName] Bianco: [Story.MakeScope.Var('encounters').GetValue|0V] #weak (dalla prima volta)#!"
LEGENDARY_COUNTY_LABEL: "Dimora Attuale del [Story.MakeScope.Var('animal_type').GetFlagName|U] Bianco"
story_sycophant: "Il Sicofante"
story_sycophant_desc: "Uno dei tuoi cortigiani, un evidente sicofante, sta irritando i tuoi vassalli con la sua mera presenza."
SYCOPHANT_INFORMATION_STRING: "[Select_CString(Story.MakeScope.Var('sycophant_character').Char.IsFemale,'La mia','Il mio')] [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('sycophant_character').Char )] [Story.MakeScope.Var('sycophant_character').Char.GetShortUIName] e [Select_CString(Story.MakeScope.Var('jealous_character').Char.IsFemale,'la mia','il mio')] [Story.GetOwner.Custom2( 'RelationToMeShort', Story.MakeScope.Var('jealous_character').Char )] [Story.MakeScope.Var('jealous_character').Char.GetShortUIName] sono ai ferri corti. Posso scegliere un favorito, ma farlo farà certamente infuriare l'altro. Il tempo dirà come si svilupperà questa situazione..."
SYCOPHANT_LABEL: "Il Sicofante"
JEALOUS_VASSAL_LABEL: "Il Mio Vassallo Più Geloso"
story_cycle_pet_rock: "Roccia Domestica"
story_cycle_pet_rock_desc: "Al tuo fianco c'è una roccia domestica, il cui volto immutabile si accorda perfettamente al tuo peculiare senso della compagnia."
PET_ROCK_INFORMATION_STRING: "Il nome della tua roccia è #V [Story.GetOwner.Custom('RockStoryName')].#!\nIl suo esterno scabro è [Story.GetOwner.Custom('RockColor')]."
story_cycle_admin_eunuch: "Eunuco Eminente"
story_cycle_admin_eunuch_desc: "Un eunuco di particolare abilità si è fatto strada nella tua corte. Un'opportunità, o una minaccia..?"
EUNUCH_INFORMATION_STRING: "Col tempo, avrai occasioni per concedere a [Story.MakeScope.Var('eunuch').Char.GetShortUIName] maggiore potere e influenza. Farlo aumenta la forza del [modifier|E] [GetModifier('admin_eunuch_liege_4_modifier').GetNameWithTooltip].\n\nMa bada — se lo disdegni, o gli concedi #EMP troppo#! potere senza assicurarti la sua lealtà, le conseguenze potrebbero essere funeste...\n\nFinora hai rifiutato le sue richieste [Story.MakeScope.Var('eunuch_refusals').GetValue|0V] volte."
EUNUCH_LABEL: "L'Eunuco"
UPSET_COURTIERS: "Sudditi turbati dall'Eunuco"
POETRY_BOOK_LABEL: "Il Mio Libro di Poesia"
commission_epic_story: "Commissiona Epopea"
commission_epic_story_desc: "Stai commissionando una grande epopea per narrare le imprese della tua famiglia."
EPIC_INFORMATION_STRING: "Il tuo [Story.GetOwner.Custom('CommissionEpicScribe')][AddTextIf(Story.MakeScope.Var('composer').IsSet, Concatenate(Concatenate(', ', Story.MakeScope.Var('composer').Char.GetShortUIName), ','))] sta componendo una [Story.Custom('CompositionTypeAll')] epica per aumentare il [dynasty_prestige|E] della [dynasty|E] [Story.GetOwner.GetDynasty.GetName] e ottenere un [artifact|E].\n\nLa probabilità di una [Story.Custom('CompositionTypeAll')] eccezionale è: [Story.MakeScope.Var('final_outcome_chance').GetValue|0+/%]"
COMPOSER: "Il Compositore della tua Epopea"
story_foreign_raised_reformer: "Riformatore Cresciuto all'Estero"
story_foreign_raised_reformer_desc: "Sei cresciuto lontano dalla terra che ora chiami casa.\nCosì diversa... eppure, se casa fosse più simile a quel luogo?"
REFORMER_INFORMATION_STRING: "Sei cresciuto nel [Story.MakeScope.Var('advanced_realm').Title.GetBaseName] sotto la guida di [Story.MakeScope.Var('foreign_educator').Char.GetShortUIName], un [Story.MakeScope.Var('advanced_culture').Culture.GetName] di fede [Story.MakeScope.Var('advanced_culture_faith').Faith.GetAdjective]. Sei rimasto colpito dalla [culture|E] [Story.MakeScope.Var('advanced_culture').Culture.GetName] e desideri rendere il tuo popolo più simile a loro.\n\nInizierai a ricevere occasioni per ottenere punti Riforma o Riaffermazione:\n$BULLET_WITH_TAB$#indent_newline:7 Perseguendo la Riforma puoi ottenere [innovations|E], [cultural_acceptance|E], [traditions|E] o forse persino una [GetBuilding('generic_university').GetName]. Tieni presente che la Riforma è un processo lungo e costoso.#!\n$BULLET_WITH_TAB$#indent_newline:7 Perseguendo la Riaffermazione puoi ottenere [opinion|E] dei [vassal|E], [dynasty_prestige|E], bonus alla [war|E] sotto forma di [casus_bellis|E] e [special_troops|E].#!"
REFORM_LABEL: "Progresso verso la Riforma della tua [culture|E]"
REAFFIRMATION_LABEL: "Progresso verso la Riaffermazione della tua [culture|E]"
REFORM_MIN_VALUE_LABEL: ""
REFORM_MAX_VALUE_LABEL: "Max: #V 3#!"
REAFFIRMATION_MIN_VALUE_LABEL: ""
REAFFIRMATION_MAX_VALUE_LABEL: "Max: #V 2#!"
ECCENTRIC_MIN_VALUE_LABEL: ""
ECCENTRIC_MAX_VALUE_LABEL: "Max: #V 5#!"
IMAGINARY_FRIEND_INFORMATION_STRING: "Il nome del tuo amico immaginario è [Story.MakeScope.Var('imaginary_friend_name').Char.GetShortUINameNoTooltip]. Avrai occasionalmente occasioni per interagire con [Select_CString(Story.MakeScope.Var('imaginary_friend_name').Char.IsFemale,'lei','lui')]."
ECCENTRIC_VALUE: "Progresso verso l'ottenimento di [GetTrait('eccentric').GetName( GetNullCharacter )]"
story_cycle_imaginary_friend: "Amico Immaginario"
story_cycle_imaginary_friend_desc: "Finalmente, un amico con cui giocare! Che importa se non è reale? Per me lo è!"
story_greatest_of_khans: "Il Più Grande dei Khan"
story_greatest_of_khans_desc: "Nei Cieli vi sono molte grandi luci. Nei Cieli, il sole, la luna e le stelle. Ma sulla terra può esserci un solo Khan."
GREATEST_OF_KHANS_INFORMATION_STRING: "$become_greatest_of_khans_decision_enable_gok_invasion_cb$\n$gok_enable_offer_submission_or_ruin_tt$\n\n@alert_icon! #alert_trial Se la tua [dynasty|E] perde il controllo di [Story.GetOwner.GetPrimaryTitle.GetName|l], cessa di essere [GetGovernment( 'nomad_government' ).GetName] o non riesce ad adottare la [decision|E] #high $mpo_gok_world_conquest_decision$#! entro l'anno #high [Story.MakeScope.Var('gok_final_date').GetValue|0]#!, questi bonus andranno perduti e [Story.GetOwner.GetPrimaryTitle.GetName|l] diventerà soggetto alla disgregazione!#!"
 
