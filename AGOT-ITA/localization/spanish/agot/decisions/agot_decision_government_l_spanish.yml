  agot_pirate_events.0001.desc: ""I vecchi metodi ci hanno servito bene e li onoreremo sempre. Tuttavia, come [ROOT.Char.GetTitleAsNameNoTooltip] "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]", ho concluso che dobbiamo adottare il feudalesimo e i suoi principi se vogliamo continuare a prosperare. È il prossimo passo cruciale sulla nostra strada verso la grandezza!"
