agot_beg_bittersteel_to_make_golden_company:0 "Sotto l'oro, l'Acciaio Amaro"
agot_beg_bittersteel_to_make_golden_company_desc:0 "Acreacciaio ha lavorato duramente per la causa Blackfyre... come mercenario. Ma ha espresso in privato la preoccupazione che il sostegno alla nostra causa stia svanendo tra gli esuli, costretti a servire in una dozzina di compagnie diverse. Forse è tempo che venga fondata una nuova compagnia... una che servirà sempre il Drago Nero."
agot_beg_bittersteel_to_make_golden_company_effect:0 "Acreacciaio formerà la Compagnia Dorata"
agot_beg_bittersteel_to_make_golden_company_confirm:0 "Forma la Compagnia Dorata"
agot_beg_bittersteel_to_make_golden_company_tooltip:0 "$agot_beg_bittersteel_to_make_golden_company_effect$ — una compagnia mercenaria assoldabile"
AGOT_PREFIX_THE:0 "The"

agot_mega_war_declare_independence_decision:0 "Dichiara l'indipendenza"
agot_mega_war_declare_independence_decision_desc:0 "Dichiarerò l'indipendenza da [ROOT.Var('pre_war_liege').Char.Custom('IT_NAM_COL5')][ROOT.Var('pre_war_liege').Char.GetTitledFirstName]. Tuttavia, [Select_CString(ROOT.Var('pre_war_liege').Char.IsFemale,'lei','lui')] potrebbe non gradire la mia secessione dal reame e tentare di riportarmi nel reame con la forza. Anche alcuni dei miei vassalli potrebbero mettere in dubbio la propria lealtà..."
agot_mega_war_declare_independence_decision_tooltip:0 "Diventerai un reame pienamente indipendente, oppure sarai considerato un ribelle in una #R guerra#! contro il tuo signore."
agot_mega_war_declare_independence_decision_confirm:0 "È giunto il momento di separarmi!"
