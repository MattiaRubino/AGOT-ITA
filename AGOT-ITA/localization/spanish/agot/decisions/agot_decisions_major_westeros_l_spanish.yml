l_spanish:
 #Marked for Review

agot_proclaim_iron_throne:0 "Proclama il Trono di Spade"
agot_proclaim_iron_throne_tooltip:0 "Questa decisione ti permetterà di unire il reame sotto il Trono di Spade."
agot_proclaim_iron_throne_desc:0 "Il Trono di Spade è stato a lungo simbolo di unità e potere a Westeros. Ora che gli innumerevoli piccoli feudi del reame sono sotto i nostri vessilli, è giunto il momento di raccogliere le lame dei vinti e forgiare un nuovo Trono di Spade per tutto il reame.\n\nHo la forza, l'astuzia e la volontà di rivendicare il Trono di Spade? Casa [ROOT.Char.GetHouse.GetName] ha ciò che serve per essere l'unica vera sovrana di Westeros?"
agot_proclaim_iron_throne_confirm:0 "Invia i corvi"

set_capital_kingslanding_decision:0 "Riconquista Approdo del Re"
set_capital_kingslanding_decision_tooltip:0 "Ripristina Approdo del Re come capitale del tuo reame."
set_capital_kingslanding_decision_desc:0 "Approdo del Re è la legittima capitale del Trono di Spade, e in quanto tale appartiene a me."
set_capital_kingslanding_decision_confirm:0 "Ripristina il vero seggio del reame!"

end_the_ironborn_decision:0 "Poni fine agli Uomini di Ferro"
end_the_ironborn_decision_desc:0 "Per secoli, quei cani bastardi che sono gli Uomini di Ferro hanno stuprato, saccheggiato e razziato in lungo e in largo Westeros e oltre. Ora è divenuto inevitabile agire contro questi briganti del mare e schiacciare il loro potere una volta per tutte. Dobbiamo muovere contro di loro una guerra così devastante che mai più un Re del Ferro siederà sul Trono di Pietramare."
end_the_ironborn_decision_confirm_text_desc:0 "Alle armi!"
end_the_ironborn_decision_tooltip:0 "Morte agli Uomini di Ferro."

regrow_oakenseat_decision:0 "Fai ricrescere il Seggio di Quercia"
regrow_oakenseat_decision_tooltip:0 "Convoca un abile giardiniere affinché faccia ricrescere il Seggio di Quercia."
regrow_oakenseat_decision_desc:0 "Il Seggio di Quercia, un trono vivente piantato da Garth Manoverde, fu distrutto da un re dorniano durante il regno di Re Garth X Gardener e ormai non è più che leggenda.\n\nBenché non sia impresa da poco, far ricrescere il Seggio di Quercia porterebbe alla mia Casa grande fama, autorità e influenza nell'Altopiano — e in tutti i Sette Regni."
regrow_oakenseat_decision_confirm:0 "Pianta il seme"
regrow_oakenseat_excellent_aptitude:0 "Il tuo $court_gardener_court_position$ deve avere un'attitudine #V Eccellente#!"
agot_major_decisions_events.1001.t:0 "Il Seggio di Quercia è ricresciuto"
agot_major_decisions_events.1001.desc:0 "La leggenda narra che [greenhand.GetFullNameNicknamed] intagliò il Seggio di Quercia vivente originale con la propria mano verde, e i re [greenhand.GetHouse.GetName] governarono da quel medesimo trono per generazioni.\n\nLa sua distruzione strappò la radice — e il cuore — da Alto Giardino.\n\nFinalmente, dopo decenni di crescita, potatura e propagazione attente, il fiero Seggio di Quercia è ricresciuto. Da vicino e da lontano, tutti conosceranno la gloria di Casa [ROOT.Char.GetHouse.GetName] per il nostro celebre seggio. Forse posso persino rivendicare di essere il vero successore dello stesso Garth Manoverde..."
agot_major_decisions_events.1001.a:0 "Una leggenda restaurata!"

ironborn_rebellion_decision:0 "Ribellati contro il Trono di Spade"
ironborn_rebellion_decision_desc:0 "Per troppo tempo ormai, gli uomini delle terre verdi hanno dormito placidamente nei loro letti. Invero, dalla morte di Harren il Nero, Westeros non ha più saputo davvero temere gli Uomini di Ferro, ma solo occasionali bande di razziatori sbarcate per pagare il prezzo del ferro. Re dopo re, hanno seduto sul loro Trono di Spade. Ma abbiamo forse dimenticato che noi abbiamo un trono nostro, che per secoli abbiamo avuto i nostri re?\n\nAltri uomini possono averlo fatto, ma io no. Spezzerò le catene che legano il nostro popolo; sarò il Re del Sale e della Roccia. Gli Andali, i Rhoynar e i Primi Uomini sapranno di nuovo cosa significhi temere gli Uomini di Ferro."
ironborn_rebellion_decision_tooltip:0 "Piangi, o Westeros, perché le Isole sorgono di nuovo!"
ironborn_rebellion_decision_confirm_text_desc:0 "Pagheremo il prezzo del ferro!"

defy_winter_lords_decision:0 "Sfida i Signori dell'Inverno"
defy_winter_lords_decision_desc:0 "I Nati dalla Pietra non conoscono altro che il disprezzo degli uomini del nord, che ci considerano non migliori dei Bruti. Skagos era un tempo libera e indipendente dai Signori dell'Inverno — e così sarà ancora. La nostra potenza farà tremare [ROOT.Char.GetLiege.GetNameNicknamedRegnal]!"
defy_winter_lords_decision_tooltip:0 "Dichiarerai la tua indipendenza, riportando ancora una volta gli Skagosi sui mari."
defy_winter_lords_decision_confirm_text_desc:0 "Il Nord ricorderà di temere Skagos!"

agot_minor_decisions_events.0001:0 "Sfida i Signori dell'Inverno"
agot_minor_decisions_events.0001.desc:0 "Molti Nati dalla Pietra hanno sognato il giorno in cui Skagos avrebbe conquistato di nuovo la propria libertà. Quando Re Brandon Stark spezzò il nostro potere, ci proibì il mare. Ora il Nord tremerà quando le nostre navi si avvicineranno!"
agot_minor_decisions_events.0001.a:0 "Non giuriamo #bold mai più#! fedeltà."
agot_minor_decisions_events.0001.a_tt:0 "Di certo il Nord non accetterà questo atto di slealtà senza combattere. Hai preparato tutto per la guerra?"

agot_minor_decisions_events.0002:0 "Una Skagos indipendente"
agot_minor_decisions_events.0002.desc:0 "I Nati dalla Pietra governano di nuovo sé stessi! La Baia delle Foche conoscerà i nostri vessilli.\n\nHo inciso la mia eredità nella pietra, e tutti i Nati dalla Pietra ricorderanno il mio nome."
agot_minor_decisions_events.0002.a:0 "La mia eredità resisterà alla prova del tempo."
agot_minor_decisions_events.0002.a_tt:0 "Skagos ottiene la propria indipendenza."

agot_adopt_kneeler_ways_decision:0 "Conformati ai costumi meridionali"
agot_adopt_kneeler_ways_decision_desc:0 "La vita nelle crudeli lande desolate dell'Estremo Nord ci ha resi gente spietata e inflessibile, molto diversa da coloro che vivono dall'altro lato della Bariera. Ora che abbiamo stabilito la nostra dimora fra loro, forse sarebbe saggio adattarci al loro modo di vivere, alle loro leggi e ai loro costumi."
agot_adopt_kneeler_ways_decision_confirm:0 "È tempo di sciogliere le ginocchia"
agot_adopt_kneeler_ways_decision_tooltip:0 "Il tuo popolo adotterà i costumi dei sudditi del Trono di Spade. Ciò permetterà più interazioni con i sovrani a sud della Bariera, ma ti costerà i benefici dell'essere popolo libero."
is_culture_head:0 "Sei il capo della tua cultura"
hybridized_with_kneelers:0 "La tua cultura è stata ibridata con una esistente a sud della Bariera"
capital_south_of_the_wall:0 "La tua capitale si trova a sud della Bariera"
agot_major_decisions_events.1003.t:0 "Dall'altra parte..."
agot_major_decisions_events.1003.desc:0 "Il nostro sogno, durato generazioni, di sfuggire alle dure realtà della vita dal lato sbagliato della Bariera si è compiuto. Non sarebbe forse un atto di superbia continuare ostinatamente come facevamo laggiù e disprezzare le leggi e i costumi dei nostri nuovi vicini? La gente sul lato meridionale della Bariera può essere timida e molle, ma vive a lungo e comodamente. Sa chiaramente trarre il meglio da questa terra piacevole e, se le sue leggi la aiutano in ciò, allora le adotteremo anche noi."
agot_major_decisions_events.1003.a:0 "Verso un nuovo futuro più mite!"
every_freefolk_ruler_tt:0 "Ogni capo del Popolo Libero"
