l_spanish:

 # Proclaim the Iron Throne
  agot_proclaim_iron_throne:0 "Proclamare il Trono di Spade"
  agot_proclaim_iron_throne_tooltip:0 "Questa decisione ti permetterà di unire il reame sotto il Trono di Spade."
  agot_proclaim_iron_throne_desc:0 "Per lungo tempo il Trono di Spade è stato simbolo di unità e potere in Westeros. Ora che gli innumerevoli piccoli feudi del reame sventolano sotto i nostri vessilli, è giunto il momento di raccogliere le lame degli sconfitti e forgiare un nuovo Trono di Spade per tutto il reame.\n\nHo io la forza, l'astuzia e la volontà per rivendicare il Trono di Spade? Casa [ROOT.Char.GetHouse.GetName] possiede quanto serve per essere l'unico vero sovrano di Westeros?"
  agot_proclaim_iron_throne_confirm:0 "Mandate i corvi."

  set_capital_kingslanding_decision:0 "Rivendicare Approdo del Re"
  set_capital_kingslanding_decision_tooltip:0 "Ripristina Approdo del Re come capitale del tuo reame."
  set_capital_kingslanding_decision_desc:0 "Approdo del Re è la legittima capitale del Trono di Spade e, in quanto tale, mi appartiene."
  set_capital_kingslanding_decision_confirm:0 "Ripristina il vero seggio del reame!"

  build_dune_road_decision:0 "Costruire la Strada delle Dune"
  build_dune_road_decision_tooltip:0 "Costruisci una grande strada da Capo Tempesta a Lancia del Sole, arricchendo le contee che attraversa."
  build_dune_road_decision_desc:0 "Una grande strada che si estenda da Capo Tempesta a Lancia del Sole porterà ricchezza e prosperità a tutte le terre che sfiora."
  build_dune_road_decision_confirm:0 "Così sia"

  agot_minor_decisions_events.0003.t:0 "La Strada delle Dune"
  agot_minor_decisions_events.0003.desc:0 "[top_liege.GetFullNameNicknamedRegnal] ha ordinato la costruzione di una strada da Capo Tempesta a Lancia del Sole, nel tentativo di rafforzare i commerci tra le possenti Terre della Tempesta e le fiere terre di Dorne."
  agot_minor_decisions_events.0003.a:0 "Un progetto regio, davvero!"

  agot_dune_road_modifier:0 "Strada delle Dune"
  agot_dune_road_modifier_desc:0 "Questa contea giace lungo la grande strada tra Capo Tempesta e Lancia del Sole, portando maggiori commerci e prosperità."
