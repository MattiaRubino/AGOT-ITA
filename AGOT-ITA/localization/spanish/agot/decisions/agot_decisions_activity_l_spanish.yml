l_spanish:
 agot_go_on_reaving_decision:0 "Parti per una razzia"
 agot_go_on_reaving_decision_opening_desc:0 "#F Paga il Prezzo del Ferro e organizza una grande razzia per flagellare le terre al di là del Mare Stretto. Gli Uomini di Ferro accorreranno da tutto il reame alla tua flotta per devastare queste terre di zafferano e seta!#!"
 reaving_effect_1:0 "Sceglierai una destinazione matura per il saccheggio"
 reaving_effect_2:0 "Più la tua razzia avrà successo, più [piety|E] e [prestige|E] guadagnerai"
 reaving_effect_3:0 "Potresti ottenere il tratto [GetTrait('viking').GetName( GetNullCharacter )]"
 agot_go_on_reaving_decision_tooltip:0 "Sarà indetta una Grande [reaving|E]."
 agot_go_on_reaving_decision_confirm:0 "I continentali temeranno gli Uomini di Ferro!"

 agot_buy_diving_bell:0 "Compra una campana da immersione"
 agot_buy_diving_bell_desc:0 "Farò installare una campana da immersione sulla mia nave, affinché la mia Casata possa seguire antiche mappe di tesori sommersi e calarsi tra i relitti sul fondale dell'oceano."
 agot_buy_diving_bell_tooltip:0 "Fai installare una campana da immersione"
 agot_buy_diving_bell_effect_tooltip:0 "Sblocca l'[activity|E] [GetActivityType('activity_agot_sailing').GetName] $agot_sailing_type_treasure$"
 agot_buy_diving_bell_confirm_text_desc:0 "Chiama il maestro d'ascia"

 agot_buy_ship:0 "Compra una nave"
 agot_buy_ship_desc:0 "I mari offrono ricchezze, gloria e avventura a coloro che sono abbastanza audaci da solcarli. Una bella imbarcazione servirebbe bene la mia Casata, portando il mio vessillo verso lidi lontani e aprendo nuove opportunità sulle onde. Ora devo solo decidere che genere di nave commissionare."
 agot_buy_ship_tooltip:0 "Commissiona una nave per la tua Casata"
 agot_buy_ship_effect_1_tooltip:0 "Sblocca [GetActivityType('activity_agot_sailing').GetName] $agot_sailing_type_raid$"
 agot_buy_ship_effect_2_tooltip:0 "Sblocca [GetActivityType('activity_agot_sailing').GetName] $agot_sailing_type_valyria$"
 agot_buy_ship_confirm_text_desc:0 "Chiama i maestri d'ascia"
 agot_buy_ship_small_ship:0 "Acquista una $owns_small_ship$"
 agot_buy_ship_small_ship_desc:0 "Un'imbarcazione modesta, adatta a portare il mio vessillo attraverso i mari senza svuotare le mie casse."
 agot_buy_ship_small_ship_tooltip:0 "$agot_buy_ship_small_ship_desc$"
 agot_buy_ship_big_ship:0 "Acquista una $owns_big_ship$"
 agot_buy_ship_big_ship_desc:0 "Una grande imbarcazione degna di una potente Casata, certa di attirare sguardi ammirati ovunque getti l'ancora."
 agot_buy_ship_big_ship_tooltip:0 "$agot_buy_ship_big_ship_desc$"
