l_spanish:
  agot_go_on_reaving_decision:0 "Continua a Saccheggiare"
  agot_go_on_reaving_decision_opening_desc:0 "#F Paga il Prezzo del Ferro e Organizza un grande saccheggio per razziare le terre al di là del Mare Stretto. Gli Uomini di Ferro giungeranno da tutto il regno per unirsi alla tua flotta per devastare queste terre di [saffron|E] e [silk|E]!#!"
  reaving_effect_1:0 "Sceglierai una destinazione pronta per essere saccheggiata"
reaving_effect_2: 0 "Più riuscita sarà la tua razzia, più [piety|E] e [prestige|E] otterrai"
  reaving_effect_3:0 "Potresti ottenere il tratto [GetTrait('viking').GetName(GetNullCharacter)]"
  agot_go_on_reaving_decision_tooltip:0 "Un Grande [reaving|E] sarà proclamato."
  agot_go_on_reaving_decision_confirm:0 "I [greenlanders|E] temeranno gli Uomini di Ferro!"

agot_buy_diving_bell: 0 "Compra una Campana Subacquea"
agot_buy_diving_bell_desc: 0 "Farò installare una campana subacquea sulla mia nave, affinché la mia Casa possa seguire vecchie mappe di tesori sommersi e addentrarsi nei relitti sul fondale oceanico."
agot_buy_diving_bell_tooltip: 0 "Fai installare una campana subacquea"
agot_buy_diving_bell_effect_tooltip: 0 "Sblocca l'[activity|E] [GetActivityType('activity_agot_sailing').GetName] $agot_sailing_type_treasure$"
agot_buy_diving_bell_confirm_text_desc: 0 "Convoca il maestro d'ascia"

agot_buy_ship: 0 "Compra una Nave"
agot_buy_ship_desc: 0 "I mari offrono ricchezza, gloria e avventura a chi è abbastanza audace da solcarli. Una buona nave servirebbe bene la mia Casa, portando il mio vessillo verso lidi lontani e aprendo nuove opportunità sulle onde. Ora devo soltanto decidere che sorta di nave commissionare."
agot_buy_ship_tooltip: 0 "Commissiona una nave per la tua Casa"
agot_buy_ship_effect_1_tooltip: 0 "Sblocca [GetActivityType('activity_agot_sailing').GetName] $agot_sailing_type_raid$"
agot_buy_ship_effect_2_tooltip: 0 "Sblocca [GetActivityType('activity_agot_sailing').GetName] $agot_sailing_type_valyria$"
agot_buy_ship_confirm_text_desc: 0 "Convoca i maestri d'ascia"
agot_buy_ship_small_ship: 0 "Acquista una $owns_small_ship$"
agot_buy_ship_small_ship_desc: 0 "Un'imbarcazione modesta, adatta a portare il mio vessillo attraverso i mari senza svuotare le mie casse."
 agot_buy_ship_small_ship_tooltip:0 "$agot_buy_ship_small_ship_desc$"
agot_buy_ship_big_ship: 0 "Acquista una $owns_big_ship$"
agot_buy_ship_big_ship_desc: 0 "Una nave grandiosa, degna di una Casa potente, certa di attirare sguardi ammirati ovunque getti l'ancora."
 agot_buy_ship_big_ship_tooltip:0 "$agot_buy_ship_big_ship_desc$"
