l_spanish:

  decision_group_type_appearance:0 "Decisioni d'Aspetto"

  agot_dye_hair_decision:0 "Tingere i capelli"
  agot_dye_hair_decision_desc:0 "Ho mantenuto troppo a lungo il mio attuale colore di capelli; mi è divenuto fin troppo familiare e spento!\nÈ tempo, ormai, che io cerchi una nuova tonalità."
  agot_dye_hair_decision_effect:0 "Ti verranno presentate dozzine di tonalità di tintura tra cui scegliere"
  agot_dye_hair_decision_tooltip:0 "Tingi i tuoi capelli di un nuovo colore"
  agot_dye_hair_decision_confirm:0 "È tempo di un nuovo aspetto!"

  agot_buy_eye_gem_decision:0 "Acquistare un occhio di gemma"
  agot_replace_eye_gem_decision:0 "Sostituire l'occhio di gemma"
  agot_buy_eye_gem_desc:0 "Convocerò il mio artigiano perché mi presenti una selezione di gemme tra cui scegliere, e sostituisca il mio occhio perduto. Se devo fare a meno d'un occhio, tanto vale farlo con stile."
  agot_buy_eye_gem_decision_tooltip:0 "Acquista una gemma da usare al posto dell'occhio perduto"
  agot_buy_eye_gem_decision_confirm:0 "Scegli la gemma"
  agot_buy_eye_gem_decision_next_stop_button:0 "Portatemi le gemme più pregiate!"

  agot_remove_eye_gem_decision:0 "Rimuovere l'occhio di gemma"
  agot_remove_eye_gem_desc:0 "Chiederò che venga realizzata una nuova benda per l'occhio, da indossare al posto della gemma. Una soluzione semplice, e che mi si addice abbastanza."
  agot_remove_eye_gem_decision_tooltip:0 "Torna a usare una benda per l'occhio"
  agot_remove_eye_gem_decision_effect:0 "Il tuo occhio di gemma verrà #N rimosso#!, e tornerai a usare una benda per l'occhio."
  agot_remove_eye_gem_decision_confirm:0 "Mandate a chiamare un artigiano!"

  replace_eye_gem_option_red:0 "Rubino"
  replace_eye_gem_option_orange:0 "Citrino"
  replace_eye_gem_option_yellow:0 "Topazio"
  replace_eye_gem_option_green:0 "Smeraldo"
  replace_eye_gem_option_blue:0 "Lapislazzuli"
  replace_eye_gem_option_dark_blue:0 "Zaffiro"
  replace_eye_gem_option_purple:0 "Ametista"
  replace_eye_gem_option_black:0 "Ossidiana"
  replace_eye_gem_option_white:0 "Diamante"

 # Flavor for when you hover over the options
  has_eye_gem_red_tooltip:0 "#BOLD;COLOR:{0.48,0.05,0.09} Rubino#!, rosso cupo e fiammeggiante, estratto nelle Isole dell'Estate."
  has_eye_gem_orange_tooltip:0 "#BOLD;COLOR:{1.00,0.44,0.00} Topazio#!, d'ambra splendente, che guizza come fuoco."
  has_eye_gem_yellow_tooltip:0 "#BOLD;COLOR:{0.89,0.84,0.10} Citrino#!, luminoso come il sole di mezzodì, vivido e radioso."
  has_eye_gem_green_tooltip:0 "#BOLD;COLOR:{0.12,0.3,0.18} Smeraldo#!, verde vibrante dalle profondità di Sothoryos."
  has_eye_gem_blue_tooltip:0 "#BOLD;COLOR:{0.28,0.52,0.9} Lapislazzuli#!, il limpido azzurro del Mare dell'Estate."
  has_eye_gem_dark_blue_tooltip:0 "#BOLD;COLOR:{0.11,0.20,0.8} Zaffiro#!, blu profondo come una scheggia di mezzanotte lucidata."
  has_eye_gem_purple_tooltip:0 "#BOLD;COLOR:{0.35,0.00,0.45} Ametista#!, un porpora intenso che richiama alla mente gli antichi signori dei draghi."
  has_eye_gem_black_tooltip:0 "#BOLD;COLOR:{0.35,0.35,0.35} Ossidiana#!, nota anche come vetro di drago, scura e riflettente."
  has_eye_gem_white_tooltip:0 "#BOLD;COLOR:{0.93,0.93,0.93} Diamante#!, limpido e brillante. Una scelta rara."

 # Wear the Mask
  agot_wear_the_mask_decision:0 "Indossare una maschera"
  agot_wear_the_mask_decision_tooltip:0 "Copri la tua sfigurazione con una maschera per celarla al mondo"
  agot_wear_the_mask_decision_desc:0 "Non riesco più a sopportare di vedermi in questo stato orrendo. Se i miei cortigiani non riescono a posare lo sguardo su di me senza ritrarsi, forse dovrei considerare di celare il mio volto."
  agot_wear_the_mask_decision_confirm:0 "Portatemi una maschera"

 # Remove the Mask
  agot_remove_the_mask_decision:0 "Rimuovere la maschera"
  agot_remove_the_mask_decision_tooltip:0 "Rimuovi la maschera e rivela la tua sfigurazione al mondo"
  agot_remove_the_mask_decision_desc:0 "Sono stanco di nascondermi dietro una maschera. Il mio volto è davvero così grottesco da doverlo celare al mondo?"
  agot_remove_the_mask_decision_confirm:0 "Che mi vedano"
