building_type_agot_westerland_silver_mines_01: 1 "Miniera d'Argento dell'Ovest"
building_type_agot_westerland_silver_mines_01_desc: 1 "Benché meno celebri delle miniere d'oro delle Terre dell'Ovest, le miniere d'argento della regione portano comunque grande ricchezza ai lord che le controllano."
