 # The Wall Special Buildings
  building_type_agot_the_wall_01:0 "La Barriera"
building_type_agot_the_wall_01_desc: 0 "Uno dei più grandi progetti eretti dall'uomo, la Bariera si innalza per 700 piedi e si estende per 300 miglia attraverso Westeros. Eretta da Brandon 'il Costruttore' e presidiata dalla Confraternita Giurata dei Guardiani della Notte, si erge quale bastione contro qualunque minaccia provenga da oltre il Nord."
  building_agot_the_wall_01:0 "$building_type_agot_the_wall_01$"
  building_agot_the_wall_01_desc:0 "$building_type_agot_the_wall_01_desc$"

  building_type_agot_castle_black_01:0 "$building_type_agot_the_wall_01$"
  building_type_agot_castle_black_01_desc:0 "$building_type_agot_the_wall_01_desc$"
  building_agot_castle_black_01:0 "Castello Nero"
  building_agot_castle_black_01_desc:0 "Il Castello Nero è la sede principale della Guardia della Notte, servendo come la dimora del Lord Comandante. È qui che l'Ordine riceve nuovi reclute, li addestra e giurano i loro voti."

  building_type_agot_eastwatch_01:0 "$building_type_agot_the_wall_01$"
  building_type_agot_eastwatch_01_desc:0 "$building_type_agot_the_wall_01_desc$"
  building_agot_eastwatch_01:0 "Eastwatch-by-the-Sea"
  building_agot_eastwatch_01_desc:0 "Il castello più orientale della Guardia della Notte, Eastwatch serve come l'unico porto della confraternita ed è fondamentale per portare cibo e merci a sostenere la Guardia."

  building_type_agot_shadow_tower_01:0 "$building_type_agot_the_wall_01$"
  building_type_agot_shadow_tower_01_desc:0 "$building_type_agot_the_wall_01_desc$"
  building_agot_shadow_tower_01:0 "Torre delle Ombre"
  building_agot_shadow_tower_01_desc:0 "Il secondo castello più occidentale della Guardia, la Torre delle Ombre serve a sorvegliare il Ponte delle Teschio."

building_type_agot_nightfort_01: 0 "Forte della Notte"
building_type_agot_nightfort_01_desc: 0 "Sede originaria dei Guardiani della Notte, il Forte della Notte fu un tempo dimora dei membri più grandi e più infami dell’ordine. Qui respinsero innumerevoli Re-oltre-la-Barriera, e da qui regnò il Re della Notte."
building_agot_nightfort_01: 0 "Il Cancello Nero"
building_agot_nightfort_01_desc: 0 "Nel profondo del Forte della Notte si trova il Cancello Nero, un antico passaggio risalente a ben prima che si conservassero registri scritti."

  building_type_agot_bridge_of_skulls_01:0 "$building_agot_bridge_of_skulls_01$"
  building_type_agot_bridge_of_skulls_01_desc:0 "$building_agot_bridge_of_skulls_01_desc$"
  building_agot_bridge_of_skulls_01:0 "Ponte delle Teschi"
  building_agot_bridge_of_skulls_01_desc:0 "Il Ponte delle Teschi attraversa il Burrone ed è l'unico modo per aggirare la Barriera via terra. È tuttavia sorvegliato da due castelli della Guardia della Notte: la Torre dell'Ombra e il ponte della Westwatch."

 # Crownlands Special Buildings
  building_type_the_red_keep_01:0 "La Fortezza Rossa"
  building_type_the_red_keep_01_desc:0 "La Fortezza Rossa è nel cuore dei Sette Regni. In cima alla Collina di Aegon, le sue mura e torri rosse vegliano su Approdo del Re. Da qui, il Signore dei Sette Regni governa dall'alto del Trono di Spade, forgiato dalle mille lame dei nemici caduti di Aegon."
  building_the_red_keep_01:0 "Il Forte di Aegon"
building_the_red_keep_01_desc: 0 "La fortezza di legno eretta da Aegon 'il Conquistatore' al suo sbarco, questo piccolo torrione funge da centro amministrativo per il giovane regno. Nonostante le sue modeste dimensioni, migliaia di persone si sono radunate fuori dalle sue mura, dando origine a una piccola città attorno ad esso."
  building_the_red_keep_02:0 "Forte di Maegor"
  building_the_red_keep_02_desc:0 "Per mostrare il potere e la maestosità della Casa Targaryen, il Forte di Aegon è stato rimosso per fare spazio a un imponente castello di pietra. Nel cuore di questo castello si trova il Forte di Maegor, un castello a sé stante, protetto da un fossato e un ponte, solide mura e torri, e attraversato da sale e tunnel segreti."
  building_the_red_keep_03:0 "$building_type_the_red_keep_01$"
  building_the_red_keep_03_desc:0 "$building_type_the_red_keep_01_desc$"

  building_type_seven_gates_01:0 "Le Sette Porte di Approdo del Re"
  building_type_seven_gates_01_desc:0 "Costruite per ordine del Re Aegon I da Ser Osmund Strong e il Gran Maestro Gawen, le mura di Approdo del Re sono dominate da sette imponenti porte: la Porta degli Dei, la Porta del Leone, la Porta del Fiume, la Porta Vecchia, la Porta di Ferro, la Porta del Re e la Porta del Drago."
  building_seven_gates_01:0 "$building_type_seven_gates_01$"
  building_seven_gates_01_desc:0 "$building_type_seven_gates_01_desc$"

  building_type_cobblers_square_01:0 "Piazza dei Calzolai"
  building_type_cobblers_square_01_desc:0 "La prima grande piazza arrivando dalla Porta degli Dei, la Piazza dei Calzolai prende il nome dai numerosi calzolai che la circondano, ma è nota anche per essere sede di coloro che predicano il dispiacere degli Dei verso il Trono di Spade."
  building_cobblers_square_01:0 "$building_type_cobblers_square_01$"
  building_cobblers_square_01_desc:0 "$building_type_cobblers_square_01_desc$"

  building_type_holy_site_great_sept_01:0 "Grande Tempio di Baelor"
  building_type_holy_site_great_sept_01_desc:0 "Il Grande Tempio di Baelor, con la sua cupola di marmo, è il tempio più prominente di Westeros, costruita dal suo omonimo; il Septon-Re. Serve come sede dell'Alto Septon e centro della Fede dei Sette."
  building_holy_site_great_sept_01:0 "$building_type_holy_site_great_sept_01$"
  building_holy_site_great_sept_01_desc:0 "$building_type_holy_site_great_sept_01_desc$"

  building_type_generic_great_sept_01:0 "Grande Tempio"
  building_type_generic_great_sept_01_desc:0 "Il Grande Tempio con cupola di marmo è il tempio più importante di Westeros, costruito per dimostrare la dedizione e il supporto del Trono di Spade alla Fede. Serve come sede del Grande Septon e centro della Fede dei Sette."
  building_generic_great_sept_01:0 "$building_type_generic_great_sept_01$"
  building_generic_great_sept_01_desc:0 "$building_type_generic_great_sept_01_desc$"

building_type_agot_sept_of_remembrance_01: 0 "Tempio del Ricordo"
building_type_agot_sept_of_remembrance_01_desc: 0 "Il Tempio del Ricordo fu eretto sulla Collina di Rhaenys dopo la morte dell'amata regina. Fu il centro della Fede nella capitale e una roccaforte della Fede Militante."
 building_agot_sept_of_remembrance_01:0 "$building_type_agot_sept_of_remembrance_01$"
 building_agot_sept_of_remembrance_01_desc:0 "$building_type_agot_sept_of_remembrance_01_desc$"

  building_type_dragonpit_01:0 "Recinto dei Draghi"
building_type_dragonpit_01_desc: 0 "La grande scuderia dei draghi, la Fossa del Drago fu costruita dopo l'incendio del Tempio del Ricordo da parte di Maegor 'il Crudele', e completata durante il regno di Re Jaehaerys I."
  building_dragonpit_01:0 "Tempio di Remembrance" #controllare_modifica
  building_dragonpit_01_desc:0 "Il Tempio di Remembrance fu eretta sulla Collina di Rhaenys dopo la morte della regina amata. Era il centro della Fede nella capitale e una roccaforte dei Militanti della Fede." #controllare_modifica
building_dragonpit_02: 0 "Rovine del Tempio del Ricordo"
building_dragonpit_02_desc: 0 "Ridotto in rovina dalla furia di Maegor, il Tempio del Ricordo si erge sulla Collina di Rhaenys quale cupo monito del destino che attende coloro che osano sfidare un signore dei draghi."
 building_dragonpit_03:0 "$building_type_dragonpit_01$"
 building_dragonpit_03_desc:0 "$building_type_dragonpit_01_desc$"

  building_type_dragonpit_ruins_01:0 "Rovine del Recinto dei Draghi"
building_type_dragonpit_ruins_01_desc: 0 "Usata come luogo per eventi che vanno dalle incoronazioni alle esecuzioni, la Fossa del Drago fu concepita da Re Maegor quale grande stalla destinata a ospitare i draghi. Durante la sommossa di Approdo del Re, un profeta noto come il Pastore e le sue migliaia di seguaci presero d'assalto la Fossa del Drago, causando la morte di cinque draghi e di innumerevoli rivoltosi. Ora essa funge da severo monito dei tempi passati."
  building_dragonpit_ruins_01:0 "$building_dragonpit_01$"
  building_dragonpit_ruins_01_desc:0 "$building_dragonpit_01_desc$"
  building_dragonpit_ruins_02:0 "$building_type_dragonpit_01$"
  building_dragonpit_ruins_02_desc:0 "$building_type_dragonpit_ruins_01_desc$"
  building_dragonpit_ruins_03:0 "Il Recinto dei Draghi Restaurato"
  building_dragonpit_ruins_03_desc:0 "Restaurato ancora una volta, la grande cupola del Recinto dei Draghi è ora ricostruita e pronta a ospitare i suoi abitanti volanti."

  building_type_dragonstone_01:0 "Roccia del Drago "
  building_type_dragonstone_01_desc:0 "Roccia del Drago  era l'avamposto occidentale del Dominio di Valyria e, dopo la Rovina, il rifugio della Casa Targaryen. È costruito con pietra nera fusa che i Signori dei Draghi usavano nelle loro costruzioni più significative. Le sue torri non sono le torri quadrate dei Primi Uomini, quelle arrotondate degli Andali o nemmeno le alte cupole dei Rhoynar; sono formate nelle forme dei draghi."
  building_dragonstone_01:0 "$building_type_dragonstone_01$"
  building_dragonstone_01_desc:0 "$building_type_dragonstone_01_desc$"

  building_type_agot_claw_isle_01:0 "Isola dell'Artiglio"
  building_type_agot_claw_isle_01_desc:0 "Sede tradizionale di Casa Celtigar, Isola dell'Artiglio non è grande come le vicine Driftmark o Roccia del Drago. Tuttavia, offre un facile accesso a Crackclaw Point , con grande orrore dei Crackclaw."
  building_agot_claw_isle_01:0 "La baia del tesoro del granchio"
  building_agot_claw_isle_01_desc:0 "Sebbene l'Isola dell'Artiglio non sia ben posizionata come Driftmark e Roccia del Drago, la Casa Celtigar ha cercato a lungo di proteggere e far crescere il proprio potere economico, spesso a spese dei vicini Crackclaws. E così hanno creato un grande tesoro."

  building_type_agot_whispers_01:0 "I Sussurri"
  building_type_agot_whispers_01_desc:0 "L'antica roccaforte del leggendario Ser Clarence Crabb, ora consumata dal Boschetto degli Dei circostante. Ser Clarence raccoglieva le teste di pirati, signori, stregoni, cavalieri e persino di un re e le dava a sua moglie. Alcuni dicono che i sussurri delle sue vittime possano ancora essere uditi sulle mura in rovina dove le teste decapitate un tempo si ergevano orgogliosamente su picche."
building_agot_whispers_01: 0 "Le Rovine dei Sussurri"
  building_agot_whispers_01_desc:0 "Un antico castello, ora consumato dal boschetto degli dei, alcuni dicono che i sussurri delle vittime di Ser Clarence possano ancora essere uditi, soprattutto sulle mura decapitate dove le teste un tempo stavano su picche." #controllare_modifica
building_agot_whispers_02: 0 "Le Sussurra Ricostruite"
building_agot_whispers_02_desc: 0 "L'antica fortezza di Ser Clarence Crabb è ora riportata al suo massimo splendore. I sussurri dei morti si odono ancora, e le picche restano affilate per future decorazioni."

  building_type_agot_stonedance_01:0 "Stonedance"
  building_type_agot_stonedance_01_desc:0 "La sede tradizionale della Casa Massey dopo che furono scacciati dai Darklyn e da altri re minori intorno al Blackwater Rush."
  building_agot_stonedance_01:0 "Porto di Milk-Eye"
building_agot_stonedance_01_desc: 0 "Justin Massey, noto come 'Occhio di Latte', fu un famigerato Re Pirata che respinse i Re della Tempesta Durrandon e razziò qualunque traffico lungo il Mare Stretto e la Baia delle Acque Nere."

  building_type_agot_duskendale_01:0 "Duskendale"
  building_type_agot_duskendale_01_desc:0 "La casa ancestrale della Casa Darklyn, dove governavano come re minori."
  building_agot_duskendale_01:0 "Sala delle Spade Bianche"
building_agot_duskendale_01_desc: 0 "Casa Darklyn fornì membri alla Guardia Reale fin dai primi giorni dell'ordine, e ciò è sempre stato una grande fonte d'orgoglio per la casata."

building_type_agot_flea_bottom_01: 0 "Flea Bottom"
building_type_agot_flea_bottom_01_desc: 0 "La zona più famigerata di Approdo del Re, Flea Bottom è un labirinto di case e strade strette, infestato da povertà e crimine. Qui si radunano i poveri della città, trovando conforto in bettole, bordelli, bische e ciotole di brodaglia marrone."
 building_agot_flea_bottom_01:0 "$building_type_agot_flea_bottom_01$"
 building_agot_flea_bottom_01_desc:0 "$building_type_agot_flea_bottom_01_desc$"

  building_type_agot_dragonmont_01:0 "Monte del Drago"
  building_type_agot_dragonmont_01_desc:0 "Il Monte del Drago è il grande vulcano che domina l'isola di Roccia del Drago. Nei giorni antichi molti draghi si affollavano per nidificare nelle caverne riscaldate o nelle formazioni rocciose appena raffreddate."
  building_agot_dragonmont_01:0 "Monte del Drago" #controllare_modifica
  building_agot_dragonmont_01_desc:0 "Il Monte del Drago è il grande vulcano che domina l'isola di Roccia del Drago. Nei giorni antichi molti draghi si affollavano per nidificare nelle caverne riscaldate o nelle formazioni rocciose appena raffreddate." #controllare_modifica

  building_type_agot_spicetown_01:0 "Spicetown"
  building_type_agot_spicetown_01_desc:0 "Una volta il cuore di Driftmark, Spicetown era seconda solo ad Approdo del Re come principale porto della Baia delle Acque Nere."
  building_agot_spicetown_01:0 "Porto del Serpente del Mare"
  building_agot_spicetown_01_desc:0 "Sotto Corlys Velaryon il porto di Spicetown superò Duskendale e tutti gli altri porti della Baia delle Acque Nere, escluso Approdo del Re. Navi provenienti da tutta Westeros, dalle Città Libere e persino dalle Porte di Giada possono essere trovate lì."
  building_type_agot_ruins_spicetown_01:0 "Spicetown" #controllare_modifica
  building_type_agot_ruins_spicetown_01_desc:0 "Una volta il cuore di Driftmark, Spicetown era seconda solo ad Approdo del Re come principale porto della Baia delle Acque Nere." #controllare_modifica
  building_agot_ruins_spicetown_01:0 "Rovine di Spicetown"
  building_agot_ruins_spicetown_01_desc:0 "Durante la Danza dei Draghi, la Triarchia, vecchi nemici di Corlys, saccheggiò il porto e la vicina Marea Alta a nome dei Verdi; Spicetown giace in rovina da allora."
  building_agot_ruins_spicetown_02:0 "Il Porto Restaurato"
  building_agot_ruins_spicetown_02_desc:0 "Ricostruito alla sua antica grandezza, Spicetown è nuovamente il grande porto di Driftmark."

  building_type_agot_hightide_01:0 "Alta Marea"
  building_type_agot_hightide_01_desc:0 "La nuova sede della Casa Velaryon, da qui il Signore delle Maree porterà prosperità a Driftmark."
  building_agot_hightide_01:0 "Sala delle Maree"
  building_agot_hightide_01_desc:0 "Quando la Casa Velaryon trasferì la propria sede, non badò a spese. Tetti di argento battuto, alte torri e una sala grandiosa quanto qualsiasi altra nel regno. Nessuno può dubitare della prosperità di Driftmark e dei suoi padroni dopo averla vista."
  building_type_agot_ruins_hightide_01:0 "Alta Marea"
  building_type_agot_ruins_hightide_01_desc:0 "L'altra sede della Casa Velaryon su Driftmark, costruita da Corlys Velaryon, fu distrutta dalla Triarchia durante la Danza."
  building_agot_ruins_hightide_01:0 "Rovine di Alta Marea"
  building_agot_ruins_hightide_01_desc:0 "Con la Battaglia della Gola, la Triarchia cercò la sua vendetta contro la Casa Velaryon e il suo signore Corlys. Spicetown fu bruciata e le grandi torri e i tetti d'argento di Alta Marea furono abbattuti e distrutti. Oggi le rovine restano come testimonianza della caduta della Casa Velaryon dalle sue antiche glorie."
  building_agot_ruins_hightide_02:0 "Sala delle Maree Ricostruita"
  building_agot_ruins_hightide_02_desc:0 "Ricostruita nuovamente nella sua antica grandezza, la Sala delle Maree è ancora una meraviglia della Casa Velaryon. I tetti d'argento di Alta Marea, le alte torri e la grande sala mostrano di nuovo a tutti la grandiosità di Driftmark."

  building_type_agot_driftmark_01:0 "Driftmark"
  building_type_agot_driftmark_01_desc:0 "La sede ancestrale della Casa Velaryon: è da qui che il Signore delle Maree tramò il suo potere e condusse la casata alla gloria."
  building_agot_driftmark_01:0 "Il Patto del Re dei Tritoni"
  building_agot_driftmark_01_desc:0 "Quando gli avi della Casa Velaryon sbarcarono per la prima volta a Westeros, non avevano nulla: né nome, né terre, né ricchezze. Eppure il Re dei Tritoni ne percepì la grandezza e stipulò con loro un patto, donando loro il Trono di Legno, l’Isola di Driftmark e il titolo di Signore delle Maree. Da quel patto la Casa Velaryon crebbe fino a diventare una delle più illustri stirpi di sangue valyriano, seconda solo ai signori dei draghi stessi."

  building_type_agot_rooks_rest_01:0 "Rook's Rest"
building_type_agot_rooks_rest_01_desc: 0 "La sede ancestrale di Casa Staunton, Riposo del Corvo è sempre stata una guardia delle terre più civilizzate contro i malvagi uomini delle paludi dell'Artiglio."
  building_agot_rooks_rest_01:0 "Resti Carbonizzati"
building_agot_rooks_rest_01_desc: 0 "La Danza fu probabilmente la guerra più brutale nella storia del Trono di Spade. Vide la morte di draghi, consanguinei e re, e la Battaglia di Riposo del Corvo fu una delle più spietate. Alla fine, Aegon II e Sunfyre rimasero storpiati e deformi, mentre Rhaenys 'la Regina Che Non Fu Mai' e Meleys 'la Regina Rossa' erano morte, i loro corpi spezzati e carbonizzati. Mentre la testa di Meleys fu riportata ad Approdo del Re, il suo corpo giace a tutt'oggi fuori dal castello."

building_type_agot_sharp_point_beacon_01: 0 "Punta Acuminata"
building_type_agot_sharp_point_beacon_01_desc: 0 "Sede di Casa Bar Emmon, Punta Acuminata sorge all'estremità dell'Uncino di Massey lungo il Gorgo."
building_agot_sharp_point_beacon_01: 0 "Il Faro di Punta Acuminata"
building_agot_sharp_point_beacon_01_desc: 0 "Il Faro di Punta Acuminata è il più grande faro lungo la Costa di Massey e il Gorgo, nonché la sede ancestrale di Casa Bar Emmon. Guidando centinaia di navi verso la salvezza, molti marinai e capitani offrono contributi ai Lord di Punta Acuminata affinché il faro in cima resti acceso e la rotta rimanga illuminata e sicura da navigare."

building_type_agot_old_stone_bridge_01: 0 "Locanda del Vecchio Ponte di Pietra"
building_type_agot_old_stone_bridge_01_desc: 0 "Il Vecchio Ponte di Pietra è una locanda adagiata tra le pianure a nord di Approdo del Re, lungo la strada tra Rosby e Duskendale. È spesso la prima sosta nei viaggi di tutti coloro che cercano un percorso comodo dalla porta più nordorientale della capitale."
 building_agot_old_stone_bridge_01:0 "$building_type_agot_old_stone_bridge_01$"
 building_agot_old_stone_bridge_01_desc:0 "$building_type_agot_old_stone_bridge_01_desc$"

 # Reach Special Buildings
  building_type_highgarden_01:0 "Alto Giardino"
building_type_highgarden_01_desc: 0 "Il pittoresco castello di Alto Giardino servì dapprima come sede di Casa Gardener e poi di Casa Tyrell. Da lungo tempo è celebre per la bellezza del suo tempio e dei suoi giardini, nonché come dimora di artisti e musicisti."
building_highgarden_01: 0 "Collina di Garth"
building_highgarden_01_desc: 0 "Costruito sopra una collina che domina la Mander, Alto Giardino fu fondato da Garth il Giardiniere, figlio primogenito di Garth Manoverde, che piantò i Tre Cantori e il trono vivente del Seggio di Quercia."
building_highgarden_02: 0 "Cortina di Mern"
building_highgarden_02_desc: 0 "Costruita per ordine di Mern II durante le invasioni andale, la cortina muraria era destinata a offrire una migliore protezione a Casa Gardener e oggi costituisce la più interna delle tre mura del castello."
building_highgarden_03: 0 "Tempio del Nono"
building_highgarden_03_desc: 0 "Costruito e intitolato a Garth IX, il tempio di Alto Giardino si dice sia superato soltanto dalla sede dell'Alto Septon. Vetrate istoriate raffiguranti i Sette e Garth il Verde ornano le sue bianche pareti."
building_highgarden_04: 0 "Labirinto di Rovi"
building_highgarden_04_desc: 0 "Cresciuto tra le mura esterne e quelle mediane di Alto Giardino, il Labirinto di Rovi serve sia da svago per cortigiani e ospiti, sia da misura difensiva per rallentare le forze invasori."
building_highgarden_05: 0 "Torrione Palaziale"
 building_highgarden_05_desc:0 "$building_type_highgarden_01_desc$"

  building_type_the_hightower_01:0 "L'Alta Torre"
  building_type_the_hightower_01_desc:0 "L'Alta Torre di Vecchia Città si erge su un'antica fortezza di pietra nera sull'Isola della Battaglia, conferendole già un'ampia protezione. La torre stessa è alta di diverse centinaia di piedi, con ogni livello dotato di mura e torrette proprie, e sulla cima c'è un grande faro che dà il benvenuto a tutti nel suo porto."
  building_the_hightower_01:0 "$building_type_the_hightower_01$"
  building_the_hightower_01_desc:0 "$building_type_the_hightower_01_desc$"

  building_type_holy_site_starry_sept_01:0 "Tempio Stellato"
  building_type_holy_site_starry_sept_01_desc:0 "Il Tempio Stellato è uno dei più grandi templi di tutta Westeros. Una volta casa dell'Alto Septon, è ancora uno dei luoghi più sacri per i fedeli."
  building_holy_site_starry_sept_01:0 "$building_type_holy_site_starry_sept_01$"
  building_holy_site_starry_sept_01_desc:0 "$building_type_holy_site_starry_sept_01_desc$"

  building_type_the_citadel_01:0 "La Cittadella"
  building_type_the_citadel_01_desc:0 "La Cittadella è il centro della conoscenza e dell'apprendimento in Westeros. È qui che i maestri si allenano e studiano. Il complesso edilizio contiene moli, un corvoio e una delle più grandi biblioteche del mondo conosciuto."
  building_the_citadel_01:0 "L'Isola dei Corvi"
  building_the_citadel_01_desc:0 "Un'antica roccaforte dei pirati, l'Isola dei Corvi è ora sede del Corvoio della Cittadella dove sono custoditi i numerosi corvi."
  building_the_citadel_02:0 "$building_type_the_citadel_01$"
  building_the_citadel_02_desc:0 "$building_type_the_citadel_01_desc$"

building_type_agot_port_of_oldtown_01: 0 "VecchiaCitta"
building_type_agot_port_of_oldtown_01_desc: 0 "La più grande città di Westeros, e la più antica, VecchiaCitta è un faro sotto ogni aspetto. Dimora della Fede, della Cittadella e dell’Alta Torre, è un gioiello per qualunque regno."
building_agot_port_of_oldtown_01: 0 "Porto di Lymond"
building_agot_port_of_oldtown_01_desc: 0 "Benché Vecchia Città sia sempre stata un porto di grande importanza, i suoi moli e i suoi attracchi furono rivoluzionati da Lymond 'il Leone Marino' Hightower, che portò la forza di Vecchia Città sulle onde."

building_type_agot_chequered_square_01: 0 "VecchiaCitta"
building_type_agot_chequered_square_01_desc: 0 "La più grande città di Westeros, e la più antica, VecchiaCitta è un faro sotto ogni aspetto. Dimora della Fede, della Cittadella e dell’Alta Torre, è un gioiello per qualunque regno."
building_agot_chequered_square_01: 0 "Piazza a Scacchi"
building_agot_chequered_square_01_desc: 0 "VecchiaCitta conta molti mercati e botteghe, ma la Piazza a Scacchi è la più celebre. Qui si trovano merci provenienti dai Mari del Tramonto, dell’Estate, Stretto e persino di Giada, poiché VecchiaCitta attira mercanti da ogni acqua del mondo."

  building_type_agot_oldtown_walls_01:0 "Mura di Vecchia Città"
  building_type_agot_oldtown_walls_01_desc:0 "Le grandi mura di pietra di Vecchia Città si ergono alte e hanno protetto la città fin dai tempi prima che gli Hightower giurassero fedeltà ai Gardeners."
  building_agot_oldtown_walls_01:0 "Mura di Otho II"
building_agot_oldtown_walls_01_desc: 0 "Erette da Otho II, le imponenti mura di pietra furono costruite dopo che la città fu saccheggiata tre volte in un secolo: prima da Samwell 'Fuocostellare' Dayne, poi da Qhored 'il Crudele' Hoare degli Uomini di Ferro, e infine da Gyles 'il Dolente' Gardener."

  building_type_agot_seven_shrines_01:0 "I Sette Santuari"
  building_type_agot_seven_shrines_01_desc:0 "Famosi per i giardini che li circondano, i Sette Santuari sono dedicati a ciascun aspetto dell'Uno e accolgono tutti."
  building_agot_seven_shrines_01:0 "I Sette Santuari" #controllare_modifica
  building_agot_seven_shrines_01_desc:0 "Famosi per i giardini che li circondano, i Sette Santuari sono dedicati a ciascun aspetto dell'Uno e accolgono tutti." #controllare_modifica

  building_type_agot_goldengrove_01:0 "Boschetto Dorato"
building_type_agot_goldengrove_01_desc: 0 "La dimora ancestrale di Casa Rowan, che fa risalire la propria discendenza a Rowan Alberodorato."
  building_agot_goldengrove_01:0 "Ramo di Rowan"
  building_agot_goldengrove_01_desc:0 "L'antico albero che si diceva portasse mele d'oro ancora sta in piedi, da tempo morto, eppure impressionante allo stesso tempo."

  building_type_agot_bitterbridge_01:0 "Il Ponte"
  building_type_agot_bitterbridge_01_desc:0 "L'antico ponte della Casa Caswell che attraversa il Mander."
  building_agot_bitterbridge_01:0 "Il Ponte di Pietra"
  building_agot_bitterbridge_01_desc:0 "Il Ponte di Pietra della Casa Caswell è da lungo tempo un punto focale economico, essendo il principale modo per attraversare il Mander se non si desidera utilizzare barche."
  building_agot_bitterbridge_02:0 "Pontedolce"
  building_agot_bitterbridge_02_desc:0 "Nella Rivolta dei Militanti della Fede, la Battaglia del Ponte di Pietra fu così terribile che il Mander scorreva rosso di sangue, e le inimicizie create quel giorno fecero sì che tutti coloro che vi combatterono si riferissero al ponte con un nuovo nome; il Pontedolce."

  building_type_agot_red_lake_01:0 "Lago Rosso"
  building_type_agot_red_lake_01_desc:0 "La dimora della Casa Crane nel Nord della Terra."
  building_agot_red_lake_01:0 "Resti dei Giganti della Terra"
  building_agot_red_lake_01_desc:0 "Gli antichi resti degli ultimi Giganti della Terra possono ancora essere visti lungo la riva del Lago Rosso. Fu qui che Brandon della Lama Insanguinata li sconfisse."
building_agot_red_lake_02: 0 "La Fortezza Sanguinosa"
building_agot_red_lake_02_desc: 0 "Ampliato, Lago Rosso ospita ora la Fortezza Sanguinosa. Costruita per essere solida e formidabile, custodisce le antiche ossa dei giganti che un tempo giacevano sparse lungo la riva."

  building_type_agot_tumbleton_01:0 "Tumbleton"
  building_type_agot_tumbleton_01_desc:0 "Luogo di diverse battaglie nella Danza dei Draghi, Tumbleton si è lentamente ripreso nel corso degli anni per tornare alla sua antica gloria."
  building_agot_tumbleton_01:0 "Le Ossa di Vermithor e Seasmoke"
  building_agot_tumbleton_01_desc:0 "Dopo la seconda Battaglia di Tumbleton, i resti di Vermithor e Seasmoke rimangono fuori dalla città, e molte persone nel corso degli anni hanno fatto visita ai resti di queste grandi bestie. Questo ha portato più visitatori alla città, contribuendo alla sua rinascita."

  building_type_agot_cider_hall_01:0 "Sala del Sidro"
  building_type_agot_cider_hall_01_desc:0 "La sede tradizionale della Casa Fossoway, un tempo dimora di Foss l'Arciere."
  building_agot_cider_hall_01:0 "La sidreria 'Arco e Mela'"
  building_agot_cider_hall_01_desc:0 "Famoso in tutto il Westeros per l'abilità dei suoi progenitori con l'arco, è soprattutto per la produzione di sidro di mele che ha arricchito Sala del Sidro."

  building_type_agot_starpike_01:0 "Starpike"
building_type_agot_starpike_01_desc: 0 "La prima, e più grande, delle tre fortezze di Casa Peake, Starpike sorge nelle Terre Basse di Dorne come testimonianza della longevità e della tenacia della casata."
building_agot_starpike_01: 0 "Solar di Lorimar"
  building_agot_starpike_01_desc:0 "La Casa Peake ha numerosi antenati famosi, ma fu Lorimar Peake a portare la casa al suo massimo splendore. Fu lui a scacciare i loro antichi rivali della Casa Manderly dalla Reach e, così facendo, ottenne non solo il loro terzo castello, Dunstonbury, ma avvicinò la casa alla Casa Gardener, i loro signori feudali."

  building_type_agot_redwyne_port_01:0 "Arbor"
  building_type_agot_redwyne_port_01_desc:0 "Dimora della Casa Redwyne, Arbor è famosa per i suoi vini e flotte."
  building_agot_redwyne_port_01:0 "Ancoraggio Redwyne"
building_agot_redwyne_port_01_desc: 0 "La Flotta Redwyne è celebre in tutto Westeros come una delle più forti dell'ovest, e ha la propria dimora a Porto Ryams. In tempo di pace serve ad ampliare la portata economica della casata regnante, e in guerra funge da mura di legno che proteggono le isole."

  building_type_agot_witchs_wood_01:0 "Horn Hill"
building_type_agot_witchs_wood_01_desc: 0 "La dimora ancestrale di Casa Tarly, Collina del Corno fu edificata dai fratelli gemelli Herndon del Corno e Harlon il Cacciatore, figli di Garth 'il Verde'."
  building_agot_witchs_wood_01:0 "Il Bosco della Strega"
building_agot_witchs_wood_01_desc: 0 "Si dice che i fratelli Harlon il Cacciatore e Herndon del Corno sposarono entrambi la stessa donna, un'infame strega dei boschi, la quale giaceva con entrambi i fratelli nel bosco presso Collina del Corno sotto la luna piena, donando a entrambi giovinezza e vigore."

  building_type_agot_ashford_tourney_grounds_01:0 "Ashford"
building_type_agot_ashford_tourney_grounds_01_desc: 0 "La dimora ancestrale di Casa Ashford sul Cockleswhent."
  building_agot_ashford_tourney_grounds_01:0 "Campo del Torneo di Ashford"
  building_agot_ashford_tourney_grounds_01_desc:0 "I campi da torneo di Ashford si trovano oltre il Cockleswhent, nel Prato di Ashford, una grande distesa erbosa che offre un'ottima location per raduni sia di popolani che di nobili."

  building_type_agot_brightwater_moat_01:0 "Rocca d'Acque Chiare"
  building_type_agot_brightwater_moat_01_desc:0 "L'antica dimora della Casa Florent, la progenie più anziana di Florys la Volpe."
  building_agot_brightwater_moat_01:0 "Fossato d'Acque Chiare"
  building_agot_brightwater_moat_01_desc:0 "Vicino alle sorgenti dell'Honeywine, Rocca d'Acque Chiare utilizza il fiume per creare un grande fossato a protezione della rocca. Non è grandioso o famoso come il fossato di Delta delle Acque, ma protegge comunque bene il castello."

  building_type_agot_mermaids_palace_01:0 "Palazzo delle Sirene"
  building_type_agot_mermaids_palace_01_desc:0 "L’Arbor e le isole circostanti son sempre state terre di abbondanza, che attirano genti da ogni angolo del mondo. Se alle leggende si dà fede, persino i metamorfi del mare vi si avvicinarono. Sulla seconda isola per vastità si narra che le sirene edificarono un sontuoso palazzo, richiamando a sé coloro disposti a cantar loro dolci lodi da ogni reame degli uomini."
  building_agot_mermaids_palace_01:0 "$building_type_agot_mermaids_palace_01$"
  building_agot_mermaids_palace_01_desc:0 "$building_type_agot_mermaids_palace_01_desc$"

building_type_agot_merryweather_vaults_01: 0 "Lungatavola"
building_type_agot_merryweather_vaults_01_desc: 0 "Sede di Casa Merryweather, Lungatavola è ben nota per l'abbondanza e la fertilità dei suoi campi."
building_agot_merryweather_vaults_01: 0 "Volte dei Merryweather"
building_agot_merryweather_vaults_01_desc: 0 "Per secoli, Casa Merryweather ha mantenuto le Volte dei Merryweather, una serie di granai fortificati, silos e masserie concepiti per conservare a lungo i raccolti delle città, dei villaggi e delle fortezze circostanti. Essendo la regione più fertile dell'Altopiano, Pienraccolto ha il compito di riempire il tesoro di guerra di Alto Giardino non d'oro, bensì di grano e carni salate, per sostenere anche le campagne più lunghe."

building_type_agot_grassfield_florestries_01: 0 "Valle Erbosa"
building_type_agot_grassfield_florestries_01_desc: 0 "Casa Meadows, ritenuta una delle casate più eleganti dell'Altopiano, spesso sponsorizza e offre patronato a giardinieri e fioristi emergenti provenienti da tutto l'Altopiano e dalle Terre della Tempesta."
building_agot_grassfield_florestries_01: 0 "Fioristi di Grassfield"
building_agot_grassfield_florestries_01_desc: 0 "Le opere dei Fioristi di Grassfield, ghirlande, mazzi e composizioni, si possono ammirare da Capo Tempesta a Roccia del Castigo fino all'Aquilaia. Superati soltanto dagli artigiani di Alto Giardino, i fioristi di Grassfield si sono costruiti una buona fortuna, e Casa Meadows ne raccoglie i frutti."

building_type_agot_honeyholt_apiaries_01: 0 "Dolcemiele"
building_type_agot_honeyholt_apiaries_01_desc: 0 "Dimora ancestrale di Casa Beesbury, Dolcemiele è celebre per l'abbondanza del suo miele e per l'indole mite delle api che vi si trovano."
building_agot_honeyholt_apiaries_01: 0 "La Capitale del Miele di Westeros"
building_agot_honeyholt_apiaries_01_desc: 0 "Ciò che iniziò come un passatempo prediletto dei lord e delle lady di Casa Beesbury è fiorito, col passare degli anni, in un'operazione industriale a tutti gli effetti. Mercanti, apicoltori e lavoranti operano senza sosta nel nord del dominio di Vecchia Città, producendo il dorato miele di Dolcemiele ed esportandolo in ogni angolo del mondo."

building_type_agot_sept_at_holyhall_01: 0 "Sala Santa"
building_type_agot_sept_at_holyhall_01_desc: 0 "Dimora ancestrale di Casa Graceford, Sala Santa è un bastione dei fedeli."
building_agot_sept_at_holyhall_01: 0 "Il Tempio di Sala Santa"
building_agot_sept_at_holyhall_01_desc: 0 "Uno dei più grandi templi privati dei Sette Regni, il Tempio di Sala Santa, sede ancestrale della devota Casa Graceford, serve fedelmente lord, lady e casate di Sala Santa da centinaia di anni."

building_type_agot_oakenshield_bastion_01: 0 "Querciascudo"
building_type_agot_oakenshield_bastion_01_desc: 0 "Sede ancestrale di Casa Hewett, che custodisce Querciascudo e la Mander sin dai tempi di Garth 'Manodoro'."
building_agot_oakenshield_bastion_01: 0 "Bastione della Mander"
building_agot_oakenshield_bastion_01_desc: 0 "Il più grande e formidabile castello delle Isole Scudo, Querciascudo funge da sede ancestrale di Casa Hewett. Con imponenti terrapieni, un cantiere navale per servire una piccola flottiglia costiera, spesse mura di pietra e armi d'assedio annesse, il Bastione della Mander è la prima linea di difesa contro qualunque nemico costiero."

building_type_agot_old_oak_01: 0 "Vecchia Quercia"
building_type_agot_old_oak_01_desc: 0 "Dimora di Casa Oakheart, Vecchia Quercia è da lungo tempo un bastione della cavalleria."
building_agot_old_oak_01: 0 "Cuore della Quercia"
building_agot_old_oak_01_desc: 0 "Vecchia Quercia è la sede ancestrale di Casa Oakheart, un'antica e potente casata dell'Altopiano fondata da John la Quercia, uno dei figli del leggendario Garth 'il Verde'."

building_type_agot_the_ring_01: 0 "L'Anello"
building_type_agot_the_ring_01_desc: 0 "La sede ancestrale di Casa Roxton."
 building_agot_the_ring_01:0 "$building_type_agot_the_ring_01$"
building_agot_the_ring_01_desc: 0 "Benché l'Anello sia da lungo tempo la sede ancestrale di Casa Roxton, le sue origini risalgono ben oltre la storia tramandata, prima degli annali della Cittadella e perfino dei racconti dei Primi Uomini. Le sue mura, che danno il nome al castello, formano un possente anello di pietra, privo di torri eppure mortale per molti di coloro che hanno cercato di prenderlo."

building_type_agot_dunnsbridge_01: 0 "Scudorosato"
building_type_agot_dunnsbridge_01_desc: 0 "La sede ancestrale di Casa Dunn."
building_agot_dunnsbridge_01: 0 "Il Ponte dei Dunn"
building_agot_dunnsbridge_01_desc: 0 "Originariamente costruito da Casa Dunn, il Ponte dei Dunn sorge presso il castello di Scudorosato, garantendo ai suoi lord il controllo del fiume e dei traffici che scorrono dalle colline delle Montagne Rosse fino al porto di Cuy."

 # Riverlands Special Buildings
  building_type_riverrun_01:0 "Delta delle Acque"
  building_type_riverrun_01_desc:0 "Il castello di Delta delle Acque non è particolarmente grande, ma ha una posizione strategica alla confluenza del fiume Tumblestone e del Red Fork. I fiumi circondano due dei tre lati del castello, e il terzo è protetto da un ampio fossato che può essere allagato per lasciare il castello un'isola."
  building_riverrun_01:0 "$building_type_riverrun_01$"
  building_riverrun_01_desc:0 "$building_type_riverrun_01_desc$"

  building_type_the_twins_01:0 "Torri Gemelle"
building_type_the_twins_01_desc: 0 "Le Torri Gemelle, o l'Attraversamento, sono la sede ancestrale di Casa Frey. Giustamente chiamato in entrambi i modi, il castello è definito da una coppia di torrioni gemelli sui lati opposti della Forca Verde, uniti da un grande ponte di pietra. È ben fortificato, con fossati che circondano ciascuno dei due torrioni, trasformandoli in isole entro il fiume."
  building_the_twins_01:0 "$building_type_the_twins_01$"
  building_the_twins_01_desc:0 "$building_type_the_twins_01_desc$"

  building_type_generic_harrenhal_01:0 "Il Castello Nero"
  building_type_generic_harrenhal_01_desc:0 "Per dimostrare la potenza e l’unità delle Terre dei Fiumi, è stato innalzato un nuovo castello — una maestosa roccaforte — capace di rivaleggiare con l’Eyrie, Casterly Rock e Storm’s End. Le sue mura si stagliano più alte di ogni altra, il suo bosco sacro è più vasto di quello di molti castelli, e le sue imponenti torri nere incutono terrore in chiunque osi assediarlo."
  building_generic_harrenhal_01:0 "$building_type_generic_harrenhal_01$"
  building_generic_harrenhal_01_desc:0 "$building_type_generic_harrenhal_01_desc$"

  building_type_harrenhal_01:0 "Harrenhal"
  building_type_harrenhal_01_desc:0 "Il castello della Casa Hoare, Harrenhal si erge come una testimonianza della dinastia di Harren il Nero e dei suoi Uomini di Ferro sui Fiumi. Considerato il più grande castello di Westeros, sebbene ciò sia contestato da coloro che si trovano nei Westerlands, è una chiara dichiarazione del controllo e della prominenza degli Hoare non solo sul loro dominio, ma anche sulle terre circostanti."
  building_harrenhal_01:0 "$building_type_harrenhal_01$"
  building_harrenhal_01_desc:0 "$building_type_harrenhal_01_desc$"

  building_type_ruins_harrenhal_01:0 "Harrenhal"
building_type_ruins_harrenhal_01_desc: 0 "Quando Harren 'il Nero' rifiutò di piegare il ginocchio dinanzi ad Aegon 'il Conquistatore', condannò non soltanto sé stesso e la sua casata, ma anche la sua grande fortezza. Oggi Harrenhal giace in rovina, con la pietra fusa e arsa. Eppure, persino in rovina, Harrenhal resta una tenuta impressionante e possente."
  building_ruins_harrenhal_01:0 "$building_type_ruins_harrenhal_01$"
  building_ruins_harrenhal_01_desc:0 "$building_type_ruins_harrenhal_01_desc$"
  building_ruins_harrenhal_02:0 "Torre del Terrore Ricostruita"
  building_ruins_harrenhal_02_desc:0 "La Torre del Terrore ha servito come sede del signore, una prigione per nobili prigionieri e tutto ciò che sta in mezzo. È un luogo appropriato per iniziare il ripristino delle torri di Harrenhal."
  building_ruins_harrenhal_03:0 "Torre dei Lamenti Ricostruita"
  building_ruins_harrenhal_03_desc:0 "Per soddisfare le esigenze di un castello rinnovato, le stanze e i granai esistenti della Torre dei Lamenti sono stati notevolmente ampliati."
  building_ruins_harrenhal_04:0 "Torre degli Spettri Ricostruita"
  building_ruins_harrenhal_04_desc:0 "La Torre degli Spettri è stata ricostruita e ora serve a difendere le mura est e il cancello segreto."
  building_ruins_harrenhal_05:0 "Torre della Gioia Ricostruita"
building_ruins_harrenhal_05_desc: 0 "La seconda torre più grande, la Torre della Vedova, fu un tempo dimora della regina Rhaena. Ora è stata ricostruita in uno stato degno di una regina."
  building_ruins_harrenhal_06:0 "Torre dei Re del Fuoco Ricostruita"
building_ruins_harrenhal_06_desc: 0 "La più grande delle torri di Harrenhal, l’enorme Torre della Guglia del Re contiene la camera del lord e la Sala dei Mille Focolari. Ora che è stata ricostruita, la ricostruzione di Harrenhal è quasi giunta al termine."
  building_ruins_harrenhal_07:0 "Harrenhal Restaurata"
  building_ruins_harrenhal_07_desc:0 "Ricostruita alla grandezza che fu brevemente, Harrenhal è nuovamente il castello più splendido di Westeros. Le sue cinque grandi torri dietro le sue massicce mura si protendono sfiduciosamente verso il cielo con il suo signore che teme solo il ritorno dei draghi."

  building_type_agot_raventree_hall_01:0 "Raventree Hall"
building_type_agot_raventree_hall_01_desc: 0 "Nel cuore di Raventree Hall, dimora ancestrale di Casa Blackwood, si erge un grande albero del cuore, morto da lungo tempo, che si dice sia stato avvelenato da Casa Bracken in ere passate. È dimora di un grande stormo di corvi, che dà il nome al castello."
  building_agot_raventree_hall_01:0 "Grande Albero Morto"
  building_agot_raventree_hall_01_desc:0 "$building_type_agot_raventree_hall_01_desc$"

  building_type_agot_inn_at_the_crossroads_01:0 "Locanda al Crocevia"
  building_type_agot_inn_at_the_crossroads_01_desc:0 "Una piccola locanda situata a nord del Tridente, si trova all'incrocio della Strada del Re, della Strada Alta e della Strada del Fiume. Ha visto l'inizio e la fine di alcuni dei più grandi eventi del continente."
  building_agot_inn_at_the_crossroads_01:0 "$building_type_agot_inn_at_the_crossroads_01$"
  building_agot_inn_at_the_crossroads_01_desc:0 "$building_type_agot_inn_at_the_crossroads_01_desc$"

  building_type_agot_high_heart_01:0 "High Heart"
  building_type_agot_high_heart_01_desc:0 "Su High Heart si erge un'ampia selva di alberi sacri, la più vasta raccolta di tali alberi a sud de L'Incollatura, al di fuori dell'Isola dei Volti."
  building_agot_high_heart_01:0 "Selva di High Heart"
  building_agot_high_heart_01_desc:0 "Su High Heart si erge un'ampia selva di alberi sacri, la più vasta raccolta di tali alberi a sud de L'Incollatura, al di fuori dell'Isola dei Volti." #controllare_modifica

  building_type_agot_ruin_high_heart_01:0 "High Heart"
  building_type_agot_ruin_high_heart_01_desc:0 "Su High Heart si ergeva un'ampia selva di alberi sacri, la più vasta raccolta di tali alberi a sud de L'Incollatura, al di fuori dell'Isola dei Volti." #controllare_modifica
  building_agot_ruin_high_heart_01:0 "Selva di High Heart"
  building_agot_ruin_high_heart_01_desc:0 "Su High Heart si ergeva un'ampia selva di alberi sacri, la più vasta raccolta di tali alberi a sud de L'Incollatura, al di fuori dell'Isola dei Volti." #controllare_modifica
  building_agot_ruin_high_heart_02:0 "Selva Abbattuta"
building_agot_ruin_high_heart_02_desc: 0 "Quando gli Andali giunsero ad Alto Cuore, abbatterono tutti gli alberi demone, ponendo fine all’influenza degli Antichi Dei nelle Terre dei Fiumi."

  building_type_agot_seagard_01:0 "Seagard"
building_type_agot_seagard_01_desc: 0 "La fortezza di Casa Mallister, Seagard si erge quale bastione contro gli Uomini di Ferro del mare."
  building_agot_seagard_01:0 "La Torre Risonante"
building_agot_seagard_01_desc: 0 "Casa Mallister, gli ancestrali lord di Seagard, si eresse a lungo quale principale difesa delle Terre dei Fiumi contro gli Uomini di Ferro. A tal fine costruirono la Torre Rombante, per avvertire tutto il popolo di Seagard quando all'orizzonte si scorgono navi lunghe."

 building_type_agot_walls_of_seagard_01:0 "$building_type_agot_seagard_01$"
 building_type_agot_walls_of_seagard_01_desc:0 "$building_type_agot_seagard_01_desc$"
building_agot_walls_of_seagard_01: 0 "Mura di Halmon"
building_agot_walls_of_seagard_01_desc: 0 "Costruite su istruzione di Lord Halmon Mallister, le mura di Seagard inglobano l'estendersi della città fiorente nelle difese del Castello di Seagard. Ispirate dalla costante minaccia di piccoli gruppi di scaltri infiltratori Uomini di Ferro, le mura servono da deterrente alle ambizioni dei razziatori impreparati."

  building_type_agot_maidenpool_01:0 "Maidenpool"
building_type_agot_maidenpool_01_desc: 0 "Casa Mooton ha guidato la crescita di Maidenpool, una delle città più grandi e prospere delle Terre dei Fiumi."
  building_agot_maidenpool_01:0 "Stagno di Jonquil"
building_agot_maidenpool_01_desc: 0 "Maidenpool è la sede ancestrale di Casa Mooton, eredi della celebre Jonquil la Fanciulla e del suo eroe, Florian il Folle. Questa eredità attira numerosi pellegrini, portando ricchezza e prestigio ai lord di Maidenpool."

  building_type_agot_oldstones_01:0 "Oldstones"
  building_type_agot_oldstones_01_desc:0 "Una volta il castello dell'ultima casa reale delle Terre Fluviali prima della conquista andala della regione, Oldstones sono ancora ricordate ancora oggi."
  building_agot_oldstones_01:0 "Rovine di Oldstones"
  building_agot_oldstones_01_desc:0 "Le rovine del castello dei Re Mudd ancora rimangono. Sono antiche e alcuni dicono che siano infestate."
  building_agot_oldstones_02:0 "Castello della Corona Dorata"
  building_agot_oldstones_02_desc:0 "Il castello ricostruito di Oldstones, ancora una volta un faro della potenza delle Terre Fluviali, le sue mura si ergono alte e orgogliose."

  building_type_agot_inn_of_the_kneeling_man_01:0 "Locanda dell'Uomo Inchinato"
  building_type_agot_inn_of_the_kneeling_man_01_desc:0 "Questa locanda è stata costruita nel luogo in cui si dice che Torrhen Stark, ultimo Re del Nord, si sia inginocchiato davanti ad Aegon il Conquistatore."
  building_agot_inn_of_the_kneeling_man_01:0 "Locanda dell'Uomo Inchinato" #controllare_modifica
  building_agot_inn_of_the_kneeling_man_01_desc:0 "Questa locanda è stata costruita nel luogo in cui si dice che Torrhen Stark, ultimo Re del Nord, si sia inginocchiato davanti ad Aegon il Conquistatore." #controllare_modifica

  building_type_agot_stoney_sept_01:0 "Tempio Stoney"
  building_type_agot_stoney_sept_01_desc:0 "Una città nei Fiumi Meridionali, il Tempio Stoney accoglie viaggiatori da tutti i Sette Regni, dalle Terre delle Tempeste al Nord."
  building_agot_stoney_sept_01:0 "Piazza della Trota Saltante"
  building_agot_stoney_sept_01_desc:0 "La via principale del Tempio Stoney, la piazza è nota per la sua fontana con la trota saltante. Ha tutto ciò che un viaggiatore potrebbe desiderare, dai beni e servizi (compresi i pesche) a letti sicuri."

  building_type_agot_wayfarers_rest_01:0 "Riposo del Viandante"
  building_type_agot_wayfarers_rest_01_desc:0 "Riposo del Viandante era il castello costruito da Armistead Vance, usato come roccaforte durante gli attacchi andali sulle Terre Occidentali. Ancora oggi i signori del Riposo del Viandante mantengono la numerosa guardia personale istituita dall'antico signore della guerra."
  building_agot_wayfarers_rest_01:0 "Il Mastio del Signore della Guerra"
  building_agot_wayfarers_rest_01_desc:0 "$building_type_agot_wayfarers_rest_01_desc$"

  building_type_agot_fairmarket_01:0 "Fairmarket"
  building_type_agot_fairmarket_01_desc:0 "Fairmarket è uno dei principali centri economici delle Terre dei Fiumi. Sebbene non abbia ottenuto le contee per espandersi e diventare una vera città, attira comunque molti viaggiatori e mercanti. Sarebbe un’ottima sede per qualsiasi aspirante re, anche venuto dal mare."
  building_agot_fairmarket_01:0 "$building_type_agot_fairmarket_01$"
  building_agot_fairmarket_01_desc:0 "$building_type_agot_fairmarket_01_desc$"
building_agot_fairmarket_02: 0 "Ponte della Forca Azzurra"
building_agot_fairmarket_02_desc: 0 "Fairmarket possiede da lungo tempo un ponte sulla Forca Azzurra, ma i più recenti lord della città hanno ritenuto opportuno erigere un'opera assai più grandiosa, che si dice rivaleggi con qualunque altra presente nel regno."

  building_type_agot_mudgrave_01:0 "Mudgrave"
building_type_agot_mudgrave_01_desc: 0 "La fine di Casa Mudd giunse per mille ferite. Tristifer IV 'il Martello della Giustizia' respinse per anni gli invasori andali in novantanove battaglie, ma alla fine cadde nella Battaglia dei Sette Re, condannando la sua casata e inaugurando le Terre dei Fiumi andale."
  building_agot_mudgrave_01:0 "$building_type_agot_mudgrave_01$"
  building_agot_mudgrave_01_desc:0 "$building_type_agot_mudgrave_01_desc$"

  building_type_agot_atranta_01:0 "Atranta"
building_type_agot_atranta_01_desc: 0 "Sede ancestrale del ramo cadetto di Casa Vance, Atranta è da lungo tempo un faro dei fedeli e si trova stretta tra i regni dei Re della Roccia, dell'Altopiano, della Tempesta e del Fiume."
  building_agot_atranta_01:0 "$building_type_agot_atranta_01$"
  building_agot_atranta_01_desc:0 "$building_type_agot_atranta_01_desc$"

building_type_agot_ruins_of_oldforge_01: 0 "L'Antica Forgia"
 building_type_agot_ruins_of_oldforge_01_desc:0 "$building_agot_ruins_of_oldforge_01_desc$"
building_agot_ruins_of_oldforge_01: 0 "Rovine dell'Antica Forgia"
building_agot_ruins_of_oldforge_01_desc: 0 "Situata in un minore teatro delle storiche schermaglie di confine tra Blackwood e Bracken, l'Antica Forgia un tempo era la più grande forgia delle Terre dei Fiumi. La faida tra i Bracken e i Blackwood l'ha ormai quasi ridotta in rovina, spegnendone i fuochi. Forse la casata vittoriosa potrebbe restituirle l'antico splendore."
building_agot_ruins_of_oldforge_02: 0 "L'Antica Forgia Restaurata"
building_agot_ruins_of_oldforge_02_desc: 0 "Con i fuochi riaccesi, gli stampi riforniti e i fabbri nuovamente addestrati e rinvigoriti, l'Antica Forgia sorge di nuovo, pronta a servire il suo signore con il migliore acciaio che un uomo delle Terre dei Fiumi possa forgiare."
building_agot_ruins_of_oldforge_03: 0 "L'Antica Forgia Ampliata"
building_agot_ruins_of_oldforge_03_desc: 0 "L'Antica Forgia ha quasi triplicato le proprie dimensioni, con fabbri, conciatori, sellai e falegnami che lavorano in concerto. Ora una delle più grandi forge di Westeros, rivaleggiata soltanto dal tortuoso complesso della Via dell'Acciaio ad Approdo del Re, la casata che la governa ne raccoglie i frutti tanto in oro quanto in acciaio."

building_type_agot_bechester_motherhouse_01: 0 "Bechester"
building_type_agot_bechester_motherhouse_01_desc: 0 "Dimora di Casa Penny, Bechester è stata teatro di molti conflitti e nondimeno rimane devota alla Fede."
building_agot_bechester_motherhouse_01: 0 "Casa Madre lungo i Fiumi"
building_agot_bechester_motherhouse_01_desc: 0 "La Casa Madre di Bechester, situata lungo il confine tra le Terre dei Fiumi e l'Altopiano, offre un rifugio sicuro alle Sorelle del Silenzio e ai devoti seguaci della Fede dei Sette. La casa madre reca beneficio tanto al piccolo popolo locale quanto ai viandanti, ed è consuetudine che i lord e le lady di Bechester Hall contribuiscano ogniqualvolta le loro casse lo consentano."

 building_type_agot_bechester_motherhouse_ruins_01:0 "$building_type_agot_bechester_motherhouse_01$"
 building_type_agot_bechester_motherhouse_ruins_01_desc:0 "$building_agot_bechester_motherhouse_ruins_01_desc$"
building_agot_bechester_motherhouse_ruins_01: 0 "Rovine della Casa Madre di Bechester"
building_agot_bechester_motherhouse_ruins_01_desc: 0 "Durante la Danza dei Draghi, il leviatanico drago Vhagar diede alle fiamme la Casa Madre di Bechester, un tempo santuario delle Sorelle del Silenzio nelle Terre dei Fiumi meridionali. Benché resti ancora un luogo di pellegrinaggio per i seguaci locali dei Sette, le rovine sono ora un monito del terrore del fuoco di drago e talvolta fungono da accampamento per i briganti."
building_agot_bechester_motherhouse_ruins_02: 0 "Casa Madre lungo i Fiumi Ricostruita"
building_agot_bechester_motherhouse_ruins_02_desc: 0 "Restituita alla sua antica sacralità, la Casa Madre di Bechester offre ancora una volta sicurezza e protezione agli eletti dei Sette, erigendosi a testimonianza della luce eterna e imperitura dei Sette."

building_type_agot_stone_hedge_01: 0 "Stone Hedge"
building_type_agot_stone_hedge_01_desc: 0 "L'antica dimora di Casa Bracken, i cui membri sostengono di essere stati antichi re dei fiumi. La loro rivalità con Casa Blackwood è famigerata, specialmente da quando Casa Bracken si convertì e abbracciò il culto dei veri dèi, i Sette-Che-Sono-Uno."
 building_agot_stone_hedge_01:0 "$building_type_agot_stone_hedge_01$"
 building_agot_stone_hedge_01_desc:0 "$building_type_agot_stone_hedge_01_desc$"

building_type_agot_pennytree_01: 0 "Pennytree"
building_type_agot_pennytree_01_desc: 0 "Una delle molte cittadine strette tra i Blackwood e i Bracken, Pennytree sorge tra le Tette."
building_agot_pennytree_01: 0 "L'Albero dei Penny"
building_agot_pennytree_01_desc: 0 "Nel villaggio sorge un'antica quercia al cui tronco sono inchiodati centinaia di vecchi penny di rame. Si crede che, quando i figli del villaggio vengono chiamati alla guerra, inchiodino un penny all'albero. Quando ritornano, lo staccano, e quelli che restano fissati onorano gli uomini che non hanno mai fatto ritorno."

 # Westerlands Special Buildings
  building_type_casterly_rock_01:0 "Castel Granito"
building_type_casterly_rock_01_desc: 0 "Si dice sia tre volte più alta della Bariera, l'immensa Roccia del Castigo è la fonte della ricchezza e del potere di Casa Lannister. La montagna ospita un'abbondante riserva d'oro e migliaia di anni di scavi hanno riempito la Roccia di gallerie, che ora formano i corridoi, le stanze e i cortili di uno dei più grandi castelli di Westeros."
building_casterly_rock_01: 0 "La Roccia"
building_casterly_rock_01_desc: 0 "Roccia del Castigo è scolpita in una montagna gigantesca, alta quasi tre volte la Bariera e lunga tre leghe. Si dice che la regina Visenya Targaryen abbia osservato di Loren Lannister: ""...se fosse rimasto entro la Roccia, neppure il fuoco di drago lo avrebbe intimorito.""
building_casterly_rock_02: 0 "Il Dono di Corlos"
building_casterly_rock_02_desc: 0 "Si dice che la grande ricchezza di Roccia del Castigo sia stata un dono degli Dèi, quando Corlos, figlio di Caster, uccise una leonessa ma risparmiò i suoi cuccioli. Per tale atto di misericordia, gli Dèi donarono a Casa Casterly una ricchezza incalcolabile."
building_casterly_rock_03: 0 "L'Astuzia di Lann"
building_casterly_rock_03_desc: 0 "Va ricordato che Roccia del Castigo non fu originariamente la dimora di Casa Lannister, ma dapprima appartenne a Casa Casterly. Si narra che Lann l'Astuto ottenne la sede o sterminando tutta Casa Casterly o ingravidandone tutte le figlie."
building_casterly_rock_04: 0 "La Galleria Dorata"
building_casterly_rock_04_desc: 0 "Casa Lannister divenne sinonimo di ricchezza, prosperità e oro, come mostra la costruzione della Galleria Dorata. La grande galleria non è rivestita soltanto dei tesori della casata, ma le sue stesse pareti scintillano dell'oro ancora intatto che venatura la Roccia."

  building_type_agot_banefort_01:0 "Banefort"
building_type_agot_banefort_01_desc: 0 "The Banefort, dimora ancestrale dell'Uomo Incappucciato e della sua stirpe di negromanti, Casa Banefort, è da secoli un bastione contro gli Uomini di Ferro nelle Terre dell'Ovest."
building_agot_banefort_01: 0 "Torrione dell'Uomo Incappucciato"
  building_agot_banefort_01_desc:0 "$building_type_agot_banefort_01_desc$"

  building_type_agot_castamere_01:0 "Castamere"
  building_type_agot_castamere_01_desc:0 "Castamere può sembrare un castello minore, ma i Reyne si sono espansi in profondità sotto terra. Sotto il suolo, le miniere si estendono ampie e robuste."
  building_agot_castamere_01:0 "Miniere di Castamere"
  building_agot_castamere_01_desc:0 "Castamere può sembrare un castello minore, ma i Reyne si sono espansi in profondità sotto terra. Sotto il suolo, le miniere si estendono ampie e robuste." #controllare_modifica

  building_type_agot_castamere_ruins_01:0 "Castamere"
  building_type_agot_castamere_ruins_01_desc:0 "Castamere potrebbe sembrare un castello minore, ma i Reynes hanno ampliato profondamente sotto terra. Sotto il suolo, le miniere si estendono profonde e solide."
  building_agot_castamere_ruins_01:0 "Le Miniere Allagate"
  building_agot_castamere_ruins_01_desc:0 "Quando i Reynes e i Tarbecks si ribellarono, trovarono il loro pari in Tywin Lannister, che senza pietà li allagò, portando le Piogge a Castamere."
  building_agot_castamere_ruins_02:0 "Mines Restaurate di Castamere"
  building_agot_castamere_ruins_02_desc:0 "Ora sgombre, le miniere di Castamere sono di nuovo seconda solo alla Roccia. Le sue grandi sale si estendono profondamente sotto il lago."

  building_type_agot_lann_sept_01:0 "Tempio di Lann"
  building_type_agot_lann_sept_01_desc:0 "Il Tempio di Lannisport comunemente chiamato Tempio di Lann, a causa della credenza erronea dei piccoli popoli che sia stato costruito da Lann l'Astuto, è uno dei grandi setti del regno. Le sue dimensioni e la sua grandiosità sono inferiori solo al Grande Tempio di Baelor e al Tempio Stellato."
  building_agot_lann_sept_01:0 "$building_type_agot_lann_sept_01$"
  building_agot_lann_sept_01_desc:0 "$building_type_agot_lann_sept_01_desc$"

  building_type_agot_lions_dock_01:0 "Molo del Leone"
  building_type_agot_lions_dock_01_desc:0 "I moli di Lannisport, sebbene non siano grandi come quelli di Volantis o sicuri come quelli di Braavos, attraggono navi da tutto il mondo. Leggende sull'oro della Roccia di Castely sono conosciute da Asshai a Ib, e i mercanti cercheranno sempre l'oro."
  building_agot_lions_dock_01:0 "$building_type_agot_lions_dock_01$"
  building_agot_lions_dock_01_desc:0 "$building_type_agot_lions_dock_01_desc$"

  building_type_agot_crakehall_01:0 "Crakehall"
  building_type_agot_crakehall_01_desc:0 "Dimora ancestrale della casata Crakehall, discendenti di Crake l’Uccisore di Cinghiali."
  building_agot_crakehall_01:0 "Campi del Cinghiale di Crake"
  building_agot_crakehall_01_desc:0 "Crake l’Uccisore di Cinghiali guadagnò il suo epiteto erigendo il castello accanto a vasti campi infestati da grossi cinghiali. Cavalieri e uomini di Crakehall vi cacciano regolarmente queste bestie, addestrando i loro destrieri alla caccia."

  building_type_agot_midges_inn_01:0 "Hetherfield Hall"
  building_type_agot_midges_inn_01_desc:0 "Antica sede della casata Hetherspoon, Hetherfield Hall è sempre stata fedele vassalla dei Lannister della Roccia del Drago."
  building_agot_midges_inn_01:0 "Locanda di Midge"
  building_agot_midges_inn_01_desc:0 "Lungo la Strada d’Oro, presso Hetherfield Hall, sorge la Locanda di Midge. Non esistono documenti chiari sull’identità di Midge, ma da secoli questo nome richiama viandanti da tutti i Sette Regni."

  building_type_agot_deep_den_01:0 "Deep Den"
  building_type_agot_deep_den_01_desc:0 "Dimora ancestrale della casata Lydden e residenza del primo re andalo della Roccia del Drago, Joffrey Lannister."
  building_agot_deep_den_01:0 "La Tana Profonda"
building_agot_deep_den_01_desc: 0 "Casa Lydden controllò a lungo uno dei passaggi cruciali verso le Terre dell'Ovest e, per proteggere quella via fondamentale, il suo castello si espanse sia in superficie sia nel sottosuolo. I Lydden scavarono molte gallerie, stanze e rifugi nelle profondità sotto il castello vero e proprio."

  building_type_agot_cornfield_01:0 "Cornfield"
  building_type_agot_cornfield_01_desc:0 "Dimora ancestrale della casata Swyft, Cornfield è da sempre sostegno fedele dei Lannister e della Roccia del Drago."
  building_agot_cornfield_01:0 "Campi Verdi"
building_agot_cornfield_01_desc: 0 "Cornfield, dimora ancestrale di Casa Swyft, funge da lungo tempo da granaio delle Terre dell'Ovest. Con i suoi raccolti rigogliosi e abbondanti, il castello ha sostenuto a lungo Lannisport e la Roccia."

  building_type_agot_fair_isle_01:0 "Isola di Fair"
  building_type_agot_fair_isle_01_desc:0 "Dimora ancestrale della casata Farman, l’Isola di Fair è da sempre teatro di lotte tra le Terre Occidentali e gli Uomini di Ferro."
  building_agot_fair_isle_01:0 "Darsene dei Farman"
building_agot_fair_isle_01_desc: 0 "Casa Farman fece di Fair Isle una notevole potenza navale nelle Terre dell'Ovest, servendo fedelmente Roccia del Castigo contro i detestati Uomini di Ferro e qualunque altro pirata in divenire."

  building_type_agot_hornvale_01:0 "Hornvale"
  building_type_agot_hornvale_01_desc:0 "Antica sede della casata Brax, Hornvale governa la valle da quando gli Andali conquistarono queste terre."
  building_agot_hornvale_01:0 "Valle del Corno"
building_agot_hornvale_01_desc: 0 "Sorgente della Forca Rossa, la Valle del Corno è ricca di ferro, che dona alle acque la loro tinta rossastra e ha armato Casa Brax e i lord di Hornvale fin da quando gli Andali giunsero nella regione."

  building_type_agot_feastfires_01:0 "Feastfires"
  building_type_agot_feastfires_01_desc:0 "Dimora ancestrale della casata Prester."
  building_agot_feastfires_01:0 "Torre di Guardia di Lann"
building_agot_feastfires_01_desc: 0 "Feastfires, dimora ancestrale di Casa Prester, funge da lungo tempo da allerta precoce per Lannisport e le Terre dell'Ovest meridionali contro le razzie degli Uomini di Ferro, accendendo la propria torre alla vista delle loro navi lunghe."

building_type_agot_golden_tooth_01: 0 "Il Dente Dorato"
building_type_agot_golden_tooth_01_desc: 0 "La sede ancestrale di Casa Lefford."
building_agot_golden_tooth_01: 0 "Torre della Corona d'Oro"
building_agot_golden_tooth_01_desc: 0 "Ergendosi alta sopra il castello ancestrale di Casa Lefford, la Torre della Corona d'Oro svetta sul Monte Lefford. Da questo punto privilegiato, i Lord del Dente possono sorvegliare l'avvicinarsi dei nemici o scendere nelle miniere d'oro della montagna."

building_type_agot_ashemark_01: 0 "Ashemark"
building_type_agot_ashemark_01_desc: 0 "La sede ancestrale di Casa Marbrand."
building_agot_ashemark_01: 0 "Caserme dell'Albero Fiammeggiante"
building_agot_ashemark_01_desc: 0 "Celebre in tutte le Terre dell'Ovest per la propria abilità nelle tattiche di colpisci e fuggi, Casa Marbrand ha addestrato così bene gli uomini di Ashemark e delle terre circostanti in tali metodi che ciò è divenuto motivo d'orgoglio tanto per i lord del castello quanto per il piccolo popolo."

building_type_agot_silverhill_01: 0 "Silverhill"
building_type_agot_silverhill_01_desc: 0 "La sede ancestrale di Casa Serrett."
building_agot_silverhill_01: 0 "La Sala d'Argento"
building_agot_silverhill_01_desc: 0 "Arroccata sopra la più grande miniera d'argento delle Terre dell'Ovest, la sede ancestrale di Casa Serrett rese possibile la costruzione di una grande sala, nota a tutti coloro che ne ammirano lo splendore fulgido come la Sala d'Argento."

 # Stormlands Special Buildings
  building_type_storms_end_01:0 "Capo Tempesta"
building_type_storms_end_01_desc: 0 "Capo Tempesta fu il settimo e ultimo castello costruito da Durran 'AfflittodagliDèi' per resistere all'ira del dio del mare e della dea del vento. È un'enorme fortezza composta dal Pugno, una grande torre che funge da mastio, granaio, caserma e sala, e da una cortina muraria di pietra liscia alta cento piedi e spessa almeno quaranta."
building_storms_end_01: 0 "Sala delle Nozze di Elenei"
building_storms_end_01_desc: 0 "Durran, fondatore di Casa Durrandon, è celebre per essersi innamorato non di una donna mortale, bensì della figlia del mare e del vento, Elenei in persona. Ella, a sua volta, s'innamorò di lui e, là dove il mare e i venti si incontravano alti sopra le bianche scogliere della Punta di Durran, Durran costruì per loro una sala nuziale."
building_storms_end_02: 0 "Cordoglio del Mare e del Vento"
building_storms_end_02_desc: 0 "Quando la loro figlia Elenei rinunciò alla propria divinità e sposò un uomo mortale, suo padre, il dio del mare, e sua madre, la dea del vento, abbatterono la sala che Durran aveva costruito e uccisero tutti coloro che vi si trovavano, tranne Elenei stessa e Durran, che ella protesse, dando inizio alla guerra tra Durran e gli dèi."
building_storms_end_03: 0 "La Caverna Nascosta"
building_storms_end_03_desc: 0 "Capo Tempesta non possiede porto né approdo per navi a causa delle grandi tempeste. Tuttavia, entro le bianche scogliere della Punta di Durran si cela una caverna segreta, collegata da un tunnel, che può offrire riparo a una sola piccola nave."
building_storms_end_04: 0 "L'Albero Solenne"
building_storms_end_04_desc: 0 "Come tutte le grandi sedi di Westeros, Capo Tempesta ospita un parco degli dèi con un albero del cuore. Ciò non sorprende, poiché gli Andali non conquistarono mai il castello, ma si unirono ad esso per matrimonio."
building_storms_end_05: 0 "Il Pugno"
building_storms_end_05_desc: 0 "L'unica torre di Capo Tempesta è il suo grande mastio centrale, che si leva ben al di sopra della cortina muraria e si dice assomigli a un enorme pugno che emerge dal castello. Esso serve non soltanto da mastio, ma anche da sala, caserma e stalla, tanto è grande il Pugno."
building_storms_end_06: 0 "La Cortina Perfetta"
building_storms_end_06_desc: 0 "La grande cortina muraria di Capo Tempesta non ha eguali; le sue pietre sono disposte con tale perfezione che non si riesce a percepire dove finisca una e cominci l'altra. Si dice che i Figli della Foresta o Bran 'il Costruttore' l'abbiano edificata e abbiano intessuto incanti nella muratura, il che sarà senz'altro figurato, anche se a guardare la cortina stessa si potrebbe dubitarne."
building_storms_end_07: 0 "La Sfida di Durran"
building_storms_end_07_desc: 0 "Secondo la leggenda, il Capo Tempesta che oggi si erge fu il settimo castello costruito da Durran 'AfflittodagliDèi' nella sua guerra contro il dio del mare e la dea del vento. Si dice che i Figli o forse Bran 'il Costruttore' abbiano avuto parte in quest'ultimo castello; in ogni caso, esso ha resistito alle tempeste e agli assalti subiti fin dai giorni di Durran."

  building_type_agot_griffins_roost_01:0 "Nido del Grifone"
  building_type_agot_griffins_roost_01_desc:0 "Casa Connington, il Nido del Grifone è stata una roccaforte per millenni."
  building_agot_griffins_roost_01:0 "Gola del Grifone"
building_agot_griffins_roost_01_desc: 0 "Nido del Grifone, castello ancestrale di Casa Connington, sorge sul margine occidentale della Baia dei Naufragi. Circondato dall'acqua a sud, est e nord, è accessibile soltanto dal lato occidentale, pur protetto da una torre porta che conduce a una stretta cresta chiamata la Gola del Grifone, unica via d'accesso al castello."

  building_type_agot_blackhaven_01:0 "Blackhaven"
  building_type_agot_blackhaven_01_desc:0 "Una delle antiche fortezze dei Signori delle Terre Basse di Dorne, Blackhaven ha a lungo respinto gli attacchi dei Dorniani e dei loro razziatori."
  building_agot_blackhaven_01:0 "Fossato Senza Fine"
building_agot_blackhaven_01_desc: 0 "Blackhaven è da lungo tempo una delle roccaforti dei Lord delle Terre Basse di Dorne, ben protetta dal suo grande Fossato Senza Fondo, che custodisce innumerevoli resti di razziatori dorniani. Si crede che qui sia caduto un fulmine, salvando il progenitore di Casa Dondarrion."

  building_type_agot_stonehelm_01:0 "Stonehelm"
  building_type_agot_stonehelm_01_desc:0 "Una delle antiche fortezze dei Signori delle Terre Basse di Dorne, Stonehelm ha a lungo respinto gli attacchi dei Dorniani e dei loro razziatori."
  building_agot_stonehelm_01:0 "Mura di Nero e Bianco"
building_agot_stonehelm_01_desc: 0 "Stonehelm, antica sede di Casa Swann, è da lungo tempo una delle roccaforti dei Lord delle Terre Basse di Dorne. È ben protetta dalle sue imponenti mura di pietra bianca e nera e ha visto la fine di innumerevoli razziatori dorniani."

  building_type_agot_nightsong_01:0 "Nightsong"
  building_type_agot_nightsong_01_desc:0 "Una delle antiche fortezze dei Signori delle Terre Basse di Dorne, Nightsong ha a lungo respinto gli attacchi dei Dorniani e dei loro razziatori."
  building_agot_nightsong_01:0 "Torri Canore"
building_agot_nightsong_01_desc: 0 "Nightsong è da lungo tempo una delle roccaforti dei Lord delle Terre Basse di Dorne, ben protetta dalle sue celebri Torri Canore, dalle quali Casa Caron ha posto fine a innumerevoli razziatori dorniani."

  building_type_agot_morne_01:0 "Morne"
  building_type_agot_morne_01_desc:0 "Il seggio dei Re di Tarth, Morne è un faro per tutti gli Andali e per le ricchezze e le meraviglie dei regni occidentali."
  building_agot_morne_01:0 "Seggio Reale di Morne"
  building_agot_morne_01_desc:0 "$building_type_agot_morne_01_desc$"
  building_agot_morne_02:0 "Rovine dell'Isola di Zaffiro"
  building_agot_morne_02_desc:0 "Una volta il seggio reale dell'Isola di Zaffiro, Morne giace in rovina per tutti da vedere. Queste rovine parlano di un passato potente, quando gli Evenstars erano re a tutti gli effetti."
  building_agot_morne_03:0 "Seggio di Morne Ricostruito"
  building_agot_morne_03_desc:0 "Morne ricostruito e risplendente, annuncia un grande futuro per l'Isola di Zaffiro e per coloro che la governano."

  building_type_agot_evenfall_hall_01:0 "Evenfall Hall"
building_type_agot_evenfall_hall_01_desc: 0 "Sede più tarda di Casa Tarth, Evenfall Hall è il cuore pulsante dell'Isola di Zaffiro."
  building_agot_evenfall_hall_01:0 "$building_type_agot_evenfall_hall_01$"
  building_agot_evenfall_hall_01_desc:0 "$building_type_agot_evenfall_hall_01_desc$"

  building_type_agot_summerhall_01:0 "Sala dell'Estate"
building_type_agot_summerhall_01_desc: 0 "La Sala dell'Estate di Casa Targaryen, Sala dell'Estate ha talvolta servito quale sede dei figli o fratelli minori del re regnante."
  building_agot_summerhall_01:0 "Palazzo Reale"
  building_agot_summerhall_01_desc:0 "$building_type_agot_summerhall_01_desc$"
  building_type_agot_summerhall_ruins_01:0 "Sala dell'Estate" #controllare_modifica
  building_type_agot_summerhall_ruins_01_desc:0 "Il Palazzo Estivo dei Targaryen, Sala dell'Estate ha occasionalmente servito come residenza dei figli minori o dei fratelli del Re regnante." #controllare_modifica
  building_agot_summerhall_ruins_01:0 "Rovine di Sala dell'Estate"
building_agot_summerhall_ruins_01_desc: 0 "Ridotta in rovina in una notte di follia da Casa Targaryen, che non soltanto distrusse il castello ma uccise un re e quasi l'intera Famiglia Reale, Sala dell'Estate è ora un luogo di quieta disperazione."
  building_agot_summerhall_ruins_02:0 "Dimora del Principe"
  building_agot_summerhall_ruins_02_desc:0 "Risorto e Ricostruito, Sala dell'Estate è nuovamente un palazzo tra i Margini Dorati."

  building_type_agot_paintwood_01:0 "Paintwood"
  building_type_agot_paintwood_01_desc:0 "Nel profondo del Rainwood vicino al centro del Capo della Rabbia, si può trovare un boschetto chiamato Paintwood dai locali, dove si erge ancora oggi una torre antica."
building_agot_paintwood_01: 0 "Torre della Regina Verde"
building_agot_paintwood_01_desc: 0 "Quando il Regno delle Terre della Tempesta era al suo punto più debole sotto Durwald I 'il Grasso', la Regina Verde sorse a rivendicare la Foresta Pluviale e Capo dell'Ira per sé. Respinse Casa Durrandon per quasi un'intera generazione, ma quando a Capo Tempesta sedette qualcuno di capace, il giovane regno crollò dinanzi alla furia dei Durrandon."

  building_type_agot_bronzegate_01:0 "Bronzegate"
  building_type_agot_bronzegate_01_desc:0 "L'antica dimora della Casa Buckler, Bronzegate è da tempo la fine di qualsiasi conquistatore delle Terre delle Tempeste in erba."
  building_agot_bronzegate_01:0 "Muro delle Sette Teschio"
building_agot_bronzegate_01_desc: 0 "Durante le Invasioni Andale, un'alleanza di sette signori della guerra, chiamatasi la Sacra Fratellanza degli Andali, rivolse le proprie mire alle Terre della Tempesta. Fu nella Battaglia di Bronzegate che Monfryd V li sconfisse, uccidendo tutti e sette al prezzo della propria vita. Oggi sette teschi adornano le mura di Bronzegate in ricordo della vittoria, anche se da allora Casa Buckler e le Terre della Tempesta si sono convertite."

  building_type_agot_weeping_tower_01:0 "Torre della Testa Bianca"
  building_type_agot_weeping_tower_01_desc:0 "La casa tradizionale della Casa Whitehead, è da qui che governano la città circostante."
  building_agot_weeping_tower_01:0 "$building_type_agot_weeping_tower_01$"
  building_agot_weeping_tower_01_desc:0 "$building_type_agot_weeping_tower_01_desc$"
  building_agot_weeping_tower_02:0 "La Torre del Pianto"
building_agot_weeping_tower_02_desc: 0 "Quando il corpo di Daeron il Giovane Drago fu restituito dai dorniani, la città ne custodì la salma per tre giorni, durante i quali molti giunsero a piangere Re Daeron. Da ciò, anche la città e la torre del lord ricevettero nuovi nomi."

  building_type_agot_kingswood_brotherhood_01:0 "Fratellanza del Kingswood"
  building_type_agot_kingswood_brotherhood_01_desc:0 "La Fratellanza del Kingswood era un'infame banda di banditi."
  building_agot_kingswood_brotherhood_01:0 "Campo della Fratellanza"
  building_agot_kingswood_brotherhood_01_desc:0 "La Fratellanza era supportata dalla piccola gente del Kingswood, permettendo loro di evitare i lord locali e anche le pattuglie reali."

  building_type_agot_ruins_kingswood_brotherhood_01:0 "$building_type_agot_kingswood_brotherhood_01$"
  building_type_agot_ruins_kingswood_brotherhood_01_desc:0 "$building_type_agot_kingswood_brotherhood_01_desc$"
  building_agot_ruins_kingswood_brotherhood_01:0 "Tombe della Fratellanza del Kingswood"
  building_agot_ruins_kingswood_brotherhood_01_desc:0 "La Fratellanza di Kingswood era un gruppo infame di banditi. I contadini di Kingswood li supportavano, credendo che la Fratellanza fosse l'unica a lottare per i loro diritti, il che permise loro di sfuggire ai signori locali e persino alle pattuglie reali. Quando la Fratellanza divenne un problema per Re Aerys II, egli inviò soldati comandati da Ser Arthur Dayne della Guardia Reale per eliminare i banditi. Qui giace la loro memoria."
  building_agot_ruins_kingswood_brotherhood_02:0 "Campo della Fratellanza Rinasciuta"
  building_agot_ruins_kingswood_brotherhood_02_desc:0 "La Fratellanza del Kingswood è rinata e tormenta ancora una volta il Kingswood e i lord della zona."

building_type_agot_haywater_docks_01: 0 "Pergamena"
 building_type_agot_haywater_docks_01_desc:0 "$building_agot_haywater_docks_01_desc$"
building_agot_haywater_docks_01: 0 "Moli di Haywater"
building_agot_haywater_docks_01_desc: 0 "I Moli di Haywater sorgono alla foce del fiume che porta il loro stesso nome, l'Haywater. Ai piedi di Pergamena, sede ancestrale di Casa Penrose, molte imbarcazioni provenienti da Tarth, da Capo Tempesta o dalle Città Libere fanno scalo qui prima di proseguire verso nord attraverso gli Stretti di Tarth o più addentro nel cuore delle Terre della Tempesta."

building_type_agot_broken_shield_inn_01: 0 "Locanda dello Scudo Infranto"
 building_type_agot_broken_shield_inn_01_desc:0 "$building_agot_broken_shield_inn_01_desc$"
building_agot_broken_shield_inn_01: 0 "Locanda dello Scudo Infranto"
building_agot_broken_shield_inn_01_desc: 0 "Lo Scudo Infranto è una delle più grandi locande delle Terre della Tempesta e la più grande di Capo Tempesta. Celebre per il suo vasto impianto aperto, un visitatore potrebbe trascorrere un'intera serata a bere senza essere passato da ogni tavolo."

 # North Special Buildings
  building_type_winterfell_01:0 "Grande Inverno"
building_type_winterfell_01_desc: 0 "L'antica sede di Casa Stark, Grande Inverno è da lungo tempo il cuore del Nord. Celebre per le grandi cripte sottostanti, che ospitano i lord e i re defunti del passato, e per le sorgenti termali, che riscaldano il castello perfino nel pieno dell'inverno."
  building_winterfell_01:0 "La Prima Torre"
  building_winterfell_01_desc:0 "La Prima Torre di Grande Inverno è un'antica roccaforte; una torre cilindrica bassa più grande di molti altri castelli. È la parte più antica del castello, e è circondata dal cimitero dei servitori della Casa Stark."
  building_winterfell_02:0 "Le Cripte della Casa Stark"
  building_winterfell_02_desc:0 "Sotto la Prima Torre si trovano le cripte della Casa Stark, risalenti a migliaia di anni, dove giacciono sepolte antiche Re del Nord e del Gelido, insieme a spada e lupo."
  building_winterfell_03:0 "$building_type_winterfell_01$"
  building_winterfell_03_desc:0 "$building_type_winterfell_01_desc$"

  building_type_moat_cailin_01:0 "Moat Cailin"
  building_type_moat_cailin_01_desc:0 "L'antica fortezza di Moat Cailin ha protetto il Nord per secoli. Anche nel suo stato di rovina, con rimasti solo la Porta, la Torre dei Bambini e la Torre dell'Ubriaco, una piccola forza può difendere il Fossato contro praticamente qualsiasi esercito del sud."
  building_moat_cailin_01:0 "Portale in Rovina del Nord"
  building_moat_cailin_01_desc:0 "$building_type_moat_cailin_01_desc$"
  building_moat_cailin_02:0 "Fortezza Riconquistata del Passaggio"
  building_moat_cailin_02_desc:0 "Riconquistata dalle paludi che un tempo minacciavano di inghiottirla completamente, Moat Cailin vanta ancora la grande muraglia di basalto e le torri alte che la rendevano una roccaforte temibile nei secoli passati."
  building_moat_cailin_03:0 "Bastione Restaurato dell'Incollatura"
  building_moat_cailin_03_desc:0 "Ricostruita come un tempo, con venti torri possenti e una grande muraglia di basalto, Moat Cailin è di nuovo il bastione del Nord, capace di essere difesa da qualsiasi minaccia."
moat_cailin_fortification_rights_desc: 0 "[GetTitleByKey('e_the_north').GetNameNoTier] ha il $game_concept_vassal_contract$: [GetSubjectContractType('fortification_rights').GetObligationName('fortification_rights_granted')]"
  moat_cailin_top_liege_desc:0 "[GetTitleByKey('e_the_north').GetName] è detenuto dal tuo $game_concept_top_liege$"

  building_type_agot_barrow_keep_01:0 "La Grande Barrow"
  building_type_agot_barrow_keep_01_desc:0 "Sotto il Barrow Hall si trova la Grande Barrow, si dice che sia la casa del Primo Re, o di un Re dei Giganti."
  building_agot_barrow_keep_01:0 "$building_type_agot_barrow_keep_01$"
  building_agot_barrow_keep_01_desc:0 "$building_type_agot_barrow_keep_01_desc$"

  building_type_agot_white_harbor_01:0 "La Zecca d'Inverno"
building_type_agot_white_harbor_01_desc: 0 "Quando Casa Manderly giunse nel Nord, portò con sé la propria ricchezza, contribuendo a rivitalizzare il Nord dopo millenni di guerra contro i Re Falcone della Valle e delle Montagne. Ciò fu ulteriormente favorito dal fatto che qui si trovasse la grande zecca del Nord."
  building_agot_white_harbor_01:0 "$building_type_agot_white_harbor_01$"
  building_agot_white_harbor_01_desc:0 "$building_type_agot_white_harbor_01_desc$"
  agot_wh_mint_loc:0 "Quando Torrhen si inginocchiò ai Draghi, una delle cose concordate fu la chiusura della zecca a Porto Bianco, anche se l'edificio è stato mantenuto, nel caso in cui il Nord indipendente ne avesse nuovamente bisogno."

  building_type_agot_sept_of_the_snows_01:0 "Tempio delle Nevi"
building_type_agot_sept_of_the_snows_01_desc: 0 "Quando Casa Manderly giunse nel Nord, le fu garantita la protezione della propria fede, e per adorare i Sette costruì il Tempio delle Nevi."
  building_agot_sept_of_the_snows_01:0 "Bastione Settentrionale della Fede"
  building_agot_sept_of_the_snows_01_desc:0 "$building_type_agot_sept_of_the_snows_01_desc$"

  building_type_agot_wolfs_den_01:0 "La Tana del Lupo"
building_type_agot_wolfs_den_01_desc: 0 "Eretta da Re Jon Stark per proteggere la White Knife da razziatori e schiavisti, la Tana del Lupo è uno spettacolo temibile per qualunque minaccia in potenza."
  building_agot_wolfs_den_01:0 "Guardiano del White Knife"
  building_agot_wolfs_den_01_desc:0 "$building_type_agot_wolfs_den_01_desc$"
  building_agot_wolfs_den_02:0 "La Prigione del Tritone"
building_agot_wolfs_den_02_desc: 0 "Quando Casa Manderly giunse nel Nord e costruì il Castello Nuovo, la Tana del Lupo cadde in rovina e divenne una prigione per Porto Bianco."
  building_agot_wolfs_den_03:0 "La Tana"
  building_agot_wolfs_den_03_desc:0 "Ristrutturata e restaurata, la Tana del Lupo è nuovamente uno spettacolo formidabile."

  building_type_agot_new_castle_01:0 "Il Nuovo Castello"
building_type_agot_new_castle_01_desc: 0 "Quando Casa Manderly giunse nel Nord, costruì il Castello Nuovo come duplicato del perduto castello di Dunstonbury, nell'Altopiano. Esso si erge in netto contrasto con i castelli del Nord, come Grande Inverno e la Tana del Lupo."
  building_agot_new_castle_01:0 "$building_type_agot_new_castle_01$"
  building_agot_new_castle_01_desc:0 "$building_type_agot_new_castle_01_desc$"

  building_type_agot_dreadfort_01:0 "Forte Terrore"
  building_type_agot_dreadfort_01_desc:0 "La dimora della Casa Bolton, Forte Terrore è famigerato nel Nord e oltre."
  building_agot_dreadfort_01:0 "Lo Spettacolo Nascosto"
building_agot_dreadfort_01_desc: 0 "L'antica roccaforte dei Re Rossi, nelle sue profondità si cela la Vetrina Nascosta dove Casa Bolton custodiva i più infami e segreti dei propri trofei."

  building_type_agot_karhold_01:0 "Karhold"
  building_type_agot_karhold_01_desc:0 "Il Seggio della Casa Karstark."
  building_agot_karhold_01:0 "Grey Motte"
  building_agot_karhold_01_desc:0 "Karhold era una forte fortezza anche prima che Karlon Stark ne prendesse possesso, situata su due colline, forniva al castello una formidabile motte naturale e difese."

  building_type_agot_warg_king_01:0 "Castello del Re Mutaforma"
  building_type_agot_warg_king_01_desc:0 "L'antico possesso del Re Mutaforma, uno degli antichi rivali dei Re dell'Inverno."
  building_agot_warg_king_01:0 "Rovine del Castello del Re Mutaforma"
  building_agot_warg_king_01_desc:0 "I resti antichi del castello del Re Mutaforma giacciono ancora su Punta del Drago Marino, uno dei primi ad essere sconfitto dai Re dell'Inverno, molti credono che le rovine siano ancora infestate oggi."
  building_agot_warg_king_02:0 "Il Castello del Re Mutaforma Ricostruito"
  building_agot_warg_king_02_desc:0 "Ricostruito dalle rovine, il Castello del Re Mutaforma è nuovamente una fortezza formidabile. Sebbene sia stato distrutto in passato, è stato ricostruito più magnifico che mai."

  building_type_agot_greywater_watch_01:0 "Guardavalle delle Acque Grigie"
  building_type_agot_greywater_watch_01_desc:0 "Il celebre castello della Casa Reed, il Guardavalle delle Acque Grigie, è famoso per essere il più grande dei castelli dei Paludiatori e, come gli altri, si dice che si sposti attraverso le Paludi dell'Incollatura, rendendolo ancora più difficile da trovare e attaccare."
  building_agot_greywater_watch_01:0 "Il Castello Errante"
  building_agot_greywater_watch_01_desc:0 "Il celebre castello della Casa Reed, il Guardavalle delle Acque Grigie, è famoso per essere il più grande dei castelli dei Paludiatori e, come gli altri, si dice che si sposti attraverso le Paludi dell'Incollatura, rendendolo ancora più difficile da trovare e attaccare." #controllare_modifica

  building_type_agot_rills_stables_01:0 "Scuderie dei Rills"
  building_type_agot_rills_stables_01_desc:0 "I Rills sono sempre stati dimora di signori equestri, che fossero della Casa Ryder o della Casa Ryswell. Pur non essendo i cavalli dei Rills grandi quanto quelli impiegati dai cavalieri andali del sud, sono rinomati per la loro velocità e robustezza."
  building_agot_rills_stables_01:0 "$building_type_agot_rills_stables_01$"
  building_agot_rills_stables_01_desc:0 "$building_type_agot_rills_stables_01_desc$"

  building_type_agot_widows_watch_01:0 "L'Avviso del Lupo Affamato"
  building_type_agot_widows_watch_01_desc:0 "Quando gli Andali giunsero al Nord, incontrarono Theon il Lupo Affamato. Non solo sconfisse il Sette Stelle e il suo esercito, ma rese giustizia compiendo incursioni fin dentro Andalos, portando con sé le teste dei caduti lungo le coste settentrionali come monito per i futuri invasori."
  building_agot_widows_watch_01:0 "$building_type_agot_widows_watch_01$"
  building_agot_widows_watch_01_desc:0 "$building_type_agot_widows_watch_01_desc$"
  building_agot_widows_watch_02:0 "La Torre della Vedova"
building_agot_widows_watch_02_desc: 0 "Dall'arrivo di Casa Manderly, le coste orientali del Nord non sono più inospitali come in passato. Eppure la costa è ancora nota come Widow's Watch, condividendo il proprio nome con la principale roccaforte della regione."
  building_agot_widows_watch_03:0 "Il Rinnovato Avviso del Lupo"
  building_agot_widows_watch_03_desc:0 "Con il Nord di nuovo libero, i suoi confini sono tornati sotto la sua cura. Come avvertimento per eventuali predoni o schiavisti, gli aculei di Theon sono stati rialzati lungo la costa."
  agot_widows_watch_trigger:0 "Ora che il Nord ha giurato fedeltà al Trono di Spade, un simile avviso non è più necessario. Ma se mai dovesse tornare indipendente, potrebbe tornare utile risvegliare l'Avviso del Lupo Affamato."

  building_type_agot_flints_cliffs_01:0 "Scogliere di Flint"
  building_type_agot_flints_cliffs_01_desc:0 "Il Dito di Flint è da sempre teatro di scontri fra gli uomini del Nord e gli Uomini di Ferro, e le Scogliere di Flint hanno custodito la difesa dei Nordiani contro i pericoli del mare."
  building_agot_flints_cliffs_01:0 "$building_type_agot_flints_cliffs_01$"
  building_agot_flints_cliffs_01_desc:0 "$building_type_agot_flints_cliffs_01_desc$"

  building_type_agot_grey_cliffs_01:0 "Scogliere Grigie"
  building_type_agot_grey_cliffs_01_desc:0 "Le Scogliere Grigie hanno sempre favorito la difesa degli uomini del Nord contro le minacce del Mare Ghiacciato, poiché saccheggiatori e schiavisti cercano spesso mete isolate e vulnerabili."
  building_agot_grey_cliffs_01:0 "$building_type_agot_grey_cliffs_01$"
  building_agot_grey_cliffs_01_desc:0 "$building_type_agot_grey_cliffs_01_desc$"

building_type_agot_unicorn_glen_01: 0 "Kaldusk"
building_type_agot_unicorn_glen_01_desc: 0 "Tra le montagne di Skagos, nelle terre ancestrali di Casa Magnar, Kaldusk è celebre per le sue mandrie di unicorni."
building_agot_unicorn_glen_01: 0 "La Grande Valle"
building_agot_unicorn_glen_01_desc: 0 "Tra le montagne di Skagos si trova una grande valle dove gli unicorni sono numerosi e robusti. Il lord che controlla questa terra ha accesso ai migliori di questi destrieri cornuti."

building_type_agot_rodriks_gift_01: 0 "Torrione dei Mormont"
building_type_agot_rodriks_gift_01_desc: 0 "La sede ancestrale di Casa Mormont, che governa l'Isola dell'Orso fin dai giorni di Re Rodrik Stark."
building_agot_rodriks_gift_01: 0 "Il Dono di Rodrik"
building_agot_rodriks_gift_01_desc: 0 "Il Torrione dei Mormont, e l'intera Isola dell'Orso, furono donati a Casa Mormont da Re Rodrik Stark. Egli riconquistò l'isola agli Uomini di Ferro in una lotta corpo a corpo, e da allora gli uomini e le donne dell'Isola dell'Orso hanno custodito la loro dimora."

building_type_agot_ravos_base_01: 0 "Dente di Ferro"
building_type_agot_ravos_base_01_desc: 0 "La sede del potere degli Uomini di Ferro sull'Isola dell'Orso."
building_agot_ravos_base_01: 0 "Base di Ravos"
building_agot_ravos_base_01_desc: 0 "Da qui gli Uomini di Ferro governavano un tempo l'Isola dell'Orso. L'antica base di Ravos Hoare è stata ricostruita e la Baia delle Foche è pronta per essere saccheggiata."

building_type_agot_last_hearth_01: 0 "Ultimo Focolare"
building_type_agot_last_hearth_01_desc: 0 "La sede ancestrale di Casa Umber, Ultimo Focolare è degna del suo nome, essendo l'ultimo grande castello prima del Dono e dei Guardiani della Notte lungo la strada che parte da Grande Inverno."
 building_agot_last_hearth_01:0 "$building_type_agot_last_hearth_01$"
 building_agot_last_hearth_01_desc:0 "$building_type_agot_last_hearth_01_desc$"

building_type_agot_ironrath_01: 0 "Ironrath"
building_type_agot_ironrath_01_desc: 0 "La sede ancestrale di Casa Forrester."
building_agot_ironrath_01: 0 "Grande Boschetto di Ferrolegno di Ironrath"
building_agot_ironrath_01_desc: 0 "Ironrath, sede ancestrale di Casa Forrester, ospita la più grande riserva di ferrolegno del Bosco del Lupo. I lord del castello l'hanno accudita, prendendo soltanto quanto era necessario, e la loro saggezza ha garantito la duratura forza del boschetto."

building_type_agot_highpoint_01: 0 "Highpoint"
building_type_agot_highpoint_01_desc: 0 "La sede ancestrale di Casa Whitehill."
building_agot_highpoint_01: 0 "Boschetto di Ferrolegno Esaurito di Highpoint"
building_agot_highpoint_01_desc: 0 "Highpoint un tempo ospitava un florido boschetto di ferrolegno, come molti castelli del Bosco del Lupo. Eppure Casa Whitehill, i tradizionali lord di Highpoint, ne abbatterono la maggior parte per ricavarne ricchezza e adottarono usanze più meridionali. Tale abuso li ha costretti a rivolgersi alle riserve di altre casate."

building_type_agot_blackpool_01: 0 "Blackpool"
building_type_agot_blackpool_01_desc: 0 "La sede ancestrale di Casa Slate."
building_agot_blackpool_01: 0 "La Pozzanera"
building_agot_blackpool_01_desc: 0 "Dando il nome alla sede ancestrale di Casa Slate, la Pozzanera è un grande lago tanto profondo che le sue acque appaiono nere. Ospita molti pesci, e la fauna di tutta la regione vi si reca per abbeverarsi, offrendo ai lord del castello un'abbondante riserva di carne e di pesce."

building_type_agot_torrhens_square_01: 0 "Piazza di Torrhen"
building_type_agot_torrhens_square_01_desc: 0 "La tradizionale sede di Casa Tallhart, i lord di Piazza di Torrhen sono da lungo tempo noti per il loro valoroso servizio, spesso lanciandosi a capofitto nel pericolo."
 building_agot_torrhens_square_01:0 "$building_type_agot_torrhens_square_01$"
 building_agot_torrhens_square_01_desc:0 "$building_type_agot_torrhens_square_01_desc$"

building_type_agot_deepwood_motte_01: 0 "Motta del Boscofitto"
building_type_agot_deepwood_motte_01_desc: 0 "La sede ancestrale di Casa Glover, Motta del Boscofitto funge da guardiana del Bosco del Lupo. Da lungo tempo avvezzi a trattare con i razziatori, specialmente gli Uomini di Ferro del Mare del Tramonto, i lord del castello hanno perfezionato l'arte della guerra nel Bosco del Lupo."
 building_agot_deepwood_motte_01:0 "$building_type_agot_deepwood_motte_01$"
 building_agot_deepwood_motte_01_desc:0 "$building_type_agot_deepwood_motte_01_desc$"

building_type_agot_hornwood_01: 0 "Hornwood"
building_type_agot_hornwood_01_desc: 0 "La vasta foresta che ha dato il proprio nome non soltanto al castello, ma anche a Casa Hornwood, è celebre in tutto il Nord per la sua eccellente caccia. Colma di grandi alci, rappresenta una degna sfida per qualunque cacciatore."
 building_agot_hornwood_01:0 "$building_type_agot_hornwood_01$"
 building_agot_hornwood_01_desc:0 "$building_type_agot_hornwood_01_desc$"

building_type_agot_ramsgate_01: 0 "Ramsgate"
building_type_agot_ramsgate_01_desc: 0 "La sede ancestrale di Casa Woolfield, Ramsgate sorge alla foce del Ramo Spezzato, proteggendola da razziatori, pirati e schiavisti provenienti dal Mare Stretto e oltre."
 building_agot_ramsgate_01:0 "$building_type_agot_ramsgate_01$"
 building_agot_ramsgate_01_desc:0 "$building_type_agot_ramsgate_01_desc$"

building_type_agot_oldcastle_01: 0 "Oldcastle"
building_type_agot_oldcastle_01_desc: 0 "Dimora ancestrale di Casa Locke, Oldcastle fu un tempo la principale roccaforte a guardia della White Knife, prima che venisse costruita la Tana del Lupo. Sebbene oggi sia spesso oscurato da Porto Bianco, il castello rimane formidabile e serve da prima barriera contro qualunque invasore proveniente dal Morso."
 building_agot_oldcastle_01:0 "$building_type_agot_oldcastle_01$"
 building_agot_oldcastle_01_desc:0 "$building_type_agot_oldcastle_01_desc$"

 # Dorne Special Buildings
  building_type_sunspear_01:0 "Lancia del Sole"
building_type_sunspear_01_desc: 0 "Lancia del Sole è la sede ancestrale di Casa Nymeros Martell. Come gli stessi dorniani, il castello è una mescolanza di elementi rhoynar e andali. Accanto all'antico mastio andalo chiamato Sandship si ergono le Torri del Sole e della Lancia, entrambe costruite in stile rhoynish. La Torre del Sole è il luogo da cui il Principe o la Principessa di Dorne governa dai propri troni gemelli, uno recante un sole e l'altro una lancia."
  building_sunspear_01:0 "$building_type_sunspear_01$"
  building_sunspear_01_desc:0 "$building_type_sunspear_01_desc$"

  building_type_agot_tower_of_joy_01:0 "Torre della Gioia"
  building_type_agot_tower_of_joy_01_desc:0 "La Torre della Gioia è una piccola torre situata nel Passo del Principe, che ha servito come rifugio privato per alcuni dei più grandi individui del regno."
  building_agot_tower_of_joy_01:0 "$building_type_agot_tower_of_joy_01$"
  building_agot_tower_of_joy_01_desc:0 "$building_type_agot_tower_of_joy_01_desc$"

  building_type_agot_ruin_tower_of_joy_01:0 "$building_type_agot_tower_of_joy_01$"
  building_type_agot_ruin_tower_of_joy_01_desc:0 "$building_type_agot_tower_of_joy_01_desc$"
  building_agot_ruin_tower_of_joy_01:0 "Tumuli degli Otto"
  building_agot_ruin_tower_of_joy_01_desc:0 "Su una cresta del Passo del Principe, potresti imbattersi in otto tombe accanto ai resti di una torre."

  building_type_agot_the_water_gardens_01:0 "I Giardini dell'Acqua"
building_type_agot_the_water_gardens_01_desc: 0 "Costruiti dal Principe Maron per la sua sposa, la Principessa Daenerys Targaryen, i Giardini dell'Acqua sono divenuti un gioiello nel deserto che è Dorne. Fatti di marmo rosa, i Giardini dell'Acqua hanno servito da ritiro privato per i Principi di Dorne sin dalla loro costruzione."
  building_agot_the_water_gardens_01:0 "$building_type_agot_the_water_gardens_01$"
  building_agot_the_water_gardens_01_desc:0 "$building_type_agot_the_water_gardens_01_desc$"

  building_type_agot_ghaston_grey_01:0 "Ghaston Grigio"
  building_type_agot_ghaston_grey_01_desc:0 "Ghaston Grigio è la fortezza-isola prigione di Dorne. Situata nel Mare di Dorne, è il terrore di chiunque venga catturato dai Dorniani."
  building_agot_ghaston_grey_01:0 "$building_type_agot_ghaston_grey_01$"
  building_agot_ghaston_grey_01_desc:0 "$building_type_agot_ghaston_grey_01_desc$"

  building_type_agot_the_shadow_city_01:0 "Città delle Ombre"
  building_type_agot_the_shadow_city_01_desc:0 "Le Tre Mura di Lancia del Sole creano un labirinto di vicoli e strade che servono solo a confondere una forza di attacco. Le tre mura hanno solo un insieme di porte che si allineano direttamente, la Porta Trifoglio, che funge da imbuto e trappola mortale."
  building_agot_the_shadow_city_01:0 "Porta Trifoglio"
  building_agot_the_shadow_city_01_desc:0 "$building_type_agot_the_shadow_city_01_desc$"

  building_type_agot_starfall_01:0 "Starfall"
building_type_agot_starfall_01_desc: 0 "Antico castello, dimora di una delle più antiche casate, Casa Dayne, Starfall fu costruita là dove cadde la stella da cui venne tratta la spada Alba."
  building_agot_starfall_01:0 "Spada di Pietra Pallida"
  building_agot_starfall_01_desc:0 "La famosa torre chiamata così per la spada Dawn della Casa Dayne, la Spada di Pietra Pallida è alta e conferisce a Starfall un forte controllo delle aree circostanti. Si è dimostrata però essere una spada a doppio taglio, con membri che saltano dalle sue altezze quando cadono nella disperazione."

  building_type_agot_vultures_roost_01:0 "Rifugio dell'Avvoltoio"
  building_type_agot_vultures_roost_01_desc:0 "La famigerata dimora del Re dei Volti, il Rifugio dell'Avvoltoio si è guadagnato l'odio dei Signori delle Terre Basse di Dorne in tutta la Valle e le Terre della Tempesta."
  building_agot_vultures_roost_01:0 "Sede del Re dei Volti"
  building_agot_vultures_roost_01_desc:0 "Da questo seggio i Re dei Volti di un tempo terrorizzavano le Marche Dorniane, e da questo seggio un altro potrebbe risorgere."

  building_type_agot_skyreach_01:0 "Cielopunta"
  building_type_agot_skyreach_01_desc:0 "Cielopunta, una volta dimora dei Re di Pietra e Cielo, ha comandato la Via Ampia, ora conosciuta come Passo del Principe."
  building_agot_skyreach_01:0 "Le Torri Svolazzanti"
building_agot_skyreach_01_desc: 0 "Skyreach è celebre per il controllo che esercita sulla Via Larga, con le sue mura scolpite e le sue torri svettanti. Nessun nemico è mai riuscito a passare furtivamente oltre questo formidabile castello e gli occhi vigili della casata regnante."

  building_type_agot_hellgate_hall_01:0 "Hellgate Hall"
  building_type_agot_hellgate_hall_01_desc:0 "La sede ancestrale della Casa Dryland, è da questo temibile castello che governavano come Re del Brimstone."
  building_agot_hellgate_hall_01:0 "$building_type_agot_hellgate_hall_01$"
  building_agot_hellgate_hall_01_desc:0 "$building_type_agot_hellgate_hall_01_desc$"

  building_type_agot_ruins_hellgate_hall_01:0 "$building_type_agot_hellgate_hall_01$"
  building_type_agot_ruins_hellgate_hall_01_desc:0 "$building_type_agot_hellgate_hall_01_desc$"
building_agot_ruins_hellgate_hall_01: 0 "Rovine di Lucifero"
  building_agot_ruins_hellgate_hall_01_desc:0 "Un tempo il più potente dei castelli che abitavano le profonde dune di Dorne, Hellgate Hall e la Casa Dryland furono distrutti nelle Guerre di Unificazione Dorniche sotto Nymeria e la Casa Martell. Oggi le rovine sono una testimonianza di coloro che sfidano il Sole e la Lancia come fece l'ultimo Re del Brimstone."
  building_agot_ruins_hellgate_hall_02:0 "Hellgate Hall Ricostruito"
  building_agot_ruins_hellgate_hall_02_desc:0 "Ricostruito al suo stato originale, Hellgate Hall serve ancora una volta come dimora del Re del Brimstone, e le dune non si piegano più davanti a Sunspear."

  building_type_agot_godsgrace_01:0 "Godsgrace"
  building_type_agot_godsgrace_01_desc:0 "La sede tradizionale della Casa Allyrion, il castello fu fondato quando la Casa si stabilì nella regione durante le Invasioni Andali."
  building_agot_godsgrace_01:0 "Torre del Greenblood"
  building_agot_godsgrace_01_desc:0 "La Torre del Greenblood fu costruita dalla Casa Allyrion per dar loro una posizione di comando nelle pianure intorno al Greenblood e permettere loro di mantenere la propria indipendenza di fronte ai numerosi altri regni minori che li circondavano."

  building_type_agot_nymeros_tower_01:0 "Torre Nymeros"
  building_type_agot_nymeros_tower_01_desc:0 "Il faro di Lancia del Sole, la Torre Nymeros è in piedi fin dall'arrivo dei Rhoynar nelle sabbie di Dorne."
  building_agot_nymeros_tower_01:0 "Torre Nymeros" #controllare_modifica
  building_agot_nymeros_tower_01_desc:0 "L'antico faro di Lancia del Sole, la torre è più antica della maggior parte di Lancia del Sole, eccetto la Nave di Sabbia, e serviva come benvenuto per qualsiasi Rhoynar smarrito nel viaggio verso Dorne." #controllare_modifica

  building_type_agot_plankytown_01:0 "Città di Planky"
  building_type_agot_plankytown_01_desc:0 "Il più grande insediamento di Dorne, costruito sulle acque della foce del Greenblood, dove le barche a palo collegano i numerosi edifici galleggianti."
  building_agot_plankytown_01:0 "Città di Planky" #controllare_modifica
  building_agot_plankytown_01_desc:0 "Il più grande insediamento di Dorne, costruito sulle acque della foce del Greenblood, dove le barche a palo collegano i numerosi edifici galleggianti." #controllare_modifica

building_type_agot_hellholt_01: 0 "Hellholt"
building_type_agot_hellholt_01_desc: 0 "Sede ancestrale di Casa Uller, Hellholt è stata a lungo una potente vassalla — prima delle Terre Aride, poi dei Martell."
building_agot_hellholt_01: 0 "Resti di Meraxes"
building_agot_hellholt_01_desc: 0 "Benché Casa Uller abbia restituito il teschio di Meraxes nel trattato di pace con il Trono di Spade, il resto del corpo del drago fu reclamato dalle sabbie e dai coleotteri. Eppure, quando le dune si spostano, le ossa nere talvolta riemergono prima di venire nuovamente inghiottite."

  building_type_agot_broken_tower_01:0 "Porto Martello"
  building_type_agot_broken_tower_01_desc:0 "Sulla costa del Braccio Spezzato di Dorne si erge una torre di basalto nero, una pietra non comune in zona. Si dice che la torre esistesse già prima dell’arrivo degli Andali e sia stata sempre chiamata Torre Spezzata: chi sale in cima giura di udire le onde infrangersi con fragore, come martellate su un’incudine."
  building_agot_broken_tower_01:0 "Torre Spezzata"
  building_agot_broken_tower_01_desc:0 "$building_type_agot_broken_tower_01_desc$"

  building_type_agot_merling_port_01:0 "Porto dei Metamorfi"
  building_type_agot_merling_port_01_desc:0 "Nonostante l’arido deserto di Dorne, anche lì circolano leggende sui metamorfi del mare. Sulla costa del Mare di Dorne esiste un piccolo porto che si narra abbia accolto i metamorfi durante l’Era degli Eroi. Ancora oggi dà rifugio a chi fugge dalle insidie del mare."
  building_agot_merling_port_01:0 "Porto dei Metamorfi"
  building_agot_merling_port_01_desc:0 "$building_type_agot_merling_port_01_desc$"

  building_type_agot_pit_of_snakes_01:0 "Fossa delle Vipere"
building_type_agot_pit_of_snakes_01_desc: 0 "Quando Baelor il Benedetto ascese al Trono di Spade, cercò di sanare le ferite della guerra di Daeron il Giovane Drago. A tal fine si recò personalmente a Dorne, concluse la pace e cercò la liberazione del suo nobile cugino, Aemon il Dragonknight. Ma, nonostante il comando del suo signore supremo, Lord Wyl non volle liberare il Dragonknight, così Re Baelor attraversò una fossa di vipere che, si dice, chiniarono il capo, e liberò suo cugino. Si dice che la fossa esista ancora e che i Wyl nutrano ancora le vipere con i loro prigionieri."
  building_agot_pit_of_snakes_01:0 "$building_type_agot_pit_of_snakes_01$"
  building_agot_pit_of_snakes_01_desc:0 "$building_type_agot_pit_of_snakes_01_desc$"
  building_type_agot_pit_of_snakes_02:0 "$building_type_agot_pit_of_snakes_01$"
building_type_agot_pit_of_snakes_02_desc: 0 "Casa Wyl è famigerata in tutte le Marche di Dorne e oltre per la propria crudeltà, specialmente verso i prigionieri. Si dice che un metodo di punizione prediletto consista nel sospendere prigionieri d'alto lignaggio in una gabbia sopra una fossa di vipere."
  building_agot_pit_of_snakes_02:0 "$building_type_agot_pit_of_snakes_01$"
  building_agot_pit_of_snakes_02_desc:0 "$building_type_agot_pit_of_snakes_02_desc$" #controllare_modifica

  building_type_agot_sandstone_01:0 "Arenaria"
building_type_agot_sandstone_01_desc: 0 "Sede ancestrale di Casa Qorgyle, Pietrasabbia ha resistito ai pericoli delle dune del deserto e alle minacce provenienti anche da oltre Dorne."
building_agot_sandstone_01: 0 "Collina dello Scorpione"
building_agot_sandstone_01_desc: 0 "Un'antica tomba di Casa Qorgyle risalente alla conquista andala di Dorne, da allora è stata infestata dagli scorpioni, guadagnandosi così il proprio nome locale."

building_type_agot_yronwood_01: 0 "Yronwood"
building_type_agot_yronwood_01_desc: 0 "Non si sa se sia venuto prima il castello o la casata, ma quest'antica sede ospita da lungo tempo una delle più grandi casate di Dorne."
building_agot_yronwood_01: 0 "Sede del Sanguesovrano"
building_agot_yronwood_01_desc: 0 "Yronwood, sede ancestrale di Casa Yronwood, è da lungo tempo una roccaforte fondamentale di Dorne. Dominando la Via di Pietra e ospitando una delle più grandi miniere d'argento di Westeros, il castello fu costruito per non essere secondo a nessuno. Con mura possenti e un portale ancor più possente, Yronwood si erge quale celebre sede del Sanguesovrano."

 # Vale Special Buildings
  building_type_the_eyrie_01:0 "Nido dell'Aquila"
  building_type_the_eyrie_01_desc:0 "Nido dell'Aquila è il castello estivo della Casa Arryn, costruito come un palazzo per i Re della Montagna e della Valle. È uno dei castelli più piccoli dei Sette Regni. Tuttavia, la sua posizione in cima alla Lancia del Gigante lo rende pressoché inespugnabile."
  building_the_eyrie_01:0 "$building_type_the_eyrie_01$"
  building_the_eyrie_01_desc:0 "$building_type_the_eyrie_01_desc$"

  building_type_the_bloody_gate_01:0 "La Porta Insanguinata"
  building_type_the_bloody_gate_01_desc:0 "La Porta Insanguinata difende l'unico passaggio attraverso le Montagne della Luna verso la Valle. Protegge la Valle dai membri dei clan di montagna e da altri potenziali invasori."
  building_the_bloody_gate_01:0 "$building_type_the_bloody_gate_01$"
  building_the_bloody_gate_01_desc:0 "$building_type_the_bloody_gate_01_desc$"

  building_type_agot_grafton_keep_01:0 "Fortezza dei Grafton"
building_type_agot_grafton_keep_01_desc: 0 "Quando Casa Grafton giunse per la prima volta a Westeros, entrò al servizio dei re Shett di Gulltown. Gli Shett cercarono di legare i Grafton con un doppio matrimonio. Questa fu la loro rovina, poiché sia il padre sia il figlio furono imprigionati finché le loro mogli Grafton non rimasero incinte, e poi scomparvero."
  building_agot_grafton_keep_01:0 "$building_type_agot_grafton_keep_01$"
  building_agot_grafton_keep_01_desc:0 "$building_type_agot_grafton_keep_01_desc$"

building_type_agot_gull_harbor_01: 0 "Gulltown"
building_type_agot_gull_harbor_01_desc: 0 "La terza città di Westeros, e la seconda più piccola, Gulltown è il principale porto della Valle e lo è fin da prima della venuta degli Andali."
building_agot_gull_harbor_01: 0 "Porto di Gulltown"
building_agot_gull_harbor_01_desc: 0 "Essendo il principale porto della Valle, il porto di Gulltown è noto per il suo accogliente faro e per il mercato dei moli. Da qui si possono trovare merci provenienti da ogni parte del Mare Stretto."

  building_type_agot_maris_motherhouse_01:0 "Città dei Gabbiani"
building_type_agot_maris_motherhouse_01_desc: 0 "La terza città di Westeros, e la seconda più piccola, Gulltown è il principale porto della Valle e lo è fin da prima della venuta degli Andali."
  building_agot_maris_motherhouse_01:0 "Casa Madre di Maris"
  building_agot_maris_motherhouse_01_desc:0 "La Casa Madre di Maris fu fondata da una delle Sette Speaker, Madre Maris. Da qui insegnò a molti orfani e figlie illegittime, e assistette alla morte di Lady Jeyne Arryn."

building_type_agot_gold_feather_house_01: 0 "Gulltown"
building_type_agot_gold_feather_house_01_desc: 0 "La terza città di Westeros, e la seconda più piccola, Gulltown è il principale porto della Valle e lo è fin da prima della venuta degli Andali."
building_agot_gold_feather_house_01: 0 "Casa della Piuma d'Oro"
building_agot_gold_feather_house_01_desc: 0 "Gli Arryn di Gulltown hanno compreso da lungo tempo che la chiave del potere sta nell'oro e nel commercio. Avendo abbandonato l'Aquilaia, hanno posto la loro dimora nella loro magione di Gulltown, la Casa della Piuma d'Oro. Adottando le usanze dei mercanti e dei commercianti, gli Arryn di Gulltown si assicureranno la ricchezza necessaria a compiere i loro scopi e a sostenere qualunque pretesa desiderino."

building_type_agot_osgood_square_01: 0 "Gulltown"
building_type_agot_osgood_square_01_desc: 0 "La terza città di Westeros, e la seconda più piccola, Gulltown è il principale porto della Valle e lo è fin da prima della venuta degli Andali."
building_agot_osgood_square_01: 0 "Piazza di Osgood"
building_agot_osgood_square_01_desc: 0 "Avendo perduto il controllo sulla città propriamente detta, Casa Shett ha mantenuto una presenza entro le sue mura, erigendo un piccolo castello all'interno della città. Da qui, gli Shett e i loro eredi sorvegliano la porta principale e sperano un giorno di riguadagnare la propria posizione di signori della città."

  building_type_agot_runestone_01:0 "Runestone"
  building_type_agot_runestone_01_desc:0 "L'antica casa di Casa Royce, Runestone ha visto combattimenti fin dai tempi precedenti all'arrivo degli Andali e anche dopo."
  building_agot_runestone_01:0 "Il Cancello di Bronzo"
building_agot_runestone_01_desc: 0 "La fortezza ancestrale dei Re di Bronzo e di Casa Royce è custodita da una grande porta adornata di bronzo, con antiche rune scolpite nelle pietre della torre porta."

  building_type_agot_gates_of_the_moon_01:0 "Le Porte della Luna"
  building_type_agot_gates_of_the_moon_01_desc:0 "La casa originale della Casa Arryn, le Porte della Luna stanno in piedi con risolutezza. Dove l'Altopiano è famoso per la sua bellezza, è una casa estiva, più palazzo che fortezza. Le Porte della Luna, d'altra parte, sono una fortezza solida e la chiave per controllare non solo l'Altopiano sopra, ma la Valle stessa."
  building_agot_gates_of_the_moon_01:0 "Campo di Battaglia delle Sette Stelle"
building_agot_gates_of_the_moon_01_desc: 0 "La Battaglia delle Sette Stelle segnò la prima volta in cui uno dei Sette Regni cadde dinanzi agli Andali. Fu qui che Ser Artys Arryn sconfisse Robar II, Alto Re della Valle, consolidando il dominio andalo sulla Valle."
  building_agot_gates_of_the_moon_02:0 "Nido Invernale del Falco"
  building_agot_gates_of_the_moon_02_desc:0 "La casa originale della Casa Arryn, le Porte della Luna stanno in piedi con risolutezza. Dove l'Altopiano è famoso per la sua bellezza, è una casa estiva, più palazzo che fortezza. Le Porte della Luna, d'altra parte, sono una fortezza solida e la chiave per controllare non solo l'Altopiano sopra, ma la Valle stessa." #controllare_modifica

  building_type_agot_sisterton_01:0 "Sisterton"
  building_type_agot_sisterton_01_desc:0 "La città principale delle Tre Sorelle, Sisterton è la cosa più simile a un porto principale sulle isole."
  building_agot_sisterton_01:0 "Il Faro Notturno"
  building_agot_sisterton_01_desc:0 "L'antico faro delle Tre Sorelle, il Faro Notturno, è una torre nera che guida i marinai al porto quando è acceso e le navi alla rovina quando non lo è."

  building_type_agot_redfort_01:0 "Redfort"
building_type_agot_redfort_01_desc: 0 "L'antica sede da cui Casa Redfort trae il proprio nome."
  building_agot_redfort_01:0 "Le Mura di Pietra Rossa"
building_agot_redfort_01_desc: 0 "Le mura del Redfort, come il resto del castello, sono fatte di pietra rossa, dando il nome al castello e a Casa Redfort. La forza di queste mura è stata messa alla prova molte volte da Andali, clan delle Montagne della Luna e altri nemici."

building_type_agot_waxley_candlery_01: 0 "Wickenden"
building_type_agot_waxley_candlery_01_desc: 0 "La Cereria Waxley, fondata e patrocinata da Casa Waxley, è la più grande corporazione di Wickenden. Qui, abili cerai fondono cera d'api e profumi per realizzare le loro celebri candele profumate."
building_agot_waxley_candlery_01: 0 "Cereria Waxley"
 building_agot_waxley_candlery_01_desc:0 "$building_type_agot_waxley_candlery_01_desc$"

building_type_agot_sunrise_keep_01: 0 "Torrione dell'Alba"
building_type_agot_sunrise_keep_01_desc: 0 "Costruito là dove le pendici delle Montagne della Luna incontrano le rive del Morso, il formidabile Torrione dell'Alba controlla il passaggio attraverso il Taglio, l'accesso meno battuto alla Valle di Arryn."
 building_agot_sunrise_keep_01:0 "$building_type_agot_sunrise_keep_01$"
 building_agot_sunrise_keep_01_desc:0 "$building_type_agot_sunrise_keep_01_desc$"

  building_type_agot_ironoaks_01:0 "Ironoaks"
  building_type_agot_ironoaks_01_desc:0 "Il castello tradizionale della Casa Waynwood sin dalle Invasioni Andali."
  building_agot_ironoaks_01:0 "La Torre Cerimoniale"
building_agot_ironoaks_01_desc: 0 "Celebre per la propria rigorosa adesione al cerimoniale e alla cavalleria, Casa Waynwood costruì una grande sala dedicata a questi ideali per guidare tutti i cavalieri del castello."

  building_type_agot_strongsong_01:0 "Strongsong"
  building_type_agot_strongsong_01_desc:0 "La sede antica della Casa Belmore, è da qui che hanno mantenuto il controllo del loro dominio nelle Montagne della Luna."
  building_agot_strongsong_01:0 "Lago Bellsong"
building_agot_strongsong_01_desc: 0 "Strongsong, dimora ancestrale di Casa Belmore, è costruita accanto al Lago Bellsong, che ha fornito rifornimenti tanto necessari alle comunità isolate tra le montagne."

  building_type_agot_ruthermont_01:0 "Ruthermont"
  building_type_agot_ruthermont_01_desc:0 "La sede antica della Casa Ruthermont, da qui la casa è prosperata sin dalle Invasioni Andali."
  building_agot_ruthermont_01:0 "Il Ruthermont"
building_agot_ruthermont_01_desc: 0 "La montagna da cui Casa Ruthermont ha tratto il proprio nome è stata una grande fonte di prosperità per la casata. Non traboccante d'oro come le Terre dell'Ovest, le ha comunque permesso di sfruttare e sviluppare meglio le terre circostanti."

  building_type_agot_upcliffs_haven_01:0 "Rifugio di Upcliff"
  building_type_agot_upcliffs_haven_01_desc:0 "Antica dimora della Casa Upcliff, i discendenti di Ursula governano ancora l’isola in questo luogo."
building_agot_upcliffs_haven_01: 0 "Giardino di Ursula"
building_agot_upcliffs_haven_01_desc: 0 "Gli Andali la chiamavano strega, ma quelli di Casa Upcliff e i Primi Uomini della Valle conoscono Ursula Upcliff come la Sposa del Re Tritone, e sulla Witch Isle il suo giardino è ancora curato fino a oggi dalla sua casata."
building_agot_upcliffs_haven_02: 0 "Il Torrione della Sposa del Re Tritone"
building_agot_upcliffs_haven_02_desc: 0 "Approdo di Upcliff è stato trasformato in una grande fortezza, degna della Sposa del Re Tritone, Ursula, progenitrice di Casa Upcliff. Ella protesse la sua isola non soltanto con spada e scudo, ma anche con le onde e i flutti del proprio marito."

building_type_agot_olafs_tomato_farm_01: 0 "Lancia Striata"
building_type_agot_olafs_tomato_farm_01_desc: 0 "Una piccola fortezza situata nella Valle di Arryn."
building_agot_olafs_tomato_farm_01: 0 "Fattoria di Pomodori di Olaf"
building_agot_olafs_tomato_farm_01_desc: 0 "Situata nella Valle di Arryn, vi si trova un'antica fattoria di pomodori. Ben lungi dall'essere la più grande della Valle, produce più del doppio rispetto a fattorie grandi il doppio. Secondo la leggenda, il suo fondatore Olaf diede la propria anima affinché i pomodori coltivati colà fossero particolarmente grandi e nutrienti."

 # Iron Islands Special Buildings
  building_type_pyke_01:0 "Pyke"
  building_type_pyke_01_desc:0 "Pyke è un antico castello. Le scogliere su cui è stato costruito Pyke sono da tempo erose dal mare, e ora le torri del castello si ergono su tre isole e dozzine di formazioni rocciose marine. Il Grande Forte è la sede della Sedia di Pietra, il trono dei governanti delle Isole di Ferro, una posizione attualmente detenuta dalla Casa Greyjoy."
  building_pyke_01:0 "$building_type_pyke_01$"
  building_pyke_01_desc:0 "$building_type_pyke_01_desc$"

  building_type_holy_site_naggas_hill_01:0 "Collina di Nagga"
  building_type_holy_site_naggas_hill_01_desc:0 "Sormontata dalle ossa del grande drago marino Nagga, la Collina di Nagga era dove il leggendario Re Grigio aveva la sua sala e dove gli Uomini di Ferro si sono incontrati per secoli per tenere i kingsmoot e scegliere i loro governanti."
  building_holy_site_naggas_hill_01:0 "$building_type_holy_site_naggas_hill_01$"
  building_holy_site_naggas_hill_01_desc:0 "$building_type_holy_site_naggas_hill_01_desc$"

building_type_agot_ten_towers_01: 0 "Dieci Torri"
building_type_agot_ten_towers_01_desc: 0 "La più recente sede di Casa Harlaw, Ten Towers è uno dei castelli più formidabili delle Isole di Ferro."
building_agot_ten_towers_01: 0 "Dieci Torri"
building_agot_ten_towers_01_desc: 0 "Il castello più grandioso tanto dell’isola quanto di Casa Harlaw, Dieci Torri è celebre per le sue numerose torri, dalla Torre dei Libri alla Torre della Vedova. Negli ultimi anni è divenuta un baluardo di studio e conoscenza — purtroppo, una torcia solitaria nell’oscurità delle Isole di Ferro."

  building_type_agot_hoare_castle_01:0 "Castello Hoare"
  building_type_agot_hoare_castle_01_desc:0 "L'antico castello appartenente a Casa Hoare situato su Great Wyk, non era la loro sala ancestrale, ma piuttosto la loro seconda casa sulle isole."
  building_agot_hoare_castle_01:0 "Cella di Harmund"
building_agot_hoare_castle_01_desc: 0 "Persino nel suo stato di rovina, nelle profondità delle segrete di Castello Hoare si può trovare la cella dove la Strige imprigionò Harmund 'il Bello' Hoare per aver rinnegato il Dio Abissale. Quando la sua ribellione ebbe successo, la Strige tagliò ad Harmund la lingua, il naso e gli occhi."
building_agot_hoare_castle_02: 0 "Castello di Sangue Nero Restaurato"
building_agot_hoare_castle_02_desc: 0 "Ricostruito al suo antico splendore, Castello Hoare si erge di nuovo quale bastione di Grande Wyk e una delle principali sedi delle Isole di Ferro."

  building_type_agot_lonely_light_01:0 "L'Ultima Luce"
  building_type_agot_lonely_light_01_desc:0 "Il più occidentale nel mondo conosciuto, Lonely Light si erge come l'ultimo faro prima dell'ignoto buio al di là del Mare del Tramonto. Sebbene maestri e altri studiosi del mondo credano che sia rotondo, nessun viaggio registrato ha compiuto il viaggio."
  building_agot_lonely_light_01:0 "$building_type_agot_lonely_light_01$"
  building_agot_lonely_light_01_desc:0 "$building_type_agot_lonely_light_01_desc$"

building_type_agot_hammerhorn_01: 0 "Hammerhorn"
building_type_agot_hammerhorn_01_desc: 0 "L’antica sede di Casa Goodbrother e la più grande fortezza di Grande Wyk."
building_agot_hammerhorn_01: 0 "La Rocca del Fratello"
building_agot_hammerhorn_01_desc: 0 "L'antico torrione del fratello del Re Grigio, il Torrione del Fratello è il cuore di Hammerhorn e di Grande Wyk. Da qui Casa Goodbrother si diffuse attraverso le Isole di Ferro, divenendo una delle più grandi, se non la più grande, tra le casate degli Uomini di Ferro."

building_type_agot_lordsport_01: 0 "Lordsport"
building_type_agot_lordsport_01_desc: 0 "La sede di Casa Botley e la più grande cittadina delle Isole di Ferro."
building_agot_lordsport_01: 0 "Lordsport"
building_agot_lordsport_01_desc: 0 "La più grande città delle Isole di Ferro, Lordsport è il principale porto di Pyke. Da qui, le lunghe navi degli Uomini di Ferro hanno da sempre trovato un sicuro approdo, e la città li arma anche di tutto ciò che occorre per le loro razzie nelle terre verdi."

building_type_agot_grey_garden_01: 0 "Giardino Grigio"
building_type_agot_grey_garden_01_desc: 0 "Sede di un ramo cadetto di Casa Harlaw, Giardino Grigio è da lungo tempo un baluardo di forza tanto per Casa Harlaw quanto per l'isola di Harlaw stessa."
building_agot_grey_garden_01: 0 "Il Giardino Grigio"
building_agot_grey_garden_01_desc: 0 "Giardino Grigio è famoso in tutte le Isole di Ferro per l'abilità nelle armi di chi lo chiama casa, una reputazione che continua ad attirare altri fra le sue mura."

building_type_agot_volmark_01: 0 "Volmark"
building_type_agot_volmark_01_desc: 0 "Il castello di Casa Volmark, Volmark è verosimilmente il secondo più grande castello dell'isola, dopo la sede di Casa Harlaw."
building_agot_volmark_01: 0 "Il Porto del Leviatano"
building_agot_volmark_01_desc: 0 "Casa Volmark costruì la propria eredità sulla caccia ai grandi leviatani che solcano i mari. Sono così strettamente associati a queste bestie che il loro stemma ne reca uno. Il loro porto è noto come Porto del Leviatano, poiché non è raro assistere allo scuoiamento dei leviatani sulle sue rive."

 # Beyond the Wall Special Buildings
  building_type_agot_hardhome_01:0 "Aspra Dimora"
  building_type_agot_hardhome_01_desc:0 "L'unico luogo che potrebbe essere considerato una città Oltre la Barriera è Aspra Dimora."
building_type_agot_ruins_hardhome_01_desc: 0 "L'unico luogo che un tempo avrebbe potuto essere considerato una città oltre la Barriera è Brumacasa, sebbene giaccia in rovina da secoli."

 building_type_agot_gorms_port_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_gorms_port_01_desc:0 "$building_type_agot_hardhome_01_desc$"
building_agot_gorms_port_01: 0 "Porto di Gorm"
building_agot_gorms_port_01_desc: 0 "Gorm, uno dei molti capi che rivendicarono una parte di Brumacasa come proprio dominio, era celebre per i suoi contatti oltre il mare e per la costruzione di un porto nella città. Si racconta che abbia persino accolto un maestro della Cittadella."
building_agot_gorms_port_02: 0 "Grande Porto del Vero Nord"
building_agot_gorms_port_02_desc: 0 "Brumacasa è il cuore del Vero Nord. Da qui, il Popolo Libero commercia e accoglie stranieri giunti da oltre il mare."
 building_type_agot_ruins_gorms_port_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_gorms_port_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_gorms_port_01:0 "$building_agot_gorms_port_01$"
 building_agot_ruins_gorms_port_01_desc:0 "$building_agot_gorms_port_01_desc$"
building_agot_ruins_gorms_port_02: 0 "Rovine del Porto"
building_agot_ruins_gorms_port_02_desc: 0 "Un tempo unica città Oltre la Barriera, Brumacasa ora giace in rovina, insieme al suo porto."
building_agot_ruins_gorms_port_03: 0 "Porto di Gorm Ricostruito"
building_agot_ruins_gorms_port_03_desc: 0 "Il porto costruito da Gorm il Lupo è stato restaurato e ancora una volta serve Brumacasa e il suo capo."
 building_agot_ruins_gorms_port_04:0 "$building_agot_gorms_port_02$"
 building_agot_ruins_gorms_port_04_desc:0 "$building_agot_gorms_port_02_desc$"

 building_type_agot_raymons_hall_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_raymons_hall_01_desc:0 "$building_type_agot_hardhome_01_desc$"
building_agot_raymons_hall_01: 0 "Sala di Raymon"
building_agot_raymons_hall_01_desc: 0 "Uno dei capi che si contesero il controllo della città di Brumacasa fu Raymon, detto l'Ammaliatore. Era celebre per la sala che fece erigere, dove ospitava i suoi futuri rivali e li trasformava in amici."
building_agot_raymons_hall_02: 0 "Grande Sala del Popolo Libero"
building_agot_raymons_hall_02_desc: 0 "Questa sala si erge come faro per tutto il Popolo Libero, un luogo dove riunirsi e discutere con il proprio re questioni grandi e piccole."
 building_type_agot_ruins_raymons_hall_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_raymons_hall_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_raymons_hall_01:0 "$building_agot_raymons_hall_01$"
 building_agot_ruins_raymons_hall_01_desc:0 "$building_agot_raymons_hall_01_desc$"
building_agot_ruins_raymons_hall_02: 0 "Sala in Rovina"
building_agot_ruins_raymons_hall_02_desc: 0 "Un tempo unica città Oltre la Barriera, Brumacasa ora giace in rovina, insieme alla sua sala."
building_agot_ruins_raymons_hall_03: 0 "Sala di Raymon Ricostruita"
building_agot_ruins_raymons_hall_03_desc: 0 "La Sala di Raymon l'Ammaliatore è ricostruita e ancora una volta accoglie fra le sue pareti molti del Popolo Libero."
 building_agot_ruins_raymons_hall_04:0 "$building_agot_raymons_hall_02$"
 building_agot_ruins_raymons_hall_04_desc:0 "$building_agot_raymons_hall_02_desc$"

 building_type_agot_halgars_keep_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_halgars_keep_01_desc:0 "$building_type_agot_hardhome_01_desc$"
building_agot_halgars_keep_01: 0 "Fortezza di Halgar"
building_agot_halgars_keep_01_desc: 0 "Halgar Pugno-di-Pietra costruì e presidiò la più grande fortezza di Brumacasa. Sempre vigile contro gli attacchi dei rivali, Halgar la innalzò solida, sicura e priva di ogni comodità."
building_agot_halgars_keep_02: 0 "Grande Fortezza di Pietra"
building_agot_halgars_keep_02_desc: 0 "Brumacasa è ora sorvegliata da una terribile Grande Fortezza, costruita in pietra. È abbastanza robusta da respingere qualunque aspirante aggressore."
 building_type_agot_ruins_halgars_keep_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_halgars_keep_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_halgars_keep_01:0 "$building_agot_halgars_keep_01$"
 building_agot_ruins_halgars_keep_01_desc:0 "$building_agot_halgars_keep_01_desc$"
building_agot_ruins_halgars_keep_02: 0 "Fortezza Spezzata"
building_agot_ruins_halgars_keep_02_desc: 0 "Un tempo unica città Oltre la Barriera, Brumacasa ora giace in rovina, insieme alla sua fortezza."
building_agot_ruins_halgars_keep_03: 0 "Fortezza di Halgar Ricostruita"
building_agot_ruins_halgars_keep_03_desc: 0 "Ricostruita, la Fortezza di Halgar Pugno-di-Pietra torna a svettare su Brumacasa, donando alla città un cuore di pietra."
 building_agot_ruins_halgars_keep_04:0 "$building_agot_halgars_keep_02$"
 building_agot_ruins_halgars_keep_04_desc:0 "$building_agot_halgars_keep_02_desc$"

 building_type_agot_drekis_tunnels_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_drekis_tunnels_01_desc:0 "$building_type_agot_hardhome_01_desc$"
building_agot_drekis_tunnels_01: 0 "Gallerie di Dreki"
building_agot_drekis_tunnels_01_desc: 0 "Nel suo tentativo di controllare Brumacasa, Dreki il Congelato fece scavare vaste gallerie sotto la città. Gli permisero di muoversi di nascosto, spiare i rivali e accogliere coloro che ebbero la sventura di essere suoi ospiti."
building_agot_drekis_tunnels_02: 0 "Grandi Gallerie di Brumacasa"
building_agot_drekis_tunnels_02_desc: 0 "Le gallerie e i passaggi avviati da Dreki si sono espansi in ogni angolo di Brumacasa. Chi li conosce ottiene una capacità senza pari di colpire qualunque nemico."
 building_type_agot_ruins_drekis_tunnels_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_drekis_tunnels_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_drekis_tunnels_01:0 "$building_agot_drekis_tunnels_01$"
 building_agot_ruins_drekis_tunnels_01_desc:0 "$building_agot_drekis_tunnels_01_desc$"
building_agot_ruins_drekis_tunnels_02: 0 "Gallerie Crollate"
building_agot_ruins_drekis_tunnels_02_desc: 0 "Un tempo unica città Oltre la Barriera, Brumacasa ora giace in rovina, insieme alle sue gallerie crollate."
building_agot_ruins_drekis_tunnels_03: 0 "Gallerie di Dreki Risanate"
building_agot_ruins_drekis_tunnels_03_desc: 0 "Ripulite ancora una volta, le gallerie di Dreki il Congelato ora servono un nuovo padrone, instillando un senso di paranoia in chiunque si trovi entro Brumacasa."
 building_agot_ruins_drekis_tunnels_04:0 "$building_agot_drekis_tunnels_02$"
 building_agot_ruins_drekis_tunnels_04_desc:0 "$building_agot_drekis_tunnels_02_desc$"

  building_type_agot_ruins_fist_of_the_first_men_01:0 "Pugno dei Primi Uomini"
  building_type_agot_ruins_fist_of_the_first_men_01_desc:0 "Sulla collina consumata dal vento e dal tempo, si ergono i resti di un antico forte circolare distrutto, che fa sembrare la collina un pugno con le pietre che sporgono come le nocche."
  building_agot_ruins_fist_of_the_first_men_01:0 "Il Forte Spezzato"
  building_agot_ruins_fist_of_the_first_men_01_desc:0 "$building_type_agot_ruins_fist_of_the_first_men_01_desc$"
  building_agot_ruins_fist_of_the_first_men_02:0 "Il Forte di Emergenza"
  building_agot_ruins_fist_of_the_first_men_02_desc:0 "Presa posizione sulla Pugno, sono state erette fortificazioni improvvisate per rafforzare il punto dove il vecchio forte circolare è crollato."
  building_agot_ruins_fist_of_the_first_men_03:0 "Il Forte Ricostruito"
  building_agot_ruins_fist_of_the_first_men_03_desc:0 "Le antiche mura del forte circolare distrutto ora si ergono alte con torri, dando alla Pugno un guanto di pietra contro qualsiasi nemico."
  building_agot_ruins_fist_of_the_first_men_04:0 "Il Castello del Pugno"
  building_agot_ruins_fist_of_the_first_men_04_desc:0 "Il Pugno dei Primi Uomini ora è all'altezza del suo nome. Sulla collina ora sorge un vero forte, pronto a respingere qualsiasi nemico."

  building_type_agot_btw_milkwater_cairns_01:0 "Tumuli della Valle del Latte"
  building_type_agot_btw_milkwater_cairns_01_desc:0 "Nella Valle del Latte, i Bruti seppelliscono i loro re ed eroi in grandi tumuli e barrows. I Bruti che vivono fra loro curano le tombe, onorando i morti con riverenza."
  building_agot_btw_milkwater_cairns_01:0 "$building_type_agot_btw_milkwater_cairns_01$"
  building_agot_btw_milkwater_cairns_01_desc:0 "$building_type_agot_btw_milkwater_cairns_01_desc$"

  building_type_agot_btw_frostfang_crypts_01:0 "Cripte dei Denti di Ghiaccio"
  building_type_agot_btw_frostfang_crypts_01_desc:0 "I Denti di Ghiaccio sono antichi e gelidi. Lì i Bruti talvolta tumulano i loro lord e re in cripte oscure e spettrali."
  building_agot_btw_frostfang_crypts_01:0 "$building_type_agot_btw_frostfang_crypts_01$"
  building_agot_btw_frostfang_crypts_01_desc:0 "$building_type_agot_btw_frostfang_crypts_01_desc$"

  building_type_agot_haggons_tower_01:0 "Dimora del Metamorfo"
  building_type_agot_haggons_tower_01_desc:0 "I Metamorfi non sono benvenuti nei villaggi e nelle tribù; costruiscono rifugi solitari o si ritrovano in piccoli gruppi fra loro."
  building_agot_haggons_tower_01:0 "Torre di Haggon"
  building_agot_haggons_tower_01_desc:0 "Haggon era noto sia ai Bruti oltre la Barriera sia ai Guardiani della Notte. Dove altri usavano il loro dono per terrore e dominio, Haggon insegnò un’altra via, cercando di impedire ai suoi simili di diventare abomini."

  building_type_agot_ruddy_hall_01:0 "Sala Rossa"
  building_type_agot_ruddy_hall_01_desc:0 "La Sala Rossa, dimora di Tormund Granlingua, è celebre oltre i Denti di Ghiaccio per il suo idromele robusto e i suoi focolari scoppiettanti."
  building_agot_ruddy_hall_01:0 "Sala Rossa"
  building_agot_ruddy_hall_01_desc:0 "$building_type_agot_ruddy_hall_01_desc$"

  building_type_agot_the_heated_pools_01:0 "Piscine Calde"
  building_type_agot_the_heated_pools_01_desc:0 "Oltre la Barriera, dove il gelo è implacabile, si trovano alcune grandi piscine calde. Offrono calore e conforto a chi vive vicino e possono decidere fra vita e morte."
  building_agot_the_heated_pools_01:0 "Piscine Calde"
  building_agot_the_heated_pools_01_desc:0 "$building_type_agot_the_heated_pools_01_desc$"

  building_type_agot_cold_cradle_01:0 "La Culla Gelida"
  building_type_agot_cold_cradle_01_desc:0 "Non tutti gli uomini oltre la Barriera rispettano il Patto; alcuni si sono rivolti a dei più oscuri e gelidi. E che vale la vita di un figlio rispetto al favore degli Antichi Dei?"
  building_agot_cold_cradle_01:0 "La Culla Gelida"
  building_agot_cold_cradle_01_desc:0 "$building_type_agot_cold_cradle_01_desc$"

  building_type_agot_others_arrival_01:0 "L'Arrivo degli Estranei"
  building_type_agot_others_arrival_01_desc:0 "Quando la Lunga Notte tornerà, gli Estranei marceranno di nuovo dalle Terre dell’Eterna Inverno, portando oscurità e morte ai regni degli uomini."
  building_agot_others_arrival_01:0 "L'Arrivo degli Estranei"
  building_agot_others_arrival_01_desc:0 "$building_type_agot_others_arrival_01_desc$"

  building_type_agot_whitetree_01:0 "Villaggio dell'Albero Bianco"
  building_type_agot_whitetree_01_desc:0 "Uno dei più antichi insediamenti a nord della Barriera, il Villaggio dell'Albero Bianco sorge sotto un enorme albero sacro, offrendo rifugio stabile a chi affronta l’inverno."
  building_agot_whitetree_01:0 "Villaggio dell'Albero Bianco"
  building_agot_whitetree_01_desc:0 "$building_type_agot_whitetree_01_desc$"

  building_type_agot_selkie_sund_01:0 "Insenatura delle Selkie"
  building_type_agot_selkie_sund_01_desc:0 "Laggiù, sulla Costa Gelata, giacciono i resti di un’enorme creatura. I Bruti locali dicono siano le ossa di un drago marino, scacciato dal mare dalle stesse Selkie."
  building_agot_selkie_sund_01:0 "Resti del Drago Marino"
  building_agot_selkie_sund_01_desc:0 "$building_type_agot_selkie_sund_01_desc$"

  building_type_agot_last_green_01:0 "Ultimo Verde"
  building_type_agot_last_green_01_desc:0 "Poco prima che le terre diventino un gelido deserto, in un luogo chiamato Ultimo Verde, giace un’antica conchiglia di granchio gigante. È lì da quando cantastorie e anziani esistono, e c’è chi crede sia il guscio mortale di uno degli Antichi Dei."
  building_agot_last_green_01:0 "La Grande Conchiglia"
  building_agot_last_green_01_desc:0 "$building_type_agot_last_green_01_desc$"

  building_type_agot_charred_weald_01:0 "Selva Carbonizzata"
  building_type_agot_charred_weald_01_desc:0 "La Selva Carbonizzata custodisce un antico campo di battaglia. Ogni tribù narra di aver combattuto lì contro il nemico del suo tempo, e le storie persistono immutate nei secoli."
  building_agot_charred_weald_01:0 "Selva Carbonizzata"
  building_agot_charred_weald_01_desc:0 "$building_type_agot_charred_weald_01_desc$"

  building_type_agot_great_ice_dome_01:0 "Grande Cupola di Ghiaccio"
  building_type_agot_great_ice_dome_01_desc:0 "Il luogo di raduno centrale della Confederazione dei Popoli del Lago, la Grande Cupola di Ghiaccio è un’imponente struttura nell’estremo Nord, capace di ospitare senza fatica decine di signori e capi delle varie genti."
  building_agot_great_ice_dome_01:0 "$building_type_agot_great_ice_dome_01$"
  building_agot_great_ice_dome_01_desc:0 "$building_type_agot_great_ice_dome_01_desc$"

  building_type_agot_thenn_great_kilns_01:0 "Tun Vunag"
  building_type_agot_thenn_great_kilns_01_desc:0 "Il principale insediamento dei Thenn, è da qui che i Magnar hanno governato il loro popolo sin dall'Età dell'Alba."
  building_agot_thenn_great_kilns_01:0 "Le Grandi Fornaci di Tun Vunag"
  building_agot_thenn_great_kilns_01_desc:0 "I Thenn sono famosi tra tutte le tribù Oltre la Barriera per essere l'unico gruppo a lavorare il metallo, estraendo stagno e rame e fondendo bronzo. Questo ha dato loro un vantaggio sui loro vicini, sia militarmente che economicamente."

  building_type_agot_thenn_valley_01:0 "Valle dei Thenn"
  building_type_agot_thenn_valley_01_desc:0 "La Valle dei Thenn ha da tempo offerto rifugio al Magnar e al suo popolo, essendo molto più calda e fertile delle terre circostanti, permettendo ai Thenn un grado di stabilità non concesso agli altri Bruti."
  building_agot_thenn_valley_01:0 "$building_type_agot_thenn_valley_01$"
  building_agot_thenn_valley_01_desc:0 "$building_type_agot_thenn_valley_01_desc$"

  building_type_agot_thenn_great_circle_01:0 "Kelksam"
  building_type_agot_thenn_great_circle_01_desc:0 "Kelksam è la casa del Grande Tumulo Circolare, il principale sito religioso nella Valle dei Thenn, se non Oltre la Barriera nel suo complesso."
  building_agot_thenn_great_circle_01:0 "Il Grande Tumulo Circolare"
  building_agot_thenn_great_circle_01_desc:0 "Il luogo più sacro nella Valle dei Thenn è il Grande Tumulo Circolare, dove i più grandi Magnar del passato sono stati sepolti."

  building_type_agot_thenn_small_circle_01:0 "Yaykdaes"
  building_type_agot_thenn_small_circle_01_desc:0 "Il secondo grande sito della Valle dei Thenn è il Piccolo Tumulo, un tumulo più vecchio e meno imponente."
  building_agot_thenn_small_circle_01:0 "Il Piccolo Tumulo "
  building_agot_thenn_small_circle_01_desc:0 "A nord del Grande Tumulo Circolare si trova il Piccolo Tumulo, che secondo la leggenda e il costume dei Thenn precede il Grande Tumulo Circolare ed è la tomba dei primi tre Magnar del popolo Thenn."

  building_type_agot_srunmued_copper_mines_01:0 "Miniere di Rame di Srunmued"
building_type_agot_srunmued_copper_mines_01_desc: 0 "Le miniere di rame di Srunmued sono una risorsa fondamentale per i Thenn e uno dei principali centri economici della valle."
  building_agot_srunmued_copper_mines_01:0 "Piccole Miniere di Rame di Srunmued"
  building_agot_srunmued_copper_mines_01_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"
  building_agot_srunmued_copper_mines_02:0 "Miniere di Rame di Srunmued"
  building_agot_srunmued_copper_mines_02_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"
  building_agot_srunmued_copper_mines_03:0 "Grandi Miniere di Rame di Srunmued"
  building_agot_srunmued_copper_mines_03_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"
  building_agot_srunmued_copper_mines_04:0 "Grandi Miniere di Rame di Srunmued"
  building_agot_srunmued_copper_mines_04_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"

  building_type_agot_krih_tin_mines_01:0 "Miniere di Stagno di Krih"
building_type_agot_krih_tin_mines_01_desc: 0 "Le miniere di stagno di Krih sono una risorsa fondamentale per i Thenn e uno dei principali centri economici della valle."
  building_agot_krih_tin_mines_01:0 "Piccole Miniere di Stagno di Krih"
  building_agot_krih_tin_mines_01_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"
  building_agot_krih_tin_mines_02:0 "Miniere di Stagno di Krih"
  building_agot_krih_tin_mines_02_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"
  building_agot_krih_tin_mines_03:0 "Grandi Miniere di Stagno di Krih"
  building_agot_krih_tin_mines_03_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"
  building_agot_krih_tin_mines_04:0 "Grandi Miniere di Stagno di Krih"
  building_agot_krih_tin_mines_04_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"

 # The Disputed Lands Special Buildings
  building_type_agot_tree_of_crowns_01:0 "Albero delle Corone"
  building_type_agot_tree_of_crowns_01_desc:0 "Un gigantesco quercia morta che porta le corone di innumerevoli aspiranti re e regine che tutti cercavano di stabilire un regno nelle Terre Contese. Molti credono che i giuramenti pronunciati sotto di esso saranno sempre mantenuti, purché venga lasciata un'offerta."
  building_agot_tree_of_crowns_01:0 "$building_type_agot_tree_of_crowns_01$"
  building_agot_tree_of_crowns_01_desc:0 "$building_type_agot_tree_of_crowns_01_desc$"

  building_type_agot_triarchy_council_01:0 "Alta Curia della Triarchia"
  building_type_agot_triarchy_council_01_desc:0 "La Triarchia di Lys, Tyrosh e Myr non è un regno come lo intendono i gli abbitanti di Westeros. Invece di un re, un signore del mare, o anche triarchi, le Tre Figlie sono governate dall'Alta Curia, composta da Tre e Trenta membri, con ogni città che invia un numero uguale. Il consiglio si riunisce in nessuna delle tre città, ma piuttosto si riunisce nel profondo delle Terre Contese, così nessuna città è sopra le sue sorelle."
  building_agot_triarchy_council_01:0 "$building_type_agot_triarchy_council_01$"
  building_agot_triarchy_council_01_desc:0 "$building_type_agot_triarchy_council_01_desc$"

  building_type_agot_ruins_triarchy_council_01:0 "$building_type_agot_triarchy_council_01$"
  building_type_agot_ruins_triarchy_council_01_desc:0 "$building_type_agot_triarchy_council_01_desc$"
  building_agot_ruins_triarchy_council_01:0 "Il Sororidio"
  building_agot_ruins_triarchy_council_01_desc:0 "L'ex sede dell'Alta Curia della Triarchia, questa sala ora sta come una testimonianza dei legami spezzati tra le tre sorelle e della vittoria di coloro che hanno combattuto contro l'Alleanza Eterna."
  building_agot_ruins_triarchy_council_02:0 "L'Alta Curia della Triarchia Ricostruita"
  building_agot_ruins_triarchy_council_02_desc:0 "$building_type_agot_triarchy_council_01_desc$"

  building_type_agot_monument_of_borderland_01:0 "Monumento alla Battaglia del Confine"
  building_type_agot_monument_of_borderland_01_desc:0 "La Battaglia del Confine fu la prima volta dalla Secolo di Sangue che Lys, Myr e Tyrosh agirono insieme e sconfissero di nuovo i Volanteni. In ricordo, le Tre Figlie eressero un pilastro per commemorare la vittoria."
  building_agot_monument_of_borderland_01:0 "$building_type_agot_monument_of_borderland_01$"
  building_agot_monument_of_borderland_01_desc:0 "$building_type_agot_monument_of_borderland_01_desc$"

building_type_agot_miviyaan_slave_market_01: 0 "Miviyaan"
building_type_agot_miviyaan_slave_market_01_desc: 0 "Il Mercato degli Schiavi di Miviyaan fungeva da principale mercato di schiavi del Tallone, e vi giungevano molti schiavi Hartalari catturati nei conflitti delle Terre Contese."
building_agot_miviyaan_slave_market_01: 0 "Mercato degli Schiavi di Miviyaan"
 building_agot_miviyaan_slave_market_01_desc:0 "$building_type_agot_miviyaan_slave_market_01_desc$"

building_type_agot_ormyan_palace_01: 0 "Ormyan"
building_type_agot_ormyan_palace_01_desc: 0 "Ormyan è la sede del potere nelle Terre Contese."
building_agot_ormyan_palace_01: 0 "Palazzo degli Hartalari"
building_agot_ormyan_palace_01_desc: 0 "Ora che le Terre Contese sono state unificate sotto gli Hartalari, la pace potrebbe infine regnare sul Tallone. Per celebrare ciò, è stato costruito un grande palazzo che funga da simbolo di unità e autorità."

 # Stepstones Special Buildings
  building_type_agot_racallios_fort_01:0 "Sede di Bloodstone"
  building_type_agot_racallios_fort_01_desc:0 "Bloodstone, la più grande delle Stepstones, è sempre stata un rifugio per i pirati e i corsari che solcano queste acque."
  building_agot_racallios_fort_01:0 "Fortino di Racallio"
  building_agot_racallios_fort_01_desc:0 "Racallio Ryndoon fu inviato numerose volte per conquistare le Stepstones dal regno mercenario stabilito da Daemon Targaryen: prima dall'Alleanza Eterna di Lys, Myr e Tyrosh e poi da Tyrosh da solo. Quando finalmente riuscì, invece di consegnare le sue conquiste alla sua città natale, divenne pirata e si autoproclamò re. Da Bloodstone avrebbe combattuto e alleato con le Tre Figlie, Braavos, Pentos, Dorne, Driftmark e il Trono di Spade, cambiando alleanze con i venti della fortuna."

  building_type_agot_crab_fields_01:0 "Letto della Donzella"
  building_type_agot_crab_fields_01_desc:0 "Anche se non così infame come Bloodstone, Denmaiden e il rifugio pirata del Letto della Donzella sono pericolosi quanto qualsiasi isola delle Stepstones o delle Isole Basilisco."
  building_agot_crab_fields_01:0 "Campi dei Granchi"
  building_agot_crab_fields_01_desc:0 "Quando Craghar Drahar fece l'impossibile e liberò le Stepstones dalla piaga dei pirati, fu brutale verso chiunque sollevasse le bandiere nere. I pirati condannati venivano conficcati su pali e lasciati sulla spiaggia per essere divorati dai granchi mentre morivano."

 # Tyrosh Special Buildings
  building_type_agot_tyrosh_01:0 "Mura Nere di Tyrosh"
  building_type_agot_tyrosh_01_desc:0 "Come Volantis prima di essa, Tyrosh iniziò come un avamposto militare e per sostenerlo il Dominio creò una grande muraglia nera fusa, non così grande come Volantis o così formidabile come Roccia del Drago, ha difeso la parte più antica della città per millenni."
  building_agot_tyrosh_01:0 "$building_type_agot_tyrosh_01$"
  building_agot_tyrosh_01_desc:0 "$building_type_agot_tyrosh_01_desc$"

  building_type_agot_bleeding_tower_01:0 "La Torre Sanguinante"
  building_type_agot_bleeding_tower_01_desc:0 "La Torre Sanguinante, con il suo brillante fuoco segnale, si erge alta sopra il porto di Tyrosh. L'aria salmastra del mare ha degradato le vecchie alette di ferro in cima alla torre di guardia, che ora gocciolano ruggine simile al sangue lungo il mattone, dando alla torre il suo nome. Le sue mura hanno visto la fine di molti invasori, anche se sono state violate altrettante volte."
  building_agot_bleeding_tower_01:0 "$building_type_agot_bleeding_tower_01$"
  building_agot_bleeding_tower_01_desc:0 "$building_type_agot_bleeding_tower_01_desc$"

  building_type_agot_grand_temple_of_trios_01:0 "Grande Tempio di Trios"
  building_type_agot_grand_temple_of_trios_01_desc:0 "Il Grande Tempio di Trios è una vista centrale a Tyrosh, si erge alta sopra il fiume, è un faro nella città tanto quanto la Torre Sanguinante."
  building_agot_grand_temple_of_trios_01:0 "$building_type_agot_grand_temple_of_trios_01$"
  building_agot_grand_temple_of_trios_01_desc:0 "$building_type_agot_grand_temple_of_trios_01_desc$"

  building_type_agot_tyrosh_walls_01:0 "Mura di Tyrosh"
  building_type_agot_tyrosh_walls_01_desc:0 "La Città Libera di Tyrosh è difesa dalle sue grandi mura di pietra e torri. Da tempo è motivo di orgoglio per la città."
  building_agot_tyrosh_walls_01:0 "Le Mura dell'Arconato"
  building_agot_tyrosh_walls_01_desc:0 "Circondando tutta la città, le Mura dell'Arconato, costruite quando la città di Tyrosh era cresciuta oltre le Mura Nere e aveva ottenuto l'autonomia dal Libero Comune, offrono rifugio sia ai cittadini all'interno che ai collezionisti di lumache all'esterno con le loro torri semicircolari."

  building_type_agot_red_temple_tyrosh_01:0 "Tempio del Signore della Luce di Tyrosh"
  building_type_agot_red_temple_tyrosh_01_desc:0 "Il Tempio del Signore della Luce di Tyrosh è una caratteristica più recente della città, arrivato solo dopo il Secolo di Sangue. Nonostante ciò, i R'hlloristi hanno fatto progressi nell'integrarsi nella città a tutti i livelli, così che nemmeno l'Arconte può rimproverare apertamente il Sommo Sacerdote della città."
building_agot_red_temple_tyrosh_01: 0 "Tempio della Fuliggine Nera"
  building_agot_red_temple_tyrosh_01_desc:0 "$building_type_agot_red_temple_tyrosh_01_desc$"

 # Lys Special Buildings
  building_type_agot_temple_of_trade_01:0 "Tempio del Commercio"
  building_type_agot_temple_of_trade_01_desc:0 "Centro del governo di Lys, il Tempio del Commercio è dove i Magistri si riuniscono quando convocati dal Primo Magistro. Il tempio è celebre per le esecuzioni pubbliche celebrate ai suoi piedi ogni volta che un Magistro supera i propri limiti."
  building_agot_temple_of_trade_01:0 "$building_type_agot_temple_of_trade_01$"
  building_agot_temple_of_trade_01_desc:0 "$building_type_agot_temple_of_trade_01_desc$"

  building_type_agot_lys_walls_01:0 "Mura di Lys"
  building_type_agot_lys_walls_01_desc:0 "La Città Libera di Lys è difesa dalle sue possenti mura e dalle torri di pietra. Da sempre ispirano orgoglio agli abitanti."
  building_agot_lys_walls_01:0 "Mura Marine"
  building_agot_lys_walls_01_desc:0 "Erette a difesa della città e delle numerose Case del Piacere e dei giardini, le Mura Marine di Lys splendono al sole per accogliere ogni visitatore, amico o nemico."

  building_type_agot_temple_of_yndros_01:0 "Tempio del Crepuscolo"
  building_type_agot_temple_of_yndros_01_desc:0 "Il grande tempio dedicato a Yndros del Crepuscolo, una delle divinità più venerate a Lys. Si narra che chi vi entra da uomo o da donna ne esca trasformato nell’altro sesso."
  building_agot_temple_of_yndros_01:0 "$building_type_agot_temple_of_yndros_01$"
  building_agot_temple_of_yndros_01_desc:0 "$building_type_agot_temple_of_yndros_01_desc$"

  building_type_agot_red_temple_lys_01:0 "Tempio del Signore della Luce di Lys"
  building_type_agot_red_temple_lys_01_desc:0 "Il Tempio del Signore della Luce di Lys è stato un faro per i R'hlloristi sin dai tempi sotto il dominio Volanteno. Nonostante le sue radici straniere, ha sempre sostenuto Lys e i suoi interessi all'estero, assicurandosi un posto nelle complesse intrighe della città."
building_agot_red_temple_lys_01: 0 "Tempio delle Passioni Ardenti"
  building_agot_red_temple_lys_01_desc:0 "$building_type_agot_red_temple_lys_01_desc$"

  building_type_agot_port_of_lys_01:0 "Porto di Lys"
  building_type_agot_port_of_lys_01_desc:0 "Il grandioso porto di Lys, pur non essendo celebre come quelli di Braavos o Volantis, resta uno dei principali delle Città Libere. Essendo un’isola, merci – materiali o schiavi – transitano qui, mentre la torre di Aeksio Vilinion, signore del porto, veglia dall’alto."
  building_agot_port_of_lys_01:0 "$building_type_agot_port_of_lys_01$"
  building_agot_port_of_lys_01_desc:0 "$building_type_agot_port_of_lys_01_desc$"

  building_type_agot_prison_of_lys_01:0 "Prigione di Lys"
  building_type_agot_prison_of_lys_01_desc:0 "La Prigione di Lys, tristemente nota come Ozlet, è celebre per le sue mura invalicabili e le sue celle sotterranee. Si dice che chiunque vi entri non rivedrà mai più il sole."
  building_agot_prison_of_lys_01:0 "L'Ozlet"
  building_agot_prison_of_lys_01_desc:0 "$building_type_agot_prison_of_lys_01_desc$"

  building_type_agot_perfumed_garden_01:0 "Giardino Profumato"
  building_type_agot_perfumed_garden_01_desc:0 "Il celebre bordello della famiglia Rogare, il Giardino Profumato ha ospitato molte delle cortigiane e degli schiavi da letto più rinomati di Lys, ed è stato fucina di intrighi orditi sia dai padroni sia da chi tramava contro di loro."
  building_agot_perfumed_garden_01:0 "$building_type_agot_perfumed_garden_01$"
  building_agot_perfumed_garden_01_desc:0 "$building_type_agot_perfumed_garden_01_desc$"

building_type_agot_qeldlen_fort_01: 0 "Qeldlen"
building_type_agot_qeldlen_fort_01_desc: 0 "Costruito durante il conflitto seguito al crollo della Triarchia, il Forte di Harako fu eretto per proteggere Casa Bazanne e i possedimenti di Lys da Tyrosh, Myr e dai ribelli Hartalari."
building_agot_qeldlen_fort_01: 0 "Forte di Harako"
 building_agot_qeldlen_fort_01_desc:0 "$building_type_agot_qeldlen_fort_01_desc$"

building_type_agot_hartalari_makseon_01: 0 "Makseon"
building_type_agot_hartalari_makseon_01_desc: 0 "Makseon è il principale porto continentale dei Lyseni. Saldo nelle loro mani, è ritenuto più vicino a Lys che alle altre terre continentali di Essos."
building_agot_hartalari_makseon_01: 0 "Mura Hartalari"
building_agot_hartalari_makseon_01_desc: 0 "Gli Hartalari hanno scacciato i Lyseni dalle coste del Tallone e si sono assicurati il porto di Makseon. Fortificata da solide mura, questa sede di potere si erge quale bastione hartalari contro gli invasori stranieri."

 # Myr Special Buildings
  building_type_agot_great_wheel_01:0 "Grande Ruota di Myr"
  building_type_agot_great_wheel_01_desc:0 "Famosa per le sue grandi opere industriali, Myr usa la sua ingegnosità nel sfruttare il potere dei fiumi con la Grande Ruota, consentendo loro di continuare nei loro molteplici progetti."
  building_agot_great_wheel_01:0 "$building_type_agot_great_wheel_01$"
  building_agot_great_wheel_01_desc:0 "$building_type_agot_great_wheel_01_desc$"

  building_type_agot_grand_temple_of_gelenei_01:0 "Grande Tempio di Gelenei"
  building_type_agot_grand_temple_of_gelenei_01_desc:0 "Il Grande Tempio di Gelenei è uno dei pochi luoghi verdi nella città dell'industria. Eretto alto e attraverso il fiume dal Tempio Rosso, accoglie tutti."
  building_agot_grand_temple_of_gelenei_01:0 "$building_type_agot_grand_temple_of_gelenei_01$"
  building_agot_grand_temple_of_gelenei_01_desc:0 "$building_type_agot_grand_temple_of_gelenei_01_desc$"

  building_type_agot_red_temple_myr_01:0 "Tempio del Signore della Luce di Myr"
  building_type_agot_red_temple_myr_01_desc:0 "Il Tempio del Signore della Luce è uno dei luoghi più importanti di Myr, le sue mura rosse e dorate brillanti sono un faro per la gloria di R'hllor per tutti, indipendentemente dal fatto che abbiano visto la luce o meno."
building_agot_red_temple_myr_01: 0 "Tempio della Fiamma Rapace"
  building_agot_red_temple_myr_01_desc:0 "$building_type_agot_red_temple_myr_01_desc$"

  building_type_agot_myr_01:0 "Palazzo del Conclave"
  building_type_agot_myr_01_desc:0 "Il Palazzo del Conclave è la sede del Conclave Magistrale, il consiglio di governo di Myr. Si crede che un tempo fosse una fortezza andala, ma mostra un'influenza rhoynese, supportando la convinzione che i myrishi abbiano radici in entrambe le culture."
  building_agot_myr_01:0 "$building_type_agot_myr_01$"
  building_agot_myr_01_desc:0 "$building_type_agot_myr_01_desc$"

  building_type_agot_statue_of_trios_01:0 "Statua di Trios"
  building_type_agot_statue_of_trios_01_desc:0 "Anche se Trios non è uno degli dei principali venerati a Myr, si crede che un tempo lo fosse, come si può vedere dalla sua grande statua. Oppure, forse è stata costruita per attirare i mercanti tyroshi nella città."
  building_agot_statue_of_trios_01:0 "$building_type_agot_statue_of_trios_01$"
  building_agot_statue_of_trios_01_desc:0 "$building_type_agot_statue_of_trios_01_desc$"

  building_type_agot_myr_cliffs_01:0 "Le Scogliere di Cliffs"
  building_type_agot_myr_cliffs_01_desc:0 "Avvolgendo il porto di Myr, le Scogliere di Cliffs offrono un rifugio naturale e sicurezza alla città dal mare. La sua prossimità alla riva significa spazio limitato per progetti di costruzione estesi, ma serve anche a scoraggiare eventuali invasori."
  building_agot_myr_cliffs_01:0 "$building_type_agot_myr_cliffs_01$"
  building_agot_myr_cliffs_01_desc:0 "$building_type_agot_myr_cliffs_01_desc$"

  building_type_agot_myr_walls_01:0 "Mura di Myr"
  building_type_agot_myr_walls_01_desc:0 "La Città Libera di Myr è difesa dalle sue grandi mura di pietra e torri. Da tempo è motivo di orgoglio per la città."
  building_agot_myr_walls_01:0 "Le mura Scanalate"
  building_agot_myr_walls_01_desc:0 "Le Mura di Myr sono ben conosciute per le sue sei grandi torri, che si ergono alte sopra la città, e le grandi fiasche che appaiono lungo le mura, rendendo più difficile per qualsiasi attaccante saccheggiare la città scolastica."

building_type_agot_taelas_gap_01: 0 "Taelas"
building_type_agot_taelas_gap_01_desc: 0 "Principale via tra Myr e il Rhoyne, il Passo di Taelas funge da confine orientale di Myr da tempo immemorabile. Pur essendo di importanza strategica vitale, coloro che vengono nominati a comandarlo sono ben lontani dalla ricchezza e dall'influenza della città, privi dei privilegi goduti da chi è più vicino al Conclave."
building_agot_taelas_gap_01: 0 "Passo di Taelas"
 building_agot_taelas_gap_01_desc:0 "$building_type_agot_taelas_gap_01_desc$"

building_type_agot_naeros_irrigation_01: 0 "Naeros"
building_type_agot_naeros_irrigation_01_desc: 0 "Lungo i fiumi a nord di Myr abbondano poderi e campi fertili, arricchiti e resi più produttivi grazie all'attento impiego dell'irrigazione."
building_agot_naeros_irrigation_01: 0 "Irrigazione di Naeros"
 building_agot_naeros_irrigation_01_desc:0 "$building_type_agot_naeros_irrigation_01_desc$"

 # Pentos Special Buildings
  building_type_agot_pentos_01:0 "Palazzo del Principe"
  building_type_agot_pentos_01_desc:0 "Il Principe di Pentos è visto come il conduttore divino da molti nella città, è lui che è scelto dagli dei, lui che giace sia con la Fanciulla del Mare che con la Fanciulla dei Campi, e lui che viene sacrificato per placare gli dei. In questo senso, il palazzo non è solo un luogo di governo ma anche un tempio."
  building_agot_pentos_01:0 "$building_type_agot_pentos_01$"
  building_agot_pentos_01_desc:0 "$building_type_agot_pentos_01_desc$"

  building_type_agot_pentos_walls_01:0 "Mura di Pentos"
  building_type_agot_pentos_walls_01_desc:0 "La Città Libera di Pentos è difesa dalle sue grandi mura di pietra e torri. Da tempo è motivo di orgoglio per la città."
  building_agot_pentos_walls_01:0 "Le Mura Magisteriali"
  building_agot_pentos_walls_01_desc:0 "Le Mura di Pentos si ergono alte e sono visibili per centinaia di miglia attraverso le Pianure. Le mura blu e grigie sono un faro per i mercanti provenienti sia dall'est che dall'ovest."

  building_type_agot_red_temple_pentos_01:0 "Tempio del Signore della Luce di Pentos"
  building_type_agot_red_temple_pentos_01_desc:0 "Il Tempio del Signore della Luce è una crescente potenza a Pentos, dove prima il controllo del Principe sulle questioni spirituali era incontestato, ora anche il Dio Rosso esige obbedienza."
building_agot_red_temple_pentos_01: 0 "Tempio della Luce Dorata"
  building_agot_red_temple_pentos_01_desc:0 "$building_type_agot_red_temple_pentos_01_desc$"

  building_type_agot_magister_harbor_01:0 "Porto del Magister"
  building_type_agot_magister_harbor_01_desc:0 "Il porto più piccolo dei due di Pentos, il Porto del Magister è sede delle navi dei più ricchi magistri della città. Da qui le loro navi commerciano nei Mari Stretti, d' Estate, e Giada, scambiando spezie, sete e formaggi."
  building_agot_magister_harbor_01:0 "$building_type_agot_magister_harbor_01$"
  building_agot_magister_harbor_01_desc:0 "$building_type_agot_magister_harbor_01_desc$"

  building_type_agot_pentos_harbor_01:0 "Grande Molo"
  building_type_agot_pentos_harbor_01_desc:0 "Il grande molo di Pentos è il porto più grande della città e sede di navi provenienti da tutto il mondo. Tutte le navi che attraccano sono ispezionate e tassate dagli ufficiali della città, garantendo che i magistri e la nobiltà cittadina rimangano ricchi."
  building_agot_pentos_harbor_01:0 "$building_type_agot_pentos_harbor_01$"
  building_agot_pentos_harbor_01_desc:0 "$building_type_agot_pentos_harbor_01_desc$"

building_type_agot_khals_manse_01: 0 "Magione del Khal"
building_type_agot_khals_manse_01_desc: 0 "Come la maggior parte delle Città Libere, Pentos offre per consuetudine doni ai khal dei khalasar in ""visita"". Diversamente dalle altre, tuttavia, concede loro anche dimore entro la città."
 building_agot_khals_manse_01:0 "$building_type_agot_khals_manse_01$"
 building_agot_khals_manse_01_desc:0 "$building_type_agot_khals_manse_01_desc$"

  building_type_agot_valdrizes_01:0 "Colline della Sfinge"
  building_type_agot_valdrizes_01_desc:0 "Lungo l'antica strada dei draghi del Territorio Libero di Valyria, si può incontrare una grande statua di sfinge valyriana che sorveglia la strada."
  building_agot_valdrizes_01:0 "La Regina dei Draghi"
  building_agot_valdrizes_01_desc:0 "Questa antica statua, soprannominata Regina dei Draghi, si erge alta sulla sua collina che domina la strada valyriana. Un tempo la Sfinge di Valyria era in coppia con il suo compagno, ma i Dothraki hanno trascinato via il Re molto tempo fa."

  building_type_agot_nontelos_bazaar_01:0 "Nontelos"
  building_type_agot_nontelos_bazaar_01_desc:0 "Una città importante in Essos, Nontelos fu una delle numerose città conquistate dalle Città Libere durante il Secolo di Sangue. Ora è governata da Pentos."
  building_agot_nontelos_bazaar_01:0 "Bazar di Nontelos"
  building_agot_nontelos_bazaar_01_desc:0 "Il Bazar di Nontelos è celebre in tutto l’ovest di Essos. Rappresenta un ponte commerciale fondamentale tra Pentos e Myr: tappeti, vetri e formaggi abbondano nelle sue bancarelle."

building_type_agot_ar_kon_barracks_01: 0 "Ar Kon"
building_type_agot_ar_kon_barracks_01_desc: 0 "Uno dei principali centri dei Nonteloshi, Ar Kon è arroccata in alto sul Crinale Koniano ed è rinomata per i suoi arcieri."
building_agot_ar_kon_barracks_01: 0 "Caserme di Ar"
building_agot_ar_kon_barracks_01_desc: 0 "Gli arcieri di Ar Kon sono famosi in tutte le Città Libere. Coloro che restano nella loro terra natale sono noti per essere particolarmente duri e micidiali."

 # Andalos Special Buildings
building_type_agot_hugor_hill_01: 0 "Collina di Hugor"
  building_type_agot_hugor_hill_01_desc:0 "Quando i Sette che Sono Uno si rivelarono al loro popolo scelto, fu su questa collina che ciò avvenne. Da qui Hugor fu scelto come re, unto con i doni dei Sette e incoronato con le stelle."
building_agot_hugor_hill_01: 0 "Collina sotto le Stelle"
  building_agot_hugor_hill_01_desc:0 "$building_type_agot_hugor_hill_01_desc$"

  building_type_agot_godworf_01:0 "Godworf"
  building_type_agot_godworf_01_desc:0 "Un antico porto nella parte settentrionale del Mare Stretto, si ritiene che Godworf fosse il porto principale degli Andali nelle loro invasioni di Westeros, ed è ancora rifugio per chi navighi il Mare Stretto."
  building_agot_godworf_01:0 "Porto degli Dei"
  building_agot_godworf_01_desc:0 "$building_type_agot_godworf_01_desc$"

building_type_agot_warriors_ledge_01: 0 "Fenn Cepan"
building_type_agot_warriors_ledge_01_desc: 0 "Sulle colline occidentali di Andalos, i signori della guerra e i re andali erano soliti affrontarsi in battaglia, macchiando del loro sangue un alto sperone roccioso e consacrando quella terra al Guerriero."
building_agot_warriors_ledge_01: 0 "Sperone del Guerriero"
 building_agot_warriors_ledge_01_desc:0 "$building_type_agot_warriors_ledge_01_desc$"

building_type_agot_strangers_heights_01: 0 "Hyrcgaes"
building_type_agot_strangers_heights_01_desc: 0 "Nel profondo delle colline di Andalos si erge un alto crinale noto agli antichi Andali come il Dito dello Straniero. Si crede che la morte stessa domini queste alture."
building_agot_strangers_heights_01: 0 "Alture dello Straniero"
 building_agot_strangers_heights_01_desc:0 "$building_type_agot_strangers_heights_01_desc$"

building_type_agot_crones_steps_01: 0 "Crontun"
building_type_agot_crones_steps_01_desc: 0 "Nelle lontane colline di Andalos si trovano i Gradini della Vecchia, un luogo che gli Andali ritenevano sacro, dove si dice si possa trovare la saggezza."
building_agot_crones_steps_01: 0 "Gradini della Vecchia"
 building_agot_crones_steps_01_desc:0 "$building_type_agot_crones_steps_01_desc$"

building_type_agot_maidens_vale_01: 0 "Rhotorr"
building_type_agot_maidens_vale_01_desc: 0 "Nelle propaggini orientali di Andalos si trova una valle di bellezza quasi incontaminata, che gli Andali ritenevano sacra alla Fanciulla."
building_agot_maidens_vale_01: 0 "Valle della Fanciulla"
 building_agot_maidens_vale_01_desc:0 "$building_type_agot_maidens_vale_01_desc$"

 # Braavos Special Buildings
  building_type_agot_sealords_palace_01:0 "Palazzo del Signore del Mare"
  building_type_agot_sealords_palace_01_desc:0 "Il Palazzo del Signore del Mare è uno dei grandi siti della città segreta. Con la Moon Pool davanti, le sue grandi colonne e il famoso menagerie, il Palazzo del Signore del Mare può competere in grandezza con qualsiasi palazzo del vecchio Freehold e con i castelli di Westeros."
  building_agot_sealords_palace_01:0 "$building_type_agot_sealords_palace_01$"
  building_agot_sealords_palace_01_desc:0 "$building_type_agot_sealords_palace_01_desc$"

  building_type_agot_iron_bank_01:0 "Banca di Ferro di Braavos"
  building_type_agot_iron_bank_01_desc:0 "Avendo le sue origini come miniera di ferro, la Banca di Ferro è una delle entità più temibili del mondo conosciuto. Non ha bisogno di mura forti, flotte rifornite o eserciti vasti, poiché è protetta dal grande potere della moneta; tutti i re, signori e conquistatori potenziali sono legati alle fortune del commercio."
  building_agot_iron_bank_01:0 "$building_type_agot_iron_bank_01$"
  building_agot_iron_bank_01_desc:0 "$building_type_agot_iron_bank_01_desc$"

  building_type_agot_isle_of_the_gods_01:0 "Isola degli Dei"
  building_type_agot_isle_of_the_gods_01_desc:0 "Tutti gli dei e credenze sono benvenuti a Braavos, e gli dei che non hanno grandi templi e devoti costanti trovano la loro casa sull'Isola degli Dei, dove il viaggiatore e il marinaio occasionali possono pregare il loro dio."
  building_agot_isle_of_the_gods_01:0 "$building_type_agot_isle_of_the_gods_01$"
  building_agot_isle_of_the_gods_01_desc:0 "$building_type_agot_isle_of_the_gods_01_desc$"

  building_type_agot_arsenal_01:0 "Arsenale di Braavos"
  building_type_agot_arsenal_01_desc:0 "Il grande Arsenale di Braavos è la base su cui sono costruite le numerose mura di legno di Braavos. In grado di produrre una nave intera in un solo giorno, le grandi flotte di Braavos sono rapidamente rifornite anche dopo sconfitte schiaccianti."
  building_agot_arsenal_01:0 "$building_type_agot_arsenal_01$"
  building_agot_arsenal_01_desc:0 "$building_type_agot_arsenal_01_desc$"

  building_type_agot_titan_01:0 "Titano di Braavos"
  building_type_agot_titan_01_desc:0 "Il Titano di Braavos è sia il faro che la porta della città segreta. Dalle sue occhi vengono le luci che guidano le navi in arrivo attraverso la nebbia e le isole che proteggono Braavos, e dalle sue mura di rame può respingere qualsiasi attaccante potenziale."
  building_agot_titan_01:0 "$building_type_agot_titan_01$"
  building_agot_titan_01_desc:0 "$building_type_agot_titan_01_desc$"

  building_type_agot_palace_of_truth_01:0 "Palazzo della Verità"
  building_type_agot_palace_of_truth_01_desc:0 "Il Palazzo della Verità è il luogo dove i custodi delle chiavi e gli altri magistri della città di Braavos eleggono il nuovo Signore del Sigillo."
  building_agot_palace_of_truth_01:0 "Palazzo della Verità"
  building_agot_palace_of_truth_01_desc:0 "Il Palazzo della Verità è il luogo dove i custodi delle chiavi e gli altri magistri della città di Braavos eleggono il nuovo Signore del Sigillo."

  building_type_agot_drowned_town_01:0 "Città Sommersa"
  building_type_agot_drowned_town_01_desc:0 "La parte più antica di Braavos è la regione ora nota come Città Sommersa. È sprofondata nella laguna, con solo le cime degli edifici che spuntano dall'acqua. La Città Sommersa è divenuta rifugio per i più poveri e per i fuorilegge in fuga dalle autorità della città."
  building_agot_drowned_town_01:0 "Città Sommersa"
  building_agot_drowned_town_01_desc:0 "La parte più antica di Braavos è la regione ora nota come Città Sommersa. È sprofondata nella laguna, con solo le cime degli edifici che spuntano dall'acqua. La Città Sommersa è divenuta rifugio per i più poveri e per i fuorilegge in fuga dalle autorità della città."

  building_type_agot_sweetwater_font_01:0 "Fonte dell'Acqua Dolce"
  building_type_agot_sweetwater_font_01_desc:0 "Il Fiume dell'Acqua Dolce, il grande acquedotto che nutre la città, trova la sua sorgente tra le colline coperte di nebbia a sud. È un bastione cruciale per mantenere in vita la città segreta."
  building_agot_sweetwater_font_01:0 "Fonte dell'Acqua Dolce"
  building_agot_sweetwater_font_01_desc:0 "Il Fiume dell'Acqua Dolce, il grande acquedotto che nutre la città, trova la sua sorgente tra le colline coperte di nebbia a sud. È un bastione cruciale per mantenere in vita la città segreta."

  building_type_agot_mothermont_01:0 "Monte Madre"
  building_type_agot_mothermont_01_desc:0 "La grande vetta nella parte settentrionale delle Colline d’Andalos, Monte Madre è venerata come sacra da molti abitanti di Essos."
  building_agot_mothermont_01:0 "$building_type_agot_mothermont_01$"
  building_agot_mothermont_01_desc:0 "$building_type_agot_mothermont_01_desc$"

  building_type_agot_nevios_retreat_01:0 "Ritiro di Nevio"
  building_type_agot_nevios_retreat_01_desc:0 "Scoperto per la prima volta da Nevio Paralios, le fertili terre intorno al Ritiro di Nevio, i Noporzhyr, sono il granaio di Braavos. Fu da qui che la città si nutrì prima dell’Unmasking."
  building_agot_nevios_retreat_01:0 "Ritiro di Nevio"
  building_agot_nevios_retreat_01_desc:0 "$building_type_agot_nevios_retreat_01_desc$"

  building_type_agot_moonbowl_01:0 "Conca della Luna"
  building_type_agot_moonbowl_01_desc:0 "La Conca della Luna è una regione fertile nelle Colline settentrionali d’Andalos. Da tempo rinomata per le sue terre coltivabili, può sfamare una città o un esercito."
  building_agot_moonbowl_01:0 "La Conca della Luna"
  building_agot_moonbowl_01_desc:0 "$building_type_agot_moonbowl_01_desc$"

 # Yi Ti Special Buildings
  building_type_agot_azure_palace_01:0 "Palazzo Imperiale della Dinastia Azzurra"
  building_type_agot_azure_palace_01_desc:0 "Il Palazzo Imperiale della Dinastia Azure. Il palazzo è stato costruito dagli Imperatori Azure per mostrare il loro prestigio e patrocinio delle arti."
  building_agot_azure_palace_01:0 "Palazzo delle Pietre Celesti"
  building_agot_azure_palace_01_desc:0 "Costruito dal primo Imperatore Azure, il Palazzo delle Pietre Celesti è un bellissimo palazzo con molte opere d'arte raffiguranti i cieli e tutto ciò che contengono."
  building_agot_azure_palace_02:0 "Palazzo delle Stelle Infinite"
  building_agot_azure_palace_02_desc:0 "Il Palazzo Imperiale del dodicesimo Imperatore Azure, più grande e più grandioso del vecchio Palazzo delle Pietre Celesti."

  building_type_agot_grey_palace_01:0 "Complesso del Palazzo Imperiale della Dinastia Grey"
building_type_agot_grey_palace_01_desc: 0 "Il Palazzo Imperiale degli Imperatori Grigi iniziò a essere costruito durante il regno di Har Loi, ma fu completato dai suoi successori. È uno dei palazzi più marziali edificati nella storia dell’impero."
  building_agot_grey_palace_01:0 "Palazzo della Spada Penzolante"
  building_agot_grey_palace_01_desc:0 "Costruito dal terzo Imperatore Grey, il Palazzo della Spada Penzolante è più una fortezza che un palazzo, con una presenza imponente."
  building_agot_grey_palace_02:0 "Palazzo della Giustizia Ombrosa"
  building_agot_grey_palace_02_desc:0 "Il Palazzo della Giustizia Ombrosa è stato costruito dall'ultimo degli Imperatori Grey e ora funge da casa del Ministro Imperiale della Giustizia e serve come voce penultima sulla legge nell'impero."

  building_type_agot_indigo_palace_01:0 "Complesso del Palazzo Imperiale della Dinastia Indigo"
  building_type_agot_indigo_palace_01_desc:0 "Il Palazzo Imperiale degli Imperatori Indigo."
  building_agot_indigo_palace_01:0 "Palazzo delle Rose Nere"
  building_agot_indigo_palace_01_desc:0 "Il Palazzo Imperiale degli Imperatori Indigo, completato dall'Imperatore Choq Choq per ospitare le sue cento mogli."

  building_type_agot_pearl_white_palace_01:0 "Complesso del Palazzo Imperiale della Dinastia Pearl-White"
  building_type_agot_pearl_white_palace_01_desc:0 "Il Palazzo Imperiale degli Imperatori Pearl-White, i cui leader più famosi furono i Nove Eunuchi, che diedero all'Impero Dorato 130 anni di pace. Fu sotto gli Imperatori Pearl-White che nacquero le grandi strade di pietra, più grandi di qualsiasi altra nel mondo, tranne le strade dei draghi di Valyria."
  building_agot_pearl_white_palace_01:0 "Palazzo del Serpente Arricciato"
  building_agot_pearl_white_palace_01_desc:0 "Costruito dal sesto Imperatore Pearl-White, e il primo dei Nove Eunuchi, il Palazzo del Serpente Arricciato si trova vicino al centro di Yin ed è al cuore della grande rete stradale che i Nove avrebbero espanso in tutto l'Impero Dorato."

  building_type_agot_purple_palace_01:0 "Complesso del Palazzo Imperiale della Dinastia Viola"
  building_type_agot_purple_palace_01_desc:0 "Il Palazzo Imperiale degli Imperatori Viola è uno dei palazzi imperiali più settentrionali dell'impero."
  building_agot_purple_palace_01:0 "Palazzo della Falce Pallida"
  building_agot_purple_palace_01_desc:0 "Costruito dal primo Imperatore Indigo, il Palazzo della Falce Pallida ha servito come solida base per proteggere le porzioni settentrionali dell'Impero."
  building_agot_purple_palace_02:0 "Palazzo del Drago Cremisi"
  building_agot_purple_palace_02_desc:0 "Il Palazzo del Drago Cremisi è stato costruito come un palazzo più grande e prominente rispetto al vecchio Palazzo."
  building_agot_purple_palace_03:0 "Palazzo dei Venti d'Ametista"
  building_agot_purple_palace_03_desc:0 "Il Palazzo dei Venti d'Ametista è stato costruito dall'ultimo degli Imperatori Viola, che morì senza eredi."

  building_type_agot_maroon_palace_01:0 "Complesso del Palazzo Imperiale della Dinastia Color Vinaccia"
  building_type_agot_maroon_palace_01_desc:0 "Gli Imperatori Color Vinaccia hanno costruito il loro palazzo nella città orientale di Jinqi per mantenere una migliore difesa contro i predoni provenienti dalle Terre d'Ombra."
  building_agot_maroon_palace_01:0 "Palazzo dei Venti Ardenti"
  building_agot_maroon_palace_01_desc:0 "Il Palazzo dei Venti Ardenti ha a lungo difeso la città di Jinqi dai terrore provenienti dalle Terre d'Ombra."

  building_type_agot_scarlet_palace_01:0 "Complesso del Palazzo Imperiale della Dinastia Scarlatta"
  building_type_agot_scarlet_palace_01_desc:0 "Gli Imperatori Scarlatti hanno costruito il loro palazzo nella città giungla di Si Qo. Quando la città fu persa nella giungla, lo fu anche questo complesso palazzo."
  building_agot_scarlet_palace_01:0 "Palazzo degli Alberi Luminosi"
  building_agot_scarlet_palace_01_desc:0 "Costruito dagli Imperatori Scarlatti con la città di Si Qo, il Palazzo degli Alberi Luminosi è stato la dimora del cuore dell'impero attraverso tutti e quarantatre anni del loro regno."

  building_type_agot_five_forts_01:0 "Mura dell'Imperatore della  Perla"
  building_type_agot_five_forts_01_desc:0 "Le Grandi Fortezze furono erette dall'Imperatore della  Perla per proteggere i regni degli uomini dai demoni del Leone della Notte. Le mura della fortezza si ergono a mille piedi di altezza, maggiori persino della Barriera di Westeros."
  building_agot_five_forts_01:0 "$building_type_agot_five_forts_01$"
  building_agot_five_forts_01_desc:0 "$building_type_agot_five_forts_01_desc$"

 # Pirate Holdings and Buildings
  building_type_pirate_den_01:0 "Rifugio dei Pirati"
  building_type_pirate_den_01_desc:0 "I rifugi dei pirati si trovano in tutto il mondo — sui mari aperti, lungo ampi fiumi e nascosti sulle coste. Ovunque la legge e l'ordine siano deboli, qualche aspirante signore dei pirati o corsaro si stabilirà per infastidire chiunque passi di lì."
  building_pirate_den_01:0 "Antro degli Fuorilegge"
  building_pirate_den_01_desc:0 "Questo piccolo porto è un antro di fuorilegge, con persone che trovano lavoro su una delle poche navi che chiamano questo porto casa."
  building_pirate_den_02:0 "Porto Notorio"
  building_pirate_den_02_desc:0 "Questo porto è diventato famigerato sulle acque, essendo il porto di scalo per alcuni dei pirati e corsari più famosi dei mari."
  building_pirate_den_03:0 "Fortezza del Terrore"
  building_pirate_den_03_desc:0 "Questo grande porto è sede dei più vili e temuti pirati dei mari; è una fortezza del crimine e della malvagità raramente vista nel mondo."

  building_type_agot_pirate_control_01:0 "Taverna"
  building_type_agot_pirate_control_01_desc:0 "Non si può essere pirati senza una nave e del rum, o almeno qualche altro tipo di alcolico. È fondamentale per mantenere felice e disciplinato l'equipaggio, perché quando le scorte finiscono la rivolta è sicura."
  building_agot_pirate_control_01:0 "Osteria Locale"
  building_agot_pirate_control_01_desc:0 "L'osteria locale è sufficiente quando una o due navi sono in porto, alleviando i problemi dell'equipaggio."
  building_agot_pirate_control_02:0 "Tavoli da Gioco"
  building_agot_pirate_control_02_desc:0 "Il gioco d'azzardo passa sempre il tempo; con i nuovi tavoli da gioco, l'equipaggio ha un'altra cosa che lo tiene occupato."
  building_agot_pirate_control_03:0 "Taverna del Grog"
  building_agot_pirate_control_03_desc:0 "Una taverna del grog è quasi una necessità per qualsiasi buon rifugio di pirati. L'equipaggio ha sete, e il grog è sempre una buona scelta per placare quella sete."
  building_agot_pirate_control_04:0 "Magazzini di Vino Saccheggiati"
  building_agot_pirate_control_04_desc:0 "Uno dei beni più popolari da commerciare in tutto il mondo è il vino e gli alcolici, ed è sempre un equipaggio felice che prende una nave con qualche botte in più."
  building_agot_pirate_control_05:0 "Saloon dei Predoni"
  building_agot_pirate_control_05_desc:0 "Questo saloon è rinomato per servire predoni e pirati — e solo predoni e pirati. I marinai onesti non sono i benvenuti qui."
  building_agot_pirate_control_06:0 "Clientela Infame"
  building_agot_pirate_control_06_desc:0 "Casa dei più infami e famigerati clienti, questo locale non è per i deboli di cuore — o di borsa."

  building_type_agot_pirate_economic_01:0 "Mercato Nero"
  building_type_agot_pirate_economic_01_desc:0 "La chiave per fare soldi per qualsiasi pirata è il mercato nero, perché dopo aver saccheggiato il bottino, spesso devono vendere quel bottino per ottenere i loro oro. La ricchezza delle navi raramente si presenta sotto forma di moneta, ma piuttosto dei beni che trasportano."
  building_agot_pirate_economic_01:0 "Furto Locale"
  building_agot_pirate_economic_01_desc:0 "Un furto locale è colui cui ci si affida per vendere il bottino e il bottino preso, e prenderanno solo una piccola parte."
  building_agot_pirate_economic_02:0 "Mercanti Sospetti"
  building_agot_pirate_economic_02_desc:0 "Anche nei momenti migliori i mercanti non dovrebbero essere fidati, e questi non sono i migliori dei tempi. Ma con la quantità di merci che devi far muovere, non puoi essere esigente."
  building_agot_pirate_economic_03:0 "Mercato Nero"
  building_agot_pirate_economic_03_desc:0 "Perché avere un solo commerciante che venda merci rubate, quando puoi avere un intero mercato?"
  building_agot_pirate_economic_04:0 "Contratti di Corsa"
  building_agot_pirate_economic_04_desc:0 "Anche i giusti e ordinati vogliono che vengano fatti cattivi lavori — una nave di un concorrente affondata, un rivale rapito, un potere straniero molestato. I contratti di corsa privati sono il modo in cui vengono fatti."
  building_agot_pirate_economic_05:0 "Riscossori di Tributi"
  building_agot_pirate_economic_05_desc:0 "Tutti coloro che desiderano utilizzare il tuo mercato devono ora pagare il tributo, e i tuoi riscossori si assicureranno di ottenere ciò che ti spetta."
  building_agot_pirate_economic_06:0 "Società di Copertura"
  building_agot_pirate_economic_06_desc:0 "Quando il proprio potere economico è così grande che anche le imprese legittime desiderano lavorare con te, un pirata ha bisogno di società di copertura — volti legittimi per le vere imprese."

  building_type_agot_pirate_supply_01:0 "Baia dei contrabbandieri"
  building_type_agot_pirate_supply_01_desc:0 "Raramente le navi di cattiva reputazione possono entrare nei porti per rifornirsi, da qui la necessità di contrabbandieri per fornire il rifugio e le navi che chiamano casa."
  building_agot_pirate_supply_01:0 "Rifugio Silenzioso"
  building_agot_pirate_supply_01_desc:0 "Un rifugio silenzioso è sempre utile per un contrabbandiere, perché non si sa mai quando si avrà bisogno di sfuggire ad occhi vigili."
  building_agot_pirate_supply_02:0 "Pontili Discreti"
  building_agot_pirate_supply_02_desc:0 "Certuni pontili sono più accomodanti per coloro che non hanno i documenti giusti."
  building_agot_pirate_supply_03:0 "Remi Silenziosi"
  building_agot_pirate_supply_03_desc:0 "Sbarcare di notte richiede un buon occhio, conoscenza delle stelle, un cuore coraggioso e soprattutto remi silenziosi."
  building_agot_pirate_supply_04:0 "Rifugio Nascosto"
  building_agot_pirate_supply_04_desc:0 "Un rifugio sicuro, isolato dagli estranei, è sempre in cerca di contrabbandieri — perché le tempeste, sia figurative che letterali, sono sempre all'orizzonte."
  building_agot_pirate_supply_05:0 "Coste Dragate"
  building_agot_pirate_supply_05_desc:0 "Cosa deve fare un contrabbandiere intraprendente quando i porti sono tutti chiusi a loro? Creare i propri! E, il primo passo è dragare una costa."
  building_agot_pirate_supply_06:0 "Porto Illecito"
  building_agot_pirate_supply_06_desc:0 "Perché corrompere gli ufficiali del porto, entrare di notte di nascosto o bypassare le guardie, quando si ha il proprio porto illecito per far entrare ed uscire merci illegali da una regione?"

  building_type_agot_pirate_troop_01:0 "Arsenale"
  building_type_agot_pirate_troop_01_desc:0 "Catturare una nave in mare non è impresa facile — oltre a prenderla, devi salirci a bordo preparato a combattere qualsiasi equipaggio nemico. Un arsenale adeguato consentirà vittorie rapide."
  building_agot_pirate_troop_01:0 "Armi Nascoste"
  building_agot_pirate_troop_01_desc:0 "Tutti i pirati hanno il proprio nascondiglio delle armi; dal più basso cuoco al capitano stesso, bisogna sempre avere un'arma a portata di mano."
  building_agot_pirate_troop_02:0 "Depositi Saccheggiati"
  building_agot_pirate_troop_02_desc:0 "Uno dei trofei più utili quando si prende qualsiasi nave sono le armi dell'equipaggio sconfitto, che ora sono le armi del proprio equipaggio!"
  building_agot_pirate_troop_03:0 "Magazzini d'Armi"
  building_agot_pirate_troop_03_desc:0 "Una buona scorta di armi è sempre una buona idea."
  building_agot_pirate_troop_04:0 "Arsenale Galleggiante"
  building_agot_pirate_troop_04_desc:0 "Dove è meglio conservare le proprie armi? In mare! In questo modo nessun ladro può rubare ciò che hai giustamente rubato!"
  building_agot_pirate_troop_05:0 "Armi Esotiche"
  building_agot_pirate_troop_05_desc:0 "I mari sono il grande crogiolo, e non si sa mai cosa si prenderà dopo — forse un'ascia lunga norvoshi, un arco d'oro, una lancia di Leng?"
  building_agot_pirate_troop_06:0 "Arsenale della Flotta"
  building_agot_pirate_troop_06_desc:0 "Un vero signore dei pirati non solo equipaggia il proprio equipaggio personale, ma l'intera flotta in modo che tutte le navi diventino prede."

  building_type_agot_pirate_military_01:0 "Banchine dei Pirati"
  building_type_agot_pirate_military_01_desc:0 "Un pirata non è niente senza una nave, e maggiore è il numero e la qualità delle navi, più temibile si diventa. Per ospitare una tale flotta, sono necessarie le banchine per alloggiarle."
  building_agot_pirate_military_01:0 "Ormeggio Solitario"
  building_agot_pirate_military_01_desc:0 "La manutenzione per la nave deve essere sempre fatta, anche se devi farla da solo."
  building_agot_pirate_military_02:0 "Ancoraggio Improvvisato"
  building_agot_pirate_military_02_desc:0 "Un pirata deve accontentarsi di ciò che è disponibile, anche se l'ancoraggio improvvisato non è il migliore, permette di riparare la nave più che non in mare aperto."
  building_agot_pirate_military_03:0 "Molo Cadente"
  building_agot_pirate_military_03_desc:0 "Questo molo cadente si avvicina a un vero e proprio molo, ma potrebbe essere comunque migliore."
  building_agot_pirate_military_04:0 "Disertori Navali"
  building_agot_pirate_military_04_desc:0 "Questi operai portuali e marinai hanno lavorato da tutto il mondo, da Braavos a Leng, e le loro competenze saranno messe a buon uso."
  building_agot_pirate_military_05:0 "Caserme dei Marinai"
  building_agot_pirate_military_05_desc:0 "La necessità di alloggi per i marinai a terra è cresciuta, quindi verrà costruita una caserma con tutti i comfort — beh, non #italic tutti#! i comfort."
  building_agot_pirate_military_06:0 "Cantieri dei Corsari"
  building_agot_pirate_military_06_desc:0 "Questi sono ora dei veri e propri cantieri navali dedicati, al servizio delle navi di tutti i pirati e corsari che chiamano quel porto casa."

  building_type_agot_pirate_fortification_01:0 "Vigilie"
  building_type_agot_pirate_fortification_01_desc:0 "A differenza dei castelli di Westeros o delle città di Essos, i pirati e i corsari non fortificano pesantemente le loro terre, desiderando piuttosto mantenere la loro forza in mare."
  building_agot_pirate_fortification_01:0 "Ronde Ubriache"
  building_agot_pirate_fortification_01_desc:0 "È difficile trovare buona compagnia, come dimostrano queste ronde, che affermano che il drink serve solo a tenerli al caldo."
  building_agot_pirate_fortification_02:0 "Guardie Avanzate"
  building_agot_pirate_fortification_02_desc:0 "Le guardie avanzate sono sempre all'erta, scrutando l'orizzonte per qualsiasi segno di terra o navi, che potrebbero essere minaccia o preda."
  building_agot_pirate_fortification_03:0 "Nidi di Corvo"
  building_agot_pirate_fortification_03_desc:0 "Per aiutare le guardie avanzate nella vigilanza, i nidi di corvo forniscono loro un posto per osservare l'orizzonte."
  building_agot_pirate_fortification_04:0 "Bandiere Segnaletiche"
  building_agot_pirate_fortification_04_desc:0 "L'uso di bandiere segnaletiche consente di condividere rapidamente messaggi tra diverse guardie, navi e basi con facilità e velocità."
  building_agot_pirate_fortification_05:0 "Occhi Myrish"
  building_agot_pirate_fortification_05_desc:0 "L'uso degli occhi Myrish consente alle guardie avanzate di vedere più lontano che mai, ciò che una volta era solo un alone all'orizzonte ora può essere identificato come una minaccia in arrivo."
  building_agot_pirate_fortification_06:0 "Relitti Marciti"
  building_agot_pirate_fortification_06_desc:0 "Per proteggere meglio il rifugio, sono stati trascinati relitti marciti intorno ad esso per proteggere da qualsiasi minaccia in arrivo."

 # Pirate Domicile Buildings
agot_pirate_ship_main_01_domicile_building: 0 "Galea Convertita"
agot_pirate_ship_main_01_domicile_building_desc: 0 "Questa galea è stata convertita in una nave da guerra, con una prua rinforzata e più remi."
agot_pirate_ship_main_02_domicile_building: 0 "Grande Galea"
agot_pirate_ship_main_02_domicile_building_desc: 0 "Una grande galea con numerosi ponti; questa nave può inseguire qualunque nave mercantile sui mari."
agot_pirate_ship_main_03_domicile_building: 0 "Galea da Guerra"
agot_pirate_ship_main_03_domicile_building_desc: 0 "Questa galea è stata progettata specificamente per la guerra, non solo per assalire navi mercantili ma anche navi da guerra nemiche."
agot_pirate_ship_main_04_domicile_building: 0 "Dromone"
agot_pirate_ship_main_04_domicile_building_desc: 0 "Questa nave è un dromone, una galea avanzata, più veloce, più grande e più robusta dei modelli più antichi."
agot_pirate_ship_main_05_domicile_building: 0 "Dromone da Guerra"
agot_pirate_ship_main_05_domicile_building_desc: 0 "Questo dromone è concepito per la guerra e minaccia qualunque nave solchi i mari."
agot_pirate_ship_main_06_domicile_building: 0 "Martello dei Mari"
agot_pirate_ship_main_06_domicile_building_desc: 0 "La più grande minaccia sui mari, questa nave incute timore in chiunque senta l'odore salmastro dell'oceano."

agot_captains_quarters_01_domicile_building: 0 "Piccoli Alloggi del Capitano"
agot_captains_quarters_01_domicile_building_desc: 0 "Gli alloggi del capitano offrono un rifugio privato dove questi può consultarsi con gli ufficiali, addestrarli e impressionare gli ospiti con i propri trofei."
