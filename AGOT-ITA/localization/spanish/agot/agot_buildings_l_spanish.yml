building_type_agot_westerland_gold_mines_01: 1 "Miniera d'Oro dell'Ovest"
building_type_agot_westerland_gold_mines_01_desc: 1 "La ricchezza delle Terre dell'Ovest si riassume nella forma più autentica del termine: l'oro. Le colline sono ricche di questo metallo prezioso, rendendo altrettanto ricchi i lord che vi dimorano."
