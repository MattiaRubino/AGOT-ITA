building_type_agot_iron_island_mines_01: 1 "Miniere delle Isole di Ferro"
building_type_agot_iron_island_mines_01_desc: 1 "Le Isole di Ferro sono ben lontane dall'essere ricche, sebbene ferro e altri metalli non preziosi si possano trovare su tutte le isole. Lavorare queste miniere è spesso insalubre e angusto, il che porta a epidemie che in genere le rendono meno redditizie di quanto il minerale valga. Tuttavia, grazie all'impiego di schiavi, esse possono essere sfruttate al loro pieno potenziale."
