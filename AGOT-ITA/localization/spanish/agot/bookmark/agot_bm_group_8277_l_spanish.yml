l_spanish:
  agot_bm_group_8277:0 "277 A.C."
  agot_bm_8277:0 "Sfida di Duskendale"
  agot_bm_8277_desc:0 "Il regno un tempo promettente di Re Aerys II Targaryen è giunto a una posizione pericolosa: da molti anni, voci e intrighi circondano il Re e il suo Primo Cavaliere, e tra i due ex amici si è aperta una frattura sempre più profonda. Ora, Lord Denys Darklyn ha sfruttato quello strappo a proprio vantaggio, attirando il Re a trattare a Duskendale — solo per prenderlo in ostaggio.\n\nI giochi di potere tra Lord Tywin Lannister e il Re hanno permesso ai Darklyn di ottenere una leva sul Trono di Spade senza pari per qualunque altra Casa prima di loro... #bold Eppure, le ambizioni più alte spesso conducono a decisioni avventate, e il destino della celebre Casa Darklyn è in bilico.#!"

  bookmark_277_tywin_lannister:0 "Lord Tywin"
  bookmark_277_tywin_lannister_subheading:0 "Custode dell'Ovest"
  bookmark_277_tywin_lannister_desc:0 "[Concept( 'story_content_tywin_lannister_277', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_tywin_lannister_277', '$bm_story_content_available_copy|q$' )|E]\nL'orgoglioso Lord Tywin ha servito come Primo Cavaliere del Re per quindici anni — più a lungo delle vite dei suoi stessi figli. Acclamato come uno dei più grandi uomini ad aver ricoperto la carica, molti bisbigliano che sia lui a sedere davvero sul trono, salvando il reame dalle fantasie sempre più erratiche del Re. Con un rapporto ormai logoro, Tywin trascorre ora sempre più tempo nel tentativo di placare un tempo stretto amico, preda di una paranoia crescente.\n\n#bold Aerys ha ignorato i consigli del suo Primo Cavaliere ed è cavalcato a trattare di persona con Casa Darklyn, e ancora una volta Tywin deve ripulire i disastri del Re.#!"
  bookmark_277_cersei_lannister:0 "Cersei"
  bookmark_277_jaime_lannister:0 "Jaime"

  bookmark_277_denys_darklyn:0 "Lord Denys"
  bookmark_277_denys_darklyn_subheading:0 "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_277_denys_darklyn_desc:0 "[Concept( 'story_content_denys_darklyn_277', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_denys_darklyn_277', '$bm_story_content_available_copy|q$' )|E]\nCasa Darklyn è famosa per aver fornito più spade giurate alla Guardia Reale di qualunque altra Casa, dimostrando innumerevoli volte la propria fedeltà alla Corona. Ma Denys Darklyn è un uomo spinto all'estremo — c'è chi dice per aiutare la gente della sua città, chi per i consigli della moglie myrense. In ogni caso, ora si trova davanti un esercito fuori dalle sue porte, guidato dal temuto Primo Cavaliere del Re, un Re che egli tiene in ostaggio.\n\n#bold La fama di Casa Darklyn si tramuterà in infamia in un istante, o Lord Denys riuscirà a sfruttare la sicurezza del Re per una prosperità maggiore per il suo popolo?#!"
  bookmark_277_lady_serala:0 "Lady Serala"
  bookmark_277_jon_hollard:0 "Ser Jon"

  bookmark_277_aerys_targaryen:0 "Re Aerys II"
  bookmark_277_aerys_targaryen_subheading:0 "$BOOKMARK_SUBHEADING_DEFAULT$" #controllare_modifica
  bookmark_277_aerys_targaryen_desc:0 "[Concept( 'story_content_aerys_targaryen_277', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_aerys_targaryen_277', '$bm_story_content_available_copy|q$' )|E]\nAerys II, un tempo ritenuto un membro affascinante e diligente della sua dinastia, è ora tormentato da voci e sussurri. Spesso saltando da un piano o un progetto all'altro, si dice che sia sempre più trascinato in conflitto con il suo Primo Cavaliere — e un tempo più caro amico — Tywin Lannister.\n\n#bold Il tentativo del Re di mostrare la propria volontà e abilità nel trattare con i Darklyn di Duskendale si è ritorso contro di lui, ma ogni speranza è stata davvero dissipata mentre siede prigioniero del suo stesso vassallo?#!"
  bookmark_277_barristan_selmy:0 "Barristan 'l'Ardito'"

  bookmark_277_rhaegar_targaryen:0 "Principe Rhaegar"
  bookmark_277_rhaegar_targaryen_subheading:0 "Principe di Roccia del Drago"
  bookmark_277_rhaegar_targaryen_desc:0 "[Concept( 'story_content_rhaegar_targaryen_277', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_rhaegar_targaryen_277', '$bm_story_content_available_copy|q$' )|E]\nPrincipe di Roccia del Drago, Rhaegar è noto come uomo solenne e silenzioso, ma di grande intelligenza e stabilità — soprattutto in confronto alla natura erratica di suo padre. Ancora celibe, molte casate grandi e piccole sperano di attirare il giovane erede con le proprie figlie, sebbene sia lui sia suo padre abbiano criteri severi per un simile matrimonio.\n\n#bold Con il recente conflitto a Duskendale, Rhaegar vedrà l'inizio del suo tempo sul Trono di Spade molto prima di quanto si aspettasse?#!"
  bookmark_277_elia_martell:0 "Principessa Elia"
  bookmark_277_arthur_dayne:0 "Arthur Dayne"
