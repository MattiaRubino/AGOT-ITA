l_spanish:
  agot_bm_group_8211:0 "211 A.C."
  agot_bm_8211:0 "Dopo la Primavera"
  agot_bm_8211_desc:0 "Per quasi due anni il Grande Morbo di Primavera devastò Westeros, lasciandosi dietro le salme di decine di migliaia di persone. Tra i caduti vi furono Re Daeron 'il Buono' e suo nipote ed erede, il Principe Valarr. Con la loro morte giunse l'incoronazione di un nuovo re, Aerys, secondogenito di Daeron, il primo del suo nome. Aerys scelse suo zio bastardo Brynden 'Bloodraven' come Mano, suscitando l'ira del suo fratello minore Maekar, noto non senza malizia come uccisore di parenti dopo il disastroso torneo di Ashford Meadow.\n\nIl Principe di Summerhall è tornato nelle sue terre a rimuginare. Mentre così fa, il suo quarto figlio, il Principe Aegon, viaggia con un cavaliere errante noto come Ser Duncan 'l'Alto'. #bold Benché sia soltanto un figlio bastardo di Fondo delle Pulci, il mentore di Egg potrebbe presto ritrovarsi ancora una volta al centro di grandi canzoni di lord, dame, principi e re.#!"


 # Daemon II
  bookmark_211_daemon_blackfyre:0 "Daemon II"
  bookmark_211_daemon_blackfyre_subheading:0 "Il Drago Sognatore"
bookmark_211_daemon_blackfyre_desc: 0 "[Concept( 'story_content_daemon_blackfyre_211', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_daemon_blackfyre_211', '$bm_story_content_available_copy|q$' )|E]\nQuindici anni fa, Daemon I Blackfyre levò i propri vessilli in ribellione contro il fratellastro, Re Daeron II Targaryen. Lui e i suoi figli maggiori morirono sul Campo dell'Erba Rossa, lasciando il figlio minore Daemon erede della sua rivendicazione contesa. Con la morte del re e l'incoronazione del dotto Aerys I, potrebbe non esserci occasione migliore per Daemon «il Giovane» di tentare la conquista del Trono di Spade. Sulla sua strada si erge «Aspreacciaio», suo zio, che finora gli ha negato sia la spada sia la corona del padre.\n\n#bold Riuscirà a fare ciò che suo padre non poté e a impadronirsi del Trono di Spade?#!"

 # Daemon II Relation
  bookmark_211_bittersteel:0 "Principe Aegor 'Bittersteel'"

 # Dunk
  bookmark_211_duncan_tall:0 "Ser Duncan 'l'Alto'"
  bookmark_211_duncan_tall_subheading:0 "La Spada Giurata"
bookmark_211_duncan_tall_desc: 0 "[Concept( 'story_content_duncan_the_tall_211', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_duncan_the_tall_211', '$bm_story_content_available_copy|q$' )|E]\nSono passati due anni dalla morte del Principe Baelor «Lancia Spezzata» ad Ashford Meadow. In questo tempo Duncan ha proseguito i suoi viaggi con il suo scudiero — il Principe Aegon Targaryen sotto mentite spoglie, figlio del Principe Maekar. Mentre il Morbo di Primavera infuriava su Westeros, Dunk ed Egg trovarono rifugio tra le sabbie di Dorne. Ora serve l'anziano Ser Eustace Osgrey come spada giurata, prendendo dimora alla torre di Standfast.\n\n#bold Dunk resterà fedele al proprio giuramento, o troverà un padrone più grande?#!"
 # Dunk Relation
  bookmark_211_egg:0 "Egg"

 # Rohanne Webber
  bookmark_211_rohanne_webber:0 "Lady Rohanne"
  bookmark_211_rohanne_webber_subheading:0 "Lady di Coldmoat"
bookmark_211_rohanne_webber_desc: 0 "[Concept( 'story_content_rohanne_webber_211', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_rohanne_webber_211', '$bm_story_content_available_copy|q$' )|E]\nRohanne Webber ha ereditato Coldmoat dopo il Morbo di Primavera, poiché suo padre non lasciò eredi maschi a reclamarla. Sebbene la sua posizione possa sembrare sicura, il defunto Lord Webber ha lasciato una condizione: Rohanne deve trovare un quinto marito, o lasciare il suo titolo a un cugino. Anche qualora riuscisse ad assicurarsi un altro matrimonio, è circondata da ogni lato da coloro che vorrebbero mettere alla prova il suo potere.\n\n#bold La «Vedova Rossa» riuscirà a mettere al sicuro il proprio seggio, o cadrà nella tela dei suoi nemici?#!"
 # Rohanne Relation
  bookmark_211_longinch:0 "Ser Lucas 'Longinch'"

  bookmark_211_eustace_osgrey:0 "Ser Eustace"
  bookmark_211_eustace_osgrey_subheading:0 "Cavaliere di Standfast"
bookmark_211_eustace_osgrey_desc: 0 "[Concept( 'story_content_eustace_osgrey_211', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_eustace_osgrey_211', '$bm_story_content_available_copy|q$' )|E]\nEustace Osgrey ha perduto tutto nella Ribellione Blackfyre. Il suo sostegno al Drago Nero gli è costato i figli, la moglie, la figlia... e le speranze. La sua Casa, un tempo fiera, è stata ridotta alla sola torre di Standfast, e lui a un uomo affranto oltre il fiore degli anni, in attesa della morte. Attorno a lui vi sono coloro che vedono debolezza, che vedono l'occasione di prendere quel poco che resta al vecchio cavaliere. Al suo servizio ha preso Ser Bennis dello Scudo Bruno e Ser Duncan «l'Alto».\n\n#bold Questo vecchio Leone Scaccato saprà conservare il suo orgoglio e la sua torre, o crollerà con l'ultima gloria della sua Casa?#!"
 # Eustace Relation
  bookmark_211_bennis:0 "Ser Bennis 'dello Scudo Bruno'"
