l_spanish:
  agot_bm_group_8211:0 "211 A.C."
  agot_bm_8211:0 "Dopo la Primavera"
  agot_bm_8211_desc:0 "Per quasi due anni il Grande Morbo di Primavera devastò Westeros, lasciandosi dietro le salme di decine di migliaia di persone. Tra i caduti vi furono Re Daeron «il Buono» e suo nipote ed erede, il Principe Valarr. Con la loro morte giunse l'incoronazione di un nuovo re, Aerys, secondogenito di Daeron, il primo del suo nome. Aerys scelse suo zio bastardo Brynden «Bloodraven» come Mano, suscitando l'ira del suo fratello minore Maekar, noto non senza malizia come uccisore di parenti dopo il disastroso torneo di Ashford Meadow.\n\nIl Principe di Summerhall è tornato nelle sue terre a rimuginare. Mentre così fa, il suo quarto figlio, il Principe Aegon, viaggia con un cavaliere errante noto come Ser Duncan «l'Alto». #bold Benché sia soltanto un figlio bastardo di Fondo delle Pulci, il mentore di Egg potrebbe presto ritrovarsi ancora una volta al centro di grandi canzoni di lord, dame, principi e re.#!"


 # Daemon II
  bookmark_211_daemon_blackfyre:0 "Daemon II"
  bookmark_211_daemon_blackfyre_subheading:0 "Il Drago Sognatore"
  bookmark_211_daemon_blackfyre_desc:0 "Quindici anni fa, Daemon I Blackfyre levò i suoi vessilli in ribellione contro il suo fratellastro, Re Daeron II Targaryen. Egli e i suoi figli maggiori morirono sul Campo dell'Erba Rossa, lasciando il suo figlio minore Daemon quale erede della sua contesa pretesa. Con la morte del re e l'incoronazione del libresco Aerys I, potrebbe non esservi occasione migliore per Daemon «il Giovane» di tentare la conquista del Trono di Spade. Sulla sua strada si erge «Bittersteel»: suo zio gli ha finora negato tanto la spada di suo padre quanto la corona.\n\n#bold Farà ciò che suo padre non riuscì a compiere e conquisterà il Trono di Spade?#!"

 # Daemon II Relation
  bookmark_211_bittersteel:0 "Principe Aegor «Bittersteel»"

 # Dunk
  bookmark_211_duncan_tall:0 "Ser Duncan «l'Alto»"
  bookmark_211_duncan_tall_subheading:0 "La Spada Giurata"
  bookmark_211_duncan_tall_desc:0 "Sono passati due anni dalla morte del Principe Baelor «Lanciaspezzata» ad Ashford Meadow. In questo tempo Duncan ha proseguito i suoi viaggi con il suo scudiero, il segreto Principe Aegon Targaryen, figlio del Principe Maekar. Mentre il Morbo di Primavera infuriava in tutta Westeros, Dunk ed Egg trovarono rifugio nelle sabbie di Dorne. Ora egli serve l'anziano Ser Eustace Osgrey come spada giurata, prendendo dimora nella torre di Standfast.\n\n#bold Dunk resterà fedele al suo giuramento, o troverà forse un padrone più grande?#!"
 # Dunk Relation
  bookmark_211_egg:0 "Egg"

 # Rohanne Webber
  bookmark_211_rohanne_webber:0 "Lady Rohanne"
  bookmark_211_rohanne_webber_subheading:0 "Lady di Coldmoat"
  bookmark_211_rohanne_webber_desc:0 "Rohanne Webber ereditò Coldmoat sulla scia del Morbo di Primavera, poiché suo padre non lasciò eredi maschi a rivendicarla. Benché la sua posizione possa sembrare sicura, il defunto Lord Webber lasciò una condizione: Rohanne deve trovare un quinto marito, oppure cedere il suo titolo a un cugino. E quand'anche riuscisse a stringere un nuovo matrimonio, è circondata da ogni lato da coloro che vorrebbero mettere alla prova la sua forza.\n\n#bold La «Vedova Rossa» riuscirà a difendere il suo seggio, o cadrà nella tela dei suoi nemici?#!"
 # Rohanne Relation
  bookmark_211_longinch:0 "Ser Lucas «Longinch»"

  bookmark_211_eustace_osgrey:0 "Ser Eustace"
  bookmark_211_eustace_osgrey_subheading:0 "Cavaliere di Standfast"
  bookmark_211_eustace_osgrey_desc:0 "Eustace Osgrey perse tutto a causa della Ribellione Blackfyre. Il suo sostegno al Drago Nero gli costò i suoi figli, sua moglie, sua figlia... e le sue speranze. La sua un tempo fiera casata è stata ridotta alla sola torre di Standfast, ed egli a un uomo afflitto dal dolore oltre il fiore degli anni, in attesa della morte. Vi sono, attorno a lui, coloro che vedono debolezza, che scorgono un'occasione per prendere quel poco che al vecchio cavaliere è rimasto. Al suo servizio ha accolto Ser Bennis dello Scudo Bruno e Ser Duncan «l'Alto».\n\n#bold Questo vecchio Leone Scaccato saprà conservare il proprio orgoglio e la propria torre, o crollerà insieme agli ultimi fasti della sua Casa?#!"
 # Eustace Relation
  bookmark_211_bennis:0 "Ser Bennis «dello Scudo Bruno»"
