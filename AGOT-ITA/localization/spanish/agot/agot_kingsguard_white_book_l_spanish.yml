l_spanish:

  agot_kingsguard_white_book.0001.t:0 "Il Libro Bianco"
  agot_kingsguard_white_book.0001.desc:0 "Sfoglio le pagine del Libro Bianco, leggendo i nomi e le gesta di coloro che hanno indossato il mantello bianco. Ogni voce parla di coraggio, dovere e sacrificio, ricordandomi i solenni voti che vincolano la Guardia Reale alla corona."
  agot_kingsguard_white_book.0001.a:0 "#bold Volta pagina#!"
  agot_kingsguard_white_book.0001.b:0 "#bold Chiudi il libro#!"

  agot_kingsguard_white_book.0002.t:0 "[selected_kingsguard.Custom('GetWhiteBookPageTitle')]"
  agot_kingsguard_white_book.0002.desc:0 "[white_book_page.GetNameNoTierNoTooltip]"
  agot_kingsguard_white_book.0002.a:0 "#bold Torna all'indice#!"
  agot_kingsguard_white_book.0002.b:0 "#bold Chiudi il libro#!"

  agot_kingsguard_white_book_title_house:0 "Ser [ROOT.Char.GetFirstNameNoTooltip] di Casa[AGOTGetSurname(ROOT.Char)]"
  agot_kingsguard_white_book_title_bastard:0 "Ser [ROOT.Char.GetFirstNameNoTooltip][AGOTGetSurname(ROOT.Char)]"
  agot_kingsguard_white_book_title_surname:0 "Ser [ROOT.Char.GetFirstNameNoTooltip][AGOTGetSurname(ROOT.Char)]"
  agot_kingsguard_white_book_title_nickname:0 "Ser [ROOT.Char.GetFirstNameNicknamedNoTooltip]"
  agot_kingsguard_white_book_title_fallback:0 "Ser [ROOT.Char.GetNameNoTooltip]"

  agot_kingsguard_white_book_fallback_on_join:0 "[ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitledFirstNameNoTooltip] entrò nella Guardia Reale e servì con onore."
  agot_kingsguard_white_book_fallback_after_death:0 "[ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitledFirstNameNoTooltip] entrò nella Guardia Reale e servì con onore fino alla sua morte."

  agot_kingsguard_white_book_page:0 "[selected_kingsguard.Custom('GetWhiteBookPage')]"

  agot_age_ordinal_st:0 "º"
  agot_age_ordinal_nd:0 "º"
  agot_age_ordinal_rd:0 "º"
  agot_age_ordinal_th:0 "º"

  agot_kingsguard_white_book_page_empty:0 ""
  agot_kingsguard_white_book_page_join_parents:0 "[AGOTGetBirthOrder(ROOT.Char)] [ROOT.Char.Custom('GetDaughterSon')|l] di [AGOTGetName(ROOT.Char.GetFather)] e [AGOTGetName(ROOT.Char.GetMother)][AGOTGetTitleSuffixNoFormat(ROOT.Char.GetFather)]. "
  agot_kingsguard_white_book_page_join_father:0 "[AGOTGetBirthOrder(ROOT.Char)] [ROOT.Char.Custom('GetDaughterSon')|l] di [AGOTGetName(ROOT.Char.GetFather)][AGOTGetTitleSuffixNoFormat(ROOT.Char.GetFather)]. "
  agot_kingsguard_white_book_page_join_mother:0 "[AGOTGetBirthOrder(ROOT.Char)] [ROOT.Char.Custom('GetDaughterSon')|l] di [AGOTGetName(ROOT.Char.GetMother)][AGOTGetTitleSuffixNoFormat(ROOT.Char.GetMother)]. "

  agot_kingsguard_white_book_page_join_paragraph:0 "[selected_kingsguard.Custom('GetWhiteBookParents')]Nominat[Select_CString(selected_kingsguard.IsFemale,'a','o')] nella Guardia Reale al [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] anno d'età durante il regno di [AGOTGetName(king)]."
  agot_kingsguard_white_book_page_lc_update:0 "[white_book_page.GetNameNoTierNoTooltip]\n\nNominat[Select_CString(selected_kingsguard.IsFemale,'a','o')] Lord Comandante della Guardia Reale al [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] anno d'età da [AGOTGetName(king)]."
  agot_kingsguard_white_book_page_sent_to_nightswatch_update:0 "[white_book_page.GetNameNoTierNoTooltip]\n\nDestituit[Select_CString(selected_kingsguard.IsFemale,'a','o')] dalla Guardia Reale e inviat[Select_CString(selected_kingsguard.IsFemale,'a','o')] ai Guardiani della Notte al [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] anno d'età da [AGOTGetName(king)]."
  agot_kingsguard_white_book_page_removed_update:0 "[white_book_page.GetNameNoTierNoTooltip]\n\nDestituit[Select_CString(selected_kingsguard.IsFemale,'a','o')] dalla Guardia Reale al [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] anno d'età da [AGOTGetName(king)]."
  agot_kingsguard_white_book_page_died_update:0 "[white_book_page.GetNameNoTierNoTooltip]\n\nMorì al [selected_kingsguard.GetAge][selected_kingsguard.Custom('GetAgeOrdinal')] anno d'età."

