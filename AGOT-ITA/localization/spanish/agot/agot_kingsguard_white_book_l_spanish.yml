 # Sadly this is canon
 # Selmy_3
 # agot_kingsguard_white_book_Selmy_3_on_join:0 "Firstborn son of Ser Lyonel Selmy of Harvest Hall. Served as squire to Ser Manfred Swann. Named "the Bold" in his 10th year, when he donned borrowed armor to appear as a mystery knight in the tourney of Blackhaven, where he was defeated and unmasked by Duncan, Prince of Dragonflies. Knighted in his 16th year by King Aegon V Targaryen, after performing great feats of prowess as a mystery knight in the winter tourney at King's Landing, defeating Prince Duncan the small and Ser Duncan the Tall, Lord Commander of the Kingsguard. Slew Maelys the Monstrous, last of the Blackfyre Pretenders, in single combat during the War of the Ninepenny Kings. Defeated Lormelle Long Lance and Cedrik Storm, the Bastard of Bronzegate. Named to the Kingsguard in his 23rd year, by Lord Commander Ser Gerold Hightower."
 # agot_kingsguard_white_book_Selmy_3_lord_commander:0 "$agot_kingsguard_white_book_Selmy_3_on_join$\n\nDefended the passage against all challengers in the tourney of the Silver Bridge. Victor in the mêlée at Maidenpool. Brought King Aerys II to safety during the Defiance of Duskendale despite an arrow wound in the chest. Avenged the murder of his Sworn Brother, Ser Gwayne Gaunt. Rescued Lady Jeyne Swann and her septa from the Kingswood Brotherhood, defeating Simon Toyne and the Smiling Knight, slaying the former. In the Oldtown tourney, defeated and unmasked the mystery knight, Blackshield revealing him to be the Bastard of Uplands. Sole champion of Lord Steffon's tourney at Storm's End, whereat he unhorsed Lord Robert Baratheon, Prince Oberyn Martell, Lord Leyton Hightower, Lord Jon Connington, Lord Jason Mallister, and Prince Rhaegar Targaryen. Wounded by arrow, spear, and sword at the Battle of the Trident whilst fighting beside his Sworn Brothers and Rhaegar Prince of Dragonstone. Pardoned, and named Lord Commander of the Kingsguard, by King Robert I Baratheon."
 # agot_kingsguard_white_book_Selmy_3_after_dismissal:0 "$agot_kingsguard_white_book_Selmy_3_lord_commander$\n\nServed in the honor guard that brought Lady Cersei of House Lannister to King's Landing to wed King Robert. Led the attack on Old Wyk during Balon Greyjoy's Rebellion. Champion of the tourney at King's Landing, in his 57th year. Dismissed by King Joffrey I Baratheon in his 61st year, for reasons of advanced age."
  agot_kingsguard_white_book_Selmy_3_on_join:0 "[AGOTGetBirthOrder(GetScriptedCharacterByHistoryID('Selmy_3'))] figlio di [AGOTGetName(GetScriptedCharacterByHistoryID('Selmy_1'))] e [AGOTGetName(GetScriptedCharacterByHistoryID('Woodwright_59'))][AGOTGetTitleSuffixNoFormat(GetScriptedCharacterByHistoryID('Selmy_1'))]. Nominato nella Guardia Reale nel suo 23º anno durante il regno di [AGOTGetName(GetScriptedCharacterByHistoryID('Targaryen_127'))]."
  agot_kingsguard_white_book_Selmy_3_lord_commander:0 "$agot_kingsguard_white_book_Selmy_3_on_join$\n\nNominato Lord Comandante della Guardia Reale nel suo 47º anno da [AGOTGetName(GetScriptedCharacterByHistoryID('Baratheon_2'))]."
  agot_kingsguard_white_book_Selmy_3_after_removal:0 "$agot_kingsguard_white_book_Selmy_3_lord_commander$\n\nDestituito dalla Guardia Reale nel suo 61º anno da [AGOTGetName(GetScriptedCharacterByHistoryID('Baratheon_5'))]."

