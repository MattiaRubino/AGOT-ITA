 # Lannister_7
 # agot_kingsguard_white_book_Lannister_7_on_join:0 "Ser Jaime of House Lannister. Firstborn son of Lord Tywin and Lady Joanna of Casterly Rock. Served against the Kingswood Brotherhood as squire to Lord Sumner Crakehall. Knighted in his 15th year by Ser Arthur Dayne of the Kingsguard, for valor in the field. Chosen for the Kingsguard in his 15th year by King Aerys II Targaryen."
 # agot_kingsguard_white_book_Lannister_7_lord_commander:0 "$agot_kingsguard_white_book_Lannister_7_on_join$\n\nDuring the Sack of King's Landing, slew King Aerys II at the foot of the Iron Throne. Thereafter known as the "Kingslayer." Pardoned for his crime by King Robert I Baratheon. Served in the honor guard that brought his sister the Lady Cersei Lannister to King's Landing to wed King Robert. Champion in the tourney held at King's Landing on the occasion of their wedding."
 # agot_kingsguard_white_book_Lannister_7_latest:0 "$agot_kingsguard_white_book_Lannister_7_lord_commander$\n\nDefeated in the Whispering Wood by the Young Wolf Robb Stark during the War of the Five Kings. Held captive at Riverrun and ransomed for a promise unfulfilled. Captured again by the Brave Companions, and maimed at the word of Vargo Hoat their captain, losing his sword hand to the blade of Zollo the Fat. Returned safely to King's Landing by Brienne, the Maid of Tarth."
