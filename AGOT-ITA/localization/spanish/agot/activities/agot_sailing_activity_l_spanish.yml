agot_sailing_type_hunt: 0 "Caccia marittima"
agot_sailing_type_hunt_desc: 0 "$EFFECT_LIST_BULLET$Scegli una preda fra diverse creature marine\n$EFFECT_LIST_BULLET$Aumenta la [trait_level_track_xp|E] di [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]\n\n#weak Prepara il tuo arpione e parti a caccia delle molte creature del mare!#!"

agot_sailing_type_raid: 0 "Incursione marittima"
agot_sailing_type_raid_desc: 0 "$EFFECT_LIST_BULLET$Lancia incursioni contro insediamenti costieri o navi di passaggio\n$EFFECT_LIST_BULLET$Aumenta la [trait_level_track_xp|E] di [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]\n\n#weak L'oceano offre molte avventure. Parti a tormentare le coste dei tuoi nemici per ottenere infamia e bottino!#!"
