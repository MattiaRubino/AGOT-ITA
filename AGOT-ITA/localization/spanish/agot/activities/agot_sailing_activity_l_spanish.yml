agot_sailing_type_valyria: 0 "Viaggio a Valyria"
agot_sailing_type_valyria_desc: 0 "$EFFECT_LIST_BULLET$Affronta il Mare Fumante per esplorare le rovine di Valyria\n$EFFECT_LIST_BULLET$Aumenta la [trait_level_track_xp|E] di [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]\n\n@warning_icon! #X Questo è un viaggio pericoloso, e una tomba d'acqua potrebbe attendere chi è impreparato#!\n\n#weak Molti hanno fatto vela verso le rovine di Valyria. Pochi sono vissuti abbastanza da rivedere le proprie coste.#!"
agot_sailing_type_treasure: 0 "Spedizione di recupero"
agot_sailing_type_treasure_desc: 0 "$EFFECT_LIST_BULLET$ Cerca tesori perduti nascosti sotto le onde\n$EFFECT_LIST_BULLET$Aumenta la [trait_level_track_xp|E] di [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]\n\n#weak Una nave è affondata nelle profondità del mare; qui si può trovare un tesoro.#!"

