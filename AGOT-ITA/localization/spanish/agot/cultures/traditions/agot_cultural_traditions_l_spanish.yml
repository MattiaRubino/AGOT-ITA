 #Realm Traditions
tradition_agot_insular_marriage_name: 0 "Matrimonio Insulare"
tradition_agot_insular_marriage_desc: 0 "Pur non essendo isolazionista, questa cultura preferisce ancora sposarsi all'interno del proprio popolo."

tradition_agot_debug_name: 0 "Debug"
tradition_agot_debug_desc: 0 "Come sei arrivato qui?"

 #Societal Traditions
tradition_agot_fashionistas_name: 0 "Carezza il Tessuto"
tradition_agot_fashionistas_desc: 0 "Vedo che la moda consuma più vestiti dell'uomo."

 #Traditions
tradition_agot_blackwater_bay_name: 0 "Dominio della Corona"
tradition_agot_blackwater_bay_desc: 0 "Le Terre della Corona sono la più recente tra le regioni di Westeros, forgiate dalle casate e dai popoli giurati direttamente al Trono di Spade. Per questo motivo ne hanno assunto le caratteristiche e i modi di vivere. Dominata dalla città di Approdo del Re, sempre più persone iniziano a vivere nelle città e ad adottare stili di vita più urbani."

tradition_agot_vale_andal_heritage_name: 0 "Fede e Furia"
tradition_agot_vale_andal_heritage_desc: 0 "Gli Andali provengono dall'Essos settentrionale, sebbene nessuno sappia con precisione da dove. Con la continua espansione del Possedimento Valyriano, affamato di terre, gli Andali furono costretti a fuggire dalle loro patrie originarie verso Westeros, travolgendo ogni luogo a sud dell'Incollatura e portando con sé il loro fervore religioso e le tradizioni della cavalleria e della cortesia."

tradition_agot_valeman_finger_name: 0 "Umile Servizio"
tradition_agot_valeman_finger_desc: 0 "Le Dita sono un luogo tetro e battuto dal vento, tanto assalite dalle raffiche del gelido nord che ben poca vegetazione cresce presso le loro estremità. Per la piccola gente vi sono pochi mezzi di sostentamento oltre alla pastorizia, poiché vi è scarsa terra da rendere coltivabile. Così gli uomini delle Dita vivono vite modeste, e i caprai e i mezzadri trovano una certa contentezza nella loro casa spietata."

tradition_agot_honeywiner_name: 0 "Dolci e Soavi"
tradition_agot_honeywiner_desc: 0 "Gli uomini dello Honeywine e delle terre circostanti sono tra i più prosperi di tutto Westeros. Con terre fertili e la grande città di Oldtown, molto commercio scorre lungo il fiume che dà il nome al popolo. Con la Cittadella e il Tempio Stellato, la regione è un bastione del sapere a Westeros, tanto che perfino molti popolani sanno leggere e scrivere."

tradition_agot_valeman_upper_name: 0 "Molto in Alto"
tradition_agot_valeman_upper_desc: 0 "Separati dai loro parenti che dimorano nelle fertili valli della Valle, gli uomini che vivono sulle alture delle Montagne della Luna sono gente assai più rude e tenace. In tempo di guerra sono loro a presidiare le prime linee di difesa contro le incursioni esterne e, vivendo ad alta quota, sono anche coloro che più devono affrontare le scorrerie dei Clanici delle Montagne."

tradition_agot_reachman_name: 0 "Gloria di Mano Verde"
tradition_agot_reachman_desc: 0 "L'Altopiano è una terra prospera e fertile costruita sulle spalle della piccola gente laboriosa. È anche una terra di famiglie con alcune delle radici più antiche di Westeros, risalenti al mitico Garth Mano Verde, dal quale la maggior parte delle illustri famiglie dell'Altopiano afferma di discendere. Con così tante famiglie che aspirano all'eminenza in una terra ricca, i legami che le uniscono sono più forti e importanti che altrove a Westeros."

tradition_agot_riverlands_name: 0 "Ricompense del Fiume"
tradition_agot_riverlands_desc: 0 "Gli Uomini delle Terre dei Fiumi sono spesso stretti tra i poteri che li circondano, eppure tendono a prosperare quando hanno un re forte tutto loro. Il Tridente e i suoi affluenti plasmano le loro vite più di ogni altra cosa, ed è da queste acque che traggono prosperità."

tradition_agot_shieldman_name: 0 "Guardiani del Mander"
tradition_agot_shieldman_desc: 0 "Così chiamate per la loro funzione primaria di scudo contro gli attacchi degli Uomini di Ferro, le Isole Scudo sono un insieme di quattro isole dell'Altopiano ben fortificate, governate da quattro diverse casate. Popolo leale, sebbene per certi versi isolato, gli abitanti delle Isole Scudo sono noti per il loro temperamento robusto e il loro senso del dovere. Le isole sono celebri per i loro fuochi di segnalazione, che gli anziani nelle torri di guardia accendono da isola a isola per diffondere l'avviso dell'arrivo delle navi lunghe agli insediamenti dell'interno. Più di ogni altra cosa, coloro che provengono dalle Isole Scudo si considerano la prima linea di difesa navale."

tradition_agot_stormlands_name: 0 "Simili al loro Tempo"
tradition_agot_stormlands_desc: 0 "Gli uomini delle Terre della Tempesta sono gente robusta, ben nota per la propria inclinazione marziale e per la rapidità con cui si adira. Gli uomini e le donne delle Terre della Tempesta hanno resistito all'ira degli uomini, della natura e perfino degli stessi dèi, e non solo sono rimasti, ma hanno prosperato."

tradition_agot_marches_name: 0 "Guerre Senza Numero"
tradition_agot_marches_desc: 0 "Le Terre Basse di Dorne sono da lungo tempo il crocevia tra le Terre della Tempesta, l'Altopiano e Dorne, testimoniando innumerevoli battaglie fin dall'Età dell'Alba. Il popolo che le chiama casa è noto per la propria abilità marziale, la feroce ostinazione e la costante vigilanza verso ogni possibile minaccia."

tradition_agot_stone_dornish_name: 0 "Guardiani dei Passi"
tradition_agot_stone_dornish_desc: 0 "I Dorniani di Pietra sono, sul piano etnico e culturale, i meno influenzati dai Rhoynar tra i Dorniani. Vivendo sulle alture e nelle valli delle Montagne Rosse, la loro cultura è stata plasmata da generazioni di conflitti con i lord delle Terre Basse dell'Altopiano e delle Terre della Tempesta, difendendo con ardore i loro passi montani dalle incursioni esterne."

tradition_agot_vale_name: 0 "Montagna e Valle"
tradition_agot_vale_desc: 0 "L'antico regno degli Arryn è dominato dalle Montagne della Luna e dalle valli che si snodano tra esse, soprattutto la Valle di Arryn. Questi due elementi hanno isolato dal resto di Westeros i popoli che vivono a oriente e, al contempo, li hanno uniti."

tradition_agot_vineman_name: 0 "Vino, Donne e Canto"
tradition_agot_vineman_desc: 0 "Fin dalla venuta di Gilbert delle Vigne, gli uomini dell'Arbor conoscono una sola cosa: il vino. I vigneti dell'Arbor sono leggendari a Westeros e oltre per la qualità del vino che producono, e molti mercanti e marinai gettano l'ancora a Ryamsport per comprare i migliori rossi dell'Arbor."

tradition_agot_westerman_name: 0 "Di Oro e Argento"
tradition_agot_westerman_desc: 0 "Le Terre dell'Ovest, a prima vista, sembrano un luogo modesto: non il più vasto né il più popoloso dei Sette Regni, eppure il più ricco. Ciò che manca loro in campi estesi e fertili lo compensano più che ampiamente con la ricchezza delle loro colline, colme d'oro e d'argento. È su questa abbondanza di minerali preziosi che si fonda il potere delle Terre dell'Ovest, e i loro nobili custodiscono gelosamente le miniere da coloro che le osservano, invidiosi della loro ricchezza."

tradition_agot_north_name: 0 "Legati da Bronzo e Ferro"
tradition_agot_north_desc: 0 "I Northrons, uomini e donne che chiamano il Nord casa, sono un popolo austero e tenace. Uniti migliaia di anni fa dal Lupo Affamato, questi popoli sono vari quanto le terre che abitano, eppure tutti sono vincolati dagli antichi giuramenti."

tradition_agot_sisterman_name: 0 "Sotto la Salamoia"
tradition_agot_sisterman_desc: 0 "Per gran parte della loro storia, gli abitanti delle Tre Sorelle avevano più in comune con gli Uomini di Ferro che con gli uomini della Valle o del Nord. Per millenni furono governati dai loro re pirati, depredando le coste del Morso per procurarsi ciò che le loro isole battute dal vento non potevano offrire, e adorando strane divinità sconosciute tanto agli Andali quanto ai Primi Uomini."

tradition_agot_ironmen_name: 0 "Scolpiti dal Legno Pallido"
tradition_agot_ironmen_desc: 0 "Gli Uomini di Ferro sono un flagello dei mari, eppure la loro influenza rifluisce e cresce come le maree che li portano. Talvolta sono confinati unicamente alle loro isole nel Mare del Tramonto; altre volte si diffondono nelle Terre Verdi e vi regnano. Tuttavia restano sempre uniti dagli antichi legami con il Re Grigio che dimora nelle profondità."

tradition_agot_dorne_rhoynish_heritage_name: 0 "Figli di Madre Rhoyne"
tradition_agot_dorne_rhoynish_heritage_desc: 0 "La civiltà rhoynish è antica e illustre. Così profonda è la storia dei Rhoynar che alcuni attribuiscono loro l'insegnamento agli Andali della forgiatura e della lavorazione del ferro. Provenienti dalle città-stato lungo il fiume Rhoyne, i Rhoynar venerano numerosi dèi del fiume e hanno anche una speciale affinità con ogni sorta d'imbarcazione, dai piccoli battelli da pesca alle oscene chiatte da piacere. La cultura rhoynish è notevolmente diversa da quella andala, con l'eredità eguale come norma tanto per le donne quanto per gli uomini, e con l'accettazione delle relazioni tra persone dello stesso sesso. I Rhoynar sono noti per l'amore verso l'arte e la musica, il che potrebbe spiegare in parte perché alcune pratiche culturali rhoynish si diffusero così rapidamente a Dorne quando i Rhoynar vi giunsero."

tradition_agot_greenblood_name: 0 "Orfanotrofio Fluviale"
tradition_agot_greenblood_desc: 0 "Dopo essere fuggiti da Essos e giunti a Dorne, gli Orfani del Greenblood si guadagnarono da sé quel titolo rifiutando di adottare le usanze dorniane e di assimilarsi, scegliendo invece di vivere come gli 'orfani' del fiume Rhoyne, il fiume che chiamano 'madre'. Gli Orfani del Greenblood e i loro discendenti si aggrappano alla cultura e alle credenze dei Rhoynar, parlando ancora la lingua rhoynish a porte chiuse e in segreto, vivendo su zattere lungo il fiume Greenblood da cui prendono il nome."

tradition_agot_salt_dornish_name: 0 "Il Sangue di Nymeria"
tradition_agot_salt_dornish_desc: 0 "Avendo nelle vene più sangue rhoynar di qualsiasi altro Dorniano, i Dorniani di Sale vivono lungo le coste più temperate di Dorne. Portano avanti molte delle tradizioni egualitarie introdotte da Nymeria e sono ottimi marinai, con i porti disseminati lungo la costa dorniana che recano loro grande prosperità."

tradition_agot_sand_dornish_name: 0 "Deserto e Duna"
tradition_agot_sand_dornish_desc: 0 "Traendo a fatica sostentamento dal duro deserto che chiamano casa, i Dorniani di Sabbia sono un popolo resistente e spietato. I loro castelli e insediamenti sorgono intorno alle rare fonti d'acqua della loro patria desertica, che difendono con ardore. Sono un popolo naturalmente audace e avventuroso, e molte delle casate nobili della regione discendono da quei pochi coraggiosi che si spinsero in spedizioni tra le dune più severe."

tradition_agot_wildling_name: 0 "Feroci, Selvaggi e Bruti"
tradition_agot_wildling_desc: 0 "Laddove la maggior parte dei popoli e delle società progredisce e cresce, vi sono gruppi che rifiutano di piegarsi al progresso, come dimostrano i numerosi Bruti di Westeros. La maggior parte di essi si trova oltre la Bariera, ma gruppi se ne trovano anche nelle Montagne della Luna. Questi gruppi tribali sono feroci, sebbene poco sviluppati, e possono diventare una minaccia se numerosi."

tradition_agot_moon_clan_name: 0 "Sopra il Sole Calante"
tradition_agot_moon_clan_desc: 0 "Nelle profondità delle Montagne della Luna dimorano i loro clanici, gli uomini più selvaggi e incivili di ogni luogo a sud della Bariera. Sono gli ultimi veri resti dei Primi Uomini nella Valle, poiché la loro dimora montana li ha protetti dall'assalto degli Andali, consentendo loro di continuare le proprie usanze primitive senza grandi interferenze esterne."

tradition_agot_rushlander_name: 0 "Dove i Fiumi Incontrano le Colline"
tradition_agot_rushlander_desc: 0 "Cultura nata sul confine tra la Valle e le Terre dei Fiumi, i Rushlanders sono un popolo robusto, adattato alla vita tra le colline così come lungo i fiumi."

tradition_agot_harsh_laws_name: 0 "Governo Severo"
tradition_agot_harsh_laws_desc: 0 "La società plasma le leggi. La storia ha mostrato che è naturale che una terra aspra generi gente aspra, e che costoro, a loro volta, creino leggi severe con cui governare."

tradition_agot_thenn_name: 0 "Gli Ultimi dei Primi"
tradition_agot_thenn_desc: 0 "Considerati i più 'sofisticati' dei bruti da coloro che vivono a sud della Bariera, i Thenn si reputano gli ultimi Primi Uomini rimasti. Gli abitanti della valle montana nei Frostfangs hanno più contatti con i giganti che con altre culture, ma sono riusciti a imparare occasionalmente qualche parola o frase nella Lingua Comune, pur non avendo mai abbandonato l'Antica Lingua che parlano ancora oggi. Fieri della loro fede nel Magnar, i Thenn sono in qualche misura più disciplinati e organizzati degli altri bruti e hanno accumulato un'impressionante armeria di bronzo. Sebbene coloro che vivono a sud della Bariera possano considerarli selvaggi, essi sono più che capaci e spesso entrano in conflitto con i Guardiani della Notte."

tradition_agot_andalos_name: 0 "Colline Sotto le Stelle"
tradition_agot_andalos_desc: 0 "Fu a Hugor che i Sette-Che-Sono-Uno imposero l'unzione sulla collina di Andalos con sette stelle, affidandogli il compito di condurre gli Andali a Westeros, quale ricompensa divina per aver mantenuto il patto con i Sette-Che-Sono-Uno."

tradition_agot_braavos_name: 0 "Liberi dalle Catene degli Schiavisti"
tradition_agot_braavos_desc: 0 "Unica fra le Città Libere, Braavos nacque da schiavi fuggiaschi diretti a Valyria, ed è dunque composta da popoli provenienti da tutto il mondo conosciuto e oltre. Ciò ha plasmato Braavos in una città e in una nazione di molti popoli, dove una sola regola prevale su tutte: 'Nessun uomo, donna o bambino a Braavos sarà mai schiavo, servo o vincolato.'"

tradition_agot_religious_fc_name: 0 "In Cerca di Purezza Religiosa"
tradition_agot_religious_fc_desc: 0 "Il Possedimento era una mescolanza di molti popoli, dai Valyriani agli Andali, Rhoynar, Ghiscari e altri ancora, senza contare i numerosi schiavi oltre i suoi confini. Per mantenere il controllo su genti tanto diverse, i Signori dei Draghi permisero il culto di tutti, cosa detestata da alcuni tra i loro sudditi più zelanti, che partirono per fondare proprie città in cerca di purezza religiosa."

tradition_agot_three_daughters_name: 0 "Presi Fra Sorelle"
tradition_agot_three_daughters_desc: 0 "Quando il Possedimento crollò con il Disastro, il suo impero si spezzò e le diverse città iniziarono tutte a contendersi il predominio. Ciò appare con la massima chiarezza nelle Terre Contese, dove Lys, Myr e Tyrosh lottano l'una contro l'altra, con il popolo comune intrappolato nel mezzo del loro conflitto senza fine."

tradition_agot_pentos_name: 0 "Nati dalla Mescolanza"
tradition_agot_pentos_desc: 0 "Si crede che i Pentoshi siano il frutto dell'unione tra i coloni valyriani e gli Andali autoctoni che abitavano la regione in precedenza, e che così siano nati i Pentoshi."

tradition_agot_doom_name: 0 "Ammantati dal Disastro"
tradition_agot_doom_desc: 0 "Il Disastro mutò per sempre il mondo, e ancora oggi resta un mistero. Coloro che scamparono a quella distruzione cataclismica ne restano ancora avvolti."

tradition_agot_slavers_bay_name: 0 "Avvinti dal Commercio"
tradition_agot_slavers_bay_desc: 0 "Linfa vitale dell'Antico Impero e persino del Possedimento fu la tratta degli schiavi. È da questo commercio che un popolo può prosperare e crescere per costruire il proprio futuro, anche se ciò avviene al prezzo della libertà di un altro popolo."

tradition_agot_ghis_name: 0 "Nella Stretta dei Grandi"
tradition_agot_ghis_desc: 0 "Fu con disciplina e fermezza che l'Antico Impero di Ghis sorse e si diffuse. Nonostante l'uso degli schiavi, l'Antico Impero fu costruito sulla forza d'armi di uomini liberi nelle Legioni Serrate, e così grande era il loro addestramento e il loro ordine che nessun altro esercito d'uomini poteva resistere loro, soltanto i draghi e le loro fiamme."

tradition_agot_rhoynar_name: 0 "Sulla Madre dei Fiumi"
tradition_agot_rhoynar_desc: 0 "È sulle rive del Rhoyne, il grande fiume dell'Essos occidentale, che sorse una delle grandi civiltà del mondo. I Rhoynar sono celebri per la bellezza delle loro città e per l'uso e l'insegnamento della fusione del ferro."

tradition_agot_candling_name: 0 "Sotto la Grande Candela"
tradition_agot_candling_desc: 0 "Ogni onore alla Grande Candela. Tutti venereranno la Grande Candela. La Grande Candela è saggia. La Grande Candela è la nostra padrona; essa sceglierà chi andrà e chi resterà. CAN-DE-LA, CAN-DE-LA, CAN-DE-LA..."

 #Unique Cultural
tradition_agot_andalosi_name: 0 "Purificati dalla Fiamma"
tradition_agot_andalosi_desc: 0 "#italic «Qarlon il Grande arse con il suo esercito e, in seguito, i signori dei draghi volarono oltre, portando sangue e fuoco alle isole di Lorath. La grande rocca di Qarlon fu divorata dalle fiamme, così come i borghi e i villaggi di pescatori lungo le sue rive. Perfino le grandi pietre dei labirinti furono bruciate e annerite dalle tempeste di fuoco che travolsero le isole. Si dice che nessun uomo, donna o bambino sopravvisse alla Devastazione di Lorath, tanto ardentemente bruciarono quei fuochi.»#!"

tradition_agot_andal_name: 0 "Inseguendo il Tramonto"
tradition_agot_andal_desc: 0 "#italic «...si dice che i Sette stessi camminassero tra il loro popolo sulle colline di Andalos, e che furono loro a incoronare Hugor della Collina e a promettere a lui e ai suoi discendenti grandi regni in una terra straniera. Questo è ciò che septon e septa insegnano come ragione per cui gli Andali lasciarono Essos e mossero verso occidente, verso Westeros,»#!"

tradition_agot_braavosi_name: 0 "Portati da Vele Purpuree"
tradition_agot_braavosi_desc: 0 "#italic «E poiché avevano rischiato la vita in nome della libertà, i padri e le madri della nuova città giurarono che nessun uomo, donna o bambino a Braavos sarebbe mai stato schiavo, servo o vincolato. Questa è la Prima Legge di Braavos, incisa nella pietra sull'arco che scavalca il Canale Lungo. Da quel giorno fino a oggi, i Re del Mare di Braavos si sono opposti alla schiavitù in ogni sua forma e hanno combattuto molte guerre contro gli schiavisti e i loro alleati.»#!"

tradition_agot_lorathi_name: 0 "Nella Cecità di Isola e Labirinto"
tradition_agot_lorathi_desc: 0 "#italic «Questi nuovi Lorathi, inizialmente, furono sottomessi ai seguaci di Boash giunti prima di loro, e per molti anni i sacerdoti del Dio Cieco continuarono a governare le isole. Col tempo, tuttavia, il numero dei nuovi arrivati aumentò mentre i ranghi dei fedeli si assottigliavano. Il culto di Boash svanì, poiché i sacerdoti rimasti divennero più mondani e corrotti, abbandonando i cilici, i cappucci e la pietà e ingrassando e arricchendosi grazie alle tasse che esigevano da coloro che governavano. Alla fine, pescatori, contadini e altra piccola gente si sollevarono in ribellione, spezzando le catene di Boash.»#!"

tradition_agot_lyseni_name: 0 "Amore del Crepuscolo"
tradition_agot_lyseni_desc: 0 "#italic «I Lyseni sono anche grandi allevatori di schiavi, accoppiando bellezza con bellezza nella speranza di produrre cortigiane e schiavi da letto sempre più raffinati e avvenenti. Il sangue di Valyria scorre ancora forte a Lys, dove perfino la piccola gente spesso vanta pelle chiara, capelli argenteo-dorati e gli occhi viola, lilla e azzurro pallido degli antichi signori dei draghi. La nobiltà lysena tiene la purezza del sangue sopra ogni cosa e ha prodotto molte celebri, e infami, bellezze.»#!"

tradition_agot_myrish_name: 0 "Limpidezza della Lente"
tradition_agot_myrish_desc: 0 "#italic «Il commercio è la linfa vitale di Myr fin da allora, e le navi myrensi solcano le acque del Mare Stretto da secoli. Anche gli artigiani di Myr, molti dei quali nati schiavi, sono grandemente rinomati; si dice che il merletto myrense e gli arazzi myrensi valgano il loro peso in oro e spezie, e che le lenti myrensi non abbiano eguali in tutto il mondo.»#!"

tradition_agot_norvoshi_name: 0 "Nel Suono di Campana e Capello"
tradition_agot_norvoshi_desc: 0 "#italic «Sebbene Grande Norvos domini oggi le sorgenti del Rhoyne, i Norvoshi non discendono dai Rhoynar che un tempo governavano quel possente fiume. Come le altre Città Libere, Norvos è una figlia di Valyria.»#!"

tradition_agot_pentoshi_name: 0 "Con Catene di Debito"
tradition_agot_pentoshi_desc: 0 "#italic «I primi Pentoshi furono mercanti, commercianti, marinai e contadini, con pochi tra loro di alto lignaggio; forse per questa ragione furono meno gelosi del loro sangue valyriano e più disposti a unirsi agli abitanti originari delle terre che governavano.»#!"

tradition_agot_hartalari_name: 0 "Sotto Tre Calcagni"
tradition_agot_hartalari_desc: 0 "#italic «Le guerre tra Tyrosh, Lys e Myr non hanno soltanto alimentato la nascita delle compagnie libere nelle Terre Contese, ma hanno anche portato alla formazione di flotte di pirati e mercenari del mare, capitani di ventura pronti a combattere per chiunque paghi. La maggior parte di essi ha base nelle Stepstones, le isole che punteggiano lo stretto tra il Braccio Spezzato e la costa orientale.»#!"

tradition_agot_qohorik_name: 0 "Nel Buio di Foresta e Forgia"
tradition_agot_qohorik_desc: 0 "#italic «Gli artigiani di Qohor sono famosi in lungo e in largo. Gli arazzi qohorik, tessuti soprattutto dalle donne e dai bambini della città, sono raffinati quanto quelli di Myr, sebbene meno costosi. Squisite, anche se alquanto inquietanti, sculture in legno si possono acquistare nel mercato di Qohor, e le forge della città non hanno pari.»#!"

tradition_agot_tyroshi_name: 0 "Ricchezza delle Lumache"
tradition_agot_tyroshi_desc: 0 "#italic «I tintori di Tyrosh appresero presto a produrre anche tinte scarlatte, cremisi e di un profondo indaco variando la dieta delle lumache. Nei secoli successivi escogitarono tinture di cento altre sfumature e tonalità, alcune naturali e altre ottenute per alchimia. Le vesti dai colori vivaci conquistarono il favore di lord e principi in tutto il mondo, e tutte le tinture che le producevano provenivano da Tyrosh. La città si arricchì, e con la ricchezza venne l'ostentazione. I Tyroshi si compiacciono di esibizioni sgargianti, e uomini e donne traggono uguale diletto dal tingersi i capelli di colori vistosi e innaturali.»#!"

tradition_agot_volantene_name: 0 "Prima tra le Figlie"
tradition_agot_volantene_desc: 0 "#italic «Dopo che il Disastro inghiottì Valyria e le Terre della Lunga Estate, Volantis rivendicò il diritto di governare su tutte le altre colonie valyriane nel mondo. Tale era la potenza della #italic “Prima Figlia”#! che per un tempo riuscì a stabilire la propria egemonia su parecchie delle altre Città Libere...»#!"

tradition_agot_essosi_valyrian_name: 0 "Sangue degli Antichi"
tradition_agot_essosi_valyrian_desc: 0 "#italic «Molti dell'Antico Sangue di Volantis conservano ancora gli antichi dèi di Valyria, ma la loro fede si trova soprattutto entro le Mura Nere. Al di fuori, il dio rosso R'hllor è venerato da molti, specialmente tra gli schiavi e i liberti della città.»#!"

tradition_agot_astapori_name: 0 "Dominati dai Buoni"
tradition_agot_astapori_desc: 0 "#italic «Mattoni e sangue costruirono Astapor, e mattoni e sangue il suo popolo, recita una vecchia filastrocca, riferendosi alle mura di mattoni rossi della città e al sangue versato dalle migliaia di schiavi che vissero, lavorarono e morirono edificandole. Governata da uomini che si fanno chiamare Buoni Padroni, Astapor è nota soprattutto per la creazione degli eunuchi schiavi-soldato detti Immacolati, uomini allevati fin dalla fanciullezza per essere guerrieri senza paura che non provano dolore.»#!"

tradition_agot_yunkaii_name: 0 "Dominati dai Saggi"
tradition_agot_yunkaii_desc: 0 "#italic «Di Yunkai, la città gialla, poco occorre dire, poiché è un luogo oltremodo disonorevole. Gli uomini che la governano, chiamandosi Saggi Padroni, sono immersi nella corruzione e vendono schiavi da letto, ragazzi di piacere e peggio ancora.»#!"

tradition_agot_meereenese_name: 0 "Dominati dai Grandi"
tradition_agot_meereenese_desc: 0 "#italic «La più formidabile delle città lungo la Baia degli Schiavisti è l'antica Meereen, ma come le altre è un luogo in rovina, la cui popolazione è solo una frazione di quella che un tempo sosteneva all'apice dell'Antico Impero. Le sue mura di mattoni dai molti colori racchiudono una sofferenza senza fine, poiché i Grandi Padroni di Meereen addestrano gli schiavi a combattere e morire per il loro piacere nelle fosse di lotta intrise di sangue.»#!"

tradition_agot_ghiscari_name: 0 "Afferrando i Fulmini"
tradition_agot_ghiscari_desc: 0 "#italic «Antica Ghis: una città edificata sulla schiavitù. Il leggendario fondatore della città, Grazdan il Grande, resta tanto venerato che agli uomini delle famiglie schiaviste viene ancora spesso dato il suo nome. Fu lui che, secondo le più antiche storie dei Ghiscari, fondò le legioni serrate con i loro alti scudi e le tre lance, le prime a combattere come corpi disciplinati. Antica Ghis e il suo esercito procedettero a colonizzare i dintorni, quindi, avanzando ancora, a soggiogare i vicini. Così nacque il primo impero, e per secoli esso regnò sovrano.»#!"

tradition_agot_rhoynish_name: 0 "Giurati tra Conchiglie d'Acqua"
tradition_agot_rhoynish_desc: 0 "#italic «Alcuni, come i Rhoynar, resistettero alla marea per secoli, persino per millenni. I Rhoynar, che fondarono grandi città lungo il Rhoyne, si dice siano stati i primi ad apprendere l'arte della lavorazione del ferro.»#!"

tradition_agot_chroyanar_name: 0 "Per Amore delle Feste"
tradition_agot_chroyanar_desc: 0 "#italic «...e Chroyane, la più grande di tutte, la città delle feste con il suo grande Palazzo dell'Amore.»#!"

tradition_agot_mellar_name: 0 "Sopra la Palude dei Fiori"
tradition_agot_mellar_desc: 0 "#italic «...la pallida Sar Mell dei fiori;»#!"

tradition_agot_qhoynar_name: 0 "Elevati con Pugni di Marmo"
tradition_agot_qhoynar_desc: 0 "#italic «Ar Noy sul Qhoyne, con le sue sale di marmo verde;»#!"

tradition_agot_sarhar_name: 0 "Nutrìti da Canali di Sale"
tradition_agot_sarhar_desc: 0 "#italic «...Sarhoy cinta dal mare, con i suoi canali e i giardini d'acqua salata;»#!"

tradition_agot_sarar_name: 0 "Vivi del Canto delle Fontane"
tradition_agot_sarar_desc: 0 "#italic «Ny Sar, la città delle fontane, viva di canti;»#!"

