 #Ethoses
  ethos_festive_name:0 "Festoso"
  ethos_festive_desc:0 "Dinanzi alla durezza dell’esistenza, questa cultura trova salvezza nella festa collettiva e nella risata condivisa."
  ethos_mystic_name:0 "Mistico"
  ethos_mystic_desc:0 "I disegni degli dèi sono oscuri e incomprensibili, ma ciò non impedisce a questa cultura di scrutare oltre il velo per cogliere i misteri più profondi del mondo."
  ethos_methodical_name:0 "Metodico"
  ethos_methodical_desc:0 "Il passo costante evita la caduta, e il popolo di questa cultura non agisce mai senza prima valutare tutte le possibili conseguenze."
ethos_assertive_name: 0 "Assertivo"
ethos_assertive_desc: 0 "Solo prendendo ciò di cui ha bisogno una civiltà può prosperare, ed è un'idea che questa cultura ha fatto propria. Come lo faccia, con le armi o con le parole, non fa differenza."
culture_parameter_ethos_assertive_truce_breaking_twenty_five_cheaper: 0 "Le perdite di [legitimacy|E], [prestige|E] e [piety|E] sono ridotte del #P -25%#! quando si infrangono le [truces|E]"
culture_parameter_ethos_assertive_additional_contract_change: 0 "I [vassal_contracts|E] [feudal|E] possono essere modificati con #P +1#! cambiamento aggiuntivo"
ethos_fervent_name: 0 "Fervente"
ethos_fervent_desc: 0 "Quando una cultura è unita nella fede, può sopravvivere, prosperare e fiorire, poiché è attraverso il divino che un popolo avanza davvero."
culture_parameter_ethos_fervent_same_faith_increased_vassalization_acceptance: 0 "I membri della stessa fede sono più propensi ad accettare la vassallizzazione"
culture_parameter_ethos_fervent_same_faith_increased_vassalization_acceptance_tt: 0 "[ethos|E] fervente e stessa [faith|E]: $VALUE|=+0$"

