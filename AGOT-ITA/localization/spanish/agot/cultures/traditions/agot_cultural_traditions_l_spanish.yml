 #Dreams of Essos - Culture Specific Traditions
tradition_agot_axemen_name: 0 "Stringere l'Ascia"
tradition_agot_axemen_desc: 0 "#italic «Gli Andali portarono con sé armi di ferro e corazze di piastre di ferro, contro le quali le tribù che abitavano quelle terre potevano ben poco.»#!"

tradition_agot_essari_name: 0 "Sotto lo Sguardo di Sole e Cielo"
tradition_agot_essari_desc: 0 "#italic «La colonia valyriana di Essaria, talvolta ricordata come la Città Libera Perduta,»#!"

tradition_agot_noynar_name: 0 "Tra le Colline di Pelliccia"
tradition_agot_noynar_desc: 0 "#italic «...dove la Madre accoglie in sé la sua Figlia Selvaggia, il Noyne,»#!"

tradition_agot_valyrian_original_name: 0 "Volontà del Possedimento"
tradition_agot_valyrian_original_desc: 0 "#italic «I Valyriani non avevano re ma si chiamavano Possedimento, poiché tutti i cittadini che possedevano terre avevano voce in capitolo.»#!"

tradition_agot_dothraki_sea_name: 0 "Sul Grande Mare d'Erba"
tradition_agot_dothraki_sea_desc: 0 "#italic «Coloro che fanno la loro dimora sul Grande Mare d'Erba conducono una vita nomade,»#!"

tradition_agot_dothraki_name: 0 "Cavalcando il Mondo"
tradition_agot_dothraki_desc: 0 "#italic «I viaggiatori chiamano queste terre le Terre Infestate per le molte città in rovina che le punteggiano, o la Grande Desolazione per il loro vuoto, ma è come mare dothraki che queste praterie sono oggi meglio conosciute. Tale uso è però relativamente recente, poiché i Dothraki sono una razza giovane, ed è solo da quando il Disastro distrusse Valyria che i loro khalasar sono giunti a dominare queste terre, irrompendo da oriente con fuoco e acciaio per conquistare e distruggere le antiche città che un tempo vi prosperavano e trascinandone i popoli in schiavitù.»#!"

tradition_agot_grass_sea_name: 0 "Sotto lo Zoccolo"
tradition_agot_grass_sea_desc: 0 "#italic «...la luce del sole sul mare dothraki, la pianura vivente, ricca degli odori della terra e della morte. Il vento agitava le erbe, ed esse increspavano come acqua.»#!"

tradition_agot_lhazareen_name: 0 "Un Gregge Unito"
tradition_agot_lhazareen_desc: 0 "#italic «...il popolo di questo paese si chiamava Lhazareen, ma i Dothraki li chiamavano haesh rakhi, gli Uomini Agnello.»#!"

tradition_agot_omberi_name: 0 "Un Tributo Volontario"
tradition_agot_omberi_desc: 0 "#italic «Coloro che osano proseguire ancora più a oriente passeranno poi lungo le coste del piccolo e pastorale Regno di Omber, i cui re codardi e deboli principi sono noti soprattutto per il grano, le gemme e le fanciulle che pagano ogni anno ai signori dei cavalli dothraki per non essere molestati.»#!"

tradition_agot_sarnori_name: 0 "Rampolli delle Regine Pescatrici"
tradition_agot_sarnori_desc: 0 "#italic «Il Regno di Sarnor, così chiamato benché vantasse quaranta re rivali, fu fra le grandi civiltà del mondo conosciuto per più di duemila anni, eppure molto di ciò che sappiamo di essi proviene soltanto da frammenti delle loro altrimenti perdute storie, in particolare gli Annali dell'Estate e dell'Inverno, e da cronache provenienti da Qarth, dalla Baia degli Schiavisti e dalle Città Libere. I mercanti sarnori viaggiavano fino a Valyria e Yi Ti, a Leng e Asshai. Le navi sarnori solcavano il Mare dei Brividi verso Ib, le Mille Isole e la lontana Mossovy. I re sarnori mossero guerra ai Qaathi e all'Antico Impero di Ghis, e condussero molte incursioni contro le bande di nomadi a cavallo che erravano nelle steppe a oriente.»#!"

tradition_agot_tagaez_fen_name: 0 "Rampolli delle Torri"
tradition_agot_tagaez_fen_desc: 0 "#italic «A Westeros i loro conquistatori sono ricordati come Sarnori, poiché al suo apice il loro grande regno comprendeva tutte le terre bagnate dal Sarne e dai suoi vassalli, e i tre grandi laghi che erano tutto ciò che restava del rimpicciolito Mare Argenteo. Essi chiamavano sé stessi gli Uomini Alti, nella loro lingua Tagaez Fen. Erano lunghi di membra e bruni di pelle, come gli Zoqora, ma i loro capelli e i loro occhi erano neri come la notte. Guerrieri, stregoni e sapienti, facevano risalire la loro discendenza al re eroe che chiamavano Huzhor Amai, il Meraviglioso, nato dall'ultima delle Regine Pescatrici,»#!"

tradition_agot_trimbaez_fen_name: 0 "Rampolli delle Carovane"
tradition_agot_trimbaez_fen_desc: 0 "#italic «A oriente si levava Kasath, la Città delle Carovane;»#!"

tradition_agot_goraez_fen_name: 0 "Rampolli del Lago"
tradition_agot_goraez_fen_desc: 0 "#italic «Gornath sul Lago, con i suoi canali;»#!"

tradition_agot_zanhar_fen_name: 0 "Rampolli dei Sapienti"
tradition_agot_zanhar_fen_desc: 0 "#italic «Sallosh sulla Riva d'Argento, Città dei Sapienti, con la sua vasta biblioteca e le Mura Dipinte.»#!"

tradition_agot_madekh_fen_name: 0 "Rampolli dei Soldati"
tradition_agot_madekh_fen_desc: 0 "#italic «Qui sorgeva anche Mardosh, la Città dei Soldati, rinomata come Mardosh l'Inespugnabile.»#!"

tradition_agot_gilal_fen_name: 0 "Rampolli delle Cascate"
tradition_agot_gilal_fen_desc: 0 "#italic «Sathar, la Città della Cascata, alla congiunzione di due rami del Sarne;»#!"

tradition_agot_giren_fen_name: 0 "Rampolli delle Colline"
tradition_agot_giren_fen_desc: 0 "#italic «I mercanti sarnori viaggiavano fino a Valyria e Yi Ti, a Leng e Asshai.»#!"

tradition_agot_cenaakh_fen_name: 0 "Rampolli dei Templi"
tradition_agot_cenaakh_fen_desc: 0 "#italic «Solo lì i cento dèi del Regno di Sarnor sono ancora venerati.»#!"

tradition_agot_zivylar_fen_name: 0 "Rampolli delle Monete"
tradition_agot_zivylar_fen_desc: 0 "#italic «A valle, dove il Sarne piegava verso nord, le prospere città fluviali di Rathylar, Hornoth e Kyth servivano le navi che solcavano le sue profonde acque azzurre.»#!"

tradition_agot_cewi_fen_name: 0 "Rampolli del Gemello"
tradition_agot_cewi_fen_desc: 0 "#italic «Le rovine della città sorella di Saath, Sarys, saccheggiata e distrutta secoli addietro da un khal dothraki, si trovano sparse attraverso tutta l'ampiezza del delta.»#!"

tradition_agot_dawiz_fen_name: 0 "Rampolli dell'Ultimo"
tradition_agot_dawiz_fen_desc: 0 "#italic «...solo Saath resta oggi intatta, e quella città portuale è un luogo triste, assai decaduto da ciò che un tempo fu,»#!"

tradition_agot_cymmeri_name: 0 "Con la Corazza della Sposa"
tradition_agot_cymmeri_desc: 0 "#italic «...la sua sposa cymer gli fece l'armatura, poiché il suo popolo fu il primo a lavorare il ferro»#!"

tradition_agot_gipps_name: 0 "Con lo Scudo della Sposa"
tradition_agot_gipps_desc: 0 "#italic «...i longilinei Gipps con i loro scudi di vimini e i capelli induriti dalla calce,»#!"

tradition_agot_zoqora_name: 0 "Con l'Impeto della Sposa"
tradition_agot_zoqora_desc: 0 "#italic «Si dice che fosse la sua sposa zoqora a guidare il suo carro,»#!"

tradition_agot_first_clans_name: 0 "Coloro che Suonano il Corno"
tradition_agot_first_clans_desc: 0 "#italic «...e nei tempi antichi Joramun, che soffiò nel Corno dell'Inverno e svegliò i giganti dalla terra.»#!"

tradition_agot_nonteloshi_name: 0 "Con Vincoli di Cortesia"
tradition_agot_nonteloshi_desc: 0 "#italic «Si parla di Nove Città Libere, sebbene in tutta l'ampiezza di Essos si possano trovare molte altre città, insediamenti e avamposti valyriani, alcuni più grandi e popolosi di Gulltown, Porto Bianco o persino Lannisport. La distinzione che separa le Nove non è la loro grandezza, ma le loro origini.»#!"

tradition_agot_valemen_main_name: 0 "Cavalleria dei Falchi"
tradition_agot_valemen_main_desc: 0 "#italic «Come accadde per gli uomini della Valle, alcuni si sottomisero agli Andali, persino abbracciando la fede dei Sette. In molti casi, gli Andali presero in moglie le spose e le figlie dei re sconfitti, quale mezzo per consolidare il proprio diritto a governare. Poiché, nonostante tutto, i Primi Uomini erano assai più numerosi degli Andali e non potevano semplicemente essere messi da parte.»#!"

tradition_agot_valemen_finger_name: 0 "Stelle Scolpite nella Pietra"
tradition_agot_valemen_finger_desc: 0 "#italic «Septon, cantori e maestri concordano tutti che il primo luogo in cui gli Andali approdarono furono le Dita nella Valle di Arryn. Incisioni della stella a sette punte sono sparse sulle rocce e sulle pietre di tutta quella regione, pratica che in seguito cadde in disuso man mano che le conquiste andale progredivano.»#!"

tradition_agot_valemen_upper_name: 0 "Sopra Tutti"
tradition_agot_valemen_upper_desc: 0 "#italic «L'alta strada che dalle Terre dei Fiumi attraversa le Montagne della Luna ha visto versare molto sangue, poiché, ripida e sassosa com'è, offre la via più probabile a un esercito per entrare nella Valle.»#!"

tradition_agot_sistermen_name: 0 "Tesori Portati dall'Onda"
tradition_agot_sistermen_desc: 0 "#italic «Le ultime isole a essere unite alla Valle furono le Tre Sorelle. Per migliaia di anni, queste isole avevano avuto propri re crudeli, pirati e razziatori le cui navi lunghe solcavano il Morso, il Mare Stretto e perfino il Mare dei Brividi impunemente, saccheggiando e razziando a piacere e tornando alle Sorelle cariche d'oro e di schiavi.»#!"

tradition_agot_rivermen_main_name: 0 "Sui Rami del Tridente"
tradition_agot_rivermen_main_desc: 0 "#italic «I ricordi di antichi torti e di passati tradimenti venivano di rado accantonati dai lord del Tridente, le cui inimicizie correvano profonde quanto i fiumi che irrigavano le loro terre.»#!"

tradition_agot_crownlander_name: 0 "Nati dalle Acque Nere"
tradition_agot_crownlander_desc: 0 "#italic «Chiamò a sé i suoi lord leali ad Approdo del Re, ma si presentarono soltanto piccoli lord delle Terre della Corona...»#!"

tradition_agot_clawmen_name: 0 "Volontà dell'Artiglio"
tradition_agot_clawmen_desc: 0 "#italic «...intrattenendoli con racconti di Crackclaw Point. Ogni cupa valle aveva il suo lord, disse, e tutti erano uniti soltanto dalla loro diffidenza verso gli stranieri. Nelle loro vene il sangue dei Primi Uomini scorreva scuro e forte. “Gli Andali provarono a prendere Crackclaw, ma noi li dissanguammo nelle valli e li annegammo nelle paludi. Solo ciò che i loro figli non seppero vincere con le spade, le loro graziose figlie lo vinsero coi baci. S'imparentarono con le casate che non riuscivano a conquistare, aye.”»#!"

tradition_agot_high_valyrian_name: 0 "Sangue del Drago"
tradition_agot_high_valyrian_desc: 0 "#italic «Gli antichi signori dei draghi di Valyria avevano controllato le loro cavalcature con incantesimi vincolanti e corni stregati.»#!"

tradition_agot_western_valyrian_name: 0 "Doni della Marea"
tradition_agot_western_valyrian_desc: 0 "#italic «...una famiglia di antica e rinomata ascendenza valyriana giunta a Westeros prima dei Targaryen,»#!"

tradition_agot_ironborn_name: 0 "Pagare il Prezzo di Ferro"
tradition_agot_ironborn_desc: 0 "#italic «La guerra era il mestiere naturale di un Uomo di Ferro. Il Dio Abissale li aveva fatti per razziare e stuprare, per scolpire regni e scrivere i loro nomi nel fuoco, nel sangue e nel canto.»#!"

tradition_agot_greenborn_name: 0 "Dominare le Terre Verdi"
tradition_agot_greenborn_desc: 0 "#italic «Puoi vestire un Uomo di Ferro di sete e velluti, insegnargli a leggere e a scrivere e dargli libri, istruirlo nella cavalleria, nella cortesia e nei misteri della Fede... ma quando lo guarderai negli occhi, il mare sarà ancora lì, freddo, grigio e crudele.»#!"

tradition_agot_first_men_name: 0 "Conquistare con Bronzo e Destriero"
tradition_agot_first_men_desc: 0 "#italic «I Primi Uomini, che avevano portato con sé strani dèi, cavalli, bestiame e armi di bronzo, erano anche più grandi e più forti dei figli, e dunque rappresentavano una minaccia considerevole.»#!"
 
tradition_agot_northmen_name: 0 "Governati da Lupi e Inverno"
tradition_agot_northmen_desc: 0 "#italic «Focolare e cuore e raccolto noi rendiamo a voi, mio lord. Le nostre spade e lance e frecce sono vostre da comandare. Concedete misericordia ai nostri deboli, aiuto ai nostri indifesi e giustizia a tutti, e noi non vi mancheremo mai... Lo giuro per terra e acqua... Lo giuro per bronzo e ferro... Lo giuriamo per ghiaccio e fuoco.»#!"

tradition_agot_bearmen_name: 0 "Accanto a Orso e Stirpe"
tradition_agot_bearmen_desc: 0 "#italic «“Orse, aye,” disse Lady Maege. “Abbiamo dovuto esserlo. Nei tempi antichi gli Uomini di Ferro venivano a razziare sulle loro navi lunghe, o i bruti dalla Riva Gelata. Gli uomini erano spesso lontani a pescare. Le mogli che lasciavano dietro di sé dovevano difendere sé stesse e i loro figli, oppure essere portate via.”»#!"

tradition_agot_wolfswood_clansmen_name: 0 "Cacciare con Zanna e Piuma"
tradition_agot_wolfswood_clansmen_desc: 0 "#italic «La Wolfswood è piena di pericoli; la tua ultima cavalcata avrebbe dovuto insegnartelo.»#!"

tradition_agot_northern_clans_name: 0 "Armati di Maglia e Ghiaccio"
tradition_agot_northern_clans_desc: 0 "#italic “La mappa non è la terra, diceva spesso mio padre. Gli uomini vivono da migliaia di anni nelle alte valli e nei prati montani, governati dai capi dei loro clan.”#!"

tradition_agot_barrowmen_name: 0 "Alla carica tra Rills e Colline"
tradition_agot_barrowmen_desc: 0 "#italic “Ci sono tumuli ovunque nel nord, Vostra Grazia... Questa terra è antica... E fredda.”#!"

tradition_agot_stoneborn_name: 0 "Banchetto di Pietra e Carne"
tradition_agot_stoneborn_desc: 0 "#italic “...be', solo gli alberi del cuore vedono mai metà di ciò che fanno su Skagos.”#!"
 
tradition_agot_krakenmen_name: 0 "Nati da Sale e Neve"
tradition_agot_krakenmen_desc: 0 "#italic “In effetti, Capo Kraken, il più vicino alle Isole di Ferro, è passato di mano così tante volte che molti maestri credono che la sua popolazione sia più vicina per sangue agli Uomini di Ferro che agli uomini del nord.”#!"

tradition_agot_crannogmen_name: 0 "Giurati alla Terra e all'Acqua"
tradition_agot_crannogmen_desc: 0 "#italic “Altrettanto pericolosi erano i suoi abitanti, visti di rado ma sempre in agguato: i dimoratori delle paludi, i mangiatori di rane, gli uomini del fango.”#!"

tradition_agot_harbormen_name: 0 "Accolti con Neve e Argento"
tradition_agot_harbormen_desc: 0 "#italic “Erano stati grandi lord sul Mander, finché non si spinsero troppo oltre e le mani verdi li abbatterono. Il re lupo prese il loro oro, ma diede loro della terra e permise che conservassero i loro dèi.”#!"

tradition_agot_stormlander_main_name: 0 "Guerrieri del Tuono"
tradition_agot_stormlander_main_desc: 0 "#italic “Coloro che scelgono di farsi una casa nelle Terre della Tempesta — sia lungo le rive sassose del mare Stretto, sia tra le grondanti foreste verdi del Rainwood, sia nelle Terre Basse di Dorne battute dal vento — sono tuttavia di una razza speciale. Si dice spesso che il popolo delle Terre della Tempesta somigli al proprio clima: tumultuoso, violento, implacabile, imprevedibile.”#!"

tradition_agot_marcher_name: 0 "Canto di Spade"
tradition_agot_marcher_desc: 0 "#italic “Là, al cospetto delle Montagne Rosse, sorgono i grandi castelli dei lord delle Terre Basse di Dorne, eretti a guardia dei confini delle Terre della Tempesta contro le incursioni degli uomini di Dorne da sud e dei servitori corazzati dei Re dell'Altopiano da ovest.”#!"
