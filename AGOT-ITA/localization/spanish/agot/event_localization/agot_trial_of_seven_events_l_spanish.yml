l_spanish:
 ##############################################################
 ####### ####### ####### TRIAL OF SEVEN ####### ####### #######
 ##############################################################

 #############################################
 ### TOS: Succession Crisis INITIAL EVENTS ###
 #############################################

 # ToS - Succession Crisis: ToS Demanded
  agot_trial_of_seven.0100.t:0 "Una Richiesta dinanzi al Regno"
  agot_trial_of_seven.0100.desc:0 "La corona si è appena posata sul mio capo quando l'accusa viene pronunciata ad alta voce. [accuser_leader.Custom('IT_NAM_COL3')][accuser_leader.GetTitledFirstName] definisce il mio dominio un'usurpazione e reclama giudizio per questo, sostenendo che il regno sia stato da me sottratto.\n\nLa richiesta è chiara. Un Processo dei Sette. Sette campioni contro sette, la mia causa opposta alla [Select_CString(accuser_leader.IsFemale,'sua','sua')], col destino del mio dominio vincolato all'esito. Rifiutare verrebbe preso da molti come una confessione. Accettare significa mettere sul campo il regno stesso."
  agot_trial_of_seven.0100.desc.helper:0 "La corona si è appena posata sul mio capo quando l'accusa viene pronunciata ad alta voce. [accuser_leader.Custom('IT_NAM_COL3')][accuser_leader.GetTitledFirstName] si fa avanti per definire il mio dominio un'usurpazione e reclama un Processo dei Sette in nome di [true_heir.Custom('IT_NAM_COL2')][true_heir.GetTitledFirstName], la cui pretesa viene dichiarata rubata.\n\nLa richiesta è chiara. Sette campioni contro sette, la mia causa opposta alla causa che hanno abbracciato, col destino del mio dominio vincolato all'esito. Rifiutare verrebbe preso da molti come paura. Accettare significa mettere sul campo il regno stesso."
  agot_trial_of_seven.0100.desc.accuser:0 "La corona grava incerta sul capo di [defender_leader.GetTitledFirstNamePossessive], e io non permetterò al regno di fingere altrimenti. Dinanzi a lord e gente comune, definisco questo dominio per ciò che è, un'usurpazione, e invoco giudizio sotto gli occhi degli dèi e degli uomini.\n\nUn Processo dei Sette. Sette campioni a levarsi per me e per la pretesa che difendo, sette per colui che siede sul trono. Che siano l'acciaio e la fede a decidere ciò che le sole parole non possono. Se [defender_leader.GetSheHe] rifiuta, il regno comprenderà il significato di quel silenzio."
  agot_trial_of_seven.0100.a:0 "Che siano gli dèi a decidere se [accuser_leader.GetSheHe] abbia torto o ragione."
  agot_trial_of_seven.0100.a.accuser:0 "Che i Sette ne siano testimoni."

 # ToS - Succession Crisis: Interaction now available
  agot_trial_of_seven.0101.t:0 "Una Via verso il Giudizio"
  agot_trial_of_seven.0101.desc:0 "Esiste una via per chiamare [crown_thief.Custom('IT_NAM_COL4')][crown_thief.GetTitledFirstName] a rispondere dell'usurpazione. Posso reclamare un Processo dei Sette e costringere l'accusa a venire alla luce, combattendo dinanzi agli dèi e al regno per la legittima pretesa di [crown_theft_king_legit_heir.GetTitledFirstNamePossessive] al trono."
  agot_trial_of_seven.0101.desc.legit_heir:0 "Forse sono stato troppo sbrigativo nell'accettare ciò che è stato fatto. [crown_thief.Custom('IT_NAM_COL3')][crown_thief.GetTitledFirstName] siede sul trono che dovrebbe essere mio, e il regno è stato lasciato a fingere che la questione sia risolta. Eppure vi è un'altra via. Un Processo dei Sette potrebbe portare l'accusa allo scoperto e lasciare che siano l'acciaio e gli dèi a decidere se la mia pretesa mi sia stata davvero sottratta."
  agot_trial_of_seven.0101.a:0 "Lo prenderò in considerazione."
  agot_trial_of_seven.0101.a.tt:0 "Ora potrai reclamare un Processo dei Sette contro il sovrano."

 # ToS Denied
  agot_trial_of_seven.9999.t:0 "La Sfida Rifiutata"
  agot_trial_of_seven.9999.desc:0 "La mia richiesta è stata respinta. [recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstName] non intende rispondermi sul campo né opporre la [Select_CString(recipient.IsFemale,'sua','sua')] causa alla mia dinanzi al regno. Il rifiuto è avvolto dalla cortesia, ma io odo la verità che vi si cela sotto. Non vogliono rischiare l'acciaio, non quando l'acciaio potrebbe parlare troppo forte."
  agot_trial_of_seven.9999.a:0 "Non tacerò su questo."

 #######################################
 ### TOS: Succession Crisis OUTCOMES ###
 #######################################

 # ToS - Succession Crisis: Usurpation Scenario Outcome - POV: usurper or final_usurper (the heir of the usurper)
  agot_trial_of_seven.0103.t:0 "Giudizio dinanzi al Regno"
 #Legit Heir won - Usurper POV
  agot_trial_of_seven.0103.desc.legit_won:0 "Il processo ha parlato e il verdetto è limpido. Io sono stato sconfitto insieme a coloro che si sono levati per me, la mia causa infranta dinanzi a tutti coloro che ne sono stati testimoni.\n\nIl campo è soffocato dai cadaveri, e il prezzo della corona è scritto nel sangue e nell'acciaio. La corona passa ora a [legit_heir.Custom('IT_NAM_COL4')][legit_heir.GetTitledFirstName], la cui pretesa è stata dimostrata non dalle parole, ma da una vittoria strappata alla morte stessa. Ciò che fu sottratto è stato reclamato di nuovo sotto gli occhi del regno, e nessun lord può ormai fingere che questo giudizio fosse incerto."
 #Legit Heir won - Usurper's Heir POV
  agot_trial_of_seven.0103.desc.legit_won.usurper_died:0 "Il processo ha parlato e il verdetto è limpido. [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] giace morto insieme a coloro che si sono levati per [Select_CString(usurper.IsFemale,'lei','lui')], la [Select_CString(usurper.IsFemale,'sua','sua')] causa infranta dinanzi a tutti coloro che ne sono stati testimoni.\n\nIl campo è soffocato dai cadaveri, e il prezzo della corona è scritto nel sangue e nell'acciaio. La corona passa ora a [legit_heir.Custom('IT_NAM_COL4')][legit_heir.GetTitledFirstName], la cui pretesa è stata dimostrata non dalle parole, ma da una vittoria strappata alla morte stessa. Ciò che fu sottratto è stato reclamato di nuovo sotto gli occhi del regno, e nessun lord può ormai fingere che questo giudizio fosse incerto."
 #Legit Heir Helper won - Usurper POV
  agot_trial_of_seven.0103.desc.legit_helper_won:0 "Il processo ha parlato e il verdetto è limpido. [legit_combatant.Custom('IT_NAM_COL3')][legit_combatant.GetTitledFirstName] e [Select_CString(legit_combatant.IsFemale,'la sua','il suo')] compagno mi hanno sconfitto insieme a coloro che si sono levati per me, la mia causa infranta dinanzi a tutti coloro che ne sono stati testimoni.\n\nIl campo è soffocato dai cadaveri, e il prezzo della corona è scritto nel sangue e nell'acciaio. La corona passa ora a [legit_heir.Custom('IT_NAM_COL4')][legit_heir.GetTitledFirstName], la cui pretesa è stata dimostrata non dalle parole, ma da una vittoria strappata alla morte stessa. Ciò che fu sottratto è stato reclamato di nuovo sotto gli occhi del regno, e nessun lord può ormai fingere che questo giudizio fosse incerto."
 #Legit Heir Helper won - Usurper's Heir POV
  agot_trial_of_seven.0103.desc.legit_helper_won.usurper_died:0 "Il processo ha parlato e il verdetto è limpido. [legit_combatant.Custom('IT_NAM_COL3')][legit_combatant.GetTitledFirstName] e [Select_CString(legit_combatant.IsFemale,'la sua','il suo')] compagno hanno sconfitto [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] e coloro che si sono levati per [Select_CString(usurper.IsFemale,'lei','lui')], la [Select_CString(usurper.IsFemale,'sua','sua')] causa infranta dinanzi a tutti coloro che ne sono stati testimoni.\n\nIl campo è soffocato dai cadaveri, e il prezzo della corona è scritto nel sangue e nell'acciaio. La corona passa ora a [legit_heir.Custom('IT_NAM_COL4')][legit_heir.GetTitledFirstName], la cui pretesa è stata dimostrata non dalle parole, ma da una vittoria strappata alla morte stessa. Ciò che fu sottratto è stato reclamato di nuovo sotto gli occhi del regno, e nessun lord può ormai fingere che questo giudizio fosse incerto."
 #Legit Heir Helper won but Legit Heir died - Usurper POV
  agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died:0 "La sconfitta ha raggiunto me e i miei campioni con me, eppure nemmeno la vittoria porta chiarezza. [legit_heir.Custom('IT_NAM_COL3')][legit_heir.GetTitledFirstName] è morto, abbattuto prima che il giudizio potesse essere reclamato da colui che lo aveva cercato.\n\nIl campo giace silenzioso, senza offrire conforto ai vivi. Benché [legit_heir.GetTitledFirstNameNoTooltip] non sia vissuto abbastanza da vedere la corona tornare sul capo cui era destinata, il verdetto resta comunque saldo, suggellato nel sangue e nella perdita. La corona passa ora a [final_heir.Custom('IT_NAM_COL4')][final_heir.GetTitledFirstName], che eredita non soltanto un trono, ma anche il peso d'una giustizia pagata con vite umane."
 #Legit Heir Helper won but Legit Heir died - Usurper's Heir POV
  agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died.usurper_died:0 "Il campo ha reclamato tutto ciò che poteva. [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] giace morto insieme a coloro che si sono levati per [Select_CString(usurper.IsFemale,'lei','lui')], ma così pure [legit_heir.Custom('IT_NAM_COL3')][legit_heir.GetTitledFirstName], abbattuto prima che il giudizio potesse essere reclamato.\n\nIl silenzio che segue non offre alcuna risposta. Benché [legit_heir.GetTitledFirstNameNoTooltip] non sia vissuto abbastanza da vedere la corona restaurata sul capo destinato a portarla, il verdetto resta comunque saldo, suggellato nel sangue e nella perdita. La corona passa a [final_heir.Custom('IT_NAM_COL4')][final_heir.GetTitledFirstName], che eredita non soltanto un trono, ma anche il peso d'una giustizia pagata con vite umane."
 #Usurper won
  agot_trial_of_seven.0103.desc.usurper_won:0 "Gli accusatori sono infranti. [legit_combatant.Custom('IT_NAM_COL3')][legit_combatant.GetTitledFirstName] giace sconfitto sul campo, e con [Select_CString(legit_combatant.IsFemale,'lei','lui')] la [Select_CString(legit_combatant.IsFemale,'sua','sua')] causa è finita.\n\nLa terra stessa testimonia il prezzo della sfida. La corona resta dov'è, non scossa dal processo che avrebbe dovuto scalzarla. L'accusa ha ricevuto risposta nell'acciaio e al regno resta ben poca scelta se non accettare il dominio che ha resistito là dove altri non l'hanno fatto."
 #Legit Heir Helper won but no heir exists
  agot_trial_of_seven.0103.desc.legit_helper_won.no_heir:0 "Il processo assegna la vittoria a [legit_combatant.Custom('IT_NAM_COL4')][legit_combatant.GetTitledFirstName], ma [legit_heir.Custom('IT_NAM_COL3')][legit_heir.GetTitledFirstName] è morto, senza lasciare alcun erede che possa levarsi dalla carneficina e reclamare ciò che è stato vinto.\n\nIl campo non offre risposte, soltanto cadaveri e silenzio. Non essendovi più sangue che possa raccogliere il giudizio, la corona passa a me per necessità più che per trionfo. Il regno conserva il proprio sovrano, ma la giustizia un tempo reclamata è stata sepolta insieme ai morti."
 #Legit Heir is somehow already the king
  agot_trial_of_seven.0103.desc.legit_heir_won_after_all:0 "L'acciaio è stato sguainato e vite sono state spese, eppure la lotta si è conclusa senza la chiarezza che molti speravano. [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] giace morto sul campo, e con quella caduta la forma del conflitto è mutata più di quanto avrebbe potuto fare qualunque verdetto.\n\nIl Processo dei Sette non si chiude con il trionfo, ma col silenzio, e nel suo seguito [final_heir.Custom('IT_NAM_COL3')][final_heir.GetTitledFirstName] siede ora sul trono. Se davvero gli dèi abbiano giudicato la questione o si siano limitati a guardarla passare nelle mani di un altro, spetta al regno deciderlo."
 #Legit Heir is somehow already the king
  agot_trial_of_seven.0103.desc.legit_heir_won_after_all.legit_heir:0 "L'acciaio è stato sguainato e vite sono state spese, eppure la lotta si è conclusa senza la chiarezza che molti speravano. [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] giace morto sul campo, e con quella caduta la forma del conflitto è mutata più di quanto avrebbe potuto fare qualunque verdetto.\n\nIl Processo dei Sette non si chiude con il trionfo, ma col silenzio, e nel suo seguito siedo io sul trono. Se davvero gli dèi abbiano giudicato la questione o si siano limitati a guardarla passare nelle mani di un altro, spetta al regno deciderlo."
 #Legit Heir is somehow already the king
  agot_trial_of_seven.0103.desc.legit_heir_won_after_all.usurper:0 "L'acciaio è stato sguainato e vite sono state spese, eppure la lotta si è conclusa senza la chiarezza che molti speravano. [legit_heir.Custom('IT_NAM_COL3')][legit_heir.GetTitledFirstName] giace morto sul campo, e con quella caduta la forma del conflitto è mutata più di quanto avrebbe potuto fare qualunque verdetto.\n\nIl Processo dei Sette non si chiude con il trionfo, ma col silenzio, e nel suo seguito siedo io sul trono. Se davvero gli dèi abbiano giudicato la questione o si siano limitati a guardarla passare nelle mani di un altro, spetta al regno deciderlo."
 #Options
  agot_trial_of_seven.0103.a:0 "Spero che [final_heir.GetTitledFirstNameNoTooltip] governi con saggezza."
  agot_trial_of_seven.0103.b:0 "Vergogna."
  agot_trial_of_seven.0103.c:0 "Che il regno ricordi chi è ancora in piedi."
  agot_trial_of_seven.0103.d:0 "Tanto sangue, e per nulla."


 # ToS - Succession Crisis: Usurpation Scenario Outcome - POV: legit_heir or heir_of_the_legit_heir
  agot_trial_of_seven.0104.t:0 "Il Verdetto dei Sette"
 # Legit Heir won - Legit Heir POV
  agot_trial_of_seven.0104.desc.legit_won:0 "Il processo ha parlato e il verdetto viene portato da scudi infranti e terra inzuppata di sangue. [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] è stato sconfitto insieme a coloro che si sono levati per [Select_CString(usurper.IsFemale,'lei','lui')], e la pretesa che rubò la corona è stata smascherata dinanzi al regno.\n\nIl campo è soffocato dai cadaveri, e il prezzo della giustizia è scritto apertamente nell'acciaio e nella morte. Riprendo ciò che mi è stato tolto non per decreto o favore, ma per aver sopravvissuto là dove un altro non è riuscito. La corona torna al proprio giusto posto sotto gli occhi di lord e testimoni, e nessuno può ormai sostenere che il giudizio fosse incerto."
 # Legit Helper won - Legit Heir POV
  agot_trial_of_seven.0104.desc.legit_helper_won:0 "Io non mi trovavo sul campo, eppure il campo ha combattuto in mio nome. [legit_heir_helper.Custom('IT_NAM_COL3')][legit_heir_helper.GetTitledFirstName] e [Select_CString(legit_heir_helper.IsFemale,'i suoi','i suoi')] compagni hanno spezzato la causa dell'usurpatore in aperto combattimento, ponendo fine alla menzogna che pose una falsa corona sul capo d'un altro.\n\nIl campo reca il prezzo di quella verità nel sangue e nel silenzio. Ciò che mi è stato tolto mi viene comunque restituito, dimostrato non dalla mia stessa mano, ma da campioni che hanno sostenuto la mia causa quando io non potevo. Il regno ha il proprio giudizio e la corona torna a me come volevano la legge e il sangue.\n\nNon dimentico chi si è levato là dove io non potevo. [legit_heir_helper.GetTitledFirstNameNoTooltip] ha rischiato vita e nome perché la mia pretesa sopravvivesse, e il peso di quel debito mi seguirà sul trono. Il regno potrà vedere soltanto la corona restaurata, ma io so di chi fu il sangue che la comprò."
 # Legit Helper won, but Legit Heir died before claiming the crown - Legit Heir's Heir POV
  agot_trial_of_seven.0104.desc.legit_helper_won.legit_heir_died:0 "La vittoria è stata ottenuta sul campo, ma non è giunta in tempo. [legit_heir_helper.Custom('IT_NAM_COL3')][legit_heir_helper.GetTitledFirstName] ha infranto la causa dell'usurpatore dinanzi a tutti coloro che guardavano, eppure [legit_heir.Custom('IT_NAM_COL3')][legit_heir.GetTitledFirstName] non è vissuto abbastanza da vedere compiersi il giudizio.\n\nIl campo non offre conforto nel suo silenzio. Sebbene colui che subì il torto sia scomparso, il verdetto resta comunque saldo, suggellato nel sangue e nel sacrificio. La corona passa ora a me, non portata nel trionfo, ma nell'ombra d'una giustizia reclamata troppo tardi per salvare colui che essa doveva restaurare.\n\nEredito più d'un trono. [legit_heir_helper.GetTitledFirstNameNoTooltip] ha sostenuto la causa della mia famiglia quando il suo legittimo portatore non poteva farlo, e quel debito non muore con i caduti. Qualunque governo nasca da questo giorno ricorderà il coraggio di chi preservò la pretesa quando sangue e sorte minacciavano di porvi fine."
 # Usurper won - Legit Heir POV
  agot_trial_of_seven.0104.desc.usurper_won:0 "Il processo è finito e il campo ha dato la propria risposta senza misericordia. Coloro che si sono levati per sostenere la mia pretesa giacciono infranti e con loro cade l'accusa levata in mio nome.\n\nL'acciaio ha parlato là dove le parole hanno fallito. [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] resta sul trono e la mia sfida viene privata d'ogni fondamento dinanzi al regno. La corona non cambia mano e l'accusa che ha versato sangue su questo campo viene sepolta insieme ai morti."
  agot_trial_of_seven.0104.a:0 "La questione è risolta."


 # ToS - Succession Crisis: Usurpation Scenario Outcome - Observer POV
  agot_trial_of_seven.0105.t:0 "$agot_trial_of_seven.0104.t$"
 # final_heir won after all (somehow they ended up on the throne) - Observer POV
  agot_trial_of_seven.0105.desc.legit_heir_won_after_all:0 "Giungono nel regno notizie d'un Processo dei Sette convocato all'indomani d'un'usurpazione, un disperato appello alle armi volto a disfare la sottrazione di [main_title.GetNameNoTier]. Furono nominati campioni, l'acciaio venne sguainato e il sangue fu versato dinanzi a una folla in attesa.\n\nEppure, prima che il giudizio potesse davvero posarsi, intervenne la morte. [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName] è stato ucciso nella lotta, privando il processo del significato che avrebbe potuto avere. Con l'usurpatore morto, [main_title.GetNameNoTierNoTooltip] passa a [final_heir.Custom('IT_NAM_COL4')][final_heir.GetTitledFirstName] per il normale corso della successione piuttosto che per verdetto.\n\nIl campo resta greve di cadaveri e al regno non resta che la dura consapevolezza che il processo non cambiò nulla che la morte non avesse già deciso."
 # Legit Heir won - Observer POV
  agot_trial_of_seven.0105.desc.legit_won:0 "Dopo che [main_title.GetNameNoTier] fu preso da [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName], un Processo dei Sette venne convocato per rispondere al crimine dinanzi agli dèi e agli uomini. L'accusa trovò risposta nell'acciaio e il destino della corona venne posto su un campo intriso di sangue.\n\nOra il processo ha pronunciato il proprio giudizio. [legit_heir.Custom('IT_NAM_COL3')][legit_heir.GetTitledFirstName] si è levato tra gli accusatori ed è emerso vittorioso, spezzando la causa di [usurper.GetTitledFirstNamePossessiveNoTooltip] in aperto combattimento. [main_title.GetNameNoTierNoTooltip] viene restituito al suo legittimo possessore non per decreto o compromesso, ma per un trionfo di cui il regno intero è stato testimone.\n\nDalla corte alla campagna, del verdetto si parla ormai come d'una questione risolta, e il prezzo della corona viene misurato in vite più che in parole."
 # Legit Helper won - Observer POV
  agot_trial_of_seven.0105.desc.legit_helper_won:0 "All'indomani dell'usurpazione, la legittima pretesa su [main_title.GetNameNoTier] fu portata sul campo anziché nella sala del consiglio. Venne convocato un Processo dei Sette, chiamando campioni a rispondere al furto col sangue.\n\nOra il campo ha dato la propria risposta. [legit_combatant.Custom('IT_NAM_COL3')][legit_combatant.GetTitledFirstName] ha prevalso contro i campioni di [usurper.GetTitledFirstNamePossessive], spezzando la causa che deteneva la corona illecitamente. Benché [final_heir.Custom('IT_NAM_COL3')][final_heir.GetTitledFirstName] non si trovasse tra i combattenti, il giudizio pende in [Select_CString(final_heir.IsFemale,'suo','suo')] favore.\n\n[main_title.GetNameNoTierNoTooltip] cambia mano per decreto del processo e l'accusa che un tempo divise il regno riceve risposta sotto gli occhi di tutti coloro che accorsero a guardare."
 # Usurper won - Observer POV
  agot_trial_of_seven.0105.desc.usurper_won:0 "Dopo la presa di [main_title.GetNameNoTier], un Processo dei Sette venne convocato per contestare il diritto di [usurper.GetTitledFirstNamePossessive] a governare. [legit_combatant.GetTitledFirstNamePossessive] e gli accusatori nominarono i propri campioni e il regno si raccolse per vedere se l'acciaio avrebbe disfatto ciò che l'ambizione aveva preso.\n\nIl processo è terminato col fallimento di coloro che cercavano giudizio. I campioni levatisi contro la corona giacciono sconfitti e l'accusa avanzata in nome di [legit_heir.GetTitledFirstNamePossessive] viene abbattuta sul campo.\n\n[main_title.GetNameNoTierNoTooltip] resta nelle mani di [usurper.GetTitledFirstNameNoTooltip]. L'accusa viene privata d'ogni fondamento e al regno non resta che accettare il dominio che ha resistito quando fu messo alla prova dal sangue."
 # Legit Helper won, but no heir exists so victory changes nothing - Observer POV
  agot_trial_of_seven.0105.desc.legit_helper_won.no_heir:0 "Dopo che [main_title.GetNameNoTier] fu preso da [usurper.Custom('IT_NAM_COL3')][usurper.GetTitledFirstName], un Processo dei Sette venne convocato per restaurare ciò che era stato perduto. Campioni risposero all'accusa e il destino della corona venne posto sul campo.\n\nLa vittoria fu ottenuta in combattimento. [legit_combatant.Custom('IT_NAM_COL3')][legit_combatant.GetTitledFirstName] spezzò la causa di [usurper.GetTitledFirstNamePossessiveNoTooltip] dinanzi a testimoni provenienti da tutto il regno. Eppure il giudizio non trova alcuna mano pronta a riceverlo. [legit_heir.Custom('IT_NAM_COL3')][legit_heir.GetTitledFirstName] non è vissuto abbastanza da vedere il verdetto e non resta alcun erede che possa rispondere al decreto del processo.\n\nNon essendovi più alcun pretendente che possa trarre frutto dalla vittoria, [main_title.GetNameNoTierNoTooltip] resta nelle mani di [final_usurper.Custom('IT_NAM_COL2')][final_usurper.GetTitledFirstName]. Il processo viene ricordato non per ciò che restaurò, ma per le vite che divorò senza mutare la corona."
  agot_trial_of_seven.0105.a:0 "Così la questione è risolta."


 #####################################################
 ### TOS: Dishonorable Imprisonment INITIAL EVENTS ###
 #####################################################

  agot_trial_of_seven.0200.t:0 "Il Processo dinanzi al Regno"
  agot_trial_of_seven.0200.desc.defender.against_accuser:0 "Catene o no, reclamo il diritto al duello giudiziario, confidando che l'acciaio e l'onore possano ancora conquistarmi la libertà. Invece [accuser_ruler.Custom('IT_NAM_COL3')][accuser_ruler.GetTitledFirstName] mi nega quella via. Dinanzi tanto alla corte quanto alla corona, [accuser_ruler.GetSheHe] invoca qualcosa di ben più grande: un Processo dei Sette.\n\nSette campioni a levarsi per il [Select_CString(accuser_ruler.IsFemale,'suo','suo')] giudizio, sette per me. Ciò che avrebbe potuto essere deciso fra due lame verrà ora pesato sotto gli occhi degli dèi e del regno. Che sia giustizia o crudeltà, presto sarà il campo a deciderlo."
  agot_trial_of_seven.0200.desc.defender.against_accuser_kin:0 "Ho chiesto una sola lama e una giusta possibilità di rispondere all'accusa che grava su di me. Invece il parente di [accuser_ruler.GetTitledFirstNamePossessive], [accuser_candidate_kin.Custom('IT_NAM_COL3')][accuser_candidate_kin.GetTitledFirstName], si fa avanti e reclama un Processo dei Sette in nome della corona. Ciò che avrebbe dovuto essere il duello d'un cavaliere è divenuto uno spettacolo che l'intero regno osserverà.\n\nOra si devono trovare sette campioni che si levino al mio fianco, oppure la mia causa cadrà ancor prima che sia vibrato il primo colpo. Sarà l'acciaio a giudicare ciò che orgoglio e rango hanno contorto oltre le parole."
  agot_trial_of_seven.0200.desc.accuser:0 "[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstName], trattenuto nella mia custodia, reclama il duello giudiziario per rispondere alle accuse mosse contro [Select_CString(defender_leader.IsFemale,'di lei','di lui')]. Un singolo duello porrebbe fine alla questione con rapidità, ma non sempre con nettezza.\n\nTaluni a corte sussurrano che una disputa che tocca la corona meriti un peso maggiore di quello che una sola lama possa offrire. Potrei concedere il duello che [defender_leader.GetSheHe] chiede... oppure negarglielo e invocare invece un Processo dei Sette."
  agot_trial_of_seven.0200.desc.accuser_kin.start:0 "[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstName], mio prigioniero, reclama il duello giudiziario, cercando di dirimere la questione con una sola lama. Ero quasi disposto a concederglielo, quando [accuser_candidate_kin.Custom('IT_NAM_COL3')][accuser_candidate_kin.GetTitledFirstName] si fa avanti dinanzi alla corte, dichiarando che una simile disputa richiede qualcosa di più d'un semplice duello."
  agot_trial_of_seven.0200.desc.accuser_kin.end:0 "[accuser_candidate_kin.GetSheHe] reclama invece un Processo dei Sette, insistendo affinché sette campioni si levino per la corona e sette contro di essa. La corte osserva ora in attesa di vedere se permetterò al mio parente di portare avanti la questione... o se la prenderò io stesso in mano."
  agot_trial_of_seven.0200.desc.accuser_kin.end.from_tbc:0 "[accuser_candidate_kin.GetSheHe] reclama un Processo dei Sette, insistendo affinché sette campioni si levino per la corona e sette contro di essa. La corte osserva ora in attesa di vedere se permetterò al mio parente di portare avanti la questione... o se la prenderò io stesso in mano."

  agot_trial_of_seven.0200.desc.accuser.from_tbc:0 "[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstName], trattenuto nella mia custodia, reclama il duello giudiziario per rispondere alle accuse mosse contro [Select_CString(defender_leader.IsFemale,'di lei','di lui')]. Un singolo duello porrebbe fine alla questione con rapidità, ma non sempre con nettezza.\n\nTaluni a corte sussurrano che una disputa che tocca la corona meriti un peso maggiore di quello che una sola lama possa offrire. Il loro consiglio è stato ascoltato. In luogo d'un singolo duello, la questione sarà decisa da un Processo dei Sette dinanzi agli dèi e al regno."
  agot_trial_of_seven.0200.desc.accuser_kin.start.from_tbc:0 "[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstName], mio prigioniero, reclama il duello giudiziario, cercando di dirimere la questione con una sola lama. Sto proprio per dichiarare che la questione sarà decisa da un Processo dei Sette, quando [accuser_candidate_kin.Custom('IT_NAM_COL3')][accuser_candidate_kin.GetTitledFirstName] si fa avanti dinanzi alla corte, parlando prima che io possa farlo."

  agot_trial_of_seven.0200.a:0 "Molto bene, sia [accuser_candidate_kin.GetFirstNameNoTooltip] a sostenere il Processo dei Sette."
  agot_trial_of_seven.0200.b:0 "Questa questione spetta a me deciderla. Reclamo un Processo dei Sette."
  agot_trial_of_seven.0200.c:0 "Concedo a [defender_leader.Custom('IT_NAM_COL4')][defender_leader.GetTitledFirstNameNoTooltip] il duello giudiziario."
  agot_trial_of_seven.0200.d:0 "Allora mi leverò con sette."
  agot_trial_of_seven.0200.a.tt:0 "Questa scelta darà inizio a un Processo dei Sette invece che a un duello giudiziario."
  agot_trial_of_seven.0200.a.tt.from_tbc:0 "Il Processo dei Sette ha inizio."
  agot_trial_by_combat.1000.f:0 "Reclamo un Processo dei Sette."
  agot_trial_of_seven.0200.b.from_tbc:0 "Allora che siano convocati i campioni"
  agot_trial_of_seven.0200.b.generic:0 "$agot_trial_by_combat.1000.f$"

 #Accuser CusLocs
 #plotting_against_me_opinion, schemed_against_me, scheming_against_me, fabricate_hook_threatened_me
  accuser_kin_plotting:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] trama contro di me nell'ombra. Reclamerò giudizio alla luce del sole."\n\n"
 #abducted_me_opinion, abducted_me_crime, attempted_abduct_me_crime
  accuser_kin_abduction:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] vorrebbe trascinarmi via come un ladro nella notte. Che il regno veda come si risponde a questo."\n\n"
 #attempted_murder_me_crime, tried_to_poison_me_opinion
  accuser_kin_murder:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] ha tentato di farmi morire in segreto. Se la morte dev'essere rischiata, che lo sia sotto gli occhi degli dèi."\n\n"
 #tortured_me, wounded_me, tutored_me_opinion
  accuser_kin_torture:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] mi ha fatt[Select_CString(accuser_candidate_kin.IsFemale,'a','o')] soffrire per diletto. Non permetterò che ciò si concluda con una sola lama."\n\n"
 #maimed_me, disfigured_me, blinded_me, castrated_me
  accuser_kin_maimed:0 "\n\n"Guardate ciò che [defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] mi ha fatto. Che siano sette lame a parlare per ciò che le parole non possono."\n\n"
 #stole_artifact_from_me, fp3_stole_from_me
  accuser_kin_stole:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] ha rubato ciò che mi spettava di diritto. Non mi lascerò placare con delle scuse."\n\n"
 #fp3_sabotaged_me, betrayed_me_opinion
  accuser_kin_sabotage:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] si è rivoltato contro di me quando più contava. Che siano gli dèi a misurare tale tradimento."\n\n"
 #fp3_denounced_me, slandered_me_opinion, shamed_me_opinion, ruined_me_opinion, blamed_me_unjustly, rival_insult_opinion
  accuser_kin_slander:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] ha trascinato il mio nome nel fango. Avrò un verdetto che il regno non potrà ignorare."\n\n"
 #imprisoned_me, imprisoned_me_dungeon, imprisoned_me_past
  accuser_kin_imprison:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] mi ha mess[Select_CString(accuser_candidate_kin.IsFemale,'a','o')] in catene. Se dev'essere pronunciato un giudizio, allora sarà pronunciato come si conviene."\n\n"
 #banished_me
  accuser_kin_banished:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] mi ha scacciat[Select_CString(accuser_candidate_kin.IsFemale,'a','o')] dal mio posto come se non fossi nulla. Che ciò riceva risposta dinanzi a tutti."\n\n"
 #challenged_authority_opinion, usurped_title, deposed_me_opinion
  accuser_kin_deposed:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] vorrebbe abbattere il giusto ordine. Che siano sette campioni a difenderlo."\n\n"
 #killed_my_child
  accuser_kin_child_kill:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] mi ha portato via mio figlio. Non permetterò che questo venga deciso in silenzio."\n\n"
 #mw_wanted_to_execute_me, mw_evaded_execution
  accuser_kin_execute:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] ha fatto della giustizia una farsa. Che siano gli dèi a decidere ciò che la legge non ha potuto."\n\n"
 #muted_me
  accuser_kin_mute:0 "\n\n[accuser_candidate_kin.Custom('IT_NAM_COL3')][accuser_candidate_kin.GetTitledFirstNameNoTooltip] abbatte il pugno sul tavolo e scrive in fretta, su un pezzo di pergamena, la richiesta d'un Processo dei Sette.\n\n"
 #tried_to_eat_me_opinion
  accuser_kin_tried_to_aith_me:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] tentò una volta di divorarmi. Preferirei che siano gli dèi a decidere se ciò fosse opportuno."\n\n"
 #agot_tried_to_sacrifice_me
  accuser_kin_sacrifice:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] vorrebbe versare il mio sangue per oscuri riti. Che i Sette rispondano a questo."\n\n"
 #tournament_savagely_beaten_opinion
  accuser_kin_beaten:0 "\n\n"[defender_leader.Custom('IT_NAM_COL3')][defender_leader.GetTitledFirstNameNoTooltip] mi ha picchiat[Select_CString(accuser_candidate_kin.IsFemale,'a','o')] senza misericordia una volta. Oggi non concederò a [Select_CString(defender_leader.IsFemale,'lei','lui')] una facile risposta."\n\n"
 #insane
  accuser_kin_insane:0 "\n\n"Una lama non basta! Sette! Sette compiaceranno gli dèi!"\n\n"

