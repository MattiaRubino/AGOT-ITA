 ### TOS: Dishonorable Imprisonment OUTCOMES ###
 ###############################################

  agot_trial_of_seven.0201.t:0 "Dove Sette Caddero"
 #CROWN POV
  agot_trial_of_seven.0201.desc.defender_won_default.accuser_pov:0 "È compiuto. Il Processo dei Sette ha parlato contro di me e il campo ha risposto a ciò che cercavo di negare. I miei campioni giacciono infranti o sconfitti e [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] si leva rivendicat[Select_CString(tos_final_accused.IsFemale,'a','o')] dinanzi agli dèi e al regno.\n\nUna vittoria simile non può essere nascosta dietro porte chiuse. I lord ricorderanno chi ha prevalso e la gente comune ripeterà il racconto finché non diverrà verità. Qualunque giudizio intendessi imporre a [Select_CString(tos_final_accused.IsFemale,'lei','lui')], esso è tornato a gravare su di me."
  agot_trial_of_seven.0201.desc.defender_won_accuser_died.accuser_pov:0 "Il Processo dei Sette si è concluso nel sangue e nella rovina, e a me non resta che fissarne il prezzo. La causa di [tos_final_accuser.GetTitledFirstNamePossessive] è caduta sul campo, e [tos_final_accuser.GetSheHe] non si è più rialzat[Select_CString(tos_final_accuser.IsFemale,'a','o')]. [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] si leva vincitor[Select_CString(tos_final_accused.IsFemale,'a','e')], e il regno ne è stato testimone.\n\nOra la corte volge gli occhi dal campo verso ciò che seguirà. Per acciaio e per volontà dei Sette, [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] si leva rivendicat[Select_CString(tos_final_accused.IsFemale,'a','o')]. Qualunque accusa sia stata mossa contro [Select_CString(tos_final_accused.IsFemale,'di lei','di lui')], il regno ha veduto il giudizio degli dèi farsi chiaro."
  agot_trial_of_seven.0201.desc.accuser_won_defeault.accuser_pov:0 "Il Processo dei Sette è finito e gli dèi hanno favorito la mia causa. I miei campioni hanno tenuto il campo e a [tos_final_accused.Custom('IT_NAM_COL4')][tos_final_accused.GetTitledFirstName] è toccata la sconfitta invece della libertà che [tos_final_accused.GetSheHe] reclamava.\n\nEppure persino la vittoria ha il suo prezzo. Sette lame sono state radunate e molti non faranno ritorno come vennero. Tuttavia il regno ha visto il giudizio compiersi alla luce del sole, e quella visione è un'arma affilata quanto qualunque spada."
  agot_trial_of_seven.0201.desc.accuser_won_defender_died.accuser_pov:0 "Il Processo dei Sette è terminato e [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] non pronuncerà mai più parola alcuna in sfida. Il campo ha reclamato [Select_CString(tos_final_accused.IsFemale,'lei','lui')] come sua dovuta preda e i miei campioni erano ancora in piedi quando caddero gli ultimi colpi.\n\nAlcuni la chiameranno giustizia, altri semplice potere sotto la maschera della legge. Che sussurrino pure. Il regno ha visto gli dèi decidere e i morti non discutono i verdetti."
 #DEFENDER POV
  agot_trial_of_seven.0201.desc.defender_won_default.defender_pov:0 "Il Processo dei Sette è compiuto e io ancora respiro. Contro il peso della corona e del giudizio, i miei campioni hanno resistito e il campo ha dato la sua risposta. Dinanzi agli dèi e al regno, la mia causa si è mostrata più forte delle catene che mi avrebbero dovuto trattenere.\n\nMa la vittoria non è mai pura. La terra è macchiata del suo prezzo e le urla dei morenti durano più d'ogni acclamazione. Eppure... sono libero dal loro verdetto e il regno lo ha visto."
  agot_trial_of_seven.0201.desc.defender_won_accuser_died.defender_pov:0 "Il Processo dei Sette è terminato e gli dèi hanno risposto con una voce che nessuno può fraintendere. I miei campioni hanno tenuto il campo e [tos_final_accuser.Custom('IT_NAM_COL3')][tos_final_accuser.GetTitledFirstName] è cadut[Select_CString(tos_final_accuser.IsFemale,'a','o')] nella calca dell'acciaio. Il giudizio della corona è morto con [Select_CString(tos_final_accuser.IsFemale,'lei','lui')].\n\nIl campo ora giace quieto, mentre il suo giudizio già passa nella legge e nella memoria. Per volontà degli dèi e per la forza dei miei campioni, io mi levo mondato d'ogni accusa. Qualunque cosa sia stata detta contro di me ha ricevuto risposta nell'acciaio e nessuno può negare il verdetto che è stato vinto."
  agot_trial_of_seven.0201.desc.accuser_won_defeault.defender_pov:0 "È finita. Il Processo dei Sette si è volto contro di me e i miei campioni non hanno saputo tenere il campo. Gli dèi non mi hanno concesso la risposta che reclamavo, oppure l'hanno concessa all'altra parte.\n\nQualunque possibilità io avessi di spezzare queste catene per diritto è stata spesa nel sangue. Ora devo affrontare ciò che segue a un processo perduto: un regno che crede al verdetto e un vincitore che non dimenticherà che fui io a imporre la questione."
  agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_pov:0 "Il Processo dei Sette è finito e con esso la vita che un tempo si poneva tra me e la corona. [tos_final_accuser.Custom('IT_NAM_COL3')][tos_final_accuser.GetTitledFirstName] è cadut[Select_CString(tos_final_accuser.IsFemale,'a','o')] sul campo e il peso del dominio passa a me non per quieta successione, ma attraverso sangue e giudizio.\n\nNon sono giunt[Select_CString(ROOT.Char.IsFemale,'a','o')] sul campo cercando un trono, ma soltanto giustizia, eppure l'acciaio ha posto entrambe queste cose nelle mie mani. Gli dèi hanno parlato sotto gli occhi di tutti e io mi levo dal processo non soltanto rivendicat[Select_CString(ROOT.Char.IsFemale,'a','o')], ma coronat[Select_CString(ROOT.Char.IsFemale,'a','o')] proprio dal verdetto che avrebbe dovuto spezzarmi."
 #OBSERVER POV
  agot_trial_of_seven.0201.desc.defender_won_default.observer_pov:0 "Il Processo dei Sette è terminato e il vincitore si mostra chiaramente a tutti. [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] ha prevalso, coi campioni ancora in piedi là dove le lame di [tos_final_accuser.GetTitledFirstNamePossessive] sono venute meno.\n\nIl regno ne parlerà per anni. Tali processi sono rari, e più rari ancora quando il loro esito tocca insieme potere e punizione. Ciò che era la richiesta d'un prigioniero è divenuto un giudizio cui tutti hanno assistito, e nessuno presto lo dimenticherà."
  agot_trial_of_seven.0201.desc.defender_won_accuser_died.observer_pov:0 "Il Processo dei Sette si è concluso con un verdetto scritto nei cadaveri. [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] ha vinto e [tos_final_accuser.Custom('IT_NAM_COL3')][tos_final_accuser.GetTitledFirstName] giace morto sul campo accanto ai campioni caduti.\n\nCon [tos_final_accuser.GetTitledFirstNameNoTooltip] cadut[Select_CString(tos_final_accuser.IsFemale,'a','o')], il processo lascia ben poco spazio al dubbio. Dinanzi agli dèi e agli uomini, [tos_final_accused.GetTitledFirstNameNoTooltip] si leva rivendicat[Select_CString(tos_final_accused.IsFemale,'a','o')], e le accuse mosse contro [Select_CString(tos_final_accused.IsFemale,'di lei','di lui')] hanno ricevuto risposta alla luce del sole. Ciò che un tempo era conteso con parole è ora stato deciso con l'acciaio."
  agot_trial_of_seven.0201.desc.accuser_won_defeault.observer_pov:0 "Il Processo dei Sette è compiuto e la parte di [tos_final_accuser.GetTitledFirstNamePossessive] ha preso il campo. [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] è stat[Select_CString(tos_final_accused.IsFemale,'a','o')] sconfitto e il verdetto già si diffonde dal fuoco del campo alle corti come fosse vangelo.\n\nAlcuni la chiamano giustizia, altri inevitabilità. In ogni caso, il regno ha visto sette lame decidere ciò che le parole non potevano. Il verdetto è stato vinto con l'acciaio e il regno lo ha veduto."
  agot_trial_of_seven.0201.desc.accuser_won_defender_died.observer_pov:0 "Il Processo dei Sette si è concluso con [tos_final_accused.Custom('IT_NAM_COL3')][tos_final_accused.GetTitledFirstName] mort[Select_CString(tos_final_accused.IsFemale,'a','o')] sul campo. I campioni di [tos_final_accuser.GetTitledFirstNamePossessive] sono rimasti in piedi e la causa del prigioniero è morta con [Select_CString(tos_final_accused.IsFemale,'lei','lui')].\n\nVi saranno coloro che sosterranno che gli dèi abbiano parlato con chiarezza e altri che insisteranno che gli dèi siano stati soltanto costretti a guardare. In ogni caso, una vita è stata pagata per il diritto di porre la domanda e il regno ne ricorderà il prezzo."
  agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_observer_pov:0 "Il Processo dei Sette si è concluso con una vittoria che nessun bardo avrebbe saputo cantare senza sembrare crudele. [tos_final_accuser.Custom('IT_NAM_COL3')][tos_final_accuser.GetTitledFirstName] giace mort[Select_CString(tos_final_accuser.IsFemale,'a','o')] sul campo e colui che un tempo era chiamato prigioniero ora si leva come legittimo sovrano dinanzi agli dèi e agli uomini.\n\nCiò che cominciò come una richiesta di giudizio è divenuto il passaggio stesso della corona. L'acciaio ha risposto insieme all'accusa e alla successione e tutti coloro che guardarono sanno che questo trono non fu preso nel silenzio, ma vinto sotto lo sguardo dei Sette."
  agot_trial_of_seven.0201.a:0 "Così hanno giudicato gli dèi."


 #################################################
 ### TOS: Dishonorable Imprisonment PRE-EVENTS ###
 #################################################

 # ToS: Imprisoned.. Friend Visits
  agot_trial_of_seven.0202.t:0 "Un Visitatore nell'Oscurità"
  agot_trial_of_seven.0202.desc:0 "Le ore trascorrono lente fra queste mura, spezzate soltanto da passi lontani e dal gocciolare d'acque invisibili. Quando infine la porta si apre, mi aspetto un'altra guardia... non un volto familiare.\n\n[tos_friend.Custom('IT_NAM_COL3')][tos_friend.GetTitledFirstName] entra nella luce fioca e per un istante non so se sorridere o maledire quella vista. [Select_CString(tos_friend.IsFemale,'Lei','Lui')] porta il nome della stessa casata che mi tiene qui, eppure nei [Select_CString(tos_friend.IsFemale,'suoi occhi','suoi occhi')] non v'è il medesimo ferro. Parliamo a bassa voce, guardinghi per orecchie indiscrete, finché alla fine [tos_friend.GetSheHe] promette di parlare in mio favore con [tos_imprisoner.Custom('IT_NAM_COL4')][tos_imprisoner.GetTitledFirstName].\n\nÈ forse una piccola cosa, soltanto parole portate da una sala all'altra, eppure anche una piccola promessa ha un altro peso quando non ne si ha alcuna."
  agot_trial_of_seven.0202.a:0 "Mi aggrapperò a quella speranza."
  agot_trial_of_seven.0202.b:0 "Non ho bisogno dei favori della tua casata."

 # ToS: Imprisoned.. I can demand TbC
  agot_trial_of_seven.0203.t:0 "Dinanzi alla Corona"
  agot_trial_of_seven.0203.desc:0 "Una guardia viene per me. Mi aspetto un altro interrogatorio. Invece vengo condotto in una piccola camera dove mi attende [Select_CString(tos_friend.IsFemale,'la mia','il mio')] [SCOPE.sC('tos_prisoner').Custom2('RelationToMeShort', SCOPE.sC('tos_friend'))], [tos_friend.Custom('IT_NAM_COL3')][tos_friend.GetTitledFirstName]. [Select_CString(tos_friend.IsFemale,'Lei','Lui')] non perde tempo in convenevoli. Se intendo lasciare queste mura con l'onore intatto, mi dice, devo essere pronto a combattere per esso.\n\nUn duello giudiziario potrebbe essere la mia unica via innanzi. L'acciaio, non le parole, potrebbe essere il solo linguaggio che [tos_imprisoner.Custom('IT_NAM_COL3')][tos_imprisoner.GetTitledFirstName] rispetterà. Ben presto la guardia ci conduce oltre, in una sala più ampia, dove [tos_imprisoner.GetTitledFirstNameNoTooltip] e i cortigiani radunati attendono la mia risposta. Tutti gli occhi si volgono verso di me, in attesa d'udire ciò che reclamerò... se reclamerò qualcosa."
  agot_trial_of_seven.0203.a:0 "Reclamo il duello giudiziario."
  agot_trial_of_seven.0203.b:0 "Non trasformerò ciò in uno spettacolo."
  agot_trial_of_seven.0203.b.tt:0 "Vieni ricondotto alle segrete."

 # ToS: Imprisoned.. King considers the release of the prisoner
  agot_trial_of_seven.0204.t:0 "Una Questione di Misericordia"
  agot_trial_of_seven.0204.desc:0 "[tos_friend.Custom('IT_NAM_COL3')][tos_friend.GetTitledFirstName] si presenta al mio cospetto con una richiesta tanto audace quanto scomoda. Con parole attente e tono misurato, [tos_friend.GetSheHe] mi chiede di rilasciare [tos_prisoner.Custom('IT_NAM_COL4')][tos_prisoner.GetTitledFirstName] dalla mia custodia.\n\n[tos_friend.GetSheHe|U] sostiene che la questione abbia già imposto il suo tributo e che la misericordia, ora, eviterebbe ulteriori guai. Eppure le catene d'un prigioniero di rado vengono spezzate senza motivo e la corte osserva con attenzione per vedere come risponderò."
  agot_trial_of_seven.0204.a:0 "Molto bene. Lasciat[Select_CString(tos_prisoner.IsFemale,'ela','elo')] andare."
  agot_trial_of_seven.0204.b:0 "La libertà ha un prezzo. Pagatelo."
  agot_trial_of_seven.0204.c:0 "No. [tos_prisoner.GetSheHe|U] resterà dove [tos_prisoner.GetSheHe] appartiene."
  agot_trial_of_seven.0204.d:0 "Rilasciate [tos_prisoner.GetTitledFirstNameNoTooltip]... e mandat[Select_CString(tos_prisoner.IsFemale,'ela','elo')] alla Bariera."

 # ToS: Imprisoned.. Prisoner informed
  agot_trial_of_seven.0205.t:0 "Un Messaggio da [tos_imprisoner.Custom('GetQueenKing')|U]"
  agot_trial_of_seven.0205.desc.ok:0 "La porta si apre ancora una volta e [tos_friend.Custom('IT_NAM_COL3')][tos_friend.GetTitledFirstName] ritorna. Questa volta, la sua espressione reca un sommesso sollievo.\n\n[tos_friend.GetSheHe|U] mi dice che [tos_imprisoner.Custom('IT_NAM_COL3')][tos_imprisoner.GetTitledFirstName] ha acconsentito a rilasciarmi. Le catene che mi tenevano qui verranno presto spezzate e la strada oltre queste mura tornerà a essere mia."
  agot_trial_of_seven.0205.desc.gold:0 "Quando la porta si apre, [tos_friend.Custom('IT_NAM_COL3')][tos_friend.GetTitledFirstName] attende oltre la soglia, ma l'espressione sul suo volto non è proprio quella che avevo sperato.\n\n[tos_imprisoner.Custom('IT_NAM_COL3')][tos_imprisoner.GetTitledFirstName] mi concederà la libertà, ma soltanto a un prezzo. Dell'oro dovrà passare di mano prima che queste catene vengano rimosse."
  agot_trial_of_seven.0205.desc.no:0 "[tos_friend.Custom('IT_NAM_COL3')][tos_friend.GetTitledFirstName] ritorna alla mia cella, ma le notizie che reca non sono quelle che speravo d'udire.\n\n[tos_imprisoner.Custom('IT_NAM_COL3')][tos_imprisoner.GetTitledFirstName] ha respinto la richiesta. Le mie catene restano e qualunque speranza nutrissi di lasciare queste mura mi è stata negata."
  agot_trial_of_seven.0205.desc.nw:0 "Quando la porta si apre di nuovo, [tos_friend.Custom('IT_NAM_COL3')][tos_friend.GetTitledFirstName] mi attende, ma il peso nei suoi occhi mi dice che questa non è una semplice visita.\n\n[tos_imprisoner.Custom('IT_NAM_COL3')][tos_imprisoner.GetTitledFirstName] ha accettato di rilasciarmi... ma non nella libertà. Sarò mandato alla Bariera, dove prenderò il nero e trascorrerò il resto dei miei giorni al servizio dei Guardiani della Notte."
  agot_trial_of_seven.0205.a:0 "Molto bene. Accetto."
  agot_trial_of_seven.0205.b:0 "Questa non è giustizia."
  agot_trial_of_seven.0205.b.nw:0 "Questa non è giustizia. Reclamo una Singolar Tenzone."
  agot_trial_of_seven.0205.c:0 "Così sia."

 ##########################
 ### TOS TEAM SELECTION ###
 ##########################

 # ToS: Selecting Champions
  agot_trial_of_seven.1000.t:0 "Campioni dei Sette"
  agot_trial_of_seven.1000.desc:0 "Il Processo dei Sette è vicino. Devo nominare coloro che si leveranno per la mia causa quando le spade verranno sguainate.\n\nSe non riuscirò a radunare sei uomini che si levino con me, il giudizio verrà pronunciato senza alcun colpo e la colpa ricadrà sul mio nome.\n\nDiversi cavalieri hanno già offerto le loro spade. Devo decidere chi tra loro prenderà il campo al mio fianco."
  agot_trial_of_seven.1000.desc.lost_before_started:0 "Il silenzio si prolunga, ininterrotto. Nessun altro campione si fa avanti per levarsi con me e, senza sette a rispondere all'accusa, il processo non può essere combattuto.\n\nPer legge e consuetudine, l'accusa resta senza risposta e io vengo giudicato colpevole."
 # desc variations
  agot_trial_of_seven.1000.desc.sellsword:0 "Il silenzio si prolunga più di quanto vorrei. Alla fine, un guerriero dallo sguardo duro si fa avanti dalla folla, fermandosi solo quando la mia offerta d'oro viene resa chiara.\n\nL'acciaio ha molte lealtà e oggi l'oro basta a vincolare una lama alla mia causa."
  agot_trial_of_seven.1000.desc.helper_knight.a:0 "Il silenzio indugia, greve e ininterrotto. Infine, [helper_knight.Custom('IT_NAM_COL3')][helper_knight.GetTitledFirstName] si fa avanti, distinguendosi dalla folla e offrendo la sua spada alla mia causa."
  agot_trial_of_seven.1000.desc.helper_knight.b:0 "Nessuno si muove dapprima. Poi [helper_knight.Custom('IT_NAM_COL3')][helper_knight.GetTitledFirstName] lascia la folla alle spalle, avanzando allo scoperto e dichiarando la sua volontà di levarsi per me."
  agot_trial_of_seven.1000.desc.helper_knight.c:0 "L'istante si prolunga nel silenzio, finché [helper_knight.Custom('IT_NAM_COL3')][helper_knight.GetTitledFirstName] non lo spezza, avanzando per porre la sua spada al mio fianco."
  agot_trial_of_seven.1000.desc.helper_knight.d:0 "Tutti gli occhi restano fissi sulla folla finché [helper_knight.Custom('IT_NAM_COL3')][helper_knight.GetTitledFirstName] non si fa avanti da sol[Select_CString(helper_knight.IsFemale,'a','o')], ponendo fine al silenzio e consacrando la sua lama alla mia causa."
  agot_trial_of_seven.1000.desc.helper_knight.e:0 "Per un lungo istante, nessuno si muove. Poi una sola figura, [helper_knight.Custom('IT_NAM_COL3')][helper_knight.GetTitledFirstName], si fa avanti dalla folla, spezzando il silenzio e offrendo la sua spada alla mia causa."
  agot_trial_of_seven.1000.desc.helper_squire:0 "Il silenzio minaccia d'inghiottire interamente l'istante, finché un giovane scudiero, [helper_knight.Custom('IT_NAM_COL3')][helper_knight.GetTitledFirstName], non si fa avanti dal margine della folla. Vi è esitazione nella sua voce, ma non paura.\n\nPiegando un ginocchio dinanzi a me, [helper_knight.GetSheHe] china il capo e parla con voce chiara perché tutti odano.\n\n#EMP "[the_other_leader.GetTitledFirstNameNoTooltip], nominami cavaliere... e mi leverò con te."#S"
 # situational option texts
  agot_trial_of_seven.1000.a:0 "Un'ottima scelta."
  agot_trial_of_seven.1000.a.buy:0 "L'oro parla più forte del silenzio."
  agot_trial_of_seven.1000.a.tt:0 "Il campione da te scelto combatterà al tuo fianco.\n"
  agot_trial_of_seven.1000.a.lost_before_started:0 "Il mio destino è segnato."
  agot_trial_of_seven.1000.a.need_new_char:0 "Chi si leverà a combattere con me?"
  agot_trial_of_seven.1000.a.squire_approved:0 "Alzati, Ser [helper_knight.GetFirstNameNoTooltip]. Levati con me."
  agot_trial_of_seven.1000.a.squire_approved.tt:0 "#EMP In nome del Guerriero ti ordino d'essere coraggioso. In nome del Padre ti ordino d'essere giusto. In nome della Madre ti ordino di difendere i giovani e gli innocenti. In nome della Fanciulla ti ordino di proteggere tutte le donne.\n#S"
  agot_trial_of_seven.1000.b.squire_denied:0 "Non dovrei."
  agot_trial_of_seven.1000.b.squire_denied.tt:0 "Senza un numero sufficiente di campioni, il Processo dei Sette non potrà avere inizio e verrai giudicato colpevole."


 # ToS: Trial of Seven Starts
  agot_trial_of_seven.1001.t:0 "Sette Contro Sette"
  agot_trial_of_seven.1001.t.accusers:0 "$agot_trial_of_seven.1002.t$: [accuser_leader.GetTitledFirstNameNoTooltip] e gli Accusatori"
  agot_trial_of_seven.1001.t.defenders:0 "$agot_trial_of_seven.1002.t$: [defender_leader.GetTitledFirstNameNoTooltip] e i suoi Campioni"
  agot_trial_of_seven.1001.desc:0 "Dinanzi agli occhi del regno, l'antico Processo dei Sette viene infine invocato. Nessuna parola di lord né decreto di re potrà ormai porre fine a questa contesa, ma soltanto sette lame levate per ciascuna causa e il giudizio che gli dèi concederanno attraverso l'acciaio e il sangue. Accusatore e accusato stanno l'uno contro l'altro, i loro destini vincolati insieme tanto saldamente quanto i campioni che combattono nei loro nomi. Che il campo ne sia testimone, e quando l'ultima spada cadrà in silenzio, gli dèi decideranno chi stava dalla verità e chi dal peccato.\n\n#EMP [oth_1.Custom('IT_NAM_COL3')][oth_1.GetTitledFirstName] si leva con [oth_5.Custom('IT_NAM_COL4')][oth_5.GetTitledFirstName], [oth_4.Custom('IT_NAM_COL4')][oth_4.GetTitledFirstName], [oth_2.Custom('IT_NAM_COL4')][oth_2.GetTitledFirstName], [oth_3.Custom('IT_NAM_COL4')][oth_3.GetTitledFirstName], [oth_6.Custom('IT_NAM_COL4')][oth_6.GetTitledFirstName] e [oth_7.Custom('IT_NAM_COL4')][oth_7.GetTitledFirstName].\n\nDi fronte a loro si leva [roy_1.Custom('IT_NAM_COL3')][roy_1.GetTitledFirstName], affiancat[Select_CString(roy_1.IsFemale,'a','o')] da [roy_5.Custom('IT_NAM_COL5')][roy_5.GetTitledFirstName], [roy_4.Custom('IT_NAM_COL5')][roy_4.GetFirstName], [roy_2.Custom('IT_NAM_COL5')][roy_2.GetTitledFirstName], [roy_3.Custom('IT_NAM_COL5')][roy_3.GetTitledFirstName], [roy_6.Custom('IT_NAM_COL5')][roy_6.GetTitledFirstName] e [roy_7.Custom('IT_NAM_COL5')][roy_7.GetTitledFirstName].#S"
  agot_trial_of_seven.1001.a:0 "Così giudicheranno gli dèi."
  agot_trial_of_seven.1001.a.second:0 "Che il Processo dei Sette abbia inizio."


 # ToS - Succession Crisis: Event about Tos - Player can observe
  agot_trial_of_seven.1002.t:0 "Un Processo dei Sette"
  agot_trial_of_seven.1002.desc.usurpation:0 "La notizia si diffonde in fretta tanto per le corti quanto per i campi. Un Processo dei Sette è stato invocato, poiché [the_other_leader.Custom('IT_NAM_COL3')][the_other_leader.GetTitledFirstName] definisce apertamente l'ascesa di [the_royal_leader.GetTitledFirstNamePossessive] un'usurpazione e reclama giudizio dinanzi agli dèi e agli uomini.\n\nTali processi sono rari, e più rari ancora quando corona e pretesa si trovano l'una contro l'altra. I lord sussurrano di campioni che già si radunano, ciascuna lama giurata a dimostrare quale sovrano stia dalla verità e quale dal peccato. Presto, l'acciaio deciderà ciò che nessun consiglio avrebbe potuto dirimere."
  agot_trial_of_seven.1002.desc.imprisonment:0 "La notizia corre rapida: ciò che ebbe inizio come una richiesta di Singolar Tenzone è cresciuto sino a divenire qualcosa di ben più grande. Dopo che [the_other_leader.Custom('IT_NAM_COL3')][the_other_leader.GetTitledFirstName] reclamò il duello singolo per rispondere al giudizio di [the_royal_leader.GetTitledFirstNamePossessive], la corona rifiutò e proclamò invece un Processo dei Sette.\n\nMolti lo chiamano un gesto audace, altri crudele, poiché tali processi trasformano le contese in spettacoli che l'intero regno non può ignorare. Campioni si radunano ora da vicino e da lontano e, tra non molto, sette lame contro sette decideranno un destino che le sole parole non avrebbero potuto sciogliere."
  agot_trial_of_seven.1002.a:0 "Seguirò il processo da vicino."
  agot_trial_of_seven.1002.a.tt:0 "Osserverai il Processo dei Sette mentre si dispiega."
  agot_trial_of_seven.1002.b:0 "Questa non è una mia preoccupazione."


 # ToS: No one volunteered
  agot_trial_of_seven.1003.t:0 "$agot_trial_of_seven.1000.t$"
  agot_trial_of_seven.1003.desc.need_more_knights.a:0 "Il numero non basta. Non ho ancora i sette richiesti per rispondere all'accusa e il processo non può procedere così com'è.\n\nIl peso dell'istante preme da ogni lato mentre i numeri vengono contati di nuovo e ancora si rivelano insufficienti. Bisogna trovare altri campioni se questa causa dev'essere portata avanti, altrimenti il giudizio sarà pronunciato senza acciaio."
  agot_trial_of_seven.1003.desc.need_more_knights.b:0 "Gli occhi posati su di me non offrono alcuna risposta. Troppo pochi si sono fatti avanti e il numero richiesto resta incompleto.\n\nMormorii si levano ai margini della folla, alcuni curiosi, altri crudeli, mentre il silenzio continua a protrarsi. Finché altri nomi non verranno pronunciati, il Processo dei Sette resterà incompiuto, sospeso nell'equilibrio dinanzi a tutti coloro che osservano."
  agot_trial_of_seven.1003.desc.need_more_knights.c:0 "La legge è chiara e il numero non è ancora completo. Senza sette che si levino insieme, l'accusa non può ricevere risposta.\n\nLe parole della consuetudine risuonano forte nei miei pensieri, apprese molto tempo fa e mai destinate a essere messe alla prova in questo modo. Se il processo deve andare avanti, altri campioni dovranno essere assicurati, altrimenti la legge mi giudicherà senza misericordia."
  agot_trial_of_seven.1003.desc.need_more_knights.d:0 "Coloro che mi stanno dinanzi non bastano. I sette non sono ancora completi e l'istante si prolunga incompiuto.\n\nOgni battito del cuore attira più da vicino gli sguardi della folla, in attesa di vedere se qualcun altro si farà avanti. Se altri non verranno a levarsi con me, questo processo non sarà combattuto e l'esito verrà deciso qui e ora."
  agot_trial_of_seven.1003.desc.need_more_knights.e:0 "Il silenzio risponde alla mia chiamata. Coloro che erano disposti a levarsi si sono già fatti avanti e nessun altro giunge a unirsi a loro.\n\nPer un istante il dubbio recide più a fondo di qualunque lama e mi chiedo se sia qui che la mia causa abbia fine. Se altri campioni devono essere nominati, dovranno essere cercati, altrimenti sarà il silenzio stesso a servire da mia risposta."
 #honorable calls
  agot_trial_of_seven.1003.a.honorable.a:0 "Chi si leverà là dove il diritto ancora si leva?"
  agot_trial_of_seven.1003.a.honorable.b:0 "Non vi è più nessuno qui che creda ancora nella giustizia?"
  agot_trial_of_seven.1003.a.honorable.c:0 "Non è rimasto nessuno disposto a levarsi per ciò che è giusto?"
  agot_trial_of_seven.1003.a.honorable.d:0 "Non vi è più alcun cavaliere che ricordi il giuramento?"
  agot_trial_of_seven.1003.a.honorable.e:0 "Non vi sono tra voi veri cavalieri?!"
 #royal calls (available only for the royal side, they have the money)
  agot_trial_of_seven.1003.a.greedy.a:0 "Quale prezzo si guadagnerebbe la vostra spada?"
  agot_trial_of_seven.1003.a.greedy.b:0 "Chi qui combatterebbe per buona moneta?"
  agot_trial_of_seven.1003.a.greedy.c:0 "Non vi è nessuno disposto a essere pagato per il proprio coraggio?"
  agot_trial_of_seven.1003.a.greedy.d:0 "Chi venderebbe la propria lama per dell'oro?"
  agot_trial_of_seven.1003.a.greedy.e:0 "Chi tra voi combatterebbe per un giusto prezzo?"
 #dishonorable/arrogant calls
  agot_trial_of_seven.1003.a.dishonorable.a:0 "Temete tutti il campo a tal punto?"
  agot_trial_of_seven.1003.a.dishonorable.b:0 "Nessuno risponderà quando io chiamo?"
  agot_trial_of_seven.1003.a.dishonorable.c:0 "Davvero non vi è nessuno degno di levarsi per me?"
  agot_trial_of_seven.1003.a.dishonorable.d:0 "Mi trovo davvero in mezzo ai codardi?"
  agot_trial_of_seven.1003.a.dishonorable.e:0 "Chi tra voi si farà avanti per me?"


 #Leader couldn't gather 6 other knights
  agot_trial_of_seven.1004.t:0 "Giudicato Senza Acciaio"
  agot_trial_of_seven.1004.desc:0 "La sfida vacilla prima ancora di poter ricevere risposta. [leader_lost_before_started.Custom('IT_NAM_COL3')][leader_lost_before_started.GetTitledFirstName] non riesce a radunare i sei campioni richiesti per levarsi al suo fianco e il Processo dei Sette non può essere combattuto.\n\nPer legge e consuetudine, l'accusa resta senza risposta. La colpa ricade su [Select_CString(leader_lost_before_started.IsFemale,'di lei','di lui')], e la questione è risolta senza che venga sguainata una sola spada."
  agot_trial_of_seven.1004.a:0 "Togliete[leader_lost_before_started.Custom('DE_PRO_PER_P_3P_O')] dalla mia vista."

 #Yield! Yield!
  agot_single_combat.0031.b:0 "Questa non è la fine."

