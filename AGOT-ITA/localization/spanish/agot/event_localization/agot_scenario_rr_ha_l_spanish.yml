l_spanish:
 # Character Interactions
  agot_scenario_rr_ha.0010.t:0 "Un Consiglio di Guerra"
agot_scenario_rr_ha.0010.desc: 0 "Caro [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitledFirstName],\nSpero che questo messaggio vi trovi in buona salute. Ho convocato un consiglio di guerra a [GetTitleByKey('c_harrenhal').GetNameNoTier] per pianificare la guerra contro la ribellione guidata da [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName]. La vostra presenza e il vostro contributo alle nostre discussioni su come porre fine a questo conflitto saranno d'inestimabile valore. Insieme, leviamoci dinanzi alla sfida e facciamo ciò che è necessario per salvaguardare i Sette Regni. Attendo di vedervi ad Harrenhal. \nAl vostro servizio,"
  agot_scenario_rr_ha.0010.a:0 "Certo che parteciperò!"
  agot_scenario_rr_ha.0010.b:0 "Detesto le riunioni..."

  agot_scenario_rr_ha.0011.t:0 "Le Conseguenze di Harrenhal"
agot_scenario_rr_ha.0011.desc: 0 "I corvi sono stati inviati, e ora mi trovo dinanzi a una sala colma dei vassalli di mio padre, a contemplare la terribile situazione in cui mi trovo. Deporre un re, e non un re qualunque ma mio padre... pare inconcepibile.\n\nEppure, davanti a me siedono coloro che potrebbero essere abbastanza leali da unirsi alla mia causa. È ora o mai più: #bold Propongo di rimuovere [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] dal Trono di Spade?#!"
  agot_scenario_rr_ha.0011.a:0 "Il regno del Re Aerys II deve giungere alla fine..."
  agot_scenario_rr_ha.0011.a.tt:0 "Inizi a spiegare i tuoi piani a coloro seduti di fronte a te, senza sapere quali di questi vassalli si uniranno al tuo fianco — o ti tradiranno al Re Matto stesso..."
  agot_scenario_rr_ha.0011.b:0 "Dobbiamo concentrarci sulla guerra in corso!"
  agot_scenario_rr_ha.0011.b.tt:0 "Abbandoni completamente il complotto, conducendo invece un vero consiglio di guerra nella speranza di sconfiggere l'Usurpatore."
  agot_scenario_rr_ha.0012.t:0 "Le Conseguenze di Harrenhal"
agot_scenario_rr_ha.0012.desc: 0 "Il principe della corona ha riunito i migliori vassalli di suo padre per discutere della Guerra dell'Usurpatore. Osservo con attenzione coloro che siedono attorno al tavolo, prendendo la misura di quelli con cui mi sono schierato.\n\nDopo una lunga pausa, [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName] comincia il suo discorso. "Miei nobili consiglieri, vi ho convocati qui con un falso pretesto, una finta che spero possiate perdonare", esordisce. Mi agito nervosamente sul mio seggio.\n\n"La vera ragione del nostro raduno è questa: mio padre, [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] di Casa [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName], è impazzito, ossessionato dal fuoco e alimentato dalla paranoia. Ha condotto la nostra un tempo grande casata fino a un precipizio, sull'orlo stesso della rovina." #italic Un sussulto squarcia l'aria immobile come una lama.#!\n\nRhaegar sta proponendo il più alto dei tradimenti... #bold Deporre il Re Folle!#!"
  agot_scenario_rr_ha.0012.a:0 "Il principe drago ha ragione; mi unirò al suo complotto."
  agot_scenario_rr_ha.0012.b:0 "Non è compito mio giudicare i re."
  agot_scenario_rr_ha.0012.c:0 "Devo informare immediatamente il Re Aerys!"
  agot_scenario_rr_ha.0013.t:0 "Il Consiglio di Guerra"
agot_scenario_rr_ha.0013.desc: 0 "Il principe della corona ha riunito i migliori vassalli di suo padre per discutere della Guerra dell'Usurpatore. Osservo con attenzione coloro che siedono attorno al tavolo, prendendo la misura di quelli con cui mi sono schierato.\n\nDopo una breve pausa, [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName] inizia a delineare con grande dovizia di particolari le tattiche militari della ribellione. Devo ammettere che persino i guerrieri più esperti fra noi trovarono impressionante la sua conoscenza."
  agot_scenario_rr_ha.0013.a:0 "Sicuramente questo aiuterà l'impegno bellico!"
  agot_scenario_rr_ha.0014.t:0 "Un Consiglio Ribelle"
agot_scenario_rr_ha.0014.desc: 0 "Mio figlio, il principe della corona, è audace e talvolta avventato, ma non avrei mai immaginato che convocasse un consiglio di guerra alle mie spalle!\n\nQuesta mattina è giunto un corvo da uno dei miei vassalli più leali, a spiegarmi che [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName] aveva convocato gran parte di #bold il mio#! regno per consigliarlo su come gestire #bold la mia#! guerra.\n\nDevo già fronteggiare un usurpatore; prego di non dovermi occupare anche di #N un altro#!..."
  agot_scenario_rr_ha.0014.a:0 "Ora devo occuparmi di Rhaegar io stesso..."
  agot_scenario_rr_ha.0015.t:0 "Il Consiglio di Guerra"
  agot_scenario_rr_ha.0015.desc:0 "Intorno a me sono riuniti i migliori vassalli di mio padre, venuti da me ora per discutere della Guerra dell'Usurpatore. Osservo attentamente quelli seduti intorno al tavolo, misurando con attenzione coloro che ho invitato.\n\nDopo una breve pausa, inizio a delineare con grande dettaglio le tattiche militari della ribellione. Guardando su, noto persino alcuni dei miei guerrieri più esperti annuire approvando."
  agot_scenario_rr_ha.0015.a:0 "Speriamo che questo aiuti l'impegno bellico..."
  agot_scenario_rr_ha.0020.t:0 "Le Conseguenze di Harrenhal"
  agot_scenario_rr_ha.0020.desc:0 "Il momento è giunto, il complotto è stato discusso, e ora mi trovo di fronte ai miei consiglieri in attesa della loro risposta.\n\nI miei occhi si muovono avanti e indietro per la stanza. Molti vassalli leali sono seduti davanti a me. 'Chi mi seguirà per porre fine al regno di mio padre, il Re Matto?'\n\nLa mia domanda atterra come una freccia da scorpione, togliendo tutta l'aria dalla stanza. Ma presto, coloro che mi circondano cominciano a parlare. Presto, un coro di sostegno risuona — eppure alcuni tra noi rimangono in silenzio..."
  agot_scenario_rr_ha.0020.a:0 "E così inizia la mia danza con il #N drago folle#!."
  agot_scenario_rr_ha.0020.join_rhaegar:0 "Quali consiglieri si uniranno al tuo complotto?"
  agot_scenario_rr_ha.0020.join_rhaegar_ally:0 "[custom_tooltip_trick.GetName] appoggia il tuo complotto."
  agot_scenario_rr_ha.0021.t:0 "Un Secondo Usurpatore!?"
agot_scenario_rr_ha.0021.desc: 0 "Sono tante le cose di cui preoccuparsi, con il Ragno che sussurra in un orecchio e i piromanti che biascicano nell'altro. Eppure oggi un'altra inquietudine arriva tramite corvo.\n\nUn mio leale vassallo mi ha informato di un complotto, #italic ordito dal mio stesso figlio, [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName]#!...\n\nIl principe della corona intende rapirmi, depormi... Conoscerà il prezzo del tradimento, e così pure tutti i suoi complici!"
  agot_scenario_rr_ha.0021.a:0 "TRADITORI! #N DEVONO BRUCIARE TUTTI!#!"
  agot_scenario_rr_ha.0030.t:0 "Le Conseguenze di Harrenhal"
agot_scenario_rr_ha.0030.desc: 0 "Oggi l'intero regno può tirare un sospiro di sollievo: il Re Folle, [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] II, siede nelle mie segrete.\n\nQuanto è caduto in basso mio padre dai giorni della sua giovinezza... La grande promessa che il suo regno offriva ai Sette Regni è stata sviata dalla follia. E ora, devo fare ciò che è meglio per tutta Westeros...\n\nLa profezia parla del principe che fu promesso, e oggi quel principe diventa #bold un re#!."
  agot_scenario_rr_ha.0030.a:0 "Il regno di mio padre è finalmente finito."
  agot_scenario_rr_ha.0031.t:0 "Le Conseguenze di Harrenhal"
agot_scenario_rr_ha.0031.desc: 0 "Oggi l'intero regno piange: il Re Folle, [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] II, è sfuggito al mio piano per catturarlo e porre rapidamente fine al suo regno.\n\nUn corvo di uno dei miei consiglieri l'ha forse raggiunto? O sono stati i piccoli uccelli del Ragno a pensarci? Forse non conoscerò mai la verità.\n\nSo soltanto che i Sette Regni non possono continuare sotto la tirannia di mio padre. Ma ora deporre il Re Folle è divenuto ancor più difficile."
  agot_scenario_rr_ha.0031.a:0 "Guerra è..." 
