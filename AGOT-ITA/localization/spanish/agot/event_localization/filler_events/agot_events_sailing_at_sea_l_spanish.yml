l_spanish:
   agot_sailing_at_sea.0001.t:0 "Perduti in mare"
 agot_sailing_at_sea.0001.desc:0 "Disastro! Il capitano ci aveva assicurato che la navigazione nelle placide acque di [current_location.GetName] sarebbe stata tranquilla, ma come se volesse punirlo per la sua arroganza e presunzione, presto un'oscura minaccia incombeva all'orizzonte; e la nostra imbarcazione cominciò a sobbalzare e oscillare, scagliata da onde selvagge e furiose. \n\nNel caos della tempesta, vidi uno dei miei cavalieri, [KnightDisaster.Custom('IT_NAM_COL3')][KnightDisaster.GetTitledFirstName], finire in mare con un urlo straziante! Anche nel fragore della tempesta, riesco a distinguere le sue grida disperate di terrore mentre l'abissale abbraccio minaccia di trascinarl[Select_CString(KnightDisaster.IsFemale,'a','o')] in una tomba sommersa."
 agot_sailing_at_sea.0001.a:0 "Qualcuno faccia qualcosa!"
 agot_sailing_at_sea.0001.a.toast1.t:0 "[KnightDisaster.Custom('IT_NAM_COL3')][KnightDisaster.GetTitledFirstName] è annegat[Select_CString(KnightDisaster.IsFemale,'a','o')]!"
 agot_sailing_at_sea.0001.a.toast1.d:0 "Nonostante il tentativo di salvarl[Select_CString(KnightDisaster.IsFemale,'a','o')], [KnightDisaster.Custom('IT_NAM_COL3')][KnightDisaster.GetTitledFirstName] è tristemente annegat[Select_CString(KnightDisaster.IsFemale,'a','o')]!"
 agot_sailing_at_sea.0001.b:0 "Povera anima; la volontà degli Dei è misteriosa e insondabile."
 #agot_sailing_at_sea.0001.b.tt:0 "PLACEHOLDER"
 #agot_sailing_at_sea.0001.c:0 "PLACEHOLDER"
 #agot_sailing_at_sea.0001.c.tt:0 "PLACEHOLDER"
 #agot_sailing_at_sea.0001.d:0 "PLACEHOLDER"
 #agot_sailing_at_sea.0001.d.tt:0 "PLACEHOLDER"

 agot_sailing_at_sea.0003.t:0 "Vita in mare"
 agot_sailing_at_sea.0003.desc:0 "Mesi passati in mare logorano qualsiasi uomo. Nelle prime settimane, la mia dieta non era molto diversa da quella che avevo a casa; man mano che le scorte diminuivano, però, ho finito per mangiare come i miei uomini. Per un po' abbiamo ancora avuto le nostre scorte di carne salata e maiale stagionato. Quei giorni sono ormai lontani. Io e i miei uomini siamo ora condannati a una dieta di gallette e pane duro. \n\nPrima sono sopraggiunti la stanchezza e i dolori, anche se è stato abbastanza facile ignorarli. Ma poi i dolori sono peggiorati, e ora ogni volta che mi alzo sembra che gli stessi inferi brucino nelle mie ginocchia. Il peggio è arrivato questa mattina mentre sedevo a mangiare la mia galletta; quando l'ho morsa, uno dei miei denti si è staccato dalle gengive gonfie e sanguinanti..."
 agot_sailing_at_sea.0003.a:0 "...Forse è il momento di tornare a casa."

 agot_health.safe_treatment.2.desc:0 "Dopo essere stato esaminato dal mio Medico, [physician.Custom('IT_NAM_COL3')][physician.GetTitledFirstName], mi è stato detto di riposare abbondantemente nelle prossime settimane. Mi hanno anche ordinato di mangiare quanta più frutta possibile: limoni, lime e arance, in particolare. Se lo farò, mi è stato assicurato che i miei sintomi svaniranno.\n"
 agot_sailing_at_sea.000444.end.desc:0 "\nSembra che [physician.Custom('IT_NAM_COL3')][physician.GetTitledFirstName] avesse, fortunatamente, ragione. I miei dolori sono scomparsi, così come i lividi, e le gengive hanno finalmente smesso di sanguinare. Inutile dire che, se dovessi tornare di nuovo in mare, alcuni barili di limoni essiccati saranno conservati nella stiva."
 agot_sailing_at_sea.00044.d:0 "Poiché eravamo rapidamente entrati in porto, sono saltato giù dalla nave in tutta fretta per trovare il mio Medico di Corte [physician.GetFirstName]; forse avrebbe potuto conoscere la soluzione alla mia malattia. Mentre entravo negli alloggi medici della mia fortezza per spiegare i miei sintomi, il mio Medico mi fermò prima che potessi dire un'altra parola....."
 agot_sailing_at_sea.00044.d.court_physician.desc:0 "\n\n«[Select_CString(ROOT.Char.IsFemale,'Mia','Mio')] [ROOT.Char.GetLadyLord], credo che tu possa avere lo scorbuto... Ho qualche idea su come aiutarti.»"

 agot_sailing_at_sea.000444.t:0 "Scorbuto: un po' più luminoso"
 agot_sailing_at_sea.000444.a:0 "Il mondo sembra un po' più luminoso"
 agot_sailing_at_sea.000444.a.t:0 "Eh... il cardine della porta?"

 agot_sailing_at_sea.0007.t:0 "Carico a dritta!"
 agot_sailing_at_sea.0007.desc:0 "Mentre navighi attraverso le acque nebbiose di [current_location.GetName], la notte oscura assume un'aria minacciosa. Improvvisamente, la voce del barattiere risuona per tutta la nave. «C'è del carico appena a dritta, Capitano!».\n\nTu e alcuni membri dell'equipaggio correte al fianco della nave e, con tuo stupore, vedete una scena di distruzione. Assi di legno bruciate e spezzate, casse, barili e bauli sparsi, tutto galleggia sulla superficie dell'oceano; insieme alla vista di un baule dorato... \n\nÈ chiaro che qui è successo qualcosa di terribile. [fellow_sailor.GetFirstName] suggerisce di calare una scialuppa per indagare; almeno per recuperare il baule, ma sai che qualunque cosa abbia causato questa distruzione potrebbe essere ancora in agguato nelle vicinanze."
 agot_sailing_at_sea.0007.a:0 "Indaghiamo!"
 agot_sailing_at_sea.0007.b:0 "Semplicemente non abbiamo tempo.."

 agot_sailing_at_sea.0008.t:0 "Tranquillità"
 agot_sailing_at_sea.0008.desc:0 "Già a breve distanza dalla nave, tu e l'equipaggio remate in avanti, con la vista del baule davanti a voi. Inizi a renderti conto che qualcosa non va, o meglio: non è come previsto. \n\nIl presunto baule sembra muoversi, e man mano che ti avvicini senti una voce suadente che ti chiama. \n\nÈ una canzone di pace e tranquillità, una melodia rilassante, una che ti riempie di calma e ti libera da ogni stress, in un modo che non provavi da anni. Non puoi resistere al desiderio di seguire la voce, e man mano che ti avvicini, la luce della luna illumina il mare calmo intorno a te. Ti rendi conto che la tua nave non è più in vista. Sei completamente circondato dall'acqua e, mentre guardi oltre il bordo della barca, una figura emerge in superficie..."
 agot_sailing_at_sea.0008.a:0 "Ora posso rilassarmi"
 agot_sailing_at_sea.0008.b:0 "Io... io devo andare!"

 agot_sailing_at_sea.0009.t:0 "La Donna"
 agot_sailing_at_sea.0009.desc:0 "Mentre la figura emerge dalla superficie dell'acqua, vedi che è una donna dalla pelle chiara e liscia e dal petto scoperto, con i suoi capelli setosi e aggraziati a celarne il corpo. Il suo volto è incantatore, con occhi avvincenti che sembrano guardarti dritto nell'anima. Continua a cantare la sua canzone, e ti senti sempre più attratto da lei, senza desiderare altro che sentire il suo abbraccio.\n\nTi fa cenno di avvicinarti e, mentre lo fai, parla. \n\n«Mio caro marinaio, posso vedere lo stress, il dolore e i problemi della tua vita incisi sul tuo viso. Ho cantato la mia canzone per te. Vieni al mio fianco, e ti porterò ciò di cui hai bisogno nella vita. Insieme potrei esaudire i tuoi desideri più grandi!»"
 agot_sailing_at_sea.0009.a:0 "Potrei proteggerti! Potrei far sparire un pretendente!"
 agot_sailing_at_sea.0009_a_tt:0 "#italic La Donna promette di aiutarti con qualsiasi [claimant|E] sui tuoi [titles|E].#!"
 agot_sailing_at_sea.0009.b:0 "Sembri stressato, posso aiutarti a gestire quella tua fazione..."
 agot_sailing_at_sea.0009_b_tt:0 "#italic La Donna promette di aiutarti a gestire una [claimant_factions|E].#!"
 agot_sailing_at_sea.0009.c:0 "Oh, amore mio, vieni a raccontarmi tutto del tuo Lord."
 agot_sailing_at_sea.0009_c_tt:0 "#italic La Donna, conoscendo la tua situazione con il tuo [liege|E] tirannic[Select_CString(ROOT.Char.GetLiege.IsFemale,'a','o')], promette di aiutarti a occuparti [Select_CString(ROOT.Char.GetLiege.IsFemale,'di lei','di lui')].#!"
 agot_sailing_at_sea.0009.d:0 "Conosco il dolore che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ti ha causato, ma puoi venire con me!"
 agot_sailing_at_sea.0009_d_tt:0 "#italic La Donna vede la tua sofferenza per il tuo [spouse|E] infedele; ti esorta a lasciare che ti aiuti a liberarti [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'di lei','di lui')], e in cambio desidera stare insieme a te.#!"
 agot_sailing_at_sea.0009.e:0 "Desideri potere? Potrebbe essere #italic facile#! scalare i ranghi della successione."
 agot_sailing_at_sea.0009_e_tt:0 "#italic Vedendo la tua ambizione, la Donna promette di aiutarti a modificare la linea di successione dinastica più ampia a tuo favore.#!"
 agot_sailing_at_sea.0009.f:0 "Sappiamo entrambi che pensano poco di te, lascia che ti aiuti..."
 agot_sailing_at_sea.0009_f_tt:0 "#italic Vedendo come parlano di te, la Donna promette di aiutarti a modificare la linea di successione all'interno della tua famiglia diretta.#!"
 agot_sailing_at_sea.0009.g:0 "Ti tormenta, vero? Rivali a ogni angolo..."
 agot_sailing_at_sea.0009_g_tt:0 "#italic La Donna presenta la promessa di liberare il mondo dal tuo più grande [rival|E]!#!"
 agot_sailing_at_sea.0009.h:0 "Devo uscire di qui!"
 agot_sailing_at_sea.0009_h_tt:0 "#italic Lasci la Donna e le sue promesse.\n#!"

 agot_sailing_at_sea.0010.t:0 "La... Sirena?"
 agot_sailing_at_sea.0010.desc:0 "Mentre tendi la mano e afferri quella della donna, lei improvvisamente ti strattona nell'acqua e comincia a trascinarti sotto il mare. Lotti contro la sua presa, ma è inutile. Guardandoti intorno, ti rendi conto che il resto dell'equipaggio è caduto nella stessa trappola: le sirene circondano la barca, trascinandoli sott'acqua.\n\nCombatti con tutte le tue forze, cercando di liberarti dalla presa della sirena, ma è inutile. Vieni trascinato sempre più in profondità negli abissi del mare, e sai che se non farai qualcosa in fretta sarai condannato a passare il resto dei tuoi giorni come prigioniero della sirena."
 agot_sailing_at_sea.0010.a:0 "Tenti un ultimo sforzo per liberarti!"
 agot_sailing_at_sea.0010.a.success:0 "Riesci a liberarti e risali sulla scialuppa!"
 agot_sailing_at_sea.0010.a.failure:0 "La sirena ti trascina negli abissi!"

 agot_sailing_at_sea.0011.t:0 "Le molte creature del mare."
 agot_sailing_at_sea.0011.desc.dolphins:0 "Il cielo è di un blu luminoso e sereno, e l'aria è fresca e rinfrescante mentre stai dietro al timone della tua nave. Il vento soffia sul tuo viso, e il sole splende sulla tua nave, gettando una calda luce su tutto. Ti prendi un momento per respirare l'aria fresca del mare e riflettere sui tuoi pensieri.\n\n#bold;italic *SPLASH*#!\n\nSenti una serie di schizzi sul fianco della nave. Ti avvicini alla balaustra e guardi giù, e con tua sorpresa vedi un gruppo di delfini sfrecciare nell'acqua. Emettono versi adorabili e sembrano divertirsi un mondo. Non puoi fare a meno di sorridere alla vista di queste splendide creature che giocano nel mare. \n\nÈ una distrazione gradita dai pericoli che hai affrontato in mare, e decidi di goderti questo momento di pace e bellezza finché dura."
 agot_sailing_at_sea.0011.desc.whale:0 "Il cielo è di un blu luminoso e sereno, e l'aria è fresca e rinfrescante mentre stai dietro al timone della tua nave. Il vento soffia sul tuo viso, e il sole splende sulla tua nave, gettando una calda luce su tutto. Ti prendi un momento per respirare l'aria fresca del mare e riflettere sui tuoi pensieri.\n\nAll'improvviso, c'è uno schianto d'acqua enorme sul fianco della nave, seguito dal richiamo di una balena. Corri alla balaustra e guardi giù, e con tua sorpresa vedi una megattera emergere dall'acqua nel mezzo di un salto. \n\nÈ una vista impressionante, e non puoi fare a meno di restare ammirato davanti alla maestosità della creatura."
 agot_sailing_at_sea.0011.a:0 "Che spettacolo!"
 agot_sailing_at_sea.0011.b:0 "Equipaggio, cantiamo una canzone!"
 agot_sailing_at_sea.0011.c:0 "Maledetta balena, farò di questa nave la sua bara!" # Riferimento a Moby Dick
 agot_sailing_at_sea.0011.c.success:0 "Hai catturato con successo la balena!"
 agot_sailing_at_sea.0011.c.failure:0 "La balena è fuggita!"
 agot_sailing_at_sea.0011.c.injuredsuccess:0 "Hai catturato la balena, restando ferito nel processo"
 agot_sailing_at_sea.0011.c.injuredfailure:0 "Scagliandoti fuori dalla barca, la balena è fuggita, ferendoti"
 agot_sailing_at_sea.0011.c.successtt:0 "Catturi con successo la balena"
 agot_sailing_at_sea.0011.c.failurett:0 "La balena fugge"
 agot_sailing_at_sea.0011.c.injuredsuccesstt:0 "Catturi la balena ma rimani ferito"
 agot_sailing_at_sea.0011.c.injuredfailurett:0 "La balena fugge e ti ferisce nel processo"
 agot_sailing_at_sea.0011.c.death:0 "Muori cercando di catturare la balena"
 agot_sailing_at_sea.0011.c.deathtt:0 "La balena ti scaglia contro gli scogli"

 agot_sailing_at_sea.0012.t:0 "I pirati si preparano all'abbordaggio!"
 agot_sailing_at_sea.0012.desc:0 "Ordino ai miei uomini di assumere posizioni difensive, pronti a combattere chiunque si slanci sul ponte; io e i miei cavalieri non abbiamo intenzione di cadere senza combattere, specialmente non contro dei pirati!\n\nForse non avevamo i numeri, ma avevamo il coraggio, e tutta l'energia che potevamo raccogliere. \n\nMentre i pirati si avvicinavano, lanciando ganci sul fianco della nostra nave, estrassi la spada e mi posi alla balaustra; fissavo il capitano, mentre i miei uomini fissavano i propri avversari, pronti ad affrontare il nostro destino. Sarebbe stata una lunga, dura battaglia, ma ero pronto. Ero un sopravvissuto."
 agot_sailing_at_sea.0012.desc.triedtorun:0 "Comandai gli uomini nel miglior modo possibile: muovemmo le vele all'unisono con i venti, tentammo virate strette e ci dirigemmo verso una tempesta, sperando di seminare i pirati, ma fu inutile. Stavano guadagnando terreno su di noi, e potevo sentire le loro urla e i loro schiamazzi mentre si avvicinavano.\n\nIl pensiero di fuggire, ormai, era condannato. Ma io e i miei cavalieri non avevamo intenzione di cadere senza combattere. Urlai altri ordini al mio equipaggio e ai cavalieri, preparandoli per la battaglia imminente. Forse non avevamo i numeri, ma avevamo il coraggio. \n\nMentre i pirati si avvicinavano, estrassi la spada e mi posi alla balaustra; fissavo il capitano, mentre i miei uomini fissavano i propri avversari, pronti ad affrontare il nostro destino. Sarebbe stata una lunga, dura battaglia, ma ero pronto. Ero un sopravvissuto."
 agot_sailing_at_sea.0012.a:0 "In un mondo senza oro, avremmo potuto essere eroi!"
 agot_sailing_at_sea.0012.tooltip:0 "Mentre affronti un duello contro il capitano della nave avversaria, un gruppo dei tuoi cavalieri AFFRONTERÀ anch'esso un singolo duello contro un attaccante ciascuno."
 agot_sailing_at_sea.0013.toast.title:0 "Abbordaggio della nave!"

 agot_sailing_at_sea.0013.friendlydefendervictory.t:0 "Difendendoti dal tentativo di abbordaggio, uccidi [sc_loser.GetFirstNameNoTooltip] in combattimento!"
 agot_sailing_at_sea.0013.pirateattackervictory.t:0 "Durante il tentativo di abbordaggio, uccidi [sc_loser.GetFirstNameNoTooltip] in combattimento!"
 agot_sailing_at_sea.0013.friendlydefenderloser.t:0 "Difendendoti dal tentativo di abbordaggio, vieni trafitto allo stomaco dal pirata [sc_victor.GetFirstNameNoTooltip]!"
 agot_sailing_at_sea.0013.pirateattackerloser.t:0 "Durante il tentativo di abbordaggio, vieni abbattuto da [sc_victor.GetFirstNameNoTooltip]!"
 agot_sailing_at_sea.0013.friendlyoutcome_toast.t:0 "Mentre combatti, getti uno sguardo e vedi il tuo [knight|E] [sc_victor.GetFirstNameNicknamed] abbattere il Pirata [sc_loser.GetFirstNameNoTooltip]!"
 agot_sailing_at_sea.0013.piratewinoutcome_toast.t:0 "Mentre combatti, getti uno sguardo e vedi il Pirata [sc_victor.GetFirstNameNicknamed] abbattere il tuo [knight|E] [sc_loser.GetFirstNameNoTooltip]!"
 #Interface Notification
 agot_sailing_at_sea.0013.piratewinoutcome_message:2 "Il nostro $knight_culture_player_no_tooltip_lowercase$ [sc_loser.GetFirstNameNoTooltip] è stato ucciso da [sc_victor.GetFirstNameNicknamed]!"

 agot_sailing_at_sea.0015.t:0 "Le acque di [current_location.GetName]"
 agot_sailing_at_sea.0015.desc:0 "Mentre stavo sul ponte della nave, provai un senso di disagio fissando la vasta distesa di [current_location.GetName]. Queste acque insidiose erano note come dimora di contrabbandieri e pirati, e sapevo che era solo questione di tempo prima che incontrassimo uno di questi gruppi pericolosi. Ma, man mano che il giorno avanzava, sembrava che fossimo al sicuro. Le acque erano calme e non c'era alcun segno di altre navi all'orizzonte. Iniziai a rilassarmi, pensando che avessimo in qualche modo evitato i pericoli di [current_location.GetName].\n\nTuttavia, quando il sole cominciò a tramontare, i miei timori si avverarono. All'orizzonte potevo vedere una nave avvicinarsi a gran velocità. Aveva vele lacerate, uno scafo costruito per la battaglia e un'aura minacciosa. Il mio cuore batteva forte mentre gridavo ordini al mio equipaggio, preparandoci a difenderci dall'attacco imminente."
 agot_sailing_at_sea.0015.a:0 "Proviamo ad andarcene da qui!"
 agot_sailing_at_sea.0015.toast:0 "Fuggito!"
 agot_sailing_at_sea.0015.toast_tooltip:0 "Fuggi dai pirati!"
 agot_sailing_at_sea.0015.toast1:0 "Catturato!"
 agot_sailing_at_sea.0015.toast_tooltip1:0 "I pirati ti hanno raggiunto e si preparano all'abbordaggio!"
 agot_sailing_at_sea.0015.b.option_tooltip:0 "Resti a combattere contro i pirati!\n\nMentre affronti un duello contro il capitano della nave avversaria, un gruppo dei tuoi cavalieri AFFRONTERÀ anch'esso un singolo duello contro un attaccante ciascuno."
 agot_sailing_at_sea.0015.option_tooltip:0 "I pirati ti raggiungono e si preparano all'abbordaggio."
 agot_sailing_at_sea.0015.b:0 "Restiamo e combattiamo! Uomini, preparatevi alla battaglia!"

 agot_sailing_at_sea.0016.t:0 "Fuori rotta!"
 agot_sailing_at_sea.0016.desc:0 "Qualcosa nel vento ti spinge fuori rotta"
 agot_sailing_at_sea.0016.a:0 "Ahhh"
 agot_sailing_at_sea.0016.a.tooltip:0 "Tu e il tuo equipaggio sarete spinti fuori rotta in una provincia vicina!"

 agot_sailing_at_sea.0018.t:0 "La nave fantasma"
 agot_sailing_at_sea.0018.desc:0 "Il vento ulula, le nuvole sono oscure e il mare si infrange contro la nave. «Ho affrontato tempeste peggiori nei miei anni in mare», disse il mio quartiermastro. Tempeste, mostri marini e pericolose scogliere erano sempre in agguato, pronte a reclamare le vite dell'equipaggio e della nave. Ma in questo viaggio particolare, abbiamo incontrato qualcosa di più inquietante e inesplicabile.\n\nStavamo navigando attraverso le acque buie e nebbiose di [current_location.GetName] quando uno dei membri del mio equipaggio avvistò una nave all'orizzonte. \n\nAll'inizio pensammo fosse una nave amica, ma man mano che ci avvicinavamo ci rendemmo conto che c'era qualcosa che non andava. La nave era vecchia e logora, con vele sfilacciate e una polena spettrale. E, cosa più strana di tutte, non sembrava esserci un'anima viva a bordo."
 agot_sailing_at_sea.0018.a:0 "Lasciamo che i fantasmi vadano per la loro strada."
 agot_sailing_at_sea.0018.a.tooltip:0 "Eviterai la nave fantasma."
 agot_sailing_at_sea.0018.b:0 "Dovremmo indagare."
 agot_sailing_at_sea.0018.b.tooltip:0 "Ti avvicinerai alla nave fantasma e indagherai."
 agot_sailing_at_sea.0018.c.tooltip:0 ""
 agot_sailing_at_sea.0018.d.tooltip:0 ""

 agot_sailing_at_sea.0019.t:0 "In lontananza, persiste"
 agot_sailing_at_sea.0019.desc:0 "Sebbene tu l'abbia lasciata nei mari passati, con il passare delle notti continua a vivere sulle lingue del tuo equipaggio; ogni notte un altro sostiene di vederla, appena fuori dalla tua vista, mentre ti segue."
 agot_sailing_at_sea.0019.a:0 "Lasciamo che i fantasmi vadano per la loro strada"
 agot_sailing_at_sea.0019.b:0 "O Spiriti, perché dovete tormentarmi così?"
 agot_sailing_at_sea.0019.c:0 "Urla nel vuoto"

 agot_sailing_at_sea.0020.t:0 ""
 agot_sailing_at_sea.0020.desc:0 ""
 agot_sailing_at_sea.0020.a:0 ""
 agot_sailing_at_sea.0020.a.tooltip:0 ""
 agot_sailing_at_sea.0020.c:0 ""
 agot_sailing_at_sea.0020.c.tooltip:0 ""

 agot_sailing_at_sea.0022.t:0 "Una bottiglia in mare"
 agot_sailing_at_sea.0022.desc:0 "Placeholder"
 agot_sailing_at_sea.0022.a:0 "Placeholder"
 agot_sailing_at_sea.0022.b:0 "PLACEHOLDER"

 agot_sailing_at_sea.0005.a:0 "PLACEHOLDER"
 agot_sailing_at_sea.0005.b:0 "PLACEHOLDER"
