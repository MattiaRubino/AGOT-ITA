l_spanish:
  agot_sailing_at_sea.0001.t:0 "Persi in Mare"
  agot_sailing_at_sea.0001.desc:0 "Disastro! Il capitano ci aveva assicurato che avremmo navigato senza difficoltà attraverso le acque placide di [current_location.GetName], ma, come per punirlo della sua arroganza e presunzione, una tenebra addensata presto si stagliò pesante all'orizzonte; e la nostra nave cominciò a sussultare e a sollevarsi, sbattuta da onde selvagge e furiose. \n\nNel caos della tempesta infuriata, vidi un[KnightDisaster.Custom('DE_PRO_PER_S_3P_A')] dei miei cavalieri, [KnightDisaster.Custom('IT_NAM_COL3')][KnightDisaster.GetTitledFirstName], venire travolt[Select_CString(KnightDisaster.IsFemale,'a','o')] fuori bordo con un grido da gelare il sangue! Persino nel fragore della bufera, riesco a distinguere le sue grida disperate di terrore mentre l'abisso spettrale minaccia di trascinar[Select_CString(KnightDisaster.IsFemale,'la','lo')] giù verso una tomba d'acqua."
  agot_sailing_at_sea.0001.a:0 "Qualcuno faccia qualcosa!"
  agot_sailing_at_sea.0001.a.toast1.t:0 "[KnightDisaster.Custom('IT_NAM_COL3')][KnightDisaster.GetTitledFirstName] è annegat[Select_CString(KnightDisaster.IsFemale,'a','o')]!"
  agot_sailing_at_sea.0001.a.toast1.d:0 "Nonostante il tentativo di salvar[Select_CString(KnightDisaster.IsFemale,'la','lo')], [KnightDisaster.Custom('IT_NAM_COL3')][KnightDisaster.GetTitledFirstName] è purtroppo annegat[Select_CString(KnightDisaster.IsFemale,'a','o')]!"
  agot_sailing_at_sea.0001.b:0 "Povera anima; la volontà degli Dei è misteriosa e insondabile."
  #agot_sailing_at_sea.0001.b.tt:0 "SEGNAPOSTO"
  #agot_sailing_at_sea.0001.c:0 "SEGNAPOSTO"
  #agot_sailing_at_sea.0001.c.tt:0 "SEGNAPOSTO"
  #agot_sailing_at_sea.0001.d:0 "SEGNAPOSTO"
  #agot_sailing_at_sea.0001.d.tt:0 "SEGNAPOSTO"

  agot_sailing_at_sea.0003.t:0 "Vita in Mare"
  agot_sailing_at_sea.0003.desc:0 "Mesi trascorsi in mare fiaccano qualunque uomo. Nelle prime settimane, la mia dieta non era stata molto diversa da quella di casa; quando le provviste cominciarono a scarseggiare, però, presto mi ritrovai a mangiare come i miei uomini. Per un po' avemmo ancora le nostre scorte di manzo salato e maiale stagionato. Quei giorni sono ormai lontani. I miei uomini e io siamo stati ora condannati a una dieta di gallette e biscotto. \n\nLa stanchezza e i dolori iniziarono per primi, benché fosse abbastanza facile ignorarli. Ma i dolori peggiorarono, e ora ogni volta che mi alzo in piedi mi sembra che gli inferi stessi mi ardano nelle ginocchia. Il peggio è arrivato stamani, quando mi sono seduto a mangiare la mia galletta; mordendola, uno dei miei denti si è staccato dalle gengive gonfie e sanguinanti..."
  agot_sailing_at_sea.0003.a:0 "...Forse è tempo di fare ritorno a casa."

  agot_health.safe_treatment.2.desc:0 "Dopo essere stato esaminato dal mio Medico, [physician.Custom('IT_NAM_COL3')][physician.GetTitledFirstName], mi è stato detto di riposare molto a letto nelle prossime settimane. Mi ha anche ordinato di mangiare quanta più frutta possibile; soprattutto limoni, lime e arance. Se lo farò, mi è stato assicurato che i miei sintomi si dissiperanno.\n"
  agot_sailing_at_sea.000444.end.desc:0 "\nParrebbe che [physician.Custom('IT_NAM_COL3')][physician.GetTitledFirstName] avesse, grazie agli Dei, ragione. I miei dolori sono spariti, così come i lividi, e le mie gengive hanno finalmente smesso di sanguinare di continuo. Inutile dirlo: se tornerò di nuovo in mare, qualche barile di limoni essiccati sarà stipato nella stiva."
  agot_sailing_at_sea.00044.d:0 "Poiché avevamo rapidamente attraccato in porto, ero saltato giù dalla nave in tutta fretta per cercare il mio Medico di Corte [physician.GetFirstName]; forse avrebbe saputo quale fosse la soluzione al mio male; mentre entro nelle stanze mediche del mio mastio per spiegare i miei sintomi, il mio Medico mi interrompe prima che io possa pronunciare un'altra parola....."
  agot_sailing_at_sea.00044.d.court_physician.desc:0 "\n\n"Mio [ROOT.Char.GetLadyLord], credo che possiate avere lo Scorbuto... Ho alcune idee su come aiutarvi"."

  agot_sailing_at_sea.000444.t:0 "Scorbuto: Un Poco Più Luminoso"
  agot_sailing_at_sea.000444.a:0 "Il mondo sembra un poco più luminoso"
  agot_sailing_at_sea.000444.a.t:0 "Ehm... cardine?"

  agot_sailing_at_sea.0007.t:0 "Carico a tribordo!"
  agot_sailing_at_sea.0007.desc:0 "Mentre navighi attraverso le acque nebbiose di [current_location.GetName], la notte oscura assume un'aria sinistra. All'improvviso, la voce della vedetta risuona per tutta la nave. "C'è del carico appena a tribordo, Capitano!".\n\nTu e alcuni membri dell'equipaggio correte verso il fianco della nave e, con tuo sgomento, scorgete una scena di distruzione. Assi di legno bruciate e spezzate, casse, barili e forzieri sparsi, tutti galleggianti sulla superficie dell'oceano; insieme alla vista di uno scrigno dorato... \n\nÈ chiaro che qui è accaduto qualcosa di terribile. [fellow_sailor.GetFirstName] suggerisce di calare una scialuppa per indagare; quantomeno per recuperare lo scrigno, ma tu sai che qualunque cosa abbia causato questa distruzione potrebbe ancora aggirarsi nei paraggi."
  agot_sailing_at_sea.0007.a:0 "Andiamo a indagare!"
  agot_sailing_at_sea.0007.b:0 "Semplicemente non abbiamo tempo..."

  agot_sailing_at_sea.0008.t:0 "Tranquillità"
  agot_sailing_at_sea.0008.desc:0 "Già a breve distanza dalla nave, l'equipaggio e tu remate in avanti, con la vista di uno scrigno davanti a voi. Cominci a renderti conto che qualcosa non va, o meglio, non è come previsto. \n\nIl presunto scrigno sembra muoversi, e avvicinandoti senti una voce soave che ti chiama. \n\nÈ un canto di pace e tranquillità, una melodia rilassante, che ti colma di una sensazione di calma, liberandoti da ogni tensione, in un modo che non provavi da anni. Non riesci a resistere al desiderio di seguire la voce, e mentre ti avvicini, la luce della luna risplende sul mare calmo intorno a te. Ti rendi conto che la tua nave non è più in vista. Sei completamente circondato dall'acqua, e mentre guardi oltre il bordo della barca, una figura emerge dalla superficie..."
  agot_sailing_at_sea.0008.a:0 "Ora posso rilassarmi"
  agot_sailing_at_sea.0008.b:0 "Io, io devo andare!"

  agot_sailing_at_sea.0009.t:0 "La Donna"
  agot_sailing_at_sea.0009.desc:0 "Quando la figura emerge dalla superficie dell'acqua, vedi che è una donna dalla pelle pallida e liscia, col petto nudo e i suoi graziosi capelli setosi a celarle il corpo. Il suo volto è incantatore, con occhi ammalianti che sembrano scrutarti fin dentro l'anima. Continua a cantare la sua canzone, e tu ti senti attirato sempre più vicino a lei, desiderando soltanto sentire il suo abbraccio.\n\nTi fa cenno di avvicinarti e, mentre lo fai, parla. \n\n"Mio caro marinaio, posso vedere lo stress, il dolore e i travagli della tua vita incisi sul tuo volto. Ho cantato la mia canzone per te. Vieni al mio fianco, e ti porterò ciò di cui hai bisogno nella vita. Insieme potrei concederti i tuoi più grandi desideri!"
  agot_sailing_at_sea.0009.a:0 "Potrei proteggerti! Potrei far sparire un pretendente!"
  agot_sailing_at_sea.0009_a_tt:0 "#italic La donna promette di aiutarti con qualunque [claimant|E] ai tuoi [titles|E].#!"
  agot_sailing_at_sea.0009.b:0 "Sembri stressato, ti aiuterò ad affrontare quella tua fazione..."
  agot_sailing_at_sea.0009_b_tt:0 "#italic La donna promette di aiutarti ad affrontare le [claimant_factions|E].#!"
  agot_sailing_at_sea.0009.c:0 "Oh, amore mio, vieni a raccontarmi tutto di quel tuo signore."
  agot_sailing_at_sea.0009_c_tt:0 "#italic La donna, conoscendo la tua situazione con il tuo tirannico [liege|E], promette di aiutarti ad affrontare [ROOT.Char.GetLiege.Custom('DE_PRO_PER_S_3P_A')].#!"
  agot_sailing_at_sea.0009.d:0 "Conosco il dolore che [ROOT.Char.GetPrimarySpouse.GetSheHe] ti ha arrecato, ma puoi venire con me!"
  agot_sailing_at_sea.0009_d_tt:0 "#italic La donna vede il tuo cuore spezzato dal tuo [spouse|E] infedele; ti esorta a lasciarti aiutare da lei a liberarti di [ROOT.Char.GetPrimarySpouse.Custom('DE_PRO_PER_S_3P_A')], e in cambio desidera stare insieme a te.#!"
  agot_sailing_at_sea.0009.e:0 "Desideri il potere? Perché potrebbe essere #italic facile #! scalare i ranghi della successione."
  agot_sailing_at_sea.0009_e_tt:0 "#italic Vedendo la tua ambizione, la donna promette di aiutarti ad alterare in tuo favore la più ampia linea di successione dinastica.#!"
  agot_sailing_at_sea.0009.f:0 "Sappiamo entrambi che ti stimano poco, lascia che ti aiuti..."
  agot_sailing_at_sea.0009_f_tt:0 "#italic Vedendo come parlano di te, la donna promette di aiutarti ad alterare la linea di successione nella tua famiglia diretta.#"
  agot_sailing_at_sea.0009.g:0 "Ti perseguita, non è vero? Rivali a ogni angolo..."
  agot_sailing_at_sea.0009_g_tt:0 "#italic La donna avanza la promessa di liberare il mondo dal tuo più grande [rival|E]!#"
  agot_sailing_at_sea.0009.h:0 "Devo andarmene da qui!"
  agot_sailing_at_sea.0009_h_tt:0 "#italic Lasci la donna e le sue promesse.\n#"

  agot_sailing_at_sea.0010.t:0 "La... Sirena?"
  agot_sailing_at_sea.0010.desc:0 "Quando allunghi la mano e prendi quella della donna, lei ti strattona all'improvviso nell'acqua e comincia a trascinarti sotto il mare. Ti dibatti contro la sua presa, ma è inutile. Guardandoti intorno, ti rendi conto che il resto del tuo equipaggio è caduto nello stesso inganno — le sirene circondano la barca, trascinandoli sott'acqua.\n\nCombatti con tutte le tue forze, cercando di liberarti dalla presa della sirena, ma è inutile. Vieni trascinato sempre più giù nelle profondità del mare, e sai che se non fai subito qualcosa sarai condannato a trascorrere il resto dei tuoi giorni come prigioniero della sirena."
  agot_sailing_at_sea.0010.a:0 "'Tenti un ultimo sforzo per liberarti!'"
  agot_sailing_at_sea.0010.a.success:0 "Riesci a staccarti e a risalire sulla scialuppa!"
  agot_sailing_at_sea.0010.a.failure:0 "La sirena ti trascina nelle profondità sottostanti!"

  agot_sailing_at_sea.0011.t:0 "Le Molte Creature del Mare."
  agot_sailing_at_sea.0011.desc.dolphins:0 "Il cielo è di un azzurro limpido e brillante, e l'aria è fresca e rigenerante mentre stai dietro al timone della tua nave. I venti ti soffiano sul viso, e il sole splende sulla tua nave, diffondendo ovunque un caldo bagliore. Ti prendi un momento per respirare l'aria salmastra e riflettere sui tuoi pensieri.\n\n#bold;italic *SPLASH*#!\n\nSenti una serie di spruzzi al fianco della nave, ti avvicini al parapetto e guardi oltre, e con tua sorpresa vedi un branco di delfini che sfreccia nell'acqua. Emettono versi adorabili e sembrano divertirsi come non mai; non puoi fare a meno di sorridere alla vista di queste splendide creature che scherzano nel mare. \n\nÈ una gradita distrazione dai pericoli che hai affrontato in mare, e decidi di goderti questo momento di pace e bellezza finché dura."
  agot_sailing_at_sea.0011.desc.whale:0 "Il cielo è di un azzurro limpido e brillante, e l'aria è fresca e rigenerante mentre stai dietro al timone della tua nave. I venti ti soffiano sul viso, e il sole splende sulla tua nave, diffondendo un caldo bagliore su ogni cosa. Ti prendi un momento per respirare l'aria salmastra e riflettere sui tuoi pensieri.\n\nAll'improvviso, un enorme spruzzo e un getto d'acqua si levano al fianco della nave, seguiti dal verso di una balena. Corri al parapetto e guardi oltre, e con tua sorpresa vedi una megattera emergere dall'acqua nel mezzo di un salto. \n\nÈ una vista impressionante, e non puoi fare a meno di restare in soggezione davanti a quella creatura immensa."
  agot_sailing_at_sea.0011.a:0 "Che spettacolo!"
  agot_sailing_at_sea.0011.b:0 "Equipaggio, cantiamo una canzone!"
  agot_sailing_at_sea.0011.c:0 "Maledetta balena, farò di questa nave la sua bara!" # Riferimento a Mobi Dick Badger
  agot_sailing_at_sea.0011.c.success:0 "Hai catturato con successo la balena!"
  agot_sailing_at_sea.0011.c.failure:0 "La Balena è fuggita!"
  agot_sailing_at_sea.0011.c.injuredsuccess:0 "Hai catturato la balena, ferendoti nel processo"
  agot_sailing_at_sea.0011.c.injuredfailure:0 "Gettandoti fuori dalla barca, la Balena è fuggita, ferendoti"
  agot_sailing_at_sea.0011.c.successtt:0 "Catturi con successo la balena"
  agot_sailing_at_sea.0011.c.failurett:0 "La Balena fugge"
  agot_sailing_at_sea.0011.c.injuredsuccesstt:0 "Catturi la balena ma vieni ferito"
  agot_sailing_at_sea.0011.c.injuredfailurett:0 "La Balena fugge e ti ferisce nel processo"
  agot_sailing_at_sea.0011.c.death:0 "Muori tentando di catturare la balena"
  agot_sailing_at_sea.0011.c.deathtt:0 "La balena ti scaglia contro gli scogli"

  agot_sailing_at_sea.0012.t:0 "I Pirati si Preparano all'Abbordaggio!"
  agot_sailing_at_sea.0012.desc:0 "Ordinai ai miei uomini di assumere posizioni difensive, pronti a combattere chiunque si fosse lanciato sul ponte; i miei cavalieri e io non eravamo certo pronti a cadere senza lottare, soprattutto non contro un Pirata!\n\nForse non avevamo i numeri, ma avevamo il coraggio, e tutta l'energia che potevamo raccogliere. \n\nMentre i pirati si avvicinavano, lanciando rampini contro il fianco della nostra nave, sguainai la spada e mi piantai al parapetto; fissando il capitano, con i miei uomini che puntavano gli occhi sui propri avversari, pronti ad affrontare il nostro destino. Sarebbe stata una battaglia lunga e dura, ma ero pronto. Ero un sopravvissuto."
  agot_sailing_at_sea.0012.desc.triedtorun:0 "Comandai gli uomini come meglio potei, muovemmo le vele all'unisono con i venti, tentammo virate strette e ci dirigemmo verso una tempesta, sperando di seminare i pirati, ma non servì a nulla. Ci stavano raggiungendo, e potevo udire le loro grida e schiamazzi mentre si avvicinavano.\n\nIl pensiero di fuggire ormai era condannato. Ma i miei cavalieri e io non eravamo certo pronti a cadere senza lottare. Abbaiavo altri ordini al mio equipaggio e ai miei cavalieri, preparandoli alla battaglia imminente. Forse non avevamo i numeri, ma avevamo il coraggio. \n\nMentre i pirati si avvicinavano, sguainai la spada e mi piantai al parapetto; fissando il capitano, con i miei uomini che puntavano gli occhi sui propri avversari, pronti ad affrontare il nostro destino. Sarebbe stata una battaglia lunga e dura, ma ero pronto. Ero un sopravvissuto."
  agot_sailing_at_sea.0012.a:0 "In un mondo senza oro, avremmo potuto essere Eroi!"
  agot_sailing_at_sea.0012.tooltip:0 "Mentre affronti in duello il capitano della nave avversaria, un gruppo dei tuoi cavalieri ingaggerà ANCHE un singolo duello contro un assalitore ciascuno."
  agot_sailing_at_sea.0013.toast.title:0 "Abbordaggio!"

  agot_sailing_at_sea.0013.friendlydefendervictory.t:0 "Difendendoti dal tentativo di abbordaggio, uccidi [sc_loser.GetFirstNameNoTooltip] in combattimento!"
  agot_sailing_at_sea.0013.pirateattackervictory.t:0 "Durante il tentativo di abbordaggio, uccidi [sc_loser.GetFirstNameNoTooltip] in combattimento!"
  agot_sailing_at_sea.0013.friendlydefenderloser.t:0 "Difendendoti dal tentativo di abbordaggio, vieni trafitto al ventre dal pirata [sc_victor.GetFirstNameNoTooltip]!"
  agot_sailing_at_sea.0013.pirateattackerloser.t:0 "Durante il tentativo di abbordaggio, vieni abbattuto da [sc_victor.GetFirstNameNoTooltip]!"
  agot_sailing_at_sea.0013.friendlyoutcome_toast.t:0 "Mentre combatti, lanci uno sguardo e vedi il tuo [knight|E] [sc_victor.GetFirstNameNicknamed] abbattere il Pirata [sc_loser.GetFirstNameNoTooltip]!"
  agot_sailing_at_sea.0013.piratewinoutcome_toast.t:0 "Mentre combatti, lanci uno sguardo e vedi il Pirata [sc_victor.GetFirstNameNicknamed] abbattere il tuo [knight|E] [sc_loser.GetFirstNameNoTooltip]!"
  #Interface Notification
  agot_sailing_at_sea.0013.piratewinoutcome_message:2 "Il nostro $knight_culture_player_no_tooltip_lowercase$ [sc_loser.GetFirstNameNoTooltip] è stato ucciso da [sc_victor.GetFirstNameNicknamed]!"

  agot_sailing_at_sea.0015.t:0 "Le Acque di [current_location.GetName]"
  agot_sailing_at_sea.0015.desc:0 "Mentre stavo sul ponte della nave, provavo un'inquietudine, scrutando la vasta distesa di [current_location.GetName]. Queste acque infide erano note per ospitare contrabbandieri e pirati, e sapevo che era solo questione di tempo prima che incontrassimo uno di questi pericolosi gruppi. Ma col passare del giorno, sembrò che fossimo al sicuro. Le acque erano calme e non c'era segno di altre navi all'orizzonte. Cominciai a rilassarmi, pensando che fossimo riusciti in qualche modo a evitare i pericoli di [current_location.GetName].\n\nTuttavia, quando il sole iniziò a tramontare, i miei timori si avverarono. All'orizzonte, potevo vedere una nave avvicinarsi a grande velocità. Aveva vele lacere, uno scafo fatto per la battaglia e un'aura minacciosa. Il mio cuore accelerò mentre urlavo ordini al mio equipaggio, preparandoci a difenderci dall'attacco imminente."
  agot_sailing_at_sea.0015.a:0 "Proviamo ad andarcene da qui!"
  agot_sailing_at_sea.0015.toast:0 "Fuggiti!"
  agot_sailing_at_sea.0015.toast_tooltip:0 "Sfuggi ai pirati!"
  agot_sailing_at_sea.0015.toast1:0 "Raggiunti!"
  agot_sailing_at_sea.0015.toast_tooltip1:0 "I pirati ti hanno raggiunto e si preparano all'abbordaggio!"
  agot_sailing_at_sea.0015.b.option_tooltip:0 "Ti fermi a combattere i pirati!\n\nMentre affronti in duello il capitano della nave avversaria, un gruppo dei tuoi cavalieri ingaggerà ANCHE un singolo duello contro un assalitore ciascuno."
  agot_sailing_at_sea.0015.option_tooltip:0 "I pirati ti raggiungono e si preparano all'abbordaggio."
  agot_sailing_at_sea.0015.b:0 "Restiamo e combattiamo! Uomini, pronti alla battaglia!"

  agot_sailing_at_sea.0016.t:0 "Spinti fuori rotta!"
  agot_sailing_at_sea.0016.desc:0 "Qualcosa sul vento che ti spinge fuori rotta"
  agot_sailing_at_sea.0016.a:0 "Ahhh"
  agot_sailing_at_sea.0016.a.tooltip:0 "Tu e il tuo equipaggio verrete spinti fuori rotta in una provincia vicina!"

  agot_sailing_at_sea.0018.t:0 "La Nave Fantasma"
  agot_sailing_at_sea.0018.desc:0 "Il vento ulula, le nubi sono scure e il mare si abbatte contro la nave, "Ho affrontato tempeste peggiori nei miei anni in mare," disse il mio quartiermastro. Tempeste, mostri marini e coste rocciose e infide erano sempre in agguato, pronte a reclamare le vite dell'equipaggio e la nave. Ma in questo particolare viaggio incontrammo qualcosa di più sinistro e inspiegabile.\n\nStavamo navigando attraverso le acque oscure e nebbiose di [current_location.GetName] quando uno dei membri del mio equipaggio avvistò una nave all'orizzonte. \n\nAll'inizio pensammo fosse un vascello amico, ma avvicinandoci ci rendemmo conto che qualcosa non andava. La nave era vecchia e logora, con vele lacere e una polena spettrale. E, cosa più strana di tutte, non sembrava esserci una sola anima a bordo."
  agot_sailing_at_sea.0018.a:0 "Lasciamo i fantasmi ai loro pascoli spettrali."
  agot_sailing_at_sea.0018.a.tooltip:0 "Eviterai la nave fantasma."
  agot_sailing_at_sea.0018.b:0 "Dovremmo indagare."
  agot_sailing_at_sea.0018.b.tooltip:0 "Navigherai vicino alla nave fantasma e indagherai."
  agot_sailing_at_sea.0018.c.tooltip:0 ""
  agot_sailing_at_sea.0018.d.tooltip:0 ""

  agot_sailing_at_sea.0019.t:0 "In lontananza, indugia"
  agot_sailing_at_sea.0019.desc:0 "Sebbene tu l'abbia lasciata nei mari trascorsi, mentre le notti vanno e vengono, continua a vivere sulle lingue del tuo equipaggio; ogni notte un altro sostiene di vederla, appena fuori dal tuo sguardo, mentre vi segue."
  agot_sailing_at_sea.0019.a:0 "Lasciamo i fantasmi ai loro pascoli spettrali"
  agot_sailing_at_sea.0019.b:0 "O Spiriti, perché dovete tormentarmi così?"
  agot_sailing_at_sea.0019.c:0 "Urla nel vuoto"

  agot_sailing_at_sea.0020.t:0 ""
  agot_sailing_at_sea.0020.desc:0 ""
  agot_sailing_at_sea.0020.a:0 ""
  agot_sailing_at_sea.0020.a.tooltip:0 ""
  agot_sailing_at_sea.0020.c:0 ""
  agot_sailing_at_sea.0020.c.tooltip:0 ""

  agot_sailing_at_sea.0022.t:0 "Una bottiglia nel mare"
  agot_sailing_at_sea.0022.desc:0 "Segnaposto"
  agot_sailing_at_sea.0022.a:0 "Segnaposto"
  agot_sailing_at_sea.0022.b:0 "SEGNAPOSTO"

  agot_sailing_at_sea.0005.a:0 "SEGNAPOSTO"
  agot_sailing_at_sea.0005.b:0 "SEGNAPOSTO"