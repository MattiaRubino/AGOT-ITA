l_spanish:

agot_wildling_events.0001.t:0 "Un nome conferito"
agot_wildling_events.0001.desc.me:0 "[ROOT.Char.GetFirstNameNoTooltip].\n\nUn semplice nome da latte, dato solo per allontanare la sventura nei primissimi giorni di vita tra la mia gente.\n\nOra che sono [Select_CString(ROOT.Char.IsFemale,'cresciuta','cresciuto')] abbastanza forte da ricevere un vero nome, mi domando quale nome dovrei prendere."
agot_wildling_events.0001.desc:0 "[child.GetFirstNameNoTooltip].\n\nUn semplice nome da latte, dato solo per allontanare la sventura nei primissimi giorni [Select_CString(child.IsFemale,'di lei','di lui')] tra la nostra gente.\n\nOra che [Select_CString(child.IsFemale,'lei','lui')] è cresciut[Select_CString(child.IsFemale,'a','o')] abbastanza forte, è tempo che a [Select_CString(child.IsFemale,'lei','lui')] venga dato un vero nome tra la nostra gente."
agot_wildling_events.0001.a:0 "Che [Select_CString(Character.IsLocalPlayer, 'io', 'il bambino' )] riceva un nuovo nome."

agot_wildling_events.0100.t:0 "Un nome prende forma"
agot_wildling_events.0100.desc.me:0 "[ROOT.Char.GetFirstNameNoTooltip].\n\nNon più un nome da latte, ma ora un vero nome, tratto dalle creature del mondo, com'è costume tra la mia gente.\n\nÈ il primo passo oltre l'infanzia, anche se non è ancora il nome che porterò da [ROOT.Char.GetWomanMan] adult[Select_CString(ROOT.Char.IsFemale,'a','o')]."
agot_wildling_events.0100.desc:0 "[child.GetFirstNameNoTooltip].\n\nNon più un nome da latte, ma ora un vero nome, tratto dalle creature del mondo, com'è costume tra la nostra gente.\n\nSegna il primo passo oltre l'infanzia, anche se non è ancora il nome che [Select_CString(child.IsFemale,'lei','lui')] porterà da adult[Select_CString(child.IsFemale,'a','o')]."
agot_wildling_events.0100.a:0 "Un nome guadagnato crescendo."

agot_wildling_events.0101.t:0 "Un nome completato"
agot_wildling_events.0101.desc.me:0 "[ROOT.Char.GetFirstNameNoTooltip].\n\nIl nome della mia infanzia è scomparso; il mio nome ora porta un epiteto che riflette ciò che sono [Select_CString(ROOT.Char.IsFemale,'diventata','diventato')], com'è costume tra la mia gente.\n\nÈ un nome adatto all'età adulta."
agot_wildling_events.0101.desc:0 "[child.GetFirstNameNoTooltip].\n\nIl nome d'infanzia [Select_CString(child.IsFemale,'di lei','di lui')] è scomparso; il [Select_CString(child.IsFemale,'suo','suo')] nome ora porta un epiteto che riflette ciò che [Select_CString(child.IsFemale,'lei','lui')] è diventat[Select_CString(child.IsFemale,'a','o')], com'è costume tra la nostra gente.\n\nÈ un nome adatto all'età adulta."
agot_wildling_events.0101.a:0 "Un nome reso intero."
