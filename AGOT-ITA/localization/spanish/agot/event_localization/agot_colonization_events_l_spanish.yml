l_spanish:

 ### Wolf Den ###

  agot_colonization_events.1001.t:0 "[obstacle_province.GetNameNoTooltip]: Affrontare i lupi"
  agot_colonization_events.1001.desc:0 "I miei esploratori setacciano da giorni [obstacle_province.Custom('TerrainTypeProvince')] di [obstacle_province.GetName].\n\nLa maggior parte è tornata a mani vuote; alcuni non sono tornati affatto. Comincio a domandarmi se questa presunta tana dei lupi esista davvero, o se i lupi che si aggirano per queste terre siano frutto di qualche magia o diavoleria.\n\nInfine, il mio ultimo esploratore si presenta al mio cospetto, con gli abiti laceri e lo sguardo scosso.\n\n"Mio [ROOT.Char.GetLadyLord], l'ho trovata! La tana è ben celata nelle profondità di [obstacle_province.Custom('TerrainTypeProvince')], e i lupi là sono molti e feroci.\""
  agot_colonization_events.1001.a:0 "Me ne occuperò io stesso."
  agot_colonization_events.1001.a.duel_success:0 "Sconfiggi i lupi"
  agot_colonization_events.1001.a.duel_failure:0 "VienI sopraffatt[Select_CString(CHARACTER.IsFemale,'a','o')] dai lupi"
  agot_colonization_events.1001.b:0 "Il mio $knight_culture_player_no_tooltip_lowercase$, [knight.Custom('IT_NAM_COL3')][knight.GetTitledFirstNameNoTooltip], ne farà un sol boccone."
  agot_colonization_events.1001.b.duel_success:0 "[knight.GetFirstNameNoTooltip] sconfigge i lupi"
  agot_colonization_events.1001.b.duel_failure:0 "[knight.GetFirstNameNoTooltip] viene sopraffatt[Select_CString(knight.IsFemale,'a','o')] dai lupi"
  agot_colonization_events.1001.c:0 "[hooked_character.Custom('IT_NAM_COL3')][hooked_character.GetTitledFirstNameNoTooltip] mi deve un favore..."
  agot_colonization_events.1001.c.duel_success:0 "[hooked_character.GetFirstNameNoTooltip] sconfigge i lupi"
  agot_colonization_events.1001.c.duel_failure:0 "[hooked_character.GetFirstNameNoTooltip] viene sopraffatt[Select_CString(hooked_character.IsFemale,'a','o')] dai lupi"
  agot_colonization_events.1001.d:0 "Affiderò il compito a professionisti a pagamento."
  agot_colonization_events.1001.e:0 "Forse, per ora, dovrei lasciare in pace i lupi..."
  agot_colonization_events.1001.success.toast.t:0 "Tana dei lupi ripulita"
  agot_colonization_events.1001.failure.toast.t:0 "La tana dei lupi resiste"

  agot_colonization_events.1002.t:0 "[obstacle_province.GetNameNoTooltip]: Accerchiati"
  agot_colonization_events.1002.desc:0 "Speravo di raggiungere l'insediamento di [obstacle_province.GetName] prima del calar della notte, ma i continui ritardi ci hanno lasciati a qualche miglio di distanza quando è scesa la sera. Alla luce del crepuscolo, abbiamo piantato il campo ai margini di un boschetto di alberi robusti e ci siamo messi al lavoro per accendere un fuoco. Pur nel disagio, sento una calma calarmi addosso mentre ammiro la bellezza del cielo trapunto di stelle.\n\nAll'improvviso odo un ringhio. Dall'altra parte del fuoco scorgo un paio di occhi. Un attimo dopo, a quel paio se ne uniscono due dozzine, e capisco che siamo circondati. Un ululato crudele ci trafigge le orecchie e il nostro errore diventa chiaro — abbiamo accampato accanto a una tana dei lupi! Ecco la fonte del terrore grigio che ha tormentato il nostro nuovo insediamento sin dalla fondazione."
  agot_colonization_events.1002.a:0 "A me! Faremo pellicce di questi demoni!"
  agot_colonization_events.1002.b:0 "[knight.GetFirstNameNoTooltip], difendici da queste bestie!"
  agot_colonization_events.1002.c:0 "Prendete una torcia accesa, e filiamo via!"

  agot_colonization_events.1003.t:0 "[obstacle_province.GetNameNoTooltip]: Madre Lupa"
  agot_colonization_events.1003.desc:0 "Dopo mesi di ricerche, alla fine è stata scoperta — la grande tana dei lupi di [obstacle_province.GetName]. Il branco era enorme e d'una scaltrezza inquietante, spesso tendendo agguati ai mercanti diretti a rifornire il nostro avamposto nascente, ma ora l'abbiamo circondato.\n\nMolte pelli sono già ammucchiate nel nostro campo, eppure vi è una certa apprensione nel dare l'ultima spinta per distruggere la tana, poiché il branco è guidato da una grande lupa, quasi grande quanto un pony e col muso tinto di cremisi dal sangue delle sue prede. Quando ci avviciniamo, la paura cresce: la lupa si para davanti a un mucchio di cuccioli che si dimenano, e il suo ringhio e i suoi morsi chiariscono che intende difenderli con tutta la forza e la ferocia di cui è capace."
  agot_colonization_events.1003.a:0 "Non è che una cagna rognosa! Me ne occuperò io!"
  agot_colonization_events.1003.a.duel_success:0 "Riesci a uccidere la lupa"
  agot_colonization_events.1003.a.duel_failure:0 "Fallisci nell'uccidere la lupa"
  agot_colonization_events.1003.b:0 "Circondatela! Insieme la abbatteremo!"
  agot_colonization_events.1003.b.duel_success:0 "Riesci ad accerchiare la lupa"
  agot_colonization_events.1003.b.duel_failure:0 "La lupa riesce a fuggire"
  agot_colonization_events.1003.c:0 "Ehm, forse dovremmo tornare più tardi."

  agot_colonization_events.1004.t:0 "[obstacle_province.GetNameNoTooltip]: Cani lupo"
  agot_colonization_events.1004.desc:0 "Mi giungono notizie interessanti da [obstacle_province.GetName]. I coloni laggiù hanno portato molteplici cani domestici nelle loro terre, che fungono da guardiani leali e affidabili per bestiame e famiglie. Tuttavia, ciò ha avuto conseguenze inquietanti. Man mano che la popolazione di lupi diminuisce e questi cani domestici vagano in numero crescente, una specie ibrida ha iniziato a divenire più comune, poiché lupi e segugi si incrociano.\n\nQuesti 'cani lupo' possiedono le caratteristiche di un lupo ma il temperamento di un cane, e sono divenuti piuttosto popolari tra la popolazione locale come animali da compagnia e guardiani. Ma alcuni temono che tali ibridi siano troppo selvaggi per essere davvero addomesticati, o che possano formare branchi ferali propri qualora la popolazione crescesse senza controllo!"
  agot_colonization_events.1004.a:0 "Questa pratica va fermata, e va avviato un abbattimento."
  agot_colonization_events.1004.b:0 "Il corpo di un lupo, ma la lealtà di un cane..."
  agot_colonization_events.1004.c:0 "Che preda interessante sarebbero!"
  agot_colonization_events.1004.a.duel_success:0 "[obstacle_province.GetName] ottiene un avvistamento di lupi"
  agot_colonization_events.1004.a.success.toast.t:0 "Lupi liberati con successo in natura"
  agot_colonization_events.1004.a.duel_failure:0 "Non riesci a liberare i lupi"
  agot_colonization_events.1004.a.failure.toast.t:0 "Sdegno popolare"
  agot_colonization_events.1004.b.duel_success:0 "Riesci ad addestrare un cane lupo"
  agot_colonization_events.1004.b.success.toast.t:0 "Il migliore amico dell'uomo"
  agot_colonization_events.1004.b.duel_failure:0 "Non riesci ad addomesticare il lupo"
  agot_colonization_events.1004.b.failure.toast.t:0 "Lupo selvatico non domato"

  agot_colonization_events.1005.t:0 "[obstacle_province.GetNameNoTooltip]: Gli Svaniti"
  agot_colonization_events.1005.desc:0 "Tristi notizie da [obstacle_province.GetName] giungono oggi alla mia attenzione: una recente catena di tragedie ha scosso gli insediamenti laggiù. I branchi di lupi dell'area, apparentemente rincuorati dalle continue invasioni del loro territorio, hanno iniziato a colpire giovani, indifesi e anziani in gran numero.\n\nCon un'audacia mai vista prima, hanno persino cominciato a aggirarsi nei villaggi di notte in branchi enormi! Occorre fare qualcosa prima che i lupi si facciano tanto arditi da rapire i neonati dalle loro stesse culle."
  agot_colonization_events.1005.a:0 "Dobbiamo organizzare i villani e portare la lotta ai lupi!"
  agot_colonization_events.1005.a.duel_success:0 "La tana dei lupi viene ripulita"
  agot_colonization_events.1005.a.duel_failure:0 "La tana dei lupi resiste e la colonia va perduta"
  agot_colonization_events.1005.success.toast.t:0 "Tana dei lupi ripulita!"
  agot_colonization_events.1005.failure.toast.t:0 "Fallito nel ripulire la tana dei lupi"
  agot_colonization_events.1005.b:0 "Radunate i villani e bruciate i lupi fuori dalla tana."
  agot_colonization_events.1005.b.duel_success:0 "Bruci la tana dei lupi"
  agot_colonization_events.1005.b.duel_failure:0 "La tana dei lupi resiste e la colonia va perduta"
  agot_colonization_events.1005.c:0 "Sfortunato, ma questi sono i rischi della frontiera."

  agot_colonization_events.1006.t:0 "[obstacle_province.GetNameNoTooltip]: Cacciat[Select_CString(CHARACTER.IsFemale,'a','o')]"
  agot_colonization_events.1006.desc:0 "Quello che pareva un semplice abbattimento è rapidamente sfuggito di mano. Un grande lupo nero ha seguito la mia banda e ha colpito nella notte sotto la copertura della nebbia, assieme al suo branco vendicativo. I cacciatori che ho condotto nella tana dei lupi di [obstacle_province.GetName] sono stati abbattuti uno a uno, e presto rimango sol[Select_CString(CHARACTER.IsFemale,'a','o')], faccia a faccia con la bestia innaturale.\n\nÈ di gran lunga il lupo più grande che io abbia mai visto, e il bagliore inquietantemente intelligente nei suoi occhi promette una lunga e miserabile morte qualora non abbandoni immediatamente il suo territorio."
  agot_colonization_events.1006.a:0 "Sarai un ottimo tappeto."
  agot_colonization_events.1006.a.duel_success:0 "La tana dei lupi viene ripulita"
  agot_colonization_events.1006.a.duel_failure:0 "La tana dei lupi resiste"
  agot_colonization_events.1006.success.toast.t:0 "Tana dei lupi ripulita!"
  agot_colonization_events.1006.failure.toast.t:0 "Fallito nel ripulire la tana dei lupi"
  agot_colonization_events.1006.b:0 "Se appicco un incendio, posso intrappolare la bestia e ucciderla così."
  agot_colonization_events.1006.c:0 "Me ne andrò coraggiosamente, coraggiosamente in fuga!"
  agot_colonization_events.1006.b.duel_success:0 "La tana dei lupi viene ripulita"
  agot_colonization_events.1006.b.duel_failure:0 "La tana dei lupi resiste"

  agot_colonization_events.1007.t:0 "[obstacle_province.GetNameNoTooltip]: Ululati dalle colline"
  agot_colonization_events.1007.desc:0 "Un messaggero giunge alla mia corte recando notizie dall'insediamento di [obstacle_province.GetName]. Le nuove sono buone, eppure, quando il messaggero conclude il suo rapporto, riporta una richiesta da parte dei villani: sebbene abbiano scacciato la maggior parte dei lupi dall'insediamento, un branco considerevole permane ancora sulle colline a qualche miglio dal villaggio. Chiedono il mio aiuto per distruggerli una volta per tutte.\n\nIl mio [steward.Custom('GetCouncilOrCourtPosition')] interviene: "Se i lupi sono stati davvero ricacciati sulle colline, a miglia dall'insediamento, credo vi sia poco bisogno che ci intromettiamo. I lupi finiranno per andarsene da soli.\""
  agot_colonization_events.1007.a:0 "Non correremo rischi. Invierò l'aiuto necessario."
  agot_colonization_events.1007.b:0 "Devo dar ragione a [steward.GetFirstName], i lupi ormai rappresentano poca minaccia."
  agot_colonization_events.1007.success.toast.t:0 "I lupi si disperdono naturalmente"
  agot_colonization_events.1007.failure.toast.t:0 "I lupi restano"

  agot_colonization_events.1008.t:0 "[obstacle_province.GetNameNoTooltip]: Circoli di caccia"
  agot_colonization_events.1008.desc:0 "Grazie al diligente sforzo di sradicare la pericolosa popolazione di lupi in [obstacle_province.GetName], i cacciatori hanno iniziato a formare circoli di caccia per coordinare meglio le proprie azioni.\n\nOltre all'ovvio beneficio di rendere l'abbattimento dei lupi più sicuro e semplice, ciò ha cominciato a favorire una distinta sottocultura nella contea, poiché la caccia diviene più diffusa e apprezzata tra i forti e i coraggiosi delle comunità locali, come passatempo."
  agot_colonization_events.1008.a:0 "Una moda passeggera, ma non priva d'interesse."
  agot_colonization_events.1008.success.toast.t:0 "Circoli di caccia favoriti!"
  agot_colonization_events.1008.failure.toast.t:0 "La caccia ai lupi sfugge di mano!"
  agot_colonization_events.1008.b:0 "Dovremmo incoraggiare ulteriormente questi circoli di caccia!"
  agot_colonization_events.1008.b.duel_success:0 "Riesci a favorire i circoli di caccia"
  agot_colonization_events.1008.b.duel_failure:0 "La caccia sfugge di mano..."
  agot_colonization_events.1008.c:0 "Dovrei far visita a questa gente; avranno certo qualche consiglio e trucco da condividere."

  agot_colonization_events.1009.t:0 "[obstacle_province.GetNameNoTooltip]: Ululati nella notte"
  agot_colonization_events.1009.desc:0 "Mentre visito [obstacle_province.GetName] per verificare i progressi della colonia, noto la devastazione assoluta di alcuni villaggi — città fantasma mezze vuote, con villani stravolti protetti da fragili palizzate, a stento trattenuti dal crollare a terra per la stanchezza dai loro stessi forconi. I lupi, dicono, sono così numerosi e terribili che persino sopravvivere alle notti è una sfida. La situazione è insostenibile.\n\nMentre il mio seguito e io ci prepariamo a tornare a casa per radunare una forza che abbatta i lupi, mi separo dal resto del gruppo con solo una manciata di persone. Poco dopo, la tetra quiete della notte viene spezzata dagli ululati di ciò che dev'essere almeno un centinaio di lupi. In un batter d'occhio, il mio drappello è circondato da ogni lato da lupi ringhianti e mordaci, tenuti a bada soltanto dalla luce delle nostre torce. Ma man mano che la fiamma si affievolisce, i lupi stringono il cerchio sempre di più..."
  agot_colonization_events.1009.a:0 "In formazione! In formazione e lasciamo che si infrangano su di noi!"
  agot_colonization_events.1009.a.duel_success:0 "Le tue abilità marziali respingono l'attacco dei lupi"
  agot_colonization_events.1009.a.duel_failure:0 "Le tue abilità marziali non bastano a impedire l'attacco dei lupi"
  agot_colonization_events.1009.success.toast.t:0 "Difes[Select_CString(CHARACTER.IsFemale,'a','o')] dai lupi"
  agot_colonization_events.1009.failure.toast.t:0 "Ferit[Select_CString(CHARACTER.IsFemale,'a','o')] dai lupi!"
  agot_colonization_events.1009.b:0 "Tenete vivi i fuochi! Dobbiamo resistere!"
  agot_colonization_events.1009.b.duel_success:0 "Riesci a scacciare i lupi con il fuoco"
  agot_colonization_events.1009.b.duel_failure:0 "Il fuoco non si rivela sufficiente..."
  agot_colonization_events.1009.c:0 "[knight.GetName], proteggi [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]!"
  agot_colonization_events.1009.c.duel_success:0 "[knight.GetNameNoTooltip] combatte coraggiosamente i lupi"
  agot_colonization_events.1009.c.duel_failure:0 "Tu e [knight.GetNameNoTooltip] rimanete ferit[Select_CString(CHARACTER.IsFemale,'i','i')] nell'attacco"

 ### Bear Den ###

  agot_colonization_events.1101.t:0 "[obstacle_province.GetNameNoTooltip]: Yoh-gi"
  agot_colonization_events.1101.desc:0 "I miei coloni in [obstacle_province.GetName] sono abituati a vedere orsi aggirarsi nei pressi della loro colonia. Di norma basta un poco di prudenza in più, e persino le bestie più curiose possono spesso essere dissuase dal vigoroso clangore di padelle da cucina.\n\nUn orso, però, è diverso. Conosciuto come "Yoh-gi" nel dialetto locale, è più astuto dell'orso comune: pedina le squadre di lavoro e le assale ogni volta che si fermano per un pasto. Non appena gli operai si disperdono, saccheggia i loro bagagli in cerca di provviste, rubando qualunque cibo essi abbiano portato con sé.\n\nNell'insediamento v'è un acceso dibattito su come affrontare il problema. La colonia ha assoldato dei ranger, i quali desiderano organizzare una spedizione contro l'orso. Tuttavia, il fabbro dell'insediamento ritiene che l'orso possa essere attirato in un ingegnoso trabocchetto di sua ideazione, adescato con un alveare ricolmo di miele."
  agot_colonization_events.1101.a:0 "Sovrintendi alla spedizione dei ranger."
  agot_colonization_events.1101.a.duel_success:0 "I ranger abbattono con successo Yoh-gi e il resto della sua razza"
  agot_colonization_events.1101.a.duel_failure:0 "I ranger vengono raggirati dall'orso"
  agot_colonization_events.1101.b:0 "Paga il fabbro perché costruisca la sua trappola."
  agot_colonization_events.1101.c:0 "Che sciocchezze! Mi sbarazzerò io stesso di questa bestia."
  agot_colonization_events.1101.c.duel_success:0 "Abbatto con successo Yoh-gi e il resto della sua razza"
  agot_colonization_events.1101.c.duel_failure:0 "Vengo raggirato e sopraffatto dall'orso"
  agot_colonization_events.1101.d:0 "Ehi, ehi, ehi! Lasciate in pace quell'orso!"
  agot_colonization_events.1101.success.toast.t:0 "Tana d'orsi ripulita"
  agot_colonization_events.1101.failure.toast.t:0 "La tana d'orsi resiste"

  agot_colonization_events.1102.t:0 "[obstacle_province.GetNameNoTooltip]: Prezzo d'orso"
  agot_colonization_events.1102.desc:0 "Dopo quattro giorni a marciare su un terreno impervio, la mia caccia all'orso si avvicina al suo epilogo. Una grande orsa si erge all'imboccatura d'una caverna, lo sguardo fisso su di me. Si alza sulle zampe posteriori e ruggisce, ma pare riluttante a caricare e ad abbandonare il riparo del suo antro roccioso. Scambiandolo per segno di debolezza, balzo in avanti e le conficco la lancia nel petto. Dopo una breve lotta, l'orsa crolla, tremante. Con le ultime forze, mi guarda ancora negli occhi con un'espressione che pare quasi... supplichevole. Turbato, indietreggio e lascio cadere la lancia.\n\nÈ allora che odo il miagolio.\n\nIn fondo alla caverna scopro l'origine del rumore — un piccolo cucciolo, ancora cieco e debole, striscia verso di me. Un senso di colpa travolgente mi stringe. Nutrilo sarebbe costoso, ma forse potrei allevare io stesso l'orso..."
  agot_colonization_events.1102.a:0 "Porrò fine alle sue sofferenze."
  agot_colonization_events.1102.b:0 "Tenterò di allevare io stesso il cucciolo."
  agot_colonization_events.1102.b.success.toast.t:0 "Addestramento riuscito"
  agot_colonization_events.1102.b.failure.toast.t:0 "Addestramento fallito"
  agot_colonization_events.1102.c:0 "Forse può sopravvivere da solo..."

  agot_colonization_events.1103.t:0 "[obstacle_province.GetNameNoTooltip]: L'incursione"
  agot_colonization_events.1103.desc:0 "Il nuovo insediamento a [obstacle_province.GetNameNoTier] sta prendendo forma con bell'aspetto. Un grappolo di edifici è già sorto, e il fumo sale al cielo da innumerevoli camini e bracieri. La terra è stata dissodata per le coltivazioni e la natura selvaggia cede a poco a poco a un paesaggio domato e curato. Mentre medito sui progressi compiuti, il mio rapimento viene spezzato da un urlo.\n\nUn orso! Il suo enorme corpo irrompe nel cuore dell'insediamento, sparpagliando i coloni come birilli."
  agot_colonization_events.1103.a:0 "Portatemi un arco! Lo abbatterò io stesso."
  agot_colonization_events.1103.a.duel_success:0 "Riesci a uccidere l'orso"
  agot_colonization_events.1103.a.duel_failure:0 "Non riesci a uccidere l'orso"
  agot_colonization_events.1103.b:0 "Suonate i corni! Dobbiamo porre fine a tutto ciò!"
  agot_colonization_events.1103.b.duel_success:0 "Il tuo gruppo riesce a uccidere l'orso"
  agot_colonization_events.1103.b.duel_failure:0 "Il tuo gruppo non riesce a uccidere l'orso"
  agot_colonization_events.1103.c:0 "Fuggite! Questo nemico è più grande di qualunque di noi"
  agot_colonization_events.1103.failure.toast.t:0 "La tana d'orsi resiste"
  agot_colonization_events.1103.success.toast.t:0 "Tana d'orsi ripulita"

  agot_colonization_events.1104.t:0 "[obstacle_province.GetNameNoTooltip]: Orso dei funghi"
  agot_colonization_events.1104.desc:0 "Il mio [steward.Custom('GetCouncilOrCourtPosition')] [steward.GetFirstName] mi reca notizie dalla nostra colonia nascente a [obstacle_province.GetName]. È un racconto tanto sconcertante che [steward.GetFirstNameNoTooltip] ha insistito per verificarlo prima di riferirmelo, ma ora è certo della sua veridicità. Pare che uno dei nostri coloni abbia scoperto una varietà di fungo particolarmente potente, il cui consumo dona visioni prodigiose e una sensazione di euforia intensa.\n\nFin qui, nulla di male, ma una coltivazione di funghi è stata saccheggiata da un orso locale di dimensioni spaventose. Da allora, l'orso s'è dato a una furia smisurata, distruggendo case e granai e trucidando coloni, al punto che la colonia ora affronta una minaccia esistenziale."
  agot_colonization_events.1104.a:0 "Dirottate parte delle nostre leve per occuparsi di questa minaccia pelosa."
  agot_colonization_events.1104.a.duel_failure:0 "Le tue leve non riescono a scacciare l'orso"
  agot_colonization_events.1104.a.duel_success:0 "Le tue leve riescono a scacciare l'orso"
  agot_colonization_events.1104.b:0 "Scavate una fossa irta di pali e attirate l'orso con funghi freschi"
  agot_colonization_events.1104.b.duel_failure:0 "L'orso riesce a sfuggire alla tua trappola"
  agot_colonization_events.1104.b.duel_success:0 "Riesci ad attirare l'orso nella tua trappola"
  agot_colonization_events.1104.c:0 "Vorrei provare alcuni di questi funghi... a fini medicinali."
  agot_colonization_events.1104.c.success.toast.t:0 "Sotto funghi"
  agot_colonization_events.1104.c.failure.toast.t:0 "Brutto viaggio"
  agot_colonization_events.1104.failure.toast.t:0 "La tana d'orsi resiste"
  agot_colonization_events.1104.success.toast.t:0 "Orso scacciato"

  agot_colonization_events.1105.t:0 "[obstacle_province.GetNameNoTooltip]: Più di quanto appaia"
  agot_colonization_events.1105.desc:0 "Le terre attorno a [obstacle_province.GetName] sono da lungo tempo rinomate per i grandi orsi che vi trovano dimora.\n\nMentre visito la mia colonia per verificarne i progressi, vengo fermato sulla strada da quella che pare essere una piccola famiglia di orsi enormi. A guidarli, a quanto sembra, è un uomo imponente come una bestia, il quale pretende che ce ne andiamo dalle loro terre, o essi esigeranno vendetta per tutti gli orsi che abbiamo ucciso."
  agot_colonization_events.1105.a:0 "Vorrei proprio vederti provare, selvaggio!"
  agot_colonization_events.1105.b:0 "Tieni i tuoi orsi lontani dai nostri insediamenti..."
  agot_colonization_events.1105.c:0 "Ce ne stavamo andando, non è vero, compagni?"
  agot_colonization_events.1105.toast.t:0 "L'orso rimane"
  agot_colonization_events.1105.a.duel_success:0 "Scacci il mutapelle"
  agot_colonization_events.1105.a.success.toast.t:0 "Tana d'orsi ripulita"
  agot_colonization_events.1105.a.duel_failure:0 "Non riesci a scacciare il mutapelle"
  agot_colonization_events.1105.a.failure.toast.t:0 "Orsi da caccia feriti"
  agot_colonization_events.1105.b.duel_success:0 "Riesci a concludere un accordo con il mutapelle"
  agot_colonization_events.1105.b.success.toast.t:0 "Coesistere"
  agot_colonization_events.1105.b.duel_failure:0 "Non riesci a concludere un accordo con il mutapelle"
  agot_colonization_events.1105.b.failure.toast.t:0 "La tana d'orsi resiste"

  agot_colonization_events.1106.t:0 "[obstacle_province.GetNameNoTooltip]: Il mangiauomini"
  agot_colonization_events.1106.desc:0 "Osserva nella notte. Alto sette piedi e pesante mezza tonnellata. Il suo manto è più spesso e duro delle scaglie di drago, le sue zanne e i suoi artigli più grandi di spade; il fetore del suo alito è più putrido d'un prato dopo la battaglia. Porta le cicatrici di cento scontri, e il suo volto mostra l'usura e i lividi di cent'anni.\n\nAlmeno, questo è quanto mi dicono le lettere da [obstacle_province.GetName]. È probabile che almeno una parte dei fatti su questo grande orso sia esagerata, eppure il senso è chiaro. Riferiscono molte cose: che è quasi invincibile; che è sopravvissuto a mille frecce; che massacra squadre di caccia di cinquanta uomini; e che entra nel villaggio di notte, inosservato, per sgozzare bestiame e gente — soprattutto gente! I coloni sono chiari: implorano aiuto, qualunque cosa; che questo terrore della notte venga eliminato una volta per tutte."
  agot_colonization_events.1106.success.toast.t:0 "Orso ucciso"
  agot_colonization_events.1106.failure.toast.t:0 "La tana d'orsi resiste"
  agot_colonization_events.1106.a:0 "Mandate i miei guerrieri migliori a massacrare questa bestia!"
  agot_colonization_events.1106.b:0 "[marshal.GetFirstName], raduna i coloni e portami la testa di questo orso."
  agot_colonization_events.1106.b.duel_success:0 "L'orso viene ucciso"
  agot_colonization_events.1106.b.duel_failure:0 "L'orso è sopravvissuto"
  agot_colonization_events.1106.c:0 "Ah, non è che la superstizione dei contadini! Possono occuparsi dell'orso da soli."

  agot_colonization_events.1107.t:0 "[obstacle_province.GetNameNoTooltip]: Nemici giurati"
  agot_colonization_events.1107.desc:0 "Man mano che la colonia in [obstacle_province.GetName] cresce, la fastidiosa popolazione d'orsi della zona viene cacciata — per sicurezza, per cibo e per semplice sport. Ma pare che le nostre azioni abbiano attirato l'ira di quegli orsi: mentre visito la colonia per verificarne i progressi, veniamo assediati da quelle bestiacce, insieme a quello che è di gran lunga l'orso più grande che abbia mai visto. Peggio ancora, sembra in qualche modo comandare gli orsi più piccoli!"
  agot_colonization_events.1107.success.toast.t:0 "Orso ucciso"
  agot_colonization_events.1107.failure.toast.t:0 "La tana d'orsi resiste"
  agot_colonization_events.1107.a:0 "È stagione d'orsi, ragazzi!"
  agot_colonization_events.1107.b:0 "Tagliate la testa a quella grossa bestia e gli orsi si disperderanno."
  agot_colonization_events.1107.duel_success:0 "L'orso viene ucciso"
  agot_colonization_events.1107.duel_failure:0 "L'orso è sopravvissuto"
  agot_colonization_events.1107.c:0 "Distrateteli per me mentre io, ehm, vado a prendere rinforzi!"

  agot_colonization_events.1108.t:0 "[obstacle_province.GetNameNoTooltip]: Orso in pasto"
  agot_colonization_events.1108.desc:0 "Decidendo di visitare [obstacle_province.GetName] per controllare il luogo, vengo accolto con un fastoso festival per segnare il mio arrivo. Il cibo è ammassato in alte pile e il bere scorre. All'apice della baldoria, vengo condotto in una grande arena e fatto sedere sul seggio elevato. Da una porta vengono condotti nell'arena alcuni cani grossi e dall'aria cattiva. E poi, con mia grande sorpresa, dall'altra ne esce lentamente un orso dall'aspetto triste!\n\nCome una saetta, i cani si lanciano contro la bestia, azzannandola. L'intero spettacolo diviene presto un'orgia di sangue, ma infine l'orso viene abbattuto dal segugio sopravvissuto. Mentre mi volto a guardare il governatore sorridente seduto accanto a me, considero quale debba essere la mia reazione a quello spettacolo."
  agot_colonization_events.1108.a:0 "Ecco ciò che chiamo intrattenimento!"
  agot_colonization_events.1108.b:0 "Questa è una pratica ripugnante, e non la farete mai più!"
  agot_colonization_events.1108.c:0 "...Come posso ricavarne denaro?"
  agot_colonization_events.1108.c.duel_success:0 "Riesci a monetizzare questi combattimenti con gli orsi"
  agot_colonization_events.1108.success.toast.t:0 "Monetizzazione riuscita"
  agot_colonization_events.1108.c.duel_failure:0 "Non riesci a monetizzare questi combattimenti con gli orsi"
  agot_colonization_events.1108.failure.toast.t:0 "Monetizzazione fallita"

  agot_colonization_events.1109.t:0 "[obstacle_province.GetNameNoTooltip]: Accidia e ferocia"
  agot_colonization_events.1109.desc:0 "Giunge sulla mia scrivania, questa mattina, una notizia piuttosto inquietante da [obstacle_province.GetName]. La popolazione locale d'orsi che vi si trova è stata, sin dall'inizio dell'insediamento, una costante spina nel fianco dei coloni a causa della natura aggressiva delle bestie. Criniti, dagli artigli a falce e dal pelo ispido, questi orsi sono pericolosi soprattutto per la loro ferocia — assalgono la gente con poca provocazione e poco preavviso. Le cose sono peggiorate al punto che il governatore locale mi ha chiesto personalmente d'intervenire e di affrontare la minaccia che questi orsi labiati rappresentano."
  agot_colonization_events.1109.success.toast.t:0 "Orso ucciso"
  agot_colonization_events.1109.failure.toast.t:0 "La tana d'orsi resiste"
  agot_colonization_events.1109.a:0 "[knight.GetFirstName], ti va d'andare a caccia d'orsi?"
  agot_colonization_events.1109.b:0 "Qualcuno mi passi la mia buona lancia da orso!"
  agot_colonization_events.1109.duel_success:0 "L'orso viene ucciso"
  agot_colonization_events.1109.duel_failure:0 "L'orso è sopravvissuto"
  agot_colonization_events.1109.c:0 "Molto interessante, ma semplicemente non ho tempo."

 ### Bandit Den ###

  agot_colonization_events.1201.t:0 "[obstacle_province.GetNameNoTooltip]: I Reietti"
  agot_colonization_events.1201.desc.1:0 "Da settimane ricevo lettere supplichevoli dall'insediamento di [obstacle_province.GetName]. Sono tormentati da una banda di fuorilegge che ha più volte razziato le scorte di cibo della cittadina."
  agot_colonization_events.1201.desc.2.marshal:0 "Il mio [marshal.GetCouncilTitle], [marshal.GetName], suggerisce una spedizione punitiva per scacciare i banditi.\n\nTuttavia, "
  agot_colonization_events.1201.desc.2.knight:0 "Il mio consigliere militare, [marshal.GetName], suggerisce una spedizione punitiva per scacciare i banditi.\n\nTuttavia, "
  agot_colonization_events.1201.desc.3.spymaster:0 "il mio [spymaster.GetCouncilTitle], [spymaster.GetName], sussurra che in questa faccenda vi sia più di quanto appaia. Pare che i fuorilegge fossero tra i primissimi coloni e, per lo più, sudditi integri — finché non furono cacciati dalle loro case da ex soldati meglio armati e meno inclini a costruire rifugi con le proprie mani, quando potevano rubare quelli già eretti."
  agot_colonization_events.1201.desc.3.scholar:0 "lo studioso, [spymaster.GetName], sussurra che in questa faccenda vi sia più di quanto appaia. Pare che i fuorilegge fossero tra i primissimi coloni e, per lo più, sudditi integri — finché non furono cacciati dalle loro case da ex soldati meglio armati e meno inclini a costruire rifugi con le proprie mani, quando potevano rubare quelli già eretti."
  agot_colonization_events.1201.a:0 "Non m'importa chi sia arrivato per primo. Risolvetela con le spade!"
  agot_colonization_events.1201.a.duel_success:0 "I tuoi uomini abbattono l'ultimo dei facinorosi."
  agot_colonization_events.1201.a.duel_failure:0 "I tuoi uomini sono respinti dai banditi."
  agot_colonization_events.1201.b:0 "Concedi il perdono ai fuorilegge e restituiscili alle loro terre."
  agot_colonization_events.1201.b.duel_success:0 "Forgi un accordo giusto per i reietti"
  agot_colonization_events.1201.b.duel_failure:0 "I tuoi tentativi di trovare giustizia per i reietti falliscono"
  agot_colonization_events.1201.c:0 "Forse possono giungere a un compromesso..."
  agot_colonization_events.1201.c.duel_success:0 "Raggiungi un accordo tra i reietti e i coloni"
  agot_colonization_events.1201.c.duel_failure:0 "Non riesci a raggiungere un accordo tra i reietti e i coloni"
  agot_colonization_events.1201.d:0 "Non ho tempo per questo, ora!"
  agot_colonization_events.1201.success.toast.t:0 "Banditi sgominati"
  agot_colonization_events.1201.failure.toast.t:0 "I banditi restano"

  agot_colonization_events.1202.t:0 "[obstacle_province.GetNameNoTooltip]: Il Recinto"
  agot_colonization_events.1202.desc.marshal:0 "Il mio [marshal.GetCouncilTitle], [marshal.GetName], mi reca notizie esultanti. La guarnigione locale ha scoperto il nascondiglio di un gruppo di banditi che ha terrorizzato il mio insediamento di [obstacle_province.GetName]. I soldati hanno accerchiato i fuorilegge e, negli ultimi giorni, vi è stato un intenso scambio di frecce. Ma, finora, non c'è stata alcuna spinta decisiva per porre fine allo stallo.\n\nIl capo dei banditi pare disposto a combattere fino all'ultimo, se necessario, ma ha offerto di lasciare l'area in cambio di un lauto compenso."
  agot_colonization_events.1202.desc.knight:0 "Il mio consigliere militare, [marshal.GetNameNoTooltip], mi reca notizie esultanti. La guarnigione locale ha scoperto il nascondiglio di un gruppo di banditi che ha terrorizzato il mio insediamento di [obstacle_province.GetNameNoTooltip]. I soldati hanno accerchiato i fuorilegge e, negli ultimi giorni, vi è stato un intenso scambio di frecce. Ma, finora, non c'è stata alcuna spinta decisiva per porre fine allo stallo.\n\nIl capo dei banditi pare disposto a combattere fino all'ultimo, se necessario, ma ha offerto di lasciare l'area in cambio di un lauto compenso."
  agot_colonization_events.1202.a:0 "Schiacciateli!"
  agot_colonization_events.1202.a.duel_success:0 "I tuoi uomini abbattono l'ultimo dei facinorosi."
  agot_colonization_events.1202.a.duel_failure:0 "I tuoi uomini sono respinti dai banditi."
  agot_colonization_events.1202.b:0 "E se li persuadessimo ad arruolarsi?"
  agot_colonization_events.1202.b.duel_success:0 "Convinci il capo dei banditi ad aiutare a difendere la colonia in cambio di un compenso continuativo."
  agot_colonization_events.1202.b.duel_failure:0 "I tuoi tentativi di negoziare falliscono."
  agot_colonization_events.1202.c:0 "Suppongo di poter pagare le loro spese di viaggio..."

  agot_colonization_events.1203.t:0 "[obstacle_province.GetNameNoTooltip]: La Fratellanza"
  agot_colonization_events.1203.desc:0 "Il banditismo è un problema a [obstacle_province.GetName] da tempo. Ciò che all'inizio era soltanto un insieme di bande isolate di teppisti e briganti, col tempo ha iniziato a consolidarsi sotto il comando di pochi capi selezionati. Spietati, astuti e ambiziosi, questi banditi sono cresciuti a tal punto e si sono organizzati così bene da intimidire la misera guarnigione di [obstacle_province.GetNameNoTooltip], costringendola a deporre le armi e ad accettare questa cosiddetta 'Fratellanza' come nuovi governanti della colonia. Questo, naturalmente, mi allarma assai.\n\nRadunata una schiera di guerrieri addestrati, mi preparo a marciare su [obstacle_province.GetNameNoTooltip] per riprenderla da questi usurpatori. Ma, al mio arrivo, vengo accolto sotto bandiera di tregua. I capi della Fratellanza si fanno avanti per incontrarmi e presentano un'offerta. Essi proteggeranno [obstacle_province.GetNameNoTooltip] con le loro forze e la faranno prosperare con il loro lavoro in cambio di clemenza e di un periodo di esenzione dalle tasse, mentre la Fratellanza diventa una gilda legittima nell'area. A giudicare da quanto [obstacle_province.GetNameNoTooltip] sia diventata ben costruita sotto la loro gestione, forse dovrei accettare..."
  agot_colonization_events.1203.a:0 "Davvero pensavate che avrebbe funzionato?"
  agot_colonization_events.1203.a.duel_success:0 "I tuoi uomini uccidono i membri della Fratellanza."
  agot_colonization_events.1203.a.duel_failure:0 "I tuoi uomini sono respinti dai banditi."
  agot_colonization_events.1203.b:0 "Offerta interessante! Ma ne ho una assai migliore."
  agot_colonization_events.1203.b.duel_success:0 "Convinci la gilda a lasciare la colonia in cambio di un compenso."
  agot_colonization_events.1203.b.duel_failure:0 "I tuoi tentativi di negoziare falliscono."
  agot_colonization_events.1203.c:0 "Accettato! Presterete qui i vostri giuramenti di fedeltà."
  agot_colonization_events.1203.success.toast.t:0 "Banditi sgominati"
  agot_colonization_events.1203.failure.toast.t:0 "I banditi restano"

  agot_colonization_events.1204.t:0 "[obstacle_province.GetNameNoTooltip]: Tribù di Bruti"
  agot_colonization_events.1204.desc:0 "Oltre la Barriera è scarsamente abitata da lungo tempo. I pochi che ancora chiamano casa questo luogo gelido sono primitivi, tenaci e dal cuore di pietra. Man mano che [obstacle_province.GetName] cresce, cresce anche l'ira dei locali, poiché devono contendersi le poche risorse che si possono trovare nella zona.\n\nQuelli che un tempo erano soltanto tesi confronti a distanza hanno iniziato a degenerare in scaramucce su piccola scala, razzie di bestiame e occasionali rapimenti a scopo di riscatto. Se queste tribù decidessero di farsi giustizia da sole, c'è una concreta possibilità che distruggano del tutto [obstacle_province.GetNameNoTooltip] qualora lanciassero una razzia. Occorre agire."
  agot_colonization_events.1204.a:0 "Disperdete questi banditi!"
  agot_colonization_events.1204.a.duel_success:0 "I tuoi uomini uccidono i banditi"
  agot_colonization_events.1204.a.duel_failure:0 "I tuoi uomini sono respinti dai banditi"
  agot_colonization_events.1204.b:0 "Invia un emissario al Capotribù."
  agot_colonization_events.1204.b.duel_success:0 "Stabilisci confini chiari tra la nostra gente"
  agot_colonization_events.1204.b.duel_failure:0 "I tuoi tentativi di negoziare falliscono"
  agot_colonization_events.1204.c:0 "Come se questi selvaggi straccioni fossero una minaccia."
  agot_colonization_events.1204.success.toast.t:0 "Banditi sgominati"
  agot_colonization_events.1204.failure.toast.t:0 "I banditi restano"

  agot_colonization_events.1205.t:0 "[obstacle_province.GetNameNoTooltip]: Il Traditore"
  agot_colonization_events.1205.desc:0 "La lotta ai banditi di [obstacle_province.GetName] è stata dura e lenta, ma per lo più costante. Là dove prima accampamenti di banditi e briganti punteggiavano le terre selvagge, la maggior parte dei loro avamposti è stata distrutta. Eppure, per i coloni, la minaccia non è svanita. I banditi rimasti e i sopravvissuti si sono riuniti, formando un unico grande campo.\n\nUna mattina, un[traitor.Custom('DE_PRO_PER_S_3P_N')] [traitor.GetWomanMan] dall'aspetto lacero e selvaggio s'inginocchia davanti al mio trono.\n\n"Vostra Altezza, so che i poveri villani di [obstacle_province.GetNameNoTooltip] hanno sofferto molto per la piaga dei banditi, vivendo ogni giorno nel timore d'un attacco!" [traitor.GetSheHe|U] ghigna. "Ho una proposta per voi: faccio entrare di notte alcune delle vostre guardie del villaggio e potranno uccidere fino all'ultimo bandito! In cambio chiedo solo una misera somma d'oro, ben minore di quanto servirebbe per distruggere il campo con la forza."\n\nÈ una proposta interessante..."
  agot_colonization_events.1205.a:0 "Molto bene, se lo dici tu."
  agot_colonization_events.1205.a.duel_success:0 "Il piano riesce come previsto."
  agot_colonization_events.1205.a.duel_failure:0 "Vieni tradit[Select_CString(CHARACTER.IsFemale,'a','o')]."
  agot_colonization_events.1205.b:0 "I miei soldati spazzeranno via la feccia dei banditi."
  agot_colonization_events.1205.b.duel_success:0 "I tuoi uomini uccidono i banditi."
  agot_colonization_events.1205.b.duel_failure:0 "I tuoi uomini sono respinti dai banditi."
  agot_colonization_events.1205.c:0 "Non ho bisogno del tuo aiuto."
  agot_colonization_events.1205.success.toast.t:0 "Banditi sgominati"
  agot_colonization_events.1205.failure.toast.t:0 "I banditi restano"

  agot_colonization_events.1206.t:0 "[obstacle_province.GetNameNoTooltip]: Il Brigante Astuto"
  agot_colonization_events.1206.desc:0 "Mentre esamino gli ultimi resoconti dall'insediamento di [obstacle_province.GetName], trovo con sorpresa una lettera indirizzata a me. È stata inviata da [brigand.GetName], uno dei capi dei banditi che infestano la regione.\n\nIl contenuto della lettera è tanto audace quanto sfrontato: [ brigand.GetFirstName ] chiede il mio permesso di rivendicare l'insediamento come proprio, in cambio di un giuramento di fedeltà e del divenire mio vassallo.\n\nPer quanto sia un'offerta davvero inusuale, forse vi è del merito da trovarvi?"
                                                                                                                                                                                                                         agot_colonization_events.1206.a:0 "Oltraggioso. Fate catturare questo sciocco."
                                                                                                                                                                                                                         agot_colonization_events.1206.b:0 "Piuttosto, recluterò questo brigante."
                                                                                                                                                                                                                         agot_colonization_events.1206.c:0 "Molto bene. Giura fedeltà a me."
                                                                                                                                                                                                                         agot_colonization_events.1206.c.tt.success:0 "[brigand.GetFirstNameNoTooltip] mantiene la parola."
                                                                                                                                                                                                                         agot_colonization_events.1206.c.tt.failure:0 "[brigand.GetFirstNameNoTooltip] si impadronisce di [obstacle_province.GetNameNoTooltip] per [brigand.GetHerselfHimself]."
                                                                                                                                                                                                                         agot_colonization_events.1206.d:0 "Non ho bisogno della tua fedeltà. [obstacle_province.GetNameNoTooltip] è tuo."
                                                                                                                                                                                                                         agot_colonization_events.1206.d.tt:0 "[brigand.GetFirstNameNoTooltip] riceve [obstacle_province.GetNameNoTooltip]."

 ### Dense Growth ###

  agot_colonization_events.1301.t:0 "[obstacle_province.GetNameNoTooltip]: Perso nei boschi"
  agot_colonization_events.1301.desc:0 "Mi giungono cattive notizie dall'insediamento di [obstacle_province.GetName]. Durante una visita e una passeggiata nel paesaggio circostante, [lost_person.GetNameNoTooltip] si è smarrit[Select_CString(lost_person.IsFemale,'a','o')] nei boschi profondi!\n\nSvanire senza lasciare traccia è impresa di cui pochi possono vantarsi, ma percepisco che questa sparizione non sia stata volontaria. [lost_person.GetFirstNameNoTooltip] potrebbe essere in grave pericolo...\n\nSpetta a me rispondere a questa situazione."
  agot_colonization_events.1301.a:0 "Non badate a spese! Voglio che [lost_person.GetHerHim] sia trovat[Select_CString(lost_person.IsFemale,'a','o')]!"
  agot_colonization_events.1301.b:0 "Guiderò io stesso la squadra di ricerca!"
  agot_colonization_events.1301.duel_success:0 "Salvi [lost_person.GetFirstNameNoTooltip]."
  agot_colonization_events.1301.duel_failure:0 "Non riesci a trovare [lost_person.GetFirstNameNoTooltip]."
  agot_colonization_events.1301.c:0 "I nostri sforzi dovrebbero invece andare ad aiutare l'insediamento."
  agot_colonization_events.1301.c.death:0 "Vengono trovati solo i resti di [lost_person.GetFirstNameNoTooltip]."
  agot_colonization_events.1301.c.vanished:0 "[lost_person.GetFirstNameNoTooltip] resta dispers[Select_CString(lost_person.IsFemale,'a','o')] senza traccia."
  agot_colonization_events.1301.c.laamp:0 "[lost_person.GetFirstNameNoTooltip] è sopravvissut[Select_CString(lost_person.IsFemale,'a','o')] diventando un[Select_CString(lost_person.IsFemale,'a','')][adventurer|E]."

  agot_colonization_events.1302.t:0 "[obstacle_province.GetNameNoTooltip]: Frutti della foresta"
  agot_colonization_events.1302.desc:0 "Ho ricevuto un rapporto dall'insediamento di [obstacle_province.GetName]. Le fitte foreste attorno alla colonia sono state sgomberate abbastanza da permettere l'installazione delle infrastrutture basilari nella provincia.\n\nAssieme a queste buone nuove, mi viene sottoposta una domanda da parte dell'insediamento: che cosa va fatto con tutto il legname abbattuto durante l'apertura dei sentieri nella foresta?"
  agot_colonization_events.1302.a:0 "Dovremmo vendere ciò che non ci serve."
  agot_colonization_events.1302.duel_success:0 "Riesci a trarne grandi profitti."
  agot_colonization_events.1302.duel_failure:0 "Ottieni soltanto profitti miseri."
  agot_colonization_events.1302.b:0 "Usate il legno per far crescere l'insediamento."
  agot_colonization_events.1302.c:0 "Costruiamo una grande pira per festeggiare!"
  agot_colonization_events.1302.d:0 "I boschi potrebbero essere coltivati..."

  agot_colonization_events.1303.t:0 "[obstacle_province.GetNameNoTooltip]: La rovina antica"
  agot_colonization_events.1303.desc:0 "I miei lavoratori nell'insediamento di [obstacle_province.GetName] stanno facendo buoni progressi. I roveti sono stati diradati e sono stati tracciati sentieri attraverso la foresta fitta, permettendo alla colonia di stabilire le infrastrutture necessarie.\n\nMentre ripulivano le terre circostanti, i lavoratori hanno scoperto un'antica rovina d'origine e scopo ignoti. Chi può dire quale cultura perduta abbia edificato un simile luogo?\n\nSebbene la rovina non sia un ostacolo immediato allo sviluppo dell'insediamento, resta la domanda, resta la domanda su che cosa se ne debba fare."
  agot_colonization_events.1303.a:0 "Proviamo a trasformare la rovina in un edificio utilizzabile."
  agot_colonization_events.1303.duel_success:0 "Un nuovo edificio viene costruito in [obstacle_province.GetNameNoTooltip]"
  agot_colonization_events.1303.duel_failure:0 "La rovina crolla, lasciando dietro di sé soltanto polvere"
  agot_colonization_events.1303.b:0 "Lasciate stare la rovina e concentratevi sull'insediamento."
  agot_colonization_events.1303.c:0 "Dovremmo studiare la rovina e riparare ciò che possiamo!"
  agot_colonization_events.1303.d:0 "Buttatela giù! Le sue pietre possono servire altrove."

  agot_colonization_events.1304.t:0 "[obstacle_province.GetNameNoTooltip]: La ritorsione della natura"
  agot_colonization_events.1304.desc:0 "Notizie stupefacenti mi giungono dall'insediamento di [obstacle_province.GetName]. I lavoratori locali hanno diligentemente abbattuto parti delle fitte foreste che circondano la colonia, ma dopo una notte particolarmente oscura molti alberi sono misteriosamente ricomparsi!\n\nNon è chiaro che cosa abbia causato ciò, ma gran parte del lavoro dell'insediamento è stata annullata. I lavoratori si fanno frustrati e produttività e morale stanno diminuendo. Sembra che io debba agire in fretta..."
  agot_colonization_events.1304.a:0 "Abbatterò io stesso questi alberi!"
  agot_colonization_events.1304.duel_success:0 "I tuoi sforzi hanno successo."
  agot_colonization_events.1304.duel_failure:0 "Gli alberi tornano in numero maggiore."
  agot_colonization_events.1304.b:0 "Distacchiamo un certo numero di leve per sostenere i miei lavoratori."
  agot_colonization_events.1304.c:0 "Lasciamo stare questi alberi per ora... e costruiamo altrove."
  agot_colonization_events.1304.d:0 "So come placare la natura, qui..."

 ### Flooded Lands ###

  agot_colonization_events.1401.t:0 "[obstacle_province.GetNameNoTooltip]: Fossi e drenaggi"
  agot_colonization_events.1401.desc:0 "Il terreno paludoso attorno alla nostra nuova colonia in [obstacle_province.GetName] si è rivelato benefico sotto molti aspetti. Anzitutto, è facile da difendere, poiché gli accessi sono difficili per qualunque grande massa d'uomini. Inoltre, le terre acquitrinose pullulano di orate, persici, lucci e anguille, che i miei coloni possono pescare freschi o affumicare per l'inverno.\n\nD'altro canto, le paludi rappresentano una minaccia formidabile d'inondazioni, in particolare durante il disgelo primaverile, quando gli isolotti dell'acquitrino possono essere sommersi dalle acque in risalita. Per difendersi, i miei coloni hanno iniziato i lavori a un sistema di argini e canali, per proteggere le loro case e drenare terra per l'agricoltura. Ciò richiede un'enorme quantità di manodopera e si è rivelato un peso gravoso per la colonia nascente. Ora pare che uno degli argini sia stato squarciato, e le acque di piena minacciano di distruggere del tutto l'insediamento."
  agot_colonization_events.1401.a:0 "Sovrintenderò a un'opera di soccorso e investirò in nuova manodopera."
  agot_colonization_events.1401.a.duel_success:0 "Il tuo progetto resta sotto il budget."
  agot_colonization_events.1401.a.duel_failure:0 "Il tuo progetto supera il budget."
  agot_colonization_events.1401.success.toast.t:0 "Progetto sotto il budget"
  agot_colonization_events.1401.failure.toast.t:0 "Progetto oltre il budget"
  agot_colonization_events.1401.b:0 "Destinate alcune truppe ad aiutare a ricostruire e completare l'argine."
  agot_colonization_events.1401.c:0 "Forse questa colonia era condannata sin dall'inizio..."

  agot_colonization_events.1402.t:0 "[obstacle_province.GetNameNoTooltip]: Febbre delle paludi"
  agot_colonization_events.1402.desc:0 "Il mio insediamento nelle paludi di [obstacle_province.GetName] viene spesso inondato durante le piene primaverili, ma la minaccia sta lentamente regredendo, mano a mano che si completa un sistema di argini per trattenere e deviare le maree in crescita.\n\nEppure la colonia resta afflitta da un male misterioso, che sembra portato dagli insetti pungenti che ronzano sopra le acque. Questa febbre porta calore, brividi e una spossatezza terribile.\n\nOra i coloni hanno scritto, esigendo scorte di corteccia di salice per alleviare le loro sofferenze e d'artemisia per tenere lontani gli insetti."
  agot_colonization_events.1402.a:0 "Avranno ciò di cui hanno bisogno."
  agot_colonization_events.1402.b:0 "È tempo che il clero offra un poco di carità, qui..."
  agot_colonization_events.1402.c:0 "Se avessero lavorato più duramente per drenare le paludi, non sarebbe un problema!"

 ### Pirate Remnants ###

  agot_colonization_events.1501.t:0 "[obstacle_province.GetNameNoTooltip]: L'ultima razzia"
  agot_colonization_events.1501.desc:0 "Sotto la copertura della notte, una banda di pirati sbandati e disperati colpisce i granai della colonia. Appiccano il fuoco al grano e incendiano gli edifici, mentre i coloni impauriti si affannano a mettersi in salvo. Giungono rapporti di terre bruciate, scorte depredate e del lontano eco di risa maniacali, mentre i pirati scompaiono nella notte.\n\nLa colonia non resisterà ancora a lungo, se non mi occupo di questi predoni con decisione."
  agot_colonization_events.1501.a:0 "Inseguiteli e punite fino all'ultimo uomo."
  agot_colonization_events.1501.a.duel_success:0 "I tuoi soldati colgono di sorpresa i predoni, spezzando la loro presa sulla provincia"
  agot_colonization_events.1501.a.duel_failure:0 "Perdi uomini nell'inseguimento. I predoni svaniscono con scorte vitali"
  agot_colonization_events.1501.b:0 "Fortificate le difese e conservate le scorte rimaste."
  agot_colonization_events.1501.b.duel_success:0 "La tua prudente pianificazione guadagna tempo e preserva le scorte finché i tuoi soldati non riescono a ricacciarli"
  agot_colonization_events.1501.b.duel_failure:0 "I predoni pirati colpiscono di nuovo rapidamente con forza mortale"
  agot_colonization_events.1501.c:0 "I pirati hanno reso la colonizzazione, qui, una follia."
  agot_colonization_events.1501.success.toast.t:0 "Residui pirati eliminati"
  agot_colonization_events.1501.failure.toast.t:0 "I residui pirati permangono"

  agot_colonization_events.1502.t:0 "[obstacle_province.GetNameNoTooltip]: Ombre al largo"
  agot_colonization_events.1502.desc:0 "Mi sono destato con strane notizie: questa mattina la nebbia si è diradata, rivelando una nave battuta dal tempo che deriva lungo la costa vicino a [obstacle_province.GetName]. Non erano attesi mercanti e i coloni si sono radunati sulla riva, mormorando inquieti, incerti se la nave fosse abbandonata, maledetta o un cattivo presagio. Passarono ore, eppure l'imbarcazione indugiava, alla deriva e silenziosa.\n\nAl crepuscolo, sebbene nessuno avesse scorto un'anima sbarcare, è stato trovato un avvertimento, inchiodato al cancello della colonia con un pugnale arrugginito.\n\n#italic Siamo venuti a riprenderci ciò che è stato rubato. Consegnate scorte e navi, o annegate sotto la marea.#!"
  agot_colonization_events.1502.a:0 "Li affronteremo con fuoco e acciaio."
  agot_colonization_events.1502.a.duel_success:0 "I tuoi uomini respingono la squadra di sbarco e bruciano la loro nave"
  agot_colonization_events.1502.a.duel_failure:0 "I predoni saccheggiano il porto prima di svanire di nuovo nelle nebbie"
  agot_colonization_events.1502.b:0 "Offrite loro moneta perché spariscano per sempre."
  agot_colonization_events.1502.b.duel_success:0 "Prendono la moneta e svaniscono con la marea"
  agot_colonization_events.1502.b.duel_failure:0 "Prendono la moneta e attaccano comunque"
  agot_colonization_events.1502.c:0 "Questi pirati si stanno rivelando più fastidio che guadagno."
  agot_colonization_events.1502.success.toast.t:0 "Residui pirati eliminati"
  agot_colonization_events.1502.failure.toast.t:0 "I residui pirati permangono"

  agot_colonization_events.1503.t:0 "[obstacle_province.GetNameNoTooltip]: Il comandante dei pirati"
  agot_colonization_events.1503.desc:0 "[pirate_leader.GetName], uno dei capi pirati sopravvissuti, ha radunato una banda di sbandati e ha stabilito un accampamento fortificato da qualche parte vicino a [obstacle_province.GetNameNoTooltip]. [Select_CString(pirate_leader.IsFemale,'Lei','Lui')|U] ha fatto sapere tramite un emissario di lasciarli stare, oppure la colonia brucerà.\n\nUn assalto in piena regola potrebbe finire in disastro, ma l'inazione potrebbe essere altrettanto pericolosa."
  agot_colonization_events.1503.a:0 "Sfida [pirate_leader.GetFirstNameNoTooltip] a singolar tenzone."
  agot_colonization_events.1503.a.duel_success:0 "Uccidi tu stesso il comandante dei pirati e la sua ciurma si disperde"
  agot_colonization_events.1503.a.duel_failure:0 "[Select_CString(pirate_leader.IsFemale,'Lei','Lui')|U] ti sconfigge"
  agot_colonization_events.1503.b:0 "Assaltate il fortilizio sotto la copertura della notte."
  agot_colonization_events.1503.b.duel_success:0 "Il fortilizio viene distrutto. La minaccia è finita"
  agot_colonization_events.1503.b.duel_failure:0 "I tuoi soldati cadono in una trappola. Pochi tornano vivi"
  agot_colonization_events.1503.c:0 "Offrite moneta perché se ne vadano."
  agot_colonization_events.1503.c.duel_success:0 "Prendono l'oro e svaniscono nelle nebbie"
  agot_colonization_events.1503.c.duel_failure:0 "Prendono l'oro e ti ringraziano per la tua "donazione\""
  agot_colonization_events.1503.d:0 "Se li lasciamo in pace, certo faranno lo stesso..."
  agot_colonization_events.1503.success.toast.t:0 "Residui pirati eliminati"
  agot_colonization_events.1503.failure.toast.t:0 "I residui pirati permangono"

  agot_colonization_events.1504.t:0 "[obstacle_province.GetNameNoTooltip]: L'imboscata"
  agot_colonization_events.1504.desc:0 "Durante pattugliamenti di routine lungo la costa, i miei uomini sono stati assaliti da pirati ben armati. Caverne nascoste sono servite da base per le razzie. Questi sbandati non sono predoni senza meta: sono organizzati e letali.\n\nSe non li sradichiamo ora, potrebbero travolgere l'insediamento stesso."
  agot_colonization_events.1504.a:0 "Assaltate le caverne. Non lasciatene vivo nessuno."
  agot_colonization_events.1504.a.duel_success:0 "Le caverne vengono ripulite"
  agot_colonization_events.1504.a.duel_failure:0 "I tuoi uomini vengono massacrati nel buio"
  agot_colonization_events.1504.b:0 "Troppo pericoloso. Schierate più guardie e pregate che se ne vadano"
  agot_colonization_events.1504.success.toast.t:0 "Residui pirati eliminati"
  agot_colonization_events.1504.failure.toast.t:0 "I residui pirati permangono"
