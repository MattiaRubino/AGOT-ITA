l_spanish:

  agot_proclaim.a:0 "Ancora un altro falso [Select_CString(agot_proclaimed_kingqueen.IsFemale,'alla Regina','al Re')]."
  agot_proclaim.b:0 "Lunga vita [Select_CString(agot_proclaimed_kingqueen.IsFemale,'alla Regina','al Re')]!"
  agot_proclaim.c:0 "I am the one true [Select_CString(agot_proclaimed_kingqueen.IsFemale,'alla Regina','al Re')]."

  agot_proclaim.0001.t:0 "Il Trono di Spade Riformato"
agot_proclaim.0001.desc: 0 "Con un importante volgere degli eventi, è sorto un sovrano che ha unito le terre di Westeros sotto un unico vessillo.\n\nDopo anni di battaglie incessanti, astuta diplomazia e matrimoni strategici, questo capo ha conseguito ciò che molti ritenevano impossibile: la rifondazione del Trono di Spade. Possedendo cinque dei nove titoli imperiali di Westeros, questo sovrano ha dimostrato valore e determinazione senza pari.\n\nIl Trono di Spade, un tempo infranto e la cui eredità era stata deturpata dal conflitto, è stato restaurato per pura forza di volontà e ambizione. I Sette Regni, a lungo divisi da rivalità e guerre, guardano ora verso una nuova era di possibile pace e stabilità.\n\nI lord e le lady di Westeros devono ora misurarsi con questa nuova realtà. Piegherai il ginocchio, o sfiderai la potenza del Trono di Spade?"

agot_proclaim.0100.t: 0 "Il Regno di Runestone è Stato Rifondato"
agot_proclaim.0100.desc: 0 "Un nuovo sovrano è sorto nella Valle, riunendo con successo i territori e restaurando l'antico Regno di Runestone.\n\nQuesto capo ha ravvivato l'eredità di Casa Royce, riportando forza e stabilità nella regione.\n\nQuesta rinascita segna un mutamento significativo nell'equilibrio del potere. Come risponderai a questa nuova forza nella Valle?"

