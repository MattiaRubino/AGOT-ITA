  agot_appearance_decisions_events.1000.t:0 "Un tripudio di colori"
  agot_appearance_decisions_events.1000.desc:0 "Decine di colori esotici e appariscenti sono disposti davanti a me, un arcobaleno steso sul tavolo. Osservo con impazienza le mie opzioni, cercando d'immaginare quale mi si addica di più. Dopo un momento di riflessione, un servitore mi tocca la spalla. «C'è qualche tonalità che ha catturato il vostro sguardo, mio [ROOT.Char.GetLadyLord|U]?»"
agot_appearance_decisions_events.1000.a: 0 "Rosso."
agot_appearance_decisions_events.1000.b: 0 "Arancione."
agot_appearance_decisions_events.1000.c: 0 "Giallo."
agot_appearance_decisions_events.1000.d: 0 "Portami altri colori."
agot_appearance_decisions_events.1000.e: 0 "Mi manca il mio colore naturale."
agot_appearance_decisions_events.1000.f: 0 "Lascia stare."

