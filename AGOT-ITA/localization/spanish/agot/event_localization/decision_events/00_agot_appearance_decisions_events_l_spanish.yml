  agot_appearance_decisions_events.4000.t:0 "Commissionare una maschera"
  agot_appearance_decisions_events.4000.desc:0 "Mi ritrovo ancora una volta a fissare il mio volto sfigurato nello specchio. Da quando ho rimosso le bende e ho scelto di mostrare il mio viso al mondo, mi sorprendo a farlo sempre più spesso. Più osservo, più provo disgusto per ciò che mi guarda di rimando. Le linee familiari del mio volto sono state mutate per sempre, e non so come possa continuare a vedermi così.\n\nComprendo di dover fare qualcosa per salvarmi da questo tormento. Non posso governare se non riesco a concentrarmi su altro che sull'orrore infranto che mi fissa da ogni riflesso..."
  agot_appearance_decisions_events.4000.a:0 "Una maschera per coprire la sfigurazione mi si addice."
  agot_appearance_decisions_events.4000.b:0 "Devo coprire l'intero volto!"
  agot_appearance_decisions_events.4000.c:0 "No, io sono [disfigured_root.GetNameNoTooltip]! Non ho bisogno di una maschera!"

  agot_appearance_decisions_events.4001.t:0 "Mostrare il mio volto al mondo"
  agot_appearance_decisions_events.4001.desc:0 "Come faccio ogni mattina da quando ho commissionato la mia maschera, poso la cinghia di cuoio attorno al capo e sento il freddo metallo, implacabile, calare sul mio volto spezzato. Con un sospiro pesante attraverso la stanza, prendo lo specchio a mano dal tavolino e lo sollevo davanti al viso.\n\nGuardo il mio riflesso con disgusto. Un codardo, troppo timoroso per mostrare [Select_CString(ROOT.Char.IsFemale,'la sua','il suo')] vera natura al mondo... Non è la prima volta che mi chiedo se non dovrei lasciare la maschera nelle mie stanze e tenere corte a volto scoperto, così com'è."
  agot_appearance_decisions_events.4001.a:0 "Rimuoverò la mia maschera e mostrerò di nuovo il mio volto al mondo!"
  agot_appearance_decisions_events.4001.b:0 "No, non riesco a sopportarlo."

agot_appearance_decisions_events.5000.t: 0 "Un Occhio sul Mondo"
agot_appearance_decisions_events.5000.desc: 0 "Esamino il mio riflesso, incert[Select_CString(ROOT.Char.IsFemale,'a','o')] se questo sia il modo giusto di mostrare la perdita del mio occhio. Un'altra scelta potrebbe servirmi meglio.\n\nDavanti a me sono disposte diverse coperture. Devo scegliere se prenderne una, oppure affrontare il regno così come sono."
