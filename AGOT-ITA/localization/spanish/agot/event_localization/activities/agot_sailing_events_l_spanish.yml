l_spanish:

 # Sailing Activity Events
agot_sailing.0800.t: 0 "Arrivo al porto"
agot_sailing.0800.desc: 0 "Attraverso a grandi passi le passerelle del porto di [location.GetName], con l'aria fresca dell'oceano tutto intorno. Mentre la nave che sarà usata per il mio viaggio viene preparata dall'equipaggio, io e i miei compagni abbiamo ancora un po' di tempo da trascorrere al porto.\n\nSento le grida dei gabbiani sopra di noi e vedo le onde infrangersi contro le banchine sottostanti. Il mare si stende davanti a me, e con esso l'infinito potenziale che offre. Presto saremo là fuori, in mare aperto."
agot_sailing.0800.a: 0 "Il mare chiama."
agot_sailing.0800.b: 0 "Non abbiamo abbastanza persone per governare la nave."
nice_try_tt: 0 "Nessuna mappa del tesoro in tuo possesso conduce al luogo in cui hai navigato"

agot_sailing.1005.t: 0 "Tentazione al cantiere navale"
agot_sailing.1005.desc: 0 "Mentre passeggio tra i moli prima di partire per il mio viaggio, un[hooker.Custom('DE_PRO_PER_P_3P_G')] avvenente [hooker.GetWomanMan] mi si avvicina con uno scintillio negli occhi.\n\n"Ti va un po' di divertimento prima di salpare, marinaio?" chiede [hooker.GetFirstName] con voce sensuale.\n\nHo ancora molte cose da fare per prepararmi al viaggio che mi attende, ma c'è ancora un po' di tempo..."
agot_sailing.1005.a: 0 "Che ne dici di #EMP molto#! divertimento, [hooker.GetFirstNameNoTooltip]? Ci rivedremo presto!"
agot_sailing.1005.b: 0 "Non c'è nulla di male in un po' di innocuo divertimento, giusto?"
agot_sailing.1005.c: 0 "Vattene, vile [hooker.GetWomanMan]!"
sailing_gained_concubine_log: 0 "[hooker.GetFirstName] è diventat[Select_CString(hooker.IsFemale,'a','o')] un[hooker.Custom('DE_PRO_PER_P_3P_G')] [concubine|E]"
sailing_had_sexual_encounter: 0 "Ha avuto un incontro "romantico" con [hooker.GetFirstName]"

agot_sailing.1006.t: 0 "Un coltello nella camera da letto"
agot_sailing.1006.desc: 0 "Mentre mi adagio nel letto, rinvigorito e soddisfatto, sorrido ampiamente vedendo [hooker.GetFirstName] salire sopra di me e sciogliersi la veste.\n\nTuttavia, ogni speranza di un secondo giro si dissolve in un istante quando il volto di [hooker.GetFirstName] si colma d'intensità, e [Select_CString(hooker.IsFemale,'lei','lui')] solleva un pugnale alto sopra la testa, ridendo mentre cala la lama.\n\n"Un dono degli Uomini Senza Volto, [Select_CString(ROOT.Char.IsFemale,'sciocca','sciocco')] [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]!""
agot_sailing.1006.a: 0 "[hooker.GetFirstNameNoTooltip]! Aspetta... no!"
agot_sailing.1006.a.desc: 0 "Fai tutto il possibile per deviare la lama:"
agot_sailing.1006.duel_success: 0 "Contro ogni probabilità, strappi via il pugnale e fai arrestare [Select_CString(hooker.IsFemale,'la','lo')]"
agot_sailing.1006.duel_failure: 0 "Senti il pugnale affondare profondamente nel tuo petto mentre la vista ti svanisce lentamente nel nero"

agot_sailing.1007.t: 0 "Intagliare nell'attesa"
agot_sailing.1007.desc: 0 "Mentre vago per i moli aspettando che le provviste vengano caricate sulla barca, la mia noia viene interrotta dal rumore del legno raschiato. Seguendo il suono, trovo [whittler.GetFirstName], membro del mio equipaggio, intento a intagliare una piccola e intricata statuetta da un pezzo di legname.\n\nAlzando lo sguardo dal suo lavoro, [whittler.GetFirstNameNoTooltip] sorride e mi chiama a sé. «Salve, [whittler.Custom2('spoken_address_by_familiarity', ROOT.Char)]. Vuoi unirti a me per un po' d'intaglio?»\n\nSembra richiedere un lavoro agile di coltello, ma sono certo che, provandoci, potrei creare qualcosa..."
agot_sailing.1007.a: 0 "Farò un piccolo dono per mio figlio."
agot_sailing.1007.b: 0 "Farò un dolce ricordo per il mio amore."
agot_sailing.1007.c: 0 "Farò un flauto per accompagnare i miei versi con la musica."
agot_sailing.1007.d: 0 "Farò qualcosa di semplice, giusto per passare il tempo."
agot_sailing.1007.e: 0 "Preferisco non sprecare il mio tempo in lavori oziosi."

agot_sailing.1008.t: 0 "Rissa da Taverna"
agot_sailing.1008.desc: 0 "È la notte prima del nostro viaggio, e mi sto godendo la serata in una taverna del luogo, bevendo e mangiando con il mio equipaggio. Gli animi sono alti, e le risate abbondano mentre tutti cercano di superarsi a vicenda con storie di mare.\n\nAll'improvviso, sopra il brusio degli avventori ubriachi, sento voci alzarsi al bancone, fino a infiammarsi in una disputa. Aguzzando la vista, scorgo presto che uno di loro è [brawler.GetFirstName], membro del mio equipaggio.\n\nIl dissenso degenera rapidamente in uno scontro di urla, con saliva che vola. Non passa molto prima che i pugni si alzino, e [brawler.GetFirstNameNoTooltip] grida chiedendo aiuto contro il gruppo di robusti tagliagole."
agot_sailing.1008.a: 0 "Ci sarà certo un modo migliore per risolvere la questione?"
agot_sailing.1008.a.success: 0 "Disinneschi rapidamente la situazione, calmando i tagliagole"
agot_sailing.1008.a.failure: 0 "I tuoi sforzi cadono nel vuoto, e ricevete entrambi una bastonata per la vostra audacia"
agot_sailing.1008.b: 0 "Arrivo, [brawler.GetFirstNameNoTooltip]!"
agot_sailing.1008.b.success: 0 "Tu e [brawler.GetFirstNameNoTooltip] liquidate i tagliagole in poco tempo"
agot_sailing.1008.b.failure: 0 "Tu e [brawler.GetFirstNameNoTooltip] ricevete una sonora bastonata dai tagliagole"
agot_sailing.1008.c: 0 "Te la dovrai cavare da sol[Select_CString(brawler.IsFemale,'a','o')], [brawler.GetFirstNameNoTooltip]..."

agot_sailing.1009.t: 0 "Gara di Bevute"
agot_sailing.1009.desc: 0 "L'ora si è fatta davvero molto tarda e, dopo più di qualche bevuta, il mio equipaggio è impegnato nelle sue solite bravate, condividendo racconti e vanterie sul proprio valore e sulle conquiste passate.\n\nUn po' barcollante, [challenger.GetFirstName], membro del mio equipaggio, si alza in piedi con la coppa in mano, prima di sbatterla contro il tavolo di legno.\n\n«Non ho mai incontrato un boccale che non potessi domare! [challenger.Custom2('spoken_address_by_familiarity', ROOT.Char)|U], riempi la coppa... l'ultimo a restare in piedi vince venticinque pezzi d'oro!»"
agot_sailing.1009.a: 0 "Credi di potermi battere? Tu #EMP devi#! essere ubriac[Select_CString(challenger.IsFemale,'a','o')]..."
agot_sailing.1009.a.success: 0 "Dopo molti giri di bevute, finalmente senti [challenger.GetFirstNameNoTooltip] cadere a terra."
agot_sailing.1009.a.failure: 0 "Il bere ti sale rapidamente alla testa e perdi i sensi."
agot_sailing.1009.b: 0 "Non potrei mai sperare di bere più di te, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('challenger'))]!"

agot_sailing.1010.t: 0 "La Veggente"
agot_sailing.1010.desc: 0 "Mentre cammino lungo il lungomare, osservando gli alberi delle navi ondeggiare su e giù al ritmo delle onde, sento la voce di una vecchia megera accanto a un piccolo carro sul lato della strada, che mi invita ad avvicinarmi.\n\nQuando mi accosto, ella raccoglie da un tavolino ornato davanti a sé un assortimento di pietre incise di rune e le infila in un sacchetto di velluto, scuotendolo prima di estrarne cinque e disporle in fila ordinata.\n\n«Buona giornata, marinaio. Queste pietre mistiche furono infuse di potere magico dagli Esseri Abissali e hanno il potere di recare un presagio per il viaggio che ti attende, se vorrai soltanto ungermi il palmo d'argento...»"
agot_sailing.1010.a: 0 "Lasciami udire che cosa hanno da dire queste pietre..."
agot_sailing.1010.a.success.t: 0 "I presagi sono fausti!"
agot_sailing.1010.a.success: 0 "Le pietre annunciano lieti eventi per il tuo viaggio e per gli anni a venire"
agot_sailing.1010.a.failure.t: 0 "I presagi sono funesti!"
agot_sailing.1010.a.failure: 0 "Le pietre annunciano sventure per il tuo viaggio e per gli anni a venire"
agot_sailing.1010.b: 0 "Non sprecherò denaro con una ciarlatana e una manciata di sassi!"

agot_sailing.1011.t: 0 "Una Prelibatezza dei Moli"
agot_sailing.1011.desc: 0 "È la mattina del mio viaggio, e sto camminando lungo i moli verso la mia nave insieme a [fellow_diner.GetFirstName], membro del mio equipaggio.\n\nStiamo conversando della nostra imminente avventura quando vedo le narici di [fellow_diner.GetFirstNameNoTooltip] dilatarsi e un ampio sorriso aprirsi sul suo volto. Tirandomi per il braccio, [Select_CString(fellow_diner.IsFemale,'lei','lui')] segue l'odore fino a una traballante bancarella di cibo annidata tra due magazzini. «Non posso credere che questo posto esista ancora! Preparano una zuppa straordinaria che devi assolutamente provare. Ti metterà in perfetta forma per il nostro viaggio!»\n\nOsservo mentre [Select_CString(fellow_diner.IsFemale,'lei','lui')] afferra avidamente una ciotola e inizia a mangiare, ma non riesco a non esitare. La cucina è sudicia e rancida, con un odore opprimente di condimenti e spezie. Eppure, [fellow_diner.GetFirstNameNoTooltip] sembra apprezzarla... Forse questa è l'autentica esperienza del cibo di strada!"
agot_sailing.1011.a: 0 "Immagino che proverò... Si vive una volta sola!"
agot_sailing.1011.a.success.t: 0 "Il pasto era delizioso!"
agot_sailing.1011.a.success: 0 "Il pasto era delizioso, e ti lascia sazio e pronto al viaggio"
agot_sailing.1011.a.too_spicy.t: 0 "Il pasto era troppo speziato!"
agot_sailing.1011.a.too_spicy: 0 "Le spezie del pasto erano spiacevolmente forti, lasciandoti in un sudore ardente"
agot_sailing.1011.a.failure.t: 0 "Non mi sento molto bene..."
agot_sailing.1011.a.failure: 0 "Il pasto preparato male ti lascia marcio e malato prima della navigazione del mattino"
agot_sailing.1011.b: 0 "Sei forse impazzit[Select_CString(fellow_diner.IsFemale,'a','o')]? Guarda quanto sono sporchi quei piatti!"

agot_sailing.1012.t: 0 "Un Attacco Aereo!"
agot_sailing.1012.desc: 0 "Mentre cammino lungo il pontile, contando mentalmente le provviste per il viaggio che ci attende, sento all'improvviso un colpo secco alla testa. Portando la mano al capo, premo con cautela la tempia ormai appiccicosa, prima di voltarmi di scatto per scoprire chi avrebbe avuto l'audacia di attaccarmi in questo modo!\n\nAccanto a me, [laugher.GetFirstName], membro del mio equipaggio, scoppia a ridere, prima di indicare l'estremità del pontile.\n\n«Credo che troverai laggiù il tuo aggressore, [Select_CString(ROOT.Char.IsFemale,'mia','mio')] [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]!»\n\nGuardando verso l'estremità del pontile, finalmente comprendo: un gabbiano solitario è posato lì, fissandomi intensamente. Abbassando la mano, riesco ora a distinguere il fatto che sono stato imbrattato dai suoi escrementi."
agot_sailing.1012.a: 0 "Il guerriero più letale che abbia mai affrontato!"
agot_sailing.1012.b: 0 "OSI ridere di me? Ti farò scorticare!"

agot_sailing.1013.t: 0 "Un Marinaio Esperto"
agot_sailing.1013.desc: 0 "Dopo aver esaminato gli elenchi del mio equipaggio, scopro con allarme che ci mancano alcuni uomini rispetto a quanti di solito ne avremmo a bordo. Pur non essendo particolarmente dannoso per la spedizione, preferirei avere una nave con l'intero equipaggio.\n\nDopo aver cercato nei consueti ritrovi del porto, sento parlare di [recruit.GetFirstName], un marinaio navigato che ha compiuto molti viaggi. Finalmente riesco a rintracciar[Select_CString(recruit.IsFemale,'la','lo')], ma con mio sgomento [Select_CString(recruit.IsFemale,'lei','lui')] si è già arruolat[Select_CString(recruit.IsFemale,'a','o')] con un altro equipaggio!\n\nVoltandosi mentre mi avvicino, [recruit.GetFirstNameNoTooltip] inarca un sopracciglio.\n\n«C'è qualcosa in cui posso aiutarti?»"
agot_sailing.1013.a: 0 "Ho una grande opportunità da offrirti..."
agot_sailing.1013.a.success: 0 "Riesci a convincere il marinaio a unirsi al tuo equipaggio"
agot_sailing.1013.a.failure: 0 "Non riesci a convincere il marinaio"
agot_sailing.1013.b: 0 "Dimmi, qual è la tua paga abituale? La raddoppierò!"
agot_sailing.1013.c: 0 "Abbiamo abbastanza marinai. Andrà tutto bene."

agot_sailing.1014.t: 0 "Una Giornata al Mercato"
agot_sailing.1014.desc: 0 "Mentre la nave viene caricata di provviste, mi prendo il tempo di vagare per i mercati locali.\n\nMolti mercanti gridano, cercando di attirarmi verso le loro merci. Vi sono cose davvero esotiche qui: cibi che non ho mai assaggiato e libri in lingue che non riesco a comprendere. C'è anche una solida scelta di alcolici. So che l'equipaggio lo apprezzerebbe senza dubbio se tornassi con quelli!\n\nC'è qualcosa qui che colpisce il mio interesse?"
agot_sailing.1014.a: 0 "Quel libro sembra interessante!"
agot_sailing.1014.a.tt: 0 "Possibilità di aumentare il progresso del tuo tratto [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]."
agot_sailing.1014.a.success.toast: 0 "Hai ottenuto esperienza bonus come [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]"
agot_sailing.1014.a.failure.toast: 0 "Non hai ottenuto esperienza come [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]"
agot_sailing.1014.b: 0 "Passate l'alcool e lodate [ROOT.Char.GetFaith.HighGodName]!"
agot_sailing.1014.c: 0 "Arance? Un frutto davvero curioso!"
agot_sailing.1014.d: 0 "Una mappa del tesoro? Che cosa potrei mai trovare là fuori?"
agot_sailing.1014.d.tt.success.toast: 0 "Hai ricevuto una vera mappa del tesoro"
agot_sailing.1014.d.tt.failure.toast: 0 "Hai ricevuto una falsa mappa del tesoro"
agot_sailing.1014.e: 0 "Sto benissimo così, grazie."

agot_sailing.1015.t: 0 "Il Vecchio Mendicante"
agot_sailing.1015.desc: 0 "Mentre facciamo una breve passeggiata nel porto di [location.GetName], [dockyard_guest.GetFirstName] e io veniamo avvicinati da un vecchio mendicante. «Partite per il grande oceano, [Select_CString(ROOT.Char.IsFemale,'mia','mio')] [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]?» dice il vecchio con voce roca. «Ai miei tempi, passavo più tempo a bordo che sulla terraferma... per qualche moneta, potrei insegnarvi un paio di cose sull'essere marinaio...»\n\n[ROOT.Char.Custom2('direct_address_by_familiarity', dockyard_guest)|U] si mette tra noi. «L'accattonaggio è contro la legge, e questo vecchio relitto lo sa bene. Mandatelo via, [Select_CString(ROOT.Char.IsFemale,'mia','mio')] [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]!»"
agot_sailing.1015.a: 0 "Ebbene, sentiamo se i tuoi segreti valgono il prezzo."
agot_sailing.1015.b: 0 "[dockyard_guest.GetFirstNameNoTooltip] ha ragione. Raccogli le tue cose e vattene."
agot_sailing.1015.c: 0 "Non ha nulla da insegnarmi. Andremo per la nostra strada."

agot_sailing.1016.t: 0 "Su una Barca?"
agot_sailing.1016.desc: 0 "«Spesso #italic non#! sono stato sulle barche!»\n\nLa disputa tra due scaricatori del molo ha attirato molti sguardi; il porto di [location.GetName] è ammutolito davanti allo spettacolo.\n\n«No, ciò su cui sei stato non è sulle barche. Non puoi #bold non #italic essere#!#! su una barca!» Il disaccordo mi lascia a bocca aperta, mentre la mia mente lotta con la complessità della vita stessa. Chi sono questi sciocchi portuali, e di che cosa stanno discutendo esattamente?"
agot_sailing.1016.a: 0 "È una cosa sciocca."
agot_sailing.1016.b: 0 "No, no, ha ragione!"
agot_sailing.1016.b.tt: 0 "La morte potrebbe forse essere una barca?"

agot_sailing.1990.t: 0 "Un Primo Ufficiale"
agot_sailing.1990.desc: 0 "Prima di salpare, devo scegliere il mio primo ufficiale: colui che starà al mio fianco in mare aperto e condividerà il peso del comando.\n\nTra coloro che sono radunati qui oggi vi sono parenti, amici e marinai esperti. Alcuni possiedono una chiara abilità nautica, mentre altri sono qui per lealtà, favore o ambizione. Ognuno potrebbe servire a modo proprio, una volta oltre la sicurezza del porto."
agot_sailing.1990.a: 0 "Sarà il mio primo ufficiale!"

agot_sailing.1991.t: 0 "Nel Grande Oceano"
agot_sailing.1991.desc: 0 "Mentre la nave sobbalza fuori dal porto, scorgo [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] e il suo primo ufficiale, [first_mate.GetFirstName]: i loro sguardi fissi sull'orizzonte mentre la nostra avventura ha inizio."
agot_sailing.1991.a: 0 "Non vedo l'ora di scoprire cosa cacceremo!"
agot_sailing.1991.b: 0 "Sarà una buona razzia!"
agot_sailing.1991.c: 0 "I misteri dell'antica Valyria ci attendono..."
agot_sailing.1991.d: 0 "I tesori sommersi saranno nostri!"

agot_sailing.2001.t: 0 "Un Invito a Giocare ai Dadi"
agot_sailing.2001.desc: 0 "Mentre attraverso il ponte principale della nave, sento il rumore di una folla provenire da sottocoperta. Tutti i marinai non di turno sono raccolti attorno a un tavolo, e una vivace partita a dadi si svolge tra vapori di fumo e alcol.\n\n«Vieni qui, capitano,» chiama [first_mate.GetFirstName], «ti mostreremo come si fa!»\n\nUn grido si leva dalla folla: «Non prendete tutto il suo oro, una parte è la mia paga!» seguito da un boato di risate."
agot_sailing.2001.a: 0 "Certo! Giocherò un po' ai dadi!"
agot_sailing.2001.b: 0 "Non mi sorprenderete a giocare d'azzardo!"
agot_sailing.2001.c: 0 "Un'occasione per conoscere il mio equipaggio."

agot_sailing.2002.t: 0 "Una Nave in Difficoltà"
agot_sailing.2002.desc: 0 "Mentre viaggiamo lungo la costa non lontano dal porto, uno dei membri del mio equipaggio di vedetta grida di aver avvistato in lontananza un'imbarcazione locale in difficoltà.\n\nPersino da qui, è chiaro che la nave ha subito danni dal mare agitato o dai razziatori, e il suo equipaggio la mantiene a galla a malapena mentre corre sul ponte tentando riparazioni. È evidente che si trovano in una posizione vulnerabile e hanno bisogno d'aiuto."
agot_sailing.2002.a: 0 "Fermatevi e provate ad aiutarli!"
agot_sailing.2002.a.tt_success: 0 "Salvi l'equipaggio"
agot_sailing.2002.a.tt_failure: 0 "La nave affonda con il suo equipaggio e il suo carico"
agot_sailing.2002.b: 0 "Possiamo tenerci il bottino se uccidiamo i superstiti..."
agot_sailing.2002.b.tt_success: 0 "Assalti la barca e massacri il suo equipaggio"
agot_sailing.2002.b.tt_failure: 0 "Assalti la barca, ma rimani ferito nel caos"
agot_sailing.2002.c: 0 "Limitiamoci a proseguire la navigazione."

agot_sailing.2003.t: 0 "Leviatano"
agot_sailing.2003.desc: 0 "Inspiro profondamente mentre percorro il ponte in lungo e in largo, il vento marino pungente e l'aria salmastra sul volto. Oggi è una bella giornata per navigare!\n\nIl breve viaggio è stato un esaltante cambiamento rispetto alla vita di corte, quando lo scorgiamo: un distante pennacchio d'acqua, seguito da una piccola isola di carne color del vino scuro che emerge tra le onde.\n\nUna delle più grandi bestie di tutti gli abissi.\n\nUna balena!"
agot_sailing.2003.a: 0 "Prendete gli arpioni!"
agot_sailing.2003.a.tt_success: 0 "Massacri la balena e la trascini a riva"
agot_sailing.2003.a.tt_failure: 0 "La bestia ti sfugge"
agot_sailing.2003.b: 0 "Lasciate che se ne occupino gli altri, portatemi solo la carcassa."
agot_sailing.2003.c: 0 "Che preda #EMP grandiosa#!!"
agot_sailing.2003.c.tt: 0 "Affronti un #EMP vero#! leviatano degli abissi"
 agot_sailing.2003.c.tt_success:0 "$agot_sailing.2003.a.tt_success$"
 agot_sailing.2003.c.tt_failure:0 "$agot_sailing.2003.a.tt_failure$"
agot_sailing.2003.d: 0 "Una creatura di maestà temibile, lasciatela stare."
agot_sailing.2003.d.tt: 0 "La balena torna libera."

agot_sailing.2004.t: 0 "Una Battaglia in Alto Mare"
agot_sailing.2004.desc: 0 "Mentre navighiamo nell'ampio oceano aperto, il mare appare calmo e limpido. Mentre me ne sto sul ponte, crogiolandomi nel bagliore del sole, un grido infrange la quiete.\n\n"Capitano!" grida il mio primo ufficiale, "Nave sconosciuta in avvicinamento ad alta velocità!"\n\nMi precipito alla battagliola della mia nave e scruto l'orizzonte, finché non distinguo la sagoma scura che si avvicina rapidamente. È evidente di cosa si tratta: una nave pirata. Presto ci saranno addosso. Dobbiamo combattere o fuggire?"
agot_sailing.2004.a: 0 "Lasciate che vengano!"
agot_sailing.2004.a.success: 0 "Respingi i pirati"
agot_sailing.2004.a.failure: 0 "I pirati saccheggiano i tuoi beni"
agot_sailing.2004.b: 0 "Issate le vele!"

agot_sailing.2005.t: 0 "Marinaio in mare!"
agot_sailing.2005.desc: 0 "Ormai lontani in mare aperto, le acque agitate ci sballottano avanti e indietro. A volte è difficile restare in piedi, ma è gestibile.\n\nAll'improvviso, una voce in preda al panico si leva acuta e, voltandomi di scatto, vedo uno dei miei marinai cadere oltre il bordo! Mi precipito sul fianco della nave e vedo la sua testa riaffiorare, sbattuta qua e là dalle onde.\n\nDevo agire subito, o perirà di certo nelle profondità tempestose."
agot_sailing.2005.a: 0 "Resisti, sto arrivando!"
agot_sailing.2005.a.tt_success: 0 "Salvi il membro dell'equipaggio"
agot_sailing.2005.a.tt_failure: 0 "Non riesci a salvare il membro dell'equipaggio"
agot_sailing.2005.b: 0 "Tu, prendi quella cima! Tu, prepara la scialuppa!"
agot_sailing.2005.b.tt_success: 0 "Il tuo tentativo di salvataggio ha successo"
agot_sailing.2005.b.tt_failure: 0 "Il tuo tentativo di salvataggio fallisce"
agot_sailing.2005.c: 0 "È troppo tardi: serrate i boccaporti!"

agot_sailing.2006.t: 0 "Una partita a carte"
agot_sailing.2006.desc: 0 "Quando mi ritiro nella mia cabina per la notte, sento il frastuono di una folla provenire da sottocoperta. Tutti i marinai non di turno sono radunati attorno a un tavolo, e una vivace partita a carte si svolge tra vapori di fumo e alcol.\n\n"Venite, capitano," mi chiama [first_mate.GetFirstName], "vi mostreremo come si fa!"\n\nDalla folla si leva un grido: "Non prendete tutto il suo oro, una parte è la mia paga!" seguito da un fragore di risate."
agot_sailing.2006.a: 0 "Fate spazio, ci sto."
agot_sailing.2006.a.tt_success: 0 "Vinci la partita"
agot_sailing.2006.a.tt_failure: 0 "Perdi il tuo oro"
agot_sailing.2006.b: 0 "Ora, dove sono i miei fidati assi di riserva?"
agot_sailing.2006.b.tt_success: 0 "Il tuo trucco passa inosservato"
agot_sailing.2006.b.tt_failure: 0 "Vieni scoperto"
agot_sailing.2006.c: 0 "Continuate pure a giocare, ragazzi. Io berrò soltanto qualcosa."

agot_sailing.2007.t: 0 "Discordia insopportabile"
agot_sailing.2007.desc: 0 "Finora il viaggio è proceduto senza intoppi, ma ho iniziato a notare mugugni tra l'equipaggio. Poco dopo, un membro dell'equipaggio stremato mi si avvicina. Ha la barba lucida, ma le mani consumate di un marinaio che ha visto troppi moli. La sua voce è roca, ma la sua esasperazione è evidente.\n\n"È un buon equipaggio, sì, e laborioso. Bramano solo spingersi più a fondo in Essos invece di seguire la rotta attuale. Il loro desiderio di andare oltre ha reso alcuni dei ragazzi un po' troppo agitati."\n\nSo che dice il vero, ma l'equipaggio non ha scuse. Al momento dell'imbarco sono stati mostrati loro i rotoli con l'itinerario della nave, e dovrebbero sapere che non visiteremo la lontana Essos finché non avremo acquisito più esperienza. Se non si fa qualcosa, temo che l'equipaggio possa ammutinarsi!"
agot_sailing.2007.a: 0 "Ordina all'equipaggio di proseguire."
agot_sailing.2007.a.tt_success: 0 "L'equipaggio supera i propri desideri"
agot_sailing.2007.a.tt_failure: 0 "Quando vedremo altra Essos?"

agot_sailing.2008.t: 0 "Mari in bonaccia"
agot_sailing.2008.desc: 0 "Sono ormai giorni che non sentiamo il più lieve soffio d'aria gonfiare le nostre vele. Vedo che l'equipaggio si sta innervosendo, ma non so cosa fare. [first_mate.GetFirstName] chiede di vedermi nella mia cabina, con un'espressione grave sul volto.\n\n"Capitano, gli uomini sono preoccupati. Dicono che le nostre azioni abbiano adirato [ROOT.Char.GetFaith.WaterGodName]. Dobbiamo fare un'offerta per placare [ROOT.Char.GetFaith.WaterGodHerHim]."\n\nA me tutto questo sembra una sciocchezza, ma un gesto simile aumenterebbe il morale."
agot_sailing.2008.a: 0 "E sia, offriamo a [ROOT.Char.GetFaith.WaterGodHerHim] oro e preghiere..."
agot_sailing.2008.b: 0 "Non voglio più sentire nulla sull'argomento, aspetteremo i venti!"
agot_sailing.2008.c: 0 "Spiega all'equipaggio che i venti non sono governati da [ROOT.Char.GetFaith.WaterGodName]."

agot_sailing.2009.t: 0 "Le stelle brillano uguali"
agot_sailing.2009.desc: 0 "È notte quando esco dalla mia cabina. Il ponte è insolitamente silenzioso. Vedo uno dei miei uomini seduto tranquillo, lo sguardo rivolto alle stelle.\n\n"Una notte quieta, non è vero?"\n\n[Select_CString(stargazer.IsFemale,'Lei','Lui')] si volta verso di me, trasalendo. "Capitano! Chiedo scusa, non stavo prestando attenzione... prima di venire qui fuori, non mi ero mai davvero preso il tempo di apprezzare le stelle, sapete?"\n\nAnnuisco in segno d'accordo, alzando lo sguardo verso i puntini di luce molto in alto. "Lascia che ti dica qualcosa sulle stelle...""
agot_sailing.2009.a: 0 "Puoi usarle per navigare!"
agot_sailing.2009.a.mariner_progress: 0 "Ottieni esperienza nello stile di vita [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]."
agot_sailing.2009.a.success.toast: 0 "Condividi conoscenze di navigazione"
agot_sailing.2009.b: 0 "Sono state create da [ROOT.Char.GetFaith.NightGodName]. Vedi quell'ammasso di stelle? Quello è..."
agot_sailing.2009.c: 0 "Un giorno navigheremo tra loro come facciamo sui mari."

agot_sailing.2010.t: 0 "Incidente di navigazione!"
agot_sailing.2010.desc: 0 "Per una settimana non abbiamo avuto che cieli limpidi e vento costante; la navigazione è facile e il morale a bordo è alto.\n\nQuando arriva l'improvvisa raffica di vento, coglie tutti di sorpresa. Sento un grido di dolore alle mie spalle e mi volto, trovando [sailor.GetFirstNameNoTooltip] distes[Select_CString(sailor.IsFemale,'a','o')] sul ponte, con la gamba piegata in modo orribile.\n\n[first_mate.GetFirstName] è al mio fianco, in ansia, in attesa delle mie istruzioni."
agot_sailing.2010.a: 0 "Portatemi tela da vela e aste di legno, presto!"
agot_sailing.2010.a.success: 0 "Fai un lavoro discreto"
agot_sailing.2010.a.failure: 0 "Peggiori la situazione"
agot_sailing.2010.b: 0 "Lascial[Select_CString(sailor.IsFemale,'a','o')], sarà meno maldestr[Select_CString(sailor.IsFemale,'a','o')] la prossima volta."
agot_sailing.2010.c: 0 "Prendi il comando, [first_mate.GetFirstNameNoTooltip], non posso occuparmene!"

agot_sailing.2011.t: 0 "Una nebbia improvvisa"
agot_sailing.2011.desc: 0 "Poco dopo aver lasciato il porto, la nostra nave viene avvolta da un sudario di nebbia che si leva rapidamente e sembra venire dal nulla. Il cielo è oscurato, così come l'oceano tutto intorno a noi, e presto diventa chiaro che bisogna prendere una decisione.\n\nManteniamo la rotta nella speranza che la nebbia si diradi presto, o facciamo voltare la nave, rischiando ritardi ma evitando di perderci del tutto nella foschia?"
agot_sailing.2011.a: 0 "Mantenete la rotta! Questa foschia si diraderà presto..."
agot_sailing.2011.a.success: 0 "Sfuggi alla nebbia fitta"
agot_sailing.2011.a.failure: 0 "La tua nave si perde nella nebbia"
agot_sailing.2011.b: 0 "Faremmo meglio a far voltare la nave e accettare il ritardo"
agot_sailing.2011.c: 0 "Nessun vero marinaio teme la nebbia: vele spiegate avanti!"

 # Ship in Danger Outcomes
agot_sailing.2020.t: 0 "$agot_sailing.2002.t$: Salvare l'equipaggio"
agot_sailing.2020.desc: 0 "In lontananza è stata avvistata un'altra nave! Sembra sul punto di affondare e, dopo una breve discussione, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di tentare di salvare l'equipaggio della nave in avaria.\n\n"
agot_sailing.2020.desc.jerk: 0 "Osservo con disprezzo i nostri marinai portare la nave abbastanza vicino al relitto da lanciare corde nell'acqua ribollente, riuscendo a tirar fuori uno a uno tutti i membri dell'equipaggio della nave condannata.\n\nChe spreco del nostro tempo e dei nostri sforzi preziosi..."
agot_sailing.2020.desc.normal: 0 "Osservo con soddisfazione e stupore i nostri marinai portare la nave abbastanza vicino al relitto da lanciare corde nell'acqua ribollente, riuscendo a tirar fuori uno a uno tutti i membri dell'equipaggio della nave condannata.\n\nRingraziano i nostri marinai per averli salvati, offrendosi di lasciare la nave al prossimo porto."
agot_sailing.2020.a: 0 "Un lavoro ben fatto!"
agot_sailing.2020.b: 0 "Cosa pensava [host.GetFirstNameNoTooltip]..."
agot_sailing.2020.c: 0 "È così affascinante vedere quanto rapidamente possa affondare una nave..."

agot_sailing.2021.t: 0 "$agot_sailing.2002.t$: Perduti in mare"
agot_sailing.2021.desc: 0 "In lontananza è stata avvistata un'altra nave! Sembra sul punto di affondare e, dopo una breve discussione, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di tentare di salvare l'equipaggio della nave in avaria.\n\nMentre ci avviciniamo al relitto, si ode un forte schianto. L'albero maestro della nave spezzata precipita su ciò che resta del ponte e, con nostro sgomento, l'intera nave viene fatta a pezzi e inghiottita da onde fameliche.\n\nSolo pochissimi membri dell'equipaggio possono essere salvati; il resto dei marinai segue la propria nave in una tomba d'acqua!"
agot_sailing.2021.a: 0 "Gli dèi ci assistano! Che disastro!"
agot_sailing.2021.b: 0 "Il mare è una padrona crudele..."

agot_sailing.2022.t: 0 "$agot_sailing.2002.t$: Assaltare la nave"
agot_sailing.2022.desc: 0 "In lontananza è stata avvistata un'altra nave! Sembra sul punto di affondare e, dopo una breve discussione, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di depredare il relitto, uccidendo ogni superstite.\n\nOsservo i nostri marinai sbrigare rapidamente l'equipaggio esausto, rovistando tra i resti in cerca di ogni bottino possibile. Al loro ritorno, vedo sui loro volti i sorrisi di uomini vittoriosi."
agot_sailing.2022.a: 0 "Guadagni illeciti..."
agot_sailing.2022.b: 0 "La perdita di un uomo è il tesoro di un altro!"

agot_sailing.2023.t: 0 "$agot_sailing.2002.t$: Via di soppiatto"
agot_sailing.2023.desc: 0 "In lontananza è stata avvistata un'altra nave! Sembra sul punto di affondare e, dopo una breve discussione, osservo i marinai avvicinare la nave. Agli ordini di [host.Custom('IT_NAM_COL2')][host.GetTitledFirstNameNicknamedPossessive] l'hanno abbordata, e ne è seguito uno scontro. Vedo [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] venire ferit[Select_CString(host.IsFemale,'a','o')] nel corso dell'azione, prima che [Select_CString(host.IsFemale,'lei','lui')] e i marinai tornino con quanto più potevano trasportare...."
agot_sailing.2023.a: 0 "Forse era meglio così."

agot_sailing.2024.t: 0 "$agot_sailing.2002.t$: Passanti"
agot_sailing.2024.desc: 0 "In lontananza è stata avvistata un'altra nave! Sembra sul punto di affondare ma, dopo una breve discussione, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di evitare il relitto.\n\nOsservo la nostra nave passare accanto all'imbarcazione in avaria, mentre il suo equipaggio grida e segue la propria nave in una tomba d'acqua."
agot_sailing.2024.a: 0 "Spero che la nostra nave si dimostri più robusta della loro."
agot_sailing.2024.b: 0 "Il mare è una padrona crudele..."
agot_sailing.2024.c: 0 "Avremmo potuto reclamare il loro bottino..."
agot_sailing.2024.d: 0 "[host.GetFirstNameNoTooltip] ha fatto bene a passare oltre."

 # The Leviathan Outcomes
agot_sailing.2025.t: 0 "$agot_sailing.2003.t$: Macellare la bestia"
agot_sailing.2025.desc: 0 "Mentre faccio una rilassante passeggiata sul ponte principale della nave, sento i marinai gridare eccitati. È stata avvistata una balena!\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] dà l'ordine di tentare la caccia alla bestia immensa. Gli uomini dell'equipaggio preparano gli arpioni, finché un proiettile trafigge il dorso della balena. Le acque impetuose si tingono di rosso per un momento, e la creatura si affloscia dopo una breve lotta.\n\nOsservo gli uomini fissare altre corde alla carcassa, così che possa essere trascinata fino a una riva vicina per la lavorazione."
agot_sailing.2025.a: 0 "Anche bestie possenti come questa possono essere uccise."
agot_sailing.2025.b: 0 "Morti maestose sono cattivi presagi."

agot_sailing.2026.t: 0 "$agot_sailing.2003.t$: La bestia fugge"
agot_sailing.2026.desc: 0 "Mentre faccio una rilassante passeggiata sul ponte principale della nave, sento i marinai gridare eccitati. È stata avvistata una balena!\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] dà l'ordine di tentare la caccia alla bestia immensa. Gli uomini dell'equipaggio preparano gli arpioni, ma nessuno riesce a colpire il bersaglio. Poco dopo, la balena si immerge e scompare alla vista."
agot_sailing.2026.a: 0 "Una conclusione deludente!"
agot_sailing.2026.b: 0 "Forse è meglio così..."

agot_sailing.2027.t: 0 "$agot_sailing.2003.t$: Trovare la Carcassa"
agot_sailing.2027.desc: 0 "Mentre faccio una rilassante passeggiata sul ponte principale della nave, sento i marinai gridare eccitati. È stata avvistata una balena!\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] dà l'ordine di tentare la caccia alla bestia gigantesca. I membri dell'equipaggio preparano gli arpioni e li scagliano, finché un proiettile non colpisce nel segno. Il mare si tinge di rosso per un momento, ma la balena riesce a spezzare l'arpione, sfuggendo ai suoi inseguitori.\n\nDopo una lunga ricerca, l'equipaggio riesce a localizzare la carcassa spiaggiata su una costa vicina e inizia a ricavarne ciò che può."
agot_sailing.2027.a: 0 "Non poteva sfuggirci per sempre."

agot_sailing.2028.t: 0 "$agot_sailing.2003.t$: Una Preda Grandiosa"
agot_sailing.2028.desc: 0 "Mentre faccio una rilassante passeggiata sul ponte principale della nave, sento i marinai gridare eccitati. È stata avvistata una magnifica balena bianca!\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] è [Select_CString(host.IsFemale,'una cacciatrice esperta','un cacciatore esperto')], e senza dubbio [Select_CString(host.IsFemale,'lei','lui')] saprà essere all'altezza dell'occasione. Gli arpioni vengono preparati; uno spruzzo d'acqua salmastra si leva verso l'alto, rivelando la posizione della bestia. [host.GetFirstNameNoTooltip] prende la mira, piantando la punta uncinata in profondità nella carne del leviatano e fissando saldamente una fune al suo corpo. Mentre la nostra nave si avvicina, [host.GetFirstNameNoTooltip] estrae una lancia e infligge il colpo mortale."
agot_sailing.2028.a: 0 "Una meraviglia in bianco e rosso!"
agot_sailing.2028.b: 0 "Una tale maestà avrebbe dovuto essere lasciata in pace..."

agot_sailing.2029.t: 0 "$agot_sailing.2003.t$: Una Fugace Follia"
agot_sailing.2029.desc: 0 "Mentre faccio una rilassante passeggiata sul ponte principale della nave, sento i marinai gridare eccitati. È stata avvistata una magnifica balena bianca!\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] è [Select_CString(host.IsFemale,'una cacciatrice esperta','un cacciatore esperto')], e senza dubbio [Select_CString(host.IsFemale,'lei','lui')] saprà essere all'altezza dell'occasione. Gli arpioni vengono preparati; uno spruzzo d'acqua salmastra si leva verso l'alto, rivelando la posizione della bestia. [host.GetFirstNameNoTooltip] prende la mira, ma la punta uncinata manca il bersaglio. Il leviatano emette un profondo canto triste mentre scompare sotto l'acqua per sempre."
agot_sailing.2029.a: 0 "Forse [host.GetFirstNameNoTooltip] non è [Select_CString(host.IsFemale,'abile','abile')] come sembrava."

agot_sailing.2030.t: 0 "$agot_sailing.2003.t$: Un Incontro con una Bestia"
agot_sailing.2030.desc: 0 "Mentre faccio una rilassante passeggiata sul ponte principale della nave, sento i marinai gridare eccitati. È stata avvistata una balena!\n\nBenché una caccia potrebbe portare ricchezze, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di lasciare stare la bestia. Osservo con meraviglia la creatura maestosa passare accanto al fianco della nave, soffiando il proprio respiro e uno spruzzo d'acqua salmastra nell'aria. Infine si immerge sotto le onde calme, scomparendo alla vista."
agot_sailing.2030.a: 0 "Che esperienza tranquilla!"
agot_sailing.2030.b: 0 "[host.GetFirstNameNoTooltip] è stat[Select_CString(host.IsFemale,'a','o')] [Select_CString(host.IsFemale,'una sciocca','uno sciocco')] a lasciare fuggire la bestia..."

 # Pirates! Outcomes
 agot_sailing.2031.t:0 "$agot_sailing.2004.t$"
agot_sailing.2031.desc: 0 "Guardo oltre l'orizzonte sconfinato quando, all'improvviso, si odono grida d'allarme. In lontananza è stata avvistata una nave, diretta dritta verso di noi. «Pirati!» gridano i marinai, guardando a [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed] in cerca di guida.\n\n«Non temete, uomini!» dice [Select_CString(host.IsFemale,'lei','lui')] con sicurezza. «Non sono alla nostra altezza!»\n\nE infatti, dopo un breve scontro, i pirati vengono respinti e si ritirano, scomparendo nella vastità silenziosa dell'oceano."
agot_sailing.2031.a: 0 "E non tornate più!"

 agot_sailing.2032.t:0 "$agot_sailing.2004.t$"
agot_sailing.2032.desc: 0 "Guardo oltre l'orizzonte sconfinato quando, all'improvviso, si odono grida d'allarme. In lontananza è stata avvistata una nave, diretta dritta verso di noi. «Pirati!» gridano i marinai, guardando a [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed] in cerca di guida.\n\n«Preparatevi a combattere!» comanda [Select_CString(host.IsFemale,'lei','lui')], sguainando l'acciaio. Ben presto, i pirati ci sono addosso.\n\nMa dopo un breve scontro, i pirati sopraffanno il nostro equipaggio, saccheggiando i nostri beni preziosi prima di scomparire nella vastità del grande oceano."
agot_sailing.2032.a: 0 "Che la peste li colga!"

 agot_sailing.2033.t:0 "$agot_sailing.2004.t$"
agot_sailing.2033.desc: 0 "Guardo oltre l'orizzonte sconfinato quando, all'improvviso, si odono grida d'allarme. In lontananza è stata avvistata una nave, diretta dritta verso di noi. «Pirati!» gridano i marinai, guardando a [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed] in cerca di guida.\n\n«Issate tutte le vele!» comanda [Select_CString(host.IsFemale,'lei','lui')]. «Possiamo seminarli!» E infatti la nostra nave si dimostra abbastanza veloce da mantenere l'imbarcazione pirata a distanza di sicurezza. Ben presto, i razziatori rinunciano e scompaiono all'orizzonte."
agot_sailing.2033.a: 0 "Un brindisi sulla nave!"

 # Crewmate Overboard! Outcomes
 agot_sailing.2034.t:0 "$agot_sailing.2005.t$"
agot_sailing.2034.desc: 0 "Perso nei miei pensieri, sto presso la prua della nave quando un grido improvviso mi fa sobbalzare. «Uomo in mare! Uomo in mare!»\n\nMi precipito verso la fonte del clamore e vedo [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] saltare dal ponte della nave, tuffandosi sotto le onde. Quando [Select_CString(host.IsFemale,'lei','lui')] finalmente riemerge, [Select_CString(host.IsFemale,'lei','lui')] sta trascinando il marinaio che annega verso la nave."
agot_sailing.2034.a: 0 "Che impresa!"

 agot_sailing.2035.t:0 "$agot_sailing.2005.t$"
agot_sailing.2035.desc: 0 "Perso nei miei pensieri, sto presso la prua della nave quando un grido improvviso mi fa sobbalzare. «Uomo in mare! Uomo in mare!»\n\nMi precipito verso la fonte del clamore e vedo [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] saltare dal ponte della nave, tuffandosi sotto le onde. Quando [Select_CString(host.IsFemale,'lei','lui')] finalmente riemerge, mi rendo conto che è risalit[Select_CString(host.IsFemale,'a','o')] a mani vuote..."
agot_sailing.2035.a: 0 "Un altro marinaio perduto..."

 agot_sailing.2036.t:0 "$agot_sailing.2005.t$"
agot_sailing.2036.desc: 0 "Perso nei miei pensieri, sto presso la prua della nave quando un grido improvviso mi fa sobbalzare. «Uomo in mare! Uomo in mare!»\n\nMi precipito verso la fonte del clamore e vedo [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] gridare ordini dal ponte della nave, organizzando un salvataggio frettoloso. Poco dopo, [Select_CString(host.IsFemale,'lei','lui')] tira a bordo il marinaio che stava annegando, salvandogli la vita."
agot_sailing.2036.a: 0 "Notevole!"

 agot_sailing.2037.t:0 "$agot_sailing.2005.t$"
agot_sailing.2037.desc: 0 "Perso nei miei pensieri, sto presso la prua della nave quando un grido improvviso mi fa sobbalzare. «Uomo in mare! Uomo in mare!»\n\nMi precipito verso la fonte del clamore e vedo [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] gridare ordini dal ponte della nave, organizzando un salvataggio frettoloso. Ma, per lo sgomento dell'equipaggio, il marinaio che annegava è già scomparso sotto le onde..."
agot_sailing.2037.a: 0 "Una perdita sventurata..."

 agot_sailing.2038.t:0 "$agot_sailing.2005.t$"
agot_sailing.2038.desc: 0 "Perso nei miei pensieri, sto presso la prua della nave quando un grido improvviso mi fa sobbalzare. «Uomo in mare! Uomo in mare!»\n\nMi precipito verso la fonte del clamore e vedo [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] gridare ordini dal ponte della nave. «Lasciatelo! Non abbiamo tempo per un tentativo di salvataggio rischioso.»"
agot_sailing.2038.a: 0 "Il mare sa essere davvero crudele..."

 # Insufferable Discord Outcomes
agot_sailing.2040.t: 0 "$agot_sailing.2007.t$: Basta Lamentele"
agot_sailing.2040.desc: 0 "Finora il viaggio è andato bene, ma col passare del tempo comincio a notare dei brontolii tra l'equipaggio. I marinai lavorano duramente, ma alcuni di loro stanno seminando dissenso.\n\nContinuo a sentire la stessa lamentela ancora e ancora: «Quando esploreremo Essos? Vogliamo vedere altro di Essos!»\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] si stanca presto delle domande ripetute all'infinito e riesce a convincere l'equipaggio a concentrarsi sulla nostra destinazione prevista."
agot_sailing.2040.a: 0 "Questo dovrebbe zittirli."

agot_sailing.2041.t: 0 "$agot_sailing.2007.t$: Quando Vedremo Altro di Essos?"
agot_sailing.2041.desc: 0 "Finora il viaggio è andato bene, ma col passare del tempo comincio a notare dei brontolii tra l'equipaggio. I marinai lavorano duramente, ma alcuni di loro stanno seminando dissenso.\n\nContinuo a sentire la stessa lamentela ancora e ancora: «Quando esploreremo Essos? Vogliamo vedere altro di Essos!»\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] è altrettanto infastidit[Select_CString(host.IsFemale,'a','o')], ma ordina all'equipaggio di elevarsi al di sopra dei piagnistei e di ignorare semplicemente la discordia."
agot_sailing.2041.a: 0 "Quando finiranno queste domande?"

 # Becalmed Mood Outcomes
agot_sailing.2042.t: 0 "$agot_sailing.2008.t$: Un'Offerta"
agot_sailing.2042.desc: 0 "Sono ormai giorni che non sentiamo il minimo soffio d'aria capace di gonfiare le vele. Vedo che l'equipaggio si sta facendo irrequieto, ma non so che cosa si possa fare.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] viene vist[Select_CString(host.IsFemale,'a','o')] parlare con il primo ufficiale della nave, che tenta di convincere il capitano a fare un'offerta agli dèi affinché benedicano la nave con venti rinnovati. E infatti, [host.GetFirstNameNoTooltip] accetta subito il suggerimento, e viene fatta un'offerta."
agot_sailing.2042.a: 0 "Spero che aiuti..."

agot_sailing.2043.t: 0 "$agot_sailing.2008.t$: Gioco d'Attesa"
agot_sailing.2043.desc: 0 "Sono ormai giorni che non sentiamo il minimo soffio d'aria capace di gonfiare le vele. Vedo che l'equipaggio si sta facendo irrequieto, ma non so che cosa si possa fare.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] viene vist[Select_CString(host.IsFemale,'a','o')] parlare con il primo ufficiale della nave, che tenta di convincere il capitano a fare un'offerta agli dèi affinché benedicano la nave con venti rinnovati. Ma [host.GetFirstName] scuote il capo davanti al suggerimento. «Non voglio più sentire simili sciocchezze! Attenderemo che il vento venga a cercarci.»"
agot_sailing.2043.a: 0 "Spero che non resteremo bloccati qui..."

agot_sailing.2044.t: 0 "$agot_sailing.2008.t$: Una Lezione Pia"
agot_sailing.2044.desc: 0 "Sono ormai giorni che non sentiamo il minimo soffio d'aria capace di gonfiare le vele. Vedo che l'equipaggio si sta facendo irrequieto, ma non so che cosa si possa fare.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] viene vist[Select_CString(host.IsFemale,'a','o')] parlare con il primo ufficiale della nave, che tenta di convincere il capitano a fare un'offerta agli dèi affinché benedicano la nave con venti rinnovati. Ma [host.GetFirstName] scuote il capo davanti al suggerimento e tenta di spiegare all'equipaggio che i venti non sono governati da alcun dio del mare."
agot_sailing.2044.a: 0 "È saggio?"

 # Sailing Accident Outcomes
 # Available scopes: host, first_mate, sailor (who broke their leg)
 agot_sailing.2045.t:0 "$agot_sailing.2010.t$"
agot_sailing.2045.desc: 0 "Da giorni non abbiamo altro che cieli limpidi e un vento costante; la navigazione è agevole e il morale dell'equipaggio è alto.\n\nQuando alla fine arriva l'improvvisa raffica di vento, coglie tutti di sorpresa. Sento un grido di dolore lì vicino e mi volto per trovare [sailor.GetFirstName] rivers[Select_CString(sailor.IsFemale,'a','o')] sul ponte, con la gamba piegata in una brutta angolazione. [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] è inginocchiat[Select_CString(host.IsFemale,'a','o')] accanto al marinaio ferito, tentando di rimettere a posto la gamba.\n\nCon uno schiocco sgradevole, la gamba torna in una posizione più naturale, alleviando quasi all'istante il dolore del marinaio."
agot_sailing.2045.a: 0 "Ben fatto, capitano!"

 agot_sailing.2046.t:0 "$agot_sailing.2010.t$"
agot_sailing.2046.desc: 0 "Da giorni non abbiamo altro che cieli limpidi e un vento costante; la navigazione è agevole e il morale dell'equipaggio è alto.\n\nQuando alla fine arriva l'improvvisa raffica di vento, coglie tutti di sorpresa. Sento un grido di dolore lì vicino e mi volto per trovare [sailor.GetFirstName] rivers[Select_CString(sailor.IsFemale,'a','o')] sul ponte, con la gamba piegata in una brutta angolazione. [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] è inginocchiat[Select_CString(host.IsFemale,'a','o')] accanto al marinaio ferito, tentando di rimettere a posto la gamba.\n\nCon uno schiocco sgradevole, la gamba si gira, ma le urla di dolore del marinaio indicano che il capitano ha peggiorato ancora di più la situazione..."
agot_sailing.2046.a: 0 "Oh no!"

 agot_sailing.2047.t:0 "$agot_sailing.2010.t$"
agot_sailing.2047.desc: 0 "Da giorni non abbiamo altro che cieli limpidi e un vento costante; la navigazione è agevole e il morale dell'equipaggio è alto.\n\nQuando alla fine arriva l'improvvisa raffica di vento, coglie tutti di sorpresa. Sento un grido di dolore lì vicino e mi volto per trovare [sailor.GetFirstName] rivers[Select_CString(sailor.IsFemale,'a','o')] sul ponte, con la gamba piegata in una brutta angolazione. [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] sta in piedi sopra il marinaio ferito con un'espressione contrariata sul volto. «Cerca di fare più attenzione la prossima volta! L'oceano non è posto per marinai maldestri...»"
agot_sailing.2047.a: 0 "Parole dure, ma vere."

 agot_sailing.2048.t:0 "$agot_sailing.2010.t$"
agot_sailing.2048.desc: 0 "Da giorni non abbiamo altro che cieli limpidi e un vento costante; la navigazione è agevole e il morale dell'equipaggio è alto.\n\nQuando alla fine arriva l'improvvisa raffica di vento, coglie tutti di sorpresa. Sento un grido di dolore lì vicino e mi volto per trovare [sailor.GetFirstName] rivers[Select_CString(sailor.IsFemale,'a','o')] sul ponte, con la gamba piegata in una brutta angolazione. [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] sta in piedi accanto al marinaio ferito, con un'espressione sgomenta sul volto. [first_mate.GetName] arriva presto, proprio mentre il nostro capitano ordina [Select_CString(first_mate.IsFemale,'a lei','a lui')] di occuparsi della situazione..."
agot_sailing.2048.a: 0 "Spero che la gamba possa essere sistemata."

 # Sudden Fog Outcomes
agot_sailing.2049.t: 0 "$agot_sailing.2011.t$: Fuga"
agot_sailing.2049.desc: 0 "Poco dopo essere salpati dal porto, la nostra nave viene avvolta da una coltre di nebbia che si leva rapidamente e sembra giungere dal nulla. Il cielo è oscurato, così come l'oceano tutt'intorno a noi. Presto diventa chiaro che bisogna fare qualcosa.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di mantenere la rotta, sperando di sfuggire alla nebbia senza perdere l'orientamento. E infatti la scommessa paga: la nebbia comincia a diradarsi, riportando la nave sulla rotta desiderata."
agot_sailing.2049.a: 0 "Che fortuna!"

agot_sailing.2050.t: 0 "$agot_sailing.2011.t$: Perduti"
agot_sailing.2050.desc: 0 "Poco dopo essere salpati dal porto, la nostra nave viene avvolta da una coltre di nebbia che si leva rapidamente e sembra giungere dal nulla. Il cielo è oscurato, così come l'oceano tutt'intorno a noi. Presto diventa chiaro che bisogna fare qualcosa.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di mantenere la rotta, sperando di sfuggire alla nebbia senza perdere l'orientamento. Ma anche dopo molte ore di navigazione, la nebbia sembra non avere fine..."
agot_sailing.2050.a: 0 "Ci lascerà mai andare?"

agot_sailing.2051.t: 0 "$agot_sailing.2011.t$: Fare Dietrofront"
agot_sailing.2051.desc: 0 "Poco dopo essere salpati dal porto, la nostra nave viene avvolta da una coltre di nebbia che si leva rapidamente e sembra giungere dal nulla. Il cielo è oscurato, così come l'oceano tutt'intorno a noi. Presto diventa chiaro che bisogna fare qualcosa.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] decide di far girare la nave per evitare il pericolo di perdere l'orientamento. Questo causerà senza dubbio un ritardo, ma almeno non ci perderemo nella nebbia per giorni."
agot_sailing.2051.a: 0 "Una scelta saggia!"

agot_sailing.2052.t: 0 "$agot_sailing.2011.t$: Manovra"
agot_sailing.2052.desc: 0 "Poco dopo essere salpati dal porto, la nostra nave viene avvolta da una coltre di nebbia che si leva rapidamente e sembra giungere dal nulla. Il cielo è oscurato, così come l'oceano tutt'intorno a noi. Presto diventa chiaro che bisogna fare qualcosa.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed], [Select_CString(host.IsFemale,'una navigatrice esperta','un navigatore esperto')], non mostra alcun segno di preoccupazione. «La nebbia non è nulla che un vero marinaio debba temere,» dichiara [Select_CString(host.IsFemale,'lei','lui')]. «Mantenete la rotta, sempre avanti! La nebbia si diraderà abbastanza presto.»"
agot_sailing.2052.a: 0 "Spero che tu abbia ragione..."

agot_sailing.2100.t: 0 "Brezze Rilassanti"
agot_sailing.2100.desc: 0 "Il vento dell'oceano mi accarezza dolcemente i capelli mentre sto all'estrema prua della nostra nave, assaporando pienamente l'atmosfera. #Italic Ecco perché sono venuto in questo viaggio#!! penso tra me e me. Raramente mi sono sentito così... rilassato.\n\nChiudo gli occhi per un momento e lascio vagare i pensieri, concentrandomi solo sul fragore delle onde, sul lieve dondolio delle assi sotto i miei piedi e sui richiami lontani dei gabbiani dalle coste vicine. Sì. Questo... è proprio questo."
agot_sailing.2100.a: 0 "Sento il mio stress venire spazzato via..."

agot_sailing.2101.t: 0 "Un Momento per Parlare"
agot_sailing.2101.opening: 0 "Mentre la nostra imbarcazione passa accanto a una grande città con un imponente faro in lontananza, la maggior parte dei passeggeri ammira il panorama. [woo_target.GetFirstName] si adagia lì vicino: ora è il momento ideale per una conversazione informale."
agot_sailing.2101.married: 0 "Mi muovo mentre [Select_CString(woo_target.IsFemale,'la sua','il suo')] [woo_target.GetPrimarySpouse.GetWifeHusband], [woo_target.GetPrimarySpouse.Custom('IT_NAM_COL3')][woo_target.GetPrimarySpouse.GetTitledFirstName], è distratt[Select_CString(woo_target.GetPrimarySpouse.IsFemale,'a','o')]."
agot_sailing.2101.married_absent: 0 "[Select_CString(woo_target.IsFemale,'La sua','Il suo')] [woo_target.GetPrimarySpouse.GetWifeHusband], [woo_target.GetPrimarySpouse.Custom('IT_NAM_COL3')][woo_target.GetPrimarySpouse.GetTitledFirstName], è lontan[Select_CString(woo_target.GetPrimarySpouse.IsFemale,'a','o')]..."
agot_sailing.2101.currentspouse: 0 "Forse oggi conquisterò [Select_CString(woo_target.IsFemale,'la mia donna','il mio uomo')]!"
agot_sailing.2101.desc: 0 "\n\n«Ah, [woo_target.Custom('IT_NAM_COL3')][woo_target.GetTitledFirstName], è una rara occasione poter conversare nel chiuso di una nave per mare. Spero che tu stia trovando un po' di piacere in questo meraviglioso viaggio,» dico con tono rilassato.\n\nSono piuttosto convinto che il suo sorriso rechi più della semplice cortesia."
agot_sailing.2101.a: 0 "Non c'è nulla di meglio che solcare le acque aperte!"
agot_sailing.2101.a.tt: 0 "#F Fa appello al lato attivo di [woo_target.GetFirstNamePossessiveNoTooltip].#!"
agot_sailing.2101.b: 0 "Vedere le meraviglie del mondo con gli amici significa vivere davvero."
agot_sailing.2101.b.tt: 0 "#F Fa appello al lato sociale di [woo_target.GetFirstNamePossessiveNoTooltip].#!"
agot_sailing.2101.c: 0 "A volte provo compassione per i marinai che lavorano duramente."
agot_sailing.2101.c.tt: 0 "#F Fa' appello al lato compassionevole di [woo_target.GetFirstNamePossessiveNoTooltip].#!"
agot_sailing.2101.d: 0 "Se fossi abbastanza abile, aiuterei a tenere la nave a galla."
agot_sailing.2101.d.tt: 0 "#F Fa' appello al lato diligente di [woo_target.GetFirstNamePossessiveNoTooltip].#!"
agot_sailing.2101.e: 0 "I frutti dell'oceano possono nutrire intere città, se necessario."
agot_sailing.2101.e.tt: 0 "#F Fa' appello al lato amministrativo di [woo_target.GetFirstNamePossessiveNoTooltip].#!"
agot_sailing.2102.reply_sailor: 0 ""$agot_sailing.2101.a$"\n\n"
agot_sailing.2102.reply_socialite: 0 ""$agot_sailing.2101.b$"\n\n"
agot_sailing.2102.reply_pity: 0 ""$agot_sailing.2101.c$"\n\n"
agot_sailing.2102.reply_wastrel: 0 ""$agot_sailing.2101.d$"\n\n"
agot_sailing.2102.reply_steward: 0 ""$agot_sailing.2101.e$"\n\n"
agot_sailing.2102.opening: 0 "[woo_actor.Custom('IT_NAM_COL3')][woo_actor.GetTitledFirstName] mi si avvicina mentre la nostra nave passa accanto a una grande città con un imponente faro in lontananza, distraendo la maggior parte degli altri passeggeri.\n\n[Select_CString(woo_actor.IsFemale,'Lei','Lui')] riflette per un momento prima di offrire,"
agot_sailing.2102.sailor: 0 "$agot_sailing.2102.reply_sailor$Non posso negare che il brivido dell'azione sia una gioia."
agot_sailing.2102.socialite: 0 "$agot_sailing.2102.reply_socialite$Conosco il simbolismo a cui [Select_CString(woo_actor.IsFemale,'lei','lui')] allude."
agot_sailing.2102.pity: 0 "$agot_sailing.2102.reply_pity$Forse [Select_CString(woo_actor.IsFemale,'lei','lui')] è divers[Select_CString(woo_actor.IsFemale,'a','o')] dagli altri."
agot_sailing.2102.wastrel: 0 "$agot_sailing.2102.reply_wastrel$Questa è una persona destinata a grandi cose."
agot_sailing.2102.steward: 0 "$agot_sailing.2102.reply_steward$Vi è davvero bellezza nella natura ordinata."
agot_sailing.2102.fallback: 0 "Trovo difficile pensare a una risposta."
agot_sailing.2102.a: 0 "Non posso negare che [Select_CString(woo_actor.IsFemale,'lei','lui')] abbia un certo fascino..."
intent_sailing_conversation: 0 "[TARGET_CHARACTER.GetShortUIName|U] ha mostrato più interesse per [CHARACTER.GetShortUIName] che per la conversazione durante la navigazione insieme."

agot_sailing.2103.sailor: 0 "$agot_sailing.2102.reply_sailor$\n\nNon posso fare a meno di rabbrividire dentro di me..."
agot_sailing.2103.socialite: 0 "$agot_sailing.2102.reply_socialite$\n\nChe arroganza..."
agot_sailing.2103.pity: 0 "$agot_sailing.2102.reply_pity$\n\nImpara ad accettare un complimento!"
agot_sailing.2103.wastrel: 0 "$agot_sailing.2102.reply_wastrel$\n\n"
agot_sailing.2103.steward: 0 "$agot_sailing.2102.reply_steward$\n\n"
agot_sailing.2103.fallback: 0 "[Select_CString(woo_actor.IsFemale,'Lei','Lui')] mi sorride semplicemente con aria consapevole, mettendomi #EMP profondamente#! a disagio."
agot_sailing.2103.a: 0 "Che [befriend_actor.GetWomanMan] ridicol[Select_CString(befriend_actor.IsFemale,'a','o')]."

agot_sailing.2104.reply: 0 "[woo_target.Custom('IT_NAM_COL3')][woo_target.GetTitledFirstName] sembra aver reagito con calore alla mia mossa"
agot_sailing.2104.sailor: 0 "$agot_sailing.2104.reply$, con gli occhi ardenti mentre [Select_CString(woo_target.IsFemale,'lei','lui')] annuisce con vigore."
agot_sailing.2104.socialite: 0 "$agot_sailing.2104.reply$, quasi sembrando guardarmi con occhi nuovi."
agot_sailing.2104.pity: 0 "$agot_sailing.2104.reply$, lamentando l'ingiusta distribuzione del lavoro nei nostri tempi."
agot_sailing.2104.wastrel: 0 "$agot_sailing.2104.reply$, chiaramente sorpres[Select_CString(woo_target.IsFemale,'a','o')] di aver trovato uno spirito affine."
agot_sailing.2104.steward: 0 "$agot_sailing.2104.reply$, felice di aver trovato qualcuno che prova anch'esso gioia in simili cose."
agot_sailing.2104.fallback: 0 "$agot_sailing.2104.reply$, fissandomi a lungo e profondamente negli occhi."
agot_sailing.2104.desc: 0 "\n\nQuando [Select_CString(woo_target.IsFemale,'lei','lui')] se ne va, la tensione è palpabile in ogni convenevole: sapevo che avrei trovato le parole giuste per conquistar[Select_CString(woo_target.IsFemale,'la','lo')]!"
agot_sailing.2104.a: 0 "Credo che [Select_CString(woo_target.IsFemale,'lei','lui')] abbia abboccato..."

agot_sailing.2105.reply: 0 "La mia risposta non sembra aver impressionato [woo_target.Custom('IT_NAM_COL4')][woo_target.GetTitledFirstName]"
agot_sailing.2105.sailor: 0 "$agot_sailing.2105.reply$, poiché [Select_CString(woo_target.IsFemale,'lei','lui')] evita il mio sguardo mentre mi ringrazia e rapidamente si congeda."
agot_sailing.2105.socialite: 0 "$agot_sailing.2105.reply$, poiché [Select_CString(woo_target.IsFemale,'lei','lui')] alza gli occhi al cielo con disprezzo."
agot_sailing.2105.pity: 0 "$agot_sailing.2105.reply$, poiché [Select_CString(woo_target.IsFemale,'lei','lui')] perde rapidamente interesse, scoraggiat[Select_CString(woo_target.IsFemale,'a','o')] dalle mie parole."
agot_sailing.2105.wastrel: 0 "$agot_sailing.2105.reply$, poiché [Select_CString(woo_target.IsFemale,'lei','lui')] si estranea, sembrando ascoltare solo a metà."
agot_sailing.2105.steward: 0 "$agot_sailing.2105.reply$, poiché [Select_CString(woo_target.IsFemale,'lei','lui')] si estranea, sembrando ascoltare solo a metà."
agot_sailing.2105.fallback: 0 "$agot_sailing.2105.reply$, poiché [Select_CString(woo_target.IsFemale,'lei','lui')] non vede l'ora di lasciare la mia compagnia."
agot_sailing.2105.desc: 0 "\n\nRimast[Select_CString(ROOT.Char.IsFemale,'a','o')] sol[Select_CString(ROOT.Char.IsFemale,'a','o')] dopo che [Select_CString(woo_target.IsFemale,'lei','lui')] si è congedat[Select_CString(woo_target.IsFemale,'a','o')], non posso fare a meno di sentirmi [Select_CString(ROOT.Char.IsFemale,'una sciocca','uno sciocco')] per un passo falso tanto madornale..."
agot_sailing.2105.a: 0 "A cosa stavo pensando...?"

agot_sailing.2201.t: 0 "Il vero premio"
agot_sailing.2201.desc: 0 "Mentre lasciamo il porto e ci spingiamo in mare aperto, tengo d'occhio [ROOT.Char.Custom2('DescriptorNegative', murder_target)] [murder_target.Custom('IT_NAM_COL3')][murder_target.GetTitledFirstName], in piedi vicino all'albero maestro della nave, ignar[Select_CString(murder_target.IsFemale,'a','o')] della mia osservazione."
agot_sailing.2201.agent: 0 "[murder_schemer.Custom('IT_NAM_COL3')][murder_schemer.GetTitledFirstName] non ha potuto essere qui, ma questa potrebbe essere l'occasione che stavamo aspettando.\n\n"
agot_sailing.2201.a: 0 "Oggi è il giorno."
sailing_murder_accomplice_tt: 0 "[THIS.Char.GetShortUIName|U] tenterà di assassinare [murder_target.GetShortUIName]"

agot_sailing.2202.opening: 0 "Ho passato molti giorni a seguire [murder_target.Custom('IT_NAM_COL4')][murder_target.GetTitledFirstName] mentre [Select_CString(murder_target.IsFemale,'lei','lui')] svolge la sua routine quotidiana a bordo della nave. Infine, giunge una sera particolarmente nebbiosa, e sono cert[Select_CString(ROOT.Char.IsFemale,'a','o')] che il mio bersaglio sia sol[Select_CString(murder_target.IsFemale,'a','o')] nella sua cabina.\n\n"
agot_sailing.2202.desc: 0 "Quando entro, [Select_CString(murder_target.IsFemale,'la','lo')] trovo profondamente addormentat[Select_CString(murder_target.IsFemale,'a','o')] nel suo letto."
agot_sailing.2202.a: 0 "Un solo taglio del mio pugnale per liberarmi di [Select_CString(murder_target.IsFemale,'lei','lui')] per sempre!"
agot_sailing.2202.a.tt: 0 "#EMP Non dovrei lasciarmi sfuggire questa splendida occasione che mi si è presentata...#!"
agot_sailing.2202.b: 0 "No, non vale il rischio..."
agot_sailing.2202.b.tt: 0 "#EMP E se [Select_CString(murder_target.IsFemale,'lei','lui')] dovesse sopravvivere...?#!"
sailing_kill_murder_missed: 0 "[murder_target.GetFirstNameOrMeNoTooltip] ha fortuna"
sailing_kill_murder_injured: 0 "[murder_target.GetFirstNameOrMeNoTooltip] viene ferit[Select_CString(murder_target.IsFemale,'a','o')] "accidentalmente""
sailing_kill_murder_killed: 0 "[murder_target.GetFirstNameOrMeNoTooltip] viene uccis[Select_CString(murder_target.IsFemale,'a','o')] "tragicamente""
sailing_kill_murder_escape: 0 "[murder_target.GetFirstNameOrMeNoTooltip] fugge"
sailing_target_attendee_killed_tt: 0 "@death_icon![murder_target.GetShortUIName] muore"
sailing_target_attendee_injured_chance_tt: 0 "[murder_target.GetShortUIName] potrebbe essere ferit[Select_CString(murder_target.IsFemale,'a','o')]"

agot_sailing.2203.desc: 0 "Agisco il più rapidamente possibile, avvicinandomi al letto in cui [murder_target.Custom('IT_NAM_COL3')][murder_target.GetTitledFirstName] dorme. Proprio mentre estraggo il mio pugnale, [Select_CString(murder_target.IsFemale,'la','lo')] vedo muoversi."
agot_sailing.2203.agent: 0 "Non voglio deludere [abduct_schemer.GetFirstName]..."
agot_sailing.2203.success: 0 "\n\n"[ROOT.Char.GetFirstNameNoTooltip]?! Che cos—" [murder_target.GetFirstNameNoTooltip] ricade sul letto, mentre il mio pugnale penetra a fondo nel suo cuore.\n\nIl fatto è compiuto prima ancora che [Select_CString(murder_target.IsFemale,'lei','lui')] possa finire le sue ultime parole, e mi affretto a coprire le mie tracce, gettando il corpo fuori bordo attraverso l'unica finestra della cabina."
agot_sailing.2203.failure: 0 "\n\n"[ROOT.Char.GetFirstNameNoTooltip]?! [Select_CString(ROOT.Char.IsFemale,'Maledetta','Maledetto')]!" [murder_target.GetFirstNameNoTooltip] riesce in qualche modo a rotolare via mentre il mio pugnale scatta in avanti. Poi, [murder_target.GetFirstNameNoTooltip] si rimette in piedi a fatica.\n\nMa [Select_CString(murder_target.IsFemale,'lei','lui')] si precipita fuori dalla porta della cabina mentre cerco di ritrovare l'equilibrio, guardandosi alle spalle con terrore e gridando a pieni polmoni. Non riuscirò a raggiunger[Select_CString(murder_target.IsFemale,'la','lo')] in tempo..."
agot_sailing.2203.a: 0 "Dovrei tornare sul ponte prima che qualcuno si insospettisca..."
agot_sailing.2203.b: 0 "Dannazione! Dannazione! Dannazione!"

agot_sailing.2204.t: 0 "Un coltello nell'oscurità"
agot_sailing.2204.desc: 0 "È tarda sera, e mi sono ritirat[Select_CString(ROOT.Char.IsFemale,'a','o')] nella mia cabina per concedermi un meritato riposo. Proprio mentre sto per addormentarmi, un rumore insolito alle mie spalle mi fa sobbalzare. Apro gli occhi appena in tempo per vedere [murder_actor.Custom('IT_NAM_COL4')][murder_actor.GetTitledFirstName] con il pugnale alzato sopra la testa, che si abbatte su di me."
agot_sailing.2204.success: 0 "\n\nVedo troppo tardi la determinazione negli occhi di [murder_actor.GetFirstNamePossessiveNoTooltip], non riuscendo a schivare il colpo, e vengo ricacciat[Select_CString(ROOT.Char.IsFemale,'a','o')] sul mio letto con un tonfo, il pugnale conficcato a fondo nel mio cuore.\n\nLa mia vista si annebbia mentre colgo un ultimo scorcio di [murder_actor.GetFirstName], con un sorriso tenue ma crudele sulle labbra. "Addio, [ROOT.Char.GetFirstNameNoTooltip].""
agot_sailing.2204.failure: 0 "\n\n[murder_actor.GetFirstNameNoTooltip] sta cercando di uccidermi! Mi scanso disperatamente, ricevendo un colpo di striscio dalla punta del pugnale mentre cala su di me, e ruzzolo goffamente a terra, ma riesco a rimettermi in piedi mentre [Select_CString(murder_actor.IsFemale,'lei','lui')] perde l'equilibrio, imprecando.\n\nScatto fuori dalla cabina, disperat[Select_CString(ROOT.Char.IsFemale,'a','o')] di ottenere aiuto da chiunque sia ancora sveglio."
agot_sailing.2204.a: 0 "Che—! N—"
agot_sailing.2204.b: 0 "Continua solo a correre!"
sailing_ends_tt: 2 "Il [GetActivityType('activity_agot_sailing').GetName] termina"

agot_sailing.2301.t: 1 "Un momento per parlare"
agot_sailing.2301.desc: 0 "Il sole splende luminoso mentre la nostra nave solca rapida le acque aperte, avanzando di buon passo. [befriend_target.GetFirstName] si trova poco distante, ad ammirare la vista: questa è la mia occasione per impressionar[Select_CString(befriend_target.IsFemale,'la','lo')].\n\n"[befriend_target.Custom('IT_NAM_COL3')][befriend_target.GetTitledFirstNameNoTooltip]! Come stai? Non capita spesso di avere occasione di parlare." esordisco in tono informale.\n\n[Select_CString(befriend_target.IsFemale,'Lei','Lui')] sembra sorpres[Select_CString(befriend_target.IsFemale,'a','o')] dalla mia conversazione, ma non ostile all'idea."

agot_sailing.2302.reply_sailor: 0 ""$agot_sailing.2101.a$"\n\n"
agot_sailing.2302.reply_pity: 0 ""$agot_sailing.2101.c$"\n\n"
agot_sailing.2302.reply_wastrel: 0 ""$agot_sailing.2101.d$"\n\n"
agot_sailing.2302.reply_steward: 0 ""$agot_sailing.2101.e$"\n\n"

agot_sailing.2302.opening: 0 "[befriend_actor.Custom('IT_NAM_COL3')][befriend_actor.GetTitledFirstName] mi si accosta mentre la nave corre sul pacifico oceano.\n\n[Select_CString(befriend_actor.IsFemale,'Lei','Lui')] sorride calorosamente, dicendo"

agot_sailing.2302.sailor: 0 "$agot_sailing.2302.reply_sailor$Non è un'affermazione a cui possa trovare da ridire."
agot_sailing.2302.pity: 0 "$agot_sailing.2302.reply_pity$Non posso negare la verità delle sue parole; è un lavoro crudele."
agot_sailing.2302.wastrel: 0 "$agot_sailing.2302.reply_wastrel$Suona davvero vero; tutte le cose utili che potrei fare invece..."
agot_sailing.2302.steward: 0 "$agot_sailing.2302.reply_steward$Ordinare la natura è certamente qualcosa in cui posso comprendere si trovi gioia."
agot_sailing.2302.fallback: 0 "Non sono sicur[Select_CString(ROOT.Char.IsFemale,'a','o')] di cosa dire."
agot_sailing.2302.a: 0 "Forse abbiamo più in comune di quanto pensassi."

agot_sailing.2303.opening: 0 "[befriend_actor.Custom('IT_NAM_COL3')][befriend_actor.GetTitledFirstName] mi si avvicina mentre la nostra nave procede costante verso la sua destinazione."
agot_sailing.2303.sailor: 0 "$agot_sailing.2302.reply_sailor$\n\nNon potrei essere più in disaccordo..."
agot_sailing.2303.pity: 0 "$agot_sailing.2302.reply_pity$Che debolezza, il mondo è crudele."
agot_sailing.2303.wastrel: 0 "$agot_sailing.2302.reply_wastrel$Tutti dobbiamo trovare tempo per gli svaghi."
agot_sailing.2303.steward: 0 "$agot_sailing.2302.reply_steward$Che noia mortale..."
agot_sailing.2303.fallback: 0 "[Select_CString(befriend_actor.IsFemale,'Lei','Lui')] sorride speranzos[Select_CString(befriend_actor.IsFemale,'a','o')], aspettandosi chiaramente una certa affinità reciproca."
agot_sailing.2303.a: 0 "Di', cos'è quello laggiù?"

agot_sailing.2304.reply: 0 "[befriend_target.Custom('IT_NAM_COL3')][befriend_target.GetTitledFirstName] sembra avere molto in comune con me"
agot_sailing.2304.sailor: 0 "$agot_sailing.2304.reply$, immergendosi con entusiasmo nelle minuzie del modo corretto di gettare l'ancora e assicurare una nave in porto."
agot_sailing.2304.pity: 0 "$agot_sailing.2304.reply$, condividendo la mia compassione per coloro che devono lavorare così duramente."
agot_sailing.2304.wastrel: 0 "$agot_sailing.2304.reply$, lamentando che anche il suo tempo potrebbe essere meglio speso altrove."
agot_sailing.2304.steward: 0 "$agot_sailing.2304.reply$, desideros[Select_CString(befriend_target.IsFemale,'a','o')] di condividere intuizioni sulle rotte commerciali marittime."
agot_sailing.2304.fallback: 0 "$agot_sailing.2304.reply$, rilassando il suo contegno in mia compagnia."
agot_sailing.2304.desc: 0 "\n\nQuando proseguiamo, a malapena riusciamo a separarci: sapevo che avrei trovato le parole giuste per conquistar[Select_CString(befriend_target.IsFemale,'la','lo')]!"
agot_sailing.2304.a: 0 "Credo di aver[Select_CString(befriend_target.IsFemale,'la','lo')] conquistat[Select_CString(befriend_target.IsFemale,'a','o')]..."

agot_sailing.2305.reply: 0 "Le mie parole non sembrano aver avuto un grande effetto su [befriend_target.Custom('IT_NAM_COL4')][befriend_target.GetTitledFirstName]"
agot_sailing.2305.sailor: 0 "$agot_sailing.2305.reply$, poiché [Select_CString(befriend_target.IsFemale,'lei','lui')] si limita a sorridere cortesemente, schiarendosi la gola, evidentemente in cerca di un modo educato per porre fine alla nostra conversazione."
agot_sailing.2305.pity: 0 "$agot_sailing.2305.reply$, poiché [Select_CString(befriend_target.IsFemale,'lei','lui')] mi rivolge uno sguardo strano e si gratta la testa."
agot_sailing.2305.wastrel: 0 "$agot_sailing.2305.reply$, poiché [Select_CString(befriend_target.IsFemale,'lei','lui')] appare del tutto inorridit[Select_CString(befriend_target.IsFemale,'a','o')] dalle mie parole."
agot_sailing.2305.steward: 0 "$agot_sailing.2305.reply$, poiché [Select_CString(befriend_target.IsFemale,'lei','lui')] perde rapidamente interesse, chiaramente non incline a parlare di rotte commerciali."
agot_sailing.2305.fallback: 0 "$agot_sailing.2305.reply$, poiché [Select_CString(befriend_target.IsFemale,'lei','lui')] non dice nulla."
agot_sailing.2305.desc: 0 "\n\nRimasto solo dopo che [Select_CString(befriend_target.IsFemale,'lei','lui')] è andat[Select_CString(befriend_target.IsFemale,'a','o')] a conversare con altri, mi sento sciocco..."
agot_sailing.2305.a: 0 "Ben fatto, [ROOT.Char.GetFirstNameNoTooltip]."

