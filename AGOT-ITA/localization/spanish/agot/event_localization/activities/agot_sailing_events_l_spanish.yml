agot_sailing.3100.t: 0 "Tracciare una Rotta per Valyria"
agot_sailing.3100.desc: 0 "Vedo [first_mate.GetFirstNameNoTooltip] riempirsi d'entusiasmo mentre [Select_CString(first_mate.IsFemale,'lei','lui')] inizia a radunare il resto dell'equipaggio, che si mette rapidamente al lavoro per spiegare le vele e issare l'ancora.\n\nScendo sottocoperta ed entro nei miei alloggi, aprendo un boccaporto per lasciare che la luce del sole si riversi sulla distesa di carte nautiche sparse sul tavolo del capitano. [first_mate.GetFirstNameNoTooltip] entra e si unisce a me al mio fianco.\n\n«Dunque, avanti verso le terre condannate di Valyria, capitano?»"
agot_sailing.3100.a: 0 "Seguite ogni mia indicazione!"
agot_sailing.3100.a.success: 0 "Tracci con successo una rotta"
agot_sailing.3100.a.success.tt: 0 "Ti avventuri con fiducia in mare aperto."
agot_sailing.3100.a.failure.tt: 0 "Non riesci a trovare una rotta plausibile."

agot_sailing.3101.t: 0 "Una Rotta Tracciata"
agot_sailing.3101.desc: 0 "Dopo aver studiato a lungo le mie carte nautiche e averle confrontate con i miei appunti sulla storia di Valyria, traccio una rotta verso est in direzione delle Quattordici Fiamme.\n\nEstratta una penna, segno la posizione con una grande croce e mi volto verso il mio primo ufficiale con uno sguardo fiducioso.\n\n«Navigheremo oltre le terre delle Città Libere, verso la Baia degli Schiavisti, poi prenderemo una rotta di 260 gradi nel Mare Fumante!»"
agot_sailing.3101.a: 0 "Il nostro viaggio comincia qui."

agot_sailing.3102.t: 0 "Un Sentiero Ancora Nascosto"
agot_sailing.3102.desc: 0 "Dopo aver studiato a lungo le mie carte nautiche e averle confrontate con i miei appunti sulla storia di Valyria, proprio non riesco a individuare con certezza un luogo probabile per un buon ancoraggio entro le Quattordici Fiamme. Davvero, è come cercare un ago in un pagliaio.\n\nCon la coda dell'occhio vedo la fiducia di [first_mate.GetFirstNamePossessiveNoTooltip] cominciare a vacillare quando [Select_CString(first_mate.IsFemale,'lei','lui')] si rende conto di quanto io sia spaesato. Lentamente, [Select_CString(first_mate.IsFemale,'lei','lui')] posa una mano sulla mia spalla.\n\n«Forse... lo troveremo un'altra volta?»"
agot_sailing.3102.a: 0 "Immagino che [Select_CString(first_mate.IsFemale,'lei','lui')] abbia ragione. Navigheremmo verso la morte."

agot_sailing.3200.t: 0 "Un Kraken Mostruoso"
agot_sailing.3200.desc: 0 "Mentre navighiamo, non riesco a scrollarmi di dosso un senso d'inquietudine, gettando di tanto in tanto lo sguardo verso le acque profonde. Lontano, vedo qualcosa infrangere la superficie per un solo istante, e un brivido funesto mi corre lungo la schiena. Lo scorgo di nuovo, più vicino, ora abbastanza da distinguere qualcosa di squamoso che si muove nell'acqua.\n\nQuando comincio a vederlo più chiaramente, la paura quasi mi atterra: grande quanto una nave imponente, con un lungo corpo tentacolato e una testa crestata, è diverso da qualsiasi cosa io abbia mai visto. Uno dei mitici kraken, lontano parente dei calamari ben più piccoli che oggi si trovano in molti mari. Credevo fossero solo leggenda!\n\nDevo scegliere in fretta ora, mentre lo vedo avvicinarsi, gli occhi colmi di desiderio malevolo mentre fissa la mia nave. Combatto e proseguo, o torno indietro e tento di fuggire?"
agot_sailing.3200.a: 0 "Arcieri, preparate gli archi! Abbatteremo questa bestia!"
agot_sailing.3200.a.success: 0 "Uccidi con successo il kraken"
agot_sailing.3200.a.success.tt: 0 "Tu e il tuo equipaggio celebrate la vostra grande vittoria."
agot_sailing.3200.a.failure: 0 "Vieni sopraffatto dall'assalto del kraken"
agot_sailing.3200.a.failure.tt: 0 "@death_icon! Il kraken devasta la tua nave e rischi la morte."
agot_sailing.3200.b: 0 "Portateci via da qui! Non possiamo sperare di sconfiggerlo!"
agot_sailing.3200.b.tt: 0 "Tenti di fuggire tornando in porto."
agot_sailing.3200.b.success.tt: 0 "Tu e la tua nave riuscite a fuggire, illesi."
agot_sailing.3200.b.failure.tt: 0 "Fuggi, ma la tua nave subisce danni significativi."
agot_sailing.3200.c: 0 "È il momento di mettere alla prova il potere del corno..."
agot_sailing.3200.c_success: 0 "Riesci a vincolare la mente del kraken e a comandargli di andarsene"
agot_sailing.3200.c_failure: 0 "Non riesci a vincolare la mente del kraken, e distrugge la tua nave"

agot_sailing.3201.t: 0 "Ammazzakraken"
agot_sailing.3201.t_horn: 0 "Comandante del Kraken"
agot_sailing.3201.desc: 0 "Il mio equipaggio tempesta la bestia di frecce mentre cerca di assalire la nave, mentre io tento di trovare un'apertura per infliggerle un colpo più potente. Alla fine, quando prova ad afferrarmi nel suo becco sdentato, riesco a schivare per un soffio prima di colpirla all'occhio con la mia [ROOT.Char.Custom('signature_weapon')].\n\nUrlando d'agonia, la bestia si agita furiosamente, scaraventandomi sul ponte. Tuttavia, il mio colpo è andato a segno: la bestia emette un ultimo stridio prima di crollare in mare, con il cadavere che riaffiora in superficie.\n\nIl mio equipaggio esplode in grida di giubilo, e alcuni tirano fuori riserve personali di alcol per festeggiare. Il mio primo ufficiale, [first_mate.GetFirstNameNoTooltip], mi batte una mano sulla spalla. «Ben fatto, [Select_CString(ROOT.Char.IsFemale,'mia','mio')] [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]! La bestia non ha mai avuto alcuna possibilità!»"
agot_sailing.3201.desc_horn: 0 "Mentre l'equipaggio arretra dietro di me, porto il corno del kraken alle labbra e ne libero il grido profondo e tonante. Il suono rotola sul mare, e pochi istanti dopo la grande bestia comincia a ritirarsi, svanendo sotto le profondità da cui era venuta. Ora non può esserci dubbio che il corno custodisca un vero potere.\n\nL'equipaggio esplode in grida di giubilo, e alcuni aprono riserve nascoste di liquori in segno di festa. Il mio primo ufficiale, [first_mate.GetFirstNameNoTooltip], mi batte saldamente una mano sulla spalla. «Ben fatto, [Select_CString(ROOT.Char.IsFemale,'mia','mio')] [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]! La bestia non ha mai avuto alcuna possibilità!»"
agot_sailing.3201.a: 0 "Proprio così, proprio così! E ora, il nostro cammino è aperto..."
agot_sailing.3201.b: 0 "Basta sciocchezze, ho bisogno di bere!"

agot_sailing.3202.t: 0 "Uno Spuntino Gustoso"
agot_sailing.3202.desc: 0 "Il mostruoso kraken si scrolla facilmente di dosso le frecce che il mio equipaggio gli scaglia contro disperatamente, afferrando membri dell'equipaggio a destra e a manca!\n\nNon passa molto prima che venga a cercare me. Schivo una volta, poi due, poi... nulla."
agot_sailing.3202.a: 0 "No... non così!"
agot_sailing.3202.a.success.tt: 0 "In qualche modo riesci a fuggire con la vita intatta."
agot_sailing.3202.a.failure.tt: 0 "@death_icon! Vieni inghiottito intero, per non essere mai più visto."

agot_sailing.3300.t: 0 "Provviste in Calo"
agot_sailing.3300.desc: 0 "Ho trascorso molto tempo in mare, e forti venti contrari hanno fatto sì che non riuscissi ad avanzare quanto avrei sperato. Quel che è peggio, il mio primo ufficiale mi informa che le nostre provviste stanno pericolosamente scarseggiando e che probabilmente finiranno prima di raggiungere la nostra destinazione. Sono già scoppiate risse tra il mio equipaggio e, senza la mia guida, questo viaggio finirà sicuramente in disastro.\n\nÈ tempo che io decida se usare la carota o il bastone. Potrei cercare di escogitare un modo equo per far durare un po' più a lungo le provviste rimaste, oppure potrei imporre disciplina con pugno draconiano, usando la mia conoscenza del mantenimento dei rifornimenti in guerra per farci sopravvivere.\n\nIn alternativa, le nostre provviste basterebbero per il viaggio di ritorno in porto, ma posso davvero arrendermi ora?"
agot_sailing.3300.a: 0 "Sono certo di poter far durare ciò che ci resta..."
agot_sailing.3300.a.success: 0 "Razioni con successo le provviste rimaste"
agot_sailing.3300.a.success.tt: 0 "Avrai abbastanza cibo e bevande per durare tutto il viaggio."
agot_sailing.3300.a.failure: 0 "Calcoli male la quantità di razioni"
agot_sailing.3300.a.failure.tt: 0 "@death_icon! Tu e tutto il tuo equipaggio morirete di fame in mare."
agot_sailing.3300.b: 0 "La disciplina è la risposta: questa nave è ora in assetto di guerra!"
agot_sailing.3300.b.success: 0 "Riesci a tenere in riga il tuo equipaggio"
agot_sailing.3300.b.success.tt: 0 "La tua conoscenza della logistica e la tua richiesta di disciplina tra gli uomini assicurano che non morirete di fame."
agot_sailing.3300.b.failure: 0 "Non riesci a gestire la situazione"
agot_sailing.3300.b.failure.tt: 0 "@death_icon! Il tuo approccio pesante e la tua incapacità di imporre disciplina spingono l'equipaggio all'ammutinamento, liberandosi della tua tirannia."
agot_sailing.3300.c: 0 "Immagino di averci provato, ma non vale il rischio."
agot_sailing.3300.c.tt: 0 "Fai ritorno al porto."
agot_sailing.3300.d: 0 "[man_meat.GetName] sembra terribilmente appetitos[Select_CString(man_meat.IsFemale,'a','o')]..."
agot_sailing.3300.d.tt: 0 "Scegli di divorare [man_meat.GetNameNoTooltip] per sfamare l'equipaggio"

agot_sailing.3301.t: 0 "Razionamento Accorto"
agot_sailing.3301.desc: 0 "Con alcuni calcoli astuti, sono riuscito a far durare le nostre provviste limitate in modo equo, imponendo un rigido regime di razionamento sulla mia nave.\n\nAnche se i nostri ventri forse non saranno pieni come nella prima parte del viaggio, almeno nessun membro dell'equipaggio potrà gridare all'ingiustizia."
agot_sailing.3301.a: 0 "Uno per te, uno per me."

agot_sailing.3302.t: 0 "Inedia"
agot_sailing.3302.desc: 0 "Gli animi erano alti mentre calcolavo una razione giornaliera considerevole di cibo e acqua per tutti a bordo della nave. Ma l'allegria si è presto mutata in disperazione quando le nostre scorte si sono esaurite senza terra in vista, a miglia dalla costa.\n\nLa mia gola è secca e il mio stomaco duole per i crampi più dolorosi. Non mi resta molto; molti del mio equipaggio sono già periti.\n\nChe cosa è successo?"
agot_sailing.3302.a: 0 "Ho dimenticato di riportare l'uno?"

agot_sailing.3303.t: 0 "Tirare Avanti"
agot_sailing.3303.desc: 0 "Nonostante la resistenza iniziale del mio equipaggio, con mano ferma e atteggiamento inflessibile sono riuscito a riprendere il controllo della nostra situazione delle provviste.\n\nIl morale può aver subito un colpo, e il rumore dei ventri che brontolano è diventato cosa comune, ma almeno posso concentrarmi di nuovo sul viaggio che ci attende."
agot_sailing.3303.a: 0 "Doveva essere fatto."

agot_sailing.3304.t: 0 "Ammutinamento"
agot_sailing.3304.desc: 0 "I miei sforzi per rimettere in riga il mio equipaggio con pugno draconiano sono finiti in disastro. I miei uomini affamati e insoddisfatti non avevano la forza necessaria per condurci fino alla nostra favoleggiata destinazione, e hanno preso la mia nave in un ammutinamento!\n\nLegandomi strettamente le braccia dietro la schiena, mi gettano presso il sartiame mentre discutono di cosa fare di me. Poi, il loro apparente capobanda, [mutiny_leader.Custom('IT_NAM_COL3')][mutiny_leader.GetTitledFirstNameNicknamed], mi trascina in piedi e mi costringe sulla passerella assemblata in fretta che pende dal fianco della nave, bloccandomi la ritirata con la spada tesa.\n\n«Cammina, tiranno...»"
agot_sailing.3304.a: 0 "Codardi! Traditori!"

agot_sailing.3305.desc: 0 "Siamo in mare da lungo tempo, e forti venti contrari hanno fatto sì che i nostri progressi siano stati pochi, e ancor meno di quanto avessimo sperato. Quel che è peggio, le provviste stanno pericolosamente scarseggiando...\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] ha tentato di convincere l'equipaggio a imporre razioni dure, ma è troppo poco, troppo tardi. Le ultime provviste sono esaurite, e presto lo saremo anche noi."
agot_sailing.3305.a: 0 "Ti prego, solo un morso..."

agot_sailing.3306.t: 0 "Pastura sull'Acqua"
agot_sailing.3306.desc: 0 "Il viaggio è andato terribilmente storto, e le nostre provviste si sono ridotte a miseri avanzi... Alcuni sulla nave sono persino arrivati a rosicchiare le estremità sfilacciate delle corde, dopo che i tentativi di catturare un ratto sono falliti.\n\n[man_meat.Custom('IT_NAM_COL3')][man_meat.GetTitledFirstName] si è lamentat[Select_CString(man_meat.IsFemale,'a','o')] incessantemente dei suoi morsi della fame, come se il resto di noi non provasse lo stesso dolore. È abbastanza da far impazzire un[ROOT.Char.Custom('DE_PRO_PER_P_3P_G')][ROOT.Char.GetWomanMan] #emp qualunque!#!\n\nLe sue lamentele sembrano aver prosciugato tutte le sue energie, e [Select_CString(man_meat.IsFemale,'lei','lui')] è svenut[Select_CString(man_meat.IsFemale,'a','o')], rivers[Select_CString(man_meat.IsFemale,'a','o')] sul ponte. Non posso fare a meno di notare quanto sembrino... tenere le sue gambe scarne. #emp Ah, un assaggio di carne... Di certo è questo ciò di cui ho bisogno per rinvigorire il mio spirito!#!"
agot_sailing.3306.a: 0 "La carne è tornata nel menù, ragazzi!"
agot_sailing.3306.d.tt: 0 "Divori [man_meat.Custom('IT_NAM_COL3')][man_meat.GetTitledFirstName] e dai al tuo equipaggio la scelta di unirsi al banchetto."

agot_sailing.3307.desc: 0 "Il viaggio è andato terribilmente storto, e le nostre provviste si sono ridotte a miseri avanzi... Alcuni sulla nave sono persino arrivati a rosicchiare le estremità sfilacciate delle corde, dopo che i tentativi di catturare un ratto sono falliti.\n\n[man_meat.Custom('IT_NAM_COL3')][man_meat.GetTitledFirstName] si è lamentat[Select_CString(man_meat.IsFemale,'a','o')] incessantemente dei suoi morsi della fame, come se il resto di noi non provasse lo stesso dolore. È abbastanza da far impazzire un[ROOT.Char.Custom('DE_PRO_PER_P_3P_G')][ROOT.Char.GetWomanMan] #emp qualunque!#!\n\nQuando [man_meat.GetFirstNameNoTooltip] sviene, rivers[Select_CString(man_meat.IsFemale,'a','o')] sul ponte, noto [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] fissar[Select_CString(man_meat.IsFemale,'la','lo')] in modo minaccioso. #emp Di certo [Select_CString(host.IsFemale,'lei','lui')] non intende mangiar[Select_CString(man_meat.IsFemale,'la','lo')]!#!\n\nL'uccisione è rapida; si dice che la paura rovini il sapore della carne, e [host.GetFirstNameNoTooltip] taglia la gola di [man_meat.GetFirstNamePossessiveNoTooltip] nel sonno. L'aroma del sangue, ricco di ferro, mi pizzica il naso. Il mio ventre brontola. #emp Dopo tutto, perché non dovrei? [Select_CString(man_meat.IsFemale,'Lei','Lui')] è già mort[Select_CString(man_meat.IsFemale,'a','o')]!#!"
agot_sailing.3307.a: 0 "Le cose che facciamo per sopravvivere!"
agot_sailing.3307.b: 0 "No, no, devo resistere alle mie tentazioni."
agot_sailing.3307.b.success_tt: 0 "Riesci a tenere a bada la fame con razioni misere"

agot_sailing.3400.t: 0 "La Follia del Disastro di Valyria"
agot_sailing.3400.desc: 0 "Mi sveglio al suono dell'isteria. Uscendo dalla mia cabina, trovo il mio primo ufficiale, [first_mate.GetFirstName], di solito composto, in lacrime davanti alla mia porta. [Select_CString(first_mate.IsFemale,'La','Lo')] scuoto, cercando di ottenere una risposta da [Select_CString(first_mate.IsFemale,'lei','lui')], prima di cercare un altro membro dell'equipaggio.\n\nMi muovo tra l'equipaggio, interrogando marinai dalle mani tremanti e dagli occhi vuoti. Ognuno parla della medesima visione: la Rovina di Valyria rinata tra fiamme e cenere, una tempesta di fuoco che divora pietra e carne allo stesso modo, che fa bollire il mare stesso. Le immagini si sono marchiate nelle loro menti come ferri roventi.\n\nLa mia nave giace immobile sull'acqua. Non una vela issata, non un remo in movimento. L'equipaggio si stringe in gruppi sul ponte, sussurrando preghiere a dèi vecchi e nuovi. Non andranno avanti. #EMP Non possono#!.\n\n"Tornate indietro, capitano," implora [first_mate.GetFirstNameNoTooltip], con la voce che si spezza. "La Rovina ci avverte. Bruceremo come bruciarono i Valyriani." Gli altri fanno eco alla sua supplica, la loro paura una creatura viva che si diffonde come febbre di bordo."
agot_sailing.3400.a: 0 "Coraggio, amici miei: è soltanto un sogno. Siamo quasi arrivati!"
agot_sailing.3400.a.success: 0 "Le tue parole rassicurano il tuo equipaggio"
agot_sailing.3400.a.success.tt: 0 "Raccogli il tuo equipaggio, dissipando i dubbi nella tua impresa"
agot_sailing.3400.a.failure: 0 "Le tue parole cadono nel vuoto"
agot_sailing.3400.a.failure.tt: 0 "Il tuo equipaggio cede alla disperazione, prendendoti prigioniero per garantirsi la sopravvivenza"
agot_sailing.3400.b: 0 "La Rovina è nelle vostre teste, ma #EMP io#! sono proprio qui!"
agot_sailing.3400.b.desc: 0 "Tenti di usare il tuo alto [dread|E] per scuotere i tuoi compagni d'equipaggio dalla loro follia."
agot_sailing.3400.b.success.tt: 0 "Terrorizzi il tuo equipaggio e lo rimetti al lavoro, costringendolo a ignorare i propri dubbi pur di non affrontare la tua ira"
agot_sailing.3400.b.failure.tt: 0 "Le tue minacce non riescono a terrorizzare abbastanza il tuo equipaggio da superare i suoi dubbi"
agot_sailing.3400.c: 0 "Sento il freddo nelle ossa... dobbiamo tornare indietro."
agot_sailing.3400.c.tt: 0 "Fai ritorno al porto"

agot_sailing.3401.t: 0 "La follia svanisce"
agot_sailing.3401.desc: 0 "Le mie parole fendono il sogno febbrile che ha stretto il mio equipaggio. Lo vedo accadere: la luce selvaggia svanisce dai loro occhi, sostituita da qualcosa di più saldo. La ragione ritorna come la marea.\n\nUno dopo l'altro, i membri dell'equipaggio tornano in sé. [first_mate.GetFirstName] si unisce a me, con lo sguardo limpido per il viaggio che ci attende. Rivolgiamo di nuovo la prua a est, verso quelle acque lontane e maledette.\n\nL'equipaggio lavora in silenzio, ma non è più il silenzio del terrore. È il silenzio di uomini che hanno fissato l'abisso e hanno scelto comunque di salpare avanti."
agot_sailing.3401.a: 0 "Abbiamo domato la paura."

agot_sailing.3402.t: 0 "La follia prende piede"
agot_sailing.3402.desc: 0 "Non mi ascolteranno. Prima provo con la ragione, poi con il comando: la mia voce tagliente come una lama. Ma il terrore li ha presi, e il terrore rende gli uomini sordi a tutto tranne che al martellare dei propri cuori.\n\nQuando mi muovo verso il timone, [first_mate.GetFirstName] si sposta per bloccarmi. Il mio primo ufficiale scuote lentamente la testa. "Mi dispiace, Capitano."\n\nPrima che possa oltrepassar[Select_CString(first_mate.IsFemale,'la','lo')], delle mani si chiudono attorno alle mie braccia e mi tengono ferm[Select_CString(ROOT.Char.IsFemale,'a','o')]. "Siete impazzito," sussurra qualcuno, quasi con dolcezza. "La Rovina ha toccato la vostra mente. Vi stiamo salvando da voi stesso.""
agot_sailing.3402.a: 0 "Non sono pazzo! Siete #EMP voi#! tutti pazzi!"

agot_sailing.3500.t: 0 "Una schiera di tempeste"
agot_sailing.3500.desc: 0 "Finalmente, tutto sembra andare per il meglio. Stando alle mie misurazioni, dovrei essere vicino al luogo in cui giace la perduta Valyria, e i mari sono stati benevoli con noi: buoni venti, onde calme.\n\nEppure, proprio mentre penso queste cose, tutto cambia. Il vento scuote la mia nave, le onde la percuotono come tamburi nelle profondità. Poi la pioggia comincia a cadere: prima un rivolo, poi un torrente. Dal giorno più calmo è sorta una tempesta di tale furia, diversa da qualunque altra io abbia mai visto in vita mia.\n\nAttraverso il diluvio torrenziale, credo di vedere sempre più nubi temporalesche convergere sulla nave. Un'onda si abbatte sul mio volto, ricadendo poi negli abissi. Non ho altro tempo per pensarci, però: devo scegliere se sfidare la tempesta o tornare indietro proprio all'ultimo ostacolo."
agot_sailing.3500.a: 0 "Dobbiamo #EMP dominare#! questa tempesta!"
agot_sailing.3500.a.success: 0 "Riesci a superare la tempesta"
agot_sailing.3500.a.success.tt: 0 "Attingi a tutta la tua esperienza in mare per attraversare la tempesta in sicurezza"
agot_sailing.3500.a.failure: 0 "La tua nave è perduta nella tempesta"
agot_sailing.3500.a.failure.tt: 0 "@death_icon! La tempesta si dimostra troppo per te, e vieni inghiottit[Select_CString(ROOT.Char.IsFemale,'a','o')] dalle onde"
agot_sailing.3500.b: 0 "Questa è follia! Dobbiamo tornare indietro!"
agot_sailing.3500.b.tt: 0 "Fai ritorno al porto"

agot_sailing.3501.t: 0 "Cavalcare la tempesta"
agot_sailing.3501.desc: 0 "Lotto con la ruota del timone, trascinando la nave oltre la cresta di un'altra onda furiosa. Il tuono si spezza nell'aria, e il fulmine trafigge l'oscurità.\n\nAbbaio ordini e comandi per regolare di nuovo il sartiame, mentre i marinai lavorano furiosamente per eseguire i miei comandi. La mia nave è malconcia e percossa, ma mi rifiuto di arrendermi.\n\nAlla fine, però, i venti cominciano a calmarsi e le onde si placano. La tempesta si ritira, e quando il sole fa capolino per la prima volta tra le nubi, a stento posso immaginare spettacolo più bello. Ho resistito a una tempesta senza pari, dominando tutte le maree davanti a me.\n\nE in lontananza... possibile?"
agot_sailing.3501.a: 0 "Spiegate le vele, siamo quasi arrivati!"

agot_sailing.3502.t: 0 "Una tomba d'acqua"
agot_sailing.3502.desc: 0 "Cerco disperatamente di lottare contro la tempesta, abbaiando ordini ai miei uomini. Ma questa non è una semplice tempesta.\n\nSento un forte schianto quando l'albero maestro della nave, a lungo martoriato dai venti, non regge più e crolla sul ponte principale. La nave comincia a disfarsi, e le onde feroci mi trascinano negli abissi.\n\nL'ultima cosa che sento è il rombo onnipresente delle acque tumultuose tutto intorno a me...\n\nPoi arriva l'oscurità."
agot_sailing.3502.a: 0 "N-ngh..."
agot_sailing.3503.desc: 0 "Sento [host.GetFirstName] cercare di comandare agli uomini di proseguire. Ma questa non è una semplice tempesta.\n\nSento un forte schianto quando l'albero maestro della nave, a lungo martoriato dai venti, non regge più e crolla sul ponte principale. La nave comincia a disfarsi, e le onde feroci mi trascinano negli abissi.\n\nL'ultima cosa che sento è il rombo onnipresente delle acque tumultuose tutto intorno a me...\n\nPoi arriva l'oscurità."

agot_sailing.3900.t: 0 "Le Quattordici Fiamme"
agot_sailing.3900.desc: 0 "Un sorriso selvaggio mi si apre sul volto quando finalmente scorgo le isole spezzate, e una risata appena isterica mi ribolle fuori. Ce l'abbiamo fatta. Le difficoltà sono state grandi, e molti dubitavano persino che fosse possibile, ma ce l'abbiamo fatta. Questo deve certamente essere ciò che resta delle Quattordici Fiamme di Valyria.\n\nQuando ci avviciniamo, però, aggrottò la fronte pensieroso. Tentiamo di sbarcare?\n\nDa ogni lato, pareti di roccia a picco sembrano impedire qualunque approdo agevole, e il fumo sale ovunque, dall'acqua e dalla pietra insieme. Mettere piede qui significa rischiare di attirare la rovina su di noi, proprio come la rovina che colpì i signori dei draghi di un tempo.\n\nOra ho una scelta: sbarcare, o limitarmi ad ammirarla da lontano?"
agot_sailing.3900.a: 0 "Non vale il rischio; essere giunti fin qui è già degno di una canzone!"
agot_sailing.3900.a.tt: 0 "Contempli rispettosamente Valyria dalla tua nave"
agot_sailing.3900.b: 0 "Sono arrivato fin qui, cerchiamo un punto di sbarco."
agot_sailing.3900.b.success: 0 "Riesci a esplorare le rovine di Valyria"
agot_sailing.3900.b.failure: 0 "La tua esplorazione termina in una sventura improvvisa."

agot_sailing.3901.t: 0 "La maestà di Valyria"
agot_sailing.3901.desc: 0 "Decido di non tentare lo sbarco su nessuna delle isole spezzate, poiché le alte scogliere e le rive rocciose mi dissuadono dall'avvicinarmi oltre. Eppure, anche così, spingo la nave il più vicino possibile, navigando sempre più presso. Mentre lo facciamo, l'intera portata della Rovina di Valyria diventa visibile. Torri e pilastri spezzati, città e dimore completamente distrutte si intravedono attraverso il fumo sempre presente. E tuttavia, persino in uno stato tanto terribile, si può ancora discernere quanto maestose dovettero essere un tempo le Quattordici Fiamme.\n\nInfine, dopo averle circumnavigate molte volte, volgiamo finalmente la prua verso casa, appagati. Abbiamo trovato ciò che altri credevano un mito, affrontato pericoli senza pari e contemplato l'ultimo resto della Valyria perduta da tempo. Nessuno può dubitare della mia abilità o della mia fama."
agot_sailing.3901.a: 0 "Non dimenticherò mai questa vista."

agot_sailing.3902.t: 0 "Esplorando le rovine"
agot_sailing.3902.desc: 0 "Scendendo con cautela dalla nave, cercando un appiglio, alzo lo sguardo. Anche ora, quasi del tutto consumata dalle onde, la cima del vulcano che plasmò quest'isola trafigge il cielo, con pareti a picco che si innalzano alte sopra la risacca. Sforzando la vista, scopro infine un sentiero tra le rocce aspre, che conduce a gradini logorati dal tempo scavati nella parete stessa della scogliera, completamente spezzati e frantumati dalla Rovina.\n\nDopo aver salito le scale, raggiungo finalmente un antico palazzo valyriano, in qualche modo ancora in gran parte intatto. Il fumo emana dalla struttura silenziosa, e un'aria di disperazione vi aleggia intorno. Mi guardo attorno in cerca di qualcosa di valore da trovare..."
agot_sailing.3902.a: 0 "Nulla resta qui se non rovine."
agot_sailing.3902.b: 0 "Allargatevi! Vediamo cos'altro possiamo trovare!"
attempt_to_leave_valyria: 0 "Tenti di lasciare Valyria"
valyrian_artifact: 0 "Hai trovato un [artifact|E] dell'Antica Valyria"
guest_reached_valyria_tt: 0 "Ogni ospite riceve [GetModifier( 'guest_reached_valyria' ).GetNameWithTooltip|L]"

agot_sailing.3903.t: 0 "Disavventura marittima"
agot_sailing.3903.desc: 0 "Me ne sto sul ponte della nave mentre la nostra rotta ci porta accanto alle scogliere spezzate e fumanti che costellano il Mare Fumante. Nella mia mente, riesco già a vedere i molti tesori che certamente scopriremo nascosti tra le rovine dell'antica Valyria. Oro, gemme e, naturalmente, il prezioso acciaio di Valyria... Presto, tutto sarà mio...\n\nUn forte #italic schianto#! mi riporta alla realtà, e all'improvviso i cieli si riempiono di cenere e fuoco. Una pioggia di rocce ardenti inghiotte la nave, e rapidamente le fiamme cominciano a diffondersi. Mentre guardo terrorizzato, le vele prendono fuoco, e il rogo balza dall'albero al ponte.\n\nTra urla di panico e dolore, un calore insopportabile si leva tutt'intorno a me. Senza pensare, mi getto nelle acque furiose sottostanti, solo per vedere la nave affondare davanti ai miei occhi. Annaspo freneticamente per allontanarmi dal relitto..."
agot_sailing.3903.a: 0 "Io... devo... continuare a nuotare..."

agot_sailing.3904.t: 0 "Pericolo tra le rovine"
agot_sailing.3904.desc_one: 0 "Dopo essere sbarcati, troviamo un sentiero spezzato che sale verso la cima delle scogliere taglienti affacciate sul Mare Fumante. I gradini sono pericolosi, costringendoci a procedere con grande lentezza. Infine raggiungiamo la cima, arrivando in un cortile in rovina che potrebbe essere appartenuto un tempo a una grande dimora di un signore dei draghi valyriano.\n\nMi volto verso la mia compagnia. "Molti dubitavano che qualcuno potesse mai giungere fin qui, ma abbiamo sfidato tutti gli scettici! Ora le ricchezze di Valyria sono nostre da prendere! Che si—"\n\nIl mio discorso viene interrotto da un forte #italic ruggito#! alle nostre spalle. Mi volto di scatto appena in tempo per vedere una creatura mostruosa e squamosa balzare verso di me con velocità innaturale..."
agot_sailing.3904.desc_two: 0 "Dopo essere sbarcati, troviamo un sentiero spezzato che sale verso la cima delle scogliere taglienti affacciate sul Mare Fumante. I gradini sono pericolosi, costringendoci a procedere con grande lentezza. Infine raggiungiamo una piccola caverna da cui esce fumo.\n\n"Cos'è questo?" ansimo, mentre una piccola creatura emerge. I suoi ciuffi di pelo sono bianchi come neve, ma dalla sua testa spuntano tentacoli scuri e squamosi.\n\n"È soltanto un coniglio!" Ma mentre ci avviciniamo, la bestia immonda balza in avanti con denti enormi e affilati. Osservo con orrore mentre strappa la testa a uno dei miei uomini...\n\n"SCAPPATE!" grido, ma so che ormai è troppo tardi per tutti noi."
agot_sailing.3904.desc_three: 0 "Dopo essere sbarcati, troviamo un sentiero spezzato che sale verso la cima delle scogliere taglienti affacciate sul Mare Fumante. I gradini sono pericolosi, costringendoci a procedere con grande lentezza. Infine raggiungiamo una piccola caverna da cui esce fumo.\n\nAll'imboccatura della caverna, scorgo una piccola covata di pietre squamose... #italic Possibile che siano...?!#!\n\n#EMP Uova di drago!#! Il cuore mi martella mentre corro verso di loro. Ma quando la mia mano tocca la più grande della covata, questa sputa e sibila, spaccandosi. Gli dèi non hanno nome per il suono che emette poi: uno stridio lacerante, capace di scuotere la terra. Resisto al dolore abbastanza a lungo da sentire il calore del sangue gorgogliare lungo entrambi i lati della mia testa, mentre il mio stesso cervello si fonde dall'interno del cranio."
agot_sailing.3904.desc_four: 0 "Dopo essere sbarcati, troviamo un sentiero spezzato che sale verso la cima delle scogliere taglienti affacciate sul Mare Fumante. I gradini sono pericolosi, così tengo una mano contro la parete rocciosa mentre saliamo. Ma i miei passi non sono altrettanto cauti, e inciampo su una pietra smossa.\n\nMentre perdo l'equilibrio, mi aggrappo a un'appendice simile alla roccia per sostenermi, ma questa si spezza nella mia mano. Cado a terra, evitando la caduta verso morte certa, ma i miei occhi restano fissi sulla pietra che stringo: #italic È forse... un dito?#!\n\nIl mio sguardo scivola verso l'alto, e vede un volto di pietra, congelato nell'orrore, fuso nella scogliera. Sembra quasi fissarmi a sua volta, quando all'improvviso... L'altra mano scatta in avanti, afferrandomi per la gola. Riesco a malapena a emettere un grido attraverso la stretta."
agot_sailing.3904.desc_five: 0 "Dopo essere sbarcati, troviamo un sentiero spezzato che sale verso la cima delle scogliere taglienti affacciate sul Mare Fumante. I gradini sono pericolosi, costringendoci a procedere con grande lentezza. Infine raggiungiamo una piccola caverna da cui esce fumo.\n\nAll'imboccatura della caverna, scorgo una grande pietra nera con una lama scintillante conficcata al suo interno. Di certo le onde nel metallo possono significare una sola cosa: #italic acciaio di Valyria!#!\n\nUn simile premio renderebbe l'intero viaggio degno del rischio. Quando afferro saldamente il pomo, sento quanto sia incastrata. Tirare con tutta la mia forza sembra non servire a nulla.\n\nMi ritrovo così assorto in questa spada nella pietra che a malapena noto che il mio equipaggio è caduto in silenzio. Quando finalmente rischio uno sguardo attorno, vedo una figura nera come la pece ergersi alta sopra di me; la sua pelle è come vetro di drago, con braccia affilate simili a falci sollevate sopra di me. Una cala, recidendomi l'intero braccio, ancora stretto attorno alla lama inestimabile.\n\nL'altra comincia la sua discesa verso la mia testa."
agot_sailing.3904.desc_six: 0 "Dopo essere sbarcati, troviamo un sentiero spezzato che sale verso la cima delle scogliere taglienti affacciate sul Mare Fumante. I gradini sono pericolosi, costringendoci a procedere con grande lentezza. Infine raggiungiamo una piccola caverna da cui esce fumo.\n\nQuando entro nello spazio fiocamente illuminato, vengo accolto da figure di pietra, rannicchiate insieme come per cercare calore. #italic No, protezione!#!\n\nQuesta non è una caverna; è una tomba! Mentre mi volto per uscire, sento una presa rocciosa sulla gamba. Uno dei corpi di pietra mi ha afferrato, e un dolore improvviso e acuto mi lacera il polpaccio. Mentre crollo a terra, sento un'altra mano di pietra sul braccio, poi sulla schiena, poi sul collo..."
agot_sailing.3904.a: 0 "[ROOT.Char.Custom('Scream')]"
ship_sunk: 0 "La tua nave è perduta a Valyria"
ship_sunk_bell: 0 "La tua campana subacquea è perduta con la tua nave"

agot_sailing.3905.t: 0 "Un tesoro tra le rovine"
agot_sailing.3905.desc: 0 "Seguo con cautela [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed] mentre lasciamo la nave, mettendo piede sulla riva di Valyria. Una terra non visitata da centinaia d'anni, non dalla Rovina di Valyria, non da quando [GetScriptedCharacterByHistoryID('Varezys_1').GetName] tentò di riconquistare la terra e proclamarsi Imperatore.\n\nQuando giungo a riva, posso vedere la cima del vulcano che plasmò quest'isola mentre trafigge il cielo. Seguiamo tutti [host.GetFirstNameNoTooltip] attraverso le rovine mentre [Select_CString(host.IsFemale,'lei','lui')] individua il sentiero da seguire. Quando [Select_CString(host.IsFemale,'lei','lui')] raggiunge la fine delle scale di pietra spezzate, [Select_CString(host.IsFemale,'lei','lui')] dà l'ordine di cercare attorno alla rovina qualunque reliquia possiamo scoprire.\n\nQuando avanzo per iniziare la mia ricerca, vedo che ci troviamo in una delle rovine più intatte di un antico palazzo valyriano, bello persino mentre il fumo continua a emanare da esso.\n\nIl tempo passa mentre scavo tra le macerie, finché non lo trovo: un [newest_found_artifact.GetName].\n\nUn antico e prezioso manufatto valyriano che riposa sotto alcune macerie, solo in attesa che io lo rivendichi... che rivendichi il mio tesoro..."
agot_sailing.3905.a: 0 "Una reliquia dell'Antica Valyria!"

agot_sailing.3938.t: 0 "Isola pericolosa"
agot_sailing.3938.desc: 0 "Metto piede sulla riva rocciosa dell'isola che la nostra guida ha scelto di esplorare. Un senso d'inquietudine accompagna il nostro gruppo mentre cominciamo a cercare un modo per raggiungere le rovine bruciate che si vedono in cima alle scogliere vicine.\n\nDopo circa un'ora, ci imbattiamo in un piccolo sentiero che sembra salire con costanza lungo gradini spezzati di pietra scura. Seguendo il sentiero, raggiungiamo infine le rovine. Questo potrebbe essere stato un tempo un palazzo, o qualche altro edificio eretto dai Valyriani nei loro giorni di gloria. Ora non resta che cupa muratura.\n\nCon la coda dell'occhio scorgo un movimento, ma quando comincio a voltarmi è già troppo tardi. Mani fredde e forti mi stringono il collo con forza innaturale, e l'ultima cosa che sento prima che tutto diventi nero è un orribile sibilo..."
agot_sailing.3938.a: 0 "Urghh—"
agot_sailing.3938.a.tt: 0 "La spedizione è stata un fallimento, e tutti sono perduti a Valyria, per non essere mai più visti"

agot_sailing.3906.t: 0 "Saccheggiare le rovine"
agot_sailing.3906.desc: 0 "[candle_store.GetName] non bastava! Cercate tra le rovine e non lasciate pietra su pietra. Trovate qualcosa di più prezioso!\n\nOrdino all'equipaggio di uscire, sperando di recuperare qualcos'altro di grande valore.\n\nLe rovine continuano a fumare attorno a noi; la devastazione causata dalla Rovina è immensa, e mi sorprenderà se qui sono rimaste molte cose. Ma questo luogo è troppo pericoloso per visitarlo spesso, dunque dobbiamo prendere ciò che possiamo mentre siamo qui e poi tornare a casa.\n\nChissà cosa potrebbe aggirarsi in questo paesaggio infernale? L'equipaggio deve sbrigarsi."
agot_sailing.3906.a: 0 "Non lasciate pietra su pietra!"

agot_sailing.3907.t: 0 "Il viaggio di ritorno"
agot_sailing.3907.desc_good: 0 "Il viaggio verso l'Antica Valyria è stato un successo meraviglioso, e la fine del nostro cammino ci accoglie con cieli limpidi e venti favorevoli. Gli orrori che avevo sognato erano soltanto questo: sogni.\n\nMentre facciamo ritorno a casa, sento un lieve solletico nel ventre. #italic Ah! Non mangio da quasi un giorno!#!"
agot_sailing.3907.desc_bad: 0 "Il viaggio verso l'Antica Valyria è stato un successo meraviglioso, ma la fine del nostro cammino ci accoglie con cieli scuri e venti sgradevoli. Gli orrori che avevo sognato potrebbero essere stati più che sogni.\n\nMentre facciamo ritorno a casa, sento un lieve solletico nel ventre. Poi un rodere, quasi come se le mie viscere tentassero di fuggire dal mio corpo.\n\nNoto il sudore colarmi dalla fronte, e giurerei che la pelle del mio braccio si muova per un istante. Comincio a togliermi gli abiti, restando in biancheria, ma il calore che emana dalle mie viscere è troppo forte. #italic Sto bruciando!#!\n\nMi stringo il ventre, solo per sentire uno strano contorcersi sotto la pelle. Apro la bocca per urlare, ma ne esce soltanto fumo."
agot_sailing.3907.a_good: 0 "Dove sono quei dolcetti al limone che avevo nascosto?"
agot_sailing.3907.a_bad: 0 "Dunque i racconti sui vermi di fuoco sono veri?!"

 agot_sailing.3920.t:0 "$agot_sailing.3101.t$"
agot_sailing.3920.desc: 0 "Dopo aver esaminato a fondo le carte nautiche e gli appunti di [Select_CString(host.IsFemale,'lei','lui')], [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] grida: "Navighiamo oltre le terre delle Città Libere, verso la Baia degli Schiavisti, poi prendiamo una rotta di 260 gradi nel Mare Fumante!"\n\nChiunque dubitasse della lucidità di [Select_CString(host.IsFemale,'lei','lui')] tira un profondo sospiro di sollievo."
agot_sailing.3920.a: 0 "Buon lavoro, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"

 agot_sailing.3921.t:0 "$agot_sailing.3102.t$"
agot_sailing.3921.desc: 0 "Dopo aver esaminato a fondo le carte nautiche e gli appunti di [Select_CString(host.IsFemale,'lei','lui')], [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] sembra perpless[Select_CString(host.IsFemale,'a','o')]. Stabilire una probabile posizione per un buon ancoraggio entro le Quattordici Fiamme non è cosa da poco, e pare che [Select_CString(host.IsFemale,'lei','lui')] non ne sia all'altezza.\n\nLentamente, [first_mate.Custom('IT_NAM_COL3')][first_mate.GetTitledFirstName] posa una mano sulla spalla di [Select_CString(host.IsFemale,'lei','lui')]. "Forse... la troveremo un'altra volta?""
agot_sailing.3921.a: 0 "Che peccato, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]..."

 agot_sailing_kraken_spawn:0 "As we continue sailing, a subtle sense of disquiet settles upon the prow. Far off, I see something shifting below the surface of the sea... impossibly large, and growing larger in its approach.\n\n#EMP A mighty kraken!#! Legends have told of such mythical creatures, but most consider them tall tales of wet nurses and septas."

 agot_sailing.3922.t:0 "$agot_sailing.3200.t$"
agot_sailing.3922.desc: 0 "$agot_sailing_kraken_spawn$\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] si precipita avanti, gridando un ordine chiaro: dobbiamo ritirarci, o perderemo la vita!"
agot_sailing.3922.a: 0 "Questo viaggio è finito."

 agot_sailing.3923.t:0 "$agot_sailing.3200.t$"
agot_sailing.3923.desc: 0 "$agot_sailing_kraken_spawn$\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] emette un ruggito; questo momento era stato previsto. [Select_CString(host.IsFemale,'Ella','Egli')] porta il corno del kraken alle labbra, lasciando uscire un rombo profondo e risonante. Il suono sembra scuotere il ponte stesso della nave, e vedo chi mi circonda tapparsi le orecchie per il dolore.\n\nIl kraken, tuttavia, sembra impassibile. In un istante, un tentacolo sollevato cala su [host.GetFirstNameNoTooltip] con uno schiocco, interrompendo il suono del corno con uno schianto viscido. Non riesco a distogliere lo sguardo mentre il tentacolo si solleva dai resti devastati del nostro capitano, ormai solo una poltiglia grumosa di sangue, ossa e tendini. Ahimè, non mi accorgo nemmeno del tentacolo che ora incombe sopra di me..."
agot_sailing.3923.a: 0 "Oh... oh no!"

 agot_sailing.3924.t:0 "$agot_sailing.3200.t$"
agot_sailing.3924.desc: 0 "$agot_sailing_kraken_spawn$\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] ordina l'attacco, e noi incocchiamo gli archi, scagliando una pioggia di frecce contro la bestia. Un lamento stridulo taglia l'aria, facendomi gelare il sangue nelle ossa... poi nulla.\n\n[host.GetFirstNameNoTooltip] ce l'ha fatta! [Select_CString(host.IsFemale,'Ella','Egli')] ha ucciso il kraken!"
agot_sailing.3924.desc_horn: 0 "$agot_sailing_kraken_spawn$\n\nIo e il resto dell'equipaggio ci ritiriamo dietro [host.Custom('IT_NAM_COL5')][host.GetTitledFirstNameNicknamed], mentre [Select_CString(host.IsFemale,'ella','egli')] porta il corno del kraken alle labbra e libera il suo grido profondo e tonante. Il suono rotola sul mare e, pochi istanti dopo, la grande bestia comincia a ritirarsi, svanendo nelle profondità da cui era venuta. Ormai non può esserci dubbio che il corno possieda un vero potere.\n\nIo e il resto dell'equipaggio esplodiamo in acclamazioni estatiche, mentre alcuni degli altri aprono scorte nascoste di liquori per festeggiare."
agot_sailing.3924.a: 0 "Date da bere a [Select_CString(host.IsFemale,'questa donna','quest'uomo')]!"

 agot_sailing.3925.t:0 "$agot_sailing.3200.t$"
agot_sailing.3925.desc: 0 "$agot_sailing_kraken_spawn$\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] ordina l'attacco, e noi incocchiamo gli archi. Ma la bestia si scrolla facilmente di dosso le frecce. La bestia ci è addosso, strappando compagni dal ponte come tortine al limone da un vassoio.\n\nUn tentacolo mi si avvolge attorno alla mano con una forza insondabile, schiacciandomi le dita con uno schiocco nauseante. La rovina della mia mano resta intrappolata nella presa del mostro mentre mi solleva verso la sua bocca..."
agot_sailing.3925.a: 0 "No... non così!"
agot_sailing.3925.a.success.tt: 0 "In qualche modo riesci a fuggire con la vita intatta"
agot_sailing.3925.a.failure.tt: 0 "@death_icon! Vieni inghiottito intero, per non essere mai più visto"
agot_sailing.3925.b: 0 "Se solo riuscissi a liberarmi..."
agot_sailing.3925.b.success.tt: 0 "Fuggi con la vita intatta, ma senza la tua mano"
agot_sailing.3925.b.failure.tt: 0 "@death_icon! Vieni inghiottito quasi intero, ma forse la tua mano galleggerà via"

 agot_sailing.3926.t:0 "$agot_sailing.3300.t$"
agot_sailing.3926.desc: 0 "Siamo in mare da lungo tempo, e forti venti contrari hanno fatto sì che i nostri progressi siano stati pochi, e ancor meno di quanto avessimo sperato. Quel che è peggio, le provviste stanno pericolosamente scarseggiando...\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] se n'è chiaramente accort[Select_CString(host.IsFemale,'a','o')]; per evitare la fame prima di raggiungere la nostra destinazione, [Select_CString(host.IsFemale,'lei','lui')] ha imposto un attento razionamento delle provviste. I calcoli accorti sembrano dare frutto: benché siamo tutti affamati, siamo ancora vivi."
agot_sailing.3926.a: 0 "Ottimo lavoro, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"
agot_sailing.3926.a.fatty: 0 "Ma a quale prezzo? Perché [host.GetFirstNameNoTooltip] avrebbe fatto questo?!"

 agot_sailing.3927.t:0 "$agot_sailing.3300.t$"
agot_sailing.3927.desc: 0 "Siamo in mare da lungo tempo, e forti venti contrari hanno fatto sì che i nostri progressi siano stati pochi, e ancor meno di quanto avessimo sperato. Quel che è peggio, le provviste stanno pericolosamente scarseggiando...\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] ha tentato di imporre razioni severe, ma i suoi calcoli sembrano errati... Attorno a noi, nient'altro che mare. A bordo, nessun cibo: solo le nostre lente grida mentre i morsi della fame ci consumano."
agot_sailing.3927.a: 0 "Ti prego, solo un morso..."

 agot_sailing.3928.t:0 "$agot_sailing.3300.t$"
agot_sailing.3928.desc: 0 "Siamo in mare da lungo tempo, e forti venti contrari hanno fatto sì che i nostri progressi siano stati pochi, e ancor meno di quanto avessimo sperato. Quel che è peggio, le provviste stanno pericolosamente scarseggiando...\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] ha udito per caso le proteste dell'equipaggio, ma ha trattato duramente i più rumorosi tra noi. Il morale ha subito un colpo, e il suono dei ventri che brontolano è diventato cosa comune, ma almeno viviamo per il viaggio che ci attende."
agot_sailing.3928.a: 0 "Ottimo lavoro, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"

 agot_sailing.3929.t:0 "$agot_sailing.3304.t$"
agot_sailing.3929.desc: 0 "Siamo in mare da lungo tempo, e forti venti contrari hanno fatto sì che i nostri progressi siano stati pochi, e ancor meno di quanto avessimo sperato. Quel che è peggio, le provviste stanno pericolosamente scarseggiando...\n\n[mutiny_leader.Custom('IT_NAM_COL3')][mutiny_leader.GetTitledFirstNameNicknamed] ha seminato discordia per tutto il viaggio, e ora è giunto il suo momento. Mentre [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] tenta di convincere l'equipaggio della necessità di razioni dure, [mutiny_leader.GetFirstNameNoTooltip] ha un'altra idea...\n\nDopo una breve lotta, [host.GetFirstName] è costrett[Select_CString(host.IsFemale,'a','o')] a camminare sull'asse!"
agot_sailing.3929.a: 0 "Addio, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]..."

 agot_sailing.3930.t:0 "$agot_sailing.3400.t$"
agot_sailing.3930.desc: 0 "Il sogno è tornato la scorsa notte. #italic Fuoco che disfa. Pietra che si scioglie come sego, il mare che ribolle in vapore, draghi che urlano mentre la loro stessa fiamma li consuma. E il suono — dèi, quel suono — come se il mondo stesso si spaccasse in due.#!\n\n#EMP Il Disastro di Valyria!#!\n\nLo vedo negli occhi di ogni uomo. La paura mi pesa nel petto come una pietra. Ma il capitano non ci chiama codardi. [Select_CString(host.IsFemale,'Lei','Lui')] ascolta.\n\n«Ciò che vi tormenta è memoria, non profezia. Antico terrore, tramandato finché non mette radici nelle nostre ossa,» impartisce con calma [host.Custom('IT_NAM_COL3')][host.GetTitledFirstName], e la follia si allenta."
agot_sailing.3930.a: 0 "Gli incubi potranno tornare. Ma per ora, remiamo."

 agot_sailing.3931.t:0 "$agot_sailing.3400.t$"
agot_sailing.3931.desc: 0 "Il sogno è tornato la scorsa notte. #italic Fuoco che disfa. Pietra che si scioglie come sego, il mare che ribolle in vapore, draghi che urlano mentre la loro stessa fiamma li consuma. E il suono — dèi, quel suono — come se il mondo stesso si spaccasse in due.#!\n\n#EMP Il Disastro di Valyria!#!\n\nLo vedo negli occhi di ogni uomo. La paura mi pesa nel petto come una pietra. Ma il capitano non vuole fermarsi. Anche dopo che glielo abbiamo detto — #italic supplicat[Select_CString(host.IsFemale,'a','o')]#! — [host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] continua a insistere perché proseguiamo, parlando di carte e distanze come se i numeri potessero trattenere il Disastro di Valyria, come se la logica contasse quando gli dèi stessi ci hanno inviato un avvertimento.\n\n«Dobbiamo farlo,» dice piano [first_mate.GetFirstName]. «Per il suo stesso bene.» Pochi istanti dopo, gettiamo il capitano nella sua cabina. La serratura gira, ma attraverso il legno [Select_CString(host.IsFemale,'la','lo')] sento urlare, maledirci e promettere vendetta."
agot_sailing.3931.a: 0 "Meglio la sua furia che la sua pira funebre."

 agot_sailing.3932.t:0 "$agot_sailing.3501.t$"
agot_sailing.3932.desc: 0 "Venti propizi, onde calme e cieli limpidi sono stati una vista gradita mentre ci avviciniamo al luogo dove giace Valyria perduta. Ma tutto cambia in un istante.\n\nUn'imponente nube temporalesca avanza verso la nostra nave, seguita da un'altra, poi un'altra, e un'altra ancora. La loro formazione sembra quasi puntare alla nostra posizione. #EMP Una spada di tempeste#!, pare!\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] balza avanti, abbaiando ordini tra squarci di tuono e un diluvio torrenziale. «Spiegate le vele, ci siamo quasi!» [Select_CString(host.IsFemale,'la','lo')] sento gridare, e davanti a me vedo che [Select_CString(host.IsFemale,'lei','lui')] ha ragione..."
agot_sailing.3932.a: 0 "Potrebbe essere?"

 agot_sailing.3933.t:0 "$agot_sailing.3502.t$"
agot_sailing.3933.desc: 0 "Venti propizi, onde calme e cieli limpidi sono stati una vista gradita mentre ci avviciniamo al luogo dove giace Valyria perduta. Ma tutto cambia in un istante.\n\nUn'imponente nube temporalesca avanza verso la nostra nave, seguita da un'altra, poi un'altra, e un'altra ancora. La loro formazione sembra quasi puntare alla nostra posizione. #EMP Una spada di tempeste#!, pare!\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] balza avanti, abbaiando ordini tra squarci di tuono e un diluvio torrenziale. Ma gli ordini non riescono a stare al passo con la forza della tempesta attorno a noi.\n\nL'ultima cosa che sento è il rombo onnivoro delle acque tumultuose tutt'intorno a me...\n\nE poi c'è l'oscurità."
agot_sailing.3933.a: 0 "N-ngh..."

 agot_sailing.3934.t:0 "$agot_sailing.3900.t$"
agot_sailing.3934.desc: 0 "Un sorriso selvaggio si apre sul volto di [host.GetFirstNameNoTooltip] quando [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] scorge infine le isole spezzate, lasciandosi sfuggire una risata lievemente isterica. Ce l'abbiamo fatta. Le difficoltà sono state grandi, e molti dubitavano persino che fosse possibile, ma ce l'abbiamo fatta. Questo deve senza dubbio essere ciò che resta delle Quattordici Fiamme di Valyria.\n\nQuando ci avviciniamo, però, una domanda viene mormorata... tentiamo di sbarcare?\n\nDa ogni lato, pareti di roccia a picco sembrano impedire ogni approdo agevole, e il fumo si leva tutt'intorno, dall'acqua come dalla pietra. Sbarcarvi significa rischiare di chiamare la rovina su noi stessi, proprio come la rovina che colpì i signori dei draghi di un tempo."
agot_sailing.3934.a: 0 "Che cosa farà [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]?"

 agot_sailing.3935.t:0 "$agot_sailing.3901.t$"
agot_sailing.3935.desc: 0 "[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] ha deciso di non tentare di sbarcare su nessuna delle isole spezzate, le loro alte scogliere e rive rocciose dissuadendo[Select_CString(host.IsFemale,'la','lo')] dall'avvicinarsi oltre. Eppure, comunque, spingiamo la nave il più vicino possibile, navigando sempre più presso. Mentre lo facciamo, l'intera portata del Disastro di Valyria diventa visibile. Torri e pilastri spezzati, città e dimore del tutto in rovina si scorgono attraverso il fumo sempre presente. Eppure, persino in uno stato tanto terribile, si può ancora discernere quanto maestose dovessero essere un tempo le Quattordici Fiamme.\n\nAlla fine, dopo averle circumnavigate più e più volte, finalmente facciamo rotta verso casa, soddisfatti. Abbiamo trovato ciò che altri credevano un mito, affrontato pericoli senza pari, e contemplato l'ultimo residuo della Valyria da lungo perduta. Nessuno può dubitare dell'abilità o della fama di [host.GetFirstNamePossessiveNoTooltip]."
agot_sailing.3935.a: 0 "Molto impressionante, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"

 agot_sailing.3936.t:0 "$agot_sailing.3907.t$"
agot_sailing.3936.desc_good: 0 "Il viaggio verso l'Antica Valyria è stato un successo meraviglioso, e la fine del nostro viaggio ci accoglie con cieli limpidi e venti favorevoli. Gli orrori che avevamo sognato erano solo questo: sogni.\n\nMentre facciamo ritorno a casa, sento un lieve solletico nel ventre. #italic Ahah! Non mangio da quasi un giorno!#!"
agot_sailing.3936.desc_bad: 0 "Il viaggio verso l'Antica Valyria è stato un successo meraviglioso, ma la fine del nostro viaggio ci accoglie con cieli cupi e venti sgradevoli. Gli orrori che avevamo sognato potrebbero essere stati più che sogni.\n\nMentre facciamo ritorno a casa, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] si lamenta di un lieve solletico al ventre. Poi [Select_CString(host.IsFemale,'lei','lui')] menziona una sensazione che rode, quasi come se le sue viscere stessero tentando di sfuggire dal suo corpo.\n\nNoto il sudore colare dalla sua fronte, e giurerei che la pelle sul suo braccio si muova appena per un istante. Quando [Select_CString(host.IsFemale,'lei','lui')] comincia a strapparsi gli abiti, fino alle vesti intime, sento calore emanare da [Select_CString(host.IsFemale,'lei','lui')] come da una fornace. #italic [Select_CString(host.IsFemale,'Lei','Lui')] sta bruciando!#!\n\n[host.GetFirstNameNoTooltip] si stringe il ventre, ma quando [Select_CString(host.IsFemale,'lei','lui')] apre la bocca per urlare, ne esce solo fumo...\n\nQuale crudele sorte attende il resto di noi? La mia stessa pelle comincia a formicolare."
agot_sailing.3936.desc_bad_two: 0 "Il viaggio verso l'Antica Valyria è stato un successo meraviglioso, ma la fine del nostro viaggio ci accoglie con cieli cupi e venti sgradevoli. Gli orrori che avevamo sognato potrebbero essere stati più che sogni.\n\nMentre facciamo ritorno a casa, un urlo proviene dagli alloggi del capitano. Mi precipito dentro, solo per trovare [host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] che si contorce sul pavimento in agonia. Quando mi avvicino, mi fermo... Il calore del suo corpo sembra una fornace ardente, benché la stanza sia umida e fredda. E peggio ancora! Sotto la sua pelle, giurerei di vedere masse guizzanti muoversi avanti e indietro.\n\nBalzo via da [Select_CString(host.IsFemale,'lei','lui')]; è troppo tardi per offrire conforto. E ora ho anch'io una sensazione che rode lungo le viscere. La stanza, un tempo fredda, ora sembra in fiamme.\n\nMi precipito sulla prua della nave, strappandomi i vestiti mentre corro. Il brulichio che avevo visto sotto la pelle di [host.GetFirstNamePossessiveNoTooltip] ora è chiaramente visibile sulla mia. E il dolore... #EMP Come brucia!#!\n\nMi stringo il ventre, ma quando apro la bocca per urlare, ne esce solo fumo..."
agot_sailing.3936.desc_cancelled: 0 "Benché il viaggio verso l'Antica Valyria non abbia avuto successo, la fine del nostro cammino ci accoglie con cieli limpidi e venti favorevoli. Forse gli orrori sono tutti alle nostre spalle.\n\nMa mentre vago sul ponte, sento un lieve formicolio nello stomaco... #italic Ahah! Non mangio da quasi un giorno!#!"
 agot_sailing.3936.a_good:0 "$agot_sailing.3907.a_good$"
 agot_sailing.3936.a_bad:0 "$agot_sailing.3907.a_bad$"

 agot_sailing.3937.t:0 "$agot_sailing.3903.t$"
agot_sailing.3937.desc: 0 "Sto sul ponte della nave mentre la nostra rotta ci porta accanto alle scogliere spezzate e fumanti che punteggiano il Mare Fumante. Nella mia mente, riesco già a vedere i molti tesori che di certo scopriremo nascosti tra le rovine della Valyria di un tempo. Oro, gemme e naturalmente il preziosissimo acciaio di Valyria... Presto, tutto sarà nostro...\n\nUn forte #italic schianto#! mi riporta alla realtà, e all'improvviso i cieli si riempiono di cenere e fuoco. Una pioggia di rocce ardenti avvolge la nave, e rapidamente le fiamme iniziano a diffondersi. Mentre guardo con terrore, le vele prendono fuoco, e l'incendio balza dall'albero al ponte.\n\nTra urla di panico e dolore, un calore insopportabile si leva tutt'intorno a me. Senza pensare, mi getto nelle acque furiose sottostanti, solo per vedere la nave colare a picco davanti ai miei occhi. Nuoto freneticamente per allontanarmi dal relitto..."
 agot_sailing.3937.a:0 "$agot_sailing.3903.a$"

agot_sailing.5500.t: 0 "A Caccia di una Creatura Marina"
agot_sailing.5500.desc: 0 "Mentre la nostra imbarcazione si spinge più lontano nella vasta distesa dell'oceano, [first_mate.GetFirstName] si avvicina a me. «Teniamo gli occhi aperti per qualunque abitante dell'oceano, capitano. Appena qualcuno avvisterà qualcosa, sarai il primo a esserne informato.»\n\nAnnuisco, sentendo crescere la mia attesa. Che sorta di creatura incontreremo oggi, mi domando?"
agot_sailing.5500.desc.a: 0 "Lasciato alle spalle il nostro precedente incontro, ordino all'equipaggio di continuare a sorvegliare attentamente l'orizzonte. Troveremo un'altra creatura marina, di questo sono certo..."
agot_sailing.5500.a: 0 "Tenete gli occhi aperti, uomini!"
agot_sailing.5500.a.tt: 0 "Cercherai una #high creatura marina#! da cacciare"

agot_sailing.5501.t: 0 "Preda Avvistata"
agot_sailing.5501.desc.a: 0 "Non passa molto prima che si levi un richiamo. «Tartaruga avvistata, capitano!»\n\nNuotando pigramente accanto alla nostra imbarcazione, si può vedere una grande #high tartaruga marina#! verde. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.a: 0 "Dovrebbe essere facile..."
agot_sailing.5501.a.tt: 0 "Decidi di cacciare la #high tartaruga marina#!"

agot_sailing.5501.desc.b: 0 "Non passa molto prima che si levi un richiamo. «Foca avvistata, capitano!»\n\nNuotando pigramente accanto alla nostra imbarcazione, si può vedere una rotonda #high foca#! grigia. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.b: 0 "Prendete quella foca!"
agot_sailing.5501.b.tt: 0 "Decidi di cacciare la #high foca#!"

agot_sailing.5501.desc.c: 0 "Non passa molto prima che si levi un richiamo. «Delfino avvistato, capitano!»\n\nNuotando eccitato accanto alla nostra imbarcazione, si può vedere un sottile #high delfino bianco#!. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.c: 0 "Cacciamo il delfino."
agot_sailing.5501.c.tt: 0 "Decidi di cacciare il #high delfino bianco#!"

agot_sailing.5501.desc.d: 0 "Non passa molto prima che si levi un richiamo. «Tricheco avvistato, capitano!»\n\nSdraiato pigramente su un isolotto roccioso vicino alla nostra imbarcazione, si può vedere un enorme #high tricheco#!. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.d: 0 "Le sue zanne frutteranno un buon prezzo!"
agot_sailing.5501.d.tt: 0 "Decidi di cacciare il #high tricheco#!"

agot_sailing.5501.desc.e: 0 "Non passa molto prima che si levi un richiamo. «Orca avvistata, capitano!»\n\nNuotando rapida accanto alla nostra imbarcazione, si può vedere un'imponente #high orca#!. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.e: 0 "Portatemi il mio arpione!"
agot_sailing.5501.e.tt: 0 "Decidi di cacciare l'#high orca#!"

agot_sailing.5501.desc.f: 0 "Non passa molto prima che si levi un richiamo. «Balena a tribordo, capitano!»\n\nProprio allora, una massiccia eruzione d'acqua viene soffiata nell'aria e la grande sagoma della balena irrompe tra le onde. È una #high megattera#! adulta. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.f: 0 "È tempo di caccia, uomini!"
agot_sailing.5501.f.tt: 0 "Decidi di cacciare la #high megattera#!"

agot_sailing.5501.desc.g: 0 "Non passa molto prima che si levi un richiamo. «Balena a tribordo, capitano!»\n\nProprio allora, una massiccia eruzione d'acqua viene soffiata nell'aria e la grande sagoma della balena irrompe tra le onde. È un #high capodoglio#! adulto. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.g: 0 "Varra una fortuna!"
agot_sailing.5501.g.tt: 0 "Decidi di cacciare il #high capodoglio#!"

agot_sailing.5501.desc.h: 0 "Non passa molto prima che si levi un richiamo. «Balena dritta davanti a noi, capitano!»\n\nProprio allora, una massiccia eruzione d'acqua viene soffiata nell'aria e la grande sagoma della balena irrompe tra le onde. È una gigantesca #high balenottera azzurra#!, un vero leviatano. «Ci proviamo, capitano?» chiede [first_mate.GetFirstName]."
agot_sailing.5501.h: 0 "Una grossa! Prendiamola!"
agot_sailing.5501.h.tt: 0 "Decidi di cacciare la #high balenottera azzurra#!"

agot_sailing.5501.desc.i: 0 "Dopo alcune ore di navigazione, sobbalzo per grida di paura e sgomento. «Kraken! Kraken!» gridano gli uomini, alcuni già in fuga terrorizzati.\n\nSembra che la nostra preda abbia trovato noi, invece di essere noi a trovare lei. L'acqua dietro la nostra nave ribolle, rivelando presto la testa squamosa di un #high kraken#! adulto, con i tentacoli che si agitano violentemente attorno a essa.\n\n[first_mate.GetFirstName] corre fino a me. «Che facciamo, capitano? Combattiamo? O tentiamo di fuggire?»"
agot_sailing.5501.i: 0 "Non fuggirò! Preparatevi a combattere, uomini!"
agot_sailing.5501.i.tt: 0 "Decidi di cacciare il #high kraken#!"

agot_sailing.5501.desc.j: 0 "Non passa molto prima che si levi un richiamo. «Balena a tribordo, capitano!»\n\nProprio allora, una massiccia eruzione d'acqua viene soffiata nell'aria e la grande sagoma della balena irrompe tra le onde. La nave viene scossa da un colpo potente, che ci fa cadere a terra. Mentre fatico a rialzarmi, [first_mate.GetFirstName] striscia fino a me, pallid[Select_CString(first_mate.IsFemale,'a','o')] come un lenzuolo.\n\n«È—è il Terrore Bianco, capitano!» balbetta [Select_CString(first_mate.IsFemale,'lei','lui')]. Ho udito i racconti: una balena bianca di pura astuzia e malizia, che si dice infesti le acque del Mare dei Brividi. Ha affondato molte navi, e ora... ha trovato noi."

agot_sailing.5501.desc.k: 0 "Per lungo tempo il mare resta silenzioso, come se l'oceano stesso trattenesse il respiro nell'attesa. Sono irrequieto; cammino avanti e indietro vicino al timone della nave. Poi, infine, la vedetta grida. «Balena avvistata!»\n\nMi precipito avanti, e i miei occhi si spalancano increduli. Ci ha trovati. Il Terrore Bianco si avvicina rapidamente, fendendo le onde su una rotta di collisione diretta con la nostra nave.\n\nChiudo gli occhi per un istante prima di afferrare il mio arpione. «Preparatevi a combattere, uomini!» urlo, mentre la balena bianca si immerge e inizia il suo attacco feroce."

agot_sailing.5501.reroll: 0 "\n\nPurtroppo si è fatto troppo tardi per continuare a cercare nuove prede, quindi questa dovrà bastare"

agot_sailing.5501.j: 0 "Oggi, il Terrore Bianco esala il suo ultimo respiro!"
agot_sailing.5501.j.tt: 0 "Decidi di cacciare il #high Terrore Bianco#!"

agot_sailing.5501.k: 0 "Devono esserci altre creature là fuori."
agot_sailing.5501.k.tt: 0 "Fai girare la nave per cercare prede altrove"
agot_sailing.5501.l: 0 "Dobbiamo andarcene da qui!"

sailing.hunt.success: 0 "Trascinata la tua preda a bordo della nave, fai rotta per tornare in porto"
sailing.hunt.failure.tt: 0 "Mancando il tuo colpo"
sailing.hunt.failure: 0 "La tua preda si immerge lontano, svanendo nelle profondità"

agot_sailing.5502.t: 0 "A Caccia di una Tartaruga Marina"
agot_sailing.5502.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sulla tartaruga marina che nuota accanto alla nave.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5502.a: 0 "Pronto, mira, e..."
agot_sailing.5502.a.success: 0 "Uccidi la tartaruga marina"

agot_sailing.5503.t: 0 "A Caccia di una Foca"
agot_sailing.5503.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sulla foca grigia che nuota accanto alla nave.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5503.a: 0 "Pronto, mira, e..."
agot_sailing.5503.a.success: 0 "Uccidi la foca"

agot_sailing.5504.t: 0 "A Caccia di un Delfino"
agot_sailing.5504.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sul delfino sottile che nuota accanto alla nave.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5504.a: 0 "Pronto, mira, e..."
agot_sailing.5504.a.success: 0 "Uccidi il delfino"

agot_sailing.5505.t: 0 "A Caccia di un Tricheco"
agot_sailing.5505.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sul grande tricheco sdraiato su un isolotto vicino.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5505.a: 0 "Pronto, mira, e..."
agot_sailing.5505.a.success: 0 "Uccidi il tricheco"

agot_sailing.5506.t: 0 "A Caccia di un'Orca"
agot_sailing.5506.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sulla temibile orca che si aggira nelle acque vicino alla nave.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5506.a: 0 "Pronto, mira, e..."
agot_sailing.5506.a.success: 0 "Uccidi l'orca"

agot_sailing.5507.t: 0 "A Caccia di una Megattera"
agot_sailing.5507.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sulla megattera grigia che solca le acque vicino alla nave.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5507.a: 0 "Pronto, mira, e..."
agot_sailing.5507.a.success: 0 "Uccidi la megattera"

agot_sailing.5508.t: 0 "A Caccia di un Capodoglio"
agot_sailing.5508.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sul possente capodoglio nero che irrompe attraverso la superficie dell'acqua vicino alla nave.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5508.a: 0 "Pronto, mira, e..."
agot_sailing.5508.a.success: 0 "Uccidi il capodoglio"

agot_sailing.5509.t: 0 "A Caccia di una Balenottera Azzurra"
agot_sailing.5509.desc: 0 "Sto sul ponte, arpione in mano. L'equipaggio mi osserva con attesa mentre prendo la mira sulla maestosa balenottera azzurra che nuota appena sotto la superficie dell'oceano vicino alla nave.\n\n«Fermo ora,» penso tra me e me, serrando la presa sull'asta dell'arma."
agot_sailing.5509.a: 0 "Pronto, mira, e..."
agot_sailing.5509.a.success: 0 "Uccidi la balenottera azzurra"

agot_sailing.5510.t: 0 "A Caccia di un Kraken"
agot_sailing.5510.desc: 0 "Il caos più totale esplode intorno alla nave mentre il temibile kraken inizia il suo assalto. I marinai urlano di paura, alcuni gettandosi di lato nel tentativo di sfuggire all'ira della creatura. I suoi possenti tentacoli si abbattono contro lo scafo della nave, mandando scosse attraverso l'imbarcazione che gettano molti del mio equipaggio sul ponte.\n\nGli arcieri tormentano la bestia, distraendola e facendola infuriare ancor di più. La sua testa a becco si erge in preda all'ira, avvicinandosi rapidamente alla prua della nave, dove ora sto, arpione in mano. Stringo la presa sull'asta dell'arma nei secondi che restano prima dell'impatto. Questa sarà l'unica occasione che avrò, e devo farla contare."
agot_sailing.5510.a: 0 "La tua fine è giunta, vile serpente!"
agot_sailing.5510.a.success: 0 "Uccidi il kraken"
agot_sailing.5510.a.failure: 0 "Il tuo arpione viene respinto dai tentacoli del kraken"
agot_sailing.5510.b: 0 "Suonate il corno!"
agot_sailing.5510.b_tt: 0 "Soffi nel corno nella speranza di distrarre il kraken"

agot_sailing.5511.t: 0 "A Caccia del Terrore Bianco"
agot_sailing.5511.desc: 0 "Un'altra onda d'urto squarcia la nave. Con lo scafo incrinato, l'imbarcazione comincia a sbandare. Freneticamente, tento di individuare la bestia, ma è troppo veloce. Tuffandosi in profondità sotto la nave, sbatte la fronte squadrata contro la nostra imbarcazione dal basso, facendo volare i membri dell'equipaggio. Il Terrore Bianco emerge dalle onde davanti alla nave, incrociando il mio sguardo.\n\nRiconosco la sua astuzia, e brividi mi corrono lungo la schiena. Questo è un nemico diverso da qualsiasi cosa si trovi nei mari di Westeros. Eppure, il Terrore Bianco si è esposto, anche solo per un momento, osando deridermi. In fretta, preparo il mio arpione proprio mentre la bestia ruggisce in trionfo e si prepara a un altro assalto..."
agot_sailing.5511.desc.a: 0 "Sento la presa stringersi attorno al mio arpione, le nocche che diventano bianche. «Questa volta #italic non#! mi sfuggirai, bestia,» mormoro tra me e me proprio mentre un'altra onda d'urto scuote l'intera nave, facendo volare molti compagni d'equipaggio.\n\nMa il mio appoggio resta saldo. Sono colmo di determinazione a uccidere questo mostro e porre fine alla sua vile esistenza una volta per tutte.\n\nArrivo al timone della nave appena in tempo per vedere il Terrore Bianco ergersi in trionfo davanti a me. Incrocia il mio sguardo, sfidandomi. #italic Deridendomi#!. La rabbia mi travolge mentre sollevo il braccio e prendo la mira..."
agot_sailing.5511.a: 0 "Ti ho in pugno adesso, bestia..."
agot_sailing.5511.a.success: 0 "Uccidi il Terrore Bianco!"
agot_sailing.5511.a.failure: 0 "Il Terrore Bianco evita il tuo arpione"

agot_sailing.5512.t: 0 "La maledizione del Terrore Bianco"
agot_sailing.5512.desc: 0 "La nostra nave avanza zoppicando sull'oceano, malconcia e a malapena a galla. Il Terrore Bianco è svanito nella nebbia sorta all'improvviso.\n\nMi ritrovo incapace di parlare, ancora scosso dall'incontro con quella balena feroce. Sento ancora il suo sguardo penetrante su di me. Che mi osserva. Che mi attende. È là fuori da qualche parte, a bearsi della distruzione che ha causato. La rabbia monta dentro di me, e stringo i pugni in un'ira impotente.\n\nQuesto non può restare impunito!"
agot_sailing.5512.a: 0 "#italic Ti#! finirò, bestia!"
agot_sailing.5512.b: 0 "No, devo... devo lasciar andare..."
agot_sailing.5512.c: 0 "Il fallimento è un grande maestro..."

agot_sailing.5600.t: 0 "In cerca di una creatura"
agot_sailing.5600.desc: 0 "Mentre la nostra nave si spinge più lontano in mare aperto, sento [host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] e [first_mate.GetFirstName] parlare. "Teniamo gli occhi aperti per qualunque creatura degli abissi, capitano," spiega [first_mate.GetFirstName]. "Non appena qualcuno avvisterà qualcosa, sarete il primo a saperlo."\n\nMi volto verso l'oceano sereno e mi domando quale sorta di creatura incontreremo oggi.\n\nQualche tempo dopo, sento un trambusto provenire dall'albero maestro: la vedetta ha avvistato qualcosa!"
agot_sailing.5600.a: 0 "La caccia è aperta!"

agot_sailing.5601.t: 0 "Successo!"
agot_sailing.5601.desc.a: 0 ""Tartaruga avvistata, capitano!"\n\nNuotando con vigore accanto alla nostra nave, si scorge una grande #high tartaruga marina#! verde. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla tartaruga, e...\n\n#italic Colpita!#! Un centro perfetto! Poco dopo, la carcassa verde della tartaruga viene issata a bordo."
agot_sailing.5601.desc.b: 0 ""Foca avvistata, capitano!"\n\nNuotando pigramente accanto alla nostra nave, si scorge una rotonda #high foca grigia#!. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla foca, e...\n\n#italic Colpita!#! Un centro perfetto! Poco dopo, la carcassa grigia della foca viene issata a bordo."
agot_sailing.5601.desc.c: 0 ""Delfino avvistato, capitano!"\n\nNuotando con entusiasmo accanto alla nostra nave, si scorge un sottile #high delfino bianco#!. "Lo inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sul delfino, e...\n\n#italic Colpito!#! Un centro perfetto! Poco dopo, la carcassa bianca del delfino viene issata a bordo."
agot_sailing.5601.desc.d: 0 ""Tricheco avvistato, capitano!"\n\nAdagiato pigramente su un isolotto roccioso vicino alla nostra nave, si scorge un enorme #high tricheco#!. "Lo inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sul tricheco, e...\n\n#italic Colpito!#! Un centro perfetto! Poco dopo, la carcassa massiccia del tricheco viene issata a bordo."
agot_sailing.5601.desc.e: 0 ""Orca avvistata, capitano!"\n\nNuotando rapida accanto alla nostra nave, si scorge un'imponente #high orca#!. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sull'orca, e...\n\n#italic Colpita!#! Un centro perfetto! Poco dopo, la carcassa muscolosa dell'orca viene issata a bordo."
agot_sailing.5601.desc.f: 0 ""Balena a tribordo, capitano!"\n\nNon appena il grido risuona, un enorme getto d'acqua erompe nell'aria e la forma immensa della balena squarcia le onde. È una #high megattera#! adulta. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla balena, e...\n\n#italic Colpita!#! Un centro perfetto! Ma questo da solo non basta a uccidere una simile creatura. Altri marinai preparano i loro proiettili, mettendo a segno ulteriori colpi sulla balena sanguinante. Dopo una lunga lotta, l'enorme carcassa della megattera viene finalmente issata a bordo."
agot_sailing.5601.desc.g: 0 ""Balena dritta davanti a noi, capitano!"\n\nNon appena il grido risuona, un enorme getto d'acqua erompe nell'aria e la forma immensa di una balena squarcia le onde. È un #high capodoglio nero#! adulto. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla balena, e...\n\n#italic Colpita!#! Un centro perfetto! Ma questo da solo non basta a uccidere una simile creatura. Altri marinai preparano i loro proiettili, mettendo a segno ulteriori colpi sulla balena sanguinante. Dopo una lunga lotta, la possente carcassa del capodoglio viene finalmente issata a bordo."
agot_sailing.5601.desc.h: 0 ""Balena dritta davanti a noi, capitano!"\n\nProprio mentre sento il grido risuonare, un enorme getto d'acqua erompe nell'aria e la forma poderosa della balena squarcia le onde. È una gigantesca #high balenottera azzurra#!, un vero leviatano. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla balena, e...\n\n#italic Colpita!#! Un centro perfetto! Ma questo da solo non basta a uccidere una simile creatura. Altri marinai preparano i loro proiettili, mettendo a segno ulteriori colpi sulla balena sanguinante. Dopo una lunga lotta, la gigantesca carcassa della balenottera azzurra viene finalmente issata a bordo."
agot_sailing.5601.desc.i: 0 "Dopo alcune ore di navigazione, vengo scosso da grida di paura e sgomento. "Kraken! È arrivato un kraken!" gridano gli uomini, alcuni già in fuga terrorizzati.\n\nSembra che sia stata la nostra preda a trovare noi. L'acqua dietro la nostra nave ribolle violentemente, rivelando presto la testa squamosa di un #high kraken#! davvero mostruoso, il becco viscido che schiocca con un ululato ripugnante.\n\nVedo [first_mate.GetFirstName] correre da [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed]. "Che facciamo, capitano? Combattiamo o tentiamo di fuggire?"\n\n"Non fuggirò!" esclama [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNoTooltip]. "Preparatevi, uomini!"\n\nIl kraken è un mostro terrificante, e molti marinai vengono colpiti dai suoi tentacoli e trascinati urlanti negli abissi. Proprio quando comincio a temere che la nave possa essere perduta, un arpione trafigge l'occhio della creatura, scomparendo del tutto nella massa molle della sua carne bulbosa. Strilla, più forte che mai. E poi... si affloscia. Alla fine, la bestia è uccisa."
agot_sailing.5601.desc.i_two: 0 "Dopo alcune ore di navigazione, vengo scosso da grida di paura e sgomento. "Kraken! È arrivato un kraken!" gridano gli uomini, alcuni già in fuga terrorizzati.\n\nSembra che sia stata la nostra preda a trovare noi. L'acqua dietro la nostra nave ribolle violentemente, rivelando presto la testa squamosa di un #high kraken#! davvero mostruoso, il becco viscido che schiocca con un ululato ripugnante.\n\nVedo [first_mate.GetFirstName] correre da [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed]. "Che facciamo, capitano? Combattiamo o tentiamo di fuggire?"\n\n"Non fuggirò!" esclama [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNoTooltip]. "Preparatevi, uomini!"\n\nIl kraken è un mostro terrificante, e molti marinai vengono colpiti dai suoi tentacoli e trascinati urlanti negli abissi. [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNoTooltip] soffia nel proprio corno del kraken, e il richiamo tonante distrae la grande bestia abbastanza a lungo perché un arpione trafigga l'occhio della creatura, scomparendo del tutto nella massa molle della sua carne bulbosa. Strilla, più forte che mai. E poi... si affloscia. Alla fine, la bestia è uccisa."
agot_sailing.5601.desc.j: 0 "La caccia va male. Nessuna creatura è stata avvistata per ore, e comincio ad annoiarmi. Proprio allora, un grido allarmato risuona alle mie spalle. "Balena a tribordo, capitano!"\n\nIn un istante, un enorme getto d'acqua erompe nell'aria e la forma immensa della balena squarcia le onde. La nave viene scossa da un colpo tremendo, che ci butta a terra. Mentre fatico a rialzarmi, [first_mate.GetFirstName] striscia verso di me, il volto bianco come un lenzuolo.\n\n"È... è il Terrore Bianco, il... il Terrore dei Mari!" balbetta [Select_CString(first_mate.IsFemale,'lei','lui')]. Ho udito i racconti: una balena bianca di terribile astuzia e malizia, che si dice infesti queste acque come un fantasma gigantesco. Ha affondato molte navi, e ora... ha trovato noi.\n\n"Preparatevi a combattere!" grida [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed], afferrando un arpione. La nave subisce un altro colpo, e vengo scagliato contro un barile di provviste legato al ponte. Mentre ritrovo l'equilibrio, vedo il Terrore Bianco ergersi con un ululato assordante di dolore: in qualche modo, da qualche parte, un arpione gli ha trafitto il cuore. Oggi abbiamo posto fine a una leggenda."
agot_sailing.5601.desc.k: 0 "Per molto tempo, il mare resta silenzioso, come se l'oceano stesso trattenesse il respiro in attesa. Cammino irrequieto vicino al timone della nave. Poi, infine, la vedetta grida: "Balena avvistata!"\n\nMi precipito avanti, e i miei occhi si spalancano increduli. Ci ha trovati ancora una volta. Il Terrore Bianco si avvicina rapidamente, solcando le onde in rotta di collisione diretta con la nostra nave.\n\nChiudo gli occhi per una frazione di secondo prima di afferrare uno degli arpioni. Questa volta non resterò con le mani in mano, lo giuro, mentre la balena bianca si immerge e comincia il suo feroce assalto.\n\nLa nave viene scossa da un impatto tremendo, e sento il legno spezzarsi sotto di me. La mia presa si stringe attorno all'arpione mentre mi costringo a rimettermi in piedi. Raccogliendo le forze rimaste, scaglio l'arma contro il Terrore Bianco, trafiggendolo al petto mentre si erge per un altro attacco. Emette un ululato assordante di dolore... e poi, contorcendosi, muore."
agot_sailing.5601.a: 0 "Ben fatto!"

agot_sailing.5602.t: 0 "Fallimento..."
agot_sailing.5602.desc.a: 0 ""Tartaruga avvistata, capitano!" Nuotando con vigore accanto alla nostra nave, si scorge una grande #high tartaruga marina#! verde. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla tartaruga, e...\n\n#italic Mancata!#! La tartaruga scivola silenziosamente sotto l'acqua e scompare."
agot_sailing.5602.desc.b: 0 ""Foca avvistata, capitano!"\n\nNuotando pigramente accanto alla nostra nave, si scorge una rotonda #high foca grigia#!. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla foca, e...\n\n#italic Mancata!#! La foca emette un guaito offeso, si immerge e scompare."
agot_sailing.5602.desc.c: 0 ""Delfino avvistato, capitano!"\n\nNuotando con entusiasmo accanto alla nostra nave, si scorge un sottile #high delfino bianco#!. "Lo inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sul delfino, e...\n\n#italic Mancato!#! Il delfino emette un lamento spaventato, si immerge e scompare."
agot_sailing.5602.desc.d: 0 ""Tricheco avvistato, capitano!"\n\nAdagiato pigramente su un isolotto roccioso vicino alla nostra nave, si scorge un enorme #high tricheco#!. "Lo inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sul tricheco, e...\n\n#italic Mancato!#! Il tricheco emette un ululato rabbioso, si tuffa tra le onde e scompare."
agot_sailing.5602.desc.e: 0 ""Orca avvistata, capitano!"\n\nNuotando rapida accanto alla nostra nave, si scorge un'imponente #high orca#!. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sull'orca, e...\n\n#italic Mancata!#! L'orca emette un grido spaventato, si immerge e scompare."
agot_sailing.5602.desc.f: 0 ""Balena a tribordo, capitano!"\n\nNon appena il grido risuona, un enorme getto d'acqua erompe nell'aria e la forma immensa della balena squarcia le onde. È una #high megattera#! adulta. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla balena, e...\n\n#italic Mancata!#! La megattera si allontana dalla nave, si immerge e scompare."
agot_sailing.5602.desc.g: 0 ""Balena dritta davanti a noi, capitano!"\n\nNon appena il grido risuona, un enorme getto d'acqua erompe nell'aria e la forma immensa di una balena squarcia le onde. È un #high capodoglio nero#! adulto. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla balena, e...\n\n#italic Mancata!#! Il capodoglio colpisce il fianco della nave con la coda, scuotendola abbastanza forte da farmi inciampare. Poi si immerge e scompare."
agot_sailing.5602.desc.h: 0 ""Balena dritta davanti a noi, capitano!"\n\nProprio mentre sento il grido risuonare, un enorme getto d'acqua erompe nell'aria e la forma poderosa della balena squarcia le onde. È una gigantesca #high balenottera azzurra#!, un vero leviatano. "La inseguiamo, capitano?" chiede [first_mate.GetFirstName].\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed] afferra un arpione, prende la mira sulla balena, e...\n\n#italic Mancata!#! La balenottera azzurra reagisce prontamente. Si allontana dalla nostra nave e si immerge, scomparendo alla vista."
agot_sailing.5602.desc.i: 0 "Dopo alcune ore di navigazione, vengo scosso da grida di paura e sgomento. "Kraken! È arrivato un kraken!" gridano gli uomini, alcuni già in fuga terrorizzati.\n\nSembra che sia stata la nostra preda a trovare noi. L'acqua dietro la nostra nave ribolle violentemente, rivelando presto la testa squamosa di un #high kraken#! davvero mostruoso, il becco viscido che schiocca con un ululato ripugnante.\n\nVedo [first_mate.GetFirstName] correre da [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed]. "Che facciamo, capitano? Combattiamo o tentiamo di fuggire?"\n\n"Non fuggirò!" esclama [host.GetFirstName]. "Preparatevi, uomini!"\n\nIl kraken è un mostro terrificante, e molti marinai vengono colpiti dai suoi tentacoli e trascinati negli abissi. Gli arpioni scivolano semplicemente sulla sua pelle viscida. Non vuole morire! Fortunatamente per noi, alla fine il kraken perde interesse e si immerge, portando con sé un buon numero di anime sfortunate e lasciandoci senza nulla da mostrare se non ferite e una nave danneggiata."
agot_sailing.5602.desc.i_two: 0 "Dopo alcune ore di navigazione, vengo scosso da grida di paura e sgomento. "Kraken! È arrivato un kraken!" gridano gli uomini, alcuni già in fuga terrorizzati.\n\nSembra che sia stata la nostra preda a trovare noi. L'acqua dietro la nostra nave ribolle violentemente, rivelando presto la testa squamosa di un #high kraken#! davvero mostruoso, il becco viscido che schiocca con un ululato ripugnante.\n\nVedo [first_mate.GetFirstName] correre da [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNicknamed]. "Che facciamo, capitano? Combattiamo o tentiamo di fuggire?"\n\n"Non fuggirò!" esclama [host.GetFirstName]. "Preparatevi, uomini!"\n\nIl kraken è un mostro terrificante, e molti marinai vengono colpiti dai suoi tentacoli e trascinati negli abissi. [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNoTooltip] soffia nel proprio corno del kraken, attirando l'attenzione della bestia, ma ferito e assalito da ogni lato, l'istinto di sopravvivenza del mostro si dimostra troppo forte per tenerlo docile più di un istante. Gli arpioni scivolano semplicemente sulla sua pelle viscida. Non vuole morire! Fortunatamente per noi, alla fine il kraken perde interesse e si immerge, portando con sé un buon numero di anime sfortunate e lasciandoci senza nulla da mostrare se non ferite e una nave danneggiata."
agot_sailing.5602.desc.j: 0 "La caccia va male. Nessuna creatura è stata avvistata per ore, e comincio ad annoiarmi. Proprio allora, un grido allarmato risuona alle mie spalle. "Balena a tribordo, capitano!"\n\nIn un istante, un enorme getto d'acqua erompe nell'aria e la forma immensa della balena squarcia le onde. La nave viene scossa da un colpo tremendo, che ci butta a terra. Mentre fatico a rialzarmi, [first_mate.GetFirstName] striscia verso di me, il volto bianco come un lenzuolo.\n\n"È... è il Terrore Bianco, il... il Terrore dei Mari!" balbetta [Select_CString(first_mate.IsFemale,'lei','lui')]. Ho udito i racconti: una balena bianca di terribile astuzia e malizia, che si dice infesti queste acque come un fantasma gigantesco. Ha affondato molte navi, e ora... ha trovato noi.\n\n"Preparatevi a combattere!" grida [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNicknamed], afferrando un arpione. La nave subisce un altro colpo, e vengo scagliato contro un barile di provviste legato al ponte. Mentre ritrovo l'equilibrio, vedo il Terrore Bianco ergersi con un ululato assordante di trionfo: ha quasi fatto a pezzi la nostra nave e ci considera sconfitti. Mentre si immerge, sento il cuore battermi più forte che mai. Temo che questo mostro infesterà i miei incubi..."
agot_sailing.5602.desc.k: 0 "Per molto tempo, il mare resta silenzioso, come se l'oceano stesso trattenesse il respiro in attesa. Cammino irrequieto vicino al timone della nave. Poi, infine, la vedetta grida: "Balena avvistata!"\n\nMi precipito avanti, e i miei occhi si spalancano increduli. Ci ha trovati ancora una volta. Il Terrore Bianco si avvicina rapidamente, solcando le onde in rotta di collisione diretta con la nostra nave.\n\nChiudo gli occhi per una frazione di secondo prima di afferrare uno degli arpioni. Questa volta non resterò con le mani in mano, lo giuro, mentre la balena bianca si immerge e comincia il suo feroce assalto.\n\nLa nave viene scossa da un impatto tremendo, e sento il legno spezzarsi sotto di me. La mia presa si stringe attorno all'arpione mentre mi costringo a rimettermi in piedi. Raccogliendo le forze rimaste, scaglio l'arma contro il Terrore Bianco, solo perché eviti il mio tiro con arrogante facilità! La balena si erge con un ululato assordante di trionfo: ha quasi fatto a pezzi la nostra nave e ci considera sconfitti una volta ancora. Quasi a schernirci, soffia un grande getto d'acqua nell'aria prima di immergersi di nuovo sotto le onde."
agot_sailing.5602.a: 0 "Ed eravamo così vicini..."

agot_sailing.5603.t: 0 "Il Terrore Bianco fugge"
agot_sailing.5603.desc: 0 "Oggi il mare è quieto, quasi sereno. Me ne sto sul ponte, osservando le onde urtare dolcemente lo scafo della nostra nave. Proprio allora, il mio sguardo coglie un movimento sotto la superficie scura dell'acqua. C'è qualcosa laggiù: una macchia bianca, che diventa sempre più grande, e più grande, e...\n\nCon uno schianto assordante, una creatura enorme scuote la nave e mi getta a terra. Quando mi rialzo, vedo una balena insolitamente bianca emergere dalle onde, con i suoi occhi rossi fissi sulla nostra nave.\n\n"È... è il Terrore Bianco, il... il Terrore dei Mari!" balbetta qualcuno. Ho udito i racconti: una balena bianca di pura astuzia e malizia, che si dice infesti queste acque come un fantasma gigantesco. Ha affondato molte navi, e ora... ha trovato noi.\n\nMa il Terrore Bianco non sembra interessato a combattere. Gira attorno alla nostra nave per alcuni minuti terrificanti, restando appena fuori dalla portata degli arpioni, prima di schernirci con uno spruzzo d'acqua dallo sfiatatoio, per poi immergersi sotto le onde e scomparire."
agot_sailing.5603.a: 0 "Che #italic cos'era#! quel mostro?"

 # Sunken Treasure events
agot_sailing.6000.toast: 0 "Hai rubato una mappa del tesoro durante l'assedio."
agot_sailing.6000.toast_desc: 0 "Scopri una raccolta di ricerche che indicano [sunken_ship_province.GetName], dove andò perduta una ricca nave mercantile."

agot_sailing.6001.t: 0 "In cerca del relitto"
agot_sailing.6001.desc: 0 "Mentre navighiamo lungo la costa, controllo ancora una volta la mappa. Ci stiamo avvicinando all'ultima posizione nota della nave. Dovrebbe trovarsi qui vicino, dove affondò fino al fondale oceanico.\n\nChiamo [first_mate.GetName] e ordino a [Select_CString(first_mate.IsFemale,'lei','lui')] di far tenere all'equipaggio gli occhi aperti per qualunque segno del relitto. Ordino anche di preparare la campana subacquea. Quando troveremo il relitto, voglio essere pronto a immergermi il prima possibile.\n\nMi domando quali ricchezze giacciano nascoste sul fondale dell'oceano!"
agot_sailing.6001.a: 0 "Perlustra la zona!"
agot_sailing.6001.a.success.tt: 0 "Trovi segni del relitto"
agot_sailing.6001.a.failure.tt: 0 "Non riesci a trovare alcuna traccia della nave"

agot_sailing.6002.t: 0 "Prepararsi all'immersione"
agot_sailing.6002.desc: 0 ""Mio [host.GetLadyLord]!"\n\n[first_mate.GetName] grida per attirare la mia attenzione mentre fisso il mare.\n\nMi dirigo verso il punto in cui [Select_CString(first_mate.IsFemale,'lei','lui')] si trova al bordo della nave, scrutando nell'acqua a poca distanza da dove siamo ancorati, e poi lo vedo.\n\nMolto sotto l'acqua immobile giace un relitto!"
agot_sailing.6002.a: 0 "È ora di nuotare!"
agot_sailing.6002.b: 0 "È troppo pericoloso."

agot_sailing.6003.t: 0 "Calarsi nelle profondità"
agot_sailing.6003.desc: 0 "Mentre la campana comincia a scendere, la seguo giù nelle profondità finché non raggiunge il fondale oceanico. Man mano che sprofondiamo sotto le onde, mi guardo attorno per orientarmi.\n\nLa nave che sono venuto a saccheggiare giace distrutta, i suoi resti sparsi sul fondale.\n\nNon so quali pericoli possano celarsi tra il relitto, né quali tesori possano ancora restare nascosti qui, ma il pensiero di ricchezze indicibili mi fa battere il cuore."
agot_sailing.6003.a: 0 "Vediamo cosa riesco a trovare!"

agot_sailing.6004.t: 0 "La Balena Bianca!"
agot_sailing.6004.desc: 0 "Mentre mi avvicino al relitto, non posso fare a meno di notare quanto siano vuote le acque. Nessun predatore si aggira tra le rovine, e quasi nessun pesce nuota nei dintorni.\n\nMentre rifletto su questo silenzio inquietante, odo il richiamo lontano di una grande bestia.\n\nUna balena bianca!\n\nLa scorgo infine in lontananza. Deve essere per questo che nessun'altra creatura osa avvicinarsi. Una benedizione della bestia stessa!\n\nPosso esaminare il relitto con cura e reclamare tutti i tesori che ancora restano."
agot_sailing.6004.a: 0 "Riportiamo questo tesoro alla nave."

agot_sailing.6005.t: 0 "Gli squali bloccano il passaggio"
agot_sailing.6005.desc: 0 "Un branco di squali gira attorno al sentiero che conduce al relitto. Potrei tentare di forzare il passaggio o provare a sgusciare oltre di loro. Altrimenti, potrei dover abbandonare il tesoro se il pericolo si rivelasse troppo grande."
agot_sailing.6005.a: 0 "Forzerò il passaggio!"
agot_sailing.6005.a.success: 0 "Costringi gli squali a farsi da parte"
agot_sailing.6005.toast.a.success: 0 "Ti apri la strada oltre gli squali e raggiungi il tesoro"
agot_sailing.6005.a.failure: 0 "Gli squali si dimostrano troppo difficili da affrontare"
agot_sailing.6005.toast.a.failure: 0 "Gli squali ti sopraffanno, costringendoti alla fuga"
agot_sailing.6005.b: 0 "Posso aggirarli con cautela."
agot_sailing.6005.b.success: 0 "Sgusci oltre gli squali"
agot_sailing.6005.toast.b.success: 0 "Scivoli oltre gli squali e raggiungi il tesoro"
agot_sailing.6005.b.failure: 0 "Non riesci a sgusciare oltre gli squali"
agot_sailing.6005.toast.b.failure: 0 "Gli squali ti notano e ti costringono alla fuga"
agot_sailing.6005.c: 0 "È fin troppo pericoloso."

agot_sailing.6006.t: 0 "In queste oscure profondità"
agot_sailing.6006.desc: 0 "Le visioni mostruose sono spesso cattivi presagi, e i miei nervi sono tesi mentre osservo la scena dispiegarsi davanti a me: una bestia tentacolare, certamente un kraken di leggenda, si avvolge e lotta con la sua preda... una grande balena grigia grande il doppio della mia nave ammiraglia.\n\nEppure il tesoro là sotto è ormai così vicino. L'immersione che mi attende è pericolosa, ma posso davvero permettermi di tornare indietro?"
agot_sailing.6006.a: 0 "Il tesoro vale il rischio!"
agot_sailing.6006.a.success: 0 "Fuggirai con il tesoro"
agot_sailing.6006.toast.a.success: 0 "Sei tornato alla nave con il tesoro"
agot_sailing.6006.a.failure: 0 "Finisci intrappolato nella battaglia tra i colossi"
agot_sailing.6006.toast.a.failure: 0 "Sei stato ferito nello scontro tra i colossi"
agot_sailing.6006.b: 0 "Non rischierai la vita per questo!"
death_by_kraken: 0 "@death_icon! Vieni schiacciato dal kraken"

agot_sailing.6007.t: 0 "Un viaggio sprecato"
agot_sailing.6007.desc: 0 "[host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] torna alla sicurezza della nave, ma senza alcun tesoro da mostrare per la spedizione. [Select_CString(host.IsFemale,'Lei','Lui')] ci ha condotti tutti fin qui, e ora il suo fallimento sarà tutto ciò che avremo da ricordare..."
agot_sailing.6007.a: 0 "Facciamo rotta verso casa."

agot_sailing.6010.t: 0 "Il ritorno del capitano"
agot_sailing.6010.desc_big: 0 "[host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] ritorna con uno scrigno recuperato dal relitto. Sebbene arrugginito e rigonfio dopo anni sotto il mare, viene rapidamente forzato, rivelando un vasto tesoro di ricchezze a lungo credute perdute negli abissi."
agot_sailing.6010.desc_normal: 0 "[host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] ritorna con uno scrigno recuperato dal relitto. Sebbene arrugginito e rigonfio dopo anni sotto il mare, viene rapidamente forzato, rivelando un tesoro di ricchezze a lungo credute perdute negli abissi."
agot_sailing.6010.desc_small: 0 "[host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] ritorna con uno scrigno recuperato dal relitto. Sebbene arrugginito e rigonfio dopo anni sotto il mare, viene rapidamente forzato, rivelando un piccolo tesoro di ricchezze a lungo credute perdute negli abissi."
agot_sailing.6010.desc: 0 "[host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] ritorna senza tesoro. Il relitto si è dimostrato troppo pericoloso da raggiungere, e la spedizione non ha nulla da mostrare per il viaggio."
agot_sailing.6010.a: 0 "Facciamo rotta verso casa."

agot_sailing.6012.t: 0 "Un viaggio sprecato"
agot_sailing.6012.desc: 0 "Torno alla nave sano e salvo, ma senza alcun tesoro da mostrare per la spedizione. Ho condotto tutta questa gente fin qui, e ora il mio fallimento sarà l'unica cosa che ricorderanno."
agot_sailing.6012.a: 0 "Torniamo semplicemente a casa..."

agot_sailing.6013.t: 0 "È ora di nuotare"
agot_sailing.6013.desc: 0 ""Mio [host.GetLadyLord]!"\n\n[first_mate.GetName] grida per attirare l'attenzione di [host.Custom('IT_NAM_COL2')][host.GetTitledFirstNamePossessive] mentre [Select_CString(host.IsFemale,'lei','lui')] fissa il mare.\n\nRaggiungo [Select_CString(first_mate.IsFemale,'lei','lui')] alla battagliola, scrutando nell'acqua a poca distanza da dove siamo ancorati, e poi lo vedo!\n\nMolto sotto l'acqua immobile giace un relitto!"
agot_sailing.6013.a: 0 "Allora [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )] farà la sua immersione..."

agot_sailing.6014.t: 0 "Un recupero riuscito"
agot_sailing.6014.desc: 0 "Ritorno alla nave con uno scrigno recuperato dal relitto. Sebbene arrugginito e rigonfio dopo anni sotto il mare, riusciamo a forzarlo, rivelando tesori a lungo creduti perduti negli abissi. Finalmente possiamo lasciarci alle spalle questo luogo maledetto."
agot_sailing.6014.vermax_skull: 0 "\n\nSul fondale dell'oceano ho anche scoperto i resti di [GetScriptedCharacterByHistoryID('dragon_vermax').GetName]. Si dice che [Select_CString(vermax.IsFemale,'lei','lui')] sia cadut[Select_CString(vermax.IsFemale,'a','o')] qui nel Gullet durante la Danza dei Draghi. Chi avrebbe potuto immaginare che avremmo scoperto il suo luogo di riposo mentre cercavamo un tesoro?"
agot_sailing.6014.a: 0 "Un bottino degno!"
agot_sailing.6014.a_generic_artifact: 0 "#V Tu#! hai ottenuto [generic_artifact.GetNameNoTooltip] [artifact|E]"
agot_sailing.6014.a_valyrian_steel_sword: 0 "#V Tu#! hai ottenuto [valyrian_steel_sword.GetNameNoTooltip] [artifact|E]"
agot_sailing.6014.a_spare: 0 "#V Tu#! hai ottenuto un [spare.GetNameNoTooltip] [artifact|E]"
found_new_map: 0 "Hai trovato una nuova mappa del tesoro"

 # Sailing:0 End results
agot_sailing.9001.t: 0 "Fine di un viaggio"
agot_sailing.9001.desc: 0 "Il mio lungo viaggio giunge al termine mentre la mia nave rientra in porto. Un senso di compimento mi pervade, e so che le mie capacità da marinaio sono diventate più affilate durante il viaggio. Sebbene una parte di me desideri restare in mare, ora devo tornare agli affari del governo del mio reame..."
agot_sailing.9001.a: 0 "...e tuttavia il mio cuore anela ancora una volta al mare."

agot_sailing.9002.t: 0 "Fine di un viaggio"
agot_sailing.9002.desc: 0 "Il mio lungo viaggio giunge al termine mentre la mia nave rientra in porto. Sebbene il viaggio non sia finito come speravo, ora devo voltare pagina e tornare agli affari del governo del mio reame..."
agot_sailing.9002.a: 0 "...e tuttavia il mio cuore anela ancora una volta al mare."

 # Sailing:0 Go on a raid
agot_sailing.9100.t: 0 "Preparativi pirateschi"
agot_sailing.9100.desc: 0 "Scendo a grandi passi verso i moli, traendo a fondo nei polmoni l'aria salmastra. Mi rinvigorisce, anche se non quanto la vista della mia nave all'ancora. Sia la nave sia il molo brulicano di attività mentre il mio equipaggio carica provviste cantando canzoni licenziose.\n\nIl quartiermastro nota il mio arrivo e si inchina con un gesto esagerato. Sorrido e annuisco in risposta mentre attraverso la passerella. Il mio primo ufficiale grida: "Capitano sul ponte!" accolto da un coro di applausi dell'equipaggio. Sembrano impazienti e affamati d'azione.\n\nOra non resta che decidere la nostra missione. Salperemo in mare aperto in cerca di una preda, o lanceremo un'incursione contro coste ostili?"
agot_sailing.9100.a: 0 "Partiamo per un'incursione costiera!"
agot_sailing.9100.b: 0 "Ci aggireremo in mare aperto!"

agot_sailing.9110.t: 0 "Scegliere un bersaglio"
agot_sailing.9110.desc: 0 "I miei ufficiali si radunano nella sala di guardia, dove ho srotolato una raccolta di mappe sul lungo tavolo di quercia. Li ho informati che porteremo la nave in razzia, anche se devo ancora scegliere la nostra destinazione. Ritengo che concedere loro voce in capitolo rafforzerà il morale, e così ascolto mentre discutono i meriti di ogni bersaglio.\n\nDopo un'ora, la discussione comincia a farsi accesa, e decido che è tempo di risolvere la questione. Batto il calice sul tavolo, e gli uomini ammutoliscono, voltandosi a fissarmi in attesa."
agot_sailing.9110.a: 0 "Raziamo [piracy_destination_1.GetName]"
agot_sailing.9110.b: 0 "Saccheggeremo [piracy_destination_2.GetName]!"
agot_sailing.9110.c: 0 "Che ne dite di sabotare [piracy_destination_3.GetName]?"
agot_sailing.9110.d: 0 "Pare che non vi siano luoghi da razziare nei dintorni"

agot_sailing.9111.t: 0 "Pattuglia navale avvistata!"
agot_sailing.9111.desc: 0 "Mentre ci avviciniamo al nostro bersaglio, l'attesa cresce tra l'equipaggio. Le vele nere sono state spiegate, e un forte vento in poppa ci sospinge avanti, con la prua della nave che taglia le onde come una lama affilata.\n\nAll'improvviso, un grido risuona dalla coffa: è stata avvistata una nave di pattuglia. L'imbarcazione è snella e irta di uomini armati. Devo scegliere: attaccare la nave frontalmente, tentare di aggirarla con una manovra, oppure voltare la coda e tornare a casa..."
agot_sailing.9111.a: 0 "Preparatevi, marinai! Li ingaggiamo!"
agot_sailing.9111.a.success: 0 "Affondi la nave di pattuglia"
agot_sailing.9111.a.failure: 0 "La tua nave viene danneggiata in battaglia, ma riesci a rientrare zoppicando"
agot_sailing.9111.toast.a.success: 0 "Nave di pattuglia affondata!"
agot_sailing.9111.toast.a.failure: 0 "La tua nave è danneggiata!"

agot_sailing.9111.c: 0 "Issate le vele! Li distanzieremo!"
agot_sailing.9111.c.success: 0 "Sfuggi alla nave di pattuglia"
agot_sailing.9111.c.failure: 0 "La nave di pattuglia danneggia la tua imbarcazione e ti costringe a ritirarti"
agot_sailing.9111.toast.c.success: 0 "Nave di pattuglia evitata!"
agot_sailing.9111.toast.c.failure: 0 "La tua nave è danneggiata, e sei costretto a ritirarti"
agot_sailing.9111.e: 0 "È troppo rischioso. Fate virare la nave!"

agot_sailing.9114.t: 0 "La Razia"
agot_sailing.9114.desc: 0 "Finalmente scorgiamo la costa davanti a noi, e il profilo del nostro bersaglio comincia a emergere all'orizzonte. I gabbiani volteggiano sopra l'albero maestro mentre il mio equipaggio si raduna sul ponte, affilando armi e tracannando liquore per farsi coraggio.\n\nOra giunge la vera decisione: qual è il modo migliore per trarre profitto da questa nefanda impresa?"
agot_sailing.9114.a: 0 "Sabotiamo la produzione [selected_piracy_destination.Custom('IT_COU_COL2')][selected_piracy_destination.GetName]."
agot_sailing.9114.a.success: 0 "Riduci il fattore di [development|E] e la dimensione della [garrison|E] [selected_piracy_destination.Custom('IT_COU_COL2')][selected_piracy_destination.GetName]"
agot_sailing.9114.a.failure: 0 "Vieni ferito dalle guardie"
agot_sailing.9114.toast.a.success: 0 "Provincia sabotata!"
agot_sailing.9114.toast.a.failure: 0 "Sabotaggio fallito!"

agot_sailing.9114.b: 0 "È ora di guadagnarvi la paga! Saccheggeremo [selected_piracy_destination.Custom('IT_COU_COL3')][selected_piracy_destination.GetName]."
agot_sailing.9114.b.success: 0 "Saccheggi [selected_piracy_destination.Custom('IT_COU_COL3')][selected_piracy_destination.GetNameNoTooltip]"
agot_sailing.9114.b.failure: 0 "Vieni ferito dalle guardie"
agot_sailing.9114.toast.b.success: 0 "Provincia saccheggiata!"
agot_sailing.9114.toast.b.failure: 0 "Saccheggio fallito!"

agot_sailing.9114.c: 0 "Prendiamo di mira direttamente [selected_piracy_destination_baron.GetName]."
agot_sailing.9114.c.success: 0 "Ferita inflitta a [selected_piracy_destination_baron.GetName]"
agot_sailing.9114.c.failure: 0 "Vieni ferito da [selected_piracy_destination_baron.GetName]"
agot_sailing.9114.toast.c.success: 0 "Vinci il duello!"
agot_sailing.9114.toast.c.failure: 0 "Perdi il duello!"

agot_sailing.9114.d: 0 "Dovremmo rapire alcuni abitanti del villaggio!"
agot_sailing.9114.d.success: 0 "Rapisci un abitante del villaggio"
agot_sailing.9114.d.failure: 0 "Vieni ferito dalle guardie"
agot_sailing.9114.toast.d.success: 0 "Abitante rapito!"
agot_sailing.9114.toast.d.failure: 0 "Rapimento fallito!"

agot_sailing.9114.e: 0 "È troppo rischioso. Fate virare la nave!"

agot_sailing.9120.t: 0 "La Nave Mercantile"
agot_sailing.9120.desc: 0 "Il tempo è stato clemente e i venti favorevoli, eppure abbiamo navigato per diversi giorni senza avvistare un'altra imbarcazione. L'equipaggio si fa irrequieto e litigioso. Comincio a temere che, se la loro energia non verrà presto diretta altrove, possano rivoltarsi gli uni contro gli altri.\n\nPoi risuona il grido: vele all'orizzonte occidentale! Ordino di far virare la nave e di puntare dritti verso la nostra preda. Man mano che ci avviciniamo, non posso fare a meno di sorridere: questo è un premio degno. Una cocca grassa, bassa sull'acqua sotto il peso del suo carico."
agot_sailing.9120.a: 0 "Preparatevi, uomini! Deprederemo quella nave mercantile!"
agot_sailing.9120.a.success: 0 "Depredi la nave mercantile!"
agot_sailing.9120.toast.a.success: 0 "Nave mercantile depredata!"
agot_sailing.9120.a.failure: 0 "Le difese della nave si rivelano troppo forti..."
agot_sailing.9120.toast.a.failure: 0 "Attacco fallito!"

agot_sailing.9120.c: 0 "Perché affondarla, quando possiamo prenderla per noi?"
agot_sailing.9120.c.success: 0 "Catturi l'imbarcazione e la riporti alla tua capitale!"
agot_sailing.9120.toast.c.success: 0 "Nave mercantile catturata!"
agot_sailing.9120.c.failure: 0 "Le difese della nave si rivelano troppo forti..."
agot_sailing.9120.toast.c.failure: 0 "Cattura fallita!"

agot_sailing.9120.e: 0 "È troppo rischioso. Fate virare la nave!"

agot_sailing.9130.t: 0 "Uno Scontro tra Pirati"
agot_sailing.9130.desc: 0 "Mentre ci avviciniamo [selected_piracy_destination.Custom('IT_COU_COL4')][selected_piracy_destination.GetName], risuona un grido: sono state avvistate delle vele. Uno sguardo più attento all'imbarcazione in avvicinamento rivela che non si tratta di una facile preda, bensì di una nave pirata logorata dal tempo, a caccia di bottino per conto proprio.\n\nSe riusciremo a sopraffare il suo equipaggio, potremmo trovare grandi ricchezze a bordo, anche se la battaglia non sarà priva di rischi."
agot_sailing.9130.a: 0 "Non reclameranno il nostro bottino. All'attacco!"
agot_sailing.9130.a.success: 0 "Depredi la nave pirata!"
agot_sailing.9130.toast.a.success: 0 "Nave pirata depredata!"
agot_sailing.9130.a.failure: 0 "Non riesci a sopraffare l'equipaggio nemico..."
agot_sailing.9130.toast.a.failure: 0 "Nave danneggiata!"

agot_sailing.9130.c: 0 "Sfiderò in duello il loro capitano, [dueled_pirate.GetName]!"
agot_sailing.9130.c.success: 0 "Decidi il destino di [dueled_pirate.GetName]"
agot_sailing.9130.toast.c.success: 0 "Duello vinto!"
agot_sailing.9130.c.failure: 0 "Perdi il duello"
agot_sailing.9130.toast.c.failure: 0 "Sconfitto!"

agot_sailing.9130.d: 0 "Issate le vele! Ci ritiriamo!"

agot_sailing.9131.t: 0 "[Select_CString(dueled_pirate.IsFemale,'Capitana','Capitano')] [dueled_pirate.GetFirstNameNoTooltip] Umiliat[Select_CString(dueled_pirate.IsFemale,'a','o')]"
agot_sailing.9131.desc: 0 "Dopo un duello feroce, finalmente sovrasto [Select_CString(dueled_pirate.IsFemale,'la mia nemica sconfitta','il mio nemico sconfitto')] mentre [Select_CString(dueled_pirate.IsFemale,'lei','lui')] giace accasciat[Select_CString(dueled_pirate.IsFemale,'a','o')] sul ponte. Entrambi gli equipaggi sembrano congelati sul posto, fissandomi intensamente mentre assaporo il momento. Il silenzio viene spezzato dal gemito sofferente della mia avversaria, che comincia a implorare pietà.\n\nOra devo decidere come sfruttare al meglio questa vittoria. Ho dimostrato il mio valore, ma potrebbero ancora esserci opportunità più grandi davanti a me..."
agot_sailing.9131.a: 0 "In gattabuia con te!"
agot_sailing.9131.b: 0 "Il mare non ha pietà per la debolezza. [dueled_pirate.GetFirstNameNoTooltip] camminerà sull'asse!"
agot_sailing.9131.c: 0 "Hai combattuto bene: unisciti a me!"
agot_sailing.9131.toast.c.success: 0 "[dueled_pirate.GetNameNoTooltip] si unisce al tuo equipaggio!"
agot_sailing.9131.d: 0 "Hai un equipaggio capace, vedo..."
agot_sailing.9131.d.success: 0 "Recluti l'equipaggio nemico"
agot_sailing.9131.toast.d.success: 0 "Equipaggio reclutato!"
agot_sailing.9131.d.failure: 0 "Non riesci a convincere l'equipaggio"
agot_sailing.9131.toast.d.failure: 0 "L'equipaggio rifiuta di unirsi a te"
agot_sailing.9131.e: 0 "Non sono privo di misericordia. Vattene!"
agot_sailing.9131.toast.e.success: 0 "[dueled_pirate.GetNameNoTooltip] rilasciat[Select_CString(dueled_pirate.IsFemale,'a','o')]!"

agot_sailing.9140.t: 0 "Una Mappa tra il Bottino?"
agot_sailing.9140.desc: 0 "Mentre frugo negli alloggi del capitano sconfitto, scopro una pila di mappe. A prima vista sembrano insignificanti, ma a un esame più attento scopro qualcosa di ben più prezioso: una mappa del tesoro che conduce al luogo in cui una nave fu vista affondare sotto le onde.\n\nSecondo i documenti allegati, l'imbarcazione era carica di ricchezze. Forse parte di quel tesoro giace ancora sul fondo dell'oceano? Se possediamo una campana da immersione, potremmo salpare e cercare nel relitto ciò che resta!"
agot_sailing.9140.a: 0 "Dobbiamo pianificare un nuovo viaggio!"

agot_sailing.9150.t: 0 "Un Fallimento da Parte di [host.Custom('IT_NAM_COL2')][host.GetTitledFirstNamePossessiveNoTooltip]"
agot_sailing.9150.desc: 0 "I nostri tentativi di portare a termine una razia riuscita sono stati sventati, e la colpa ricade interamente sulle spalle di [host.Custom('IT_NAM_COL2')][host.GetTitledFirstName]. La sua leadership incapace ci ha condotti fuori strada; la mia delusione è incommensurabile, e la mia giornata è rovinata."
agot_sailing.9150.a: 0 "Che fiasco..."

agot_sailing.9151.t: 0 "Una Razia Riuscita!"
agot_sailing.9151.desc: 0 "Finalmente scorgiamo la costa davanti a noi, e il profilo del nostro bersaglio comincia a emergere all'orizzonte. I gabbiani volteggiano sopra l'albero maestro mentre l'equipaggio si raduna sul ponte, affilando armi e tracannando liquore per farsi coraggio.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] ha deciso il nostro piano:"
agot_sailing.9151.desc_sabotaged_production: 0 "Saboteremo le infrastrutture locali, causando danni irreparabili ai loro mezzi di produzione.\n\nIl resto è confuso, ma ricordo distintamente di aver dato fuoco a un edificio o due. #EMP Bei tempi!#!"
agot_sailing.9151.desc_pillage_settlement: 0 "Saccheggeremo l'insediamento e rivendicheremo le loro monete per noi.\n\nL'occasione di intascare qualche oggetto di valore è più che gradita; prima ancora di rendermene conto, sono di nuovo sulla nave, a raccontare ai miei compagni d'equipaggio del saccheggio riuscito. #EMP Che brivido!#!"
agot_sailing.9151.desc_duel_the_baron: 0 "[Select_CString(host.IsFemale,'Lei','Lui')] sfiderà in duello il governante locale in una dimostrazione di valore.\n\nIl suo piano procede senza intoppi, ferendo con facilità la controparte. #EMP Notevole!#!"
agot_sailing.9151.desc_kidnap_villager: 0 "Rapiremo gli abitanti del luogo.\n\nDi certo la gente del posto tornerà utile [host.Custom('IT_NAM_COL4')][host.GetTitledFirstNameNoTooltip] in futuro. #EMP Grande successo!#!"
agot_sailing.9151.a: 0 "Ben guidati, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNoTooltip]!"

agot_sailing.9152.t: 0 "Una Razia Fallita..."
agot_sailing.9152.desc: 0 "Finalmente scorgiamo la costa davanti a noi, e il profilo del nostro bersaglio comincia a emergere all'orizzonte. I gabbiani volteggiano sopra l'albero maestro mentre l'equipaggio si raduna sul ponte, affilando armi e tracannando liquore per farsi coraggio.\n\n[host.Custom('IT_NAM_COL3')][host.GetTitledFirstName] ha deciso il nostro piano:"
agot_sailing.9152.desc_sabotaged_production: 0 "Saboteremo le infrastrutture locali, causando danni irreparabili ai loro mezzi di produzione.\n\nPurtroppo il piano non va bene; mentre tentavo di dare fuoco a un edificio, è comparsa una guardia e mi ha riempito di botte. La cosa successiva che ricordo è che ero di nuovo sulla barca. #EMP Ahi!#!"
agot_sailing.9152.desc_pillage_settlement: 0 "Saccheggeremo l'insediamento e rivendicheremo le loro monete per noi.\n\nPurtroppo per il nostro equipaggio, l'insediamento è ben sorvegliato, e il nostro tentativo di intascare i beni preziosi della gente del luogo è stato respinto. #EMP Che peccato!#!"
agot_sailing.9152.desc_duel_the_baron: 0 "[Select_CString(host.IsFemale,'Lei','Lui')] sfiderà in duello il governante locale in una dimostrazione di valore.\n\nPurtroppo il suo piano non va bene, e [Select_CString(host.IsFemale,'lei','lui')] viene ferit[Select_CString(host.IsFemale,'a','o')] nel processo. #EMP Una vergogna!#!"
agot_sailing.9152.desc_kidnap_villager: 0 "Rapiremo gli abitanti del luogo.\n\nPurtroppo non ci aspettavamo che l'insediamento fosse così ben sorvegliato, e i nostri tentativi vengono sventati. #EMP Maledizione!#!"
agot_sailing.9152.a: 0 "Mal guidati, [host.Custom('IT_NAM_COL3')][host.GetTitledFirstNameNoTooltip]..."

agot_sailing.9501.t: 0 "Una Tragedia al Largo di [ship_province.Custom('IT_COU_COL2')][ship_province.GetNameNoTooltip]"
agot_sailing.9501.desc_intro: 0 "[admiral.GetName] si avvicina a me portando una lettera. [Select_CString(admiral.IsFemale,'Lei','Lui')] desidera informarmi di una recente tragedia in mare.\n\nUna nave ha incontrato una fine prematura al largo di [ship_province.Custom('IT_COU_COL2')][ship_province.GetName], con pochissimi superstiti."
agot_sailing.9501.desc_reaction_sadistic: 0 "\n\nMi chiedo perché [Select_CString(admiral.IsFemale,'lei','lui')] abbia scelto di portare questa notizia a me. Provo più compassione per il carico perduto e le monete sprecate che per le vite reclamate dal mare."
agot_sailing.9501.desc_reaction: 0 "\n\nÈ una tragedia terribile. Non posso fare a meno di pensare a coloro che hanno perso la vita, e alle famiglie rimaste a piangerli."
agot_sailing.9501.desc_reaction_compassionate: 0 "\n\nQuesta tragedia mi spezza il cuore. Tante anime perdute sotto le onde, tante famiglie lacerate. Il pensiero di una simile sofferenza grava pesantemente su di me."
agot_sailing.9501.desc_greed_greedy: 0 "\n\nMentre [admiral.GetNameNoTooltip] parla del carico perduto, un pensiero mi attraversa la mente. So dove quella nave è affondata: al largo di [ship_province.Custom('IT_COU_COL2')][ship_province.GetNameNoTooltip]. Potrei attrezzare un'imbarcazione e mandare dei sommozzatori a recuperare ciò che resta... anche se pare che [admiral.GetNameNoTooltip] non sia stat[Select_CString(admiral.IsFemale,'a','o')] [Select_CString(admiral.IsFemale,'la prima','il primo')] a sapere del relitto. Altri potrebbero già essere diretti al sito."
agot_sailing.9501.desc_greed_not_tarth: 0 "\n\n[admiral.GetNameNoTooltip] continua a leggere dalla lettera, spiegando che una grande fortuna è andata perduta a bordo della nave condannata, ora sparsa sul fondo dell'oceano. Forse persino i celebri mari di zaffiro di Tarth troveranno ora concorrenza in bellezza."
agot_sailing.9501.desc_greed_tarth: 0 "\n\n[admiral.GetNameNoTooltip] continua a leggere dalla lettera, spiegando che una grande fortuna è andata perduta a bordo della nave condannata, ora sparsa sul fondo dell'oceano. I mari di zaffiro di Tarth potrebbero ora scintillare di pagliuzze d'oro: più belli che mai, seppur a un costo terribile."
agot_sailing.9501.a: 0 "Che notizia dolorosa."

agot_sailing_end: 0 "@warning_icon! #X Questa opzione terminerà l'attività#!"
agot_sailing_end_failure: 0 "@warning_icon! #X Questo terminerà l'attività#!"
