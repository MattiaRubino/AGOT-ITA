l_spanish:
  pregnancy.1001.motheroffering:0 "Farò un'offerta alla Madre."
  pregnancy.1001.motheroffering.self:0 "Affinché vegli su questa mia gravidanza."
  pregnancy.1001.motheroffering.father:0 "Affinché vegli su mia moglie."
  pregnancy.1001.motheroffering.deadhusband:0 "Affinché il suo ultimo dono non venga sprecato..."

  agot_religion_flavor.0002.t:0 "Aiutare i Perduti"
  agot_religion_flavor.0002.desc:0 "La battaglia volge al termine; abbiamo vinto, ma a quale prezzo? I divoratori di carogne sono già giunti sul campo, pronti a banchettare con i morti e i morenti. Un septon al seguito delle nostre truppe mi si avvicina e chiede se possiamo consacrare un piccolo altare affinché lo Sconosciuto accolga coloro che oggi hanno lasciato questo mondo."
  agot_religion_flavor.0002.a:0 "Erigeremo un piccolo altare allo Sconosciuto."
  agot_religion_flavor.0002.b:0 "Dovremmo fare di più; per i Sette, costruiamo persino un santuario!"
  agot_religion_flavor.0002.c:0 "I morti sono morti; non possiamo aiutarli oltre..."

agot_religion_flavor.0100.t: 0 "Il Giorno della Fanciulla"
agot_religion_flavor.0100.desc: 0 "Mentre inizio le mie occupazioni quotidiane, mi ritrovo distrattamente a cogliere conversazioni tutt'intorno a me. Dopo poco mi accorgo che a corte non si parla d'altro se non del Giorno della Fanciulla, e guarda caso è proprio oggi.\n\nTutte le fanciulle nubili sono tenute a recarsi in pellegrinaggio al tempio vicino per accendere candele ai piedi della statua della Fanciulla e appendere ghirlande di pergamena attorno al suo collo.\n\nBenché l'importanza di questa giornata mi fosse quasi sfuggita, devo comunque decidere come prepararmi agli eventi del giorno..."
agot_religion_flavor.0100.a: 0 "Forse donerò un po' d'oro."
agot_religion_flavor.0100.b: 0 "Dovrei offrirmi di aiutare al Tempio."
agot_religion_flavor.0100.c: 0 "Sono fin troppo occupat[Select_CString(ROOT.Char.IsFemale,'a','o')] per prendere parte a qualunque evento quest'anno..."
agot_religion_flavor.0100.d: 0 "[maiden_daughter.GetName], [Select_CString(maiden_daughter.IsFemale,'la mia giovane','il mio giovane')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('maiden_daughter'))], dovrebbe senz'altro partecipare."
agot_religion_flavor.0100.e: 0 "[maiden_daughter.GetName], [Select_CString(maiden_daughter.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('maiden_daughter'))], dovrebbe senz'altro partecipare."
agot_religion_flavor.0100.f: 0 "Farò io stessa il pellegrinaggio e parteciperò."
agot_religion_flavor.0100.g: 0 "Dovrei partecipare... ma non ne ho il tempo."
agot_religion_flavor.0100.g.tt: 0 "Cerchi di sottrarti ai tuoi doveri, ma #bold qualcuno#! potrebbe stare osservando."
agot_religion_flavor.0100.h: 0 "Forse andrò a crogiolarmi nei canti della giornata."
agot_listened_to_songs: 0 "Hai trascorso la giornata ascoltando i canti."

agot_religion_flavor.0101.t: 0 "Arrivo al Tempio"
agot_religion_flavor.0101.desc: 0 "Le scale davanti a me sembrano elevarsi fin nei cieli stessi. In cima si ergono le mura di marmo e il tetto dorato a cupola del Tempio, un faro che invita tutti i fedeli a entrare entro le sue mura in cerca di salvezza. Attorno a me vi sono altre fanciulle del regno, venute a celebrare questo giorno santo al mio fianco.\n\nMentre salgo i gradini, mi preparo alla giornata di preghiera e canto che mi attende, mentre celebriamo tutte insieme la nostra innocenza..."
agot_religion_flavor.0101.a: 0 "È tempo di cantare, danzare e pregare"

agot_religion_flavor.0102.t: 0 "Accendere le Sette Candele"
agot_religion_flavor.0102.desc: 0 "Mi avvicino alla statua della Fanciulla, con in mano un sottile legnetto per accendere le sette candele e una ghirlanda di pergamena che mi pende dal polso. Mi accosto lentamente ai piedi della statua e depongo la ghirlanda attorno al suo collo. Va a posarsi sopra le ghirlande che le altre fanciulle hanno già collocato.\n\nInginocchiandomi davanti alla statua, avvicino la punta dell'esca alla fiamma di un'altra candela finché non accendo la mia. Con mano ferma, accendo davanti a me le sette candele esattamente nel modo che mi è stato insegnato dalla Septa. Quando tutte e sette ardono, unisco le mani e mi preparo a pregare..."
agot_religion_flavor.0102.a: 0 "Prega i Sette che sono Uno"

agot_religion_flavor.0103.t: 0 "La Septa Vede Tutto"
agot_religion_flavor.0103.desc: 0 "Il solo pensiero di partecipare ai festeggiamenti del Giorno della Fanciulla mi annoia; ho così tante altre cose da fare, ben più importanti. E se decidessi di occuparmi di quelle, invece di prendere parte a queste frivole attività che servono solo a sprecare il mio prezioso tempo? Di certo, nessuno sentirà la mia mancanza.\n\nMentre passeggio nei miei giardini, odo un lieve schiarirsi di gola alle mie spalle. Mi volto e vedo [maiden_day_septa.GetName] in piedi dietro di me, con un sorriso dipinto sul volto che nasconde a stento l'irritazione.\n\n"Figlia mia, perché non ti stai preparando per i festeggiamenti del Giorno della Fanciulla? Dovresti davvero andare, non vorrai mica arrivare in ritardo, vero?""
agot_religion_flavor.0103.a: 0 "Quanto siete audace nel presumere di dirmi dove dovrei trovarmi."
agot_religion_flavor.0103.b: 0 "Perché dovrei andarci? Non sono più una fanciulla."
agot_religion_flavor.0103.b.tt: 0 "Una simile affermazione potrebbe non restare priva di conseguenze..."
agot_religion_flavor.0103.b.toast: 0 "[maiden_day_septa.GetName] ti ha denunziat[Select_CString(maiden_day_septa.IsFemale,'a','o')] al regno come fornicatrice."
agot_religion_flavor.0103.c: 0 "Va bene, parteciperò ai festeggiamenti."

agot_religion_flavor.0105.t: 0 "Ribelle... come Sempre"
agot_religion_flavor.0105.desc: 0 "Il Giorno della Fanciulla è giunto. Mi reco nelle stanze di [maiden_daughter.GetFirstNamePossessive], solo per vedere che non ha fatto alcun preparativo per uscire.\n\n"Perché non sei pronta? Dobbiamo andare presto al Tempio."\n\n"Ho doveri ben più alti che farmi fare la predica da una vecchia megera di Septa sulla mia fanciullezza", dichiara con tono infastidito.\n\nMi chiedo, non per la prima volta, perché con [Select_CString(maiden_daughter.IsFemale,'lei','lui')] debba essere sempre tutto così difficile, qualunque cosa sia stata..."
agot_religion_flavor.0105.a: 0 "Tesoro mio, ti prego, vai. Sai bene quanto sia imprudente sfidare le Septe."
agot_religion_flavor.0105.a.tt: 0 "Cerchi di ragionare con [maiden_daughter.GetName]"
agot_religion_flavor.0105.b: 0 "Come servitori della Fede, è nostro dovere partecipare."
agot_religion_flavor.0105.c: 0 "Come osa questa figlia insolente disubbidirmi!"
agot_religion_flavor.0105.c.tt: 0 "Impartisci una lezione a [maiden_daughter.GetFirstNameNoTooltip] schiaffeggiando[Select_CString(maiden_daughter.IsFemale,'la','lo')] sul viso"
msg_went_to_celebrations: 0 "[Select_CString(maiden_daughter.IsFemale,'Lei','Lui')] cede e partecipa alla festa."

agot_religion_flavor.0106.t: 0 "Una Figlia della Fede"
agot_religion_flavor.0106.desc: 0 "Il Giorno della Fanciulla è giunto ancora una volta. Mi reco nelle stanze di [maiden_daughter.GetNamePossessive] per controllare a che punto sia con i preparativi, apro appena la porta per sbirciare dentro, aspettandomi di trovare [Select_CString(maiden_daughter.IsFemale,'lei','lui')] ancora profondamente addormentat[Select_CString(maiden_daughter.IsFemale,'a','o')]... e invece vedo che i suoi capelli sono già raccolti in un'elaborata treccia e che è intent[Select_CString(maiden_daughter.IsFemale,'a','o')] a indossare il suo abito!\n\nRichiudo silenziosamente la porta della stanza, con il cuore colmo d'orgoglio. Torno nell'atrio ad attendere e, quando ha finito di prepararsi, viene a cercarmi; mi abbraccia prima di partire per il Tempio."
agot_religion_flavor.0106.a: 0 "Sono così fier[Select_CString(ROOT.Char.IsFemale,'a','o')] di aver cresciuto una figlia tanto responsabile."

agot_religion_flavor.0108.t: 0 "Un Capriccio Memorabile"
agot_religion_flavor.0108.desc: 0 "Con uno sbuffo, [ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)] si lascia cadere sul letto, incrociando le braccia sul petto.\n\n"Parlavo sul serio! Non andrò a qualche festa soffocante e antiquata!" dichiara con aria di sfida. "Chi vorrebbe passare l'intera giornata a cantare canzoni e intrecciarsi i capelli a vicenda?! È noioso e una perdita di tempo senza senso!""
agot_religion_flavor.0108.a: 0 "Darò a #bold entrambe#! un po' di spazio per calmarsi."
agot_religion_flavor.0108.a.tt: 0 "Frustrat[Select_CString(ROOT.Char.IsFemale,'a','o')], lasci [maiden_daughter.GetName] sola con sé stess[Select_CString(maiden_daughter.IsFemale,'a','o')]"

agot_religion_flavor.0109.t: 0 "Non Più una Fanciulla"
agot_religion_flavor.0109.desc: 0 "[ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)|U] sembra nervosa mentre mi parla. "Posso dirvi la verità, [maiden_daughter.Custom2('spoken_address_by_familiarity', ROOT.Char )]?"\n\nAnnuisco con nervosismo, sentendo crescere l'apprensione dentro di me prima che continui.\n\n"Non ho più la mia verginità..." sussurra [maiden_daughter.GetNameNoTooltip]."
agot_religion_flavor.0109.a: 0 "..."
agot_religion_flavor.0109.a.tt: 0 "Sconvolt[Select_CString(ROOT.Char.IsFemale,'a','o')] e addolorat[Select_CString(ROOT.Char.IsFemale,'a','o')], lasci le stanze di [maiden_daughter.GetName] senza sapere cosa fare o dire."
agot_religion_flavor.0109.b: 0 "Hai perduto la tua verginità pur essendo ancora #bold nubile#!?!"

agot_religion_flavor.0110.t: 0 "Un Piccolo Aiuto Prima dell'Evento"
agot_religion_flavor.0110.desc: 0 "Il Giorno della Fanciulla è giunto ancora una volta. Mi reco nelle stanze di [maiden_daughter.GetNamePossessive] per controllare i suoi preparativi. Apro lentamente la porta per sbirciare dentro, e vedo che è già vestita, ma fatica a intrecciarsi i capelli da sola. Apro del tutto la porta ed entro.\n\nSubito si accorge di me e chiede: "[maiden_daughter.Custom2('spoken_address_by_familiarity', ROOT.Char )|U], potreste intrecciarmi i capelli?" Sorrido e annuisco. Prendo la sua spazzola e sciolgo con dolcezza ogni nodo prima di raccogliere i suoi capelli in una splendida acconciatura intrecciata..."
agot_religion_flavor.0110.a: 0 "Che meravigliosa occasione per rafforzare il nostro legame!"
agot_religion_flavor.0110.a.tt: 0 "[maiden_daughter.GetName] parteciperà alla festa"

agot_religion_flavor.0111.t: 0 "Una Passeggiata Mattutina verso il Tempio"
agot_religion_flavor.0111.desc: 0 "Con il Giorno della Fanciulla ormai giunto, tutte le fanciulle del regno sono tenute a partecipare ai festeggiamenti al Tempio. [ROOT.Char.Custom2('direct_address_by_familiarity', maiden_daughter)|U] è troppo giovane per andarvi da sol[Select_CString(maiden_daughter.IsFemale,'a','o')], dunque dovrò accompagnar[Select_CString(maiden_daughter.IsFemale,'la','lo')]. Quando indossa il suo abito confezionato appositamente per la giornata ed è pronta, tende la sua piccola mano, attendendo pazientemente che io la prenda.\n\nSorride dolcemente mentre stringo la sua mano nella mia e ci mettiamo in cammino verso il Tempio. Passiamo tanto tempo a parlare e ridacchiare lungo la strada che mi accorgo che siamo già quasi arrivate in un batter d'occhio..."
agot_religion_flavor.0111.a: 0 "Spero che si goda i festeggiamenti..."

agot_religion_flavor.0112.t: 0 "La Musa"
agot_religion_flavor.0112.desc: 0 "Mentre ascolto i canti della festa, i miei occhi continuano a posarsi su una particolare fanciulla. Osservando [maiden_day_muse.GetHerHim] cantare e danzare, mi ritrovo a cercare il modo di avvicinarmi a [maiden_day_muse.GetHerHim]...\n\nRiesco ad accostarmi abbastanza da udire la sua dolce voce, e la sua bellezza non fa che accrescere il fascino dei canti. Quando finisce di cantare, attacco discorso con [maiden_day_muse.GetHerHim]. Non ho dubbio che [maiden_day_muse.GetFirstNameNicknamed] sia stat[Select_CString(maiden_day_muse.IsFemale,'a','o')] inviat[Select_CString(maiden_day_muse.IsFemale,'a','o')] dagli dèi, ma vi è forse qualcosa di più?"
agot_religion_flavor.0112.a: 0 "Gli dèi ci benedicono con la sua voce..."
agot_religion_flavor.0112.a.tt: 0 "Trascorri la giornata ascoltando i canti di [maiden_day_muse.GetHerHim]"
agot_religion_flavor.0112.b: 0 "Forse dovremmo trovare un luogo dove poter stare da soli?"
agot_religion_flavor.0112.b.tt: 0 "Cerchi di corteggiare la bella fanciulla"
msg_got_rejected_by_muse: 0 "[maiden_day_muse.GetFirstNameNoTooltip] respinge le tue avances e torna ai festeggiamenti."

agot_religion_flavor.0113.t: 0 "Amore nell'Aria"
agot_religion_flavor.0113.desc: 0 "Ben presto mi ritrovo sol[Select_CString(ROOT.Char.IsFemale,'a','o')] con [maiden_day_muse.GetName], lontano da sguardi indiscreti. L'aria tra noi è carica, e ogni sguardo e ogni gesto ci avvicinano sempre di più, finché persino il silenzio si fa greve di intenzioni non dette.\n\nNon passa molto prima che ogni freno ceda del tutto, e ci perdiamo nell'istante, mentre il mondo oltre noi svanisce nel nulla e ci abbandoniamo a ciò che cresceva tra noi."
agot_religion_flavor.0113.a: 0 "Forse questo è un segno degli dèi che dovrei sposar[Select_CString(maiden_day_muse.IsFemale,'la','lo')]."
agot_religion_flavor.0113.b: 0 "Questa non può essere l'ultima volta che vedo [maiden_day_muse.GetHerHim]."
agot_religion_flavor.0113.c: 0 "È stato solo un momento fugace. Nulla di più."
