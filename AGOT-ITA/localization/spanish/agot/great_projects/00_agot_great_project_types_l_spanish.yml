l_spanish:

 ### Great Fleet ###
great_project_type_construct_great_fleet_01: "Costruire una Grande Flotta"
great_project_type_construct_great_fleet_01_desc: "Le coste del mio [domain|E] devono essere protette, e quale modo migliore per garantire sicurezza e proiettare potere sui mari se non costruendo una grande flotta?"
great_project_type_construct_great_fleet_01_coastal_barony: "Deve essere una baronia costiera"

great_project_type_construct_great_fleet_02: "Espandere la Grande Flotta"
great_project_type_construct_great_fleet_02_desc: "Dopo aver sviluppato una grande flotta per proteggere il [domain|E], ci siamo resi conto che la flotta ha ancora spazio per crescere. Quale modo migliore per proiettare la nostra ricchezza e il nostro potere se non espanderla ulteriormente?"
great_project_type_construct_great_fleet_02_coastal_county: "Deve essere una contea costiera e avere $building_agot_great_fleet_01$"

great_project_type_construct_great_fleet_03: "Istituire un Armamento della Flotta"
great_project_type_construct_great_fleet_03_desc: "Ora che la grande flotta è stata ampliata, essa si erge come un faro di sviluppo nel mio [domain|E]. Eppure, una simile prosperità deve essere protetta. Dobbiamo radunare un grande armamento per difendere adeguatamente le acque del mio reame!"
great_project_type_construct_great_fleet_03_coastal_county: "Deve essere una contea costiera e avere $building_agot_great_fleet_02$"

great_project_type_construct_great_fleet_01_contribution_materials: "Materiali"
great_project_type_construct_great_fleet_01_contribution_materials_desc: "Nulla può essere costruito dal nulla. Forniremo al [great_project|E] tutti i materiali necessari per completare i lavori sulla flotta."

great_project_type_construct_great_fleet_01_contribution_workforce: "Manodopera"
great_project_type_construct_great_fleet_01_contribution_workforce_desc: "Le navi non si costruiscono da sole! Forniremo al [great_project|E] la manodopera necessaria a completare questa grande impresa."

great_project_type_construct_great_fleet_01_contribution_engineers: "Ingegneri Navali"
great_project_type_construct_great_fleet_01_contribution_engineers_desc: "Maestri d'ascia e ingegneri navali esperti presteranno la loro competenza al [great_project|E], migliorando lo sforzo di costruzione della flotta."

great_project_type_construct_great_fleet_01_contribution_military_wharf: "Molo Militare"
great_project_type_construct_great_fleet_01_contribution_military_wharf_desc: "Aggiungere un porto dedicato e un bacino di carenaggio al [great_project|E] aumenterà la resistenza e la longevità della flotta."

great_project_type_construct_great_fleet_01_contribution_merchant_quays: "Banchine Mercantili"
great_project_type_construct_great_fleet_01_contribution_merchant_quays_desc: "Aggiungere banchine mercantili dedicate al [great_project|E] aumenterà il commercio e le entrate che scorrono attraverso il porto della flotta."

