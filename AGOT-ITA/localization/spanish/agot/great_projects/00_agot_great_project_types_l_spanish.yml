building_type_agot_great_fleet_01: "Porto della Flotta"
building_type_agot_great_fleet_01_desc: "Questo porto mantiene una grande flotta, proiettando potenza navale sui mari e sulle coste vicine."

building_agot_great_fleet_01: "Porto della Flotta"
building_agot_great_fleet_01_desc: "Questo porto mantiene una grande flotta, proiettando potenza navale sui mari e sulle coste vicine. Una simile costruzione può essere realizzata solo tramite un [great_project|E]."

building_agot_great_fleet_02: "Porto della Flotta Esteso"
building_agot_great_fleet_02_desc: "Questo porto è stato ampliato per sostenere una flotta ben più vasta, estendendo la sua portata e proiettando sia potenza navale sia crescente ricchezza sui mari e sulle coste vicine. Una simile costruzione può essere realizzata solo tramite un [great_project|E]."

building_agot_great_fleet_03: "Armamento Formidabile"
building_agot_great_fleet_03_desc: "Questo porto ora ospita una flotta immensa, trasformandosi in uno strumento decisivo di guerra e commercio che domina i mari e le coste vicine. Si erge come una formidabile forza militare, capace di schiacciare le flotte nemiche e imporre la propria volontà sulle onde. Una simile costruzione può essere realizzata solo tramite un [great_project|E]."
