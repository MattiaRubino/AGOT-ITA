l_spanish:
 AGOT_VERSION_BUILD:0 "\nAGOT Build(MTA): #color_yellow;bold $AGOT_BUILD$#!\nAGOT Version: #color_yellow;bold $AGOT_VERSION$#!"
 AGOT_BUILD:0 "Release Build(MTA)"
AGOT_VERSION: 0 "Open Beta 0.4.37"
AGOT_REQUIRED_VERSION:0 "Scribe (1.19.0.6)"
 VERSION_MISMATCH_DESCRIPTION:0 "Dear #clickable [SelectLocalization(Or(Not(StatusIsLoggedIn), StatusIsUserNameEmpty), 'NULL_USERNAME', 'FULL_USERNAME')]#!,\n\nYour version of CK3 is #negative_value [GetGameVersionInfoShort]#! while CK3AGOT requires #positive_value $AGOT_REQUIRED_VERSION$#!. If you choose to continue from here, this can result in your previous saves breaking or new saves behaving unexpectedly.\n\nClicking #high Confirm#! means that you understand this warning and won't attempt to report any bugs that result from this.\n\nOtherwise, we suggest exiting the game in order to get back to version #positive_value $AGOT_REQUIRED_VERSION$#!."
 VERSION_MISMATCH_CONFIRM:0 "Conferma"
