l_spanish:

agot_build_great_fleet_merchant_quays_modifier: "Banchine Mercantili"
agot_build_great_fleet_merchant_quays_modifier_desc: "Il porto d'origine della flotta ha visto l'aggiunta di banchine dedicate all'attracco di mercanti e navi commerciali, aumentando il commercio in questa contea."
agot_build_great_fleet_military_wharf_modifier: "Molo Militare"
agot_build_great_fleet_military_wharf_modifier_desc: "I moli di questa contea sono attrezzati con grandi banchine adatte alla costruzione e alla riparazione di navi da guerra di ogni dimensione."
agot_build_great_fleet_engineers_modifier: "Ingegneri Navali"
agot_build_great_fleet_engineers_modifier_desc: "I moli di questa contea sono presidiati da abili ingegneri navali, capaci non solo di costruire nuove imbarcazioni ma anche di mantenere le infrastrutture necessarie a sostenere una grande flotta per decenni."

