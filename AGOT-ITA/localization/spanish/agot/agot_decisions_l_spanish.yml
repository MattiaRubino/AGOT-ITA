 #Brightroar
  recover_brightroar_decision:0 "Recupera Ruggibrillante"
  recover_brightroar_decision_desc:0 "Finanzierò un coraggioso esploratore affinché si avventuri tra le rovine insidiose della Vecchia Valyria alla ricerca di Ruggibrillante, la spada ancestrale della Casa Lannister."
  recover_brightroar_decision_tooltip:0 "Organizza una spedizione per recuperare Ruggibrillante"
  recover_brightroar_decision_confirm:0 "Prepara una nave"

 #Longthorn
decision_reforge_longthorn:0 "Restaura Longthorn"
decision_reforge_longthorn_desc:0 "La lama di Longthorn sopravvive, poiché l'acciaio di Valyria resiste persino al fuoco di drago. Eppure la nostra casata giurò solennemente che non sarebbe stata riforgiata finché Alto Giardino non fosse stato riconquistato e Casa Gardener restituita alla gloria."
decision_reforge_longthorn_tooltip:0 "Farai riforgiare la tua lama ancestrale, Longthorn, in una spada utilizzabile"
decision_reforge_longthorn_confirm:0 "Chiamate i fabbri!"

 #Retrieve Hidden Artifact
  retrieve_hidden_artifact_decision:0 "Recupera l'artefatto nascosto"
  retrieve_hidden_artifact_decision_desc:0 "All'oscuro del mondo, posseggo [ROOT.Char.Custom('HiddenArtifact')]. Non vedo più ragione di tenerlo segreto. È giunto il momento di rivelarlo."
  retrieve_hidden_artifact_decision_tooltip:0 "Recupera un artefatto attualmente nascosto"
  retrieve_hidden_artifact_decision_confirm:0 "Si sappia!"

 #Retrieve Stored Artifacts
  retrieve_stored_artifacts_decision:0 "Recupera gli artefatti custoditi"
  retrieve_stored_artifacts_decision_desc:0 "Molte reliquie della Casa Targaryen giacciono dimenticate nelle segrete sotto la Fortezza Rossa. Corone e antichi teschi di drago raccolgono polvere in silenzio. È tempo di farle riaffiorare e restituirle al loro legittimo posto nella storia."
  retrieve_stored_artifacts_decision_tooltip:0 "Recupera gli artefatti Targaryen custoditi sotto la Fortezza Rossa"
retrieve_stored_artifacts_decision_confirm:0 "Manda i servitori sotto"

