agot_abdicate.1.a:0 "Sono riconoscente."

agot_minor_decisions_events.0005.t:0 "Lasciarsi andare"
agot_minor_decisions_events.0005.desc:0 "#italic [ROOT.Char.GetFullNameNicknamedNoTooltip] è sprofondat[Select_CString(ROOT.Char.IsFemale,'a','o')] completamente nella follia...#!\n\nPosso udire i sussurri in tutta la corte. I miei cortigiani mi considerano una seccatura, nel comportamento se non nell'aspetto. Se mi considerano tale, forse dovrei smettere di mantenere le apparenze."
agot_minor_decisions_events.0005.a:0 "Vattene, barbiere!"

recruit_forder_specialist_decision:0 "Recluta uno specialista dei guadi"
recruit_forder_specialist_decision_desc:0 "Recluta un comandante che non solo sappia attraversare efficacemente i fiumi, ma sia anche un abile combattente nel farlo."
recruit_forder_specialist_decision_tooltip:0 "Un comandante con il tratto Forder si unirà alla tua corte."
recruit_forder_specialist_decision_confirm:0 "Spero di trovarne uno"

agot_commission_special_artifact_decision:0 "Commissiona un manufatto speciale"
agot_commission_special_artifact_decision_tooltip:0 "Commissiona al fabbro di corte la creazione di un nuovo manufatto speciale"
agot_commission_special_artifact_decision_effects_tooltip:0 "Commissionerai un nuovo manufatto speciale."
agot_commission_special_artifact_decision_desc:0 "Un sovrano è giudicato tanto da ciò che porta quanto da ciò che compie. Corona o armatura, un simile pezzo funge da simbolo e da dichiarazione. Farò creare un nuovo manufatto, degno del mio rango."
agot_commission_special_artifact_decision_confirm:0 "Convocate il fabbro!"
agot_commission_special_artifact_button:0 "Scegli manufatto"

agot_commission_special_artifact_crown_choice_loc:0 "Una corona per me"
agot_commission_special_artifact_crown_choice_tooltip:0 "Una corona ispirata ad aspetti di me stesso, della mia stirpe, della mia fede e dei miei titoli."
agot_commissioned_personal_crown_recently:0 "Non puoi commissionare un'altra corona per te stesso fino al [GetCurrentDateWithDiff( THIS.VarRemaining( 'agot_recently_commissioned_crown' ))]"

agot_commission_special_artifact_crown_spouse_choice_loc:0 "Una corona per il mio consorte"
agot_commission_special_artifact_crown_spouse_choice_tooltip:0 "Una corona ispirata alla stirpe, alla fede o ai titoli del mio consorte."
agot_commissioned_spouse_crown_recently:0 "Non puoi commissionare un'altra corona per [spouse_scope.GetName] fino al [GetCurrentDateWithDiff( GetVarTimeRemaining( spouse_scope.MakeScope, 'agot_recently_commissioned_crown') )]"

agot_commission_special_artifact_armor_choice_loc:0 "Un'armatura"
agot_commission_special_artifact_armor_choice_tooltip:0 "Un'armatura forgiata su misura, adattata a chi la indossa."
agot_commissioned_armor_recently:0 "Non puoi commissionare un'altra armatura fino al [GetCurrentDateWithDiff( THIS.VarRemaining( 'agot_recently_commissioned_armor' ))]"

disavow_incest_decision:0 "Rinnega l'incesto"
disavow_incest_decision_desc:0 "Per secoli, la stirpe dei Targaryen è stata mantenuta pura attraverso la pratica dell'incesto, con la Fede che ci concedeva una speciale esenzione sotto la dottrina dell'eccezionalismo. Ma ora è giunto il momento di riconsiderare questa tradizione. Vale la pena continuare ad aggrapparsi agli antichi costumi, o dovremmo cercare nuove alleanze e ampliare gli orizzonti della nostra casata?"
disavow_incest_decision_tooltip:0 "Proibisci la pratica del matrimonio tra fratelli nella tua casata."
disavow_incest_decision_confirm:0 "Romperemo con la tradizione"

reinstate_incest_decision:0 "Ripristina l'incesto"
reinstate_incest_decision_desc:0 "La nostra casata un tempo prosperava grazie alla purezza della sua stirpe, preservata attraverso la pratica dell'incesto. Sebbene avessimo superato questa tradizione, la dottrina dell'eccezionalismo della Fede resta ancora valida, concedendoci il diritto di mantenere quest'antico costume. Dovremmo abbracciare la nostra eredità e restaurare la tradizione che un tempo ci definiva?"
reinstate_incest_decision_tooltip:0 "Permetti la pratica del matrimonio tra fratelli nella tua casata."
reinstate_incest_decision_confirm:0 "Restaureremo gli antichi costumi"

agot_take_new_face_decision:0 "Assumi un nuovo volto"
agot_take_new_face_decision_desc:0 "Assumerò un nuovo volto al servizio del Dio dai Mille Volti."
agot_take_new_face_decision_tooltip:0 "Sceglierai un altro volto da un personaggio dello stesso sesso."
agot_take_new_face_decision_tt:0 "Assumere un nuovo volto sostituirà l'aspetto e l'età del tuo personaggio, ma manterrai il tuo personaggio attuale, le sue terre e i suoi titoli."
agot_take_new_face_multiple_player_warning_tt:0 "@warning_icon! Questa è una sessione multigiocatore, il trasferimento del giocatore al nuovo personaggio non è automatico."
agot_take_new_face_decision_confirm:0 "Mostrami la Sala dei Volti"
agot_has_taken_face_recently:0 "Hai indossato di recente un nuovo volto"

agot_faceless_new_adventure_decision:0 "Inizia un'avventura dal volto nuovo"
agot_faceless_new_adventure_decision_desc:0 "Abbandonerò le mie vecchie vie e tutti coloro che conosco, assumendo un nuovo volto, una nuova vita e un nuovo scopo al servizio del Dio dai Mille Volti."
agot_faceless_new_adventure_decision_tooltip:0 "Abbandonerai il tuo personaggio attuale per iniziare una nuova avventura con un nuovo volto."
agot_faceless_new_adventure_decision_tt:0 "Dopo aver assunto un nuovo volto:\n$EFFECT_LIST_BULLET$Abbandonerai il tuo personaggio attuale e passerai a uno nuovo. Solo il tuo [gold|E], i [artifacts|E] non di corte, i [traits|E] e la [faith|E] saranno mantenuti. Il resto sarà determinato dal volto che sceglierai.\n$EFFECT_LIST_BULLET$ Inizierai a giocare come personaggio senza terre di una nuova casata."
agot_faceless_new_adventure_decision_confirm:0 "Una nuova vita attende"

agot_visit_house_of_baw:0 "Visita la Casa del Bianco e del Nero"
agot_visit_house_of_baw_decision_effect:0 "@warning_icon! Il Dio dai Mille Volti porterà via la tua sofferenza. [Glossary( 'Valar dohaeris.', 'VALAR_DOHAERIS_GLOSS' )]."
agot_valar_morghulis:0 "Valar Morghulis"
commit_suicide_decision_confirm_base:0 "Il mio tempo è giunto"
