 #Dawn
  claim_dawn_unworthy_decision:0 "Rivendica Alba"
  claim_dawn_unworthy_decision_desc:0 "La spada è mia di diritto, 'degno' o no, la rivendico come mia."
  claim_dawn_unworthy_decision_tooltip:0 "Rivendica la leggendaria spada Alba come tua"
  claim_dawn_unworthy_decision_confirm:0 "Rivendica"
