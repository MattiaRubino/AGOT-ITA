  trait_will_not_wed:0 "Rifiuta di sposarsi"
  trait_will_not_wed_desc:0 "Pur non essendo altrimenti impedito a contrarre matrimonio, questo personaggio sceglie di non sposarsi — almeno per il momento."
  trait_will_not_wed_character_desc:0 "Pur non essendo altrimenti impedito a contrarre matrimonio, [ROOT.GetCharacter.GetFirstNameNoTooltip] sceglie di non sposarsi — almeno per il momento.\n\n#help Ciò può essere imposto dal signore di [ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip] tramite l'interazione col personaggio «Insisti sul Matrimonio», anche se [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] non ne sarà affatto liet[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. #!"
  trait_seclusion:0 "In clausura"
  trait_seclusion_desc:0 "Questo personaggio è attualmente in totale clausura e non vede nessuno se non i propri servitori personali. È malato? Nessuno sembra saperlo."
  trait_maiden:0 "Fanciulla"
  trait_maiden_desc:0 "Questa giovane donna proviene da una casata nobiliare minore ed è stata inviata a corte nella speranza di trovare marito. Se non ne troverà uno, alla fine farà ritorno a casa."
  trait_broke_vows:0 "Voti infranti"
  trait_broke_vows_desc:0 "Questo personaggio ha infranto i propri voti, tornando a una vita non religiosa con una macchia che resterà con [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] per il resto dei suoi giorni."
  trait_heir_in_training:0 "Erede in addestramento"
  trait_heir_in_training_desc:0 "Questo personaggio sta attualmente ricevendo [lmf_heir_training|E] dal suo signore."
  trait_heir_in_training_noliege_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] ha ricevuto un po' di [lmf_heir_training|E], ma non è ancora completo.\n\n#X (Progresso verso l'ottenimento di [GetTrait('education_heir_training_1').GetName( GetNullCharacter )]: [Character.MakeScope.ScriptValue('heir_training_progress_value')|0]%) #!"
  trait_heir_in_training_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] sta ricevendo [lmf_heir_training|E] da [Select_CString(ROOT.GetCharacter.IsFemale,'la sua','il suo')] [ROOT.GetCharacter.Custom2('LMF_RelationToMeShort', ROOT.GetCharacter.GetLiege )], [ROOT.GetCharacter.GetLiege.Custom('IT_NAM_COL3')][ROOT.GetCharacter.GetLiege.GetTitledFirstName].\n\n#help (Progresso verso l'ottenimento di [GetTrait('education_heir_training_1').GetName( GetNullCharacter )]: [Character.MakeScope.ScriptValue('heir_training_progress_value')|0]%) #!"
  trait_education_heir_training:0 "Erede addestrato"
  trait_education_heir_training_1:0 "Erede preparato"
  trait_education_heir_training_1_desc:1 "Questo personaggio è stato addestrato nell'arte del governo ed è stato preparato a divenire un sovrano."
  trait_education_heir_training_1_character_desc:1 "[ROOT.GetCharacter.GetFirstNameNoTooltip] è stato addestrato nell'arte del governo ed è stato preparato a divenire un sovrano.[AddLocalizationIf( Not( ROOT.GetCharacter.IsRuler ), 'heir_training_progress_tt' )]"
  trait_education_heir_training_2:0 "Erede ben preparato"
  trait_education_heir_training_2_desc:1 "Questo personaggio ha ricevuto un addestramento significativo nell'arte del governo ed è stato preparato a divenire un sovrano."
  trait_education_heir_training_2_character_desc:2 "[ROOT.GetCharacter.GetFirstNameNoTooltip] ha ricevuto un addestramento significativo nell'arte del governo ed è stato preparato a divenire un sovrano.[AddLocalizationIf( Not( ROOT.GetCharacter.IsRuler ), 'heir_training_progress_tt' )]"
  trait_education_heir_training_3:0 "Erede molto preparato"
  trait_education_heir_training_3_desc:1 "Questo personaggio ha trascorso molto tempo a prepararsi al governo e all'arte dello statismo."
  trait_education_heir_training_3_character_desc:2 "[ROOT.GetCharacter.GetFirstNameNoTooltip] ha trascorso molto tempo a prepararsi al governo e all'arte dello statismo.[AddLocalizationIf( Not( ROOT.GetCharacter.IsRuler ), 'heir_training_progress_tt' )]"
  trait_education_heir_training_4:0 "Erede eccezionalmente preparato"
  trait_education_heir_training_4_desc:1 "Questo personaggio ha trascorso molti anni a corte preparandosi al governo e all'arte dello statismo, verosimilmente più di quanti ne passerà mai a regnare davvero."
  trait_education_heir_training_4_character_desc:1 "[ROOT.GetCharacter.GetFirstNameNoTooltip] ha trascorso molti anni a corte preparandosi al governo e all'arte dello statismo, verosimilmente più di quanti ne passerà mai a regnare davvero."
  heir_training_progress_tt:0 "\n\n#help (Progresso verso il livello successivo: [Character.MakeScope.ScriptValue('heir_training_progress_value')|0]%) #!"
  game_concept_lmf_heir_training:0 "Addestramento dell'Erede"
  game_concept_lmf_heir_training_desc:0 "A partire dai 12 anni, l'[player_heir|E] di un sovrano riceverà il [trait|E] [GetTrait('heir_in_training').GetName( GetNullCharacter )] e inizierà la propria educazione nell'arte del governo e dello statismo:\n\n$EFFECT_LIST_BULLET$Questo addestramento richiede che l'erede si trovi nella [court|E] del sovrano, e progredirà ogni anno fintanto che sia l'erede sia il suo [guardian|E] (o il suo [liege|E], una volta adulto) siano disponibili e in buona salute.\n\n$EFFECT_LIST_BULLET$La quantità di progresso dipenderà dal [learning|E] sia dell'erede sia del suo tutore/signore, dall'età dell'erede (l'addestramento rallenta col passare degli anni) e sarà modificata da vari fattori quali intelletto, diligenza e pazienza.\n\n$EFFECT_LIST_BULLET$Una volta che l'erede raggiunge [GetTrait('education_heir_training_1').GetName( GetNullCharacter )], è considerato «addestrato» e manterrà quel tratto anche dopo aver ricevuto un titolo. Se prosegue l'addestramento, il tratto potrà infine progredire fino a [GetTrait('education_heir_training_4').GetName( GetNullCharacter )].\n\n$EFFECT_LIST_BULLET$L'addestramento si interrompe nell'istante in cui l'erede non si trova più nella stessa corte del proprio signore, per esempio quando riceve un titolo."
  game_concept_lmf_lover_rating:0 "Valutazione dell'Amante"
  game_concept_lmf_lover_rating_desc:0 "Quando un personaggio diviene tuo [lover|E] o [soulmate|E], la vostra relazione riceve una valutazione che indica l'intensità dei sentimenti. Essa influenzerà fortemente il tipo di eventi legati agli amanti che riceverai.\n\nQuesta valutazione aumenterà e diminuirà col tempo, benché accrescerla richieda tempo e impegno.\n\nLe valutazioni, dalla più alta alla più bassa:\n\n$EFFECT_LIST_BULLET$#difficulty_hard Adorazione#!: valutazione iniziale per un'[soulmate|E]; a questo livello un [lover|E] potrebbe divenire [soulmate|E]\n$EFFECT_LIST_BULLET$#difficulty_hard Amore duraturo#!\n$EFFECT_LIST_BULLET$#difficulty_hard Amore#!: valutazione iniziale per un [lover|E]; a questo livello un'[soulmate|E] potrebbe ridursi a [lover|E]\n$EFFECT_LIST_BULLET$#difficulty_hard Affetto#!: un'[soulmate|E] tornerà certamente a [lover|E]\n$EFFECT_LIST_BULLET$#difficulty_hard Amore calante#!\n$EFFECT_LIST_BULLET$#difficulty_hard Amore perduto#!: a questa valutazione, la relazione terminerà sempre"
  game_concept_lmf_relatives_by_marriage:0 "Parenti acquisiti per matrimonio"
  game_concept_good_mother:0 "Suocera"
  game_concept_good_father:0 "Suocero"
  game_concept_good_sister:0 "Cognata"
  game_concept_good_brother:0 "Cognato"
  game_concept_good_son:0 "Genero"
  game_concept_good_daughter:0 "Nuora"
  game_concept_lmf_relatives_by_marriage_desc:0 "I parenti ottenuti tramite [marriage|E] sono di solito indicati con il prefisso «Good-» prima del grado di parentela.\n\nPer esempio, una #high Good-Mother#! e un #high Good-Father#! sono i genitori del tuo [spouse|E], mentre tu saresti per loro un #high Good-Son#! o una #high Good-Daughter#!."

  tutor_teach_languages:0 "Insegnamento diretto delle lingue"
  tutor_teach_languages_desc:0 "Questo personaggio ha il compito di decidere quali lingue verranno insegnate ai membri della tua famiglia, senza che tu debba intervenire direttamente."
  tutor_teach_languages_tt:0 "L'insegnamento delle lingue ai membri della tua famiglia a corte verrà gestito automaticamente.\n\nA livelli più alti di [aptitude|E], talvolta potrebbero essere introdotti cortigiani con lingue importanti che non hai presenti a corte."

  demand_inheritance_interaction:0 "Rivendica eredità"
  demand_inheritance_interaction_desc:0 "Pretendi che [recipient.GetShortUIName|U] ripristini il tuo diritto dinastico a ereditare."
  THEY_RECENTLY_RECEIVED_DEMAND:0 "[TARGET_CHARACTER.GetShortUINameNoTooltip] ha ricevuto di recente una rivendicazione d'eredità"
  confront_about_lover_interaction:0 "Confronta sull'amante"
  confront_about_lover_interaction_many_desc:0 "Confronta [recipient.GetShortUIName|U] riguardo ai suoi amanti."
  confront_about_lover_interaction_marry_desc:0 "Confronta [recipient.GetShortUIName|U] riguardo al suo amante, pretendendo che la relazione termini oppure che venga resa ufficiale."
  confront_about_lover_interaction_desc:0 "Confronta [recipient.GetShortUIName|U] riguardo al suo amante illecito."
  I_RECENTLY_MADE_LOVER_DEMAND:0 "[TARGET_CHARACTER.GetShortUINameNoTooltip] ha rifiutato di recente la richiesta di [CHARACTER.GetShortUINamePossessiveNoTooltip]"
  RECENTLY_RECEIVED_LOVER_DEMAND:0 "[TARGET_CHARACTER.GetShortUINameNoTooltip] ha ricevuto una richiesta nell'ultimo anno"
  confront_about_lover_multi_tt:0 "Confronterai il tuo [actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] riguardo a uno dei suoi amanti oppure esigerai che [Select_CString(recipient.IsFemale,'lei','lui')] tronchi ogni relazione con tutti loro."
  confront_about_lover_one_tt:0 "Affronterai la questione dell'amante del tuo [actor.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))]."
  ai_legitimize_bastard_interaction:1 "Legittima bastardo"
ASK_TO_ai_legitimize_bastard_interaction_liege: 0 "Vi chiedo umilmente di legittimare [Select_CString(secondary_recipient.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName]."
  introduce_to_marry_interaction:0 "Organizza presentazione"
  introduce_to_marry_interaction_none_desc:0 "Presenta un membro della tua famiglia a qualcuno che desidera incontrare, nella speranza di favorire un matrimonio d'amore."
  introduce_to_marry_interaction_recipient_desc:0 "Presenta [secondary_recipient.GetShortUINameNoTooltip] a un membro della tua corte o della tua famiglia, nella speranza di favorire un matrimonio d'amore. La lista includerà solo quei familiari che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] desidera incontrare."
  introduce_to_marry_interaction_desc:0 "Presenta [Select_CString( secondary_actor.IsLocalPlayer, 'te stesso', secondary_actor.GetShortUINameNoTooltip )] a un potenziale coniuge, nella speranza di favorire un matrimonio d'amore. La lista includerà solo quei potenziali coniugi che [Select_CString(secondary_actor.IsFemale,'lei','lui')] desidera incontrare."
  make_introduction_send:0 "Organizza presentazione"
  actor_secondary_introduce_to_marry_interaction:0 "Coniuge"
  begin_introduction_same_court.tt:0 "Poiché [secondary_recipient.GetShortUIName] fa parte della tua corte, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] incontrerà [secondary_actor.GetShortUIName] immediatamente"
  begin_introduction_invite_secrec.tt:0 "[Select_CString( secondary_recipient.IsLocalPlayer, 'Tu', secondary_recipient.GetTitledFirstNameNoTooltip )] viaggerai anzitutto verso la corte di [actor.GetShortUINamePossessiveNoTooltipNoFormat] per incontrare [Select_CString( secondary_actor.IsLocalPlayer, 'te', secondary_actor.GetTitledFirstNameNoTooltip )]"
  begin_introduction_invite_secrec.gui.tt:0 "[Select_CString( CharacterInteractionNotificationWindow.GetSender.MakeScope.Var('secrecip').Char.IsLocalPlayer, 'Tu', CharacterInteractionNotificationWindow.GetSender.MakeScope.Var('secrecip').Char.GetTitledFirstNameNoTooltip)] devi prima incontrare [CharacterInteractionNotificationWindow.GetSender.MakeScope.Var('secactor').Char.GetTitledFirstNameNoTooltip] presso la corte di [CharacterInteractionNotificationWindow.GetSender.GetTitledFirstNamePossessiveNoTooltip]"
  introduce_to_marry_interaction_ai:0 "Organizza presentazione"
  insist_on_marriage_interaction:0 "Insisti sul Matrimonio"
  insist_on_marriage_interaction_desc:0 "Imponi a [recipient.GetShortUINamePossessiveNoTooltipNoFormat] la tua volontà, scavalcando il desiderio di non sposarsi. [Select_CString(recipient.IsFemale,'Lei','Lui')|U] contrarrà matrimonio quando lo ritieni opportuno tu, non quando lo ritiene opportuno [Select_CString(recipient.IsFemale,'lei','lui')]."
  invite_to_visit_interaction:0 "Invita in visita"
  invite_to_visit_interaction_desc:0 "Invita [recipient.GetShortUINameNoTooltipNoFormat] a [travel|E] verso [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per trascorrere del tempo personale con te."
  invite_spouse_to_court_interaction:0 "Invita il coniuge a corte"

  action_invite_spouse_ruler:0 "Dovresti invitare il tuo [spouse|E] a farti visita"
  action_invite_spouse_ruler_label:0 "@lover_icon! Dovresti invitare il tuo [spouse|E] a farti visita"
  action_invite_spouse_ruler_desc:0 "Poiché tu e il tuo coniuge avete corti separate, dovete trovare il tempo per riunirvi se desiderate avere figli."
  action_invite_spouse_ruler_click:0 "#I Clicca per invitare il tuo [spouse|E]#!"

  INVITE_SOULMATE_TO_VISIT:0 "Mi manda in delirio il fatto che tu non sia qui con me ogni giorno a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Ti prego, vieni in visita. Ho bisogno di ricordare com'è sentirsi stretto fra le tue braccia, e perdere lo sguardo nei tuoi occhi."
  INVITE_LOVER_TO_VISIT:0 "È passato troppo tempo dall'ultima volta che ti ho veduto. Vieni a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ti supplico, così che io possa stringerti ancora una volta fra le mie braccia."
  INVITE_SPOUSE_TO_VISIT:0 "Ti porgo il mio invito: vieni a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], così che possiamo trascorrere del tempo insieme come marito e moglie e rafforzare i nostri vincoli coniugali."

  intro_marriage_notification_both_personal_matri:0 "A beneficio di entrambi i nostri regni, ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] affinché possiamo incontrarci e discutere la possibilità di un matrimonio matrilineare... qualora, al termine della tua visita, entrambi fossimo ancora d'accordo, s'intende."
  intro_marriage_notification_actor_personal_matri:0 "Con il tuo permesso, desidero incontrare [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [Select_CString(secondary_recipient.IsFemale,'la','il')] [secondary_recipient.Custom('ComplimentAdjective')] [secondary_recipient.GetShortUIName]. Invito [Select_CString(secondary_recipient.IsFemale,'lei','lui')] a farmi visita qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] e, al termine della [Select_CString(secondary_recipient.IsFemale,'sua','suo')] visita, se entrambi fossimo benevoli alla cosa, a discutere la possibilità di sposare [Select_CString(secondary_recipient.IsFemale,'lei','lui')] in linea matrilineare."
  intro_marriage_notification_recipient_personal_matri:0 "Ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [Select_CString(secondary_actor.IsFemale,'la','il')] [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.GetShortUIName], nell'interesse di un matrimonio matrilineare fra voi due... purché, al termine della visita, siate entrambi d'accordo, s'intende."
  intro_marriage_notification_matri:0 "Invito [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], a recarsi qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))] [secondary_actor.GetShortUIName]. Se si piaceranno, la mia proposta è di discutere la possibilità di un matrimonio matrilineare tra loro."
  intro_marriage_notification_both_personal:0 "A beneficio di entrambi i nostri regni, ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] affinché possiamo incontrarci e discutere la possibilità di matrimonio... qualora, al termine della tua visita, entrambi fossimo ancora d'accordo, s'intende."
  intro_marriage_notification_actor_personal:0 "Con il tuo permesso, desidero incontrare [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [Select_CString(secondary_recipient.IsFemale,'la','il')] [secondary_recipient.Custom('ComplimentAdjective')] [secondary_recipient.GetShortUIName]. Invito [Select_CString(secondary_recipient.IsFemale,'lei','lui')] a farmi visita qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] e, al termine della [Select_CString(secondary_recipient.IsFemale,'sua','suo')] visita, se entrambi fossimo benevoli alla cosa, a discutere la possibilità di sposare [Select_CString(secondary_recipient.IsFemale,'lei','lui')]."
  intro_marriage_notification_recipient_personal:0 "Ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [Select_CString(secondary_actor.IsFemale,'la','il')] [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.GetShortUIName]. Se, al termine della visita, sarete entrambi d'accordo, desidero discutere la possibilità di matrimonio."
  intro_marriage_notification:0 "Invito [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], a recarsi qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))] [secondary_actor.GetShortUIName]. Se si piaceranno, la mia proposta è di discutere la possibilità del loro matrimonio."
  intro_betrothal_notofication_both_personal_matri:0 "A beneficio di entrambi i nostri regni, ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] affinché possiamo incontrarci e discutere la possibilità di un fidanzamento matrilineare tra noi... qualora, al termine della tua visita, entrambi fossimo ancora d'accordo, s'intende."
  intro_betrothal_notification_actor_personal_matri:0 "Con il tuo permesso, desidero incontrare [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [Select_CString(secondary_recipient.IsFemale,'la','il')] [secondary_recipient.Custom('ComplimentAdjective')] [secondary_recipient.GetShortUIName]. Invito [Select_CString(secondary_recipient.IsFemale,'lei','lui')] a farmi visita qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] e, al termine della [Select_CString(secondary_recipient.IsFemale,'sua','suo')] visita, se entrambi fossimo benevoli alla cosa, a discutere la possibilità di un fidanzamento matrilineare tra noi."
  intro_betrothal_notification_recipient_personal_matri:0 "Ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [Select_CString(secondary_actor.IsFemale,'la','il')] [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.GetShortUIName], nell'interesse di un fidanzamento matrilineare fra voi due... purché, al termine della visita, siate entrambi d'accordo, s'intende."
  intro_betrothal_notification_matri:0 "Invito [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], a recarsi qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))] [secondary_actor.GetShortUIName]. Se si piaceranno, la mia proposta è di discutere la possibilità di un fidanzamento matrilineare tra loro."
  intro_betrothal_both_personal:0 "A beneficio di entrambi i nostri regni, ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] affinché possiamo incontrarci e discutere la possibilità di un fidanzamento tra noi... qualora, al termine della tua visita, entrambi fossimo ancora d'accordo, s'intende."
  intro_betrothal_notification_actor_personal:0 "Con il tuo permesso, desidero incontrare [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [Select_CString(secondary_recipient.IsFemale,'la','il')] [secondary_recipient.Custom('ComplimentAdjective')] [secondary_recipient.GetShortUIName]. Invito [Select_CString(secondary_recipient.IsFemale,'lei','lui')] a farmi visita qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] e, al termine della [Select_CString(secondary_recipient.IsFemale,'sua','suo')] visita, se entrambi fossimo benevoli alla cosa, a discutere la possibilità di un fidanzamento tra noi."
  intro_betrothal_notification_recipient_personal:0 "Ti invito a recarti a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))], [Select_CString(secondary_actor.IsFemale,'la','il')] [secondary_actor.Custom('ComplimentAdjective')] [secondary_actor.GetShortUIName], nell'interesse di un fidanzamento fra voi due... purché, al termine della visita, siate entrambi d'accordo, s'intende."
  intro_betrothal_notification:0 "Invito [Select_CString(secondary_recipient.IsFemale,'la tua','il tuo')] [recipient.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))], [secondary_recipient.GetShortUIName], a recarsi qui, a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], per incontrare [Select_CString(secondary_actor.IsFemale,'la mia','il mio')] [actor.Custom2('RelationToMe', SCOPE.sC('secondary_actor'))] [secondary_actor.GetShortUIName]. Se si piaceranno, la mia proposta è di discutere la possibilità di un fidanzamento tra loro."

  ai_ruler_marry_decision:0 "È tempo di nozze"
  ai_ruler_marry_decision_desc:0 "La nostra ricerca di un coniuge deve accelerare. Il momento è giunto."
  ai_ruler_marry_decision_effect_tooltip:0 "Inizierà la ricerca di un coniuge adatto"
  ai_ruler_marry_decision_confirm:0 "Inizia la ricerca"
  ai_ruler_reduce_stress_army_decision:0 "Riduci lo stress dell'esercito"
  ai_ruler_reduce_stress_army_decision_desc:0 "Questa decisione ridurrà lo stress tuo o di un membro della tua famiglia quando si trova nell'esercito ed è fortemente stressato"
  ai_ruler_reduce_stress_army_decision_effect_tooltip:0 "Chi ha lo stress più alto riceverà un evento"
  ai_ruler_reduce_stress_army_decision_confirm:0 "Procedi"

  game_rule_category_lmf:0 "@lmf_icon! Amore, Matrimonio, Famiglia"
  rule_lmf_scheming_courtiers:0 "@lmf_icon! Cortigiani intriganti"
  setting_lmf_scheming_courtiers_ai_frequent:0 "IA inclusa"
  setting_lmf_scheming_courtiers_ai_frequent_desc:0 "Anche le corti più ampie dell'IA si dedicheranno a complotti di fuga d'amore, seduzione e corteggiamento. #X Può gravare sulle prestazioni! #! "
  setting_lmf_scheming_courtiers_ai_infrequent:0 "IA inclusa - Raro"
  setting_lmf_scheming_courtiers_ai_infrequent_desc:0 "Anche le corti più ampie dell'IA si dedicheranno a complotti di fuga d'amore, seduzione e corteggiamento, ma verranno controllate molto meno spesso (per prestazioni)."
  setting_lmf_scheming_courtiers_player_realm_only:0 "Solo regno del giocatore"
  setting_lmf_scheming_courtiers_player_realm_only_desc:0 "I cortigiani nel regno del giocatore si dedicheranno a complotti di fuga d'amore, seduzione e corteggiamento."
  setting_lmf_scheming_courtiers_player_realm_infrequent:0 "Regno del giocatore - Raro"
  setting_lmf_scheming_courtiers_player_realm_infrequent_desc:0 "I cortigiani nel regno del giocatore si dedicheranno a complotti di fuga d'amore, seduzione e corteggiamento, ma il controllo verrà effettuato molto meno spesso (per prestazioni)."
  setting_lmf_scheming_courtiers_disabled:0 "Disattivato"
  setting_lmf_scheming_courtiers_disabled_desc:0 "I cortigiani non si dedicheranno a complotti di fuga d'amore, seduzione e corteggiamento, al di fuori degli eventi già esistenti."
  rule_lmf_courtier_marriage_proposals:0 "@lmf_icon! Matrimonio dei cortigiani"
  setting_lmf_courtier_marriage_ai_frequent:0 "IA inclusa"
  setting_lmf_courtier_marriage_ai_frequent_desc:0 "Anche i cortigiani nelle corti più ampie dell'IA proporranno matrimonio ad altri cortigiani di propria iniziativa. #X Può gravare sulle prestazioni! #! "
  setting_lmf_courtier_marriage_ai_infrequent:0 "IA inclusa - Raro"
  setting_lmf_courtier_marriage_ai_infrequent_desc:0 "Anche i cortigiani nelle corti più ampie dell'IA proporranno matrimonio ad altri cortigiani di propria iniziativa, ma verranno controllati molto meno spesso."
  setting_lmf_courtier_marriage_player_realm_only:0 "Solo regno del giocatore"
  setting_lmf_courtier_marriage_player_realm_only_desc:0 "I cortigiani nel regno del giocatore proporranno matrimonio ad altri cortigiani di propria iniziativa e chiederanno il permesso di sposarsi."
  setting_lmf_courtier_marriage_player_realm_infrequent:0 "Regno del giocatore - Raro"
  setting_lmf_courtier_marriage_player_realm_infrequent_desc:0 "I cortigiani nel regno del giocatore proporranno matrimonio ad altri cortigiani di propria iniziativa, ma il controllo verrà effettuato molto meno spesso (per prestazioni)."
  setting_lmf_courtier_marriage_disabled:0 "Disattivato"
  setting_lmf_courtier_marriage_disabled_desc:0 "I cortigiani non faranno proposte ad altri cortigiani, al di fuori degli eventi già esistenti."
  rule_lmf_introductions:0 "@lmf_icon! Presentazioni matrimoniali"
  setting_lmf_no_introductions:0 "Disattivato"
  setting_lmf_no_introductions_desc:0 "Il sistema di presentazioni matrimoniali è disattivato."
  setting_lmf_normal_introductions:0 "Consentito"
  setting_lmf_normal_introductions_desc:0 "Si possono organizzare presentazioni tra candidati al matrimonio, riunendoli affinché vedano se sarebbero disposti a fidanzarsi."
  rule_lmf_additional_maidens:0 "@lmf_icon! Damigelle aggiuntive"
  setting_lmf_yes_additional_maidens:0 "Completo"
  setting_lmf_yes_additional_maidens_desc:0 "Le damigelle vengono aggiunte all'inizio della partita e tramite decisione, usando nuove e tutte le dinastie già esistenti. #X Può causare voci scollegate nel tuo albero dinastico! #!"
  setting_lmf_non_dynasty_additional_maidens:0 "Non nella dinastia del giocatore"
  setting_lmf_non_dynasty_additional_maidens_desc:0 "Le damigelle vengono aggiunte all'inizio della partita e tramite decisione. Usano dinastie nuove ed esistenti, ma mai quella del giocatore."
  setting_lmf_restricted_additional_maidens:0 "Nessuna dinastia esistente"
  setting_lmf_restricted_additional_maidens_desc:0 "Le damigelle vengono aggiunte all'inizio della partita e tramite decisione. Usano solo dinastie nuove e quelle dei personaggi del bacino già esistente."
  setting_lmf_player_only_additional_maidens:0 "Solo giocatore"
  setting_lmf_player_only_additional_maidens_desc:0 "Le damigelle vengono aggiunte all'inizio della partita, ma in seguito solo tramite decisione, utilizzabile soltanto dal giocatore. Le nuove damigelle non useranno mai la dinastia del giocatore."
  setting_lmf_no_additional_maidens:0 "Disattivato"
  setting_lmf_no_additional_maidens_desc:0 "Le damigelle non verranno aggiunte all'inizio della partita (a condizione che questa regola sia impostata nella lobby iniziale) e non vi sarà alcuna decisione per aggiungerne altre."
  rule_lmf_disinheritance_change:0 "@lmf_icon! Diseredazione"
  setting_lmf_yes_disinheritance_change:0 "Modifica completa"
  setting_lmf_yes_disinheritance_change_desc:0 "Un personaggio diseredato ottiene pretese su qualunque titolo di cui fosse erede. Una volta adulto, potrebbe pretendere che la propria eredità venga ripristinata."
  setting_lmf_no_claim_disinheritance_change:0 "Modifica parziale"
  setting_lmf_no_claim_disinheritance_change_desc:0 "Un personaggio diseredato potrebbe comunque pretendere il ripristino della propria eredità, ma non riceve pretese immediate su alcun titolo."
  setting_lmf_no_disinheritance_change:0 "Nessuna modifica"
  setting_lmf_no_disinheritance_change_desc:0 "La diseredazione funziona esattamente come in CK3 vanilla."
  rule_lmf_family_feasts:0 "@lmf_icon! Banchetti di famiglia"
  setting_lmf_normal_family_feasts:0 "Normale"
  setting_lmf_normal_family_feasts_desc:0 "Il giocatore avrà un evento di banchetto familiare casuale in media ogni... anno, purché non sia impegnato in altro."
  setting_lmf_less_frequent_family_feasts:0 "Meno frequenti"
  setting_lmf_less_frequent_family_feasts_desc:0 "Il giocatore avrà un evento di banchetto familiare casuale con ... della regolarità normale, purché non sia impegnato in altro."
  setting_lmf_no_family_feasts:0 "Disattivato"
  setting_lmf_no_family_feasts_desc:0 "Gli eventi di banchetto familiare sono completamente disattivati."
  rule_lmf_heir_training:0 "@lmf_icon! Addestramento dell'erede"
  setting_lmf_more_frequent_heir_events:0 "Eventi più frequenti"
  setting_lmf_more_frequent_heir_events_desc:0 "Il tuo [player_heir|E] riceve addestramento come da 'Addestramento dell'erede normale', ma gli eventi casuali appariranno molto più spesso."
  setting_lmf_normal_heir_training:0 "Eventi normali"
  setting_lmf_normal_heir_training_desc:0 "Il tuo [player_heir|E] riceve addestramento, ottenendo tratti che si sviluppano nel tempo, e eventi casuali che compaiono dai 12 anni in su."
  setting_lmf_less_frequent_heir_events:0 "Eventi meno frequenti"
  setting_lmf_less_frequent_heir_events_desc:0 "Il tuo [player_heir|E] riceverà eventi e tratti di addestramento dell'erede come di norma, ma gli eventi casuali appariranno meno spesso."
  setting_lmf_no_heir_events:0 "Solo addestramento"
  setting_lmf_no_heir_events_desc:0 "Il tuo [player_heir|E] riceverà addestramento e i tratti associati, ma non riceverai eventi casuali per l'addestramento dell'erede."
  setting_lmf_no_heir_training:0 "Disattivato"
  setting_lmf_no_heir_training_desc:0 "Disattiva completamente il sistema di addestramento dell'erede. Non appariranno tratti e non vi saranno eventi casuali."
  rule_lmf_army_events:0 "@lmf_icon! Eventi dell'esercito"
  setting_lmf_player_only_army_events:0 "Solo giocatore"
  setting_lmf_player_only_army_events_desc:0 "Capitani e comandanti negli eserciti del giocatore riceveranno eventi dell'esercito mentre sono in campagna."
  setting_lmf_player_realm_army_events:0 "Solo regno del giocatore"
  setting_lmf_player_realm_army_events_desc:0 "Capitani e comandanti nel regno del giocatore (chiunque di rango ducale o superiore) riceveranno eventi dell'esercito mentre sono in campagna."
  setting_lmf_independent_ruler_army_events:0 "Solo sovrani di alto rango"
  setting_lmf_independent_ruler_army_events_desc:0 "Capitani e comandanti di qualunque sovrano di rango regale o superiore, e il giocatore, riceveranno eventi dell'esercito mentre sono in campagna. #X Può gravare sulle prestazioni! #!"
  setting_lmf_no_army_events:0 "Disattivato"
  setting_lmf_no_army_events_desc:0 "Nessuno riceverà eventi dell'esercito."
  rule_lmf_player_marriage_modifiers:0 "@lmf_icon! Modificatori di matrimonio del giocatore"
  setting_lmf_all_marriage_modifiers:0 "Tutti i modificatori"
  setting_lmf_all_marriage_modifiers_desc:0 "Il giocatore sperimenta gli stessi bonus e restrizioni delle proposte di matrimonio dell'IA."
  setting_lmf_fewer_marriage_modifiers:0 "Meno modificatori"
  setting_lmf_fewer_marriage_modifiers_desc:0 "La maggior parte delle restrizioni aggiunte da LMF alle proposte di matrimonio, al di fuori di quelle che riguardano età e fertilità, non si applicherà alle proposte del giocatore."
  setting_lmf_easy_marriage_modifiers:0 "Matrimonio più facile"
  setting_lmf_easy_marriage_modifiers_desc:0 "In aggiunta agli effetti della regola 'Meno modificatori', tutte le proposte di matrimonio del giocatore riceveranno un +200 all'accettazione (equivalente a un forte ricatto)."
  rule_lmf_birth_fertility_modifiers:0 "@lmf_icon! Nascite e fertilità"
  setting_lmf_all_birth_fertility_modifiers:0 "Tutti i modificatori"
  setting_lmf_all_birth_fertility_modifiers_desc:0 "LMF aumenta le complicazioni del parto e aggiunge modificatori che possono ridurre la fertilità dopo la nascita di diversi figli."
  setting_lmf_all_birth_fertility_modifiers_ai_only:0 "Tutti i modificatori - Solo IA"
  setting_lmf_all_birth_fertility_modifiers_ai_only_desc:0 "I modificatori di LMF si applicano normalmente, ma i modificatori di fertilità che possono comparire dopo il parto non vengono mai applicati al giocatore o alla sua famiglia immediata."
  setting_lmf_reduce_birth_fertility_modifiers:0 "Meno modificatori"
  setting_lmf_reduce_birth_fertility_modifiers_desc:0 "La probabilità che i modificatori di fertilità si applichino dopo il parto sarà notevolmente ridotta."
  setting_lmf_reduce_birth_fertility_modifiers_ai_only:0 "Meno modificatori - Solo IA"
  setting_lmf_reduce_birth_fertility_modifiers_ai_only_desc:0 "La probabilità che i modificatori di fertilità si applichino dopo il parto è notevolmente ridotta ed è eliminata del tutto per il giocatore o la sua famiglia immediata."
  setting_lmf_no_birth_fertility_modifiers:0 "Nessun nuovo modificatore"
  setting_lmf_no_birth_fertility_modifiers_desc:0 "Qualunque cambiamento apportato da LMF a fertilità o complicazioni del parto verrà rimosso, sebbene l'aumento complessivo del numero di figli rimanga."
  rule_lmf_automatic_guardians:0 "@lmf_icon! Tutori automatici"
  setting_lmf_automatic_guardians_active:0 "Attivato"
  setting_lmf_automatic_guardians_active_desc:0 "I bambini che non sono parenti stretti dell'ospite della corte verranno assegnati al miglior tutore disponibile per il loro tipo d'educazione."
  setting_lmf_automatic_guardians_inactive:0 "Disattivato"
  setting_lmf_automatic_guardians_inactive_desc:0 "Nessun tutore verrà mai assegnato automaticamente."
  rule_lmf_lover_event_eligibility:0 "@lmf_icon! Idoneità agli eventi d'amante"
  setting_lmf_lover_event_eligibility_all:0 "Tutti"
  setting_lmf_lover_event_eligibility_all_desc:0 "Tutti i giocatori e i sovrani IA di rango ducale o superiore riceveranno eventi da amante/anima gemella. Tutti gli altri personaggi IA riceveranno versioni semplificate. #X Può gravare sulle prestazioni! #! "
  setting_lmf_lover_event_eligibility_tier:0 "Regno del giocatore + alto rango"
  setting_lmf_lover_event_eligibility_tier_desc:0 "Solo i giocatori e i sovrani IA di rango ducale o superiore riceveranno eventi da amante/anima gemella. Gli altri personaggi IA in un regno del giocatore riceveranno versioni semplificate. #X Può gravare sulle prestazioni! #! "
  setting_lmf_lover_event_eligibility_player_realm:0 "Solo regno del giocatore"
  setting_lmf_lover_event_eligibility_player_realm_desc:0 "Solo i giocatori e i sovrani IA nel loro regno di rango ducale o superiore riceveranno eventi da amante/anima gemella. Gli altri personaggi IA nel loro regno riceveranno versioni semplificate."
  setting_lmf_lover_event_eligibility_player_only:0 "Solo giocatore"
  setting_lmf_lover_event_eligibility_player_only_desc:0 "Solo i giocatori riceveranno mai eventi da amante/anima gemella."
  rule_lmf_lover_event_frequency:0 "@lmf_icon! Frequenza eventi d'amante"
  setting_lmf_lover_event_frequency_none:0 "Mai"
  setting_lmf_lover_event_frequency_none_desc:0 "Il sistema di eventi da amante/anima gemella verrà completamente disattivato e l'impostazione di Idoneità agli eventi d'amante verrà ignorata."
  setting_lmf_lover_event_frequency_less:0 "Meno frequenti"
  setting_lmf_lover_event_frequency_less_desc:0 "Gli eventi da amante/anima gemella si verificheranno meno spesso per tutti i personaggi idonei."
  setting_lmf_lover_event_frequency_default:0 "Predefinita"
  setting_lmf_lover_event_frequency_default_desc:0 "Frequenza standard degli eventi da amante/anima gemella per tutti i personaggi idonei."
  setting_lmf_lover_event_frequency_more:0 "Più frequenti"
  setting_lmf_lover_event_frequency_more_desc:0 "Gli eventi da amante/anima gemella si verificheranno più spesso per tutti i personaggi idonei."
rule_lmf_spouse_event_frequency: 0 "@lmf_icon! Frequenza eventi del coniuge"
setting_lmf_spouse_event_frequency_none: 0 "Mai"
setting_lmf_spouse_event_frequency_none_desc: 0 "Il sistema di eventi per i coniugi primari sarà completamente disattivato."
setting_lmf_spouse_event_frequency_less: 0 "Meno frequenti"
setting_lmf_spouse_event_frequency_less_desc: 0 "Gli eventi per i coniugi primari si verificheranno meno spesso, in media circa ogni 5 anni."
setting_lmf_spouse_event_frequency_default: 0 "Predefinita"
setting_lmf_spouse_event_frequency_default_desc: 0 "Gli eventi per i coniugi primari si verificheranno normalmente, in media circa ogni 3 anni."
setting_lmf_spouse_event_frequency_more: 0 "Più frequenti"
setting_lmf_spouse_event_frequency_more_desc: 0 "Gli eventi per i coniugi primari si verificheranno più spesso, in media circa ogni 2 anni."
 
  agot_court_ongoing.court_start_song.intro.0503.relative.desc:0 "Ho trovato una classica ballata d'amore [target.GetCulture.GetNameNoTooltip] che si addice perfettamente a [target.GetFirstName]... La provo e riprovo — tutto dev'essere perfetto!\n\nTrovo il mio [owner.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))] che passeggia nei giardini di [target_location.GetNameNoTooltip], circondat[Select_CString(target.IsFemale,'a','o')] dai suoi amici. Con il cuore che batte come un martello, mi inginocchio davanti a [Select_CString(target.IsFemale,'lei','lui')] e canto."
  agot_court_ongoing.court_start_song.success.0503.relative.desc:0 "\n\nLe guance di [target.GetFirstNamePossessiveNoTooltip] si tingono d'un rosso melagrana profondo, ma [Select_CString(target.IsFemale,'lei','lui')] non mi interrompe. [Select_CString(target.IsFemale,'La sua','Il suo')] compagnia pare compiaciuta, o gelosa — certo un buon segno!\n\n"Hai una voce meravigliosa, [target.Custom2('LMF_RelationToMeShort', SCOPE.sC('owner'))]," dice [target.GetFirstNameNoTooltip] prima che [Select_CString(target.IsFemale,'lei','lui')] si affretti ad andar via. [Select_CString(target.IsFemale,'La sua','Il suo')] amicizia non tarda a seguir[Select_CString(target.IsFemale,'la','lo')]. Mi rialzo su gambe tremanti, osservandoli svanire tra le siepi, con il cuore che batte più forte che mai."
  agot_court_ongoing.court_start_sneaky_love_letter.success.spouse.0503.desc:0 "\n\nL'attesa è insopportabile. Il pensiero del rifiuto mi nausea lo stomaco! Quando arriva la risposta di [Select_CString(target.IsFemale,'lei','lui')], strappo il sigillo con mani tremanti.\n\n"Le tue parole sono graziose, [owner.Custom2('RelationToMeAddress', ROOT.Char)], e te ne sono grato. Forse i legami del nostro matrimonio diverranno legami d'amore, col tempo? Forse lo vedremo. Tuo nella fede, [target.GetFirstNameNoTooltip].""
  agot_court_ongoing.court_start_sneaky_love_letter.success.relative.0503.desc:0 "\n\nL'attesa è insopportabile. Il pensiero del rifiuto mi nausea lo stomaco! Quando arriva la risposta di [Select_CString(target.IsFemale,'lei','lui')], strappo il sigillo con mani tremanti.\n\n"Le tue parole mi hanno scioccat[Select_CString(target.IsFemale,'a','o')], [owner.Custom2('RelationToMeAddress', ROOT.Char)], ma ammetto che erano comunque graziose. Terrò la tua lettera nascosta in un luogo segreto, per rileggerla ogni volta che mi aggrada. Il tuo [owner.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))], [target.GetFirstNameNoTooltip].""
  agot_court_ongoing.public_regular_rejection.0503.desc:0 "La reazione di [target.GetFirstNamePossessiveNoTooltip] non è ciò che speravo. "Smettila con questa ridicola scena pubblica, [ROOT.Char.Custom2('RelationToMeAddress', target)], e non renderti ancor più ridicol[Select_CString(ROOT.Char.IsFemale,'a','o')]. Non ho alcun interesse per le tue attenzioni, né lo avrò mai!""
  agot_court_ongoing.written_regular_rejection.0503.desc:0 "\n\nLa risposta di [target.GetFirstNamePossessiveNoTooltip] è rapida e inequivocabile. "Ho ricevuto la tua nota, [ROOT.Char.Custom2('RelationToMeAddress', target)], ammesso che sia davvero tua e non un crudele scherzo architettato da qualche malvagio. Se sei stato tu, allora esigo che tu ponga fine a questa sciocca impresa immediatamente. Non ho alcun interesse romantico per te, né lo avrò mai.""

  agot_court_ongoing.1000.t:1 "$court_event_title$ La Danza Imbarazzante"
  agot_court_ongoing.1000.desc:0 "Mentre partecipo a una funzione sociale a [location.GetNameNoTooltip], nel tentativo di stare più vicino a [target.GetFirstNameNoTooltip], i musicisti attaccano un'allegra melodia e inizia una danza. I miei occhi cercano l'oggetto dei miei affetti, ma è troppo tardi... [Select_CString(target.IsFemale,'lei','lui')] sta già danzando con [social_bore.GetTitledFirstNameNoTooltip]. Non per scelta, a quanto pare, poiché non solo [Select_CString(target.IsFemale,'lei','lui')] non gradisce molto [social_bore.GetTitledFirstNameNoTooltip], ma [social_bore.Custom('polite_gender_ref')] danza in modo terribile e [target.GetFirstNameNoTooltip] è troppo educat[Select_CString(target.IsFemale,'a','o')] per sottrarsi, anche se [Select_CString(target.IsFemale,'lei','lui')] è chiaramente disperat[Select_CString(target.IsFemale,'a','o')].\n\n[target.GetFirstNameNoTooltip] mi guarda dall'altra parte della pista da ballo, implorandomi con [Select_CString(target.IsFemale,'i suoi','i suoi')] occhi di accorrere in [Select_CString(target.IsFemale,'suo','suo')] soccorso."
  agot_court_ongoing.1000.a:0 "Tentare di inserirsi con grazia."
  agot_court_ongoing.1000.a.success:0 "Riesci a inserirti e a danzare tu stesso con [target.GetFirstNameNoTooltip]"
  agot_court_ongoing.1000.a.failure:0 "[social_bore.GetTitledFirstNameNoTooltip] rifiuta e rende la situazione ancora più imbarazzante"
  agot_court_ongoing.1000.b:0 "Temo che [target.GetFirstNameNoTooltip] sia sol[Select_CString(target.IsFemale,'a','o')]."

  agot_court_ongoing.1300.t:0 "$court_event_title$ Gusti letterari"
  agot_court_ongoing.1300.desc:0 "Vado in cerca di [target.GetFirstNameNoTooltip] e, in un pomeriggio assolato, lo trovo a leggere nel cortile di [location.GetNameNoTooltip]. Quando mi avvicino, noto che il libro è un tomo ponderoso, e [target.GetFirstNameNoTooltip] non sembra affatto goderne. Vedendomi, [Select_CString(target.IsFemale,'lei','lui')] posa il libro e, a conferma dei miei sospetti, si mette a lamentarsene a lungo.\n\nCon un sopracciglio inarcato, [Select_CString(target.IsFemale,'lei','lui')] mi chiede se potrei raccomandare qualcosa di meglio. È tanto una richiesta quanto una sfida, e mi mette subito con le spalle al muro."
  agot_court_ongoing.1300.a:0 "Suggerisci qualcosa che pensi possa piacer[Select_CString(target.IsFemale,'le','gli')]."
  agot_court_ongoing.1300.a.success:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] gradisce il libro che hai raccomandato!"
  agot_court_ongoing.1300.a.failure:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] non è per nulla impressionat[Select_CString(target.IsFemale,'a','o')] dalla tua scelta"
  agot_court_ongoing.1300.b:0 "Accampa scuse e prova invece a far[Select_CString(target.IsFemale,'le','gli')] un complimento..."

  agot_court_ongoing.1310.t:0 "Allenamento di sparring"
  agot_court_ongoing.1310.opening.martial:0 "Mi sto allenando a sparring con i soldati nel cortile quando scorgo anche [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] che si allena non lontano. "
  agot_court_ongoing.1310.opening:0 "Sto attraversando il cortile quando scorgo [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] che si allena a sparring con i soldati non lontano. "
  agot_court_ongoing.1310.mid:09 "[Select_CString(target.IsFemale,'Lei','Lui')|U] incalza [Select_CString(target.IsFemale,'la sua','il suo')] avversari[Select_CString(target.IsFemale,'a','o')] con aggressività, il sudore che perla sulla fronte, e l'insieme è davvero notevole.\n\nNon posso che supporre che [Select_CString(target.IsFemale,'lei','lui')] non mi abbia ancora notato, ma non durerà a lungo. Forse è la mia occasione per avvicinar[Select_CString(target.IsFemale,'mi','lo')]. "
  agot_court_ongoing.1310.ending.martial:0 "Potremmo incrociare le spade: io potrei impressionar[Select_CString(target.IsFemale,'la','lo')] con la mia tecnica, legare nello spirito della cameratismo, magari persino lasciar[Select_CString(target.IsFemale,'le','gli')] mettere a segno qualche buon colpo..."
  agot_court_ongoing.1310.ending.spectator:0 "Di norma non sono tipo da schermaglie, ma potrei incitar[Select_CString(target.IsFemale,'la','lo')]. E forse, quando lo sparring sarà finito, ci sarà perfino l'occasione di unirsi a [Select_CString(target.IsFemale,'lei','lui')] e ai soldati per qualche bevuta..."
  agot_court_ongoing.1310.ending:0 "Non permetterebbero a un[owner.GetWomanMan] di partecipare ai combattimenti, ma non potrebbero negarmi l'opportunità di assistere. Potrei persino far mostra di concedere il mio favore a [target.Custom('IT_NAM_COL4')][target.GetTitledFirstNameNoTooltip], e incantar[Select_CString(target.IsFemale,'la','lo')] completamente nel mentre..."
  agot_court_ongoing.1310.a:0 "Unisciti allo sparring!"
  agot_court_ongoing.1310.b:0 "Incit[Select_CString(target.IsFemale,'a','alo')] dai lati."
  agot_court_ongoing.1310.c:0 "È tempo di sfoderare il fascino!"
  agot_court_ongoing.1310.d:0 "Passa in fretta prima che [Select_CString(target.IsFemale,'lei','lui')] ti veda..."
  agot_court_ongoing.1310.a.success:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] è impressionat[Select_CString(target.IsFemale,'a','o')] dalle tue capacità"
  agot_court_ongoing.1310.a.failure:0 "Ti copri di ridicolo nel confronto"
  agot_court_ongoing.1310.b.success:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] è conquistat[Select_CString(target.IsFemale,'a','o')] dal tuo fascino"
  agot_court_ongoing.1310.b.failure:0 "La cosa diventa un po' imbarazzante..."

  court_outcome.0003.d:0 "Spero di sposare [Select_CString(owner.IsFemale,'lei','lui')]!"
  court_outcome.0003.e:0 "Voglio stare con [Select_CString(owner.IsFemale,'lei','lui')], a qualunque costo!"
  court_outcome.0003.e.them.elope.tt:0 "Se [owner.GetShortUIName|U] è dispost[Select_CString(owner.IsFemale,'a','o')], [Select_CString(owner.IsFemale,'lei','lui')] avvierà un intrigo per fuggire con me e diventare la mia Anima gemella"
  court_outcome.0003.e.me.elope.tt:0 "Se [owner.GetShortUIName|U] è dispost[Select_CString(owner.IsFemale,'a','o')], io avvierò un intrigo per fuggire con [Select_CString(owner.IsFemale,'lei','lui')] e diventare l[Select_CString(owner.IsFemale,'a sua','il suo')] Anima gemella"
  court_outcome.0003.e.no.elope.tt:0 "Nessuno di noi può avviare un intrigo per fuggire, ma se [owner.GetShortUIName|U] è dispost[Select_CString(owner.IsFemale,'a','o')], verrà fatta una promessa e diventeremo Anime gemelle"
  court_outcome.0003.d.propose.tt:0 "Se [owner.GetShortUIName|U] è dispost[Select_CString(owner.IsFemale,'a','o')], sposerai [Select_CString(owner.IsFemale,'lei','lui')] e diventerai l[Select_CString(owner.IsFemale,'a sua','il suo')] Anima gemella"
 # court_outcome.0003.a.tt Moved to Replace Folder
  court_outcome.0003.d.permission.tt:0 "Se [owner.GetShortUIName|U] è dispost[Select_CString(owner.IsFemale,'a','o')], diventerai l[Select_CString(owner.IsFemale,'a sua','il suo')] Anima gemella e chiederai il permesso di sposare [Select_CString(owner.IsFemale,'lei','lui')]"
  agot_court_outcome.1001.c:0 "La nostra unione dev'essere testimoniata da [owner.GetFaith.FertilityGodName]!"
  agot_court_outcome.1001.d:0 "Un giorno ci sposeremo, a qualunque costo!"
  agot_court_outcome.1003.b:0 "Condividiamo un bacio, dolce come il miele."
  agot_court_outcome_seek_permission_both_to_marry_tt:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] deve prima chiedere il permesso di sposarsi sia al proprio signore, [proposer_liege.Custom('IT_NAM_COL3')][proposer_liege.GetTitledFirstName], sia al signore di [proposer_target.Custom('IT_NAM_COL2')][proposer_target.GetTitledFirstNamePossessiveNoTooltip], [proposer_target_liege.Custom('IT_NAM_COL3')][proposer_target_liege.GetTitledFirstName]"
  agot_court_outcome_seek_permission_proposer_both_liege_to_marry_tt:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] deve prima chiedere il permesso di sposarsi al tuo signore, [proposer_liege.Custom('IT_NAM_COL3')][proposer_liege.GetTitledFirstName]"
  agot_court_outcome_seek_permission_proposer_own_liege_to_marry_tt:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] deve prima chiedere il permesso di sposarsi al proprio signore, [proposer_liege.Custom('IT_NAM_COL3')][proposer_liege.GetTitledFirstName]"
  agot_court_outcome_seek_permission_proposer_target_liege_to_marry_tt:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] deve prima chiedere il permesso di sposarsi al signore di [proposer_target.Custom('IT_NAM_COL2')][proposer_target.GetTitledFirstNamePossessiveNoTooltip], [proposer_target_liege.Custom('IT_NAM_COL3')][proposer_target_liege.GetTitledFirstName]"

  agot_court_outcome.1105.a:0 "[Select_CString(owner.IsFemale,'Lei','Lui')|U] mi ha chiesto di sposar[Select_CString(owner.IsFemale,'la','lo')] e ho accettato!"
  agot_court_outcome.1105.b:0 "[Select_CString(owner.IsFemale,'Lei','Lui')|U] ha promesso che un giorno ci saremmo sposati, a qualunque costo!"
  agot_court_outcome_elope_promise_tt:0 "Viene fatta una solenne promessa: non appena possibile, [owner.GetFirstNameNoTooltip] avvierà un intrigo per fuggire con [target.GetFirstNameNoTooltip]!"

  agot_court_outcome.1200.t:0 "Il grande gesto"
  agot_court_outcome.1200.courtier.desc:0 "Mentre tenevo corte in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ho scorto [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] fra la folla degli astanti e il mio cuore ha sussultato alla vista di [Select_CString(target.IsFemale,'lei','lui')].\n\n"
  agot_court_outcome.1200.ruler.desc:0 "Ho presenziato alla corte di [target.Custom('IT_NAM_COL2')][target.GetTitledFirstNamePossessiveNoTooltip] in [target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], non avendo veduto [Select_CString(target.IsFemale,'lei','lui')] da tempo. Veder[Select_CString(target.IsFemale,'la','lo')] lassù, dinanzi a tutti, mi ha fatto sussultare il cuore.\n\n"
  agot_court_outcome.1200.desc:0 "Avevo sentito dire che [target.Custom('IT_NAM_COL2')][target.GetTitledFirstNamePossessiveNoTooltip] avrebbe potuto presenziare alla corte di [target_host.Custom2('NamePossessiveCharacterIntroduction', target)], così sono andato a vedere di persona. Si è rivelato vero, e scorgere il mio [target.Custom('LoverPetName')] fra la folla degli astanti ha fatto sobbalzare il mio cuore di gioia.\n\n"
  agot_court_outcome.1200.end.desc:0 "In quell'istante mi è balenata un'idea: e se dichiarassi il mio amore per [Select_CString(target.IsFemale,'lei','lui')] proprio lì, dinanzi a tutti? Potrei certo metterci entrambi in imbarazzo, ma un grande gesto potrebbe essere ciò che serve per convincere [target.Custom('IT_NAM_COL4')][target.GetTitledFirstNameNoTooltip] che il mio amore è sincero e non sarà ignorato con facilità."
  agot_court_outcome.1200.a:0 "Farò un passo avanti e mi dichiarerò!"
  agot_court_outcome.1200.b:0 "No, non posso sopportare il pensiero dell'umiliazione..."

  agot_court_outcome.1201.start.desc:0 "Traendo un profondo respiro, mi sono fatto strada nella folla. Si è aperta davanti a me, come se intuissi che stesse per accadere qualcosa, e tutti gli occhi si sono volti su di noi mentre mi avvicinavo al chiaramente stupit[Select_CString(target.IsFemale,'a','o')] [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] e prendevo [Select_CString(target.IsFemale,'le','gli')] mani fra le mie. A voce alta, ho proclamato perché tutta la corte vedesse il mio amore imperituro per quest[Select_CString(target.IsFemale,'a','o')] [target.Custom('polite_gender_ref')]."
  agot_court_outcome.1201.diplomacy.desc:0 " Le parole mi sono giunte senza che le cercassi: insieme eloquenti e semplici. Le dame attorno a noi hanno sospirato rapite, gli uomini hanno stretto le labbra d'invidia. Quando [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] mi ha sorriso in risposta, è divenuto chiaro che la mia lingua mielata non mi aveva tradito.\n\n"
  agot_court_outcome.1201.desc:0 " Devo ammetterlo: non avevo ponderato cosa avrei detto, e non sono un[owner.GetWomanMan] dotat[Select_CString(owner.IsFemale,'a','o')] di lingua mielata. La folla è rimasta per lo più in silenzio, salvo qualche colpo di tosse imbarazzato. Eppure, [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] mi ha sorriso: era chiaro a [Select_CString(target.IsFemale,'lei','lui')] che ero sincero nelle mie intenzioni.\n\n"
  agot_court_outcome.1201.end.desc:0 "In seguito, [Select_CString(target.IsFemale,'lei','lui')] mi ha condotto in disparte, in un luogo privato, e mi ha rimproverato per la mia stolta temerarietà, sebbene nelle [Select_CString(target.IsFemale,'sue','suoi')] parole non vi fosse alcun ardore. A stento [Select_CString(target.IsFemale,'la','lo')] ascoltavo, poiché sapevo, in quell'istante, che il [Select_CString(target.IsFemale,'suo','suo')] cuore era mio, se lo avessi voluto."
  agot_court_outcome.1201.b:0 "Un solo dolce bacio, e poi finisca lì."
  agot_court_outcome.1201.c:0 "Nel calore dell'istante, chiedi [Select_CString(target.IsFemale,'la','lo')] in sposa."

  agot_court_outcome.1202.diplomacy.desc:0 "\n\nNonostante le mie parole eloquenti, stillanti sentimento mielato, è stato subito chiaro che avevo scelto male."
  agot_court_outcome.1202.desc:0 "\n\nÈ stato subito chiaro che avevo commesso un terribile errore di giudizio. Le mie parole inciampavano l'una sull'altra e, mentre l'espressione di [target.Custom('IT_NAM_COL2')][target.GetTitledFirstNamePossessiveNoTooltip] mutava in orrore, sono andato nel panico e la cosa è persino peggiorata."
  agot_court_outcome.1202.end:0 " La folla attorno a noi è divenuta gravemente silenziosa, salvo qualche colpo di tosse imbarazzato. [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] ha sottratto [Select_CString(target.IsFemale,'le','gli')] mani dalle mie e ha ammesso, con nervosismo, agli astanti che non aveva la minima idea di cosa mi avesse spinto a dire simili cose. Quando [Select_CString(target.IsFemale,'lei','lui')] si è voltat[Select_CString(target.IsFemale,'a','o')] ed è uscit[Select_CString(target.IsFemale,'a','o')] dalla sala, non ho sentito altro che gelo e ho compreso, in quell'istante, che per noi era finita."
  agot_court_outcome.1202.a:0 "Che sciocco mi sono reso."

  agot_court_outcome.1203.start.desc:0 "Assisto alla corte, intento ai fatti miei e a oziosi convenevoli con un nobile al mio fianco, quando all'improvviso la folla davanti a noi si apre. Confus[Select_CString(target.IsFemale,'a','o')], mi volto e scorgo [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] che avanza verso di me.\n\n[Select_CString(owner.IsFemale,'Lei','Lui')|U] mi ha preso le mani fra [Select_CString(owner.IsFemale,'le sue','le sue')] e, a voce alta, ha dichiarato affinché tutti udissero il [Select_CString(owner.IsFemale,'suo','suo')] amore imperituro."
  agot_court_outcome.1203.diplomacy.desc:0 " Le [Select_CString(owner.IsFemale,'sue','suoi')|U] parole erano mielate e dolci, come se fossero state provate, pur potendo capire che tutto era nato d'impulso. Le dame attorno a noi hanno sospirato rapite, gli uomini hanno stretto le labbra d'invidia, e il mio cuore si è sciolto del tutto.\n\n"
  agot_court_outcome.1203.desc:0 " Era chiaro che [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] non avesse pianificato nulla. Le [Select_CString(owner.IsFemale,'sue','suoi')|U] parole inciampavano l'una sull'altra, goffe, e quando [Select_CString(owner.IsFemale,'lei','lui')] è andat[Select_CString(owner.IsFemale,'a','o')] nel panico la cosa è soltanto peggiorata. La folla è calata nel silenzio, salvo qualche colpo di tosse imbarazzato. Eppure non importava: sapevo che l'intento di [Select_CString(owner.IsFemale,'lei','lui')] era puro. Il mio cuore si è sciolto del tutto.\n\n"
  agot_court_outcome.1203.end.desc:0 "Più tardi, ho condotto il [owner.Custom('polite_gender_ref')] in un luogo riservato e ho redarguito [Select_CString(owner.IsFemale,'lei','lui')] per la [Select_CString(owner.IsFemale,'sua','sua')] stolta temerarietà. Avremmo potuto entrambi esser messi in ridicolo! Tuttavia dubito che [Select_CString(owner.IsFemale,'lei','lui')] abbia udito una sola parola; e, in ogni caso, non importava. Il gesto era compiuto, e io ero innamorat[Select_CString(target.IsFemale,'a','o')]."
  public_grand_gesture:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] hanno trovato amore eterno dopo che [TARGET_CHARACTER.GetShortUIName] ha pubblicamente dichiarato [Select_CString(TARGET_CHARACTER.IsFemale,'la sua','il suo')] adorazione per [CHARACTER.GetShortUIName] con un grande gesto."
  public_grand_gesture_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] hanno trovato amore eterno dopo che [CHARACTER.GetShortUIName] ha pubblicamente dichiarato [Select_CString(CHARACTER.IsFemale,'la sua','il suo')] adorazione per [TARGET_CHARACTER.GetShortUIName] con un grande gesto."

  agot_court_outcome.1300.t:0 "Incontro nel giardino"
  agot_court_outcome.1300.same.desc:0 "Non vedo il mio [target.Custom('LoverPetName')] da qualche tempo, così mi metto in cerca di [Select_CString(target.IsFemale,'lei','lui')]. Quando il giorno comincia a cedere al crepuscolo, finisco per trovar[Select_CString(target.IsFemale,'la','lo')] mentre vaga da sol[Select_CString(target.IsFemale,'a','o')] nei giardini più belli di [target.GetCurrentLocation.GetNameNoTooltip]. "
  agot_court_outcome.1300.desc:0 "Non vedo il mio [target.Custom('LoverPetName')] da qualche tempo, così mi reco a [target.GetCurrentLocation.GetNameNoTooltip] nella speranza di trovar[Select_CString(target.IsFemale,'la','lo')]. Ci vuole un certo sforzo e, mentre il giorno comincia a cedere al crepuscolo, alla fine trovo [Select_CString(target.IsFemale,'lei','lui')] che vaga sol[Select_CString(target.IsFemale,'a','o')] negli ampi giardini. "
  agot_court_outcome.1300.end.desc:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] sembra assort[Select_CString(target.IsFemale,'a','o')] nei pensieri, forse pres[Select_CString(target.IsFemale,'a','o')] da qualche questione pressante o addirittura in attesa di qualcuno. Eppure, il mio cuore balza di gioia.\n\nMi sovviene che questo luogo appartato, sotto i colori ardenti di un tramonto, potrebbe essere l'occasione migliore per dichiarare il mio amore. Se non posso rischiare l'imbarazzo di una simile rivelazione adesso, quando mai potrò farlo?"
  agot_court_outcome.1300.a:0 "Mi faccio coraggio e avanzo..."

  agot_court_outcome.1301.desc:0 "Non avrei dovuto temere.\n\n[target.GetFirstNameNoTooltip] è stat[Select_CString(target.IsFemale,'a','o')] liet[Select_CString(target.IsFemale,'a','o')] di vedermi e ha confessato che anche [Select_CString(target.IsFemale,'lei','lui')] pensava a me. Mentre il crepuscolo si faceva vera notte, abbiamo vagato da soli nei giardini e discusso di molte cose — le stelle, i fiori, i nostri passati e i nostri futuri. Mi sentivo rapit[Select_CString(target.IsFemale,'a','o')] al suono della sua voce, e [Select_CString(target.IsFemale,'lei','lui')] alla mia.\n\nQuando scoprimmo il ruscello più delizioso in una grotta appartata, con la luna che splendeva alta sopra di noi, credo che la questione fosse decisa. Eravamo innamorati."

  agot_court_outcome.1302.start.desc:0 "Non appena uscii dall'ombra e salutai [target.GetFirstNameNoTooltip], capii che era un errore. [Select_CString(target.IsFemale,'Lei','Lui')|U] trasalì, poi si scusò nervosamente mentre tentavo di rompere il ghiaccio e trasformare l'imbarazzata conversazione che ne seguì in qualcosa di più piacevole. [Select_CString(target.IsFemale,'Lei','Lui')|U] continuava a cercare una scusa per allontanar[Select_CString(target.IsFemale,'si','si')], e non passò molto prima che ne scoprissi il motivo.\n\n"
  agot_court_outcome.1302.target.desc:0 "Dalle ombre apparve un[targets_meeting.Custom('polite_gender_ref')]. [targets_meeting.Custom('IT_NAM_COL3')][targets_meeting.GetTitledFirstName] si avvicinò a noi, chiaramente infastidit[Select_CString(targets_meeting.IsFemale,'a','o')] dalla mia presenza e, quando [Select_CString(targets_meeting.IsFemale,'lei','lui')] si unì alla conversazione, cominciai a capire dagli sguardi tra i due che [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] era in attesa di [Select_CString(targets_meeting.IsFemale,'lei','lui')] e non di me. Che cosa intendessero discutere, non ne ho idea, ma era chiaramente importante e io ero l'intruso indesiderato.\n\n"
  agot_court_outcome.1302.desc:0 "Dalle ombre apparve uno dei servi. Il giovane si avvicinò con cautela, chiaramente fuori dal suo mondo, e se inizialmente mal sopportai l'intrusione, presto compresi dagli sguardi tra quel servo e [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] che [Select_CString(target.IsFemale,'lei','lui')] era in attesa di incontrare lui, e non me. Quale faccenda [Select_CString(target.IsFemale,'lei','lui')] potesse mai discutere con un servo, non ne ho idea, ma era chiaramente importante e io ero l'intruso indesiderato.\n\n"
  agot_court_outcome.1302.end:0 "Alla fine non riuscii più a sopportare la tensione. Mi scusai con garbo e mi ritirai nei giardini ombrosi, e [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] parve sollevat[Select_CString(target.IsFemale,'a','o')] nel vedermi andare. Non ho più visto [Select_CString(target.IsFemale,'lei','lui')] da allora, e forse è meglio così."

  agot_court_outcome.1303.desc:0 "Una sera fatale, vagavo nei vasti giardini di [target.GetCurrentLocation.GetNameNoTooltip], con i pensieri rivolti a [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip], mentre i colori ardenti del crepuscolo lasciavano il posto a un cielo trapunto di stelle. E chi sarebbe apparso, come se fosse stato evocato, se non [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] in persona.\n\nUn[owner.Custom('polite_gender_ref')] si avvicinò a me dalle ombre come in un sogno, mi prese la mano e, insieme, passeggiammo nei giardini parlando di molte cose — le stelle, i fiori, i nostri passati e i nostri futuri, a malapena ricordo. Mi sentivo rapit[Select_CString(target.IsFemale,'a','o')] al suono della sua voce, e [Select_CString(owner.IsFemale,'lei','lui')] alla mia.\n\nQuando scoprimmo il ruscello più delizioso in una grotta appartata, con la luna che splendeva alta sopra di noi, credo che la questione fosse decisa. Eravamo innamorati."
  garden_meeting:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] trovarono un amore eterno dopo che [TARGET_CHARACTER.GetShortUIName] scoprì [CHARACTER.GetShortUIName] in un giardino incantato."
  garden_meeting_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] trovarono un amore eterno dopo che [CHARACTER.GetShortUIName] scoprì [TARGET_CHARACTER.GetShortUIName] in un giardino incantato."

  agot_court_outcome.1400.t:0 "Fin dentro la notte"
  agot_court_outcome.1400.desc:0 "Il mio matrimonio con [target.GetFirstNameNoTooltip] ha avuto alti e bassi, ma di recente le cose sono cambiate. Ci sono state discussioni, per lo più su inezie, ma alcune sono degenerate in urla furibonde... e, per l'amor del cielo, non riesco a capirne il motivo. Le cose andavano così bene, e io non ho fatto altro che del mio meglio per conquistare il suo cuore!\n\nOra, osservando[Select_CString(target.IsFemale,'la','lo')] dalla soglia della sua camera, mi domando se non sia giunto il tempo di risolvere tutto una volta per tutte, o se il tentativo non finirà per sfociare nell'ennesima lite e peggiorare la distanza fra noi."
  agot_court_outcome.1400.a:0 "È giunta l'ora."
  agot_court_outcome.1400.b:0 "No. Che i cani dormano, come si dice."

  agot_court_outcome.1401.desc:0 "Che sollievo!\n\n[target.GetFirstNameNoTooltip] esitò a parlare, dapprima, ma alle mie insistenze finì per confessare che l'aria tesa era una risposta ai suoi dubbi... sul nostro matrimonio, sul nostro futuro, e sul vero significato di tutti i miei tentativi di corteggiare un[target.GetWomanMan] che, a ben vedere, era già mi[Select_CString(ROOT.Char.IsFemale,'a','o')]. La rassicurai, per quanto potei, che il mio corteggiamento non celava alcun secondo fine. Volevo che il nostro matrimonio fosse felice. Era tutto lì.\n\nIl suo volto si illuminò alle mie parole, il suo sollievo era palpabile, e poi parlammo. Per ore e ore, a quanto pare, fin dentro la notte. Ci tenemmo per mano e ci dicemmo parole che prima non avevamo osato pronunciare. Non tutti i matrimoni sono colmi d'amore, è vero. Ora, il nostro lo è."

  agot_court_outcome.1402.desc:0 "Il mio tempismo non avrebbe potuto essere peggiore.\n\n[target.GetFirstNameNoTooltip] si irrigidì ai miei sforzi di sciogliere questa tensione e, infine, ammise che tutto nasceva da una confusione profonda sulle ragioni del mio lungo corteggiamento. "Stai corteggiando un[target.GetWomanMan] che ti ha già sposat[Select_CString(target.IsFemale,'a','o')]!" esclamò. Provai a spiegare che desideravo che la nostra unione fosse fondata sull'amore, ma [target.GetFirstNameNoTooltip] respinse l'idea. Quando insistetti chiedendo se ci fosse qualcun altro per cui [Select_CString(target.IsFemale,'lei','lui')] provasse qualcosa, poiché non c'era posto per me nel suo cuore, fu una scelta infelice. Finimmo in un'altra lite, durata ore, finché alla fine abbandonai la camera da sol[Select_CString(ROOT.Char.IsFemale,'a','o')]. Non si andava da nessuna parte."
  agot_court_outcome.1402.a:0 "Così sia!"

  agot_court_outcome.1403.desc:0 "Il mio matrimonio con [owner.GetFirstNameNoTooltip] ha avuto alti e bassi, ma di recente le cose sono cambiate. Ci sono state discussioni, per lo più su inezie, ma alcune sono degenerate in urla furibonde... e, per l'amor del cielo, non riesco a capirne il motivo. [owner.GetSheHe|U] è stat[Select_CString(owner.IsFemale,'a','o')] adorabil[Select_CString(owner.IsFemale,'e','e')] di recente, mostrandomi affetto e corteggiandomi, ma perché [Select_CString(owner.IsFemale,'lei','lui')] si sforza tanto di conquistare il cuore di un[target.GetWomanMan] che ha già sposato?\n\nQuesta notte [Select_CString(owner.IsFemale,'lei','lui')] è entrat[Select_CString(owner.IsFemale,'a','o')] nella mia camera e mi ha preso le mani.\n\n[owner.GetSheHe|U] mi ha rassicurat[Select_CString(owner.IsFemale,'a','o')] con parole chiare che i suoi tentativi non celavano alcun secondo fine. [Select_CString(owner.IsFemale,'Lei','Lui')|U] non desidera altro che un matrimonio fondato sull'amore. Il mio sollievo fu palpabile e poi parlammo. Per ore e ore, a quanto pare, fin dentro la notte. Ci tenemmo per mano e ci dicemmo parole che prima non avevamo osato pronunciare. Non tutti i matrimoni sono colmi d'amore, è vero. Ora, il nostro lo è."
  late_into_the_night:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] trovarono un amore eterno nel loro matrimonio dopo una lunga notte passata a dirimere le loro divergenze."
  late_into_the_night_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] trovarono un amore eterno nel loro matrimonio dopo una lunga notte passata a dirimere le loro divergenze."

  agot_court_outcome.2000.family.opening:0 "[proposer.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
  agot_court_outcome.2000.courtier.opening:0 "[proposer.Custom2('GreetingToLiegePositive', ROOT.Char )]"
  agot_court_outcome.2000.opening:0 "[proposer.Custom2('GreetingToForeignRulerPositive', ROOT.Char )]"
  agot_court_outcome.2000.my.relation:0 "Negli ultimi mesi, ho intrapreso un corteggiamento casto e appropriato con [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstName], e sono giunto a considerar[Select_CString(proposer_target.IsFemale,'la','lo')] una vera anima gemella.\n\n"
  agot_court_outcome.2000.other.relation:0 "Negli ultimi mesi, ho intrapreso un corteggiamento casto e appropriato con [proposer_target_liege.GetTitledFirstNamePossessiveNoTooltip] [proposer_target_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstName], e sono giunto a considerar[Select_CString(proposer_target.IsFemale,'la','lo')] una vera anima gemella.\n\n"
  agot_court_outcome.2000.both.my.courtier:0 "Negli ultimi mesi, ho intrapreso un corteggiamento casto e appropriato con un[proposer_target.Custom('polite_gender_ref')] qui a corte, [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstName], e sono giunto a considerar[Select_CString(proposer_target.IsFemale,'la','lo')] una vera anima gemella.\n\n"
  agot_court_outcome.2000.my.courtier:0 "Negli ultimi mesi, ho intrapreso un corteggiamento casto e appropriato con un[proposer_target.Custom('polite_gender_ref')] che fa parte della tua corte, [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstName], e sono giunto a considerar[Select_CString(proposer_target.IsFemale,'la','lo')] una vera anima gemella.\n\n"
  agot_court_outcome.2000.stranger:0 "Negli ultimi mesi, ho intrapreso un corteggiamento casto e appropriato con un[proposer_target.Custom('polite_gender_ref')] di nome [proposer_target.GetFullName], e sono giunto a considerar[Select_CString(proposer_target.IsFemale,'la','lo')] una vera anima gemella.\n\n"
  agot_court_outcome.2000.second.liege:0 "Poiché il mio sovrano [proposer_liege.Custom('IT_NAM_COL3')][proposer_liege.GetTitledFirstName] ha già acconsentito, "
  agot_court_outcome.2000.proposer.family.willnotwed:0 "Come leale [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))] a cui era stato promesso di poter seguire il suo cuore, "
  agot_court_outcome.2000.proposer.family:0 "Come tuo leale [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))], "
  agot_court_outcome.2000.proposer.dynasty:0 "Come leale membro della dinastia [ROOT.Char.GetDynasty.GetBaseNameNoTooltip], "
  agot_court_outcome.2000.proposer.courtier:0 "Come tuo leale suddito, "
  agot_court_outcome.2000.proposer.guest:0 "Come tuo ospite e, spero, futuro membro della tua corte, "
  agot_court_outcome.2000.onlyliege:0 "[proposer.Custom('lmf_type_of_request')] che tu mi conceda licenza affinché io possa sposare questo [proposer_target.GetWomanMan] che tanto adoro."
  agot_court_outcome.2000.otherliege:0 "[proposer.Custom('lmf_type_of_request')] che tu mi dia la tua benedizione per rivolgermi al sovrano di [Select_CString(proposer_target.IsFemale,'lei','lui')], [proposer_target_liege.Custom('IT_NAM_COL3')][proposer_target_liege.GetTitledFirstName], e chiedere che ci sia concesso di unirci in nozze come si conviene."
  agot_court_outcome.2000.a:0 "Permesso concesso!"
  agot_court_outcome.2000.b:0 "Assolutamente no."
  agot_court_outcome.2000.a.seek.permission.tt:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] chiederà il permesso a [proposer_target_liege.Custom('IT_NAM_COL4')][proposer_target_liege.GetTitledFirstName]"
  agot_court_outcome.2000.a.permission.granted.tt:0 "[proposer_target_liege.Custom('IT_NAM_COL3')][proposer_target_liege.GetTitledFirstNameNoTooltip] concede il permesso"
  agot_court_outcome.2000.a.permission.refused.tt:0 "[proposer_target_liege.Custom('IT_NAM_COL3')][proposer_target_liege.GetTitledFirstNameNoTooltip] rifiuta [Select_CString(proposer.IsFemale,'lei','lui')]"
  agot_court_outcome.2000.b.tt:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] e [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstNameNoTooltip] potrebbero continuare la loro relazione o persino fuggire insieme"

  agot_court_outcome.2001.opening:0 "[proposer_liege.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
  agot_court_outcome.2001.desc:0 "Molto bene. Hai la mia licenza di sposare [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstNameNoTooltip], purché anche [proposer_target_liege.Custom('IT_NAM_COL3')][proposer_target_liege.GetTitledFirstName] ti conceda il suo permesso."
  agot_court_outcome.2001.a:0 "Da [proposer_target_liege.Custom('IT_NAM_COL4')][proposer_target_liege.GetTitledFirstNameNoTooltip]!"

  agot_court_outcome.2003.t:0 "Permesso concesso!"
  agot_court_outcome.2003.proposer:0 "Notizie meravigliose! [permission_granter.Custom('IT_NAM_COL3')][permission_granter.GetTitledFirstNameNoTooltip] ha concesso il suo permesso affinché [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstNameNoTooltip] e io ci sposassimo! È una piccola cerimonia, tenuta in un[proposer.GetFaith.HouseOfWorship] locale a [proposer.GetCurrentLocation.GetName], con un vecchio [proposer.GetFaith.DevoteeNeuterPlural] canut[Select_CString(ROOT.Char.IsFemale,'a','o')] a officiare il rito, sconcertat[Select_CString(ROOT.Char.IsFemale,'a','o')] dalla subitaneità dell'evento... ma non mi importa. Ho sposato l'amore della mia vita, ed è cosa fatta!"
  agot_court_outcome.2003.proposer_target:0 "Notizie meravigliose! [proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] ha ottenuto il permesso affinché [Select_CString(proposer.IsFemale,'lei','lui')] e io ci sposassimo! È una piccola cerimonia, tenuta in un[proposer_target.GetFaith.HouseOfWorship] locale a [proposer_target.GetCurrentLocation.GetName], con un vecchio [proposer_target.GetFaith.DevoteeNeuterPlural] canut[Select_CString(ROOT.Char.IsFemale,'a','o')] a officiare il rito, sconcertat[Select_CString(ROOT.Char.IsFemale,'a','o')] dalla subitaneità dell'evento... ma non mi importa. Ho sposato l'amore della mia vita, ed è cosa fatta!"
  agot_court_outcome.2003.a:0 "Non dimenticherò mai questo giorno!"
  given_leave_to_marry:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] trovarono il vero amore dopo che fu loro concesso il permesso di sposarsi."
  given_leave_to_marry_corresponding:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] trovarono il vero amore dopo che fu loro concesso il permesso di sposarsi."

  agot_court_outcome.2004.t:0 "Permesso negato!"
  agot_court_outcome.2004.desc:0 "[permission_refuser.Custom('IT_NAM_COL3')][permission_refuser.GetTitledFirstNameNoTooltip] ha rifiutato di concedere il permesso per il matrimonio, e quell[permission_refuser.GetWomanMan] non ha nemmeno dato una ragione! I nostri piani sono distrutti. Che cosa dovremmo fare, [proposer_target.Custom('IT_NAM_COL3')][proposer_target.GetTitledFirstNameNoTooltip] e io?"
  agot_court_outcome.2004.a:0 "Resta una sola scelta: fuggiamo insieme!"
  agot_court_outcome.2004.b:0 "Sposati o no, il nostro amore non morirà mai!"
  agot_court_outcome.2004.c:0 "Se non possiamo stare insieme, che senso ha?"
  agot_court_outcome.2004.b.tt:0 "Resterete Anime Gemelle anche fuori dal matrimonio"
  agot_court_outcome.2004.c.tt:0 "Un ultimo bacio, e poi vi separate..."
  agot_court_outcome.2005.elope:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] è venut[Select_CString(proposer.IsFemale,'a','o')] da me, appena rientrat[Select_CString(proposer.IsFemale,'a','o')] dall'incontro con [permission_refuser.Custom('IT_NAM_COL3')][permission_refuser.GetTitledFirstNameNoTooltip]... e le notizie non erano buone. [permission_refuser.Custom('IT_NAM_COL3')][permission_refuser.GetTitledFirstNameNoTooltip] non ci ha concesso licenza di sposarci! Imperterrit[Select_CString(proposer.IsFemale,'a','o')], [proposer.GetFirstNameNoTooltip] mi prese la mano e giurò che [Select_CString(proposer.IsFemale,'lei','lui')] non avrebbe lasciato che ciò ci sbarrasse la via. "Verrò a prenderti", giurò. "Se dovessi metterci cento anni, verrò a prenderti e saremo sposi, qualunque cosa dica chiunque!""
  agot_court_outcome.2005.continue:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] è venut[Select_CString(proposer.IsFemale,'a','o')] da me, appena rientrat[Select_CString(proposer.IsFemale,'a','o')] dall'incontro con [permission_refuser.Custom('IT_NAM_COL3')][permission_refuser.GetTitledFirstNameNoTooltip]... e le notizie non erano buone. [permission_refuser.Custom('IT_NAM_COL3')][permission_refuser.GetTitledFirstNameNoTooltip] non ci ha concesso licenza di sposarci! "Non importa", dichiarò [proposer.GetFirstNameNoTooltip]. [Select_CString(proposer.IsFemale,'Lei','Lui')|U] mi strinse fra le sue braccia e mi baciò dolcemente sulle labbra. "Sposati o no, il nostro amore fiorirà qualunque cosa ci dicano!""
  agot_court_outcome.2005.breakup:0 "[proposer.Custom('IT_NAM_COL3')][proposer.GetTitledFirstNameNoTooltip] è venut[Select_CString(proposer.IsFemale,'a','o')] da me, appena rientrat[Select_CString(proposer.IsFemale,'a','o')] dall'incontro con [permission_refuser.Custom('IT_NAM_COL3')][permission_refuser.GetTitledFirstNameNoTooltip]... e le notizie non erano buone. [permission_refuser.Custom('IT_NAM_COL3')][permission_refuser.GetTitledFirstNameNoTooltip] non ci ha concesso licenza di sposarci! "Che senso ha stare insieme", sospirò [proposer.GetFirstNameNoTooltip], "se dobbiamo farlo in segreto? No, non lo sopporto." Detto questo, [Select_CString(proposer.IsFemale,'lei','lui')] mi diede un ultimo bacio, dolcissimo, e poi se ne andò per sempre."
  agot_court_outcome.2005.a:0 ""Ti aspetterò, amore mio!""
  agot_court_outcome.2005.b:0 ""Ho bisogno di te qui e ora, amore mio!""
  agot_court_outcome.2005.c:0 "Ahimè, dovrà sostenermi quel bacio d'addio..."

  agot_court_outcome.2010.opening:0 "[target.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
  agot_court_outcome.2010.imprison:0 "Reclus[Select_CString(ROOT.Char.IsFemale,'a','o')] in questa prigione come sono, ammetto che le possibilità che noi si stia mai insieme paiono remote. È passato troppo tempo dall'ultima volta che vidi il tuo volto.\n\n"
  agot_court_outcome.2010.normal:0 "Ripenso al giorno in cui la tua promessa fu fatta, che un giorno saremmo stati insieme come marito e moglie, e mi sembra un tempo lontano. Troppo lontano, in verità.\n\n"
  agot_court_outcome.2010.hate:0 "Non posso fare a meno di sentirmi in qualche modo ingannat[Select_CString(ROOT.Char.IsFemale,'a','o')]. Forse mi hai persino derubat[Select_CString(ROOT.Char.IsFemale,'a','o')] della vita che avrei potuto avere. "
  agot_court_outcome.2010.nothate:0 "A dire il vero, non posso biasimarti. Il destino ha cospirato contro di noi, e non verrà negato. "
  agot_court_outcome.2010.end:0 "Qualunque sia la verità, credo sia tempo di riconoscere le cose per ciò che sono. Ti sciolgo dalla tua promessa, ammesso che tu la riconosca, e prenderemo strade separate."
  agot_court_outcome.2010.a:0 "Ahimè, non doveva andare così."

  agot_elope.1004.t:0 "Fuggiti nella notte"
  agot_elope.1004.start:0 "Mi desto al mattino accolto da notizie sorprendenti: durante la notte, "
  agot_elope.1004.both:0 "pare che sia [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstName] sia [target.Custom('IT_NAM_COL3')][target.GetTitledFirstName] siano fuggiti insieme dalla [ROOT.Char.Custom('FortifiedBuilding')] e si siano sposati in segreto. "
  agot_elope.1004.target:0 "pare che [owner.GetFullName] si sia introdott[Select_CString(owner.IsFemale,'a','o')] nella rocca a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e sia fuggit[Select_CString(owner.IsFemale,'a','o')] con [Select_CString(target.IsFemale,'la','il')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))], [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip], per fuggire insieme e sposarsi. "
  agot_elope.1004.mid:0 "L'intera faccenda doveva essere pianificata da tempo, visto che sono riusciti ad aggirare le guardie e a sfuggire a ogni sguardo. Davvero notevole, invero.\n\n"
  agot_elope.1004.refused:0 "Avevo già negato loro il permesso di sposarsi, ma ora pare che abbiano preso la questione nelle proprie mani e recato disonore a entrambi."
  agot_elope.1004.owner.refused:0 "A quanto pare, [owner.GetLiege.Custom('IT_NAM_COL3')][owner.GetLiege.GetTitledFirstNameNoTooltip] ha rifiutato la richiesta di [owner.GetTitledFirstNamePossessiveNoTooltip] di sposarsi, e così [Select_CString(owner.IsFemale,'lei','lui')] ha preso la questione nelle proprie mani. Per quanto io comprenda la sua sorte, la legge è la legge. Le loro azioni hanno recato disonore a entrambi."
  agot_elope.1004.target.refused:0 "A quanto pare, [target.GetLiege.Custom('IT_NAM_COL3')][target.GetLiege.GetTitledFirstNameNoTooltip] ha rifiutato la richiesta di [target.GetTitledFirstNamePossessiveNoTooltip] di sposarsi, e così [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] ha preso la questione nelle proprie mani. Per quanto io comprenda la loro sorte, la legge è la legge. Le loro azioni hanno recato disonore a entrambi."
  agot_elope.1004.granted:0 "Avevo già concesso loro il permesso di sposarsi, ma a quanto pare non è bastato a far sì che ciò avvenisse... e ora hanno preso la questione nelle proprie mani. Per quanto io comprenda la loro sorte, la legge è la legge. Le loro azioni hanno recato disonore a entrambi."
  agot_elope.1004.married:0 "Suppongo che [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] non potesse chiedere come si conviene la mano di [Select_CString(target.IsFemale,'lei','lui')] perché [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] è già sposat[Select_CString(target.IsFemale,'a','o')]! In ogni caso, ora hanno infranto la legge e recato disonore a entrambi."
  agot_elope.1004.end:0 "Perché [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] non abbia pensato a chiedere come si conviene la mano di [Select_CString(target.IsFemale,'lei','lui')], non saprei immaginarlo. In ogni caso, ora hanno infranto la legge sposandosi senza la mia licenza e recato disonore a entrambi."
  agot_elope.1004.a:0 "Spero ne sia valsa la pena."
  agot_elope.1004.b:0 "Fate sapere che possono tornare. Metteremo questa sconsideratezza alle spalle."

  agot_elope.1005.t:0 "Un nuovo arrivo"
  agot_elope.1005.start:0 "Mi desto al mattino e vengo accolto da notizie piuttosto sorprendenti: durante la notte, [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] si è sgattaiolat[Select_CString(owner.IsFemale,'a','o')] dentro [target_liege.Custom('IT_NAM_COL2')][target_liege.GetTitledFirstNamePossessive] [target_liege.Custom('FortifiedBuilding')] ed è fuggit[Select_CString(owner.IsFemale,'a','o')] con [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip]. I due sono là fuori da qualche parte, proprio ora, e si stanno sposando.\n\n"
  agot_elope.1005.refused:0 "In precedenza avevo rifiutato loro il permesso di sposarsi, ma ora pare che abbiano preso la cosa nelle proprie mani e recato disonore a entrambi."
  agot_elope.1005.granted:0 "In precedenza avevo concesso loro il permesso di sposarsi, ma a quanto pare non è bastato a far sì che accadesse... e ora hanno preso la cosa nelle proprie mani. Una fuga d'amore che reca disonore a entrambi."
  agot_elope.1005.neither:0 "Cosa abbia spinto [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] a un gesto tanto avventato non saprei nemmeno immaginarlo. In ogni caso, sposarsi senza il permesso del proprio signore reca disonore a entrambi."
  agot_elope.1005.end:0 " Resta una sola domanda: [ owner.Custom('IT_NAM_COL3') ][ owner.GetTitledFirstNameNoTooltip ] e [Select_CString(owner.IsFemale,'la sua','il suo')] nuova [target.Custom('WifeHusband')] saranno i benvenuti qui, nella mia corte?"
                                            agot_elope.1005.a:0 "Spero ne sia valsa la pena."
                                            agot_elope.1005.b:0 "Non sono più i benvenuti qui."
                                            agot_elope.1005.c:0 "Invia parola che sono i benvenuti. Metteremo questa indiscrezione alle spalle."

                                            pregnancy.3003.c:0 "Dobbiamo sposarci seduta stante!"

                                            seduce_outcome.4900.failure.tt:0 "L'intrigo di [owner.Custom('IT_NAM_COL2')][owner.GetTitledFirstNamePossessive] per sedurre [target.Custom('IT_NAM_COL3')][target.GetTitledFirstName] è fallito ed è stato scoperto!"

                                            agot_seduce_outcome.4901.opening:0 "È tardi nella sera quando, all'improvviso, tutti vengono destati da grida provenienti dall'interno del[ROOT.Char.Custom('FortifiedBuilding')].\n\nQuando vado a vedere di che trambusto si tratti, vengo accolto da una frotta di servitori e armigeri all'ingresso delle stanze da letto di [target.Custom2('MyCharacterIntroductionPossessive', ROOT.Char)]... dove, a quanto pare, [Select_CString(target.IsFemale,'lei','lui')] era arrivat[Select_CString(target.IsFemale,'a','o')] prima per essere accolto da nientemeno che [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] senza un filo di vesti addosso!\n\nQualunque tipo di accoglienza [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] sperasse di ricevere, non l'ha ottenuta. "
                                            agot_seduce_outcome.4901.reject:0 "Ho visto [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] urlare contro [Select_CString(owner.IsFemale,'di lei','di lui')] furiosamente, intimando[Select_CString(owner.IsFemale,'le','gli')] di uscire e di non tornare mai più.\n\nQuando [Select_CString(owner.IsFemale,'lei','lui')] ha scorto il resto di noi avvicinarsi, è fuggit[Select_CString(owner.IsFemale,'a','o')], senza nemmeno prendersi il tempo di raccogliere le proprie vesti!"
                                            agot_seduce_outcome.4901.normal:0 "[target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] era chiaramente inorridit[Select_CString(target.IsFemale,'a','o')] e, non appena mi ha visto, ha giurat[Select_CString(target.IsFemale,'a','o')] che [Select_CString(target.IsFemale,'lei','lui')] non aveva nulla a che fare con tutto ciò.\n\n[owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip], nel frattempo, ha raccolto le proprie vesti ed è fuggit[Select_CString(owner.IsFemale,'a','o')] con aria mortificata, sostenendo che l'intera faccenda fosse ovviamente un equivoco..."
                                            agot_seduce_outcome.4901.a:0 "Sconvolgente, ma anche piuttosto divertente..."

                                            agot_seduce_outcome.4902.opening:0 "Sto passeggiando nei giardini di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] quando odo quello che, dapprima, sembra un alterco.\n\nQuando accorro per vedere che cosa non vada, mi si para davanti [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] che viene urlat[Select_CString(owner.IsFemale,'a','o')] contro da [target.Custom2('MyCharacterIntroduction', ROOT.Char)]. "
                                            agot_seduce_outcome.4902.reject:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] è chiaramente livid[Select_CString(target.IsFemale,'a','o')], e solo tardivamente si accorge della mia presenza mentre si allontana in tempesta. «Quell[owner.GetWomanMan],» sbotta, «deve lasciarmi in pace. Non sopporterò un altro minuto delle sue attenzioni!»\n\n[owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip], almeno, ha avuto la decenza di apparire mortificat[Select_CString(owner.IsFemale,'a','o')] mentre fuggiva con quel poco di dignità che gli restava."
                                            agot_seduce_outcome.4902.normal:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] è più sconvolt[Select_CString(target.IsFemale,'a','o')] e turbato che adirat[Select_CString(target.IsFemale,'a','o')], tuttavia, e quando mi vede mi corre incontro. «Ringraziamo [target.GetFaith.PantheonTerm2] che tu sia arrivato! Non avrei sopportato un altro minuto dei [Select_CString(owner.IsFemale,'suoi','suoi')] continui palpeggiamenti!»\n\n[owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] è arrossit[Select_CString(owner.IsFemale,'a','o')] furiosamente e ha tentato di sostenere che l'intera faccenda fosse un equivoco... ma mi pare piuttosto chiaro che cosa stesse accadendo."
                                            agot_seduce_outcome.4902.a:0 "Non ha vergogna?! Oltraggioso!"

                                            agot_seduce_outcome.4903.opening:0 "Sto tornando ai miei alloggi in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] quando scorgo [target.Custom2('MyCharacterIntroduction', ROOT.Char)] e [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] in piedi in un'alcova, molto vicini fra loro. Quasi... troppo vicini? Non può essere...?\n\nNon appena [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] mi scorge, "
                                            agot_seduce_outcome.4903.reject:0 "[Select_CString(target.IsFemale,'lei','lui')] fa un passo deliberato indietro. «Non è opera mia, mio [ROOT.Char.GetLadyLord]! Quest[owner.GetWomanMan] mi sta dando la caccia da settimane, ormai! Non riesco a far[Select_CString(owner.IsFemale,'le','gli')] desistere!»\n\nÈ evidente che l'ira di [Select_CString(target.IsFemale,'lei','lui')] è sincera, e ciò è ulteriormente confermato dai balbettii imbarazzati di [owner.Custom('IT_NAM_COL2')][owner.GetTitledFirstNamePossessiveNoTooltip]. [Select_CString(owner.IsFemale,'Lei','Lui')|U] fa del suo meglio per sostenere che l'intera faccenda fosse un equivoco, ma a quel punto [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] se n'era già andat[Select_CString(target.IsFemale,'a','o')]."
                                            agot_seduce_outcome.4903.normal:0 "[Select_CString(target.IsFemale,'lei','lui')] appare sollevat[Select_CString(target.IsFemale,'a','o')]. «Ringraziamo [target.GetFaith.PantheonTerm2] che tu sia arrivato,» mormora, «non credo che avrei retto un altro minuto di questo.»\n\n[owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] ha cercato di liquidare tutto come un equivoco, ma non gli credo. In ogni caso, sembra improbabile che qualunque piano [Select_CString(owner.IsFemale,'lei','lui')] avesse per [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] possa ora giungere a compimento."
                                            agot_seduce_outcome.4903.a:0 "È per il meglio che sia capitato quando è capitato!"

                                            agot_seduce_outcome.4904.opening:0 "È un'altra festa serale a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma questa si rivela piuttosto movimentata, soprattutto per via delle bravate di [owner.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\nIl [owner.Custom('polite_gender_ref')] è chiaramente ben oltre il[Select_CString(owner.IsFemale,'le sue','le sue')] coppe, e prodiga attenzioni civettuole a [target.Custom2('MyCharacterIntroduction', ROOT.Char)]. "
  agot_seduce_outcome.4904.reject:0 "Infine, [Select_CString(target.IsFemale,'lei','lui')] si è alzat[Select_CString(target.IsFemale,'a','o')] e ha gridato: «Ne ho abbastanza delle tue attenzioni lascive! Desisti, te lo ordino! Desisti!»\n\nDetto ciò, [Select_CString(target.IsFemale,'lei','lui')] si è allontanat[Select_CString(target.IsFemale,'a','o')] furiosamente dalla sala, lasciando [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] a restare lì, sconvolt[Select_CString(owner.IsFemale,'a','o')]... con tutti gli altri che fissavano [Select_CString(owner.IsFemale,'lei','lui')].\n\nQualunque fossero le intenzioni di [Select_CString(owner.IsFemale,'lei','lui')] nei confronti di [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip], pare proprio che siano finite e sepolte."
  agot_seduce_outcome.4904.normal:0 "[Select_CString(target.IsFemale,'Lei','Lui')|U] era chiaramente disinteressat[Select_CString(target.IsFemale,'a','o')], e tollerava a stento la presenza di [Select_CString(owner.IsFemale,'lei','lui')].\n\n«Che cosa, in nome di [ROOT.Char.GetFaith.HighGodName], sta succedendo?» ho chiesto avvicinandomi, e [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] ha sfruttato la distrazione per dileguarsi... lasciando [owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] lì, a sbuffare d'indignazione mentre tutti lo fissavano."
  agot_seduce_outcome.4904.a:0 "Uno spettacolo vergognoso."

  agot_seduce_outcome.4905.desc:0 "[target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] è venut[Select_CString(target.IsFemale,'a','o')] da me stanotte, fremendo di furore.\n\n«Ne ho abbastanza di quell[owner.Custom('InsultNounSexual')]! Ho dett[Select_CString(target.IsFemale,'a','o')] di no mille volte, ma [Select_CString(owner.IsFemale,'lei','lui')] ascolta? Questa cosa deve finire!»\n\nIl [owner.Custom('polite_gender_ref')] che [Select_CString(target.IsFemale,'lei','lui')] detesta così tanto è, a quanto pare, nientemeno che [owner.Custom2('MyCharacterIntroduction', ROOT.Char)]... che ora è stato bandito dal rivolgere la parola a [target.Custom('IT_NAM_COL3')][target.GetTitledFirstNameNoTooltip] mai più, ovviamente, con grande sollievo di [Select_CString(target.IsFemale,'lei','lui')]. Eppure, che sfrontatezza! Tentare di sedurre il mio [target.Custom('WifeHusband')], sotto il mio stesso naso e nel mio stesso [ROOT.Char.Custom('FortifiedBuilding')]!"
  agot_seduce_outcome.4905.a:0 "Come osa [Select_CString(owner.IsFemale,'lei','lui')]!"

  agot_seduce_outcome.4906.desc:0 "Sto tornando ai miei alloggi in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] quando scorgo il mio [target.Custom('WifeHusband')] e [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] in piedi in una cupa alcova, molto vicini fra loro. Quasi... troppo vicini? Non può essere...?\n\nNon appena [target.GetFirstNameNoTooltip] mi scorge, [Select_CString(target.IsFemale,'lei','lui')] si scosta, chiaramente sollevat[Select_CString(target.IsFemale,'a','o')]. «Ringraziamo [target.GetFaith.PantheonTerm2] che tu sia arrivato,» mormora, «non credo che avrei retto un altro minuto di questo!»\n\n[owner.Custom('IT_NAM_COL3')][owner.GetTitledFirstNameNoTooltip] sbuffa d'indignazione e paura, cercando di liquidare l'intera faccenda come un semplice equivoco, ma era chiaramente tutt'altro. Fortuna per [Select_CString(owner.IsFemale,'lei','lui')] che sia fuggit[Select_CString(owner.IsFemale,'a','o')] prima che potessi chiamare le guardie!"
  agot_seduce_outcome.4906.a:0 "Quell[owner.Custom('InsultNounSexual')]! Come osa [Select_CString(owner.IsFemale,'lei','lui')]!"

  tried_to_seduce_spouse:0 "[TARGET_CHARACTER.GetShortUIName|U] ha tentato di sedurre il coniuge di [CHARACTER.GetShortUINamePossessive]."
  tried_to_seduce_spouse_corresponding:0 "[CHARACTER.GetShortUIName|U] ha tentato di sedurre il coniuge di [TARGET_CHARACTER.GetShortUINamePossessive]."

  agot_seduce_outcome.4907.opening:0 "È un altro giorno a corte in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e noioso a dir poco, quando all'improvviso le cose prendono una piega interessante.\n\n"
  agot_seduce_outcome.4907.reject:0 "«Adesso basta!» sento gridare un[ target.GetWomanMan ] in mezzo alla folla dei curiosi. Tutta l'attenzione si volge in quella direzione, e quando la gente si apre vedo che è [target.Custom2('MyCharacterIntroduction', ROOT.Char)] a urlare contro [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. [Select_CString(target.IsFemale,'Lei','Lui')|U] è chiaramente furios[Select_CString(target.IsFemale,'a','o')], e si ferma soltanto quando si rende conto che tutti gli sguardi sono ora puntati su di [Select_CString(target.IsFemale,'lei','lui')].\n\n«Perdono, mio [ROOT.Char.GetLadyLord]! È solo che questo... questo [owner.Custom('InsultNounSexual')] non mi lascia in pace! Per salvare la mia reputazione, voglio che la sua finisca!» Detto ciò, [target.GetFirstNameNoTooltip] si è voltat[Select_CString(target.IsFemale,'a','o')] ed è uscit[Select_CString(target.IsFemale,'a','o')] in tempesta dalla sala, e [owner.GetFirstNameNoTooltip] è rimast[Select_CString(owner.IsFemale,'a','o')] lì, impacciat[Select_CString(owner.IsFemale,'a','o')], a sopportare gli sguardi gelidi e giudicanti della corte riunita.\n\nQualunque cosa [Select_CString(owner.IsFemale,'lei','lui')] sperasse di ottenere con i propri sforzi, il piano è chiaramente fallito."
  agot_seduce_outcome.4907.normal:0 "«Vi prego, smettetela! Ve ne supplico!» sento gridare un[ target.GetWomanMan ] in mezzo alla folla dei curiosi. Tutta l'attenzione si volge in quella direzione, e quando la gente si apre vedo che è [target.Custom2('MyCharacterIntroduction', ROOT.Char)] a rivolgersi a [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. [Select_CString(target.IsFemale,'Lei','Lui')|U] pare mortificat[Select_CString(target.IsFemale,'a','o')], e ancor più quando si rende conto che tutti gli occhi della corte sono ora su [Select_CString(target.IsFemale,'lei','lui')].\n\n«Perdono, mio [ROOT.Char.GetLadyLord]! Io soltanto... non posso più sopportarlo.» [target.GetFirstNameNoTooltip] lancia un ultimo sguardo feroce a [owner.GetFirstNameNoTooltip] e poi fugge dalla sala.\n\nPoiché [Select_CString(target.IsFemale,'lei','lui')] non ha dato spiegazioni, mi resta da congetturare che cosa, esattamente, abbia fatto [owner.GetFirstNameNoTooltip] per suscitare tale comportamento... eppure sospetto che lo sappiamo tutti. Nonostante il sorrisetto trattenuto di [Select_CString(owner.IsFemale,'lei','lui')] in risposta agli sguardi, possiamo dire con certezza che i suoi sforzi si sono ridotti a nulla."
  agot_seduce_outcome.4907.a:0 "Scandaloso!"

  agot_seduce_outcome.4908.desc:0 "Sto camminando nel corridoio di notte, diretto alla mia camera da letto, quando all'improvviso un[ target.GetWomanMan ] mi si affretta accanto per camminare al mio fianco. È [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], a disagio e nervos[Select_CString(target.IsFemale,'a','o')]... sebbene sia chiaro che non ne sono io la causa.\n\n«Continuate a camminare,» supplica. «È un bene che siate comparso quando l'avete fatto, giacché ho cercato di evitare le avances di [Select_CString(owner.IsFemale,'lei','lui')] per tutto il giorno.» Incerto a chi [Select_CString(target.IsFemale,'lei','lui')] si riferisse, mi volto e scorgo [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] che s'aggira fra le ombre, tentando di apparire lì per puro caso e del tutto disinteressat[Select_CString(owner.IsFemale,'a','o')] a dove si trovi [target.GetFirstNamePossessiveNoTooltip].\n\n«Non credete a una sola parola di ciò che dice [Select_CString(owner.IsFemale,'lei','lui')],» sussurra [target.GetFirstNameNoTooltip]. «Il[Select_CString(owner.IsFemale,'suo','suo')] comportamento è quanto mai inappropriato, ma questo è tutto ciò che posso fare per proteggere la mia dignità, se non il mio buon nome.» Non appena siamo fuori vista, [target.GetFirstNameNoTooltip] mi ringrazia profusamente e corre via."
  agot_seduce_outcome.4908.a:0 "Dovrei intervenire, mi chiedo?"

  agot_seduce_outcome.4909.desc:0 "Sono nello studio di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], intrattenendo diversi cortigiani, quando [target.Custom2('MyCharacterIntroduction', ROOT.Char)] irrompe all'improvviso. Il[ target.GetWomanMan ] è in un visibile stato d'agitazione e regge un grosso fascio di lettere. Per un attimo ho creduto che cercasse me, ma invece [Select_CString(target.IsFemale,'lei','lui')] marcia dritto verso [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], seduto dall'altro lato della stanza.\n\n«Riprendetele,» dice. «Riprendetele tutte! Vi supplico, mio [owner.GetLadyLord], smettete di scrivermi. Questa vostra ossessione deve finire!» Detto ciò, [target.GetFirstNameNoTooltip] getta le lettere ai piedi di [owner.GetFirstNamePossessiveNoTooltip] e poi esce dallo studio in tempesta, lasciando [owner.GetFirstNameNoTooltip] a fissare attonit[Select_CString(owner.IsFemale,'a','o')].\n\nIl contenuto delle lettere può solo essere immaginato, ma dal modo in cui [Select_CString(owner.IsFemale,'lei','lui')] le raccoglie con volto vergognoso e dagli sguardi giudicanti degli altri nella stanza, mi è parso chiaro che tutti sapessero che cosa stesse facendo [owner.GetFirstNameNoTooltip]. Ed era altrettanto chiaro che, ormai, era finita."
  agot_seduce_outcome.4909.a:0 "Per tutti gli dèi!"

  lmf_army.1010.t:0 "Il seguace del campo"
  lmf_army.1010.female.start:0 "Ci sono sempre almeno alcune contadine che seguono l'esercito durante la marcia. Cuoche e lavandaie, per lo più, ma alcune di loro vengono anche chiamate «seguaci del campo» — quelle che sperano di catturare l'occhio di un[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')], sia per attirare un marito, sia soltanto per guadagnare qualche moneta offrendogli una notte di conforto.\n\nDi norma non presto molta attenzione a queste donne, ma da qualche tempo una #EMP mi ha#! colpit[Select_CString(ROOT.Char.IsFemale,'a','o')]. È [follower.GetCulture.GetNameNoTooltip], mi sorride ogni volta che passo, e sarebbe ben lieta di una visita a tarda notte... questo è chiaro.\n\n"
  lmf_army.1010.male.start:0 "Ci sono sempre almeno alcuni contadini che seguono l'esercito durante la marcia. La maggior parte sono donne, cuoche e lavandaie, oltre alle famigerate «seguaci del campo» che sperano di attirare l'occhio di un avvenente [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] e che vengono tollerate per il conforto che sono disposte a concedere.\n\nDi norma non presto molta attenzione a costoro, ma da qualche tempo ho notato fra loro un bel giovane [follower.GetCulture.GetNameNoTooltip] — il figlio di una lavandaia, mi dicono, che aiuta a riparare i carri. Dal modo in cui mi sorride ogni volta che passo, è chiaro che sarebbe più che disposto a una visita a tarda notte.\n\n"
  lmf_army.1010.end:0 "La domanda è: sono #EMP io#! disposto?"
  lmf_army.1010.a:0 "Perché no? Andrò a far visita a [Select_CString(follower.IsFemale,'lei','lui')]."
  lmf_army.1010.b:0 "No, è meglio evitare simili coinvolgimenti."

  lmf_army.1020.t:0 "La serva della taverna"
  lmf_army.1020.desc:0 "Stanco della cucina del campo, io e alcuni [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] abbiamo fatto visita a una piccola taverna in un villaggio vicino a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], per goderci bevute e sollazzi.\n\nLa serata è stata abbastanza piacevole, e ho notato che una delle serve della taverna aveva decisamente posato gli occhi su di me. Si è unita al nostro tavolo, brindando alla nostra fortuna e ridendo alle nostre battute, ma per tutto il tempo i suoi sorrisi erano riservati a me e a me soltanto.\n\nSfogarsi con qualche bicchiere è una cosa. Ma ero interessato anche a una notte di passione? Se sì, era chiaro che tutto ciò che dovevo fare era chiedere."
  lmf_army.1020.a:0 "Non mi tiro indietro."
  lmf_army.1020.b:0 "No, non sono interessato a lei."

  lmf_army.1030.t:0 "Notte turbolenta alla taverna"
  lmf_army.1030.desc:0 "Io e alcuni [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] abbiamo fatto il breve tragitto dal campo dell'esercito in [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] fino a un villaggio vicino dove, a detta di uno degli uomini, vi era una taverna.\n\nEra un posto decente e, in breve, eravamo tutti ben oltre le coppe, cantando a squarciagola e facendo baldoria come i soldati sogliono fare.\n\nForse, col tempo, le cose sono un po' sfuggite di mano, poiché la pazienza della gente del luogo si è assottigliata. Sono volate parole accese, poi qualche pugno, e prima che me ne rendessi conto ero faccia a faccia con un brutale abitante del posto, furioso."
  lmf_army.1030.a:0 "È tempo di sfogarsi!"
  lmf_army.1030.a.injury.tt:0 "[champion.GetShortUINameNoTooltipNoFormat|U] ferito nella rissa"
  lmf_army.1030.a.injury.desc:0 "Il tuo [player.Custom('KnightCultureNoTooltipLowercase')], [champion.GetShortUIName], è rimasto ferito dopo aver provocato una rissa in una taverna di villaggio vicino a [province.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1030.b:0 "Forse posso calmare tutti, prima che peggiori..."
  lmf_army.1030.c:0 "Meglio andarsene, prima che la cosa si scaldi #EMP troppo#!."

  lmf_army.1040.t:0 "Una notte di baldoria"
  lmf_army.1040.siege.start:0 "L'assedio è in corso, e sembra non finire mai. La tensione corre alta nel campo, e ammetto di sentirne il peso.\n\nNon sorprende dunque che, calato il sole, io mi ritrovi nel mezzo di una bevuta sfrenata, circondato dai [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] che mi applaudono e mi incitano. Abbiamo saccheggiato la tenda del quartiere mastro, tirando fuori liquori forti, e già vedo che questa sarà una notte che potrebbe portare molto dolore al mattino.\n\n"
  lmf_army.1040.march.start:0 "Sembra che la marcia duri in eterno. La tensione corre alta nel campo, e ammetto di sentirne il peso.\n\nNon sorprende dunque che, calato il sole, io mi ritrovi ad essermi unito ai [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] del campo nell'occupare una taverna in un piccolo villaggio [army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip] nei paraggi. Gli abitanti fuggono in fretta dal nostro gruppo chiassoso, e i tavernieri osservano impotenti dall'ombra mentre noi urliamo, brindiamo e beviamo. Già vedo che questa sarà una notte che potrebbe portare molto dolore al mattino.\n\n"
  lmf_army.1040.end:0 "Dovrei fermarmi, mi dico. Ma ho bisogno di uno sfogo. #EMP Di qualcosa.#!"
  lmf_army.1040.a:0 "Cercherò qualcuno con cui passare la notte, invece."
  lmf_army.1040.a.male.camp:0 "Cerchi un giovane nel campo con cui giacere."
  lmf_army.1040.a.male.tavern:0 "Cerchi un giovane nella taverna con cui giacere."
  lmf_army.1040.a.female.camp:0 "Cerchi una seguace del campo con cui giacere."
  lmf_army.1040.a.female.tavern:0 "Cerchi una giovane serva della taverna con cui giacere."
  lmf_army.1040.b:0 "Andrò a cercare qualcuno con cui fare sparring, invece."
  lmf_army.1040.c:0 "Di certo vi sarà qualche gioco d'azzardo a cui unirsi, no?"
  lmf_army.1040.d:0 "Rivolgerò il mio appetito al cibo invece che al bere!"
  lmf_army.1040.e:0 "Una notte di eccessi è proprio ciò di cui ho bisogno!"
  lmf_army.1040.f:0 "Posso resistere alla tentazione. Meglio ritirarmi ora."

  lmf_army.1050.t:0 "Compagni d'armi"
  lmf_army.1050.march.start:0 "I giorni trascorsi marciando attraverso [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] sono stati lunghi, "
  lmf_army.1050.siege.start:0 "I giorni trascorsi ad assediare [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] sono lunghi, "
  lmf_army.1050.end:0 "e non sempre fra i soldati regna una cameratismo amichevole. Le tensioni spesso sono alte.\n\nStanotte, tuttavia, mentre mi rilasso accanto al fuoco, vengo raggiunto da [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] e la conversazione scorre facile. [Select_CString(army_friend.IsFemale,'Lei','Lui')|U] mi intrattiene con storie divertenti, placando il mio animo, e quando le fiamme si abbassano quasi dimentico del tutto dove mi trovo.\n\nCon un occhiolino, capisco che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] era ben consapevole del mio stato d'animo e ha deliberatamente trascorso la serata a intrattenermi. Un[ army_friend.GetWomanMan ] davvero fine, direi."
  lmf_army.1050.a:0 "In effetti, credo d'aver trovato un nuovo amico."
  lmf_army.1050.a.friend.tt:0 "[player.Custom('KnightCulturePluralNoTooltip')] diventano amici"
  lmf_army.1050.a.friend.desc:0 "Il tuo [player.Custom('KnightCulturePluralNoTooltipLowercase')], [champion.GetShortUIName] e [army_friend.GetShortUIName], sono diventati amici mentre erano al campo dell'esercito in [province.GetTitle.GetNameNoTierNoTooltip]."
  made_friend_at_army_camp:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] sono diventati amici mentre facevano parte dell'esercito accampato a [PROVINCE.GetNameNoTooltip]."
  lmf_army.1050.b:0 "Apprezzo i suoi sforzi, ma non c'è bisogno che vada oltre stanotte."

  lmf_army.1060.t:0 "Rivali d'armi"
  lmf_army.1060.mid:0 "e non sempre fra i soldati regna una cameratismo amichevole. Le tensioni spesso sono alte.\n\nStanotte ne ho avuto un esempio perfetto. Ho avuto diversi screzi con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] nel corso della giornata, alterchi che hanno rischiato di tramutarsi in litigi prima che serrassi i denti e me ne andassi. Più tardi, tuttavia, mentre sedevamo attorno al fuoco, ho udito [Select_CString(army_rival.IsFemale,'lei','lui')] fare commenti su di me agli altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nEra tutto mosso da "
  lmf_army.1060.revenge:0 "desiderio di vendetta, "
  lmf_army.1060.impious:0 "risentimento per quella che [Select_CString(army_rival.IsFemale,'lei','lui')] considerava la mia «empietà», "
  lmf_army.1060.pious:0 "risentimento per la mia pietà, "
  lmf_army.1060.faith:0 "odio per la mia fede, "
  lmf_army.1060.jealous:0 "gelosia, "
  lmf_army.1060.differences:0 "le nostre estreme differenze, "
  lmf_army.1060.hatred:0 "l'abituale odio che nutre per me e nulla di nuovo, "
  lmf_army.1060.end:0 "ne sono certo, ma ero ormai oltre il sopportare che [Select_CString(army_rival.IsFemale,'lei','lui')] spargesse menzogne a portata del mio udito.\n\nMi sono alzato, [Select_CString(army_rival.IsFemale,'l','l')]ho sfidat[Select_CString(army_rival.IsFemale,'a','o')], e non è passato molto prima che fossimo alle mani. Gli altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] hanno dovuto separarci, incapaci di stabilire chi avesse iniziato cosa. Anzi, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] sosteneva che fosse #EMP io#! il colpevole!"
  lmf_army.1060.a:0 "È imperdonabile!"
  lmf_army.1060.a.rival.tt:0 "[player.Custom('KnightCulturePluralNoTooltip')] diventano rivali"
  lmf_army.1060.a.rival.desc:0 "Il tuo [player.Custom('KnightCulturePluralNoTooltipLowercase')], [champion.GetShortUIName] e [army_rival.GetShortUIName], sono diventati rivali mentre erano al campo dell'esercito in [province.GetTitle.GetNameNoTierNoTooltip]."
  became_rivals_army_camp:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] sono diventati aspri rivali mentre facevano parte dell'esercito accampato a [PROVINCE.GetNameNoTooltip]."
  lmf_army.1060.b:0 "Cercherò di placar[Select_CString(army_rival.IsFemale,'la','lo')]. Rimediare come posso."
  lmf_army.1060.c:0 "È tempo di serrare i denti e andarmene. Di nuovo."

  lmf_army.1070.t:0 "Al punto d'ebollizione"
  lmf_army.1070.mid:0 "e di certo non aiuta avere [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] presente nel campo dell'esercito.\n\nIl[Select_CString(army_rival.IsFemale,'suo','suo')] atteggiamento sprezzante verso di me mi ha irritato sin dal primo giorno, e stanotte la nostra reciproca stanchezza non ha fatto che peggiorare le cose. Un commento acido dopo l'altro, e quando ci urtiamo di passaggio — opera deliberata di [Select_CString(army_rival.IsFemale,'lei','lui')], ne sono certo — ecco che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] estrae la spada e mi sfida a duello.\n\n"
  lmf_army.1070.liege:0 "Tecnicamente parlando, simili duelli non autorizzati non sono permessi nell'esercito. In quanto signore di [Select_CString(army_rival.IsFemale,'lei','lui')], potrei semplicemente decidere d'ignorare quella regola... e potrei anche mettere [Select_CString(army_rival.IsFemale,'lei','lui')] in catene per aver tentato d'aggredire il proprio signore, il che è tecnicamente tradimento, sì? Ma #EMP oh#!, quanto sarebbe dolce impartir[Select_CString(army_rival.IsFemale,'le','gli')] una lezione!"
  lmf_army.1070.commander:0 "Tecnicamente parlando, simili duelli non autorizzati non sono permessi nell'esercito. Tuttavia, in quanto [Select_CString(army_rival.IsFemale,'sua','suo')] comandante, potrei semplicemente decidere d'ignorare quella regola... #EMP oh#!, quanto sarebbe dolce impartir[Select_CString(army_rival.IsFemale,'le','gli')] una lezione!"
  lmf_army.1070.knight:0 "L'unico problema? Simili duelli non autorizzati non sono permessi nell'esercito. Potremmo finire entrambi in catene per disobbedienza... ma #EMP oh#!, quanto sarebbe dolce impartir[Select_CString(army_rival.IsFemale,'le','gli')] una lezione!"
  lmf_army.1070.a:0 "Se è un duello ciò che vuole, così sia!"
  lmf_army.1070.a.root.kill.tt:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString( duel_opponent.IsLocalPlayer, 'uccide', 'uccide' )] [army_rival.GetShortUINameNoTooltipNoFormat] nel duello"
  lmf_army.1070.a.root.kill.title:0 "[army_rival.GetShortUINameNoTooltipNoFormat] ucciso in duello"
  lmf_army.1070.a.root.kill.desc:0 "[duel_opponent.GetShortUIName|U] ha ucciso [army_rival.GetShortUIName] in un duello non autorizzato mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.a.root.kill.sanctioned.desc:0 "[duel_opponent.GetShortUIName|U] ha ucciso [army_rival.GetShortUIName] in un duello mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.a.root.win.tt:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString( duel_opponent.IsLocalPlayer, 'vince', 'vince' )] il duello"
  lmf_army.1070.a.root.win.title:0 "[army_rival.GetShortUINameNoTooltipNoFormat] ferito in duello"
  lmf_army.1070.a.root.win.desc:0 "[army_rival.GetShortUIName] è rimast[Select_CString(army_rival.IsFemale,'a','o')] ferit[Select_CString(army_rival.IsFemale,'a','o')] quando ha perso un duello non autorizzato contro [duel_opponent.GetShortUIName] mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.a.root.win.sanctioned.desc:0 "[army_rival.GetShortUIName] è rimast[Select_CString(army_rival.IsFemale,'a','o')] ferit[Select_CString(army_rival.IsFemale,'a','o')] quando ha perso un duello contro [duel_opponent.GetShortUIName] mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.a.rival.win.tt:0 "[army_rival.GetShortUINameNoTooltipNoFormat|U] vince il duello"
  lmf_army.1070.a.rival.win.title:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [AddLocalizationIf( duel_opponent.GetCharacter.IsLocalPlayer, 'are ' )]wounded in a duel"
  lmf_army.1070.a.rival.win.desc:0 "[duel_opponent.GetShortUIName|U] [Select_CString( duel_opponent.IsLocalPlayer, 'sei rimasto', 'è rimasto' )] ferit[Select_CString(duel_opponent.IsFemale,'a','o')] quando [Select_CString( duel_opponent.IsLocalPlayer, 'tu', Select_CString(duel_opponent.IsFemale,'lei','lui') )] ha perso un duello non autorizzato contro [army_rival.GetShortUIName] mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.a.rival.win.sanctioned.desc:0 "[duel_opponent.GetShortUIName|U] [Select_CString( duel_opponent.IsLocalPlayer, 'sei rimasto', 'è rimasto' )] ferit[Select_CString(duel_opponent.IsFemale,'a','o')] quando [Select_CString( duel_opponent.IsLocalPlayer, 'tu', Select_CString(duel_opponent.IsFemale,'lei','lui') )] ha perso un duello contro [army_rival.GetShortUIName] mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.a.rival.kill.tt:0 "[army_rival.GetShortUINameNoTooltipNoFormat] uccide [duel_opponent.GetShortUINameNoTooltipNoFormat] nel duello"
  lmf_army.1070.a.rival.kill.title:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U] [AddLocalizationIf( duel_opponent.GetCharacter.IsLocalPlayer, 'are ' )]killed in a duel"
  lmf_army.1070.a.rival.kill.desc:0 "[army_rival.GetShortUIName] ha ucciso [duel_opponent.GetShortUIName] in un duello non autorizzato mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.a.rival.kill.sanctioned.desc:0 "[army_rival.GetShortUIName] ha ucciso [duel_opponent.GetShortUIName] in un duello mentre l'esercito era accampato a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
  army_camp_duel_rivalry:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] è divenut[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] la nemesi di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] dopo che [CharYouSheHe(CHARACTER)] ha perso contro [CharYouHerHim(TARGET_CHARACTER)] in un duello."
  army_camp_duel_rivalry_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] è divenut[Select_CString(CHARACTER.IsFemale,'a','o')] la nemesi di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] dopo che [CharYouSheHe(TARGET_CHARACTER)] ha perso contro [CharYouHerHim(CHARACTER)] in un duello."
  lmf_army.1070.b:0 "[Select_CString(army_rival.IsFemale,'Lei','Lui')|U] osa?! Metti[Select_CString(army_rival.IsFemale,'la','lo')] in catene!"
  lmf_army.1070.b.imprison.tt:0 "[champion.GetShortUINameNoTooltipNoFormat|U] imprigiona [army_friend.GetShortUINameNoTooltipNoFormat]"
  lmf_army.1070.b.imprison.desc:0 "[champion.GetShortUIName] ha imprigionato il nostro [player.Custom('KnightCultureNoTooltipLowercase')], [army_rival.GetShortUIName], per aver sfidato [Select_CString(champion.IsFemale,'lei','lui')] a duello nel campo dell'esercito in [province.GetTitle.GetNameNoTierNoTooltip]."
  lmf_army.1070.c:0 "Me ne andrò: sarò io l'adult[Select_CString(ROOT.Char.IsFemale,'a','o')] fra noi."

  lmf_army.1080.t:0 "Amanti in armi"
  lmf_army.1080.desc:0 "Di recente ho trascorso molto tempo in compagnia di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_lover'))]. Ci alleniamo insieme, consumiamo i pasti attorno al fuoco, scherziamo e raccontiamo storie di casa. Sembrerebbe amicizia, eppure vi è anche una... #EMP tensione#! ogniqualvolta ci troviamo l'uno accanto all'altro. Credevo fosse soltanto una mia fantasia, ma di tanto in tanto colgo uno sguardo da parte di [Select_CString(army_lover.IsFemale,'lei','lui')] che mi suggerisce che anche [Select_CString(army_lover.IsFemale,'lei','lui')] la avverta.\n\nStanotte, mentre mi ritiravo nella mia tenda, eccol[Select_CString(army_lover.IsFemale,'a','o')] comparire d'improvviso. In piedi all'ingresso, senz'abiti, e con uno sguardo deciso che pareva dire che la nostra notte potesse essere appena cominciata..."
  lmf_army.1080.a:0 "Potrebbe essere l'inizio di qualcosa di speciale."
  army_camp_rendezvous:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] divennero amanti mentre prestavano servizio nell'esercito accampato a [PROVINCE.GetNameNoTooltip]."
  lmf_army.1080.b:0 "Stringer[Select_CString(army_lover.IsFemale,'la','lo')] fra le mie braccia, ma solo per stanotte."
  lmf_army.1080.c:0 "No, non accadrà."

  lmf_army.1090.t:0 "Un momento di tregua"
  lmf_army.1090.desc:0 "È arduo marciare con l'esercito giorno dopo giorno. Passi senza fine, lamentele senza fine, cibo misero e il sole implacabile che picchia sulla fronte.\n\nTalvolta, però, la compagnia degli altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] può compensare ogni cosa. Stanotte è stata una di quelle notti. Ci siamo accampati in [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] e la camaraderia era alta, la birra scorreva e gli uomini erano di umore insolitamente buono.\n\n[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_entertainer'))], in particolare, pareva avere una missione: sollevare gli animi. Quando uno dei soldati pizzicò una melodia su un liuto che aveva portato con sé, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_entertainer'))] rise e cominciò a danzare attorno al fuoco.\n\nNon potei fare a meno di ridere e unirmi ai festeggiamenti. È stata una buona notte."
  lmf_army.1090.a:0 "Da ricordare!"

  lmf_army.1100.t:0 "Le notti si fanno lunghe"
  lmf_army.1100.end:0 "e le notti sono ancor più lunghe.\n\nUna malattia ha colpito l'accampamento, costringendo la maggior parte di noi a restare confinati nelle tende quando non siamo richiesti altrove... il che andrebbe anche bene, se non fosse che c'è così poco da #EMP fare#!.\n\nLa noia ha rimpiazzato qualunque ansia potessi provare per il combattimento imminente. Persino i rari scontri d'addestramento in cui mi cimento non sono bastati a scacciare la sensazione di essere qui da un'eternità.\n\nInoltre, vedo che anche gli altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] la sentono."
  lmf_army.1100.a:0 "Non può durare in eterno..."

  lmf_army.1110.t:0 "Giorni di pioggia"
  lmf_army.1110.t.desert:0 "Le tempeste di sabbia"
  lmf_army.1110.normal:0 "e sono parsi ancora più lunghi per via del diluvio incessante.\n\nGiorno dopo giorno è passato fra venti ululanti e lenzuoli di pioggia gelida che si abbattevano sui soldati. Raramente mi sono sentit[Select_CString(ROOT.Char.IsFemale,'a','o')] più miserabil[Select_CString(ROOT.Char.IsFemale,'e','e')]... anzi, anche quando alla fine la pioggia cessò, scoprii che il freddo non lasciava le ossa."
  lmf_army.1110.desert:0 "e sono parsi ancora più lunghi per via delle costanti tempeste di sabbia.\n\nGiorno dopo giorno è passato fra venti ululanti e sabbia che si infilava in ogni parte dell'armatura. Entra in bocca, entra nelle orecchie, entra nelle tende e nel cibo... fra la sabbia e il calore accecante, il deserto mi ha lasciato arid[Select_CString(ROOT.Char.IsFemale,'a','o')] e fragile, e anche quando alla fine le tempeste cessarono quella sensazione non se ne andò."
  lmf_army.1110.end:0 "C'è una tosse che mi si è insediata in fondo ai polmoni, e pare soltanto peggiorare.\n\nHo cercato di mostrare un volto coraggioso ai soldati, ma temo di non poter resistere ancora a lungo."
  lmf_army.1110.a:0 "Chiamate il medico!"

  lmf_army.1120.t:0 "Un passo di troppo"
  lmf_army.1120.war:0 "L'esercito sta soltanto attraversando [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], e io sto pattugliando uno dei villaggi locali che abbiamo saccheggiato per rifornirci "
  lmf_army.1120.nowar:0 "L'esercito sta soltanto attraversando [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], e sono andat[Select_CString(ROOT.Char.IsFemale,'a','o')] con alcuni soldati in uno dei villaggi locali in cerca di rifornimenti "
  lmf_army.1120.end:0 "quando mi imbatto in [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_bully'))] che sta molestando uno dei locali [army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip] in mezzo alla strada.\n\nÈ chiaro che [army_bully.GetSheHe] è convint[Select_CString(army_bully.IsFemale,'a','o')] che la donna sia colpevole di qualche misfatto, o che possieda informazioni di cui abbiamo bisogno, ma è evidente — almeno ai miei occhi — che questa creatura piuttosto patetica non ha né l'una né l'altra cosa. Implora pietosamente per la sua vita, e ciò pare soltanto spingere la crudeltà di [Select_CString(army_bully.IsFemale,'lei','lui')] a nuove vette.\n\nCon tanti locali e perfino alcuni dei nostri soldati che restano lì, a fissare sgomenti la scena che si svolge, mi sento quasi costrett[Select_CString(ROOT.Char.IsFemale,'a','o')] a intervenire... sebbene [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_bully'))] non apprezzerà affatto la mia ingerenza."
  lmf_army.1120.a:0 "Non mi importa di ciò che [army_bully.GetSheHe] apprezza. Questa faccenda deve finire."
  interfered_with_army_bully:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] è intervenut[Select_CString(CHARACTER.IsFemale,'a','o')] nell'interrogatorio di un contadino locale condotto da [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]."
  interfered_with_army_bully_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] è intervenut[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] nell'interrogatorio di un contadino locale condotto da [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]."
  lmf_army.1120.b:0 "Sono affari di [Select_CString(army_bully.IsFemale,'lei','lui')] e non miei."

  lmf_army.1130.t:0 "Una cattura fortunata"
  lmf_army.1130.desc:0 "L'assedio di [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] pare già durare un'eternità, e i progressi sono lenti.\n\nQuanto è provvidenziale, dunque, che oggi i miei soldati abbiano catturato un locale che tentava di sgattaiolare oltre le nostre linee senza farsi notare. Con ogni probabilità l'avrebbero giustiziato sul posto, se non fosse che uno di loro sapeva leggere... e si è accorto che un piccolo libretto addosso a quell'uomo conteneva informazioni che potevano tornarci utili.\n\nCosì è stato preso prigioniero e condotto al mio cospetto. Dopo qualche domanda, ho appreso che quel soldato aveva ragione. Le note contenute nel libretto, destinate agli alleati del nostro nemico, racchiudono una ricchezza di dettagli preziosi sulle fortificazioni, le scorte e le debolezze della posizione nemica in [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip].\n\nQuest'uomo ed io avremo #EMP molto#! di cui parlare!"
  lmf_army.1130.a:0 "Credo che qui le cose andranno più in fretta."
  lmf_army.1130.a.title:0 "Ottenute informazioni sull'assedio"
  lmf_army.1130.a.desc:0 "[commander.GetShortUIName|U] ha ottenuto informazioni sulle fortificazioni e le scorte del nemico in [army.GetLocation.GetTitle.GetNameNoTier] da un prigioniero."

  lmf_army.1140.t:0 "Un soldato promettente"
  lmf_army.1140.desc:0 "Nei mesi trascorsi fra i soldati, ne ho notato uno che spicca sopra gli altri.\n\nQuesto [army_potential.GetWomanMan], proveniente da una piccola casa nobile [army_potential.GetCulture.GetNameNoTooltip] senza altri membri di particolare rilievo, si è dimostrato abile e desideroso di servire. Anzi, dopo che abbiamo scambiato qualche parola durante la sera, [army_potential.GetSheHe] è venut[Select_CString(army_potential.IsFemale,'a','o')] nella mia tenda e mi ha offerto giuramento di fedeltà, se avessi accettato di prender[Select_CString(army_potential.IsFemale,'la','lo')] come [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nSono intrigat[Select_CString(ROOT.Char.IsFemale,'a','o')], certo, ma per quanto [army_potential.GetSheHe] sia abile... ho davvero bisogno di un altro [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]?"
  lmf_army.1140.a:0 "Troverò posto per [Select_CString(army_potential.IsFemale,'lei','lui')] fra i miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]."
  lmf_army.1140.b:0 "No, non ho bisogno dei suoi servigi."

  lmf_army.1150.t:0 "Un incontro fortuito"
  lmf_army.1150.begin:0 "Stavo pattugliando [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] con alcuni soldati quando ci imbattemmo in ciò che dapprima credemmo un cadavere: il corpo di un[army_stranger.GetWomanMan] tra i cespugli, senza dubbio vittima di un attacco da parte dei banditi [army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]. A un esame più attento, però, scoprimmo che quell[army_stranger.GetWomanMan] non era morto dopo tutto, così feci condurre [Select_CString(army_stranger.IsFemale,'lei','lui')] all'accampamento per le cure.\n\nUna volta ristabilit[Select_CString(army_stranger.IsFemale,'a','o')], [army_stranger.GetSheHe] espresse la sua gratitudine. Appresi che si chiamava [army_stranger.GetFirstNameNoTooltip], "
  lmf_army.1150.poet:0 "un poeta che era in viaggio verso [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] quando fu assalito, "
  lmf_army.1150.monk:0 "un[army_stranger.GetWomanMan] appartenente a un ordine sacro, in viaggio da un vicino [army_stranger.GetFaith.HouseOfWorship] quando venne assalit[Select_CString(army_stranger.IsFemale,'a','o')], "
  lmf_army.1150.scholar:0 "uno studioso diretto a una lontana università quando venne assalito, "
  lmf_army.1150.pilgrim:0 "un semplice fedele [army_stranger.GetFaith.GetAdherentNameNoTooltip] in pellegrinaggio quando venne assalito, "
  lmf_army.1150.merchant:0 "un mercante in viaggio verso [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] quando fu assalito, "
  lmf_army.1150.architect:0 "un architetto in viaggio verso [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] in cerca d'impiego quando fu assalito, "
  lmf_army.1150.gallowsbait:0 "e, per quanto fosse reticent[Select_CString(army_stranger.IsFemale,'e','e')] sui suoi affari in zona, era evidente che aveva avuto una sorte infelice: assalit[Select_CString(army_stranger.IsFemale,'a','o')], "
  lmf_army.1150.end:0 "spogliat[Select_CString(army_stranger.IsFemale,'a','o')] dei suoi averi e lasciat[Select_CString(army_stranger.IsFemale,'a','o')] a morire.\n\nQuell[army_stranger.GetWomanMan] sostenne di dovermi la vita e offrì di servire come leale membro della mia corte... se, naturalmente, fossi stat[Select_CString(ROOT.Char.IsFemale,'a','o')] disposto ad accoglier[Select_CString(army_stranger.IsFemale,'la','lo')]."
  lmf_army.1150.a:0 "Sarò liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di accoglier[Select_CString(army_stranger.IsFemale,'la','lo')] al mio servizio."
  lmf_army.1150.b:0 "No, è tempo che riprenda la sua strada."

  lmf_army.1160.t:0 "Salvat[Select_CString(ROOT.Char.IsFemale,'a','o')] da uno straniero"
  lmf_army.1160.begin:0 "Stavo pattugliando non lontano dall'accampamento, in [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], quando all'improvviso io e i pochi soldati con me fummo assalit[Select_CString(ROOT.Char.IsFemale,'a','o')] da un gruppo di banditi [army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]. Fu un agguato repentino e così feroce che le cose avrebbero potuto andare molto male, se non fosse stato per l'improvvisa comparsa di uno straniero.\n\nQuell[army_stranger.GetWomanMan] sbucò dal nulla, urlando come un forsennato, e si scagliò sui banditi con la sua spada... e fra la sua abilità e la mia riuscimmo a ricacciarli.\n\nIn seguito, lo straniero si presentò come [army_stranger.GetFirstNameNoTooltip], "
  lmf_army.1160.mercenary:0 "un mercenario di queste parti, per quanto privo d'amore per [army.GetLocation.GetCounty.GetTitle.GetHolder.GetTopLiege.Custom('IT_NAM_COL3')][army.GetLocation.GetCounty.GetTitle.GetHolder.GetTopLiege.GetTitledFirstNameNoTooltip], "
  lmf_army.1160.gallowsbait:0 "benché [army_stranger.GetSheHe] dicesse ben poco del suo misterioso passato, "
  lmf_army.1160.end:0 "che per fortuna si trovava nei paraggi. Condividemmo un bicchiere e andammo piuttosto d'accordo... anzi, sospetto che [army_stranger.GetSheHe] potrebbe accettare un invito a unirsi a me, se volessi porgerglielo..."
  lmf_army.1160.a:0 "Sarò liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di avere un altro amico a corte."
  saved_by_army_stranger:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] strinse amicizia con [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] dopo che [CharYouSheHe(TARGET_CHARACTER)] salvò [CharYouSheHe(CHARACTER)] durante un'imboscata di banditi."
  saved_by_army_stranger_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] strinse amicizia con [CHARACTER.GetShortUINameNoTooltipNoFormat] dopo che [CharYouSheHe(CHARACTER)] salvò [CharYouSheHe(TARGET_CHARACTER)] durante un'imboscata di banditi."
  lmf_army.1160.b:0 "Chiederò che serva alla mia corte."
  lmf_army.1160.c:0 "Lo ringrazio per l'aiuto e proseguo per la mia strada."

  lmf_army.1170.t:0 "Un problema di rifornimenti"
  lmf_army.1170.desc:0 "Man mano che l'esercito avanza in [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], le scorte si fanno esigue.\n\nI nostri esploratori hanno riferito dell'esistenza di grandi fattorie e tenute nei dintorni. Potrei inviare truppe a saccheggiarle per ottenere ciò che ci serve, ma una volta che avrò scatenato gli uomini su un simile incarico... be', è quasi impossibile tenerli a freno. Innocenti verranno uccisi, edifici dati alle fiamme e atrocità commesse, e tutto ricadrà sulle mie spalle.\n\nD'altro canto, se #EMP non#! do l'ordine, è possibile che molti dei miei soldati muoiano di fame o peggio."
  lmf_army.1170.a:0 "La sofferenza dei [army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip] non è affar mio."
  lmf_army.1170.b:0 "No, ci arrangeremo con ciò che abbiamo."

  lmf_army.1180.t:0 "Perso e ritrovato"
  lmf_army.1180.desc:0 "Mi unii ad alcuni cavalieri per una piccola caccia dopo che ci accampammo a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] e — per quanto mi ripugni ammetterlo — mi separai da loro e mi persi rapidamente in un territorio a me ignoto.\n\nPer mia fortuna, incontrai sulla strada un giovane del luogo dall'aria amichevole. [army_stranger.GetSheHe|U] si presentò come [army_stranger.GetFirstNameNoTooltip], una guida per mercanti in viaggio attraverso [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], e riuscì a ricondurmi rapidamente all'accampamento.\n\nLungo il cammino parlammo a lungo di casa mia... e capivo che [army_stranger.GetSheHe] bramava andarsene.\n\nIn verità, dai suoi sorrisi e dal suo evidente interesse, era chiaro che desiderava anche me."
  lmf_army.1180.a:0 "Passeremo una notte insieme, ma poi devo proseguire."
  lmf_army.1180.b:0 "[army_stranger.GetSheHe|U] può venire con me a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], come mio nuovo amante."
  army_camp_lost_guide:0 "Quando [CHARACTER.GetShortUINameNoTooltipNoFormat] si smarrì in [PROVINCE.GetNameNoTooltip], [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] guidò [CharYouHerHim(CHARACTER)] fino all'accampamento e lungo la via i due si innamorarono."
  army_camp_lost_guide_corresponding:0 "Quando [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] si smarrì in [PROVINCE.GetNameNoTooltip], [CHARACTER.GetShortUINameNoTooltipNoFormat] guidò [CharYouHerHim(TARGET_CHARACTER)] fino all'accampamento e lungo la via i due si innamorarono."
  lmf_army.1180.c:0 "Ringrazierò per l'aiuto, ma nulla di più."

  lmf_army.1190.t:0 "Il medico [candidate.GetCulture.GetNameNoTooltip]"
  lmf_army.1190.t.maester:0 "Il maestro d'aiuto"
  lmf_army.1190.start:0 "Ho notato che, di recente, il lavoro nella tenda del medico era di qualità eccellente e, quando andai a congratularmi con il dottore, scoprii che in realtà era opera di "
  lmf_army.1190.maester:0 "un maestro.\n\nL'uomo si presentò come [candidate.GetFirstNameNoTooltip] e, quando espressi sorpresa nel trovare un maestro intento a curare i miei soldati, annuì con amarezza e disse che, fino a poco tempo fa, aveva servito [enemy.Custom('IT_NAM_COL3')][enemy.GetTitledFirstNameNoTooltip]. Poi i due ebbero un dissidio e lui decise di aiutare i nemici del suo ex signore.\n\nSgranai gli occhi a un commento tanto interessante, ma [candidate.GetFirstNameNoTooltip] si limitò a scrollare le spalle.\n\n"
  lmf_army.1190.disgraced:0 "un maestro.\n\nL'uomo si presentò come [candidate.GetFirstNameNoTooltip] e, quando espressi sorpresa nel trovare un maestro intento a curare i miei soldati, il suo volto si rabbuiò. Mi spiegò di non essere più un maestro, per via delle macchinazioni di [enemy.Custom('IT_NAM_COL3')][enemy.GetTitledFirstNameNoTooltip], che un tempo aveva servito. Lo incalzai con delicatezza per saperne di più, ma non era sorprendentemente desideroso di parlare della sua disgrazia... qualunque cosa fosse.\n\n"
  lmf_army.1190.physician:0 "un volontario del luogo.\n\nL'uomo si presentò come [candidate.GetFirstNameNoTooltip] e, quando accennai che il suo lavoro sarebbe stato più adatto a una corte che non a una tenda di guerra, [candidate.GetSheHe] sorrise e spiegò che aveva davvero servito [enemy.Custom('IT_NAM_COL3')][enemy.GetTitledFirstNameNoTooltip] finché i due ebbero un dissidio... e pare che non vi sia più alcun affetto tra loro.\n\n"
  lmf_army.1190.end:0 "Per ora, disse [candidate.GetSheHe], è content[Select_CString(candidate.IsFemale,'a','o')] di lavorare dove le sue abilità sono più necessarie."
  lmf_army.1190.a:0 "Bene: qui, dei suoi servigi, ne abbiamo certo bisogno."
  lmf_army.1190.b:0 "È un[candidate.GetWomanMan] che mi tornerebbe utile a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]!"
  lmf_army.1190.c:0 "Lo inviterò a unirsi a me a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Le sue capacità potrebbero rivelarsi utili!"

  lmf_army.1200.t:0 "Il regime d'addestramento"
  lmf_army.1200.desc:0 "Al momento, nel mio esercito regna la quiete, benché sappia che potrebbe mutare in un istante.\n\nEppure pare che molti soldati non lo comprendano. Se ne stanno in ozio, si lamentano dei compiti assegnati e sono svogliati ogni volta che i [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] chiamano all'addestramento. Alcuni dei miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] suggeriscono di inasprire la disciplina, imponendo esercizi ancor più duri affinché siano pronti. Altri dicono che potremmo allentare la presa... lasciarli riposare e conservare le forze, senza angustiarci troppo per la disciplina.\n\nDevo fare una delle due cose?"
  lmf_army.1200.a:0 "Allenateli duramente. Devono essere pronti."
  lmf_army.1200.b:0 "Lasciate che conservino le forze per quando serviranno."
  lmf_army.1200.c:0 "Non cambiate nulla. Va bene così."

  lmf_army.1210.t:0 "Un cavaliere smarrito"
  lmf_army.1210.desc:0 "Ero in pattuglia con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] quando il tempo volse al peggio... e poi, all'improvviso, [army_friend.GetSheHe] scomparve. Cercai e cercai, ma non riuscii a trovar[Select_CString(army_friend.IsFemale,'la','lo')] da nessuna parte.\n\n[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] è territorio nemico, dunque se continuo a cercare [Select_CString(army_friend.IsFemale,'lei','lui')] potrei finire nei guai anch'io. Se invece mi precipito all'accampamento per organizzare una squadra di ricerca, le probabilità di ritrovar[Select_CString(army_friend.IsFemale,'la','lo')] vivo e in salute si assottigliano.\n\nDevo decidere in fretta."
  lmf_army.1210.a:0 "Lo cercherò io stesso."
  lmf_army.1210.b:0 "Tornerò di corsa all'accampamento e organizzerò una squadra di ricerca."
  lmf_army.1210.c:0 "[army_friend.GetSheHe|U] è un[army_friend.GetWomanMan] adult[Select_CString(army_friend.IsFemale,'a','o')]. Saprà badare a sé stess[Select_CString(army_friend.IsFemale,'a','o')]."
  lmf_army.1210.wounded.tt:0 "Non riesci a trovar[Select_CString(army_friend.IsFemale,'la','lo')] e incappi nel nemico"
  lmf_army.1210.fail.tt:0 "Il tentativo di trovar[Select_CString(army_friend.IsFemale,'la','lo')] fallisce"
  lmf_army.1210.succeed.tt:0 "[army_friend.GetSheHe|U] viene ritrovat[Select_CString(army_friend.IsFemale,'a','o')]!"
  lmf_army.1210.knight.lost.title:0 "[army_friend.Custom('IT_NAM_COL3')][army_friend.GetTitledFirstNameNoTooltip] si è smarrit[Select_CString(army_friend.IsFemale,'a','o')] in [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
  lmf_army.1210.knight.lost.desc:0 "[army_friend.Custom('IT_NAM_COL3')][army_friend.GetTitledFirstName] si è smarrit[Select_CString(army_friend.IsFemale,'a','o')] durante una pattuglia in [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] e non è chiaro che cosa sia accaduto a [Select_CString(army_friend.IsFemale,'lei','lui')]."
  lmf_army.1210.knight.found.title:0 "[army_friend.Custom('IT_NAM_COL3')][army_friend.GetTitledFirstNameNoTooltip] è stat[Select_CString(army_friend.IsFemale,'a','o')] ritrovat[Select_CString(army_friend.IsFemale,'a','o')]!"
  lmf_army.1210.knight.found.desc:0 "Dopo una lunga ricerca, [army_friend.Custom('IT_NAM_COL3')][army_friend.GetTitledFirstName] è stat[Select_CString(army_friend.IsFemale,'a','o')] ritrovat[Select_CString(army_friend.IsFemale,'a','o')] in [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], ferit[Select_CString(army_friend.IsFemale,'a','o')] e grat[Select_CString(army_friend.IsFemale,'a','o')] per il salvataggio."
  lmf_army.1211.knight.newliege.desc:0 "Dopo una lunga ricerca, [army_friend.Custom('IT_NAM_COL3')][army_friend.GetTitledFirstName] è stat[Select_CString(army_friend.IsFemale,'a','o')] ritrovat[Select_CString(army_friend.IsFemale,'a','o')] alla corte di [army_friend.GetLiege.GetShortUIName], che si è pres[Select_CString(army_friend.GetLiege.IsFemale,'a','o')] cura di [Select_CString(army_friend.IsFemale,'lei','lui')] dopo la sua prova, e dove ora [army_friend.GetSheHe] preferisce restare."
  searched_for_me_after_lost:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] si mostrò grat[Select_CString(CHARACTER.IsFemale,'a','o')] quando [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] cercò [CharYouHerHim(CHARACTER)] dopo che [CharYouSheHe(CHARACTER)] si smarrì durante una pattuglia."
  searched_for_me_after_lost_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] si mostrò grat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] quando [CHARACTER.GetShortUINameNoTooltipNoFormat] cercò [CharYouHerHim(TARGET_CHARACTER)] dopo che [CharYouSheHe(TARGET_CHARACTER)] si smarrì durante una pattuglia."
  lmf_army.1211.knight.found.desc:0 "Dopo essere stat[Select_CString(army_friend.IsFemale,'a','o')] smarrit[Select_CString(army_friend.IsFemale,'a','o')] per settimane in [lost_in.GetTitle.GetNameNoTierNoTooltip], [army_friend.Custom('IT_NAM_COL3')][army_friend.GetTitledFirstName] è stat[Select_CString(army_friend.IsFemale,'a','o')] finalmente ritrovat[Select_CString(army_friend.IsFemale,'a','o')] ed è tornat[Select_CString(army_friend.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."

  lmf_army.1220.t.commander:0 "Comandante in addestramento"
  lmf_army.1220.t.knight:0 "Cavaliere in addestramento"
  lmf_army.1220.desc:0 "Nelle ultime settimane ho trascorso molto tempo ad allenarmi con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]... che devo ammettere essere un[army_friend.GetWomanMan] di spada migliore di me.\n\nAll'inizio non credevo ci fosse molto che potesse insegnarmi, ma col passare del tempo ho scoperto di aver imparato davvero parecchio. È stat[Select_CString(army_friend.IsFemale,'a','o')] un insegnante eccellente, oltre che una piacevole distrazione dalla monotonia della vita d'accampamento."
  lmf_army.1230.desc:0 "Nelle ultime settimane ho trascorso parecchio tempo con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]... non necessariamente in amicizia, bensì discutendo di strategia e delle questioni pratiche necessarie a mantenere una forza armata di tali dimensioni.\n\nAll'inizio non avevo grande interesse. Se volevo capire come funzionasse un esercito, in fondo, mi bastava guardarmi attorno. Ma [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] possedeva un acume sull'argomento che non avrei mai attribuito a [Select_CString(army_friend.IsFemale,'lei','lui')], e devo ammettere che è stata una vera istruzione."
  lmf_army.1240.desc:0 "Nelle ultime settimane mi sono addestrat[Select_CString(ROOT.Char.IsFemale,'a','o')] sotto la guida di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))], tentando di apprendere l'arte della scherma fine.\n\nA dirla tutta, non era mia intenzione all'inizio. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] mi si avvicinò mentre mi esercitavo nel combattimento e fece qualche commento sulle mie capacità... sospetto fossero suggerimenti, ma io me ne offesi.\n\nDopo tre scontri consecutivi in cui fui sconfitto, ammisi che forse [army_friend.GetSheHe] aveva davvero qualcosa da insegnarmi, e il processo è stato più piacevole di quanto io voglia riconoscere."
  lmf_army.1220.a:0 "Potrebbe tornare utile."
  lmf_army.1220.a.improves.tt:0 "@knight_icon! [player.Custom('KnightCultureNoTooltip')] Migliora"
  lmf_army.1220.a.prowess.desc:0 "Il tuo [player.Custom('KnightCultureNoTooltipLowercase')], [champion.GetShortUIName], ha #P aumentato#! la sua [prowess|E] di [prowess_i] 1 dopo essersi addestrat[Select_CString(champion.IsFemale,'a','o')] sotto la guida di [army_friend.GetShortUIName]."
  lmf_army.1230.a.martial.desc:0 "Il tuo [player.Custom('KnightCultureNoTooltipLowercase')], [champion.GetShortUIName], ha #P aumentato#! la sua [martial|E] di [martial_i] 1 dopo essersi addestrat[Select_CString(champion.IsFemale,'a','o')] sotto la guida di [army_friend.GetShortUIName]."
  lmf_army.1240.a.blademaster.desc:0 "Il tuo [player.Custom('KnightCultureNoTooltipLowercase')], [champion.GetShortUIName], ha ottenuto il tratto [GetTrait('lifestyle_blademaster').GetName( GetNullCharacter )] dopo essersi addestrat[Select_CString(champion.IsFemale,'a','o')] sotto la guida di [army_friend.GetShortUIName]."

  lmf_army.1250.t: "L'Occhio di un Soldato"
  lmf_army.1250.mid: "e devo ammettere che la tensione, a poco a poco, mi sta logorando. Stanotte abbiamo perlopiù bevuto in silenzio attorno al fuoco.\n\nEppure, c'era un[army_lover.Custom('DE_PRO_PER_S_3P_N')] [army_lover.GetWomanMan] che continuava ad attirare il mio sguardo. [Select_CString(army_lover.IsFemale,'Lei','Lui')] era uno dei semplici soldati, "
  lmf_army.1250.male: "ma avvenente e, a quanto pare, assai più abile della maggior parte dei suoi pari. "
  lmf_army.1250.female: "ma di volto gentile e, a quanto pare, assai più abile della maggior parte dei suoi pari maschi. "
  lmf_army.1250.end: "Non credo che i nostri cammini si fossero mai incrociati prima, eppure [Select_CString(army_lover.IsFemale,'lei','lui')] mi pareva stranamente familiare.\n\nPiù tardi, incrociai lo stesso [army_lover.GetWomanMan] nei pressi della mia tenda. [Select_CString(army_lover.IsFemale,'Lei','Lui')] si presentò come [Select_CString(army_lover.IsFemale,'se stessa','se stesso')] con il nome di [army_lover.GetFirstNameNoTooltip]... e capii che, se mai lo invitassi dentro, [Select_CString(army_lover.IsFemale,'lei','lui')] accetterebbe senza esitare.\n\nLo ammetto: sono terribilmente tentat[Select_CString(ROOT.Char.IsFemale,'a','o')]."
  lmf_army.1250.a: "Perché no? Lo invito dentro per la notte."
  army_camp_caught_eye: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] un soldato che ha attirato il tuo sguardo quando [CharYouThey(TARGET_CHARACTER)] eravate entrambi all'accampamento dell'esercito a [PROVINCE.GetNameNoTooltip]."
  army_camp_caught_eye_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] un soldato che ha attirato [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] il tuo sguardo quando [CharYouThey(CHARACTER)] eravate entrambi all'accampamento dell'esercito a [PROVINCE.GetNameNoTooltip]."
  lmf_army.1250.b: "In verità, questo [army_lover.Custom('GetLassLad')] merita un posto stabile nella mia corte."
  lmf_army.1250.c: "No, non è affatto una buona idea."

  lmf_army.1260.t: "Colt[Select_CString(ROOT.Char.IsFemale,'a','o')] alla Sorgente"
  lmf_army.1260.begin: "Marciando con l'esercito, vi sono ben poche occasioni di lavarsi.\n\nCosì, quando ci accampammo a [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] e uno dei locali fece cenno a "
  lmf_army.1260.oasis: "un'oasi con una sorgente limpida nei paraggi, "
  lmf_army.1260.spring: "una sorgente naturale nei paraggi, "
  lmf_army.1260.mid: "colsi al volo l'occasione. Non fu facile trovarla, ma ci riuscii, e tirai un sospiro di sollievo nello scoprirla quasi del tutto abbandonata. Quando emersi dall'acqua non molto tempo dopo, tuttavia, fui scosso nel vedere un[army_stranger.Custom('DE_PRO_PER_S_3P_N')] [army_stranger.GetWomanMan] poco distante, che mi osservava con interesse.\n\nNotata la mia sorpresa, [Select_CString(army_stranger.IsFemale,'lei','lui')] si scusò e si presentò come [Select_CString(army_stranger.IsFemale,'se stessa','se stesso')] col nome di [army_stranger.GetFirstNameNoTooltip], "
  lmf_army.1260.septon.female: "una [army_stranger.GetFaith.PriestFemale] di una [army_stranger.GetFaith.HouseOfWorship] non lontano da qui.\n\n"
  lmf_army.1260.septon.male: "un [army_stranger.GetFaith.PriestMale] di una [army_stranger.GetFaith.HouseOfWorship] non lontano da qui.\n\n"
  lmf_army.1260.devoted.female: "una [army_stranger.GetFaith.DevoteeFemale] di una [army_stranger.GetFaith.HouseOfWorship] non lontano da qui.\n\n"
  lmf_army.1260.devoted.male: "un [army_stranger.GetFaith.DevoteeMale] di una [army_stranger.GetFaith.HouseOfWorship] non lontano da qui.\n\n"
  lmf_army.1260.peasant: "di un villaggio non lontano da qui.\n\n"
  lmf_army.1260.end: "[Select_CString(army_stranger.IsFemale,'Lei','Lui')] mi disse che si credeva che la sorgente avesse proprietà curative, ecco perché era lì; eppure, dalle [Select_CString(army_stranger.IsFemale,'sue','suoi')] occhiate capii che ormai [Select_CString(army_stranger.IsFemale,'lei','lui')] era interessat[Select_CString(army_stranger.IsFemale,'a','o')] a tutt'altro..."
  lmf_army.1260.a: "Lo invito a raggiungermi nell'acqua."
  lmf_army.1260.b: "Raccolgo i miei abiti e me ne vado in fretta, per prudenza."

  lmf_birth.1001.t: "La Vergogna del[Select_CString(relative.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('relative'))|U]"
  lmf_birth.1001.opening: "[spymaster.Custom('IT_NAM_COL3')][spymaster.GetTitledFirstNameNoTooltip] è giunt[Select_CString(spymaster.IsFemale,'a','o')] da me recando notizie inquietanti: il[Select_CString(relative.IsFemale,'la mia',' mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstName], ha mostrato segni che inducono [spymaster.Custom('DE_PRO_PER_S_3P_A')] a credere che porti in grembo un figlio! "
  lmf_birth.1001.know: "[spymaster.Custom('IT_NAM_COL3')][spymaster.GetTitledFirstNameNoTooltip] sospetta con forza che il padre sia il[Select_CString(suspected_father.IsFemale,'la mia',' mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('suspected_father'))], [suspected_father.Custom('IT_NAM_COL3')][suspected_father.GetTitledFirstName], ma non v'è modo di esserne certi senza interrogare il[Select_CString(relative.IsFemale,'la mia',' mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] e trascinare la faccenda alla luce del giorno.\n\n"
  lmf_birth.1001.secret: "[spymaster.Custom('IT_NAM_COL3')][spymaster.GetTitledFirstNameNoTooltip] non ha ancora idea di chi possa essere il padre, ma interrogare il[Select_CString(relative.IsFemale,'la mia',' mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] renderebbe subito pubblica l'intera faccenda.\n\n"
  lmf_birth.1001.convent: "Eppure, vi è un'opzione. Potremmo mandare [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstNameNoTooltip] in ritiro finché il bambino non sarà nat[Select_CString(ROOT.Char.IsFemale,'o','o')], in una piccola tenuta di campagna ben lontana dagli sguardi indiscreti della corte. Nessuno deve sapere ciò che è accaduto, né chi sia stata la vera madre del bambino... se davvero sopravviverà. La reputazione di [relative.GetTitledFirstNamePossessiveNoTooltip], così come la nostra, resterebbe al sicuro."
  lmf_birth.1001.end: "Sfortunatamente, non vi è alcun luogo adatto dove mandare [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstNameNoTooltip] in ritiro. Se resterà a corte, prima o poi tutti lo sapranno."
  lmf_birth.1001.a: "Mandala in ritiro — questo non è mai accaduto."
  lmf_birth.1001.b: "Bandiscila immediatamente!"
  lmf_birth.1001.c: "Affronteremo le conseguenze della sua indiscrezione."
  lmf_birth.1001.d: "[suspected_father.Custom('IT_NAM_COL3')][suspected_father.GetTitledFirstNameNoTooltip] farà subito la cosa giusta... altrimenti."

  lmf_birth.1003.t: "Tristi Notizie"
  lmf_birth.1003.alive: "Ci giungono cattive nuove da [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. Il[Select_CString(relative.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstNameNoTooltip], è mort[Select_CString(relative.IsFemale,'a','o')] dando alla luce... un bambino che vive e pare cavarsela abbastanza. Ci assicurano che le sue attendenti fecero tutto il possibile, ma fu inutile. [relative.GetFirstNameNoTooltip] ebbe appena il tempo di stringere il[Select_CString(child.IsFemale,'a','o')] [child.GetDaughterSon] fra le braccia e chiamare [Select_CString(child.IsFemale,'lei','lui')] '[child.GetFirstNameNoTooltip]' prima di scivolare nell'incoscienza e non riprendersi mai più.\n\nResta ora da decidere che fare del bambino, giacché la faccenda è compiuta."
  lmf_birth.1003.dead: "Ci giungono cattive nuove da [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstNameNoTooltip] è mort[Select_CString(relative.IsFemale,'a','o')] di parto. Ci assicurano che le sue attendenti fecero tutto il possibile, ma fu inutile. Sia [Select_CString(relative.IsFemale,'lei','lui')] sia il bambino non sono più fra noi."
  lmf_birth.1003.a: "Non voglio mai più vedere né sentir parlare del bambino."
  lmf_birth.1003.a.tt: "Il bastardo di [relative.GetTitledFirstNamePossessiveNoTooltip] svanirà nel nulla"
  lmf_birth.1003.b: "Ormai non ha senso nasconderlo."
  lmf_birth.1003.b.tt: "Il bastardo di [relative.GetTitledFirstNamePossessiveNoTooltip] verrà condotto alla tua corte per essere allevat[Select_CString(ROOT.Char.IsFemale,'o','o')]"
  lmf_birth.1003.c: "[ROOT.Char.GetFaith.PantheonTerm2] vegli su entrambi."

  lmf_birth.1004.t: "È Fatt[Select_CString(ROOT.Char.IsFemale,'a','o')]"
  lmf_birth.1004.desc: "Ci giungono notizie da [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstNameNoTooltip] ha partorito e l'opera è compiuta, come se l'intero scandalo non fosse mai accaduto. Dobbiamo richiamare a casa il[Select_CString(relative.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))]?"
  lmf_birth.1004.a: "Certamente! Mettiamo questa faccenda a tacere."
  lmf_birth.1004.b: "Che resti dov'è. Non mi importa."

  lmf_birth.1006.t: "Ciò che fu Perduto"
  lmf_birth.1006.opening: "Sto viaggiando a [ROOT.Char.GetCurrentLocation.GetName] quando scorgo, dalla mia carrozza, un giovane [stray_bastard.GetWomanMan] che passa per strada. Per il resto insignificante, eppure vi è qualcosa di sinistramente familiare in [stray_bastard.Custom('DE_PRO_PER_S_3P_A')]... tanto che, più tardi, ricordo l'incontro e chiedo che [Select_CString(stray_bastard.IsFemale,'lei','lui')] venga rintracciat[Select_CString(stray_bastard.IsFemale,'a','o')].\n\n"
  lmf_birth.1006.mother: "La verità supera ogni cosa che avrei potuto immaginare. Pare che quel giovane [stray_bastard.GetWomanMan] non sia altri che il[Select_CString(stray_bastard.IsFemale,'a','o')] [stray_bastard.Custom('GetDaughterSon')] che partorii molti anni fa quando fui mandat[Select_CString(ROOT.Char.IsFemale,'a','o')] in ritiro. Lo credevo perdut[Select_CString(stray_bastard.IsFemale,'a','o')], perfino mort[Select_CString(stray_bastard.IsFemale,'a','o')], e invece eccol[Select_CString(stray_bastard.IsFemale,'a','o')] qui! Forse è soltanto qualcuno che pretende d'esser quel bambino, ma [Select_CString(stray_bastard.IsFemale,'lei','lui')] non mi ha mai cercat[Select_CString(stray_bastard.IsFemale,'a','o')] per chiedermi nulla... e chi altri conoscerebbe ciò che accadde?\n\n"
  lmf_birth.1006.family: "La verità supera ogni cosa che avrei potuto immaginare. Pare che quel giovane [stray_bastard.GetWomanMan] non sia altri che il figlio del[Select_CString(relative.IsFemale,'la mia',' mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstNameNoTooltip], nato in segreto molti anni fa quando [Select_CString(relative.IsFemale,'lei','lui')] fu mandat[Select_CString(relative.IsFemale,'a','o')] in ritiro. Forse è soltanto qualcuno che pretende d'esser quel bambino, ma [Select_CString(stray_bastard.IsFemale,'lei','lui')] non ha mai cercato la propria famiglia per chiedere alcunché... e chi altri conoscerebbe ciò che accadde?\n\n"
  lmf_birth.1006.other: "Ciò che i miei servitori mi riferirono in seguito andò ben oltre ogni cosa che avrei potuto immaginare. Pare che quel giovane [stray_bastard.GetWomanMan] non sia altri che il[Select_CString(stray_bastard.IsFemale,'a','o')] [stray_bastard.Custom('GetDaughterSon')] di [relative.GetGetFullName], nato molti anni fa quando [Select_CString(relative.IsFemale,'lei','lui')] fu mandat[Select_CString(relative.IsFemale,'a','o')] in ritiro a [birthplace.GetNameNoTooltip]. Forse è soltanto qualcuno che pretende d'esser quel bambino, ma [Select_CString(stray_bastard.IsFemale,'lei','lui')] non ha mai cercato la propria famiglia per chiedere alcunché... e chi altri conoscerebbe ciò che accadde? Fu un segreto vergognoso, custodito nell'ombra.\n\n"
  lmf_birth.1006.knight: "Quel giovane [stray_bastard.GetWomanMan] è divenut[Select_CString(stray_bastard.IsFemale,'a','o')] un promettente [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] al servizio di un lord di poco conto qui a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], e possiede abilità tali da essersi guadagnat[Select_CString(stray_bastard.IsFemale,'a','o')] una piccola fama tutta [Select_CString(stray_bastard.IsFemale,'sua','sua')]. "
  lmf_birth.1006.physician: "Quel giovane [stray_bastard.GetWomanMan] lavora da alcuni anni come promettente medico qui a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], e possiede abilità tali da essersi guadagnat[Select_CString(stray_bastard.IsFemale,'a','o')] una piccola fama tutta [Select_CString(stray_bastard.IsFemale,'sua','sua')]. "
  lmf_birth.1006.monk: "Pare che il giovane abbia preso i voti e sia divenuto un [stray_bastard.GetFaith.DevoteeMale]... e di non poca dottrina e virtù, secondo tutto ciò che abbiamo udito. Un uomo [stray_bastard.GetFaith.GetAdherentNameNoTooltip] di non piccolo valore, nonostante l'età. "
  lmf_birth.1006.nun: "Pare che la giovane abbia preso i voti e sia divenuta una [stray_bastard.GetFaith.DevoteeFemale]... e di non poca dottrina e virtù, secondo tutto ciò che abbiamo udito. Una donna [stray_bastard.GetFaith.GetAdherentNameNoTooltip] di non piccolo valore, nonostante l'età. "
  lmf_birth.1006.rogue: "Quel giovane [stray_bastard.GetWomanMan] gode di una reputazione piuttosto losca. Qui, a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], [Select_CString(stray_bastard.IsFemale,'lei','lui')] è not[Select_CString(stray_bastard.IsFemale,'a','o')] come chi sa far accadere le cose. Astut[Select_CString(stray_bastard.IsFemale,'a','o')] e pien[Select_CString(stray_bastard.IsFemale,'a','o')] d'ingegno, dicono; ma senza guida, pare probabile che prima o poi [Select_CString(stray_bastard.IsFemale,'lei','lui')] finisca dalla parte sbagliata della legge. "
  lmf_birth.1006.beauty: "La giovane lavora nella casa di un lord di poco conto qui a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], e ha già raccolto una fama per la bellezza e per i modi eleganti. Pare quasi certo che, non passerà molto, e attirerà l'attenzione di circoli più alti. "
  lmf_birth.1006.end: "Benché [Select_CString(stray_bastard.IsFemale,'lei','lui')] non abbia mai cercato di trarre vantaggio dalla propria nascita, forse potrei trovare un posto per [stray_bastard.Custom('DE_PRO_PER_S_3P_A')] nella mia corte. Potremmo anche lasciar[Select_CString(stray_bastard.IsFemale,'la','lo')] al[Select_CString(stray_bastard.IsFemale,'la','lo')] [Select_CString(stray_bastard.IsFemale,'suo','suo')] destino; ma certo, col tempo, le voci sulla [Select_CString(stray_bastard.IsFemale,'sua','sua')] esistenza e sulle [Select_CString(stray_bastard.IsFemale,'sue','sue')] origini giungeranno ad altre orecchie."
  lmf_birth.1006.a: "Troverò un posto per [stray_bastard.Custom('DE_PRO_PER_S_3P_A')] nella mia corte."
  lmf_birth.1006.b: "Che il bastardo resti nell'oscurità. Non mi importa."
  lmf_birth.1006.c: "[Select_CString(stray_bastard.IsFemale,'Lei','Lui')] avrebbe dovuto morire molto tempo fa. Rimediamo a quell'errore."

  lmf_birth.1007.t: "È Fatt[Select_CString(ROOT.Char.IsFemale,'a','o')]"
  lmf_birth.1007.desc: "Ci giungono notizie da [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. Il bambino non è giunt[Select_CString(child.IsFemale,'a','o')] a termine, ma [relative.Custom('IT_NAM_COL3')][relative.GetTitledFirstNameNoTooltip] pare altrimenti illes[Select_CString(relative.IsFemale,'a','o')]. A dirla tutta, è come se l'intero scandalo non fosse mai accaduto. Dobbiamo richiamare a casa il[Select_CString(relative.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))]?"

  lmf_birth.1008.t: "Scopert[Select_CString(ROOT.Char.IsFemale,'a','o')]!"
  lmf_birth.1008.desc.start: "Da giorni non avevo notizie del mio amore e cominciavo a preoccuparmi. Si era forse già stancat[Select_CString(relative.IsFemale,'a','o')] di me?\n\nPoi mi fu rivelata la verità: [relative.GetFirstNameNoTooltip] era stat[Select_CString(relative.IsFemale,'a','o')] portat[Select_CString(relative.IsFemale,'a','o')] via in gran fretta dal[Select_CString(relative_liege.IsFemale,'la sua',' suo')] [relative.Custom2('LMF_RelationToMeShort', relative_liege )] verso una piccola tenuta in un angolo desolato di [convent.GetNameNoTooltip], dove veniva tenut[Select_CString(relative.IsFemale,'a','o')] in ritiro. Perché? Perché [Select_CString(relative_liege.IsFemale,'lei','lui')] ha scoperto che [relative.GetFirstNameNoTooltip] portava in grembo un figlio. MIO figlio.\n\nÈ chiaro che [relative_liege.Custom('IT_NAM_COL3')][relative_liege.GetTitledFirstNameNoTooltip] preferisce che il[Select_CString(relative.IsFemale,'la sua',' suo')] [relative_liege.Custom2('LMF_RelationToMeShort', relative )] non abbia più alcun contatto con me,"
  lmf_birth.1008.desc.secret: " ammesso che [Select_CString(relative_liege.IsFemale,'lei','lui')] sappia che io sono il padre,"
  lmf_birth.1008.desc.end: " ma quanto a ciò che desidera [relative.GetFirstNameNoTooltip]? Non ne ho idea. Di certo non può volere questo!"
  lmf_birth.1008.a: "Non posso farci nulla, purtroppo."
  lmf_birth.1008.b: "Portala qui. Non la lascerò a [convent.GetNameNoTooltip]."
  lmf_birth.1008.c: "La salverò e la sposerò, con o senza il permesso del[Select_CString(relative_liege.IsFemale,'la sua',' suo')] [relative.Custom2('LMF_RelationToMePossessive', relative_liege )]!"
  rival_took_secluded_family: "[TARGET_CHARACTER.GetShortUIName|U] ha rapito [CHARACTER.GetShortUINamePossessiveNoTooltip] [CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )] mentre era in ritiro."
  rival_took_secluded_family_corresponding: "[CHARACTER.GetShortUIName|U] ha rapito [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip] [TARGET_CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )] mentre era in ritiro."

  lmf_birth.1009.t: "Portat[Select_CString(ROOT.Char.IsFemale,'a','o')] Via"
  lmf_birth.1009.desc.start: "Le notizie giunsero di buon mattino.\n\nNon appena [relative.GetFirstNameNoTooltip] fu sistemat[Select_CString(relative.IsFemale,'a','o')] nella tenuta remota di [convent.GetNameNoTooltip], comparvero soldati per portar[Select_CString(relative.IsFemale,'la','lo')] via e scortar[Select_CString(relative.IsFemale,'la','lo')] a [baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Come [baby_father.Custom('IT_NAM_COL3')][baby_father.GetTitledFirstNameNoTooltip] abbia scoperto dove l'avevo mandat[Select_CString(relative.IsFemale,'a','o')], non lo so; ma si è rivelato essere l'amante di [relative.GetFirstNamePossessiveNoTooltip] e il padre del figlio che porta in grembo.\n\n"
  lmf_birth.1009.desc.elope: "Mi è stato detto che i due si sono sposati non appena giunti a [baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Per quanto ciò ci risparmi l'imbarazzo di un bastardo, resta pur sempre una fuga d'amore. Tutti sapranno che è accaduta senza che io ne fossi al corrente o avessi dato consenso!"
  lmf_birth.1009.desc.abduct: "Ora i due se ne stanno rintanat[Select_CString(relative.IsFemale,'i','i')] entro il [baby_father.Custom('FortifiedBuilding')] di [baby_father.GetTitledFirstNamePossessiveNoTooltip], e quell'uomo non ha nemmeno la decenza di sposarla dopo questo rapimento così sfacciato!"
  lmf_birth.1009.a: "Ha coperto di vergogna la sua famiglia."

  lmf_birth.1101.t: "Complicazioni"
  lmf_birth.1101.depressed.t: "Le Notti più Oscure"
  lmf_birth.1101.depressed.death.opening: "Perdere una creatura... non so che fare. Nessuno vuole nominare il piccolo, per timore di farmi piangere, eppure anche questo silenzio è quasi peggiore delle parole. È divenuto una nube scura sospesa sulla mia vita come un sudario, e oscura tutto ciò che tocca.\n\n"
  lmf_birth.1101.depressed.sick.child.opening: "Il neonato piange e piange, e pare non finire mai. Non posso fare a meno di sentire che, in qualche modo, è colpa mia: c'era qualcosa che avrei dovuto sapere, qualcosa che avrei dovuto fare... l'ombra incombe su ogni cosa come tenebra, e contamina tutto ciò che tocca.\n\n"
  lmf_birth.1101.depressed.sick.opening: "La malattia mi artiglia, mi fa sentire debole e impotente. Dovrei stare con il mio neonato, eppure riesco a malapena a trovare la forza per muovermi. In qualche modo è colpa mia, lo so. Avrei dovuto essere più fort[Select_CString(ROOT.Char.IsFemale,'e','e')]. L'ombra stende il proprio velo su tutto ciò che tocca; non riesco a fuggirne.\n\n"
  lmf_birth.1101.depressed.opening: "Dovrei esserne colm[Select_CString(ROOT.Char.IsFemale,'a','o')] di gioia, non è vero? Vi è un nuovo pargolo nelle nostre vite. Dovrebbe essere cosa buona. Eppure un'ombra indugia nei miei pensieri, oscura tutto ciò che tocca, e non riesco mai a liberarmene.\n\n"
  lmf_birth.1101.opening: "Nulla è più stato lo stesso dal parto. Lo so. Lo sento. Vi è più sangue di quanto dovrebbe, e mi sento debole in ogni momento.\n\n"
  lmf_birth.1101.end.infertile: "I medici vanno e vengono dalle mie stanze, e ogni volta schioccano la lingua con disapprovazione. Dicono che potrei riprendermi, ma le complicazioni patite col parto potrebbero significare che non avrò mai più un altro figlio."
  lmf_birth.1101.end.infertile.long: "I medici vanno e vengono dalle mie stanze, e ogni volta schioccano la lingua con disapprovazione. Mi riprenderò, dicono, ma le complicazioni del parto sono gravi. Ci vorrà tempo. Quanto, non sembrano saperlo."
  lmf_birth.1101.end.age: "I medici dicono che passerà, che tutto questo è normale... soprattutto per una donna della mia età. Il fatto stesso che abbia avuto un figlio è, in qualche modo, un miracolo."
  lmf_birth.1101.end: "I medici dicono che passerà, che tutto questo è normale. Devo soltanto concedermi del tempo."
  lmf_birth.1101.a: "Spero che si sbaglino."
  lmf_birth.1101.b: "Spero che abbiano ragione."
  lmf_birth.1101.tt: "Complicazioni dopo il Parto"
  lmf_birth.1102.husband.tt: "Il cupo umore di [ROOT.Char.GetFirstNamePossessiveNoTooltip] è svanito"
  lmf_birth.1102.tt: "Il tuo cupo umore è svanito"

  dinner_past_temperate: "mangiò solo un poco del proprio cibo, passando invece gran parte del tempo a conversare"
  dinner_past_chaste_male: "restò perlopiù in disparte, le mani composte in grembo"
  dinner_past_chaste_female: "restò perlopiù in disparte, evitando con pudore lo sguardo dei servitori maschi"
  dinner_past_generous: "si tenne assai occupat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')], aiutando i servitori a sparecchiare"
  dinner_past_diligent: "si premurò con zelo di includere ogni membro della famiglia nella conversazione"
  dinner_past_calm: "emanava una calma rasserenante in ciò che di norma è un convito chiassoso, com'è nel[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] modo"
  dinner_past_patient_adult: "si mostrò incredibilmente paziente con uno dei nuovi servitori, insegnando al giovane come servire a dovere"
  dinner_past_patient_child: "fu incredibilmente paziente, nonostante la giovane età, aspettando che ogni pietanza fosse portata"
  dinner_past_humble: "fu umil[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')] come sempre, rivolgendo a ogni servitore la parola chiamandolo per nome e trattandolo con grande rispetto"
  dinner_past_honest: "raccontò storie di una recente disavventura, e notai che [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] non esagerò nemmeno un poco"
  dinner_past_brave: "raccontò un grande aneddoto su una delle proprie recenti avventure, a gran divertimento di tutti"
  dinner_past_gregarious: "fu ancora una volta l'anima della serata, facendo ridere tutti con le proprie storie"
  dinner_past_just: "chiacchierò amabilmente con i miei consiglieri, esprimendo preoccupazione per una recente ingiustizia di cui [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] fu testimone a corte"
  dinner_past_zealous: "guidò la famiglia in una preghiera a [ROOT.GetCharacter.GetFaith.PantheonTerm2] con il proprio consueto fervore"
  dinner_past_trusting: "ascoltò ogni racconto rivolt[Select_CString(ROOT.GetCharacter.IsFemale,'o','o')] a [ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] con occhi sgranati e ansiti ben udibili"
  dinner_past_compassionate: "fu l'immagine stessa della grazia, sorridendo con calore ogni volta che la conversazione volgeva verso di [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]"
  dinner_past_stubborn: "tenne la famiglia a tavola con il proprio chiacchiericcio, ostinat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] nel rifiutare che alcuno si allontanasse"
  dinner_past_forgiving: "agì da mediatr[Select_CString(ROOT.GetCharacter.IsFemale,'ice','ore')] per tutta la serata, appianando più d'un litigio familiare"
  dinner_past_charming: "fu un bambino delizioso, raggiante e capace di incantare quasi tutti a tavola"
  dinner_past_curious: "divertì tutti, facendo di continuo domande innocenti sulle pietanze e sui servitori"
  dinner_past_pregnant: "fu chiaramente al centro delle premure di tutti, gonfi[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] com'[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_N')] è il ventre che porta un figlio"
  dinner_past_beauty_good_female: "risplendeva di grazia stasera, avendo avuto cura in più nel scegliere un nuovo abito per l'evento"
  dinner_past_beauty_good_male: "fece voltare la testa alle serve, che gli giravano attorno con premura e attenzione quasi comiche"
  dinner_past_intellect_good: "tenne viva la conversazione, avanzando argomentazioni e osservazioni argute su una vasta gamma di temi"
  dinner_past_poet: "intrattenne la famiglia con una selezione di poesie [ROOT.GetCharacter.GetCulture.GetNameNoTooltip], sebbene sospetti che almeno una fosse opera [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')]"
  dinner_past_shrewd: "tenne una piccola corte, com'è nel[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] modo, lanciando motti spiritosi e pungenti che fecero ridere tutti"
  dinner_past_lifestyle_reveler: "fu, ancora una volta, il centro dell'attenzione, chiedendo altro da bere mentre faceva ridere tutti"
  dinner_past_lifestyle_blademaster: "catturò l'attenzione rapita dei servitori, narrando loro storie di un recente duello"
  dinner_past_lifestyle_hunter: "raccontò vivaci storie di una recente battuta di caccia, sotto lo sguardo attento di gran parte della famiglia"
  dinner_past_lifestyle_herbalist: "commentò le erbe usate nel pasto, consigliando al cuoco alternative da impiegare"
  dinner_past_lifestyle_gardener: "parve assai liet[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] che il cuoco avesse usato verdure fresche dell'orto nel[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] cortile"
  dinner_past_pos_fallback_1_adult: "fu insolitamente ben educat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] questa sera, prendendo parte a una conversazione vivace"
  dinner_past_pos_fallback_1_child: "fu insolitamente ben educat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] questa sera, cortese e amabile persino con i servitori"
  dinner_past_pos_fallback_2: "fu una delizia: il[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_N')] comportamento fu un merito per l'intera famiglia"
  dinner_past_pos_fallback_3_adult: "era di buon umore, per una volta, sorridendo e ridendo insieme a quasi tutti"
  dinner_past_pos_fallback_3_child: "deliziò tutti con il[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] giovanile entusiasmo, sorridendo e ridendo di continuo"
  dinner_past_lustful_male: "passò gran parte della serata a inseguire le serve, tutte diffidenti verso la sua reputazione"
  dinner_past_lustful_female: "passò gran parte della serata a battere le ciglia ai servitori, che furono pronti a evitarla"
  dinner_past_gluttonous: "divorò il pasto come se rischiassimo di restare senza cibo, mentre tutti fissavano [ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')]"
  dinner_past_greedy_adult: "passò il tempo a bisticciare con uno dei miei scribi, rifiutandosi di restituire un piccolo debito"
  dinner_past_greedy_child: "ammucchiò per sé tutti i giocattoli, facendo una scenata elaborata ogni volta che qualcuno tentava di togliergli qualcosa"
  dinner_past_greedy_teen: "disputò con i servitori per la strana idea che [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] non avesse ricevuto tanto dessert quanto gli altri"
  dinner_past_lazy: "si addormentò quasi subito dopo che il pasto finì, e il[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] russare sonoro attirò sguardi"
  dinner_past_wrathful: "perlopiù si accese in dispute infuocate con il resto della famiglia, sputi d'ira che gli volavano dalla bocca"
  dinner_past_impatient: "fu un tormento, lamentandosi di continuo che il cibo non arrivava abbastanza in fretta per i[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] gusti"
  dinner_past_arrogant: "a stento parlò con qualcuno per tutta la notte, roteando gli occhi con disprezzo non appena qualcuno cercava di coinvolger[Select_CString(ROOT.GetCharacter.IsFemale,'la','lo')]"
  dinner_past_deceitful: "fu agitato per tutta la serata, cercando di uscire a parole da una menzogna in cui [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] era stat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] colto in precedenza"
  dinner_past_craven: "restò perlopiù per conto proprio, cercando in silenzio di evitare ogni conflitto con il resto della famiglia"
  dinner_past_shy: "fece del suo meglio per restare piccol[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] e inosservat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] ai margini della tavola, evitando ogni chiacchiera"
  dinner_past_ambitious: "non smise di vantarsi delle proprie recenti imprese, benché fossero chiaramente esagerate"
  dinner_past_arbitrary: "si comportò in modo assai bizzarro, crucciandosi per le cose più piccole come se fossero di grande importanza"
  dinner_past_cynical: "non smise di roteare gli occhi e sospirare pesantemente al minimo accenno a [ROOT.GetCharacter.GetFaith.PantheonTerm2]"
  dinner_past_paranoid: "fu incredibilmente battagliero, quasi cert[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] che il resto della famiglia fosse pront[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] a colpire [ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')]"
  dinner_past_callous: "fu particolarmente crud[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')] con i servitori questa sera, schernendoli per ogni minimo errore"
  dinner_past_sadistic_adult: "giocò a giochi crudeli, riesumando vecchie dispute e osservando la famiglia litigare mentre [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] se ne stava indietro sorridendo"
  dinner_past_sadistic_child: "passò il tempo a tormentare i servitori, appiccando fuochi ed essendo un vero flagello"
  dinner_past_fickle: "non smise di fare smorfie al cibo, spostandolo nel piatto e imbronciandosi"
  dinner_past_eccentric: "parlò a lungo con... qualcuno che in realtà non c'è, mentre il resto di noi fingeva di non notarlo"
  dinner_past_rowdy: "fu un piccolo terrore, correndo per la sala con energia senza fine e urlando finché il[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] voce non divenne rauca"
  dinner_past_pensive: "sedette in silenzio a tavola, preoccupandosi e agitandosi mentre [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] si crucciava per inezie"
  dinner_past_bossy: "andò avanti e indietro, impartendo ordini a tutti su cosa fare e come farlo, con la voce più alta possibile"
  dinner_past_drunkard: "ancora una volta si ubriacò oltre misura, col volto arrossato e le parole impastate mentre [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] fingeva sobrietà"
  dinner_past_reclusive: "a stento parlò con qualcuno, restando in disparte e fissando una finestra che dava sul cortile"
  dinner_past_irritable: "mise tutti a disagio, ringhiando parole taglienti a chiunque tentasse di rivolgergli la parola"
  dinner_past_comfort_eater: "si rimpinzò con ogni dessert disponibile, inghiottendo i propri pensieri insieme allo zucchero"
  dinner_past_inappetetic: "a stento toccò di nuovo il proprio cibo, con grande preoccupazione di tutti gli altri"
  dinner_past_depressed: "fu una nube scura sull'intero banchetto, e la sua malinconia si diffuse come miasma"
  dinner_past_lunatic: "diede un grande spettacolo di sé: a un certo punto si strappò di dosso i propri abiti e fuggì dalla sala"
  dinner_past_possessed: "a un certo punto si alzò e cominciò a urlare in lingue sconosciute finché, infine, il resto di noi riuscì a calmarlo"
  dinner_past_infirm: "era a malapena presente, talvolta crollando in tossi violente o appisolandosi a tavola"
  dinner_past_intellect_bad: "si rese parecchio ridicol[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')], intromettendosi in conversazioni che era chiaro non comprendesse"
  dinner_past_dwarf: "fece una gran scena, lamentandosi che le sedie non fossero abbastanza alte per [ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')]"
  dinner_past_giant: "causò un gran trambusto a un certo punto, schiacciando una sedia chiaramente troppo piccola per [ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')]"
  dinner_past_dull: "ciarlò di cose futili, suscitando sbadigli e occhi al cielo nel resto della famiglia"
  dinner_past_wheezing: "non smise di ansimare, e il suono del[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_A')] respiro irritò quasi tutti gli altri a tavola"
  dinner_past_neg_fallback_1_adult: "si comportò male, iniziando litigi uno dopo l'altro senza alcuna buona ragione"
  dinner_past_neg_fallback_1_child: "si comportò in modo atroce, facendo una scenata clamorosa quando la balia venne a prenderlo per portarlo a letto"
  dinner_past_neg_fallback_2: "fu insolitamente irascibile e battagliero, di cattivo umore fin dall'inizio del banchetto"
  dinner_past_neg_fallback_3_adult: "bevve fino a cadere in torpore, cantando a voce alta fino a divenire molesto"
  dinner_past_neg_fallback_3_child: "mangiò molto più di quanto dovesse e poi si lamentò rumorosamente di dolori di stomaco"

  dinner_rival_reason_murderer: "[ROOT.Char.GetFirstNameNoTooltip] è stat[Select_CString(ROOT.Char.IsFemale,'a','o')] udit[Select_CString(ROOT.Char.IsFemale,'a','o')] chiaramente urlare "assassino" a un certo punto, perciò è ragionevole pensare che c’entrasse qualcosa."
  dinner_rival_reason_att_murder: "Immagino che avesse a che fare con [second.GetFirstNameNoTooltip] che tentava di far uccidere [ROOT.Char.GetFirstNameNoTooltip]... o almeno così [ROOT.Char.GetFirstNameNoTooltip] continuava a strillare."
  dinner_rival_reason_slept_spouse: "Credo d’aver udito che [second.GetFirstNameNoTooltip] sia andat[Select_CString(second.IsFemale,'a','o')] a letto con [Select_CString(ROOT.Char.IsFemale,'la sua','il suo')] [ROOT.Char.Custom('WifeHusbandOpp')]."
  dinner_rival_reason_unfaithful: "era chiaro che avesse a che fare con l’infedeltà coniugale di [second.GetFirstNamePossessiveNoTooltip]."
  dinner_rival_reason_botched_treatment: "Sono cert[Select_CString(ROOT.Char.IsFemale,'a','o')] che avesse a che fare con il fallimento di [second.GetFirstNamePossessiveNoTooltip] come medic[Select_CString(second.IsFemale,'a','o')]."
  dinner_rival_reason_revenge: "[ROOT.Char.GetFirstNameNoTooltip] voleva chiaramente vendicarsi di qualcosa che [second.GetFirstNameNoTooltip] aveva fatto."
  dinner_rival_reason_them_cynical: "Le vedute ciniche di [second.GetFirstNamePossessiveNoTooltip] su [ROOT.Char.GetFaith.GetNameNoTooltip] stavano chiaramente alimentando l’ira di [ROOT.Char.GetFirstNamePossessiveNoTooltip]."
  dinner_rival_reason_them_pious: "La pietà ostentata di [second.GetFirstNamePossessiveNoTooltip] stava chiaramente mettendo a dura prova i nervi di [ROOT.Char.GetFirstNamePossessiveNoTooltip]."
  dinner_rival_reason_hostile_religion: "Le credenze di [second.GetFirstNamePossessiveNoTooltip] fecero chiaramente molto per suscitare la pia indignazione di [ROOT.Char.GetFirstNamePossessiveNoTooltip]."
  dinner_rival_reason_both_pious: "pareva il frutto d’un acceso dibattito sulla dottrina di [second.GetFaith.GetNameNoTooltip] contro quella di [ROOT.Char.GetFaith.GetNameNoTooltip]."
  dinner_rival_reason_potential_rival: "non è sorprendente, poiché la rivalità covava tra i due da tempo."
  dinner_rival_reason_war: "senza dubbio aveva molto a che fare con la guerra che in questo momento li vede contrapposti."
  dinner_rival_reason_jealousy: "pareva evidente che [ROOT.Char.GetFirstNameNoTooltip] fosse gelos[Select_CString(ROOT.Char.IsFemale,'a','o')] di [second.GetFirstNameNoTooltip], forse per qualche amante."
  dinner_rival_reason_jealous_court: "pare radicato nella gelosia di [ROOT.Char.GetFirstNamePossessiveNoTooltip] per la posizione di [second.GetFirstNamePossessiveNoTooltip] alla mia corte."
  dinner_rival_reason_jealous_council: "pare radicato nella gelosia di [ROOT.Char.GetFirstNamePossessiveNoTooltip] per la posizione di [second.GetFirstNamePossessiveNoTooltip] come mi[Select_CString(second.IsFemale,'a','o')] [second.GetCouncilTitle|l]."
  dinner_rival_reason_heir_position: "pare radicato nella possibilità di [second.GetFirstNamePossessiveNoTooltip] d’ereditare i miei titoli, rispetto a [ROOT.Char.GetFirstNameNoTooltip]."
  dinner_rival_reason_claim: "sembrava che avesse a che fare con la "legittima rivendicazione" di [ROOT.Char.GetFirstNamePossessiveNoTooltip] su [rival_claim_title.GetNameNoTierNoTooltip]."
  dinner_rival_reason_disinherited: "Sospetto che [ROOT.Char.GetFirstNameNoTooltip] fosse gelos[Select_CString(ROOT.Char.IsFemale,'a','o')] e adirat[Select_CString(ROOT.Char.IsFemale,'a','o')] per la futura eredità di [second.GetFirstNamePossessiveNoTooltip]."
  dinner_rival_reason_disputed_heritage: "Ho avuto l’impressione che [ROOT.Char.GetFirstNameNoTooltip] stesse schernendo, non troppo velatamente, la discendenza controversa di [second.GetFirstNamePossessiveNoTooltip]."
  dinner_rival_reason_hates: "Il palese odio di [ROOT.Char.GetFirstNamePossessiveNoTooltip] per [second.GetFirstNameNoTooltip] era evidente a tutti."
  dinner_rival_reason_grudge: "il rancore che covava tra i due era chiaramente alla radice di tutto."
  dinner_rival_reason_victim: "le continue angherie di [second.GetFirstNamePossessiveNoTooltip] contro [ROOT.Char.GetFirstNameNoTooltip] ne furono senza dubbio la causa."
  dinner_rival_reason_incompatible: "sono sempre stat[Select_CString(Or(ROOT.Char.IsFemale,second.IsFemale),'i','i')] come fuoco e acqua, dunque non è una grande sorpresa."
  dinner_rival_reason_unknown: "qualcosa deve pur averli fatt[Select_CString(Or(ROOT.Char.IsFemale,second.IsFemale),'i','i')] infuriare."

  lmf_feast.1001.t: "Banchetto di Famiglia: Acrimonia"
  lmf_feast.1001.desc.opening: "La famiglia si è riunita questa sera nella grande sala di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per un banchetto, e fin dall’inizio le cose non sono andate bene.\n\nL’aria era carica di tensione. Poi, quasi senza preavviso, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_2'))] ha iniziato a litigare con "
lmf_feast.1001.desc.relation: 0 "[Select_CString(family_rival_2.IsFemale,'La sua','Il suo')] [family_rival_2.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_1'))], [family_rival_1.GetFirstNameNoTooltip].\n\n"
lmf_feast.1001.desc.norelation: 0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_rival_1'))].\n\n"
lmf_feast.1001.desc.mid: 0 "Perché? Non ne sono del tutto certo, ma [family_rival_2.Custom2('dinner_rival_reason', SCOPE.sC('family_rival_1'))]\n\nLe loro grida si fecero sempre più forti, levando eco sopra il frastuono generale, finché alla fine [family_rival_2.GetFirstNameNoTooltip] "
  lmf_feast.1001.desc.child.male: "si lanciò addosso a [Select_CString(family_rival_1.IsFemale,'lei','lui')] e cominciò a colpire con pugni.\n\n"
  lmf_feast.1001.desc.child.female: "si lanciò addosso a [Select_CString(family_rival_1.IsFemale,'lei','lui')] e cominciò a graffiare il volto di [Select_CString(family_rival_1.IsFemale,'lei','lui')].\n\n"
  lmf_feast.1001.desc.combatant: "si alzò e trasse [Select_CString(family_rival_2.IsFemale,'la sua','il suo')] lama.\n\n"
  lmf_feast.1001.desc.noncombatant: "si alzò e diede uno schiaffo a [Select_CString(family_rival_1.IsFemale,'lei','lui')].\n\n"
  lmf_feast.1001.desc.bystander: "A stento compresi cosa stesse accadendo, prima che fosse troppo tardi. "
  lmf_feast.1001.desc.intervene: "Tentai d’intervenire, ma era già troppo tardi. "
  lmf_feast.1001.desc.end: "Il resto della famiglia li separò, e [family_rival_1.GetFirstNameNoTooltip] uscì furibond[Select_CString(family_rival_1.IsFemale,'a','o')] dalla sala"
  lmf_feast.1001.desc.friends: ", urlando che la loro amicizia era ormai finita."
  lmf_feast.1001.desc.notfriends: ". Ora i due sono divenut[Select_CString(Or(family_rival_1.IsFemale,family_rival_2.IsFemale),'i','i')] aspr[Select_CString(Or(family_rival_1.IsFemale,family_rival_2.IsFemale),'i','i')] rival[Select_CString(Or(family_rival_1.IsFemale,family_rival_2.IsFemale),'i','i')]."
  lmf_feast.1001.a: "Bastavano quelle emozioni per una sera!"
  rival_family_dinner: "[CHARACTER.GetShortUIName|U] è divenut[Select_CString(CHARACTER.IsFemale,'a','o')] rivale di [TARGET_CHARACTER.GetShortUIName|U] dopo una colossale rissa durante un banchetto."
  rival_family_dinner_corresponding: "[CHARACTER.GetShortUIName|U] è divenut[Select_CString(CHARACTER.IsFemale,'a','o')] rivale di [TARGET_CHARACTER.GetShortUIName|U] dopo una colossale rissa durante un banchetto."

  dinner_rival_root_reason_murderer:0 "[Select_CString(ROOT.Char.IsFemale,'Lei','Lui')|U] non arrivò a chiamarmi "assassino", ma era di questo che si trattava."
  dinner_rival_root_reason_att_murder:0 "Disse che avevo tentato di far assassinare [Select_CString(ROOT.Char.IsFemale,'lei','lui')], e continuava a ripeterlo."
  dinner_rival_root_reason_slept_spouse:0 "[Select_CString(ROOT.Char.IsFemale,'Lei','Lui')|U] non intendeva certo lasciar cadere il fatto che ero andat[Select_CString(ROOT.Char.IsFemale,'a','o')] a letto con [Select_CString(ROOT.Char.IsFemale,'la sua','il suo')] [ROOT.Char.Custom('WifeHusbandOpp')]."
  dinner_rival_root_reason_unfaithful:0 "[Select_CString(ROOT.Char.IsFemale,'Lei','Lui')|U] non lo disse apertamente, ma era, ovviamente, per la mia infedeltà."
  dinner_rival_root_reason_imprison:0 "[Select_CString(ROOT.Char.IsFemale,'Lei','Lui')|U] continuava a lamentarsi di come l’avessi imprigionat[Select_CString(ROOT.Char.IsFemale,'a','o')], almeno all’inizio."
  dinner_rival_root_reason_att_imprison:0 "[Select_CString(ROOT.Char.IsFemale,'Lei','Lui')|U] continuava a lamentarsi di come avessi tentato d’imprigionar[Select_CString(ROOT.Char.IsFemale,'la','lo')], almeno all’inizio."
  dinner_rival_root_reason_execution:0 "All’inizio, [Select_CString(ROOT.Char.IsFemale,'lei','lui')] si lagnò amaramente dell’esecuzione. Di nuovo."
  dinner_rival_root_reason_torture:0 "[Select_CString(ROOT.Char.IsFemale,'Lei','Lui')|U] non la smetteva con la tortura. Bla, bla, tortura questo, tortura quello."
  dinner_rival_root_reason_blind:0 "Era per l’accecamento, ovviamente. Sempre per l’accecamento!"
  dinner_rival_root_reason_castrate:0 "Era per la castrazione, ovviamente. Non avrebbe mai smesso di piangere il suo membro perduto?"
  dinner_rival_reason_root_potential_rival:0 "Non mi sorprende, davvero. Covava da tempo."
  dinner_rival_reason_root_disinherit:0 "Era ancora per la diseredazione, ovviamente. Almeno all’inizio."
  dinner_rival_reason_root_unknown:0 "Di cosa si trattasse davvero? Onestamente non lo ricordo."

  lmf_feast.1002.desc: "Era iniziato così bene.\n\nLa famiglia si riunì nella grande sala di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per un banchetto, e all’inizio fu piuttosto piacevole. [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nPoi [family_rival.GetFirstNameNoTooltip] e io cominciammo a discutere.\n\n[family_rival.Custom2('dinner_rival_root_reason', ROOT.Char )] Io e mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] avevamo entrambi alzato troppo il gomito, e ricordo che [Select_CString(family_rival.IsFemale,'lei','lui')] lanciava un commento velenoso dopo l’altro... tanto che ordinai a [Select_CString(family_rival.IsFemale,'lei','lui')] di smetterla.\n\nPoi cominciammo a urlare, sempre più forte, finché gli altri si allarmarono e intervennero. Era comunque troppo tardi. Entrambi dicemmo cose che, nei giorni a venire, probabilmente rimpiangeremo."
  lmf_feast.1002.a: "Be’, è stato spiacevole."
  self_rival_family_dinner: "[CHARACTER.GetShortUIName|U] è divenut[Select_CString(CHARACTER.IsFemale,'a','o')] rivale di [TARGET_CHARACTER.GetShortUIName|U] dopo una colossale rissa durante un banchetto."
  self_rival_family_dinner_corresponding: "[TARGET_CHARACTER.GetShortUIName|U] è divenut[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] rivale di [CHARACTER.GetShortUIName|U] dopo una colossale rissa durante un banchetto."

  lmf_feast.1003.t: "Banchetto di Famiglia: Riconciliazione"
  lmf_feast.1003.desc.opening: "Il raduno di questa sera nella grande sala di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato un affare relativamente quieto. Niente scoppi d’ira, niente drammi: solo la mia famiglia che godeva d’un momento di relativa pace.\n\nPiù sorprendente, forse, scorsi [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival_1'))] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival_2'))] che parlavano davvero.\n\nEntrambi avevano bevuto non poco, è vero, ma quando udii mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_1'))] ridere a una delle "
  lmf_feast.1003.desc.relation: "[Select_CString(family_rival_1.IsFemale,'sue','suoi')] battute di [family_rival_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_2'))] "
  lmf_feast.1003.desc.norelation: "battute di mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_2'))] "
  lmf_feast.1003.desc.child: "iniziai a chiedermi se la loro rivalità fosse finalmente giunta al termine."
  lmf_feast.1003.desc.end: "iniziai a chiedermi se non vi fosse una possibilità di mettere finalmente a letto la loro rivalità. Forse con un po’ d’aiuto...?"
  lmf_feast.1003.a: "Prova a convincerli a far finalmente la pace."
  lmf_feast.1003.a.convince.tt: "Li convinci a rimediare ai torti"
  lmf_feast.1003.a.fail.tt: "Sono infastiditi dalle tue ingerenze"
  lmf_feast.1003.b: "Se la caveranno da soli."
  lmf_feast.1003.c: "Spero davvero che la risolvano."
  lmf_feast.1003.b.makeup.tt: "Fanno finalmente la pace"
  lmf_feast.1003.b.nomakeup.tt: "Non vi è una vera riconciliazione"

  lmf_feast.1004.desc: "Il raduno di questa sera nella grande sala di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato un affare relativamente quieto. Niente scoppi d’ira, niente drammi: solo la mia famiglia che godeva d’un momento di relativa pace.\n\nPiù sorprendente, forse, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival'))] e io parlammo davvero.\n\nEntrambi avevamo bevuto non poco, è vero, ma vi era una naturalezza nella nostra conversazione che da tempo non esisteva più. Quando mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] rise a una mia battuta, iniziai a domandarmi... la nostra rivalità poteva finalmente essere messa a letto? Poteva finire qui, stanotte?"
  lmf_feast.1004.a: "È giunto il tempo di rimediare ai torti."
  lmf_feast.1004.a.success.tt: "Convinci [Select_CString(family_rival.IsFemale,'lei','lui')] a porre fine alla rivalità"
  lmf_feast.1004.a.failure.tt: "[Select_CString(family_rival.IsFemale,'Lei','Lui')|U] è infastidit[Select_CString(family_rival.IsFemale,'a','o')] dal tuo tentativo"
  lmf_feast.1004.b: "Basta che abbiamo passato una buona serata."

  lmf_feast.1005.t: "Banchetto di Famiglia: Rimembranza"
  lmf_feast.1005.desc.start: "Stasera il banchetto di famiglia è stato un affare cupo.\n\nLa recente morte di mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('dead_relative'))] grava ancora sulla grande sala come una nube oscura. "
  lmf_feast.1005.desc.miscarriage.start: "Stasera il banchetto di famiglia è stato un affare cupo.\n\nIl recente parto morto di mi[Select_CString(dead_child.IsFemale,'a','o')] [dead_child.Custom('GetDaughterSon')] grava ancora sulla grande sala come una nube oscura. "
  lmf_feast.1005.desc.miscarriage: "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dead_relative'))|U] sedeva al tavolo, parlando a stento ma con una tristezza quasi palpabile.\n\nPochi di noi dissero alcunché, e quando finalmente parlammo fu per ricordarle con dolcezza — anzi, per ricordarlo a tutti noi — che la vita continua.\n\nNon so quanto quelle parole l’abbiano aiutata ma, finito il pasto, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('dead_relative'))] mi strinse la mano sotto il tavolo. Era pur sempre qualcosa, e l’essere insieme in questo momento oscuro era meglio del silenzio che l’aveva preceduto."
  lmf_feast.1005.desc.old: "Pochi di noi dissero alcunché, e quando finalmente parlammo fu soprattutto per parlare di [dead_relative.GetFirstNameNoTooltip].\n\n[Select_CString(dead_relative.IsFemale,'Lei','Lui')|U] visse a lungo e la scomparsa di [Select_CString(dead_relative.IsFemale,'lei','lui')] ha lasciato un vuoto alla mia corte, uno che non sarà facile colmare. Ricordammo i momenti più cari trascorsi con [Select_CString(dead_relative.IsFemale,'lei','lui')], ignorando quelli meno cari, e... in un certo senso, giovò il poter piangere insieme."
  lmf_feast.1005.desc.adult: "Pochi di noi dissero alcunché, e quando finalmente parlammo fu soprattutto per parlare di [dead_relative.GetFirstNameNoTooltip].\n\nRicordammo i momenti più cari trascorsi con [Select_CString(dead_relative.IsFemale,'lei','lui')], ignorando quelli meno cari, e... in un certo senso, giovò il poter piangere insieme."
  lmf_feast.1005.desc.child: "Pochi di noi dissero alcunché, e quando finalmente parlammo fu soprattutto per parlare di [dead_relative.GetFirstNameNoTooltip].\n\n[Select_CString(dead_relative.IsFemale,'Lei','Lui')|U] morì così giovan[Select_CString(dead_relative.IsFemale,'e','e')], in verità a stento avemmo modo di conoscere [Select_CString(dead_relative.IsFemale,'lei','lui')]. Così, invece, parlammo delle [Select_CString(dead_relative.IsFemale,'sue','suoi')] birichinate e di chi [Select_CString(dead_relative.IsFemale,'lei','lui')] sarebbe potut[Select_CString(dead_relative.IsFemale,'a','o')] diventare se avesse avuto modo di crescere... e, in un certo senso, giovò il poter piangere insieme."
  lmf_feast.1005.desc.baby: "Pochi di noi dissero alcunché, e quando finalmente parlammo fu soprattutto per parlare di [dead_relative.GetFirstNameNoTooltip].\n\n[Select_CString(dead_relative.IsFemale,'Lei','Lui')|U] morì quando era appena in fasce, e in qualche modo sembrava così ingiusto che [ROOT.Char.GetFaith.DeathDeityName] dovesse portare via [Select_CString(dead_relative.IsFemale,'lei','lui')] così presto. Fu doloroso per tutti noi parlarne... ma, in un certo senso, giovò il poter piangere insieme."
  lmf_feast.1005.a: "[ROOT.Char.GetFaith.DeathDeityName] accolga [Select_CString(dead_relative.IsFemale,'la sua','il suo')] anima."
  lmf_feast.1005.b: "[Select_CString(dead_relative.IsFemale,'Lei','Lui')|U] sarà ricordat[Select_CString(dead_relative.IsFemale,'a','o')]."
  lmf_feast.1005.c: "[ROOT.Char.GetFaith.DeathDeityName] accolga la piccola anima di [Select_CString(dead_child.IsFemale,'lei','lui')]."

  lmf_feast.1006.t: "Banchetto di Famiglia: Cacofonia"
  lmf_feast.1006.desc: "La famiglia si riunì per il pasto serale nella grande sala di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e fin dall’inizio fu un vero manicomio.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_1'))|U] [dinner_neg_family_1.Custom('dinner_activity_neg_past')].\n\nPoi [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_2'))] [dinner_neg_family_2.Custom('dinner_activity_neg_past')].\n\nE anche [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_3'))] [dinner_neg_family_3.Custom('dinner_activity_neg_past')].\n\nTutti urlavano, e la cacofonia divenne così insopportabile che alla fine alzai la voce e ordinai a tutti di tacere. Forse dissi cose di cui mi pentirò, ma dovevo semplicemente fuggire da quel luogo."
  lmf_feast.1006.a: "Ho avuto momenti migliori, è vero."

  lmf_feast.1007.t: "Banchetto di Famiglia: Serenità"
  lmf_feast.1007.desc: "Di tanto in tanto, mi sembra che la nostra famiglia qui a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] possa essere come qualunque altra. Stasera è stata una di quelle volte.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_1'))|U] [dinner_pos_family_1.Custom('dinner_activity_pos_past')].\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_2'))|U] [dinner_pos_family_2.Custom('dinner_activity_pos_past')].\n\nPerfino [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_3'))] [dinner_pos_family_3.Custom('dinner_activity_pos_past')].\n\nTutti andavano d’accordo, ridendo e perfino cantando. A un certo punto mi alzai e tenni un discorso che fece inumidire gli occhi a parte della mia famiglia. Fu... bello."
  lmf_feast.1007.a: "Una bella serata."

  lmf_feast.1008.t:0 "Banchetto familiare: Amicizia"
  lmf_feast.1008.desc.start:0 "Il banchetto familiare di questa sera nella grande sala di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è andato piuttosto bene.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nPoi ho notato che [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_friend_1'))] pareva andare sorprendentemente d'accordo con "
  lmf_feast.1008.desc.relation:0 "[Select_CString(family_friend_1.IsFemale,'la sua','il suo')] [family_friend_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))], [family_friend_2.Custom('IT_NAM_COL3')][family_friend_2.GetTitledFirstNameNoTooltip]. "
  lmf_feast.1008.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend_2'))]. "
  lmf_feast.1008.desc.child:0 "Scorrazzavano qua e là, facendo ciò che i bambini sanno far meglio: ridere, giocare.\n\n"
  lmf_feast.1008.desc.twomen:0 "Si davano pacche sulle spalle, ridevano e si raccontavano storie.\n\n"
  lmf_feast.1008.desc.twowomen:0 "Sussurravano pettegolezzi, ridendo e cinguettando.\n\n"
  lmf_feast.1008.desc.mixed:0 "Conversavano a lungo... non in modo romantico, ma con sincero interesse e rispetto.\n\n"
  lmf_feast.1008.desc.end:0 "Credo di star assistendo alla nascita di una vera amicizia."
  lmf_feast.1008.a:0 "Magnifico!"

  lmf_feast.1009.desc.start:0 "Il banchetto familiare di questa sera nella grande sala di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è andato piuttosto bene.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nSono andato davvero d'accordo anche con [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))]. "
  lmf_feast.1009.desc.child:0 "[Select_CString(family_friend.IsFemale,'Lei','Lui')|U] si è unito a me in un gioco, finito il pasto, e prima che me ne rendessi conto ridevamo entrambi come mai avevamo fatto.\n\n"
  lmf_feast.1009.desc.adult:0 "[Select_CString(family_friend.IsFemale,'Lei','Lui')|U] ha bevuto con me, finito il pasto, e prima che me ne rendessi conto ridevamo entrambi, intrattenendoci a vicenda con racconti.\n\n"
  lmf_feast.1009.desc.end:0 "È forse l'inizio d'una nuova amicizia?"
  lmf_feast.1009.a:0 "Lo è! Un nuovo amico!"
  lmf_feast.1009.b:0 "No, è già tanto se [Select_CString(family_friend.IsFemale,'lei','lui')] si avvicina così."

  lmf_feast.1010.t:0 "Banchetto familiare: Gelida distanza"
  lmf_feast.1010.desc.start:0 "Questa sera, nella grande sala del banchetto familiare, aleggiava un'aria strana.\n\nAnzitutto, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nPoi ho notato che [family_friend_1.GetFirstNameNoTooltip] e [family_friend_2.GetFirstNameNoTooltip] non si parlavano.\n\nDi norma sono inseparabili, eppure all'improvviso [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_1'))] e "
  lmf_feast.1010.desc.relation:0 "[Select_CString(family_friend_1.IsFemale,'la sua','il suo')] [family_friend_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))] "
  lmf_feast.1010.desc.norelation:0 "il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))] "
  lmf_feast.1010.desc.end:0 "sedevano alle estremità opposte del tavolo e, se mai si incrociavano, tra loro correva un gelo palpabile.\n\nPare che la loro amicizia sia giunta al termine."
  lmf_feast.1010.a:0 "È un vero peccato."

  lmf_feast.1011.desc:0 "Questa sera, nella grande sala del banchetto familiare, aleggiava un'aria strana.\n\nAnzitutto, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nPoi ho notato che [family_friend.GetFirstNameNoTooltip] mi evitava. Quando ho cercato d'avvicinarmi al mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend'))], [Select_CString(family_friend.IsFemale,'lei','lui')] si è allontanat[Select_CString(family_friend.IsFemale,'a','o')]... e da allora tra noi s'è insinuato un gelo distinto. Che cosa ho fatto? Perché [Select_CString(family_friend.IsFemale,'lei','lui')] non vuole parlarmi?"
  lmf_feast.1011.a:0 "Non capisco che cosa sia cambiato..."

  lmf_feast.1012.t:0 "Banchetto familiare: Rivelazione"
  lmf_feast.1012.desc.start:0 "Il banchetto familiare di questa sera è stato un affare quieto, senza incidenti. Stavo per ritirarmi per la notte, in verità, quando ho parlato con [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('tattler'))].\n\n"
  lmf_feast.1012.desc.child:0 "Non credo che [tattler.Custom('polite_gender_ref')] comprendesse appieno le implicazioni di ciò che [Select_CString(tattler.IsFemale,'lei','lui')] stava dicendo; sapeva soltanto che [Select_CString(tattler.IsFemale,'lei','lui')] aveva udito innocente "
  lmf_feast.1012.desc.adult:0 "Non credo che [tattler.GetFirstNameNoTooltip] comprendesse appieno le implicazioni di ciò che [Select_CString(tattler.IsFemale,'lei','lui')] mi ha detto; sapeva soltanto che [Select_CString(tattler.IsFemale,'lei','lui')] aveva udito "
  lmf_feast.1012.desc.relation:0 "[Select_CString(tattler.IsFemale,'la sua','il suo')] [tattler.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_secret'))] "
  lmf_feast.1012.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_secret'))] "
  lmf_feast.1012.desc.child2:0 "sussurrare al riguardo, trovando la cosa terribilmente divertente.\n\n"
  lmf_feast.1012.desc.temperate:0 "parlare, trovando l'argomento alquanto inquietante.\n\n"
  lmf_feast.1012.desc.drunk:0 "sussurrare e poi, più tardi, ben dentro [Select_CString(tattler.IsFemale,'le sue','i suoi')] coppe, me l'ha accennato di sfuggita.\n\n"
  lmf_feast.1012.desc.end:0 "Ebbene, io ne ho compreso benissimo le implicazioni, anche se [tattler.GetFirstNameNoTooltip] non l'ha fatto. [family_secret.Custom('IT_NAM_COL3')][family_secret.GetTitledFirstNameNoTooltip] ha un segreto, uno che [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_secret'))] ha ora rivelato inavvertitamente."
  lmf_feast.1012.a:0 "Quanto interessante..."

  lmf_feast.1013.t:0 "Banchetto familiare: Attrazione"
  lmf_feast.1013.start:0 "Il banchetto familiare di questa sera è stato piuttosto quieto e senza nulla di notevole... con un'unica, importante eccezione.\n\nHo notato che [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_lover_1'))] si comportava in modo alquanto strano. [Select_CString(family_lover_1.IsFemale,'Lei','Lui')|U] continuava a guardare in modo insistente, dall'altra parte della grande sala, verso "
  lmf_feast.1013.desc.relation:0 "[Select_CString(family_lover_1.IsFemale,'la sua','il suo')] [family_lover_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_lover_2'))], [family_lover_2.Custom('IT_NAM_COL3')][family_lover_2.GetTitledFirstNameNoTooltip]"
  lmf_feast.1013.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_lover_2'))]"
  lmf_feast.1013.end:0 ", che fingeva di non accorgersene. Quando [family_lover_1.GetFirstNameNoTooltip] infine si è congedat[Select_CString(family_lover_1.IsFemale,'a','o')], tuttavia, [family_lover_2.GetFirstNameNoTooltip] l'ha seguit[Select_CString(family_lover_2.IsFemale,'a','o')] silenziosamente un minuto dopo.\n\nHo deciso di vedere che cosa stessero combinando e ho scorto i due avvinti in un abbraccio appassionato in un corridoio buio. Mi sono ritirat[Select_CString(ROOT.Char.IsFemale,'a','o')] in fretta, senza dir nulla a nessuno... non ancora, almeno."
  lmf_feast.1013.a:0 "Scioccante!"

  lmf_feast.1014.t:0 "Banchetto familiare: Violenza"
  lmf_feast.1014.start:0 "Le tensioni correvano alte al banchetto familiare di questa sera, affollato e rumoroso.\n\nTutti gridavano. [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))|U] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nPeggio di tutto, si udiva [family_duel_starter.GetFirstNameNoTooltip] litigare con [family_duel_target.GetFirstNameNoTooltip] dall'altra parte della sala. Ho guardato mentre [family_duel_starter.GetFirstNameNoTooltip] diventava sempre più furios[Select_CString(family_duel_starter.IsFemale,'a','o')] finché, infine, [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_starter'))] ha estratto un pugnale e ha attaccato "
  lmf_feast.1014.desc.relation:0 "[Select_CString(family_duel_starter.IsFemale,'la sua','il suo')] [family_duel_starter.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_target'))]. "
  lmf_feast.1014.desc.norelation:0 "il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_target'))]. "
  lmf_feast.1014.end:0 "\n\nTutti si sono fermati e hanno fissato la scena, attoniti, mentre il sangue gocciolava sul pavimento. Era chiaro che la loro rivalità era sfuggita di mano."
  lmf_feast.1014.a:0 "Stanne fuori."
  lmf_feast.1014.b:0 "Suppongo che ora si combatta!"
  lmf_feast.1014.a.start.kill.tt:0 "[family_duel_starter.GetFirstNameNoTooltip] uccide [family_duel_target.GetFirstNameNoTooltip] nel duello"
  lmf_feast.1014.a.start.win.tt:0 "[family_duel_starter.GetFirstNameNoTooltip] vince il duello"
  lmf_feast.1014.a.target.win.tt:0 "[family_duel_target.GetFirstNameNoTooltip] vince il duello"
  lmf_feast.1014.a.target.kill.tt:0 "[family_duel_target.GetFirstNameNoTooltip] uccide [family_duel_starter.GetFirstNameNoTooltip] nel duello"
  family_feast_duel:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] hanno combattuto in un duello durante un banchetto familiare."
  lmf_feast.1014.c:0 "Getta [family_duel_starter.GetFirstNameNoTooltip] in prigione finché [Select_CString(family_duel_starter.IsFemale,'lei','lui')] non si calma."

  lmf_feast.1015.t:0 "Banchetto familiare: Beatitudine"
  lmf_feast.1015.desc.start:0 "Il banchetto a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato delizioso, questa sera. Tutti sono rimasti quieti e ben educati, e lo spirito che aleggiava sulla mia famiglia era quello della concordia.\n\n"
  lmf_feast.1015.desc.newborn:0 "Poco dopo che il cibo è stato portato via, una domestica ha condotto fuori dalla nursery il piccolo [show_child.GetFirstNameNoTooltip], ancora avvolto nelle fasce e sveglio ben oltre quanto [Select_CString(show_child.IsFemale,'lei','lui')] avrebbe dovuto. Eppure, [family_spouse.GetFirstNameNoTooltip] e io non abbiamo saputo resistere. Abbiamo preso il bimbo tra le braccia, abbiamo tubato verso [show_child.GetHerHim]... e c'è stato un momento in cui lo sguardo di [family_spouse.GetFirstNamePossessiveNoTooltip] ha incontrato il mio, come a dire:\n\nL'abbiamo fatto noi. Abbiamo fatto questo perfetto piccolo [show_child.Custom('GirlBoy')]."
  lmf_feast.1015.desc.smallchild:0 "Poco dopo che il cibo è stato portato via, una domestica ha condotto fuori dalla nursery il giovane [show_child.GetFirstNameNoTooltip] per augurarci la buona sera. Il [show_child.Custom('GirlBoy')] ha brontolato, ovviamente, tanto era curioso di ciò che accadeva nella grande sala. Nel tentativo di restare sveglio, [Select_CString(show_child.IsFemale,'lei','lui')] ci ha intrattenuti con una danza buffa. [family_spouse.GetFirstNameNoTooltip] e io abbiamo riso di cuore, e c'è stato un momento in cui i nostri sguardi si sono incontrati, come a dire:\n\nQuesto è il nostro piccolo [show_child.Custom('GirlBoy')]. La nostra famiglia."
  lmf_feast.1015.desc.youngchild:0 "Poco dopo che il cibo è stato portato via, il giovane [show_child.GetFirstNameNoTooltip] è saltato avanti, eccitato e deciso a intrattenere sia [family_spouse.GetFirstNameNoTooltip] sia me con una canzone e una danza gioiose. [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))] e io abbiamo riso di cuore, ovviamente, e c'è stato un momento in cui i nostri sguardi si sono incontrati, come a dire:\n\nQuesto è il nostro [show_child.Custom('GetDaughterSon')]. Noi siamo una famiglia."
  lmf_feast.1015.desc.stillgotit:0 "Dopo che il cibo è stato portato via, [family_spouse.GetFirstNameNoTooltip] e io abbiamo osservato tutti, presi da allegria e conversazione. [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))] ha sospirato con soddisfazione e poi [Select_CString(family_spouse.IsFemale,'lei','lui')] s'è voltat[Select_CString(family_spouse.IsFemale,'a','o')] verso di me... e ho visto il luccichio nei [Select_CString(family_spouse.IsFemale,'suoi','suoi')] occhi. [Select_CString(family_spouse.IsFemale,'Lei','Lui')|U] desiderava chiaramente trascorrere la notte da moglie e marito, e voleva cominciare subito!"
  lmf_feast.1015.desc.chaste:0 "Dopo che il cibo è stato portato via, [family_spouse.GetFirstNameNoTooltip] e io abbiamo osservato tutti, presi da allegria e conversazione. [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))] ha sospirato con soddisfazione e i nostri sguardi si sono incontrati. La nostra può non essere una passione che arde rovente, ma è pur sempre amore. Questa è la nostra famiglia, ed è cosa buona."
  lmf_feast.1015.a:0 "Alza un calice a [family_spouse.Custom('IT_NAM_COL4')][family_spouse.GetTitledFirstNameNoTooltip]!"
  friend_family_feast:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName|U] hanno stretto un legame durante un caldo banchetto familiare."

  lmf_feast.1016.t:0 "Banchetto familiare: Disprezzo"
  lmf_feast.1016.desc.start:0 "Le cose tra me e [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))] erano tese fin dall'inizio del banchetto familiare di questa sera.\n\nAll'inizio ci siamo rivolti a malapena la parola, e le poche che ci siamo scambiat[Select_CString(ROOT.Char.IsFemale,'e','i')] erano gelide e sgradevoli. Poi, finito il pasto, le cose sono peggiorate. "
  lmf_feast.1016.desc.object.to.me:0 "[Select_CString(family_spouse.IsFemale,'Lei','Lui')|U] mi ha scagliato sguardi di disgusto, ritraendosi al mio tocco. "
  lmf_feast.1016.desc.object.to.me.sodomy:0 ""Davvero? Con altri uomini?!" ha sibilato [Select_CString(family_spouse.IsFemale,'lei','lui')]. E allora ho capito di che cosa si trattasse, anche se saperlo non migliorava nulla.\n\n"
  lmf_feast.1016.desc.object.to.me.incest:0 ""Davvero? Con la tua stessa famiglia?!" ha sibilato [Select_CString(family_spouse.IsFemale,'lei','lui')]. E allora ho capito di che cosa si trattasse, anche se saperlo non migliorava nulla.\n\n"
  lmf_feast.1016.desc.object.to.me.secret.sodomy:0 ""Davvero? Con altri uomini?" ha sibilato [Select_CString(family_spouse.IsFemale,'lei','lui')]. Eppure [Select_CString(family_spouse.IsFemale,'lei','lui')] si è rifiutat[Select_CString(family_spouse.IsFemale,'a','o')] ostinatamente di spiegarsi.\n\n"
  lmf_feast.1016.desc.object.to.me.secret.incest:0 ""Davvero? Con la tua stessa famiglia?" ha sibilato [Select_CString(family_spouse.IsFemale,'lei','lui')]. Eppure [Select_CString(family_spouse.IsFemale,'lei','lui')] si è rifiutat[Select_CString(family_spouse.IsFemale,'a','o')] ostinatamente di spiegarsi.\n\n"
  lmf_feast.1016.desc.object.to.me.deviant:0 ""So che cosa sei," ha sibilato [Select_CString(family_spouse.IsFemale,'lei','lui')]. E allora ho capito di che cosa si trattasse, anche se saperlo non migliorava nulla.\n\n"
  lmf_feast.1016.desc.object.to.me.secret.deviant:0 ""So che cosa sei," ha sibilato [Select_CString(family_spouse.IsFemale,'lei','lui')]. Eppure [Select_CString(family_spouse.IsFemale,'lei','lui')] si è rifiutat[Select_CString(family_spouse.IsFemale,'a','o')] ostinatamente di spiegarsi.\n\n"
  lmf_feast.1016.desc.object.to.them:0 "Non sono riuscit[Select_CString(ROOT.Char.IsFemale,'a','o')] a tenere per me il mio ribrezzo, sapendo ciò che so circa "
  lmf_feast.1016.desc.object.to.them.sodomy:0 "le [family_spouse.GetHerHis] tresche con altri uomini. "So che cosa sei!" ho sibilato a un certo punto.\n\n"
  lmf_feast.1016.desc.object.to.them.incest:0 "il desiderio proibito per la propria carne e sangue. "So che cosa sei!" ho sibilato a un certo punto.\n\n"
  lmf_feast.1016.desc.object.to.them.secret.sodomy:0 "le [family_spouse.GetHerHis] segrete tresche con altri uomini. "So che cosa sei!" ho sibilato a un certo punto.\n\n"
  lmf_feast.1016.desc.object.to.them.secret.incest:0 "le [family_spouse.GetHerHis] segrete e proibite tresche con la propria carne e sangue. "So che cosa sei!" ho sibilato a un certo punto.\n\n"
  lmf_feast.1016.desc.object.to.them.deviant:0 "le [family_spouse.GetHerHis] strane e perverse brame. "So che cosa sei!" ho sibilato a un certo punto.\n\n"
  lmf_feast.1016.desc.object.to.them.secret.deviant:0 "le [family_spouse.GetHerHis] pratiche carnali segrete e perverse. "So che cosa sei!" ho sibilato a un certo punto.\n\n"
  lmf_feast.1016.desc.betrayed:0 "[Select_CString(family_spouse.IsFemale,'Lei','Lui')|U] è diventat[Select_CString(family_spouse.IsFemale,'a','o')] litigios[Select_CString(family_spouse.IsFemale,'a','o')], persino derisori[Select_CString(family_spouse.IsFemale,'a','o')]. Si trattava del mio tradimento dei voti nuziali, lo sapevo... e [Select_CString(family_spouse.IsFemale,'lei','lui')] non l'avrebbe mai lasciato cadere.\n\n"
  lmf_feast.1016.desc.they.betrayed:0 "Ho litigato e mi sono ritratto da ogni suo tocco. Non riuscivo né a perdonare né a dimenticare il tradimento di [family_spouse.GetHerHis] voti nuziali. Non potevo!\n\n"
  lmf_feast.1016.desc.they.secret.lover:0 "Ho litigato e mi sono ritratto da ogni suo tocco. Non riuscivo a scacciare dalla mente l'immagine di [family_spouse.GetHerHim] giacent[Select_CString(family_spouse.IsFemale,'e','e')] con [suspected_lover.Custom('IT_NAM_COL3')][suspected_lover.GetTitledFirstNameNoTooltip], e la cosa mi stava facendo impazzire!\n\n"
  lmf_feast.1016.desc.secret.lover:0 ""Doveva essere proprio con [suspected_lover.GetFirstNameNoTooltip]?" ha sibilato [Select_CString(family_spouse.IsFemale,'lei','lui')], ma si è rifiutat[Select_CString(family_spouse.IsFemale,'a','o')] di spiegare quanto [Select_CString(family_spouse.IsFemale,'lei','lui')] sapesse davvero riguardo a [suspected_lover.GetHerHim].\n\n"
  lmf_feast.1016.desc.rivalry:0 "[Select_CString(family_spouse.IsFemale,'Lei','Lui')|U] ha sogghignato a ogni mia parola, ritraendosi al mio tocco. Le cose tra noi non andavano bene da tempo, ma ora [Select_CString(family_spouse.IsFemale,'lei','lui')] rifiutava qualunque tentativo di colmare la distanza.\n\n"
  lmf_feast.1016.desc.end:0 "Quando la sera è giunta al termine, le nostre urla avevano attirato gli sguardi inorriditi del resto della famiglia. [family_spouse.GetFirstNameNoTooltip] è uscita tempestando d'ira, e quello... è stato tutto."
  lmf_feast.1016.a:0 "Ahi."
  nemesis_family_feast:0 "[CHARACTER.GetShortUIName|U] è diventato il nemico giurato di [TARGET_CHARACTER.GetShortUIName|U] dopo una violenta lite al banchetto familiare."
  nemesis_family_feast_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] è diventato il nemico giurato di [CHARACTER.GetShortUIName|U] dopo una violenta lite al banchetto familiare."
  rival_family_feast:0 "[CHARACTER.GetShortUIName|U] ha avuto una lite furibonda con [TARGET_CHARACTER.GetShortUIName|U] riguardo al loro matrimonio, durante il banchetto familiare."
  rival_family_feast_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] ha avuto una lite furibonda con [CHARACTER.GetShortUIName|U] riguardo al loro matrimonio, durante il banchetto familiare."

  lmf_feast.1017.t:0 "Banchetto familiare: Incidente"
  lmf_feast.1017.desc.start:0 "Il banchetto familiare a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] era affollato ed è iniziato abbastanza bene.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nPoi le cose hanno preso una piega improvvisa.\n\nUno dei servi è corso nella grande sala in preda al panico, informandomi che [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_accident'))] "
  lmf_feast.1017.desc.fire:0 "era stat[Select_CString(family_accident.IsFemale,'a','o')] terribilmente ustionat[Select_CString(family_accident.IsFemale,'a','o')] da un incendio improvviso nelle cucine. "
  lmf_feast.1017.desc.stairs:0 "era cadut[Select_CString(family_accident.IsFemale,'a','o')] dalle scale, appena fuori. "
  lmf_feast.1017.desc.window:0 "era cadut[Select_CString(family_accident.IsFemale,'a','o')] da una delle finestre, al piano di sopra. "
  lmf_feast.1017.desc.fall:0 "aveva subito una rovinosa caduta nel cortile. "
  lmf_feast.1017.desc.trample:0 "era stat[Select_CString(family_accident.IsFemale,'a','o')] calpestat[Select_CString(family_accident.IsFemale,'a','o')] nel cortile quando una delle bestie è impazzita. "
  lmf_feast.1017.desc.accident:0 "aveva subito una grave ferita nel cortile, ma a stento riusciva a riferire che cosa fosse accaduto. "
  lmf_feast.1017.desc.end:0 "\n\nÈ stato un incidente, naturalmente, e tutti noi ne siamo rimasti profondamente turbati. Ho mandato via tutti, senza indugio, e sono andat[Select_CString(ROOT.Char.IsFemale,'a','o')] a occuparmi delle cure di [family_accident.GetFirstNamePossessiveNoTooltip]."
  lmf_feast.1017.a:0 "Spero non sia troppo grave!"
  lmf_feast.1017.injured.tt:0 "[family_accident.Custom('IT_NAM_COL3')][family_accident.GetTitledFirstName] è ferit[Select_CString(family_accident.IsFemale,'a','o')]!"

  lmf_feast.1018.t:0 "Banchetto di famiglia: Malattia"
  lmf_feast.1018.desc.start:0 "Il banchetto di famiglia a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] stava andando piuttosto bene questa sera, almeno all'inizio.\n\nTutti ridevano e facevano baldoria, finché all'improvviso qualcuno "
  lmf_feast.1018.desc.child:0 "si è accorto che il piccolo [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))] era divenuto fin troppo silenzioso.\n\nIl mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_sick'))] era davvero quasi livid[Select_CString(family_sick.IsFemale,'a','o')], e poi [Select_CString(family_sick.IsFemale,'lei','lui')] è crollat[Select_CString(family_sick.IsFemale,'a','o')] giù dalla sedia! "
  lmf_feast.1018.desc.adult:0 "ha gridato in allarme. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))] aveva vomitato sul piatto! Ciò che dapprima si pensava fosse il risultato di un eccesso di bevute si è rivelato rapidamente qualcosa di ben più serio.\n\nIl mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_sick'))] era livid[Select_CString(family_sick.IsFemale,'a','o')] in volto e tremava, fredd[Select_CString(family_sick.IsFemale,'a','o')] al tocco. "
  lmf_feast.1018.desc.end:0 "Ho chiamato i servi perché portassero via [Select_CString(family_sick.IsFemale,'lei','lui')] seduta stante e poi ho mandato via tutti, nel caso questa malattia potesse diffondersi.\n\nAlla fine della serata, non sappiamo ancora quanto sia grave questa improvvisa infermità."
  lmf_feast.1018.a:0 "Speriamo che [Select_CString(family_sick.IsFemale,'lei','lui')] si riprenda presto!"

  lmf_feast.1019.t:0 "Banchetto di famiglia: Tutto bene"
  lmf_feast.1019.desc.opening:0 "La mia famiglia si è riunita nella grande sala a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
  lmf_feast.1019.desc.atwar:0 "ignorando per una sera le notizie dal fronte di guerra, mentre banchettavamo.\n\n"
  lmf_feast.1019.desc.nowar:0 "godendo della relativa pace del regno, mentre banchettavamo.\n\n"
  lmf_feast.1019.desc.end:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nNel frattempo, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nEppure, è stato un bene. Eravamo tutti insieme, e questo è ciò che conta davvero."
  lmf_feast.1019.a:0 "[ROOT.Char.GetFaith.FertilityGodName] benedica noi tutti."
  lmf_feast.1019.b:0 "Una simile pace non può certo durare..."
  lmf_feast.1019.c:0 "Momenti come questo sono divenuti così rari."
  lmf_feast.1019.d:0 "A dire il vero, a stento riuscivo a restare sveglio..."
  lmf_feast.1019.e:0 "Quanto bramo tornare sul campo di battaglia."
  lmf_feast.1019.f:0 "A stento sopporto il loro continuo ciarlare."
  lmf_feast.1019.g:0 "Sinceramente, preferirei essere da qualche parte, da solo."
  lmf_feast.1019.h:0 "Oh? A me interessava più il cibo."
  lmf_feast.1019.i:0 "Oh? Io, invece, ero più interessato al bere."
  lmf_feast.1019.j:0 "Sono questi i tempi che ricorderemo."

  lmf_feast.1020.t:0 "Banchetto di famiglia: Speranza"
  lmf_feast.1020.desc.start:0 "Il banchetto di famiglia di stasera è stato vivace, sebbene, a dir la verità, io l'abbia a stento notato.\n\nIo, come la maggior parte della famiglia, ho prestato grandissima attenzione a mia moglie e al suo ventre rigonfio. [family_spouse.GetFirstNameNoTooltip] è giunta nella grande sala in ritardo, con un'aria pallida e sfinita. A suo merito, si è lamentata a malapena e ha cercato di sorridere a ogni familiare benintenzionato che è venuto a informarsi su di lei. Quando la sera è volta al termine, i nostri sguardi si sono incrociati... e vi era una vera tenerezza.\n\n"
  lmf_feast.1020.desc.resolution:0 ""Le cose non sono andate bene fra noi, marito," ha detto. "Se deve esservi speranza per questo figlio, mi chiedo se non sia giunto il momento di mettere da parte le nostre differenze?" [family_spouse.GetFirstNameNoTooltip] non ha atteso risposta. Si è limitata a sospirare profondamente e a chiedere alle dame di compagnia di ricondurla ai suoi alloggi, lasciandomi a chiedermi: ha ragione?"
  lmf_feast.1020.desc.love:0 ""Ti adoro tanto, marito mio," ha detto all'improvviso, senza che nulla lo suggerisse. "Non sapevo cosa aspettarmi quando ci siamo sposati, ma sono così felice che l'abbiamo fatto." Ho fatto appena in tempo a sorriderle in risposta quando ha chiamato le sue dame per tornare ai suoi alloggi, lasciandomi a crogiolarmi nel tepore del suo amore."
  lmf_feast.1020.desc.possibility:0 ""Non sapevo cosa aspettarmi quando ci siamo sposati," ha detto all'improvviso. "Pensavo che il nostro sarebbe stato un matrimonio freddo, soltanto di nome. Ma ora mi chiedo se non sia diverso. C'è speranza per me e te, marito?" [family_spouse.GetFirstNameNoTooltip] non ha atteso risposta. Si è limitata a sospirare profondamente e a chiedere alle dame di ricondurla ai suoi alloggi, lasciandomi a rimuginare sulla risposta alla sua domanda."
  lmf_feast.1020.desc.fallback:0 ""Spero che il figlio ti compiaccia, marito," ha detto. Quando ho risposto che di certo sarebbe stato così, [family_spouse.GetFirstNameNoTooltip] è raggiante d'orgoglio. "Allora ne sono lieta." Sospirando profondamente, ha chiamato le sue dame perché la riportassero ai suoi alloggi, e io l'ho guardata andare con un sorriso sulle labbra."
  lmf_feast.1020.a:0 "Per il bene del figlio, sì. È tempo di finirla."
  lmf_feast.1020.b:0 "Ecco il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))]."
  lmf_feast.1020.c:0 "Sì, credo che vi sia speranza per noi."
  lmf_feast.1020.d:0 "Tornerà normale una volta nato il bambino, immagino."
  lmf_feast.1020.e:0 "No, non sono ancora pronto a lasciar perdere."
  lmf_feast.1020.f:0 "Ultimamente è così emotiva. Ignorerò tutto questo."

  lmf_feast.1021.t:0 "Banchetto di famiglia: Compagnia"
  lmf_feast.1021.desc.start:0 "La riunione di famiglia di stasera nella grande sala a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stata quieta, per una volta.\n\nMi ha dato tempo per mettermi al passo con [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))]. Col trascorrere della serata, sempre più familiari si sono ritirati, anche se, a dire il vero, a stento ce ne siamo accorti. Ci siamo intrattenuti a vicenda con storie. Io ho parlato dei miei piani per [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e [Select_CString(family_friend.IsFemale,'lei','lui')] ascoltava con rapita attenzione. [Select_CString(family_friend.IsFemale,'Lei','Lui')|U] mi ha raccontato di "
  lmf_feast.1021.desc.spouse:0 "varie pene che [Select_CString(family_friend.IsFemale,'lei','lui')] patisce nel matrimonio. "
  lmf_feast.1021.desc.ruler:0 "piccole prove che [Select_CString(family_friend.IsFemale,'lei','lui')] affronta governando [family_friend.GetPrimaryTitle.GetNameNoTierNoTooltip]. "
  lmf_feast.1021.desc.court:0 "piccole questioni che [Select_CString(family_friend.IsFemale,'lei','lui')] affronta come mio [family_friend.Custom('GetCouncilOrCourtPosition')]. "
  lmf_feast.1021.desc.courtier:0 "varie vicende nel [ROOT.Char.Custom('FortifiedBuilding')], piccole cose di cui di rado vengo a sapere. "
  lmf_feast.1021.desc.end:0 "Io annuivo e fingevo di comprendere le sue preoccupazioni.\n\nQuando abbiamo smesso, ci siamo accorti entrambi che tutti gli altri se n'erano andati e che fuori era buio. [family_friend.GetFirstNameNoTooltip] ha riso, scusandosi per aver monopolizzato così tanto il mio tempo... ma, a dirla tutta, è stato un bene trascorrere simile tempo con un amico."
  lmf_feast.1021.a:0 "Al mio fedele [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend'))]!"

  lmf_feast.1022.t:0 "Banchetto di famiglia: Rivalità"
  lmf_feast.1022.desc:0 "Il banchetto di stasera a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] sarebbe anche potuto essere piacevole, suppongo. Se non fosse stato per la presenza di [family_rival.GetFirstNamePossessiveNoTooltip]. Perché il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] continui a partecipare a queste cene va oltre la mia comprensione. Per dispetto, immagino.\n\nMai ciò è stato più evidente di stasera, quando [family_rival.GetFirstNameNoTooltip] sedeva appena abbastanza lontano da me perché potessi a stento cogliere i suoi commenti: parole amare che [Select_CString(family_rival.IsFemale,'lei','lui')] rivolgeva a chi sedeva accanto a [Select_CString(family_rival.IsFemale,'lei','lui')], camuffate come allusioni a nessuno in particolare, ma che erano chiaramente stoccate dirette a me. Hanno lentamente preso corpo nel corso della sera, sia in volume sia in acidità, man mano che [family_rival.GetFirstNameNoTooltip] beveva sempre di più, e tutto ciò che potevo fare era serrare i denti e fingere di ignorarlo.\n\nAlla fine, quando ne ho avuto abbastanza, mi sono alzato e ho ordinato al mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))] di lasciare la tavola, e [Select_CString(family_rival.IsFemale,'lei','lui')] ha assunto un'aria di innocenza e d'offesa così insopportabile che mi sono voltato e ho lasciato io stesso la sala, furente e, onestamente, considerando l'idea di bandire del tutto [Select_CString(family_rival.IsFemale,'lei','lui')] dalla mia corte."
  lmf_feast.1022.a:0 "Meno male che [Select_CString(family_rival.IsFemale,'lei','lui')] è di famiglia..."

  lmf_feast.1023.t:0 "Banchetto di famiglia: Il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))|U]"
  lmf_feast.1023.desc:0 "La riunione di questa sera a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stata un affare quieto e per lo più privo d'incidenti. Per nessuna ragione che io abbia saputo discernere, il tema della conversazione è scivolato sul mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))], morto e dipartito ormai da anni.\n\nLa famiglia parlava di [Select_CString(dead_relative.IsFemale,'lei','lui')] a mezza voce, talvolta con divertiti sghignazzi e altre volte con amarezza, finché infine [family_toaster.GetFirstNameNoTooltip] si è alzato e ha chiesto l'attenzione di tutti.\n\n«Alziamo tutti il calice in memoria di [dead_relative.Custom('IT_NAM_COL2')][dead_relative.GetTitledFirstName],» ha proclamato il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_toaster'))] a coloro che erano riuniti nella grande sala.\n\n«[Select_CString(dead_relative.IsFemale,'Lei','Lui')|U] ha governato bene su [dead_relative.GetPrimaryTitle.GetNameNoTooltip] finché [Select_CString(dead_relative.IsFemale,'lei','lui')] ha vissuto e ora dimora in [dead_relative.GetFaith.PositiveAfterLife], ma il ricordo di [Select_CString(dead_relative.IsFemale,'lei','lui')] resterà con noi per sempre. Che [dead_relative.GetFaith.DeathDeityName] vegli su [Select_CString(dead_relative.IsFemale,'lei','lui')] per tutta l'eternità!»"
  lmf_feast.1023.a:0 "Così sia!"

  lmf_feast.1024.t:0 "Banchetto di famiglia: Fuori posto"
  lmf_feast.1024.desc.start:0 "Il banchetto di famiglia a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato una faccenda vivace stasera, rumorosa e chiassosa e colma d'allegria.\n\nTutto tranne che per il giovane [family_hostage.GetTitledFirstNameNoTooltip], pare. Ho notato quel[family_hostage.Custom('GetLassLad')] seduto da solo all'estremità lontana della tavola, capo chino e visibilmente a disagio.\n\nDev'essere difficile, ho pensato, "
  lmf_feast.1024.desc.language.none:0 "non parlare [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip], e non avere una sola persona al banchetto che parli [family_hostage.GetCulture.GetLanguage.GetNameNoTooltip].\n\n"
  lmf_feast.1024.desc.language.one:0 "non parlare [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip], e non avere nessuno al banchetto che parli [family_hostage.GetCulture.GetLanguage.GetNameNoTooltip] se non [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_hostage_common'))].\n\n"
  lmf_feast.1024.desc.religion.none:0 "essere l'unico fedele di [family_hostage.GetFaith.GetNameNoTooltip] al banchetto, senza che nessuno segua i suoi costumi o, con ogni probabilità, sappia persino quali siano.\n\n"
  lmf_feast.1024.desc.religion.one:0 "essere l'unico fedele di [family_hostage.GetFaith.GetNameNoTooltip] al banchetto oltre a [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hostage_common'))], e senza che nessuno segua i suoi costumi.\n\n"
  lmf_feast.1024.desc.culture.none:0 "essere [family_hostage.GetCulture.GetNameNoTooltip] e non avere una sola anima al banchetto che conosca o si curi delle tradizioni [family_hostage.GetCulture.GetNameNoTooltip].\n\n"
  lmf_feast.1024.desc.culture.one:0 "essere [family_hostage.GetCulture.GetNameNoTooltip] e avere soltanto [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hostage_common'))] che anche solo conosca o si curi delle tradizioni [family_hostage.GetCulture.GetNameNoTooltip].\n\n"
  lmf_feast.1024.desc.end:0 "A dirla tutta, in quel momento mi sono sentito in colpa per [Select_CString(family_hostage.IsFemale,'lei','lui')]. Forse bisognava fare qualcosa?"
  lmf_feast.1024.a:0 "Farò del mio meglio per far sentire [Select_CString(family_hostage.IsFemale,'lei','lui')] a casa."
  lmf_feast.1024.b:0 "Non sono il [ROOT.Char.GetMotherFather] di [Select_CString(family_hostage.IsFemale,'lei','lui')]. [Select_CString(family_hostage.IsFemale,'Lei','Lui')|U] può cavarsela da [Select_CString(family_hostage.IsFemale,'sola','solo')]."

  lmf_feast.1025.t:0 "Banchetto di famiglia: Il mio pupillo"
  lmf_feast.1025.desc.start:0 "Il banchetto di stasera a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato una faccenda piuttosto noiosa, e stavo quasi per appisolarmi sulla sedia quando ho notato il giovane [family_ward.GetFirstNameNoTooltip] non lontano, rapito da una conversazione "
  lmf_feast.1025.desc.relation:0 "che [family_ward.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_example'))] stava avendo con qualcun altro.\n\n"
  lmf_feast.1025.desc.norelation:0 "che il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_example'))] stava avendo con qualcun altro.\n\n"
  lmf_feast.1025.desc.mid:0 "Alla fine, destata la mia curiosità, mi sono avvicinato e ho chiesto a quel[family_ward.Custom('GetLassLad')] che cosa affascinasse tanto [Select_CString(family_ward.IsFemale,'lei','lui')]. A quanto pare, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_example'))] aveva "
  lmf_feast.1025.desc.diplomacy:0 "discusso una faccenda diplomatica piuttosto delicata riguardante un regno straniero, abbastanza complessa "
  lmf_feast.1025.desc.intrigue:0 "discusso a bassa voce questioni d'intrigo, la cui moralità implicata era abbastanza complessa "
  lmf_feast.1025.desc.martial:0 "parlato di una recente battaglia in un altro regno, e le strategie implicate erano abbastanza complesse "
  lmf_feast.1025.desc.learning:0 "pontificato su una questione di filosofia avanzata, abbastanza complessa "
  lmf_feast.1025.desc.stewardship:0 "spiegato una questione di giustizia recentemente trattata dalla mia corte, i cui dettagli erano abbastanza complessi "
  lmf_feast.1025.desc.end:0 "da lasciare [family_ward.GetFirstNameNoTooltip] del tutto confus[Select_CString(family_ward.IsFemale,'a','o')].\n\nRivolgendosi a me, [Select_CString(family_ward.IsFemale,'lei','lui')] ha preteso una spiegazione. Non sorprende, forse, considerando che [Select_CString(family_ward.IsFemale,'lei','lui')] è, di fatto, il mio pupillo e mia responsabilità."
  lmf_feast.1025.a:0 "Ebbene, vedi, la cosa sta così..."
  lmf_feast.1025.a.success:0 "[family_ward.GetFirstNameNoTooltip] capisce e il suo [education_focus|E] progredisce."
  lmf_feast.1025.a.success.tt:0 "[family_ward.GetFirstNameNoTooltip] capisce"
  lmf_feast.1025.a.success2.tt:0 "Il [education_focus|E] di [Select_CString(family_ward.IsFemale,'lei','lui')] progredisce."
  lmf_feast.1025.a.fail:0 "[family_ward.GetFirstNameNoTooltip] non riesce a comprendere la tua spiegazione, per quanto [Select_CString(family_ward.IsFemale,'lei','lui')] ci provi..."
  lmf_feast.1025.a.fail.tt:0 "[family_ward.GetFirstNameNoTooltip] non capisce"
  lmf_feast.1025.a.botch:0 "[family_ward.GetFirstNameNoTooltip] fraintende del tutto, ostacolando il suo [education_focus|E]."
  lmf_feast.1025.a.botch.tt:0 "[family_ward.GetFirstNameNoTooltip] fraintende del tutto"
  lmf_feast.1025.a.botch2.tt:0 "Il [education_focus|E] di [Select_CString(family_ward.IsFemale,'lei','lui')] è ostacolato."
  lmf_feast.1025.b:0 "Basta. Chiedimelo un'altra volta."

  lmf_feast.1026.t:0 "Banchetto di famiglia: Tempo di preghiera"
  lmf_feast.1026.desc.start:0 "Il banchetto di stasera a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato una faccenda piuttosto noiosa, non aiutata dal fatto che [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_religious'))] abbia deciso che questa fosse una buona serata per tenere un lungo sermone al resto della famiglia sull'importanza della pietà e della virtù.\n\n"
  lmf_feast.1026.desc.zealous:0 "Ho ascoltato con rapita attenzione, "
  lmf_feast.1026.desc.cynical:0 "Ho fatto del mio meglio per non roteare gli occhi troppe volte, "
  lmf_feast.1026.desc.nozeal:0 "Ho ascoltato per un po', soffocando l'impulso di sbadigliare, "
  lmf_feast.1026.desc.impatient:0 "ma devo ammettere che era troppo per la mia scarsa pazienza.\n\n"
  lmf_feast.1026.desc.patient:0 "e, grazie al cielo, la mia pazienza mi ha permesso di resistere ben oltre il punto in cui la maggior parte degli altri, nella sala, avrebbe preferito tornare al proprio vino.\n\n"
  lmf_feast.1026.desc.family:0 "anche mentre la maggior parte degli altri, nella sala, fissava con desiderio le proprie coppe o iniziava ad appisolarsi.\n\n"
  lmf_feast.1026.desc.loved:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))] aveva conquistato almeno un membro della famiglia: "
  lmf_feast.1026.desc.relation:0 "[Select_CString(family_religious.IsFemale,'la sua','il suo')] [family_religious.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_react'))], [family_react.Custom('IT_NAM_COL3')][family_react.GetTitledFirstNameNoTooltip], "
  lmf_feast.1026.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_react'))], "
  lmf_feast.1026.desc.loved2:0 "che appariva deliziat[Select_CString(family_react.IsFemale,'a','o')] e incitava [family_religious.GetFirstNameNoTooltip] ben oltre il punto in cui [Select_CString(family_religious.IsFemale,'lei','lui')] altrimenti si sarebbe fermat[Select_CString(family_religious.IsFemale,'a','o')].\n\nAlla fine della sera, quando la maggior parte della famiglia si era da tempo ritirata in silenzio, i due si potevano vedere dall'altro lato della sala, impegnati in un rapito dibattito religioso."
  lmf_feast.1026.desc.hated:0 "Almeno un membro della riunione ha preso in particolare eccezione a tale intrattenimento: "
  lmf_feast.1026.desc.hated2:0 "che ha serrato i denti per oltre un'ora prima di iniziare, infine, a schernire e interrompere [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))] quasi a ogni occasione.\n\nQuando il sermone è finalmente terminato, con grande sollievo della maggior parte della sala, i due si potevano scorgere all'estremità opposta, a discutere senza fine di questioni religiose. Ho il sospetto che entrambi ricorderanno questa sera a lungo."
  lmf_feast.1026.desc.default:0 "È andato avanti e avanti per un bel pezzo, finché infine la maggior parte della famiglia si è ritirata in silenzio dalla grande sala. Quando [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))] è rimast[Select_CString(family_religious.IsFemale,'a','o')] senza energie per continuare, perfino io ho dovuto applaudire alla sua resistenza. Un[family_religious.GetFaith.GetAdherentNameNoTooltip] di notevole tenacia, davvero!"
  lmf_feast.1026.a:0 "Io, personalmente, preferisco i sermoni nella [ROOT.Char.GetFaith.HouseOfWorship|l]."
  loved_family_feast_sermon:0 "[CHARACTER.GetShortUIName|U] ha preso gusto al sermone di [TARGET_CHARACTER.GetShortUINamePossessive] durante un banchetto di famiglia."
  loved_family_feast_sermon_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] ha preso gusto al sermone di [CHARACTER.GetShortUINamePossessive] durante un banchetto di famiglia."
  hated_family_feast_sermon:0 "[CHARACTER.GetShortUIName|U] ha reagito male al sermone di [TARGET_CHARACTER.GetShortUINamePossessive] durante un banchetto di famiglia."
  hated_family_feast_sermon_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] ha reagito male al sermone di [CHARACTER.GetShortUINamePossessive] durante un banchetto di famiglia."

  lmf_feast.1027.t:0 "Banchetto di famiglia: Intrattenimento"
  lmf_feast.1027.desc.start:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_entertainer'))] si è davvero superat[Select_CString(family_entertainer.IsFemale,'a','o')] al banchetto di famiglia di stasera.\n\nLa serata è stata quieta per gran parte del tempo, finché [Select_CString(family_entertainer.IsFemale,'lei','lui')] ha deciso, a quanto pare, che non sarebbe andata così... quando è saltat[Select_CString(family_entertainer.IsFemale,'a','o')] su una delle tavole e "
  lmf_feast.1027.desc.poet:0 "ci ha deliziati con un poema epico [family_entertainer.GetCulture.GetNameNoTooltip].\n\nNon era un ordinario insieme di versi, no. Era una saga di leggenda eroica, e il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_entertainer'))] l'ha narrata con maestria. [Select_CString(family_entertainer.IsFemale,'Lei','Lui')|U] si fermava teatralmente nei punti giusti e dava vita a ogni singolo ruolo. Quando il mostro alzava la testa, [Select_CString(family_entertainer.IsFemale,'lei','lui')] levava le mani e ruggiva, facendo strillare i bambini di terrore e diletto.\n\n"
  lmf_feast.1027.desc.bard:0 "ha iniziato a deliziarci con un canto.\n\nNon so quale spirito sia entrato nel mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_entertainer'))] quella notte, ma la musica che [Select_CString(family_entertainer.IsFemale,'lei','lui')] ha prodotto non era nulla meno che maestria. Ogni nota squisita, ogni parola scelta con cura e resa con precisione. Proprio quando pensavamo che un canto stesse per finire, [family_entertainer.GetFirstNameNoTooltip] passava senza sforzo al successivo.\n\n"
  lmf_feast.1027.desc.end:0 "Dire che la cosa è piaciuta alla famiglia sarebbe riduttivo. Alla fine, metà di noi era in lacrime, e quando [family_entertainer.GetFirstNameNoTooltip] ha fatto il suo ultimo inchino e ha lasciato la tavola, è stato fra gli scroscianti applausi di tutti i presenti.\n\nNon lo dimenticheremo tanto presto, ne sono certo."
  lmf_feast.1027.a:0 "Che splendida serata!"

  lmf_feast.1028.t:0 "Banchetto di famiglia: Conversazione"
  lmf_feast.1028.desc.start:0 "È stata una buona notte al banchetto di famiglia a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nPer cominciare, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nPiù tardi, sono scivolato in una conversazione facile con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_expert'))], che "
  lmf_feast.1028.desc.diplomat:0 "ha parlato a lungo di questioni diplomatiche e opportunità per [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] con i suoi vicini. Il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] mi ha persino raccontato diverse storie raccapriccianti di fallimenti diplomatici nella storia che non avevo mai udito, una migliore dell'altra.\n\n"
  lmf_feast.1028.desc.family_first:0 "ha parlato molto di famiglia... un argomento che di norma non mi interesserebbe, ma il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] aveva una comprensione di come le famiglie possano andare più d'accordo fra loro che mi è parsa affascinante. Non avevo mai udito idee simili a quelle che [Select_CString(family_expert.IsFemale,'lei','lui')] esprimeva.\n\n"
  lmf_feast.1028.desc.august:0 "ha parlato molto di governo, del rapporto fra un sovrano [ROOT.Char.GetLadyLord] e i suoi vassalli, e di come stabilire una migliore intesa fra entrambe le parti. È stato davvero affascinante, pieno d'intuizioni che non sapevo nemmeno il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] potesse avere.\n\n"
  lmf_feast.1028.desc.strategist:0 "ha raccontato storie su diverse battaglie storiche: gli errori dei comandanti, gli ingegnosi salvataggi dell'ultimo istante che hanno cambiato la marea della guerra, e come spesso tutto si riduca a chi abbia le migliori linee di rifornimento. Avevo già udito queste storie, credo, ma il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] ha un modo di dirle che le fa sembrare nuove e terribilmente pertinenti.\n\n"
  lmf_feast.1028.desc.overseer:0 "ha parlato a lungo delle banali questioni di rifornimento dell'esercito... un argomento che di norma mi annoierebbe fino alle lacrime, ma il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] ha un modo di renderlo affascinante. Oh, come anche la forza più possente possa essere abbattuta dalla mancanza del pane quotidiano! Chi avrebbe pensato che avrei riso tanto parlando di catene di rifornimento?\n\n"
  lmf_feast.1028.desc.gallant:0 "ha parlato di romanticismo e cavalleria, temi che di norma troverei piuttosto noiosi e persino mielosi, ma il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] aveva un modo di farli sembrare materia di leggenda. Il modo in cui gli occhi di [Select_CString(family_expert.IsFemale,'lei','lui')] s'illuminavano mentre ne parlava li rendeva incredibilmente attuali, in qualche modo.\n\n"
  lmf_feast.1028.desc.architect:0 "ha parlato molto di architettura... un tema che di certo non mi interesserebbe granché, eppure il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] aveva un modo di farlo sembrare così importante e affascinante. Non sapevo quanta arte entrasse nel costruire una [ROOT.Char.GetFaith.HouseOfWorship]! O l'importanza di una semplice colonna di pietra!\n\n"
  lmf_feast.1028.desc.administrator:0 "ha parlato di questioni d'amministrazione del regno... un tema che di norma mi annoierebbe fino alle lacrime, eppure il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] riusciva in qualche modo a trasformare ogni faccenda banale in una storia di conseguenze epiche! La sua intuizione su cose a cui di rado pensavo mi è parsa quasi inquietante, e i suoi consigli erano tutti ben ponderati e meditati.\n\n"
  lmf_feast.1028.desc.avaricious:0 "ha parlato per lo più del suo amore per la moneta e dei vari modi per guadagnarla... un tema che di norma troverei un po' ripugnante, eppure il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] era pieno di storie che parevano infinitamente affascinanti. Non ogni modo di trarre profitto doveva essere privo di morale, diceva [Select_CString(family_expert.IsFemale,'lei','lui')], e in effetti aveva un'intera scorta di racconti a sostenere la sua tesi.\n\n"
  lmf_feast.1028.desc.schemer:0 "ha parlato molto dei vari intrighi in cui [Select_CString(family_expert.IsFemale,'lei','lui')] si era divertit[Select_CString(family_expert.IsFemale,'a','o')] a indulgere. In più punti sono stato tentato di voltarmi altrove, ma in qualche modo il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] riusciva sempre a tenermi interessato. Ogni storia diceva molto della sua conoscenza dell'intrigo, e non vi era fine ai colpi di scena!\n\n"
  lmf_feast.1028.desc.seducer:0 "ha parlato per lo più delle sue conquiste carnali, un tema che di norma mi interesserebbe poco, ma il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] era abbastanza alticcio da avere le labbra sciolte su questioni che di solito terrebbe per sé. Un racconto sconcio dopo l'altro ha trattenuto la mia piena attenzione, colmo di dettagli scandalosi che riuscivo a stento a credere.\n\n"
  lmf_feast.1028.desc.torturer:0 "ha parlato per lo più dell'utilità della tortura. All'inizio ero disgustato, finché non ho compreso che il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] era abbastanza alticcio da avere le labbra sciolte su questioni che di solito terrebbe per sé. I dettagli erano sconvolgenti quanto rivelatori di metodi che non avevo mai udito, e in qualche modo non riuscivo a staccarmene.\n\n"
  lmf_feast.1028.desc.whole_of_body:0 "ha parlato molto del corpo umano e della natura di cose come le malattie e i vari umori... un argomento che di norma è un po' arido, ma il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] ha un modo di renderlo interessante, in qualche modo. [Select_CString(family_expert.IsFemale,'Lei','Lui')|U] sembrava così determinat[Select_CString(family_expert.IsFemale,'a','o')], sempre desideros[Select_CString(family_expert.IsFemale,'a','o')] di sapere di più, e mi ha fatto sentire lo stesso.\n\n"
  lmf_feast.1028.desc.scholar:0 "ha parlato per lo più di questioni dotte, ma invece delle aride recitazioni di filosofia e storia che ci si aspetterebbe da uno così istruito, il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] trasformava ogni problema in un enigma affascinante. «Sappiamo così poco della creazione di [family_expert.GetFaith.CreatorNamePossessive],» ha detto [Select_CString(family_expert.IsFemale,'lei','lui')], scuotendo il capo con tristezza.\n\n"
  lmf_feast.1028.desc.theologian:0 "ha parlato per lo più di questioni di teologia... un tema arido per un banchetto, eppure ho compreso che il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))] era abbastanza alticcio da avere le labbra sciolte su argomenti che di solito terrebbe per sé. Le cose che [Select_CString(family_expert.IsFemale,'lei','lui')] ha detto su [ROOT.Char.GetFaith.CreatorName] e la creazione, sul ruolo di [ROOT.Char.GetFaith.GetNameNoTooltip] e dell'umanità... non avevo mai udito nulla di tutto ciò espresso in quel modo, a dirla vera!\n\n"
  lmf_feast.1028.desc.end:0 "Dire che ho fatto per lo più da ascoltatore sarebbe riduttivo. Sono rimasto lì, pendendo dalle sue labbra finché quasi tutti se n'erano andati. Quando infine ci siamo guardati intorno e ce ne siamo accorti, [Select_CString(family_expert.IsFemale,'lei','lui')] si è scusat[Select_CString(family_expert.IsFemale,'a','o')] profusamente per avermi monopolizzato tutta la sera, ma io ho scacciato la sua preoccupazione. Avevo, in effetti, imparato molto."
  lmf_feast.1028.a:0 "Che serata istruttiva!"
  good_family_feast_conversation:0 "[CHARACTER.GetShortUIName|U] ha imparato molto da [TARGET_CHARACTER.GetShortUIName] durante una lunga serata di conversazione a un banchetto di famiglia."
  good_family_feast_conversation_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] ha imparato molto da [CHARACTER.GetShortUIName] durante una lunga serata di conversazione a un banchetto di famiglia."

  lmf_feast.1029.t:0 "Banchetto di famiglia: Disprezzo"
  lmf_feast.1029.desc.start:0 "Il banchetto di famiglia di stasera a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato quieto. Tanto più sfortunato che [public_lover.GetFirstNameNoTooltip] abbia scelto proprio questo per presentarsi.\n\n"
  lmf_feast.1029.desc.notfamily:0 "Ho detto a [Select_CString(public_lover.IsFemale,'lei','lui')] molte volte che [Select_CString(public_lover.IsFemale,'lei','lui')] era liber[Select_CString(public_lover.IsFemale,'a','o')] di venire a simili eventi, ora che la nostra relazione è nota a tutti. Stasera, tuttavia, poiché non vi era altro su cui la mia famiglia potesse concentrarsi, si sono concentrati su #EMP [Select_CString(public_lover.IsFemale,'lei','lui')]#!.\n\n"
  lmf_feast.1029.desc.family:0 "Pur essendo di famiglia, considerando che tutti conoscono la nostra relazione, [Select_CString(public_lover.IsFemale,'lei','lui')] avrebbe potuto evitare di venire del tutto, ma [Select_CString(public_lover.IsFemale,'lei','lui')] desiderava vedermi. Stasera, tuttavia, poiché non vi era altro su cui il resto della famiglia potesse concentrarsi, si sono concentrati su #EMP [Select_CString(public_lover.IsFemale,'lei','lui')]#!.\n\n"
  lmf_feast.1029.desc.end:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))|U] ha preso particolare eccezione alla sua presenza.\n\nI sussurri e gli sguardi sono iniziati subito, e potevo vedere che [public_lover.GetFirstNameNoTooltip] era a disagio. Stavo per suggerire a [Select_CString(public_lover.IsFemale,'lei','lui')] di andarsene, ma è allora che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_hater'))] si è avventat[Select_CString(family_hater.IsFemale,'a','o')] sulla scena. I due hanno iniziato a discutere, attirando l'attenzione di tutta la sala, e quando [public_lover.GetFirstNameNoTooltip] è stat[Select_CString(public_lover.IsFemale,'a','o')] insultat[Select_CString(public_lover.IsFemale,'a','o')] con alcune parole scelte, è allora che [Select_CString(public_lover.IsFemale,'lei','lui')] ha infine deciso di voltarsi e andarsene.\n\nEra ormai troppo tardi perché io potessi far qualcosa, e l'atmosfera di festa si è decisamente raffreddata."
  lmf_feast.1029.a:0 "Ebbene, è stato spiacevole..."
  lover_showed_at_family_feast:0 "[CHARACTER.GetShortUINameNoTooltip|U] ha insultato [TARGET_CHARACTER.GetShortUINameNoTooltip] per aver osato mostrare la sua faccia a un banchetto di famiglia."
  lover_showed_at_family_feast_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltip|U] ha insultato [CHARACTER.GetShortUINameNoTooltip] per aver osato mostrarsi a un banchetto di famiglia."

  lmf_feast.1030.t:0 "Banchetto di famiglia: Scontro culturale"
  lmf_feast.1030.desc:0 "Il banchetto a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stato abbastanza quieto, all'inizio, almeno finché [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))] e [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_react'))] non hanno iniziato a discutere.\n\nIn principio, pareva che i due stessero soltanto dibattendo e nessuno ci ha fatto caso. Poi le loro voci si sono alzate. Era divenuto, a quanto pare, un litigio sul fatto che la cucina [family_hater.GetCulture.GetNameNoTooltip] o quella [family_react.GetCulture.GetNameNoTooltip] fosse migliore. Poi [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_react'))] ha detto qualcosa che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_hater'))] ha preso come offesa, perché è allora che le urla sono davvero cominciate.\n\nI due sono quasi venuti alle mani prima che altri membri della famiglia si precipitassero a separarli, ma il danno era già fatto. Si sono evitati per il resto della serata, e l'umore nella grande sala ne è uscito gravemente smorzato."
  lmf_feast.1030.a:0 "Che sgradevole faccenda."
  argued_over_different_culture:0 "[CHARACTER.GetShortUINameNoTooltip|U] e [TARGET_CHARACTER.GetShortUINameNoTooltip] hanno litigato per differenze culturali durante un banchetto di famiglia."

  lmf_feast.1031.t:0 "Banchetto di famiglia: Spettacolo"
  lmf_feast.1031.desc.start:0 "Le cose erano quiete al banchetto di famiglia di stasera... per un po'.\n\nPoi [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_fool'))] "
  lmf_feast.1031.desc.drunkard:0 "si è ubriacat[Select_CString(family_fool.IsFemale,'a','o')] al punto da rendersi ridicol[Select_CString(family_fool.IsFemale,'a','o')]. Un bicchiere dopo l'altro, finché [Select_CString(family_fool.IsFemale,'lei','lui')] ha iniziato a barcollare per la grande sala, urlando al resto della famiglia di unirsi all'allegria nonostante i loro sguardi imbarazzati.\n\n[Select_CString(family_fool.IsFemale,'Lei','Lui')|U] ha importunato i servi, è cadut[Select_CString(family_fool.IsFemale,'a','o')] più volte, e infine ha dovuto essere portat[Select_CString(family_fool.IsFemale,'a','o')] fuori dalla sala da diversi altri membri della famiglia, mentre [Select_CString(family_fool.IsFemale,'lei','lui')] urlava di lasciarl[Select_CString(family_fool.IsFemale,'a','o')] andare."
  lmf_feast.1031.desc.hashishiyah:0 "è divenut[Select_CString(family_fool.IsFemale,'a','o')] così delirante col latte del papavero da rendersi ridicol[Select_CString(family_fool.IsFemale,'a','o')]. Diversi membri della famiglia hanno cercato di dir[Select_CString(family_fool.IsFemale,'le','gli')] di rallentare, ma [Select_CString(family_fool.IsFemale,'lei','lui')] ha agitato via le loro preoccupazioni con irritazione.\n\nAlla fine, [Select_CString(family_fool.IsFemale,'lei','lui')] è giunt[Select_CString(family_fool.IsFemale,'a','o')] al punto di barcollare per la grande sala, quasi privo di sensi. [Select_CString(family_fool.IsFemale,'Lei','Lui')|U] ha vomitato più volte ed è collassat[Select_CString(family_fool.IsFemale,'a','o')], e il suo corpo incosciente è stato portato fuori dai servi mentre il resto di noi fissava in un silenzio imbarazzato."
  lmf_feast.1031.desc.lunatic:0 "si è alzat[Select_CString(family_fool.IsFemale,'a','o')] su una delle tavole, ha gridato per ottenere l'attenzione di tutti e ha iniziato a delirare. All'inizio, tutti hanno pensato che fosse una sorta di brindisi, o forse una storia, e hanno ridacchiato con imbarazzo pur non capendo nulla.\n\nPoi le cose sono degenerate. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))|U] è divenut[Select_CString(family_fool.IsFemale,'a','o')] erratic[Select_CString(family_fool.IsFemale,'a','o')], talvolta urlando e altre volte crollando in singhiozzi. Quando ha afferrato un coltello e ha minacciato di cavarsi gli occhi, l'ho fatt[Select_CString(family_fool.IsFemale,'a','o')] rimuovere dalla sala per la sua stessa sicurezza."
  lmf_feast.1031.desc.irritable:0 "ha iniziato a litigare... dapprima con chi sedeva accanto a [Select_CString(family_fool.IsFemale,'lei','lui')], ma poi si è alzat[Select_CString(family_fool.IsFemale,'a','o')] e ha inveito contro l'intera famiglia. Vecchi rancori sono stati riportati a galla, vecchie colpe — reali o immaginarie — sono state perseguite, tutti erano nel torto e parenti terribili.\n\nLa sua rabbia pareva senza fine, e il resto di noi si fissava in silenzio scioccato finché infine [Select_CString(family_fool.IsFemale,'lei','lui')] ha alzato le mani esasperat[Select_CString(family_fool.IsFemale,'a','o')] ed è uscita in tempesta."
  lmf_feast.1031.desc.depressed:0 "ha iniziato a piangere. In principio erano lacrime silenziose, e il suo malessere attirava soltanto l'attenzione e il conforto di chi sedeva accanto a [Select_CString(family_fool.IsFemale,'lei','lui')]. Inconsolabile, tuttavia, [Select_CString(family_fool.IsFemale,'lei','lui')] ha iniziato a singhiozzare davvero... e ciò ha allarmato l'intera famiglia.\n\nBen presto, quasi tutti circondavano [Select_CString(family_fool.IsFemale,'lei','lui')], chiedendo che cosa non andasse e cercando di aiutare, ma questo pareva soltanto peggiorare la cosa. Quando [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))] è fuggit[Select_CString(family_fool.IsFemale,'a','o')] dalla sala, ha lasciato il resto di noi a fissarci in un silenzio scioccato e imbarazzato."
  lmf_feast.1031.desc.rakish:0 "ha dato spettacolo di sé. [Select_CString(family_fool.IsFemale,'Lei','Lui')|U] ha trascorso la serata a importunare i servi da ubriac[Select_CString(family_fool.IsFemale,'a','o')] e a fare osservazioni oscene che tutti potevano chiaramente udire. Alcune erano tanto profane da strappare ansiti ai membri più castigati della famiglia.\n\nQuando ha afferrato uno dei più giovani servi [dummy_attracted_gender.Custom('FemaleMale')] e ha palpeggiato [dummy_attracted_gender.GetHerHim] — nonostante le sue frenetiche proteste — davanti alla famiglia, sono infine intervenuto e l'ho fatto trascinare fuori dalla sala, mentre tutti fissavano in un silenzio scioccato e imbarazzato."
  lmf_feast.1031.desc.reclusive:0 "ha deciso, a quanto pare, d'averne abbastanza della nostra compagnia. [Select_CString(family_fool.IsFemale,'Lei','Lui')|U] si è alzat[Select_CString(family_fool.IsFemale,'a','o')], ha chiesto la nostra attenzione e ha iniziato a dire a ciascuno di noi esattamente ciò che pensava... e i suoi pensieri non erano gentili.\n\n«Perché mi prenda la briga di venire a queste riunioni va oltre ogni comprensione!» ha urlato. «Non voglio essere qui! Nessuno di voi mi vuole qui! Quindi, se mi scuserete, me ne andrò #EMP felicemente#!!» Con ciò, [Select_CString(family_fool.IsFemale,'lei','lui')] è uscit[Select_CString(family_fool.IsFemale,'a','o')] in tempesta dalla sala e ha lasciato il resto di noi a fissarci in un silenzio scioccato."
  lmf_feast.1031.desc.deviant:0 "ha dato spettacolo di sé. [Select_CString(family_fool.IsFemale,'Lei','Lui')|U] ha trascorso la serata a importunare i servi e a fare osservazioni oscene che tutti potevano chiaramente udire. Alcune erano tanto profane da strappare ansiti ai membri più castigati della famiglia.\n\nInfine, [Select_CString(family_fool.IsFemale,'lei','lui')] ci ha scioccati tutti strappandosi di dosso gli abiti, salendo su una tavola e rimproverandoci per essere troppo pudichi per godere del nostro corpo. [Select_CString(family_fool.IsFemale,'Lei','Lui')|U] è uscit[Select_CString(family_fool.IsFemale,'a','o')] in tempesta prima che potessi far[Select_CString(family_fool.IsFemale,'la','lo')] rimuovere, e il resto di noi è rimasto a fissarsi in un silenzio scioccato e imbarazzato."
  lmf_feast.1031.desc.contrite:0 "ha sorpreso tutti salendo su una delle tavole. [Select_CString(family_fool.IsFemale,'Lei','Lui')|U] è rimast[Select_CString(family_fool.IsFemale,'a','o')] lì per un momento, torcendosi le mani con ansia, finché la sala non è divenuta quieta e tutti hanno atteso di sentire cosa avesse da dire.\n\n«Non posso più sopportarlo,» ha detto. «Il peso di questo segreto, è... è troppo! [family_fool.GetFaith.HighGodName] mi giudica per il mio silenzio e non lo sopporterò oltre!» Poi ha rivelato il suo segreto e, mentre noi tutti eravamo ammutoliti dallo stupore, è fuggit[Select_CString(family_fool.IsFemale,'a','o')] dalla sala."
  lmf_feast.1031.desc.newtrait:0 "\n\nChe cosa abbia scatenato tutto ciò, nessuno saprebbe dirlo, poiché di norma [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))] non è così. Stress, più che altro.\n\n"
  lmf_feast.1031.desc.trait:0 "\n\nNon è un comportamento nuovo per [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))], è vero, ma farlo a una riunione? Deve essere sotto un'enorme pressione.\n\n"
  lmf_feast.1031.desc.end:0 "Qualunque sia la causa, l'umore nella grande sala ne è uscito gravemente smorzato... sebbene la famiglia avrà di che spettegolare per mesi, ne sono certo."
  lmf_feast.1031.a:0 "Ebbene, è stato... qualcosa, sì."

  lmf_feast.1032.t:0 "Banchetto di famiglia: Gioia"
  lmf_feast.1032.desc:0 "L'umore è stato leggero al banchetto di famiglia di stasera a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], con allegria in abbondanza.\n\nPoi le cose sono divenute ancor più vivaci, grazie ad alcuni caporioni: [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_1'))], [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_2'))], e [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_3'))].\n\n[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_celebrate_2'))] ha dato il via chiedendo ai musicisti di suonare qualcosa di vivace, e quando [Select_CString(family_celebrate_2.IsFemale,'lei','lui')] ha iniziato a danzare gli altri due si sono uniti in fretta.\n\nHanno trascinato altri membri della famiglia sulla pista, uno dopo l'altro, e prima che me ne rendessi conto l'intera sala era travolta da una gioiosa baldoria. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_celebrate_1'))] è salit[Select_CString(family_celebrate_1.IsFemale,'a','o')] su una delle tavole, invitandomi a mostrare le mie doti di danza, e ammetto d'averlo fatto, con grande diletto di tutti.\n\nQuando la sera è volata al termine, eravamo tutti esausti... ma piacevolmente, poiché questa sarà una notte che difficilmente qualcuno in famiglia dimenticherà presto."
  lmf_feast.1032.a:0 "Sì! Ancora così, vi prego."
  all_stressed_family_dinner_guests:0 "Tutti gli ospiti del banchetto di famiglia"

  lmf_feast.1033.t:0 "Banchetto di Famiglia: Disprezzo"
  lmf_feast.1033.desc.start:0 "La serata era iniziata abbastanza bene al banchetto di famiglia, finché [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_1'))] ha cominciato a litigare con [Select_CString(family_rival_1.IsFemale,'la','il')] [family_rival_1.Custom('WifeHusband')] di [family_rival_2.Custom('WifeHusband')].\n\nCredo sia stat[Select_CString(angry_spouse.IsFemale,'a','o')] [angry_spouse.GetFirstNameNoTooltip] a dare inizio a tutto. Sguardi gelidi verso [Select_CString(angry_spouse.IsFemale,'la','il')] [target_spouse.Custom('WifeHusband')], seguiti da commenti acidi che hanno lasciato tutti attorno in silenzio e a disagio, finché infine [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] non ha più retto.\n\nÈ allora che sono cominciate le urla. Per quel che riuscivo a sentire, "
  lmf_feast.1033.desc.sodomy:0 "si trattava delle tresche di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] con altri uomini, uno scandalo ben noto a tutti nella sala.\n\n"
  lmf_feast.1033.desc.incest:0 "si trattava del... be', dell'incesto. Lo scandalo di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] è noto a tutti noi, ovviamente.\n\n"
  lmf_feast.1033.desc.deviant:0 "si trattava di qualche questione legata al loro talamo nuziale e, considerati i gusti ben noti di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]... non c'è da stupirsi.\n\n"
  lmf_feast.1033.desc.secretsodomy:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] veniva accusat[Select_CString(target_spouse.IsFemale,'a','o')] di relazioni con un altro uomo... una rivelazione sconvolgente per la famiglia, senza dubbio.\n\n"
  lmf_feast.1033.desc.secretincest:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))] veniva accusat[Select_CString(target_spouse.IsFemale,'a','o')] di nientemeno che incesto... una rivelazione sconvolgente per la famiglia, senza dubbio.\n\n"
  lmf_feast.1033.desc.secretdeviant:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))] era disgustat[Select_CString(angry_spouse.IsFemale,'a','o')] dalla 'devianza sessuale' di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]... una novità per tutti noi, a quanto pare.\n\n"
  lmf_feast.1033.desc.infidelity:0 "si trattava dell'infedeltà coniugale di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))], un argomento già ben noto a tutta la famiglia.\n\n"
  lmf_feast.1033.desc.secretinfidelity:0 "si trattava della relazione segreta di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))], una rivelazione sconvolgente per tutti noi.\n\n"
  lmf_feast.1033.desc.rival:0 "era poco più che il loro odio reciproco che ribolliva ancora una volta. Le solite vecchie accuse, ora messe in piazza davanti a tutta la famiglia.\n\n"
  lmf_feast.1033.desc.potrival:0 "era un torrente d'odio trattenuto che esplodeva tutto in una volta, qualcosa che a quanto pare covava in [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))] da tempo.\n\n"
  lmf_feast.1033.desc.end:0 "O, almeno, dovrei dire che è lì che #EMP è iniziato#!. Le urla e le recriminazioni sono andate avanti per quasi un'ora, finché il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('target_spouse'))] non ha supplicato il resto di noi di intervenire. Quando l'ho fatto, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))] ha riversato la furia di [Select_CString(angry_spouse.IsFemale,'lei','lui')] su #EMP di me.#!\n\nÈ allora che ho capito che era il momento di porre fine alla serata."
  lmf_feast.1033.a:0 "Che imbarazzo per tutti noi."

  lmf_heir.1501.t:0 "Addestramento Segreto"
  lmf_heir.1501.start:0 "Sto ispezionando le fortificazioni quando [new_educator.Custom2('MyCharacterIntroduction', ROOT.Char)] mi chiede di parlarmi in privato.\n\n"Il tuo [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] è venut[Select_CString(focus_child.IsFemale,'a','o')] spesso da me negli ultimi mesi, mio [ROOT.Char.GetLadyLord], chiedendo lezioni di scherma. Non [Select_CString(focus_child.IsFemale,'l','gl')]ho negat[Select_CString(focus_child.IsFemale,'a','o')], poiché ne vedo la passione, ma... non posso continuare così, di nascosto."\n\n"[focus_child.Custom('IT_NAM_COL3')][focus_child.GetTitledFirstNameNoTooltip] ha un grande potenziale", insiste [Select_CString(new_educator.IsFemale,'lei','lui')], "e [Select_CString(focus_child.IsFemale,'lei','lui')] è infelice negli studi attuali."\n\n"
  lmf_heir.1501.unusual:0 ""So bene che è assai inusuale per [focus_child.Custom('GirlBoy')] imbracciare la lama, ma""
  lmf_heir.1501.default:0 ""So che devi avere altri piani per il futuro di [Select_CString(focus_child.IsFemale,'lei','lui')], ma""
  lmf_heir.1501.end:0 "Sarei disposto a addestrar[Select_CString(focus_child.IsFemale,'la','lo')] e a recuperare il tempo perduto, se lo permetti. [Select_CString(focus_child.IsFemale,'Lei','Lui')] imparerà in fretta, te lo prometto.""
  lmf_heir.1500.a.tt_change:0 "Il [education_focus|E] di [focus_child.GetFirstNamePossessiveNoTooltip] cambia in [martial|E]"
  lmf_heir.1500.a.tt_tutor:0 "[new_educator.Custom('IT_NAM_COL3')][new_educator.GetTitledFirstNameNoTooltip] addestra personalmente [focus_child.GetFirstNameNoTooltip] per recuperare l'istruzione perduta"
  lmf_heir.1501.a:0 "E sia. Vediamo come se la cava [focus_child.GetFirstNameNoTooltip]."
  lmf_heir.1501.b:0 "Assolutamente no. [focus_child.GetFirstNameNoTooltip] deve concentrarsi sugli studi attuali."
  lmf_heir.1501.c:0 "[new_educator.GetFirstNameNoTooltip] può aiutare, ma addestrerò [focus_child.GetFirstNameNoTooltip] alla spada io stesso."
  lmf_heir.1501.d:0 "[new_educator.GetFirstNameNoTooltip] può aiutare, ma resterò io il tutor di [focus_child.GetFirstNamePossessiveNoTooltip]."

  lmf_heir.1503.t:0 "Addestramento Marziale del[Select_CString(focus_child.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))|U]"
  lmf_heir.1503.start:0 "Mi è giunta voce dell'addestramento marziale del[Select_CString(focus_child.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))|U], e non è... una buona notizia.\n\n"[focus_child.Custom('IT_NAM_COL3')][focus_child.GetTitledFirstNameNoTooltip] è ancora giovan[Select_CString(focus_child.IsFemale,'e','e')], è vero", mi confida l'ultimo istruttore di [Select_CString(focus_child.IsFemale,'lei','lui')], "ma è chiaro che il cuore di [Select_CString(focus_child.IsFemale,'lei','lui')] non è in ciò, mio [ROOT.Char.GetLadyLord]. [Select_CString(focus_child.IsFemale,'Lei','Lui')] "
  lmf_heir.1503.female:0 "sa che non [Select_CString(focus_child.IsFemale,'le','gli')] sarà mai concesso di prendere le armi davvero e, anche se non fosse così, "
  lmf_heir.1503.end:0 "manca semplicemente sia di talento sia d'interesse per le questioni di strategia."\n\nNon è il primo rapporto del genere che ricevo. Per quanto possa essere deludente, forse è giunto il momento di spostare [focus_child.GetFirstNameNoTooltip] verso un altro ambito di studio in cui [Select_CString(focus_child.IsFemale,'lei','lui')] possa eccellere."
  lmf_heir.1503.a:0 "Forse [new_diplomacy_educator.GetFirstName] può fare da tutor a [Select_CString(focus_child.IsFemale,'lei','lui')] in diplomazia."
  lmf_heir.1503.b:0 "[focus_child.GetFirstNameNoTooltip] studierà diplomazia, e più avanti troveremo un tutor adatto."
  lmf_heir.1503.c:0 "Forse [new_stewardship_educator.GetFirstName] può fare da tutor a [Select_CString(focus_child.IsFemale,'lei','lui')] in amministrazione."
  lmf_heir.1503.d:0 "[focus_child.GetFirstNameNoTooltip] studierà amministrazione, e più avanti troveremo un tutor adatto."
  lmf_heir.1503.e:0 "Forse [new_intrigue_educator.GetFirstName] può fare da tutor a [Select_CString(focus_child.IsFemale,'lei','lui')], invece."
  lmf_heir.1503.f:0 "[focus_child.GetFirstNameNoTooltip] studierà intrigo, e più avanti troveremo un tutor adatto."
  lmf_heir.1503.g:0 "Forse [new_learning_educator.GetFirstName] può fare da tutor a [Select_CString(focus_child.IsFemale,'lei','lui')], invece."
  lmf_heir.1503.h:0 "[focus_child.GetFirstNameNoTooltip] avrà una vera istruzione, e più avanti troveremo un tutor adatto."
  lmf_heir.1503.i:0 "No, [focus_child.GetFirstNameNoTooltip] deve solo applicarsi e impegnarsi di più."
  lmf_heir.1503.a.tt_change:0 "Il [education_focus|E] di [focus_child.GetFirstNamePossessiveNoTooltip] cambia in [diplomacy|E]"
  lmf_heir.1503.a.tt_tutor:0 "[new_diplomacy_educator.Custom('IT_NAM_COL3')][new_diplomacy_educator.GetTitledFirstNameNoTooltip] addestra personalmente [focus_child.GetFirstNameNoTooltip] per recuperare l'istruzione perduta"
  lmf_heir.1503.tt_no_tutor:0 "[focus_child.GetFirstNameNoTooltip] si impegnerà il doppio per recuperare l'istruzione perduta"
  lmf_heir.1503.b.tt_change:0 "Il [education_focus|E] di [focus_child.GetFirstNamePossessiveNoTooltip] cambia in [stewardship|E]"
  lmf_heir.1503.b.tt_tutor:0 "[new_stewardship_educator.Custom('IT_NAM_COL3')][new_stewardship_educator.GetTitledFirstNameNoTooltip] addestra personalmente [focus_child.GetFirstNameNoTooltip] per recuperare l'istruzione perduta"
  lmf_heir.1503.c.tt_change:0 "Il [education_focus|E] di [focus_child.GetFirstNamePossessiveNoTooltip] cambia in [intrigue|E]"
  lmf_heir.1503.c.tt_tutor:0 "[new_intrigue_educator.Custom('IT_NAM_COL3')][new_intrigue_educator.GetTitledFirstNameNoTooltip] addestra personalmente [focus_child.GetFirstNameNoTooltip] per recuperare l'istruzione perduta"
  lmf_heir.1503.d.tt_change:0 "Il [education_focus|E] di [focus_child.GetFirstNamePossessiveNoTooltip] cambia in [learning|E]"
  lmf_heir.1503.d.tt_tutor:0 "[new_learning_educator.Custom('IT_NAM_COL3')][new_learning_educator.GetTitledFirstNameNoTooltip] addestra personalmente [focus_child.GetFirstNameNoTooltip] per recuperare l'istruzione perduta"

  lmf_heir.1505.t:0 "Addestramento Marziale del[Select_CString(focus_child.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))|U]"
  lmf_heir.1505.desc:0 "Mi è giunta voce dell'addestramento marziale del[Select_CString(focus_child.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))].\n\n"[focus_child.Custom('IT_NAM_COL3')][focus_child.GetTitledFirstNameNoTooltip] è ancora giovane, è vero", mi confida l'ultimo istruttore di [Select_CString(focus_child.IsFemale,'lei','lui')], "ma mostra tale determinazione e un talento naturale. Continua a pretendere che [Select_CString(focus_child.IsFemale,'le','gli')] sia permesso addestrarsi nella vera scherma, mio [ROOT.Char.GetLadyLord], e credo che se non [Select_CString(focus_child.IsFemale,'gl','l')]ielo concediamo, finirà per impararla di nascosto."\n\nÈ del tutto sconveniente che una fanciulla impari a combattere... ma d'altro canto, perché mai dovrebbe essere limitata a studiare soltanto strategia e arte degli eserciti?"
  lmf_heir.1505.a:0 "Lascia che impari a combattere. Vedremo come andrà."
  lmf_heir.1505.b:0 "L'addestramento attuale è sufficiente. Deve concentrarsi su quello."

  lmf_heir.1511.t:0 "Sposarsi per Amore?"
  lmf_heir.1511.desc.start:0 "[focus_child.GetFirstNameNoTooltip] è ancora giovan[Select_CString(focus_child.IsFemale,'e','e')], ma sa che [Select_CString(focus_child.IsFemale,'lei','lui')] ha ormai l'età per cui un fidanzamento può essere dietro l'angolo.\n\n"Se mi sposo, voglio sposarmi per amore!" ha dichiarato [Select_CString(focus_child.IsFemale,'lei','lui')] con audacia a tavola una sera. "[focus_child.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], non mi costringeresti a sposare qualcuno contro il mio volere, vero?"\n\n"
  lmf_heir.1511.desc.sex:0 "È diventato sempre più evidente che il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] non è particolarmente interessat[Select_CString(focus_child.IsFemale,'a','o')] a rincorrere [focus_child.Custom('GetGirlsBoysOpposite')]. Forse questo improvviso desiderio d'indipendenza nasce proprio da ciò?\n\n"
  lmf_heir.1511.desc.lustful:0 "Ho notato, sempre di più, che il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))] sta diventando un[Select_CString(focus_child.IsFemale,'a','o')] [focus_child.Custom('GetLassLad')] assai lussurios[Select_CString(focus_child.IsFemale,'a','o')], pur così giovane. Forse questo improvviso desiderio d'indipendenza nasce dalla voglia di godersi la vita. Lo ammetto, alla sua età provavo lo stesso.\n\n"
  lmf_heir.1511.desc.sibling:0 "Quando mi sono mostrat[Select_CString(ROOT.Char.IsFemale,'a','o')] confus[Select_CString(ROOT.Char.IsFemale,'a','o')] sul perché [Select_CString(focus_child.IsFemale,'lei','lui')] mi chiedesse una cosa simile, [Select_CString(focus_child.IsFemale,'lei','lui')] ha continuato. "Hai permesso a [favored_sibling.GetFirstNameNoTooltip] di sposare chiunque [Select_CString(favored_sibling.IsFemale,'lei','lui')] volesse! Perché a me non dovrebbe essere concesso lo stesso?" Ah. Invidios[Select_CString(focus_child.IsFemale,'a','o')] della libertà del[Select_CString(favored_sibling.IsFemale,'la','del')] [focus_child.Custom2('LMF_RelationToMePossessive', SCOPE.sC('favored_sibling'))]. Ora tutto torna.\n\n"
  lmf_heir.1511.desc.adventure:0 "Lo ammetto, non so da dove venga questo improvviso desiderio d'indipendenza del[Select_CString(focus_child.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))]. Voglia d'avventura, forse? Di vivere la giovinezza senza il peso di un[Select_CString(focus_child.IsFemale,' marito','a moglie')]?\n\n"
  lmf_heir.1511.desc.end.female:0 "La questione è se tali desideri vadano incoraggiati. È responsabilità dei membri della nostra dinastia sposarsi e avere figli e, giusto o no, le donne devono farlo finché sono ancora giovani e nel pieno della vita. Eppure... forse non è ancora il caso di preoccuparsene?"
  lmf_heir.1511.desc.end:0 "La questione è se tutto ciò vada incoraggiato. Dopotutto, è responsabilità dei membri della nostra dinastia sposarsi e avere figli. Eppure... forse può attendere? [focus_child.GetFirstNameNoTooltip] è ancora molto giovan[Select_CString(focus_child.IsFemale,'e','e')] e, a quanto pare, determinat[Select_CString(focus_child.IsFemale,'a','o')] a ottenere ciò che vuole."
  lmf_heir.1511.a:0 "Il matrimonio di [focus_child.GetFirstNameNoTooltip] può attendere, per un po'."
  lmf_heir.1511.b:0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] si sposerà quando lo dirò io, e questo è quanto."
  allowed_to_marry_at_will:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha permesso a [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] di sposarsi di propria volontà, secondo [CharYourHerHis(TARGET_CHARACTER)] libero arbitrio."
  allowed_to_marry_at_will_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha permesso a [CHARACTER.GetShortUINameNoTooltipNoFormat] di sposarsi di propria volontà, secondo [CharYourHerHis(CHARACTER)] libero arbitrio."

  invite_suitor_1_introduction_tt:0 "[suitor_1.Custom('IT_NAM_COL3')][suitor_1.GetTitledFirstName] verrà invitat[Select_CString(suitor_1.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per una presentazione con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip]"
  invite_suitor_2_introduction_tt:0 "[suitor_2.Custom('IT_NAM_COL3')][suitor_2.GetTitledFirstName] verrà invitat[Select_CString(suitor_2.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per una presentazione con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip]"
  invite_suitor_3_introduction_tt:0 "[suitor_3.Custom('IT_NAM_COL3')][suitor_3.GetTitledFirstName] verrà invitat[Select_CString(suitor_3.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per una presentazione con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip]"
  lmf_heir.1516.warning.matrilineal_tt:0 "Se la presentazione porta a un matrimonio, sarà #X matrilineare#!"
  lmf_heir.1516.warning.patrilineal_tt:0 "Se la presentazione porta a un matrimonio, sarà #X patrilineare#!"
  lmf_heir.1516.t:0 "Una Presentazione?"
  lmf_heir.1516.desc.start:0 "La buona notizia è che, pur avendo ottenuto il permesso di sposarsi solo se e quando [Select_CString(secondary_actor.IsFemale,'lei','lui')] lo desideri, [secondary_actor.GetFirstNameNoTooltip] sembra avere alcune idee proprie sull'argomento.\n\nOggi [Select_CString(secondary_actor.IsFemale,'lei','lui')] mi ha avvicinat[Select_CString(secondary_actor.IsFemale,'a','o')] con "
  lmf_heir.1516.desc.one:0 "il nome di un[Select_CString(suitor_1.IsFemale,'a','')] [suitor_1.Custom('WomanManGirlBoy')] che [Select_CString(secondary_actor.IsFemale,'lei','lui')] potrebbe essere interessat[Select_CString(secondary_actor.IsFemale,'a','o')] a "
  lmf_heir.1516.desc.two:0 "il nome di due [suitor_1.Custom('WomenMenGirlsBoys')] che [Select_CString(secondary_actor.IsFemale,'lei','lui')] potrebbe essere interessat[Select_CString(secondary_actor.IsFemale,'a','o')] a "
  lmf_heir.1516.desc.three:0 "una lista di vari [suitor_1.Custom('WomenMenGirlsBoys')] che [Select_CString(secondary_actor.IsFemale,'lei','lui')] potrebbe essere interessat[Select_CString(secondary_actor.IsFemale,'a','o')] a "
  lmf_heir.1516.desc.matrilineal:0 "sposare con matrimonio matrilineare.\n\n"
  lmf_heir.1516.desc.normal:0 "incontrare.\n\n"
  lmf_heir.1516.desc.end:0 "Se acconsento, dovrò invitare [Select_CString(suitor_1.IsFemale,'lei','lui')] qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], per una presentazione in piena regola. Speriamo che il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))] sia ser[Select_CString(secondary_actor.IsFemale,'ia','io')] e non stia sprecando il mio tempo. Se sarò costrett[Select_CString(ROOT.Char.IsFemale,'a','o')] a ignorare i desideri di [Select_CString(secondary_actor.IsFemale,'lei','lui')] per far sì che [Select_CString(secondary_actor.IsFemale,'lei','lui')] si spos[Select_CString(secondary_actor.IsFemale,'i','i')] prima o poi, lo farò."
  lmf_heir.1516.a:0 "Inviteremo [suitor_1.GetFullNameNoTooltip]."
  lmf_heir.1516.b:0 "Inviteremo [suitor_2.GetFullNameNoTooltip]."
  lmf_heir.1516.c:0 "Inviteremo [suitor_3.GetFullNameNoTooltip]."
  lmf_heir.1516.d:0 "Sciocchezze, troverò io qualcun[Select_CString(ROOT.Char.IsFemale,'a','o')] di migliore."

  lmf_heir.1517.t:0 "È Tempo di Nozze"
  lmf_heir.1517.desc:0 "[focus_child.GetFirstNameNoTooltip] è venut[Select_CString(focus_child.IsFemale,'a','o')] da me stamane, con un'aria piuttosto impacciata.\n\n"So di aver detto che volevo sposarmi da sol[Select_CString(focus_child.IsFemale,'a','o')], [focus_child.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], ma la verità è che non ho incontrato un[Select_CString(focus_child.IsFemale,' uomo','a donna')] degn[Select_CString(focus_child.IsFemale,'o','a')] di matrimonio."\n\n"Vuol dire ciò che penso?" ho chiesto, sorridendo.\n\n[Select_CString(focus_child.IsFemale,'Lei','Lui')] ha annuito, sospirando. "Sì, credo sia tempo. Se potessi trovarmi un[Select_CString(focus_child.IsFemale,'a moglie',' marito')] adatto, te ne sarei grato.""
  lmf_heir.1517.a:0 "Finalmente!"

  lmf_heir.1518.t:0 "È Tempo di Tornare?"
  lmf_heir.1518.desc:0 "Oggi ho ricevuto notizie dal mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))].\n\nA quanto pare, [focus_child.GetFirstNameNoTooltip] sente che è tempo di porre fine al proprio vagabondare, anche se ciò significa stabilirsi e accettare qualunque [focus_child.Custom('WifeHusbandOpp')] io decida che [Select_CString(focus_child.IsFemale,'lei','lui')] debba avere. Sempre, ovviamente, che io acconsenta a lasciar[Select_CString(focus_child.IsFemale,'la','lo')] tornare qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nLa ribellione di [focus_child.GetFirstNamePossessiveNoTooltip], a quanto pare, è finita."
  lmf_heir.1518.a:0 "Lascia che veng[Select_CString(focus_child.IsFemale,'a','a')]."
  lmf_heir.1518.b:0 "No, [Select_CString(focus_child.IsFemale,'lei','lui')] può restare dov'è."

  lmf_heir.1519.t:0 "Il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))|U] è Innamorat[Select_CString(heir.IsFemale,'a','o')]"
  lmf_heir.1519.desc.start:0 "Credo di aver finalmente scoperto l'origine della riluttanza di [heir.GetFirstNamePossessiveNoTooltip] a sposarsi: [heir.Custom('GirlBoy')] è innamorat[Select_CString(heir.IsFemale,'a','o')].\n\nSfortunatamente, "
  lmf_heir.1519.desc.samesex:0 "l'oggetto delle sue attenzioni è anch'[Select_CString(heir_lover.IsFemale,'essa','egli')] un[Select_CString(heir.IsFemale,'a','')] [heir_lover.GetWomanMan]. Una situazione piuttosto imbarazzante, senza dubbio.\n\n"
  lmf_heir.1519.desc.order:0 "l'oggetto delle sue attenzioni ha giurato voti a un ordine sacro. [Select_CString(heir_lover.IsFemale,'Lei','Lui')] non può sposarsi, finché [Select_CString(heir_lover.IsFemale,'lei','lui')] resterà fedele ai propri voti.\n\n"
  lmf_heir.1519.desc.married:0 "l'oggetto delle sue attenzioni è già sposat[Select_CString(heir_lover.IsFemale,'a','o')]. Una vecchia storia, per quanto vergognosa.\n\n"
  lmf_heir.1519.desc.betrothed:0 "l'oggetto delle sue attenzioni è già promess[Select_CString(heir_lover.IsFemale,'a','o')] a un altr[Select_CString(heir_lover.IsFemale,'o','a')], anche se non ancora sposat[Select_CString(heir_lover.IsFemale,'a','o')]. [Select_CString(heir_lover.IsFemale,'Lei','Lui')] non può sposare [Select_CString(heir.IsFemale,'lei','lui')], finché quel fidanzamento resterà in vigore.\n\n"
  lmf_heir.1519.desc.permission.lover.man:0 "poiché in passato ho negat[Select_CString(ROOT.Char.IsFemale,'a','o')] al[Select_CString(heir.IsFemale,'la','')] amante di [Select_CString(heir.IsFemale,'lei','lui')] il permesso di sposarsi, l'uomo ora è chiaramente riluttante a chiedere in modo appropriato la mano del[Select_CString(heir.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))].\n\n"
  lmf_heir.1519.desc.permission.lover.woman:0 "poiché in passato ho negat[Select_CString(ROOT.Char.IsFemale,'a','o')] al[Select_CString(heir.IsFemale,'la','')] amante di [Select_CString(heir.IsFemale,'lei','lui')] il permesso di sposarsi, il mio [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))] pensa chiaramente che quel rifiuto valga anche per [Select_CString(heir.IsFemale,'lei','lui')].\n\n"
  lmf_heir.1519.desc.permission.both:0 "il mio precedente rifiuto di lasciarli sposare significa che ora intendono continuare di nascosto. Una situazione piuttosto imbarazzante, se la si lascia andare avanti.\n\n"
  lmf_heir.1519.desc.permission.heir.man:0 "il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] è chiaramente riluttante a chiedere il permesso di sposare [Select_CString(heir_lover.IsFemale,'lei','lui')], considerando il mio precedente rifiuto.\n\n"
  lmf_heir.1519.desc.permission.heir.woman:0 "è chiaro che l'uomo è riluttante a chiedere il permesso di sposare il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))], considerando che ho già respinto una proposta per la sua mano.\n\n"
  lmf_heir.1519.desc.generic:0 "È impossibile che i due si sposino. Così continuano di nascosto, e il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))] è troppo pres[Select_CString(heir.IsFemale,'a','o')] per considerare che [Select_CString(heir.IsFemale,'lei','lui')] ha un dovere più grande di questo [heir_lover.GetWomanMan] che ama.\n\n"
  lmf_heir.1519.desc.end.canact:0 "Forse dovrei dire a [heir.GetFirstNameNoTooltip] che lo so, e fare in modo che si sposino comunque. Oppure dire a [Select_CString(heir.IsFemale,'lei','lui')] di troncare questa unione senza speranza. In ogni caso, probabilmente bisogna fare qualcosa."
  lmf_heir.1519.desc.end:0 "Potrei interferire nella relazione del[Select_CString(heir.IsFemale,'la mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))], anche se dubito che [Select_CString(heir.IsFemale,'lei','lui')] me ne sarà grat[Select_CString(heir.IsFemale,'a','o')]."
  lmf_heir.1519.a:0 "[heir.GetFirstNameNoTooltip] deve finirla. Non porterà a nulla."
  lmf_heir.1519.b:0 "Dirò loro che ho cambiato idea."
  lmf_heir.1519.c:0 "[heir_lover.GetFirstNameNoTooltip] deve abbandonare i propri voti e sposare il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]."
  lmf_heir.1519.d:0 "[heir_lover.GetFirstNameNoTooltip] deve rompere il proprio fidanzamento e sposare il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]."
  lmf_heir.1519.e:0 "No, lascia che [heir.GetFirstNameNoTooltip] si diverta finché può."

  lmf_heir.1530.heir_training.tt:0 "Preparazione al Governo di [trainee_heir.GetFirstNamePossessiveNoTooltip]"
  lmf_heir.1530.heir_begin_training.tt:0 "[trainee_heir.GetFirstNameNoTooltip] Inizia l'Addestramento da Erede"

  lmf_heir.1601.t: "Un Giorno a Corte"
  lmf_heir.1601.desc: "Le cose sono state relativamente tranquille durante la corte, oggi, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]... o così credevo.\n\nQuando la sala del trono si fu in gran parte svuotata, [your_heir.GetFirstNameNoTooltip] mi si avvicinò con delle domande. A mia insaputa, [Select_CString(your_heir.IsFemale,'lei','lui')] aveva osservato gli affari di corte per l'intera giornata, ed era chiaro che diverse delle questioni su cui avevo pronunciato giudizio sfuggivano alla comprensione di [your_heir.GetFirstNameNoTooltip].\n\nOgni risposta, tuttavia, veniva accolta da altre due domande, e dopo un'ora era evidente che [your_heir.GetFirstNameNoTooltip] non era più vicin[Select_CString(your_heir.IsFemale,'a','o')] a capire gli ingranaggi del governo di quanto non lo fosse all'inizio.\n\n"Da dove viene tutto questo, [your_heir.Custom('GetLassLad')]?" chiesi, sconcertat[Select_CString(ROOT.Char.IsFemale,'a','o')]."
  lmf_heir.1601.a: "Cerco di spiegare, non importa quanto tempo ci voglia."
  lmf_heir.1601.b: "Trova qualcun altro che risponda a tutte le sue domande."
  lmf_heir.1601.a.success.tt: "[your_heir.GetFirstNameNoTooltip] capisce"
  lmf_heir.1601.a.success.effect.tt: "L'addestramento di [your_heir.GetFirstNamePossessiveNoTooltip] come erede progredisce in modo significativo"
  lmf_heir.1601.a.failure.tt: "[your_heir.GetFirstNameNoTooltip] non capisce"
  lmf_heir.1601.a.failure.effect.tt: "L'addestramento di [your_heir.GetFirstNamePossessiveNoTooltip] come erede non progredisce"
  lmf_heir.1601.a.critfail.tt: "[your_heir.GetFirstNameNoTooltip] fraintende completamente"
  lmf_heir.1601.a.critfail.effect.tt: "L'addestramento di [your_heir.GetFirstNamePossessiveNoTooltip] come erede regredisce in modo significativo"

  lmf_heir.1602.t: "Furia nel Giardino"
  lmf_heir.1602.desc: "Una giornata quieta a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] fu interrotta quando una guardia venne a informarmi che [your_heir.GetFirstNameNoTooltip] e [angry_family.GetFirstNameNoTooltip] stavano lottando nei giardini, e l'uomo era stato costretto a separarli.\n\n"Lottando?" esclamai. "Tra loro? Dev'esserci un errore!"\n\nE invece non lo era, come presto appresi. [angry_family.GetFirstNameNoTooltip] aveva dato inizio all'alterco, esplodendo per un presunto affronto ai danni di [your_heir.GetFirstNamePossessiveNoTooltip]... anche se, a dirla tutta, sospetto che ciò nasca dalla gelosia che [angry_family.GetFirstNameNoTooltip] prova chiaramente per il ruolo di [angry_family.Custom2('LMF_RelationToMePossessive', SCOPE.sC('your_heir'))] quale mio erede.\n\nQualunque sia la causa, sebbene entrambi abbiano bofonchiato scuse dopo il mio rimprovero, sospetto che il rancore non farà che crescere col tempo."
  lmf_heir.1602.a: "Perché i bambini non riescono ad andare d'accordo?"
  fought_over_heir_status: "[CHARACTER.GetShortUIName] ha iniziato una lite con [TARGET_CHARACTER.GetShortUIName] per la gelosia di [Select_CString(CHARACTER.IsFemale,'lei','lui')] verso lo status di erede di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]."
  fought_over_heir_status_corresponding: "[TARGET_CHARACTER.GetShortUIName] ha iniziato una lite con [CHARACTER.GetShortUIName] per la gelosia di [Select_CString(TARGET_CHARACTER.IsFemale,'lei','lui')] verso lo status di erede di [CHARACTER.GetShortUINamePossessiveNoTooltip]."

  lmf_heir.1603.t: "Troppe Domande"
  lmf_heir.1603.desc: "Talvolta, crescere il giovane [your_heir.GetFirstNameNoTooltip] perché governi [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] comporta le sue difficoltà. Oggi è uno di quei giorni.\n\n[your_heir.GetFirstNameNoTooltip] ha cominciato all'alba, dapprima ponendo domande innocue sulla lezione del giorno prima. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] voleva capire l'arte del governo, disse. "Cominciamo un po' presto, [your_heir.Custom('GetLassLad')], non credi?" ridacchiai. Questo, però, parve soltanto incoraggiarl[Select_CString(your_heir.IsFemale,'a','o')].\n\nPer il resto della giornata, [your_heir.GetFirstNameNoTooltip] mi ha seguito ovunque, dalla sala del trono al cortile alle scuderie... perfino alla latrina! Ho dovuto impedire a [your_heir.Custom('GirlBoy')] di seguirmi all'interno!\n\n"Voglio solo capire, [your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]!" gridò da fuori della porta, mentre io sedevo dentro e mi massaggiavo le tempie."
  lmf_heir.1603.a: "I bambini dovrebbero farsi vedere, non sentire."

  lmf_heir.1604.t: "Perché Siamo in Guerra?"
  lmf_heir.1604.desc: "Il mio giovane erede in addestramento è venuto con me a rivedere la guarnigione a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma la maggior parte delle sue domande riguardava la guerra.\n\n"Perché [war_target.GetPrimaryTitle.GetNameNoTierNoTooltip] ci odia tanto?"\n"Che cosa faremo di [war_target.Custom('IT_NAM_COL2')][war_target.GetTitledFirstNameNoTooltip] quando sconfiggeremo [Select_CString(war_target.IsFemale,'lei','lui')]?"\n"Lo sconfiggeremo, vero?"\n"Che cosa accadrà se i suoi eserciti arrivano a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]?"\n\nErano buone domande, non c'è dubbio, domande che un futur[Select_CString(your_heir.IsFemale,'a','o')] sovran[Select_CString(your_heir.IsFemale,'a','o')] di [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip] dovrebbe porsi... ma io ero lì per ispezionare la guarnigione, prima di ogni cosa."
  lmf_heir.1604.a: "Cerco di spiegare con quanta più pazienza posso."
  lmf_heir.1604.b: "Lo affido al mio [ROOT.Char.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName]."

  lmf_heir.1605.t: "Un [your_councillor.GetCouncilTitle|U] Adirat[Select_CString(your_councillor.IsFemale,'a','o')]"
  lmf_heir.1605.desc.start: "È tardi nella giornata quando, all'improvviso, vengo interrott[Select_CString(ROOT.Char.IsFemale,'a','o')] da uno dei miei consiglieri che irrompe nella sala del trono in preda all'ira.\n\n"Il tuo [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] oggi ha avuto l'ardire di darmi ordini — ordini!" urlò [your_councillor.Custom('IT_NAM_COL3')][your_councillor.GetTitledFirstNameNoTooltip]. "Come se fossi un servitore qualunque e non il tuo [your_councillor.GetCouncilTitle|l]!"\n\nAlzai le mani, esortando il [your_councillor.GetWomanMan] a calmare [Select_CString(your_councillor.IsFemale,'se stessa','se stesso')]. "Devi ricordare che sto addestrando [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] perché un giorno regni, e [Select_CString(your_heir.IsFemale,'lei','lui')] sarà ""
  lmf_heir.1605.desc.same: "il tuo [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip] quando io me ne sarò andat[Select_CString(ROOT.Char.IsFemale,'a','o')]."\n\n"[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] non è il [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip] #EMP ancora#!!""
  lmf_heir.1605.desc.opposite: "il tuo [ROOT.Char.GetPrimarySpouse.Custom('IT_NAM_COL3')][ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip] quando io me ne sarò andat[Select_CString(ROOT.Char.IsFemale,'a','o')]."\n\n"[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] non è il [ROOT.Char.GetPrimarySpouse.Custom('IT_NAM_COL3')][ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip] #EMP ancora#!!""
  lmf_heir.1605.desc.default: "il tuo signore quando io me ne sarò andat[Select_CString(ROOT.Char.IsFemale,'a','o')]."\n\n"[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] non governa [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] #EMP ancora#!!""
  lmf_heir.1605.a: "Cerco di insegnare a [your_heir.GetFirstNameNoTooltip] una maggior discrezione."
  lmf_heir.1605.b: "Convinco [your_councillor.Custom('IT_NAM_COL3')][your_councillor.GetTitledFirstNameNoTooltip] ad aiutare con l'addestramento di [your_heir.GetFirstNamePossessiveNoTooltip]."
  lmf_heir.1605.b.success.tt: "[Select_CString(your_councillor.IsFemale,'Lei','Lui')|U] accetta di aiutare [your_heir.GetFirstNameNoTooltip]"
  lmf_heir.1605.b.failure.tt: "[Select_CString(your_councillor.IsFemale,'Lei','Lui')|U] rifiuta di aiutare [your_heir.GetFirstNameNoTooltip]"
  lmf_heir.1605.b.critfail.tt: "[Select_CString(your_councillor.IsFemale,'Lei','Lui')|U] si sente insultat[Select_CString(your_councillor.IsFemale,'a','o')] dalla tua richiesta"
  convinced_to_help_heir: "[CHARACTER.GetShortUIName] ha iniziato ad assistere l'addestramento di [TARGET_CHARACTER.GetShortUINamePossessive] come erede."
  convinced_to_help_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] ha iniziato ad assistere l'addestramento di [CHARACTER.GetShortUINamePossessive] come erede."
  not_convinced_to_help_heir: "[CHARACTER.GetShortUIName] è stat[Select_CString(CHARACTER.IsFemale,'a','o')] furios[Select_CString(CHARACTER.IsFemale,'a','o')] per l'interferenza di [TARGET_CHARACTER.GetShortUINamePossessive] nei doveri di consigliere di [Select_CString(CHARACTER.IsFemale,'lei','lui')]."
  not_convinced_to_help_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] è stat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] furios[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] per l'interferenza di [CHARACTER.GetShortUINamePossessive] nei doveri di consigliere di [Select_CString(TARGET_CHARACTER.IsFemale,'lei','lui')]."
  lmf_heir.1605.c: "Lascio che i due se la sbrighino da soli."
  lmf_heir.1605.c.success.tt: "I due risolvono la faccenda"
  lmf_heir.1605.c.failure.tt: "Il rancore fra loro cresce"

  lmf_heir.1606.t: "Incessante Mancanza di Rispetto"
  lmf_heir.1606.desc: ""[Select_CString(your_courtier.IsFemale,'Lei','Lui')|U] non mi ascolta!" gridò [your_heir.GetFirstNameNoTooltip], furibond[Select_CString(your_heir.IsFemale,'a','o')], irrompendo nel mio studio.\n\nMi ci volle un bel po' per calmar[Select_CString(your_heir.IsFemale,'la','lo')] e blandir[Select_CString(your_heir.IsFemale,'la','lo')], ma alla fine appresi la fonte dell'ira di [your_heir.GetFirstNamePossessiveNoTooltip], ed era nientemeno che il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_courtier'))], [your_courtier.Custom('IT_NAM_COL3')][your_courtier.GetTitledFirstNameNoTooltip]. A quanto pare, [your_courtier.Custom('WomanManGirlBoy')] è stato costantemente sprezzante verso [your_heir.GetFirstNameNoTooltip], ignorandone gli ordini ed essendo scortes[Select_CString(your_courtier.IsFemale,'e','e')] fino all'offesa.\n\n"E il tuo primo pensiero è stato venire da me?" chiesi, divertit[Select_CString(ROOT.Char.IsFemale,'a','o')].\n\n[your_heir.GetFirstNameNoTooltip] alzò le mani in un gesto di frustrazione. "Non so che cosa fare!""
  lmf_heir.1606.a: "[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] deve imparare a perdonare e dimenticare."
  lmf_heir.1606.b: "[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] deve saper tener testa da [Select_CString(your_heir.IsFemale,'sola','solo')]."
  lmf_heir.1606.c: "Gli dico di dare una lezione a quel [your_courtier.GetWomanMan] che [Select_CString(your_courtier.IsFemale,'lei','lui')] non dimenticherà facilmente."
  will_not_listen_to_heir: "[CHARACTER.GetShortUIName] si è infastidit[Select_CString(CHARACTER.IsFemale,'a','o')] per la costante mancanza di rispetto e le scortesie di [TARGET_CHARACTER.GetShortUIName] a corte."
  will_not_listen_to_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] si è infastidit[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] per la costante mancanza di rispetto e le scortesie di [CHARACTER.GetShortUIName] a corte."
  lmf_heir.1606.d: "Insegno a [your_heir.GetFirstNameNoTooltip] come gestire meglio questo genere di situazione."
  lmf_heir.1606.e: "Faccio rimproverare [your_courtier.Custom('IT_NAM_COL3')][your_courtier.GetTitledFirstNameNoTooltip]. Questo non può continuare."
  forced_to_listen_to_heir: "[CHARACTER.GetShortUIName] è stat[Select_CString(CHARACTER.IsFemale,'a','o')] rimproverat[Select_CString(CHARACTER.IsFemale,'a','o')] da [TARGET_CHARACTER.GetShortUIName] per la costante mancanza di rispetto verso l'erede di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]."
  forced_to_listen_to_heir_corresponding: "[TARGET_CHARACTER.GetShortUIName] è stat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] rimproverat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] da [CHARACTER.GetShortUIName] per la costante mancanza di rispetto verso l'erede di [CHARACTER.GetShortUINamePossessiveNoTooltip]."

  lmf_heir.1607.t: "Interferenze dell'Erede"
  lmf_heir.1607.desc: "È importante che [your_heir.GetFirstNameNoTooltip] impari a governare, giacché un giorno [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] sarà suo, ma ultimamente [your_heir.Custom('GetLassLad')] si è spint[Select_CString(your_heir.IsFemale,'a','o')] troppo oltre.\n\nGià due volte ho dato ordini ai cortigiani, solo per scoprire in seguito che [Select_CString(your_heir.IsFemale,'lei','lui')] li aveva revocati. Una mia recente sentenza contro un fuorilegge è stata poi silenziosamente annullata, perché [your_heir.GetFirstNameNoTooltip] evidentemente non era d'accordo, ma ha trascurato di dirmelo. Ancora più irritante, più volte ho impartito un comando e ho visto l'uomo lanciare uno sguardo al mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] come in cerca di conferma!\n\nForse è per il meglio... ma non sono forse ancora [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip]?"
  lmf_heir.1607.a: "Lascio che continui. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] deve essere pront[Select_CString(your_heir.IsFemale,'a','o')]."
  lmf_heir.1607.b: "[your_heir.GetFirstNameNoTooltip] deve imparare il rispetto dovuto!"

  lmf_heir.1608.t: "Rabbia nelle Camerate"
  lmf_heir.1608.desc: "Osservando il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] esercitarsi con la spada nelle camerate, devo ammettere che mi ha preoccupato vedere quanto poco rispetto ricevesse da alcuni degli altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\n[your_courtier.Custom('IT_NAM_COL3')][your_courtier.GetTitledFirstNameNoTooltip], in particolare, pareva ignorare ogni sua opinione e arrivò perfino a scacciare [your_heir.Custom('GetLassLad')] con un gesto della mano quando [Select_CString(your_heir.IsFemale,'lei','lui')] chiese a [Select_CString(your_courtier.IsFemale,'lei','lui')] dei consigli.\n\nIn seguito, [your_heir.GetFirstNameNoTooltip] confermò la mia impressione. "[Select_CString(your_courtier.IsFemale,'Lei','Lui')|U] ne sa molto più di me, è vero, ma un giorno io sarò il suo signore. Ho bisogno del suo rispetto!""
  lmf_heir.1608.a: "Aiuto [your_heir.GetFirstNameNoTooltip] a migliorare le sue conoscenze marziali."
  lmf_heir.1608.b: "Faccio rimproverare [your_courtier.Custom('IT_NAM_COL3')][your_courtier.GetTitledFirstNameNoTooltip]. [Select_CString(your_courtier.IsFemale,'Lei','Lui')|U] deve conoscere il proprio posto."
  lmf_heir.1608.c: "Lascio che i due se la sbrighino da soli."
  does_not_respect_heir: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] infuriat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] per la palese mancanza di rispetto di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] nelle camerate."
  does_not_respect_heir_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] infuriat[Select_CString(CHARACTER.IsFemale,'a','o')] per la palese mancanza di rispetto di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] nelle camerate."

  lmf_heir.1609.t: "Erede Ferit[Select_CString(ROOT.Char.IsFemale,'a','o')]"
  lmf_heir.1609.desc: "È ancora presto nella giornata quando ricevo una notizia concitata all'interno del [ROOT.Char.Custom('FortifiedBuilding')]: [your_heir.GetFirstNameNoTooltip] è stat[Select_CString(your_heir.IsFemale,'a','o')] gravemente ferit[Select_CString(your_heir.IsFemale,'a','o')]!\n\nMi precipito alle camerate, temendo il peggio e maledicendo la mia stoltezza per aver permesso che prendesse posto tra gli altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nCon grande sollievo, [Select_CString(your_heir.IsFemale,'lei','lui')] non è mort[Select_CString(your_heir.IsFemale,'a','o')]. È però, da quanto mi dicono, terribilmente ferit[Select_CString(your_heir.IsFemale,'a','o')] per uno sfortunato incidente durante l'addestramento.\n\nChiamo il [GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()] — qualunque cosa accada, bisogna agire in fretta!"
  lmf_heir.1609.a: "Posso solo pregare che non sia grave quanto pare."
  lmf_heir.1609.a.injured.tt: "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] è ferit[Select_CString(your_heir.IsFemale,'a','o')]!"

  lmf_heir.1610.t: "Erede Pront[Select_CString(ROOT.Char.IsFemale,'a','o')]"
  lmf_heir.1610.desc: "Con l'avanzare della mia età, i compiti quotidiani senza fine che accompagnano il governo di [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] diventano sempre più gravosi.\n\nI miei consiglieri dicono che non vi è vergogna nel rivolgermi al mio erede per avere aiuto. [your_heir.GetFirstNameNoTooltip] risiede qui, nel [ROOT.Char.Custom('FortifiedBuilding')], dopotutto, senza alcun titolo proprio. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] potrebbe sostituirmi talvolta nell'amministrare la giustizia dalla grande sala, o perfino rappresentarmi quando incontro delegazioni da ogni parte del[ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\nLo ammetto: sarebbe un sollievo avere più tempo per riposare... ma [your_heir.GetFirstNameNoTooltip] è davvero pront[Select_CString(your_heir.IsFemale,'a','o')] per tali responsabilità?"
  lmf_heir.1610.a: "Pront[Select_CString(your_heir.IsFemale,'a','o')] o no, ho bisogno del suo aiuto."
  lmf_heir.1610.b: "No, posso cavarmela da sol[Select_CString(ROOT.Char.IsFemale,'a','o')]."
  lmf_heir.1610.a.success.tt: "[your_heir.GetFirstNameNoTooltip] svolge bene i propri doveri"
  lmf_heir.1610.a.failure.tt: "[your_heir.GetFirstNameNoTooltip] non se la cava bene"
  lmf_heir.1610.a.critfail.tt: "Lo sforzo si rivela un disastro"

  lmf_heir.1611.t: "Un Nuovo Progetto?"
  lmf_heir.1611.desc: "I miei consiglieri mi hanno portato notizie di un possibile progetto di sviluppo qui, in [project_county.GetNameNoTierNoTooltip]. Sfortunatamente, è troppo ambizioso per essere lasciato a semplici sovrintendenti, ma troppo piccolo per valere la mia supervisione o quella dei miei consiglieri.\n\nÈ stato però proposto che [your_heir.GetFirstNameNoTooltip] possa essere perfettamente adatt[Select_CString(your_heir.IsFemale,'a','o')] a sovrintenderlo. Gli darebbe occasione di interagire con la popolazione locale al di fuori del [ROOT.Char.Custom('FortifiedBuilding')] e anche di accumulare preziosa esperienza.\n\nEppure mi preoccupo... è troppa responsabilità da porre sulle sue spalle? E se [Select_CString(your_heir.IsFemale,'lei','lui')] mandasse a monte il compito?"
  lmf_heir.1611.a: "[your_heir.GetFirstNameNoTooltip] deve cominciare immediatamente."
  lmf_heir.1611.a.success.tt: "Il progetto di sviluppo è un enorme successo"
  lmf_heir.1611.a.failure.tt: "Il progetto di sviluppo fallisce"
  lmf_heir.1611.a.critfail.tt: "Il progetto di sviluppo è un disastro"
  lmf_heir.1611.b: "No, non vale il rischio."

  lmf_heir_trait_lustful:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] lussurios[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Così colm[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] di desideri, eppure [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] non è mai soddisfatt[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]."
  lmf_heir_trait_chaste:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] cast[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] si ritrae al minimo tocco, e ogni discorso sul sesso fa arrossire [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]."
  lmf_heir_trait_gluttonous:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] ghiott[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Tutto ciò che vuole fare è mangiare, mangiare, mangiare!"
  lmf_heir_trait_temperate:0 "quanto è temperant[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Così discernent[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')], così attenta a non indulgere mai troppo, nemmeno per un poco di gioia."
  lmf_heir_trait_greedy:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] avid[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Tutto ciò che l'assilla è la ricchezza, e ciò che è suo."
  lmf_heir_trait_generous:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] fin troppo generos[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Non attribuisce alcun valore alla parsimonia, e sospetto che darebbe via ogni moneta senza pensarci due volte."
  lmf_heir_trait_lazy:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] incredibilmente pig[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Ogni cosa è troppa fatica. Se si presenta la via più facile, è quella che [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] imboccherà."
  lmf_heir_trait_diligent:0 "quanto è diligente e devot[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] al dovere [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Tutto ciò a cui pensa è il dovere e il lavoro, e non un solo pensiero per il riposo."
  lmf_heir_trait_wrathful:0 "quanto è sempre adirat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. La sua furia è costantemente pronta a esplodere e a sopraffare il suo miglior giudizio."
  lmf_heir_trait_calm:0 "quanto è assolutamente calmo [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Nulla lo turba. Nulla lo smuove, mai."
  lmf_heir_trait_patient:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] paziente [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] aspetterebbe fino alla fine del mondo, credo, e ne sarebbe perfettamente content[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]."
  lmf_heir_trait_impatient:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] impaziente [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Nulla può accadere abbastanza presto. Persino quando accade, avrebbe dovuto accadere prima."
  lmf_heir_trait_arrogant:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] arrogant[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] guarda tutti dall'alto in basso, perfino me."
  lmf_heir_trait_humble:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] umil[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Perché mai dovrebbe essere così umil[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')]? Dov'è il suo orgoglio?"
  lmf_heir_trait_deceitful:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] bugiard[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. È difficile credere a una sola parola che esca dalle sue labbra, di questi tempi!"
  lmf_heir_trait_honest:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] onest[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Sospetto che non riuscirebbe a mentire nemmeno se il destino del [ROOT.GetCharacter.Host.GetPrimaryTitle.GetTierAsNameNoTooltip] dipendesse da ciò!"
  lmf_heir_trait_craven:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] codard[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] è completamentre privo di spina dorsale, e mette la propria pelle sopra ogni altra cosa."
  lmf_heir_trait_brave:0 "quanto è sfrontat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. Coraggios[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')], sì, ma anche temerar[Select_CString(ROOT.GetCharacter.IsFemale,'io','io')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] getterebbe via la propria vita per un briciolo di gloria."
  lmf_heir_trait_shy:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] timid[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] evita ogni impegno sociale, e posso capire che parlare con gli altri è un'agonia per [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]."
  lmf_heir_trait_gregarious:0 "quanto è divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] socievole [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. La vita è una festa, a quanto pare, e il suo futuro è assai meno importante del continuo divertimento."
  lmf_heir_trait_ambitious: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] smisuratamente [Select_CString(ROOT.GetCharacter.IsFemale,'ambiziosa','ambizioso')]. Il luccichio nei suoi occhi è terrificante, e mi ritrovo a chiedermi dove finiscano le sue ambizioni."
  lmf_heir_trait_content: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] terribilmente appagat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. Appagat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] della sua vita, della sua condizione. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] non ha alcuno slancio."
  lmf_heir_trait_arbitrary: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] arbitrari[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. Nessun pensiero attraversa quella mente volubile senza mutare un istante dopo."
  lmf_heir_trait_just: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] terribilmente giust[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] e ossequios[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] alle leggi. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] si tormenta con continue deliberazioni sul giusto e sull’ingiusto."
  lmf_heir_trait_cynical: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] profondamente cinic[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] ed emp[Select_CString(ROOT.GetCharacter.IsFemale,'ia','io')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] mette costantemente in dubbio [ROOT.GetCharacter.GetFaith.GetNameNoTooltip]."
  lmf_heir_trait_zealous: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] terribilmente zelant[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')]. Così concentrat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] su come essere un pi[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] seguace di [ROOT.GetCharacter.GetFaith.GetNameNoTooltip] che tutto il resto impallidisce al confronto."
  lmf_heir_trait_paranoid: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] paranoic[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. Tutto e tutti sono pronti a colpire [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] resta in guardia senza posa."
  lmf_heir_trait_trusting: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] ora terribilmente fiducios[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. Nessun pensiero di riserbo o cautela o persino, che [ROOT.GetCharacter.GetFaith.PantheonTerm2] ci scampi, d’istinto di conservazione."
  lmf_heir_trait_compassionate: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] davvero compassionevol[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] porta il cuore in mano, perché tutti lo vedano."
  lmf_heir_trait_callous: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] del tutto insensibil[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')]. Esiste ancora un’emozione umana nella sua anima? A stento lo si direbbe."
  lmf_heir_trait_sadistic: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] ora sadic[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] torturerà volentieri gli altri solo per il piacere di farlo, ne sono convint[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]."
  lmf_heir_trait_stubborn: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] incredibilmente testard[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. Non si smuove [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] una volta che la mente è decisa, nemmeno con il buon senso."
  lmf_heir_trait_fickle: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] volubil[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')]. Ciò che un giorno andava bene, l’indomani è spregevole. Non si sa mai cosa potrebbe piacere a [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')], mai."
  lmf_heir_trait_eccentric: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] strani[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] ed eccentric[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. La mente è davvero tutta al suo posto, mi domando? Sono cert[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] di non essere l’unic[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]."
  lmf_heir_trait_vengeful: "che terribile senso di vendetta [Select_CString(ROOT.GetCharacter.IsFemale,'abbia','abbia')] sviluppato. Non esiste torto così piccolo da non meritare, agli occhi [Select_CString(ROOT.GetCharacter.IsFemale,'suoi','suoi')], un prezzo orrendo."
  lmf_heir_trait_forgiving: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] stranamente indulgent[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] perdonerebbe chiunque, credo, per qualunque affronto. Dove finirà?"
  lmf_heir_trait_drunkard: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] propens[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] a bere. Non solo per far festa, come [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] sostiene, ma sempre e fino all’eccesso! C’è chi se la ride come fosse cosa innocua, ma chi desidera davvero un ubriaco sbavante come sovrano?"
  lmf_heir_trait_rakish: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'palpeggi','palpeggi')] quasi ogni giovane [ROOT.GetCharacter.Custom('WomanManOpposite')] che incontra. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] non ha alcun senso del decoro: è sconveniente."
  lmf_heir_trait_rakish_homosexual: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'palpeggi','palpeggi')] quasi ogni giovane [ROOT.GetCharacter.Custom('GetLassLad')] che incontra — come se io non me ne accorgessi! Non posso governare i suoi desideri, è vero, ma questo? Questo è sconveniente."
  lmf_heir_trait_rakish_bisexual: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'palpeggi','palpeggi')] quasi ogni graziosa creatura giovane che incontra — ragazzo o ragazza, pare non importare! Non posso governare i suoi desideri, è vero, ma questo? Questo è sconveniente."
  lmf_heir_trait_reclusive: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'tenda','tenda')] a nascondersi alla vista non appena le cose si fanno stressanti. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] si rintana nelle sue stanze e non ne esce."
  lmf_heir_trait_irritable: "quanto in fretta la sua ira si accenda non appena le cose si fanno stressanti. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] ha i servitori che camminano in punta di piedi attorno a [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')], terrorizzati che, in qualunque istante, [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] possa mutarsi in un mostro."
  lmf_heir_trait_profligate: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] divenut[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] pessima a gestire la moneta. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] la sperpera come fosse nulla, come se ne avesse montagne, e per che cosa? Per sentirsi meglio, [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] dice."
  lmf_heir_trait_improvident: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] pront[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] a donare la moneta. Basta che qualcuno mostri un minimo di pena, ed ecco [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] che lo sommerge d’argento. Taluni lo chiamano generosità, altri mera mancanza di senno, ma questo? Questo è un impulso."
  lmf_heir_trait_contrite: "quanto [Select_CString(ROOT.GetCharacter.IsFemale,'sia','sia')] pront[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] a sproloquiare ogni segreto a chiunque abbia orecchie. Un modo per alleggerire l’anima, sì, ma che utilità ha un sovrano che non sa custodire il proprio consiglio?"
  lmf_heir_trait_inappetetic: "quanto poco [Select_CString(ROOT.GetCharacter.IsFemale,'mangi','mangi')]. Non appena le cose si fanno stressanti, [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] respinge il cibo, e non è semplice temperanza. Temo che, col tempo, ne risentirà la salute."

  lmf_heir.1612.t: "[Select_CString(your_heir.IsFemale,'La mia','Il mio')] erede [heir_trait.GetNameNoTooltip( your_heir )|U]"
  lmf_heir.1612.desc.opening: "Avendo trascorso tanto tempo ad addestrare [your_heir.GetFirstNameNoTooltip] come mio erede, ho notato [your_heir.Custom('heir_trait_description')]\n\nCom’è possibile? "
  lmf_heir.1612.desc.opposite: "Com’è possibile che [Select_CString(your_heir.IsFemale,'sia','sia')] cresciut[Select_CString(your_heir.IsFemale,'a','o')] così divers[Select_CString(your_heir.IsFemale,'a','o')] da me?\n\n"
  lmf_heir.1612.desc.alsosinful: "Non sono un modello di virtù, ma questo? Questo non posso tollerarlo.\n\n"
  lmf_heir.1612.desc.sinful: "Come ho potuto allevare un erede così colmo di peccato?\n\n"
  lmf_heir.1612.desc.default: "Questo non è modo per un giovane [your_heir.GetWomanMan] della sua condizione di comportarsi.\n\n"
  lmf_heir.1612.desc.end: "E, soprattutto: che cosa dovrei farne? Poiché trascorriamo così tanto tempo in compagnia l’uno dell’altro, potrei tentare di costringere [your_heir.Custom('GetLassLad')] a mutare le sue abitudini."
  lmf_heir.1612.a: "Potrebbe essere duro per [Select_CString(your_heir.IsFemale,'lei','lui')], ma devo provarci."
  lmf_heir.1612.a.success.tt: "[your_heir.GetFirstNameNoTooltip] viene convint[Select_CString(your_heir.IsFemale,'a','o')] a cambiare"
  lmf_heir.1612.a.failure.tt: "[your_heir.GetFirstNameNoTooltip] serba rancore per il tentativo"
  tried_to_change_heir: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha tentato con la forza di cambiare la personalità di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]."
  tried_to_change_heir_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha tentato con la forza di cambiare la personalità di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]."
  lmf_heir.1612.b: "Lascia che sia."

  lmf_heir.1613.t: "L’Erede Riluttante"
  lmf_heir.1613.desc: "È triste da vedere, ma [your_heir.GetFirstNameNoTooltip] da qualche tempo non prende molto sul serio i doveri dell’erede.\n\nC’è così tanto che [Select_CString(your_heir.IsFemale,'lei','lui')] deve imparare, così tante responsabilità che [Select_CString(your_heir.IsFemale,'lei','lui')] deve accettare, prima che [Select_CString(your_heir.IsFemale,'sia','sia')] pront[Select_CString(your_heir.IsFemale,'a','o')] a regnare un giorno su [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]... eppure, ultimamente, pare che [your_heir.GetFirstNameNoTooltip] preferisca fare qualunque cosa tranne questo.\n\nUna situazione miserevole, senza dubbio."
  lmf_heir.1613.a: "Speriamo che cambi presto aria."

  lmf_heir.1614.t: "Vera Dedizione"
  lmf_heir.1614.desc: "È bello vedere [your_heir.GetFirstNameNoTooltip] così dedito, da qualche tempo, ai doveri e alle responsabilità di futuro sovrano di [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\n[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] presenzia a corte, si incontra con il mio consiglio per restare al corrente degli affari del [ROOT.Char.GetPrimaryTitle.GetTierAsNamePossessiveNoTooltip|l], e perfino percorre regolarmente le campagne per conoscere le preoccupazioni dei popolani.\n\nA stento riesco a convincere [Select_CString(your_heir.IsFemale,'lei','lui')] a prendersi una pausa!"
  lmf_heir.1614.a: "Pare che [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] sarà in buone mani."

  lmf_heir.1615.t: "La Più Sincera Forma d’Adulazione"
  lmf_heir.1615.desc: "Considerato quanto tempo trascorriamo in compagnia l’uno dell’altro, suppongo fosse inevitabile che [your_heir.GetFirstNameNoTooltip] finisse per somigliarmi.\n\nUltimamente ho notato come [Select_CString(your_heir.IsFemale,'lei','lui')] mi osservi con attenzione, parli ai servitori come faccio io e imiti i miei modi... persino quelle cose che non sapevo di fare, o che preferirei [Select_CString(your_heir.IsFemale,'lei','lui')] non emulasse.\n\nForse dovrei sentirmi lusingat[Select_CString(your_heir.IsFemale,'a','o')]?"
  lmf_heir.1615.a: "Forse [Select_CString(your_heir.IsFemale,'lei','lui')] ha bisogno di più tempo per conto suo?"

  lmf_heir.1625.t: "Viaggio all’Estero"
  lmf_heir.1625.desc.start: "[your_heir.GetFirstNameNoTooltip] è venut[Select_CString(your_heir.IsFemale,'a','o')] da me questa mattina con un piano piuttosto interessante.\n\n"
  lmf_heir.1625.desc.family: "«[your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], "
  lmf_heir.1625.desc.notfamily: "«Mio [ROOT.Char.GetLadyLord], "
  lmf_heir.1625.desc.mid: "So che fate del vostro meglio per addestrarmi come vostro erede, ma non tutta la mia educazione si trova qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Pensavo che forse potrei visitare [your_heir.Custom2('direct_address_by_familiarity', SCOPE.sC('your_vassal'))] per un po’?»\n\nNotando la mia riluttanza, [Select_CString(your_heir.IsFemale,'lei','lui')] proseguì in fretta. «[Select_CString(your_vassal.IsFemale,'Lei','Lui')|U] è "
  lmf_heir.1625.desc.diplomacy: "assai versat[Select_CString(your_vassal.IsFemale,'a','o')] in diplomazia, "
  lmf_heir.1625.desc.martial: "un esperto di cose di guerra, "
  lmf_heir.1625.desc.stewardship: "ben versat[Select_CString(your_vassal.IsFemale,'a','o')] nelle faccende d’amministrazione, "
  lmf_heir.1625.desc.intrigue: "assai abil[Select_CString(your_vassal.IsFemale,'e','e')] nelle arti dell’intrigo, "
  lmf_heir.1625.desc.learning: "un [your_vassal.GetWomanMan] erudit[Select_CString(your_vassal.IsFemale,'a','o')] a suo modo, "
  lmf_heir.1625.desc.bridge: "dopotutto, e "
  lmf_heir.1625.desc.myfriend: "anche un buon amico mio. "
  lmf_heir.1625.desc.friend: "anche vostro amico. "
  lmf_heir.1625.desc.ally: "anche vostro alleato. "
  lmf_heir.1625.desc.alsofamily: "anche di famiglia. "
  lmf_heir.1625.desc.vassal: "anche vostro vassallo giurat[Select_CString(your_vassal.IsFemale,'a','o')]. "
  lmf_heir.1625.desc.liege: "anche il nostro signore feudale. "
  lmf_heir.1625.desc.realm: "Non uscirei nemmeno da [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]! "
  lmf_heir.1625.desc.end: "Trascorrere qualche mese con [Select_CString(your_vassal.IsFemale,'lei','lui')] in [your_vassal.GetPrimaryTitle.GetNameNoTierNoTooltip] potrebbe insegnarmi moltissimo.»\n\nÈ possibile che [your_heir.GetFirstNameNoTooltip] abbia secondi fini e desideri soltanto uscire finalmente dal [ROOT.Char.Custom('FortifiedBuilding')], ma poi chi potrebbe biasimare [Select_CString(your_heir.IsFemale,'lei','lui')]?"
  lmf_heir.1625.a: "[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] può andare."
  lmf_heir.1625.a.tt: "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] si metterà in viaggio verso [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e soggiornerà fino a sei mesi alla corte di [your_vassal.Custom('IT_NAM_COL2')][your_vassal.GetTitledFirstName], dove [Select_CString(your_heir.IsFemale,'lei','lui')] potrebbe trarre qualche beneficio nell’addestramento come vostro erede"
  lmf_heir.1625.a.player.tt: "Occorre prima chiedere a [your_vassal.Custom('IT_NAM_COL4')][your_vassal.GetTitledFirstName] se [Select_CString(your_vassal.IsFemale,'lei','lui')] è dispost[Select_CString(your_vassal.IsFemale,'a','o')] a ospitare [your_heir.Custom('IT_NAM_COL4')][your_heir.GetTitledFirstName]"
  lmf_heir.1625.b: "No, [Select_CString(your_heir.IsFemale,'lei','lui')] resta qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."

  lmf_heir.1626.opening:0 "[heir_liege.Custom2('direct_address_by_familiarity', ROOT.Char)|U],"
  lmf_heir.1626.desc.opening.family:0 "[Select_CString(your_heir.IsFemale,'La mia','Il mio')] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] [your_heir.GetFirstNameNoTooltip] ha espresso il desiderio di farti visita nei prossimi mesi.\n\n"
  lmf_heir.1626.desc.opening:0 "Scrivo per chiedere il permesso che il mio erede, [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName], possa farti visita nei prossimi mesi.\n\n"
lmf_heir.1626.desc: 0 "Se potete aiutare nell'addestramento di [your_heir.Custom('GetLassLad')], sarebbe cosa gradita, ma non vi chiedo alcun impegno di tempo oltre quello che siete disposto a concedere. Chiedo solo garanzia della sicurezza di [your_heir.GetFirstNamePossessiveNoTooltip] e che a [Select_CString(your_heir.IsFemale,'lei','lui')] sia consentito accedere a [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], così che [Select_CString(your_heir.IsFemale,'lei','lui')] possa giungere a conoscerla meglio, insieme alla sua gente."
  lmf_heir.1626.a:0 "Certo, [Select_CString(your_heir.IsFemale,'lei','lui')] è benvenut[Select_CString(your_heir.IsFemale,'a','o')]."
  lmf_heir.1626.a.tt:0 "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] viaggerà verso [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e vi resterà fino a sei mesi"
  lmf_heir.1626.b:0 "Invia [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_liege'))] i miei rammarichi."

  lmf_heir.1627.opening:0 "[your_vassal.Custom2('GreetingToLiegePositive', ROOT.Char)],"
  lmf_heir.1627.desc:0 "Certo che [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] è benvenut[Select_CString(your_heir.IsFemale,'a','o')]. Qui a [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] attendiamo con impazienza [Select_CString(your_heir.IsFemale,'il suo','il suo')] arrivo."
  lmf_heir.1627.a:0 "Eccellente."

  lmf_heir.1628.opening:0 "[your_vassal.Custom2('GreetingToLiege', ROOT.Char)],"
  lmf_heir.1628.desc:0 "Purtroppo non è un buon momento perché [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] visiti [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Vorrei fosse altrimenti, ma è meglio che [Select_CString(your_heir.IsFemale,'lei','lui')] non sprechi le fatiche d'un viaggio."
  lmf_heir.1628.a:0 "[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] può visitare [alternate_vassal.GetFullName] invece."
  lmf_heir.1628.b:0 "E con ciò, tutto svanisce."

  lmf_heir.1630.t.cancel:0 "Visita annullata"
  lmf_heir.1630.desc.title:0 "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad annullare [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita poiché è diventat[Select_CString(your_heir.IsFemale,'a','o')] [your_heir.GetTitleAsNameNoTooltip|U] di [your_heir.GetPrimaryTitle.GetNameNoTierNoTooltip]."
  lmf_heir.1630.desc.war:0 "[heir_liege.Custom('IT_NAM_COL3')][heir_liege.GetTitledFirstName] ha richiamato [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] a casa a causa dello scoppio della guerra."
  lmf_heir.1630.desc.target.death:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad annullare [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita a causa della morte di [heir_visit_target.Custom('IT_NAM_COL3')][heir_visit_target.GetTitledFirstName]."
  lmf_heir.1630.desc.heir.death:0 "La visita di [your_heir.GetTitledFirstNamePossessive] è stata annullata a causa della [Select_CString(your_heir.IsFemale,'sua','sua')] prematura morte."
  lmf_heir.1630.desc.imprisoned:0 "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad annullare [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita a [heir_visit_location.GetTitle.GetNameNoTierNoTooltip] a causa della [Select_CString(your_heir.IsFemale,'sua','sua')] prigionia."
  lmf_heir.1630.desc.incapable:0 "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad annullare [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita a [heir_visit_location.GetTitle.GetNameNoTierNoTooltip] poiché ora [Select_CString(your_heir.IsFemale,'lei','lui')] è [GetTrait('incapable').GetName(your_heir)]."
  lmf_heir.1630.desc.notheir:0 "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad annullare [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita a [heir_visit_location.GetTitle.GetNameNoTierNoTooltip] poiché [Select_CString(your_heir.IsFemale,'lei','lui')] non è più l'erede di [heir_liege.GetShortUINamePossessiveNoFormat]."
  lmf_heir.1630.desc.notruler:0 "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad annullare [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita a [heir_visit_location.GetTitle.GetNameNoTierNoTooltip] poiché [heir_liege.GetShortUINameNoFormat] non è più un sovrano."

  lmf_heir.1631.t.cancel:0 "[your_heir.GetFirstNameNoTooltip] torna a casa"
  lmf_heir.1631.desc.dead:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio a causa della morte improvvisa di [heir_visit_target.GetShortUINamePossessiveNoFormat]."
  lmf_heir.1631.desc.notruler:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio poiché [heir_visit_target.GetShortUINameNoFormat] non [Select_CString( heir_visit_target.IsLocalPlayer, 'governi', 'governa' )] più in [target_county.GetNameNoTierNoTooltip]."
  lmf_heir.1631.desc.imprisoned:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio a causa della prigionia di [heir_visit_target.GetShortUINamePossessiveNoFormat]."
  lmf_heir.1631.desc.siege:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio poiché [heir_visit_location.GetTitle.GetNameNoTierNoTooltip] è finita sotto assedio per mano dei nemici di [heir_visit_target.GetShortUINamePossessiveNoFormat]."
  lmf_heir.1631.desc.isolating:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio a causa della malattia che si diffondeva in [heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip], partendo poco prima che [heir_visit_target.GetShortUINameNoFormat] isolasse [CharYourHerHis(heir_visit_target)] l'intera famiglia."
  lmf_heir.1631.desc.capital:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio a causa della malattia che si diffondeva in [heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip], partendo poco prima che [heir_visit_target.GetShortUINameNoFormat] chiudesse [heir_visit_location.GetTitle.GetNameNoTierNoTooltip]."
  lmf_heir.1631.desc.incapable:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio poiché [heir_visit_target.GetShortUINamePossessiveNoFormat] [CharHaveHas(heir_visit_target)] è diventat[Select_CString(heir_visit_target.IsFemale,'a','o')] [GetTrait('incapable').GetName(heir_visit_target)]."
  lmf_heir.1631.desc:0 "[your_heir.GetFirstName] è stat[Select_CString(your_heir.IsFemale,'a','o')] costrett[Select_CString(your_heir.IsFemale,'a','o')] ad abbreviare [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio."

  lmf_heir.1632.t:0 "Richiamare [your_heir.GetFirstNameNoTooltip]?"
  lmf_heir.1632.desc.atwar.primary:0 "Ora che siamo in guerra contro [heir_host.Custom('IT_NAM_COL3')][heir_host.GetTitledFirstNameNoTooltip], vi è la preoccupante questione che [your_heir.GetFirstNameNoTooltip] sta attualmente facendo visita a [Select_CString(heir_host.IsFemale,'lei','lui')].\n\nDobbiamo richiamare [Select_CString(your_heir.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] seduta stante."
  lmf_heir.1632.desc.atwar.rootattacker:0 "La mia guerra contro [defender.Custom('IT_NAM_COL3')][defender.GetTitledFirstNameNoTooltip] significa che sono anche in guerra contro [heir_host.Custom('IT_NAM_COL3')][heir_host.GetTitledFirstNameNoTooltip], e ciò solleva la preoccupante questione che [your_heir.GetFirstNameNoTooltip] sta attualmente facendo visita a [Select_CString(heir_host.IsFemale,'lei','lui')].\n\nDobbiamo richiamare [Select_CString(your_heir.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] seduta stante."
  lmf_heir.1632.desc.atwar.rootdefender:0 "La guerra di [attacker.GetTitledFirstNamePossessiveNoTooltip] contro di me significa che sono anche in guerra contro [heir_host.Custom('IT_NAM_COL3')][heir_host.GetTitledFirstNameNoTooltip], e ciò solleva la preoccupante questione che [your_heir.GetFirstNameNoTooltip] sta attualmente facendo visita a [Select_CString(heir_host.IsFemale,'lei','lui')].\n\nDobbiamo richiamare [Select_CString(your_heir.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] seduta stante."
  lmf_heir.1632.desc.atwar:0 "La guerra tra [defender.Custom('IT_NAM_COL3')][defender.GetTitledFirstNameNoTooltip] e [attacker.Custom('IT_NAM_COL3')][attacker.GetTitledFirstNameNoTooltip] sfortunatamente significa che ora sono anch'io in guerra contro [heir_host.Custom('IT_NAM_COL3')][heir_host.GetTitledFirstNameNoTooltip], e ciò solleva la preoccupante questione che [your_heir.GetFirstNameNoTooltip] sta attualmente facendo visita a [Select_CString(heir_host.IsFemale,'lei','lui')].\n\nDobbiamo richiamare [Select_CString(your_heir.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] seduta stante."
  lmf_heir.1632.desc:0 "La guerra solleva la questione se io debba richiamare [your_heir.GetFirstNameNoTooltip] dalla [Select_CString(your_heir.IsFemale,'sua','sua')] visita presso [heir_host.Custom('IT_NAM_COL3')][heir_host.GetTitledFirstNameNoTooltip].\n\n[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] non è in pericolo immediato, questo è vero, ma anche se non avessi bisogno [Select_CString(your_heir.IsFemale,'della mia','del mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )] qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], resta anche il fatto che la garanzia di sicurezza data da [heir_host.GetTitledFirstNamePossessiveNoTooltip] è ora molto meno certa."
  lmf_heir.1632.a:0 "Di' a [Select_CString(your_heir.IsFemale,'lei','lui')] di andar via immediatamente."
  lmf_heir.1632.b:0 "[your_heir.GetFirstNameNoTooltip] sta bene dov'[Select_CString(your_heir.IsFemale,'è','è')]."

  lmf_heir.1633.t:0 "Un nuovo visitatore"
  lmf_heir.1633.desc.begin:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] è arrivat[Select_CString(your_heir.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], come concordato, "
  lmf_heir.1633.desc.away:0 "benché, purtroppo, io non fossi lì ad accoglier[Select_CString(your_heir.IsFemale,'la','lo')] ed è improbabile che riesca a trascorrere molto tempo con [Select_CString(your_heir.IsFemale,'lei','lui')] durante [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita.\n\nDovrò decidere se conceder[Select_CString(your_heir.IsFemale,'le','gli')] piena libertà nella [ROOT.Char.Custom('FortifiedBuilding')], rischiando che [Select_CString(your_heir.IsFemale,'lei','lui')] ficchi il naso e riferisca ogni [Select_CString(your_heir.IsFemale,'sua','sua')] scoperta al [Select_CString(your_heir.IsFemale,'suo','suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], oppure se lasciar[Select_CString(your_heir.IsFemale,'la','lo')] fare come [Select_CString(your_heir.IsFemale,'vuole','vuole')] nelle campagne circostanti."
  lmf_heir.1633.desc.end:0 "così sono sces[Select_CString(ROOT.Char.IsFemale,'a','o')] nel cortile per accoglier[Select_CString(your_heir.IsFemale,'la','lo')] di persona.\n\nDovrò decidere se trascorrere del tempo con [Select_CString(your_heir.IsFemale,'lei','lui')] nei prossimi mesi, concedend[Select_CString(your_heir.IsFemale,'ole','ogli')] piena libertà nella [ROOT.Char.Custom('FortifiedBuilding')]... con il rischio che [Select_CString(your_heir.IsFemale,'lei','lui')] possa ficcare il naso e riferire ogni [Select_CString(your_heir.IsFemale,'sua','sua')] scoperta al [Select_CString(your_heir.IsFemale,'suo','suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], oppure se lasciar[Select_CString(your_heir.IsFemale,'la','lo')] fare come [Select_CString(your_heir.IsFemale,'vuole','vuole')] nelle campagne circostanti."
  lmf_heir.1633.a:0 "È un'occasione perché ci si conosca meglio."
  lmf_heir.1633.a.tt:0 "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U] trascorrerà i prossimi mesi nella [THIS.Char.Custom('FortifiedBuilding')], addestrandosi con te e i tuoi cortigiani. Probabilmente migliorerà il vostro rapporto, ma [Select_CString(your_heir.IsFemale,'lei','lui')] potrebbe anche causare disordini e apprendere alcuni dei tuoi segreti.#!"
  spent_time_with_visiting_heir:0 "[CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] hanno trascorso del tempo insieme durante [CharYourHerHis(TARGET_CHARACTER)] visita alla [CHARACTER.Custom('FortifiedBuilding')] di [CHARACTER.GetShortUINamePossessiveNoTooltip]"
  spent_time_with_visiting_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUIName] e [CHARACTER.GetShortUIName] hanno trascorso del tempo insieme durante [CharYourHerHis(CHARACTER)] visita alla [TARGET_CHARACTER.Custom('FortifiedBuilding')] di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]"
  lmf_heir.1633.b:0 "[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] può restare, ma ho questioni migliori cui attendere."
  lmf_heir.1633.c:0 "Faremo sì che [Select_CString(your_heir.IsFemale,'lei','lui')] si mantenga occupat[Select_CString(your_heir.IsFemale,'a','o')]."
  lmf_heir.1633.c.tt:0 "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U] trascorrerà i prossimi mesi nella [THIS.Char.Custom('FortifiedBuilding')], addestrandosi con i tuoi cortigiani. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] potrebbe causare disordini e apprendere alcuni dei tuoi segreti, ma vi è poca possibilità di qualcosa di peggio.#!"
  lmf_heir.1633.d:0 "Ciò che [Select_CString(your_heir.IsFemale,'lei','lui')] fa a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] non mi riguarda."
  lmf_heir.1633.d.tt:0 "#EMP A [your_heir.GetShortUINameNoTooltipNoFormat|U] non sarà permesso entrare nella [THIS.Char.Custom('FortifiedBuilding')], e trascorrerà invece i prossimi mesi nelle campagne circostanti. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] potrebbe cacciarsi nei guai da sol[Select_CString(your_heir.IsFemale,'a','o')], e [Select_CString(your_heir.IsFemale,'la sua','il suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] potrebbe esserne scontent[Select_CString(your_heir.IsFemale,'a','o')], ma laggiù [Select_CString(your_heir.IsFemale,'lei','lui')] non causerà alcun disordine.#!"

  lmf_heir.1651.t:0 "Un erede notevole"
  lmf_heir.1651.desc.away:0 "Sebbene non fossi lì a vederlo di persona, mi è stato riferito "
  lmf_heir.1651.desc.busy:0 "Sebbene abbia trascorso poco tempo con [Select_CString(your_heir.IsFemale,'lei','lui')], ho sentito "
  lmf_heir.1651.desc.there:0 "Mi è gradito notare "
  lmf_heir.1651.desc:0 "che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] si è rivelat[Select_CString(your_heir.IsFemale,'a','o')] assai notevole durante le [Select_CString(your_heir.IsFemale,'sue','sue')] prime due settimane a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nNon solo [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] è stat[Select_CString(your_heir.IsFemale,'a','o')] piacevole e ben educat[Select_CString(your_heir.IsFemale,'a','o')] con i servitori della [ROOT.Char.Custom('FortifiedBuilding')], ma a tratti [Select_CString(your_heir.IsFemale,'si è','si è')] dimostrat[Select_CString(your_heir.IsFemale,'a','o')] anche d'aiuto ed è una presenza gradita a corte.\n\nOvviamente [Select_CString(your_heir.IsFemale,'lei','lui')] sta soltanto prendendo dimestichezza col luogo e vedremo come andrà [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita da qui in avanti, ma è senz'altro un inizio propizio."
  lmf_heir.1651.a:0 "[Select_CString(your_heir.IsFemale,'È','È')|U] un[Select_CString(your_heir.IsFemale,'a','')] ottim[Select_CString(your_heir.IsFemale,'a','o')] [your_heir.Custom('polite_gender_ref')]."
  lmf_heir.1651.tt:0 "#EMP [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] avrà maggiori probabilità di cavarsela bene durante [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita#!"

  lmf_heir.1652.t:0 "Un erede sgradevole"
  lmf_heir.1652.desc.away:0 "Sebbene non fossi lì a vederlo di persona, mi è stato riferito "
  lmf_heir.1652.desc.busy:0 "Sebbene abbia trascorso poco tempo con [Select_CString(your_heir.IsFemale,'lei','lui')], ho sentito "
  lmf_heir.1652.desc.there:0 "Non mi è affatto gradito notare "
  lmf_heir.1652.desc:0 "che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] non è stato propriamente un esempio di grazia durante le [Select_CString(your_heir.IsFemale,'sue','sue')] prime due settimane a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nI servitori della [ROOT.Char.Custom('FortifiedBuilding')] riferiscono che [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] è spesso aspr[Select_CString(your_heir.IsFemale,'a','o')] e di cattivo umore. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] vaga per i corridoi criticando pressoché tutto ciò che vede e, quando fa la sua comparsa a corte, lo fa principalmente per porsi al centro dell'attenzione.\n\nMi dico che [Select_CString(your_heir.IsFemale,'lei','lui')] sta soltanto prendendo dimestichezza col luogo e vedremo come andrà [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita da qui in avanti, ma è senz'altro un inizio non propizio."
  lmf_heir.1652.a:0 "Mi domando se [Select_CString(your_heir.IsFemale,'lei','lui')] sia così anche a [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]?"
  lmf_heir.1652.tt:0 "#EMP [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] avrà maggiori probabilità di cavarsela male durante [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita#!"

  lmf_heir.1653.t:0 "L'erede che svanisce"
  lmf_heir.1653.desc.away:0 "Sebbene non fossi lì a vederlo di persona, mi è stato riferito "
  lmf_heir.1653.desc.busy:0 "Sebbene abbia trascorso poco tempo con [Select_CString(your_heir.IsFemale,'lei','lui')], ho sentito "
  lmf_heir.1653.desc.there:0 "Non mi è affatto gradito notare "
  lmf_heir.1653.desc:0 "che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] quasi non ha mostrato il [Select_CString(your_heir.IsFemale,'suo','suo')] volto durante le [Select_CString(your_heir.IsFemale,'sue','sue')] prime due settimane a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nI servitori della [ROOT.Char.Custom('FortifiedBuilding')] dicono che [your_heir.Custom('polite_gender_ref')] trascorre la maggior parte del [Select_CString(your_heir.IsFemale,'suo','suo')] tempo rinchius[Select_CString(your_heir.IsFemale,'a','o')] nelle stanze che [Select_CString(your_heir.IsFemale,'le','gli')] abbiamo assegnato, a sospirare o a leggere, e persino quando esce [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] evita perlopiù chiunque. Non credo che [Select_CString(your_heir.IsFemale,'lei','lui')] abbia mostrato il [Select_CString(your_heir.IsFemale,'suo','suo')] volto a corte neppure una volta.\n\nMi dico che [Select_CString(your_heir.IsFemale,'lei','lui')] sta soltanto prendendo dimestichezza col luogo e vedremo come andrà [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita da qui in avanti, ma è senz'altro un inizio non propizio."
  lmf_heir.1653.a:0 "Non è propriamente un tipo espansivo, vero, [Select_CString(your_heir.IsFemale,'lei','lui')]?"
  lmf_heir.1653.tt:0 "#EMP [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] avrà maggiori probabilità di restare per conto [Select_CString(your_heir.IsFemale,'suo','suo')] durante [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita#!"

  lmf_heir.1654.t:0 "L'erede nostalgic[Select_CString(your_heir.IsFemale,'a','o')]"
  lmf_heir.1654.desc.away:0 "Sebbene non fossi lì a vederlo di persona, mi è stato riferito "
  lmf_heir.1654.desc.busy:0 "Sebbene abbia trascorso poco tempo con [Select_CString(your_heir.IsFemale,'lei','lui')], ho sentito "
  lmf_heir.1654.desc.there:0 "Non mi è affatto gradito notare "
  lmf_heir.1654.desc:0 "che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso le [Select_CString(your_heir.IsFemale,'sue','sue')] prime due settimane a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] soprattutto desiderando di tornare a [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip].\n\nForse [your_heir.Custom('polite_gender_ref')] non era pront[Select_CString(your_heir.IsFemale,'a','o')] a viaggiare così lontano da casa, non saprei, ma i servitori della [ROOT.Char.Custom('FortifiedBuilding')] dicono che [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] trascorre la maggior parte del [Select_CString(your_heir.IsFemale,'suo','suo')] tempo nelle [Select_CString(your_heir.IsFemale,'sue','sue')] stanze, o in lacrime o in lamenti. Persino quando mostra il [Select_CString(your_heir.IsFemale,'suo','suo')] volto, qualunque incontro con qualcun altro lo manda a fuggire immediatamente.\n\nMi dico che [Select_CString(your_heir.IsFemale,'lei','lui')] sta soltanto prendendo dimestichezza col luogo e vedremo come andrà [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita da qui in avanti, ma è senz'altro un inizio non propizio."
  lmf_heir.1654.a:0 "[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] si scalderà con noi, ne sono cert[Select_CString(ROOT.Char.IsFemale,'a','o')]."
  lmf_heir.1654.tt:0 "#EMP [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] avrà maggiori probabilità di cavarsela male durante [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita#!"

  lmf_heir.1655.t:0 "L'erede silenzios[Select_CString(your_heir.IsFemale,'a','o')]"
  lmf_heir.1655.desc.away:0 "Sebbene non fossi lì a vederlo di persona, mi è stato riferito "
  lmf_heir.1655.desc.busy:0 "Sebbene abbia trascorso poco tempo con [Select_CString(your_heir.IsFemale,'lei','lui')], ho sentito "
  lmf_heir.1655.desc.there:0 "Mi è gradito notare "
  lmf_heir.1655.desc:0 "che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] si è dimostrat[Select_CString(your_heir.IsFemale,'a','o')] un[Select_CString(your_heir.IsFemale,'a','')] [your_heir.Custom('polite_gender_ref')] quiet[Select_CString(your_heir.IsFemale,'a','o')] e diligente durante le [Select_CString(your_heir.IsFemale,'sue','sue')] prime due settimane a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nI servitori della [ROOT.Char.Custom('FortifiedBuilding')] dicono che [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] è sempre cortese, risponde sempre quando gli si parla ed è molto attent[Select_CString(your_heir.IsFemale,'a','o')] a seguire usi e pratiche attesi dagli ospiti della [ROOT.Char.Custom('FortifiedBuilding')].\n\nNon mi dispiacerebbe veder[Select_CString(your_heir.IsFemale,'la','lo')] uscire un poco di più dal [Select_CString(your_heir.IsFemale,'suo','suo')] guscio, ma mi ricordo che [Select_CString(your_heir.IsFemale,'lei','lui')] sta soltanto prendendo dimestichezza col luogo. Vedremo come andrà [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita da qui in avanti, ma almeno questo è un inizio propizio."
  lmf_heir.1655.a:0 "Non è propriamente un tipo espansivo, vero, [Select_CString(your_heir.IsFemale,'lei','lui')]?"
  lmf_heir.1655.tt:0 "#EMP [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] avrà maggiori probabilità di cavarsela bene durante [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita#!"

  lmf_heir.1656.t:0 "L'erede attaccabrighe"
  lmf_heir.1656.desc.away:0 "Sebbene non fossi lì a vederlo di persona, mi è stato riferito "
  lmf_heir.1656.desc.busy:0 "Sebbene abbia trascorso poco tempo con [Select_CString(your_heir.IsFemale,'lei','lui')], ho sentito "
  lmf_heir.1656.desc.there:0 "Non mi è affatto gradito notare "
  lmf_heir.1656.desc:0 "che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] è stat[Select_CString(your_heir.IsFemale,'a','o')] un problema fin dal momento in cui è arrivat[Select_CString(your_heir.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Le [Select_CString(your_heir.IsFemale,'sue','sue')] prime due settimane sono trascorse a bighellonare ovunque, ignorando la maggior parte delle regole che ci si aspetta gli ospiti della [ROOT.Char.Custom('FortifiedBuilding')] seguano, ed essendo, in pratica, un continuo tormento per i servitori della [ROOT.Char.Custom('FortifiedBuilding')]. Forse [Select_CString(your_heir.IsFemale,'lei','lui')] ritiene che il viaggio sia più una vacanza?\n\nMi dico che [Select_CString(your_heir.IsFemale,'lei','lui')] sta soltanto prendendo dimestichezza col luogo e vedremo come andrà [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita da qui in avanti, ma è senz'altro un inizio non propizio."
  lmf_heir.1656.a:0 "Finirò per pentirmi d'aver accettato questa visita, vero?"
  lmf_heir.1656.tt:0 "#EMP [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] avrà maggiori probabilità di cacciarsi nei guai durante [Select_CString(your_heir.IsFemale,'la sua','il suo')] visita#!"

  lmf_heir.heir.progress.minor.tt:0 "L'addestramento dell'erede di [your_heir.GetTitledFirstNamePossessiveNoTooltip] progredisce di poco"
  lmf_heir.heir.progress.moderate.tt:0 "L'addestramento dell'erede di [your_heir.GetTitledFirstNamePossessiveNoTooltip] progredisce in misura moderata"
  lmf_heir.heir.progress.large.tt:0 "L'addestramento dell'erede di [your_heir.GetTitledFirstNamePossessiveNoTooltip] progredisce in misura notevole"
  lmf_heir.heir.progress.negative.tt:0 "L'addestramento dell'erede di [your_heir.GetTitledFirstNamePossessiveNoTooltip] peggiora di poco"

  lmf_heir.1660.t:0 "Tempo con l'Erede"
  lmf_heir.1660.desc.first.annoy:0 "Perché ho accettato?\n\n[your_heir.GetTitledFirstNameNoTooltip] ha trascorso le ultime settimane a seguire ogni mio passo, e le domande sono infinite.\n\n"Perché lo fate in quel modo, mio [ROOT.Char.GetLadyLord]?"\n"Che cosa farete ora, mio [ROOT.Char.GetLadyLord]?"\n"Perché avete detto quello, mio [ROOT.Char.GetLadyLord]?"\n\nOgni volta che mi volto, eccol[Select_CString(your_heir.IsFemale,'a','o')] lì, che cerca d'essere d'aiuto ma, più spesso che no, finisce per intralciarmi.\n\nSospiro ogni volta che penso al fatto che la visita del[Select_CString(your_heir.IsFemale,'la','del')] [your_heir.Custom('polite_gender_ref')] è ben lungi dall'essere finita."
  lmf_heir.1660.desc.first.helpful:0 "Finora l'addestramento del[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] di [heir_liege.GetTitledFirstNamePossessiveNoTooltip], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], è andato piuttosto bene.\n\nIl [your_heir.Custom('polite_gender_ref')] ha colto i miei modi con relativa rapidità e fa del suo meglio per non intralciarmi. A volte quasi mi dimentico che [Select_CString(your_heir.IsFemale,'sia','sia')] lì.\n\nCerto, c'è ancora tempo perché le cose cambino, no?"
  lmf_heir.1660.desc.second.begin:0 "Ho trascorso altre settimane ad addestrare il[Select_CString(your_heir.IsFemale,'la','del')] [your_heir.Custom('polite_gender_ref')] di [heir_liege.GetTitledFirstNamePossessiveNoTooltip], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], come [Select_CString(heir_liege.IsFemale,'lei','lui')] ha richiesto, "
  lmf_heir.1660.desc.second.annoy.wasannoy:0 "e il [your_heir.Custom('polite_gender_ref')] non è divenut[Select_CString(your_heir.IsFemale,'a','o')] meno irritante di quanto [Select_CString(your_heir.IsFemale,'fosse','fosse')] in precedenza.\n\n"
  lmf_heir.1660.desc.second.annoy.washelpful:0 "e devo ammettere che la costante presenza del [your_heir.Custom('polite_gender_ref')] ha cominciato a irritarmi.\n\n"
  lmf_heir.1660.desc.second.helpful.wasannoy:0 "e, per fortuna, le cose sono migliorate. Il [your_heir.Custom('polite_gender_ref')] è divenut[Select_CString(your_heir.IsFemale,'a','o')] quasi sopportabile.\n\n"
  lmf_heir.1660.desc.second.helpful.washelpful:0 "e il [your_heir.Custom('polite_gender_ref')] continua a essere un piacere da avere attorno.\n\n"
  lmf_heir.1660.desc.second.annoy:0 "So che fa del suo meglio per essere d'aiuto, ma per lo più finisce soltanto per intralciarmi. Ho servi che vedo meno!\n\nPer fortuna, la visita non continuerà ancora a lungo."
  lmf_heir.1660.desc.second.helpful:0 "Si è abituat[Select_CString(your_heir.IsFemale,'a','o')] alla mia routine, spesso anticipando ciò di cui ho bisogno proprio come farebbe un servo fidato. Più volte è persino intervenut[Select_CString(your_heir.IsFemale,'a','o')] e ha sbrigato incombenze fastidiose prima ancora che pensassi di farle fare.\n\nPeccato che la visita non continuerà ancora a lungo."
  lmf_heir.1660.desc.third.begin:0 "[your_heir.GetTitledFirstNameNoTooltip] continua a trascorrere quasi tutto il [Select_CString(your_heir.IsFemale,'suo','suo')] tempo a seguirmi qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
  lmf_heir.1660.desc.third.annoy.wasannoy:0 "e il [your_heir.Custom('polite_gender_ref')] continua a essere un dolore al fianco. Non vi è davvero nient'altro a cui [Select_CString(your_heir.IsFemale,'lei','lui')] potrebbe dedicare il [Select_CString(your_heir.IsFemale,'suo','suo')] tempo?\n\n"
  lmf_heir.1660.desc.third.annoy.washelpful:0 "e lo dico ora: sarò lieto quando il [your_heir.Custom('polite_gender_ref')] prenderà finalmente congedo da noi.\n\n"
  lmf_heir.1660.desc.third.helpful.wasannoy:0 "e, per fortuna, le cose sono migliorate. Il [your_heir.Custom('polite_gender_ref')] è divenut[Select_CString(your_heir.IsFemale,'a','o')] quasi sopportabile.\n\n"
  lmf_heir.1660.desc.third.helpful.washelpful:0 "e sospetto che mi mancherà quasi il [your_heir.Custom('polite_gender_ref')] quando [Select_CString(your_heir.IsFemale,'se ne andrà','se ne andrà')].\n\n"
  lmf_heir.1660.desc.third.annoy:0 "Sono pressoché cert[Select_CString(your_heir.IsFemale,'a','o')] che quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] sia pienamente consapevole di quanto mi irriti, e mi evita ogni volta che non ho una lezione in programma.\n\n[heir_liege.GetTitledFirstNameNoTooltip] farebbe meglio a essermi grato per tutto il tempo che ho dedicato a [Select_CString(your_heir.IsFemale,'lei','lui')]."
  lmf_heir.1660.desc.third.helpful:0 "Nel complesso, credo che l'addestramento sia andato bene. Io e il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] abbiamo trovato una routine confortevole, e sospetto che quasi mi fiderei a lasciar[Select_CString(your_heir.IsFemale,'le','gli')] sbrigare molte incombenze senza la mia supervisione.\n\nÈ triste pensare che la visita sia quasi finita."
  lmf_heir.1660.a:0 "Un[Select_CString(your_heir.IsFemale,'a','o')] [your_heir.Custom('GetLassLad')] davvero fine."
  lmf_heir.1660.b:0 "[heir_liege.GetTitledFirstNameNoTooltip] farebbe meglio a essermene grato."
  spent_time_with_heir:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha trascorso del tempo con [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] mentre addestrava [CharYouHerHim(TARGET_CHARACTER)] come erede."
  spent_time_with_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha trascorso del tempo con [CHARACTER.GetShortUINameNoTooltipNoFormat] mentre addestrava [CharYouHerHim(CHARACTER)] come erede."
  annoyed_by_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] irritat[Select_CString(CHARACTER.IsFemale,'a','o')] da [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] mentre addestrava [CharYouHerHim(TARGET_CHARACTER)] come erede."
  annoyed_by_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] irritat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] da [CHARACTER.GetShortUINameNoTooltipNoFormat] mentre addestrava [CharYouHerHim(CHARACTER)] come erede."

  lmf_heir.1661.t:0 "In stretta compagnia"
  lmf_heir.1661.desc.start:0 "Ho trascorso le ultime due settimane in compagnia del[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] di [heir_liege.GetTitledFirstNamePossessiveNoTooltip], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], addestrando [Select_CString(your_heir.IsFemale,'lei','lui')] a essere un sovrano adeguato come il[Select_CString(your_heir.IsFemale,'la','del')] [your_heir.Custom('polite_gender_ref')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] ha richiesto, e di recente ho notato che il comportamento del[Select_CString(your_heir.IsFemale,'la','del')] [your_heir.Custom('GetLassLad')] è stato... diverso.\n\n"
  lmf_heir.1661.desc.child:0 "[your_heir.GetTitledFirstNameNoTooltip] mi vezzeggia, sorridendo e ridendo di quasi tutto ciò che dico, e ogni volta che ci incontriamo noto le [Select_CString(your_heir.IsFemale,'sue','sue')] guance arrossate. Naturalmente il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] è ancora soltanto un bambino, ma chiunque abbia occhi per vedere noterebbe che si è pres[Select_CString(your_heir.IsFemale,'a','o')] una cotta.\n\n"
  lmf_heir.1661.desc.adult:0 "[your_heir.GetTitledFirstNameNoTooltip] sorride spesso, cogliendo ogni pretesto per toccarmi la mano o la spalla, e quando i nostri sguardi si incontrano vi è una persistente, acuta curiosità. Lasciar correre oltre violerebbe senza dubbio la fiducia del[Select_CString(your_heir.IsFemale,'la','del')] [your_heir.Custom('polite_gender_ref')] [your_heir.Custom2('LMF_RelationToMePossessive', heir_liege )], ma è anche chiarissimo che il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] sarebbe favorevole proprio a questo.\n\n"
  lmf_heir.1661.desc.end:0 "La scelta spetta a me, dunque: la tronco qui e ora, prima che vada troppo oltre?"
  lmf_heir.1661.a:0 "Perché finirla, se è ciò che il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] desidera?"
  lmf_heir.1661.b:0 "Un piacevole diversivo, ma appena la visita sarà finita, sarà finita anche fra noi."
  lmf_heir.1661.c:0 "Ne sono lusingat[Select_CString(ROOT.Char.IsFemale,'a','o')]. Forse quando sarà più grand[Select_CString(your_heir.IsFemale,'e','e')]...?"
  lmf_heir.1661.d:0 "Sì, è meglio stroncare tutto prima che vada oltre."
  bonded_while_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha iniziato una relazione con [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] mentre addestrava [CharYouHerHim(TARGET_CHARACTER)] come erede."
  bonded_while_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha iniziato una relazione con [CHARACTER.GetShortUINameNoTooltipNoFormat] mentre addestrava [CharYouHerHim(CHARACTER)] come erede."
  crush_while_heir_training:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha sviluppato una cotta per [CHARACTER.GetShortUINameNoTooltipNoFormat] mentre veniva addestrat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] come erede da [CharYouHerHim(CHARACTER)]."
  crush_while_heir_training_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha sviluppato una cotta per [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] mentre veniva addestrat[Select_CString(CHARACTER.IsFemale,'a','o')] come erede da [CharYouHerHim(TARGET_CHARACTER)]."

  lmf_heir.1662.t:0 "Addestramento dell'Erede"
  lmf_heir.1662.desc.away:0 "Poiché ero assente, "
  lmf_heir.1662.desc.busy:0 "Poiché ero occupato, "
  lmf_heir.1662.desc.notrain:0 "Mi dicono che "
  lmf_heir.1662.desc.start:0 "il[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] di [heir_liege.GetTitledFirstNamePossessiveNoTooltip], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], ha trascorso le ultime settimane in compagnia di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))], che "
  lmf_heir.1662.desc.chancellor:0 "ha mostrato al [your_heir.Custom('polite_gender_ref')] il [ROOT.Char.Custom('FortifiedBuilding')] e ha spiegato le sfumature del[Select_CString(your_councillor.IsFemale,'la','del')] [your_councillor.Custom('polite_gender_ref')] incarico di mio [your_councillor.GetCouncilTitle|l].\n\n"
  lmf_heir.1662.desc.steward:0 "ha mostrato al [your_heir.Custom('polite_gender_ref')] che cosa occorra perché un [your_councillor.GetCouncilTitle|l] amministri un [ROOT.Char.Custom('FortifiedBuilding')] e gestisca le terre attorno ad esso.\n\n"
  lmf_heir.1662.desc.marshal:0 "ha condotto il [your_heir.Custom('polite_gender_ref')] alle caserme e gli ha mostrato come un [your_councillor.GetCouncilTitle|l] gestisca gli eserciti del proprio [ROOT.Char.GetLadyLord].\n\n"
  lmf_heir.1662.desc.spymaster:0 "ha mostrato al [your_heir.Custom('polite_gender_ref')] le parti meno frequentate del [ROOT.Char.Custom('FortifiedBuilding')], spiegando l'importanza del lavoro di un [your_councillor.GetCouncilTitle|l].\n\n"
  lmf_heir.1662.desc.admiral:0 "ha mostrato al [your_heir.Custom('polite_gender_ref')] i moli e ha spiegato le sfumature del proteggere le rotte commerciali del regno, e ciò che occorre per essere un [your_councillor.GetCouncilTitle|l] adeguato.\n\n"
  lmf_heir.1662.desc.castellan:0 "ha mostrato al [your_heir.Custom('polite_gender_ref')] il [ROOT.Char.Custom('FortifiedBuilding')] e ha spiegato le sfumature del ruolo di un [your_councillor.GetCouncilTitle|l] e di come sostenere il proprio signore.\n\n"
  lmf_heir.1662.desc.well:0 "Sembra che l'addestramento sia andato bene, e sia [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))] sia [your_heir.GetTitledFirstNameNoTooltip] siano andati d'accordo splendidamente. [heir_liege.GetTitledFirstNameNoTooltip] non dovrebbe avere lamentele riguardo ai progressi del[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] [heir_liege.Custom2('LMF_RelationToMePossessive', your_heir )]."
  lmf_heir.1662.desc.poorly:0 "Mi dicono che le cose non siano andate bene. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))] e [your_heir.GetTitledFirstNameNoTooltip] non sono andati particolarmente d'accordo, e il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] era per lo più annoiat[Select_CString(your_heir.IsFemale,'a','o')]. Dovrò ricordarmi di ringraziare [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))] per lo sforzo, comunque."
  lmf_heir.1662.a:0 "Bene a sapersi!"
  lmf_heir.1662.b:0 "Ebbene, che sfortuna."

  lmf_heir.1663.t:0 "Addestramento dell'Erede"
  lmf_heir.1663.desc.away:0 "Poiché ero assente, "
  lmf_heir.1663.desc.busy:0 "Poiché ero occupato, "
  lmf_heir.1663.desc.notrain:0 "Mi dicono che "
  lmf_heir.1663.desc.start:0 "il[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] di [heir_liege.GetTitledFirstNamePossessiveNoTooltip], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], ha trascorso le ultime settimane in compagnia di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))], che "
  lmf_heir.1663.desc.physician:0 "ha reso [Select_CString(your_heir.IsFemale,'lei','lui')] familiare con le pratiche di un [GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()], insieme a un'istruzione sull'uso delle erbe e sui metodi moderni di prevenzione delle malattie.\n\n"
  lmf_heir.1663.desc.chronicler:0 "ha mostrato [Select_CString(your_heir.IsFemale,'le','gli')] abbondanti registri storici disponibili nella nostra biblioteca, e come tali registri vengano usati da un [GetCourtPositionType('chronicler_court_position').GetNameNoTooltip()] per tessere racconti che influenzano le interazioni diplomatiche odierne.\n\n"
  lmf_heir.1663.desc.horse:0 "ha mostrato [Select_CString(your_heir.IsFemale,'le','gli')] le scuderie del [ROOT.Char.Custom('FortifiedBuilding')], spiegando la funzione di un [GetCourtPositionType('master_of_horse_court_position').GetNameNoTooltip()] non solo nel tenere i cavalli pronti per la battaglia, ma anche nel loro impiego per trasportare rifornimenti necessari.\n\n"
  lmf_heir.1663.desc.seneschal:0 "ha mostrato al [your_heir.Custom('polite_gender_ref')] che cosa occorra perché un [GetCourtPositionType('seneschal_court_position').GetNameNoTooltip()] amministri un [ROOT.Char.Custom('FortifiedBuilding')] e gestisca non solo le terre attorno ad esso, ma anche il dominio del [ROOT.Char.GetLadyLord].\n\n"
  lmf_heir.1663.desc.taster:0 "ha spiegato [Select_CString(your_heir.IsFemale,'le','gli')] la funzione di un [GetCourtPositionType('food_taster_court_position').GetNameNoTooltip()] a un banchetto, così come i vari tipi d'intrigo di corte che potrebbero minacciare la vita di un giovane sovrano se non fa attenzione.\n\n"
  lmf_heir.1663.desc.well:0 "Sembra che il tempo sia stato ben speso. [your_heir.GetTitledFirstNameNoTooltip] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] sono andati d'accordo a meraviglia, e il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] pareva assorbire le nozioni con senso di rispetto e scopo. [heir_liege.GetTitledFirstNameNoTooltip] non dovrebbe avere lamentele riguardo ai progressi del[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] [heir_liege.Custom2('LMF_RelationToMePossessive', your_heir )]."
  lmf_heir.1663.desc.poorly:0 "Purtroppo, le cose non sono andate particolarmente bene. [your_heir.GetTitledFirstNameNoTooltip] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] non sono andati d'accordo, e il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] ha più o meno ignorato gran parte di ciò che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] aveva da dire, ritenendolo irrilevante, provenendo da uno che era "soltanto" un membro della mia corte.\n\nOltraggioso, se vero."
  lmf_heir.1663.a:0 "Bene a sapersi!"
  lmf_heir.1663.b:0 "Ebbene, che sfortuna."

  lmf_heir.1664.t:0 "Addestramento dell'Erede"
  lmf_heir.1664.desc.away:0 "Poiché ero assente, "
  lmf_heir.1664.desc.busy:0 "Poiché ero occupato, "
  lmf_heir.1664.desc.notrain:0 "Mi dicono che "
  lmf_heir.1664.desc:0 "il[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] di [heir_liege.GetTitledFirstNamePossessiveNoTooltip], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], ha trascorso le ultime settimane in compagnia di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))], che ha condotto il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] presso la guarnigione del [ROOT.Char.Custom('FortifiedBuilding')] e gli ha mostrato di che cosa siano capaci i miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\n[your_heir.GetTitledFirstNameNoTooltip] è stat[Select_CString(your_heir.IsFemale,'a','o')] addestrat[Select_CString(your_heir.IsFemale,'a','o')] senza pietà... ma, a quanto pare, se l'è cavata piuttosto bene. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] mi dice che si è lamentat[Select_CString(your_heir.IsFemale,'a','o')] poco ed è andat[Select_CString(your_heir.IsFemale,'a','o')] d'accordo non solo con [Select_CString(your_courtier.IsFemale,'lei','lui')], ma persino con gli altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\n[heir_liege.GetTitledFirstNameNoTooltip] non dovrebbe avere lamentele riguardo ai progressi del[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] [heir_liege.Custom2('LMF_RelationToMePossessive', your_heir )], pare."
  lmf_heir.1664.a:0 "Eccellente lavoro, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]!"

  lmf_heir.1665.t:0 "Un duello sfortunato"
  lmf_heir.1665.desc:0 "Il[Select_CString(heir_liege.IsFemale,'la','del')] [heir_liege.Custom('polite_gender_ref')] di [heir_liege.GetTitledFirstNamePossessiveNoTooltip], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], ha trascorso le ultime settimane in compagnia di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))], che ha condotto il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] presso la guarnigione del [ROOT.Char.Custom('FortifiedBuilding')] e gli ha mostrato di che cosa siano capaci i miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nPurtroppo, non è andata bene. Non solo il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] era più preoccupat[Select_CString(your_heir.IsFemale,'a','o')] di dimostrare [Select_CString(your_heir.IsFemale,'se stessa','se stesso')] che di imparare davvero qualcosa, ma i due non sono andati d'accordo. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] ha trovato il [Select_CString(your_heir.IsFemale,'suo','suo')] contegno offensivo, e le loro discussioni sono culminate con [your_heir.GetTitledFirstNameNoTooltip] che ha sfidato [Select_CString(your_courtier.IsFemale,'lei','lui')] a duello.\n\n"
  lmf_heir.1665.desc.child:0 "A quanto pare, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] ha inizialmente rifiutato di duellare con un bambino... ma ciò ha insultato [your_heir.GetTitledFirstNameNoTooltip] al punto che il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] ha estratto la [Select_CString(your_heir.IsFemale,'sua','sua')] lama e ha attaccato, rendendo inevitabile il duello. "
  lmf_heir.1665.desc.adult:0 "A quanto pare, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] ha inizialmente rifiutato, poiché [your_heir.GetTitledFirstNameNoTooltip] era mio ospite, ma il[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('GetLassLad')] ha forzato la mano estraendo la [Select_CString(your_heir.IsFemale,'sua','sua')] lama e attaccando, rendendo inevitabile il duello. "
  lmf_heir.1665.desc.end:0 "Qualunque sia stato l'esito, l'intera faccenda è un disastro."
  lmf_heir.1665.a:0 "Speriamo sia la fine di tutto ciò."
  dueled_during_heir_training:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha sfidato [CHARACTER.GetShortUINameNoTooltipNoFormat] a un duello dopo che [CharYouSheHe(CHARACTER)] ha trascorso del tempo ad addestrare [CharYouHerHim(TARGET_CHARACTER)] come erede."
  dueled_during_heir_training_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha sfidato [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] a un duello dopo che [CharYouSheHe(TARGET_CHARACTER)] ha trascorso del tempo ad addestrare [CharYouHerHim(CHARACTER)] come erede."
  lmf_heir.1665.a.courtier.severe.tt:0 "[your_courtier.GetTitledFirstNameNoTooltip] vince il duello e ferisce gravemente [your_heir.GetTitledFirstNameNoTooltip]"
  lmf_heir.1665.a.courtier.win.tt:0 "[your_courtier.GetTitledFirstNameNoTooltip] vince il duello contro [your_heir.GetTitledFirstNameNoTooltip]"
  lmf_heir.1665.a.heir.severe.tt:0 "[your_heir.GetTitledFirstNameNoTooltip] vince il duello e ferisce gravemente [your_courtier.GetTitledFirstNameNoTooltip]"
  lmf_heir.1665.a.heir.win.tt:0 "[your_heir.GetTitledFirstNameNoTooltip] vince il duello contro [your_courtier.GetTitledFirstNameNoTooltip]"
  lmf_heir.1665.heir.duel.title:0 "[your_heir.GetTitledFirstNameNoTooltip] ferit[Select_CString(your_heir.IsFemale,'a','o')] in duello"
  lmf_heir.1665.heir.severe.duel.desc:0 "[your_heir.GetShortUINameNoFormat|U] è rimast[Select_CString(your_heir.IsFemale,'a','o')] gravemente ferit[Select_CString(your_heir.IsFemale,'a','o')] dopo aver sfidato e perso un duello contro il [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] di [heir_visit_target.GetShortUINamePossessiveNoFormat|U], [your_courtier.GetShortUINameNoFormat]."
  lmf_heir.1665.heir.duel.desc:0 "[your_heir.GetShortUINameNoFormat|U] è rimast[Select_CString(your_heir.IsFemale,'a','o')] ferit[Select_CString(your_heir.IsFemale,'a','o')] dopo aver sfidato e perso un duello contro il [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] di [heir_visit_target.GetShortUINamePossessiveNoFormat|U], [your_courtier.GetShortUINameNoFormat]."

  lmf_heir.1666.t: "Un Erede Scaltro"
  lmf_heir.1666.desc.away: "Poiché ero lontan[Select_CString(ROOT.Char.IsFemale,'a','o')] da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
  lmf_heir.1666.desc.busy: "Poiché ero pres[Select_CString(ROOT.Char.IsFemale,'a','o')] da altre faccende, "
  lmf_heir.1666.desc.train: "Mi aspettavo che [Select_CString(your_heir.IsFemale,'lei','lui')] trascorresse quel tempo con me, ma invece "
  lmf_heir.1666.desc.notrain: "Mi è stato riferito che "
  lmf_heir.1666.desc: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso le ultime settimane restando in disparte. Non assente dal [ROOT.Char.Custom('FortifiedBuilding')], bensì più... in agguato.\n\nA quanto pare, [your_heir.GetTitledFirstNameNoTooltip] ha avvicinato alcuni servitori e ha tenuto conversazioni che si potrebbero al meglio definire «sondaggi». [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] ha anche curiosato nel [ROOT.Char.Custom('FortifiedBuilding')], talvolta avvistat[Select_CString(your_heir.IsFemale,'a','o')] in luoghi inattesi, ma mai in un modo che possa dirsi sospetto. Se non sapessi di meglio, direi che quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] stava cercando di dissotterrare segreti su di me o sulla mia corte.\n\nNe ha trovati? Non ne ho idea, né so se [Select_CString(your_heir.IsFemale,'lei','lui')] intenda rivelare a [Select_CString(your_heir.IsFemale,'la sua','il suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] ciò che potrebbe aver scoperto.\n\n[Select_CString(your_heir.IsFemale,'Lei','Lui')|U] è davvero argut[Select_CString(your_heir.IsFemale,'a','o')]... e più discret[Select_CString(your_heir.IsFemale,'a','o')] di quanto avessi immaginato."
  lmf_heir.1666.a: "Dovrei preoccuparmi?"

  lmf_heir.1667.t: "Un Erede Indiscreto"
  lmf_heir.1667.desc: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso le ultime settimane restando in disparte. Non assente dal [ROOT.Char.Custom('FortifiedBuilding')], bensì più... in agguato.\n\nA quanto pare, [your_heir.GetTitledFirstNameNoTooltip] ha avvicinato alcuni servitori e ha tenuto conversazioni che si potrebbero al meglio definire «sondaggi», e [Select_CString(your_heir.IsFemale,'lei','lui')] ha anche curiosato nel [ROOT.Char.Custom('FortifiedBuilding')]. Lo so perché quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] è stat[Select_CString(your_heir.IsFemale,'a','o')] colto sul fatto. Più volte. Si è giunti al punto che [Select_CString(your_heir.IsFemale,'lei','lui')] ha dovuto essere invitat[Select_CString(your_heir.IsFemale,'a','o')] a tenersi lontan[Select_CString(your_heir.IsFemale,'a','o')] da certe parti del [ROOT.Char.Custom('FortifiedBuilding')], e ai servitori è stato proibito parlare con [Select_CString(your_heir.IsFemale,'lei','lui')].\n\nSe [Select_CString(your_heir.IsFemale,'lei','lui')] cercava di dissotterrare segreti, vi si è dedicat[Select_CString(your_heir.IsFemale,'a','o')] con ben maggiore goffaggine di quanto mi sarei aspettat[Select_CString(your_heir.IsFemale,'a','o')] da [Select_CString(your_heir.IsFemale,'lei','lui')]."
  lmf_heir.1667.a: "È questa la riconoscenza che ricevo per aver ospitat[Select_CString(your_heir.IsFemale,'a','o')] [Select_CString(your_heir.IsFemale,'lei','lui')]?"
  heir_digging_up_secrets: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] offes[Select_CString(CHARACTER.IsFemale,'a','o')] dai maldestri tentativi di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di dissotterrare i segreti di [CharMyHerHis(CHARACTER)]."
  heir_digging_up_secrets_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] offes[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] dai maldestri tentativi di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di dissotterrare i segreti di [CharMyHerHis(TARGET_CHARACTER)]."

  lmf_heir.1668.t: "Il Topo di Biblioteca"
  lmf_heir.1668.desc.start: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso gran parte delle ultime settimane rintanat[Select_CString(your_heir.IsFemale,'a','o')] nella biblioteca del [ROOT.Char.Custom('FortifiedBuilding')].\n\nBe', forse «rintanat[Select_CString(your_heir.IsFemale,'a','o')]» non è la parola giusta. Quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] ha interagito ben poco con chiunque, e ogni volta che un servitore andava a controllare [Select_CString(your_heir.IsFemale,'lei','lui')], il naso di [your_heir.GetTitledFirstNamePossessiveNoTooltip] era quasi sempre affondato in qualche tomo polveroso.\n\n"
  lmf_heir.1668.desc.well: "Posso solo supporre che i libri disponibili qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], siano di gran lunga superiori a quelli di [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], giacché mi giunge voce che [your_heir.GetTitledFirstNameNoTooltip] sia rimast[Select_CString(your_heir.IsFemale,'a','o')] assai compiaciut[Select_CString(your_heir.IsFemale,'a','o')] da tutto ciò che [Select_CString(your_heir.IsFemale,'lei','lui')] ha trovato. A quanto pare, [Select_CString(your_heir.IsFemale,'lei','lui')] ha imparato molto... ed è questo ciò che chiunque possa chiedere, sì?"
  lmf_heir.1668.desc.poorly: "Non so perché [Select_CString(your_heir.IsFemale,'lei','lui')] non abbia aspettato il ritorno a [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], se tutto ciò che desiderava era leggere. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] evidentemente non ha trovato molto che valesse la pena di leggere qui, e mi è stato riferito che alla fine abbia rinunciato e abbandonato la biblioteca per frustrazione. Forse è per il meglio, poiché vi è ben altro che [Select_CString(your_heir.IsFemale,'lei','lui')] debba fare, sì?"
  lmf_heir.1668.a: "Sono liet[Select_CString(ROOT.Char.IsFemale,'a','o')] che i nostri testi siano stati all'altezza dei [Select_CString(your_heir.IsFemale,'suoi','suoi')] standard."
  lmf_heir.1668.b: "Forse [Select_CString(your_heir.IsFemale,'lei','lui')] si concentrerà sull'imparare facendo davvero, invece?"

  lmf_heir.1669.t: "Un Erede Benvoluto"
  lmf_heir.1669.desc.impressive: "Suppongo di non dovermi sorprendere, visto quanto [Select_CString(your_heir.IsFemale,'lei','lui')] fosse impressionante all'inizio, ma "
  lmf_heir.1669.desc.unpleasant: "È un po' sorprendente, visto quanto [Select_CString(your_heir.IsFemale,'lei','lui')] parve sgradevole all'inizio, ma "
  lmf_heir.1669.desc.trouble: "È un po' sorprendente, visto che credevo [Select_CString(your_heir.IsFemale,'lei','lui')] sarebbe stat[Select_CString(your_heir.IsFemale,'a','o')] più d'impaccio che altro, ma "
  lmf_heir.1669.desc.dutiful: "È un po' sorprendente, visto quanto [Select_CString(your_heir.IsFemale,'lei','lui')] sembrasse un tipo assai più quieto e riservato, ma "
  lmf_heir.1669.desc.homesick: "Sembra che [Select_CString(your_heir.IsFemale,'lei','lui')] abbia finalmente superato la [Select_CString(your_heir.IsFemale,'sua','sua')] nostalgia di casa, poiché "
  lmf_heir.1669.desc.avoid: "Sembra che [Select_CString(your_heir.IsFemale,'lei','lui')] si sia finalmente scaldat[Select_CString(your_heir.IsFemale,'a','o')] con la gente di qui, poiché "
  lmf_heir.1669.desc: "Mi è stato detto che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] è divenut[Select_CString(your_heir.IsFemale,'a','o')] una figura piuttosto benvoluta attorno al [ROOT.Char.Custom('FortifiedBuilding')].\n\nOgni giorno, [your_heir.GetTitledFirstNameNoTooltip] saluta con allegria i servitori e poi fa del suo meglio per prendere parte alla vita di corte e perfino a cose che non mi aspetterei da chi ha sangue nobile. Lavorare nelle cucine? Chiacchierare con le guardie? Sbrigare commissioni per i miei amministratori? [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] lo fa volentieri, senza intralciare [Select_CString(your_heir.IsFemale,'se stessa','se stesso')].\n\nDavvero notevole."
  lmf_heir.1669.a: "Che lieto sviluppo."

  lmf_heir.1670.t: "Un Erede d'Impaccio"
  lmf_heir.1670.desc.impressive: "È un po' sorprendente, visto quanto [Select_CString(your_heir.IsFemale,'lei','lui')] fosse impressionante all'inizio, ma "
  lmf_heir.1670.desc.unpleasant: "Suppongo di non dovermi sorprendere, visto quanto [Select_CString(your_heir.IsFemale,'lei','lui')] parve sgradevole all'inizio, ma "
  lmf_heir.1670.desc.trouble: "La mia iniziale aspettativa che [Select_CString(your_heir.IsFemale,'lei','lui')] sarebbe stat[Select_CString(your_heir.IsFemale,'a','o')] poco più che una seccatura si è finora confermata, poiché "
  lmf_heir.1670.desc.dutiful: "È un po' sorprendente, visto quanto [Select_CString(your_heir.IsFemale,'lei','lui')] sembrasse devot[Select_CString(your_heir.IsFemale,'a','o')] al dovere all'inizio, ma "
  lmf_heir.1670.desc.homesick: "Sembra che [Select_CString(your_heir.IsFemale,'lei','lui')] non abbia superato la [Select_CString(your_heir.IsFemale,'sua','sua')] nostalgia di casa, poiché "
  lmf_heir.1670.desc.avoid: "Suppongo di non dovermi sorprendere, vista quanto [Select_CString(your_heir.IsFemale,'lei','lui')] fosse antisociale all'inizio, ma "
  lmf_heir.1670.desc: "Mi è stato detto che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] è divenut[Select_CString(your_heir.IsFemale,'a','o')] un vero impaccio attorno al [ROOT.Char.Custom('FortifiedBuilding')].\n\nA quanto pare, [your_heir.GetTitledFirstNameNoTooltip] ha tentato di ingraziarsi [Select_CString(your_heir.IsFemale,'se stessa','se stesso')] con membri della mia corte, ma quando ciò non ha dato frutto [Select_CString(your_heir.IsFemale,'lei','lui')] si è fatt[Select_CString(your_heir.IsFemale,'a','o')] cup[Select_CString(your_heir.IsFemale,'a','o')] e portat[Select_CString(your_heir.IsFemale,'a','o')] a bighellonare. Alcuni servitori hanno provato a dar[Select_CString(your_heir.IsFemale,'le','gli')] da fare, ma nulla era abbastanza «degno», e ho udito molte lamentele su come [Select_CString(your_heir.IsFemale,'lei','lui')] si impicci in faccende che poco comprende e finisca così sempre fra i piedi.\n\nLa maggior parte dei servitori ha cominciato a evitare del tutto [Select_CString(your_heir.IsFemale,'lei','lui')]. Che noia."
  lmf_heir.1670.a: "Non è un buon segno."

  lmf_heir.1671.t: "Un Erede Operoso"
  lmf_heir.1671.desc.start: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] si è offert[Select_CString(your_heir.IsFemale,'a','o')] alcune settimane fa di aiutare con un progetto di costruzione appena fuori dai terreni del [ROOT.Char.Custom('FortifiedBuilding')]. Per far esperienza, suppongo, su come tali opere vengano condotte e sul beneficio che recano al regno.\n\n"
  lmf_heir.1671.desc.well: "A quanto pare, le cose sono andate meglio di quanto chiunque avrebbe potuto aspettarsi. [your_heir.GetTitledFirstNameNoTooltip] non ha tentato di prendere il comando del progetto. Invece, [Select_CString(your_heir.IsFemale,'lei','lui')] ha imparato dal sovrintendente tutto ciò che poteva e si è persino mess[Select_CString(your_heir.IsFemale,'a','o')] a lavorare con gli operai. Chiunque sia rientrato poi al [ROOT.Char.Custom('FortifiedBuilding')] ha rimarcato quanto fosse d'aiuto quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] e quanto [Select_CString(your_heir.IsFemale,'lei','lui')] sembrasse davvero interessat[Select_CString(your_heir.IsFemale,'a','o')] a comprendere ciò che stavano facendo.\n\nUn esito sorprendente, a dirla tutta, ma piacevole."
  lmf_heir.1671.desc.poorly: "Vi era qualche dubbio su quanto [your_heir.GetTitledFirstNameNoTooltip] potesse davvero essere d'aiuto... e, a quanto pare, tali timori erano ben fondati. Il sovrintendente mi ha confidato poi che quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] era, nel migliore dei casi, una seccatura e spesso un vero intralcio. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] si è lamentat[Select_CString(your_heir.IsFemale,'a','o')] di continuo della fatica, si è chiaramente ritenut[Select_CString(your_heir.IsFemale,'a','o')] superiore alla squadra di contadini, e ha provato molte volte a impadronirsi del progetto pur non sapendone nulla.\n\nUn esito non inatteso, a dire il vero, ma comunque deludente."
  lmf_heir.1671.a: "Chi l'avrebbe mai detto che [Select_CString(your_heir.IsFemale,'lei','lui')] ne avesse la stoffa?"
  lmf_heir.1671.b: "Forse [Select_CString(your_heir.IsFemale,'lei','lui')] avrebbe dovuto restare nel [ROOT.Char.Custom('FortifiedBuilding')]."

  lmf_heir.1672.t: "Un Incidente Sfortunato"
  lmf_heir.1672.desc: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso gran parte delle ultime settimane in compagnia del mio [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]. Uno sforzo che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] stava facendo, credo, per aiutare con l'addestramento di [your_heir.GetTitledFirstNamePossessiveNoTooltip].\n\nA quanto pare, non sarebbe potuta andare peggio. Benché i due andassero d'accordo all'inizio, pare che siano incappati in un litigio... e ciò ha portato a un rancore covato finché, infine, [your_heir.GetTitledFirstNameNoTooltip] è esplos[Select_CString(your_heir.IsFemale,'a','o')] contro [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] in piena udienza. Si sono dette cose, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] ne è rimast[Select_CString(your_courtier.IsFemale,'a','o')] terribilmente umiliat[Select_CString(your_courtier.IsFemale,'a','o')], e nessuno dei due è sul punto di perdonare l'altro.\n\nCosì, non solo quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] ha fatto ben pochi progressi nell'istruzione per cui è venut[Select_CString(your_heir.IsFemale,'a','o')] qui, ma si è anche guadagnat[Select_CString(your_heir.IsFemale,'a','o')] un nuovo nemico fra i membri della mia corte."
  lmf_heir.1672.a: "Ben fatto, [your_heir.Custom('GetLassLad')]."
  fight_during_heir_training: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha insultato imperdonabilmente [CHARACTER.GetShortUINameNoTooltipNoFormat] a corte durante una visita."
  fight_during_heir_training_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha insultato imperdonabilmente [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] a corte durante una visita."

  lmf_heir.1673.t: "Un Nuovo Amico"
  lmf_heir.1673.desc: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso gran parte delle ultime settimane in compagnia del mio [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]. Uno sforzo che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] stava facendo, credo, per aiutare con l'addestramento di [your_heir.GetTitledFirstNamePossessiveNoTooltip].\n\nBe', non avrebbero potuto andare più d'accordo. Ben presto, [your_heir.GetTitledFirstNameNoTooltip] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] erano praticamente inseparabili. Sono andati ovunque nel [ROOT.Char.Custom('FortifiedBuilding')] insieme, ridendo e chiassando mentre il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] mostrava [Select_CString(your_heir.IsFemale,'lei','lui')] i meccanismi interni di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e probabilmente le ha dat[Select_CString(your_courtier.IsFemale,'a','o')] un'educazione migliore di quanto avrei potuto io.\n\nErano ancora «compari di furto» a corte, il che mi fa pensare che la loro amicizia non sia destinata a spegnersi presto."
  lmf_heir.1673.a: "Meraviglioso!"
  befriended_during_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] hanno legato mentre [CharYouSheHe(CHARACTER)] [CharWereWas(CHARACTER)] addestrav[CharYouHerHim(TARGET_CHARACTER)] durante una visita."
  befriended_during_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [CHARACTER.GetShortUINameNoTooltipNoFormat] hanno legato mentre [CharYouSheHe(TARGET_CHARACTER)] [CharWereWas(TARGET_CHARACTER)] addestrav[CharYouHerHim(CHARACTER)] durante una visita."

  lmf_heir.1674.t: "Un Nuovo Amico?"
  lmf_heir.1674.desc.start: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso gran parte delle ultime settimane in compagnia del mio [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]. Uno sforzo che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] stava facendo, credo, per aiutare con l'addestramento di [your_heir.GetTitledFirstNamePossessiveNoTooltip].\n\n"
  lmf_heir.1674.desc.adult: "Be', non avrebbero potuto andare più d'accordo. Ben presto, [your_heir.GetTitledFirstNameNoTooltip] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] erano praticamente inseparabili. Sono andati ovunque nel [ROOT.Char.Custom('FortifiedBuilding')] insieme, ridendo e chiassando mentre il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] mostrava [Select_CString(your_heir.IsFemale,'lei','lui')] i meccanismi interni di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nA corte si sussurrava che forse i due fossero divenuti più che semplici amici? Ma certo era soltanto pettegolezzo."
  lmf_heir.1674.desc.bothchild: "Be', non avrebbero potuto andare più d'accordo. Ben presto, [your_heir.GetTitledFirstNameNoTooltip] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] erano praticamente inseparabili. Sono andati ovunque nel [ROOT.Char.Custom('FortifiedBuilding')] insieme, ridendo e chiassando mentre il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] mostrava [Select_CString(your_heir.IsFemale,'lei','lui')] i meccanismi interni di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nA corte si sussurrava che forse i due fossero divenuti più che semplici amici, ma sono soltanto bambini. Nel migliore dei casi è un'infatuazione, e tutto il resto non è che pettegolezzo ozioso."
  lmf_heir.1674.desc.child: "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] mi ha riferito poi che, sebbene l'addestramento sia andato bene e [Select_CString(your_courtier.IsFemale,'lei','lui')] si sia impegnat[Select_CString(your_courtier.IsFemale,'a','o')] a mostrare a [your_heir.GetTitledFirstNameNoTooltip] i meccanismi interni di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], non ha potuto fare a meno di avere l'impressione che quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] abbia sviluppato una sorta di cotta per [Select_CString(your_courtier.IsFemale,'lei','lui')]. [Select_CString(your_courtier.IsFemale,'Lei','Lui')|U] apprezza [your_heir.GetTitledFirstNameNoTooltip] quanto basta ed è lusingat[Select_CString(your_courtier.IsFemale,'a','o')] dalle [Select_CString(your_heir.IsFemale,'sue','sue')] attenzioni, ma naturalmente [Select_CString(your_heir.IsFemale,'lei','lui')] è ancora soltanto un bambino.\n\nÈ cosa abbastanza naturale, e sono cert[Select_CString(ROOT.Char.IsFemale,'a','o')] che quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] se ne farà una ragione."
  lmf_heir.1674.a: "Non ho nulla di cui preoccuparmi, vero?"
  lmf_heir.1674.b: "Ah, il giovane amore."
  fell_in_love_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] si è innamorat[Select_CString(CHARACTER.IsFemale,'a','o')] di [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] mentre riceveva addestramento da erede da [CharYouHerHim(TARGET_CHARACTER)]."
  fell_in_love_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] si è innamorat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] di [CHARACTER.GetShortUINameNoTooltipNoFormat] mentre riceveva addestramento da erede da [CharYouHerHim(CHARACTER)]."
  crushed_heir_training: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha sviluppato una cotta per [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] durante una visita al castello."
  crushed_heir_training_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha sviluppato una cotta per [CHARACTER.GetShortUINameNoTooltipNoFormat] durante una visita al castello."

  lmf_heir.1675.t: "A Caccia"
  lmf_heir.1675.desc.invite: "Sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di ricevere un invito dal[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] a unirmi a [Select_CString(your_heir.IsFemale,'lei','lui')] in una battuta di caccia in una foresta vicina, non molto tempo fa. Non so quanta istruzione avrebbe ricevuto quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')], ma con soltanto noi due e pochi uomini al seguito, pareva che il viaggio potesse almeno darci occasione di conoscerci meglio.\n\n"
  lmf_heir.1675.desc.invite.poorly: "Be', lo ha fatto, e i risultati non sono stati buoni. Ha cominciato a piovere quasi subito, e [your_heir.GetTitledFirstNameNoTooltip] si è lamentat[Select_CString(your_heir.IsFemale,'a','o')] senza sosta... ancor più quando abbiamo faticato a trovare selvaggina. Quando infine l'abbiamo trovata, [Select_CString(your_heir.IsFemale,'lei','lui')] ha mancato il colpo sulla bestia e poi ha avuto la sfacciataggine di dare la colpa a #EMP me#! per aver distratt[Select_CString(your_heir.IsFemale,'a','o')] [Select_CString(your_heir.IsFemale,'lei','lui')]!\n\nDopo quasi un'altra settimana di sopportare la [Select_CString(your_heir.IsFemale,'sua','sua')] costante miseria, sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] felic[Select_CString(ROOT.Char.IsFemale,'e','e')] di tornare al [ROOT.Char.Custom('FortifiedBuilding')] e lasciare [your_heir.GetTitledFirstNameNoTooltip] nel bosco, dove [Select_CString(your_heir.IsFemale,'lei','lui')] appartiene."
  lmf_heir.1675.desc.invite.well: "Lo ha fatto davvero. [your_heir.GetTitledFirstNameNoTooltip] e io abbiamo trascorso ottime notti a chiacchierare accanto al fuoco, e sono riuscit[Select_CString(ROOT.Char.IsFemale,'a','o')] a consigliare quel[Select_CString(your_heir.IsFemale,'la','lo')] [your_heir.Custom('polite_gender_ref')] su aspetti del governo a cui non avrei pensato altrimenti. Siamo riusciti a trovare un po' di selvaggina, e mi ha fatt[Select_CString(ROOT.Char.IsFemale,'o','o')] piacere notare che gradevole compagnia fosse [Select_CString(your_heir.IsFemale,'lei','lui')] per tutta la durata.\n\nQuando siamo rientrati al [ROOT.Char.Custom('FortifiedBuilding')], mi è quasi dispiaciuto veder finire la cosa."
  lmf_heir.1675.desc.start: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] è partit[Select_CString(your_heir.IsFemale,'a','o')] per una battuta di caccia in una piccola foresta vicino al [ROOT.Char.Custom('FortifiedBuilding')], portando con sé solo pochi uomini al seguito. Non so che cosa direbbe il[Select_CString(your_heir.IsFemale,'la sua','il suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] di tale svago, giacché non pareva proprio il tipo di addestramento per cui [Select_CString(your_heir.IsFemale,'lei','lui')] è venut[Select_CString(your_heir.IsFemale,'a','o')] qui, ma forse [your_heir.GetTitledFirstNameNoTooltip] aveva bisogno di una pausa?\n\n"
  lmf_heir.1675.desc.poorly: "Ahimè, non credo che [Select_CString(your_heir.IsFemale,'lei','lui')] ne abbia godut[Select_CString(your_heir.IsFemale,'a','o')] granché. Ha piovuto per la maggior parte delle settimane in cui [Select_CString(your_heir.IsFemale,'lei','lui')] è stat[Select_CString(your_heir.IsFemale,'a','o')] via, e [Select_CString(your_heir.IsFemale,'lei','lui')] è tornat[Select_CString(your_heir.IsFemale,'a','o')] a mani vuote e miserabil[Select_CString(your_heir.IsFemale,'e','e')]. Almeno non è stat[Select_CString(your_heir.IsFemale,'a','o')] sbranat[Select_CString(your_heir.IsFemale,'a','o')] da una bestia. Che cosa avrebbe detto [heir_liege.GetTitledFirstNameNoTooltip]?"
  lmf_heir.1675.desc.well: "Per fortuna, pare che il[Select_CString(your_heir.IsFemale,'suo','suo')] viaggio sia andato bene. Il tempo è stato buono e, quando [Select_CString(your_heir.IsFemale,'lei','lui')] è tornat[Select_CString(your_heir.IsFemale,'a','o')] alcune settimane dopo, era con alcune pellicce in mano e un gran sorriso sul volto."
  lmf_heir.1675.desc.notrain: "Mi è stato riferito che [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso la maggior parte del tempo a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dedicandosi alla caccia nei boschi vicini. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] avrebbe potuto fare lo stesso a [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], immagino, ma dal momento che non ho permesso a [your_heir.GetTitledFirstNameNoTooltip] di entrare nel [ROOT.Char.Custom('FortifiedBuilding')], suppongo non avesse altra scelta che cercare altrove i[Select_CString(your_heir.IsFemale,'suoi','suoi')] svaghi.\n\n"
  lmf_heir.1675.desc.notrain.poorly: "Sfortunatamente, mi è stato detto che il viaggio non è andato bene. Il tempo è stato pessimo e la selvaggina scarsa, e a un certo punto [your_heir.GetTitledFirstNameNoTooltip] è rimast[Select_CString(your_heir.IsFemale,'a','o')] piuttosto malconci[Select_CString(your_heir.IsFemale,'a','o')] dopo essere scivolat[Select_CString(your_heir.IsFemale,'a','o')] in un burrone fangoso senza che vi fosse alcuno a tirar[Select_CString(your_heir.IsFemale,'la','lo')] fuori. A quanto pare, [Select_CString(your_heir.IsFemale,'lei','lui')] è rimast[Select_CString(your_heir.IsFemale,'a','o')] bloccato lì per giorni!\n\nSpero che [Select_CString(your_heir.IsFemale,'lei','lui')] non mi serbi rancore per una così cattiva esperienza."
  lmf_heir.1675.desc.notrain.well: "Almeno il viaggio è andato bene, o così mi è stato detto. Il tempo ha retto e, quando [your_heir.GetTitledFirstNameNoTooltip] è tornat[Select_CString(your_heir.IsFemale,'a','o')] infine, era con un mucchio di pellicce e un sorriso piuttosto ridicolo sul volto.\n\nForse [Select_CString(your_heir.IsFemale,'lei','lui')] considererà l'eccellente battuta di caccia un'adeguata compensazione per la mancanza di addestramento? Non resta che sperarlo."
  lmf_heir.1675.a: "Che splendida esperienza!"
  lmf_heir.1675.b: "Sono liet[Select_CString(ROOT.Char.IsFemale,'a','o')] che [Select_CString(your_heir.IsFemale,'lei','lui')] si sia divertit[Select_CString(your_heir.IsFemale,'a','o')]."
  lmf_heir.1675.c: "Che esperienza miserabile, per noi entrambi."
  lmf_heir.1675.d: "Che peccato."
  excellent_hunting_trip: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] hanno legato durante una battuta di caccia insieme in una foresta vicina."
  excellent_hunting_trip_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [CHARACTER.GetShortUINameNoTooltipNoFormat] hanno legato durante una battuta di caccia insieme in una foresta vicina."
  disastrous_hunting_trip: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha messo alla prova i nervi di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] durante una disastrosa battuta di caccia insieme."
  disastrous_hunting_trip_corresponding: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha messo alla prova i nervi di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] durante una disastrosa battuta di caccia insieme."

  lmf_heir.1676.t: "L’Erede in Perlustrazione"
  lmf_heir.1676.train: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso le ultime settimane "
  lmf_heir.1676.notrain: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso in gran parte gli ultimi mesi "
  lmf_heir.1676.desc.begin: "girando per [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], visitando i villaggi locali e [ROOT.Char.GetCapitalLocation.GetCounty.GetFaith.HouseOfWorshipPlural|l] mentre conosceva la gente. Un impegno lodevole, a dire il vero.\n\n"
  lmf_heir.1676.desc.poorly: "Purtroppo, non credo sia andata bene quanto sperava [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip]. Il tempo fu pessimo, così [your_heir.Custom('polite_gender_ref')] restò rintanat[Select_CString(your_heir.IsFemale,'a','o')] per metà [Select_CString(your_heir.IsFemale,'del suo','del suo')] viaggio in una triste fattoria [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetNameNoTooltip], con ben poco da fare. Poi, più tardi, credo che [Select_CString(your_heir.IsFemale,'lei','lui')] sia stat[Select_CString(your_heir.IsFemale,'a','o')] derubat[Select_CString(your_heir.IsFemale,'a','o')] dai briganti... benché [Select_CString(your_heir.IsFemale,'lei','lui')] si rifiuti di commentare la faccenda.\n\nSperiamo che almeno [Select_CString(your_heir.IsFemale,'lei','lui')] ne abbia tratto qualcosa d’istruttivo, sì?"
  lmf_heir.1676.desc.well: "Per quanto ne so, il viaggio è andato piuttosto bene. Il tempo è stato migliore del previsto, così [your_heir.Custom('polite_gender_ref')] ha percorso più di metà della contea prima d’aver finito. Furono visitati luoghi storici d’interesse, cantieri, vecchi cimiteri... a essere del tutto sincer[Select_CString(ROOT.Char.IsFemale,'a','o')], non credo d’aver mai visto così tanto di [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip].\n\n[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] pareva di buon umore quando [Select_CString(your_heir.IsFemale,'lei','lui')] fece ritorno al [ROOT.Char.Custom('FortifiedBuilding')], dunque speriamo che la perlustrazione abbia dato a [Select_CString(your_heir.IsFemale,'lei','lui')] l’educazione che [Select_CString(your_heir.IsFemale,'lei','lui')] sperava, sì?"
  lmf_heir.1676.a: "Meraviglioso!"
  lmf_heir.1676.b: "Non possiamo avere tutto, no?"

  lmf_heir.1677.t: "L’Erede Scavezzacollo"
  lmf_heir.1677.desc.castle: "Evidentemente bisognos[Select_CString(your_heir.IsFemale,'a','o')] d’una pausa dal [ROOT.Char.Custom('FortifiedBuilding')], "
  lmf_heir.1677.desc.away: "Continuando a scegliere di non venire ancora al [ROOT.Char.Custom('FortifiedBuilding')], "
  lmf_heir.1677.desc.none: "Invece di trascorrere del tempo al [ROOT.Char.Custom('FortifiedBuilding')], "
lmf_heir.1677.desc.invite: 0 "[heir_liege.Custom('IT_NAM_COL2')][heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] mi ha chiesto di raggiunger[Select_CString(your_heir.IsFemale,'la','lo')] in una taverna rinomata in una città poco distante. All'inizio ero riluttante ad andare, ma poi riflettei sul genere di guai in cui [your_heir.Custom('polite_gender_ref')] come [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] avrebbe potuto cacciarsi tra la gente comune e capii che era meglio accompagnar[Select_CString(your_heir.IsFemale,'la','lo')]... con qualche attendente a breve distanza, naturalmente.\n\n"
lmf_heir.1677.desc.invite.poorly: 0 "Come si è scoperto, il mio istinto aveva ragione. [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] non vedeva l'ora di sfogarsi, ora che [Select_CString(your_heir.IsFemale,'era','era')] fuori dalla vigile sorveglianza di [Select_CString(your_heir.IsFemale,'sua','suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], e si ubriacò talmente nel corso della notte che [Select_CString(your_heir.IsFemale,'lei','lui')] riusciva a malapena a controllarsi. [Select_CString(your_heir.IsFemale,'Lei','Lui')] provocò una rissa da taverna, mi insultò numerose volte e "
  lmf_heir.1677.desc.invite.well: "Alla fine, non vi era motivo di temere. [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] mantenne [Select_CString(your_heir.IsFemale,'la sua','il suo')] contegno e trascorse una serata eccellente. Oso dire che feci lo stesso. Scambiammo molte storie davanti a un boccale, guidammo gli avventori in un giro di canti, e "
  lmf_heir.1677.desc.invite.woman: "credo persino d’aver visto una graziosa fanciulla condur[Select_CString(your_heir.IsFemale,'la','lo')] in disparte, nel mezzo di tutto ciò.\n\n"
  lmf_heir.1677.desc.invite.man: "credo persino d’aver visto un uomo avvenente condur[Select_CString(your_heir.IsFemale,'la','lo')] in disparte, nel mezzo di tutto ciò.\n\n"
  lmf_heir.1677.desc.invite.nosex: "finché [Select_CString(your_heir.IsFemale,'lei','lui')] arrivò perfino a vomitarmi sugli stivali.\n\n"
  lmf_heir.1677.desc.invite.poorly.end: "In breve, caos dall’inizio alla fine. Abbandonai [Select_CString(your_heir.IsFemale,'lei','lui')] molto prima che la serata si concludesse, devo ammetterlo."
  lmf_heir.1677.desc.invite.well.end: "In breve, una notte che ricorderemo entrambi. E credo d’essere perfino riuscit[Select_CString(ROOT.Char.IsFemale,'a','o')] a offrire a [Select_CString(your_heir.IsFemale,'lei','lui')] un po’ d’istruzione attraverso quelle storie, se posso dirlo."
  lmf_heir.1677.desc.noinvite: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] si è recat[Select_CString(your_heir.IsFemale,'a','o')] in una cittadina non lontana, dove — a quanto capisco — [Select_CString(your_heir.IsFemale,'lei','lui')] ha trascorso una bella serata di baldoria in una taverna locale.\n\n"
  lmf_heir.1677.desc.noinvite.poorly: "A quanto pare [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] era ansios[Select_CString(your_heir.IsFemale,'a','o')] di sfogarsi, ora che [Select_CString(your_heir.IsFemale,'lei','lui')] non era più sotto l’occhio vigile di [Select_CString(your_heir.IsFemale,'la sua','il suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], e le storie di quella notte sono sbalorditive. Ubriachezza, una rissa... in qualche modo [Select_CString(your_heir.IsFemale,'lei','lui')] riuscì persino a far infuriare gli avventori tanto da essere cacciat[Select_CString(your_heir.IsFemale,'a','o')] dalla città.\n\nSuppongo sia un modo come un altro d’istruirsi, no?"
  lmf_heir.1677.desc.noinvite.well: "A quanto pare [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] era ansios[Select_CString(your_heir.IsFemale,'a','o')] di sfogarsi, e le buone ore durarono per gran parte della settimana seguente. Mi dicono tuttavia che [your_heir.Custom('polite_gender_ref')] si sia comportat[Select_CString(your_heir.IsFemale,'a','o')] più o meno con decoro. Nessuna rissa, nessuna ubriachezza eccessiva, e [Select_CString(your_heir.IsFemale,'lei','lui')] non fu cacciat[Select_CString(your_heir.IsFemale,'a','o')] dalla città da popolani infuriati. Solo puro divertimento, e gente del posto deliziata dal carisma di [your_heir.GetTitledFirstNamePossessiveNoTooltip] e speranzosa del [Select_CString(your_heir.IsFemale,'suo','suo')] ritorno.\n\nNon molto istruttivo, se chiedete a me, ma immagino che [Select_CString(your_heir.IsFemale,'lei','lui')] sia stat[Select_CString(your_heir.IsFemale,'a','o')] liet[Select_CString(your_heir.IsFemale,'a','o')] della pausa."
  lmf_heir.1677.desc.start: "Avevo udito in privato, da [Select_CString(your_heir.IsFemale,'la sua','il suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], che [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] potesse aver avuto intenzione di usare la scusa dell’«addestramento» per allontanarsi da [heir_visit_origin.GetCounty.GetTitle.GetNameNoTierNoTooltip]... e pare proprio così, poiché [your_heir.Custom('polite_gender_ref')] ha trascorso gran parte degli ultimi mesi passando di taverna in taverna per tutta [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetNameNoTooltip], e ho il sospetto che non sarebbe stato diverso nemmeno se avessi permesso a [Select_CString(your_heir.IsFemale,'lei','lui')] di venire al [ROOT.Char.Custom('FortifiedBuilding')].\n\n"
  lmf_heir.1677.desc.poorly: "Vorrei poter dire che [your_heir.Custom('polite_gender_ref')] se la sia passata meglio, ma a quanto pare [Select_CString(your_heir.IsFemale,'il suo','il suo')] girovagare consistette in poco più di risse da ubriachi, star male finché [Select_CString(your_heir.IsFemale,'lei','lui')] non strisciò in un fienile per giorni, e far infuriare i locali dopo aver accumulato conti esorbitanti. Non sono racconti edificanti, ma pare che almeno adesso [Select_CString(your_heir.IsFemale,'lei','lui')] se lo sia finalmente tolto dal [Select_CString(your_heir.IsFemale,'suo','suo')] sistema."
  lmf_heir.1677.desc.well: "A sentir le voci, [your_heir.Custom('polite_gender_ref')] se l’è passata egregiamente. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] si è comportat[Select_CString(your_heir.IsFemale,'a','o')] più o meno con decoro e, al di fuori di qualche storia di scapestratezza, pare aver conquistato la gente comune d’ogni parte della contea. I racconti di [Select_CString(your_heir.IsFemale,'lei','lui')] che guida folle di avventori in canti da taverna sono davvero notevoli. Ora pare che la baldoria sia giunta al termine, ma che tempo meraviglioso dev’essere stato per [Select_CString(your_heir.IsFemale,'lei','lui')]!"
  lmf_heir.1677.a: "Che bella serata!"
  lmf_heir.1677.b: "Ben fatto, [your_heir.Custom('GetLassLad')]."
  lmf_heir.1677.c: "Ugh, che spettacolo!"
  lmf_heir.1677.d: "#EMP Questo#! è l’erede di [heir_liege.GetTitledFirstNamePossessiveNoTooltip]?"
  excellent_party_with_heir: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] si sono legat[Select_CString(Or(CHARACTER.IsFemale,TARGET_CHARACTER.IsFemale),'i','i')] durante una notte di folle baldoria in taverna."
  excellent_party_with_heir_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [CHARACTER.GetShortUINameNoTooltipNoFormat] si sono legat[Select_CString(Or(CHARACTER.IsFemale,TARGET_CHARACTER.IsFemale),'i','i')] durante una notte di folle baldoria in taverna."
  disastrous_party_with_heir: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] disgustat[Select_CString(CHARACTER.IsFemale,'a','o')] da [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] dopo una notte di disastrosa baldoria in taverna."
  disastrous_party_with_heir_corresponding: "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] disgustat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] da [CHARACTER.GetShortUINameNoTooltipNoFormat] dopo una notte di disastrosa baldoria in taverna."

  lmf_heir.1678.t: "A Non Far Nulla"
  lmf_heir.1678.desc.all: "Quasi stento a crederlo, ma nei mesi trascorsi da quando [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] è arrivat[Select_CString(your_heir.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [Select_CString(your_heir.IsFemale,'lei','lui')] non ha fatto... be’, nulla di nulla.\n\n"
  lmf_heir.1678.desc.two: "Non so bene perché, ma [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso moltissimo tempo nel [ROOT.Char.Custom('FortifiedBuilding')] facendo... be’, nulla di nulla.\n\n"
  lmf_heir.1678.desc.one: "Forse avendo deciso che [Select_CString(your_heir.IsFemale,'lei','lui')] avesse bisogno d’una pausa dagli sforzi precedenti, [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] ha trascorso le ultime settimane nel [ROOT.Char.Custom('FortifiedBuilding')] facendo... be’, nulla di nulla.\n\n"
  lmf_heir.1678.desc.castle: "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] è rimast[Select_CString(your_heir.IsFemale,'a','o')] perlopiù nelle stanze che gli abbiamo assegnato, leggendo o scrivendo nel [Select_CString(your_heir.IsFemale,'suo','suo')] diario o persino passeggiando avanti e indietro. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] è compars[Select_CString(your_heir.IsFemale,'a','o')] a corte solo un paio di volte e, anche allora, se n’è rimast[Select_CString(your_heir.IsFemale,'a','o')] perlopiù in disparte.\n\n"
  lmf_heir.1678.desc.town: "Da quando ho rifiutato d’ospitare [your_heir.Custom('IT_NAM_COL4')][your_heir.GetTitledFirstNameNoTooltip] al [ROOT.Char.Custom('FortifiedBuilding')], [Select_CString(your_heir.IsFemale,'lei','lui')] ha gironzolato soprattutto per alcune cittadine vicine... senza davvero tentare di #EMP fare#! nulla o imparare alcunché, più che altro per godersi i panorami. O almeno, così mi dicono.\n\n"
  lmf_heir.1678.desc.end: "Pigrizia, o soltanto un [your_heir.Custom('polite_gender_ref')] grato d’avere un po’ di tempo per sé, lontano da tutti gli sguardi vigili di [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]? Non saprei dirlo. Quanto meno [Select_CString(your_heir.IsFemale,'lei','lui')] non ha dato alcun fastidio."
  lmf_heir.1678.a: "Per lo meno [Select_CString(your_heir.IsFemale,'lei','lui')] non è #EMP il mio#! erede."

  lmf_heir.1680.t: "In Viaggio [Select_CString(your_heir.IsFemale,'Sulla Sua','Sul Suo')|U] Strada"
  lmf_heir.1680.desc.notrain: "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] è venut[Select_CString(your_heir.IsFemale,'a','o')] al [ROOT.Char.Custom('FortifiedBuilding')] un’ultima volta, oggi, "
  lmf_heir.1680.desc.notrain.away: "sebbene, ovviamente, io non fossi lì per accompagnar[Select_CString(your_heir.IsFemale,'la','lo')] alla partenza.\n\n"
  lmf_heir.1680.desc.notrain.ill: "sebbene io fossi troppo malat[Select_CString(ROOT.Char.IsFemale,'a','o')] per scendere nel cortile ad accompagnar[Select_CString(your_heir.IsFemale,'la','lo')] alla partenza.\n\n"
  lmf_heir.1680.desc.notrain.busy: "sebbene io fossi fin troppo occupat[Select_CString(ROOT.Char.IsFemale,'a','o')] per scendere nel cortile ad accompagnar[Select_CString(your_heir.IsFemale,'la','lo')] alla partenza.\n\n"
  lmf_heir.1680.desc.notrain.nomeet.end: "Così [your_heir.Custom('polite_gender_ref')] diede un rigido commiato ai pochi presenti, prima d’intraprendere [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio di ritorno verso [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip] e [Select_CString(your_heir.IsFemale,'la sua','il suo')] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]. Se [Select_CString(your_heir.IsFemale,'lei','lui')] fosse in qualche modo scontent[Select_CString(your_heir.IsFemale,'a','o')] della mia decisione di non ospitar[Select_CString(your_heir.IsFemale,'la','lo')] al [ROOT.Char.Custom('FortifiedBuilding')]... be’, non lo sapremo mai, vero? La visita di [your_heir.GetTitledFirstNamePossessiveNoTooltip] è ormai conclusa."
  lmf_heir.1680.desc.notrain.meet: "così scesi nel cortile almeno per accompagnar[Select_CString(your_heir.IsFemale,'la','lo')] alla partenza.\n\n[your_heir.Custom('polite_gender_ref')] fu abbastanza cortese e, se [Select_CString(your_heir.IsFemale,'lei','lui')] fosse in qualche modo scontent[Select_CString(your_heir.IsFemale,'a','o')] della mia decisione di non ospitar[Select_CString(your_heir.IsFemale,'la','lo')] al [ROOT.Char.Custom('FortifiedBuilding')], lo nascose bene.\n\nDopo poche frasi di circostanza, [Select_CString(your_heir.IsFemale,'lei','lui')] intraprese [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio di ritorno verso [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip] e [Select_CString(your_heir.IsFemale,'la sua','il suo')] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]. La visita di [your_heir.GetTitledFirstNamePossessiveNoTooltip] è ormai conclusa."
  lmf_heir.1680.desc.train: "Poiché era l’ultima sera della visita di [your_heir.GetTitledFirstNamePossessiveNoTooltip] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], fu organizzata una piccola cena in [Select_CString(your_heir.IsFemale,'suo','suo')] onore, "
  lmf_heir.1680.desc.train.away: "sebbene, tristemente, io non potessi essere lì.\n\n"
  lmf_heir.1680.desc.train.ill: "sebbene, tristemente, fossi troppo malat[Select_CString(ROOT.Char.IsFemale,'a','o')] per partecipare.\n\n"
  lmf_heir.1680.desc.train.busy: "sebbene fossi troppo occupat[Select_CString(ROOT.Char.IsFemale,'a','o')] in altre faccende per partecipare.\n\n"
  lmf_heir.1680.desc.train.meet.friend: "e fui più che liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di presenziare e accompagnar[Select_CString(your_heir.IsFemale,'la','lo')] alla partenza.\n\n"
  lmf_heir.1680.desc.train.meet.enemy: "e, per quanto avrei preferito evitare del tutto l’occasione, ero pur sempre [Select_CString(your_heir.IsFemale,'il suo','il suo')] ospite e questo è il mio [ROOT.Char.Custom('FortifiedBuilding')].\n\n"
  lmf_heir.1680.desc.train.meet.neutral: "e presenziai sia come [Select_CString(your_heir.IsFemale,'il suo','il suo')] ospite sia come [ROOT.Char.GetLadyLord] del mio [ROOT.Char.Custom('FortifiedBuilding')].\n\n"
  lmf_heir.1680.desc.train.success: "[your_heir.Custom('polite_gender_ref')] era incredibilmente soddisfatt[Select_CString(your_heir.IsFemale,'a','o')] del successo della [Select_CString(your_heir.IsFemale,'sua','sua')] visita e, perciò, restò di buon umore per tutta la serata.\n\n"
lmf_heir.1680.desc.train.failure: 0 "[your_heir.Custom('polite_gender_ref')|U] rimase piuttosto silenzios[Select_CString(your_heir.IsFemale,'a','o')] per tutta la durata dell'incontro, considerate le conseguenze disastrose della [Select_CString(your_heir.IsFemale,'sua','suo')] visita, e si ritirò non appena la cortesia lo rese possibile.\n\n"
  lmf_heir.1680.desc.train.neutral: "[your_heir.Custom('polite_gender_ref')] fu cortese, sebbene [Select_CString(your_heir.IsFemale,'lei','lui')] restasse perlopiù in disparte... forse riflettendo sul successo contrastante della [Select_CString(your_heir.IsFemale,'sua','sua')] visita.\n\n"
  lmf_heir.1680.desc.train.end: "All’indomani, [your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] era già in cammino nel [Select_CString(your_heir.IsFemale,'suo','suo')] viaggio di ritorno verso [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip] e [Select_CString(your_heir.IsFemale,'la sua','il suo')] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )]. Non posso fare a meno di chiedermi che cosa dirà [Select_CString(your_heir.IsFemale,'lei','lui')] del [Select_CString(your_heir.IsFemale,'suo','suo')] tempo qui... ma, in ogni caso, il [Select_CString(your_heir.IsFemale,'suo','suo')] viaggio è ormai concluso."
  lmf_heir.1680.a: "Spero che [Select_CString(your_heir.IsFemale,'lei','lui')] abbia gradito [Select_CString(your_heir.IsFemale,'il suo','il suo')] soggiorno. Io so che #EMP io#! sì."
  lmf_heir.1680.b: "Speriamo sia l’ultima volta che vediamo [Select_CString(your_heir.IsFemale,'lei','lui')]."
  lmf_heir.1680.c: "Un ottimo [your_heir.Custom('polite_gender_ref')], oltre che un amico."
  lmf_heir.1680.d: "Sono liet[Select_CString(ROOT.Char.IsFemale,'a','o')] che [Select_CString(your_heir.IsFemale,'lei','lui')] abbia tratto così tanto dal [Select_CString(your_heir.IsFemale,'suo','suo')] viaggio."
  lmf_heir.1680.e: "Be’, così va."
  lmf_heir.1680.f: "Ora ai miei affari!"
  lmf_heir.1680.end.tt: "[your_heir.Custom('IT_NAM_COL3')][your_heir.GetTitledFirstNameNoTooltip] inizierà [Select_CString(your_heir.IsFemale,'il suo','il suo')] viaggio di ritorno verso [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]"

  lmf_heir.1681.desc.start:0 "Ho appena ricevuto risposta da [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))], e il viaggio di [Select_CString(your_heir.IsFemale,'lei','lui')] a [heir_visit_target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è giunto al termine.\n\nA quanto pare, "
lmf_heir.1681.desc.notrain: 0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] ha rifiutato di ospitar[Select_CString(your_heir.IsFemale,'la','lo')] nella [heir_visit_target.Custom('FortifiedBuilding')], così invece [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] trascorse la maggior parte del [Select_CString(your_heir.IsFemale,'suo','suo')] tempo laggiù "
  lmf_heir.1681.desc.notrain.hunt.good:0 "godendosi un eccellente periodo di caccia nelle terre selvagge circostanti.\n\n"
  lmf_heir.1681.desc.notrain.hunt.poor:0 "cacciando nelle terre selvagge circostanti, con un tempo infame e ben poco da mostrare per le fatiche.\n\n"
  lmf_heir.1681.desc.notrain.tour.good:0 "girando per le terre circostanti, conoscendo la gente e le loro usanze... e pare che tutto sia andato piuttosto bene.\n\n"
  lmf_heir.1681.desc.notrain.tour.poor:0 "girando per le terre circostanti, sopportando cattivo tempo e popolani a cui importava ben poco della [Select_CString(your_heir.IsFemale,'sua','sua')] presenza.\n\n"
  lmf_heir.1681.desc.notrain.party.good:0 "divertendosi nelle taverne di vari villaggi vicini... tutto assai eccitante, a giudicare dal tono, sebbene poco produttivo.\n\n"
  lmf_heir.1681.desc.notrain.party.poor:0 "divertendosi nelle taverne di vari villaggi vicini... o, per lo meno, tentando di farlo. Leggendo tra le righe, [Select_CString(your_heir.IsFemale,'lei','lui')] è stat[Select_CString(your_heir.IsFemale,'a','o')] perlopiù miserabil[Select_CString(your_heir.IsFemale,'e','e')].\n\n"
  lmf_heir.1681.desc.notrain.sick:0 "troppo malat[Select_CString(your_heir.IsFemale,'a','o')] per combinare granché, se non riposare in una locanda d'un villaggio vicino.\n\n"
  lmf_heir.1681.desc.notrain.nothing:0 "facendo... ebbene, quasi nulla. Gironzolando per alcuni villaggi vicini, fermandosi nelle locande, ma in definitiva senza combinare nulla che io definirei produttivo.\n\n"
  lmf_heir.1681.desc.notrain.end:0 "Tecnicamente, ciò soddisfa la promessa fatta da [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] ha avuto accesso a [heir_visit_target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], sebbene non alla [ROOT.Char.Custom('FortifiedBuilding')], ma difficilmente la chiamerei ospitalità degna di questo nome."
  lmf_heir.1681.desc.train:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] è stat[Select_CString(your_heir.IsFemale,'a','o')] accolto personalmente da [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] e ha ricevuto ogni cortesia. [Select_CString(your_heir.IsFemale,'Lei','Lui')|U] ha avuto una stanza nella [heir_visit_target.Custom('FortifiedBuilding')] e ha trascorso "
  lmf_heir.1681.desc.train.castle:0 "sebbene [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] non abbia addestrato [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] di persona, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] ha ricevuto ogni cortesia e una stanza nella [heir_visit_target.Custom('FortifiedBuilding')], trascorrendo "
  lmf_heir.1681.desc.train.all:0 "quasi l'intero viaggio "
  lmf_heir.1681.desc.train.most:0 "la maggior parte del viaggio "
  lmf_heir.1681.desc.train.some:0 "il tempo "
  lmf_heir.1681.desc.train.rest:0 "e il resto "
  lmf_heir.1681.desc.train.second:0 ", "
  lmf_heir.1681.desc.train.third:0 ", e "
  lmf_heir.1681.desc.host:0 "venendo addestrat[Select_CString(your_heir.IsFemale,'a','o')] personalmente da [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] [Select_CString(heir_visit_target.IsFemale,'lei stessa','lui stesso')]"
  lmf_heir.1681.desc.castle:0 "alla corte di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]"
  lmf_heir.1681.desc.sick:0 "essendo troppo malat[Select_CString(your_heir.IsFemale,'a','o')] per far altro che riposare"
  lmf_heir.1681.desc.hunt:0 "in una battuta di caccia nelle terre selvagge circostanti"
  lmf_heir.1681.desc.tour:0 "girando per le terre e conoscendo la gente e le loro usanze"
  lmf_heir.1681.desc.party:0 "godendosi alla grande le taverne vicine"
  lmf_heir.1681.desc.nothing:0 "combinando quasi nulla"
  lmf_heir.1681.desc.train.good:0 ".\n\nDa tutto ciò che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] ha detto nella lettera, nel complesso è stata un'esperienza eccellente e assai produttiva."
  lmf_heir.1681.desc.train.poor:0 ".\n\nDetto ciò, da tutto ciò che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] ha scritto nella lettera, nel complesso è stata un'esperienza miserabile e ben poco produttiva."
  lmf_heir.1681.desc.train.neutral:0 ".\n\nLeggendo tra le righe, sospetto che non tutto sia andato bene durante il viaggio, sebbene nel complesso [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))] sembri almeno perlopiù soddisfatt[Select_CString(your_heir.IsFemale,'a','o')]."
  lmf_heir.1681.a:0 "Attendo con impazienza il [Select_CString(your_heir.IsFemale,'suo','suo')] ritorno, presto."
  lmf_heir.1681.secrets.to.tell.tt:0 "[your_heir.GetTitledFirstNameNoTooltip] ti rivela alcuni segreti che [Select_CString(your_heir.IsFemale,'lei','lui')] ha scoperto mentre si trovava laggiù..."

  lmf_heir.1700.own.t:0 "Il mio bastard[Select_CString(bastard_child.IsFemale,'a','o')] [bastard_child.Custom('GetDaughterSon')|U]?"
  lmf_heir.1700.son.t:0 "Il mio nipote bastard[Select_CString(bastard_child.IsFemale,'a','o')] [bastard_child.Custom('GetDaughterSon')]?"
  lmf_heir.1700.relative.t:0 "Il bastard[Select_CString(bastard_child.IsFemale,'a','o')] [bastard_child.Custom('GetDaughterSon')|U] di [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))|U]?"
  lmf_heir.1700.bastard.me.start:0 "Oggi un[Select_CString(visitor.IsFemale,'a','o')] giovane popolano [visitor.GetWomanMan] si è presentat[Select_CString(visitor.IsFemale,'a','o')] ai cancelli della [ROOT.Char.Custom('FortifiedBuilding')], cosa a malapena insolita, se non fosse che quest[Select_CString(visitor.IsFemale,'a','o')] giovane [visitor.GetWomanMan] sostiene, a quanto pare, d'essere [bastard_child.Custom('GetDaughterSon')] mio.\n\nSono andat[Select_CString(ROOT.Char.IsFemale,'a','o')] a vedere di persona e, lo ammetto, [Select_CString(bastard_child.IsFemale,'lei','lui')] aveva davvero qualcosa dei miei tratti. Secondo quanto mi ha detto, incontrai [Select_CString(bastard_child.IsFemale,'sua','sua')] madre "
  lmf_heir.1700.bastard.me.heirvisit:0 "durante una notte di ubriaca baldoria in taverna, quando ero in visita a [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip] in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... molte lune or sono ormai, ma ricordo l'occasione.\n\n"
  lmf_heir.1700.bastard.me.campfollower:0 "durante una notte a [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], quando ella seguiva l'accampamento dell'esercito. Una notte che ricordo, in verità.\n\n"
  lmf_heir.1700.bastard.me.taverngirl:0 "in una taverna di [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], dove lavorava come sguattera. Una notte che ricordo, in verità.\n\n"
  lmf_heir.1700.bastard.me.lostguide:0 "quando mi ero perduto in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] e lei mi guidò di nuovo all'accampamento. Una notte che ricordo, in verità.\n\n"
  lmf_heir.1700.bastard.me.campcaughteye:0 "quando era una soldatessa che colpì il mio sguardo una notte a [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Una notte che ricordo, in verità.\n\n"
  lmf_heir.1700.bastard.me.foundpool:0 "presso una pozza curativa in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], non lontano da dove era accampato l'esercito. Un giorno che ricordo, in verità.\n\n"
  lmf_heir.1700.bastard.me.default:0 "durante una notte di baldoria molte lune or sono, a [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], che ricordo, in verità, solo vagamente.\n\n"
  lmf_heir.1700.bastard.me.end:0 "E che cosa desidera ora quest[Select_CString(visitor.IsFemale,'a','o')] giovane [visitor.GetWomanMan]? "Sei mio padre," mi ha detto. "Spero soltanto di poter guadagnare un posto al tuo servizio, se vorrai accogliermi.""
  lmf_heir.1700.bastard.alive.start:0 "Oggi un[Select_CString(visitor.IsFemale,'a','o')] giovane popolano [visitor.GetWomanMan] si è presentat[Select_CString(visitor.IsFemale,'a','o')] ai cancelli della [ROOT.Char.Custom('FortifiedBuilding')], cosa a malapena insolita, se non fosse che quest[Select_CString(visitor.IsFemale,'a','o')] giovane [visitor.GetWomanMan] sostiene, a quanto pare, d'essere [bastard_child.Custom('GetDaughterSon')] di [bastard_child_father.GetFirstNamePossessiveNoTooltip]!\n\nSono andat[Select_CString(ROOT.Char.IsFemale,'a','o')] a vedere di persona e, lo ammetto, [Select_CString(bastard_child.IsFemale,'lei','lui')] aveva davvero qualcosa dei tratti di [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]. Quando ho convocato [bastard_child_father.GetFirstNameNoTooltip], ha ammesso, con aria colpevole, d'esser giaciuto con una donna "
  lmf_heir.1700.bastard.alive.heirvisit:0 "durante una notte di ubriaca baldoria in taverna, quando era in visita a [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip] in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], e ciò coincide con la storia del giovane [visitor.Custom('WomanManPossessive')].\n\n"
  lmf_heir.1700.bastard.alive.campfollower:0 "che seguiva l'accampamento quando l'esercito era accampato in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], e ciò coincide con la storia del giovane [visitor.Custom('WomanManPossessive')].\n\n"
  lmf_heir.1700.bastard.alive.taverngirl:0 "che faceva la serva in una taverna di [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], quando l'esercito si accampò nei pressi, e ciò coincide con la storia del giovane [visitor.Custom('WomanManPossessive')].\n\n"
  lmf_heir.1700.bastard.alive.lostguide:0 "che lo aveva guidato di nuovo all'accampamento quando si era perso in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], e ciò coincide con la storia del giovane [visitor.Custom('WomanManPossessive')].\n\n"
  lmf_heir.1700.bastard.alive.campcaughteye:0 "che era una soldatessa quando l'esercito era accampato in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], e che gli aveva colpito lo sguardo... e ciò coincide con la storia del giovane [visitor.Custom('WomanManPossessive')].\n\n"
  lmf_heir.1700.bastard.alive.foundpool:0 "che aveva incontrato presso una pozza curativa non lontano da dove l'esercito era accampato in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], e ciò coincide con la storia del giovane [visitor.Custom('WomanManPossessive')].\n\n"
  lmf_heir.1700.bastard.alive.default:0 "durante una notte di baldoria molte lune or sono, a [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], e ciò coincide con la storia del giovane [visitor.Custom('WomanManPossessive')].\n\n"
  lmf_heir.1700.bastard.alive.end:0 "E che cosa desidera ora quest[Select_CString(visitor.IsFemale,'a','o')] giovane [visitor.GetWomanMan]? "Sei del mio sangue," mi ha detto, "e l'unica famiglia che mi resti. Spero soltanto di poter guadagnare un posto al tuo servizio, se vorrai accogliermi.""
  lmf_heir.1700.bastard.dead.start:0 "Oggi un[Select_CString(visitor.IsFemale,'a','o')] giovane popolano [visitor.GetWomanMan] si è presentat[Select_CString(visitor.IsFemale,'a','o')] ai cancelli della [ROOT.Char.Custom('FortifiedBuilding')], cosa a malapena insolita, se non fosse che quest[Select_CString(visitor.IsFemale,'a','o')] giovane [visitor.GetWomanMan] sostiene, a quanto pare, d'essere il figlio di [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))] defunt[Select_CString(bastard_child_father.IsFemale,'a','o')], [bastard_child_father.GetFirstNameNoTooltip].\n\nSono andat[Select_CString(ROOT.Char.IsFemale,'a','o')] a vedere di persona e, lo ammetto, [Select_CString(bastard_child.IsFemale,'lei','lui')] aveva davvero qualcosa dei tratti di [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]. A suo dire, [bastard_child_father.GetFirstNameNoTooltip] incontrò [Select_CString(bastard_child.IsFemale,'sua','sua')] madre "
  lmf_heir.1700.bastard.dead.heirvisit:0 "durante una notte di ubriaca baldoria in taverna, quando era in visita a [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip] in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... cosa che ricordo vagamente, anche se [bastard_child_father.GetFirstNameNoTooltip] ne parlò ben poco.\n\n"
  lmf_heir.1700.bastard.dead.campfollower:0 "quando ella seguiva l'accampamento, in una notte in cui il suo esercito era accampato in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... cosa certo plausibile, poiché [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero laggiù allora.\n\n"
  lmf_heir.1700.bastard.dead.taverngirl:0 "in una taverna di [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], dove serviva da bere ai [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] di passaggio... cosa certo plausibile, poiché l'esercito di [bastard_child_father.GetFirstNamePossessiveNoTooltip] si trovava davvero laggiù allora.\n\n"
  lmf_heir.1700.bastard.dead.lostguide:0 "quando si era perso in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] ed ella, del luogo, lo guidò di nuovo all'accampamento... cosa certo plausibile, poiché [bastard_child_father.GetFirstNamePossessiveNoTooltip] esercito si trovava davvero laggiù allora.\n\n"
  lmf_heir.1700.bastard.dead.campcaughteye:0 "quando era una soldatessa e colpì lo sguardo di [bastard_child_father.GetFirstNamePossessiveNoTooltip] mentre erano accampati insieme a [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... cosa certo plausibile, poiché [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero laggiù allora.\n\n"
  lmf_heir.1700.bastard.dead.foundpool:0 "presso una pozza curativa in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], non lontano da dove era accampato l'esercito. Cosa certo plausibile, poiché [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero laggiù allora.\n\n"
  lmf_heir.1700.bastard.dead.default:0 "durante una notte di baldoria molte lune or sono, a [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], cosa del tutto possibile poiché [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero laggiù allora.\n\n"
  lmf_heir.1700.bastard.dead.end:0 "E che cosa desidera ora quest[Select_CString(visitor.IsFemale,'a','o')] giovane [visitor.GetWomanMan]? "Sei del mio sangue," mi ha detto, "e l'unica famiglia che mi resti. Spero soltanto di poter guadagnare un posto al tuo servizio, se vorrai accogliermi.""
  lmf_heir.1700.mother.me.start:0 "Oggi una contadina si è presentata ai cancelli della [ROOT.Char.Custom('FortifiedBuilding')], cosa a malapena insolita, se non fosse che questa donna era con un bambino che sostiene, a quanto pare, sia mio.\n\nSono andat[Select_CString(ROOT.Char.IsFemale,'a','o')] a vedere di persona, e l'ho ricordata vagamente "
  lmf_heir.1700.mother.me.heirvisit:0 "da una notte di ubriaca baldoria in taverna, quando ero in visita a [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip] in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], dunque la sua storia è del tutto plausibile.\n\n"
  lmf_heir.1700.mother.me.campfollower:0 "come una seguace d'accampamento che mi trovò di suo gusto, in una notte in cui il mio esercito era in [story.MakeScope.Var('story_stray_seed_location').Province.GetNameNoTooltip]. Dunque la sua storia è del tutto plausibile.\n\n"
  lmf_heir.1700.mother.me.taverngirl:0 "come una sgualdrinella di taverna del luogo che mi servì in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], quando il mio esercito era accampato nei pressi; dunque la sua storia è del tutto plausibile.\n\n"
  lmf_heir.1700.mother.me.lostguide:0 "come una donna del luogo che mi guidò di nuovo all'accampamento quando mi ero perso in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]; dunque la sua storia è del tutto plausibile.\n\n"
  lmf_heir.1700.mother.me.campcaughteye:0 "come una soldatessa che colpì il mio sguardo quando eravamo insieme all'accampamento in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]; dunque la sua storia è del tutto plausibile.\n\n"
  lmf_heir.1700.mother.me.foundpool:0 "come colei che mi sorprese mentre uscivo da una pozza curativa in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], non lontano da dove era accampato l'esercito; dunque la sua storia è del tutto plausibile.\n\n"
  lmf_heir.1700.mother.me.default:0 "da una notte di baldoria molte lune or sono, a [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]; dunque la sua storia è del tutto plausibile.\n\n"
  lmf_heir.1700.mother.me.mid:0 "Quanto al "
  lmf_heir.1700.mother.me.newborn:0 "piccolo infante tra le sue braccia? "
  lmf_heir.1700.mother.me.child:0 "[bastard_child.Custom('polite_gender_ref')] al suo fianco, con gli occhi nervosamente bassi? "
  lmf_heir.1700.mother.me.end:0 ""[bastard_child.GetSheHe|U] è del tuo sangue," ha detto la donna. "Spero soltanto per noi un posto alla tua corte, se vorrai accoglierci, dove [bastard_child.GetFirstNameNoTooltip] possa avere un avvenire assai migliore di quello che io potrei mai sperare di offrire.""
  lmf_heir.1700.mother.alive.start:0 "Oggi una contadina si è presentata ai cancelli della [ROOT.Char.Custom('FortifiedBuilding')], cosa a malapena insolita, se non fosse che questa donna era con un bambino che sostiene, a quanto pare, sia [bastard_child.Custom('GetDaughterSon')] di [bastard_child_father.GetFirstNamePossessiveNoTooltip]!\n\nSono andat[Select_CString(ROOT.Char.IsFemale,'a','o')] a vedere di persona e, lo ammetto, [bastard_child.GetSheHe] aveva davvero qualcosa dei tratti di [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]. Quando ho convocato [bastard_child_father.GetFirstNameNoTooltip], ha ammesso, con aria colpevole, di riconoscere la donna, "
  lmf_heir.1700.mother.alive.heirvisit:0 "poiché giacque con lei durante una notte di ubriaca baldoria in taverna, quando era in visita a [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip] in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip].\n\n"
  lmf_heir.1700.mother.alive.campfollower:0 "poiché ella seguiva l'accampamento quando il suo esercito era accampato in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], sebbene non l'avesse più vista né ne avesse più udito parlare da allora.\n\n"
  lmf_heir.1700.mother.alive.taverngirl:0 "poiché era una sgualdrinella di taverna in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Ella lo trovò di suo gusto quando lui e altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] giunsero dall'accampamento vicino, sebbene non l'avesse più vista né ne avesse più udito parlare da allora.\n\n"
  lmf_heir.1700.mother.alive.lostguide:0 "poiché era una donna del luogo che lo guidò di nuovo al suo accampamento quando si era perso in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], e trascorsero insieme la notte.\n\n"
  lmf_heir.1700.mother.alive.campcaughteye:0 "poiché era una soldatessa che colpì il suo sguardo una notte quando l'esercito era accampato in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], sebbene non l'avesse più vista né ne avesse più udito parlare da allora.\n\n"
  lmf_heir.1700.mother.alive.foundpool:0 "poiché era una donna del luogo che lo sorprese mentre usciva da una pozza curativa in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], non lontano da dove era accampato l'esercito, sebbene non l'avesse più vista né ne avesse più udito parlare da allora.\n\n"
  lmf_heir.1700.mother.alive.default:0 "poiché giacque con lei durante una notte di baldoria molte lune or sono in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], sebbene non l'avesse più vista né ne avesse più udito parlare da allora.\n\n"
  lmf_heir.1700.mother.alive.mid:0 "Quanto al "
  lmf_heir.1700.mother.alive.newborn:0 "piccolo infante tra le sue braccia? "
  lmf_heir.1700.mother.alive.child:0 "[bastard_child.Custom('polite_gender_ref')] al suo fianco, gli occhi nervosamente bassi? "
  lmf_heir.1700.mother.alive.end:0 ""[Select_CString(bastard_child.IsFemale,'Lei','Lui')|U] è del tuo sangue," disse la donna. "Chiedo solo un posto nella tua corte, se ci vorrai, dove [bastard_child.GetFirstNameNoTooltip] possa avere un futuro assai migliore di qualunque cosa io potessi mai sperare di offrir[Select_CString(bastard_child.IsFemale,'le','gli')].""
  lmf_heir.1700.mother.dead.start:0 "Una contadina si è presentata oggi ai cancelli del[ROOT.Char.Custom('FortifiedBuilding')], cosa a malapena insolita, se non fosse che era con un bambino che, a quanto pare, sostiene essere il [bastard_child.Custom('GetDaughterSon')] del mio defunto [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))], [bastard_child_father.GetFirstNameNoTooltip]!\n\nSono andato a vedere di persona e, lo ammetto, [Select_CString(bastard_child.IsFemale,'lei','lui')] aveva davvero qualcosa dell'aspetto del mio [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]. Secondo la donna, incontrò il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))] "
  lmf_heir.1700.mother.dead.heirvisit:0 "durante una notte di ubriaca baldoria in taverna, quando egli visitò [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip] in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]... cosa che ricordo vagamente, anche se [bastard_child_father.GetFirstNameNoTooltip] ne parlò poco.\n\n"
  lmf_heir.1700.mother.dead.campfollower:0 "quando lei era una seguace del campo, in una notte in cui il suo esercito era in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], cosa del tutto possibile, dato che [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero lì in quel tempo.\n\n"
  lmf_heir.1700.mother.dead.taverngirl:0 "in una taverna di [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], dove lei serviva da bere e lui, insieme a diversi altri [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], era venuto dall'accampamento vicino. Del tutto plausibile, dato che [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero lì in quel tempo.\n\n"
  lmf_heir.1700.mother.dead.lostguide:0 "quando egli si era smarrito in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] e lei, abitante del luogo, lo guidò di nuovo all'accampamento del suo esercito. Del tutto plausibile, dato che [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero lì in quel tempo.\n\n"
  lmf_heir.1700.mother.dead.campcaughteye:0 "quando l'esercito era accampato in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] e lei era una soldatessa che catturò il suo sguardo. Del tutto plausibile, dato che [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero lì in quel tempo.\n\n"
  lmf_heir.1700.mother.dead.foundpool:0 "quando egli visitò una pozza curativa in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], non lontano da dove il suo esercito aveva posto il campo. Del tutto plausibile, dato che [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero lì in quel tempo.\n\n"
  lmf_heir.1700.mother.dead.default:0 "durante una notte di baldoria, molte lune or sono, in [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], cosa del tutto possibile, dato che [bastard_child_father.GetFirstNameNoTooltip] si trovava davvero lì in quel tempo.\n\n"
  lmf_heir.1700.mother.dead.mid:0 "Quanto a "
  lmf_heir.1700.mother.dead.newborn:0 "quel piccolo infante fra le sue braccia? "
  lmf_heir.1700.mother.dead.child:0 "[bastard_child.Custom('polite_gender_ref')] al suo fianco, gli occhi nervosamente bassi? "
  lmf_heir.1700.mother.dead.end:0 ""[Select_CString(bastard_child.IsFemale,'Lei','Lui')|U] è del tuo sangue," disse la donna. "Chiedo solo un posto nella tua corte, se ci vorrai, dove [bastard_child.GetFirstNameNoTooltip] possa avere un futuro assai migliore di qualunque cosa io potessi mai sperare di offrir[Select_CString(bastard_child.IsFemale,'le','gli')].""
  lmf_heir.1700.a:0 "Siete i benvenuti a restare, ma questo segreto resterà fra noi."
  lmf_heir.1700.b:0 "Siete i benvenuti qui, e tutti sapranno chi siete."
  lmf_heir.1700.c:0 "Non troverete dimora qui."

  lmf_interaction.0001.t:0 "La Diseredazione"
  lmf_interaction.0001.opening.submissive:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] ha chiesto di parlarmi stamani nella sala del trono, inginocchiandosi in silenzio con rispetto mentre [Select_CString(recipient.IsFemale,'lei','lui')] parlava con parole quiete ma determinate.\n\n"
  lmf_interaction.0001.opening.dominant:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] è entrat[Select_CString(recipient.IsFemale,'a','o')] nel mio salone del trono stamani, pretendendo un'udienza privata. Per curiosità, gliel'ho concessa. Quando [Select_CString(recipient.IsFemale,'lei','lui')] si è fermat[Select_CString(recipient.IsFemale,'a','o')] dinanzi a me e ha parlato, le [Select_CString(recipient.IsFemale,'sue','suoi')] parole erano sicure... eppure vi era un'inquietudine sotterranea che tradiva la [Select_CString(recipient.IsFemale,'sua','sua')] baldanza.\n\n"
  lmf_interaction.0001.opening:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] ha richiesto stamani un'udienza privata nella sala del trono. Curioso di ciò che [Select_CString(recipient.IsFemale,'lei','lui')] potesse avere da dire, gliel'ho concessa. Mentre [Select_CString(recipient.IsFemale,'lei','lui')] stava dinanzi a me, il [Select_CString(recipient.IsFemale,'suo','suo')] contegno recava la gravità di chi ha meditato le proprie parole a lungo.\n\n"
  lmf_interaction.0001.address.family:0 ""[recipient.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))|U], "
  lmf_interaction.0001.address:0 ""Mio [actor.GetLadyLord], "
  lmf_interaction.0001.disinheritor:0 "Non posso dire con certezza perché tu abbia deciso di privarmi della mia eredità. Forse è perché mi vedi come "
  lmf_interaction.0001.dynast:0 "Non posso dire con certezza perché mi sia stata tolta la mia eredità. Forse è perché vengo considerat[Select_CString(recipient.IsFemale,'a','o')] come "
  lmf_interaction.0001.worst.deviant:0 "una sorta di deviat[Select_CString(recipient.IsFemale,'a','o')] sessuale, indegn[Select_CString(recipient.IsFemale,'a','o')] di ricevere un titolo. Eppure non sono forse anche "
  lmf_interaction.0001.worst.unintelligent:0 "poco intelligent[Select_CString(recipient.IsFemale,'e','e')], qualcuno di cui non ci si può fidare per le decisioni richieste a un sovrano. Eppure non sono forse anche "
  lmf_interaction.0001.worst.crazy:0 "instabil[Select_CString(recipient.IsFemale,'e','e')] ed erratic[Select_CString(recipient.IsFemale,'a','o')], qualcuno di cui non ci si può fidare col potere. Eppure non sono forse anche "
  lmf_interaction.0001.worst.unskilled:0 "incapace, privo delle qualità richieste a un sovrano. Eppure non sono forse anche "
  lmf_interaction.0001.worst.cowardly:0 "un codardo, senza un briciolo di spina dorsale. Eppure non sono forse anche "
  lmf_interaction.0001.worst.dishonorable:0 "privo d'onore e di grazia. "
  lmf_interaction.0001.worst.faithless:0 "senza fede e dunque un cattivo seguace di [ROOT.Char.GetFaith.GetNameNoTooltip]. Eppure non sono forse anche "
  lmf_interaction.0001.worst.callous:0 "troppo spietat[Select_CString(recipient.IsFemale,'a','o')] e crudel[Select_CString(recipient.IsFemale,'e','e')] per ricevere responsabilità su altri. Eppure non sono forse anche "
  lmf_interaction.0001.worst.untrustworthy:0 "troppo inaffidabile e privo di carattere morale. Eppure non sono forse anche "
  lmf_interaction.0001.worst.drunkard:0 "un ubriacone che non saprà mai rimettersi in sesto. Eppure non sono forse anche "
  lmf_interaction.0001.worst.weak:0 "troppo debole e fragile, privo della tempra richiesta a un sovrano. Eppure non sono forse anche "
  lmf_interaction.0001.worst.submissive:0 "troppo remissiv[Select_CString(recipient.IsFemale,'a','o')], privo della fermezza necessaria a un vero sovrano. Eppure non sono forse anche "
  lmf_interaction.0001.worst.malicious:0 "troppo malign[Select_CString(recipient.IsFemale,'a','o')], in qualche modo privo del buon carattere richiesto a un sovrano. Eppure non sono forse anche "
  lmf_interaction.0001.worst.unworthy:0 " indegn[Select_CString(recipient.IsFemale,'a','o')], mancante di qualche qualità ignota richiesta alla grandezza. Eppure non sono forse anche "
  lmf_interaction.0001.best.intelligent:0 "intelligent[Select_CString(recipient.IsFemale,'e','e')]? Ho pieno possesso dei miei sensi, e anche di più.""\n\n"
  lmf_interaction.0001.best.skilled:0 "capace? Sono abile in ogni aspetto richiesto a un signore.""\n\n"
  lmf_interaction.0001.best.bold:0 "audace? Mi getterei nelle fiamme senza esitazione, se necessario.""\n\n"
  lmf_interaction.0001.best.zealous:0 "un fedele zelante seguace di [ROOT.Char.GetFaith.GetNameNoTooltip]?""\n\n"
  lmf_interaction.0001.best.warrior:0 "un guerriero possente? Dopottutto, mi sento più a casa sul campo di battaglia.""\n\n"
  lmf_interaction.0001.best.honorable:0 "onorevole? Non è forse una qualità degna della dinastia [ROOT.Char.GetDynasty.GetBaseNameNoTooltip]?""\n\n"
  lmf_interaction.0001.best.compassionate:0 "pien[Select_CString(recipient.IsFemale,'a','o')] d'animo e compassione? Non sono forse qualità degne della dinastia [ROOT.Char.GetDynasty.GetBaseNameNoTooltip]?""\n\n"
  lmf_interaction.0001.best.levelheaded:0 "solido e assennato? Si può contare su di me perché mantenga la mente lucida nei momenti peggiori, e tu lo sai.""\n\n"
  lmf_interaction.0001.best.benevolent:0 "un[ROOT.Char.GetWomanMan] di virtù? Certo un signore dal cuore puro può soltanto recare onore alla nostra dinastia!""\n\n"
  lmf_interaction.0001.best.just:0 "giusto? Non è forse la saggezza e l'affinità per la legge una delle qualità più importanti per un signore?""\n\n"
  lmf_interaction.0001.best.proud:0 "un fiero membro della dinastia [ROOT.Char.GetDynasty.GetBaseNameNoTooltip]?""\n\n"
  lmf_interaction.0001.main:0 "[recipient.Custom2('disinherit_worst_trait', SCOPE.sC('actor'))][recipient.Custom2('disinherit_best_trait', SCOPE.sC('actor'))]"
  lmf_interaction.0001.ending.dynast:0 ""So che non sei stat[Select_CString(recipient.IsFemale,'a','o')] tu a prendere questa decisione, e dunque ora chiedo"
  lmf_interaction.0001.ending.submissive:0 ""Sono inginocchiat[Select_CString(recipient.IsFemale,'a','o')] dinanzi a te oggi per chiedere, con tutto il dovuto rispetto e umiltà,"
  lmf_interaction.0001.ending.dominant:0 ""Sono dinanzi a te oggi per pretendere con rispetto"
  lmf_interaction.0001.ending:0 ""Sono dinanzi a te oggi per chiedere"
  lmf_interaction.0001.close.family:0 ", in quanto tuo [actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))],"
  lmf_interaction.0001.close.dynast:0 " che tu rovesci questa decisione e ristabilisca la mia buona posizione come membro di questa dinastia.""
  lmf_interaction.0001.close:0 " che tu muti parere e ristabilisca la mia buona posizione come membro di questa dinastia.""
  lmf_interaction.0001.a:0 "Mi hai convinto."
  lmf_interaction.0001.b:0 "Ahimè, non posso fare ciò che chiedi."
  lmf_interaction.0001.b.tt:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] potrebbe reagire male alla tua decisione..."
  lmf_interaction.0002.t:0 "Eredità rifiutata!"
  lmf_interaction.0002.desc:0 "Benché mi sia prostrat[Select_CString(recipient.IsFemale,'a','o')] dinanzi a [actor.Custom('IT_NAM_COL3')][actor.GetTitledFirstNameNoTooltip] e abbia esposto le mie ragioni, il[actor.GetWomanMan] ha rifiutato di restituirmi la mia legittima eredità. "Capisco perché tu ti senta così," disse [Select_CString(actor.IsFemale,'lei','lui')], "ma vi sono ragioni per cui questo è per il meglio e non posso mutarle. Dovrai accettare il tuo destino.""
  lmf_interaction.0002.a:0 "No, non posso accettarlo!"
  lmf_interaction.0002.a.tt:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] è oltraggiat[Select_CString(recipient.IsFemale,'a','o')] dal tuo rifiuto"
  refused_to_restore_inheritance:0 "Ha rifiutato di ripristinare l'eredità"
  jealous_of_inheritance:0 "Gelos[Select_CString(ROOT.Char.IsFemale,'a','o')] dell'eredità"
  lmf_interaction.0002.nw.tt:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] è partit[Select_CString(recipient.IsFemale,'a','o')] per unirsi ai Guardiani della Notte"
  lmf_interaction.0002.took_vows.tt:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] ha preso i voti religiosi"
  lmf_interaction.0002.maester.tt:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] è partit[Select_CString(recipient.IsFemale,'a','o')] per la Cittadella"
  lmf_interaction.0002.left_court.tt:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] ha deciso di lasciare la tua corte"
  lmf_interaction.0002.b:0 "Suppongo che [Select_CString(actor.IsFemale,'lei','lui')] abbia ragione..."
  lmf_interaction.0002.b.tt:0 "[recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] accetta umilmente il tuo giudizio"

  disinherited_betrothal_upset_tt:0 "[disinherited_character.betrothed.liege.Custom('IT_NAM_COL3')][disinherited_character.betrothed.liege.GetTitledFirstNameNoTooltip] potrebbe esserne turbato e scegliere di spezzare il fidanzamento con [disinherited_character.betrothed.Custom('IT_NAM_COL4')][disinherited_character.betrothed.GetTitledFirstNameNoTooltip]"
  lmf_interaction.0004.desc:0 "Il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))] mi ha portato oggi notizie sconvolgenti: il[Select_CString(disinherited_betrothed.IsFemale,'suo','suo')] promesso sposo è stato diseredato dal[Select_CString(disinherited_character.IsFemale,'la','del')] [disinherited_character.Custom('polite_gender_ref')] [disinherited_character.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinheritor'))], [disinheritor.Custom('IT_NAM_COL3')][disinheritor.GetTitledFirstNameNoTooltip]! Ciò viola chiaramente l'intesa che avevo riguardo alle future prospettive di [disinherited_character.GetTitledFirstNamePossessiveNoTooltip]."
  lmf_interaction.0004.a:0 "Lo considererò una violazione del fidanzamento."
  lmf_interaction.0004.b:0 "È troppo tardi. Il fidanzamento proseguirà."

  lmf_interaction.0005.opening: "[betrothed_liege.Custom2('GreetingToForeignRulerNegative', ROOT.Char )],"
  lmf_interaction.0005.desc: "La diseredazione del[Select_CString(disinherited_character.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_character'))] compromette l'intesa che avevo riguardo alle [Select_CString(disinherited_character.IsFemale,'sue','sue')] prospettive future, così come il genere di vita che [Select_CString(disinherited_character.IsFemale,'lei','lui')] avrebbe avuto con il mio [betrothed_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))]. Per quanto mi riguarda, ciò rende il fidanzamento tra [Select_CString(disinherited_character.IsFemale,'lei','lui')] e [disinherited_betrothed.Custom('IT_NAM_COL3')][disinherited_betrothed.GetTitledFirstName] nullo e privo di valore."
  lmf_interaction.0005.a: "Non mi sorprende, suppongo."

  lmf_interaction.1200.t: "Gli Amanti del[Select_CString(recipient.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))|U]"
  lmf_interaction.1200.desc.three: "Sono al corrente dei molti amanti del[Select_CString(recipient.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))], "
  lmf_interaction.1200.desc.two: "Il[Select_CString(recipient.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] non ha uno, bensì due amanti, almeno per quanto ne sono a conoscenza, "
  lmf_interaction.1200.desc.mid: "e il tempo è giunto di farne qualcosa, per l'onore della famiglia.\n\nLa sola domanda è: intendo affrontare la questione di uno soltanto, oppure pretendo che [recipient.GetFirstNameNoTooltip] tronchi immediatamente con "
  lmf_interaction.1200.desc.three.end: "tutti loro?"
  lmf_interaction.1200.desc.two.end: "entrambi?"
  lmf_interaction.1200.a: "Riguarda [lover_1.Custom('IT_NAM_COL3')][lover_1.GetTitledFirstName]."
  lmf_interaction.1200.b: "Riguarda [lover_2.Custom('IT_NAM_COL3')][lover_2.GetTitledFirstName]."
  lmf_interaction.1200.c: "Riguarda [lover_3.Custom('IT_NAM_COL3')][lover_3.GetTitledFirstName]."
  lmf_interaction.1200.d: "[Select_CString(recipient.IsFemale,'Lei','Lui')|U] deve porre fine a tutte queste tresche!"
  lmf_interaction.1200.e: "[Select_CString(recipient.IsFemale,'Lei','Lui')|U] deve porre fine a entrambe queste tresche!"
  lmf_interaction.1200.a.success.tt: "[recipient.GetFirstNameNoTooltip] accetta di troncare le [Select_CString(recipient.IsFemale,'sue','sue')] relazioni amorose"
  lmf_interaction.1200.a.failure.tt: "[recipient.GetFirstNameNoTooltip] rifiuta, ma potrebbero esserci altri modi per convincer[Select_CString(recipient.IsFemale,'la','lo')]..."

  lmf_interaction.1201.t: "L'Amante del[Select_CString(recipient.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))|U]"
  lmf_interaction.1201.desc.secret: "Con mia vergogna, il[Select_CString(recipient.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] intrattiene una relazione segreta con "
  lmf_interaction.1201.desc.open: "Con mia vergogna, il[Select_CString(recipient.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] si è messo a sguazzare apertamente con "
  lmf_interaction.1201.desc.theirs: "[Select_CString(recipient.IsFemale,'la sua','il suo')] [recipient.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_lover'))], [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstName].\n\n"
  lmf_interaction.1201.desc.default: "[family_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)].\n\n"
  lmf_interaction.1201.desc.mid: "Ora spetta a me affrontare la situazione... "
  lmf_interaction.1201.desc.secret.end: "in silenzio, se sarò fortunat[Select_CString(ROOT.Char.IsFemale,'a','o')], prima che la relazione venga rivelata al mondo."
  lmf_interaction.1201.desc.open.end: "in fretta, se sarò fortunat[Select_CString(ROOT.Char.IsFemale,'a','o')], prima che questo scandalo sia lasciato proseguire."
  lmf_interaction.1201.a: "[recipient.GetFirstNameNoTooltip] deve troncare subito."
  lmf_interaction.1201.a.success.tt: "[recipient.GetFirstNameNoTooltip] accetta di porre fine alla relazione"
  lmf_interaction.1201.a.failure.tt: "[recipient.GetFirstNameNoTooltip] rifiuta, ma potrebbero esserci altri modi per convincer[Select_CString(recipient.IsFemale,'la','lo')]..."
  lmf_interaction.1201.b: "Parlerò con [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip], e pretenderò che [Select_CString(family_lover.IsFemale,'lei','lui')] la finisca."
  lmf_interaction.1201.b.success.tt: "[family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip] accetta di porre fine alla relazione"
  lmf_interaction.1201.b.failure.tt: "[family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip] rifiuta, ma potrebbero esserci altri modi per convincer[Select_CString(family_lover.IsFemale,'la','lo')]..."
  lmf_interaction.1201.c: "I due si sposeranno."
  lmf_interaction.1201.c.tt: "Potrai stabilire le condizioni del loro matrimonio"
  lmf_interaction.1201.d: "Convincerò [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip] a sposare [recipient.GetHerHim]."
  lmf_interaction.1201.d.success.tt: "[family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip] accetta con riluttanza il matrimonio"
  lmf_interaction.1201.d.failure.tt: "[family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip] rifiuta, ma potrebbero esserci altri modi per convincer[Select_CString(family_lover.IsFemale,'la','lo')]..."
  lmf_interaction.1201.e: "Convincerò [recipient.GetFirstNameNoTooltip] a sposare [family_lover.GetHerHim]."
  lmf_interaction.1201.e.success.tt: "[recipient.GetFirstNameNoTooltip] accetta con riluttanza il matrimonio"
  lmf_interaction.1201.e.failure.tt: "[recipient.GetFirstNameNoTooltip] rifiuta, ma potrebbero esserci altri modi per convincer[Select_CString(recipient.IsFemale,'la','lo')]..."
  lmf_interaction.1201.f: "Convierò entrambi a rendere ufficiale la loro relazione."
  lmf_interaction.1201.f.tt: "Dovrai prima convincere il[Select_CString(recipient.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]"
  lmf_interaction.1201.f.success.tt: "[recipient.GetFirstNameNoTooltip] accetta con riluttanza il matrimonio, ma [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip] deve ancora essere convint[Select_CString(family_lover.IsFemale,'a','o')]"
  lmf_interaction.1201.f.failure.tt: "[recipient.GetFirstNameNoTooltip] rifiuta, ma potrebbero esserci altri modi per convincer[Select_CString(recipient.IsFemale,'la','lo')]..."
  lmf_interaction.1201.g: "Forse sto esagerando..."
  lmfmod.demand.agree.hook.tt: "[check.Custom('IT_NAM_COL3')][check.GetTitledFirstNameNoTooltip] deve accettare la tua pretesa perché hai un aggancio su [check.GetHerHim]"
  lmfmod.demand.agree.prisoner.tt: "[check.Custom('IT_NAM_COL3')][check.GetTitledFirstNameNoTooltip] deve accettare la tua pretesa perché [Select_CString(check.IsFemale,'lei','lui')] è tu[Select_CString(ROOT.Char.IsFemale,'a','o')] prigionier[Select_CString(check.IsFemale,'a','o')]"
  lmfmod.demand.agree.courtier.tt: "[check.Custom('IT_NAM_COL3')][check.GetTitledFirstNameNoTooltip] deve accettare la tua pretesa perché [Select_CString(check.IsFemale,'lei','lui')] è un tuo cortigian[Select_CString(check.IsFemale,'a','o')]"
  interfered_in_my_romance: "[TARGET_CHARACTER.GetShortUIName|U] ha preteso che [CHARACTER.GetShortUIName] ponesse fine a una relazione amorosa."
  interfered_in_my_romance_corresponding: "[CHARACTER.GetShortUIName|U] ha preteso che [TARGET_CHARACTER.GetShortUIName] ponesse fine a una relazione amorosa."
  demanded_I_marry_lover: "[TARGET_CHARACTER.GetShortUIName|U] ha preteso che [CHARACTER.GetShortUIName] sposasse [Select_CString(CHARACTER.IsFemale,'la sua','il suo')] amante."
  demanded_I_marry_lover_corresponding: "[CHARACTER.GetShortUIName|U] ha preteso che [TARGET_CHARACTER.GetShortUIName] sposasse [Select_CString(TARGET_CHARACTER.IsFemale,'la sua','il suo')] amante."

  lmf_interaction.1202.opening: "[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U],"
  lmf_interaction.1202.start: "Ho riflettuto a lungo sulla tua richiesta e ho deciso che, nonostante "
  lmf_interaction.1202.adulterer: "la sfrontata ironia che proprio tu, fra tutti, venga a farmi la predica sulla virtù, "
  lmf_interaction.1202.soulmate: "il fatto che io creda davvero che [family_lover.GetHerHim] sia la mia anima gemella, "
  lmf_interaction.1202.angry: "quanto mi irriti che tu interferisca in tal modo, "
  lmf_interaction.1202.open: "il fatto che la nostra relazione sia già di dominio pubblico e difficilmente possa arrecare più danno di quanto non abbia già fatto, "
  lmf_interaction.1202.default: "quanto io abbia finito per adorare [family_lover.GetHerHim], "
  lmf_interaction.1202.end: "farò ciò che chiedi.\n\nSe davvero credi che sia nel mio interesse separarmi da [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip], troncherò subito."
  lmf_interaction.1202.a: "Sì, fallo."
  lmf_interaction.1202.b: "Forse sto esagerando..."

  lmf_interaction.1203.start: "Ho riflettuto a lungo sulla tua richiesta. Alla fine, però, ho deciso di non troncare con [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip].\n\n"
  lmf_interaction.1203.adulterer: "Onestamente, l'idea che proprio tu, fra tutti, venga a farmi la predica sulla virtù? È incredibile.\n\n"
  lmf_interaction.1203.soulmate: "[Select_CString(family_lover.IsFemale,'Lei','Lui')|U] è la mia anima gemella e io amo [family_lover.GetHerHim], e non potrei separarmi da [family_lover.GetHerHim] più di quanto potrei separarmi dal mio stesso cuore.\n\n"
  lmf_interaction.1203.open: "Dopo tutto, la nostra relazione è già di dominio pubblico, quindi quale ulteriore danno potrebbe arrecare alla mia reputazione? Anzi, ne sono sollevat[Select_CString(ROOT.Char.IsFemale,'a','o')].\n\n"
  lmf_interaction.1203.default: "La semplice verità è che io amo [family_lover.GetHerHim], e questo è tutto ciò che davvero conta.\n\n"
  lmf_interaction.1203.end.rival: "Non so davvero come tu possa aver creduto che avrei reagito favorevolmente a una simile interferenza da parte tua."
  lmf_interaction.1203.end.malicious: "Se questo ti delude, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], così sia. Davvero non m'importa."
  lmf_interaction.1203.end.dominant: "Se questo ti delude, così sia. Questa è la mia decisione, e soltanto mia."
  lmf_interaction.1203.end.submissive: "Mi dispiace davvero, davvero, se questo ti delude. Non puoi sapere quanto io abbia agonizzato su ciò."
  lmf_interaction.1203.end.default: "Se questo ti delude, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], me ne dispiace."
  lmf_interaction.1203.a: "Forse alcuni doni riusciranno a persuaderti...?"
  lmf_interaction.1203.a.lover.tt: "[family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip] dovrà comunque essere convint[Select_CString(family_lover.IsFemale,'a','o')] ad assecondare il matrimonio..."
  lmf_interaction.1203.b: "Allora parlerò direttamente con [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip], piuttosto."
  lmf_interaction.1203.c: "Vi sono conseguenze nel disobbedirmi!"
  lmf_interaction.1203.d: "Bene. Lascerò cadere la questione."

  lmf_interaction.1204.opening: "[family_lover.Custom2('GreetingToForeignRulerPositive', ROOT.Char )],"
  lmf_interaction.1204.secret: "Dunque sai della mia relazione con il[Select_CString(recipient.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]?\n\n"
  lmf_interaction.1204.open: "A dirla tutta, da quando la mia relazione con il[Select_CString(recipient.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] è divenuta pubblica, mi aspettavo che questo giorno arrivasse.\n\n"
  lmf_interaction.1204.end: "Ho riflettuto a lungo e con attenzione. Tengo molto a [recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip]... ma certo anche tu devi tenerci, o non mi chiederesti un tale sacrificio. Così, nonostante le mie riserve, se questo è davvero ciò che desideri farò come comandi e troncherò immediatamente con [recipient.GetHerHim]."

  lmf_interaction.1205.opening: "[family_lover.Custom2('GreetingToForeignRuler', ROOT.Char )],"
  lmf_interaction.1205.start: "So che tieni a [Select_CString(recipient.IsFemale,'tua','tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]. Lo stesso vale per me, così come so che [recipient.GetFirstNameNoTooltip] tiene a me. Perciò non posso abbandonare [Select_CString(recipient.IsFemale,'lei','lui')] solo perché me lo ordini.\n\n"
  lmf_interaction.1205.end.rival: "Se questo ti turba, tanto meglio. È ciò che meriti per esserti intromess[Select_CString(ROOT.Char.IsFemale,'a','o')] nelle faccende di [Select_CString(recipient.IsFemale,'tua','tuo')] [ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))]."
  lmf_interaction.1205.end.malicious: "[recipient.GetFirstNameNoTooltip] mi ha detto che sei un[Select_CString(ROOT.Char.IsFemale,'a','o')] [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )] invadent[Select_CString(ROOT.Char.IsFemale,'e','e')], e pare che [Select_CString(recipient.IsFemale,'lei','lui')] avesse ragione."
  lmf_interaction.1205.end.dominant: "Se questo ti turba, così sia, ma è una decisione che riguarda soltanto me e [recipient.GetFirstNameNoTooltip]."
  lmf_interaction.1205.end.submissive: "Mi dispiace davvero se questo ti turba, mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.GetLadyLord]. Non puoi sapere quanto io abbia agonizzato su questa decisione."
  lmf_interaction.1205.end.benevolent: "Mi dispiace davvero se questo ti turba, ma è qualcosa che devo sentire da [recipient.GetFirstNameNoTooltip] e da nessun altro."
  lmf_interaction.1205.end.default: "Se la mia decisione ti turba, mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.GetLadyLord], mi dispiace davvero, ma non posso fare altrimenti."
  lmf_interaction.1205.a: "Che cosa ci vorrebbe per farti andare via?"
  lmf_interaction.1205.b: "Allora non ho scelta se non parlare direttamente con [Select_CString(recipient.IsFemale,'mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]."

  lmf_interaction.1206.start: "Ho riflettuto a lungo sulla tua richiesta e ho deciso che, nonostante "
  lmf_interaction.1206.adulterer: "la palese ironia che tu, proprio tu, venga a farmi la predica in fatto di virtù, "
  lmf_interaction.1206.angry: "quanto mi irriti che tu ti intrometta in questo modo, "
  lmf_interaction.1206.default: "la pura audacia con cui pretendi che io ponga fine a TUTTE le mie relazioni, "
  lmf_interaction.1206.end: "farò come chiedi.\n\nSe credi davvero che sia nel mio miglior interesse separarmi dai miei amanti, mi fiderò del fatto che tu abbia le tue ragioni e porrò fine a tutto seduta stante."

  lmf_interaction.1207.start: "Ho riflettuto a lungo sulla tua richiesta. Alla fine, tuttavia, ho deciso di non scartare i miei amanti solo perché tu pensi che sia meglio.\n\n"
  lmf_interaction.1207.adulterer: "Sul serio, l’idea che tu, proprio tu, venga a farmi la predica in fatto di virtù? È incredibile.\n\n"
  lmf_interaction.1207.default: "Ognuno di loro ha un posto nel mio cuore e nel mio letto, com’è mio diritto.\n\n"
  lmf_interaction.1207.end.rival: "Mi sfugge come tu abbia potuto credere che avrei accolto favorevolmente un’ingerenza simile."
  lmf_interaction.1207.end.malicious: "Se questo ti delude, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], così sia. Non potrebbe importarmene di meno."
  lmf_interaction.1207.end.dominant: "Se questo ti delude, così sia. Questa è la mia vita e questa è la mia decisione."
  lmf_interaction.1207.end.submissive: "Mi dispiace, mi dispiace davvero se questo ti delude. Preferirei qualunque altra cosa, ma devo vivere la mia vita."
  lmf_interaction.1207.end.default: "Se questo ti delude, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], mi dispiace."

  lmf_interaction.1208.desc: "Molto bene.\n\n[family_lover.GetFirstNameNoTooltip] e io ne abbiamo discusso, e se è questo che pretendi da noi... siamo dispost[Select_CString(Or(recipient.IsFemale,family_lover.IsFemale),'i','i')] a sposarci e a far benedire la nostra unione da [recipient.GetFaith.FertilityGodName]."
  lmf_interaction.1208.a: "Il matrimonio favorirà [Select_CString(recipient.IsFemale,'mia','mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]."
  lmf_interaction.1208.b: "Il matrimonio favorirà [family_lover.Custom('IT_NAM_COL3')][family_lover.GetTitledFirstNameNoTooltip]."
  lmf_interaction.1208.c: "Ripensandoci, no..."
  lmf_interaction.1208.tt: "[recipient.GetFirstNameNoTooltip] e [family_lover.GetTitledFirstNameNoTooltip] porranno fine a tutte le relazioni amorose esistenti, eccetto quella tra loro"

  lmf_interaction.1209.start: "Vuoi che sposi [family_lover.GetTitledFirstNameNoTooltip]? Sei impazzit[Select_CString(ROOT.Char.IsFemale,'a','o')]?!\n\n[Select_CString(family_lover.IsFemale,'La','Il')] [family_lover.GetWomanMan] è mi[Select_CString(ROOT.Char.IsFemale,'a','o')] amante, ma di certo non ho bisogno che [Select_CString(family_lover.IsFemale,'lei','lui')] sia mi[Select_CString(family_lover.IsFemale,'a','o')] [family_lover.GetWifeHusband]! "
  lmf_interaction.1209.open: "Se è la mia reputazione a preoccuparti, non devi temere. Come ben sai, il danno è già fatto.\n\n"
  lmf_interaction.1209.secret: "Ti ringrazio della preoccupazione per la mia reputazione ma, a meno che tu non abbia intenzione d’essere tu a rivelare al mondo ciò che c’è fra noi, correrò il rischio.\n\n"
  lmf_interaction.1209.a: "Allora devi porre fine a questa relazione seduta stante."

  lmf_interaction.1210.desc: "Molto bene.\n\n[recipient.GetFirstNameNoTooltip] e io ne abbiamo discusso e, se è questo che pretendi... sono dispost[Select_CString(family_lover.IsFemale,'a','o')] a sposare [Select_CString(recipient.IsFemale,'tua','tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] e a far benedire la nostra unione da [family_lover.GetFaith.FertilityGodName]."

  lmf_interaction.1211.start: "Vuoi che sposi [Select_CString(recipient.IsFemale,'tua','tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]? Sei impazzit[Select_CString(ROOT.Char.IsFemale,'a','o')]?!\n\nCapisco la tua preoccupazione per la reputazione di [recipient.GetFirstNamePossessiveNoTooltip], ma di certo non ho bisogno che [Select_CString(recipient.IsFemale,'lei','lui')] sia mi[Select_CString(recipient.IsFemale,'a','o')] [recipient.GetWifeHusband]!\n\n"
  lmf_interaction.1211.end.rival: "Se questo ti turba, tanto meglio. È ciò che meriti per esserti intromess[Select_CString(ROOT.Char.IsFemale,'a','o')] dove non sei gradit[Select_CString(ROOT.Char.IsFemale,'a','o')]."
  lmf_interaction.1211.end.malicious: "La prossima volta, rifletti un po’ di più prima di avanzare richieste tanto ridicole."
  lmf_interaction.1211.end.dominant: "So che questa decisione potrebbe turbarti, e così sia. Se sposerò [recipient.GetFirstNameNoTooltip], sarà una decisione nostra, non tua."
  lmf_interaction.1211.end.submissive: "Magari ci fosse un’altra via, mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.GetLadyLord], ma è impossibile. Mi dispiace."
  lmf_interaction.1211.end.benevolent: "Mi dispiace davvero se questo ti turba, ma è una decisione che può essere presa soltanto da me e [recipient.GetFirstNameNoTooltip]."
  lmf_interaction.1211.end.default: "Se la mia decisione ti turba, mi[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.GetLadyLord], mi dispiace."

  lmf_interaction.1212.desc: "Va bene, visto che insisti, sposerò [family_lover.GetTitledFirstNameNoTooltip].\n\nDovrai però convincere [Select_CString(family_lover.IsFemale,'lei','lui')] ad accettare questo tuo piano, e non aspettarti alcun aiuto da parte mia."
  lmf_interaction.1212.a: "Vediamo che cosa ha da dire [Select_CString(family_lover.IsFemale,'lei','lui')]..."

