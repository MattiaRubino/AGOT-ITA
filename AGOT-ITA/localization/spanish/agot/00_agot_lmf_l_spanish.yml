  lmf_interaction.1326.t:0 "Un ottimo inizio"
  lmf_interaction.1326.desc.start.actor:0 "La giornata trascorsa in compagnia di [secondary_recipient.GetFirstNamePossessiveNoTooltip] si è rivelata davvero riuscita.\n\nNoi "
  lmf_interaction.1326.desc.start.actor.hunting:0 "ci siamo dedicati a una caccia tranquilla non lontano dal [actor.Custom('FortifiedBuilding')]. Lo scopo, naturalmente, non era prendere nulla, bensì parlare. "
  lmf_interaction.1326.desc.start.actor.hike:0 "abbiamo percorso le terre attorno a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], mentre indicavo vari luoghi d'interesse storico. Lo scopo principale, naturalmente, era parlare. "
  lmf_interaction.1326.desc.start.actor.garrison:0 "siamo andati alla guarnigione del [actor.Custom('FortifiedBuilding')], [Select_CString(secondary_recipient.IsFemale,'la','lo')] ho visto mentre mi cimentavo gloriosamente nello sparring con i [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]. Ogni volta che mi fermavo, parlavamo. "
  lmf_interaction.1326.desc.start.actor.poetry:0 "abbiamo passeggiato nei giardini del [actor.Custom('FortifiedBuilding')], [Select_CString(secondary_recipient.IsFemale,'la','lo')] ho visto ascoltare mentre recitavo poemi [actor.GetCulture.GetNameNoTooltip] sull'amore e il valore. Per lo più, però, parlavamo. "
  lmf_interaction.1326.desc.start.actor.library:0 "abbiamo visitato la biblioteca, curiosando fra gli scaffali mentre mostravo [Select_CString(secondary_recipient.IsFemale,'le','gli')] i miei tomi più preziosi. Il punto non erano tanto i libri, naturalmente, quanto parlare. "
  lmf_interaction.1326.desc.start.actor.poor:0 "siamo rimasti fuori dalla [actor.GetFaith.HouseOfWorship|l] a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], offrendo elemosine e conforto ai poveri. Benché fosse un'opera degna, naturalmente lo scopo principale era parlare. "
  lmf_interaction.1326.desc.start.actor.tour:0 "abbiamo visitato il [actor.Custom('FortifiedBuilding')] e le terre circostanti. Ho mostrato con orgoglio ciò che [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] aveva da offrire, benché lo scopo fosse, naturalmente, parlare. "
  lmf_interaction.1326.desc.start.actor.garden:0 "abbiamo passeggiato nei giardini del [actor.Custom('FortifiedBuilding')], un luogo sereno e magnifico per parlare finalmente. "
  lmf_interaction.1326.desc.start.actor.hated:0 "E abbiamo parlato.\n\nÈ chiaro che [secondary_recipient.GetFirstNameNoTooltip] trovasse [secondary_actor.Custom('lmf_intro_activity_short')] incredibilmente noioso, ma nonostante ciò "
  lmf_interaction.1326.desc.start.actor.loved:0 "E abbiamo parlato.\n\n[secondary_recipient.GetFirstNameNoTooltip] pareva godersi [Select_CString(secondary_recipient.IsFemale,'se stessa','se stesso')] immensamente, e noi "
  lmf_interaction.1326.desc.start.actor.neutral: "E abbiamo parlato.\n\nNel corso della giornata, noi "
  lmf_interaction.1326.desc.start.actor.mid:0 "abbiamo discusso a lungo del futuro e di ciò che speravamo di ottenerne. Pur sapendo che vi erano occhi vigili ovunque, credo che entrambi ci siamo sentiti stranamente a nostro agio.\n\nQuando il sole ha cominciato a calare, mi è stato chiaro: questo è un[secondary_recipient.Custom('WomanManGirlBoy')] che potrei sposare, e sono cert[Select_CString(secondary_recipient.IsFemale,'a','o')] che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] provasse lo stesso."
  lmf_interaction.1326.desc.actor.lover:0 " Anzi, vi era una scintilla negli occhi di [Select_CString(secondary_recipient.IsFemale,'lei','lui')] che diceva che forse [Select_CString(secondary_recipient.IsFemale,'lei','lui')] era interessat[Select_CString(secondary_recipient.IsFemale,'a','o')] a me come a qualcosa di più che un semplice [secondary_actor.GetWifeHusband]. Che potessimo essere anche amanti."
  lmf_interaction.1326.desc.actor.friends:0 " Anzi, credo che entrambi abbiamo trovato un vero legame... non come amanti, necessariamente. Non ancora, in ogni caso. Ma come amici. Immagina! Un[secondary_recipient.GetWifeHusband] che è anche il mio più caro compagno."
  lmf_interaction.1326.desc.actor.end:0 "\n\nLa vera domanda, dunque, è: è questo che voglio?"
  lmf_interaction.1326.desc.start:0 "La giornata che [secondary_actor.GetFirstNameNoTooltip] e [secondary_recipient.GetFirstNameNoTooltip] hanno trascorso in compagnia l'uno dell'altra si è rivelata un successo.\n\nLoro "
  lmf_interaction.1326.desc.hunting:0 "si sono dedicati a una caccia tranquilla non lontano dal [actor.Custom('FortifiedBuilding')]. Il punto, naturalmente, non era la caccia, ma dare ai due una possibilità di parlare. "
  lmf_interaction.1326.desc.hike:0 "hanno percorso le terre attorno a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], con [secondary_actor.GetFirstNameNoTooltip] che indicava vari luoghi d'interesse storico. Lo scopo principale, naturalmente, era che i due parlassero. "
  lmf_interaction.1326.desc.garrison:0 "sono andati alla guarnigione del [actor.Custom('FortifiedBuilding')], con [secondary_recipient.GetFirstNameNoTooltip] che osservava mentre [secondary_actor.GetFirstNameNoTooltip] faceva sparring con i [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. Ogni volta che [Select_CString(secondary_actor.IsFemale,'lei','lui')] si fermava, parlavano. "
  lmf_interaction.1326.desc.seduction:0 "hanno girato per il [actor.Custom('FortifiedBuilding')]... un po' troppo da vicino, a detta di tutti. Si potrebbe persino dire che il comportamento di [secondary_actor.GetFirstNamePossessiveNoTooltip] fosse talvolta inappropriato, quando il punto era che i due parlassero. "
  lmf_interaction.1326.desc.poetry:0 "hanno passeggiato nei giardini del [actor.Custom('FortifiedBuilding')], con [secondary_recipient.GetFirstNameNoTooltip] che ascoltava mentre [secondary_actor.GetFirstNameNoTooltip] recitava poemi [secondary_actor.GetCulture.GetNameNoTooltip] sull'amore e il valore... almeno così si dice. Per lo più, però, parlavano. "
  lmf_interaction.1326.desc.library:0 "hanno visitato la biblioteca, curiosando fra gli scaffali mentre [secondary_actor.GetFirstNameNoTooltip] mostrava a [secondary_recipient.GetFirstNameNoTooltip] i nostri tomi più preziosi. Il punto non erano tanto i libri, naturalmente, quanto far sì che parlassero. "
  lmf_interaction.1326.desc.church:0 "sono andati alla [actor.GetFaith.HouseOfWorship|l], ascoltando sermoni sulla pietà, mi dicono, quando non stavano parlando. "
  lmf_interaction.1326.desc.tavern:0 "si sono recati in un villaggio vicino al [actor.Custom('FortifiedBuilding')], per lo più in una taverna. [secondary_actor.GetFirstNameNoTooltip] era determinat[Select_CString(secondary_actor.IsFemale,'a','o')] a far baldoria, mi dicono, ma nonostante ciò hanno avuto molte occasioni per parlare. "
  lmf_interaction.1326.desc.poor:0 "sono rimasti fuori dalla [actor.GetFaith.HouseOfWorship|l] a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], offrendo elemosine e conforto ai poveri. Benché fosse un'opera degna, naturalmente lo scopo principale era che parlassero. "
  lmf_interaction.1326.desc.tour:0 "hanno visitato il [actor.Custom('FortifiedBuilding')] e le terre circostanti, e [secondary_actor.GetFirstNameNoTooltip] ha mostrato con orgoglio ciò che [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] aveva da offrire... benché lo scopo, naturalmente, fosse che parlassero. "
  lmf_interaction.1326.desc.garden:0 "hanno passeggiato nei giardini del [actor.Custom('FortifiedBuilding')], un luogo sereno e magnifico perché potessero infine parlare. "
  lmf_interaction.1326.desc.hated:0 "Benché fosse chiaro che [secondary_recipient.GetFirstNameNoTooltip] trovasse [secondary_actor.Custom('lmf_intro_activity_short')] una noia mortale, "
  lmf_interaction.1326.desc.loved:0 "[secondary_recipient.GetFirstNameNoTooltip] ha trovato [secondary_actor.Custom('lmf_intro_activity_short')] una delizia assoluta, a detta di tutti, e "
  lmf_interaction.1326.desc.neutral:0 "[secondary_recipient.GetFirstNameNoTooltip] pareva godersi [secondary_actor.Custom('lmf_intro_activity_short')] quel tanto che basta, e "
  lmf_interaction.1326.desc.mid:0 "hanno conversato amabilmente. Pur con tutti gli occhi vigili che segnavano ogni loro passo, parevano a proprio agio e la giornata è sembrata un successo.\n\nQuando il sole ha cominciato a calare e la coppia è stata richiamata al [ROOT.Char.Custom('FortifiedBuilding')] per la cena, [secondary_actor.GetFirstNameNoTooltip] ha confessato in privato quanto sopra.\n\n«È questo il [secondary_recipient.Custom('WomanManGirlBoy')] che voglio sposare,» ha detto [Select_CString(secondary_actor.IsFemale,'lei','lui')].\n\n"
  lmf_interaction.1326.desc.secrec.player:0 "La domanda, dunque, è: [secondary_recipient.GetTitledFirstNameNoTooltip] la pensa allo stesso modo? E questa [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] è ancora ciò che voglio?"
  lmf_interaction.1326.desc.end:0 "È chiaro che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] la pensa allo stesso modo. La domanda, dunque, è: questa [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] è ancora ciò che voglio?"
  lmf_interaction.1326.a:0 "Sì, ho trovato la mia metà."
  lmf_interaction.1326.b:0 "Non ho bisogno di un altro amante, ma solo di un[secondary_recipient.GetWifeHusband]."
  lmf_interaction.1326.c:0 "Ci sposeremo, ma non ho bisogno di un altro amico."
  lmf_interaction.1326.d:0 "Procedi con la [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]!"
  lmf_interaction.1326.e:0 "Ci sposeremo e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] sarà il mio amante."
  lmf_interaction.1326.f:0 "Sì, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] sarà il mio [secondary_recipient.GetWifeHusband] e amico."
  lmf_interaction.1326.g:0 "Ho cambiato idea. Interrompi tutto."
  agree_to_marriage_intro_ask_rec.tt:0 "Se [recipient.GetTitledFirstName] è favorevole alla [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l], si procederà"
  agree_to_marriage_intro_tt:0 "Si procederà con gli accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] fra [secondary_actor.GetShortUIName] e [secondary_recipient.GetShortUIName]"
  refuse_marriage_intro_send_rec.tt:0 "[recipient.GetTitledFirstName] verrà informat[Select_CString(recipient.IsFemale,'a','o')] che gli accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] sono stati annullati"
  refuse_marriage_intro_send_act.tt:0 "[actor.GetTitledFirstName] verrà informat[Select_CString(actor.IsFemale,'a','o')] che gli accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] sono stati annullati"
  refuse_marriage_intro_fail_rec.tt:0 "[recipient.GetTitledFirstName] ha posto fine immediata agli accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]"
  refuse_marriage_intro.tt:0 "Gli accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))] fra [secondary_recipient.GetShortUIName] e [secondary_actor.GetShortUIName] saranno annullati seduta stante"
  attraction_at_introduction:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] si sono innamorati durante una presentazione per il matrimonio."
  attraction_at_introduction_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] si sono innamorati durante una presentazione per il matrimonio."
  friends_at_introduction:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] hanno legato come veri amici durante una presentazione per il matrimonio."
  friends_at_introduction_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] hanno legato come veri amici durante una presentazione per il matrimonio."
  lmf_interaction_no_marriage.tt:0 "Accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))] annullati"
  lmf_interaction_no_marriage.success.actor.tt:0 "Nonostante il buon esito della presentazione, [actor.GetShortUIName] ha cambiato idea e ha annullato gli imminenti accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
  lmf_interaction_no_marriage.success.rec.tt:0 "Nonostante il buon esito della presentazione e il tuo assenso, [recipient.GetShortUIName] ha cambiato idea e ha annullato gli imminenti accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
  lmf_interaction_no_marriage.failure.rec.tt:0 "Nonostante il tuo desiderio di procedere, [recipient.GetShortUIName] ha deciso che la mancanza d'intesa reciproca è motivo sufficiente per annullare gli imminenti accordi di [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."

  lmf_interaction.1327.desc.start.secrec:0 "La giornata trascorsa in compagnia di [secondary_actor.GetTitledFirstNamePossessiveNoTooltip] si è rivelata davvero riuscita.\n\nNoi "
  lmf_interaction.1327.desc.hunting.secrec:0 "ci siamo dedicati a una caccia tranquilla non lontano dal [actor.Custom('FortifiedBuilding')]. Lo scopo, naturalmente, non era prendere nulla, ma avere una possibilità di parlare. "
  lmf_interaction.1327.desc.hike.secrec:0 "abbiamo percorso le terre attorno a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], mentre [secondary_actor.GetFirstNameNoTooltip] indicava vari luoghi d'interesse storico. Lo scopo principale, naturalmente, non era la visita, ma avere una possibilità di parlare. "
  lmf_interaction.1327.desc.garrison.secrec:0 "siamo andati alla guarnigione del [actor.Custom('FortifiedBuilding')], io osservavo mentre [secondary_recipient.GetFirstNameNoTooltip] metteva in mostra la propria abilità con la spada facendo sparring con i [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]. Ogni volta che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] si fermava, parlavamo. "
  lmf_interaction.1327.desc.poetry.secrec:0 "abbiamo passeggiato nei giardini del [actor.Custom('FortifiedBuilding')], io ascoltavo mentre [secondary_recipient.GetFirstNameNoTooltip] recitava poemi [secondary_recipient.GetCulture.GetNameNoTooltip] sull'amore e il valore. Per lo più, però, parlavamo. "
  lmf_interaction.1327.desc.library.secrec:0 "abbiamo visitato la biblioteca, curiosando fra gli scaffali mentre [secondary_recipient.GetFirstNameNoTooltip] mi mostrava i suoi tomi più preziosi. Il punto non erano tanto i libri, naturalmente, quanto avere una possibilità di parlare. "
  lmf_interaction.1327.desc.church.secrec:0 "siamo andati alla [actor.GetFaith.HouseOfWorship|l], ascoltando sermoni sulla pietà quando non parlavamo. "
  lmf_interaction.1327.desc.poor.secrec:0 "siamo rimasti per lo più fuori dalla [actor.GetFaith.HouseOfWorship|l] a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], offrendo elemosine e conforto ai poveri. Benché fosse un'opera degna, naturalmente lo scopo principale era parlare. "
  lmf_interaction.1327.desc.tour.secrec:0 "abbiamo visitato il [actor.Custom('FortifiedBuilding')] e le terre circostanti. [secondary_recipient.GetFirstNameNoTooltip] ha mostrato con orgoglio ciò che [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] aveva da offrire, benché lo scopo fosse, naturalmente, parlare. "
  lmf_interaction.1327.desc.garden.secrec:0 "abbiamo passeggiato nei giardini del [actor.Custom('FortifiedBuilding')], un luogo sereno e magnifico per parlare finalmente. "
  lmf_interaction.1327.desc.mid.secrec:0 "E abbiamo parlato. Abbiamo discusso a lungo del futuro e di ciò che speravamo di ottenerne. Pur sapendo che vi erano occhi vigili ovunque, credo che entrambi ci siamo sentiti stranamente a nostro agio.\n\nQuando il sole ha cominciato a calare, mi è stato chiaro: questo è un[secondary_actor.Custom('WomanManGirlBoy')] che potrei sposare, e sono cert[Select_CString(secondary_actor.IsFemale,'a','o')] che [Select_CString(secondary_actor.IsFemale,'lei','lui')] provasse lo stesso."
  lmf_interaction.1327.desc.secrec.lover:0 " Anzi, vi era una scintilla negli occhi di [Select_CString(secondary_actor.IsFemale,'lei','lui')] che diceva che forse [Select_CString(secondary_actor.IsFemale,'lei','lui')] era interessat[Select_CString(secondary_actor.IsFemale,'a','o')] a me come a qualcosa di più che un semplice [secondary_recipient.GetWifeHusband]. Che potessimo essere anche amanti. "
  lmf_interaction.1327.desc.secrec.friends:0 " Anzi, credo che entrambi abbiamo trovato un vero legame... non come amanti, necessariamente. Non ancora, in ogni caso. Ma come amici. Immagina! Un[secondary_actor.GetWifeHusband] che è anche il mio più caro compagno. "
  lmf_interaction.1327.desc.secrec.end:0 "Quando siamo tornati al [actor.Custom('FortifiedBuilding')], ho capito che [actor.GetTitledFirstNameNoTooltip] era impaziente che gli accordi prendessero avvio.\n\nLa vera domanda, dunque, è: è questo che voglio?"
  lmf_interaction.1327.desc.start:0 "Ho ricevuto risposta da [secondary_recipient.GetFirstNameNoTooltip], e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] scrive che la sua visita a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stata un successo.\n\nA quanto pare, loro due "
  lmf_interaction.1327.desc.hunting:0 "si sono dedicati a una caccia tranquilla non lontano dal [actor.Custom('FortifiedBuilding')]. Il punto, naturalmente, non era la caccia, ma che i due parlassero. "
  lmf_interaction.1327.desc.hike:0 "hanno percorso le terre attorno a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], con [secondary_actor.GetFirstNameNoTooltip] che indicava vari luoghi d'interesse storico. Lo scopo principale, naturalmente, era che i due parlassero. "
  lmf_interaction.1327.desc.garrison:0 "sono andati alla guarnigione del [actor.Custom('FortifiedBuilding')], con [secondary_recipient.GetFirstNameNoTooltip] che osservava mentre [secondary_actor.GetFirstNameNoTooltip] faceva sparring con i [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. Ogni volta che [Select_CString(secondary_actor.IsFemale,'lei','lui')] si fermava, parlavano. "
  lmf_interaction.1327.desc.seduction:0 "hanno girato per il [actor.Custom('FortifiedBuilding')]... un po' troppo da vicino, a giudicare dal tono. Leggendo fra le righe, direi che il comportamento di [secondary_actor.GetFirstNamePossessiveNoTooltip] fosse talvolta inappropriato. Eppure, hanno avuto occasione di parlare. "
  lmf_interaction.1327.desc.poetry:0 "hanno passeggiato nei giardini del [actor.Custom('FortifiedBuilding')], con [secondary_recipient.GetFirstNameNoTooltip] che ascoltava mentre [secondary_actor.GetFirstNameNoTooltip] recitava poemi [secondary_actor.GetCulture.GetNameNoTooltip] sull'amore e il valore. Per lo più, però, parlavano. "
  lmf_interaction.1327.desc.library:0 "hanno visitato la biblioteca del [actor.Custom('FortifiedBuilding')], curiosando fra gli scaffali mentre [secondary_actor.GetFirstNameNoTooltip] mostrava a [secondary_recipient.GetFirstNameNoTooltip] i suoi tomi più preziosi. Il punto non erano tanto i libri, naturalmente, quanto avere occasione di parlare. "
  lmf_interaction.1327.desc.church:0 "sono andati alla [actor.GetFaith.HouseOfWorship|l], ascoltando sermoni sulla pietà quando non stavano parlando. "
  lmf_interaction.1327.desc.tavern:0 "si sono recati in un villaggio vicino al [actor.Custom('FortifiedBuilding')], per lo più in una taverna. [secondary_actor.GetFirstNameNoTooltip] era determinat[Select_CString(secondary_actor.IsFemale,'a','o')] a far baldoria, scrive [Select_CString(secondary_recipient.IsFemale,'lei','lui')], ma nonostante ciò hanno avuto molte occasioni per parlare. "
  lmf_interaction.1327.desc.poor:0 "sono rimasti fuori dalla [actor.GetFaith.HouseOfWorship|l] a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], offrendo elemosine e conforto ai poveri. Benché fosse un'opera degna, naturalmente lo scopo principale era che parlassero. "
  lmf_interaction.1327.desc.tour:0 "hanno visitato il [actor.Custom('FortifiedBuilding')] e le terre circostanti. [secondary_actor.GetFirstNameNoTooltip] ha mostrato con orgoglio ciò che [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] aveva da offrire, benché lo scopo, naturalmente, fosse che parlassero. "
  lmf_interaction.1327.desc.garden:0 "hanno passeggiato nei giardini del [actor.Custom('FortifiedBuilding')] per gran parte della giornata, un luogo abbastanza sereno in cui i due hanno avuto occasione di parlare. "
  lmf_interaction.1327.desc.hated:0 "Pur senza curarsi troppo di [secondary_actor.Custom('lmf_intro_activity_short')], alla fine [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ne è stat[Select_CString(secondary_recipient.IsFemale,'a','o')] conquistat[Select_CString(secondary_recipient.IsFemale,'a','o')].\n\n"
  lmf_interaction.1327.desc.loved:0 "[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] ha chiaramente approvato [secondary_actor.Custom('lmf_intro_activity_short')], eccome, e alla fine ne è stat[Select_CString(secondary_recipient.IsFemale,'a','o')] conquistat[Select_CString(secondary_recipient.IsFemale,'a','o')].\n\n"
  lmf_interaction.1327.desc.neutral:0 "Hanno fatto proprio questo, conversando amabilmente nonostante gli occhi su di loro in ogni momento.\n\n"
  lmf_interaction.1327.desc.end:0 "Pare che entrambi si siano fatti piacere l'un l'altra e che siano favorevoli alla [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]. [actor.GetTitledFirstNameNoTooltip] desidera che gli accordi prendano avvio il prima possibile.\n\nLa vera domanda, dunque, è: è questo che voglio ancora?"
  lmf_interaction.1327.b:0 "Non ho bisogno di un altro amante, ma solo di un[secondary_actor.GetWifeHusband]."
  lmf_interaction.1327.e:0 "Ci sposeremo e [Select_CString(secondary_actor.IsFemale,'lei','lui')] sarà il mio amante."
  lmf_interaction.1327.f:0 "Sì, [Select_CString(secondary_actor.IsFemale,'lei','lui')] sarà il mio [secondary_actor.GetWifeHusband] e amico."
  overrode_marriage_wishes:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha scavalcato il desiderio di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di sposarsi per propria libera volontà."
  overrode_marriage_wishes_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha scavalcato il desiderio di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di sposarsi per propria libera volontà."
  married_to_someone_I_dislike:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha fatto sposare [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] con qualcuno che [CharYouSheHe(TARGET_CHARACTER)] [Select_CString( TARGET_CHARACTER.IsLocalPlayer, 'detesti', 'detesta' )]."
  married_to_someone_I_dislike_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha fatto sposare [CHARACTER.GetShortUINameNoTooltipNoFormat] con qualcuno che [CharYouSheHe(CHARACTER)] [Select_CString( CHARACTER.IsLocalPlayer, 'detesti', 'detesta' )]."
  force_marriage_intro_ask_rec.tt:0 "Se [recipient.GetTitledFirstName] è favorevole, la [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] procederà comunque"
  became_enemies_at_introduction:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] si sono odiati all'istante quando [Select_CString( Or( CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer ), 'tu', 'loro' )] siete stati presentati per il matrimonio."
  became_enemies_at_introduction_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [CHARACTER.GetShortUINameNoTooltipNoFormat|U] si sono odiati all'istante quando [Select_CString( Or( CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer ), 'tu', 'loro' )] siete stati presentati per il matrimonio."

  lmf_interaction.1328.t:0 "Un Matrimonio Disastroso"
  lmf_interaction.1328.desc.secact.actor.start:0 "La giornata trascorsa in compagnia di [secondary_recipient.GetFirstNamePossessiveNoTooltip] si è rivelata un disastro.\n\n"
  lmf_interaction.1328.desc.secact.both.loved:0 "È stato strano, soprattutto perché pareva che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] gradisse molto [secondary_actor.Custom('lmf_intro_activity_short')]... almeno all'inizio. "
  lmf_interaction.1328.desc.secact.both.hated:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] detestava [secondary_actor.Custom('lmf_intro_activity_short')] con tutto [Select_CString(secondary_recipient.IsFemale,'il suo','il suo')] essere, e da lì le cose sono soltanto peggiorate. "
  lmf_interaction.1328.desc.secact.both.neutral:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] pareva trovarsi bene con [secondary_actor.Custom('lmf_intro_activity_short')], ma noi due eravamo come olio e acqua fin dal primo istante. "
  lmf_interaction.1328.desc.secact.both.hunting:0 "La nostra conversazione durante la cavalcata è presto degenerata in discussioni e gelidi silenzi. A un certo punto ho deciso che ne avevo abbastanza e ho spronato in avanti, lasciando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] indietro; eppure, anche quando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] mi ha raggiunto di nuovo, le cose non sono andate molto meglio.\n\n"
  lmf_interaction.1328.desc.secact.both.hike:0 "La nostra conversazione è presto degenerata in discussioni e gelidi silenzi, così ho provato invece a trascorrere la camminata indicando i punti di riferimento nei dintorni di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e raccontandone la storia, solo per ricevere alzate d'occhi e sospiri.\n\n"
  lmf_interaction.1328.desc.secact.both.garrison:0 "Mi sono esercitat[Select_CString(ROOT.Char.IsFemale,'a','o')] con i miei [actor.Custom('KnightCulturePluralNoTooltipLowercase')] nella guarnigione del [actor.Custom('FortifiedBuilding')], ma [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ha perso presto la pazienza. E ogni volta che mi avvicinavo a [Select_CString(secondary_recipient.IsFemale,'lei','lui')] fra uno scontro e l'altro, pareva soltanto peggiorare le cose.\n\n"
  lmf_interaction.1328.desc.secact.both.poetry:0 "Ho deliziato [Select_CString(secondary_recipient.IsFemale,'lei','lui')] mentre passeggiavamo nei giardini del [actor.Custom('FortifiedBuilding')], ma [Select_CString(secondary_recipient.IsFemale,'lei','lui')] pareva curarsi ben poco delle mie scelte. Poi, una volta finiti i versi, l'imbarazzo è divenuto ancora più pesante.\n\n"
  lmf_interaction.1328.desc.secact.both.library:0 "L'ho accompagnat[Select_CString(ROOT.Char.IsFemale,'a','o')] in giro, entusiast[Select_CString(ROOT.Char.IsFemale,'a','o')] di mostrar[Select_CString(secondary_recipient.IsFemale,'le','gli')] i miei volumi più pregiati, ma [Select_CString(secondary_recipient.IsFemale,'lei','lui')] non dava peso a nulla di ciò che dicevo. Ogni pensiero sulla letteratura faceva alzare gli occhi a [Select_CString(secondary_recipient.IsFemale,'lei','lui')].\n\n"
  lmf_interaction.1328.desc.secact.both.church:0 "Abbiamo ascoltato i sermoni, ma [Select_CString(secondary_recipient.IsFemale,'lei','lui')] è divenut[Select_CString(secondary_recipient.IsFemale,'a','o')] svogliat[Select_CString(secondary_recipient.IsFemale,'a','o')]. Qualunque cosa dicessi sulla fede riceveva soltanto alzate d'occhi e, alla fine, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] si è limitat[Select_CString(secondary_recipient.IsFemale,'a','o')] a sedere con le braccia conserte.\n\n"
  lmf_interaction.1328.desc.secact.both.poor:0 "Eravamo davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e le occasioni di parlare erano poche. Ogni volta che mi avvicinavo a [Select_CString(secondary_recipient.IsFemale,'lei','lui')], [Select_CString(secondary_recipient.IsFemale,'lei','lui')] si ritraeva.\n\n"
  lmf_interaction.1328.desc.secact.both.tour:0 "Ho condotto [Select_CString(secondary_recipient.IsFemale,'lei','lui')] in giro per il [actor.Custom('FortifiedBuilding')] e per le terre circostanti, ma è stato tutto assai goffo. [secondary_actor.GetSheHe|U] pareva infastidit[Select_CString(secondary_actor.IsFemale,'a','o')] ogni volta che tentavo di parlare di cose personali, e la conversazione è presto degenerata in discussioni e gelidi silenzi.\n\n"
  lmf_interaction.1328.desc.secact.both.garden:0 "La nostra conversazione è presto degenerata in discussioni e gelidi silenzi. Più volte, [secondary_recipient.GetFirstNameNoTooltip] ha accelerato e si è allontanat[Select_CString(secondary_recipient.IsFemale,'a','o')] nonostante conoscesse meno i giardini, costringendomi a correre per raggiunger[Select_CString(secondary_recipient.IsFemale,'la','lo')].\n\n"
  lmf_interaction.1328.desc.secact.both.mid:0 "La costante sensazione d'essere osservat[Select_CString(ROOT.Char.IsFemale,'a','o')] ci faceva strisciare la pelle, e non faceva che esacerbare la tensione. Nulla di ciò che dicevo pareva piacere a [Select_CString(secondary_recipient.IsFemale,'lei','lui')], e tutto ciò che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] diceva mi faceva desiderare di andarmene."
  lmf_interaction.1328.desc.secact.secact.loved:0 "All'inizio, credevo che le cose andassero bene. [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] pareva gradire molto [secondary_actor.Custom('lmf_intro_activity_short')]. "
  lmf_interaction.1328.desc.secact.secact.hated:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] detestava [secondary_actor.Custom('lmf_intro_activity_short')] fin dall'inizio, ma io ho creduto che da lì le cose migliorassero. "
  lmf_interaction.1328.desc.secact.secact.neutral:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] pareva trovarsi bene con [secondary_actor.Custom('lmf_intro_activity_short')], e le cose sembravano procedere abbastanza. "
  lmf_interaction.1328.desc.secact.secact.hunting:0 "La cavalcata fuori da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stata piacevole, e [secondary_actor.GetSheHe] si è rivelat[Select_CString(secondary_actor.IsFemale,'a','o')] un[Select_CString(secondary_actor.IsFemale,'a','o')] compagn[Select_CString(secondary_actor.IsFemale,'a','o')] di caccia adatto. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] chiacchierava con me amabilmente"
  lmf_interaction.1328.desc.secact.secact.hike:0 "Sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] riguardos[Select_CString(ROOT.Char.IsFemale,'a','o')] col passo, indicando numerosi punti di riferimento e spiegandone la storia. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] pareva interessat[Select_CString(secondary_recipient.IsFemale,'a','o')], o così credevo, ponendo molte domande"
  lmf_interaction.1328.desc.secact.secact.garrison:0 "Ho combattuto con vigore con i miei [actor.Custom('KnightCulturePluralNoTooltipLowercase')] nella guarnigione del [actor.Custom('FortifiedBuilding')], ammetto anche per mettermi in mostra. Parlavamo dopo ogni scontro"
  lmf_interaction.1328.desc.secact.secact.poetry:0 "Abbiamo percorso i giardini del [actor.Custom('FortifiedBuilding')] mentre intrattenevo [Select_CString(secondary_recipient.IsFemale,'lei','lui')] con i miei versi, e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ascoltava in silenzio. Una volta terminata la poesia, abbiamo parlato a lungo"
  lmf_interaction.1328.desc.secact.secact.library:0 "Ho mostrato [Select_CString(secondary_recipient.IsFemale,'lei','lui')] i miei tomi preferiti fra i molti volumi. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] ha detto poco, ma quel silenzio ci ha dato modo di parlare a lungo"
  lmf_interaction.1328.desc.secact.secact.church:0 "Abbiamo ascoltato i sermoni al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Ci ha concesso ben poche occasioni di parlare, ma quando infine lo abbiamo fatto"
  lmf_interaction.1328.desc.secact.secact.poor:0 "Abbiamo trascorso il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e la folla ci ha tenuti occupati. Quando infine abbiamo avuto modo di parlare"
  lmf_interaction.1328.desc.secact.secact.tour:0 "Ho condotto [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ovunque attorno al [actor.Custom('FortifiedBuilding')] e alle terre circostanti, spiegando in dettaglio la storia di ogni cosa. [secondary_actor.GetSheHe|U] si è rivelat[Select_CString(secondary_actor.IsFemale,'a','o')] una compagnia piacevole"
  lmf_interaction.1328.desc.secact.secact.garden:0 "Abbiamo conversato mentre passeggiavamo e, almeno all'inizio, pareva cosa piacevole. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] aveva molti interessi, e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] era più che liet[Select_CString(secondary_recipient.IsFemale,'a','o')] di parlarne"
  lmf_interaction.1328.desc.secact.secact.mid:0 ", e io mi sono ritrovat[Select_CString(ROOT.Char.IsFemale,'a','o')] incantat[Select_CString(ROOT.Char.IsFemale,'a','o')] dai [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] modi.\n\nA poco a poco, tuttavia, ho scoperto che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] non provava lo stesso. L'ho sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')] ad alzare gli occhi quando parlavo, e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] trasaliva ogni volta che mi avvicinavo. La tensione è divenuta insopportabile."
  lmf_interaction.1328.desc.secact.secrec.loved:0 "All'inizio, le cose sono andate abbastanza bene. [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] chiaramente gradiva molto [secondary_actor.Custom('lmf_intro_activity_short')], per esempio. "
  lmf_interaction.1328.desc.secact.secrec.hated:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] chiaramente detestava [secondary_actor.Custom('lmf_intro_activity_short')], ma l'ha tollerat[Select_CString(secondary_recipient.IsFemale,'a','o')] e ha provato a partecipare. "
  lmf_interaction.1328.desc.secact.secrec.neutral:0 "All'inizio, le cose sono andate abbastanza bene. [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] non aveva nulla in contrario a [secondary_actor.Custom('lmf_intro_activity_short')], non abbastanza da guastare la giornata. "
  lmf_interaction.1328.desc.secact.secrec.hunting:0 "La cavalcata fuori da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stata piacevole, e [secondary_actor.GetSheHe] pareva [Select_CString(secondary_actor.IsFemale,'piacevole','piacevole')]. Abbiamo chiacchierato di quando in quando, ed è stato goffo ma non più del previsto."
  lmf_interaction.1328.desc.secact.secrec.hike:0 "Sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] riguardos[Select_CString(ROOT.Char.IsFemale,'a','o')] col passo, indicando numerosi punti di riferimento e spiegandone la storia. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] pareva interessat[Select_CString(secondary_recipient.IsFemale,'a','o')], ma in modo piuttosto formale. Eppure, ho apprezzato che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ci provasse."
  lmf_interaction.1328.desc.secact.secrec.garrison:0 "Ho combattuto con vigore con i miei [actor.Custom('KnightCulturePluralNoTooltipLowercase')] nella guarnigione del [actor.Custom('FortifiedBuilding')], ammetto anche per mettermi in mostra. Parlavamo dopo ogni scontro, e non era spiacevole."
  lmf_interaction.1328.desc.secact.secrec.poetry:0 "Abbiamo percorso i giardini del [actor.Custom('FortifiedBuilding')] mentre intrattenevo [Select_CString(secondary_recipient.IsFemale,'lei','lui')] con i miei versi, e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ascoltava in silenzio. Quando ho finito le poesie, abbiamo parlato a lungo... o almeno ci abbiamo provato, e invero è stato abbastanza piacevole."
  lmf_interaction.1328.desc.secact.secrec.library:0 "Ho mostrato [Select_CString(secondary_recipient.IsFemale,'lei','lui')] i miei tomi preferiti fra i molti volumi. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] ha detto poco, ma quel silenzio ci ha dato modo di parlare a lungo, ed è stato goffo se non del tutto spiacevole."
  lmf_interaction.1328.desc.secact.secrec.church:0 "Abbiamo ascoltato i sermoni al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Ci ha concesso ben poche occasioni di parlare, ma quando infine lo abbiamo fatto è stato abbastanza piacevole."
  lmf_interaction.1328.desc.secact.secrec.poor:0 "Abbiamo trascorso il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e la folla ci ha tenuti occupati. Quando infine abbiamo avuto modo di parlare, è stato goffo ma abbastanza piacevole."
  lmf_interaction.1328.desc.secact.secrec.tour:0 "Ho condotto [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ovunque attorno al [actor.Custom('FortifiedBuilding')] e alle terre circostanti, spiegando in dettaglio la storia di ogni cosa. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] si è rivelat[Select_CString(secondary_recipient.IsFemale,'a','o')] una compagnia piacevole, per quanto goffa."
  lmf_interaction.1328.desc.secact.secrec.garden:0 "Abbiamo conversato mentre passeggiavamo e, almeno all'inizio, pareva cosa abbastanza piacevole. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] aveva molti interessi, e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] era più che liet[Select_CString(secondary_recipient.IsFemale,'a','o')] di parlarne, anche se io li ho trovati piuttosto banali."
  lmf_interaction.1328.desc.secact.secrec.mid:0 "\n\nA poco a poco, tuttavia, mi sono ritrovat[Select_CString(ROOT.Char.IsFemale,'a','o')] sempre più infastidit[Select_CString(ROOT.Char.IsFemale,'a','o')]. I [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] modi mi irritavano, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] mi faceva alzare gli occhi, e la tensione cresceva. Se [Select_CString(secondary_recipient.IsFemale,'lei','lui')] se ne accorse, non disse nulla. Anzi, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] pareva del tutto rapit[Select_CString(secondary_recipient.IsFemale,'a','o')] da me... ma io? Io non provavo lo stesso."
  lmf_interaction.1328.desc.rival.actor:0 " A un certo punto, sono inciampat[Select_CString(ROOT.Char.IsFemale,'a','o')] e [secondary_recipient.GetFirstNameNoTooltip] ha riso — riso! Per poco non gli ho strizzat[Select_CString(secondary_recipient.IsFemale,'o','o')] il collo lì, su due piedi."
  lmf_interaction.1328.desc.end.actor:0 "\n\nQuando il sole è calato e siamo tornati al [actor.Custom('FortifiedBuilding')], era chiaro che questo non è un abbinamento adatto."
  lmf_interaction.1328.desc.start:0 "La giornata che [secondary_actor.GetFirstNameNoTooltip] e [secondary_recipient.GetFirstNameNoTooltip] hanno trascorso in compagnia l'uno dell'altro si è rivelata un disastro.\n\nSecondo chi vegliava, "
  lmf_interaction.1328.desc.both.start:0 "nessuno dei due pareva gradire l'altro fin dal primo istante. "
  lmf_interaction.1328.desc.both.hunting:0 "Hanno litigato durante il tragitto da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetFirstNameNoTooltip] cavalcava di continuo in testa a [secondary_recipient.GetFirstNameNoTooltip], lasciando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ad ansimare per recuperare. Anche quando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ci riusciva, mi dicono che la loro conversazione fosse goffa, quando avveniva."
  lmf_interaction.1328.desc.both.hike:0 "All'inizio, la conversazione durante la camminata pareva abbastanza piacevole... finché una discussione non ha portato a gelidi silenzi. [secondary_actor.GetFirstNameNoTooltip] imponeva un passo implacabile e pareva infastidit[Select_CString(secondary_actor.IsFemale,'a','o')] dalla scarsa familiarità di [secondary_recipient.GetFirstNamePossessiveNoTooltip] col terreno. Nessuno dei due voleva essere lì, ma ormai era troppo tardi."
  lmf_interaction.1328.desc.both.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] ha praticamente ignorato [secondary_recipient.GetFirstNameNoTooltip] mentre [secondary_actor.GetSheHe] si esercitava con i[Select_CString(secondary_actor.IsFemale,'suoi','suoi')] compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')], e quando gli scontri sono finiti è andata ben poco meglio. Quel poco parlare che c'è stato è stato goffo e costellato di gelidi silenzi."
  lmf_interaction.1328.desc.both.seduction:0 "Hanno vagato per i terreni del [actor.Custom('FortifiedBuilding')], parlando poco. Poi [secondary_actor.GetFirstNameNoTooltip] ha cominciato a stare troppo vicino a [secondary_recipient.GetFirstNameNoTooltip], e da ogni resoconto si è comportat[Select_CString(secondary_actor.IsFemale,'a','o')] in modo inappropriato e allusivo, in maniere che chiaramente non interessavano [Select_CString(secondary_recipient.IsFemale,'lei','lui')]. Da lì, le cose sono solo peggiorate."
  lmf_interaction.1328.desc.both.poetry:0 "[secondary_actor.GetFirstNameNoTooltip] ha intrattenuto [secondary_recipient.GetFirstNameNoTooltip] con poesia [secondary_actor.GetCulture.GetName] mentre passeggiavano nei giardini del [actor.Custom('FortifiedBuilding')], ma [Select_CString(secondary_recipient.IsFemale,'lei','lui')] era annoiat[Select_CString(secondary_recipient.IsFemale,'a','o')] dai versi o da [Select_CString(secondary_actor.IsFemale,'lei','lui')]. In ogni caso, [secondary_actor.GetSheHe] se n'è avut[Select_CString(secondary_actor.IsFemale,'a','o')] a male e le cose sono soltanto peggiorate."
  lmf_interaction.1328.desc.both.library:0 "Hanno visitato la biblioteca del [actor.Custom('FortifiedBuilding')], e [secondary_actor.GetFirstNameNoTooltip] ha mostrato a [secondary_recipient.GetFirstNameNoTooltip] i[Select_CString(secondary_actor.IsFemale,'suoi','suoi')] volumi preferiti fra i molti tomi. [secondary_actor.GetSheHe|U] pareva del tutto ignar[Select_CString(secondary_actor.IsFemale,'a','o')] del fatto che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] non fosse interessat[Select_CString(secondary_recipient.IsFemale,'a','o')], e da lì le cose sono soltanto peggiorate."
  lmf_interaction.1328.desc.both.church:0 "[secondary_actor.GetFirstNameNoTooltip] ha condotto [secondary_recipient.GetFirstNameNoTooltip] al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove hanno ascoltato i sermoni e ben poco altro. Quel poco parlare che c'è stato era rigido e goffo, nel migliore dei casi."
  lmf_interaction.1328.desc.both.tavern:0 "[secondary_actor.GetFirstNameNoTooltip] ha fatto la bizzarra scelta di condurre [secondary_recipient.GetFirstNameNoTooltip] in una taverna di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetSheHe] ha praticamente lasciato [Select_CString(secondary_recipient.IsFemale,'lei','lui')] in un angolo mentre [Select_CString(secondary_actor.IsFemale,'lei','lui')] faceva baldoria. Mi dicono che, quando più tardi [Select_CString(secondary_actor.IsFemale,'lei','lui')] è tornat[Select_CString(secondary_actor.IsFemale,'a','o')] da [Select_CString(secondary_recipient.IsFemale,'lei','lui')], [Select_CString(secondary_recipient.IsFemale,'lei','lui')] fosse livid[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1328.desc.both.poor:0 "Hanno trascorso il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma se ne stavano ben lontani e parlavano di rado. Quando parlavano, la conversazione era goffa e piena di gelidi silenzi."
  lmf_interaction.1328.desc.both.tour:0 "Hanno visitato il [actor.Custom('FortifiedBuilding')] e le terre circostanti, e mi dicono che [secondary_actor.GetFirstNameNoTooltip] spiegasse la storia di ogni cosa con grande dovizia... restando ignar[Select_CString(secondary_actor.IsFemale,'a','o')] del fatto che [secondary_recipient.GetFirstNameNoTooltip] fosse del tutto disinteressat[Select_CString(secondary_recipient.IsFemale,'a','o')]. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] a stento parlava, se non per sospirare o sbadigliare."
  lmf_interaction.1328.desc.both.garden:0 "Hanno vagato per i giardini del [actor.Custom('FortifiedBuilding')], ma se ne stavano distanti e parevano chiaramente desiderare d'essere ovunque altrove. La conversazione, quando avveniva, era rigida e goffa, e [secondary_actor.GetFirstNameNoTooltip] alzava di continuo gli occhi a qualunque cosa [secondary_recipient.GetFirstNameNoTooltip] dicesse."
  lmf_interaction.1328.desc.both.mid:0 "\n\nErano come olio e acqua, e non s'è vista nemmeno una scintilla."
  lmf_interaction.1328.desc.secrec.start:0 "[secondary_actor.GetFirstNameNoTooltip] pareva abbastanza entusiast[Select_CString(secondary_actor.IsFemale,'a','o')] all'inizio. "
  lmf_interaction.1328.desc.secrec.hunting:0 "Sono partit[Select_CString(secondary_actor.IsFemale,'a','o')] a cavallo da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e mi dicono che [secondary_actor.GetFirstNameNoTooltip] facesse del suo meglio per abbagliare [secondary_recipient.GetFirstNameNoTooltip] con le [Select_CString(secondary_actor.IsFemale,'sue','sue')] doti di conversazione. Anzi, pare che [secondary_actor.GetSheHe] distraesse [Select_CString(secondary_recipient.IsFemale,'lei','lui')] tanto che ben poca caccia si sia davvero fatta. [Select_CString(secondary_actor.IsFemale,'Lei','Lui')|U] era chiaramente invaghit[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.1328.desc.secrec.hike:0 "Hanno camminato lungo i sentieri nei pressi di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], con [secondary_actor.GetFirstNameNoTooltip] che teneva un passo gentile e pareva molto riguardos[Select_CString(secondary_actor.IsFemale,'a','o')]. [secondary_actor.GetSheHe] pareva invaghit[Select_CString(secondary_actor.IsFemale,'a','o')] di [secondary_recipient.GetFirstNameNoTooltip] fin dal principio, impegnandosi a impressionar[Select_CString(secondary_recipient.IsFemale,'la','lo')] a ogni svolta."
  lmf_interaction.1328.desc.secrec.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] ha condotto [secondary_recipient.GetFirstNameNoTooltip] alla guarnigione del [actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetSheHe] si è esercitat[Select_CString(secondary_actor.IsFemale,'a','o')] con i[Select_CString(secondary_actor.IsFemale,'suoi','suoi')] compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')], evidentemente impegnandosi ancor più per impressionar[Select_CString(secondary_recipient.IsFemale,'la','lo')]. Anzi, [Select_CString(secondary_actor.IsFemale,'lei','lui')] pareva rapit[Select_CString(secondary_actor.IsFemale,'a','o')], a dirla tutta."
  lmf_interaction.1328.desc.secrec.seduction:0 "Hanno vagato per i terreni del [actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetFirstNameNoTooltip] ha tentato di abbagliare [secondary_recipient.GetFirstNameNoTooltip] con la conversazione. [secondary_actor.GetSheHe|U] ha evidentemente preso il silenzio di [Select_CString(secondary_recipient.IsFemale,'lei','lui')] come incoraggiamento, perché ha cominciato a comportarsi... in modo inappropriato. Stando troppo vicin[Select_CString(secondary_actor.IsFemale,'a','o')] e facendo allusioni, chiaramente convint[Select_CString(secondary_actor.IsFemale,'a','o')] che tutto stesse andando a meraviglia."
  lmf_interaction.1328.desc.secrec.poetry:0 "Hanno visitato i giardini del [actor.Custom('FortifiedBuilding')] mentre [secondary_actor.GetFirstNameNoTooltip] deliziava [Select_CString(secondary_recipient.IsFemale,'lei','lui')] con poesia [secondary_actor.GetCulture.GetNameNoTooltip]. [secondary_actor.GetSheHe|U] ha preso il relativo silenzio di [Select_CString(secondary_recipient.IsFemale,'lei','lui')] come incoraggiamento e ha continuato a impegnarsi con le [Select_CString(secondary_actor.IsFemale,'sue','sue')] recitazioni, chiaramente invaghit[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.1328.desc.secrec.library:0 "Hanno visitato la biblioteca del [actor.Custom('FortifiedBuilding')], e [secondary_actor.GetFirstNameNoTooltip] ha mostrato a [secondary_recipient.GetFirstNameNoTooltip] i[Select_CString(secondary_actor.IsFemale,'suoi','suoi')] volumi preferiti fra i molti tomi. Da ogni resoconto, [secondary_actor.GetSheHe] non smetteva di parlare e ha preso il relativo silenzio di [Select_CString(secondary_recipient.IsFemale,'lei','lui')] come incoraggiamento. [secondary_actor.GetSheHe|U] era chiaramente invaghit[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.1328.desc.secrec.church:0 "[secondary_actor.GetFirstNameNoTooltip] ha condotto [secondary_recipient.GetFirstNameNoTooltip] al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove hanno ascoltato i sermoni sulla pietà. [secondary_actor.GetSheHe|U] pareva incoraggiat[Select_CString(secondary_actor.IsFemale,'a','o')] dalla quiete di [Select_CString(secondary_recipient.IsFemale,'lei','lui')] e ha tentato di abbagliare [Select_CString(secondary_recipient.IsFemale,'lei','lui')] con la [Select_CString(secondary_actor.IsFemale,'sua','sua')] fede, chiaramente in cerca dell'approvazione di [Select_CString(secondary_recipient.IsFemale,'lei','lui')]."
  lmf_interaction.1328.desc.secrec.tavern:0 "[secondary_actor.GetFirstNameNoTooltip] ha fatto la bizzarra scelta di condurre [secondary_recipient.GetFirstNameNoTooltip] in una taverna di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetSheHe] ha provato a far baldoria con [Select_CString(secondary_recipient.IsFemale,'lei','lui')]. Mi dicono che [secondary_actor.GetSheHe] abbia bevuto molto e credesse che si stessero divertendo entrambi."
  lmf_interaction.1328.desc.secrec.poor:0 "Hanno trascorso il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] era chiaramente invaghit[Select_CString(secondary_actor.IsFemale,'a','o')], tentando con forza di impressionare [secondary_recipient.GetFirstNameNoTooltip] con la [Select_CString(secondary_actor.IsFemale,'sua','sua')] generosità."
  lmf_interaction.1328.desc.secrec.tour:0 "Hanno visitato il [actor.Custom('FortifiedBuilding')] e le terre circostanti, con [secondary_actor.GetFirstNameNoTooltip] che spiegava la storia di ogni cosa a [Select_CString(secondary_recipient.IsFemale,'lei','lui')] con grande interesse e dovizia. Troppa, forse, tanta era l'ansia di [Select_CString(secondary_actor.IsFemale,'lei','lui')]."
  lmf_interaction.1328.desc.secrec.garden:0 "Hanno vagato per i giardini del [actor.Custom('FortifiedBuilding')], intrattenendosi in conversazioni che, a quanto riferiscono, erano assai a senso unico. [secondary_actor.GetFirstNameNoTooltip] era desideros[Select_CString(secondary_actor.IsFemale,'a','o')] di impressionare [secondary_recipient.GetFirstNameNoTooltip], e ha tentato con forza di abbagliare [Select_CString(secondary_recipient.IsFemale,'lei','lui')]... e chiaramente credeva di riuscirvi."
  lmf_interaction.1328.desc.secrec.hated:0 "\n\n[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U], tuttavia, chiaramente non provava lo stesso. Fin dall'inizio, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] non gradiva [secondary_actor.Custom('lmf_intro_activity_short')], e ciò non ha fatto che irritar[Select_CString(secondary_recipient.IsFemale,'la','lo')] sempre più col passare delle ore."
  lmf_interaction.1328.desc.secrec.loved:0 "\n\nPur gradendo evidentemente [secondary_actor.Custom('lmf_intro_activity_short')], era chiaro che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] non provava lo stesso. Il [Select_CString(secondary_recipient.IsFemale,'suo','suo')] piacere è scemato col passare delle ore, finendo per mutarsi in noia, se non in vero risentimento."
  lmf_interaction.1328.desc.secrec.neutral:0 "\n\n[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U], tuttavia, chiaramente non provava lo stesso. Mi dicono che talvolta [Select_CString(secondary_recipient.IsFemale,'lei','lui')] apparisse annoiat[Select_CString(secondary_recipient.IsFemale,'a','o')], altre volte risentit[Select_CString(secondary_recipient.IsFemale,'a','o')]. Col passare delle ore, ciò non è migliorato."
  lmf_interaction.1328.desc.secact.start:0 "[secondary_recipient.GetFirstNameNoTooltip] pareva abbastanza entusiast[Select_CString(secondary_recipient.IsFemale,'a','o')] all'inizio. "
  lmf_interaction.1328.desc.secact.hunting:0 "Sono partit[Select_CString(secondary_recipient.IsFemale,'a','o')] a cavallo da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e mi dicono che [secondary_recipient.GetFirstNameNoTooltip] facesse del suo meglio per abbagliare [secondary_actor.GetFirstNameNoTooltip] con le [Select_CString(secondary_recipient.IsFemale,'sue','sue')] doti di conversazione. Anzi, pare che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] distraesse [Select_CString(secondary_actor.IsFemale,'lei','lui')] tanto che ben poca caccia si sia davvero fatta. Chiaramente, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] era invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1328.desc.secact.hike:0 "Hanno camminato lungo i sentieri nei pressi di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], con [secondary_actor.GetFirstNameNoTooltip] che teneva un passo gentile e pareva molto riguardos[Select_CString(secondary_actor.IsFemale,'a','o')]. [secondary_recipient.GetFirstNameNoTooltip] pareva invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')] di [Select_CString(secondary_actor.IsFemale,'lei','lui')] fin dal principio, impegnandosi a impressionar[Select_CString(secondary_actor.IsFemale,'la','lo')] a ogni svolta."
  lmf_interaction.1328.desc.secact.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] ha condotto [secondary_recipient.GetFirstNameNoTooltip] alla guarnigione del [actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetSheHe] ha combattuto vigorosi scontri con i[Select_CString(secondary_actor.IsFemale,'suoi','suoi')] compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. [secondary_recipient.GetFirstNameNoTooltip] era chiaramente impressionat[Select_CString(secondary_recipient.IsFemale,'a','o')], quasi sospirando per [Select_CString(secondary_actor.IsFemale,'lei','lui')] dopo ogni scontro."
  lmf_interaction.1328.desc.secact.seduction:0 "Hanno vagato per i terreni del [actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetFirstNameNoTooltip] era, da ogni resoconto, più che un poco inappropriat[Select_CString(secondary_actor.IsFemale,'a','o')] con [secondary_recipient.GetFirstNameNoTooltip]... almeno all'inizio. [secondary_actor.GetSheHe|U] stava troppo vicino, era allusiv[Select_CString(secondary_actor.IsFemale,'a','o')] e troppo confidenziale, e [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ha risposto con evidente entusiasmo. A metà giornata, [Select_CString(secondary_recipient.IsFemale,'lei','lui')] era rapit[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1328.desc.secact.poetry:0 "Hanno visitato i giardini del [actor.Custom('FortifiedBuilding')] mentre [secondary_actor.GetFirstNameNoTooltip] intratteneva [Select_CString(secondary_recipient.IsFemale,'lei','lui')] con selezioni di poesia [secondary_actor.GetCulture.GetNameNoTooltip]. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] ha risposto con evidente entusiasmo e, a metà giornata, pareva del tutto rapit[Select_CString(secondary_recipient.IsFemale,'a','o')] da [Select_CString(secondary_actor.IsFemale,'lei','lui')]."
  lmf_interaction.1328.desc.secact.library:0 "Hanno visitato la biblioteca del [actor.Custom('FortifiedBuilding')], e [secondary_actor.GetFirstNameNoTooltip] ha mostrato a [secondary_recipient.GetFirstNameNoTooltip] i[Select_CString(secondary_actor.IsFemale,'suoi','suoi')] volumi preferiti fra i molti tomi. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] era deliziat[Select_CString(secondary_recipient.IsFemale,'a','o')] e, mentre [Select_CString(secondary_recipient.IsFemale,'lei','lui')] parlava senza posa, era chiaro che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] fosse invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')] di [Select_CString(secondary_actor.IsFemale,'lei','lui')]."
  lmf_interaction.1328.desc.secact.church:0 "[secondary_actor.GetFirstNameNoTooltip] ha condotto [secondary_recipient.GetFirstNameNoTooltip] al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove hanno ascoltato i sermoni. Questo ha deliziato [Select_CString(secondary_recipient.IsFemale,'lei','lui')], a quanto pare, e dal [Select_CString(secondary_recipient.IsFemale,'suo','suo')] chiacchiericcio incessante era chiaro che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] fosse invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1328.desc.secact.tavern:0 "[secondary_actor.GetFirstNameNoTooltip] ha fatto la bizzarra scelta di condurre [secondary_recipient.GetFirstNameNoTooltip] in una taverna di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetSheHe] ha provato a far baldoria con [Select_CString(secondary_recipient.IsFemale,'lei','lui')]. Mi dicono che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] abbia risposto con entusiasmo, bevendo molto e colmando [Select_CString(secondary_actor.IsFemale,'lei','lui')] d'affetto a ogni occasione."
  lmf_interaction.1328.desc.secact.poor:0 "Hanno trascorso il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_recipient.GetFirstNameNoTooltip] era chiaramente invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')], tentando con forza di impressionare [secondary_actor.GetFirstNameNoTooltip] con la [Select_CString(secondary_recipient.IsFemale,'sua','sua')] generosità."
  lmf_interaction.1328.desc.secact.tour:0 "Hanno visitato il [actor.Custom('FortifiedBuilding')] e le terre circostanti, con [secondary_actor.GetFirstNameNoTooltip] che spiegava la storia di ogni cosa a [Select_CString(secondary_recipient.IsFemale,'lei','lui')] con grande interesse e dovizia. [Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] chiaramente gradiva il trattamento e ha tentato con forza di impressionare [Select_CString(secondary_actor.IsFemale,'lei','lui')] a ogni svolta."
  lmf_interaction.1328.desc.secact.garden:0 "Hanno vagato per i giardini del [actor.Custom('FortifiedBuilding')], intrattenendosi in conversazioni che, a quanto riferiscono, erano assai a senso unico. [secondary_recipient.GetFirstNameNoTooltip] era desideros[Select_CString(secondary_recipient.IsFemale,'a','o')] di impressionare [secondary_actor.GetFirstNameNoTooltip], e ha tentato con forza di abbagliare [Select_CString(secondary_actor.IsFemale,'lei','lui')]... e chiaramente credeva di riuscirvi."
  lmf_interaction.1328.desc.secact.hated:0 "\n\n[secondary_actor.GetFirstNameNoTooltip], tuttavia, chiaramente non provava lo stesso. Mi dicono che talvolta [secondary_actor.GetSheHe] apparisse annoiat[Select_CString(secondary_actor.IsFemale,'a','o')] da [Select_CString(secondary_recipient.IsFemale,'lei','lui')], altre volte risentit[Select_CString(secondary_actor.IsFemale,'a','o')] di [Select_CString(secondary_recipient.IsFemale,'lei','lui')]. Col passare delle ore, ciò non è migliorato."
  lmf_interaction.1328.desc.secact.loved:0 "\n\nPur con il [Select_CString(secondary_recipient.IsFemale,'suo','suo')] evidente entusiasmo per [secondary_actor.Custom('lmf_intro_activity_short')], era chiaro che [secondary_actor.GetFirstNameNoTooltip] non provava lo stesso. [secondary_actor.GetSheHe|U] si è lentamente annoiat[Select_CString(secondary_actor.IsFemale,'a','o')] di [Select_CString(secondary_recipient.IsFemale,'lei','lui')] col passare delle ore, e ciò è cresciuto fino a divenire risentimento."
  lmf_interaction.1328.desc.secact.neutral:0 "\n\n[secondary_actor.GetFirstNameNoTooltip], tuttavia, chiaramente non provava lo stesso. Mi dicono che talvolta [secondary_actor.GetSheHe] apparisse annoiat[Select_CString(secondary_actor.IsFemale,'a','o')] da [Select_CString(secondary_recipient.IsFemale,'lei','lui')], altre volte risentit[Select_CString(secondary_actor.IsFemale,'a','o')]. Col passare delle ore, ciò non è migliorato."
  lmf_interaction.1328.desc.rival:0 " Anzi, talvolta pareva che si detestassero del tutto. [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] è inciampat[Select_CString(secondary_recipient.IsFemale,'a','o')] su una pietra e [secondary_actor.GetFirstNameNoTooltip] ha riso — riso! Ciò non ha fatto che infuriare [Select_CString(secondary_recipient.IsFemale,'lei','lui')]."
  lmf_interaction.1328.desc.end:0 "\n\nQuando il sole è calato, era ormai chiaro che questo non è un abbinamento adatto."
  lmf_interaction.1328.a:0 "Procederemo comunque con i preparativi per [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
  lmf_interaction.1328.b:0 "Annullate subito i preparativi."
  lmf_interaction.1328.c:0 "[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] è già sull'uscio..."

  lmf_secondary_actor_may_rebel_tt:0 "@warning_icon! #X [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] potrebbe ribellarsi all'idea d'esser costrett[Select_CString(secondary_actor.IsFemale,'a','o')] a sposarsi contro i suoi desideri!#!"
  lmf_secondary_recipient_may_rebel_tt:0 "@warning_icon! #X [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] potrebbe ribellarsi all'idea d'esser costrett[Select_CString(secondary_recipient.IsFemale,'a','o')] a sposarsi contro i suoi desideri!#!"
  lmf_recipient_may_rebel_tt:0 "@warning_icon! #X [recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstNameNoTooltip] potrebbe ribellarsi all'idea d'esser costrett[Select_CString(recipient.IsFemale,'a','o')] a sposarsi contro i suoi desideri!#!"

  lmf_interaction.1329.desc.start.secrec:0 "Il giorno trascorso in compagnia di [secondary_actor.GetTitledFirstNamePossessiveNoTooltip] si rivelò un disastro.\n\n"
  lmf_interaction.1329.desc.secrec.both.start:0 "Fummo come olio e acqua fin dal principio. "
  lmf_interaction.1329.desc.secrec.both.hunting:0 "Durante la battuta di caccia la nostra conversazione si tramutò ben presto in litigi e gelidi silenzi. A un certo punto [secondary_actor.GetFirstNameNoTooltip] spronò il cavallo e si portò avanti, lasciandomi indietro, e quando infine lo raggiunsi le cose non andarono meglio. "
  lmf_interaction.1329.desc.secrec.both.hike:0 "Durante l'escursione la nostra conversazione si tramutò ben presto in litigi e gelidi silenzi. [secondary_actor.GetFirstNameNoTooltip] tenne un passo implacabile e parve infastidit[Select_CString(secondary_actor.IsFemale,'a','o')] dalla mia scarsa dimestichezza con il terreno. "
  lmf_interaction.1329.desc.secrec.both.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] mi ignorò del tutto mentre [secondary_actor.GetSheHe] incrociava le armi con i suoi compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')], e quando gli scontri terminarono le cose migliorarono ben poco. "
  lmf_interaction.1329.desc.secrec.both.poetry:0 "[secondary_actor.GetFirstNameNoTooltip] mi intrattenne con poesie di [secondary_actor.GetCulture.GetName] mentre passeggiavamo nei giardini del[actor.Custom('FortifiedBuilding')], ma sembrò curarsi ben poco di ciò che ne pensassi. Poi, quando [secondary_actor.GetSheHe] rimase senz'altre liriche, la situazione divenne ancor più imbarazzante. "
  lmf_interaction.1329.desc.secrec.both.library:0 "[secondary_actor.GetFirstNameNoTooltip] mi mostrò la biblioteca del[actor.Custom('FortifiedBuilding')], ma parve assai più interessat[Select_CString(secondary_actor.IsFemale,'a','o')] ai libri che a qualunque cosa avessi da dire. Se azzardavo un'opinione? Peggio ancora. "
  lmf_interaction.1329.desc.secrec.both.church:0 "[secondary_actor.GetFirstNameNoTooltip] mi condusse al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma trascorse tutto il tempo ad ascoltare sermoni sulla pietà. Se tentavo di parlare, venivo zittit[Select_CString(ROOT.Char.IsFemale,'a','o')]. "
  lmf_interaction.1329.desc.secrec.both.poor:0 "Trascorremmo il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Un'impresa degna, ma la conversazione fu pressoché inesistente. "
  lmf_interaction.1329.desc.secrec.both.tour:0 "Visitammo il[actor.Custom('FortifiedBuilding')] e le terre circostanti, ma fu una mera formalità. [secondary_actor.GetFirstNameNoTooltip] parve infastidit[Select_CString(secondary_actor.IsFemale,'a','o')] dalla mia scarsa familiarità con [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e la nostra conversazione si tramutò ben presto in litigi e gelidi silenzi. "
  lmf_interaction.1329.desc.secrec.both.garden:0 "Passeggiammo nei giardini del[actor.Custom('FortifiedBuilding')], ma la nostra conversazione si tramutò ben presto in litigi e gelidi silenzi. Più volte [secondary_actor.GetFirstNameNoTooltip] accelerò e mi precedette, costringendomi a correre per raggiungerlo. "
  lmf_interaction.1329.desc.secrec.both.mid:0 "La costante sensazione d'esser osservati ci fece venire la pelle d'oca, acuendo soltanto la tensione fra noi. Nulla di ciò che dicevo pareva compiacere [secondary_recipient.GetHerHim], e qualunque cosa dicesse [secondary_recipient.SheHe] mi faceva venir voglia di roteare gli occhi."
  lmf_interaction.1329.desc.secrec.secact.start:0 "All'inizio, credetti che le cose stessero andando abbastanza bene. "
  lmf_interaction.1329.desc.secrec.secact.hunting:0 "La battuta di caccia nei pressi di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] fu piacevole, e [secondary_actor.GetFirstNameNoTooltip] parve di buon animo. [secondary_actor.GetSheHe|U] fu un valid[Select_CString(secondary_actor.IsFemale,'a','o')] compagn[Select_CString(secondary_actor.IsFemale,'a','o')] di caccia"
  lmf_interaction.1329.desc.secrec.secact.hike:0 "[secondary_actor.GetFirstNameNoTooltip] fu abbastanza piacevole durante l'escursione, e premuros[Select_CString(secondary_actor.IsFemale,'a','o')] nel tenere il passo. [secondary_actor.GetSheHe|U] indicò numerosi punti di riferimento, spiegandone la storia"
  lmf_interaction.1329.desc.secrec.secact.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] mi condusse alla guarnigione del[actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetSheHe] sostenne vigorosi scontri con i suoi compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. Parlavamo fra un duello e l'altro"
  lmf_interaction.1329.desc.secrec.secact.poetry:0 "Visitammo i giardini del[actor.Custom('FortifiedBuilding')] mentre [secondary_actor.GetFirstNameNoTooltip] mi intratteneva con poesie di [secondary_actor.GetCulture.GetNameNoTooltip]. [secondary_actor.GetSheHe|U] lo fece con eleganza, sebbene con un'aria fin troppo studiata"
  lmf_interaction.1329.desc.secrec.secact.library:0 "Visitammo la biblioteca del[actor.Custom('FortifiedBuilding')], e [secondary_actor.GetFirstNameNoTooltip] mi mostrò i suoi preferiti fra i molti tomi. I suoi occhi quasi scintillavano ogniqualvolta [secondary_actor.GetSheHe] parlava di letteratura"
  lmf_interaction.1329.desc.secrec.secact.church:0 "[secondary_actor.GetFirstNameNoTooltip] mi condusse al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove ascoltammo i sermoni sulla pietà. [secondary_actor.GetSheHe|U] parve così appassionat[Select_CString(secondary_actor.IsFemale,'a','o')] di tutto ciò che riguardava la fede"
  lmf_interaction.1329.desc.secrec.secact.poor:0 "Trascorremmo il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] parve così sincer[Select_CString(secondary_actor.IsFemale,'a','o')] e rett[Select_CString(secondary_actor.IsFemale,'a','o')] nella sua compassione"
  lmf_interaction.1329.desc.secrec.secact.tour:0 "Visitammo il[actor.Custom('FortifiedBuilding')] e le terre circostanti, e [secondary_actor.GetFirstNameNoTooltip] spiegò la storia di ogni cosa con grande interesse e dovizia di particolari. [secondary_actor.GetSheHe|U] parve così premuros[Select_CString(secondary_actor.IsFemale,'a','o')]"
  lmf_interaction.1329.desc.secrec.secact.garden:0 "Passeggiammo nei giardini del[actor.Custom('FortifiedBuilding')], intrattenendoci in una conversazione che, almeno all'inizio, parve vivace. [secondary_actor.GetFirstNameNoTooltip] aveva una gran varietà d'interessi di cui [secondary_actor.GetSheHe] era più che disposto a discorrere"
  lmf_interaction.1329.desc.secrec.secact.mid:0 ", e mi ritrovai incantat[Select_CString(ROOT.Char.IsFemale,'a','o')] dai suoi modi.\n\nLentamente, tuttavia, scoprii che [secondary_recipient.GetSheHe] non provava lo stesso. Colsi [secondary_recipient.GetHerHim] a roteare gli occhi quando parlavo, e [secondary_recipient.GetSheHe] trasaliva ogni volta che mi avvicinavo. La tensione divenne insopportabile."
  lmf_interaction.1329.desc.secrec.secrec.start:0 "All'inizio, le cose parvero andar bene. "
  lmf_interaction.1329.desc.secrec.secrec.hunting:0 "La battuta di caccia nei pressi di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] fu piacevole, e [secondary_actor.GetFirstNameNoTooltip] parve gradevole e [secondary_actor.GetSheHe|U] fu un valid[Select_CString(secondary_actor.IsFemale,'a','o')] compagn[Select_CString(secondary_actor.IsFemale,'a','o')] di caccia... almeno da principio."
  lmf_interaction.1329.desc.secrec.secrec.hike:0 "[secondary_actor.GetFirstNameNoTooltip] fu abbastanza piacevole durante l'escursione, e premuros[Select_CString(secondary_actor.IsFemale,'a','o')] nel tenere il passo. [secondary_actor.GetSheHe|U] indicò numerosi punti di riferimento, spiegandone la storia con dovizia, sebbene con aridità."
  lmf_interaction.1329.desc.secrec.secrec.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] mi condusse alla guarnigione del[actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetSheHe] sostenne scontri con i suoi compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')], pur avendo cura di dedicarmi attenzioni fra un duello e l'altro."
  lmf_interaction.1329.desc.secrec.secrec.poetry:0 "Visitammo i giardini del[actor.Custom('FortifiedBuilding')] mentre [secondary_actor.GetFirstNameNoTooltip] mi intratteneva con poesie di [secondary_actor.GetCulture.GetNameNoTooltip]. [secondary_actor.GetSheHe|U] si comportò con decoro, per quanto le sue scelte di versi fossero discutibili."
  lmf_interaction.1329.desc.secrec.secrec.library:0 "Visitammo la biblioteca del[actor.Custom('FortifiedBuilding')], e [secondary_actor.GetFirstNameNoTooltip] mi mostrò i suoi preferiti fra i molti tomi. Misi in dubbio alcune delle sue scelte, ma fui rassicurat[Select_CString(ROOT.Char.IsFemale,'a','o')] dalla sua evidente passione per lo studio."
  lmf_interaction.1329.desc.secrec.secrec.church:0 "[secondary_actor.GetFirstNameNoTooltip] mi condusse al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove ascoltammo i sermoni sulla pietà. [secondary_actor.GetFirstNameNoTooltip] parve davvero devot[Select_CString(secondary_actor.IsFemale,'a','o')], pensai, sebbene i suoi sforzi di conversazione fossero meno sentiti."
  lmf_interaction.1329.desc.secrec.secrec.poor:0 "Trascorremmo il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] tentava chiaramente d'impressionarmi con la sua generosità, cosa che dapprima trovai divertente."
  lmf_interaction.1329.desc.secrec.secrec.tour:0 "Visitammo il[actor.Custom('FortifiedBuilding')] e le terre circostanti, e [secondary_actor.GetFirstNameNoTooltip] spiegò la storia di ogni cosa con grande interesse e dovizia di particolari. Fu piacevole, sebbene non riuscissi a proferir parola."
  lmf_interaction.1329.desc.secrec.secrec.garden:0 "Passeggiammo nei giardini del[actor.Custom('FortifiedBuilding')], intrattenendoci in una conversazione che, almeno all'inizio, parve vivace. [secondary_actor.GetFirstNameNoTooltip] aveva così tanti interessi e sembrava non esservi fine al numero d'opinioni che [secondary_actor.GetSheHe] poteva esprimere in merito."
  lmf_interaction.1329.desc.secrec.secrec.mid:0 "\n\nLentamente, tuttavia, mi ritrovai a irritarmi sempre di più. I suoi modi mi erano d'impaccio, mi facevano roteare gli occhi, e la tensione cresceva. Se [secondary_recipient.GetSheHe] se ne accorse, [secondary_recipient.GetSheHe] non disse nulla. Anzi, [secondary_recipient.GetSheHe] parve completamente rapit[Select_CString(secondary_recipient.IsFemale,'a','o')] da me... ma io? Io non provavo lo stesso."
  lmf_interaction.1329.desc.rival.secrec:0 " A un certo punto inciampai e [secondary_actor.GetSheHe] rise di me... rise! Giuro, avrei potuto spezzargli il collo seduta stante."
  lmf_interaction.1329.desc.end.secrec:0 "\n\nQuando il sole tramontò e facemmo ritorno al[actor.Custom('FortifiedBuilding')], fu chiaro che non vi era alcun affiatamento."
  lmf_interaction.1329.desc.end.secrec.nomarry:0 " [actor.Custom('IT_NAM_COL3')][actor.GetTitledFirstNameNoTooltip] dovette concordare, e revocò immediatamente gli accordi per [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
  lmf_interaction.1329.desc.end.secrec.marry:0 " [actor.Custom('IT_NAM_COL3')][actor.GetTitledFirstNameNoTooltip], tuttavia, non concorda e desidera procedere con gli accordi per [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] nondimeno. La domanda è dunque: io che farò?"
  lmf_interaction.1329.desc.start:0 "Ho ricevuto notizie da [secondary_recipient.GetFirstNameNoTooltip], e [secondary_recipient.GetSheHe] scrive che la sua visita a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] è stata un disastro.\n\n"
  lmf_interaction.1329.desc.both.loved:0 "A quanto pare, iniziò abbastanza bene. [secondary_recipient.GetSheHe|U] gradì [secondary_actor.Custom('lmf_intro_activity_short')], ma non [secondary_actor.GetFirstNameNoTooltip] in persona. "
  lmf_interaction.1329.desc.both.hated:0 "[secondary_recipient.GetSheHe|U] detestò [secondary_actor.Custom('lmf_intro_activity_short')], e da lì le cose non fecero che peggiorare. "
  lmf_interaction.1329.desc.both.neutral:0 "[secondary_recipient.GetSheHe|U] trovò [secondary_actor.Custom('lmf_intro_activity_short')] tollerabile, ma non [secondary_actor.GetFirstNameNoTooltip] in persona. "
  lmf_interaction.1329.desc.both.hunting:0 "Litigarono lungo il tragitto da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetSheHe] cavalcava di continuo avanti a [secondary_recipient.GetHerHim], lasciando [secondary_recipient.GetHerHim] ad arrancare per raggiungerlo. Persino quando [secondary_recipient.GetSheHe] vi riusciva, la loro conversazione fu a quanto pare imbarazzante, quando mai vi fu."
  lmf_interaction.1329.desc.both.hike:0 "All'inizio, la conversazione fu abbastanza piacevole... finché un litigio non condusse a gelidi silenzi. [secondary_actor.GetSheHe|U] tenne un passo implacabile e parve infastidit[Select_CString(secondary_actor.IsFemale,'a','o')] dalla scarsa dimestichezza di [secondary_recipient.GetHerHis] col terreno. Nessuno dei due desiderava esser lì, ma ormai era troppo tardi."
  lmf_interaction.1329.desc.both.garrison:0 "[secondary_actor.GetSheHe|U] quasi ignorò del tutto [secondary_recipient.GetHerHim] mentre [secondary_actor.GetSheHe] incrociava le armi con i suoi compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')], e quando gli scontri terminarono le cose migliorarono ben poco. Quel poco che si dissero fu imbarazzante e colmo di gelidi silenzi."
  lmf_interaction.1329.desc.both.seduction:0 "Passeggiarono per i terreni del[actor.Custom('FortifiedBuilding')], parlando poco. Poi [secondary_actor.GetSheHe|U] cominciò a star troppo vicino a [secondary_recipient.GetHerHim] e, a quanto si dice, si comportò in modo sconveniente e allusivo, in modi per cui [secondary_recipient.GetSheHe] chiaramente non mostrava alcun interesse."
  lmf_interaction.1329.desc.both.poetry:0 "[secondary_actor.GetSheHe|U] intrattenne [secondary_recipient.GetHerHim] con versi di [secondary_actor.GetCulture.GetName] mentre passeggiavano nei giardini del[actor.Custom('FortifiedBuilding')], ma [secondary_recipient.GetSheHe] era annoiat[Select_CString(secondary_recipient.IsFemale,'a','o')] dalla poesia o forse da [secondary_actor.GetHerHim]. In ogni caso, [secondary_actor.GetSheHe] se ne offese."
  lmf_interaction.1329.desc.both.library:0 "[secondary_actor.GetSheHe|U] mostrò a [secondary_recipient.GetHerHim] i suoi preferiti fra i molti tomi, e parve del tutto ignar[Select_CString(secondary_actor.IsFemale,'a','o')] del fatto che [secondary_recipient.GetSheHe] non avesse interesse alcuno."
  lmf_interaction.1329.desc.both.church:0 "Ascoltarono i sermoni sulla pietà ma, a quanto pare, fecero ben poco altro. Quel poco che si dissero fu, nel migliore dei casi, rigido e imbarazzante."
  lmf_interaction.1329.desc.both.tavern:0 "[secondary_actor.GetSheHe|U] fece la strana scelta di condurre [secondary_recipient.GetHerHim] in una taverna di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove quasi lo lasciò in un angolo. Quando infine [secondary_actor.GetSheHe] tornò da [secondary_recipient.GetHerHim], [secondary_recipient.GetSheHe] era furios[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1329.desc.both.poor:0 "Trascorsero il pomeriggio al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma rimasero lontani e parlarono di rado. Quando lo fecero, la loro conversazione fu imbarazzante e colma di gelidi silenzi."
  lmf_interaction.1329.desc.both.tour:0 "[secondary_actor.GetSheHe|U] mostrò a [secondary_recipient.GetHerHim] il[actor.Custom('FortifiedBuilding')] e le terre circostanti, spiegando la storia di ogni cosa con grande dovizia di particolari... e a quanto pare del tutto ignar[Select_CString(secondary_actor.IsFemale,'a','o')] del fatto che [secondary_recipient.GetSheHe] non avesse alcun interesse."
  lmf_interaction.1329.desc.both.garden:0 "Passeggiarono restando ben distanti, e sembravano chiaramente preferire qualunque altro luogo. Quel poco che si dissero fu a quanto pare rigido e imbarazzante, con [secondary_actor.GetHerHim] che roteava di continuo gli occhi a qualunque cosa dicesse [secondary_recipient.GetSheHe]."
  lmf_interaction.1329.desc.both.mid:0 "\n\nFurono come olio e acqua, e se possibile si piacquero ancor meno dopo aver trascorso un'intera giornata in compagnia l'uno dell'altra."
  lmf_interaction.1329.desc.secact.start:0 "[secondary_actor.GetFirstNameNoTooltip] parve abbastanza entusiast[Select_CString(secondary_actor.IsFemale,'a','o')] all'inizio, scrive [secondary_recipient.GetSheHe]. "
  lmf_interaction.1329.desc.secact.hunting:0 "Cavalcarono fuori da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetFirstNameNoTooltip] fece del suo meglio per abbagliare [secondary_recipient.GetFirstNameNoTooltip] con le sue doti di conversazione. Anzi, [secondary_actor.GetSheHe] parve tanto invaghit[Select_CString(secondary_actor.IsFemale,'a','o')] che di caccia se ne fece ben poca."
  lmf_interaction.1329.desc.secact.hike:0 "Percorsero i sentieri nei pressi di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e [secondary_actor.GetFirstNameNoTooltip] tenne un passo gentile ed ebbe molte premure. [secondary_actor.GetSheHe] parve invaghit[Select_CString(secondary_actor.IsFemale,'a','o')] di [secondary_recipient.GetFirstNameNoTooltip] fin dall'inizio, sforzandosi d'impressionare [secondary_recipient.GetHerHim] a ogni svolta."
  lmf_interaction.1329.desc.secact.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] condusse [secondary_recipient.GetFirstNameNoTooltip] alla guarnigione del[actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetSheHe] sostenne scontri con i suoi compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')], sforzandosi evidentemente ancor di più per impressionare [secondary_recipient.GetHerHim]. [secondary_recipient.GetSheHe|U] parve invero invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1329.desc.secact.seduction:0 "Passeggiarono per i terreni del[actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetFirstNameNoTooltip] tentò di abbagliare [secondary_recipient.GetFirstNameNoTooltip] con la conversazione. [secondary_actor.GetSheHe|U] prese il silenzio di [secondary_recipient.GetHerHis] per incoraggiamento, giacché [secondary_recipient.GetSheHe] cominciò ad agire... in modo sconveniente. Stava troppo vicino e faceva commenti allusivi, chiaramente convint[Select_CString(secondary_recipient.IsFemale,'a','o')] che tutto stesse andando a meraviglia."
  lmf_interaction.1329.desc.secact.poetry:0 "Visitarono i giardini del[actor.Custom('FortifiedBuilding')] mentre [secondary_actor.GetFirstNameNoTooltip] intratteneva [secondary_recipient.GetHerHim] con poesie di [secondary_actor.GetCulture.GetNameNoTooltip]. [secondary_actor.GetSheHe|U] prese il relativo silenzio di [secondary_recipient.GetHerHis] per incoraggiamento e si sforzò ancor di più nelle recitazioni, chiaramente invaghit[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.1329.desc.secact.library:0 "Visitarono la biblioteca del[actor.Custom('FortifiedBuilding')], e [secondary_actor.GetFirstNameNoTooltip] mostrò a [secondary_recipient.GetFirstNameNoTooltip] i suoi preferiti fra i molti tomi. [secondary_actor.GetSheHe|U] parlò senza posa e prese la relativa quiete di [secondary_recipient.GetHerHis] per incoraggiamento, poiché era chiaramente invaghit[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.1329.desc.secact.church:0 "[secondary_actor.GetFirstNameNoTooltip] condusse [secondary_recipient.GetFirstNameNoTooltip] al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove ascoltarono i sermoni sulla pietà. [secondary_actor.GetSheHe|U] cercò d'abbagliare [secondary_recipient.GetHerHim] con la sua fede, chiaramente bramos[Select_CString(secondary_actor.IsFemale,'a','o')] della sua approvazione."
  lmf_interaction.1329.desc.secact.tavern:0 "[secondary_actor.GetFirstNameNoTooltip] fece la strana scelta di condurre [secondary_recipient.GetFirstNameNoTooltip] in una taverna di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetSheHe] tentò di far baldoria con [secondary_recipient.GetHerHim]. A quanto si dice, [secondary_actor.GetSheHe] bevve assai, e credette che entrambi si stessero divertendo."
  lmf_interaction.1329.desc.secact.poor:0 "Trascorsero il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] era chiaramente invaghit[Select_CString(secondary_actor.IsFemale,'a','o')], e si sforzò d'impressionare [secondary_recipient.GetFirstNameNoTooltip] con la sua generosità."
  lmf_interaction.1329.desc.secact.tour:0 "Visitarono il[actor.Custom('FortifiedBuilding')] e le terre circostanti, e [secondary_actor.GetFirstNameNoTooltip] spiegò la storia di ogni cosa a [secondary_recipient.GetFirstNameNoTooltip] con grande interesse e dovizia di particolari. Forse troppa, tanta era la sua brama."
  lmf_interaction.1329.desc.secact.garden:0 "Passeggiarono nei giardini del[actor.Custom('FortifiedBuilding')], intrattenendosi in una conversazione che [secondary_recipient.GetSheHe] dice esser stata assai a senso unico. [secondary_actor.GetFirstNameNoTooltip] era desideros[Select_CString(secondary_actor.IsFemale,'a','o')] d'impressionare [secondary_recipient.GetFirstNameNoTooltip], e cercò d'abbagliare [secondary_recipient.GetHerHim]... e chiaramente credette di riuscirvi."
  lmf_interaction.1329.desc.secact.hated:0 "\n\n[secondary_recipient.GetSheHe|U] scrive, tuttavia, che [secondary_recipient.GetSheHe] non provava lo stesso. Fin dall'inizio [secondary_recipient.GetSheHe] non gradì [secondary_actor.Custom('lmf_intro_activity_short')] e questo irritò sempre più [secondary_recipient.GetHerHim] man mano che il giorno avanzava."
  lmf_interaction.1329.desc.secact.loved:0 "\n\nPur scrivendo che [secondary_recipient.GetSheHe] gradì [secondary_actor.Custom('lmf_intro_activity_short')], [secondary_recipient.GetSheHe] non provava lo stesso. Il suo diletto scemò col passar delle ore, mutandosi infine in noia e risentimento."
  lmf_interaction.1329.desc.secact.neutral:0 "\n\n[secondary_recipient.GetSheHe|U] scrive, tuttavia, che [secondary_recipient.GetSheHe] non provava lo stesso. [secondary_recipient.GetSheHe|U] dice d'esser stat[Select_CString(secondary_recipient.IsFemale,'a','o')] annoiat[Select_CString(secondary_recipient.IsFemale,'a','o')] o infastidit[Select_CString(secondary_recipient.IsFemale,'a','o')], e ciò non migliorò col passar delle ore."
  lmf_interaction.1329.desc.secrec.start:0 "[secondary_recipient.GetFirstNameNoTooltip] scrive che [secondary_recipient.GetSheHe] era abbastanza entusiast[Select_CString(secondary_recipient.IsFemale,'a','o')] all'inizio. "
  lmf_interaction.1329.desc.secrec.hunting:0 "Cavalcarono fuori da [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_recipient.GetFirstNameNoTooltip] tentò d'abbagliare [secondary_actor.GetFirstNameNoTooltip] con le sue doti di conversazione. Anzi, [secondary_recipient.GetSheHe] distrasse [secondary_actor.GetHerHim] a tal punto che di caccia se ne fece ben poca. È chiaro che [secondary_recipient.GetSheHe] era invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1329.desc.secrec.hike:0 "Percorsero i sentieri nei pressi di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e [secondary_actor.GetFirstNameNoTooltip] tenne un passo gentile e, a quanto si dice, fu assai premuros[Select_CString(secondary_actor.IsFemale,'a','o')]. [secondary_recipient.GetFirstNameNoTooltip] dice d'esser stat[Select_CString(secondary_recipient.IsFemale,'a','o')] invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')] di [secondary_actor.GetHerHim] fin dall'inizio, sforzandosi d'impressionarlo a ogni svolta."
  lmf_interaction.1329.desc.secrec.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] condusse [secondary_recipient.GetFirstNameNoTooltip] alla guarnigione del[actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetSheHe] sostenne vigorosi scontri con i suoi compagni [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. [secondary_recipient.GetFirstNameNoTooltip] ne rimase impressionat[Select_CString(secondary_recipient.IsFemale,'a','o')], sospirando per [secondary_actor.GetHerHim] dopo ogni duello."
  lmf_interaction.1329.desc.secrec.seduction:0 "Passeggiarono per i terreni del[actor.Custom('FortifiedBuilding')], dove [secondary_actor.GetFirstNameNoTooltip] fu più che un poco sconveniente con [secondary_recipient.GetFirstNameNoTooltip]... almeno all'inizio. [secondary_actor.GetSheHe|U] stava troppo vicino, era allusiv[Select_CString(secondary_actor.IsFemale,'a','o')] e fin troppo amichevol[Select_CString(secondary_actor.IsFemale,'a','o')], ma [secondary_recipient.GetSheHe] afferma di non averne avuto affatto a male. A metà giornata, [secondary_recipient.GetSheHe] era invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.1329.desc.secrec.poetry:0 "Visitarono i giardini del[actor.Custom('FortifiedBuilding')] mentre [secondary_actor.GetFirstNameNoTooltip] intratteneva [secondary_actor.GetHerHim] con scelte di poesie di [secondary_actor.GetCulture.GetNameNoTooltip]. [secondary_recipient.GetSheHe|U] rispose con entusiasmo, e a metà giornata dice d'esser rimast[Select_CString(secondary_recipient.IsFemale,'a','o')] del tutto rapit[Select_CString(secondary_recipient.IsFemale,'a','o')] da [secondary_actor.GetHerHim]."
  lmf_interaction.1329.desc.secrec.library:0 "Visitarono la biblioteca del[actor.Custom('FortifiedBuilding')], e [secondary_actor.GetFirstNameNoTooltip] mostrò a [secondary_recipient.GetHerHim] i suoi preferiti fra i molti tomi. [secondary_recipient.GetSheHe|U] ne fu deliziat[Select_CString(secondary_recipient.IsFemale,'a','o')], e mentre chiacchierava senza posa [secondary_recipient.GetSheHe] dice che [secondary_recipient.GetSheHe] si invaghì di [secondary_actor.GetHerHim]."
  lmf_interaction.1329.desc.secrec.church:0 "[secondary_actor.GetFirstNameNoTooltip] condusse [secondary_recipient.GetFirstNameNoTooltip] al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove ascoltarono i sermoni. Quando poi parlarono a lungo, [secondary_recipient.GetSheHe] scrive che ella si invaghì ben presto."
  lmf_interaction.1329.desc.secrec.tavern:0 "[secondary_actor.GetFirstNameNoTooltip] fece la strana scelta di condurre [secondary_recipient.GetFirstNameNoTooltip] in una taverna di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [secondary_actor.GetSheHe] tentò di far baldoria con [secondary_recipient.GetHerHim]. [secondary_recipient.GetSheHe|U] gli tenne bordone, bevendo assai e colmando d'affetto [secondary_actor.GetHerHim] a ogni svolta."
  lmf_interaction.1329.desc.secrec.poor:0 "Trascorsero il pomeriggio distribuendo elemosine ai poveri davanti al [actor.GetFaith.HouseOfWorship|l] di [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_recipient.GetFirstNameNoTooltip] era invaghit[Select_CString(secondary_recipient.IsFemale,'a','o')], e si sforzò d'impressionare [secondary_actor.GetFirstNameNoTooltip] con la sua generosità."
  lmf_interaction.1329.desc.secrec.tour:0 "Visitarono il[actor.Custom('FortifiedBuilding')] e le terre circostanti, e [secondary_actor.GetFirstNameNoTooltip] spiegò la storia di ogni cosa a [secondary_recipient.GetFirstNameNoTooltip] con grande interesse e dovizia di particolari. [secondary_recipient.GetSheHe|U] gradì il trattamento, e si sforzò d'impressionare [secondary_actor.GetHerHim] a ogni svolta."
  lmf_interaction.1329.desc.secrec.garden:0 "Passeggiarono nei giardini del[actor.Custom('FortifiedBuilding')], intrattenendosi in una lunga conversazione. [secondary_recipient.GetFirstNameNoTooltip] era desideros[Select_CString(secondary_recipient.IsFemale,'a','o')] d'impressionare [secondary_actor.GetFirstNameNoTooltip], e cercò d'abbagliare [secondary_actor.GetHerHim]... e dice che [secondary_recipient.GetSheHe] credette di riuscirvi."
  lmf_interaction.1329.desc.secrec.hated:0 "\n\n[secondary_actor.GetFirstNameNoTooltip], tuttavia, chiaramente non provava lo stesso. [secondary_actor.GetSheHe|U] talvolta pareva annoiat[Select_CString(secondary_actor.IsFemale,'a','o')] da [secondary_recipient.GetFirstNameNoTooltip], altre volte risentit[Select_CString(secondary_actor.IsFemale,'a','o')] di [secondary_recipient.GetHerHim]. La delusione di [secondary_recipient.GetHerHis|U] è palpabile."
  lmf_interaction.1329.desc.secrec.loved:0 "\n\nNonostante l'evidente diletto di [secondary_recipient.GetHerHis] per [secondary_actor.Custom('lmf_intro_activity_short')], fu chiaro che [secondary_actor.GetFirstNameNoTooltip] non provava lo stesso. [secondary_actor.GetSheHe|U] lentamente s'annoiò di [secondary_recipient.GetHerHim] col passar delle ore, e ciò divenne risentimento. La delusione di [secondary_recipient.GetHerHis|U] è palpabile."
  lmf_interaction.1329.desc.secrec.neutral:0 "\n\n[secondary_actor.GetFirstNameNoTooltip], tuttavia, chiaramente non provava lo stesso. [secondary_recipient.GetSheHe|U] scrive che [secondary_actor.GetSheHe] talvolta pareva annoiat[Select_CString(secondary_actor.IsFemale,'a','o')] da [secondary_recipient.GetHerHim], altre volte risentit[Select_CString(secondary_actor.IsFemale,'a','o')] di [secondary_recipient.GetHerHim]. La delusione di [secondary_recipient.GetHerHis|U] è palpabile."
  lmf_interaction.1329.desc.rival:0 " [secondary_recipient.GetFirstNameNoTooltip] non ebbe invero una sola cosa piacevole da dire. Puro e assoluto odio."
  lmf_interaction.1329.desc.end.nomarry:0 "\n\n[actor.Custom('IT_NAM_COL3')][actor.GetTitledFirstNameNoTooltip] concordò che non vi era alcun affiatamento, e pose fine agli accordi proposti per [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]. [secondary_recipient.GetFirstNameNoTooltip] farà ritorno senza indugio."
  lmf_interaction.1329.desc.end.marry:0 "\n\nStranamente, tuttavia, [actor.Custom('IT_NAM_COL3')][actor.GetTitledFirstNameNoTooltip] non concorda che non vi sia alcun affiatamento e desidera procedere con gli accordi per [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] nondimeno. [secondary_recipient.GetFirstNameNoTooltip] crede che non sia una buona idea... ma forse è per il meglio?"
  lmf_interaction.1329.a:0 "Sposerò [secondary_actor.Custom('IT_NAM_COL4')][secondary_actor.GetTitledFirstNameNoTooltip]."
  lmf_interaction.1329.b:0 "Concordo. [secondary_recipient.GetSheHe|U] sposerà [secondary_actor.Custom('IT_NAM_COL4')][secondary_actor.GetTitledFirstNameNoTooltip]."
  lmf_interaction.1329.c:0 "No. Revoca gli accordi per [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]."
  lmf_interaction.1329.d:0 "Così sia."

  lmf_interaction.1331.t:0 "La fuga"
  lmf_interaction.1331.desc.reject:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] non prese affatto bene la notizia del suo imminente matrimonio con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('intended_spouse'))]. Proprio per nulla.\n\n"
  lmf_interaction.1331.desc.start:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] non prese affatto bene che io revocassi il diritto di scegliere un[rebel.Custom('DE_PRO_PER_P_3P_G')][rebel.Custom('WifeHusbandOpp')] da sé. Proprio per nulla.\n\n"
  lmf_interaction.1331.desc.mid:0 "In un primo momento, tutti credettero che [rebel.GetSheHe] fosse semplicemente uscit[Select_CString(rebel.IsFemale,'a','o')] dalla sala in preda all'ira. Poi divenne chiaro che [rebel.GetSheHe] era svanit[Select_CString(rebel.IsFemale,'a','o')] dal[actor.Custom('FortifiedBuilding')] del tutto, e che invero s'era dileguat[Select_CString(rebel.IsFemale,'a','o')] senza lasciar neppure un biglietto.\n\n"
  lmf_interaction.1331.desc.septon:0 "Solo più tardi scoprimmo che [rebel.GetSheHe] aveva preso i voti per unirsi alla Fede, piuttosto che accettare un[intended_spouse.GetWifeHusband] che [rebel.GetSheHe] non voleva.\n\n"
  lmf_interaction.1331.desc.maester:0 "Solo più tardi scoprimmo che [rebel.GetSheHe] era andat[Select_CString(rebel.IsFemale,'a','o')] alla Cittadella, scegliendo di divenire un maestro piuttosto che accettare un[intended_spouse.GetWifeHusband] che [rebel.GetSheHe] non voleva.\n\n"
  lmf_interaction.1331.desc.wall:0 "Solo più tardi scoprimmo che [rebel.GetSheHe] s'era unit[Select_CString(rebel.IsFemale,'a','o')] ai Guardiani della Notte. Pareva che [rebel.GetSheHe] preferisse sopportare la vita sulla Barriera piuttosto che accettare un[intended_spouse.GetWifeHusband] che [rebel.GetSheHe] non voleva.\n\n"
  lmf_interaction.1331.desc.ranoff:0 "Solo più tardi scoprimmo che [rebel.GetSheHe] era fuggit[Select_CString(rebel.IsFemale,'a','o')] del tutto, e che l'ultima volta era stat[Select_CString(rebel.IsFemale,'a','o')] vist[Select_CString(rebel.IsFemale,'a','o')] mentre attraversava un villaggio lì vicino. Furono mandate diverse squadre di ricerca, ma tornarono a mani vuote, e nessuno ha idea se [rebel.GetSheHe] farà mai ritorno. Tutto questo pur di non accettare un[intended_spouse.GetWifeHusband] che [rebel.GetSheHe] non voleva.\n\n"
  lmf_interaction.1331.desc.end.reject:0 "Inutile dirlo, le nozze con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('intended_spouse'))] sono annullate."
  lmf_interaction.1331.desc.end:0 "Chi mai avrebbe sospettato che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] potesse esser così ostinat[Select_CString(rebel.IsFemale,'a','o')]?"
  lmf_interaction.1331.a:0 "Così sia."

  lmf_interaction.1500.opening.spouseliege:0 "Mio [actor.GetLadyLord] e [actor.GetWifeHusband],"
  lmf_interaction.1500.opening.liege:0 "Mio [actor.GetLadyLord],"
  lmf_interaction.1500.opening.love:0 "Amor mio,"
  lmf_interaction.1500.opening.spouse:0 "[actor.GetWifeHusband|U],"
  lmf_interaction.1500.nemesis:0 "Preferirei schiantarmi il capo contro un muro di pietra piuttosto che viaggiare di mia volontà fino a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] solo per il cosiddetto piacere d'essere ai tuoi ordini.\n\nDi certo volevi che questo invito fosse uno scherzo."
  lmf_interaction.1500.rival:0 "Un invito a venire a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]? A vedere te, dopo ciò che hai fatto?\n\nNo, direi che per ora resterò dove sono, grazie."
  lmf_interaction.1500.betray:0 "Un invito a venire a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]? A vedere te?\n\nNo, il tuo tradimento è ancora troppo fresco perché io possa sopportare di passare altro tempo con te, almeno per ora."
  lmf_interaction.1500.spouse:0 "Sì, concordo che sia tempo per noi di stare insieme come marito e moglie, ma al momento non posso proprio strapparmi da [recipient.GetCurrentLocation.GetTitle.GetNameNoTooltip].\n\nSono certo che tu comprenda."
  lmf_interaction.1500.lover:0 "Oh, quanto vorrei non dover rifiutare questo invito, ma temo d'esser costrett[Select_CString(recipient.IsFemale,'a','o')]. Per ora mi è semplicemente impossibile lasciare [recipient.GetCurrentLocation.GetTitle.GetNameNoTier].\n\nPresto, amor mio! Lo prometto."
  lmf_interaction.1500.a:0 "Ebbene, valeva la pena tentare."

  lmf_interaction.1501.lover:0 "Proprio pensavo a te, ed ecco che giunge questo delizioso invito!\n\nMi preparerò per il viaggio verso [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e ti vedrò presto."
  lmf_interaction.1501.spouse:0 "Sì, suppongo che sia tempo per noi di stare insieme come marito e moglie, non è vero?\n\nMi preparerò per il viaggio verso [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_interaction.1501.a:0 "Non vedo l'ora!"

  lmf_interaction.1503.t:0 "Annullare la visita?"
  lmf_interaction.1503.desc.atwar.betrayed:0 "Traditore infame! [Select_CString(actor.IsFemale,'La mia','Il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] ha usato la mia visita come un tranello, attaccando mentre ero ancora in viaggio.\n\nDevo tornare a [origin.GetTitle.GetNameNoTierNoTooltip] seduta stante!"
  lmf_interaction.1503.desc.atwar.betrayer:0 "Ora mi ritrovo trascinat[Select_CString(ROOT.Char.IsFemale,'a','o')] in una guerra contro [Select_CString(actor.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))].\n\nDubito che l'accoglienza che mi attende a [destination.GetTitle.GetNameNoTierNoTooltip] sarebbe calda, in questo momento; non resta che tornare a [origin.GetTitle.GetNameNoTierNoTooltip]."
  lmf_interaction.1503.desc.atwar.rootdefender:0 "Mi ritrovo attaccat[Select_CString(ROOT.Char.IsFemale,'a','o')] da [attacker.GetPrimaryTitle.GetNameNoTooltip] mentre sto viaggiando, pensa un po'.\n\nSuppongo che la domanda sia: torno a [origin.GetTitle.GetNameNoTierNoTooltip]? Arriverei in tempo per fare davvero la differenza?"
  lmf_interaction.1503.desc.atwar.rootattacker:0 "E ora sono in guerra contro [defender.GetPrimaryTitle.GetNameNoTooltip], e io mi trovo nel mezzo d'un viaggio.\n\nSuppongo che la domanda sia: torno a [origin.GetTitle.GetNameNoTierNoTooltip]? Arriverei in tempo per fare davvero la differenza?"
  lmf_interaction.1503.desc.atwar.actorattacker:0 "Ho appena ricevuto notizia che [Select_CString(actor.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] ha mosso guerra a [defender.GetPrimaryTitle.GetNameNoTooltip], pur sapendo che stavo arrivando.\n\nOra la questione è: torno a [origin.GetTitle.GetNameNoTierNoTooltip] o proseguo e spero per il meglio?"
  lmf_interaction.1503.desc.atwar.actordefender:0 "Ho appena ricevuto notizia che [Select_CString(actor.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] è stat[Select_CString(actor.IsFemale,'a','o')] attaccat[Select_CString(actor.IsFemale,'a','o')] da [attacker.GetPrimaryTitle.GetNameNoTooltip]. Che tempismo atroce!\n\nOra la questione è: torno a [origin.GetTitle.GetNameNoTierNoTooltip] o proseguo e spero per il meglio?"
  lmf_interaction.1503.desc.atwar.actor:0 "Ho appena ricevuto notizia che [Select_CString(actor.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] è stat[Select_CString(actor.IsFemale,'a','o')] trascinat[Select_CString(actor.IsFemale,'a','o')] in guerra, benché pare che [destination.GetTitle.GetNameNoTierNoTooltip] non sia in pericolo immediato.\n\nTorno a [origin.GetTitle.GetNameNoTierNoTooltip] comunque, o proseguo e spero per il meglio?"
  lmf_interaction.1503.desc.atwar:0 "Ho appena ricevuto notizia che sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] trascinat[Select_CString(ROOT.Char.IsFemale,'a','o')] in guerra, e io sono in viaggio e lontan[Select_CString(ROOT.Char.IsFemale,'a','o')] da casa.\n\nSuppongo che la domanda sia: torno a [origin.GetTitle.GetNameNoTierNoTooltip]? Arriverei in tempo per fare davvero la differenza?"
  lmf_interaction.1503.a:0 "Devo tornare subito."
  lmf_interaction.1503.a.title:0 "Visita annullata"
  lmf_interaction.1503.a.desc:0 "[recipient.GetShortUINameNoTooltip|U] è stat[Select_CString(recipient.IsFemale,'a','o')] costrett[Select_CString(recipient.IsFemale,'a','o')] ad annullare la visita e a tornare a [origin.GetTitle.GetNameNoTierNoTooltip] a causa della guerra."
  lmf_interaction.1503.b:0 "Non serve a nulla. Prosegui verso [destination.GetTitle.GetNameNoTierNoTooltip]."

  lmf_interaction.1504.t:0 "Tristi notizie"
  lmf_interaction.1504.desc:0 "La notizia peggiore! [Select_CString(actor.IsFemale,'La mia','Il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] è mort[Select_CString(actor.IsFemale,'a','o')], e io sono qui fuori senza poter fare alcunché.\n\nNon ha senso proseguire il mio viaggio verso [destination.GetTitle.GetNameNoTierNoTooltip]. Devo tornare a [origin.GetTitle.GetNameNoTierNoTooltip]."
  lmf_interaction.1504.a:0 "Oh, [actor.GetFirstNameNoTooltip]!"
lmf_interaction.1504.tt: 0 "[recipient.GetShortUINameNoTooltip|U] è stat[Select_CString(recipient.IsFemale,'a','o')] costrett[Select_CString(recipient.IsFemale,'a','o')] ad annullare la visita e a fare ritorno a [origin.GetTitle.GetNameNoTierNoTooltip] a causa della morte improvvisa di [actor.GetShortUINamePossessiveNoFormat]."
  lmf_interaction.1505.a.title:0 "Visita annullata"
  lmf_interaction.1505.desc.begin:0 "[recipient.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(recipient)] costrett[Select_CString(recipient.IsFemale,'a','o')] ad annullare [CharYourHerHis(recipient)] visita a [destination.GetTitle.GetNameNoTierNoTooltip]"
  lmf_interaction.1505.desc.norelationship:0 " perché il legame con [actor.GetShortUINameNoTooltipNoFormat] è giunto al termine."
  lmf_interaction.1505.desc.notprovince:0 " perché non è più la [CharYourHerHis(actor)] capitale."
  lmf_interaction.1505.desc.actorleft:0 " perché [CharYouSheHe(actor)] [CharAreIs(actor)] non si trova più laggiù."
  lmf_interaction.1505.desc.actorill:0 " perché [CharYouSheHe(actor)] [CharHaveHas(actor)] contratto una grave malattia."
  lmf_interaction.1505.desc.rootill:0 " perché [CharYouSheHe(recipient)] [CharHaveHas(recipient)] contratto una grave malattia."
  lmf_interaction.1505.desc.actorimprison:0 " perché [CharYouSheHe(actor)] [CharHaveHas(actor)] stato imprigionat[Select_CString(actor.IsFemale,'a','o')]."
  lmf_interaction.1505.desc.rootimprison:0 " perché [CharYouSheHe(recipient)] [CharHaveHas(recipient)] stato imprigionat[Select_CString(recipient.IsFemale,'a','o')]."
  lmf_interaction.1505.desc.actorpregnant:0 " perché [CharYouSheHe(actor)] [CharAreIs(actor)] ora incinta."
  lmf_interaction.1505.desc.rootpregnant:0 " perché [CharYouSheHe(recipient)] [CharAreIs(recipient)] ora incinta."
  lmf_interaction.1505.desc.actorhealth:0 " perché [CharYouSheHe(actor)] [CharAreIs(actor)] troppo debilitato."
  lmf_interaction.1505.desc.roothealth:0 " perché [CharYouSheHe(recipient)] [CharAreIs(recipient)] troppo debilitato."
  lmf_interaction.1505.desc.default:0 "."

  lmf_interaction.1506.t.reclove:0 "Sono qui, amor mio!"
  lmf_interaction.1506.t.rec:0 "Una sera col mio [actor.GetWifeHusband|U]"
  lmf_interaction.1506.t.love:0 "Il mio amore arriva"
  lmf_interaction.1506.t:0 "Una sera col mio [recipient.GetWifeHusband|U]"
  lmf_interaction.1506.desc.reclove.notspouse:0 "Finalmente! Arrivo a [destination.GetTitle.GetNameNoTierNoTooltip], stremat[Select_CString(recipient.IsFemale,'a','o')] ma già impaziente di vedere [actor.GetFirstNameNoTooltip].\n\nEd eccol[Select_CString(actor.IsFemale,'a','o')] lì, già sorridente e ansios[Select_CString(actor.IsFemale,'a','o')] di cominciare la nostra giornata insieme... e d'un tratto non mi sento più così stanc[Select_CString(recipient.IsFemale,'a','o')].\n\n[actor.GetFirstNameNoTooltip] ci conduce in una parte appartata della [actor.Custom('FortifiedBuilding')], lontano da occhi indiscreti, e lì facciamo il miglior uso del poco tempo che ci è concesso."
  lmf_interaction.1506.desc.reclove.spouse:0 "Finalmente! Arrivo a [destination.GetTitle.GetNameNoTierNoTooltip], stremat[Select_CString(recipient.IsFemale,'a','o')] ma già impaziente di vedere [actor.GetFirstNameNoTooltip].\n\nEd eccol[Select_CString(actor.IsFemale,'a','o')] lì, già sorridente, circondat[Select_CString(actor.IsFemale,'a','o')] da uno stuolo di servi ansiosi di recarmi messaggi e di conferire con il [actor.GetLadyLord] e [recipient.GetWifeHusband] di costoro. Per fortuna [actor.GetFirstNameNoTooltip] li scaccia via dopo pochi minuti, desideros[Select_CString(actor.IsFemale,'a','o')] di cominciare la nostra giornata insieme.\n\n[Select_CString(actor.IsFemale,'Lei','Lui')|U] mi conduce alle stanze da letto, bandendo del tutto il personale della [actor.Custom('FortifiedBuilding')] da quest'ala. Sarà una buona notte."
  lmf_interaction.1506.desc.rec.spouse:0 "Finalmente! Arrivo a [destination.GetTitle.GetNameNoTierNoTooltip], stremat[Select_CString(recipient.IsFemale,'a','o')] e desideros[Select_CString(recipient.IsFemale,'a','o')] di riposare... ma già vi è una folla di servi ansiosi di recarmi messaggi e di conferire con il [actor.GetLadyLord] e [recipient.GetWifeHusband] di costoro. Me ne occupo per un poco, poi li scaccio via e mi ritiro nelle stanze che [actor.GetFirstNameNoTooltip] ha riservato per me nella [actor.Custom('FortifiedBuilding')].\n\n[Select_CString(actor.IsFemale,'Lei','Lui')|U] giunge più tardi, per fortuna quando sono pront[Select_CString(recipient.IsFemale,'a','o')], e iniziamo una sera in compagnia l'uno dell'altra che non è affatto spiacevole."
  lmf_interaction.1506.desc.love.notspouse:0 "Finalmente! [recipient.GetFirstNameNoTooltip] è arrivat[Select_CString(recipient.IsFemale,'a','o')] a [destination.GetTitle.GetNameNoTierNoTooltip], stremat[Select_CString(recipient.IsFemale,'a','o')] dal viaggio ma chiaramente liet[Select_CString(recipient.IsFemale,'a','o')] di vedermi.\n\nLo accolg[Select_CString(ROOT.Char.IsFemale,'o','o')] nel cortile, sorridente e impaziente di cominciare la nostra giornata insieme... e d'un tratto [recipient.GetFirstNameNoTooltip] non pare più così esaust[Select_CString(recipient.IsFemale,'a','o')].\n\nConduco [recipient.GetFirstNameNoTooltip] in una parte appartata della [actor.Custom('FortifiedBuilding')], perlopiù inutilizzata e lontana da occhi indiscreti, e lì facciamo il miglior uso del poco tempo che ci è concesso."
  lmf_interaction.1506.desc.love.spouse:0 "Finalmente! [recipient.GetFirstNameNoTooltip] è arrivat[Select_CString(recipient.IsFemale,'a','o')] a [destination.GetTitle.GetNameNoTierNoTooltip], stremat[Select_CString(recipient.IsFemale,'a','o')] dal viaggio ma chiaramente liet[Select_CString(recipient.IsFemale,'a','o')] di vedermi.\n\nLo accolg[Select_CString(ROOT.Char.IsFemale,'o','o')] nel cortile, circondat[Select_CString(ROOT.Char.IsFemale,'a','o')] da uno stuolo di servi ansiosi di recargli messaggi e di conferire con il [actor.GetLadyLord] e [recipient.GetWifeHusband] di costoro. Per fortuna [actor.GetFirstNameNoTooltip] li scaccia via dopo pochi minuti, desideros[Select_CString(ROOT.Char.IsFemale,'a','o')] di cominciare la nostra giornata insieme.\n\nConduco [recipient.GetFirstNameNoTooltip] alle mie stanze da letto, bandendo del tutto il personale della [actor.Custom('FortifiedBuilding')] da quest'ala. Sarà una buona notte."
  lmf_interaction.1506.desc.spouse:0 "Finalmente! [recipient.GetFirstNameNoTooltip] è arrivat[Select_CString(recipient.IsFemale,'a','o')] a [destination.GetTitle.GetNameNoTierNoTooltip], stremat[Select_CString(recipient.IsFemale,'a','o')] dal lungo viaggio da [origin.GetTitle.GetNameNoTierNoTooltip].\n\nGli concedo tempo per riposare e prepararsi nelle stanze che gli ho assegnato qui, nella [actor.Custom('FortifiedBuilding')], e lo lascio anche sbrigarsela con i molti servi che attendono per recargli messaggi e conferire con il [actor.GetLadyLord] e [recipient.GetWifeHusband] di costoro.\n\nQuando infine busso, [recipient.GetFirstNameNoTooltip] è più che pront[Select_CString(recipient.IsFemale,'a','o')], e iniziamo una sera in compagnia l'uno dell'altra che non è affatto spiacevole."
  lmf_interaction.1506.a:0 "Queste notti sono fin troppo rare."

  lover_rating_reduce_to_4_tt:0 "@warning_icon! Il tuo [lmf_lover_rating|E] con [lover.GetFirstNameNoTooltip] scenderà a #difficulty_hard Amore costante#!"
  lover_rating_reduce_to_3_tt:0 "@warning_icon! Il tuo [lmf_lover_rating|E] con [lover.GetFirstNameNoTooltip] scenderà a #difficulty_hard Amore#!"
  lover_rating_reduce_to_2_tt:0 "@warning_icon! Il tuo [lmf_lover_rating|E] con [lover.GetFirstNameNoTooltip] scenderà a #difficulty_hard Affetto#!"
  lover_rating_reduce_to_1_tt:0 "@warning_icon! Il tuo [lmf_lover_rating|E] con [lover.GetFirstNameNoTooltip] scenderà a #difficulty_hard Amore calante#!"
