  lmf_lover.101.t:0 "Il mattino viene"
  lmf_lover.101.desc.start:0 "Mi desto nelle mie stanze a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], dopo una notte trascorsa con [lover.GetFirstNameNoTooltip], e scorgo [lover.GetFirstNameNoTooltip] non lontano. [Select_CString(lover.IsFemale,'Lei','Lui')|U] fissa la finestra con un'espressione tormentata, cosa sorprendente, considerando quanto... fervorose fossero state le [Select_CString(lover.IsFemale,'sue','sue')] premure poco prima.\n\nCon qualche domanda gentile, apprendo la verità dietro la sua inquietudine.\n\n"
  lmf_lover.101.desc.soulmate:0 ""Ti adoro più di quanto possa esprimere, amor mio. È vero, eppure "
  lmf_lover.101.desc.lover:0 ""Non sono infelic[Select_CString(ROOT.Char.IsFemale,'e','e')] per il nostro... accordo, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]. Anzi. Eppure "
  lmf_lover.101.desc.samesex:0 "tu sei un[Select_CString(ROOT.Char.IsFemale,'a','')] [ROOT.Char.GetWomanMan], e lo sono anch'io. Che noi due stiamo insieme è proibito. "
  lmf_lover.101.desc.incest:0 "tu sei [Select_CString(lover.IsFemale,'la mia','il mio')] [lover.Custom2('LMF_RelationToMeShort', ROOT.Char )]. Che noi due stiamo insieme non è soltanto impossibile: è proibito. "
  lmf_lover.101.desc.lover.married:0 "Io sono un[Select_CString(lover.IsFemale,'a','')] [lover.GetWomanMan] sposat[Select_CString(lover.IsFemale,'a','o')]. Non riesco a smettere di pensare a [lover_spouse.GetFirstNameNoTooltip]. "
  lmf_lover.101.desc.married:0 "tu sei un[Select_CString(ROOT.Char.IsFemale,'a','')] [ROOT.Char.GetWomanMan] sposat[Select_CString(ROOT.Char.IsFemale,'a','o')], e non riesco a smettere di pensare a [my_spouse.GetTitledFirstNameNoTooltip]. "
  lmf_lover.101.desc.both.married:0 "siamo entrambi sposati. Non riesco a smettere di pensare a [lover_spouse.GetFirstNameNoTooltip] e a [my_spouse.GetTitledFirstNameNoTooltip]. "
  lmf_lover.101.desc.not.married:0 "noi non siamo marito e moglie. Io sono il tuo amante. "
  lmf_lover.101.desc.ruler:0 "tu sei [ROOT.Char.GetTitleAsNameNoTooltip|U] di [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], e io? Nessuno, al confronto. "
  lmf_lover.101.desc.nobility:0 "entrambi conosciamo la differenza tra le nostre condizioni. Io sono un semplice popolano, rispetto a te. "
  lmf_lover.101.desc.default:0 "eppure... "
  lmf_lover.101.desc.secret:0 "Se qualcuno dovesse scoprirci..."\n\n"
  lmf_lover.101.desc.public:0 "Il fatto che tutti già lo sappiano. Il modo in cui ci fissano..."\n\n"
  lmf_lover.101.desc.end:0 "Ho cercato di rassicurare [lover.GetFirstNameNoTooltip], senza successo. "Suppongo che abbia bisogno di sapere che cosa significhi," ha sospirato [Select_CString(lover.IsFemale,'lei','lui')]."
  lmf_lover.101.a:0 ""Farò qualunque cosa per renderti felice.""
  lmf_lover.101.b:0 ""Siamo qui per il nostro piacere.""
  lmf_lover.101.c:0 ""Tu e io siamo destinati a stare insieme.""
  lmf_lover.101.d:0 ""Bah! Perché dovrebbe significare qualcosa?""
  lmf_lover_promise_tt:0 "#italic [lover.GetFirstNameNoTooltip] lo prenderà come una promessa implicita d'un futuro più grande insieme #!"
  lmf_lover_no_promise_tt:0 "#italic [lover.GetFirstNameNoTooltip] lo prenderà come segno che la relazione, in fondo, non è una cosa seria #!"

  lmf_lover.102.t:0 "Nei giardini"
  lmf_lover.102.desc.start:0 "[lover.GetFirstNameNoTooltip] e io abbiamo appena terminato la nostra scappatella in un angolo remoto del giardino quando mi volto verso [lover.GetFirstNameNoTooltip]. Ammiro il corpo di [Select_CString(lover.IsFemale,'lei','lui')], col sudore che ancora si raffredda sulla pelle, e noto il sorriso divertito che mi rivolge non appena si accorge che lo sto guardando.\n\n"A che pensi ora, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]?" chiede [Select_CString(lover.IsFemale,'lei','lui')].\n\n"Mi domando dove conduca, ciò che abbiamo."\n\nQuesto fa ridere [lover.GetFirstNameNoTooltip]. "Perché deve condurre da qualche parte? "
  lmf_lover.102.desc.married:0 "Tu hai un[Select_CString(ROOT.Char.IsFemale,'a','')] [my_spouse.GetWifeHusband]. "
  lmf_lover.102.desc.theymarried:0 "Io ho un[Select_CString(lover.IsFemale,'a','')] [lover_spouse.GetWifeHusband]. "
  lmf_lover.102.desc.samesex:0 "Siamo due [ROOT.Char.GetWomenMen] che trovano piacere l'uno nell'altra. "
  lmf_lover.102.desc.incest:0 "Io sono [Select_CString(lover.IsFemale,'la tua','il tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))]. "
  lmf_lover.102.desc.end:0 "A dirla tutta, mi sorprende solo che tu volessi continuare oltre la nostra prima... notte insieme." [Select_CString(lover.IsFemale,'Lei','Lui')|U] alza un sopracciglio verso di me. "Se vuoi qualcosa di più per noi, ebbene... suppongo che spetti a te deciderlo, non è vero?""
  lmf_lover.102.a:0 ""Farò qualunque cosa per renderti felice.""
  lmf_lover.102.b:0 ""Hai ragione. Siamo qui per il nostro piacere.""
  lmf_lover.102.c:0 ""Tu e io siamo destinati a stare insieme, che tu ci creda o no.""
  lmf_lover.102.d:0 ""Hai ragione. Per me non significa nulla.""

  lmf_lover.103.t:0 "[Select_CString( lover.IsFemale, 'La mia', 'Il mio' )] [Select_CString( lover.IsFemale, 'splendida', 'aitante' )] [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
  lmf_lover.103.desc.start:0 "[lover.GetFirstNameNoTooltip] e io abbiamo appena terminato la nostra più recente scappatella e, distes[Select_CString(ROOT.Char.IsFemale,'a','o')] sul letto, mi volto verso [lover.GetFirstNameNoTooltip]. Ammiro il corpo di [Select_CString(lover.IsFemale,'lei','lui')], col sudore che ancora si raffredda sulla pelle, e noto il sorriso divertito che mi rivolge non appena si accorge che lo sto guardando.\n\n"A che pensi ora, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]?" chiede [Select_CString(lover.IsFemale,'lei','lui')].\n\n"Sei felice? Di questo?"\n\nLa domanda fa esitare [lover.GetFirstNameNoTooltip]. "Felice d'essere [ROOT.Char.GetTitledFirstNamePossessiveNoTooltip] "
  lmf_lover.103.desc.secret:0 "[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))] segret[Select_CString(lover.IsFemale,'a','o')], intendi? "
  lmf_lover.103.desc.public:0 "[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))], not[Select_CString(lover.IsFemale,'a','o')] a tutta la tua corte? "
  lmf_lover.103.desc.end:0 "Non c'è vergogna in ciò, e mi basta. Forse dovrei chiedere se #EMP tu#! sei felice, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]."\n\nNon sono certo di come rispondere alla mia stessa domanda, ma [Select_CString(lover.IsFemale,'lei','lui')] insiste. "Dove vedi andare questa cosa fra noi, se mai da qualche parte?""
  lmf_lover.103.a:0 ""Farò qualunque cosa per renderti felice.""
  lmf_lover.103.b:0 ""Siamo qui per il nostro piacere. A me basta.""
  lmf_lover.103.c:0 ""Tu e io siamo destinati a stare insieme.""
  lmf_lover.103.d:0 ""Non va da nessuna parte, e lo preferisco così.""

  lmf_lover.104.t:0 "Un'altra notte in [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]"
  lmf_lover.104.desc.start:0 "Le cose con [lover.GetFirstNameNoTooltip] sono state deliziose finora, come si conviene a un amore così nuovo. Proprio stanotte, per esempio, avevo fatto sgomberare la sala del trono di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per poter dar corso al mio scenario preferito, quello del cortigiano al cospetto del[Select_CString(ROOT.Char.IsFemale,'la','del')] [ROOT.Char.GetLadyLord], ed è stato tutto ciò che speravo.\n\nEppure, dopo, mentre il sudore sulla nostra pelle ancora si raffreddava, ho notato [lover.GetFirstNameNoTooltip] un poco... ritros[Select_CString(lover.IsFemale,'a','o')]. Rimorsi, forse? Stavo indulgendo ai miei desideri troppo spesso? Gliel'ho chiesto.\n\n"
  lmf_lover.104.desc.end:0 "Ho riso di quei pensieri. Non è la prima volta che odo simili parole, ma il mio divertimento ha turbato [lover.GetFirstNameNoTooltip] ancor di più. "Io semplicemente... ho bisogno di sapere che cosa sia," ha detto [Select_CString(lover.IsFemale,'lei','lui')]. "Se per te significa qualcosa, o se mi sto illudendo.""

  lmf_lover.105.t:0 "Ogni cosa buona deve finire"
  lmf_lover.105.desc:0 "Mi accorgo di non aver pensato a [lover.GetFirstNameNoTooltip] da molto tempo, e dubito che [Select_CString(lover.IsFemale,'lei','lui')] abbia pensato a me.\n\nLe ragioni sono molte, ma tutte irrilevanti di fronte alla verità: qualunque cosa [lover.GetFirstNameNoTooltip] e io avessimo, qualunque cosa condividessimo o provassimo, la nostra relazione è finita."
  lmf_lover.105.a:0 "Che peccato."

  lmf_lover.1000.t:0 "La beatitudine d'un'anima gemella"
  lmf_lover.1000.desc.army:0 "In un raro momento di quiete, oggi, quando l'esercito s'era ormai sistemato nell'accampamento, [lover.GetFirstNameNoTooltip] è venut[Select_CString(lover.IsFemale,'a','o')] a cercarmi.\n\n"
  lmf_lover.1000.desc.travel:0 "Ci eravamo sistemati nelle tende per la giornata, esausti quasi fino allo sfinimento, quando [lover.GetFirstNameNoTooltip] è venut[Select_CString(lover.IsFemale,'a','o')] a cercarmi.\n\n"
  lmf_lover.1000.desc.activity:0 "Mi sono concesso una pausa dal nostro fitto programma, nel pomeriggio, passeggiando nel cortile di [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], quando ho alzato lo sguardo e ho visto [lover.GetFirstNameNoTooltip] lì vicino.\n\n"
  lmf_lover.1000.desc.notlocal:0 "[lover.GetFirstNameNoTooltip] è venut[Select_CString(lover.IsFemale,'a','o')] a farmi visita a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] oggi, una piacevole sorpresa, a dir poco.\n\n"
  lmf_lover.1000.desc.local:0 "Passeggiavo nel cortile di [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] oggi, quasi perdut[Select_CString(ROOT.Char.IsFemale,'a','o')] nei miei pensieri, quando ho alzato lo sguardo e ho visto [lover.GetFirstNameNoTooltip] lì vicino.\n\n"
  lmf_lover.1000.desc.end:0 "Ho sorriso non appena l'ho scort[Select_CString(lover.IsFemale,'a','o')], e [Select_CString(lover.IsFemale,'lei','lui')] mi ha risposto allo stesso modo. Quasi senza una parola, ci siamo messi fianco a fianco e abbiamo camminato. Chiunque ci avesse notati avrebbe potuto credere senza colpa che fossimo soltanto buoni amici, ma naturalmente [lover.GetFirstNameNoTooltip] per me significa ben più di questo.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] ha ascoltato con attenzione mentre mi lagnavo dei miei vari problemi, offrendo poco in consiglio ma molto come sollievo per sfogarmi. A ogni mio pesante sospiro, [Select_CString(lover.IsFemale,'lei','lui')] rideva piano e, in qualche modo, io mi sentivo meglio.\n\nPrima ch'io me ne rendessi conto, erano passate ore, e tuttavia non ero ancora stanc[Select_CString(ROOT.Char.IsFemale,'a','o')] della sua compagnia. Questo, suppongo, è ciò che significa avere una vera anima gemella."
  lmf_lover.1000.a:0 "Non mi stancherò mai di questo."

  lmf_lover.1005.t:0 "La mia anima gemella [lover_trait.GetNameNoTooltip( ROOT.Char )|U]"
  lmf_lover.1005.desc.sinful:0 "È stato detto che, col passare degli anni, [lover.GetFirstNameNoTooltip] può aver su di me una cattiva influenza"
  lmf_lover.1005.desc.good:0 "È stato detto che, col passare degli anni, [lover.GetFirstNameNoTooltip] ha su di me una buona influenza"
  lmf_lover.1005.desc.normal:0 "È stato detto che, col passare degli anni, [lover.GetFirstNameNoTooltip] ha avuto una forte influenza su di me"
  lmf_lover.1005.desc.mid:0 "... e vi è del vero.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] è piuttosto [lover_trait.GetNameNoTooltip( ROOT.Char )|l], per esempio, "
  lmf_lover.1005.desc.opposite:0 "mentre io, al contrario, sono [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. È un punto dolente nel nostro legame, che si manifesta in piccole cose: sebbene [lover.GetFirstNameNoTooltip] non abbia mai tentato di cambiarmi, posso dire che [Select_CString(lover.IsFemale,'lei','lui')] disapprova.\n\n"
  lmf_lover.1005.desc.notopp:0 "e sebbene [lover.GetFirstNameNoTooltip] non abbia mai tentato di cambiarmi, sento comunque la sua influenza negli sguardi sottili e nei rari, piccoli segni di disappunto.\n\n"
  lmf_lover.1005.desc.end:0 "Spesso mi ritrovo a mutare il mio modo d'agire quando siamo insieme. Il nostro vincolo è tale che non mi pesa davvero, poiché diventare più simili pare naturale... ma è questo ciò che desidero? Diventare più [lover_trait.GetNameNoTooltip( ROOT.Char )|l], come [Select_CString(lover.IsFemale,'lei','lui')] è?\n\nSe tengo il punto, è ragionevole pensare che questo "
  lmf_lover.1005.desc.opposite2:0 "punto dolente possa crescere fino a divenire un vero problema. Eppure, non furono forse le nostre differenze ad avvicinarci, in primo luogo?"
  lmf_lover.1005.desc.notopp2:0 "possa crescere fino a divenire un vero punto dolente fra noi. O forse sto analizzando troppo ciò che, in verità, non dovrebbe essere un problema affatto?"
  lmf_lover.1005.a:0 "Che accada."
  lmf_lover.1005.b:0 "No, io sono ciò che sono, e questo non cambierà."
  lmf_lover.1005.b.tt:0 "Le vostre differenze crescono"

  lmf_lover.1010.t:0 "La mia influenza [lover_trait.GetNameNoTooltip( ROOT.Char )|U]"
  lmf_lover.1010.desc.sinful:0 "È stato suggerito che, nel corso ...her, io abbia avuto una cattiva influenza su [lover.GetFirstNameNoTooltip]"
  lmf_lover.1010.desc.good:0 "È stato suggerito che, nel corso ou...er, io abbia avuto una buona influenza su [lover.GetFirstNameNoTooltip]"
  lmf_lover.1010.desc.normal:0 "È stato suggerito che, nel corso ...r, io abbia avuto una forte influenza su [lover.GetFirstNameNoTooltip]"
  lmf_lover.1010.desc.mid:0 "... e c'è del vero in ciò...r [lover_trait.GetNameNoTooltip( ROOT.Char )|l], per esempio, "
  lmf_lover.1010.desc.opposite:0 "mentre [Select_CString(lover.IsFemale,'lei','lui')], al contrario, è [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. È un motivo di attrito nella nostra relazione, che si manifesta in piccoli modi: poiché, sebbene non abbia mai fatto alcuno sforzo per cambiar[Select_CString(lover.IsFemale,'la','lo')], [Select_CString(lover.IsFemale,'lei','lui')] capisce che disapprovo.\n\n"
  lmf_lover.1010.desc.notopp:0 "e sebbene non abbia mai fatto alcuno sforzo per cambiar[Select_CString(lover.IsFemale,'la','lo')], è chiaro che [Select_CString(lover.IsFemale,'lei','lui')] avverte l’influenza dei miei sguardi sottili e dei miei occasionali cipigli.\n\n"
  lmf_lover.1010.desc.end:0 "Sempre più, [lover.GetFirstNameNoTooltip] sta cambiando il modo in cui [Select_CString(lover.IsFemale,'lei','lui')] si comporta quando siamo insieme. Per compiacermi, credo, e per impedire che le nostre differenze diventino un motivo di attrito nella nostra relazione, benché io non chiederei mai a [Select_CString(lover.IsFemale,'lei','lui')] di farlo. Il nostro legame è tale che [Select_CString(lover.IsFemale,'lei','lui')] non si lamenta, e credo davvero che ciò stia causando un cambiamento più profondo... uno che, col tempo, potrà solo avvicinarci ancor di più."
  lmf_lover.1010.a:0 "Amo [Select_CString(lover.IsFemale,'lei','lui')] così tanto per questo."

  lmf_lover.1015.t:0 "Una fuga d’amore?"
  lmf_lover.1015.desc.start:0 "Avrei dovuto capire che [Select_CString(lover.IsFemale,'lei','lui')] avesse qualcosa in mente nel momento in cui [lover.GetFirstNameNoTooltip] è compars[Select_CString(lover.IsFemale,'a','o')] con quel sorriso stampato in volto.\n\n"Fuggiamo insieme", annunciò [Select_CString(lover.IsFemale,'lei','lui')], con assoluta certezza.\n\n"
  lmf_lover.1015.desc.bold:0 "[lover.GetFirstNameNoTooltip] è sempre stat[Select_CString(lover.IsFemale,'a','o')] audace, ma questa era tutt’altra cosa.\n\n"
  lmf_lover.1015.desc.irrational:0 "[lover.GetFirstNameNoTooltip] è sempre stat[Select_CString(lover.IsFemale,'a','o')] un po’ irrazionale, a dire il vero, ma questo era di tutt’altro livello.\n\nCominciai a spiegare i vari problemi del piano di [Select_CString(lover.IsFemale,'lei','lui')]"
  lmf_lover.1015.desc.married:0 ", a cominciare da [Select_CString(my_spouse.IsFemale,'mia','mio')] [my_spouse.GetWifeHusband], ma [Select_CString(lover.IsFemale,'lei','lui')] mi fermò. "È [my_spouse.Custom('IT_NAM_COL3')][my_spouse.GetTitledFirstNameNoTooltip] la tua anima gemella? No? Allora non c’è altro di cui discutere, vero?"\n\n"
  lmf_lover.1015.desc.them.married:0 ", a cominciare da [Select_CString(lover.IsFemale,'la sua','il suo')] [lover_spouse.GetWifeHusband], ma [Select_CString(lover.IsFemale,'lei','lui')] mi fermò. "È [lover_spouse.Custom('IT_NAM_COL3')][lover_spouse.GetTitledFirstNameNoTooltip] la mia anima gemella? No? Allora non c’è altro di cui discutere, vero?"\n\n"
  lmf_lover.1015.desc.liege:0 ", a cominciare dal fatto che il signore di [Select_CString(lover.IsFemale,'lei','lui')] si opporrebbe senza dubbio a un simile piano, ma [Select_CString(lover.IsFemale,'lei','lui')] mi fermò. "È [lover.GetLiege.Custom('IT_NAM_COL3')][lover.GetLiege.GetTitledFirstNameNoTooltip] la mia anima gemella? No? Allora non c’è altro di cui discutere, vero?"\n\n"
  lmf_lover.1015.desc.default:0 ", ma [Select_CString(lover.IsFemale,'lei','lui')] mi fermò. "Io sono la tua anima gemella. C’è davvero altro di cui discutere?"\n\n"
  lmf_lover.1015.desc.end:0 "Non ebbi una risposta pronta. "
  lmf_lover.1015.desc.end.happy:0 ""Quando ci innamorammo per la prima volta, dicesti che avresti fatto qualunque cosa per rendermi felice", mi ricordò [Select_CString(lover.IsFemale,'lei','lui')]. "#EMP Questo#! mi renderebbe felice.""
  lmf_lover.1015.desc.end.meant:0 ""Quando ci innamorammo per la prima volta, dicesti che eravamo destinati a stare insieme", mi ricordò [Select_CString(lover.IsFemale,'lei','lui')]. "Allora stiamo insieme.""
  lmf_lover.1015.desc.end.now:0 ""Forse non abbiamo iniziato questa relazione pensando di arrivare fin qui", mi ricordò [Select_CString(lover.IsFemale,'lei','lui')], "ma eccoci qui! Dunque, siamo felici.""
  lmf_lover.1015.a:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] ha un punto eccellente."
  lmf_lover.1015.b:0 "Questo non accadrà."

  lmf_lover.1020.t:0 "Da tempo atteso"
  lmf_lover.1020.desc.army:0 "[lover.GetFirstNameNoTooltip] si unì a me presso il fuoco a tarda sera, quando i soldati erano già rientrati nelle tende e finalmente tutto era quieto.\n\n"
  lmf_lover.1020.desc.travel:0 "[lover.GetFirstNameNoTooltip] si unì a me presso il fuoco oggi, a tarda sera, dopo che la maggior parte del nostro seguito si era ritirata da tempo.\n\n"
  lmf_lover.1020.desc.activity:0 "Quando i frenetici eventi della giornata volsero al termine, [lover.GetFirstNameNoTooltip] mi trovò in giardino.\n\n"
  lmf_lover.1020.desc.notlocal:0 "Mentre passeggiavo in giardino questo...ntLocation.GetNameNoTooltip] solo per trascorrere la giornata con me.\n\n"
  lmf_lover.1020.desc.local:0 "Mentre passeggiavo in giardino questo p... mi fu fatt[Select_CString(lover.IsFemale,'a','o')] incontro e raggiunt[Select_CString(lover.IsFemale,'a','o')] da [lover.GetFirstNameNoTooltip].\n\n"
  lmf_lover.1020.desc.desc:0 "Devo ammetterlo: fui liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di veder[Select_CString(lover.IsFemale,'la','lo')]. Ci fu un tempo in cui consideravo [Select_CString(lover.IsFemale,'lei','lui')] soltanto un amante, ma all’inizio le dissi che la nostra relazione era speciale, e si è rivelato non essere una menzogna: è davvero cresciuta fino a diventare qualcosa di più.\n\nParlammo per ore, e alla fine l’argomento della nostra relazione venne affrontato. [lover.GetFirstNameNoTooltip] esitò, ma mi chiesi se fosse giunto il momento di scoprire se noi due fossimo davvero diventati anime gemelle."
  lmf_lover.1020.a:0 "Convincerò [Select_CString(lover.IsFemale,'lei','lui')] che il nostro amore è vero!"
  lmf_lover.1020.a.success.tt:0 "[lover.GetFirstNameNoTooltip] ne è convint[Select_CString(lover.IsFemale,'a','o')]"
  lmf_lover.1020.a.failure.tt:0 "[lover.GetFirstNameNoTooltip] non è pront[Select_CString(lover.IsFemale,'a','o')] per questo passo"
  lmf_lover.1020.b:0 "No, è meglio lasciare le cose come sono."

  lmf_lover.1025.t:0 "Sussurri tra i guanciali"
  lmf_lover.1025.desc.courtier.other:0 "Avrei dovuto capire che c’era qualcosa sotto nel momento in cui [lover.GetFirstNameNoTooltip] arrivò da [lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] per trascorrere la serata. "
  lmf_lover.1025.desc.courtier:0 "Avrei dovuto capire che c’era qualcosa sotto nel momento in cui [lover.GetFirstNameNoTooltip] arrivò nei miei appartamenti per trascorrere la serata. "
  lmf_lover.1025.desc:0 "Il [lover.GetWomanMan] aveva una scintilla negli occhi che parlava di malizia.\n\n"Ho qualcosa da dirti, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]", disse [Select_CString(lover.IsFemale,'lei','lui')].\n\n"Oh?" Feci del mio meglio per fingere indifferenza, benché non fosse vero.\n\n"È un segreto che ho origliato a corte oggi, e ho pensato che potesse interessarti...""
  lmf_lover.1025.a:0 ""Che acume, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('lover'))]!""

  lmf_lover.1030.t:0 "[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U] di grande talento"
  lmf_lover.1030.desc.start:0 "A volte è facile dimenticare qua...ento sia davvero [lover.GetFirstNameNoTooltip].\n\n"
  lmf_lover.1030.desc.diplomacy:0 "Eppure, di recente, [Select_CString(lover.IsFemale,'lei','lui')] mi è stat[Select_CString(lover.IsFemale,'a','o')] di grande aiuto: resta a letto ad ascoltare mentre compongo la corrispondenza con gli altri sovrani, e poi offre i consigli più perspicaci su come rivedere le mie parole.\n\n"
  lmf_lover.1030.desc.martial:0 "Eppure, proprio l’altro giorno, [lover...documenti sulla mia scrivania che entravano in noiosi dettagli sui rifornimenti delle nostre leve, e offrì alcuni suggerimenti di miglioramento sorprendentemente utili.\n\n"
  lmf_lover.1030.desc.stewardship:0 "Eppure, proprio l’altro giorno, m...re eravamo a letto e io mi lamentavo senza fine degli accordi fiscali con i miei vassalli, [Select_CString(lover.IsFemale,'lei','lui')] buttò lì qualche suggerimento che ha migliorato quegli accordi in modo considerevole.\n\n"
  lmf_lover.1030.desc.intrigue:0 "[Select_CString(lover.IsFemale,'I suoi','I suoi')|U] occhi sono sempre vigili, pronti a indicarmi certe mancanze nella mia guardia personale e quali intrighi di corte dovrei tenere d’occhio, e come.\n\n"
  lmf_lover.1030.desc.learning:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] mostra grande interesse per le mie divagazioni sulle ultime ossessioni, e talvolta offre anche utili indicazioni, tratte dal bagaglio di conoscenze di [Select_CString(lover.IsFemale,'lei','lui')].\n\n"
  lmf_lover.1030.desc.end:0 "All’inizio ero resti[Select_CString(ROOT.Char.IsFemale,'a','o')] ad accettare il suo aiuto, temendo potesse essere inappropriato, ma sempre più ho deciso che è semplicemente prudente accettare l’assistenza di un cortigiano che ha così chiaramente a cuore i miei interessi."
  lmf_lover.1030.a:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è straordinari[Select_CString(lover.IsFemale,'a','o')], non è vero?"

  lmf_lover.1035.t:0 "Un piccolo dono"
  lmf_lover.1035.desc.ruler:0 "Mi parve alquanto curioso quando mi dissero che un messaggero era giunto da [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], così scesi nel cortile per incontrarl[Select_CString(lover.IsFemale,'a','o')].\n\n"
  lmf_lover.1035.desc.notlocation:0 "Mi parve alquanto curioso quando mi dissero che un messaggero era giunto da [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], così scesi nel cortile per incontrarl[Select_CString(lover.IsFemale,'a','o')].\n\n"
  lmf_lover.1035.desc.location:0 "Mi parve alquanto curioso quando mi dissero che [lover.GetFirstNameNoTooltip] era giunt[Select_CString(lover.IsFemale,'a','o')] nel cortile per vedermi. Tanta formalità? Che bizzarria. Scesi subito per incontrar[Select_CString(lover.IsFemale,'la','lo')].\n\n"
  lmf_lover.1035.desc.courtier:0 "Stavo attraversando il cortile del [ROOT.Char.Custom('FortifiedBuilding')] quando scorsi [lover.Custom('IT_NAM_COL3')][lover.GetTitledFirstNameNoTooltip] lì, che sorrideva come un[lover.GetWomanMan] fuori di senno. Che... inatteso. E così, naturalmente, mi avvicinai per parlar[Select_CString(lover.IsFemale,'le','gli')] subito.\n\n"
  lmf_lover.1035.desc.messenger:0 "Il "messaggio" era un sacchetto di gemme preziose, accompagnato da un semplice biglietto:\n\n"#EMP Non brilleranno mai quanto te — un piccolo dono, da chi ti ama.#!"\n\nIl biglietto non era firmato, ma so esattamente da chi proviene."
  lmf_lover.1035.desc.inperson:0 ""Ho un piccolo dono per te", disse [Select_CString(lover.IsFemale,'lei','lui')]. Con ciò, mi porse un piccolo sacchetto colmo di gemme preziose.\n\nStavo per obiettare alla generosità inutile di [Select_CString(lover.IsFemale,'lei','lui')], ma [lover.GetFirstNameNoTooltip] mi zittì prima ancora che potessi parlare. [Select_CString(lover.IsFemale,'Lei','Lui')|U] mi conosce fin troppo bene.\n\n"Hai significato tanto per me, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]. Ti prego, accettalo nello spirito con cui è stato offerto." E, con ciò, [Select_CString(lover.IsFemale,'lei','lui')] si congedò prima che avessi occasione di rispondere."
  lmf_lover.1035.a:0 "Quanto è premuros[Select_CString(lover.IsFemale,'a','o')] [Select_CString(lover.IsFemale,'lei','lui')]."

  lmf_lover.1036.t:0 "Un[Select_CString(lover.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|U] nel bisogno"
lmf_lover.1036.desc.start: 0 "Ho ricevuto notizie da [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] e, ultimamente, le cose... non stanno andando bene per [lover.GetFirstNameNoTooltip].\n\nDa quel che ho compreso, [Select_CString(lover.IsFemale,'lei è','lui è')] sommers[Select_CString(lover.IsFemale,'a','o')] dai debiti, e naturalmente [Select_CString(lover.IsFemale,'lei è','lui è')] fin troppo "
  lmf_lover.1036.desc.proud:0 "orgoglios[Select_CString(lover.IsFemale,'a','o')] "
  lmf_lover.1036.desc.stubborn:0 "testard[Select_CString(lover.IsFemale,'a','o')] "
  lmf_lover.1036.desc.humble:0 "umil[Select_CString(lover.IsFemale,'e','e')] "
  lmf_lover.1036.desc.shy:0 "timid[Select_CString(lover.IsFemale,'a','o')] "
  lmf_lover.1036.desc.paranoid:0 "paranoid[Select_CString(lover.IsFemale,'e','e')] "
  lmf_lover.1036.desc.craven:0 "spaventat[Select_CString(lover.IsFemale,'a','o')] "
  lmf_lover.1036.desc.content:0 "riluttant[Select_CString(lover.IsFemale,'e','e')] "
  lmf_lover.1036.desc.end:0 "a #EMP chiedere#! davvero il mio aiu...e. Una parte di me si chiede, però, se non sia proprio ciò che [lover.GetFirstNameNoTooltip] si aspetta in silenzio e se [Select_CString(lover.IsFemale,'lei','lui')] non resterebbe delus[Select_CString(lover.IsFemale,'a','o')] o perfino contrari[Select_CString(lover.IsFemale,'a','o')] se io restassi a guardare senza fare nulla."
  lmf_lover.1036.a:0 "Naturalmente [Select_CString(lover.IsFemale,'la','lo')] aiuterò!"
  lmf_lover.1036.b:0 "[lover.GetFirstNameNoTooltip] deve cavarsela da sol[Select_CString(lover.IsFemale,'a','o')]."
  lmf_lover.1036.b.tt:0 "[lover.GetFirstNameNoTooltip] si aspettava il tuo aiuto..."

  lmf_lover.1040.t:0 "Un po’ di consiglio"
  lmf_lover.1040.desc.start:0 "Non appena [lover.GetFirstNameNoTooltip] giunse da [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] oggi, capii che [Select_CString(lover.IsFemale,'lei','lui')] aveva qualcosa per la testa.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] era così pres[Select_CString(lover.IsFemale,'a','o')], le sopracciglia aggrottate per lo stress e la preoccupazione. Cominciai a capire che non era venut[Select_CString(lover.IsFemale,'a','o')] per trascorrere la giornata con me, bensì per chiedere consiglio.\n\n"C’è qualcosa che non va, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('lover'))]?" chiesi infine.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] sospirò pesantemente. "So che hai già le tue preoccupazioni nel governare [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], ma ho bisogno del tuo aiuto "
  lmf_lover.1040.desc.diplomacy:0 "per una delicata questione di diplomazia, "
  lmf_lover.1040.desc.martial:0 "per una questione di strategia, "
  lmf_lover.1040.desc.stewardship:0 "nel trattare con uno dei miei vassalli riguardo al suo contratto, "
  lmf_lover.1040.desc.intrigue:0 "per un affare urgente che richiede la massima discrezione, "
  lmf_lover.1040.desc.end:0 "un campo in cui tu sei assai più espert[Select_CString(ROOT.Char.IsFemale,'a','o')] di me. Ti prego... temo d’essere piuttosto disperat[Select_CString(lover.IsFemale,'a','o')].""
  lmf_lover.1040.a:0 ""Farò del mio meglio, qualunque cosa tu chieda.""
  lmf_lover.1040.a.success:0 "Il tuo aiuto riesce e compiace [Select_CString(lover.IsFemale,'lei','lui')]"
  lmf_lover.1040.a.fail.angry:0 "Il tuo aiuto si ritorce contro e [Select_CString(lover.IsFemale,'lei','lui')] è furios[Select_CString(lover.IsFemale,'a','o')]"
  lmf_lover.1040.a.fail.disappointed:0 "Il tuo aiuto si ritorce contro, ma [Select_CString(lover.IsFemale,'lei','lui')] ti perdona"
  lmf_lover.1040.b:0 "Svicolare con vaghe banalità e schermaglie."
  lmf_lover.1040.b.success:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] accetta che tu non possa aiutare"
  lmf_lover.1040.b.fail:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] vede oltre il tuo inganno"

  lmf_lover.1045.t:0 "Il consiglio del mio [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
  lmf_lover.1045.desc.start:0 "Talvolta mi riesce facile dimenticare quanto [lover.GetFirstNameNoTooltip] sia un[Select_CString(lover.IsFemale,'a','o')] [lover.GetWomanMan] abil[Select_CString(lover.IsFemale,'e','e')] e intelligent[Select_CString(lover.IsFemale,'e','e')].\n\nOggi passeggiavamo nei giardini di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] quando [Select_CString(lover.IsFemale,'lei','lui')] "
  lmf_lover.1045.desc.diplomacy:0 "ha iniziato a parlare di alcuni recenti problemi che stavo avendo con un vassallo, e di come potrei risolverli pacificamente.\n\n"
  lmf_lover.1045.desc.martial:0 "ha parlato di alcuni problemi di rifornimento che avevo menzionato riguardo agli uomini d'arme, e mi ha fornito diverse opzioni su come potrei risolverli.\n\n"
  lmf_lover.1045.desc.stewardship:0 "ha parlato di una disputa fiscale che avevo detto di avere con i miei vassalli, dapprima con riluttanza e poi con maggiore convinzione. In effetti, [Select_CString(lover.IsFemale,'lei','lui')] mi ha indicato un modo per aggirarla del tutto.\n\n"
  lmf_lover.1045.desc.intrigue:0 "ha parlato della sicurezza del [ROOT.Char.Custom('FortifiedBuilding')], o piuttosto della sua mancanza. Dei modi in cui potrebbe essere violata. Non come sorta di minaccia, ma per genuina preoccupazione per il mio benessere.\n\n"
  lmf_lover.1045.desc.learning:0 "ha parlato a lungo di come potrei sostenere le biblioteche in [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], e di come ciò potrebbe favorire un maggiore sviluppo in tutto il mio regno.\n\n"
  lmf_lover.1045.desc.end:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] ha proseguito per gran parte del pomeriggio e io ho ascoltato con fascinazione. I [Select_CString(lover.IsFemale,'suoi','suoi')|U] consigli potrebbero rivelarsi davvero utili, se [Select_CString(lover.IsFemale,'lei','lui')] fosse dispost[Select_CString(lover.IsFemale,'a','o')] a continuare a dispensarli."
  lmf_lover.1045.a:0 "Lo apprezzo molto!"

  lmf_lover.1050.t:0 "In mio soccorso"
  lmf_lover.1050.desc.start:0 "La mia malattia mi tiene a letto, tra tosse e spossatezza, e così, quando sento qualcuno entrare nelle mie stanze, ordino annebbiat[Select_CString(ROOT.Char.IsFemale,'a','o')] che se ne vada seduta stante.\n\n"Sciocchezze, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]. "
  lmf_lover.1050.desc.ruler:0 "Sono partit[Select_CString(lover.IsFemale,'a','o')] da [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] non appena ho saputo che eri malat[Select_CString(ROOT.Char.IsFemale,'a','o')]." "
  lmf_lover.1050.desc.location:0 "Non ti lascerò qui a consumarti, quando sono perfettamente in grado di prendermi cura di te." "
  lmf_lover.1050.desc.notlocation:0 "Sono partit[Select_CString(lover.IsFemale,'a','o')] da [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] non appena ho saputo che eri malat[Select_CString(ROOT.Char.IsFemale,'a','o')]." "
  lmf_lover.1050.desc.mid:0 "[lover.GetFirstNameNoTooltip] irrompe, lasciandomi ben poca scelta, e prende immediatamente in mano la mia cura.\n\n"M-ma prenderai questa malattia di certo!" obietto fra un accesso di tosse e l'altro.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] scrolla le spalle. "Se [lover.GetFaith.HighGodName] lo vuole, così sia."\n\n"
  lmf_lover.1050.desc.secret:0 "Sono quasi troppo debole per protestare, ma mi sovviene che sarà incredibilmente arduo per [lover.GetFirstNameNoTooltip] convincere i servi che le [Select_CString(lover.IsFemale,'sue','sue')] premure siano del tutto innocenti. [Select_CString(lover.IsFemale,'Lei','Lui')|U] avrà buone intenzioni, ma questa faccenda potrebbe ben rivelare il nostro segreto!"
  lmf_lover.1050.desc.public:0 "Sono quasi troppo debole per protestare, e a che gioverebbe? Tutti già conoscono [lover.GetFirstNameNoTooltip] e la nostra relazione... e [Select_CString(lover.IsFemale,'lei','lui')] non pare incline ad accettare un rifiuto."
  lmf_lover.1050.a:0 "Sottomettiti alle [Select_CString(lover.IsFemale,'sue','sue')] cure."
  lmf_lover.1050.a.success:0 "[lover.GetFirstNameNoTooltip] riesce a evitare sospetti"
  lmf_lover.1050.a.fail:0 "La devozione di [lover.GetFirstNamePossessiveNoTooltip] rivela la verità"
  lmf_lover.1050.b:0 "Manda[Select_CString(lover.IsFemale,'la','lo')] via seduta stante! Nessuna obiezione!"

  lmf_lover.1055.t:0 "Lapsus"
lmf_lover.1055.desc: 0 "Non intendevo dirlo.\n\nChiamatelo "parlare tra le lenzuola", chiamatelo imprudenza o persino stupidità. Una sera io e [lover.GetFirstNameNoTooltip] stavamo chiacchierando, come facciamo spesso, e dissi molto più di quanto avessi voluto.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')] finse di non comprendermi, all'inizio, ma io vidi la comprensione nei [Select_CString(lover.IsFemale,'suoi occhi','suoi occhi')]. [Select_CString(lover.IsFemale,'Lei','Lui')] sa."
  lmf_lover.1055.a:0 "Ormai non c'è più nulla da fare..."
  lmf_lover.1055.b:0 "Prometti[Select_CString(lover.IsFemale,'le','gli')] qualunque cosa in cambio del [Select_CString(lover.IsFemale,'suo','suo')] silenzio."
  lmf_lover.1055.c:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] non potrà dirlo a nessuno dall'interno di una cella!"
  lover_promise_to_keep_secret:0 "[lover.GetFirstNameNoTooltip] promette di non rivelare il [secret|E]"
  lover_jailed_to_keep_secret:0 "Hai estorto una promessa forzata a [lover.GetFirstNameNoTooltip] perché non riveli il [secret|E]"

  lmf_lover.1060.t:0 "Lapsus del[Select_CString(lover.IsFemale,'la','lo')] [Select_CString(lover.IsFemale,'sua','suo')] lingua"
  lmf_lover.1060.desc:0 "È chiaro che [lover.GetFirstNameNoTooltip] non intendeva dirlo.\n\nChiamalo "parole da cuscino", chiamalo leggerezza, o persino stupidità. Una sera io e [lover.GetFirstNameNoTooltip] stavamo chiacchierando e [Select_CString(lover.IsFemale,'lei','lui')] ha lasciato trapelare qualcosa che davvero non avrebbe dovuto.\n\nIl modo in cui [Select_CString(lover.IsFemale,'lei','lui')] si è irrigidit[Select_CString(lover.IsFemale,'a','o')] all'istante mi ha detto che [Select_CString(lover.IsFemale,'lei','lui')] sapeva esattamente ciò che aveva appena detto... e sapeva che anch'io lo sapevo. Anche se faccio ancora fatica a crederci."
  lmf_lover.1060.a:0 "Ebbene, è stato inatteso."

  lmf_lover.1065.t:0 "La proposta"
  lmf_lover.1065.desc.start:0 ""Perché non siamo sposati?"\n\n[lover.GetFirstNameNoTooltip] me l'ha chiesto oggi mentre eravamo entrambi a letto, con il [Select_CString(lover.IsFemale,'suo','suo')] volto teso dalla costernazione.\n\n"
  lmf_lover.1065.desc.secret:0 "Ho ricordato a [Select_CString(lover.IsFemale,'lei','lui')] che la nostra relazione era segreta, e [Select_CString(lover.IsFemale,'lei','lui')] mi ha rammentato che non importerebbe più, se fossimo sposati.\n\n"
  lmf_lover.1065.desc.public:0 "Ho esitato, e [Select_CString(lover.IsFemale,'lei','lui')] mi ha ricordato che tutti già conoscevano la nostra relazione. Se fossimo sposati, alla fine se ne dimenticherebbero e gli sguardi cesserebbero.\n\n"
  lmf_lover.1065.desc.happy:0 ""Mi dicesti, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], anni fa, quando tutto ebbe inizio, che avresti fatto qualunque cosa per rendermi felice. Ebbene, questo lo farebbe." "
  lmf_lover.1065.desc.meant:0 ""Mi dicesti, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], anni fa, quando tutto ebbe inizio, che eravamo destinati a stare insieme. Dunque stiamo insieme. Sul serio." "
  lmf_lover.1065.desc.now:0 ""Forse non era nei pensieri di nessuno dei due, anni fa, quando tutto ebbe inizio, ma [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]... ora siamo qui." "
  lmf_lover.1065.desc.end:0 "Ho capito che [Select_CString(lover.IsFemale,'lei','lui')] era determinat[Select_CString(lover.IsFemale,'a','o')]."
  lmf_lover.1065.a:0 "Sono d'accordo. Facciamolo!"
  lmf_lover.1065.b:0 "No, non è semplicemente possibile."

  lmf_lover.1070.t:0 "È giunto il tempo?"
  lmf_lover.1070.desc.start:0 "Oggi, mentre io e [lover.GetFirstNameNoTooltip] eravamo a letto, si è parlato di matrimonio.\n\nNon per volontà di [Select_CString(lover.IsFemale,'lei','lui')], poiché spesso ha detto che non le interessa l'idea di sposarsi. È stata una mia iniziativa.\n\n"
  lmf_lover.1070.desc.happy:0 "Ho ricordato a [Select_CString(lover.IsFemale,'lei','lui')] che, anni fa quando tutto ebbe inizio, dissi che avrei fatto qualunque cosa per render[Select_CString(lover.IsFemale,'la','lo')] felice. "
  lmf_lover.1070.desc.meant:0 "Ho ricordato a [Select_CString(lover.IsFemale,'lei','lui')] che, anni fa quando tutto ebbe inizio, dissi che eravamo destinati a stare insieme. "
  lmf_lover.1070.desc.now:0 "Ho ricordato a [Select_CString(lover.IsFemale,'lei','lui')] che, anni fa quando tutto ebbe inizio, nessuno dei due pensava che fosse una cosa seria... ma le cose sono cambiate. "
  lmf_lover.1070.desc.secret:0 "Inoltre, ciò significherebbe la fine del doverci nascondere e del mantenere la nostra relazione segreta.\n\n"
  lmf_lover.1070.desc.public:0 "Inoltre, tutti già conoscevano la nostra relazione. Ciò significherebbe la fine dei sussurri e degli sguardi che so che [Select_CString(lover.IsFemale,'lei','lui')] riceve.\n\n"
  lmf_lover.1070.desc.end:0 "[lover.GetFirstNameNoTooltip] ha considerato l'idea. Ho capito che, se insistessi, la [Select_CString(lover.IsFemale,'sua','sua')] riluttanza si consumerebbe. Se non lo facessi, allora pareva improbabile che l'argomento sarebbe mai tornato a galla."
  lmf_lover.1070.a:0 "Insisti. Sposiamoci!"
  lmf_lover.1070.b:0 "Lascia morire qui e ora l'argomento."

  lmf_lover.1075.t:0 "Un arrivo a corte"
  lmf_lover.1075.desc.start:0 ""Che cosa ci fa #EMP [Select_CString(lover.IsFemale,'lei','lui')]#! qui?"\n\nHo udito i sussurri dei miei cortigiani e, quando ho alzato lo sguardo, eccolo: [lover.GetFirstNameNoTooltip] avanzava con passo sicuro nella mia sala del trono, come se ne fosse il padrone. [Select_CString(lover.IsFemale,'Lei','Lui')|U], "
  lmf_lover.1075.desc.known:0 "il mio amante noto e l'argomento di ogni sussurro scandaloso in [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\n"
  lmf_lover.1075.desc.lowborn:0 "un[Select_CString(lover.IsFemale,'a','o')] popolano e dunque del tutto fuori posto.\n\n"
  lmf_lover.1075.desc.courtier.realm:0 "[lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip] [lover.GetLiege.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))] e senza motivo d'essere qui.\n\n"
  lmf_lover.1075.desc.courtier.foreign:0 "un[Select_CString(lover.IsFemale,'a','o')] [lover.GetWomanMan] di [lover.GetLiege.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] e senza motivo d'essere qui.\n\n"
  lmf_lover.1075.desc.culture:0 "un[Select_CString(lover.IsFemale,'a','o')] [lover.GetCulture.GetNameNoTooltip] [lover.GetWomanMan] e senza motivo d'essere qui.\n\n"
  lmf_lover.1075.desc.religion:0 "un seguace di [lover.GetFaith.GetNameNoTooltip] e senza motivo d'essere qui.\n\n"
  lmf_lover.1075.desc.default:0 "un[Select_CString(lover.IsFemale,'a','o')] [lover.GetWomanMan] senza signore, senza corte e senza alcuna ragione al mondo d'essere qui.\n\n"
  lmf_lover.1075.desc.mid:0 "Che cosa sperasse di ottenere [Select_CString(lover.IsFemale,'lei','lui')], non saprei immaginarlo. "
  lmf_lover.1075.desc.secret:0 "Peggio ancora, con i sussurri già iniziati, sarebbe incredibilmente difficile spiegare la [Select_CString(lover.IsFemale,'sua','sua')] presenza senza una storia preparata in anticipo.\n\n"
  lmf_lover.1075.desc.public:0 "Forse [Select_CString(lover.IsFemale,'lei','lui')] voleva fissare coloro che sanno esattamente chi [Select_CString(lover.IsFemale,'lei','lui')] sia per me: i pettegoli e gli spargitori di voci, anche se ciò li inciterebbe soltanto ancor più.\n\n"
  lmf_lover.1075.desc.end:0 "La cosa prudente sarebbe far[Select_CString(lover.IsFemale,'la','lo')] allontanare in silenzio. Conoscendo [lover.GetFirstNameNoTooltip], tuttavia, [Select_CString(lover.IsFemale,'lei','lui')] ne sarebbe più che un poco scontent[Select_CString(lover.IsFemale,'a','o')]."
  lmf_lover.1075.a:0 "Lascia che [lover.GetFirstNameNoTooltip] resti e si diverta."
  lmf_lover.1075.a.success:0 "Riesci a spiegare la presenza di [lover.GetFirstNamePossessiveNoTooltip]"
  lmf_lover.1075.a.fail:0 "Balbetti nel tentativo di spiegazione"
  lmf_lover.1075.b:0 "No, è inappropriato. Fall[Select_CString(lover.IsFemale,'a','o')] allontanare."

lmf_lover.1080.opening: 0 "Amore mio,"
  lmf_lover.1080.desc.start:0 "Dicono che la distanza renda il cuore più affezionato. A quanto pare è vero, perché il mio cuore è davvero assai affezionato a te.\n\nMi dicono che "
  lmf_lover.1080.desc.army:0 "il tuo esercito sia accampato lontano, da qualche parte in "
  lmf_lover.1080.desc.travel:0 "i tuoi viaggi ti abbiano condotto lontano, fino a "
  lmf_lover.1080.desc.event:0 "tu sia ora lontano, in "
  lmf_lover.1080.desc.end:0 "[my_camp.GetNameNoTierNoTooltip], e se è così spero che questa lettera ti raggiunga e ti trovi di buon animo e in buona salute. Ti terrò nei miei pensieri finché non farai ritorno a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
  lmf_lover.1080.a:0 "Spero di riveder[Select_CString(lover.IsFemale,'la','lo')] presto."

  lmf_lover.1085.t:0 "Il mio ambizioso [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
lmf_lover.1085.desc.start: 0 "Capivo che qualcosa turbava [lover.GetFirstNamePossessiveNoTooltip] e, infatti, proprio mentre ci stavamo spogliando nelle mie stanze, [Select_CString(lover.IsFemale,'lei','lui')] si fermò.\n\n""Voglio rendermi utile,"" disse [Select_CString(lover.IsFemale,'lei','lui')]. ""Vivo alla tua corte,"" disse [lover.GetFirstNameNoTooltip] con tono eloquente, ""ma non ho nulla da fare. Nessuno scopo, se non servirti."" "
  lmf_lover.1085.desc.target:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] ha preso un respiro profondo. "Voglio essere il tuo [lover.Custom('GetTargetCourtPosition')]."\n\nSono rimast[Select_CString(ROOT.Char.IsFemale,'a','o')] sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')], lo ammetto. "Oh, tutto qui?"\n\n"Sono ser[Select_CString(lover.IsFemale,'ia','io')]! "
  lmf_lover.1085.desc.bodyguard:0 "Chi potrebbe proteggerti meglio di chi ti sta al fianco notte e giorno? "
  lmf_lover.1085.desc.lady:0 "Pensaci! Ti assisterei notte e giorno, e nessuno potrebbe aver da ridire! "
  lmf_lover.1085.desc.oldholder:0 "Ti servirei con ben maggiore lealtà di quanto abbia mai fatt[Select_CString(old_holder.IsFemale,'a','o')] [old_holder.Custom('IT_NAM_COL2')][old_holder.GetTitledFirstNameNoTooltip]! "
  lmf_lover.1085.desc.noholder:0 "Il posto è ancora vacante, non è vero? "
  lmf_lover.1085.desc.backup:0 "Se non altro... o forse potrei essere il tuo [lover.Custom('GetBackupCourtPosition')]? "
  lmf_lover.1085.desc.onlybackup:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] ha preso un respiro profondo. "Voglio essere il tuo [lover.Custom('GetBackupCourtPosition')]."\n\nSono rimast[Select_CString(ROOT.Char.IsFemale,'a','o')] sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')], lo ammetto. "Oh, tutto qui?"\n\n"Sono ser[Select_CString(lover.IsFemale,'ia','io')]! "
  lmf_lover.1085.desc.nothing:0 "Ho chiesto #EMP come#! potesse servirmi, ma non ha saputo che rispondere. ""
  lmf_lover.1085.desc.end:0 "Ti prego, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], voglio fare #EMP qualcosa#!!"\n\nCapivo che [Select_CString(lover.IsFemale,'lei','lui')] non avrebbe lasciato cadere la cosa e che la serata non sarebbe proseguita finché non avessi risposto."
  lmf_lover.1085.a:0 ""Benissimo, puoi essere il mio [lover.Custom('GetTargetCourtPosition')].""
  lmf_lover.1085.b:0 ""Benissimo. [old_holder.Custom('IT_NAM_COL3')][old_holder.GetTitledFirstNameNoTooltip] si farà da parte per te.""
  lmf_lover.1085.a.lady_in_waiting_soulmate:0 ""Che coppia saremo!""
  lmf_lover.1085.a.lady_in_waiting_lover:0 ""Ehm, sì, puoi assistermi.""
  lmf_lover.1085.a.bodyguard_soulmate:0 "#EMP Oh, mio valoroso Patroclo...#!"
  lmf_lover.1085.a.bodyguard_lover:0 ""Non devi mai lasciarmi, [lover.GetFirstNameNoTooltip].""
  lmf_lover.1085.c:0 ""Allora potrai essere il mio [lover.Custom('GetBackupCourtPosition')].""
  lmf_lover.1085.d:0 ""Perché non unirti ai ranghi dei miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]?""
  lmf_lover.1085.e:0 ""No, non sarebbe appropriato.""
  lmf_lover.1086.title.tt:0 "Promessa infranta"
  lmf_lover.1086.desc:0 "Hai infranto la promessa fatta a [lover.GetFirstNameNoTooltip], revocando il [Select_CString(lover.IsFemale,'suo','suo')] incarico nella tua corte."

lmf_lover.1090.opening: 0 "Povero amore mio,"
  lmf_lover.1090.desc:0 "Se questa lettera ti giunge, vuol dire che il giovane soldato che ho corrotto ha mantenuto la parola e [my_imprisoner.Custom('IT_NAM_COL3')][my_imprisoner.GetTitledFirstNameNoTooltip] (sputo sul [Select_CString(my_imprisoner.IsFemale,'suo','suo')] nome) non ne è minimamente al corrente.\n\nHo scritto non appena ho saputo che eri stat[Select_CString(ROOT.Char.IsFemale,'a','o')] imprigionat[Select_CString(ROOT.Char.IsFemale,'a','o')]. Se soltanto potessi facilitare una via di fuga! Ahimè, tutto ciò che posso fare è offrirti parole di conforto e pregare che tu venga liberat[Select_CString(ROOT.Char.IsFemale,'a','o')] presto.\n\nAttenderò quel giorno, quando potremo riunirci."
  lmf_lover.1090.a:0 "I pensieri di [Select_CString(lover.IsFemale,'lei','lui')] mi faranno passare il tempo qui."

  lmf_lover.1095.t:0 "Un ardore che si raffredda"
  lmf_lover.1095.desc:0 "Quando io e [lover.GetFirstNameNoTooltip] ci innamorammo, ero così cert[Select_CString(ROOT.Char.IsFemale,'a','o')] d'aver trovato la mia vera anima gemella. Ora? Non ne sono più tanto cert[Select_CString(ROOT.Char.IsFemale,'a','o')].\n\nNon nego che i nostri sentimenti siano ancora forti, ma non mi sento invadere dal calore ogni volta che penso a [Select_CString(lover.IsFemale,'lei','lui')]. [Select_CString(lover.IsFemale,'Lei','Lui')|U] non occupa i miei pensieri a ogni ora del giorno... e quando guardo nei [Select_CString(lover.IsFemale,'suoi','suoi')] occhi, capisco che [Select_CString(lover.IsFemale,'lei','lui')] prova lo stesso.\n\nForse è normale, qualcosa che accade all'amore col trascorrere del tempo. O forse è perché non mi sono sforzat[Select_CString(ROOT.Char.IsFemale,'a','o')] abbastanza per tenere acceso il nostro fuoco. Potrebbe sistemarsi con un po' d'impegno?\n\nE poi: è qualcosa che desidero ancora?"
  lmf_lover.1095.a:0 "I sentimenti cambiano."
  lmf_lover.1095.b:0 "Prova a ravvivare la scintilla del nostro amore, se posso."
  lmf_lover.1095.b.success.tt:0 "Riesci a ristabilire la passione"
  lmf_lover.1095.b.failure.tt:0 "I tuoi tentativi peggiorano soltanto le cose"

  lmf_lover.1098.t: "Il Mio Segreto [my_bastard.Custom('GetDaughterSon')|U]"
  lmf_lover.1098.courtier: "Sono rimast[Select_CString(ROOT.Char.IsFemale,'a','o')] sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')] quando [lover.GetFirstNameNoTooltip] mi ha chiesto di vedermi oggi, poiché non avevamo fissato alcun incontro. "
  lmf_lover.1098.notcourtier: "Sono rimast[Select_CString(ROOT.Char.IsFemale,'a','o')] sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')] quando [lover.GetFirstNameNoTooltip] è giunt[Select_CString(lover.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] oggi e mi ha chiesto di vedermi, poiché non me l'aspettavo. "
  lmf_lover.1098.start: "Sono rimast[Select_CString(ROOT.Char.IsFemale,'a','o')] ancor più sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')] quando ho visto il[Select_CString(my_bastard.IsFemale,'la','lo')] [my_bastard.Custom('polite_gender_ref')] trascinar[Select_CString(my_bastard.IsFemale,'si','si')] dietro: [my_bastard.GetFirstNameNoTooltip], [my_bastard.Custom('GetDaughterSon')] di [lover.GetFirstNameNoTooltip] "
  lmf_lover.1098.notsecret: "e, in segreto, anche mi[Select_CString(ROOT.Char.IsFemale,'a','o')].\n\nMi ha presentato il silenzioso [my_bastard.GetFirstNameNoTooltip] e poi mi ha fissat[Select_CString(lover.IsFemale,'a','o')] negli occhi. "È tempo che la gente sappia chi è il padre di [my_bastard.GetFirstNameNoTooltip]."\n\n"
  lmf_lover.1098.secret: ".\n\nMi ha presentato il silenzioso [my_bastard.GetFirstNameNoTooltip] e poi ha semplicemente detto: "È tempo che tu sappia che [Select_CString(my_bastard.IsFemale,'lei','lui')] è anche tu[Select_CString(ROOT.Char.IsFemale,'a','o')] [my_bastard.Custom('GetDaughterSon')]." L'avevo sempre sospettato, ma sono rimast[Select_CString(ROOT.Char.IsFemale,'a','o')] sconvolt[Select_CString(ROOT.Char.IsFemale,'a','o')] nel sentirlo affermare così apertamente.\n\nEppure non aveva finito. "È anche tempo che la gente sappia chi è il padre di [my_bastard.GetFirstNameNoTooltip]."\n\n"
  lmf_lover.1098.criminal: "Ho cercato di avvertire [lover.GetFirstNameNoTooltip] delle gravi conseguenze che una simile rivelazione avrebbe comportato, ma lei non si è lasciata scoraggiare, com'è nel suo solito. "Non riguarda ciò che accadrà a me," disse. "Riguarda il futuro di [my_bastard.GetFirstNameNoTooltip], e anche la verità.""
  lmf_lover.1098.notcriminal: "Ho preteso di sapere perché avesse scelto proprio ora, dopo tutto questo tempo, per avanzare una richiesta tanto audace. "Non riguarda me, né te," disse. "Riguarda il futuro di [my_bastard.GetFirstNameNoTooltip]. [Select_CString(my_bastard.IsFemale,'Lei','Lui')|U] merita di uscire dall'ombra.""
  lmf_lover.1098.a: "La convinco a non farlo. Non ora."
  lmf_lover.1098.a.success: "La convinco, sebbene ne sia scontenta"
  lmf_lover.1098.a.failure: "Rivela la verità senza il tuo consenso"
  lmf_lover.1098.b: "La minaccio, come suo[Select_CString(ROOT.Char.IsFemale,'a','o')] signor[Select_CString(ROOT.Char.IsFemale,'a','o')], qualora volesse davvero farlo."
  lmf_lover.1098.b.angry: "È furios[Select_CString(lover.IsFemale,'a','o')], ma rinuncia"
  lmf_lover.1098.b.dumped: "Non rivelerà il segreto, ma fra voi è finita"
  lmf_lover.1098.c: "Forse ha ragione. È tempo."
  lmf_lover.1098.c.tt: "Perdonerai automaticamente qualunque reato applicato contro [lover.GetFirstNameNoTooltip]"

  lmf_lover.1100.t: "Occhi al Bottino"
  lmf_lover.1100.desc.start: "Mentre il nostro sudore si raffreddava dopo gli sforzi di questa sera, potevo già capire che qualcosa gravava sulla mente di [lover.GetFirstNamePossessiveNoTooltip]. [Select_CString(lover.IsFemale,'Lei','Lui')|U] aveva quello sguardo negli occhi che assume quando desidera qualcosa.\n\n"Ho visto "
  lmf_lover.1100.desc.jewelry: "il più meraviglioso gioiello "
  lmf_lover.1100.desc.sword: "la più magnifica spada "
  lmf_lover.1100.desc.book: "il più incredibile libro "
  lmf_lover.1100.desc.manuals: "la più notevole raccolta di manuali "
  lmf_lover.1100.desc.robe: "una veste incredibile, ricamata con tanta elaborazione, "
  lmf_lover.1100.desc.end: "al mercato oggi. La desideravo così tanto, ma ovviamente è #EMP davvero#! costosa..."\n\nL'intenzione era chiara: [lover.GetFirstNameNoTooltip] voleva che gliel[Select_CString(lover.IsFemale,'a','o')] comprassi come dono. Anzi, ancor prima che la sera finisse, [Select_CString(lover.IsFemale,'lei','lui')] stava quasi supplicandomi per il[Select_CString(lover.IsFemale,'suo','suo')] ambito premio. "Di certo non è troppo chiedertelo, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]? Mi adori, non è forse così?""
  lmf_lover.1100.a: "Lo sorprenderò con qualcosa di ancor più #EMP costoso#!"
  lmf_lover.1100.b: "Cedo e gli faccio il regalo."
  lmf_lover.1100.c: "[Select_CString(lover.IsFemale,'Lei','Lui')|U] scherza? Assolutamente no!"

  lmf_lover.1105.t: "Il Grave Affronto"
  lmf_lover.1105.desc.start: "Quando [lover.GetFirstNameNoTooltip] irruppe nella stanza, fremend[Select_CString(lover.IsFemale,'a','o')] d'ira, dapprima credetti che ne fossi la causa.\n\nMa no: si scoprì invece che [Select_CString(lover.IsFemale,'lei','lui')] aveva avuto un alterco con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))]. "
  lmf_lover.1105.desc.relation: "Il[Select_CString(my_courtier.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))] "
  lmf_lover.1105.desc.norelation: "Il [my_courtier.GetWomanMan] "
  lmf_lover.1105.desc.end: "ha fatto un commento che [Select_CString(lover.IsFemale,'lei','lui')] ha udito per caso, qualcosa... chiamiamolo poco gentile. Ne è seguita una resa dei conti e poi un urlare reciproco, e ora [lover.GetFirstNameNoTooltip] mi dice che [my_courtier.GetFirstNameNoTooltip] "corre per il [ROOT.Char.Custom('FortifiedBuilding')], spargendo menzogne" su [Select_CString(lover.IsFemale,'lei','lui')].\n\nSuppongo fosse inevitabile, considerato che a corte tutti conoscono la nostra relazione. Non possono dire nulla a me, ma a [Select_CString(lover.IsFemale,'lei','lui')]?\n\n[lover.GetFirstNameNoTooltip] non mi ha chiesto di fare qualcosa, propriamente, ma capisco che [Select_CString(lover.IsFemale,'lei','lui')] pensa che dovrei."
  lmf_lover.1105.a: "Manderò via [my_courtier.GetFirstNameNoTooltip]. Subito."
  got_me_kicked_from_court: "[TARGET_CHARACTER.GetShortUIName|U] ha fatto cacciare [CHARACTER.GetShortUIName] dalla corte dopo che [Select_CString(CHARACTER.IsFemale,'lei','lui')] ha insultato [CharYouHerHim(TARGET_CHARACTER)]."
  got_me_kicked_from_court_corresponding: "[CHARACTER.GetShortUIName|U] ha fatto cacciare [TARGET_CHARACTER.GetShortUIName] dalla corte dopo che [Select_CString(TARGET_CHARACTER.IsFemale,'lei','lui')] ha insultato [CharYouHerHim(CHARACTER)]."
  lmf_lover.1105.b: "[my_courtier.GetFirstNameNoTooltip] verrà severamente rimproverat[Select_CString(my_courtier.IsFemale,'a','o')] per questo insulto."
  lmf_lover.1105.b.success: "[my_courtier.GetFirstNameNoTooltip] si mostra adeguatamente pentit[Select_CString(my_courtier.IsFemale,'a','o')]"
  lmf_lover.1105.b.failure: "Ora [my_courtier.GetFirstNameNoTooltip] è adirat[Select_CString(my_courtier.IsFemale,'a','o')] con entrambi"
  got_me_reprimanded_unjustly: "[TARGET_CHARACTER.GetShortUIName|U] ha fatto rimproverare ingiustamente [CHARACTER.GetShortUIName] dopo che [CHARACTER.GetFirstNameNoTooltip] li ha insultati."
  got_me_reprimanded_unjustly_corresponding: "[CHARACTER.GetShortUIName|U] ha fatto rimproverare ingiustamente [TARGET_CHARACTER.GetShortUIName] dopo che [TARGET_CHARACTER.GetFirstNameNoTooltip] li ha insultati."
  reprimanded_me_unjustly: "[TARGET_CHARACTER.GetShortUIName|U] ha rimproverato ingiustamente [CHARACTER.GetShortUIName] per un insulto rivolto all'amante di [TARGET_CHARACTER.GetShortUIName]."
  reprimanded_me_unjustly_corresponding: "[CHARACTER.GetShortUIName|U] ha rimproverato ingiustamente [TARGET_CHARACTER.GetShortUIName] per un insulto rivolto all'amante di [CHARACTER.GetShortUIName]."
  lmf_lover.1105.c: "[lover.GetFirstNameNoTooltip] dovrà farci l'abitudine."
  insulted_lover: "[TARGET_CHARACTER.GetShortUIName|U] ha insultato [CHARACTER.GetShortUIName] ed è rimast[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] impunit[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')]."
  insulted_lover_corresponding: "[CHARACTER.GetShortUIName|U] ha insultato [TARGET_CHARACTER.GetShortUIName] ed è rimast[Select_CString(CHARACTER.IsFemale,'a','o')] impunit[Select_CString(CHARACTER.IsFemale,'a','o')]."

  lmf_lover.1110.t: "Sempre al Mio Fianco"
  lmf_lover.1110.desc.start: "In questi giorni, [lover.GetFirstNameNoTooltip] è sempre al mio fianco.\n\nO siamo a letto insieme, o passeggiamo nei giardini insieme, o siamo a corte insieme... "
  lmf_lover.1110.desc.secret: "persino con la necessità di tenere segreta la verità della nostra relazione, in qualche modo [Select_CString(lover.IsFemale,'lei','lui')] riesce sempre a essere al mio fianco.\n\n"
  lmf_lover.1110.desc.public: "dopotutto non v'è bisogno di nascondere la nostra relazione, quindi non v'è ragione di tener[Select_CString(lover.IsFemale,'la','lo')] lontan[Select_CString(lover.IsFemale,'a','o')] da me.\n\n"
  lmf_lover.1110.desc.mid: "Suppongo abbia senso, considerato che "
  lmf_lover.1110.desc.courtier: "[lover.GetFirstNameNoTooltip] non ha doveri particolari a [lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] che possano assorbirne l'attenzione"
  lmf_lover.1110.desc.mycourtier: "[lover.GetFirstNameNoTooltip] non ha doveri particolari qui a corte che possano assorbirne l'attenzione"
  lmf_lover.1110.desc.pool: "[lover.GetFirstNameNoTooltip] non ha alcun signore e dunque nessun dovere che possa assorbirne l'attenzione"
lmf_lover.1110.desc.male: 0 ", e non è [Select_CString(ROOT.Char.IsFemale,'una','un')] [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')].\n\n"
  lmf_lover.1110.desc.female: ", e non ha figli da crescere.\n\n"
  lmf_lover.1110.desc.end: "Eppure, per quanto io goda del tempo che trascorriamo insieme, è una... non piccola distrazione dai miei doveri come [ROOT.Char.GetTitleAsNameNoTooltip]. Naturalmente non direi mai nulla del genere a [Select_CString(lover.IsFemale,'lei','lui')], ma potrei esservi costrett[Select_CString(ROOT.Char.IsFemale,'a','o')] se così continua, o la mia attenzione verso [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] ne soffrirà."
  lmf_lover.1110.a: "E allora? Mi piace la distrazione."
  lmf_lover.1110.b: "Lo mando via. Devo concentrarmi sui miei doveri."

  lmf_lover.1115.t: "Una Visita a Sorpresa"
  lmf_lover.1115.desc.start: "Stavo pensando proprio a [lover.GetFirstNameNoTooltip], e a quanto di rado riesca a veder[Select_CString(lover.IsFemale,'la','lo')], e chi dovrebbe comparire? A stento riuscivo a crederci quando [Select_CString(lover.IsFemale,'lei','lui')] entrò in sala, con un sorriso radioso sul volto quando mi vide.\n\n"Che cosa ci fai qui?" chiesi, ancora sotto shock. "
  lmf_lover.1115.desc.courtier: ""Credevo che fossi ancora a [lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]!"\n\n"
  lmf_lover.1115.desc.away: ""L'ultima cosa che ho udito è che eri ancora a [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]!"\n\n"
  lmf_lover.1115.desc.local: ""Sapevo che eri ancora a [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], ma non mi aspettavo di vederti!"\n\n"
  lmf_lover.1115.desc.mid: ""Avevo la sensazione che ti mancassi," disse [Select_CString(lover.IsFemale,'lei','lui')]. "Perché? Vuoi forse cacciarmi via?"\n\nRisposi con una risata, prendendol[Select_CString(lover.IsFemale,'a','o')] per mano e conducendol[Select_CString(lover.IsFemale,'a','o')] su per le scale. "
  lmf_lover.1115.desc.secret: "Di norma dovremmo essere molto prudenti, ma "
  lmf_lover.1115.desc.public: "Dopotutto non avevamo bisogno di essere prudenti, ma anche così "
  lmf_lover.1115.desc.end: "era un giorno quieto nel [ROOT.Char.Custom('FortifiedBuilding')], per una volta. Il risultato fu una sera che nessuno dei due dimenticherà presto."
  lmf_lover.1115.a: "Adoro le sorprese!"

  lmf_lover.1120.t: "Un Giorno nel Giardino"
  lmf_lover.1120.desc.start: "Benché [lover.GetFirstNameNoTooltip] faccia parte della mia corte, non è spesso che riusciamo a trascorrere la giornata insieme. "
  lmf_lover.1120.desc.secret: "La necessità del segreto, anzi, impone che passiamo quanto più tempo possibile separati, per non destare sospetti.\n\n"
  lmf_lover.1120.desc.public: "Benché la nostra tresca sia di dominio pubblico, il dovere mi tiene lontan[Select_CString(ROOT.Char.IsFemale,'a','o')] dal[Select_CString(lover.IsFemale,'suo','suo')] fianco tanto quanto la convenienza.\n\n"
  lmf_lover.1120.desc.end: "Oggi, però, non era un giorno come gli altri. Era quieto nel [ROOT.Char.Custom('FortifiedBuilding')], per una volta, e gran parte della corte era occupata con altre faccende. [lover.GetFirstNameNoTooltip] venne da me in silenzio. "Conosco un posto in cui possiamo restare soli," sussurrò.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] mi condusse nel profondo dei giardini e, sebbene io cercassi con lo sguardo i giardinieri, non ne vidi alcuno.\n\n"Li ho mandati via," disse [lover.GetFirstNameNoTooltip].\n\nNon chiesi né mi curai di come [Select_CString(lover.IsFemale,'lei','lui')] fosse riuscit[Select_CString(lover.IsFemale,'a','o')] in tale impresa, perché la giornata che seguì è una che difficilmente dimenticheremo presto."
  lmf_lover.1120.a: "Quel giardino mi piace proprio."

  lmf_lover.1130.t: "Un Momento Rubato all'Accampamento"
lmf_lover.1130.desc: 0 "L'esercito era accampato a [army_location.GetCounty.GetTitle.GetNameNoTierNoTooltip] dopo una lunga giornata. Era tardi, la maggior parte dei soldati e dei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] si era già ritirata nelle proprie tende, e anch'io stavo per fare lo stesso.\n\nPoi apparve [lover.GetFirstNameNoTooltip], come dal nulla, con un sorriso malizioso sul volto che divenne evidente appena [Select_CString(lover.IsFemale,'lei','lui')] si tolse l'elmo. ""Vieni con me,"" disse [Select_CString(lover.IsFemale,'lei','lui')].\n\nPer un momento pensai che vi fosse qualcosa che non andava. Quando [lover.GetFirstNameNoTooltip] mi condusse in una parte più appartata dell'accampamento e cominciò a togliersi l'armatura, capii che non era affatto così.\n\n""I soldati potrebbero vederci,"" avvertii con una risata.\n\n""Vedere cosa? Due [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] innamorat[Select_CString(ROOT.Char.IsFemale,'e','i')] ? Perché mai dovrebbe importargli?"" A quel punto, la mia resistenza crollò, ed è stata una fortuna che sia successo."
  lmf_lover.1130.a: "Chi avrebbe detto che l'accampamento potesse essere tanto divertente?"

  lmf_lover.1135.t: "La Ruota Spezzata"
  lmf_lover.1135.desc.start: "Mi dicono che una delle carrette avesse una ruota spezzata: non avrebbe causato un grande ritardo nel viaggio, eppure significava comunque star fermi ad aspettare che altri aggiustassero le cose.\n\nPoi, dal nulla, [lover.GetFirstNameNoTooltip] comparve dietro di me. "Ho un'idea," disse [Select_CString(lover.IsFemale,'lei','lui')] con un occhiolino.\n\nNon fui certo di che cosa intendesse finché non scorsi il cesto e la coperta sul[Select_CString(lover.IsFemale,'suo','suo')] braccio. Mi lasciò condurre in un luogo appartato lì vicino, lontano dagli sguardi indiscreti del nostro seguito e, dopo aver steso la coperta, [lover.GetFirstNameNoTooltip] cominciò a togliersi i vestiti.\n\n"
  lmf_lover.1135.desc.cold: ""Un po' freddo per questo luogo, non trovi?" risi.\n\n"Non se sei accanto a me," sorrise [Select_CString(lover.IsFemale,'lei','lui')]. "
  lmf_lover.1135.desc.sand: ""Fa' attenzione a non far entrare la sabbia in... certi posti," risi.\n\n"Allora ho bisogno che tu controlli," sorrise [Select_CString(lover.IsFemale,'lei','lui')]. "
  lmf_lover.1135.desc.bugs: ""Vedo che non temi gli insetti," risi.\n\n"Non se sei accanto a me," sorrise [Select_CString(lover.IsFemale,'lei','lui')]. "
  lmf_lover.1135.desc.default: ""Sai, chiunque potrebbe passare e vederci," risi.\n\n"Allora avranno un bello spettacolo," sorrise [Select_CString(lover.IsFemale,'lei','lui')]. "
  lmf_lover.1135.desc.end: "Si rivelò un'offerta che non potevo rifiutare."
  lmf_lover.1135.a: "Viaggiare mi piace davvero."

lmf_lover.1140.opening: 0 "Amore mio,"
  lmf_lover.1140.courtier: "Ci ho pensato a lungo, e voglio lasciare la corte di [lover_liege.GetTitledFirstNamePossessiveNoTooltip] e "
  lmf_lover.1140.pool: "Ci ho pensato a lungo, e voglio "
  lmf_lover.1140.start: "raggiungerti a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
  lmf_lover.1140.spouse: "[lover_spouse.GetFirstNameNoTooltip] è dispost[Select_CString(lover_spouse.IsFemale,'a','o')] a venire con me e non sa nulla; non preoccuparti di [Select_CString(lover_spouse.IsFemale,'lei','lui')]. "
  lmf_lover.1140.bastard: "[my_bastard.GetFirstNameNoTooltip] ha bisogno di un posto dove crescere, e di conoscere [Select_CString(my_bastard.IsFemale,'il suo','il suo')] [ROOT.Char.GetMotherFather]. Inoltre, "
  lmf_lover.1140.child: "Sono così preoccupat[Select_CString(lover.IsFemale,'a','o')] per [my_bastard_courtier.GetFirstNameNoTooltip]. Voglio stare più vicin[Select_CString(lover.IsFemale,'a','o')] a [Select_CString(my_bastard_courtier.IsFemale,'lei','lui')]"
  lmf_lover.1140.mid: "Sento soltanto che è importante esserti vicino"
  lmf_lover.1140.public: ". Tanto, ormai, tutti sanno chi sono per te. Posso sopportare gli sguardi a corte.\n\n"
  lmf_lover.1140.myspouse: ", anche se ciò significa che gli occhi di [ROOT.Char.GetPrimarySpouse.GetTitledFirstNamePossessiveNoTooltip] saranno su di me per tutto il tempo. Non m'importa, e non dovrebbe importare nemmeno a te.\n\n"
  lmf_lover.1140.secret: ", anche se dobbiamo continuare a essere amanti in segreto. Non m'importa, e non dovrebbe importare nemmeno a te.\n\n"
  lmf_lover.1140.end: "Ti prego, fallo. Per me. Per noi."
  lmf_lover.1140.a: "Certo che [Select_CString(lover.IsFemale,'lei','lui')] è il benvenut[Select_CString(lover.IsFemale,'a','o')] qui."
  lmf_lover.1140.b: "Venire a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e restare? Direi proprio di no!"

  lmf_lover.1145.t:0 "Gelosia per [Select_CString(my_spouse.IsFemale,'mia','mio')] [my_spouse.GetWifeHusband|U]"
  lmf_lover.1145.desc.start:0 "Mentre il sudore si raffreddava dopo gli sforzi della sera, capii che qualcosa non andava in [lover.GetFirstNameNoTooltip]. [Select_CString(lover.IsFemale,'Lei','Lui')|U] era stat[Select_CString(lover.IsFemale,'a','o')] silenzios[Select_CString(lover.IsFemale,'a','o')] per tutta la serata, e distratt[Select_CString(lover.IsFemale,'a','o')] quando fummo a letto a fare l’amore.\n\n«Ami [Select_CString(my_spouse.IsFemale,'lei','lui')] più di quanto ami me», sbottò infine [Select_CString(lover.IsFemale,'lei','lui')].\n\nNe rimasi scoss[Select_CString(ROOT.Char.IsFemale,'a','o')], e con sincerità dissi che non avevo idea di chi [Select_CString(lover.IsFemale,'lei','lui')] stesse nominando.\n\n«[Select_CString(my_spouse.IsFemale,'Tua','Tuo')] [my_spouse.GetWifeHusband]!», ringhiò [Select_CString(lover.IsFemale,'lei','lui')], con rabbia. "
  lmf_lover.1145.desc.soulmate:0 "«Vedo come sei quando sei con [Select_CString(my_spouse.IsFemale,'lei','lui')]. [Select_CString(my_spouse.IsFemale,'La','Il')] [my_spouse.GetTitleAsNameNoTooltip|l] è la tua vera anima gemella, e tutti lo sanno!»\n\n"
  lmf_lover.1145.desc.bestfriend:0 "«Vedo come ti comporti quando sei con [Select_CString(my_spouse.IsFemale,'lei','lui')]. Voi due siete così a vostro agio, come se foste i migliori amici! Con [Select_CString(my_spouse.IsFemale,'tua','tuo')] [my_spouse.GetWifeHusband]! Chi ha mai udito una cosa simile?!»\n\n"
  lmf_lover.1145.desc.lover:0 "«Vedo come sei con [Select_CString(my_spouse.IsFemale,'la','il')] [my_spouse.GetTitleAsNameNoTooltip|l]. I tocchi, i piccoli sorrisi che vi scambiate! Come potrei sperare di competere con [Select_CString(my_spouse.IsFemale,'lei','lui')]?!»\n\n"
  lmf_lover.1145.desc.friend:0 "«Vedo come ti comporti con [Select_CString(my_spouse.IsFemale,'la','il')] [my_spouse.GetTitleAsNameNoTooltip|l]. Voi due siete così a vostro agio, così amichevoli! Come potrei sperare di competere con [Select_CString(my_spouse.IsFemale,'lei','lui')]?!»\n\n"
  lmf_lover.1145.desc.ruler:0 "«È perché [Select_CString(my_spouse.IsFemale,'lei','lui')] è un[Select_CString(my_spouse.IsFemale,'a','')] alt[Select_CString(my_spouse.IsFemale,'a','o')] e potent[Select_CString(my_spouse.IsFemale,'e','e')] [my_spouse.GetTitleAsNameNoTooltip|l], laggiù in [my_spouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], vero? E io non sono nessuno. Come potrei mai sperare di competere con [Select_CString(my_spouse.IsFemale,'lei','lui')]?!»\n\n"
  lmf_lover.1145.desc.smart:0 "«È perché [Select_CString(my_spouse.IsFemale,'lei','lui')] è più intelligent[Select_CString(my_spouse.IsFemale,'e','e')] di me, vero? Oh, [Select_CString(my_spouse.IsFemale,'la','il')] [my_spouse.GetTitleAsNameNoTooltip|l] è così, così brillant[Select_CString(my_spouse.IsFemale,'e','e')], lo dicono tutti! Come potrei sperare di competere con questo?!»\n\n"
  lmf_lover.1145.desc.pretty:0 "«È perché [Select_CString(my_spouse.IsFemale,'lei','lui')] è più [Select_CString( my_spouse.IsFemale, 'bella', 'bello' )] di me, vero? Ammettilo! Tutti già lo dicono! Come potrei sperare di competere?!»\n\n"
  lmf_lover.1145.desc.end:0 "Mentre lo sfogo geloso di [lover.GetFirstNamePossessiveNoTooltip] proseguiva, [Select_CString(lover.IsFemale,'lei','lui')] divenne sempre più irragionevol[Select_CString(lover.IsFemale,'e','e')], finché infine se ne andò furibond[Select_CString(lover.IsFemale,'a','o')]."
  lmf_lover.1145.a:0 "Devo tentare di convincere [Select_CString(lover.IsFemale,'lei','lui')] che [Select_CString(my_spouse.IsFemale,'mia','mio')] [my_spouse.GetWifeHusband] non è una minaccia."
  lmf_lover.1145.a.success:0 "Riesci a convincere [Select_CString(lover.IsFemale,'lei','lui')]... più o meno"
  lmf_lover.1145.a.failure:0 "Ora anche [lover.GetFirstNameNoTooltip] è furios[Select_CString(lover.IsFemale,'a','o')] con te"
  lover_jealousy:0 "[CHARACTER.GetShortUIName|U] è divenut[Select_CString(CHARACTER.IsFemale,'a','o')] incredibilmente gelos[Select_CString(CHARACTER.IsFemale,'a','o')] di [TARGET_CHARACTER.GetShortUIName|U]."
  lover_jealousy_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] è divenut[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] incredibilmente gelos[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] di [CHARACTER.GetShortUIName|U]."
  lmf_lover.1145.b:0 "[my_spouse.GetFirstNameNoTooltip] è [Select_CString(my_spouse.IsFemale,'mia','mio')] [my_spouse.GetWifeHusband]. Così è, e così resta."

  lmf_lover.1150.desc:0 "Quando [lover.GetFirstNameNoTooltip] e io ci innamorammo, ero così cert[Select_CString(ROOT.Char.IsFemale,'a','o')] d’aver trovato la mia vera anima gemella. Ora? Non ne sono più così cert[Select_CString(ROOT.Char.IsFemale,'a','o')].\n\nNon sono nemmeno cert[Select_CString(ROOT.Char.IsFemale,'a','o')] che si possa dire che siamo davvero innamorat[Select_CString(Or(ROOT.Char.IsFemale,lover.IsFemale),'i','i')] ancora. Oh, provo ancora affetto per [Select_CString(lover.IsFemale,'lei','lui')], e credo che [Select_CString(lover.IsFemale,'lei','lui')] provi lo stesso per me, ma [Select_CString(lover.IsFemale,'lei','lui')] occupa i miei pensieri? Il mio cuore arde per [Select_CString(lover.IsFemale,'lei','lui')]? Tristemente, no.\n\nChe questo significhi che la nostra relazione stia lentamente giungendo al termine, non saprei dirlo. Ciò che posso dire, oltre ogni ombra di dubbio, è che [lover.GetFirstNameNoTooltip] e io non possiamo più considerarci anime gemelle."

  lmf_lover.1155.t:0 "Un Amante Inaffidabile?"
  lmf_lover.1155.desc:0 "Può essere vero?\n\nMi sono giunte voci che [lover.GetFirstNameNoTooltip] sia stato di recente in contatto con [my_rival.Custom('IT_NAM_COL4')][my_rival.GetTitledFirstNameNoTooltip]. Per quale ragione [Select_CString(lover.IsFemale,'lei','lui')] dovrebbe scrivere lettere a un mio rivale, non ne ho idea. [Select_CString(lover.IsFemale,'Lei','Lui')|U] nega d’averlo fatto e, sebbene io abbia tentato di far indagare più a fondo, è ben possibile che l’intera faccenda sia soltanto una diceria... una diceria che [lover.GetFirstNameNoTooltip] suggerisce sia stata senza dubbio sparsa da qualcuno che intende infangare il buon nome di [Select_CString(lover.IsFemale,'lei','lui')].\n\nSenza modo di verificare la verità, ho poca scelta se non prendere per buona la parola di [Select_CString(lover.IsFemale,'lei','lui')], ma la cosa mi rode. So che qualcosa non torna. Qualche sorta di manovra infida è in corso."
  lmf_lover.1155.a:0 "Speriamo non ne venga fuori nulla."

lmf_lover.1156.opening: 0 "[lover.Custom2('GreetingToGenericPositive', ROOT.Char )],"
  lmf_lover.1156.stranger:0 "Non mi conosci, ma "
  lmf_lover.1156.start:0 "ho alcune informazioni su [player_rival.Custom('IT_NAM_COL2')][player_rival.GetTitledFirstName] che potrebbero interessarti molto, considerando che è cosa nota che tu e [Select_CString(player_rival.IsFemale,'lei','lui')] siete rivali.\n\nIn cambio chiedo soltanto una misera somma d’oro per il disturbo e che tu non menzioni mai "
  lmf_lover.1156.know:0 "che proviene da [Select_CString(lover.IsFemale,'tua','tuo')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|l]."
  lmf_lover.1156.stranger2:0 "da chi hai ottenuto queste informazioni."
  lmf_lover.1156.a:0 "[player_rival.Custom('IT_NAM_COL3')][player_rival.GetTitledFirstNameNoTooltip] custodisce un segreto? Sì, dimmi!"
  lmf_lover.1156.b:0 "Non m’interessa. Sparisci."

  lmf_lover.1160.t:0 "Come Alimentare le Fiamme?"
  lmf_lover.1160.desc:0 "Mi sovviene che ultimamente vedo ben poco [lover.GetFirstNameNoTooltip]. Non c’è nulla che non vada tra noi, almeno per quanto ne so. Siamo soltanto stat[Select_CString(Or(ROOT.Char.IsFemale,lover.IsFemale),'i','i')] pres[Select_CString(Or(ROOT.Char.IsFemale,lover.IsFemale),'i','i')] da altre faccende.\n\nConsiderato che il [ROOT.Char.Custom('FortifiedBuilding')] è insolitamente quieto in questo momento, forse vi è un’occasione per ravvivare le fiamme del nostro amore? Di certo basterebbe un po’ d’impegno, sì? Quanto potrebbe essere difficile?"
  lmf_lover.1160.a:0 "Scriverò a [Select_CString(lover.IsFemale,'lei','lui')] una poesia!"
  lmf_lover.1160.a.success:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] ama la poesia"
  lmf_lover.1160.a.failure:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] si diverte dei tuoi sforzi poetici"
  lmf_lover.1160.b:0 "Ci occorre soltanto passare più tempo insieme."
  lmf_lover.1160.b.success:0 "Il tempo insieme era proprio ciò che vi serviva"
  lmf_lover.1160.b.failure:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] apprezza il gesto"
  lmf_lover.1160.c:0 "Comprerò a [Select_CString(lover.IsFemale,'lei','lui')] qualcosa di sontuoso che [Select_CString(lover.IsFemale,'lei','lui')] amerà."
  lmf_lover.1160.c.success:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] adora il dono"
  lmf_lover.1160.c.failure:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è grat[Select_CString(lover.IsFemale,'a','o')] per il dono, ma nulla di più"
  lmf_lover.1160.d:0 "Forse un po’ di cammino insieme nella natura selvaggia?"
  lmf_lover.1160.d.success:0 "L’escursione si rivela il perfetto tempo in solitudine"
  lmf_lover.1160.d.failure:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è più irritat[Select_CString(lover.IsFemale,'a','o')] dall’escursione che da qualunque altra cosa"
  lmf_lover.1160.e:0 "È tempo di ravvivare le cose in camera da letto!"
  lmf_lover.1160.e.success:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] resta sbalordit[Select_CString(lover.IsFemale,'a','o')] dai tuoi sforzi"
  lmf_lover.1160.e.failure:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è respint[Select_CString(lover.IsFemale,'a','o')] dai tuoi sforzi"
  lmf_lover.1160.f:0 "Andremo, in incognito, nella taverna più affollata di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]!"
  lmf_lover.1160.f.success:0 "La notte fuori è un enorme successo!"
  lmf_lover.1160.f.failure:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è grat[Select_CString(lover.IsFemale,'a','o')] per la serata, ma nulla di più"
  lmf_lover.1160.g:0 "Non è necessario. Stiamo bene così."

  lmf_lover.1165.t:0 "Si Riaccende la Fiamma"
  lmf_lover.1165.desc.start:0 "Mi ritrovo a trascorrere sempre più tempo in compagnia di [lover.GetFirstNamePossessiveNoTooltip], di recente.\n\n"
  lmf_lover.1165.desc.secret:0 "Dobbiamo stare attenti, certo, e assicurarci che nessuno sospetti... eppure, in qualche modo, non pare così difficile. O forse mi sto illudendo perché lo desidero, non saprei.\n\n"
  lmf_lover.1165.desc.public:0 "Forse è perché tutti già conoscono la nostra tresca. Non c’è bisogno di camminare in punta di piedi, ma non credo sia soltanto questo.\n\n"
  lmf_lover.1165.desc.end:0 "La verità è che [Select_CString(lover.IsFemale,'lei','lui')] e io siamo simili in così tanti modi. Il fatto che [Select_CString(lover.IsFemale,'lei','lui')] riesca a finire una frase che ho appena iniziato è quasi ridicolo. Non immagino che andrà sempre così bene, ma per ora? Pare bastare a entrambi."
  lmf_lover.1165.a:0 "Sono curios[Select_CString(ROOT.Char.IsFemale,'a','o')] di vedere dove porterà tutto ciò."
  lmf_lover.1165.b:0 "Forse questo è più serio di quanto credessimo..."
  lmf_lover.1165.c:0 "Non c’è bisogno che questo si sviluppi."

  lmf_lover.1170.t:0 "Un’Ombra Passeggera"
  lmf_lover.1170.desc.start:0 "[lover.GetFirstNameNoTooltip] è malat[Select_CString(lover.IsFemale,'a','o')].\n\n"
  lmf_lover.1170.desc.courtier:0 "Sono passat[Select_CString(ROOT.Char.IsFemale,'a','o')] brevemente nelle [Select_CString(lover.IsFemale,'sue','sue')] stanze per vedere [Select_CString(lover.IsFemale,'lei','lui')] poco fa, e [Select_CString(lover.IsFemale,'lei','lui')] delirava per la febbre. [Select_CString(lover.IsFemale,'Lei','Lui')|U] continuava a gemere il mio nome, ancora e ancora, e non appena mi scorse tese una mano disperata e mi supplicò d’avvicinarmi.\n\nNon potevo restare, naturalmente, e ora mi domando se avrei dovuto. "
  lmf_lover.1170.desc.pool:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] ha mancato il nostro ultimo incontro, così ho fatto fare domande. Ho appena ricevuto notizie: [Select_CString(lover.IsFemale,'lei','lui')] è da qualche parte in [lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] in questo momento, preda della febbre e [ROOT.Char.GetFaith.FertilityGodName] sa cos’altro.\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] ha bisogno d’un medico, e l’unico modo perché ne ottenga uno è che io porti [Select_CString(lover.IsFemale,'lei','lui')] qui, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. "
  lmf_lover.1170.desc.secret:0 "Far ciò rischierebbe di esporci, certo... come potrei anche solo iniziare a spiegare la mia costante presenza al fianco di [lover.GetFirstNamePossessiveNoTooltip]?\n\n"
  lmf_lover.1170.desc.public:0 "Tutti già sanno chi è [lover.GetFirstNameNoTooltip], dopotutto. Non abbiamo più nulla da nascondere. L’unica cosa che rischio è contrarre la [Select_CString(lover.IsFemale,'sua','sua')] malattia.\n\n"
  lmf_lover.1170.desc.end:0 "Mi duole pensare a [Select_CString(lover.IsFemale,'lei','lui')] laggiù, forse morent[Select_CString(lover.IsFemale,'e','e')], e nel momento in cui [Select_CString(lover.IsFemale,'lei','lui')] è svegli[Select_CString(lover.IsFemale,'a','o')] e lucido io non sono da nessuna parte. Se [Select_CString(lover.IsFemale,'lei','lui')] supera tutto questo e io non ero lì quando [Select_CString(lover.IsFemale,'lei','lui')] aveva più bisogno di me, [Select_CString(lover.IsFemale,'lei','lui')] lo saprà."
  lmf_lover.1170.a:0 "Certo che resterò al capezzale di [Select_CString(lover.IsFemale,'lei','lui')]!"
  lmf_lover.1170.a.success:0 "La tua cauta spiegazione viene accettata"
  lmf_lover.1170.a.fail:0 "Tutti vedono oltre la tua spiegazione"
  lmf_lover.1170.b:0 "Fate portare [Select_CString(lover.IsFemale,'lei','lui')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] seduta stante!"
  lmf_lover.1170.c:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] riceverà cure come qualunque altro cortigiano."
  lmf_lover.1170.d:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] dovrà arrangiarsi dov’è."

  lmf_lover.1175.t:0 "[Select_CString(my_spouse.IsFemale,'Mia','Mio')] [my_spouse.GetWifeHusband|U] Infuriat[Select_CString(my_spouse.IsFemale,'a','o')]"
  lmf_lover.1175.desc.start:0 "[my_spouse.Custom('IT_NAM_COL3')][my_spouse.GetTitledFirstNameNoTooltip] aspettò che la sala del trono fosse vuota prima d’irrompere. Compresi subito che qualcosa non andava dalla furia negli occhi di [Select_CString(my_spouse.IsFemale,'lei','lui')].\n\n«Devi porre fine a ciò che hai con [my_spouse.Custom2('direct_address_by_familiarity', SCOPE.sC('lover'))]», ringhiò [Select_CString(my_spouse.IsFemale,'lei','lui')]. «Subito».\n\n"
  lmf_lover.1175.desc.secret:0 "Tentai di negare all’inizio, ma [Select_CString(my_spouse.IsFemale,'lei','lui')] mi troncò. «So della tua tresca. "
  lmf_lover.1175.desc.public:0 "Tentai di fingere ignoranza, ma [Select_CString(my_spouse.IsFemale,'lei','lui')] mi troncò. «Tutti in [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] conoscono la verità. "
  lmf_lover.1175.desc.mid:0 "Non osare insultarmi oltre.»\n\nLa cosa degenerò in un litigio acceso che durò quasi un’ora. «Per il bene del nostro letto nuziale, per il bene del tuo onore, non m’importa perché tu lo faccia, ma tu #EMP devi#! farlo! "
  lmf_lover.1175.desc.courtier:0 "Devi farlo e mandare [Select_CString(lover.IsFemale,'lei','lui')] lontano da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]! "
  lmf_lover.1175.desc.end:0 "Se non lo farai..."\n\n[Select_CString(my_spouse.IsFemale,'Lei','Lui')|U] s’interruppe, lasciando la minaccia implicita, poi si voltò e uscì dalla sala come una tempesta."
  lmf_lover.1175.a:0 "Farò come chiede [Select_CString(my_spouse.IsFemale,'lei','lui')], per mantenere la pace."
  lmf_lover.1175.a.rivalry:0 "[lover.GetFirstNameNoTooltip] incolpa [Select_CString(my_spouse.IsFemale,'mia','mio')] [my_spouse.GetWifeHusband] per la fine della tresca"
  spouse_made_lover_break_up:0 "[TARGET_CHARACTER.GetShortUIName|U] ha costretto [Select_CString(TARGET_CHARACTER.IsFemale,'la sua','il suo')] [TARGET_CHARACTER.Custom('WifeHusbandOpp')] a troncare con [CHARACTER.GetShortUIName]."
  spouse_made_lover_break_up_corresponding:0 "[CHARACTER.GetShortUIName|U] ha costretto [Select_CString(CHARACTER.IsFemale,'la sua','il suo')] [CHARACTER.Custom('WifeHusbandOpp')] a troncare con [TARGET_CHARACTER.GetShortUIName]."
  lmf_lover.1175.b:0 "[lover.GetFirstNameNoTooltip] sarà cacciat[Select_CString(lover.IsFemale,'a','o')], ma non porrò fine a nulla."
  spouse_had_me_kicked_out:0 "[TARGET_CHARACTER.GetShortUIName|U] ha costretto [Select_CString(TARGET_CHARACTER.IsFemale,'la sua','il suo')] [TARGET_CHARACTER.Custom('WifeHusbandOpp')] a cacciare [CHARACTER.GetShortUIName] dalla corte."
  spouse_had_me_kicked_out_corresponding:0 "[CHARACTER.GetShortUIName|U] ha costretto [Select_CString(CHARACTER.IsFemale,'la sua','il suo')] [CHARACTER.Custom('WifeHusbandOpp')] a cacciare [TARGET_CHARACTER.GetShortUIName] dalla corte."
  lmf_lover.1175.c:0 "Che cosa può fare [Select_CString(my_spouse.IsFemale,'mia','mio')] [my_spouse.GetWifeHusband], esattamente? Mi rifiuto."
  lmf_lover.1175.c.rivalry:0 "[my_spouse.Custom('IT_NAM_COL3')][my_spouse.GetTitledFirstNameNoTooltip] riversa [Select_CString(my_spouse.IsFemale,'la sua','il suo')] ira su [lover.GetFirstNameNoTooltip]"
  refused_to_dump_lover:0 "[TARGET_CHARACTER.GetShortUIName|U] si è rifiutat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] di troncare con [Select_CString(TARGET_CHARACTER.IsFemale,'la sua','il suo')] amante."
  spouse_wont_dump_lover:0 "[CHARACTER.GetShortUINamePossessiveNoTooltip|U] [CHARACTER.Custom('WifeHusbandOpp')] si è rifiutat[Select_CString(CHARACTER.IsFemale,'a','o')] di troncare con [TARGET_CHARACTER.Custom('GetHerHisOpposite')] amante, [TARGET_CHARACTER.GetShortUIName]."
  spouse_wont_dump_lover_corresponding:0 "[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip|U] [TARGET_CHARACTER.Custom('WifeHusbandOpp')] si è rifiutat[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] di troncare con [CHARACTER.Custom('GetHerHisOpposite')] amante, [CHARACTER.GetShortUIName]."

  lmf_lover.1180.t:0 "Il peso del segreto"
  lmf_lover.1180.desc.start:0 "Vedo l'effetto che la nostra relazione sta avendo su [lover.GetFirstNameNoTooltip].\n\n"
  lmf_lover.1180.desc.honest:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è un[Select_CString(lover.IsFemale,'a','')] [lover.GetWomanMan] onest[Select_CString(lover.IsFemale,'a','o')] nel profondo, perciò la tensione di dover mentire di continuo, volta dopo volta, è "
  lmf_lover.1180.desc.just:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è un[Select_CString(lover.IsFemale,'a','')] [lover.GetWomanMan] che ha un'idea limpida di ciò che è giusto e di ciò che è sbagliato, e la tensione di dover custodire un segreto, specie uno immorale, è "
  lmf_lover.1180.desc.paranoid:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] è sempre stat[Select_CString(lover.IsFemale,'a','o')] un poco paranoic[Select_CString(lover.IsFemale,'a','o')], a dirla tutta, e i pensieri di ciò che accadrà quando e se mai verremo scoperti sono "
  lmf_lover.1180.desc.craven:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] non è la più coraggiosa delle [lover.GetWomenMen], a dirla tutta, dunque i pensieri costanti sulle conseguenze qualora mai venissimo scoperti sono "
  lmf_lover.1180.desc.intrigue:0 "Considerata l'educazione di [Select_CString(lover.IsFemale,'lei','lui')], si penserebbe che [Select_CString(lover.IsFemale,'lei','lui')] sarebbe più brav[Select_CString(lover.IsFemale,'a','o')] a custodire un segreto, ma a dirla tutta non è nella [Select_CString(lover.IsFemale,'sua','sua')] indole naturale e le menzogne sono "
  lmf_lover.1180.desc.bold:0 "Considerato quanto è audace [Select_CString(lover.IsFemale,'lei','lui')], si penserebbe che custodire un segreto non sia un problema, ma suppongo che persino i più audaci fra le [lover.GetWomenMen] possano essere logorat[Select_CString(lover.IsFemale,'e','i')] e le menzogne sono "
  lmf_lover.1180.desc.default:0 "[Select_CString(lover.IsFemale,'Lei','Lui')|U] non è incline all'inganno o alle trame, a dirla tutta, e non è la più audace delle [lover.GetWomenMen], perciò il mentire di continuo è "
  lmf_lover.1180.desc.end:0 "chiaramente rodendo [Select_CString(lover.IsFemale,'lei','lui')].\n\nVedo quanto ciò stressi [lover.GetFirstNameNoTooltip], al punto da intaccare l'amore che proviamo l'uno per l'altra, e pare che non vi sia nulla che io possa fare."
  lmf_lover.1180.a:0 "Vorrei che fosse più facile per [Select_CString(lover.IsFemale,'lei','lui')]."

  lmf_lover.1185.t:0 "Il peso del peccato"
  lmf_lover.1185.desc.start:0 "Vedo l'effetto che la nostra relazione sta avendo su [lover.GetFirstNameNoTooltip].\n\n"
  lmf_lover.1185.desc.incest:0 "Giacere con [Select_CString(lover.IsFemale,'la sua','il suo')] [lover.Custom2('LMF_RelationToMeShort', ROOT.Char )] è un peccato secondo qualunque metro della fede di [lover.GetFaith.GetNameNoTooltip], è vero. "
  lmf_lover.1185.desc.gay:0 "Giacere con un[Select_CString(ROOT.Char.IsFemale,'a','')] altr[Select_CString(ROOT.Char.IsFemale,'a','o')] [ROOT.Char.GetWomanMan] è un peccato secondo qualunque metro della fede di [lover.GetFaith.GetNameNoTooltip], è vero. "
  lmf_lover.1185.desc.married:0 "L'adulterio commesso da un[Select_CString(lover.IsFemale,'a','')] [lover.GetWomanMan] non è soltanto un peccato: è anche un reato. "
  lmf_lover.1185.desc.unmarried:0 "Un[Select_CString(lover.IsFemale,'a','')] [lover.GetWomanMan] colto e accusat[Select_CString(lover.IsFemale,'a','o')] di fornicazione? Non soltanto un peccato, ma un reato. "
  lmf_lover.1185.desc.secret:0 "Il fatto che dobbiamo restare costantemente vigili per custodire il nostro segreto non fa che aumentare la tensione che [Select_CString(lover.IsFemale,'lei','lui')] prova, ne sono certo.\n\n"
  lmf_lover.1185.desc.public:0 "Avrei pensato che il fatto che la nostra relazione sia alla luce del sole rendesse le cose più facili, con le conseguenze ormai già compiute, ma pare sia esattamente il contrario.\n\n"
  lmf_lover.1185.desc.end:0 "Il peso dei peccati di [lover.GetFirstNamePossessiveNoTooltip] sulla [Select_CString(lover.IsFemale,'sua','sua')] anima ovviamente tormenta grandemente [Select_CString(lover.IsFemale,'lei','lui')]. Vedo lo stress che [Select_CString(lover.IsFemale,'lei','lui')] prova, e i suoi effetti si insinuano ogni giorno nell'amore che proviamo l'uno per l'altra... e pare che non vi sia proprio nulla che io possa fare."
  lmf_lover.1185.a:0 "Vorrei che fosse più facile per [Select_CString(lover.IsFemale,'lei','lui')]."

  lmf_lover.1190.t:0 "Tutti gli occhi su [Select_CString(lover.IsFemale,'di lei','di lui')|U]"
  lmf_lover.1190.desc:0 "Avrei pensato che il fatto che la nostra relazione non sia un segreto rendesse le cose più facili per [lover.GetFirstNameNoTooltip].\n\nEppure non pare essere così. Essere l'amante di [ROOT.Char.GetTitledFirstNamePossessiveNoTooltip] significava che tutti gli occhi fossero puntati su di te. [lover.GetFirstNameNoTooltip] ha detto che [Select_CString(lover.IsFemale,'lei','lui')] si sente come se venisse giudicat[Select_CString(lover.IsFemale,'a','o')] di continuo, ovunque [Select_CString(lover.IsFemale,'lei','lui')] vada.\n\nVorrei che fosse semplice per [Select_CString(lover.IsFemale,'lei','lui')] scrollarsi tutto di dosso, ma non lo è. Lo stress è chiaramente influente su [lover.GetFirstNameNoTooltip], proprio come influenza la nostra relazione. E pare che non vi sia nulla che io possa fare."
  lmf_lover.1190.a:0 "Vorrei che fosse più facile per [Select_CString(lover.IsFemale,'lei','lui')]."

  lmf_lover.1195.t:0 "Il peso del segreto"
  lmf_lover.1195.desc.start:0 "Vorrei poter dire che tenere segreta la mia relazione con [lover.GetFirstNameNoTooltip] non stia avendo alcun effetto su di me, ma sarebbe una menzogna.\n\n"
  lmf_lover.1195.desc.honest:0 "A dirla tutta, sono un[Select_CString(ROOT.Char.IsFemale,'a','')] [ROOT.Char.GetWomanMan] onest[Select_CString(ROOT.Char.IsFemale,'a','o')] nel profondo, perciò dover mentire di continuo e poi ricordare tutte quelle menzogne è "
  lmf_lover.1195.desc.just:0 "Ho un forte senso di giustizia. So distinguere il bene dal male. Fare qualcosa di così chiaramente sbagliato e poi #EMP continuare#! a farlo è "
  lmf_lover.1195.desc.paranoid:0 "Non riesco a pensare ad altro che a ciò che accadrà quando, inevitabilmente, verremo scoperti. Se qualcuno ci guarda, mi sforzo di capire che cosa stia pensando. È folle, ed è "
  lmf_lover.1195.desc.craven:0 "Non direi d'essere la più coraggiosa delle [ROOT.Char.GetWomenMen], a dirla tutta. La paura cresce senza sosta, al pensiero di ciò che accadrà quando verremo scoperti, ed è "
  lmf_lover.1195.desc.intrigue:0 "Si penserebbe che sarei più brav[Select_CString(ROOT.Char.IsFemale,'a','o')] in questo, considerata la mia educazione, ma a dirla tutta l'intrigo non mi viene naturale. L'inganno costante è "
  lmf_lover.1195.desc.bold:0 "Molti mi hanno dett[Select_CString(ROOT.Char.IsFemale,'a','o')] audace, e v'è del vero. Eppure l'audacia da sola non rende immuni dalle conseguenze, e il bisogno costante d'inganno è "
  lmf_lover.1195.desc.default:0 "Non sono incline all'inganno o alle trame, a dirla tutta. Né sono la più audace delle [ROOT.Char.GetWomenMen], e devo ammettere che lo sgattaiolare e mentire di continuo è "
  lmf_lover.1195.desc.end:0 "mi sta rodendo.\n\n[lover.GetFirstNameNoTooltip] vede quanto lo stress mi colpisca e, naturalmente, [Select_CString(lover.IsFemale,'lei','lui')] mi esorta a non pensarci, ma non posso evitarlo. Non c'è nulla che [Select_CString(lover.IsFemale,'lei','lui')] possa fare per farmi stare bene riguardo a tutto questo."
  lmf_lover.1195.a:0 "Che cosa devo fare?"

  lmf_lover.1200.t:0 "Il peso del peccato"
  lmf_lover.1200.desc.start:0 "La mia relazione con [lover.GetFirstNameNoTooltip] sta avendo un effetto su di me, per quanto io vorrei che non fosse così.\n\n"
  lmf_lover.1200.desc.incest:0 "Giacere con [Select_CString(lover.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))] è un peccato, è vero. "
  lmf_lover.1200.desc.gay:0 "Giacere con un[Select_CString(lover.IsFemale,'a','')] altr[Select_CString(lover.IsFemale,'a','o')] [lover.GetWomanMan] è un peccato, è vero. "
  lmf_lover.1200.desc.married:0 "L'adulterio commesso da un[Select_CString(ROOT.Char.IsFemale,'a','')] [ROOT.Char.GetWomanMan] non è soltanto un peccato: è anche un reato. "
  lmf_lover.1200.desc.unmarried:0 "Un[Select_CString(ROOT.Char.IsFemale,'a','')] [ROOT.Char.GetWomanMan] colto e accusat[Select_CString(ROOT.Char.IsFemale,'a','o')] di fornicazione? Non soltanto un peccato, ma un reato. "
  lmf_lover.1200.desc.secret:0 "Il fatto che dobbiamo restare costantemente vigili per custodire il nostro segreto non fa che aumentare la tensione che provo.\n\n"
  lmf_lover.1200.desc.public:0 "Avrei pensato che il fatto che la nostra relazione sia alla luce del sole rendesse le cose più facili, con le conseguenze ormai già compiute, ma non è così.\n\n"
  lmf_lover.1200.desc.independent:0 "Non è che tema le conseguenze, poiché non ho un signore feudale, "
  lmf_lover.1200.desc.liege:0 "Non è che tema le conseguenze, con [lover.GetFirstNameNoTooltip] come mio signore feudale, "
  lmf_lover.1200.desc.ruler:0 "Non è che tema le conseguenze, propriamente, "
  lmf_lover.1200.desc.end:0 "quanto piuttosto ciò che tutto questo peccato farà alla mia anima immortale. Il pensiero mi rode e, sebbene [lover.GetFirstNameNoTooltip] mi esorti a scacciarlo dalla mente, non posso. Non c'è nulla che [Select_CString(lover.IsFemale,'lei','lui')] possa fare per farmi stare bene riguardo a tutto questo."
  lmf_lover.1200.a:0 "Che cosa devo fare?"

  lmf_lover.1205.t:0 "Tutti gli occhi su di me"
  lmf_lover.1205.desc:0 "Avrei pensato che il fatto che la nostra relazione non sia un segreto rendesse le cose più facili.\n\nDopotutto, non v'è bisogno di mentire. Non v'è bisogno di coprire alcun incontro con [lover.GetFirstNameNoTooltip]. Io sono [ROOT.Char.GetTitleAsNameNoTooltip|l] di [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] e posso fare ciò che voglio, non è forse così?\n\nEppure quegli sguardi... i miei cortigiani e vassalli non dicono nulla, perché come potrebbero? Ma vedo il giudizio nei loro occhi. Cerco di scacciarlo, ma accade sempre più spesso quanto più a lungo [lover.GetFirstNameNoTooltip] e io stiamo insieme, e devo ammettere che mi rode un poco."
  lmf_lover.1205.a:0 "Che incredibile seccatura."

  lmf_lover.1210.t:0 "Sono cominciati i sussurri"
  lmf_lover.1210.desc:0 "Credevo stessimo attenti.\n\nChiaramente non lo eravamo, poiché a corte si sono diffusi sussurri su [lover.GetFirstNameNoTooltip] e me... su quanto spesso ci si veda insieme, su quanto amichevoli sembriamo, sul sospetto che forse vada persino oltre.\n\n"Sapevo che sarebbe accaduto," ha detto [lover.GetFirstNameNoTooltip] quando [Select_CString(lover.IsFemale,'le','gli')] ho riferito la notizia.\n\nForse sì, ma ora dobbiamo fare qualcosa, prima che il nostro segreto venga alla luce del sole."
  lmf_lover.1210.a:0 "Cercherò di mettere fine a questi sussurri."
  lmf_lover.1210.b:0 "Lascia che sia [lover.GetFirstNameNoTooltip] a cercare di mettere fine a questi sussurri."
  lmf_lover.1210.a.success.tt:0 "Le dicerie vengono soffocate con successo"
  lmf_lover.1210.a.failure.tt:0 "Il segreto viene comunque alla luce"
  lmf_lover.1210.c:0 "[lover.GetFirstNameNoTooltip] e io dobbiamo star lontani per un po', finché le cose non si calmano."

  lmf_lover.1215.t:0 "Tempo di scegliere"
  lmf_lover.1215.desc.start:0 "Capivo che [lover.GetFirstNameNoTooltip] era adirat[Select_CString(lover.IsFemale,'a','o')] per qualcosa.\n\nAbbiamo trascorso la notte insieme di recente e [Select_CString(lover.IsFemale,'lei','lui')] ha detto a malapena una parola. Infine, dopo che ho insistito, [Select_CString(lover.IsFemale,'lei','lui')] è esplos[Select_CString(lover.IsFemale,'a','o')]. "Voglio che tu ponga fine alle cose con [other_lover.GetTitledFirstNameNoTooltip]!"\n\n"
  lmf_lover.1215.desc.spouse:0 ""Porre fine... con la mia #EMP [other_lover.Custom2('GetYourConsortType', ROOT.Char )]#!?"\n\n"[Select_CString(other_lover.IsFemale,'Lei','Lui')|U] è più della tua [other_lover.Custom2('GetYourConsortType', ROOT.Char )]! La colmi d'attenzioni, non riesci a tenere le mani lontane da [Select_CString(other_lover.IsFemale,'lei','lui')], sei #EMP innamorat[Select_CString(ROOT.Char.IsFemale,'a','o')]#! di [Select_CString(other_lover.IsFemale,'lei','lui')]!"\n\n"
  lmf_lover.1215.desc.secret:0 "Sono rimast[Select_CString(ROOT.Char.IsFemale,'a','o')] di sasso che [Select_CString(lover.IsFemale,'lei','lui')] sapesse perfino di [other_lover.GetFirstNameNoTooltip]. "Sì, lo so!" ha urlato [Select_CString(lover.IsFemale,'lei','lui')]. "Non rivelerò il tuo segreto, non sono un idiota, ma non puoi essere innamorat[Select_CString(ROOT.Char.IsFemale,'a','o')] di [Select_CString(other_lover.IsFemale,'lei','lui')] mentre dici d'essere innamorat[Select_CString(ROOT.Char.IsFemale,'a','o')] di #EMP me!#!"\n\n"
  lmf_lover.1215.desc.public:0 "Ah. Sapevo che sarebbe venuto fuori prima o poi. "Vai in giro ostentandot[Select_CString(ROOT.Char.IsFemale,'i','i')] con [Select_CString(other_lover.IsFemale,'lei','lui')]!" ha urlato [Select_CString(lover.IsFemale,'lei','lui')]. "Sbandierandolo davanti a me, come se io non avessi nulla da dire o da provare! Sei innamorat[Select_CString(ROOT.Char.IsFemale,'a','o')] di [Select_CString(other_lover.IsFemale,'lei','lui')]? Sei almeno innamorat[Select_CString(ROOT.Char.IsFemale,'a','o')] di me?!"\n\n"
  lmf_lover.1215.desc.end:0 "La nostra lite è degenerata finché, infine, [lover.GetFirstNameNoTooltip] ha posto il [Select_CString(lover.IsFemale,'suo','suo')] ultimatum: dovevo scegliere tra loro, oppure tra noi era finita."
  lmf_lover.1215.a:0 ""Naturalmente scelgo te!""
  lmf_lover.1215.b:0 ""Se devo, allora scelgo [Select_CString(other_lover.IsFemale,'lei','lui')].""
  lmf_lover.1215.c:0 ""Non puoi costringermi a scegliere. Non lo farò!""
  lmf_lover.1215.c.angry:0 "[lover.GetFirstNameNoTooltip] è furios[Select_CString(lover.IsFemale,'a','o')] ma cede"
  lmf_lover.1215.c.dumped:0 "[lover.GetFirstNameNoTooltip] mantiene la minaccia"

  lmf_lover.1220.t:0 "Balia improvvisata?"
  lmf_lover.1220.desc:0 "Quando [lover.GetFirstNameNoTooltip] mi ha mandato un messaggio dicendo che desiderava trascorrere la giornata insieme, ne sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] liet[Select_CString(ROOT.Char.IsFemale,'a','o')]. La [ROOT.Char.Custom('FortifiedBuilding')] era quieta, per una volta, così ho potuto svignarmela.\n\nCosì è stato con una certa sorpresa che l'ho vista arrivare con un[Select_CString(my_bastard.IsFemale,'a','')] [my_bastard.Custom('ChildhoodPersonalityTrait')|l] [my_bastard.Custom('polite_gender_ref')] al [Select_CString(my_bastard.IsFemale,'suo','suo')] fianco: [my_bastard.GetFirstNameNoTooltip], [Select_CString(lover.IsFemale,'la sua','il suo')] [my_bastard.Custom('GetDaughterSon')]... che, guarda caso, è anche il mio [my_bastard.Custom('GetDaughterSon')].\n\n"Voglio che [my_bastard.GetFirstNameNoTooltip] conosca [Select_CString(my_bastard.IsFemale,'suo','suo')] padre," ha detto. "Vedi [Select_CString(my_bastard.IsFemale,'lei','lui')] così di rado, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], e questa potrebbe essere la tua unica occasione prima che [Select_CString(my_bastard.IsFemale,'lei','lui')] sia cresciut[Select_CString(my_bastard.IsFemale,'a','o')]."\n\nVedevo che era determinata a far sì che accadesse, ma... un'intera giornata con il [my_bastard.Custom('GetLassLad')]?"
  lmf_lover.1220.a:0 "Forse questa era un'occasione per un legame tra padre e [my_bastard.Custom('GetDaughterSon')]?"
  lmf_lover.1220.a.success:0 "La giornata insieme è un successo"
  spent_time_with_me:0 "[CHARACTER.GetShortUIName|U] e [TARGET_CHARACTER.GetShortUIName] hanno trascorso del tempo a conoscersi come padre e [CHARACTER.Custom('GetDaughterSon')]."
  spent_time_with_me_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] e [CHARACTER.GetShortUIName] hanno trascorso del tempo a conoscersi come padre e [TARGET_CHARACTER.Custom('GetDaughterSon')]."
  lmf_lover.1220.a.failure:0 "È una giornata imbarazzante, piena di delusioni"
  lmf_lover.1220.b:0 "Non ho né tempo né pazienza per questo!"
  refused_to_spend_time_with_me:0 "Il vero padre di [CHARACTER.GetShortUINamePossessive|U], [TARGET_CHARACTER.GetShortUIName], ha respinto [Select_CString( CHARACTER.IsLocalPlayer, 'me', CHARACTER.GetShortUIName )]."
  refused_to_spend_time_with_me_corresponding:0 "[CHARACTER.GetShortUIName|U] ha respinto il segret[Select_CString(TARGET_CHARACTER.IsFemale,'o','a')] [TARGET_CHARACTER.Custom('GetDaughterSon')] di [CHARACTER.GetHerHisMy], [TARGET_CHARACTER.GetShortUIName]."

lmf_lover.1225.opening: 0 "Amore mio,"
  lmf_lover.1225.secret:0 "So che ciò potrebbe sorprenderti, ma è tempo che tu lo sappia: il mio caro [my_bastard.Custom('polite_gender_ref')], [my_bastard.GetFirstName], è [my_bastard.Custom('GetDaughterSon')] tuo.\n\n"
  lmf_lover.1225.public:0 "Ti scrivo riguardo al nostro caro [my_bastard.Custom('polite_gender_ref')], [my_bastard.GetFirstName], che ogni giorno cresce e si fa più alt[Select_CString(my_bastard.IsFemale,'a','o')].\n\n"
  lmf_lover.1225.courtier:0 "Voglio che [Select_CString(my_bastard.IsFemale,'lei','lui')] riceva una buona educazione e abbia un avvenire, e qui a [lover.GetLiege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] ciò non accadrà. "
  lmf_lover.1225.pool:0 "Voglio che [Select_CString(my_bastard.IsFemale,'lei','lui')] riceva una buona educazione e abbia un avvenire, e io non posso dare [Select_CString(my_bastard.IsFemale,'lei','lui')] né l'una né l'altro. "
  lmf_lover.1225.end:0 "È mio desiderio mandare [Select_CString(my_bastard.IsFemale,'lei','lui')] alla tua corte, a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], dove [Select_CString(my_bastard.IsFemale,'lei','lui')] possa essere cresciut[Select_CString(my_bastard.IsFemale,'a','o')] come si conviene a un[Select_CString(my_bastard.IsFemale,'a','')] giovane [my_bastard.GetWomanMan]. Puoi farlo per me?"
  lmf_lover.1225.a:0 "[new_guardian.GetTitledFirstNameNoTooltip] sarebbe un ottimo tutore per il [my_bastard.Custom('GetLassLad')]."
  lmf_lover.1225.b:0 "Sono certo che qui possiamo trovare qualcuno che sia il [Select_CString(my_bastard.IsFemale,'suo','suo')] tutore, sì."
  lmf_lover.1225.c:0 "Portar[Select_CString(my_bastard.IsFemale,'la','lo')] qui? No, non accadrà."

  lmf_lover.1230.t:0 "Un posto per [Select_CString(my_bastard.IsFemale,'la mia','il mio')] [my_bastard.Custom('GetDaughterSon')|U]?"
  lmf_lover.1230.desc.start:0 "Quando [lover.GetFirstNameNoTooltip] chiese formalmente di parlarmi in privato, accettai con esitazione.\n\nSi scoprì che ciò di cui voleva parlare — o, meglio, di chi — era [Select_CString(my_bastard.IsFemale,'nostra','nostro')] [my_bastard.Custom('GetDaughterSon')]. "
  lmf_lover.1230.desc.othercourt:0 ""Il potenziale di [my_bastard.GetFirstNamePossessiveNoTooltip] è sprecato alla corte di [my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip]", si lamentò. "
  lmf_lover.1230.desc.otherknight:0 ""Il potenziale di [my_bastard.GetFirstNamePossessiveNoTooltip] è sprecato come uno dei [my_bastard.GetLiege.Custom('KnightCulturePluralNoTooltipLowercase')] di [my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip]", si lamentò. "
  lmf_lover.1230.desc.other:0 ""[my_bastard.GetFirstNameNoTooltip] non ha incarichi alla corte di [my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip]. Tutto quel potenziale! Sprecato!" si lamentò. "
  lmf_lover.1230.desc.court:0 ""Il potenziale di [my_bastard.GetFirstNamePossessiveNoTooltip] è sprecato qui a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]", si lamentò. "Devi dare a [Select_CString(my_bastard.IsFemale,'lei','lui')] qualcosa di utile da fare!"\n\n"
  lmf_lover.1230.desc.pool:0 ""[my_bastard.GetFirstNameNoTooltip] ha tanto potenziale, ma nessun signore da servire come si deve", si lamentò. "
  lmf_lover.1230.desc.bring:0 ""Voglio che tu porti [Select_CString(my_bastard.IsFemale,'lei','lui')] qui, dove [Select_CString(my_bastard.IsFemale,'lei','lui')] possa rendersi utile."\n\n"
  lmf_lover.1230.desc.mid:0 ""Definisci ‘utile’", chiesi.\n\n"
  lmf_lover.1230.desc.target:0 "Aveva la risposta pronta: "Rendi [Select_CString(my_bastard.IsFemale,'lei','lui')] [Select_CString(my_bastard.IsFemale,'la tua','il tuo')] [my_bastard.Custom('GetTargetCourtPosition')]." Per poco non scoppiavo a ridere, ma [lover.GetFirstNameNoTooltip] fu irremovibile. "
  lmf_lover.1230.desc.notarget:0 "[lover.GetFirstNameNoTooltip] era meno sicura. "Io... io non lo so. #EMP Qualcosa#!!" Le dissi che era ben poco utile, ma fu irremovibile. "
  lmf_lover.1230.desc.backup:0 ""Oppure [Select_CString(my_bastard.IsFemale,'la tua','il tuo')] [my_bastard.Custom('GetBackupCourtPosition')], magari!" gridò. "
  lmf_lover.1230.desc.end:0 ""[my_bastard.GetFirstNameNoTooltip] è del tuo stesso sangue! Tu #EMP devi#! dare a [Select_CString(my_bastard.IsFemale,'lei','lui')] un’occasione!""
  lmf_lover.1230.a:0 ""E va bene, [my_bastard.GetFirstNameNoTooltip] sarà [Select_CString(my_bastard.IsFemale,'la mia','il mio')] [my_bastard.Custom('GetTargetCourtPosition')].""
  lmf_lover.1230.b:0 ""Io... suppongo che [Select_CString(my_bastard.IsFemale,'lei','lui')] potrebbe essere [Select_CString(my_bastard.IsFemale,'la mia','il mio')] [my_bastard.Custom('GetBackupCourtPosition')], certo.""
  lmf_lover.1230.c:0 ""[Select_CString(my_bastard.IsFemale,'Lei','Lui')|U] può venire e unirsi ai ranghi dei miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].""
  lmf_lover.1230.d:0 ""In verità, non devo a [Select_CString(my_bastard.IsFemale,'lei','lui')] #EMP proprio nulla#!.""
  lmf_lover.1231.title.tt:0 "Promessa Infranta"
  lmf_lover.1231.desc:0 "Hai infranto la promessa fatta a [lover.GetFirstNameNoTooltip], revocando la posizione di [my_bastard.GetFirstNamePossessive] alla tua corte."

  lmf_lover.1235.t:0 "Una Richiesta Legittima"
  lmf_lover.1235.desc:0 "Dopo una recente serata trascorsa con [lover.GetFirstNameNoTooltip], [Select_CString(lover.IsFemale,'lei','lui')] tirò fuori l’argomento di [Select_CString(my_bastard.IsFemale,'nostra','nostro')] [my_bastard.Custom('GetDaughterSon')], [my_bastard.GetFirstName].\n\n"Tutti sanno chi sono per te", disse, "e sanno anche chi è [Select_CString(my_bastard.IsFemale,'lei','lui')]. È tempo che [Select_CString(my_bastard.IsFemale,'lei','lui')] sia legittimat[Select_CString(my_bastard.IsFemale,'a','o')]."\n\n"Legittimat[Select_CString(my_bastard.IsFemale,'a','o')]...?" Fui sinceramente sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')]. "Ma tu e io non siamo sposati, amore mio."\n\nLo sguardo che mi lanciò disse, con chiarezza, che era una faccenda #EMP mia#!, non sua. "Eppure [Select_CString(my_bastard.IsFemale,'lei','lui')] è [Select_CString(my_bastard.IsFemale,'tua','tuo')] [my_bastard.Custom('GetDaughterSon')]! Non è giusto che [Select_CString(my_bastard.IsFemale,'lei','lui')] venga trattat[Select_CString(my_bastard.IsFemale,'a','o')] diversamente, e tu puoi cambiare questo!" Capivo che [lover.GetFirstNameNoTooltip] avrebbe insistito."
  lmf_lover.1235.a:0 "Forse ha ragione. E va bene."
  lmf_lover.1235.topliege.tt:0 "Invierai una richiesta a [recipient.GetShortUIName] perché [secondary_recipient.GetShortUIName] venga legittimat[Select_CString(secondary_recipient.IsFemale,'a','o')]"
  lmf_lover.1235.b:0 "No, non accadrà."

  lmf_lover.1240.t:0 "Da tempo atteso"
  lmf_lover.1240.desc:0 "Chi avrebbe mai pensato che, quando [lover.GetFirstNameNoTooltip] diede inizio alla nostra relazione, saremmo rimasti insieme per così tanti anni?\n\nNon io, ed ero stato io a rendere chiaro che non consideravo la nostra tresca una cosa seria. Eppure siamo ancora insieme, e sebbene sia vero che un po’ di scintilla si sia spenta nel nostro ardore, non posso negare che io provi ancora grande affetto per [Select_CString(lover.IsFemale,'lei','lui')].\n\nSe voglio che ciò continui, però, potrei dover cominciare a metterci molto più impegno. Potrei dover considerare l’idea che forse la nostra relazione #EMP sta#! andando davvero da qualche parte. Eppure... #EMP lo voglio#! davvero?"
  lmf_lover.1240.a:0 "Lo voglio. Metterò l’impegno necessario perché accada."
  lmf_lover.1240.b:0 "No. È quel che è."

  lmf_lover.1245.t:0 "Amore e Odio"
  lmf_lover.1245.desc:0 "[lover.GetFirstNameNoTooltip] è in collera con me.\n\nO forse [Select_CString(lover.IsFemale,'lei','lui')] ha cominciato a non sopportarmi più, perfino a odiarmi. Qualunque sia la verità, vedo [Select_CString(lover.IsFemale,'lei','lui')] solo di rado, negli ultimi mesi. E quando ci incontriamo, [Select_CString(lover.IsFemale,'lei','lui')] è distante e talvolta fredd[Select_CString(lover.IsFemale,'a','o')].\n\nÈ possibile che passi, questo è vero. Oppure forse è l’inizio della fine. Lo si vedrà."
  lmf_lover.1245.a:0 "Devo agire, se voglio tenere con me [Select_CString(lover.IsFemale,'lei','lui')]."

  lmf_lover.1250.t:0 "Qualcosa che ho detto?"
  lmf_lover.1250.desc:0 "Qualcosa è andato terribilmente storto durante il mio ultimo incontro con [lover.GetFirstNameNoTooltip].\n\nPrima ancora di arrivare alla parte migliore della serata, [Select_CString(lover.IsFemale,'lei','lui')] si fece molto silenzios[Select_CString(lover.IsFemale,'a','o')]. [Select_CString(lover.IsFemale,'Lei','Lui')|U] era in collera, me ne accorsi, ma non riuscivo a ricordare cosa mai avessi detto per ridurre [Select_CString(lover.IsFemale,'lei','lui')] così. Peggio ancora, ogni tentativo che feci di chiedere a [Select_CString(lover.IsFemale,'lei','lui')] quale fosse il problema sembrò solo irritare [Select_CString(lover.IsFemale,'lei','lui')] ancor di più! Alla fine degenerò in un litigio, dopo il quale [Select_CString(lover.IsFemale,'lei','lui')] raccolse i [Select_CString(lover.IsFemale,'suoi','suoi')] abiti e se ne andò.\n\nNon credo che il problema sia grave, ma temo che, se non farò nulla per appianare le cose con [lover.GetFirstNameNoTooltip], ciò influirà sulla nostra relazione."
  lmf_lover.1250.a:0 "Allora farò meglio a provarci."
  lmf_lover.1250.a.success:0 "[lover.GetFirstNameNoTooltip] cede, divertit[Select_CString(lover.IsFemale,'a','o')] dai tuoi sforzi"
  lmf_lover.1250.a.failure:0 "I tuoi sforzi non fanno che irritare [Select_CString(lover.IsFemale,'lei','lui')] ancor di più"
  lmf_lover.1250.b:0 "Meglio lasciar dormire i cani che già dormono, dico io."

  lmf_lover.1255.t:0 "Gli opposti si scontrano"
  lmf_lover.1255.desc.courtier:0 "Ero liet[Select_CString(ROOT.Char.IsFemale,'a','o')] d’aver finalmente l’occasione di trascorrere la serata da sol[Select_CString(ROOT.Char.IsFemale,'a','o')] con [lover.GetFirstNameNoTooltip], "
  lmf_lover.1255.desc.notcourtier:0 "Ero liet[Select_CString(ROOT.Char.IsFemale,'a','o')] quando una visita a sorpresa di [lover.GetFirstNameNoTooltip] coincise con la possibilità di trascorrere la serata da sol[Select_CString(ROOT.Char.IsFemale,'a','o')] con [Select_CString(lover.IsFemale,'lei','lui')], "
  lmf_lover.1255.desc.mid:0 "una rarità negli ultimi tempi.\n\nAll’inizio andò abbastanza bene, ma ben presto cominciammo a battibeccare. Piccole cose, dapprima. Un commento pungente che [Select_CString(lover.IsFemale,'lei','lui')] fece e che mi fece digrignare i denti. Un’osservazione infelice che io feci e che fece aggrottare le sopracciglia a [Select_CString(lover.IsFemale,'lei','lui')]. Quando arrivammo alla camera da letto, era diventato un litigio in piena regola, senza soluzione... e di certo senza alcun piacere.\n\n"
  lmf_lover.1255.desc.courtier2:0 "[lover.GetFirstNameNoTooltip] se ne andò infuriat[Select_CString(lover.IsFemale,'a','o')] nelle [Select_CString(lover.IsFemale,'sue','sue')] stanze nel [ROOT.Char.Custom('FortifiedBuilding')], "
  lmf_lover.1255.desc.notcourtier2:0 "[lover.GetFirstNameNoTooltip] se ne andò infuriat[Select_CString(lover.IsFemale,'a','o')], congedandosi presto dal [ROOT.Char.Custom('FortifiedBuilding')], "
  lmf_lover.1255.desc.end:0 "e io rimasi a riflettere. Siamo tanto diversi, così dissimili in così molti modi, che talvolta mi chiedo come siamo persino diventati amanti. Potrei provare a ricucire, ma richiederà impegno."
  lmf_lover.1255.a:0 "Devo provarci."
  lmf_lover.1255.a.success.tt:0 "Riesci ad appianare le cose"
  lmf_lover.1255.a.failure.tt:0 "[lover.GetFirstNameNoTooltip] respinge i tuoi sforzi"
  lmf_lover.1255.b:0 "Non ha senso. [Select_CString(lover.IsFemale,'Lei','Lui')|U] deve cambiare, non io."

  lmf_lover.1260.t:0 "Separati dal Dovere"
  lmf_lover.1260.desc:0 "[lover.GetFirstNameNoTooltip] e io siamo entrambi così impegnati.\n\nIo governo a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], mentre i doveri di [Select_CString(lover.IsFemale,'lei','lui')] come [lover.Custom('IT_NAM_COL3')][lover.GetTitleAsNameNoTooltip|l] lo tengono occupat[Select_CString(lover.IsFemale,'a','o')] a [lover.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Così, le occasioni per vederci sono poche e distanti.\n\nPotrebbe essere difficile, ma forse dobbiamo impegnarci di più. Se non lo facciamo, ho la sensazione che la nostra tresca possa lentamente diventare una cosa fugace..."
  lmf_lover.1260.a:0 "Dobbiamo impegnarci di più!"
  lmf_lover.1260.b:0 "C’è ben poco da fare. È quel che è."

  lmf_lover.1265.t:0 "Luogo sbagliato, momento sbagliato"
  lmf_lover.1265.desc:0 "[lover.GetFirstNameNoTooltip] e io avevamo appena concluso un’altra deliziosa serata in reciproca compagnia. In effetti, [Select_CString(lover.IsFemale,'lei','lui')] aveva appena finito di raccogliere i [Select_CString(lover.IsFemale,'suoi','suoi')] abiti ed era sgattaiolat[Select_CString(lover.IsFemale,'a','o')] fuori dalla camera quando, all’improvviso, udii la porta aprirsi di nuovo.\n\nPensando fosse [Select_CString(lover.IsFemale,'lei','lui')], balzai giù dal letto. "Hai dimenticato qualcosa, amore mio?" chiamai.\n\nFu solo allora, troppo tardi, che mi resi conto che sulla soglia c’era [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))|l], non [Select_CString(lover.IsFemale,'lei','lui')], venut[Select_CString(my_courtier.IsFemale,'a','o')] a consegnare un messaggio.\n\n[my_courtier.GetFirstNameNoTooltip] aveva udito ciò che avevo detto? Aveva visto [lover.GetFirstNameNoTooltip] andar via, poco prima? Dovevo pensare in fretta..."
  lmf_lover.1265.a:0 "Convincere [my_courtier.GetFirstNameNoTooltip] che è stato tutto un malinteso."
  lmf_lover.1265.a.success.tt:0 "[my_courtier.GetFirstNameNoTooltip] è convint[Select_CString(my_courtier.IsFemale,'a','o')] che non fosse nulla"
  lmf_lover.1265.a.failure.tt:0 "[my_courtier.GetFirstNameNoTooltip] sa che stai mentendo"
  lmf_lover.1265.b:0 "Implorare [my_courtier.GetFirstNameNoTooltip] di non dire una parola."
  lmf_lover.1265.b.success.tt:0 "[my_courtier.GetFirstNameNoTooltip] accetta di tenere chiusa la bocca"
  courtier_promised_not_to_reveal_tt:0 "[my_courtier.GetFirstNameNoTooltip] promette di non rivelare il [secret|E]"
  lmf_lover.1265.b.failure.tt:0 "Non sei molto convincent[Select_CString(ROOT.Char.IsFemale,'e','e')]"
  lmf_lover.1265.c:0 "Congedare [Select_CString(my_courtier.IsFemale,'lei','lui')] e poi attendere di vedere cosa accade."
  lmf_lover.1265.c.knows.tt:0 "[my_courtier.GetFirstNameNoTooltip] ha visto tutto e lo sa"
  lmf_lover.1265.c.revealed.tt:0 "[my_courtier.GetFirstNameNoTooltip] lo dice a qualcuno, e la voce si sparge..."
  lmf_lover.1265.c.learned.tt:0 "[my_courtier.GetFirstNameNoTooltip] tiene il segreto per [Select_CString(my_courtier.IsFemale,'sé','sé')], per ora"

  lmf_lover.1270.t:0 "Il testimone inatteso"
  lmf_lover.1270.desc:0 "[lover.GetFirstNameNoTooltip] e io eravamo nel mezzo di un delizioso pomeriggio, dopo esserci appartati nelle mie stanze mentre gran parte del [ROOT.Char.Custom('FortifiedBuilding')] era occupato, quando gli occhi di [lover.GetFirstNamePossessiveNoTooltip] si spalancarono all’improvviso per lo shock.\n\nMi voltai, e chi avrei dovuto vedere se non il giovane [my_courtier.GetFirstNameNoTooltip], a occhi spalancati e confus[Select_CString(my_courtier.IsFemale,'a','o')].\n\nCome la [my_courtier.Custom('GetLassLad')] fosse entrat[Select_CString(my_courtier.IsFemale,'a','o')] o cosa [Select_CString(my_courtier.IsFemale,'lei','lui')] pensasse persino di farci lì non saprei dirlo, ma mentre mi affrettavo a infilarmi le brache dovetti decidere: provo a convincere la [my_courtier.Custom('GetLassLad')] che ciò che [Select_CString(my_courtier.IsFemale,'lei','lui')] ha visto non è davvero ciò che [Select_CString(my_courtier.IsFemale,'lei','lui')] ha visto? O confido che la gente sminuisca qualunque storia [Select_CString(my_courtier.IsFemale,'lei','lui')] possa raccontare a causa della [Select_CString(my_courtier.IsFemale,'sua','sua')] giovane età?"
  lmf_lover.1270.a:0 "È tempo di parlare in fretta!"
  lmf_lover.1270.a.success.tt:0 "La convinci che era tutta una messinscena"
  lmf_lover.1270.a.failure.tt:0 "Provare a convincer[Select_CString(my_courtier.IsFemale,'la','lo')] non fa che peggiorare le cose"
  lmf_lover.1270.b:0 "Nessuno crederà a [Select_CString(my_courtier.IsFemale,'lei','lui')], ne sono cert[Select_CString(ROOT.Char.IsFemale,'a','o')]."
  lmf_lover.1270.c:0 "Le cose che faccio per amore..."
  lmf_lover.1270.c.tt:0 "#EMP Tu spingi [my_courtier.GetShortUIName] fuori da una finestra, con ogni probabilità uccidend[Select_CString(my_courtier.IsFemale,'la','lo')] nella caduta fino al cortile sottostante!#!\n"
  lmf_lover.1270.c.death.tt:0 "#EMP [my_courtier.Custom('IT_NAM_COL3')][my_courtier.GetTitledFirstNameNoTooltip] viene uccis[Select_CString(my_courtier.IsFemale,'a','o')] nella caduta, a quanto pare accidentale.#!"
  lmf_lover.1270.c.death.title:0 "[my_courtier.Custom('IT_NAM_COL3')][my_courtier.GetTitledFirstNameNoTooltip] muore per una caduta"
  lmf_lover.1270.c.death.desc:0 "[my_courtier.GetShortUIName] è perit[Select_CString(my_courtier.IsFemale,'a','o')] dopo essere cadut[Select_CString(my_courtier.IsFemale,'a','o')] da una finestra della camera da letto fino al cortile. Si ritiene che la caduta sia stata un incidente. "
  lmf_lover.1270.c.death2.title:0 "[my_courtier.Custom('IT_NAM_COL3')][my_courtier.GetTitledFirstNameNoTooltip] muore per la caduta"
  lmf_lover.1270.c.death2.desc:0 "[my_courtier.GetShortUIName] non si riprende dalla caduta. Il tuo segreto è al sicuro."
  lmf_lover.1270.c.crippled.tt:0 "#EMP [my_courtier.Custom('IT_NAM_COL3')][my_courtier.GetTitledFirstNameNoTooltip] sopravvive alla caduta, ma è gravemente ferit[Select_CString(my_courtier.IsFemale,'a','o')] e storpiat[Select_CString(my_courtier.IsFemale,'a','o')]. [Select_CString(my_courtier.IsFemale,'Lei','Lui')|U] potrà raccontare a tutti cos’è accaduto quando [Select_CString(my_courtier.IsFemale,'lei','lui')] si riprenderà.#!"
  lmf_lover.1270.c.crippled.title:0 "[my_courtier.Custom('IT_NAM_COL3')][my_courtier.GetTitledFirstNameNoTooltip] sopravvive alla caduta"
  lmf_lover.1270.c.crippled.desc:0 "[my_courtier.GetShortUIName] è sopravvissut[Select_CString(my_courtier.IsFemale,'a','o')] a stento alla caduta, ed è sia gravemente ferit[Select_CString(my_courtier.IsFemale,'a','o')] sia storpiat[Select_CString(my_courtier.IsFemale,'a','o')]. Dopo essersi ripres[Select_CString(my_courtier.IsFemale,'a','o')], [Select_CString(my_courtier.IsFemale,'lei','lui')] è stat[Select_CString(my_courtier.IsFemale,'a','o')] in grado di raccontare a tutti cos’è accaduto!"
  lmf_lover.1270.c.survive.tt:0 "#EMP [my_courtier.Custom('IT_NAM_COL3')][my_courtier.GetTitledFirstNameNoTooltip] sopravvive miracolosamente alla caduta senza vere ferite, ed è in grado di raccontare a tutti cos’è accaduto.#!"
  lmf_lover.1270.c.survive.desc:0 "[my_courtier.GetShortUIName] è sopravvissut[Select_CString(my_courtier.IsFemale,'a','o')] miracolosamente alla caduta quasi illes[Select_CString(my_courtier.IsFemale,'a','o')], ed è stat[Select_CString(my_courtier.IsFemale,'a','o')] in grado di raccontare a tutti cos’è accaduto!"

  lmf_lover.1271.t:0 "Una caduta in disgrazia"
  lmf_lover.1271.start:0 "Sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] informat[Select_CString(ROOT.Char.IsFemale,'a','o')] che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))] è cadut[Select_CString(my_courtier.IsFemale,'a','o')] oggi da una delle finestre del [ROOT.Char.Custom('FortifiedBuilding')], piombando nel cortile in una caduta che avrebbe dovuto porre fine alla [Select_CString(my_courtier.IsFemale,'sua','sua')] giovane vita.\n\n"
  lmf_lover.1271.crippled:0 "E invece, il[my_courtier.Custom('GetLassLad')] è riuscit[Select_CString(my_courtier.IsFemale,'a','o')] a sopravvivere... ma a stento. Mi dicono che le [Select_CString(my_courtier.IsFemale,'sue','sue')] ferite siano piuttosto gravi, e che forse non camminerà mai più.\n\n"
  lmf_lover.1271.survived:0 "E invece, pare che il[my_courtier.Custom('GetLassLad')] abbia riportato soltanto poche ferite, e che la guarigione sia certa. Ah, la resilienza della gioventù!\n\n"
  lmf_lover.1271.end:0 "Più preoccupante è #EMP perché#! [Select_CString(my_courtier.IsFemale,'lei','lui')] sia cadut[Select_CString(my_courtier.IsFemale,'a','o')]. Non appena [my_courtier.Custom('IT_NAM_COL3')][my_courtier.GetTitledFirstName] è stat[Select_CString(my_courtier.IsFemale,'a','o')] in grado di parlare, ha detto che aveva sorpreso [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('murderer'))] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('lover'))] in una... posizione compromettente, lì nella camera da letto. Piuttosto che rischiare che la loro relazione venisse rivelata, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('murderer'))] ha spinto [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))] fuori dalla finestra della camera da letto! Un tentato omicidio, per coprire le proprie indiscrezioni!"
  lmf_lover.1271.a:0 "Incredibile!"
  lmf_lover.1271.a.tt1:0 "[scope:my_courtier.GetShortUINameNoTooltip] rivela il Segreto d'Amante di [scope:murderer.GetShortUINamePossessive]"
  lmf_lover.1271.a.tt2:0 "[scope:my_courtier.GetShortUINameNoTooltip] rivela il Segreto di Tentato Omicidio di [scope:murderer.GetShortUINamePossessive]"

lmf_lover.1275.t: 0 "L'amante del mio [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
  lmf_lover.1275.desc.start:0 "Di recente, [lover.GetFirstNameNoTooltip] si è comportat[Select_CString(lover.IsFemale,'a','o')] in modo diverso. Nulla di sospetto, in sé, ma distante. Distratt[Select_CString(lover.IsFemale,'a','o')]. Tanto da spingermi a "
  lmf_lover.1275.desc.courtier:0 "far sì che alcuni servi del [ROOT.Char.Custom('FortifiedBuilding')] tenessero d'occhio [Select_CString(lover.IsFemale,'lei','lui')] in silenzio, quando non ero nei paraggi.\n\n"
  lmf_lover.1275.desc.othercourtier:0 "pagare diversi servi perché tenessero d'occhio [Select_CString(lover.IsFemale,'lei','lui')] quando è tornat[Select_CString(lover.IsFemale,'a','o')] alla corte di [lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip] dopo il nostro ultimo incontro.\n\n"
  lmf_lover.1275.desc.landed:0 "pagare diversi servi alla [Select_CString(lover.IsFemale,'sua','sua')] corte a [lover.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] perché tenessero d'occhio [Select_CString(lover.IsFemale,'lei','lui')].\n\n"
  lmf_lover.1275.desc.other:0 "pagare diversi servi perché seguissero [Select_CString(lover.IsFemale,'lei','lui')] quando è partit[Select_CString(lover.IsFemale,'a','o')] da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dopo il nostro ultimo incontro.\n\n"
  lmf_lover.1275.desc.end:0 "La mia intenzione era soltanto scoprire che cosa non andasse, poiché forse si trattava di qualcosa in cui avrei potuto aiutare. Ciò che i servi mi hanno riferito, tuttavia, mi ha sorpreso.\n\n[lover.GetFirstNameNoTooltip] è stat[Select_CString(lover.IsFemale,'a','o')] visto più volte in compagnia di [other_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]... e non erano incontri innocenti. I due sono stati sorpresi a ridere, toccarsi, civettare, e si sarebbero subito separati fingendo innocenza se avessero pensato che qualcuno fosse lì vicino.\n\nOra mi è chiaro: [lover.GetFirstNameNoTooltip] ha un amante segreto."
  lmf_lover.1275.a:0 "Ebbene, #EMP questa#! sì che è inattesa..."

  lmf_lover.1280.t:0 "L'altro amante di [lover.GetFirstNameNoTooltip]"
  lmf_lover.1280.desc:0 "Non riesco a togliermi dalla mente quell'immagine.\n\n[lover.GetFirstNameNoTooltip] e [other_lover.Custom('IT_NAM_COL3')][other_lover.GetTitledFirstNameNoTooltip], i loro corpi intrecciati fra le lenzuola, il sudore che si mescola, i gemiti che sfuggono dalle labbra mentre...\n\n#EMP No.#! Devo fare qualcosa, prima di impazzire del tutto, di certo."
  lmf_lover.1280.a:0 "[lover.GetFirstNameNoTooltip] deve scegliere fra noi."
  lmf_lover.1280.a.you:0 "[lover.GetFirstNameNoTooltip] sceglie te"
  lmf_lover.1280.a.them:0 "[lover.GetFirstNameNoTooltip] sceglie [Select_CString(other_lover.IsFemale,'lei','lui')]"
  lmf_lover.1280.b:0 "Cercherò di scacciarlo dalla mente..."
  lmf_lover.1280.c:0 "No, ne ho abbastanza. Finisce qui."

  lmf_lover.1285.t:0 "Un ardore che si raffredda"
  lmf_lover.1285.desc:0 "Mi è venuto in mente oggi che, di recente, ho visto a malapena [lover.GetFirstNameNoTooltip].\n\n[Select_CString(lover.IsFemale,'Lei','Lui')|U] non è venut[Select_CString(lover.IsFemale,'a','o')] a cercarmi, né ha inviato un messaggio... e, ciò che è peggio, io non me ne sono nemmeno accort[Select_CString(ROOT.Char.IsFemale,'a','o')]. Forse è vero ciò che dicono, che l'amore semplicemente svanisca col passare del tempo. O è perché non ho fatto lo sforzo necessario per sostenere ciò che un tempo avevamo.\n\nDovrei tentare? O è tempo di porre fine a tutto, qui e ora, e chiuderla una volta per tutte?"
  lmf_lover.1285.a:0 "Troverò un modo per ravvivare la scintilla!"
  lmf_lover.1285.a.success.tt:0 "I tuoi sforzi sono apprezzati"
  lmf_lover.1285.a.failure.tt:0 "Purtroppo, peggiori soltanto le cose"
  lmf_lover.1285.b:0 "Ahimè, credo che sia finita..."

  lmf_lover.1500.t:0 "Lontano dagli occhi, lontano dal cuore"
  lmf_lover.1500.desc:0 "L'ultima volta che ho ricevuto una lettera da [lover.GetFirstNameNoTooltip], [Select_CString(lover.IsFemale,'lei','lui')] era da qualche parte in [lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], ma anche quella impiegò mesi per raggiungermi qui a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], quindi chissà se [Select_CString(lover.IsFemale,'lei','lui')] è ancora laggiù? [lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] è così distante che è quasi impossibile inviare o ricevere notizie.\n\nVorrei dire che continuo a sperare che [Select_CString(lover.IsFemale,'lei','lui')] faccia presto ritorno, ma ne dubito... e, col passare dei mesi, mi scopro a pensare a [Select_CString(lover.IsFemale,'lei','lui')] sempre meno.\n\nSospetto che [Select_CString(lover.IsFemale,'lei','lui')] provi lo stesso."
  lmf_lover.1500.a:0 "Così sia."

  lmf_lover.1505.t:0 "Il mio distante [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
  lmf_lover.1505.desc.start:0 "È passato parecchio tempo dall'ultima volta che ho avuto notizie di [lover.GetFirstNameNoTooltip].\n\nL'ultima volta che ne seppi qualcosa, [Select_CString(lover.IsFemale,'lei','lui')] era "
  lmf_lover.1505.desc.courtier:0 "parte della corte di [lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip] in [lover.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip], "
  lmf_lover.1505.desc.pool:0 "da qualche parte nella lontana [lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], "
  lmf_lover.1505.desc.end:0 "benché non saprei dire che cosa stia facendo laggiù.\n\nCiò che posso dire è che mi manca [Select_CString(lover.IsFemale,'lei','lui')]. Forse dovrei assoldare alcuni uomini fidati perché rintraccino [lover.GetFirstNameNoTooltip] e vedano se riescono a convincer[Select_CString(lover.IsFemale,'la','lo')] a unirsi alla mia corte a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]... ammesso, naturalmente, che riescano persino a trovar[Select_CString(lover.IsFemale,'la','lo')]."
  lmf_lover.1505.a:0 "Mandali subito."
  lmf_lover.1505.a.success.tt:0 "[lover.GetTitledFirstNameNoTooltip] viene trovat[Select_CString(lover.IsFemale,'a','o')] e accetta di unirsi alla tua corte"
  lmf_lover.1505.b:0 "Se [Select_CString(lover.IsFemale,'lei','lui')] desidera tornare, [Select_CString(lover.IsFemale,'lei','lui')] tornerà."

lmf_scheme.1031.family.opening: 0 "[proposer.Custom2('GreetingToFamilyPositive', ROOT.Char )],"
lmf_scheme.1031.courtier.opening: 0 "[proposer.Custom2('GreetingToLiegePositive', ROOT.Char )],"
lmf_scheme.1031.opening: 0 "[proposer.Custom2('GreetingToForeignRulerPositive', ROOT.Char )],"

  lmf_scheme.1031.my.relation.notcourtier:0 "Vengo a chiedere il tuo permesso di sposare il tuo [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.GetTitledFirstName], che fa parte della corte di [Select_CString(proposer_target_liege.IsLocalPlayer, 'tu', proposer_target_liege.GetShortUINamePossessive )].\n\n"
  lmf_scheme.1031.my.relation:0 "Vengo a chiedere il tuo permesso di sposare il tuo [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.GetTitledFirstName].\n\n"
  lmf_scheme.1031.other.relation:0 "Vengo a chiedere il tuo permesso di sposare il [proposer_target_liege.GetTitledFirstNamePossessive] [proposer_target_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))], [proposer_target.GetTitledFirstName].\n\n"
  lmf_scheme.1031.both.my.courtier:0 "Vengo a chiedere il tuo permesso di sposare il mio compagno di corte, [proposer_target.GetTitledFirstName].\n\n"
  lmf_scheme.1031.my.courtier:0 "Vengo a chiedere il tuo permesso di sposare un[proposer_target.Custom('polite_gender_ref')] di nome [proposer_target.GetFullName], che fa parte della corte di [Select_CString(proposer_liege.IsLocalPlayer, 'tu', proposer_liege.GetShortUINamePossessive )].\n\n"
  lmf_scheme.1031.other.courtier:0 "Vengo a chiedere il tuo permesso di sposare un[proposer_target.Custom('polite_gender_ref')] di nome [proposer_target.GetFullName], che fa parte della corte di [Select_CString(proposer_target_liege.IsLocalPlayer, 'tu', proposer_target_liege.GetShortUINamePossessive )].\n\n"
  lmf_scheme.1031.stranger:0 "Vengo a chiedere il tuo permesso di sposare un[proposer_target.Custom('polite_gender_ref')] di nome [proposer_target.GetFullName].\n\n"

  lmf_scheme.1031.both.family:0 "Senza dubbio hai altri piani per noi, o ci ritieni troppo strettamente imparentati, ma "
  lmf_scheme.1031.only.target.family:0 "Senza dubbio hai altri piani per [proposer_target.GetHerHim], ma "
  lmf_scheme.1031.only.proposer.family:0 "Senza dubbio hai altri piani per me, ma "
  lmf_scheme.1031.proposer.wanderer:0 "So bene d'essere soltanto un[proposer.GetWomanMan] senza signore, ma "
  lmf_scheme.1031.target.wanderer:0 "So bene che [proposer_target.GetSheHe] è soltanto un[proposer_target.GetWomanMan] senza signore, ma "
  lmf_scheme.1031.proposer.leavescourt:0 "So bene che ciò significa lasciare la tua corte, ma "
  lmf_scheme.1031.target.leavescourt:0 "So bene che ciò significa che [proposer_target.GetSheHe] verrebbe a [proposer_liege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma "
  lmf_scheme.1031.proposer.arrivescourt:0 "So bene che ciò significherebbe venire alla tua corte, ma "
  lmf_scheme.1031.target.arrivescourt:0 "So bene che ciò significa che [proposer_target.GetSheHe] verrebbe a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma "
  lmf_scheme.1031.neither.family:0 "So bene che è irregolare, e potresti ritenerci una pessima unione, ma "

  lmf_extoll_knight:0 "un guerriero abilissimo che potrebbe esserti utile come [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]."
  lmf_extoll_physician:0 "un[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_N')] [ROOT.GetCharacter.GetWomanMan] erudit[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] che potrebbe servire come tuo [GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()|l]?"
  lmf_extoll_court_tutor:0 "un[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_N')] [ROOT.GetCharacter.GetWomanMan] erudit[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] che potrebbe forse servire come tuo [GetCourtPositionType('court_tutor_court_position').GetNameNoTooltip()|l]?"
  lmf_extoll_antiquarian:0 "un[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_N')] [ROOT.GetCharacter.GetWomanMan] erudit[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] che potrebbe forse servire come tuo [GetCourtPositionType('antiquarian_court_position').GetNameNoTooltip()|l]?"
  lmf_extoll_seneschal:0 "un[ROOT.GetCharacter.Custom('DE_PRO_PER_S_3P_N')] [ROOT.GetCharacter.GetWomanMan] abilissimo che potrebbe forse servire come tuo [GetCourtPositionType('seneschal_court_position').GetNameNoTooltip()|l]?"
  lmf_extoll_musician:0 "un artista di talento che potrebbe forse servire come tuo [GetCourtPositionType('court_musician_court_position').GetNameNoTooltip()|l]?"
  lmf_extoll_poet:0 "uno scrittore di talento che potrebbe forse servire come tuo [GetCourtPositionType('court_poet_court_position').GetNameNoTooltip()|l]?"
  lmf_extoll_spymaster:0 "assai versat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] nell'arte dell'intrigo e che potrebbe forse servire come tuo [second.GetCouncillorPosition( 'councillor_spymaster' ).GetPositionName|l]?"
