  lover_rating_raise_to_4_tt:0 "@warning_icon! Il tuo [lmf_lover_rating|E] con [lover.GetFirstNameNoTooltip] salirà a #difficulty_hard Amore costante#!"
  lover_rating_raise_to_3_tt:0 "@warning_icon! Il tuo [lmf_lover_rating|E] con [lover.GetFirstNameNoTooltip] salirà a #difficulty_hard Amore#!"
  lover_rating_raise_to_2_tt:0 "@warning_icon! Il tuo [lmf_lover_rating|E] con [lover.GetFirstNameNoTooltip] salirà a #difficulty_hard Affetto#!"
