lmf_spouse_rem_fallback9: 0 "se [Select_CString(ROOT.GetCharacter.IsFemale,'si sarebbe mai dimostrata','si sarebbe mai dimostrato')] degn[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] di essere [ROOT.GetCharacter.Custom('IT_NAM_COL3')][ROOT.GetCharacter.GetTitleAsNameNoTooltip|l]"
 
lmf_spouse_court_dominant: 0 "affrontò la sfida con la forza che mi aspettavo da [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] sostenne lo sguardo della corte senza vacillare, conquistandone subito molti con la pura determinazione e la forza della [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')] personalità. Proprio come è nel [Select_CString(ROOT.GetCharacter.IsFemale,'suo','suo')] carattere"
lmf_spouse_court_benevolent: 0 "fu esitante all'inizio. Eppure la schietta gentilezza della [Select_CString(ROOT.GetCharacter.IsFemale,'sua indole','sua indole')] era evidente a tutti, e non passò molto prima che metà della corte [Select_CString(ROOT.GetCharacter.IsFemale,'la adorasse','lo adorasse')] e [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] si muovesse tra loro con un sorriso affabile e familiare, come se fosse qui da secoli"
lmf_spouse_court_levelheaded: 0 "affrontò la questione con lucidità. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] comprendeva chiaramente il dovere che [Select_CString(ROOT.GetCharacter.IsFemale,'l','gli')] stava davanti, e la [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')] indole pratica fu evidente a tutti"
lmf_spouse_court_gregarious: 0 "divenne presto l'anima del[second.Custom('FortifiedBuilding')]. Il [Select_CString(ROOT.GetCharacter.IsFemale,'suo sorriso pronto e la sua natura esuberante conquistarono','suo sorriso pronto e la sua natura esuberante conquistarono')] anche coloro che non volevano lasciarsi conquistare. Mi dicono che la [Select_CString(ROOT.GetCharacter.IsFemale,'sua risata','sua risata')|U] durante i banchetti si udisse fin dal cortile"
lmf_spouse_court_diligent: 0 "parlò apertamente di quanto [Select_CString(ROOT.GetCharacter.IsFemale,'considerasse','considerasse')] seria il dovere di essere [ROOT.GetCharacter.Custom('IT_NAM_COL3')][ROOT.GetCharacter.GetTitleAsNameNoTooltip|l]. Fu chiaro a tutti che non era qualcosa da cui [Select_CString(ROOT.GetCharacter.IsFemale,'si sarebbe sottratta','si sarebbe sottratto')], e tutti lo compresero"
lmf_spouse_court_smart: 0 "parlò con intelligenza a tutte le persone giuste delle cose giuste, dai membri più importanti della corte fino a quei servitori di cui [Select_CString(ROOT.GetCharacter.IsFemale,'lei','lui')] capì che reggevano davvero [second.Custom('FortifiedBuilding')]. Fu meraviglioso vedere con quanta rapidità [Select_CString(ROOT.GetCharacter.IsFemale,'li avesse','li avesse')] in pugno"
lmf_spouse_court_lunatic: 0 "non era... al meglio di [Select_CString(ROOT.GetCharacter.IsFemale,'sé','sé')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] agiva spesso come se non sapesse dove si trovasse. A un certo punto si alzò in piena corte, urlò e fuggì dalla sala. Non riuscimmo a trovar[Select_CString(ROOT.GetCharacter.IsFemale,'la','lo')] per #EMP ore#!"
lmf_spouse_court_malicious: 0 "ghignò di fronte a tutti quei discorsi. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] entrò nel[second.Custom('FortifiedBuilding')] come se [Select_CString(ROOT.GetCharacter.IsFemale,'ne fosse la padrona','ne fosse il padrone')], e la [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')] natura tagliente non [Select_CString(ROOT.GetCharacter.IsFemale,'le procurò','gli procurò')] rapidi amici alla mia corte"
lmf_spouse_court_temper: 0 "era furios[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] detestava tutti i pettegolezzi e presumeva che tutti nel[second.Custom('FortifiedBuilding')] provassero lo stesso. Il [Select_CString(ROOT.GetCharacter.IsFemale,'suo','suo')] temperamento è già divenuto famigerato tra i servitori e oggetto di conversazione a corte"
lmf_spouse_court_arrogant: 0 "in qualche modo [Select_CString(ROOT.GetCharacter.IsFemale,'si riteneva','si riteneva')] al di sopra di tutto questo. Soprattutto ora che [Select_CString(ROOT.GetCharacter.IsFemale,'era mia moglie e la loro nuova signora','era mio marito e il loro nuovo signore')]. Le [Select_CString(ROOT.GetCharacter.IsFemale,'sue nuove arie non le procurarono','sue nuove arie non gli procurarono')] certo alcun favore alla mia corte"
lmf_spouse_court_drunkard: 0 "era... perlopiù ubriac[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] eccedette durante il banchetto di benvenuto, durante la [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')] prima udienza, e onestamente in quasi ogni altra occasione. Nessuno voleva dire nulla, ma io ero fin troppo consapevole del [Select_CString(ROOT.GetCharacter.IsFemale,'suo','suo')] grande spettacolo"
lmf_spouse_court_dumb: 0 "non era davvero all'altezza del compito. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] sbatteva vacuamente le palpebre mentre cercavo di spiegar[Select_CString(ROOT.GetCharacter.IsFemale,'le','gli')] i doveri che [Select_CString(ROOT.GetCharacter.IsFemale,'l','gli')] stavano davanti, e perlopiù si aggirava smarrit[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] per [second.Custom('FortifiedBuilding')]... dimenticando di continuo dove stesse andando e che cosa dovesse fare"
lmf_spouse_court_dull: 0 "non era davvero all'altezza del compito. Alla [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')] prima udienza, chiunque [Select_CString(ROOT.GetCharacter.IsFemale,'le parlasse','gli parlasse')] si allontanava presto dalla [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')] conversazione tediosa finché, infine, [Select_CString(ROOT.GetCharacter.IsFemale,'rimase','rimase')] lì goffamente tutt[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] sol[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]. Da allora non è migliorato"
lmf_spouse_court_submissive: 0 "fece ciò che [Select_CString(ROOT.GetCharacter.IsFemale,'le','gli')] veniva detto, e poco altro. [Select_CString(ROOT.GetCharacter.IsFemale,'Lei','Lui')|U] chinava il capo con mansuetudine, sopraffatt[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] dall'ampiezza della mia corte, e rimase perlopiù in silenzio se non quando [Select_CString(ROOT.GetCharacter.IsFemale,'le','gli')] veniva rivolta la parola per prim[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')]"
lmf_spouse_court_introverted: 0 "trovò tutto ciò piuttosto opprimente. Quando non [Select_CString(ROOT.GetCharacter.IsFemale,'veniva','veniva')] espressamente chiamat[Select_CString(ROOT.GetCharacter.IsFemale,'a','o')] a partecipare alla corte o a una cena, [Select_CString(ROOT.GetCharacter.IsFemale,'si nascondeva','si nascondeva')] nelle [Select_CString(ROOT.GetCharacter.IsFemale,'sue stanze','sue stanze')]. Anche quando usciva, [Select_CString(ROOT.GetCharacter.IsFemale,'rimaneva','rimaneva')] perlopiù in disparte e non parlava con nessuno"
lmf_spouse_court_depressed: 0 "parve perlopiù insensibil[Select_CString(ROOT.GetCharacter.IsFemale,'e','e')] a tutto questo. La [Select_CString(ROOT.GetCharacter.IsFemale,'sua','sua')|U] malinconia [Select_CString(ROOT.GetCharacter.IsFemale,'la avvolgeva','lo avvolgeva')] come un sudario, una tristezza che tutti notarono... un[Select_CString(new_spouse.IsFemale,'a sposina','o sposino')] non dovrebbe essere gioios[Select_CString(new_spouse.IsFemale,'a','o')]? Ahimè, non fu così"
lmf_spouse_court_fallthrough: 0 "fece del [Select_CString(ROOT.GetCharacter.IsFemale,'suo','suo')] meglio. Fortunatamente, pur non impressionando nessuno, non [Select_CString(ROOT.GetCharacter.IsFemale,'offese','offese')] nessuno né commise errori degni di nota. I miei cortigiani perlopiù [Select_CString(ROOT.GetCharacter.IsFemale,'la ignorarono','lo ignorarono')], a dire il vero, e forse fu per il meglio"
 
lmf_spouse.101.t.lowborn: 0 "Un popolano e [new_spouse.Custom('IT_NAM_COL3')][new_spouse.GetTitleAsNameNoTooltip|U]"
lmf_spouse.101.t.ruler: 0 "[new_spouse.Custom('IT_NAM_COL3')][new_spouse.GetTitleAsNameNoTooltip|U] giunge da [spouse_title.GetNameNoTierNoTooltip]"
lmf_spouse.101.t.relative: 0 "[Select_CString(new_spouse.IsFemale,'La mia','Il mio')] [ROOT.Char.Custom2('LMF_BloodRelationToMe', SCOPE.sC('new_spouse'))|U] e [new_spouse.Custom('IT_NAM_COL3')][new_spouse.GetTitleAsNameNoTooltip|U]"
lmf_spouse.101.t.default: 0 "[new_spouse.Custom('IT_NAM_COL3')][new_spouse.GetTitleAsNameNoTooltip|U] novell[Select_CString(new_spouse.IsFemale,'a','o')]"
lmf_spouse.101.desc.start: 0 "Prima del nostro matrimonio, la gente di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
lmf_spouse.101.desc.start.lowborn: 0 "probabilmente sapeva soltanto che il mio nuovo [new_spouse.GetWifeHusband] era di nascita comune. Una sorpresa per molti, senza dubbio.\n\n"
lmf_spouse.101.desc.start.relative: 0 "conosceva principalmente il mio nuovo [new_spouse.GetWifeHusband] come [ROOT.Char.Custom2('LMF_BloodRelationToMe', SCOPE.sC('new_spouse'))|l], ammesso che [Select_CString(new_spouse.IsFemale,'la conoscessero','lo conoscessero')].\n\n"
lmf_spouse.101.desc.start.ruler: 0 "probabilmente sapeva soltanto che il mio nuovo [new_spouse.GetWifeHusband] governava [spouse_title.GetNameNoTooltip], ammesso che sapessero qualcosa.\n\n"
lmf_spouse.101.desc.start.rulerdistant: 0 "probabilmente sapeva soltanto che il mio nuovo [new_spouse.GetWifeHusband] governava [spouse_title.GetNameNoTooltip|l], nella lontana [spouse_top_liege.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\n"
lmf_spouse.101.desc.start.rulerrelative: 0 "probabilmente conosceva il mio nuovo [new_spouse.GetWifeHusband] soltanto come [spouse_relative.Custom2('LMF_BloodRelationToMe', SCOPE.sC('new_spouse'))|l] di [spouse_relative.Custom('IT_NAM_COL3')][spouse_relative.GetTitleAsNameNoTooltip] di [spouse_relative.GetPrimaryTitle.GetNameNoTierNoTooltip], ammesso che [Select_CString(new_spouse.IsFemale,'la conoscessero','lo conoscessero')].\n\n"
lmf_spouse.101.desc.start.dynasty: 0 "forse conosceva il mio nuovo [new_spouse.GetWifeHusband] soltanto come un [new_spouse.Custom('polite_gender_ref')] della dinastia [new_spouse.GetDynasty.GetBaseName], se pure ne sapeva qualcosa.\n\n"
lmf_spouse.101.desc.start.default: 0 "probabilmente non sapeva assolutamente nulla del mio nuovo [new_spouse.GetWifeHusband]. [Select_CString(new_spouse.IsFemale,'Era','Era')] un mistero completo.\n\n"
lmf_spouse.101.desc.hasrep2: 0 "Poi, man mano che la voce si diffondeva, presero a spettegolare di [new_spouse.Custom('first_spouse_reputation_comment')] e di [new_spouse.Custom('second_spouse_reputation_comment')], tra tutte le cose. "
lmf_spouse.101.desc.hasrep1: 0 "Poi, man mano che la voce si diffondeva, presero soprattutto a spettegolare di [new_spouse.Custom('first_spouse_reputation_comment')]. "
lmf_spouse.101.desc.hasrep0: 0 "A parte varie dicerie, non sapevano che pensare di [Select_CString(new_spouse.IsFemale,'lei','lui')]. "
lmf_spouse.101.desc.hasrem2: 0 "Coloro che si recarono al [ROOT.Char.Custom('FortifiedBuilding')] e [Select_CString(new_spouse.IsFemale,'la videro','lo videro')] davvero a corte sussurravano di [new_spouse.Custom('first_spouse_remarkable_comment')] così come di [new_spouse.Custom('second_spouse_remarkable_comment')].\n\n"
lmf_spouse.101.desc.hasrem1: 0 "Coloro che si recarono al [ROOT.Char.Custom('FortifiedBuilding')] e [Select_CString(new_spouse.IsFemale,'la videro','lo videro')] davvero a corte sussurravano soprattutto di [new_spouse.Custom('first_spouse_remarkable_comment')] così come di [new_spouse.Custom('random_spouse_remarkable_comment')].\n\n"
lmf_spouse.101.desc.hasrem0: 0 "Coloro che si recarono al [ROOT.Char.Custom('FortifiedBuilding')] e [Select_CString(new_spouse.IsFemale,'la videro','lo videro')] davvero a corte sussurravano di [new_spouse.Custom('first_random_spouse_remarkable_comment')] così come di [new_spouse.Custom('second_random_spouse_remarkable_comment')].\n\n"
lmf_spouse.101.desc.mid: 0 "Da parte [Select_CString(new_spouse.IsFemale,'sua','sua')], [new_spouse.GetFirstNameNoTooltip] [new_spouse.Custom2('spouse_court_introduction', ROOT.Char )].\n\n"
lmf_spouse.101.desc.good: 0 "Un inizio assai propizio. Speriamo che sia un segno di ciò che verrà."
lmf_spouse.101.desc.goodsick: 0 "Considerando quanto [new_spouse.GetFirstNameNoTooltip] [Select_CString(new_spouse.IsFemale,'fosse malata','fosse malato')] per tutto il tempo, non credo avrei potuto chiedere di più."
lmf_spouse.101.desc.bad: 0 "Non è stato il più propizio degli inizi, lo ammetto. Speriamo che non sia un segno di ciò che verrà."
lmf_spouse.101.desc.badsick: 0 "Senza dubbio la malattia di [new_spouse.GetFirstNamePossessiveNoTooltip] contribuì al [Select_CString(new_spouse.IsFemale,'suo','suo')] comportamento. Speriamo che le cose migliorino una volta che [Select_CString(new_spouse.IsFemale,'si sarà ripresa','si sarà ripreso')]."
lmf_spouse.101.desc.default: 0 "Tutto sommato, sarebbe potuta andare peggio. Speriamo che, in futuro, le cose migliorino."
lmf_spouse.101.desc.defaultsick: 0 "Considerando quanto [new_spouse.GetFirstNameNoTooltip] [Select_CString(new_spouse.IsFemale,'fosse malata','fosse malato')] per tutto il tempo, le cose sarebbero potute andare assai peggio. Speriamo che [Select_CString(new_spouse.IsFemale,'si riprenda','si riprenda')] presto."
lmf_spouse.101.a: 0 "Acclamate [new_spouse.Custom('IT_NAM_COL3')][new_spouse.GetTitledFirstNameNoTooltip]!"
 
lmf_spouse.1000.t: 0 "La beatitudine di un'anima gemella"
lmf_spouse.1000.desc.army: 0 "In un raro momento di pace, oggi, una volta che l'esercito si fu sistemato nell'accampamento, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] venne a cercarmi.\n\n"
lmf_spouse.1000.desc.travel: 0 "Ci eravamo sistemati nelle nostre tende per la giornata, stremati quasi oltre ogni dire, quando il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] venne a cercarmi.\n\n"
lmf_spouse.1000.desc.activity: 0 "Mi concessi una pausa dal nostro fitto programma nel pomeriggio, passeggiando per il cortile di [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], quando alzai lo sguardo e vidi il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] lì vicino.\n\n"
lmf_spouse.1000.desc.notlocal: 0 "Oggi il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è venut[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] a farmi visita a [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], una piacevole sorpresa a dir poco.\n\n"
lmf_spouse.1000.desc.local: 0 "Oggi passeggiavo per il cortile di [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], quasi perdut[Select_CString(ROOT.Char.IsFemale,'a','o')] nei miei pensieri, quando alzai lo sguardo e vidi il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] lì vicino.\n\n"
lmf_spouse.1000.desc.end: 0 "Sorrisi non appena vidi [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ricambiò. Quasi senza una parola, ci mettemmo a camminare l'uno accanto all'altr[Select_CString(ROOT.Char.IsFemale,'a','o')]. Per chiunque ci osservasse, eravamo semplicemente marito e moglie a passeggio, ma come sempre io mi perdevo nella [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] presenza.\n\n[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] ascoltò con attenzione mentre mi lamentavo dei miei vari problemi, offrendo pochi consigli ma permettendomi piuttosto di sfogarmi. A ogni mio pesante sospiro, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] rideva piano e, in qualche modo, io mi sentivo meglio.\n\nPrima ancora di accorgermene, erano passate ore, eppure non ero ancora stanc[Select_CString(ROOT.Char.IsFemale,'a','o')] della [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] compagnia. Questo, suppongo, è ciò che significa avere una vera anima gemella."
lmf_spouse.1000.a: 0 "Non me ne stancherò mai."
 
lmf_spouse.1005.t: 0 "Il mio [lover_trait.GetNameNoTooltip( ROOT.Char )|U] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
lmf_spouse.1005.desc.sinful: 0 "È stato detto che, nel corso del nostro matrimonio, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] può essere una cattiva influenza per me"
lmf_spouse.1005.desc.good: 0 "È stato detto che, nel corso del nostro matrimonio, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ha avuto una buona influenza su di me"
lmf_spouse.1005.desc.normal: 0 "È stato detto che, nel corso del nostro matrimonio, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ha avuto una forte influenza su di me"
lmf_spouse.1005.desc.mid: 0 "... e c'è del vero in questo.\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] è, per esempio, piuttosto [lover_trait.GetNameNoTooltip( ROOT.Char )|l], "
lmf_spouse.1005.desc.opposite: 0 "mentre io, al contrario, sono [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. È un motivo di tensione nel nostro rapporto che si manifesta in piccole cose, poiché, sebbene [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non abbia mai cercato di cambiarmi, capisco bene che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] disapprova.\n\n"
lmf_spouse.1005.desc.notopp: 0 "e, sebbene [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non abbia mai cercato di cambiarmi, continuo a sentire la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] influenza nei sottili sguardi e negli occasionali cipigli.\n\n"
lmf_spouse.1005.desc.end: 0 "Mi ritrovo spesso a cambiare il mio modo di agire quando siamo insieme. Il nostro legame è tale che non mi dispiace davvero, poiché diventare più simili appare naturale... ma è davvero questo ciò che voglio? Diventare più [lover_trait.GetNameNoTooltip( ROOT.Char )|l], come [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]?\n\nSe terrò fermo il punto, è ragionevole pensare che questo "
lmf_spouse.1005.desc.opposite2: 0 "motivo di tensione possa crescere fino a diventare un vero problema. Eppure, non furono forse proprio le nostre differenze ad attirarci l'un[Select_CString(ROOT.Char.IsFemale,'a','o')] verso l'altr[Select_CString(ROOT.Char.IsFemale,'a','o')] in primo luogo?"
lmf_spouse.1005.desc.notopp2: 0 "possa crescere fino a diventare un vero motivo di tensione nel nostro rapporto. O forse sto analizzando troppo qualcosa che, in fondo, non dovrebbe nemmeno essere un problema?"
lmf_spouse.1005.a: 0 "Lascia che accada."
lmf_spouse.1005.b: 0 "No, sono chi sono, e questo non cambierà."
lmf_spouse.1005.b.tt: 0 "Le vostre differenze aumentano"
 
lmf_spouse.1010.t: 0 "La mia influenza [lover_trait.GetNameNoTooltip( ROOT.Char )|l]"
lmf_spouse.1010.desc.sinful: 0 "È stato detto che, nel corso del nostro matrimonio, io abbia avuto una cattiva influenza sul mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
lmf_spouse.1010.desc.good: 0 "È stato detto che, nel corso del nostro matrimonio, io abbia avuto una buona influenza sul mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
lmf_spouse.1010.desc.normal: 0 "È stato detto che, nel corso del nostro matrimonio, io abbia avuto una forte influenza sul mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
lmf_spouse.1010.desc.mid: 0 "... e c'è del vero in questo.\n\nIo sono spesso piuttosto [lover_trait.GetNameNoTooltip( ROOT.Char )|l], per esempio, "
lmf_spouse.1010.desc.opposite: 0 "mentre [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], al contrario, è [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. Questo è motivo di tensione nel nostro rapporto e si manifesta in piccole cose, poiché, pur non avendo mai tentato di cambiar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')], [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] sa bene che disapprovo.\n\n"
lmf_spouse.1010.desc.notopp: 0 "e, pur non avendo mai tentato di cambiar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')], è chiaro che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] avverte l'influenza dei miei sguardi sottili e dei miei occasionali cipigli.\n\n"
lmf_spouse.1010.desc.end: 0 "Sempre più spesso, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ha cominciato a cambiare il modo in cui si comporta quando siamo insieme. Per compiacermi, credo, e per impedire che le nostre differenze divengano motivo di contrasto nel nostro rapporto, sebbene io non chiederei mai a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] di fare una cosa simile. Il nostro legame è tale che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] non si lamenta, e credo davvero che ciò stia causando un cambiamento più profondo... uno che, col tempo, non potrà che avvicinarci ancora di più."
lmf_spouse.1010.a: 0 "Per questo l'amo profondamente."

lmf_spouse.1015.t: 0 "Confidenze da guanciale"
lmf_spouse.1015.desc: 0 "Avrei dovuto capire che qualcosa non andava nel momento stesso in cui il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] giunse nelle nostre stanze per trascorrere la serata. Negli occhi di [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] brillava un luccichio che parlava di malizia.\n\n""Ho qualcosa da dirti, [ROOT.Char.GetPrimarySpouse.Custom2('spoken_address_by_familiarity', ROOT.Char)],"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')].\n\n""Oh?"" feci del mio meglio per fingermi disinteressato, ma non era affatto così.\n\n""È un segreto che ho udito a corte oggi, e ho pensato che forse ti avrebbe fatto piacere sentirlo...""
lmf_spouse.1015.a: 0 ""Quanto sei astut[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], amore mio!""
 
lmf_spouse.1020.t: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] di talento"
lmf_spouse.1020.desc.start: 0 "Talvolta è facile dimenticare quanto sia davvero talentuoso il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\n"
lmf_spouse.1020.desc.diplomacy: 0 "Eppure, ultimamente, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei è stata','lui è stato')] di grande aiuto, sedendo sul letto e ascoltando mentre compongo la mia corrispondenza con altri sovrani, per poi offrirmi i più acuti consigli su come migliorare le mie parole.\n\n"
lmf_spouse.1020.desc.martial: 0 "Eppure, proprio l'altro giorno, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha notato alcuni fogli sulla mia scrivania che entravano in noiosi dettagli sulle provviste per le nostre milizie, e ha offerto alcuni suggerimenti per migliorarle che si sono rivelati sorprendentemente utili.\n\n"
lmf_spouse.1020.desc.stewardship: 0 "Eppure, proprio l'altro giorno, mentre giacevamo a letto insieme e io mi lamentavo senza fine degli accordi fiscali con i miei vassalli, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha offerto distrattamente alcuni suggerimenti che hanno migliorato considerevolmente quegli accordi.\n\n"
lmf_spouse.1020.desc.intrigue: 0 "I [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi occhi sono','suoi occhi sono')] sempre vigili, pronti a notare certe manchevolezze nella mia guardia personale e a indicarmi quali trame di corte dovrei osservare e in che modo.\n\n"
lmf_spouse.1020.desc.learning: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei mostra','Lui mostra')|U] grande interesse per i miei sproloqui sulle mie più recenti ossessioni, e di tanto in tanto mi offre persino utili indicazioni, tutte tratte dal [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] vasto sapere.\n\n"
lmf_spouse.1020.desc.end: 0 "All'inizio ero restio ad accettare il [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] aiuto, ma sempre più mi sono convinto che sia semplicemente saggio accettare l'assistenza di un [ROOT.Char.GetPrimarySpouse.GetWomanMan] che ha così chiaramente a cuore il mio bene."
lmf_spouse.1020.a: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] straordinari[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], non trovi?"
 
lmf_spouse.1025.t: 0 "Un piccolo dono"
lmf_spouse.1025.desc.ruler: 0 "Trovai assai curioso sentirmi dire che era arrivato un messaggero da [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], così scesi nel cortile per incontrarlo.\n\n"
lmf_spouse.1025.desc.notlocation: 0 "Trovai assai curioso sentirmi dire che era arrivato un messaggero da [ROOT.Char.GetPrimarySpouse.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], così scesi nel cortile per incontrarlo.\n\n"
lmf_spouse.1025.desc.location: 0 "Trovai assai curioso sentirmi dire che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] era giunto nel cortile per vedermi. Così formale? Che stranezza. Scesi immediatamente a incontrar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')].\n\n"
lmf_spouse.1025.desc.courtier: 0 "Stavo attraversando il cortile del[ROOT.Char.Custom('FortifiedBuilding')] quando scorsi il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] lì in piedi, sorridente come un[ROOT.Char.GetPrimarySpouse.Custom('DE_PRO_PER_S_3P_N')][ROOT.Char.GetPrimarySpouse.GetWomanMan] folle. Quanto... inatteso. Naturalmente mi avvicinai subito per rivolgergli la parola.\n\n"
lmf_spouse.1025.desc.messenger: 0 "Il ""messaggio"" era un anello splendido, adornato da una gemma scintillante, accompagnato da un semplice biglietto:\n\n""#EMP Non brilleranno mai quanto te - un piccolo dono, da chi ti ama come nessun altro.#!""\n\nIl biglietto non era firmato, ma so perfettamente da chi proviene."
lmf_spouse.1025.desc.inperson: 0 ""Ho per te un piccolo dono,"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. Detto questo, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] mi porse un anello splendido, adornato da una gemma scintillante.\n\nStavo per protestare per la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] inutile generosità, ma [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] mi interruppe prima ancora che potessi parlare. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] mi conosce fin troppo bene.\n\n""Tu significhi molto per me, [ROOT.Char.GetPrimarySpouse.Custom('WifeHusbandOpp')]. Ti prego, accettalo come pegno del nostro legame duraturo."" E, detto questo, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si allontanò prima che potessi rispondere."
lmf_spouse.1025.a: 0 "Che premur[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]."
 
lmf_spouse.1030.t: 0 "Un [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] nel bisogno"
lmf_spouse.1030.desc.start: 0 "Ho ricevuto notizie da [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], e pare che le cose... non stiano andando bene per il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ultimamente.\n\nDa quanto ho compreso, [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] è sommers[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dai debiti e, naturalmente, è fin troppo "
lmf_spouse.1030.desc.proud: 0 "orgoglios[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] "
lmf_spouse.1030.desc.stubborn: 0 "testard[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] "
lmf_spouse.1030.desc.humble: 0 "umil[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'e','e')] "
lmf_spouse.1030.desc.shy: 0 "timid[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] "
lmf_spouse.1030.desc.paranoid: 0 "paranoid[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'e','e')] "
lmf_spouse.1030.desc.craven: 0 "spaventat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] "
lmf_spouse.1030.desc.content: 0 "riluttante "
lmf_spouse.1030.desc.end: 0 "per chiedere davvero il mio aiuto.\n\nForse dovrei semplicemente intervenire, senza dar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le','gli')] la possibilità di rifiutare. Eppure una parte di me si domanda se non sia proprio ciò che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si aspetta in silenzio, e se [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] non rimarrà delus[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] o persino contrari[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'ata','ato')] se resterò a guardare senza fare nulla."
lmf_spouse.1030.a: 0 "Naturalmente [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'l','lo')] aiuterò!"
lmf_spouse.1030.b: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] se la caverà da sol[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]."
lmf_spouse.1030.b.tt: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si aspettava il tuo aiuto..."
 
lmf_spouse.1035.t: 0 "Un consiglio"
lmf_spouse.1035.desc.start: 0 "Non appena il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è giunt[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] oggi da [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], ho capito che aveva qualcosa per la testa.\n\n[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Era','Era')|U] così assort[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], con le sopracciglia corrugate per lo stress e la preoccupazione. Cominciai a rendermi conto che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'era venuta','era venuto')] non per trascorrere la giornata con me, ma per chiedermi consiglio.\n\n""Qualcosa non va, tesoro mio?"" chiesi infine.\n\n[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] sospirò pesantemente. ""So che hai già le tue preoccupazioni nel governare [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], ma ho bisogno del tuo aiuto "
lmf_spouse.1035.desc.diplomacy: 0 "riguardo a una delicata questione diplomatica, "
lmf_spouse.1035.desc.martial: 0 "in una questione di strategia, "
lmf_spouse.1035.desc.stewardship: 0 "nel trattare con uno dei miei vassalli riguardo al suo contratto, "
lmf_spouse.1035.desc.intrigue: 0 "in una faccenda urgente che richiede la massima discrezione, "
lmf_spouse.1035.desc.end: 0 "in un ambito nel quale sei assai più ferrato di me. Ti prego... temo di essere piuttosto disperat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')].""
lmf_spouse.1035.a: 0 ""Farò del mio meglio, qualunque cosa tu chieda.""
lmf_spouse.1035.a.success: 0 "Il tuo aiuto ha successo e compiace [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]"
lmf_spouse.1035.a.fail.angry: 0 "Il tuo aiuto si ritorce contro di te e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] è furios[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]"
lmf_spouse.1035.a.fail.disappointed: 0 "Il tuo aiuto si ritorce contro di te, ma [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ti perdona"
lmf_spouse.1035.b: 0 "Districati con vaghe banalità e risposte elusive."
lmf_spouse.1035.b.success: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] comprende che non puoi aiutar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]"
lmf_spouse.1035.b.fail: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] vede attraverso il tuo inganno"
 
lmf_spouse.1040.t: 0 "I consigli del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
lmf_spouse.1040.desc.start: 0 "Talvolta mi è facile dimenticare quanto sia abile e intelligente il [ROOT.Char.GetPrimarySpouse.GetWomanMan] che è il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\nPasseggiavamo oggi per i giardini di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] quando [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] "
lmf_spouse.1040.desc.diplomacy: 0 "ha cominciato a parlarmi di alcune recenti difficoltà che stavo avendo con un vassallo, e di come avrei potuto risolverle pacificamente.\n\n"
lmf_spouse.1040.desc.martial: 0 "ha parlato di alcuni problemi di rifornimento che avevo menzionato riguardo ai nostri uomini d'arme, offrendomi diverse possibilità su come avrei potuto risolverli.\n\n"
lmf_spouse.1040.desc.stewardship: 0 "ha parlato di una disputa fiscale che avevo detto di avere con i miei vassalli, dapprima con riluttanza e poi con crescente convinzione. In verità, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] mi ha indicato una via per aggirarla del tutto.\n\n"
lmf_spouse.1040.desc.intrigue: 0 "ha parlato della sicurezza del[ROOT.Char.Custom('FortifiedBuilding')], o piuttosto della sua mancanza. Dei modi in cui potrebbe essere violato. Non come una minaccia, ma per sincera preoccupazione per il mio benessere.\n\n"
lmf_spouse.1040.desc.learning: 0 "ha parlato a lungo di come potrei sostenere le biblioteche di [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], e di come ciò potrebbe favorire un maggiore sviluppo in tutto il mio dominio.\n\n"
lmf_spouse.1040.desc.end: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip|U] proseguì per buona parte del pomeriggio e io ascoltai con fascinazione. I [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi consigli potrebbero','suoi consigli potrebbero')] rivelarsi davvero utili, se [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] fosse disposto a continuare a dispensarli."
lmf_spouse.1040.a: 0 "Molto gradito!"
 
lmf_spouse.1045.t: 0 "In soccorso"
lmf_spouse.1045.desc.start: 0 "La mia malattia mi costringe a letto tra colpi di tosse, e così, quando sento qualcuno entrare nelle mie stanze, gli ordino confusamente di andarsene subito.\n\n""Sciocchezze, amore mio. "
lmf_spouse.1045.desc.ruler: 0 "Sono venut[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] fin da [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] nel momento stesso in cui ho saputo che eri malat[Select_CString(ROOT.Char.IsFemale,'a','o')]."" "
lmf_spouse.1045.desc.location: 0 "Non ho alcuna intenzione di lasciarti qui a consumarti, quando sono perfettamente in grado di prendermi cura di te."" "
lmf_spouse.1045.desc.notlocation: 0 "Sono venut[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] fin da [ROOT.Char.GetPrimarySpouse.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] nel momento stesso in cui ho saputo che eri malat[Select_CString(ROOT.Char.IsFemale,'a','o')]."" "
lmf_spouse.1045.desc.mid: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] irrompe dentro, lasciandomi ben poca scelta, poiché [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] assume immediatamente il controllo delle mie cure.\n\n""M-ma, prenderai certamente questa malattia!"" protesto tra un colpo di tosse e l'altro.\n\n[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] scrolla le spalle. ""Se [ROOT.Char.GetPrimarySpouse.GetFaith.PantheonTerm2] lo vuole, così sia.""\n\nQuando si presentano alcuni servitori in preda al panico, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] comincia ad abbaiare ordini e non lascia alcun dubbio su chi comandi. Di certo non io."
lmf_spouse.1045.a: 0 "Sottomettiti alle [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sue cure','sue cure')]."
 
lmf_spouse.1050.t: 0 "Lapsus"
lmf_spouse.1050.desc: 0 "Non volevo dirlo.\n\nChiamatelo ""confidenze da guanciale"", chiamatelo disattenzione, o perfino stupidità. Una sera, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] e io stavamo conversando, come spesso facciamo, e dissi molto più di quanto intendessi.\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip|U] finse di non capire, dapprima, ma potevo leggere la comprensione nei [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi occhi','suoi occhi')]. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] sa."
lmf_spouse.1050.a: 0 "Ormai non c'è più nulla da fare..."
lmf_spouse.1050.b: 0 "Prometti a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] qualunque cosa in cambio del [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] silenzio."
lmf_spouse.1050.c: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] non potrà raccontarlo a nessuno da dentro una cella!"
spouse_promise_to_keep_secret: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] promette di non rivelare il [secret|E]"
spouse_jailed_to_keep_secret: 0 "Hai estorto a [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] la promessa di non rivelare il [secret|E]"
learned_terrible_secret: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha appreso un terribile segreto su [CHARACTER.GetShortUINameNoTooltipNoFormat] che turb[a|E] profondamente [CharYouHerHim(TARGET_CHARACTER)]."
learned_terrible_secret_corresponding: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha appreso un terribile segreto su [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] che turb[a|E] profondamente [CharYouHerHim(CHARACTER)]."
 
lmf_spouse.1055.t: 0 "Lapsus del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
lmf_spouse.1055.desc: 0 "È chiaro che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non intendeva dirlo.\n\nChiamatelo ""confidenze da guanciale"", chiamatelo disattenzione, o perfino stupidità. Una sera, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] e io stavamo conversando, come spesso facciamo, e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si è lasciat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] sfuggire qualcosa che davvero non avrebbe dovuto.\n\nIl modo in cui [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si irrigidì all'istante subito dopo mi disse che sapeva perfettamente cosa avesse appena detto... e che da parte mia non v'era alcun malinteso.\n\n[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] sapeva che anch'io lo sapevo. Anche se ancora faccio fatica a crederci."
lmf_spouse.1055.a: 0 "Be', questo non me l'aspettavo."
 
lmf_spouse.1060.opening: 0 "Amore mio carissimo,"
lmf_spouse.1060.desc.start: 0 "Si dice che la distanza renda il cuore più affezionato. Pare che sia vero, poiché il mio cuore ti è, davvero, profondamente devoto.\n\nMi è stato detto che "
lmf_spouse.1060.desc.army: 0 "il tuo esercito è accampato laggiù, in "
lmf_spouse.1060.desc.travel: 0 "i tuoi viaggi ti hanno portato lontano, fino a "
lmf_spouse.1060.desc.event: 0 "ora ti trovi nella lontana "
lmf_spouse.1060.desc.end: 0 "[my_camp.GetNameNoTierNoTooltip], e, se è così, spero che questa lettera ti raggiunga e trovi il mio [ROOT.Char.GetWifeHusband] in buona salute e di buon animo. Penserò a te fino al tuo ritorno a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
lmf_spouse.1060.a: 0 "Spero di riveder[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] presto."
 
lmf_spouse.1065.opening: 0 "Amore mio sventurato,"
lmf_spouse.1065.desc: 0 "Se questa lettera ti giunge, vuol dire che il giovane soldato che ho corrotto ha mantenuto la parola e che [my_imprisoner.Custom('IT_NAM_COL3')][my_imprisoner.GetTitledFirstNameNoTooltip] (sputo sul nome [Select_CString(my_imprisoner.IsFemale,'di lei','di lui')]) non sospetta nulla.\n\nTi ho scritto non appena ho saputo che eri stat[Select_CString(ROOT.Char.IsFemale,'a','o')] imprigionat[Select_CString(ROOT.Char.IsFemale,'a','o')]. Ah, se solo potessi trovare un modo per favorire la tua fuga!\n\nAhimè, tutto ciò che posso fare è offrirti parole di conforto e pregare che tu venga liberat[Select_CString(ROOT.Char.IsFemale,'a','o')] presto.\n\nAttenderò quel momento, quando potrò ricongiungermi al mio splendido [ROOT.Char.GetWifeHusband]."
lmf_spouse.1065.a: 0 "I pensieri di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] aiuteranno a far passare il tempo qui."
 
lmf_spouse.1070.t: 0 "Gli occhi sul premio"
lmf_spouse.1070.desc.start.lover: 0 "Mentre il nostro sudore si raffreddava dopo gli sforzi di poco prima, questa sera, "
lmf_spouse.1070.desc.start.notlover: 0 "Quando il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è entrat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] nel salotto questa sera, "
lmf_spouse.1070.desc.start: 0 "ho subito capito che qualcosa turbava [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]. Si leggeva nei [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi occhi','suoi occhi')] quello sguardo che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha ogni volta che desidera qualcosa.\n\n«Ho visto "
lmf_spouse.1070.desc.jewelry: 0 "il più meraviglioso gioiello "
lmf_spouse.1070.desc.sword: 0 "la più magnifica spada "
lmf_spouse.1070.desc.book: 0 "il libro più incredibile "
lmf_spouse.1070.desc.manuals: 0 "la più straordinaria raccolta di manuali "
lmf_spouse.1070.desc.robe: 0 "una veste incredibile, ricamata con tanta cura, "
lmf_spouse.1070.desc.end: 0 "oggi al mercato. La desideravo così tanto, anche se naturalmente è #EMP molto#! costosa..."\n\nL'intenzione era chiara: [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] voleva che gliela comprassi in dono. Anzi, prima ancora che la serata finisse, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] mi stava praticamente supplicando per avere il [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] agognato premio. «Di certo non è troppo da chiedere, "
lmf_spouse.1070.desc.end.lover: 0 "amor mio? Mi adori, non è vero?»"
lmf_spouse.1070.desc.end.notlover: 0 "caro [ROOT.Char.GetWifeHusband]? Possiamo permetterci simili lussi, no?»"
lmf_spouse.1070.a: 0 "Sorprenderò [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] con qualcosa di ancor più #EMP costoso!#!"
lmf_spouse.1070.b: 0 "Cedi e fai a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] quel dono."
lmf_spouse.1070.c: 0 "Sta scherzando? Assolutamente no!"
 
lmf_spouse.1075.t: 0 "Il grave insulto"
lmf_spouse.1075.desc.start: 0 "Quando il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è piombat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] nella stanza, fremente di rabbia, dapprima ho pensato di esserne io la causa.\n\nMa no, a quanto pare aveva avuto uno scontro con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))]. "
lmf_spouse.1075.desc.relation: 0 "Il mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))] "
lmf_spouse.1075.desc.norelation: 0 "[Select_CString(my_courtier.IsFemale,'La donna','L'uomo')] "
lmf_spouse.1075.desc.end: 0 "ha fatto un commento che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ha udito, qualcosa di... diciamo poco gentile. Ne è nato un confronto, poi una lite urlata, e ora il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] mi dice che [my_courtier.GetFirstNameNoTooltip] «va in giro per [ROOT.Char.Custom('FortifiedBuilding')], spargendo menzogne» su [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'di lei','di lui')].\n\nSuppongo che tutto ciò fosse inevitabile, considerando "
lmf_spouse.1075.desc.commoner: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le sue umili origini','le sue umili origini')]... alcuni finiranno per considerarl[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] un'intrus[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')].\n\n"
lmf_spouse.1075.desc.rival: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la sua','la sua')] persistente inimicizia con [my_courtier.GetFirstNameNoTooltip]. Prima o poi doveva giungere al culmine.\n\n"
lmf_spouse.1075.desc.temper: 0 "il famigerato temperamento di [my_courtier.GetFirstNameNoTooltip]. Avrei dovuto sapere che prima o poi avrebbe cacciato [Select_CString(my_courtier.IsFemale,'lei','lui')] nei guai.\n\n"
lmf_spouse.1075.desc.end2: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non mi ha chiesto espressamente di fare qualcosa al riguardo, ma capisco bene che pensa che dovrei."
lmf_spouse.1075.a: 0 "Manderò via [my_courtier.GetFirstNameNoTooltip]. All'istante."
lmf_spouse.1075.b: 0 "[my_courtier.GetFirstNameNoTooltip] riceverà un severo rimprovero per questo insulto."
lmf_spouse.1075.b.success: 0 "[my_courtier.GetFirstNameNoTooltip] si mostra adeguatamente pentit[Select_CString(my_courtier.IsFemale,'a','o')]"
lmf_spouse.1075.b.failure: 0 "Ora [my_courtier.GetFirstNameNoTooltip] è adirat[Select_CString(my_courtier.IsFemale,'a','o')] con entrambi"
reprimanded_me_unjustly_spouse: 0 "[TARGET_CHARACTER.GetShortUIName|U] ha ingiustamente rimproverato [CHARACTER.GetShortUIName] per un insulto rivolto al [TARGET_CHARACTER.GetWifeHusband] di [Select_CString(TARGET_CHARACTER.IsFemale,'lei','lui')]."
reprimanded_me_unjustly__spouse_corresponding: 0 "[CHARACTER.GetShortUIName|U] ha ingiustamente rimproverato [TARGET_CHARACTER.GetShortUIName] per un insulto rivolto al [CHARACTER.GetWifeHusband] di [Select_CString(CHARACTER.IsFemale,'lei','lui')]."
lmf_spouse.1075.c: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] dovrà semplicemente abituarcisi."

lmf_spouse.1080.t: 0 "Sempre al mio fianco"
lmf_spouse.1080.desc: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è sempre al mio fianco, in questi ultimi giorni.\n\nO siamo a letto insieme, o passeggiamo nei giardini insieme, o stiamo a corte insieme... avrei pensato che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'avesse','avesse')] già abbastanza da fare come [ROOT.Char.GetPrimarySpouse.GetLadyLord] del mio [ROOT.Char.Custom('FortifiedBuilding')], ma a quanto pare non è così, dato che passiamo insieme quasi ogni momento.\n\nNon fraintendermi, il tempo che trascorriamo insieme mi piace molto. È solo che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] è una notevole distrazione dai miei doveri come [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip].\n\nNaturalmente non glielo direi mai, ma potrei essere costrett[Select_CString(ROOT.Char.IsFemale,'a','o')] a farlo se ciò dovesse continuare ancora a lungo, altrimenti la mia attenzione verso [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] ne soffrirà."
lmf_spouse.1080.a: 0 "E allora? Mi piace questa distrazione."
lmf_spouse.1080.b: 0 "Allontana[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]. Devo concentrarmi sui miei doveri."
 
lmf_spouse.1085.t: 0 "Una giornata nel giardino"
lmf_spouse.1085.desc.courtier: 0 "Benché il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] faccia parte della mia corte, non accade spesso che possiamo trascorrere la giornata insieme.\n\n"
lmf_spouse.1085.desc.ruler: 0 "Poiché il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ha una corte propria da governare, non accade spesso che possiamo trascorrere la giornata insieme.\n\n"
lmf_spouse.1085.desc.start: 0 "Oggi, però, non è stato un giorno come gli altri. Nel [ROOT.Char.Custom('FortifiedBuilding')] regnava finalmente la quiete, e gran parte della corte era ben occupata in faccende di poca importanza. "
lmf_spouse.1085.mid.courtier: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si è avvicinat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] a me in silenzio. "
lmf_spouse.1085.mid.ruler: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] è compars[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dal nulla: non sapevo nemmeno che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'fosse','fosse')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]! "
lmf_spouse.1085.desc.mid: 0 "«Conosco il luogo perfetto dove possiamo restare soli», sussurrò.\n\nMi condusse in profondità nei giardini e, sebbene mi guardassi attorno in cerca dei giardinieri, non ne vidi alcuno.\n\n«Li ho mandati via», disse [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip].\n\nCome [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sia riuscita','sia riuscito')] in una simile impresa non glielo chiesi, né mi importò, poiché la giornata che seguì è una di quelle che difficilmente dimenticheremo."
lmf_spouse.1085.a: 0 "Quel giardino mi piace davvero."
 
lmf_spouse.1090.t: 0 "Un momento rubato nell'accampamento"
lmf_spouse.1090.desc: 0 "L'esercito si era accampato a [army_location.GetCounty.GetTitle.GetNameNoTierNoTooltip] dopo una lunga giornata. Era tardi, la maggior parte dei soldati e dei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] si era già ritirata nelle tende, e io stavo per fare altrettanto.\n\nPoi apparve il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband], come sbucat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dal nulla, con un sorriso birichino sul volto, ben visibile non appena [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'si tolse','si tolse')] l'elmo. «Vieni con me», disse.\n\nPer un momento pensai che qualcosa non andasse. Quando [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] mi condusse in una parte più appartata dell'accampamento e cominciò a togliersi l'armatura, capii che non era affatto così.\n\n«I soldati potrebbero vederci», avvertii con una risata.\n\n«Vedere cosa? Un[ROOT.Char.GetPrimarySpouse.Custom('DE_PRO_PER_P_3P_G')][ROOT.Char.GetPrimarySpouse.GetWomanMan] che ama e adora il [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'proprio','proprio')] [ROOT.Char.GetWifeHusband]? Perché mai dovrebbe importar loro?» A quelle parole, la mia resistenza crollò, e fu bene così."
lmf_spouse.1090.a: 0 "Chi avrebbe mai detto che il campo potesse essere tanto divertente?"
 
lmf_spouse.1095.t: 0 "La ruota spezzata"
lmf_spouse.1095.desc.start: 0 "Mi dissero che una delle ruote dei carri si era rotta, cosa che non avrebbe causato un grande ritardo nel nostro viaggio, ma che nondimeno significava stare lì ad attendere che altri sistemassero il problema.\n\nPoi, dal nulla, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] comparve alle mie spalle. «Ho un'idea», disse con un occhiolino.\n\nNon compresi cosa intendesse finché non scorsi il cesto e la coperta sul [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo braccio','suo braccio')]. Mi lasciai condurre in un luogo appartato poco distante, lontano dagli sguardi indiscreti del nostro seguito, e dopo aver steso la coperta [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] cominciò a togliersi i vestiti.\n\n"
lmf_spouse.1095.desc.cold: 0 "«Fa un po' freddo per questo, qui, non trovi?» risi.\n\n«Non se sei accanto a me», sorrise [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. "
lmf_spouse.1095.desc.sand: 0 "«Fa' attenzione a non riempirti di sabbia in... certi posti», risi.\n\n«Avrò bisogno che tu controlli», sorrise [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. "
lmf_spouse.1095.desc.bugs: 0 "«Vedo che gli insetti non ti preoccupano», risi.\n\n«Non se sei accanto a me», sorrise [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. "
lmf_spouse.1095.desc.default: 0 "«Sai, potrebbe passare chiunque e vederci», risi.\n\n«Allora avrà proprio un bello spettacolo», sorrise [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. "
lmf_spouse.1095.desc.end: 0 "Quella si rivelò un'offerta a cui non potei rifiutarmi."
lmf_spouse.1095.a: 0 "Mi piace davvero viaggiare."
 
lmf_spouse.1100.t: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] è inaffidabile?"
lmf_spouse.1100.desc: 0 "Possibile che sia vero?\n\nHo ricevuto notizie secondo cui il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è stat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] di recente in contatto con [my_rival.GetTitledFirstNameNoTooltip]. Perché [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] dovrebbe scrivere lettere a un mio rivale, non ne ho idea. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] nega di averlo fatto, naturalmente, e benché abbia cercato di far indagare più a fondo sulla faccenda, è ben possibile che tutta la storia non sia altro che una voce... una voce che, secondo [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], è stata senza dubbio messa in giro da qualcuno intenzionato a infangare il [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] buon nome. Non avendo modo di verificare la verità, non ho altra scelta che prendere per buona la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] parola, ma la cosa mi rode dentro.\n\n#EMP So#! che c'è qualcosa che non va. È in corso qualche sorta di macchinazione."
lmf_spouse.1100.a: 0 "Speriamo che non ne venga nulla."
 
lmf_spouse.1101.opening: 0 "[lover.Custom2('GreetingToGenericPositive', ROOT.Char )],"
lmf_spouse.1101.stranger: 0 "Chi io sia non ha importanza, ma "
lmf_spouse.1101.start: 0 "ho alcune informazioni su [player_rival.Custom('IT_NAM_COL3')][player_rival.GetTitledFirstName] che potrebbero interessarti molto, dato che è risaputo che tu e [Select_CString(player_rival.IsFemale,'lei','lui')] siete rivali.\n\nIn cambio chiedo soltanto una modesta somma d'oro per il disturbo e che tu non riveli mai "
lmf_spouse.1101.know: 0 "che la cosa proviene dal [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|l]."
lmf_spouse.1101.stranger2: 0 "da chi hai ottenuto queste informazioni."
lmf_spouse.1101.a: 0 "[player_rival.GetTitledFirstNameNoTooltip] ha un segreto? Sì, grazie!"
lmf_spouse.1101.b: 0 "Non m'interessa. Sparisci."

lmf_spouse.1105.t: 0 "Un'ombra fugace"
lmf_spouse.1105.desc.start: 0 "Il mio amato [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è malat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')].\n\n"
lmf_spouse.1105.desc.courtier: 0 "Sono passat[Select_CString(ROOT.Char.IsFemale,'a','o')] per un momento nelle nostre stanze, poco fa, per vedere [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei era','lui era')] delirante per la febbre. Continuava a gemere il mio nome, ancora e ancora, e nel momento in cui mi vide tese una mano disperata e mi supplicò di avvicinarmi.\n\nNaturalmente non potevo restare, e ora mi chiedo se avrei dovuto.\n\n"
lmf_spouse.1105.desc.end: 0 "Mi addolora pensare a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] distes[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] là, forse morente, e che nei momenti in cui è svegli[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] e lucid[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] io non sia da nessuna parte. Se [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] supererà questa prova e io non sarò stat[Select_CString(ROOT.Char.IsFemale,'a','o')] presente quando aveva più bisogno di me, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] lo saprà."
lmf_spouse.1105.a: 0 "Naturalmente resterò al [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] capezzale!"
lmf_spouse.1105.c: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] riceverà cure adeguate dal nostro medico."
 
lmf_spouse.1115.t: 0 "Amore e odio"
lmf_spouse.1115.desc: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è adirat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] con me.\n\nO forse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'ha iniziato','ha iniziato')] a provare avversione per me, persino odio. Qualunque sia la verità, negli ultimi mesi vedo [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] solo di rado. E quando ci incontriamo, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei è','lui è')] distante e talvolta fredd[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')].\n\nÈ possibile che la cosa passi, certo. Oppure questo potrebbe essere l'inizio della fine della nostra relazione amorosa... se non la fine del nostro matrimonio."
lmf_spouse.1115.a: 0 "Era inevitabile, in fondo."
 
lmf_spouse.1120.t: 0 "Così simili"
lmf_spouse.1120.desc: 0 "Mi è stato detto che io e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ci somigliamo molto.\n\nDevo ammettere che è vero. "
lmf_spouse.1120.desc.low: 0 "Forse non quanto sostengono certi pettegoli, ma si può dire a buon diritto che siamo più spesso d'accordo che in disaccordo... e, per una coppia sposata, non è cosa da poco.\n\n"
lmf_spouse.1120.desc.mid: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] spesso finisce le mie frasi, e io le [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sue','sue')], e spesso riesco ad anticipare ciò che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'proverà','proverà')] riguardo a quasi ogni argomento. Per una coppia sposata, non è cosa da poco.\n\n"
lmf_spouse.1120.desc.high: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] finisce le mie frasi, sembra anticipare ogni mio desiderio, ed è raro che siamo in disaccordo su... quasi qualsiasi cosa. Almeno ultimamente. Questa è una delle poche volte in cui i pettegoli colgono nel segno, e per una coppia sposata non è cosa da poco.\n\n"
lmf_spouse.1120.desc.end: 0 "Ciò non significa che saremo sempre d'accordo, naturalmente, ma ultimamente questa familiarità ha portato con sé una piacevole spontaneità che apprezzo molto. Di recente [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] mi ha raggiunt[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] nel cortile quando sono rientrat[Select_CString(ROOT.Char.IsFemale,'a','o')] al [ROOT.Char.Custom('FortifiedBuilding')], e il sorriso sincero che mi ha rivolto è stato facile da ricambiare.\n\nPer ora? Va bene così."
lmf_spouse.1120.a: 0 "Ah, la vita coniugale!"
 
lmf_spouse.1125.t: 0 "Qualcosa in comune"
lmf_spouse.1125.desc.diplomat: 0 "Sto per rispondere a una domanda a corte, una riguardante una faccenda diplomatica assai delicata... ma, prima che io possa parlare, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] risponde al posto mio. ""Perdonami, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband],"" mi dice [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] con un occhiolino. A dirla tutta, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ha risposto meglio di quanto avrei saputo fare io e, così facendo, mi ha anche risparmiato qualche noia.\n\nQuesto è il vantaggio di avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] esperto nelle maniere diplomatiche quanto me."
lmf_spouse.1125.desc.reveler: 0 "Sto intrattenendo alcuni giovani lord di poco conto nel [ROOT.Char.Custom('FortifiedBuilding')] di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], più fastidi da gestire che uomini di vero potere. L'ora si è fatta tarda, eppure ancora non se ne vanno. E chi entra dunque nella sala se non il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]... che getta un'occhiata alla situazione, sorride e prende in mano tutto quanto. In breve, la festa riprende vita e i giovani lord vengono lentamente accompagnati alla porta, soddisfatti da un intrattenimento tanto raffinato.\n\nQuesto è il vantaggio di avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] abile nei festeggiamenti quanto me."
lmf_spouse.1125.desc.blademaster: 0 "Un pomeriggio, mentre mi esercito con la spada, i muscoli mi dolgono. Non è facile padroneggiare le forme e assicurarsi che la mia abilità con la lama non si arrugginisca.\n\nE chi compare allora, spada in mano, pronto a sfidarmi? Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband], naturalmente, che mi rivolge un sorriso disinvolto pari al mio. ""Siete pront[Select_CString(ROOT.Char.IsFemale,'a','o')], [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband]? Oggi sembrate un po' impacciat[Select_CString(ROOT.Char.IsFemale,'a','o')], e dovremmo rimediare."" La [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua spavalderia','sua spavalderia')] mi strappa una risata.\n\nQuesto è il vantaggio, suppongo, di avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] il cui interesse per la scherma uguaglia il mio."
lmf_spouse.1125.desc.hunter: 0 "Abbiamo trascorso la giornata in una piccola battuta di caccia in un piccolo bosco vicino al [ROOT.Char.Custom('FortifiedBuilding')] di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Nulla di faticoso, benché la nostra preda si sia dimostrata frustrantemente sfuggente. Mentre l'ora si fa tarda, i miei cortigiani cominciano a stancarsi e a irritarsi... abbastanza da irritare anche #EMP me#!.\n\nE chi viene allora a camminare al mio fianco, rivolgendomi un sorriso impaziente? Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband], naturalmente. ""Dovremmo rimandare a casa gli altri, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband], e concludere questa caccia da soli."" Tanto basta a farmi ridere.\n\nQuesto è il vantaggio, credo, di avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] che condivide il mio amore per la caccia."
lmf_spouse.1125.desc.strategist: 0 "È tardi. Sto trattenendo nel [ROOT.Char.Custom('FortifiedBuilding')] uno dei miei comandanti più anziani, ma la serata è degenerata in una lunga discussione su una vecchia battaglia combattuta in un luogo lontano, lontanissimo.\n\nIo sostengo che quel generale non avesse altra scelta. Lui crede che avrebbe potuto fare di meglio, ma resta frustrantemente vago sul come. La mia irritazione cresce finché, all'improvviso, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] compare dal nulla. ""Avete preso in considerazione un'alternativa?"" In breve, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei si è unita','lui si è unito')] alla nostra conversazione e l'ha trasformata in qualcosa di davvero interessante... poi mi ha rivolto un occhiolino d'intesa, ben consapevole di ciò che aveva appena fatto.\n\nQuesto è il vantaggio, suppongo, di avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] la cui conoscenza della strategia rivaleggia con la mia."
lmf_spouse.1125.desc.architect: 0 "È tardi. Gran parte del [ROOT.Char.Custom('FortifiedBuilding')] è già andata a dormire, e io che cosa sto facendo? Sto chino sui progetti per un nuovo [ROOT.Char.GetFaith.HouseOfWorship] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], apportando modifica dopo modifica e restando comunque, frustrantemente, insoddisfatto dell'insieme.\n\nAll'improvviso, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] si avvicina da dietro. Mi irrigidisco, pensando che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'mi ordinerà','mi ordinerà')] di andare a letto, ma invece [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] indica una parte dei progetti. ""Avete pensato di renderlo uno spazio separato, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband]? Sta sbilanciando l'intero insieme."" In poco tempo abbiamo risolto il mio problema e definito un progetto che mi soddisfa davvero, e #EMP finalmente#! posso dormire.\n\nQuesto, suppongo, è il vantaggio di avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] il cui interesse per l'architettura uguaglia il mio."
lmf_spouse.1125.desc.intrigue: 0 "È tardi. Sto parlando con i miei consiglieri di certi loschi affari... un piano che forse non verrà mai messo in atto, ma per il quale vogliamo essere pronti, qualora si rendesse necessario.\n\nPurtroppo, non stiamo andando da nessuna parte. La discussione gira su sé stessa in tondo e, a questo punto, mi sto stropicciando gli occhi e sto quasi pensando di gettare ogni cosa alle ortiche.\n\nAll'improvviso, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] emerge dalle ombre, portando una candela e concedendomi un dolce sorriso. ""Avete considerato, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband], che esistono modi ben più semplici per ottenere ciò che volete?"" Non mi ero accort[Select_CString(ROOT.Char.IsFemale,'a','o')] che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'stesse','stesse')] ascoltando, ma naturalmente avrei dovuto capire che il [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo contributo','suo contributo')] sarebbe stato inestimabile, poiché non passa molto tempo prima che venga approntato un nuovo piano e tutti concordino che sia davvero valido. Per quanto piuttosto tetro. Io, invece, sono sollevat[Select_CString(ROOT.Char.IsFemale,'a','o')].\n\nÈ un vantaggio, suppongo, avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] la cui abilità negli intrighi rivaleggia con la mia."
lmf_spouse.1125.desc.celibate: 0 "La castità non è cosa facile.\n\nFortunatamente, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] si è unito a me in questo voto. Non abbiamo aspettative l'un[Select_CString(ROOT.Char.IsFemale,'a','o')] dall'altr[Select_CString(ROOT.Char.IsFemale,'a','o')], e insieme possiamo sostenerci a vicenda nei momenti di debolezza dinanzi ai desideri della carne. Sembra che siamo oltre tutto questo, anche se non è qualcosa che molte altre coppie sposate comprenderebbero."
lmf_spouse.1125.desc.learning: 0 "Ultimamente mi sono trovat[Select_CString(ROOT.Char.IsFemale,'a','o')] a leggere un trattato piuttosto denso di un antico filosofo, i cui pensieri erano quasi complessi quanto il suo stile di scrittura. Fa venire il mal di testa, e ho avuto difficoltà a comprenderlo nella sua interezza... benché lo desideri ardentemente.\n\nÈ dunque cosa semplice rivolgermi al mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] per un consiglio. ""Oh sì, credo proprio di aver letto quello,"" annuisce [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], ben liet[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] di spiegarmelo in un modo che, d'un tratto, rende tutto così ovvio. Ne sono così felice che potrei baciar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]!\n\nÈ un ulteriore vantaggio, suppongo, avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] erudit[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] quanto me."
lmf_spouse.1125.desc.family: 0 "Una sera, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ed io restiamo svegli fino a tardi, discutendo di questioni familiari piuttosto delicate.\n\nNon è cosa facile da risolvere, e nessun[Select_CString(ROOT.Char.IsFemale,'a','o')] dei due è dispost[Select_CString(ROOT.Char.IsFemale,'a','o')] a cedere sulla propria posizione. Mi rendo conto, tuttavia, che in questo contrasto vi è anche una certa facilità... nessun[Select_CString(ROOT.Char.IsFemale,'a','o')] dei due si turba o la prende sul personale, perché entrambi desideriamo la stessa cosa. Mettiamo la famiglia al primo posto. Guardo [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] negli occhi e, quando [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] mi sorride di rimando, capisco che è davvero così.\n\nSe io sono [ROOT.Char.Custom('MatriarchPatriarch')] della nostra famiglia, allora [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ne è [ROOT.Char.GetPrimarySpouse.Custom('MatriarchPatriarch')], ed è così che stanno le cose e così che devono stare."
lmf_spouse.1125.desc.sadistic: 0 "Mi trovo nelle segrete del [ROOT.Char.Custom('FortifiedBuilding')], intento a esaminare un brigante particolarmente sfuggente che le mie guardie hanno finalmente catturato. Ho bisogno di informazioni sui suoi complici, ma quello mi ha già sputato in faccia tre volte... dunque ammetto di essere alquanto tentat[Select_CString(ROOT.Char.IsFemale,'a','o')] di fargliela semplicemente pagare.\n\n""Lascerete che questo sempliciotto vi manchi di rispetto in tal modo, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband]?"" dice all'improvviso il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] mentre compare al mio fianco. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] mi rivolge un occhiolino malizioso mentre torna a posare la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] attenzione sul brigante. ""Perché io riesco a pensare a diversi modi per farlo parlare #EMP e#! fargliela pagare.""\n\nAh, avere un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] i cui interessi si accordano tanto bene con i miei."
lmf_spouse.1125.desc.lunatic: 0 "È tardi. È buio.\n\nMi trovo in... uno dei corridoi del [ROOT.Char.Custom('FortifiedBuilding')]? E ho del sangue sulle mani?\n\nLa mia mente corre. #EMP Che cosa ho fatto?#! È successo di nuovo, non è vero?\n\nPoi odo una risatina alle mie spalle. Mi volto di scatto, ma è il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] che mi sorride. Nei [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi occhi','suoi occhi')] brilla un luccichio mentre [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'dice','dice')]: ""Ti stai divertendo senza di me, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband]? Su, vediamo di ripulirti, vuoi?"" In breve sono immers[Select_CString(ROOT.Char.IsFemale,'a','o')] in un bagno caldo e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha già fatto sì che tutto sembrasse di nuovo migliore.\n\n[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei è','Lui è')] davvero buon[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] con me. Spero di poter fare lo stesso per [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] una notte di queste."
lmf_spouse.1125.a: 0 "È così che i matrimoni sopravvivono."
 
lmf_spouse.1130.t: 0 "Le nostre differenze"
lmf_spouse.1130.desc: 0 "Questa non è stata una buona settimana tra me e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\nA dire il vero, non ci vuole molto perché [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] attacchi lite, persino nei momenti migliori. Siamo assai diversi, e nulla irrita [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] quanto la comune opinione secondo cui [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sia','sia')] piuttosto [their_trait.GetNameNoTooltip( ROOT.Char )|l], mentre io sarei invece piuttosto [my_trait.GetNameNoTooltip( ROOT.Char )|l]... benché ciò sia in gran parte vero.\n\nIn questo caso, abbiamo semplicemente trascorso la settimana dandoci sui nervi a vicenda. Ho contraddetto diversi ordini che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'aveva impartito','aveva impartito')] ai servitori del [ROOT.Char.Custom('FortifiedBuilding')], mentre [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha passato il tempo a corte corrugando visibilmente la fronte e alzando gli occhi al cielo a ogni mia dichiarazione. Ogni volta che ci imbattevamo l'un[Select_CString(ROOT.Char.IsFemale,'a','o')] nell'altr[Select_CString(ROOT.Char.IsFemale,'a','o')] nei corridoi, era una battaglia, perciò ci siamo sforzati di farlo il meno possibile.\n\nNon è mai facile."
lmf_spouse.1130.a: 0 "#EMP Sigh.#!"
 
lmf_spouse.1135.t: 0 "In mostra"
lmf_spouse.1135.desc.start: 0 "Tutto ebbe inizio con un gelido silenzio.\n\nMentre parlavo con i miei consiglieri, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] sedeva al tavolo fissandomi con le braccia conserte. Non avevo intenzione di chiedere che cosa non andasse, non davanti agli altri, e così [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la ignorai','lo ignorai')]. Questo, naturalmente, peggiorò le cose.\n\nDopo venti minuti trascorsi a covare la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua rabbia','sua rabbia')], [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si lanciò all'improvviso in una critica contro di me, interrompendo i lavori, e tutto ciò non aveva nulla a che vedere con gli affari del consiglio. Ribattei a tono e, in breve, noi due fummo impegnati in un acceso scambio d'urla, mentre gli altri consiglieri si agitavano goffamente sui loro seggi, costretti ad assistere a quello spettacolo. Alla fine, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] si alzò e uscì a grandi passi dalla sala.\n\n"
lmf_spouse.1135.desc.unfaithful: 0 "Senza dubbio [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'è ancora furiosa','è ancora furioso')] per la mia infedeltà, anche se [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'si rifiuta','si rifiuta')] di dirlo apertamente. "
lmf_spouse.1135.desc.revenge: 0 "Senza dubbio [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'è ancora','è ancora')] furios[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] con me e desidera vendetta, anche se [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'si rifiuta','si rifiuta')] di ammettere che sia questo il motivo. "
lmf_spouse.1135.desc.rival: 0 "Naturalmente, non è una novità. A questo punto del nostro rapporto, io e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] potremmo quasi considerarci nemici. "
lmf_spouse.1135.desc.hate: 0 "Dopo tutto questo tempo, credo di poter dire con sicurezza che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'mi odi','mi odi')]. Forse non posso biasimar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]. "
lmf_spouse.1135.desc.friend: 0 "A dirla tutta, non è affatto da [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], poiché di norma noi due siamo amici. Suppongo che anche gli amici debbano, talvolta, litigare. "
lmf_spouse.1135.desc.lover: 0 "So che questo non significa che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'non mi ami','non mi ami')], così come io amo [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. Ciò non vuol dire che non si possa litigare di tanto in tanto, anche se fa male. "
lmf_spouse.1135.desc.soulmate: 0 "So che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei è','lui è')] la mia anima gemella, e io la sua... ma in un giorno come questo è difficile ricordarsene. "
lmf_spouse.1135.desc.like: 0 "A dire il vero, sono un poco sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')]. Credevo che noi due stessimo cominciando ad andare piuttosto d'accordo. "
lmf_spouse.1135.desc.end: 0 "Da allora ho evitato [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], ma suppongo che prima o poi dovrò incontrar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] e cercare di rimediare."
lmf_spouse.1135.a: 0 "Sempre che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] me lo permetta."
 
lmf_spouse.1140.t: 0 "Un gradito ritorno a casa"
lmf_spouse.1140.desc.start: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] mi stava aspettando nel cortile del [ROOT.Char.Custom('FortifiedBuilding')], al mio ritorno da una breve visita a una cittadina non lontana da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. "
lmf_spouse.1140.desc.ruler: 0 "Una sorpresa, considerando che credevo [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'fosse ancora','fosse ancora')] a [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
lmf_spouse.1140.desc.default: 0 "Una sorpresa, considerando che non è solitamente da [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')].\n\n"
lmf_spouse.1140.desc.unfaithful: 0 "Mi irrigidii, aspettandomi l'ennesimo saluto gelido... come tutti quelli che mi [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'ha rivolto','ha rivolto')] da quando ha scoperto la mia infedeltà. Ma no, invece "
lmf_spouse.1140.desc.revenge: 0 "Mi irrigidii, chiedendomi se quello sarebbe stato l'ennesimo sfoggio di rabbia nei miei confronti. Dopotutto, il [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo desiderio','suo desiderio')] di vendetta aleggia ancora. Ma no, invece "
lmf_spouse.1140.desc.rival: 0 "Mi irrigidii, troppo stanc[Select_CString(ROOT.Char.IsFemale,'a','o')] per un'altra raffica di parole taglienti e sguardi velenosi. Volevo il mio letto, non il mio rivale. Ma no, invece "
lmf_spouse.1140.desc.hate: 0 "Mi irrigidii, immaginando l'ennesimo saluto gelido da parte di un [ROOT.Char.GetPrimarySpouse.GetWomanMan] che sapevo nutrire ben poca cura per me. Ma no, invece "
lmf_spouse.1140.desc.friend: 0 "Sorrisi, liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di vedere il [ROOT.Char.GetPrimarySpouse.GetWomanMan] che consideravo un amico, benché non sempre vedessimo le cose allo stesso modo. "
lmf_spouse.1140.desc.lover: 0 "Sorrisi, liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di vedere il [ROOT.Char.GetPrimarySpouse.GetWomanMan] che amavo così profondamente. Se solo ogni [ROOT.Char.GetWifeHusband] potesse essere fortunat[Select_CString(ROOT.Char.IsFemale,'a','o')] quanto me! "
lmf_spouse.1140.desc.soulmate: 0 "Sorrisi, liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di vedere il [ROOT.Char.GetPrimarySpouse.GetWomanMan] che consideravo un'anima gemella, il mio opposto e al tempo stesso mio pari. "
lmf_spouse.1140.desc.like: 0 "Mi fermai, domandandomi quale genere di saluto avrei ricevuto. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] spesso sembra indifferente alla mia presenza, talvolta persino fredd[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. Eppure oggi "
lmf_spouse.1140.desc.end: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] annuì verso di me e ordinò ai servitori di prendere il mio mantello da viaggio. ""È bello vederti tornare, [ROOT.Char.GetPrimarySpouse.Custom2('spoken_address_by_familiarity', ROOT.Char )].""\n\n""Sono forse stato via così a lungo?"" scherzai.\n\n""Abbastanza da farti sentire la mancanza."" [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] mi riaccompagnò alla fortezza e ci ritrovammo a camminare di buon passo, mentre [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] mi raccontava gli avvenimenti della giornata. "
lmf_spouse.1140.desc.end.poor: 0 "Fu una sensazione piacevole, per una volta. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei era','Lui era')|U] caloros[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], e mi ritrovai a desiderare che fosse così più spesso."
lmf_spouse.1140.desc.end.good: 0 "Fu una sensazione piacevole, come quasi sempre accadeva. Mi considero fortunat[Select_CString(ROOT.Char.IsFemale,'a','o')] ad avere [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] al mio fianco, come sempre."
lmf_spouse.1140.a: 0 "Chissà quali sono le probabilità."
lmf_spouse.1140.b: 0 "Che cosa farò se mai dovessi perder[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]?"
 
lmf_spouse.1145.t: 0 "Il nostro amico comune"
lmf_spouse.1145.desc.start: 0 "Quando sentii che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] e [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('mutual_friend'))] stavano trascorrendo del tempo insieme, non seppi bene che cosa pensare. Sapevo naturalmente che i due erano in rapporti amichevoli, proprio come [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('mutual_friend'))] ed io, ma non riuscivo a immaginare che cosa stessero combinando.\n\nFu soltanto più tardi che appresi "
lmf_spouse.1145.desc.relation: 0 "[Select_CString(mutual_friend.IsFemale,'la mia','il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('mutual_friend'))] "
lmf_spouse.1145.desc.norelation: 0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('mutual_friend'))] "
lmf_spouse.1145.desc.mid: 0 "avesse trascorso tutto quel tempo a tessere le mie lodi presso [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip].\n\n Perché? Immagino che [Select_CString(mutual_friend.IsFemale,'lei','lui')] ritenesse che "
lmf_spouse.1145.desc.rival: 0 "io e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] dovessimo ricucire il nostro rapporto, suppongo, e porre fine alla nostra reciproca inimicizia.\n\n"
lmf_spouse.1145.desc.revenge: 0 "il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] dovesse perdonarmi, suppongo. [Select_CString(mutual_friend.IsFemale,'Lei','Lui')|U] ha già detto qualcosa del genere in passato.\n\n"
lmf_spouse.1145.desc.hate: 0 "l'avversione che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei nutriva','lui nutriva')] nei miei confronti non facesse che rendere le cose più difficili, suppongo. [Select_CString(mutual_friend.IsFemale,'Lei','Lui')|U] ha già detto qualcosa del genere in passato.\n\n"
lmf_spouse.1145.desc.like: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei dovesse','lui dovesse')] provare a conoscermi meglio. Dopotutto, siamo abbastanza cordiali, se non proprio amici. Anche se non molti mariti e mogli lo sono, non è vero?\n\n"
lmf_spouse.1145.desc.neutral: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei dovesse','lui dovesse')] superare la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] ambivalenza e concedermi una possibilità, suppongo.\n\n"
lmf_spouse.1145.desc.end: 0 "Ciò che non avrei mai immaginato è che [Select_CString(mutual_friend.IsFemale,'lei avrebbe','lui avrebbe')] avuto successo. Qualunque cosa [Select_CString(mutual_friend.IsFemale,'abbia detto','abbia detto')], l'atteggiamento di [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] è cambiato sensibilmente nelle ultime settimane. Dovremo vedere se ne verrà fuori qualcosa."
lmf_spouse.1145.a: 0 "Un cambiamento gradito."
talked_up_by_friend: 0 "L'opinione di [TARGET_CHARACTER.GetShortUINamePossessiveNoFormat|U] su [CHARACTER.GetShortUINameNoFormat] è notevolmente migliorata dopo una conversazione con un amico comune."
talked_up_by_friend_corresponding: 0 "L'opinione di [CHARACTER.GetShortUINamePossessiveNoFormat|U] su [TARGET_CHARACTER.GetShortUINameNoFormat] è notevolmente migliorata dopo una conversazione con un amico comune."
 
lmf_spouse.1150.t: 0 "Colmare le lacune"
lmf_spouse.1150.desc.start: 0 "Devo ammetterlo: ultimamente sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] sotto pressione. Ed è chiaro che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] se n'è accort[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si è dat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] molto da fare, negli ultimi tempi, per rendermi la vita più facile.\n\n"
lmf_spouse.1150.diligent: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] riceve coloro che giungono a corte per fare in modo che le questioni minori vengano affidate a qualcuno di rango inferiore. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] parla con i servitori, placando le loro preoccupazioni e spiegando le mie istruzioni quando io sono stat[Select_CString(ROOT.Char.IsFemale,'a','o')] troppo brus[Select_CString(ROOT.Char.IsFemale,'ca','co')]. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] impedisce ai consiglieri di infastidirmi con tutto ciò che non siano le questioni più importanti.\n\n"
lmf_spouse.1150.dominant: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] comparve una sera sulla soglia del mio studio, mi rivolse una lunga occhiata severa e poi disse: ""Bene, ora può bastare così.""\n\n""Che cosa intendi dire?"" chiesi, sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')].\n\n""Devi delegare, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband], e puoi cominciare delegando a me. Lascia che mi faccia carico di una parte del tuo fardello, qui nel [ROOT.Char.Custom('FortifiedBuilding')] e a corte."" Poi, senza attendere il mio consenso, fu esattamente ciò che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si mise a fare.\n\n"
lmf_spouse.1150.compassionate: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] comparve una sera sulla soglia del mio studio, mi rivolse uno sguardo colmo di compassione e poi disse: ""Non puoi continuare così, [ROOT.Char.GetWifeHusband].""\n\n""Che altra scelta ho?""\n\n""Puoi delegare. A me, per esempio. C'è molto di cui potrei sollevarti, e sono dispost[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] a farlo."" Per quanto riluttante, dovetti ammettere che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] aveva ragione... e così fu proprio ciò che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si mise a fare.\n\n"
lmf_spouse.1150.desc.end: 0 "Non ho dubbi che vi sia molto altro che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei stia','lui stia')] facendo senza che io lo sappia, tutto per alleggerire il mio affanno... a scapito, naturalmente, del [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] proprio."
lmf_spouse.1150.a: 0 "Le ne sono molto grat[Select_CString(ROOT.Char.IsFemale,'a','o')]."
 
lmf_spouse.1155.t: 0 "Al limite della [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua pazienza','suo ingegno')]"
lmf_spouse.1155.desc.start: 0 "Ultimamente il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ha avuto non poche difficoltà nello svolgere i [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi','suoi')] doveri di corte.\n\n"
lmf_spouse.1155.submissive: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non è mai stat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] molto assertiv[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], e da quanto ho capito lascia che troppi dei nostri cortigiani [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le','gli')] passino sopra, approfittando della [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua','sua')] bontà per sottrarsi a troppi incarichi... dei quali [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] deve poi naturalmente occuparsi di persona.\n\n"
lmf_spouse.1155.introvert: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non è mai stat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] una creatura socievole. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei è','Lui è')|U] assai più felice da sol[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], con il naso in un libro. Eppure la vita come [ROOT.Char.GetPrimarySpouse.GetLadyLord] del [ROOT.Char.Custom('FortifiedBuilding')] richiede che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si impegni attivamente con cortigiani e nobiltà, con quella grazia e quella disinvoltura che sinceramente [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] fatica a raccogliere.\n\n"
lmf_spouse.1155.lazy: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non è mai stat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] particolarmente energic[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. Alcuni potrebbero definir[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] #EMP pigr[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]#!, ma in verità [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei preferisce','lui preferisce')] una vita di agio e di lusso... mentre le esigenze della corte richiedono che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] sia costantemente operos[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. Dopotutto, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei è','lui è')|U] [ROOT.Char.GetPrimarySpouse.GetLadyLord] del [ROOT.Char.Custom('FortifiedBuilding')], e vi è molto da fare.\n\n"
lmf_spouse.1155.desc.end: 0 "Il risultato è che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è diventat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] assai stressat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. Potrei intervenire e rendere le cose più facili per [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], ma non è che io non abbia doveri miei a cui badare."
lmf_spouse.1155.a: 0 "Naturalmente [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'l','lo')] aiuterò!"
lmf_spouse.1155.b: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] deve cavarsela da [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sola','solo')]."
 
lmf_spouse.1160.t: 0 "Le difficoltà di [ROOT.Char.GetPrimarySpouse.Custom('IT_NAM_COL2')][ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|U]"
lmf_spouse.1160.desc.start: 0 "Ultimamente il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] sta attraversando un momento difficile.\n\n[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei governa','Lui governa')|U] la casa di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], oltre ai [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi','suoi')] doveri a corte al mio fianco, e di recente pare che una disgrazia segua l'altra. ""È come se [ROOT.Char.GetPrimarySpouse.GetFaith.HighGodName] avesse deciso di perseguitarmi con i problemi!"" [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'l','lo')] sentii esclamare.\n\n""C'è qualcosa che io possa fare per aiutarti?"" offrii.\n\n"
lmf_spouse.1160.rival: 0 ""Aiutarmi? Da parte tua?"" [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] sogghignò. ""Preferirei soffocare.""\n\n"
lmf_spouse.1160.dominant: 0 ""Me ne occuperò io personalmente,"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] con determinazione.\n\n"
lmf_spouse.1160.levelheaded: 0 ""Questo non può continuare per sempre, [Select_CString(ROOT.Char.IsFemale,'cara','caro')] [ROOT.Char.GetWifeHusband],"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], facendo un lungo respiro. ""Passerà presto.""\n\n"
lmf_spouse.1160.malicious: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] ci rifletté. ""No,"" disse infine [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. ""Troverò i responsabili di questi guai e farò loro rimpiangere ogni cosa. Vedrai.""\n\n"
lmf_spouse.1160.benevolent: 0 ""È gentile da parte tua offrirmelo,"" sospirò [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], ""ma non voglio aggiungere altro peso al tuo fardello. Me ne occuperò al meglio delle mie possibilità.""\n\n"
lmf_spouse.1160.diligent: 0 ""Questo è il mio dovere,"" disse fermamente [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], ""e mio soltanto. Farò ciò che si addice a [ROOT.Char.GetPrimarySpouse.Custom('IT_NAM_COL3')][ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|l].""\n\n"
lmf_spouse.1160.default: 0 "Capivo bene che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei lo stesse','lui lo stesse')] seriamente considerando. ""No,"" disse infine [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], con una punta di rammarico. ""Continuerò a provarci.""\n\n"
lmf_spouse.1160.desc.end: 0 "E così era. A quanto pare, per quanto affanno ciò potesse causare a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] intendeva perseverare."
lmf_spouse.1160.a: 0 "È davvero #EMP così#! difficile?"
 
lmf_spouse.1165.t: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] apatic[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]"
lmf_spouse.1165.desc: 0 "Non è certo che al mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] manchi qualcosa con cui tenersi occupat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]... [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] #EMP è#!, dopotutto, [ROOT.Char.GetPrimarySpouse.GetLadyLord] di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Eppure ultimamente [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'l','lo')] ho vist[Select_CString(ROOT.Char.IsFemale,'a','o')] vagare per i corridoi e per i giardini, sospirando per quella che sembra essere noia.\n\n""Ho bisogno di qualcosa da #EMP fare#!,"" finì per lamentarsi con me [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. ""Non sono il tutore di alcun bambino, non ho una vera posizione e non ho alcun ruolo alla tua corte se non quello di essere il tuo [ROOT.Char.GetPrimarySpouse.GetWifeHusband].""\n\n""Non basta questo?""\n\nLo sguardo gelido che ricevetti disse che no, non bastava. Almeno, non a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. Evidentemente, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] desiderava un consiglio."
lmf_spouse.1165.a: 0 ""Forse ti basta solo un nuovo amico.""
lmf_spouse.1165.b: 0 ""Ci sono abilità che potresti affinare per il futuro?""
lmf_spouse.1165.c: 0 ""Suppongo che noi due potremmo trascorrere più tempo insieme...""
spent_more_time_together: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] hanno migliorato il loro rapporto coniugale trascorrendo più tempo insieme."
spent_more_time_together_corresponding: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [CHARACTER.GetShortUINameNoTooltipNoFormat] hanno migliorato il loro rapporto coniugale trascorrendo più tempo insieme."
lmf_spouse.1165.d: 0 ""Sono certo che lo capirai da [Select_CString(TARGET_CHARACTER.IsFemale,'sola','solo')].""
spurned_spouse_request_for_advice: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha fatto adirare [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] respingendo la richiesta di consiglio di [CharYourHerHis(TARGET_CHARACTER)]."
spurned_spouse_request_for_advice_corresponding: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha fatto adirare [CHARACTER.GetShortUINameNoTooltipNoFormat] respingendo la richiesta di consiglio di [CharYourHerHis(CHARACTER)]."
 
lmf_spouse.1170.t: 0 "Crescere [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la sua','il suo')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))|U]"
lmf_spouse.1170.desc.start: 0 "Oggi il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è entrat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] nella sala del trono con un'espressione risoluta sul volto e una semplice richiesta.\n\n"
lmf_spouse.1170.desc.ruler: 0 ""Voglio che [ward.GetFirstNameNoTooltip] venga a [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e diventi il mio pupillo.""\n\n"
lmf_spouse.1170.desc.courtier: 0 ""Voglio che [ward.GetFirstNameNoTooltip] diventi il mio pupillo.""\n\n"
lmf_spouse.1170.desc.hasguardian: 0 ""[ward.GetFirstNameNoTooltip] ha già un tutore,"" dissi. ""Che cosa c'è che non va in [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_ward_guardian'))]?""\n\n"
lmf_spouse.1170.desc.rival: 0 ""Sai benissimo che cosa non va. Detesto [ROOT.Char.GetPrimarySpouse.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_ward_guardian'))]. [ward.GetFirstNameNoTooltip] è [Select_CString(ward.IsFemale,'la mia','il mio')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))] e starà molto meglio con #EMP me#!.""\n\n"
lmf_spouse.1170.desc.skill: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] agitò la mano con fare sprezzante. ""Sono almeno un precettore valido quanto [ROOT.Char.GetPrimarySpouse.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_ward_guardian'))]. Il punto è che [ward.GetFirstNameNoTooltip] è [Select_CString(ward.IsFemale,'la mia','il mio')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))] e starà molto meglio con me.""\n\n"
lmf_spouse.1170.desc.noguardian: 0 "Considerai la questione. ""Suppongo che [ward.GetFirstNameNoTooltip] al momento non abbia un tutore...""\n\n""E allora chi meglio di me potrebbe crescer[Select_CString(ward.IsFemale,'la','lo')]? [Select_CString(ward.IsFemale,'Lei è','Lui è')|U] [Select_CString(ward.IsFemale,'la mia','il mio')] [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('ward'))] e questo è il modo migliore per me di trascorrere del tempo con [Select_CString(ward.IsFemale,'lei','lui')].""\n\n"
lmf_spouse.1170.desc.end: 0 "Capivo bene che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non avrebbe lasciato cadere la questione."
lmf_spouse.1170.a: 0 "Molto bene. Potrai diventare il tutore di [ward.GetFirstNamePossessiveNoTooltip]."
lmf_spouse.1170.b: 0 "No. Le cose resteranno come sono."
 
lmf_spouse.1175.t: 0 "La disapprovazione del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]"
lmf_spouse.1175.desc.start: 0 "Da quando ho permesso a [focus_child.GetFirstNameNoTooltip] di iniziare un vero addestramento alla scherma, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] guarda la cosa con evidente disapprovazione. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')|U] scende all'armeria ad assistere, sussultando ogni volta che [focus_child.GetFirstNameNoTooltip] incassa un colpo o cade a terra, benché a [focus_child.GetFirstNameNoTooltip] ciò non dispiaccia affatto.\n\n"
lmf_spouse.1175.desc.religion: 0 ""È #EMP sconveniente#! che una fanciulla cresciuta nella pietà giochi con le spade!"" mi disse infine [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')].\n\n"
lmf_spouse.1175.desc.paranoid: 0 ""Che cosa penserà la gente #EMP?#!"" disse più tardi, quando fummo soli. ""E che cosa diranno di te? E di #EMP me#!, che permettiamo una cosa simile?!""\n\n"
lmf_spouse.1175.desc.dominant: 0 ""Lo proibisco,"" mi disse più tardi, con uno sguardo risoluto negli occhi. ""Che cosa intendi fare? Mandare [focus_child.GetFirstNameNoTooltip] in #EMP battaglia#!? Assolutamente no.""\n\n"
lmf_spouse.1175.desc.end: 0 ""La decisione è già stata presa,"" sospirai.\n\n""Allora #EMP disfa#! quella decisione!""
lmf_spouse.1175.a: 0 ""Molto bene, farò come esigi.""
stopped_my_swordsmanship_education: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha impedito a [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] di proseguire [CharYourHerHis(TARGET_CHARACTER)] addestramento alla scherma."
stopped_my_swordsmanship_education_corresponding: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha impedito a [CHARACTER.GetShortUINameNoTooltipNoFormat] di proseguire [CharYourHerHis(CHARACTER)] addestramento alla scherma."
lmf_spouse.1175.b: 0 ""No, l'addestramento di [focus_child.GetFirstNamePossessiveNoTooltip] continuerà come finora.""
 
lmf_spouse.1180.t: 0 "L'orgoglio di una madre"
lmf_spouse.1180.desc.start: 0 ""[focus_child.GetFirstNameNoTooltip] dovrebbe essere autorizzat[Select_CString(focus_child.IsFemale,'a','o')] a intraprendere un vero addestramento alla scherma,"" mi annunciò mia moglie questa sera. ""In pratica, già lo sta facendo, che ci piaccia o no.""\n\nNe rimasi sorpreso. ""E allora? Vorresti che mandassi [focus_child.GetFirstNameNoTooltip] in guerra? Come un[ROOT.Char.Custom('DE_PRO_PER_S_3P_N')] #EMP [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]#!?!""
lmf_spouse.1180.desc.knight: 0 ""Perché no?"" lo sguardo che mi rivolse [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] era pericoloso. ""Hai mandato #EMP me#!.""\n\n"
lmf_spouse.1180.desc.cynic: 0 ""Perché no?"" sputò [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] con derisione. ""Perché è una dolce e pia bambina?""\n\n"
lmf_spouse.1180.desc.just: 0 ""È la cosa giusta da fare, se è ciò che [focus_child.GetFirstNameNoTooltip] desidera,"" [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'scrollò','scrollò')] le spalle, ""e lo desidera.""\n\n"
lmf_spouse.1180.desc.compassion: 0 ""Le negheresti il diritto di seguire la sua vocazione? Se è davvero ciò che desidera?"" [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei sembrò','Lui sembrò')] incert[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], ma infine scosse il capo. ""Io non potrei.""\n\n"
lmf_spouse.1180.desc.end: 0 "Parlammo della questione per un po', ma capii bene che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non aveva alcuna intenzione di lasciar cadere la cosa prima che fosse presa una decisione."
lmf_spouse.1180.a: 0 "Molto bene, faremo come desideri."
lmf_spouse.1180.b: 0 "No, e su questo non si discute."
 
lmf_spouse.1185.t: 0 "[ROOT.Char.GetPrimarySpouse.GetMotherFather|U] e [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))|U]"
lmf_spouse.1185.desc.start: 0 "Udii il litigio da diverse stanze di distanza. Strilli acuti, seguiti da porte sbattute e infine dal mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] che irrompeva nella stanza in cui mi trovavo, con le guance arrossate dalla furia e dalla frustrazione. ""Quel... quel #EMP bambino#! finirà per uccidermi!"" dichiarò [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')].\n\nDopo essere finalmente riuscit[Select_CString(ROOT.Char.IsFemale,'a','o')] a calmare [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')], appresi che la lite era avvenuta tra [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] e il nostro [focus_child.Custom('GetDaughterSon')], [focus_child.GetFirstNameNoTooltip]. "
lmf_spouse.1185.desc.rowdy: 0 "A quanto pare, [focus_child.GetFirstNameNoTooltip] stava dando prova del [Select_CString(focus_child.IsFemale,'suo solito temperamento turbolento','suo solito temperamento turbolento')] e ha rovesciato un vaso, cosa per cui [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'l','lo')] ha rimproverat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')].\n\n"
lmf_spouse.1185.desc.bossy: 0 "A quanto pare, [focus_child.GetFirstNameNoTooltip] stava dando prova del [Select_CString(focus_child.IsFemale,'suo solito fare autoritario','suo solito fare autoritario')], impartendo ordini a tutti... e oggi ciò includeva anche il [ROOT.Char.GetPrimarySpouse.GetMotherFather] di [Select_CString(focus_child.IsFemale,'lei','lui')].\n\n"
lmf_spouse.1185.desc.wrathful: 0 "Il temperamento di [focus_child.GetFirstNamePossessiveNoTooltip] non è dei migliori neppure nei momenti migliori e, a quanto pare, in questo momento [Select_CString(focus_child.IsFemale,'lei è','lui è')] assai irritabil[Select_CString(focus_child.IsFemale,'e','e')], tanto da esplodere contro il [ROOT.Char.GetPrimarySpouse.GetMotherFather] di [Select_CString(focus_child.IsFemale,'lei','lui')] per un nonnulla.\n\n"
lmf_spouse.1185.desc.arrogant: 0 "A quanto pare, [focus_child.GetFirstNameNoTooltip] ha detto qualcosa di piuttosto sgradevole a proposito di uno dei servitori del [ROOT.Char.Custom('FortifiedBuilding')], e il [ROOT.Char.GetPrimarySpouse.GetMotherFather] di [Select_CString(focus_child.IsFemale,'lei','lui')] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'l','lo')] ha richiamat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] per la [Select_CString(focus_child.IsFemale,'sua','sua')] arroganza.\n\n"
lmf_spouse.1185.desc.paranoia: 0 "A quanto pare, la paranoia di [focus_child.GetFirstNamePossessiveNoTooltip] oggi era in piena mostra. [focus_child.GetSheHe|U] si è preoccupat[Select_CString(focus_child.IsFemale,'a','o')] e [Select_CString(focus_child.IsFemale,'si è lamentata','si è lamentato')] a lungo, finché il [ROOT.Char.GetPrimarySpouse.GetMotherFather] di [Select_CString(focus_child.IsFemale,'lei','lui')] non [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le','gli')] disse di calmarsi.\n\n"
lmf_spouse.1185.desc.stubborn: 0 "A quanto pare, la cocciutaggine di [focus_child.GetFirstNamePossessiveNoTooltip] oggi si è manifestata in tutta la sua forza, poiché il [ROOT.Char.GetPrimarySpouse.GetMotherFather] di [Select_CString(focus_child.IsFemale,'lei','lui')] non riusciva a ottenere la [Select_CString(focus_child.IsFemale,'sua','sua')] collaborazione in un compito, nonostante ripetuti tentativi e grande pazienza.\n\n"
lmf_spouse.1185.desc.impatient: 0 "A quanto pare, l'impazienza di [focus_child.GetFirstNamePossessiveNoTooltip] oggi era in piena mostra, poiché [Select_CString(focus_child.IsFemale,'lei','lui')] pretendeva abbastanza monete per acquistare un gingillo che aveva visto l'altro giorno... una richiesta che il [ROOT.Char.GetPrimarySpouse.GetMotherFather] di [Select_CString(focus_child.IsFemale,'lei','lui')] giustamente rifiutò.\n\n"
lmf_spouse.1185.desc.callous: 0 "A quanto pare, [focus_child.GetFirstNameNoTooltip] ha rivolto un'osservazione piuttosto crudele al [ROOT.Char.GetPrimarySpouse.GetMotherFather] di [Select_CString(focus_child.IsFemale,'lei','lui')]... una che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] colse tanto di sorpresa quanto [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] scosse.\n\n"
lmf_spouse.1185.desc.potential: 0 "Che cosa abbia dato inizio alla lite è irrilevante, poiché tra loro covava da tempo. Basti dire che vennero scambiate parole pesanti.\n\n"
lmf_spouse.1185.desc.rival: 0 "Che cosa abbia dato inizio alla lite è irrilevante, poiché sia [ROOT.Char.GetPrimarySpouse.GetMotherFather] sia [focus_child.Custom('GetDaughterSon')] sono ai ferri corti da tempo. Forse si sono guardati nel modo sbagliato, forse si sono dette parole di troppo.\n\n"
lmf_spouse.1185.desc.end: 0 "Ciò condusse a un enorme litigio, uno che riportò a galla offese, reali e immaginate, che sorpresero perfino [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]. ""Onestamente, non so che cosa sia preso a [Select_CString(focus_child.IsFemale,'lei','lui')].""\n\nSo che è così che si comportano i giovani [focus_child.GetWomenMen] della [Select_CString(focus_child.IsFemale,'sua età','sua età')]... ma dubito che questo sia il momento adatto per ricordarlo al mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]."
lmf_spouse.1185.a: 0 "Risolveranno la cosa col tempo... spero."
had_massive_argument: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] hanno avuto un violento litigio, che ha inasprito il rapporto di [CharYourTheir(CHARACTER)]."
had_massive_argument_corresponding: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [CHARACTER.GetShortUINameNoTooltipNoFormat] hanno avuto un violento litigio, che ha inasprito il rapporto di [CharYourTheir(TARGET_CHARACTER)]."
 
lmf_spouse.1190.t: 0 "[ROOT.Char.GetMotherFather|U] e [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))|U]"
lmf_spouse.1190.desc.start: 0 "Avrei dovuto capire che c'era qualcosa nell'aria.\n\n[focus_child.GetFirstNameNoTooltip] era di un umore insolitamente cupo, e mi irritava mentre cercavo di concentrarmi su altre questioni. "
lmf_spouse.1190.desc.rowdy: 0 "Poi, mentre brandiva una spada di legno, [Select_CString(focus_child.IsFemale,'lei','lui')] mi ha colpito in piena testa. So bene che è stato un incidente mentre [Select_CString(focus_child.IsFemale,'lei','lui')] stava giocando, eppure persi la pazienza e ordinai a [Select_CString(focus_child.IsFemale,'lei','lui')] di andarsene.\n\n"
lmf_spouse.1190.desc.bossy: 0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] si era messa in testa, però, che oggi fosse il giorno giusto per comandare tutti nella [ROOT.Char.Custom('FortifiedBuilding')]... me compreso. Persi la pazienza e ordinai a [Select_CString(focus_child.IsFemale,'lei','lui')] di andarsene.\n\n"
lmf_spouse.1190.desc.wrathful: 0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] aveva da ridire su ogni minima cosa e, alla fine, mi urlò contro in preda all'ira quando rifiutai di concedere a [Select_CString(focus_child.IsFemale,'lei','lui')] una richiesta insignificante.\n\n"
lmf_spouse.1190.desc.arrogant: 0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] non faceva che parlare dei servitori della [ROOT.Char.Custom('FortifiedBuilding')], ostentando tutta [Select_CString(focus_child.IsFemale,'la sua arroganza','il suo arroganza')] mentre diceva una cattiveria dopo l'altra. Alla fine persi la pazienza e ordinai a [Select_CString(focus_child.IsFemale,'lei','lui')] di andarsene.\n\n"
lmf_spouse.1190.desc.paranoia: 0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] si preoccupava senza sosta per una qualche decisione che [Select_CString(focus_child.IsFemale,'lei','lui')] riteneva vitale, ma alla quale io non prestavo alcuna attenzione. Cosa ne avrebbe pensato la gente, e se tutto fosse andato storto... una preoccupazione dopo l'altra, finché irritato ordinai a [Select_CString(focus_child.IsFemale,'lei','lui')] di andarsene.\n\n"
lmf_spouse.1190.desc.stubborn: 0 "Avevo già detto più volte a [Select_CString(focus_child.IsFemale,'lei','lui')] di andarsene, ma [Select_CString(focus_child.IsFemale,'lei','lui')] si rifiutava ostinatamente, infuriandosi ogni volta di più. Alla fine, [Select_CString(focus_child.IsFemale,'lei','lui')] si avvicinò e mi #EMP spinse#! sulla sedia!\n\n"
lmf_spouse.1190.desc.impatient: 0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] era incredibilmente impaziente. La cena non arrivava mai abbastanza in fretta, [Select_CString(focus_child.IsFemale,'il suo futuro','il suo futuro')] non arrivava mai abbastanza presto... era un lamento dopo l'altro, finché alla fine ordinai a [Select_CString(focus_child.IsFemale,'lei','lui')] di andarsene.\n\n"
lmf_spouse.1190.desc.callous: 0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] parlava dei [Select_CString(focus_child.IsFemale,'suoi amici','suoi amici')]... o almeno devo supporre che fossero [Select_CString(focus_child.IsFemale,'suoi amici','suoi amici')], dato che le cose che [Select_CString(focus_child.IsFemale,'lei','lui')] diceva su di loro erano talmente crudeli da lasciare davvero interdetti. Quando rimproverai [Select_CString(focus_child.IsFemale,'lei','lui')] per [Select_CString(focus_child.IsFemale,'la sua insensibilità','la sua insensibilità')], [Select_CString(focus_child.IsFemale,'lei','lui')] brontolò un commento su #EMP di me#!.\n\n"
lmf_spouse.1190.desc.rival: 0 "Tutto ciò che sentivo, più e più volte, era qualche commento borbottato e passivo-aggressivo rivolto a me. Eppure, quando pretendevo che [Select_CString(focus_child.IsFemale,'lei','lui')] ripetesse chiaramente quelle parole, [Select_CString(focus_child.IsFemale,'lei','lui')] si rifiutava. Era un comportamento odioso, e lo sapevo.\n\n"
lmf_spouse.1190.desc.potential: 0 "Ogni volta che volgevo lo sguardo verso [Select_CString(focus_child.IsFemale,'di lei','di lui')], ricevevo soltanto occhiate torve ed espressioni imbronciate. [Select_CString(focus_child.IsFemale,'Lei','Lui')] covava qualche rancore, ma non avevo alcuna voglia di perdere tempo a scoprire se fosse reale o immaginato, così ordinai a [Select_CString(focus_child.IsFemale,'lei','lui')] di andarsene.\n\n"
lmf_spouse.1190.desc.end: 0 "Da lì nacque una discussione, e quella discussione si trascinò finché entrambi non ci ritrovammo a urlarci contro e ormai non ricordo nemmeno più per cosa fosse cominciata. Vennero riesumati vecchi rancori, furono pronunciate parole amare e infine [focus_child.GetFirstNameNoTooltip] uscì furibond[Select_CString(focus_child.IsFemale,'a','o')] gridando: "Ti #EMP odio#!!"\n\nIl mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] mi consolò più tardi. "I giovani della [Select_CString(focus_child.IsFemale,'sua','sua')] età... sono semplicemente fatti così", sospirò [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. Questo non rese le cose molto più facili."
lmf_spouse.1190.a: 0 "[Select_CString(focus_child.IsFemale,'Lei','Lui')] se la farà passare. Spero."
 
lmf_spouse.1195.t: 0 "L'influenza di un [ROOT.Char.GetPrimarySpouse.GetMotherFather|U]"
lmf_spouse.1195.desc: 0 "Ultimamente ho visto [focus_child.GetFirstNameNoTooltip] e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] trascorrere molto tempo insieme.\n\nNon è una brutta cosa, certo. Quale genitore biasimerebbe [ROOT.Char.GetHerHis] [focus_child.Custom('GetDaughterSon')] per passare più tempo con [focus_child.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetMotherFather]?\n\nEppure sembra che quei due siano inseparabili. Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ha [focus_child.Custom('GetLassLad')] nel palmo della mano, e perciò [ROOT.Char.GetPrimarySpouse.GetHerHis] influenza è profonda. Posso solo sperare che ciò porti buoni frutti."
lmf_spouse.1195.a: 0 "Vedremo!"
spent_quality_time_together: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] hanno trascorso molto tempo insieme, legando come [CHARACTER.GetMotherFather] e [TARGET_CHARACTER.Custom('GetDaughterSon')]."
spent_quality_time_together_corresponding: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] e [CHARACTER.GetShortUINameNoTooltipNoFormat] hanno trascorso molto tempo insieme, legando come [TARGET_CHARACTER.GetMotherFather] e [CHARACTER.Custom('GetDaughterSon')]."
 
lmf_spouse.1200.t: 0 "Le credenze del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
lmf_spouse.1200.desc: 0 "Ultimamente ho visto [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] e [focus_child.GetFirstNameNoTooltip] trascorrere molto tempo insieme.\n\nAll'inizio pensavo che non fosse altro che un [ROOT.Char.GetPrimarySpouse.GetMotherFather] interessato a [ROOT.Char.GetPrimarySpouse.GetHerHis] [focus_child.Custom('GetDaughterSon')] e un'occasione per rafforzare il loro legame. Poi li ho sorpresi per caso mentre parlavano e ho avuto chiaramente l'impressione che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] stesse parlando di questioni di fede. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Sta','Sta')]... [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'insegnando','insegnando')] a [focus_child.GetFirstNameNoTooltip] la [ROOT.Char.GetPrimarySpouse.GetFaith.GetNameNoTooltip]? [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Sta','Sta')] cercando di convertire [focus_child.GetHerHim]?\n\nPiù tardi affrontai [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ammise di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'averlo fatto','averlo fatto')], ma sostenne che fosse per insistenza di [focus_child.GetFirstNamePossessiveNoTooltip]. "Questa è anche [focus_child.GetHersHis] eredità, oltre che la mia", si lamentò [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. "È davvero #EMP così#! sbagliato?""
lmf_spouse.1200.a: 0 "Molto bene, permetterò che continui."
lmf_spouse.1200.b: 0 "Assolutamente no. Finisce qui."
lmf_spouse.1200.b.success.tt: 0 "[focus_child.GetFirstNameNoTooltip] rimane con riluttanza seguace della [focus_child.GetFaith.GetNameNoTooltip]"
lmf_spouse.1200.b.secret.tt: 0 "[focus_child.GetFirstNameNoTooltip] continua a conoscere la [ROOT.Char.GetPrimarySpouse.GetFaith.GetNameNoTooltip] in #EMP segreto#!"
 
lmf_spouse.1205.t: 0 "Un'accoglienza gelida"
lmf_spouse.1205.desc: 0 "So fin troppo bene che il rapporto tra me e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ha toccato un punto molto basso.\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] sa benissimo come fare ciò che chiedo, come presenziare a corte e svolgere tutti i doveri richiesti a [ROOT.Char.GetPrimarySpouse.GetHerHim] in quanto [ROOT.Char.GetPrimarySpouse.GetLadyLord] di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]... eppure lo fa in un modo che, ogni singola volta, mi ricorda quanto sia profondo [ROOT.Char.GetPrimarySpouse.GetHerHis] disappunto.\n\nGli sguardi gelidi, i silenzi, il modo in cui [ROOT.Char.GetPrimarySpouse.GetSheHe] si volta dall'altra parte ogni volta che parlo a [ROOT.Char.GetPrimarySpouse.GetHerHim]. Non dovrebbe irritarmi tanto quanto fa, e invece lo fa. "
lmf_spouse.1205.desc.courtier: 0 "Quasi mi ripugna tornare ogni giorno alla [ROOT.Char.Custom('FortifiedBuilding')], sapendo che tipo di accoglienza mi attende."
lmf_spouse.1205.desc.ruler: 0 "Ogni volta che [ROOT.Char.GetPrimarySpouse.GetSheHe] torna a [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], tiro un sospiro di sollievo... eppure, nonostante sia chiaro ciò che [ROOT.Char.GetPrimarySpouse.GetSheHe] prova, [ROOT.Char.GetPrimarySpouse.GetSheHe] trova sempre un motivo per tornare: per dispetto nei miei confronti."
lmf_spouse.1205.a: 0 "#EMP sospiro...#!"
 
lmf_spouse.1210.t: 0 "Problemi nella [ROOT.Char.Custom('FortifiedBuilding')|U]"
lmf_spouse.1210.desc: 0 "I messaggi stanno andando "smarriti". Gli ordini inviati tramite i servitori in qualche modo non giungono mai a destinazione. Altri ordini vengono apertamente contraddetti, e tuttavia il colpevole non sembra mai essere trovato. Il personale non è sufficiente. Il personale è fin troppo numeroso. Il mio studio è privo delle provviste necessarie.\n\nPotrei continuare a lungo sull'incessante serie di piccoli problemi che devo affrontare nella [ROOT.Char.Custom('FortifiedBuilding')] di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma non ce n'è bisogno. So chi è il colpevole.\n\nIl mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ha molti modi per assicurarsi che io venga sabotato... mai abbastanza da permettermi di rimproverare formalmente [ROOT.Char.GetPrimarySpouse.GetHerHim], ma abbastanza da farmelo sentire."
lmf_spouse.1210.a: 0 "Quanto è irritante."
 
lmf_spouse.1215.t: 0 "Il messaggio intercettato"
lmf_spouse.1215.desc: 0 ""Dov'è la mia lettera per [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('focus_vassal'))]?" domandai al mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband].\n\nNaturalmente, [ROOT.Char.GetPrimarySpouse.GetSheHe] scrollò le spalle. "Non ho idea di cosa stiate parlando, [ROOT.Char.GetWifeHusband]."\n\nEppure il modo fin troppo innocente di [ROOT.Char.GetPrimarySpouse.GetHerHis] lasciava intendere che [ROOT.Char.GetPrimarySpouse.GetSheHe] sapesse davvero della lettera. Anzi, [ROOT.Char.GetPrimarySpouse.GetSheHe] #EMP voleva#! che io sapessi che [ROOT.Char.GetPrimarySpouse.GetSheHe] lo sapeva. "Non era pronta per essere inviata! C'erano ancora delle modifiche da fare. Modifiche importanti!"\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si limitò a scrollare le spalle. "Allora sarebbe davvero un peccato se qualcuno l'avesse mandata via. Lo chiederò ai servitori."\n\n[ROOT.Char.GetPrimarySpouse.GetSheHe|U] si allontanò, ma avevo già intuito cosa fosse accaduto: #EMP Sabotaggio.#!"
lmf_spouse.1215.a: 0 "La rivalità del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] sembra non conoscere limiti."
waylaid_message: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] furios[Select_CString(TARGET_CHARACTER.IsFemale,'a','o')] per aver ricevuto una lettera inviata accidentalmente da [CHARACTER.GetShortUINameNoTooltipNoFormat]."
waylaid_message_corresponding: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] furios[Select_CString(CHARACTER.IsFemale,'a','o')] per aver ricevuto una lettera inviata accidentalmente da [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]."
 
lmf_spouse.1220.t: 0 "Un [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] assente"
lmf_spouse.1220.desc: 0 ""Assolutamente no!"\n\nDopo l'ennesimo litigio con il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] nella sala del consiglio, [ROOT.Char.GetPrimarySpouse.GetSheHe] si alzò rigidamente da [ROOT.Char.GetPrimarySpouse.GetHerHis] sedia e lasciò la sala. Seguì un silenzio imbarazzato mentre io e gli altri consiglieri aspettavamo il ritorno di [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip], ma presto fu chiaro che [ROOT.Char.GetPrimarySpouse.GetSheHe] non aveva alcuna intenzione di farlo.\n\nPiù tardi trovai [ROOT.Char.GetPrimarySpouse.GetHerHim] nel corridoio, e [ROOT.Char.GetPrimarySpouse.GetSheHe] giurò che non avrebbe più servito nel mio consiglio. "Sono il tuo [ROOT.Char.GetPrimarySpouse.GetWifeHusband]," sbottò [ROOT.Char.GetPrimarySpouse.GetSheHe], "ma tu e io sappiamo bene entrambi che a questo punto è soprattutto una formalità. Che il mondo lo sappia pure, non m'importa."\n\nNon potei fare nulla per convincere [ROOT.Char.GetPrimarySpouse.GetHerHim] del contrario. Non ci resta che aspettare e vedere se la [ROOT.Char.GetPrimarySpouse.GetHerHis] posizione si ammorbidirà nelle prossime settimane."
lmf_spouse.1220.a: 0 "Quali sono le probabilità, mi chiedo?"
lmf_spouse.1120.tt: 0 "[THIS.Char.GetPrimarySpouse.GetShortUINameNoFormat|U] ha lasciato [THIS.Char.GetPrimarySpouse.GetHerHis] incarico nel tuo consiglio e non può essere assunt[THIS.Char.GetPrimarySpouse.Custom('DE_PRO_PER_P_3P_G')] nuovamente"
lmf_spouse.1221.t: 0 "[angry_spouse.GetShortUINameNoTooltipNoFormat|U] potrebbe tornare a corte"
lmf_spouse.1221.desc: 0 "La posizione di [angry_spouse.GetShortUINamePossessive|U] si è ammorbidita e [angry_spouse.GetSheHe] può ora essere nuovamente nominato nel tuo consiglio."
 
lmf_spouse.1225.t: 0 "Quanto basta?"
lmf_spouse.1225.desc.start: 0 "Questa mattina mia moglie mi ha preso da parte, dicendomi che aveva qualcosa d'importante da chiedermi.\n\n"
lmf_spouse.1225.desc.hasnochildren: 0 "Io... non voglio figli," ammise infine.\n\n"Proprio #EMP nessuno?#!", chiesi sorpreso.\n\n"
lmf_spouse.1225.desc.haschildrennotyours: 0 "Io... non voglio altri figli," ammise infine.\n\n"Nemmeno uno tutto nostro?", chiesi sorpreso.\n\n"
lmf_spouse.1225.desc.hasyourchildren: 0 "Io... non voglio che abbiamo altri figli," ammise infine.\n\n"
lmf_spouse.1225.desc.notattracted: 0 "Devo ammettere che non mi sorprese più di tanto. [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non aveva mai mostrato grande interesse per i rapporti carnali... né per gli uomini in generale, a dire il vero.\n\n"
lmf_spouse.1225.desc.chaste: 0 "Devo ammetterlo, il suo atteggiamento non mi sconvolse. L'atteggiamento di [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] verso i rapporti carnali è sempre stato di... riluttanza, si potrebbe dire.\n\n"
lmf_spouse.1225.desc.depressed: 0 "Non potei fare a meno di chiedermi se non fosse il risultato della sua persistente malinconia. Una tristezza tanto costante sembrava svuotare [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] di #EMP ogni#! desiderio, che fosse per la vita, per i figli o per qualunque altra cosa.\n\n"
lmf_spouse.1225.desc.lunatic: 0 "Non potei fare a meno di chiedermi se non fosse il frutto di qualche bizzarra idea. [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] aveva strane fantasie, pensieri folli che talvolta prendevano possesso di lei. O forse temeva di trasmettere una tale condizione? Non saprei dirlo.\n\n"
lmf_spouse.1225.desc.callous: 0 "Fece quella richiesta in modo così diretto, quasi freddamente. Come se i nostri rapporti coniugali fossero qualcosa di cui sbarazzarsi. Certo, eravamo ben lontani dall'essere innamorati, ma come poteva essere #EMP così#! insensibile?\n\n"
lmf_spouse.1225.desc.paranoid: 0 "Sapevo che una delle più grandi paure di [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] era morire di parto. Era quasi paranoica all'idea. Era forse quella paura a muoverla?\n\n"
lmf_spouse.1225.desc.reclusive: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] era diventata così schiva, ultimamente. Si allontanava da me, da tutti. Mi chiesi se questo facesse parte del suo desiderio di vedermi ancor meno di quanto già non fosse necessario.\n\n"
lmf_spouse.1225.desc.twoheirs: 0 ""Avete già più che abbastanza eredi, mio signore," continuò. "
lmf_spouse.1225.desc.heir: 0 ""Vi ho già dato almeno un erede, mio signore," continuò. "
lmf_spouse.1225.desc.end: 0 ""Di certo non vi servono altri figli, non da me."\n\nForse era vero... ma io li #EMP volevo#!?"
lmf_spouse.1225.a: 0 ""Molto bene, rispetterò il tuo desiderio.""
lmf_spouse.1225.a.tt: 0 "Tu e [THIS.Char.GetPrimarySpouse.GetShortUINameNoTooltipNoFormat] non avrete altri figli insieme"
lmf_spouse.marriagebed.notify1.tt: 0 "Tu e [std_partner.GetShortUINameNoTooltipNoFormat] non avrete altri figli insieme"
lmf_spouse.marriagebed.notify2.tt: 0 "Tu e [other_partner.GetShortUINameNoTooltipNoFormat] non avrete altri figli insieme"
lmf_spouse.marriagebed.notify3.tt: 0 "Tu e [THIS.Char.GetShortUINameNoTooltipNoFormat] non avrete altri figli insieme"
granted_request_no_more_children: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha accolto la richiesta di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di non avere altri figli insieme."
granted_request_no_more_children_corresponding: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha accolto la richiesta di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di non avere altri figli insieme."
lmf_spouse.1225.b: 0 ""Assolutamente no! Dare altri figli è tuo #EMP dovere#!.""
refused_request_no_more_children: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha rifiutato la richiesta di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di non avere altri figli insieme."
refused_request_no_more_children_corresponding: 0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha rifiutato la richiesta di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] di non avere altri figli insieme."
 
lmf_spouse.1230.t: 0 "Tempo e impegno"
lmf_spouse.1230.desc.start: 0 "A notte fonda, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] venne da me con quello sguardo negli occhi.\n\n""Credo sia tempo che ci adoperiamo per avere un altro figlio"", disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]."
lmf_spouse.1230.desc.myheir: 0 " ""Dopotutto, mi dicono che io abbia bisogno di un erede adeguato.""\n\n"
lmf_spouse.1230.desc.yourheir: 0 " ""Dopotutto, sei tu ad aver bisogno di un erede adeguato... o almeno così mi sento dire di continuo.""\n\n"
lmf_spouse.1230.desc.unfruitful: 0 " ""So che è passato del tempo...""\n\nDevo ammetterlo, ne fui sorpreso. ""Pensavo che non volessi altri figli"", feci notare.\n\n""Le cose sono cambiate, non è forse così?""\n\n"
lmf_spouse.1230.desc.end: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] prese la mia sorpresa per esitazione. ""Se preferisci, [ROOT.Char.GetWifeHusband], per stanotte posso lasciarti al tuo letto. È solo che queste cose richiedono tempo e impegno.""\n\nDetto ciò, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] mi rivolse un occhiolino, si voltò e rientrò nelle nostre stanze."
lmf_spouse.1230.a: 0 "Non dire altro!"
lmf_spouse.1230.b: 0 "A dire il vero, credo che passerò..."
 
lmf_spouse.1235.t: 0 "Il letto coniugale"
lmf_spouse.1235.desc.start: 0 "Negli ultimi tempi, le occasioni in cui il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] e io abbiamo consumato il matrimonio si sono fatte piuttosto... rare.\n\nSo che questo è normale nella maggior parte dei matrimoni, ma con [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] è diverso. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] si ritrae al mio tocco, ammesso che si arrivi persino a quello.\n\nOra mi ritrovo del tutto escluso dal letto coniugale. Se dipendesse dal mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband], non giacerebbe mai più con me.\n\n"
lmf_spouse.1235.desc.rival: 0 "Suppongo che non dovrei sorprendermene, considerato quanto apertamente sia ormai diventato [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'il suo odio','il suo odio')] nei miei confronti. Il nostro matrimonio non è più che una formalità, e questo non fa che renderlo ancor più tale.\n\n"
lmf_spouse.1235.desc.attraction: 0 "Suppongo che non dovrei sorprendermene. [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non ha mai avuto gusto per l'atto carnale e, in verità, dubito che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] provi attrazione per [ROOT.Char.GetWomenMen] in quel senso. Questo non fa che confermare ciò che ho sempre sospettato."
lmf_spouse.1235.desc.malicious: 0 "Suppongo sia vero che tra me e [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non vi sia alcun affetto, e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei non è','lui non è')] certo [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la più benevola','il più benevolo')] tra [ROOT.Char.GetPrimarySpouse.GetWomenMen] per cominciare. Temo che dovrò accettare che le cose stiano così."
lmf_spouse.1235.desc.dominant: 0 "Suppongo sia vero che tra me e [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] non vi sia alcun affetto, e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei è','lui è')] sempre determinat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] a fare a modo proprio. Non vi sarà modo di contrastare [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] su questo, questo è certo."
lmf_spouse.1235.a: 0 "Che umiliazione."
 
lmf_spouse.1236.t: 0 "[angry_spouse.GetShortUINameNoTooltipNoFormat|U] [CharHaveHas(angry_spouse)] cambiato [CharYourHerHis(angry_spouse)] idea"
lmf_spouse.1236.desc: 0 "[angry_spouse.GetShortUINameNoFormat|U] [CharHaveHas(angry_spouse)] deciso di tornare da [angry_spouse.GetShortUINameNoFormat] nel letto coniugale."
 
lmf_spouse.1240.t: 0 "In visita"
lmf_spouse.1240.desc.start: 0 "Oggi il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] si è avvicinato a me con una richiesta: ""Desidero far visita a [ROOT.Char.GetPrimarySpouse.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_visit_target'))].""\n\n""[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spouse_visit_target'))]? A "
lmf_spouse.1240.desc.foreign: 0 "[visit_kingdom.GetNameNoTierNoTooltip]? Perché così lontano?""\n\n"
lmf_spouse.1240.desc.ruler: 0 "[spouse_visit_target.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]? E per quale motivo?""\n\n"
lmf_spouse.1240.desc.courtier: 0 "[spouse_visit_target.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip|l]? E per quale motivo?""\n\n"
lmf_spouse.1240.desc.grandchildren: 0 ""Per vedere i miei nipoti, naturalmente, come se mi servisse un'ulteriore ragione per far visita a [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] mio,"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], un poco infastidit[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dalla mia domanda. "
lmf_spouse.1240.desc.grandson: 0 ""Mi serve forse una ragione per far visita a [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] mio e al mio nuovo nipote?"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], un poco infastidit[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dalla mia domanda. "
lmf_spouse.1240.desc.granddaughter: 0 ""Mi serve forse una ragione per far visita a [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] mio e alla mia nuova nipote?"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], un poco infastidit[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dalla mia domanda. "
lmf_spouse.1240.desc.relation: 0 ""Mi serve davvero una ragione per far visita a [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] mio?"" disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], un poco infastidit[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dalla mia domanda. "
lmf_spouse.1240.desc.sick: 0 ""[Select_CString(spouse_visit_target.IsFemale,'Lei','Lui')] è malat[Select_CString(spouse_visit_target.IsFemale,'a','o')], e voglio assicurarmi che riceva le cure adeguate"", disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. "
lmf_spouse.1240.desc.pregnant: 0 ""[ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('spouse_visit_target'))] mio è incinta, nel caso tu non l'avessi saputo"", disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], aggrottando la fronte verso di me. "
lmf_spouse.1240.desc.friend: 0 ""Perché è passato troppo tempo e mi manca [spouse_visit_target.GetHerHim]"", disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] con un sospiro esasperato. "
lmf_spouse.1240.desc.end: 0 ""Non starò lontan[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] da [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per più di qualche mese, sei al massimo, se è questo che ti preoccupa.""\n\nNon lo era, anche se mi chiesi perché [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] volesse andare da sol[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] e non mi avesse chiesto di accompagnar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]. Un viaggio simile potrebbe rivelarsi assai pericoloso, dopotutto."
lmf_spouse.1240.a: 0 ""Certo, puoi andare.""
lmf_spouse.1240.a.tt: 0 "[THIS.Char.GetPrimarySpouse.GetShortUINameNoFormat|U] si metterà in viaggio per far visita a [spouse_visit_target.GetShortUINameNoFormat] e rimarrà là fino a sei mesi."
lmf_spouse.1240.a.nocouncil.tt: 0 "Poiché la visita di [THIS.Char.GetPrimarySpouse.GetShortUINameNoFormat] avrà luogo fuori da [THIS.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip], [THIS.Char.GetPrimarySpouse.GetShortUINameNoFormat] non sarà disponibile come consigliere per la durata della [Select_CString(THIS.Char.GetPrimarySpouse.IsFemale,'sua','suo')] visita."
lmf_spouse.1240.b: 0 ""No, è troppo pericoloso. Un'altra volta.""
 
lmf_spouse.1242.title: 0 "La visita di [visiting_spouse.GetShortUINamePossessiveNoTooltipNoFormat|U] è terminata"
lmf_spouse.1242.desc: 0 "[visiting_spouse.GetShortUINameNoFormat|U] [CharHaveHas(visiting_spouse)] completato [CharYourHerHis(visiting_spouse)] visita con [actor.GetShortUINameNoFormat] a [destination.GetTitle.GetNameNoTierNoTooltip] e ora [CharAreIs(visiting_spouse)] sulla via del ritorno verso [origin.GetTitle.GetNameNoTierNoTooltip]."
came_for_a_long_visit: 0 "Il rapporto di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] con [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] è migliorato dopo una lunga visita in solitudine."
came_for_a_long_visit_corresponding: 0 "Il rapporto di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] con [CHARACTER.GetShortUINameNoTooltipNoFormat] è migliorato dopo una lunga visita in solitudine."
 
lmf_spouse.1250.t: 0 "[ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] [spouse_stress.GetNameNoTooltip( ROOT.Char )|U]"
lmf_spouse.1250.desc.start: 0 "I doveri del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] "
lmf_spouse.1250.desc.courtier: 0 "qui a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
lmf_spouse.1250.desc.ruler: 0 "alla [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua corte','suo corte')] di [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
lmf_spouse.1250.desc.mid: 0 "non sono facili, di questo non ho alcun dubbio. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] si lamenta spesso dello stress che sopporta. Il modo in cui [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] #EMP affronta#! tale stress, però, talvolta lascia molto a desiderare.\n\n"
lmf_spouse.1250.desc.drunkard: 0 "Oggi tutto è cominciato con [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei che beveva','lui che beveva')] fin dal primo mattino. Vino, per lo più, un calice qui e uno là, finché all'improvviso le parole di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si sono fatte biascicate e [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha iniziato a barcollare. Per sera la cosa era degenerata in rantoli e urla da ubriac[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], con grida rivolte ai servitori, finché alcuni di loro non sono riusciti a prendere [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] e a metter[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] a letto.\n\n"
lmf_spouse.1250.desc.hashishiyah: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] si è affezionat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] fin troppo alla foglia, assumendo hashishiyah con tale regolarità da restare quasi insensat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] se ne sta abbandonat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] sui cuscini nelle [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sue stanze','suoi alloggi')] private, a malapena dispost[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] ad alzarsi in certi giorni... e in altri terribilmente malat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. Uno dei servitori ha tentato di nascondere la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua scorta','suo nascondiglio')] per pura disperazione, e il capriccio che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ha scatenato per questo è stato davvero uno spettacolo memorabile.\n\n"
lmf_spouse.1250.desc.rakish.nolover: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] importuna i servitori, lamentandosi di quanto abbia bisogno di ""sfogo""... e, quando neppure questo basta, ho sentito dire che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si reca in incognito in un villaggio vicino. Che sia alla ricerca di incontri fugaci o che abbia un'amante o un amante, non l'ho ancora stabilito, ma non è difficile immaginarlo quando [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si riduce in questo stato.\n\n"
lmf_spouse.1250.desc.rakish.lover: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] importuna i servitori, lamentandosi di quanto abbia bisogno di ""sfogo""... e, quando neppure questo basta, ho sentito dire che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] lascia la [ROOT.Char.Custom('FortifiedBuilding')] in incognito... per incontrare [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la sua amante','il suo amante')], senza dubbio. A dire il vero, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] non si cura nemmeno troppo di nasconderlo. Né nasconde il fatto che i [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi bisogni','suoi bisogni')] siano più di quanto io possa soddisfare.\n\n"
lmf_spouse.1250.desc.irritable: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] si scaglia continuamente contro tutti: contro di me, contro i cortigiani, contro i servitori. Se qualcuno commette il minimo errore in [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua presenza','sua presenza')], sentirà tutta la forza del [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suo','suo')] temperamento. Questo significa che, ogni volta che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] è sotto stress, tutti camminano in punta di piedi attorno a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. In quei giorni, la [ROOT.Char.Custom('FortifiedBuilding')] è piena di una tensione silenziosa che rasenta la follia.\n\n"
lmf_spouse.1250.desc.flagellant: 0 "Di notte riesco a sentir[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')], nella [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua stanza','sua stanza')], pregare con fervore [ROOT.Char.GetPrimarySpouse.GetFaith.HighGodName]. Poi cominciano i colpi della frusta, subito seguiti dalle [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sue','sue')] esclamazioni di dolore e sofferenza. Vi sono state occasioni in cui un servitore ha trovato [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] svenut[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] sul pavimento, con la schiena ridotta a brandelli. Il medico ha curato [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ogni volta, ma mi dice che prima o poi [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] finirà per farsi un male che nessuno sarà più in grado di rimediare.\n\n"
lmf_spouse.1250.desc.profligate: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] si reca ai mercati, oppure compie brevi viaggi verso una città vicina, accumulando ogni volta debiti quasi da far lacrimare gli occhi. E cosa compra [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]? In verità, nulla di conseguente. Qualunque cosa attiri [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'il suo sguardo','il suo sguardo')]. ""Io #EMP ho bisogno#! di queste cose!"", insiste [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], ma entrambi sappiamo che non è così. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] sta gettando oro in una buca che non sembra mai colmarsi.\n\n"
lmf_spouse.1250.desc.contrite: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] visita spesso [ROOT.Char.GetPrimarySpouse.GetFaith.HouseOfWorship|l], alleggerendo [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'se stessa','se stesso')] davanti a qualunque [ROOT.Char.GetPrimarySpouse.GetFaith.PriestNeuter] sia disposto ad ascoltar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]... al punto che i [ROOT.Char.GetPrimarySpouse.GetFaith.PriestNeuterPlural] hanno cominciato a evitar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] del tutto. E non solo loro. Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è tormentat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dal senso di colpa per [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le sue colpe','le sue colpe')], reali o immaginate che siano, e il pentimento è chiaramente l'unico modo per rischiarare [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la sua mente','la sua mente')].\n\n"
lmf_spouse.1250.desc.comfort_eater: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] mangia. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] comincia al mattino, rompendo il digiuno con un pasto più abbondante di quanto molti consumino in un'intera giornata. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] si riempie di torte, dolci e ""piccole inezie"", seguiti da un pasto serale che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] divora tanto in fretta che gli altri presenti nella sala cominciano a fissar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')]. Eppure? In qualche modo [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei non è','lui non è')] mai sazi[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')].\n\n"
lmf_spouse.1250.desc.inappetetic: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] non mangia. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'La','Lo')] vedo a tavola, intento a giocherellare svogliatamente con le briciole nel piatto, con la maggior parte del pasto lasciata intatta. E questo accade di continuo, nonostante [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] insista sul fatto che #EMP mangi eccome#!. Di certo deve pur farlo, perché altrimenti nessuno potrebbe vivere, eppure io non lo vedo mai accadere. Giorno dopo giorno, guardo il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] consumarsi sempre di più sotto i miei occhi.\n\n"
lmf_spouse.1250.desc.reclusive: 0 "[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] sparisce, talvolta per giorni interi. Di solito i servitori sanno dove [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'si rifugia','si rifugia')], rinchiudendosi in una delle parti più remote della [ROOT.Char.Custom('FortifiedBuilding')], ma a volte non riescono a trovar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] nemmeno lì. Spesso trovo [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] da sol[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] nelle [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sue stanze','sue stanze')], a fissare la finestra e a dire ben poco. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] si ritrae al mio tocco, ma ancora una volta non dice nulla.\n\n"
lmf_spouse.1250.desc.same: 0 "Comprendo gli impulsi di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] meglio di quanto [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] creda. Gli sguardi d'intesa che io e [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ci scambiamo dopo uno di questi episodi hanno, stranamente, migliorato il nostro rapporto. Eppure tutto questo non è un bene."
lmf_spouse.1250.desc.default: 0 "Non posso dire di comprendere gli impulsi di [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip]. Ho provato a parlarne con [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], ho cercato di spiegare che la cosa non può continuare così, ma senza alcun risultato."
lmf_spouse.1250.a: 0 "Purtroppo, le cose stanno così."
 
lmf_spouse.1260.t: 0 "Il mio [spouse_stress.GetNameNoTooltip( ROOT.Char )|U] [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U]"
lmf_spouse.1260.desc.start: 0 "I doveri del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] "
lmf_spouse.1260.desc.courtier: 0 "qui a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
lmf_spouse.1260.desc.ruler: 0 "alla corte di [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] "
lmf_spouse.1260.desc.mid: 0 "spesso [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] lasciano spossat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] e stressat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], questo è certo. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] me lo dice spesso. Ultimamente, però, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ha cominciato a incanalare quello stress in qualcosa di produttivo.\n\n"
lmf_spouse.1260.desc.athletic: 0 "Essendo sempre stat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] di indole atletica, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha preso l'abitudine di fare lunghe passeggiate attorno alla [ROOT.Char.Custom('FortifiedBuilding')]: percorre i bastioni, controlla lo stato dei giardini e talvolta si spinge perfino ben oltre i terreni della [ROOT.Char.Custom('FortifiedBuilding')]. E non si limita a questo, poiché [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha trasformato quel momento in un'occasione per entrare in contatto con i servitori e gli altri popolani. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Si','Si')] ferma a parlare con ciascuno di loro, discutendo dei loro progressi e dello stato delle cose a [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e in cambio essi hanno finito per affezionarsi davvero a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. A quanto pare attendono con impazienza ciascuna delle [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sue uscite','sue uscite')], serbando le ultime novità soltanto per [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le sue orecchie','le sue orecchie')]... con grande gioia di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]!\n\n"
lmf_spouse.1260.desc.journaller: 0 "Ho visto i diari che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] scrive, e sono tanto estesi quanto notevoli. Non si tratta di oziosi pensieri sulla giornata, come avevo sospettato all'inizio, ma piuttosto di riflessioni su vari argomenti che suscitano l'interesse di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]. Alcuni di essi [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] li invia perfino a certi cortigiani, quelli che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ritiene possano trarne beneficio (e che sappiano leggere), e ognuno di loro pare esserne lieto. Per quel che ho visto, talvolta mi domando se il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] non desideri pubblicare alcuni di questi diari, come impresa intellettuale.\n\n"
lmf_spouse.1260.desc.confider: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] ama parlare, capisci. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] discorre con quasi chiunque di quasi qualunque cosa, e quasi un giorno sì e uno no [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] sorprendo a ridere con qualche nuova amicizia. All'inizio pensavo fosse soltanto vano pettegolezzo, eppure mi accorsi presto che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] era tanto abile nel far confidare agli altri #EMP a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]#! i propri segreti quanto nel confidarsi con loro. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] apprende evidentemente molto su ciò che accade a [ROOT.Char.GetPrimarySpouse.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] in questo modo e mi riferisce ogni cosa importante. La stoffa di un maestro delle spie, a dire il vero, anche se [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] sostiene di farlo soltanto perché [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le','gli')] piace.\n\n"
lmf_spouse.1260.desc.canlearn: 0 ""Anche tu potresti imparare a farlo,"" mi disse [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] una sera. ""Chi lo sa? Potrebbe perfino farti bene.""
lmf_spouse.1260.desc.same: 0 "Mi piace vederlo soprattutto perché anch'io ho gli stessi impulsi, e gli sguardi d'intesa che io e [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] ci scambiamo dopo che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] ha finito per la giornata ci hanno stranamente avvicinati un poco."
lmf_spouse.1260.desc.default: 0 "Non sono certo che io potrei mai fare lo stesso, nonostante [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la sua','la sua')] insistenza sul fatto che potrei. Eppure è bello vederlo."
lmf_spouse.1260.a: 0 "Almeno è una valvola di sfogo sana."
lmf_spouse.1260.b: 0 "Forse potrei #EMP davvero#! essere più simile a [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]..."
 
lmf_spouse.1270.t: 0 "Una nube oscura"
lmf_spouse.1270.desc: 0 "La tristezza del mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] grava su [home_ruler.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] come un miasma, una nube oscura che ha infettato l'intera [home_ruler.Custom('FortifiedBuilding')].\n\nI servitori si muovono più lentamente, strisciando per i corridoi con passi esitanti. Se si ascolta con attenzione, si può udire il sommesso pianto di [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip] provenire dalle [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sue stanze','sue stanze')]. Alcuni giorni [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sembra','sembra')] stare bene, e in altri? È come se nessuna forza al mondo potesse strappare [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] alla disperazione in cui [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'è sprofondata','è sprofondato')].\n\nChe cosa posso fare? Se provo a parlarne con [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si chiude nel silenzio. Potrei urlare contro [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'di lei','di lui')], sfidar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')], supplicar[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] almeno di alzarsi dal letto e #EMP provarci#!... ma nulla di ciò sembra funzionare.\n\nNon è sempre così grave. Mi pare di ricordare un [ROOT.Char.GetPrimarySpouse.GetWifeHusband] che un tempo sorrideva. Eppure, ultimamente, quel ricordo sembra davvero assai lontano."
lmf_spouse.1270.a: 0 "È ciò che è."
lmf_spouse.1270.b: 0 "Devo provarci con maggior impegno, ed esserci per [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]."
lmf_spouse.1270.success.tt: 0 "Riesci a destare [THIS.Char.GetPrimarySpouse.GetFirstName] dal [Select_CString(THIS.Char.GetPrimarySpouse.IsFemale,'suo umore cupo','suo umore cupo')]"
lmf_army.1270.success.title: 0 "[THIS.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si riprende"
lmf_spouse.1270.fail.tt: 0 "[THIS.Char.GetPrimarySpouse.GetFirstName] è irritat[Select_CString(THIS.Char.GetPrimarySpouse.IsFemale,'a','o')] dal tuo tentativo"
lmf_army.1270.fail.title: 0 "Non riesci a smuovere [Select_CString(THIS.Char.GetPrimarySpouse.IsFemale,'lei','lui')]"
 
lmf_spouse.1280.t: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband|U] che invecchia"
lmf_spouse.1280.desc.start: 0 "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] sta invecchiando.\n\nE non si tratta soltanto della [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua età','sua età')]. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] sta dimenticando le cose... talvolta cose semplici, come dove abbia lasciato qualcosa o il nome di un cortigiano. Altre volte, invece, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] vedo immobile in una stanza, ed è chiaro dal terrore sul volto di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'ha','ha')] completamente dimenticato dove si trovi. Mi è persino capitato di sorprender[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] a guardarmi in silenzioso panico, e sono certo che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] non sappia chi sia #EMP io#!!\n\n[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si è sempre ripres[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')], tuttavia, ma comincio a domandarmi se verrà il giorno in cui non accadrà più. "
lmf_spouse.1280.desc.same: 0 "Anche me ha raggiunto l'infermità della vecchiaia, ed è difficile vedere in [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] uno specchio del cammino che mi attende."
lmf_spouse.1280.desc.old: 0 "Non sono più [Select_CString(ROOT.Char.IsFemale,'una giovane','un giovane')] [ROOT.Char.GetWomanMan], ma la mia età non mi ha ancora colpit[Select_CString(ROOT.Char.IsFemale,'a','o')] con la stessa durezza con cui ha colpito il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. Non attendo con gioia il giorno in cui questo cambierà."
lmf_spouse.1280.desc.default: 0 "Forse un giorno sarò così anch'io, quando sarò più [Select_CString(ROOT.Char.IsFemale,'anziana','anziano')]. Per ora, almeno, suppongo di dover essere grato per la giovinezza che ancora mi resta."
lmf_spouse.1280.a: 0 "Dev'essere difficile per [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]."
lmf_spouse.1280.a.rival: 0 "Suppongo che presto mi libererò di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], non è vero?"
 
lmf_spouse.1290.t.reason: 0 "Ancora furios[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]"
lmf_spouse.1290.t.default: 0 "Qualcosa che ho detto?"
lmf_spouse.1290.desc.reason: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] continua a essere adirat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] con me. E non senza ragione, lo so. Eppure, i silenzi gelidi e gli sguardi di rimprovero sono difficili da sopportare.\n\nHo provato a parlare con [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] in numerose occasioni, per scusarmi o almeno spiegarmi, ma in quei momenti mi ritengo fortunat[Select_CString(ROOT.Char.IsFemale,'a','o')] se tutto ciò che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] fa è andarsene. Di solito finiamo tali discussioni con l'ennesimo litigio, uno che manda i servitori della [ROOT.Char.Custom('FortifiedBuilding')] a fuggire via.\n\n"
lmf_spouse.1290.desc.default.start: 0 "Ultimamente, il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è furios[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] con me.\n\nVorrei poter dire di conoscerne la ragione precisa. "
lmf_spouse.1290.desc.lover: 0 "Di norma, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei è','lui è')] [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'una donna amorevole','un uomo amorevole')]... che cosa può mai esser[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le','gli')] preso? "
lmf_spouse.1290.desc.friend: 0 "Di norma, considero [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] più che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'una moglie','un marito')]. [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'È','È')] mia amica, mio amico. Ma ora...? Che cosa può mai esser[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'le','gli')] preso? "
lmf_spouse.1290.desc.warm: 0 "Di norma, siamo in rapporti piuttosto cordiali, per quanto lo si possa essere con [ROOT.Char.GetHerHis] [ROOT.Char.GetPrimarySpouse.GetWifeHusband]. Ma ora...? "
lmf_spouse.1290.desc.cool: 0 "Suppongo che non siamo davvero in ottimi rapporti, nella maggior parte dei giorni, eppure raramente vedo simili accessi d'ira senza che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si spieghi. Ma ora...? "
lmf_spouse.1290.desc.default.end: 0 "Ho forse detto qualcosa di sbagliato? Fatto qualcosa che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] mi rimprovera? [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] semplicemente non vuole dirmelo.\n\n"
lmf_spouse.1290.desc.end: 0 "Ultimamente, perlomeno, ho l'impressione che la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua posizione','sua posizione')] si stia ammorbidendo. Credo che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] potrebbe finalmente essere disposto ad ascoltare delle scuse, se facessi un tentativo sincero. Oppure potrebbe peggiorare ancora di più le cose."
lmf_spouse.1290.a: 0 "Farò bene a provarci, allora."
lmf_spouse.1290.a.success: 0 "[angry_spouse.GetFirstNameNoTooltip] accetta le tue scuse"
spouse_apologized_profusely: 0 "Il rapporto di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] con [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] è migliorato notevolmente dopo che [CharYouSheHe(CHARACTER)] si [Select_CString(CHARACTER.IsFemale,'è scusata profusamente','è scusato profusamente')]."
spouse_apologized_profusely_corresponding: 0 "Il rapporto di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] con [CHARACTER.GetShortUINameNoTooltipNoFormat] è migliorato notevolmente dopo che [CharYouSheHe(TARGET_CHARACTER)] si [Select_CString(TARGET_CHARACTER.IsFemale,'è scusata profusamente','è scusato profusamente')]."
lmf_spouse.1290.a.failure: 0 "I tuoi sforzi non fanno che irritare ancora di più [Select_CString(angry_spouse.IsFemale,'lei','lui')]"
lmf_spouse.1290.b: 0 "Meglio lasciar dormire i cani che dormono, dico io."
 
lmf_spouse.1300.t: 0 "Tempo di fare ammenda?"
lmf_spouse.1300.desc.reason: 0 "Le cose non vanno bene tra me e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband], e per ottime ragioni.\n\n"
lmf_spouse.1300.desc.default: 0 "Il mio rapporto con il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è stato, nel migliore dei casi, freddo. Non siamo legati, nemmeno per gli standard di due coniugi.\n\n"
lmf_spouse.1300.desc.mid: 0 "Così, devo ammettere che fui sorpres[Select_CString(ROOT.Char.IsFemale,'a','o')] quando [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si avvicinò a me oggi, apparentemente contrit[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')]. "
lmf_spouse.1300.desc.reason2: 0 ""Vorrei chiederti perdono, [ROOT.Char.GetFirstNameNoTooltip]. Potrei non meritarlo, eppure te lo chiedo comunque. "
lmf_spouse.1300.desc.default2: 0 ""So che le cose sono state... difficili, e non sono stat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] per te [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la migliore moglie','il miglior marito')]. "
lmf_spouse.1300.desc.end: 0 "Vorrei che le cose andassero meglio.""\n\n""Davvero?"" chiesi. ""Perché proprio adesso?""\n\n""Perché sono stanc[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] di combatterti. Stanc[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] quanto te, credo."" [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'Lei','Lui')] fece una pausa, prendendo un profondo respiro. ""Se anche tu lo vuoi, s'intende.""
lmf_spouse.1300.a: 0 "Questa è una buona notizia."
was_apologized_to_profusely: 0 "Il rapporto di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] con [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] è migliorato dopo che [CharYouSheHe(TARGET_CHARACTER)] ha tentato di fare ammenda per il passato."
was_apologized_to_profusely_corresponding: 0 "Il rapporto di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] con [CHARACTER.GetShortUINameNoTooltipNoFormat] è migliorato dopo che [CharYouSheHe(CHARACTER)] ha tentato di fare ammenda per il passato."
lmf_spouse.1300.b: 0 "No, le cose vanno bene così come stanno."
 
lmf_spouse.1310.t: 0 "Il nostro [good_child.Custom('GetDaughterSon')|U] dabbene"
lmf_spouse.1310.desc.start: 0 "Di recente io e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] eravamo nel cortile della [ROOT.Char.Custom('FortifiedBuilding')], "
lmf_spouse.1310.desc.courtier.child: 0 "a guardare il giovane [good_child.GetFirstNameNoTooltip] mentre giocava, "
lmf_spouse.1310.desc.courtier.adult: 0 "a osservare il giovane [good_child.GetFirstNameNoTooltip] mentre [Select_CString(good_child.IsFemale,'lei','lui')] svolgeva le [Select_CString(good_child.IsFemale,'sue faccende quotidiane','sue faccende quotidiane')], "
lmf_spouse.1310.desc.default: 0 "avendo appena salutato [good_child.GetFirstNameNoTooltip] dopo una visita recente, "
lmf_spouse.1310.desc.mid: 0 " e [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si voltò all'improvviso verso di me e sorrise.\n\n""[Select_CString(good_child.IsFemale,'È una brava ragazza','È un bravo ragazzo')], non è vero? [Select_CString(good_child.IsFemale,'Una figlia eccellente','Un figlio eccellente')].""\n\nNon potei fare a meno di sorridere. ""Lo è davvero.""\n\n""E lo abbiamo fatto noi.""\n\n"
lmf_spouse.1310.desc.rival: 0 "Potrò anche non essere d'accordo con il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] su quasi nulla, anzi su nulla del tutto, ma su questo? Abbiamo cresciuto bene il nostro [good_child.Custom('GetDaughterSon')]. Insieme."
lmf_spouse.1310.desc.lover: 0 "Se in quel momento fosse stato possibile amare ancor di più il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband], lo avrei fatto. La luce nei [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'suoi occhi','suoi occhi')] era tutto."
lmf_spouse.1310.desc.friend: 0 "Ho sempre voluto bene al mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband], e in quel momento compresi quanto fossimo fortunati a essere veri compagni oltre che amici."
lmf_spouse.1310.desc.warm: 0 "Io e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] abbiamo un rapporto cordiale, se non proprio amoroso, ma in quel momento dovetti ammettere che a volte i veri sodalizi sono i migliori."
lmf_spouse.1310.desc.cool: 0 "Io e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] non abbiamo il rapporto più caloroso del mondo, a voler essere gentili. Concordiamo su ben poco. Eppure su questo? Abbiamo cresciuto bene il nostro [good_child.Custom('GetDaughterSon')]. Insieme."
lmf_spouse.1310.a: 0 "Ben fatto, dico io."
 
lmf_spouse.1320.t: 0 "Una [ROOT.Char.Custom('FortifiedBuilding')|U] vuota"
lmf_spouse.1320.desc: 0 "Questa sera trovai mia moglie nello studio della [ROOT.Char.Custom('FortifiedBuilding')], e notai che stava mettendo in ordine diverse lettere. Di per sé non vi era nulla di insolito, se non per il fatto che mi accorsi anche che i suoi occhi erano arrossati e velati, come se avesse pianto.\n\n""Che cosa c'è che non va, amore mio?"" chiesi, improvvisamente preoccupato.\n\n""Non è niente,"" disse. Quando si accorse che la mia preoccupazione non si era attenuata, sospirò e mi mostrò le lettere. ""Sono lettere. Dei nostri figli. Di solito non mi arrivano tutte insieme, ma sono giunte tutte nel corso degli ultimi giorni.""\n\n""E questo è... un male?""\n\nLei rise sommessamente. ""Mi ha soltanto ricordato che sono tutti cresciuti e se ne sono andati. Un tempo la [ROOT.Char.Custom('FortifiedBuilding')] era così piena, eppure sembra ieri; ora invece è più silenziosa."" I suoi occhi si riempirono ancora una volta di lacrime. ""E non ci saranno altri figli, non da me.""\n\nNon era davvero infelice, questo lo sapevo, ma la strinsi comunque a me e le ricordai che avevamo ancora l'un l'altra."
lmf_spouse.1320.a: 0 "Così vanno semplicemente le cose."
 
lmf_spouse.1330.t: 0 "Ricordando chi ci ha lasciato"
lmf_spouse.1330.desc.start: 0 "Stavo passando per una città vicino a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] per affari, quando un magistrato locale mi informò che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] stava visitando un [ROOT.Char.GetPrimarySpouse.GetFaith.HouseOfWorship|l] del posto.... cosa che mi sorprese, anche se non lo diedi a vedere al magistrato.\n\nE infatti, più tardi, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'la','lo')] trovai proprio lì, semplicemente sedut[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] presso l'altare, con aria triste. ""[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip]? È successo qualcosa?"" chiesi.\n\nLa mia presenza colse di sorpresa [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')], ma [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] riprese presto la [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'sua compostezza','sua compostezza')]. ""Io... stavo solo pensando a [ROOT.Char.GetPrimarySpouse.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))|l].""\n\nAh, questo aveva senso. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('dead_relative'))] è mort[Select_CString(dead_relative.IsFemale,'a','o')] "
lmf_spouse.1330.desc.month: 0 "proprio di recente. Naturalmente [Select_CString(dead_relative.IsFemale,'lei','lui')] sarebbe stat[Select_CString(dead_relative.IsFemale,'a','o')] nei pensieri di [ROOT.Char.GetPrimarySpouse.GetFirstNamePossessiveNoTooltip].\n\n"
lmf_spouse.1330.desc.6month: 0 "alcuni mesi fa. È curioso che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si trovi qui proprio adesso, a funerale ormai lontano, ma d'altronde io non [Select_CString(dead_relative.IsFemale,'la conoscevo','lo conoscevo')] come [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')].\n\n"
lmf_spouse.1330.desc.year: 0 "quasi un anno fa, credo. È curioso che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] si trovi qui proprio ora, dopo tanto tempo, ma d'altronde io non [Select_CString(dead_relative.IsFemale,'la conoscevo','lo conoscevo')] come [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')].\n\n"
lmf_spouse.1330.desc.rival: 0 "Io e il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] siamo ben lontani dall'essere in rapporti amichevoli, eppure "
lmf_spouse.1330.desc.lover: 0 "Questo era il mio più caro amore, dunque "
lmf_spouse.1330.desc.friend: 0 "Il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] è anche mio amico, dunque "
lmf_spouse.1330.desc.default: 0 "non vidi ragione di fare altrimenti, dunque "
lmf_spouse.1330.desc.end: 0 "mi sedetti e ascoltai il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] parlare di [Select_CString(dead_relative.IsFemale,'lei','lui')]. Passarono ore prima che [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] fosse pront[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] a partire, e capii che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] era grat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] della mia compagnia."
lmf_spouse.1330.a: 0 "Sono liet[Select_CString(ROOT.Char.IsFemale,'a','o')] di esserci stat[Select_CString(ROOT.Char.IsFemale,'a','o')] per [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')]."
 
lmf_spouse.1340.t: 0 "Una spina nel fianco di [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')|U]"
lmf_spouse.1340.desc.start: 0 ""Voglio che [bastard_child.GetHerHim] #EMP sparisca#!.""\n\nNon era la prima volta che il mio [ROOT.Char.GetPrimarySpouse.GetWifeHusband] sollevava la questione della presenza del mio [bastard_child.Custom('GetDaughterSon')] bastardo alla mia corte di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], ma era la prima volta che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] pretendeva davvero che mandassi via [bastard_child.GetFirstNameNoTooltip]. Sospirai, vedendo chiaramente che [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] era determinat[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] a fare a modo proprio. "
lmf_spouse.1340.desc.child: 0 ""[bastard_child.GetSheHe|U] è #EMP solo un bambino#!, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip],"" obiettai.\n\n""È proprio questo il punto! [bastard_child.GetSheHe|U] non è #EMP mio#! figlio! "
lmf_spouse.1340.desc.adult: 0 ""[bastard_child.GetSheHe|U] è #EMP mio [bastard_child.Custom('GetDaughterSon')]#!, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip],"" obiettai.\n\n""[bastard_child.GetSheHe|U] è [Select_CString(bastard_child.IsFemale,'una donna adulta','un uomo adulto')]! "
lmf_spouse.1340.desc.end: 0 "Hai idea di come mi faccia apparire il fatto che [bastard_child.GetHerHim] resti a corte? Te ne #EMP importa#! davvero?!""\n\nDetto ciò, [Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'lei','lui')] si voltò e uscì furios[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] dalla stanza... ma capivo bene che non sarebbe stata l'ultima volta che ne avrei sentito parlare."
lmf_spouse.1340.a: 0 ""Molto bene, manderò [bastard_child.GetHerHim] alla corte di [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('bastard_home'))].""
had_me_sent_away_from_court: 0 "[TARGET_CHARACTER.GetShortUIName|U] ha costretto [TARGET_CHARACTER.Custom('GetMotherFatherOpposite')|l] di [CHARACTER.GetShortUINamePossessiveNoFormat] a cacciare [CharYouHerHim(CHARACTER)] dalla corte."
had_me_sent_away_from_court_corresponding: 0 "[CHARACTER.GetShortUIName|U] ha costretto [CHARACTER.Custom('GetMotherFatherOpposite')|l] di [TARGET_CHARACTER.GetShortUINamePossessiveNoFormat] a cacciare [CharYouHerHim(TARGET_CHARACTER)] dalla corte."
lmf_spouse.1340.b: 0 ""Bene. Fuori [bastard_child.GetSheHe] dai piedi. Sei content[Select_CString(ROOT.Char.GetPrimarySpouse.IsFemale,'a','o')] adesso?!""
lmf_spouse.1340.c: 0 ""No. [bastard_child.GetSheHe|U] è [Select_CString(bastard_child.IsFemale,'mia figlia','mio figlio')] e dunque è una mia responsabilità.""
refused_to_kick_bastard_child: 0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ha rifiutato la richiesta di [TARGET_CHARACTER.GetShortUINamePossessiveNoFormat] che [CharYouSheHe(CHARACTER)] cacciasse dalla corte [CharYourHerHis(CHARACTER)] [Select_CString(CHARACTER.IsFemale,'figlia bastarda','figlio bastardo')]."
