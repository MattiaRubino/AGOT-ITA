  lmf_interaction.1300.start:0 "Dopo attenta considerazione, devo rifiutare la tua offerta di presentazione.\n\n"
  lmf_interaction.1300.youandi:0 "Tu e io semplicemente non siamo destinati l'uno all'altra."
  lmf_interaction.1300.youandthem:0 "Tu e [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstName] semplicemente non siete destinati l'uno all'altra."
  lmf_interaction.1300.themandi:0 "[secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] e io semplicemente non siamo destinati l'uno all'altra."
  lmf_interaction.1300.them:0 "[secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] e [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstName] semplicemente non sono destinati l'uno all'altra."

  lmf_interaction.1301.t:0 "Una presentazione"
  lmf_interaction.1301.desc.start:0 "L'invito è stato accettato e [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] è in viaggio verso [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
  lmf_interaction.1301.desc.actor:0 "Vi è molto da preparare. Dopotutto potrebbe essere il mio futur[Select_CString(secondary_recipient.IsFemale,'a','o')] [secondary_recipient.GetWifeHusband] a venire per incontrarmi. O forse finirò per detestar[Select_CString(secondary_recipient.IsFemale,'la','lo')] a prima vista e mandar[Select_CString(secondary_recipient.IsFemale,'la','lo')] a casa non appena la visita sarà conclusa.\n\nLa scelta, come sempre, è mia."
  lmf_interaction.1301.desc.pleased.willnotwed:0 "[secondary_actor.GetFirstNameNoTooltip], almeno, è prudentemente soddisfatt[Select_CString(secondary_actor.IsFemale,'a','o')] quando porto la notizia del[Select_CString(secondary_actor.IsFemale,'suo','suo')] possibile futur[Select_CString(secondary_recipient.IsFemale,'a','o')] [secondary_recipient.GetWifeHusband]. "Lo porti fin qui?" ha chiesto [Select_CString(secondary_actor.IsFemale,'lei','lui')]. "[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))]".\n\nPoi [Select_CString(secondary_actor.IsFemale,'lei','lui')] si è fermat[Select_CString(secondary_actor.IsFemale,'a','o')], riflettendo. "E se decidessi che non voglio sposar[Select_CString(secondary_recipient.IsFemale,'la','lo')] dopo tutto? Ho voce in capitolo?"\n\n"Lo vedremo," ho detto, e ciò è bastato a soddisfare [secondary_actor.GetFirstNameNoTooltip]... almeno per ora."
  lmf_interaction.1301.desc.pleased:0 "[secondary_actor.GetFirstNameNoTooltip], almeno, è soddisfatt[Select_CString(secondary_actor.IsFemale,'a','o')] quando porto la notizia del[Select_CString(secondary_actor.IsFemale,'suo','suo')] possibile futur[Select_CString(secondary_recipient.IsFemale,'a','o')] [secondary_recipient.GetWifeHusband]. "[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] viene qui? Per incontrarmi?" ha chiesto [Select_CString(secondary_actor.IsFemale,'lei','lui')] con entusiasmo. "[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))]"\n\nPoi [Select_CString(secondary_actor.IsFemale,'lei','lui')] si è fermat[Select_CString(secondary_actor.IsFemale,'a','o')], riflettendo. "Ma se [Select_CString(secondary_recipient.IsFemale,'lei','lui')] non mi piace? Vuol dire che non ci sposeremo, anche dopo che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] è venut[Select_CString(secondary_recipient.IsFemale,'a','o')] fin qui?"\n\n"Lo vedremo," ho detto, e ciò è bastato a placare le apprensioni di [secondary_actor.GetFirstNamePossessiveNoTooltip]... almeno per il momento."
  lmf_interaction.1301.desc.displeased:0 "Ora restava soltanto da dire a [secondary_actor.GetFirstNameNoTooltip] del visitatore in arrivo, e [Select_CString(secondary_actor.IsFemale,'lei','lui')] non ne è stat[Select_CString(secondary_actor.IsFemale,'a','o')] affatto liet[Select_CString(secondary_actor.IsFemale,'a','o')].\n\n"[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_recipient'))]" [Select_CString(secondary_actor.IsFemale,'lei','lui')] [secondary_actor.Custom('lmf_neg_reaction_type')].\n\nHo cercato di convincer[Select_CString(secondary_actor.IsFemale,'la','lo')] ad attendere prima di farsi un'opinione su [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip], dicendo che, in circostanze normali, gli accordi per il [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] sarebbero già stati definitivi, ma nulla di ciò che ho detto è servito a granché.\n\nDovremo aspettare e vedere come andrà la visita."
  lmf_interaction.1301.a:0 "È tempo di prepararsi!"

  lmf_interaction.1302.t:0 "In viaggio"
  lmf_interaction.1302.desc.recipient:0 "Sto per mettermi in viaggio verso [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], forse per incontrare il mio futur[Select_CString(secondary_actor.IsFemale,'a','o')] [secondary_actor.GetWifeHusband].\n\nIn circostanze normali, i preparativi nuziali sarebbero già completi... ma questa è un'occasione per incontrare [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] e perché [Select_CString(secondary_actor.IsFemale,'lei','lui')] incontri me, e poi potremo decidere da soli se vogliamo che queste nozze procedano.\n\nSuppongo che vedremo come andrà questa visita."
  lmf_interaction.1302.desc.pleased.willnotwed:0 "Abbiamo accettato l'invito e già [secondary_recipient.GetFirstNameNoTooltip] sta facendo i preparativi per partire verso [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nDevo ammettere che mi sono sentit[Select_CString(ROOT.Char.IsFemale,'a','o')] sollevat[Select_CString(ROOT.Char.IsFemale,'a','o')] quando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ha risposto alla mia scelta di [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] come possibil[Select_CString(secondary_actor.IsFemale,'e','e')] futur[Select_CString(secondary_actor.IsFemale,'a','o')] [secondary_actor.GetWifeHusband] con prudente entusiasmo.\n\n"[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))] Ma... e se non mi piacesse [Select_CString(secondary_actor.IsFemale,'lei','lui')], una volta finita la visita? Ho voce in capitolo sul mio avvenire?" ha chiesto [Select_CString(secondary_recipient.IsFemale,'lei','lui')].\n\n"Lo vedremo," ho detto, e poi ho augurato a [Select_CString(secondary_recipient.IsFemale,'lei','lui')] buon viaggio mentre il [Select_CString(secondary_recipient.IsFemale,'suo','suo')] seguito lasciava la [ROOT.Char.Custom('FortifiedBuilding')]."
  lmf_interaction.1302.desc.pleased:0 "Abbiamo accettato l'invito e già [secondary_recipient.GetFirstNameNoTooltip] sta facendo i preparativi per partire verso [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nDevo ammettere che mi sono sentit[Select_CString(ROOT.Char.IsFemale,'a','o')] sollevat[Select_CString(ROOT.Char.IsFemale,'a','o')] quando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ha risposto alla mia scelta di [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] come possibil[Select_CString(secondary_actor.IsFemale,'e','e')] futur[Select_CString(secondary_actor.IsFemale,'a','o')] [secondary_actor.GetWifeHusband] con entusiasmo.\n\n"[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))] Ma... e se [Select_CString(secondary_actor.IsFemale,'lei','lui')] non mi piacesse? Vuol dire che non ci sposeremo, anche dopo che ho viaggiato fin là?" ha chiesto [Select_CString(secondary_recipient.IsFemale,'lei','lui')], d'un tratto in ansia.\n\n"Lo vedremo," ho detto, e poi ho augurato a [Select_CString(secondary_recipient.IsFemale,'lei','lui')] buon viaggio mentre il [Select_CString(secondary_recipient.IsFemale,'suo','suo')] seguito lasciava la [ROOT.Char.Custom('FortifiedBuilding')]."
  lmf_interaction.1302.desc.displeased:0 "Abbiamo accettato l'invito e già [secondary_recipient.GetFirstNameNoTooltip] sta facendo i preparativi per partire verso [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] era più che un poco turbato quando gli ho annunciato la notizia del viaggio, nonché la mia scelta di [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] come possibil[Select_CString(secondary_recipient.IsFemale,'e','e')] futur[Select_CString(secondary_actor.IsFemale,'a','o')] [secondary_actor.GetWifeHusband].\n\n"[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_actor'))]", [Select_CString(secondary_recipient.IsFemale,'lei','lui')] [secondary_recipient.Custom('lmf_neg_reaction_type')].\n\nHo cercato di convincer[Select_CString(secondary_recipient.IsFemale,'la','lo')] ad attendere prima di farsi un'opinione su [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip], dicendo che, in circostanze normali, gli accordi per il [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] sarebbero già stati definitivi, ma nulla di ciò che ho detto è servito a granché.\n\nDovremo aspettare e vedere come andrà la visita."
  lmf_interaction.1302.a:0 "Attendo con impazienza le notizie."
  lmf_interaction.1302.b:0 "In marcia!"

  lmf_interaction.1304.t:0 "La guerra che incombe"
  lmf_interaction.1304.desc.atwar.actor:0 "Ora che siamo in guerra con [actor.Custom('IT_NAM_COL4')][actor.GetTitledFirstNameNoTooltip], sembra del tutto inappropriato che la visita di [recall_char.GetFirstNamePossessiveNoTooltip] a [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] prosegua."
  lmf_interaction.1304.desc.atwar.self.rootattacker:0 "La mia guerra contro [defender.Custom('IT_NAM_COL3')][defender.GetTitledFirstNameNoTooltip] solleva la questione se io debba o meno tornare a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] senza indugio."
  lmf_interaction.1304.desc.atwar.rootattacker:0 "La mia guerra contro [defender.Custom('IT_NAM_COL3')][defender.GetTitledFirstNameNoTooltip] solleva la questione se [recall_char.GetFirstNameNoTooltip] debba o meno essere richiamat[Select_CString(recall_char.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nA dire il vero, [Select_CString(recall_char.IsFemale,'lei','lui')] dovrebbe essere abbastanza al sicuro alla corte di [actor.GetTitledFirstNamePossessiveNoTooltip], ma non è detto che ciò duri."
  lmf_interaction.1304.desc.atwar.self.rootdefender:0 "La guerra di [attacker.GetTitledFirstNamePossessiveNoTooltip] contro di me solleva la questione se io debba o meno tornare a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] senza indugio."
  lmf_interaction.1304.desc.atwar.rootdefender:0 "La guerra di [attacker.GetTitledFirstNamePossessiveNoTooltip] contro di me solleva la questione se [recall_char.GetFirstNameNoTooltip] debba o meno essere richiamat[Select_CString(recall_char.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nA dire il vero, [Select_CString(recall_char.IsFemale,'lei','lui')] dovrebbe essere abbastanza al sicuro alla corte di [actor.GetTitledFirstNamePossessiveNoTooltip], ma non è detto che ciò duri."
  lmf_interaction.1304.desc.atwar.self:0 "Ora che faccio parte della guerra tra [attacker.GetPrimaryTitle.GetNameNoTierNoTooltip] e [defender.GetPrimaryTitle.GetNameNoTierNoTooltip], si pone la questione se io debba o meno tornare a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] senza indugio."
  lmf_interaction.1304.desc.atwar:0 "Ora che faccio parte della guerra tra [attacker.GetPrimaryTitle.GetNameNoTierNoTooltip] e [defender.GetPrimaryTitle.GetNameNoTierNoTooltip], si pone la questione se [recall_char.GetFirstNameNoTooltip] debba o meno essere richiamat[Select_CString(recall_char.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nA dire il vero, [Select_CString(recall_char.IsFemale,'lei','lui')] dovrebbe essere abbastanza al sicuro alla corte di [actor.GetTitledFirstNamePossessiveNoTooltip], ma non è detto che ciò duri."
  lmf_interaction.1304.a:0 "Richiam[Select_CString(recall_char.IsFemale,'a','a')] [Select_CString(recall_char.IsFemale,'lei','lui')] immediatamente."
  lmf_interaction.1304.b:0 "Devo tornare indietro."
  lmf_interaction.1304.c:0 "[Select_CString(recall_char.IsFemale,'Lei','Lui')|U] sta bene dov'[Select_CString(recall_char.IsFemale,'è','è')]."
  lmf_interaction.1304.d:0 "Continuerò."

  lmf_interaction.intro.cancelled.tt:0 "Presentazione annullata"
  lmf_interaction.intro.cancelled.our.war:0 "La visita di [recall_char.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata a causa della nostra guerra."
  lmf_interaction.intro.cancelled.recipient.war:0 "La visita di [recall_char.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata a causa della guerra di [ROOT.Char.GetPrimaryTitle.GetNamePossessiveNoTooltip]."
  lmf_interaction.intro.cancelled.death.visitor:0 "La visita di [recall_char.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata a causa della morte di [Select_CString(recall_char.IsFemale,'lei','lui')]."
  lmf_interaction.intro.cancelled.death:0 "La visita di [recall_char.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata a causa della morte di [intro_death.GetTitledFirstNamePossessive]."
  lmf_interaction.intro.cancelled.actor.besieged:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché la capitale di [actor.GetTitledFirstNamePossessiveNoTooltip] è sotto assedio."
  lmf_interaction.intro.cancelled.actor.notruler:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [actor.Custom('IT_NAM_COL3')][actor.GetTitledFirstName] non è più un sovrano."
  lmf_interaction.intro.cancelled.recipient.notruler:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [recipient.Custom('IT_NAM_COL3')][recipient.GetTitledFirstName] non è più un sovrano."
  lmf_interaction.intro.cancelled.secrecp.ill:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [Select_CString(secondary_recipient.IsFemale,'lei','lui')] si è ammalat[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.intro.cancelled.secactor.ill:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] si è ammalat[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.intro.cancelled.secrecp.imprisoned:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [Select_CString(secondary_recipient.IsFemale,'lei','lui')] è prigionier[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction.intro.cancelled.secrecp.incapable:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [Select_CString(secondary_recipient.IsFemale,'lei','lui')] è incapace."
  lmf_interaction.intro.cancelled.secactor.unavailable:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] non è più disponibil[Select_CString(secondary_actor.IsFemale,'e','e')] a incontrare [Select_CString(secondary_recipient.IsFemale,'lei','lui')]."
  lmf_interaction.intro.cancelled.actor.imprisoned:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [actor.GetShortUINameNoTooltipNoFormat] [CharAreIs(actor)] prigionier[Select_CString(actor.IsFemale,'a','o')]."
  lmf_interaction.intro.cancelled.actor.incapable:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata perché [actor.GetShortUINameNoTooltipNoFormat] [CharAreIs(actor)] incapace."
  lmf_interaction.intro.cancelled.fallthrough:0 "La visita di [secondary_recipient.GetTitledFirstNamePossessive] con [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstName] è stata annullata."

  lmf_interaction.1311.t:0 "L'arrivo"
  lmf_interaction.1311.initial.secrep:0 "Giungo infine a [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] di buon mattino e vengo presto accolt[Select_CString(secondary_recipient.IsFemale,'a','o')] nel cortile della [actor.Custom('FortifiedBuilding')] da nientemeno che [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale,'lei stessa','lui stesso')].\n\n"
  lmf_interaction.1311.initial.actor:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] è infine giunt[Select_CString(secondary_recipient.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] di buon mattino, e così mi sono mosso per accoglier[Select_CString(secondary_recipient.IsFemale,'la','lo')] di persona e ordinare ai servi di alloggiare il [Select_CString(secondary_recipient.IsFemale,'suo','suo')] corteo dopo il faticoso viaggio.\n\n"
  lmf_interaction.1311.initial:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] è infine giunt[Select_CString(secondary_recipient.IsFemale,'a','o')] a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] di buon mattino, e vienne presto accolt[Select_CString(secondary_recipient.IsFemale,'a','o')] nel cortile della [ROOT.Char.Custom('FortifiedBuilding')] da nientemeno che [secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] [Select_CString(secondary_actor.IsFemale,'lei stessa','lui stesso')].\n\n"
  lmf_interaction.1311.act.pleased.secrep:0 "[Select_CString(secondary_actor.IsFemale,'Lei','Lui')|U] è stat[Select_CString(secondary_actor.IsFemale,'a','o')] cortese nell'accoglienza e mi è parso di cogliere una nota d'approvazione sul viso di [Select_CString(secondary_actor.IsFemale,'lei','lui')] mentre mi squad­rava. Forse pensava che non me ne sarei accort[Select_CString(secondary_recipient.IsFemale,'a','o')]?\n\n"
  lmf_interaction.1311.act:0 ""
  lmf_interaction.1311.secact.pleased.secrep:0 "Devo ammettere che sono stat[Select_CString(secondary_recipient.IsFemale,'a','o')] piacevolmente sorpres[Select_CString(secondary_recipient.IsFemale,'a','o')] nel vedere che [Select_CString(secondary_actor.IsFemale,'lei','lui')] pareva liet[Select_CString(secondary_actor.IsFemale,'a','o')] di incontrarmi. [Select_CString(secondary_actor.IsFemale,'Lei','Lui')|U] ha fatto un profondo inchino e mi ha dato il benvenuto a nome del[Select_CString(secondary_actor.IsFemale,'suo','suo')] [secondary_actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))], ma ho visto anche [Select_CString(secondary_actor.IsFemale,'lei','lui')] squadrarmi con attenzione.\n\n"
  lmf_interaction.1311.act.displeased.secrep:0 "Non posso dire che [Select_CString(secondary_actor.IsFemale,'lei','lui')] sembrasse particolarmente liet[Select_CString(secondary_actor.IsFemale,'a','o')] di vedermi, benché l'invito sia partito proprio da [Select_CString(secondary_actor.IsFemale,'lei','lui')]. Ha forse mutato idea? Non gradisce il mio aspetto? Se così fosse, pare che io parta già svantaggiat[Select_CString(secondary_recipient.IsFemale,'a','o')].\n\n"
  lmf_interaction.1311.secact.displeased.secrep:0 "Non posso dire che [Select_CString(secondary_actor.IsFemale,'lei','lui')] sembrasse particolarmente liet[Select_CString(secondary_actor.IsFemale,'a','o')] di vedermi, anche se manteneva un'aria garbata. Forse l'invito non era un[Select_CString(secondary_actor.IsFemale,'a','')] idea di [Select_CString(secondary_actor.IsFemale,'lei','lui')] e [Select_CString(secondary_actor.IsFemale,'lei','lui')] si oppone all'unione? Se così fosse, mi attende un compito arduo.\n\n"
  lmf_interaction.1311.secact.pleased:0 "Per fortuna, [Select_CString(secondary_actor.IsFemale,'lei','lui')] pare ancora soddisfatt[Select_CString(secondary_actor.IsFemale,'a','o')] all'idea della visita e di ciò che potrebbe rappresentare, e i primi scambi mentre dava il benvenuto a [Select_CString(secondary_recipient.IsFemale,'lei','lui')] non hanno fatto nulla per smentirlo.\n\n"
  lmf_interaction.1311.secact.displeased:0 "Purtroppo, era chiaro che [Select_CString(secondary_actor.IsFemale,'lei','lui')] ancora non gradiva l'idea della visita e di ciò che potrebbe rappresentare, e la freddezza con cui ha ufficialmente dato il benvenuto a [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] ha subito gettato un gelo sull'intera faccenda.\n\n"
  lmf_interaction.1311.reaction.secrep:0 ""
  lmf_interaction.1311.reaction.actor.pleased:0 "[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] pareva liet[Select_CString(secondary_recipient.IsFemale,'a','o')] di vedermi e mi è parso di cogliere una nota d'approvazione sul volto di [Select_CString(secondary_recipient.IsFemale,'lei','lui')] mentre mi squad­rava. Se [secondary_recipient.GetFirstNameNoTooltip] gradisce l'idea dell'unione, la visita che viene sarà di certo più facile per entrambi.\n\n"
  lmf_interaction.1311.reaction.pleased:0 "Intanto, [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] è stat[Select_CString(secondary_recipient.IsFemale,'a','o')] cordiale e ben educat[Select_CString(secondary_recipient.IsFemale,'a','o')]. Anzi, se mai, sembrava ansios[Select_CString(secondary_recipient.IsFemale,'a','o')] di cominciare.\n\n"
  lmf_interaction.1311.reaction.actor.displeased:0 "[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] non sembrava particolarmente liet[Select_CString(secondary_recipient.IsFemale,'a','o')] di vedermi, mi è parso. Fredd[Select_CString(secondary_recipient.IsFemale,'a','o')] e teso, forse disapprovava l'intera visita e ciò che potrebbe rappresentare. Se così fosse, ciò potrebbe rendere tutto più difficile.\n\n"
  lmf_interaction.1311.reaction.displeased:0 "Intanto, [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] era rigido e teso. Era chiaro che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] era a disagio per l'intera visita... o forse soltanto stremat[Select_CString(secondary_recipient.IsFemale,'a','o')] dal lungo viaggio. Vedremo.\n\n"
  lmf_interaction.1311.us.end:0 "La presentazione vera e propria comincerà tra due giorni, quando trascorreremo del tempo da soli e ci conosceremo meglio."
  lmf_interaction.1311.end:0 "La presentazione vera e propria comincerà tra due giorni, quando entrambi trascorreranno del tempo da soli e si conosceranno meglio."
  lmf_interaction.1311.a:0 "Vediamo come andrà, d'accordo?"

  lmf_interaction.1312.t:0 "Una richiesta di sostegno"
  lmf_interaction.1312.desc.start:0 "Più tardi, quella notte, [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] è venut[Select_CString(secondary_recipient.IsFemale,'a','o')] a parlarmi in privato.\n\n"Desidero davvero sposare"
  lmf_interaction.1312.desc.name:0 " [secondary_actor.GetFirstNameNoTooltip], "
  lmf_interaction.1312.desc.stranger:0 " il tuo [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))], "
  lmf_interaction.1312.desc.end:0 "mio [ROOT.Char.GetLadyLord]. Ciò che temo è che [Select_CString(secondary_actor.IsFemale,'lei','lui')] non desideri sposarmi."\n\n"E perché vieni da me?" ho chiesto.\n\n"Perché desidero il tuo sostegno." Il [secondary_recipient.Custom('polite_gender_ref')] era chiaramente nervoso, ma ho visto [Select_CString(secondary_recipient.IsFemale,'lei','lui')] farsi coraggio mentre parlavamo. "[secondary_actor.Custom('IT_NAM_COL3')][secondary_actor.GetTitledFirstNameNoTooltip] confida nel tuo giudizio. Tu sei il [secondary_actor.Custom2('LMF_RelationToMeShort', ROOT.Char )] di [Select_CString(secondary_actor.IsFemale,'lei','lui')]. Se domani sostenessi la mia causa, forse..."\n\nSospetto che il [secondary_recipient.Custom('polite_gender_ref')] sopravvaluti l'effetto della mia buona opinione su [secondary_actor.GetFirstNameNoTooltip], ma forse [Select_CString(secondary_recipient.IsFemale,'lei','lui')] ha ragione."
  lmf_interaction.1312.a:0 "Sosterrò in silenzio la causa di [Select_CString(secondary_recipient.IsFemale,'lei','lui')]."
  lmf_interaction.1312.b:0 "[Select_CString(secondary_recipient.IsFemale,'Lei','Lui')|U] è sol[Select_CString(secondary_recipient.IsFemale,'a','o')]."
  lmf_interaction_intro_chance_pos_tt:0 "La possibilità di un esito positivo della presentazione #positive_value aumenta#!"
  lmf_interaction_intro_chance_neg_tt:0 "La possibilità di un esito positivo della presentazione #negative_value diminuisce#!"

  lmf_interaction.1313.t:0 "Comportamento inquietante"
  lmf_interaction.1313.desc.start:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e il [Select_CString(secondary_recipient.IsFemale,'suo','suo')] seguito sono stati alloggiati a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] e, dapprima, pareva che tutto fosse quieto e che tutti sarebbero stati pronti per le presentazioni il giorno seguente.\n\nPoi, più tardi quella sera, un servo mi ha destat[Select_CString(ROOT.Char.IsFemale,'a','o')] con una notizia: "
  lmf_interaction.1313.desc.lunatic:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] era stat[Select_CString(secondary_recipient.IsFemale,'a','o')] trovat[Select_CString(secondary_recipient.IsFemale,'a','o')] a vagare per le sale della [ROOT.Char.Custom('FortifiedBuilding')], ridendo come un forsennat[Select_CString(secondary_recipient.IsFemale,'a','o')] e senza un filo di vesti addosso.\n\nI servi sono infine riusciti a calmar[Select_CString(secondary_recipient.IsFemale,'la','lo')] e a ricondur[Select_CString(secondary_recipient.IsFemale,'la','lo')] nelle [Select_CString(secondary_recipient.IsFemale,'sue','sue')] stanze, "
  lmf_interaction.1313.desc.lustful:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] era sgattaiolat[Select_CString(secondary_recipient.IsFemale,'a','o')] fuori dalla [ROOT.Char.Custom('FortifiedBuilding')] ed era andat[Select_CString(secondary_recipient.IsFemale,'a','o')] in un villaggio vicino, dove si era scontrat[Select_CString(secondary_recipient.IsFemale,'a','o')] con alcuni locali... a quanto pare per via del[Select_CString(secondary_recipient.IsFemale,'suo','suo')] "comportamento osceno".\n\nLe mie guardie hanno riconosciuto il [secondary_recipient.Custom('polite_gender_ref')] e lo hanno scortat[Select_CString(secondary_recipient.IsFemale,'a','o')] indietro prima che scoppiasse altro, "
  lmf_interaction.1313.desc.sadistic:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] aveva iniziato una rissa con una delle domestiche della [ROOT.Char.Custom('FortifiedBuilding')]. A quanto pare, ella era entrata nelle stanze del [secondary_recipient.Custom('polite_gender_ref')] senza permesso e ha ricevuto una tale frustata da [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] da richiamare quasi metà della [ROOT.Char.Custom('FortifiedBuilding')] per intervenire. La domestica sta perlopiù bene, sebbene scossa dal crudele temperamento di [secondary_recipient.GetTitledFirstNamePossessiveNoTooltip], "
  lmf_interaction.1313.desc.end:0 "così non c'è stato vero danno, e tuttavia... è inquietante.\n\nPeggio ancora: a quanto pare anche [secondary_actor.GetFirstNameNoTooltip] ha udito dell'incidente proprio mentre lo venivo a sapere anch'io."
  lmf_interaction.1313.a:0 "Suppongo che dovremo far finta che non sia mai accaduto."

  lmf_interaction.1314.t:0 "Rissa nella Sala"
  lmf_interaction.1314.desc:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti sono stati alloggiati a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], e in principio pareva che tutto stesse procedendo per il meglio. Vi fu una piccola cena informale, alla quale [secondary_actor.GetFirstNameNoTooltip] nemmeno partecipò, ed è lì che le cose presero una brutta piega.\n\n[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] sembrava di pessimo umore fin dall’inizio, così evitai [Select_CString(secondary_recipient.IsFemale,'lei','lui')]... ed è per questo che non vidi cosa accadde finché non iniziarono le urla. [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] cominciò a coprire d’insulti [your_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)], e le grida tra i due divennero tanto accese che per poco non vennero alle mani prima che li separassero!\n\nCiò che diede inizio a tutto questo non importa. Importa che [your_courtier.GetFirstNameNoTooltip] sia terribilmente mortificat[Select_CString(your_courtier.IsFemale,'a','o')] dall’accaduto: è successo davanti a tutti, e [secondary_actor.GetFirstNameNoTooltip] è venut[Select_CString(secondary_actor.IsFemale,'a','o')] a sapere del comportamento esecrabile di [secondary_recipient.Custom('IT_NAM_COL2')][secondary_recipient.GetTitledFirstNameNoTooltip]."
  lmf_interaction.1314.a:0 "Che sventura."
  fought_during_introduction:0 "[CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] sono diventati nemici dopo essersi affrontati in duello durante la visita di presentazione nuziale di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]."
  fought_during_introduction_corresponding:0 "[TARGET_CHARACTER.GetShortUIName] e [CHARACTER.GetShortUIName] sono diventati nemici dopo essersi affrontati in duello durante la visita di presentazione nuziale di [CHARACTER.GetShortUINamePossessiveNoTooltip]."

  lmf_interaction.1315.t:0 "Introvabile"
  lmf_interaction.1315.desc:0 "Dopo che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti furono alloggiati per la notte, pensai di indire un piccolo ritrovo informale prima che tutti si ritirassero. Un’occasione perché [Select_CString(secondary_recipient.IsFemale,'lei','lui')] potesse parlare con [secondary_actor.GetFirstNameNoTooltip] senza la pressione di cento sguardi addosso.\n\n[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip], tuttavia, non si trovava da nessuna parte.\n\nPer un certo tempo tememmo che il [secondary_recipient.Custom('polite_gender_ref')] fosse svanit[Select_CString(secondary_recipient.IsFemale,'a','o')] o addirittura stat[Select_CString(secondary_recipient.IsFemale,'a','o')] rapit[Select_CString(secondary_recipient.IsFemale,'a','o')]! Non era nelle [Select_CString(secondary_recipient.IsFemale,'sue','sue')] stanze, non era nella grande sala. Persino i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] servitori brancolavano nel buio. Fu radunata una squadra di ricerca.\n\nPoi, dopo che tutti ebbero cercato in preda al panico per oltre un’ora, una delle mie ancelle trovò [Select_CString(secondary_recipient.IsFemale,'lei','lui')] nello studio. A quanto pare si era ritirat[Select_CString(secondary_recipient.IsFemale,'a','o')] lì per nascondersi dopo lo stress di conoscere così tanti estranei, ignar[Select_CString(secondary_recipient.IsFemale,'a','o')] persino d’essere stat[Select_CString(secondary_recipient.IsFemale,'a','o')] notat[Select_CString(secondary_recipient.IsFemale,'a','o')] assente.\n\n[secondary_actor.GetFirstNameNoTooltip] ne fu profondamente contrariato."
  lmf_interaction.1315.a:0 "A dire il vero, lo fui anch’io."

  lmf_interaction.1316.t:0 "Cena Rovinata"
  lmf_interaction.1316.desc.start:0 "Dopo che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti furono alloggiati per la notte, tenni una piccola cena nella grande sala. Un’occasione, pensavo, perché [secondary_actor.GetFirstNameNoTooltip] e il [secondary_recipient.Custom('polite_gender_ref')] potessero parlare prima della presentazione più formale di domani.\n\nNon andò bene.\n\n"
  lmf_interaction.1316.desc.gluttonous:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] a malapena parlò, né con [secondary_actor.GetFirstNameNoTooltip] né con alcun altro. Badava solo al cibo, e inghiottiva tutto ciò che anche solo sfiorasse il piatto, portandolo alla bocca. Ogni tentativo del mio [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))] di coinvolgerl[Select_CString(secondary_recipient.IsFemale,'a','o')] in conversazione fu accolto da borbottii appena udibili tra uno sbrodolare e l’altro.\n\n"
  lmf_interaction.1316.desc.paranoid:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] chiaramente non voleva essere lì. Trasali[Select_CString(secondary_recipient.IsFemale,'va','va')] quando qualcuno gli rivolgeva la parola, teneva gli occhi fissi su ogni uscio e fissava con sospetto qualunque servitore si avvicinasse. Pareva quasi che volessimo ucciderl[Select_CString(secondary_recipient.IsFemale,'a','o')]! Persino [secondary_actor.GetFirstNameNoTooltip] non ottenne molto più che sguardi quando tentò di interagire.\n\n"
  lmf_interaction.1316.desc.lazy:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] chiaramente non voleva essere lì. Arrivò tardi, sbadigliando e vestit[Select_CString(secondary_recipient.IsFemale,'a','o')] senza alcuna cura, e passò gran parte del pasto pizzicando distrattamente il cibo e sbadigliando. Quando [secondary_actor.GetFirstNameNoTooltip] chiese con evidente intenzione se il viaggio avesse stancato [Select_CString(secondary_recipient.IsFemale,'lei','lui')], ottenne un “non proprio” come risposta, e la cosa finì lì.\n\n"
  lmf_interaction.1316.desc.fallthrough:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] parve fare del [Select_CString(secondary_recipient.IsFemale,'suo','suo')] meglio per conversare, ma era impacciat[Select_CString(secondary_recipient.IsFemale,'a','o')] e chiaramente a disagio. Forse era semplicemente fuori dal [Select_CString(secondary_recipient.IsFemale,'suo','suo')] ambiente, o stremat[Select_CString(secondary_recipient.IsFemale,'a','o')] dal viaggio? In ogni caso fu un pasto penoso, e il sollievo evidente sul volto del [secondary_recipient.Custom('polite_gender_ref')] quando [secondary_actor.GetFirstNameNoTooltip] si congedò non migliorò certo le cose.\n\n"
  lmf_interaction.1316.desc.end:0 "Speriamo che la presentazione di domani riesca a raddrizzare la situazione, perché questo non è stato un buon inizio."
  lmf_interaction.1316.a:0 "Poteva andare meglio."

  lmf_interaction.1317.t:0 "Una Buona Impressione"
  lmf_interaction.1317.desc.start:0 "Dopo che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti furono alloggiati per la notte, tenni una piccola cena nella grande sala. Un’occasione, pensavo, perché [secondary_actor.GetFirstNameNoTooltip] e il [secondary_recipient.Custom('polite_gender_ref')] potessero parlare prima della presentazione più formale di domani.\n\nAndò meglio di quanto sperassi.\n\n"
  lmf_interaction.1317.desc.gregarious:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] fu il centro dell’attenzione dal momento in cui varcò la soglia della grande sala. Tutto — il sorriso, la risata, il modo di ascoltare rapit[Select_CString(secondary_recipient.IsFemale,'a','o')] quando gli si rivolgeva la parola... ogni cosa alleggerì notevolmente l’atmosfera. Persino [secondary_actor.GetFirstNameNoTooltip] finì per ridacchiare.\n\n"
  lmf_interaction.1317.desc.diligent:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] fu l’incarnazione della dignità e delle buone maniere, premurandosi d’includere ciascuno nella conversazione e ascoltando con attenzione quando parlavano. Era difficile non sentirsi considerati quando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] posava su di te la [Select_CString(secondary_recipient.IsFemale,'sua','sua')] attenzione. Persino [secondary_actor.GetFirstNameNoTooltip] parve chiaramente conquistat[Select_CString(secondary_actor.IsFemale,'a','o')] quando [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] lo coinvolse in un leggero scambio di battute, a grande delizia della tavola.\n\n"
  lmf_interaction.1317.desc.temperate:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] fu l’incarnazione delle buone maniere e della temperanza. Non si concesse spiriti, mangiò solo una piccola porzione del [Select_CString(secondary_recipient.IsFemale,'suo','suo')] pasto, ma lo fece con tale grazia che nessun altro si sentì ingordo per non mangiare come [Select_CString(secondary_recipient.IsFemale,'lei','lui')]. Anche se c’è chi potrebbe guardare dall’alto in basso un[secondary_recipient.Custom('WomanManGirlBoy')] che non beve, [secondary_actor.GetFirstNameNoTooltip] se ne accorse eccome... e sembrò approvare.\n\n"
  lmf_interaction.1317.desc.fallthrough:0 "Non so come [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] si comporti di solito in simili occasioni, ma stanotte era chiaramente di ottimo umore. Rideva e scherzava con tutti, a proprio agio pur essendo lontan[Select_CString(secondary_recipient.IsFemale,'a','o')] da casa. Trasformò quella che avrebbe potuto essere una cena silenziosa e imbarazzante in un evento delizioso, e in un certo senso pareva già parte della famiglia. Soprattutto, [secondary_actor.GetFirstNameNoTooltip] lo notò... e approvò.\n\n"
  lmf_interaction.1317.desc.end:0 "Speriamo che questo slancio prosegua anche nella presentazione di domani."
  lmf_interaction.1317.a:0 "Un eccellente inizio."

  lmf_interaction.1318.t:0 "Conquistarmi"
  lmf_interaction.1318.desc:0 "Regnava quiete nel [ROOT.Char.Custom('FortifiedBuilding')], dopo che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti furono alloggiati per la notte. Invitai [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] nei miei appartamenti personali per una piccola cena, sperando che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] e [secondary_actor.GetFirstNameNoTooltip] avessero occasione di parlare in privato, senza cento sguardi addosso.\n\nInvece, in qualche modo, finì che a parlare fummo [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e io!\n\nChiacchierammo amabilmente tra diversi bicchieri e, prima che me ne rendessi conto, ridevo alle battute del [secondary_recipient.Custom('polite_gender_ref')] e ne raccontavo io stesso alcune. Forse [Select_CString(secondary_recipient.IsFemale,'lei','lui')] stava solo cercando di ingraziarsi il mio favore, essendo io colui che decide il destino delle nozze, ma non mi parve così. Semplicemente, andavamo d’accordo!\n\n[secondary_actor.GetFirstNameNoTooltip] lasciò la cena presto, annoiat[Select_CString(secondary_actor.IsFemale,'a','o')] e ignorat[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.1318.a:0 "Una bella serata!"
  got_along_at_introduction:0 "[CHARACTER.GetShortUIName] e [TARGET_CHARACTER.GetShortUIName] hanno stretto un legame durante la visita di presentazione nuziale di [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]."
  got_along_at_introduction_corresponding:0 "[TARGET_CHARACTER.GetShortUIName] e [CHARACTER.GetShortUIName] hanno stretto un legame durante la visita di presentazione nuziale di [CHARACTER.GetShortUINamePossessiveNoTooltip]."

  lmf_interaction.1319.t:0 "Giochi di Spada"
  lmf_interaction.1319.desc.start:0 "Dopo che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti furono alloggiati per la notte, mi è stato riferito che [Select_CString(secondary_recipient.IsFemale,'lei','lui')] si affrettò verso le caserme per allenarsi con i miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nForse insolito, ma è possibile che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] si senta più a proprio agio a brandire una spada che a fare il [secondary_recipient.GetWomanMan] di corte in cerca di un[secondary_actor.GetWifeHusband].\n\nPiù importante ancora, pare che [secondary_actor.GetFirstNameNoTooltip] abbia udito la notizia proprio come me, e sia sces[Select_CString(secondary_actor.IsFemale,'a','o')] all’armeria per assistere allo spettacolo di persona. "
  lmf_interaction.1319.desc.impressed:0 "A quanto pare, [Select_CString(secondary_actor.IsFemale,'lei','lui')] ne fu molto compiaciut[Select_CString(secondary_actor.IsFemale,'a','o')], tifando dalla linea laterale e poi colmando [Select_CString(secondary_recipient.IsFemale,'lei','lui')] di lodi ogni volta che vinceva un assalto."
  lmf_interaction.1319.desc.unimpressed:0 "A quanto pare, [Select_CString(secondary_actor.IsFemale,'lei','lui')] ne fu tutt’altro che impressionat[Select_CString(secondary_actor.IsFemale,'a','o')], soprattutto quando tentò di coinvolgere il [secondary_recipient.GetWomanMan] in conversazione, solo per essere liquidat[Select_CString(secondary_actor.IsFemale,'a','o')] con noncuranza. A quel punto, naturalmente, [secondary_actor.GetFirstNameNoTooltip] si voltò e se ne andò."
  lmf_interaction.1319.a:0 "Be’, almeno [Select_CString(secondary_actor.IsFemale,'lei','lui')] ne è rimast[Select_CString(secondary_actor.IsFemale,'a','o')] impressionat[Select_CString(secondary_actor.IsFemale,'a','o')]."
  lmf_interaction.1319.b:0 "Non è un inizio di buon auspicio."

  lmf_interaction.1320.t:0 "Un Duello Inatteso"
  lmf_interaction.1320.desc:0 "Dopo che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti furono alloggiati per la notte, ero certo che sarebbe stata una serata tranquilla. Non fu affatto così.\n\nMentre quasi tutto il [ROOT.Char.Custom('FortifiedBuilding')] dormiva, [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] scese alle caserme per passare del tempo con i miei [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]... bevendo e giocando d’azzardo, con ogni probabilità, per quanto lo neghino.\n\nA un certo punto, il [secondary_recipient.Custom('polite_gender_ref')] finì in una partita contro [your_courtier.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. Volarono accuse di barare, le cose sfuggirono di mano, e all’improvviso fu dichiarato un duello.\n\nChe tutto ciò stesse accadendo senza che io ne sapessi nulla era già abbastanza grave, ma in qualche modo [secondary_actor.GetFirstNameNoTooltip] venne a conoscenza del duello e corse giù per vedere di che pasta fosse fatto il futuro [secondary_recipient.GetWifeHusband] del [Select_CString(secondary_actor.IsFemale,'suo','suo')] possibile avvenire."
  lmf_interaction.1320.a:0 "Poteva andare peggio, suppongo..."
  lmf_interaction.1320.a.win.tt:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] vince il duello"
  lmf_interaction.1320.a.lose.tt:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] perde il duello"

  lmf_interaction.1321.t:0 "Nostalgia di Casa"
  lmf_interaction.1321.desc:0 "Dopo che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] e i [Select_CString(secondary_recipient.IsFemale,'suoi','suoi')] attendenti furono alloggiati e accompagnati alle loro stanze, la notte trascorse quieta. Pensai che sarebbe finita lì.\n\nInvece ricevetti notizia da uno dei servitori del [ROOT.Char.Custom('FortifiedBuilding')]: [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] si era chius[Select_CString(secondary_recipient.IsFemale,'a','o')] nelle [Select_CString(secondary_recipient.IsFemale,'sue','sue')] stanze, inconsolabil[Select_CString(secondary_recipient.IsFemale,'e','e')] e in lacrime.\n\nDovetti scendere di persona, parlando con il [secondary_recipient.Custom('polite_gender_ref')] attraverso la porta per calmar[Select_CString(secondary_recipient.IsFemale,'la','lo')], finché infine, riluttantemente, mi lasciò entrare.\n\nSi trattava di nostalgia di casa, a quanto pare. Nient’altro. Dovetti ricordare a me stesso che [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] è ancora soltanto un bambino, in fondo, e ringraziare il cielo che [secondary_actor.GetFirstNameNoTooltip] non fosse lì ad assistere alla scena."
  lmf_interaction.1321.a:0 "Che terribile imbarazzo per il [secondary_recipient.Custom('GetLassLad')]."

  intro_planned_activity_hunting:0 "l’intento è di passare la giornata a caccia"
  intro_planned_activity_hike:0 "l’intento è di passare la giornata in una lunga escursione"
  intro_planned_activity_garrison:0 "l’intento è di mostrare la [ROOT.GetCharacter.GetHerHisMy] abilità nella scherma"
  intro_planned_activity_seduction:0 "l’intento è di trascorrere la giornata in stretta compagnia"
  intro_planned_activity_poetry:0 "l’intento è di mostrare la [ROOT.GetCharacter.GetHerHisMy] abilità nella poesia"
  intro_planned_activity_library:0 "l’intento è di trascorrere la giornata in biblioteca"
  intro_planned_activity_church:0 "l’intento è di trascorrere la giornata presso la [ROOT.GetCharacter.GetFaith.HouseOfWorship|l]"
  intro_planned_activity_tavern:0 "l’intento è di lasciare il [ROOT.GetCharacter.Custom('FortifiedBuilding')] ed esplorare il villaggio più vicino"
  intro_planned_activity_poor:0 "l’intento è di trascorrere la giornata facendo elemosina ai poveri"
  intro_planned_activity_tour:0 "l’intento è di trascorrere la giornata visitando i terreni del [ROOT.GetCharacter.Custom('FortifiedBuilding')]"
  intro_planned_activity_garden:0 "l’intento è di trascorrere la giornata nei giardini del [ROOT.GetCharacter.Custom('FortifiedBuilding')]"

  lmf_interaction.1325.t:0 "Il Giorno Seguente"
  lmf_interaction.1325.t.same:0 "Un’Abbinata Possibile"
  lmf_interaction.1325.desc.same.actor.start:0 "Difficilmente la si potrebbe chiamare una vera “presentazione”, considerando che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] è parte della mia corte qui a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]; tuttavia, ci atterremo comunque alle forme.\n\n"
  lmf_interaction.1325.desc.same.actor.willnotwed:0 "[secondary_recipient.Custom('polite_gender_ref')|U] sembra assai nervos[Select_CString(secondary_recipient.IsFemale,'a','o')] mentre si presenta dinanzi a me nella sala del trono. Dopotutto è stat[Select_CString(secondary_recipient.IsFemale,'a','o')] ben chiar[Select_CString(secondary_recipient.IsFemale,'a','o')] nel dichiarare che non sposerà nessuno che non incontri il [Select_CString(secondary_recipient.IsFemale,'suo','suo')] gradimento... e io ho il potere di ignorare tali desideri. Eppure, perché mai dovrei impegnarmi in questa danza, se volessi farlo?\n\n"
  lmf_interaction.1325.desc.same.actor:0 "[secondary_recipient.Custom('polite_gender_ref')|U] sembra assai nervos[Select_CString(secondary_recipient.IsFemale,'a','o')] mentre si presenta dinanzi a me nella sala del trono. Sono io che deciderò se il [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l] avrà luogo, dopotutto, a prescindere da come ci sentiremo l’uno verso l’altra alla fine della giornata. Eppure, se volessi sposare [secondary_recipient.GetFirstNameNoTooltip] senza considerare la nostra compatibilità, non l’avrei forse già fatto?\n\n"
  lmf_interaction.1325.desc.same.actor.end:0 "Così, prendo [Select_CString(secondary_recipient.IsFemale,'lei','lui')] per mano e lo conduco fuori. Il mio [secondary_actor.Custom('lmf_intro_planned_activity')] mentre parliamo. Nonostante ogni occhio della corte sia su di noi, faremo del nostro meglio per goderci la giornata."
  lmf_interaction.1325.desc.same.start:0 "Difficilmente la si potrebbe chiamare una vera “presentazione”, considerando che [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] risiede qui a [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Eppure il punto è che trascorreranno una giornata per capire quanto siano compatibili... "
  lmf_interaction.1325.desc.same.both.willnotwed:0 "dato che sia [Select_CString(secondary_recipient.IsFemale,'lei','lui')] sia [secondary_actor.GetFirstNameNoTooltip] hanno giurato che sposeranno soltanto chi desiderano; e se volessi scavalcare i loro desideri, non avrei alcun bisogno di tutto ciò.\n\n"
  lmf_interaction.1325.desc.same.secact.willnotwed:0 "dato che, se volessi scavalcare il desiderio di [secondary_actor.GetFirstNamePossessiveNoTooltip] di sposare soltanto un[secondary_recipient.GetWomanMan] di cui [Select_CString(secondary_actor.IsFemale,'lei','lui')] approvi, non avrei alcun bisogno di organizzare tutto questo.\n\n"
  lmf_interaction.1325.desc.same.secrec.willnotwed:0 "dato che, se volessi scavalcare il desiderio di [secondary_recipient.GetFirstNamePossessiveNoTooltip] di sposare soltanto un[secondary_actor.GetWomanMan] di cui [Select_CString(secondary_recipient.IsFemale,'lei','lui')] approvi, non avrei alcun bisogno di organizzare tutto questo.\n\n"
  lmf_interaction.1325.desc.same:0 "dato che, se volessi farli sposare senza considerare alcunché, lo farei e basta.\n\n"
  lmf_interaction.1325.desc.same.end:0 "Entrambi mostrano volti composti alla corte riunita, celando con cura i veri pensieri sulla faccenda. Poi [secondary_actor.GetFirstNameNoTooltip] prende la mano di [secondary_recipient.Custom('IT_NAM_COL2')][secondary_recipient.GetTitledFirstNameNoTooltip] e lo conduce fuori dalla sala. A quanto pare, il [secondary_actor.Custom('lmf_intro_planned_activity')] di [secondary_actor.GetHerHis|U].\n\nLa presentazione sta per cominciare."
  lmf_interaction.1325.desc.secrec.start:0 "Quando giunge il mattino, mi presento nella sala del trono, agghindat[Select_CString(secondary_recipient.IsFemale,'a','o')] e pront[Select_CString(secondary_recipient.IsFemale,'a','o')] a trascorrere la giornata con [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))].\n\nAmmetto di sentirmi nervos[Select_CString(secondary_recipient.IsFemale,'a','o')]. Anche se il mio futuro non stesse per essere deciso, gli occhi dell’intera corte sono su di me. Chi non suderebbe sotto una simile pressione?\n\nEppure, disciplino l’espressione perché resti benevolmente neutra.\n\n"
  lmf_interaction.1325.desc.start:0 "Quando giunge il mattino, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] si presenta nella sala del trono, agghindat[Select_CString(secondary_recipient.IsFemale,'a','o')] e pront[Select_CString(secondary_recipient.IsFemale,'a','o')] a trascorrere la giornata con [Select_CString( secondary_actor.IsLocalPlayer, 'me', secondary_actor.GetFirstNameNoTooltip )].\n\n[secondary_recipient.Custom('polite_gender_ref')|U] appare nervos[Select_CString(secondary_recipient.IsFemale,'a','o')], ed è comprensibile: gli occhi dell’intera corte sono su [Select_CString(secondary_recipient.IsFemale,'di lei','di lui')]. Se nutre riserve, almeno ha la grazia di non lasciar trasparire nulla.\n\n"
  lmf_interaction.1325.desc.actor:0 "Quanto a me, dubito che la mia espressione sia altrettanto controllata. Eppure non posso dire d’essere più cert[Select_CString(ROOT.Char.IsFemale,'a','o')] di come andrà la giornata di quanto lo sia [Select_CString(secondary_recipient.IsFemale,'lei','lui')].\n\n"
  lmf_interaction.1325.desc.secact.disapprove:0 "Quanto a [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))], [Select_CString(secondary_actor.IsFemale,'lei','lui')] è assai meno guardingo riguardo alla [Select_CString(secondary_actor.IsFemale,'sua','sua')] opinione. Ha fissato con aria torva [Select_CString( secondary_recipient.IsLocalPlayer, 'me', secondary_recipient.GetFirstNameNoTooltip )] dal momento in cui [Select_CString( secondary_recipient.IsLocalPlayer, 'io', [Select_CString( secondary_recipient.IsFemale,'lei','lui') ] )] è compars[Select_CString(secondary_recipient.IsFemale,'a','o')], e non ha smesso un istante.\n\n"
  lmf_interaction.1325.desc.secact:0 "Quanto a [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))], [Select_CString(secondary_actor.IsFemale,'lei','lui')] è assai meno guardingo riguardo alla [Select_CString(secondary_actor.IsFemale,'sua','sua')] opinione. Sorride raggiante a [Select_CString( secondary_recipient.IsLocalPlayer, 'me', secondary_recipient.GetFirstNameNoTooltip )] dal momento in cui [Select_CString( secondary_recipient.IsLocalPlayer, 'io', [Select_CString( secondary_recipient.IsFemale,'lei','lui') ] )] è compars[Select_CString(secondary_recipient.IsFemale,'a','o')], chiaramente impaziente di dare inizio alla giornata.\n\n"
  lmf_interaction.1325.desc.end:0 "Mentre la corte osserva, [Select_CString( secondary_actor.IsLocalPlayer, 'io', secondary_actor.GetFirstNameNoTooltip )] [Select_CString( secondary_actor.IsLocalPlayer, 'mi faccio avanti e prendo', 'si fa avanti e prende' )] [Select_CString( secondary_recipient.IsLocalPlayer, 'me', [Select_CString( secondary_recipient.IsFemale,'lei','lui') ] )] e lo conduco fuori dalla sala. [Select_CString( secondary_actor.IsLocalPlayer, 'Il mio', [Select_CString( secondary_actor.IsFemale,'Il suo','Il suo') ] )] [secondary_actor.Custom('lmf_intro_planned_activity')][Select_CString( secondary_actor.IsLocalPlayer, '.', ', a quanto pare.' )]\n\nLa presentazione sta per cominciare."
  lmf_interaction.1325.a:0 "Vediamo come andrà."
  lmf_interaction.1325.a.tt:0 "[secondary_actor.GetShortUIName|U] e [secondary_recipient.GetShortUIName] trascorreranno la giornata conoscendosi meglio"
  lmf_interaction.1325.a.secrec.charmed:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] resta incantat[Select_CString(secondary_recipient.IsFemale,'a','o')] da [secondary_actor.GetFirstNameNoTooltip]"
  lmf_interaction.1325.a.secrec.notcharmed:0 "[secondary_actor.GetFirstNameNoTooltip] non fa una buona impressione"
  lmf_interaction.1325.a.secact.charmed:0 "[secondary_actor.GetFirstNameNoTooltip] resta incantat[Select_CString(secondary_actor.IsFemale,'a','o')] da [secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip]"
  lmf_interaction.1325.a.secact.notcharmed:0 "[secondary_recipient.Custom('IT_NAM_COL3')][secondary_recipient.GetTitledFirstNameNoTooltip] non fa una buona impressione"

