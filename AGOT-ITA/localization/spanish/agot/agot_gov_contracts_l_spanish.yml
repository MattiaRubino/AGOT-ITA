special_contract_landed_knight_desc: 0 "#flavor In base a un $special_contract_landed_knight$, al [vassal|E] in questione viene concessa l'amministrazione di un piccolo possedimento e delle terre circostanti, spesso come ricompensa per un servizio esemplare o leale. In quanto [agot_landed_knight|E], il [vassal|E] gode di [tax|E] inferiori del #high [EmptyScope.ScriptValue('landed_knight_contract_tax_tooltip')|0]%#! e di una maggiore [knight_effectiveness|E], tuttavia non possiede il diritto di fossa e forca, contribuisce con il #high [EmptyScope.ScriptValue('landed_knight_contract_levies_tooltip')|0]%#! in più di [levies|E], e subisce una penalità alla propria capacità di [intrigue|E] a causa di un controllo legale più severo.#!"
