 special_contract_council_desc:1 "#flavor While subject to a $special_contract_council$, the [vassal|E] enjoys many privileges within the realm, which increases their standing and gives them more political clout. $special_contract_council_short$ [vassals|E] increase their [liege|E]'s [prestige|E] but provide #high [EmptyScope.ScriptValue('palatinate_contract_taxes_tooltip')|0]%#! no [tax|E] and [levies|E] rather sending their [obligations|E] to their previous liege.#!"

special_contract_landed_knight: 0 "Contratto di Piccola Nobiltà Terriera"
