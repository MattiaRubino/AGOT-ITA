  agot_nicknames.9000.t:0 "Soprannome Dinastico"
agot_nicknames.9000_desc: 0 "Le grandi casate si vantano dei loro lupi, dei loro leoni, dei loro kraken e dei loro ponti, ciascuna convinta che il proprio stemma la renda impareggiabile. Eppure i loro simboli non sono che vanto e bluster.\n\nLa nostra casata sarà diversa. Il nostro vessillo ispirerà timore nei nostri nemici e meraviglia nei nostri alleati. Da questo giorno in poi, Casa [ROOT.Char.GetHouse.GetName] sarà ricordata per la sua associazione con...\n\n #help Il termine selezionato verrà usato in diversi modelli per fornire soprannomi dinastici alla tua casata.\n\ne.g. 'Il Nero X' 'Il Rosso X'\n\nPer i risultati migliori seleziona un sostantivo!#!"
  Dynasty_Nickname_Text:0 "[GetGlobalVariable('maester').Char.GetLocalizedText('dynastic_nickname')]"
  agot_nicknames.9000.a:0 "Che conoscano il nostro nome!"

