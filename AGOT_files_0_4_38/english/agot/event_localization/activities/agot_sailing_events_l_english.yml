l_english:

 # Sailing Activity Events
 agot_sailing.0800.t:0 "Arriving at Port"
 agot_sailing.0800.desc:0 "I stride across the walkways at the haven of [location.GetName], the fresh ocean air all around me. While the ship that will be used for my voyage is being prepared by the crew, my companions and I still have some time to spend at the harbor.\n\nI hear the cries of gulls above us and see the waves crashing against the quays below. The sea lies before me, and with it, the endless potential it offers. Soon we will be out there, on the open waters."
 agot_sailing.0800.a:0 "The sea calls."
 agot_sailing.0800.b:0 "We don't have enough people to man the ship."
 nice_try_tt:0 "No treasure map you have leads to where you sailed"

 agot_sailing.1005.t:0 "Dockyard Temptation"
 agot_sailing.1005.desc:0 "As I walk around the docks before setting off on my voyage, an attractive [hooker.GetWomanMan] approaches me with a glimmer in [hooker.GetHerHis] eye.\n\n"Care for a little fun before you set off, sailor?" [hooker.GetFirstName] asks sultrily.\n\nI still have plenty of things to do to prepare for the journey ahead, but there is still some time..."
 agot_sailing.1005.a:0 "How about a #EMP lot#! of fun, [hooker.GetFirstNameNoTooltip]? I'll see you again soon!"
 agot_sailing.1005.b:0 "Nothing wrong with a harmless bit of fun, right?"
 agot_sailing.1005.c:0 "Away with you, foul [hooker.GetWomanMan]!"
 sailing_gained_concubine_log:0 "Gained [hooker.GetFirstName] as a [concubine|E]"
 sailing_had_sexual_encounter:0 "Had a "romantic" encounter with [hooker.GetFirstName]"

 agot_sailing.1006.t:0 "A Knife in the Bedroom"
 agot_sailing.1006.desc:0 "As I lie back in bed, invigorated and satisfied, I smile widely as I see [hooker.GetFirstName] climb on top of me and loosen [hooker.GetHerHis] robe.\n\nHowever, any hopes of a second round quickly turn to dust as [hooker.GetHerHis] face fills with intensity, and [hooker.GetSheHe] raises a dagger high above [hooker.GetHerHis] head, laughing as [hooker.GetSheHe] brings the blade down.\n\n"A gift from the Faceless Men, foolish [ROOT.Char.GetTitleAsNameNoTooltip]!""
 agot_sailing.1006.a:0 "[hooker.GetFirstNameNoTooltip]! Wait... no!"
 agot_sailing.1006.a.desc:0 "You do everything you can to divert the blade:"
 agot_sailing.1006.duel_success:0 "Against all odds, you snatch the dagger away and place [hooker.GetHerHim] under arrest"
 agot_sailing.1006.duel_failure:0 "You feel the dagger dig deep into your chest as your vision slowly fades to black"

 agot_sailing.1007.t:0 "Whittle While You Wait"
 agot_sailing.1007.desc:0 "As I wander around the docks waiting for supplies to be loaded onto the boat, my ennui is interrupted by the sound of scraping wood. Following the sound, I find my crewmate [whittler.GetFirstName] carving a small, intricate figurine from a piece of timber.\n\nLooking up from [whittler.GetHerHis] work, [whittler.GetFirstNameNoTooltip] smiles and calls me over. "Hello, [whittler.Custom2('spoken_address_by_familiarity', ROOT.Char)]. Care to join me in a spot of whittling?"\n\nIt looks like it requires nimble work with the knife, but I'm sure I could make something if I tried..."
 agot_sailing.1007.a:0 "I'll make a little something for my child."
 agot_sailing.1007.b:0 "I'll make a sweet memento for my love."
 agot_sailing.1007.c:0 "I'll make a flute to set my lyrics to music."
 agot_sailing.1007.d:0 "I'll make something simple, just to pass the time away."
 agot_sailing.1007.e:0 "I'd rather not waste my time with idle work."

 agot_sailing.1008.t:0 "Bar Brawl"
 agot_sailing.1008.desc:0 "It is the night before our voyage, and I've been enjoying myself at a local tavern, drinking and eating with my crew. Spirits are high, and there's been much laughter as everyone tries to one-up the others' seafaring stories.\n\nSuddenly, over the hum of the drunken patrons, I hear raised voices at the bar, flaring into argument. Straining my eyes, I soon see that one of them is my crewmate [brawler.GetFirstName].\n\nThe disagreement quickly escalates to a full-on shouting match, spit flying. Before long, fists are raised, and [brawler.GetFirstNameNoTooltip] calls out for help against the group of burly ruffians."
 agot_sailing.1008.a:0 "Surely there's a better way to resolve this?"
 agot_sailing.1008.a.success:0 "You quickly defuse the situation, calming the ruffians down"
 agot_sailing.1008.a.failure:0 "Your efforts fall on deaf ears, and you're both given a beating for your audacity"
 agot_sailing.1008.b:0 "I'm coming, [brawler.GetFirstNameNoTooltip]!"
 agot_sailing.1008.b.success:0 "You and [brawler.GetFirstNameNoTooltip] make short work of the ruffians"
 agot_sailing.1008.b.failure:0 "You and [brawler.GetFirstNameNoTooltip] are given a solid beating by the ruffians"
 agot_sailing.1008.c:0 "You're on your own, [brawler.GetFirstNameNoTooltip]..."

 agot_sailing.1009.t:0 "Drinking Contest"
 agot_sailing.1009.desc:0 "The hour has grown very late indeed, and having had more than a few drinks, my crew is up to their usual antics, sharing tales and boasts about their prowess and past conquests.\n\nSlightly unsteady, my crewmate [challenger.GetFirstName] rises to [challenger.GetHerHis] feet, cup in hand, before slamming it down against the wooden table.\n\n"I've never met a brew I couldn't best! [challenger.Custom2('spoken_address_by_familiarity', ROOT.Char)|U], fill your cup... the last one standing wins five-and-twenty gold pieces!""
 agot_sailing.1009.a:0 "You think you can outlast me? You #EMP must#! be drunk..."
 agot_sailing.1009.a.success:0 "After many rounds of drinks, you finally hear [challenger.GetFirstNameNoTooltip] hit the floor."
 agot_sailing.1009.a.failure:0 "The drink quickly goes to your head, and you pass out."
 agot_sailing.1009.b:0 "I could never hope to outdrink you, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('challenger'))]!"

 agot_sailing.1010.t:0 "Fortune Teller"
 agot_sailing.1010.desc:0 "As I walk along the waterfront, watching the masts of the ships bob up and down with the rolling of the waves, I hear the voice of an old crone by a small wagon at the side of the road, beckoning me closer.\n\nAs I approach, she collects an assortment of rune-carved stones from the small ornate table in front of her into a velvet bag, shaking it before drawing five and laying them in a neat line.\n\n"Good day, sailor. These mystic stones were imbued with magical power by the Hadal Ones and have the power to deliver an omen for your journey ahead, if you will only cross my palm with silver...""
 agot_sailing.1010.a:0 "Let me hear what these stones have to say..."
 agot_sailing.1010.a.success.t:0 "The omens are good!"
 agot_sailing.1010.a.success:0 "The stones portend good tidings for your journey and the coming years"
 agot_sailing.1010.a.failure.t:0 "The omens are ill!"
 agot_sailing.1010.a.failure:0 "The stones portend ill tidings for your journey and the coming years"
 agot_sailing.1010.b:0 "I won't waste money on a charlatan with a handful of rocks!"

 agot_sailing.1011.t:0 "A Dockyard Delicacy"
 agot_sailing.1011.desc:0 "It is the morning of my voyage, and I am walking along the docks towards my vessel with my crewmate [fellow_diner.GetFirstName].\n\nWe are chatting about our upcoming adventure when I see [fellow_diner.GetHerHis] nostrils flare and a wide smile spread across [fellow_diner.GetHerHis] face. Pulling me by the arm, [fellow_diner.GetSheHe] follows the smell to a ramshackle food stall nestled between two warehouses. "I can't believe this place still exists! They make the most amazing soup that you just have to try. It'll set you up perfectly for our trip!"\n\nI watch as [fellow_diner.GetSheHe] eagerly grabs a bowl and starts to eat, but I can't help but hesitate. The kitchen is filthy and rank with an overwhelming smell of seasoning and spice. Still, [fellow_diner.GetFirstNameNoTooltip] seems to like it... Maybe this is the authentic street food experience!"
 agot_sailing.1011.a:0 "I guess I'll try... I only live once!"
 agot_sailing.1011.a.success.t:0 "The meal was delicious!"
 agot_sailing.1011.a.success:0 "The meal was delicious, leaving you feeling full and ready for the journey"
 agot_sailing.1011.a.too_spicy.t:0 "The meal was far too spicy!"
 agot_sailing.1011.a.too_spicy:0 "The spice in the meal was unpleasantly strong, leaving you in a hot sweat"
 agot_sailing.1011.a.failure.t:0 "I don't feel so good..."
 agot_sailing.1011.a.failure:0 "The poorly prepared meal leaves you feeling rotten and sick ahead of the morning's sail"
 agot_sailing.1011.b:0 "Are you mad? Look how filthy those dishes are!"

 agot_sailing.1012.t:0 "An Aerial Attack!"
 agot_sailing.1012.desc:0 "As I'm walking down the pier, mentally tallying our supplies for the journey ahead, I suddenly feel a sharp impact on my head. Lifting my hand to my head, I gingerly press my now gooey temple, before spinning around to find who would be brave enough to attack me like this!\n\nBeside me, my crewmate [laugher.GetFirstName] bursts out laughing, before proceeding to point towards the end of the pier.\n\n"I think you'll find your attacker over there, my [ROOT.Char.GetTitleAsNameNoTooltip]!"\n\nLooking at the end of the pier, I finally understand — a solitary seagull is resting there, staring at me intently. Lowering my hand, I can now make out the fact that I have been pooped upon."
 agot_sailing.1012.a:0 "The deadliest warrior I've ever faced!"
 agot_sailing.1012.b:0 "You DARE to laugh at me? I'll have your hide!"

 agot_sailing.1013.t:0 "An Experienced Sailor"
 agot_sailing.1013.desc:0 "After reviewing my crew lists, I am alarmed to discover we are a few men short of what we would usually have aboard. While not particularly harmful to the expedition, I would prefer to have a fully manned ship.\n\nAfter searching the usual haunts of the port, I hear about [recruit.GetFirstName], a well-traveled sailor who has seen many voyages. I finally track [recruit.GetHerHim] down, but to my dismay, [recruit.GetSheHe] has already signed on with another crew!\n\nTurning as I approach, [recruit.GetFirstNameNoTooltip] raises an eyebrow.\n\n"Is there something I can help you with?""
 agot_sailing.1013.a:0 "I have quite an opportunity to offer you..."
 agot_sailing.1013.a.success:0 "You successfully convince the sailor to join your crew"
 agot_sailing.1013.a.failure:0 "You fail to convince the sailor"
 agot_sailing.1013.b:0 "Tell me, what is your usual fare? I'll double it!"
 agot_sailing.1013.c:0 "We have enough sailors. We'll be fine."

 agot_sailing.1014.t:0 "A Day at the Market"
 agot_sailing.1014.desc:0 "As the ship is being loaded with supplies, I take the time to wander the local markets.\n\nMany merchants shout out, attempting to advertise their wares to me. There are truly exotic things here — foods I have never tasted and books in tongues I cannot comprehend. There is also a solid selection of alcohol. I know the crew would most definitely appreciate it if I came back with that!\n\nDoes anything here strike my fancy?"
 agot_sailing.1014.a:0 "That book looks interesting!"
 agot_sailing.1014.a.tt:0 "Chance to increase your [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )] trait progress."
 agot_sailing.1014.a.success.toast:0 "You gained bonus experience as a [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]"
 agot_sailing.1014.a.failure.toast:0 "You did not gain experience as a [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )]"
 agot_sailing.1014.b:0 "Pass the booze and praise [ROOT.Char.GetFaith.HighGodName]!"
 agot_sailing.1014.c:0 "Oranges? A curious fruit indeed!"
 agot_sailing.1014.d:0 "A treasure map? What could I potentially find out there?"
 agot_sailing.1014.d.tt.success.toast:0 "You received a real treasure map"
 agot_sailing.1014.d.tt.failure.toast:0 "You received a fake treasure map"
 agot_sailing.1014.e:0 "I'm quite fine, thank you."

 agot_sailing.1015.t:0 "The Old Beggar"
 agot_sailing.1015.desc:0 "While going for a short stroll through the harbor of [location.GetName], [dockyard_guest.GetFirstName] and I are approached by an old beggar. "Setting out for the great ocean, my [ROOT.Char.GetTitleAsNameNoTooltip]?" the old man says in a hoarse tone. "Back in my day, I spent more time aboard than on land... for some spare coin, I could teach you a thing or two about being a sailor..."\n\n[ROOT.Char.Custom2('direct_address_by_familiarity', dockyard_guest)|U] steps in between us. "Panhandling is against the law, and this old perch knows it. Send him away, my [ROOT.Char.GetTitleAsNameNoTooltip]!""
 agot_sailing.1015.a:0 "Well, let's hear whether your secrets are worth the price."
 agot_sailing.1015.b:0 "[dockyard_guest.GetFirstNameNoTooltip] is right. Pack your things and leave."
 agot_sailing.1015.c:0 "He has nothing to teach me. We'll be on our way."

 agot_sailing.1016.t:0 "On a Boat?"
 agot_sailing.1016.desc:0 ""I have frequently #italic not#! been on boats!"\n\nThe argument between two dockworkers has drawn many eyes; the harbor of [location.GetName] has hushed at the spectacle.\n\n"No, what you've been on is not on boats. You can't #bold not #italic be#!#! on a boat!" The disagreement leaves my mouth agape, as I find my mind wrangling with the complexity of life itself. Who are these foolish dockhands, and what exactly are they arguing about?"
 agot_sailing.1016.a:0 "'Tis a silly thing."
 agot_sailing.1016.b:0 "No, no, he's got a point!"
 agot_sailing.1016.b.tt:0 "Could death possibly be a boat?"

 agot_sailing.1990.t:0 "A First Mate"
 agot_sailing.1990.desc:0 "Before setting sail, I must choose my first mate — the one who will stand beside me on the open sea and share in the burden of command.\n\nAmong those gathered here today are family, friends, and seasoned sailors alike. Some possess clear nautical skill, while others are here out of loyalty, favor, or ambition. Each could serve in their own way once we are beyond the safety of port."
 agot_sailing.1990.a:0 "They will be my first mate!"

 agot_sailing.1991.t:0 "Into the Great Ocean"
 agot_sailing.1991.desc:0 "As the ship lurches out of port, I spot [host.GetTitledFirstNameNicknamed] and [host.GetHerHis] first mate, [first_mate.GetFirstName] — their gazes locked on the horizon as our adventure begins."
 agot_sailing.1991.a:0 "I can't wait to see what we hunt!"
 agot_sailing.1991.b:0 "It will be a good raid!"
 agot_sailing.1991.c:0 "The mysteries of old Valyria await us..."
 agot_sailing.1991.d:0 "Sunken treasures shall be ours!"

 agot_sailing.2001.t:0 "An Invitation to Play Dice"
 agot_sailing.2001.desc:0 "As I walk across the main deck of the ship, I hear the sounds of a crowd coming from below deck. All deckhands not on duty are gathered around a table, and a lively game of dice is taking place amid vapors of smoke and alcohol.\n\n"Come over, captain," [first_mate.GetFirstName] calls, "We'll show you how it's done!"\n\nA shout rises from the crowd: "Don't take all [ROOT.Char.GetHerHis] gold, some of it's my pay!" followed by a roar of laughter."
 agot_sailing.2001.a:0 "Sure! I'll play some dice!"
 agot_sailing.2001.b:0 "You won't catch me gambling!"
 agot_sailing.2001.c:0 "A chance to learn my crew."

 agot_sailing.2002.t:0 "A Ship in Trouble"
 agot_sailing.2002.desc:0 "While traveling along the shore not far from port, one of my crew on lookout cries out, saying he has spotted a local vessel floundering in the distance.\n\nEven from here, it's clear that the ship has taken damage from the rugged seas or raiders, its crew just barely keeping it afloat as they rush about on deck trying to make repairs. Clearly, they are in a vulnerable position and in need of aid."
 agot_sailing.2002.a:0 "Stop and try to help them!"
 agot_sailing.2002.a.tt_success:0 "You save the crew"
 agot_sailing.2002.a.tt_failure:0 "The ship sinks with its crew and contents"
 agot_sailing.2002.b:0 "We can keep the loot if we kill the survivors..."
 agot_sailing.2002.b.tt_success:0 "You storm the boat and slay its crew"
 agot_sailing.2002.b.tt_failure:0 "You storm the boat, but get wounded in the chaos"
 agot_sailing.2002.c:0 "Let's just sail on by."

 agot_sailing.2003.t:0 "Leviathan"
 agot_sailing.2003.desc:0 "I breathe in deeply as I walk the length of the deck, the bracing sea wind and salty air in my face. Today is a fine day to sail!\n\nThe short voyage has been an exhilarating change of pace from life at court, when we spot it: a distant plume of water, followed by a small island of wine-dark flesh rolling out of the waves.\n\nOne of the greatest beasts of all the deeps.\n\nA whale!"
 agot_sailing.2003.a:0 "Get the harpoons!"
 agot_sailing.2003.a.tt_success:0 "You slaughter the whale and haul it to shore"
 agot_sailing.2003.a.tt_failure:0 "The beast escapes you"
 agot_sailing.2003.b:0 "Let the others handle it, just bring me the carcass."
 agot_sailing.2003.c:0 "What a #EMP grand#! quarry!"
 agot_sailing.2003.c.tt:0 "You face a #EMP true#! leviathan of the deeps"
 agot_sailing.2003.c.tt_success:0 "$agot_sailing.2003.a.tt_success$"
 agot_sailing.2003.c.tt_failure:0 "$agot_sailing.2003.a.tt_failure$"
 agot_sailing.2003.d:0 "A creature of fearsome majesty, leave it."
 agot_sailing.2003.d.tt:0 "The whale goes free."

 agot_sailing.2004.t:0 "A Battle on the High Seas"
 agot_sailing.2004.desc:0 "As we sail upon the wide open ocean, the sea seems calm and clear. As I stand upon the deck, basking in the sun's glow, a shout shatters the quiet.\n\n"Captain!" my first mate shouts, "Unknown ship approaching us at high speed!"\n\nQuickly rushing to the railing of my vessel, I scan the horizon before finally picking out the dark form swiftly approaching. It is apparent what it is — a pirate ship. They will soon be upon us. Should we fight, or flee?"
 agot_sailing.2004.a:0 "Let them come!"
 agot_sailing.2004.a.success:0 "You fight off the pirates"
 agot_sailing.2004.a.failure:0 "The pirates loot your valuables"
 agot_sailing.2004.b:0 "Hoist the sails!"

 agot_sailing.2005.t:0 "Sailor Overboard!"
 agot_sailing.2005.desc:0 "Now far out at sea, the rough waters rock us back and forth. It is difficult at times to keep your footing, but manageable.\n\nSuddenly, a panicked voice rises sharply, and whirling around, I spot one of my sailors go over the edge! Rushing to the side, I see their head break the surface, tossed about by the waves.\n\nI must act now, or they will assuredly perish in the tempestuous depths."
 agot_sailing.2005.a:0 "Hold on, I'm coming!"
 agot_sailing.2005.a.tt_success:0 "You save the crewmate"
 agot_sailing.2005.a.tt_failure:0 "You fail to save the crewmate"
 agot_sailing.2005.b:0 "You, get that line! You, prepare the small boat!"
 agot_sailing.2005.b.tt_success:0 "Your rescue attempt succeeds"
 agot_sailing.2005.b.tt_failure:0 "Your rescue attempt fails"
 agot_sailing.2005.c:0 "It's too late — batten down the hatches!"

 agot_sailing.2006.t:0 "A Game of Cards"
 agot_sailing.2006.desc:0 "As I withdraw to my cabin for the night, I hear the sounds of a crowd coming from below deck. All deckhands not on duty are gathered around a table, and a lively game of cards is taking place amid vapors of smoke and alcohol.\n\n"Come over, captain," [first_mate.GetFirstName] calls, "We'll show you how it's done!"\n\nA shout rises from the crowd: "Don't take all [ROOT.Char.GetHerHis] gold, some of it's my pay!" followed by a roar of laughter."
 agot_sailing.2006.a:0 "Make room, I'm in."
 agot_sailing.2006.a.tt_success:0 "You win the game"
 agot_sailing.2006.a.tt_failure:0 "You lose your gold"
 agot_sailing.2006.b:0 "Now, where are my trusty extra aces?"
 agot_sailing.2006.b.tt_success:0 "Your ruse goes unnoticed"
 agot_sailing.2006.b.tt_failure:0 "You get caught"
 agot_sailing.2006.c:0 "Keep playing, lads. I'll just have a drink."

 agot_sailing.2007.t:0 "Insufferable Discord"
 agot_sailing.2007.desc:0 "So far, the journey has proceeded smoothly, but I have begun to notice grumbling from the crew. Soon, an overworked crewmate approaches me. He is glossy of beard but has the worn hands of a sailor who has seen too many quays. His voice is gruff, but his exasperation is clear.\n\n"This is a fine crew, aye, and hardworking. They just crave to venture deeper into Essos rather than our current charting. Their wish to venture further has got some of the lads a bit energized."\n\nI know that he speaks truly, but the crew has no excuse. Upon boarding, they were shown the scrolls containing the ship's itinerary, and they should know that we will not visit faraway Essos until we have gained more experience. If something isn't done, I fear the crew may mutiny!"
 agot_sailing.2007.a:0 "Instruct the crew to push forward."
 agot_sailing.2007.a.tt_success:0 "The crew rises above their desires"
 agot_sailing.2007.a.tt_failure:0 "More of Essos when?"

 agot_sailing.2008.t:0 "Becalmed Seas"
 agot_sailing.2008.desc:0 "It has been days now since we felt the slightest breath of air to fill our sails. I can see the crew is getting restless, but I don't know what to do about it. [first_mate.GetFirstName] asks to see me in my cabin, with a grave look on [first_mate.GetHerHis] face.\n\n"Captain, the men are worried. They say our actions have angered [ROOT.Char.GetFaith.WaterGodName]. We need to make an offering to appease [ROOT.Char.GetFaith.WaterGodHerHim]."\n\nThis all sounds like nonsense to me, but making a gesture would increase morale."
 agot_sailing.2008.a:0 "All right, let us give [ROOT.Char.GetFaith.WaterGodHerHim] gold and prayers..."
 agot_sailing.2008.b:0 "I will hear no more on the subject, we will wait for the winds!"
 agot_sailing.2008.c:0 "Explain to the crew that the winds are not ruled by [ROOT.Char.GetFaith.WaterGodName]."

 agot_sailing.2009.t:0 "The Stars Shine the Same"
 agot_sailing.2009.desc:0 "It is night when I emerge from my cabin. The deck is unusually quiet. I can see one of my crew sitting quietly, [stargazer.GetHerHis] eyes turned up to the stars.\n\n"A quiet night, isn't it?"\n\n[stargazer.GetSheHe|U] turns to me, startled. "Captain! Apologies, I wasn't paying attention... before I came out here, I'd never truly taken the time to appreciate the stars, you know?"\n\nI nod in agreement, gazing up at the pinpricks of light far above. "Let me tell you something about the stars...""
 agot_sailing.2009.a:0 "You can use them to navigate!"
 agot_sailing.2009.a.mariner_progress:0 "You gain [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )] lifestyle experience."
 agot_sailing.2009.a.success.toast:0 "You Share Sailing Insights"
 agot_sailing.2009.b:0 "They were made by [ROOT.Char.GetFaith.NightGodName]. You see that clump of stars? That's..."
 agot_sailing.2009.c:0 "One day, we shall sail among them as we do the seas."

 agot_sailing.2010.t:0 "Sailing Accident!"
 agot_sailing.2010.desc:0 "It's been nothing but clear skies and a steady wind for a week now, the sailing is easy and the morale on board is high.\n\nWhen the sudden gust of wind comes, it takes everyone by surprise. I hear a cry of distress behind me and turn to find [sailor.GetFirstNameNoTooltip] sprawled on the deck, [sailor.GetHerHis] leg at a nasty angle.\n\n[first_mate.GetFirstName] is at my side, anxious, awaiting my instructions."
 agot_sailing.2010.a:0 "Get me some sailcloth and wooden poles, quick!"
 agot_sailing.2010.a.success:0 "You make a decent job of it"
 agot_sailing.2010.a.failure:0 "You make it worse"
 agot_sailing.2010.b:0 "Leave [sailor.GetHerHim], [sailor.GetSheHe] will be less clumsy next time."
 agot_sailing.2010.c:0 "Take over [first_mate.GetFirstNameNoTooltip], I can't deal with this!"

 agot_sailing.2011.t:0 "A Sudden Fog"
 agot_sailing.2011.desc:0 "A short while after setting out from port, our vessel becomes enveloped in a shroud of swiftly rising fog that seems to come out of nowhere. The sky is obscured, as is the ocean all around us, and it quickly becomes clear that a decision must be made.\n\nDo we keep our heading in hopes of the fog clearing soon, or do we turn the ship around, risking delays but avoiding getting lost in the fog entirely?"
 agot_sailing.2011.a:0 "Maintain course! This mist will clear soon..."
 agot_sailing.2011.a.success:0 "You escape the dense fog"
 agot_sailing.2011.a.failure:0 "Your vessel gets lost in the fog"
 agot_sailing.2011.b:0 "We had better turn the ship around and accept the delay"
 agot_sailing.2011.c:0 "No true sailor fears fog — full sails ahead!"

 # Ship in Danger Outcomes
 agot_sailing.2020.t:0 "$agot_sailing.2002.t$: Save the Crew"
 agot_sailing.2020.desc:0 "In the distance, another ship has been spotted! It appears to be on the verge of sinking, and after a brief discussion, [host.GetTitledFirstNameNicknamed] decides to try to rescue the foundering ship's crew.\n\n"
 agot_sailing.2020.desc.jerk:0 "I watch with disdain as our sailors bring the ship close enough to the wreckage to throw ropes into the bubbling water, managing to pull all of the doomed vessel's crew one by one.\n\nWhat a waste of our precious time and effort..."
 agot_sailing.2020.desc.normal:0 "I watch with satisfaction and amazement as our sailors bring the ship close enough to the wreckage to throw ropes into the bubbling water, managing to pull all of the doomed vessel's crew one by one.\n\nThey thank our mariners for saving them, offering to leave the ship at the next port."
 agot_sailing.2020.a:0 "A job well done!"
 agot_sailing.2020.b:0 "What was [host.GetFirstNameNoTooltip] thinking..."
 agot_sailing.2020.c:0 "It's so fascinating to see how a ship can sink so quickly..."

 agot_sailing.2021.t:0 "$agot_sailing.2002.t$: Lost to the Sea"
 agot_sailing.2021.desc:0 "In the distance, another ship has been spotted! It appears to be on the verge of sinking, and after a brief discussion, [host.GetTitledFirstNameNicknamed] decides to try to rescue the foundering ship's crew.\n\nAs we approach the wreckage, there is a loud crash. The broken vessel's main mast plummets onto what remains of the deck, and to our shock, the entire ship is torn apart and swallowed up by hungry waves.\n\nOnly a scarce few of the crew can be rescued, the rest of the sailors following their ship into a watery grave!"
 agot_sailing.2021.a:0 "Gods be good! What a disaster!"
 agot_sailing.2021.b:0 "The sea is a cruel mistress..."

 agot_sailing.2022.t:0 "$agot_sailing.2002.t$: Storming the Ship"
 agot_sailing.2022.desc:0 "In the distance, another ship has been spotted! It appears to be on the verge of sinking, and after a brief discussion, [host.GetTitledFirstNameNicknamed] decides to loot the wreckage, slaying any survivors.\n\nI watch as our sailors make quick work of the exhausted crew, picking the wreckage apart for any spoils they might find. As they return, I see the smiles of successful men on their faces."
 agot_sailing.2022.a:0 "Ill-gotten gains..."
 agot_sailing.2022.b:0 "One man's loss is another's treasure!"

 agot_sailing.2023.t:0 "$agot_sailing.2002.t$: Slipping Away"
 agot_sailing.2023.desc:0 "In the distance, another ship has been spotted! It appears to be on the verge of sinking, and after a brief discussion, I watch the sailors bring the ship up close. On [host.GetTitledFirstNameNicknamedPossessive] orders they boarded them, a fight ensuing. I witness [host.GetTitledFirstNameNicknamed] get wounded in the process before [host.GetSheHe] and the sailors returned with as much as they could carry...."
 agot_sailing.2023.a:0 "Perhaps it was better this way."

 agot_sailing.2024.t:0 "$agot_sailing.2002.t$: Passersby"
 agot_sailing.2024.desc:0 "In the distance, another ship has been spotted! It appears to be on the verge of sinking, but after a brief discussion, [host.GetTitledFirstNameNicknamed] decides to avoid the wreckage.\n\nI watch as our ship passes by the foundering vessel, its crew crying out as they follow their ship into a watery grave."
 agot_sailing.2024.a:0 "I hope our ship proves more sturdy than theirs."
 agot_sailing.2024.b:0 "The sea is a cruel mistress..."
 agot_sailing.2024.c:0 "We could have claimed their spoils..."
 agot_sailing.2024.d:0 "[host.GetFirstNameNoTooltip] was right to pass by."

 # The Leviathan Outcomes
 agot_sailing.2025.t:0 "$agot_sailing.2003.t$: Butcher the Beast"
 agot_sailing.2025.desc:0 "As I take a relaxing stroll across the ship's main deck, I hear the sailors shout in excitement. A whale has been spotted!\n\n[host.GetTitledFirstNameNicknamed] gives the order to try to hunt the massive beast. Crewmen ready the harpoons, until one projectile pierces the whale's back. The rushing waters turn red for a moment, and the creature goes limp after a brief struggle.\n\nI watch as the men attach more ropes to the carcass so it can be hauled to a nearby shore for harvesting."
 agot_sailing.2025.a:0 "Even beasts as mighty as this can be slain."
 agot_sailing.2025.b:0 "Majestic deaths are ill omens."

 agot_sailing.2026.t:0 "$agot_sailing.2003.t$: The Beast Escapes"
 agot_sailing.2026.desc:0 "As I take a relaxing stroll across the ship's main deck, I hear the sailors shout in excitement. A whale has been spotted!\n\n[host.GetTitledFirstNameNicknamed] gives the order to try to hunt the massive beast. Crewmen ready the harpoons, but none are able to find their target. Soon enough, the whale dives and disappears from view."
 agot_sailing.2026.a:0 "A disappointing conclusion!"
 agot_sailing.2026.b:0 "Perhaps it is for the best..."

 agot_sailing.2027.t:0 "$agot_sailing.2003.t$: Find the Carcass"
 agot_sailing.2027.desc:0 "As I take a relaxing stroll across the ship's main deck, I hear the sailors shout in excitement. A whale has been spotted!\n\n[host.GetTitledFirstNameNicknamed] gives the order to try and hunt the massive beast. Crewmen ready the harpoons and fire them, until one projectile strikes true. The sea turns red for a moment, but the whale manages to break the harpoon, escaping its pursuers.\n\nAfter a long search, the crew is able to locate the carcass beached on a nearby shore and begins harvesting it."
 agot_sailing.2027.a:0 "It could not escape us forever."

 agot_sailing.2028.t:0 "$agot_sailing.2003.t$: A Grand Quarry"
 agot_sailing.2028.desc:0 "As I take a relaxing stroll across the ship's main deck, I hear the sailors shout in excitement. A magnificent white whale has been spotted!\n\n[host.GetTitledFirstNameNicknamed] is an experienced hunter, and [host.GetSheHe] will no doubt rise to the occasion. The harpoons are readied; a spray of salty water rushes upward, revealing the beast's location. [host.GetFirstNameNoTooltip] takes aim, landing the barbed tip deep into the leviathan's flesh and fastening a rope tightly to its body. As our ship nears, [host.GetFirstNameNoTooltip] draws forth a lance and strikes the killing blow."
 agot_sailing.2028.a:0 "A marvel in white and red!"
 agot_sailing.2028.b:0 "Such majesty should have been left alone..."

 agot_sailing.2029.t:0 "$agot_sailing.2003.t$: A Fleeting Folly"
 agot_sailing.2029.desc:0 "As I take a relaxing stroll across the ship's main deck, I hear the sailors shout in excitement. A magnificent white whale has been spotted!\n\n[host.GetTitledFirstNameNicknamed] is an experienced hunter, and [host.GetSheHe] will no doubt rise to the occasion. The harpoons are readied; a spray of salty water rushes upward, revealing the beast's location. [host.GetFirstNameNoTooltip] takes aim, but the barbed tip misses its mark. The leviathan roars a deep, sad song as it disappears beneath the water forevermore."
 agot_sailing.2029.a:0 "Perhaps [host.GetFirstNameNoTooltip] is not as skilled as it seemed."

 agot_sailing.2030.t:0 "$agot_sailing.2003.t$: A Brush with a Beast"
 agot_sailing.2030.desc:0 "As I take a relaxing stroll across the ship's main deck, I hear the sailors shout in excitement. A whale has been spotted!\n\nThough a hunt could bring riches, [host.GetTitledFirstNameNicknamed] decides to leave the beast be. I watch with wonder as the majestic creature passes by the ship's side, blowing its breath and a spray of salty water into the air. At last, it dives beneath the calm waves, disappearing from view."
 agot_sailing.2030.a:0 "What a tranquil experience!"
 agot_sailing.2030.b:0 "[host.GetFirstNameNoTooltip] was a fool to let the beast escape..."

 # Pirates! Outcomes
 agot_sailing.2031.t:0 "$agot_sailing.2004.t$"
 agot_sailing.2031.desc:0 "I look out across the boundless horizon when suddenly, cries of alarm can be heard. In the distance, a ship has been spotted, heading straight for us. "Pirates!" the sailors cry, looking to [host.GetTitledFirstNameNicknamed] for guidance.\n\n"Worry not, men!" [host.GetSheHe] says with confidence. "They are no match for us!"\n\nIndeed, after a brief fight, the pirates are repelled and retreat, disappearing into the quiet ocean's vastness."
 agot_sailing.2031.a:0 "And don't you come back!"

 agot_sailing.2032.t:0 "$agot_sailing.2004.t$"
 agot_sailing.2032.desc:0 "I look out across the boundless horizon when suddenly, cries of alarm can be heard. In the distance, a ship has been spotted, heading straight for us. "Pirates!" the sailors cry, looking to [host.GetTitledFirstNameNicknamed] for guidance.\n\n"Get ready to fight!" [host.GetSheHe] commands, drawing steel. Soon, the pirates are upon us.\n\nBut after a brief fight, the pirates overcome our crew, looting our valuables before disappearing into the wide ocean's vastness."
 agot_sailing.2032.a:0 "A pox upon them!"

 agot_sailing.2033.t:0 "$agot_sailing.2004.t$"
 agot_sailing.2033.desc:0 "I look out across the boundless horizon when suddenly, cries of alarm can be heard. In the distance, a ship has been spotted, heading straight for us. "Pirates!" the sailors cry, looking to [host.GetTitledFirstNameNicknamed] for guidance.\n\n"Hoist all sails!" [host.GetSheHe] commands. "We can outrun them!" And indeed, our ship proves fast enough to keep the pirate vessel at a safe distance. Soon enough, the raiders give up and disappear into the horizon."
 agot_sailing.2033.a:0 "A toast on the ship!"

 # Crewmate Overboard! Outcomes
 agot_sailing.2034.t:0 "$agot_sailing.2005.t$"
 agot_sailing.2034.desc:0 "Lost in thought I stand near the ship's prow when a sudden shout gives me a start. "Man overboard! Man overboard!"\n\nI rush towards the source of the clamor to see [host.GetTitledFirstNameNicknamed] jump from the ship's deck, plunging beneath the waves. When [host.GetSheHe] finally reappears, [host.GetSheHe] is dragging the drowning sailor back towards the ship."
 agot_sailing.2034.a:0 "What a feat!"

 agot_sailing.2035.t:0 "$agot_sailing.2005.t$"
 agot_sailing.2035.desc:0 "Lost in thought I stand near the ship's prow when a sudden shout gives me a start. "Man overboard! Man overboard!"\n\nI rush towards the source of the clamor to see [host.GetTitledFirstNameNicknamed] jump from the ship's deck, plunging beneath the waves. When [host.GetSheHe] finally reappears, I realize [host.GetSheHe] has come up empty-handed..."
 agot_sailing.2035.a:0 "Another sailor lost..."

 agot_sailing.2036.t:0 "$agot_sailing.2005.t$"
 agot_sailing.2036.desc:0 "Lost in thought I stand near the ship's prow when a sudden shout gives me a start. "Man overboard! Man overboard!"\n\nI rush towards the source of the clamor to see [host.GetTitledFirstNameNicknamed] shouting orders from the ship's deck, organizing a hasty rescue. Soon after, [host.GetSheHe] pulls the drowning sailor back aboard, saving his life."
 agot_sailing.2036.a:0 "Impressive!"

 agot_sailing.2037.t:0 "$agot_sailing.2005.t$"
 agot_sailing.2037.desc:0 "Lost in thought I stand near the ship's prow when a sudden shout gives me a start. "Man overboard! Man overboard!"\n\nI rush towards the source of the clamor to see [host.GetTitledFirstNameNicknamed] shouting orders from the ship's deck, organizing a hasty rescue. But to the crew's dismay, the drowning sailor has already disappeared beneath the waves..."
 agot_sailing.2037.a:0 "An unfortunate loss..."

 agot_sailing.2038.t:0 "$agot_sailing.2005.t$"
 agot_sailing.2038.desc:0 "Lost in thought I stand near the ship's prow when a sudden shout gives me a start. "Man overboard! Man overboard!"\n\nI rush towards the source of the clamor to see [host.GetTitledFirstNameNicknamed] shouting orders from the ship's deck. "Leave him! We have no time for a risky rescue attempt.""
 agot_sailing.2038.a:0 "The sea can be cruel indeed..."

 # Insufferable Discord Outcomes
 agot_sailing.2040.t:0 "$agot_sailing.2007.t$: Whingers Begone"
 agot_sailing.2040.desc:0 "The voyage has been going well so far, but over time, I begin to notice grumbling from the crew. The sailors work hard, but some of them are causing dissension.\n\nI keep hearing the same complaint over and over again: "When will we explore Essos? We want to see more of Essos!"\n\n[host.GetTitledFirstNameNicknamed] soon grows tired of endlessly repeated questions and manages to convince the crew to focus on our planned destination."
 agot_sailing.2040.a:0 "That should silence them."

 agot_sailing.2041.t:0 "$agot_sailing.2007.t$: More of Essos When?"
 agot_sailing.2041.desc:0 "The voyage has been going well so far, but over time, I begin to notice grumbling from the crew. The sailors work hard, but some of them are causing dissension.\n\nI keep hearing the same complaint over and over again: "When will we explore Essos? We want to see more of Essos!"\n\n[host.GetTitledFirstNameNicknamed] is equally annoyed but instructs the crew to rise above the whinging and simply ignore the discord."
 agot_sailing.2041.a:0 "When will the questions end?"

 # Becalmed Mood Outcomes
 agot_sailing.2042.t:0 "$agot_sailing.2008.t$: An Offering"
 agot_sailing.2042.desc:0 "It has been days now since we felt the slightest breath of air to fill our sails. I can see the crew is getting restless, but I don't know what can be done about it.\n\n[host.GetTitledFirstNameNicknamed] can be seen talking to the ship's first mate, who attempts to convince the captain to make an offering to the gods to bless the ship with renewed winds. And indeed, [host.GetFirstNameNoTooltip] is quick to agree to the suggestion, and an offering is made."
 agot_sailing.2042.a:0 "I hope this helps..."

 agot_sailing.2043.t:0 "$agot_sailing.2008.t$: Waiting Game"
 agot_sailing.2043.desc:0 "It has been days now since we felt the slightest breath of air to fill our sails. I can see the crew is getting restless, but I don't know what can be done about it.\n\n[host.GetTitledFirstNameNicknamed] can be seen talking to the ship's first mate, who attempts to convince the captain to make an offering to the gods to bless the ship with renewed winds. But [host.GetFirstName] shakes [host.GetSheHe] head at the suggestion. "I'll hear no more of this nonsense! We will wait for the wind to find us.""
 agot_sailing.2043.a:0 "I hope we aren't stuck here..."

 agot_sailing.2044.t:0 "$agot_sailing.2008.t$: A Pious Lesson"
 agot_sailing.2044.desc:0 "It has been days now since we felt the slightest breath of air to fill our sails. I can see the crew is getting restless, but I don't know what can be done about it.\n\n[host.GetTitledFirstNameNicknamed] can be seen talking to the ship's first mate, who attempts to convince the captain to make an offering to the gods to bless the ship with renewed winds. But [host.GetFirstName] shakes [host.GetSheHe] head at the suggestion and attempts to explain to the crew that the winds are not ruled by any god of the sea."
 agot_sailing.2044.a:0 "Is that wise?"

 # Sailing Accident Outcomes
 # Available scopes: host, first_mate, sailor (who broke their leg)
 agot_sailing.2045.t:0 "$agot_sailing.2010.t$"
 agot_sailing.2045.desc:0 "It's been nothing but clear skies and a steady wind for days now, the sailing is easy and the crew's morale is high.\n\nWhen the sudden gust of wind finally comes, it takes everyone by surprise. I hear a cry of distress nearby and turn to find [sailor.GetFirstName] sprawled on the deck, [sailor.GetHerHis] leg at a nasty angle. [host.GetTitledFirstNameNicknamed] is kneeling beside the injured sailor, attempting to set the leg.\n\nWith an unappealing crack, the leg snaps back into a more natural position, easing the sailor's pain almost instantly."
 agot_sailing.2045.a:0 "Well done, captain!"

 agot_sailing.2046.t:0 "$agot_sailing.2010.t$"
 agot_sailing.2046.desc:0 "It's been nothing but clear skies and a steady wind for days now, the sailing is easy and the crew's morale is high.\n\nWhen the sudden gust of wind finally comes, it takes everyone by surprise. I hear a cry of distress nearby and turn to find [sailor.GetFirstName] sprawled on the deck, [sailor.GetHerHis] leg at a nasty angle. [host.GetTitledFirstNameNicknamed] is kneeling beside the injured sailor, attempting to set the leg.\n\nWith an unappealing crack, the leg turns, but the sailor's pained screams indicate that the captain has made things even worse..."
 agot_sailing.2046.a:0 "Oh no!"

 agot_sailing.2047.t:0 "$agot_sailing.2010.t$"
 agot_sailing.2047.desc:0 "It's been nothing but clear skies and a steady wind for days now, the sailing is easy and the crew's morale is high.\n\nWhen the sudden gust of wind finally comes, it takes everyone by surprise. I hear a cry of distress nearby and turn to find [sailor.GetFirstName] sprawled on the deck, [sailor.GetHerHis] leg at a nasty angle. [host.GetTitledFirstNameNicknamed] is standing over the injured sailor with a displeased expression on [host.GetHerHis] face. "Try to be more careful next time! The ocean is no place for clumsy seamen...""
 agot_sailing.2047.a:0 "Harsh but true words."

 agot_sailing.2048.t:0 "$agot_sailing.2010.t$"
 agot_sailing.2048.desc:0 "It's been nothing but clear skies and a steady wind for days now, the sailing is easy and the crew's morale is high.\n\nWhen the sudden gust of wind finally comes, it takes everyone by surprise. I hear a cry of distress nearby and turn to find [sailor.GetFirstName] sprawled on the deck, [sailor.GetHerHis] leg at a nasty angle. [host.GetTitledFirstNameNicknamed] is standing beside the injured sailor, an aghast look on [host.GetHerHis] face. [first_mate.GetName] soon arrives, just as our captain orders [first_mate.GetHerHim] to deal with the situation..."
 agot_sailing.2048.a:0 "I hope the leg can be set."

 # Sudden Fog Outcomes
 agot_sailing.2049.t:0 "$agot_sailing.2011.t$: Escape"
 agot_sailing.2049.desc:0 "A short while after setting out from port, our ship becomes enveloped in a shroud of swiftly rising fog that seemingly comes out of nowhere. The sky is obscured, as is the ocean all around us. Soon, it becomes clear that something needs to be done.\n\n[host.GetTitledFirstNameNicknamed] decides to maintain course, hoping to escape the fog without losing our heading. And indeed, the gamble pays off as the fog begins to lift, returning the ship to its desired course."
 agot_sailing.2049.a:0 "What luck!"

 agot_sailing.2050.t:0 "$agot_sailing.2011.t$: Lost"
 agot_sailing.2050.desc:0 "A short while after setting out from port, our ship becomes enveloped in a shroud of swiftly rising fog that seemingly comes out of nowhere. The sky is obscured, as is the ocean all around us. Soon, it becomes clear that something needs to be done.\n\n[host.GetTitledFirstNameNicknamed] decides to maintain course, hoping to escape the fog without losing our heading. But even after many hours of sailing, the fog appears to be unending..."
 agot_sailing.2050.a:0 "Will it ever release us?"

 agot_sailing.2051.t:0 "$agot_sailing.2011.t$: Turn Around"
 agot_sailing.2051.desc:0 "A short while after setting out from port, our ship becomes enveloped in a shroud of swiftly rising fog that seemingly comes out of nowhere. The sky is obscured, as is the ocean all around us. Soon, it becomes clear that something needs to be done.\n\n[host.GetTitledFirstNameNicknamed] decides to turn the ship around to avoid the danger of losing our heading. This will undoubtedly cause a delay, but at least we won't get lost in the fog for days."
 agot_sailing.2051.a:0 "A wise choice!"

 agot_sailing.2052.t:0 "$agot_sailing.2011.t$: Maneuver"
 agot_sailing.2052.desc:0 "A short while after setting out from port, our ship becomes enveloped in a shroud of swiftly rising fog that seemingly comes out of nowhere. The sky is obscured, as is the ocean all around us. Soon, it becomes clear that something needs to be done.\n\n[host.GetTitledFirstNameNicknamed], a seasoned mariner, does not show any signs of being worried. "Fog is nothing to be feared by a true mariner," [host.GetSheHe] declares. "Keep our course, straight ahead! The fog will clear soon enough.""
 agot_sailing.2052.a:0 "I hope you're right..."

 agot_sailing.2100.t:0 "Relaxing Breezes"
 agot_sailing.2100.desc:0 "The ocean wind gently caresses my hair as I stand at the very front of our ship, thoroughly enjoying the atmosphere. #Italic This is why I came on this voyage#!! I think to myself. I have seldom felt so... relaxed.\n\nI close my eyes for a moment and let my thoughts wander, focusing only on the sound of the crashing waves, the gentle swaying of the boards beneath my feet, and the faint cries of the gulls from the nearby shores. Yes. This... this is it."
 agot_sailing.2100.a:0 "I feel my stress getting swept away..."

 agot_sailing.2101.t:0 "A Moment to Talk"
 agot_sailing.2101.opening:0 "As our vessel passes by a large town with a significant lighthouse in the distance, most passengers admire the view. [woo_target.GetFirstName] reclines nearby: now is the ideal moment for a casual conversation."
 agot_sailing.2101.married:0 "I move while [woo_target.GetHerHis] [woo_target.GetPrimarySpouse.GetWifeHusband], [woo_target.GetPrimarySpouse.GetTitledFirstName], is distracted."
 agot_sailing.2101.married_absent:0 "[woo_target.GetHerHis|U] [woo_target.GetPrimarySpouse.GetWifeHusband], [woo_target.GetPrimarySpouse.GetTitledFirstName], is far away..."
 agot_sailing.2101.currentspouse:0 "Perhaps today I will win over my [woo_target.GetWomanMan]!"
 agot_sailing.2101.desc:0 "\n\n"Ah [woo_target.GetTitledFirstName], it's a rare chance to chat in the enclosure of a seaborne ship. I hope you're finding some enjoyment on this marvelous voyage," I say in a relaxed tone.\n\nI'm quite convinced that [woo_target.GetHerHis] smile carries more than mere politeness."
 agot_sailing.2101.a:0 "There is nothing better than sailing the open waters!"
 agot_sailing.2101.a.tt:0 "#F Appeal to [woo_target.GetFirstNamePossessiveNoTooltip] active side.#!"
 agot_sailing.2101.b:0 "To see the sights of the world with friends is to truly live."
 agot_sailing.2101.b.tt:0 "#F Appeal to [woo_target.GetFirstNamePossessiveNoTooltip] social side.#!"
 agot_sailing.2101.c:0 "I do pity the hard-working sailors at times."
 agot_sailing.2101.c.tt:0 "#F Appeal to [woo_target.GetFirstNamePossessiveNoTooltip] compassionate side.#!"
 agot_sailing.2101.d:0 "If I were skilled enough, I would help keep the ship afloat."
 agot_sailing.2101.d.tt:0 "#F Appeal to [woo_target.GetFirstNamePossessiveNoTooltip] diligent side.#!"
 agot_sailing.2101.e:0 "The yields of the ocean can feed whole towns if need be."
 agot_sailing.2101.e.tt:0 "#F Appeal to [woo_target.GetFirstNamePossessiveNoTooltip] stewarding side.#!"
 agot_sailing.2102.reply_sailor:0 ""$agot_sailing.2101.a$"\n\n"
 agot_sailing.2102.reply_socialite:0 ""$agot_sailing.2101.b$"\n\n"
 agot_sailing.2102.reply_pity:0 ""$agot_sailing.2101.c$"\n\n"
 agot_sailing.2102.reply_wastrel:0 ""$agot_sailing.2101.d$"\n\n"
 agot_sailing.2102.reply_steward:0 ""$agot_sailing.2101.e$"\n\n"
 agot_sailing.2102.opening:0 "[woo_actor.GetTitledFirstName] approaches me as our ship passes by a large town with a significant lighthouse in the distance, distracting most of the other passengers.\n\n[woo_actor.GetSheHe|U] thinks for a moment before offering,"
 agot_sailing.2102.sailor:0 "$agot_sailing.2102.reply_sailor$I can't deny the thrill of action is a joy."
 agot_sailing.2102.socialite:0 "$agot_sailing.2102.reply_socialite$I know the symbolism to which [woo_actor.GetSheHe] alludes."
 agot_sailing.2102.pity:0 "$agot_sailing.2102.reply_pity$Perhaps [woo_actor.GetSheHe] is different from the others."
 agot_sailing.2102.wastrel:0 "$agot_sailing.2102.reply_wastrel$This is a [woo_actor.GetWomanMan] who is going places."
 agot_sailing.2102.steward:0 "$agot_sailing.2102.reply_steward$There truly is beauty in orderly nature."
 agot_sailing.2102.fallback:0 "I find it hard to think of a response."
 agot_sailing.2102.a:0 "I can't deny [woo_actor.GetSheHe] has a certain charm..."
 intent_sailing_conversation:0 "[TARGET_CHARACTER.GetShortUIName|U] implied more interest in [CHARACTER.GetShortUIName] than the conversation while sailing together."

 agot_sailing.2103.sailor:0 "$agot_sailing.2102.reply_sailor$\n\nI can't help but cringe inwardly..."
 agot_sailing.2103.socialite:0 "$agot_sailing.2102.reply_socialite$\n\nSuch arrogance..."
 agot_sailing.2103.pity:0 "$agot_sailing.2102.reply_pity$\n\nLearn to take a compliment!"
 agot_sailing.2103.wastrel:0 "$agot_sailing.2102.reply_wastrel$\n\n"
 agot_sailing.2103.steward:0 "$agot_sailing.2102.reply_steward$\n\n"
 agot_sailing.2103.fallback:0 "[woo_actor.GetSheHe|U] simply smiles at me knowingly, making me #EMP deeply#! uncomfortable."
 agot_sailing.2103.a:0 "What a ridiculous [befriend_actor.GetWomanMan]."

 agot_sailing.2104.reply:0 "[woo_target.GetTitledFirstName] seems to have reacted warmly to my gambit"
 agot_sailing.2104.sailor:0 "$agot_sailing.2104.reply$, eyes afire as [woo_target.GetSheHe] nods vociferously."
 agot_sailing.2104.socialite:0 "$agot_sailing.2104.reply$, almost appearing to look me over with a new set of eyes."
 agot_sailing.2104.pity:0 "$agot_sailing.2104.reply$, lamenting the unfair distribution of work in our times."
 agot_sailing.2104.wastrel:0 "$agot_sailing.2104.reply$, clearly surprised to have found a kindred spirit."
 agot_sailing.2104.steward:0 "$agot_sailing.2104.reply$, happy to have found one who also finds joy in such things."
 agot_sailing.2104.fallback:0 "$agot_sailing.2104.reply$, gazing long and deep into my eyes."
 agot_sailing.2104.desc:0 "\n\nWhen [woo_target.GetSheHe] leaves, the tension is palpable in every pleasantry — I knew I would find the right words to win [woo_target.GetHerHim] over!"
 agot_sailing.2104.a:0 "I think [woo_target.GetSheHe] is on the hook..."

 agot_sailing.2105.reply:0 "My response seems not to have impressed [woo_target.GetTitledFirstName]"
 agot_sailing.2105.sailor:0 "$agot_sailing.2105.reply$, for [woo_target.GetSheHe] avoids my gaze as [woo_target.GetSheHe] thanks me and quickly takes [woo_target.GetHerHis] leave."
 agot_sailing.2105.socialite:0 "$agot_sailing.2105.reply$, for [woo_target.GetSheHe] rolls [woo_target.GetHerHis] eyes dismissively."
 agot_sailing.2105.pity:0 "$agot_sailing.2105.reply$, for [woo_target.GetSheHe] quickly loses interest, deflated by my words."
 agot_sailing.2105.wastrel:0 "$agot_sailing.2105.reply$, for [woo_target.GetSheHe] glazes over, seeming to only half-listen."
 agot_sailing.2105.steward:0 "$agot_sailing.2105.reply$, for [woo_target.GetSheHe] glazes over, seeming to only half-listen."
 agot_sailing.2105.fallback:0 "$agot_sailing.2105.reply$, for [woo_target.GetSheHe] cannot leave my company soon enough."
 agot_sailing.2105.desc:0 "\n\nStanding alone after [woo_target.GetSheHe] has made [woo_target.GetHerHis] farewell, I cannot help but feel like a fool for such an utter misstep..."
 agot_sailing.2105.a:0 "What was I thinking...?"

 agot_sailing.2201.t:0 "The Real Prize"
 agot_sailing.2201.desc:0 "As we depart from port and move out onto the open waters, I have an eye on [ROOT.Char.Custom2('DescriptorNegative', murder_target)] [murder_target.GetTitledFirstName], standing near the ship's main mast, oblivious to my observation."
 agot_sailing.2201.agent:0 "[murder_schemer.GetTitledFirstName] could not be here, but this may be the opportunity we have been waiting for.\n\n"
 agot_sailing.2201.a:0 "Today is the day."
 sailing_murder_accomplice_tt:0 "[THIS.Char.GetShortUIName|U] will attempt to murder [murder_target.GetShortUIName]"

 agot_sailing.2202.opening:0 "I have spent many days shadowing [murder_target.GetTitledFirstName] as [murder_target.GetSheHe] goes about [murder_target.GetHerHis] daily routine aboard the ship. Finally, a particularly misty evening comes, and I am sure my target is alone in [murder_target.GetHerHis] cabin.\n\n"
 agot_sailing.2202.desc:0 "When I enter, I find [murder_target.GetHerHim] fast asleep in [murder_target.GetHerHis] bed."
 agot_sailing.2202.a:0 "One slice of my dagger to rid myself of [murder_target.GetHerHim] forever!"
 agot_sailing.2202.a.tt:0 "#EMP I should not miss this wonderful opportunity that has presented itself...#!"
 agot_sailing.2202.b:0 "No, it is not worth the risk..."
 agot_sailing.2202.b.tt:0 "#EMP What if [murder_target.GetSheHe] should live...?#!"
 sailing_kill_murder_missed:0 "[murder_target.GetFirstNameOrMeNoTooltip] gets lucky"
 sailing_kill_murder_injured:0 "[murder_target.GetFirstNameOrMeNoTooltip] is "accidentally" wounded"
 sailing_kill_murder_killed:0 "[murder_target.GetFirstNameOrMeNoTooltip] is "tragically" killed"
 sailing_kill_murder_escape:0 "[murder_target.GetFirstNameOrMeNoTooltip] escapes"
 sailing_target_attendee_killed_tt:0 "@death_icon![murder_target.GetShortUIName] dies"
 sailing_target_attendee_injured_chance_tt:0 "[murder_target.GetShortUIName] may be injured"

 agot_sailing.2203.desc:0 "I make my move as quickly as I can, stepping next to the bed in which [murder_target.GetTitledFirstName] is sleeping. Just as I draw my dagger, I see [murder_target.GetHerHim] stir."
 agot_sailing.2203.agent:0 "I don't want to let [abduct_schemer.GetFirstName] down..."
 agot_sailing.2203.success:0 "\n\n"[ROOT.Char.GetFirstNameNoTooltip]?! What are y—" [murder_target.GetFirstNameNoTooltip] slumps back onto the bed, as my dagger pierces deep into [murder_target.GetHerHis] heart.\n\nThe deed is done before [murder_target.GetSheHe] can even finish [murder_target.GetHerHis] final words, and I quickly look to cover my tracks, tossing the body overboard through the cabin's single window."
 agot_sailing.2203.failure:0 "\n\n"[ROOT.Char.GetFirstNameNoTooltip]?! You fiend!" [murder_target.GetFirstNameNoTooltip] somehow manages to roll out of the way as my dagger jolts forward. Then, [murder_target.GetFirstNameNoTooltip] scrambles to [murder_target.GetHerHis] feet.\n\nBut [murder_target.GetSheHe] dashes out of the cabin's door as I try to regain my balance, looking over [murder_target.GetHerHis] shoulder fearfully, shouting at the top of [murder_target.GetHerHis] lungs. I won't catch [murder_target.GetHerHim] in time..."
 agot_sailing.2203.a:0 "I should get back on deck before anyone grows suspicious..."
 agot_sailing.2203.b:0 "Damn! Damn! Damn!"

 agot_sailing.2204.t:0 "A Knife in the Dark"
 agot_sailing.2204.desc:0 "It is late in the evening, and I've retired to my cabin to get some well-deserved rest. As I'm about to fall asleep, I am startled by an unusual noise behind me. I open my eyes just in time to see [murder_actor.GetTitledFirstName] with [murder_actor.GetHerHis] dagger raised above [murder_actor.GetHerHis] head, falling down on me."
 agot_sailing.2204.success:0 "\n\nI see the determination in [murder_actor.GetFirstNamePossessiveNoTooltip] eyes too late, failing to dodge [murder_actor.GetHerHis] swing, and am sent back onto my bed with a thud, the dagger sunk deep into my heart.\n\nMy vision goes blurry as I catch one last glimpse of [murder_actor.GetFirstName], displaying a faint but cruel smile on [murder_actor.GetHerHis] lips. "Goodbye, [ROOT.Char.GetFirstNameNoTooltip].""
 agot_sailing.2204.failure:0 "\n\n[murder_actor.GetFirstNameNoTooltip] is trying to kill me! I desperately dodge out of the way, catching a glancing blow from the tip of the dagger as it falls down on me, and I tumble to the ground awkwardly, but manage to scramble to my feet as [murder_actor.GetSheHe] loses [murder_actor.GetHerHis] balance, cursing.\n\nI sprint out of the cabin, desperate to get help from anyone still awake."
 agot_sailing.2204.a:0 "Wha—! N—"
 agot_sailing.2204.b:0 "Just keep running!"
 sailing_ends_tt:2 "The [GetActivityType('activity_agot_sailing').GetName] ends"

 agot_sailing.2301.t:1 "A Moment to Talk"
 agot_sailing.2301.desc:0 "The sun shines brightly as our ship sails swiftly across the open waters, making good pace. [befriend_target.GetFirstName] stands not far off, admiring the view: this is my chance to impress [befriend_target.GetHerHim].\n\n"[befriend_target.GetTitledFirstNameNoTooltip]! How are you? It's not often we get a chance to talk." I open informally.\n\n[befriend_target.GetSheHe|U] seems surprised by my conversation, but not hostile to the idea."

 agot_sailing.2302.reply_sailor:0 ""$agot_sailing.2101.a$"\n\n"
 agot_sailing.2302.reply_pity:0 ""$agot_sailing.2101.c$"\n\n"
 agot_sailing.2302.reply_wastrel:0 ""$agot_sailing.2101.d$"\n\n"
 agot_sailing.2302.reply_steward:0 ""$agot_sailing.2101.e$"\n\n"

 agot_sailing.2302.opening:0 "[befriend_actor.GetTitledFirstName] sidles up to me as the ship dashes along across the peaceful ocean.\n\n[befriend_actor.GetSheHe|U] smiles warmly, saying"

 agot_sailing.2302.sailor:0 "$agot_sailing.2302.reply_sailor$It's not a statement I can find fault with."
 agot_sailing.2302.pity:0 "$agot_sailing.2302.reply_pity$I can't deny the truth of [befriend_actor.GetHerHis] words; 'tis cruel work."
 agot_sailing.2302.wastrel:0 "$agot_sailing.2302.reply_wastrel$It certainly rings true; all the useful things I could be doing instead..."
 agot_sailing.2302.steward:0 "$agot_sailing.2302.reply_steward$Ordering nature is certainly something I can relate to finding joy in."
 agot_sailing.2302.fallback:0 "I am not sure what to say."
 agot_sailing.2302.a:0 "Perhaps we have more in common than I thought."

 agot_sailing.2303.opening:0 "[befriend_actor.GetTitledFirstName] approaches me as our ship sails steadily toward its destination."
 agot_sailing.2303.sailor:0 "$agot_sailing.2302.reply_sailor$\n\nI couldn't disagree more..."
 agot_sailing.2303.pity:0 "$agot_sailing.2302.reply_pity$Such weakness, the world is cruel."
 agot_sailing.2303.wastrel:0 "$agot_sailing.2302.reply_wastrel$We all need to make time for diversions."
 agot_sailing.2303.steward:0 "$agot_sailing.2302.reply_steward$How very dull..."
 agot_sailing.2303.fallback:0 "[befriend_actor.GetSheHe|U] grins hopefully, obviously expecting some reciprocal affinity."
 agot_sailing.2303.a:0 "Say, what's that over there?"

 agot_sailing.2304.reply:0 "[befriend_target.GetTitledFirstName] seems to have much in common with me"
 agot_sailing.2304.sailor:0 "$agot_sailing.2304.reply$, excitedly diving into the minutiae of the correct way to anchor and secure a ship in port."
 agot_sailing.2304.pity:0 "$agot_sailing.2304.reply$, sharing my pity for those that must work so hard."
 agot_sailing.2304.wastrel:0 "$agot_sailing.2304.reply$, bemoaning that [befriend_target.GetHerHis] time might also be better spent elsewhere."
 agot_sailing.2304.steward:0 "$agot_sailing.2304.reply$, eager to share insight on maritime trade routes."
 agot_sailing.2304.fallback:0 "$agot_sailing.2304.reply$, relaxing [befriend_target.GetHerHis] demeanor in my company."
 agot_sailing.2304.desc:0 "\n\nWhen we move on, we can hardly be separated — I knew I would find the right words to win [befriend_target.GetHerHim] over!"
 agot_sailing.2304.a:0 "I think I won [befriend_target.GetHerHim] over..."

 agot_sailing.2305.reply:0 "My words don't seem to have made much of an impact on [befriend_target.GetTitledFirstName]"
 agot_sailing.2305.sailor:0 "$agot_sailing.2305.reply$, for [befriend_target.GetSheHe] merely smiles politely, clearing [befriend_target.GetHerHis] throat, obviously looking for a polite way to end our conversation."
 agot_sailing.2305.pity:0 "$agot_sailing.2305.reply$, for [befriend_target.GetSheHe] gives me a strange look and scratches [befriend_target.GetHerHis] head."
 agot_sailing.2305.wastrel:0 "$agot_sailing.2305.reply$, for [befriend_target.GetSheHe] looks completely appalled by my words."
 agot_sailing.2305.steward:0 "$agot_sailing.2305.reply$, for [befriend_target.GetSheHe] quickly loses interest, clearly not minded to talk about trade routes."
 agot_sailing.2305.fallback:0 "$agot_sailing.2305.reply$, for [befriend_target.GetSheHe] says nothing."
 agot_sailing.2305.desc:0 "\n\nStanding alone after [befriend_target.GetSheHe] has moved on to chat with others, I feel foolish..."
 agot_sailing.2305.a:0 "Well done, [ROOT.Char.GetFirstNameNoTooltip]."

 sailing_woo_success_key_title:0 "$agot_sailing.2301.t$"
 sailing_woo_failure_key_title:0 "$agot_sailing.2301.t$"
 sailing_murder_restrain_key_title:0 "$agot_sailing.2301.t$"
 sailing_kill_murder_killed_title:0 "$agot_sailing.2301.t$"
 sailing_kill_murder_missed_title:0 "$agot_sailing.2301.t$"
 sailing_befriend_success_key_title:0 "$agot_sailing.2301.t$"
 sailing_befriend_failure_key_title:0 "$agot_sailing.2301.t$"

 agot_sailing.3100.t:0 "Charting a Course to Valyria"
 agot_sailing.3100.desc:0 "I see [first_mate.GetFirstNameNoTooltip] fill with excitement as [first_mate.GetSheHe] begins to rally the rest of the crew, who quickly get to work unfurling the sails and hoisting the anchor.\n\nI go below deck and into my quarters, opening a hatch to let the sunlight pour over the array of naval charts spread out on the captain's table. [first_mate.GetFirstNameNoTooltip] enters and joins me by my side.\n\n"So, onwards to the doomed lands of Valyria, captain?""
 agot_sailing.3100.a:0 "Follow my every direction!"
 agot_sailing.3100.a.success:0 "You successfully chart a route"
 agot_sailing.3100.a.success.tt:0 "You set out confidently into the open sea."
 agot_sailing.3100.a.failure.tt:0 "You are unable to find a plausible route."

 agot_sailing.3101.t:0 "A Course Charted"
 agot_sailing.3101.desc:0 "After poring over my nautical charts and comparing them with my notes on the history of Valyria, I set an eastward course towards the Fourteen Flames.\n\nTaking out a quill, I mark the location with a large cross and turn to my first mate with a look of confidence.\n\n"We sail past the lands of the Free Cities, towards Slaver's Bay, then take a bearing of 260 degrees into the Smoking Sea!""
 agot_sailing.3101.a:0 "Our journey begins here."

 agot_sailing.3102.t:0 "A Path Still Hidden"
 agot_sailing.3102.desc:0 "After poring over my nautical charts and comparing them with my notes on the history of Valyria, I just can't seem to figure out a likely location for a good anchorage within the Fourteen Flames with any certainty. Truly, it is like trying to find a needle in a haystack.\n\nOut of the corner of my eye I see [first_mate.GetFirstNamePossessiveNoTooltip] confidence begin to wane as [first_mate.GetSheHe] realizes just how clueless I am. Slowly, [first_mate.GetSheHe] places a hand on my shoulder.\n\n"Maybe... we'll find it another time?""
 agot_sailing.3102.a:0 "I guess [first_mate.GetSheHe] is right. We'd sail to our deaths."

 agot_sailing.3200.t:0 "A Monstrous Kraken"
 agot_sailing.3200.desc:0 "As we sail, I cannot shake a sense of disquiet, occasionally glancing towards the deep waters. Far off, I see something break through the surface for but a moment, and a foreboding chill runs down my spine. I spot it again, getting closer, now able to make out something scaly moving through the water.\n\nAs I begin to make it out more clearly, fear almost lays me low — as large as a great ship, with a long tentacled body and a crested head, it is like nothing I have ever seen before. One of the mythical krakens, distant kin of the much smaller squids found in many a sea nowadays. I thought them but a legend!\n\nI must choose quickly now, as I see it coming closer, eyes filled with malicious desire as it gazes upon my ship. Do I fight and continue on, or turn back and try to escape?"
 agot_sailing.3200.a:0 "Archers, ready your bows! We will slay this beast!"
 agot_sailing.3200.a.success:0 "You successfully slay the kraken"
 agot_sailing.3200.a.success.tt:0 "You and your crew celebrate your great victory."
 agot_sailing.3200.a.failure:0 "You are overcome by the onslaught of the kraken"
 agot_sailing.3200.a.failure.tt:0 "@death_icon! The kraken lays waste to your ship and you face potential death."
 agot_sailing.3200.b:0 "Get us out of here! We can't hope to defeat it!"
 agot_sailing.3200.b.tt:0 "You attempt to flee back to port."
 agot_sailing.3200.b.success.tt:0 "You and your ship manage to escape, unscathed."
 agot_sailing.3200.b.failure.tt:0 "You escape, but your ship takes significant damage."
 agot_sailing.3200.c:0 "Time to test the horn's power..."
 agot_sailing.3200.c_success:0 "You successfully bind the kraken's mind and command it to leave"
 agot_sailing.3200.c_failure:0 "You fail to bind the kraken's mind, and it destroys your ship"

 agot_sailing.3201.t:0 "Kraken-Slayer"
 agot_sailing.3201.t_horn:0 "Kraken-Commander"
 agot_sailing.3201.desc:0 "My crew pepper the beast with arrows as it tries to attack the ship, all while I try to find an opening to strike a more powerful blow against it. Finally, as it tries to snatch me in its toothless beak, I manage to barely dodge before landing a blow to its eye with my [ROOT.Char.Custom('signature_weapon')].\n\nWailing in agony, the beast thrashes around, throwing me to the deck. However, my blow has struck true — the beast gives a final screech before collapsing into the sea, its corpse floating to the surface.\n\nMy crew erupt into ecstatic cheers, some of them breaking out personal stashes of alcohol to celebrate. My first mate, [first_mate.GetFirstNameNoTooltip], claps me on the shoulder. "Well done, my [ROOT.Char.GetTitleAsNameNoTooltip]! The beast never stood a chance!""
 agot_sailing.3201.desc_horn:0 "As the crew retreat behind me, I bring the krakenhorn to my lips and unleash its deep, thunderous cry. The sound rolls across the sea, and moments later the great beast begins to withdraw, vanishing beneath the depths from whence it came. There can be no doubt now that the horn carries true power.\n\nThe crew erupts into ecstatic cheers, with some breaking open hidden stashes of spirits in celebration. My first mate, [first_mate.GetFirstNameNoTooltip], claps me firmly on the shoulder. "Well done, my [ROOT.Char.GetTitleAsNameNoTooltip]! The beast never stood a chance!""
 agot_sailing.3201.a:0 "Indeed, indeed! And now, our path lies open..."
 agot_sailing.3201.b:0 "Enough nonsense, I need a drink!"

 agot_sailing.3202.t:0 "A Tasty Snack"
 agot_sailing.3202.desc:0 "The monstrous kraken easily shrugs off the arrows my crew desperately arrayed against it, snatching up crew members left and right!\n\nBefore long it comes for me. I dodge once, then twice, then... nothing."
 agot_sailing.3202.a:0 "No... not like this!"
 agot_sailing.3202.a.success.tt:0 "You somehow manage to escape with your life intact."
 agot_sailing.3202.a.failure.tt:0 "@death_icon! You are swallowed whole, never to be seen again."

 agot_sailing.3300.t:0 "Dwindling Supplies"
 agot_sailing.3300.desc:0 "I have spent a long time at sea, and strong headwinds have meant that I have not been able to make as much progress as I'd have hoped. What's worse, my first mate informs me that our provisions are running dangerously low and we're likely to run out before we reach our destination. Fights have already started to break out among my crew and, without my leadership, this voyage will surely end in disaster.\n\nTime for me to decide whether to use the carrot or the stick. I could try to devise a fair way to spread our remaining supplies a little longer, or I could enforce discipline with a draconian fist, using my knowledge of maintaining supplies at war to see us through.\n\nAlternatively, our supplies would last us the journey back to port, but can I really give up now?"
 agot_sailing.3300.a:0 "I'm sure I can make what we have left last..."
 agot_sailing.3300.a.success:0 "You successfully ration out the remaining supplies"
 agot_sailing.3300.a.success.tt:0 "You will have enough food and drink to last the journey."
 agot_sailing.3300.a.failure:0 "You miscalculate the amount of rations"
 agot_sailing.3300.a.failure.tt:0 "@death_icon! You and your entire crew will starve at sea."
 agot_sailing.3300.b:0 "Discipline is the answer, this ship is now on a war footing!"
 agot_sailing.3300.b.success:0 "You successfully keep your crew in line"
 agot_sailing.3300.b.success.tt:0 "Your knowledge of logistics and demand for discipline amongst the men ensures that you don't starve."
 agot_sailing.3300.b.failure:0 "You fail to handle the situation"
 agot_sailing.3300.b.failure.tt:0 "@death_icon! Your heavy-handed approach and inability to enforce discipline drives the crew to mutiny, ridding themselves of your tyranny."
 agot_sailing.3300.c:0 "I guess I tried, but it is not worth the risk."
 agot_sailing.3300.c.tt:0 "You make your way back to port."
 agot_sailing.3300.d:0 "[man_meat.GetName] is looking awfully appetizing..."
 agot_sailing.3300.d.tt:0 "You choose to devour [man_meat.GetNameNoTooltip] to feed the crew"

 agot_sailing.3301.t:0 "Careful Rationing"
 agot_sailing.3301.desc:0 "With some astute calculations, I have managed to stretch out our limited supplies in a fair way by implementing a strict regime of rationing on my ship.\n\nWhile our bellies may not be as full as they were on the first leg of our journey, at least no crew member can cry injustice."
 agot_sailing.3301.a:0 "One for you, one for me."

 agot_sailing.3302.t:0 "Starvation"
 agot_sailing.3302.desc:0 "Spirits were high as I calculated a sizeable daily ration of food and water for everyone on board the ship. But merriment soon turned to despair as our stocks ran dry with no land in sight, miles from shore.\n\nMy throat is dry and my stomach aches with the most painful of cramps. I don't have long left; many of my crew have already perished.\n\nWhat happened?"
 agot_sailing.3302.a:0 "Did I forget to carry the one?"

 agot_sailing.3303.t:0 "Scraping By"
 agot_sailing.3303.desc:0 "In spite of initial resistance from my crew, with a firm hand and an uncompromising attitude, I've managed to regain control of our supply situation.\n\nMorale may have taken a hit, and the sound of rumbling bellies has become commonplace — but at least I can once again focus on the journey ahead."
 agot_sailing.3303.a:0 "It had to be done."

 agot_sailing.3304.t:0 "Mutiny"
 agot_sailing.3304.desc:0 "My efforts to bring my crew in line with a draconian fist have ended in disaster. My hungry and dissatisfied men did not have the strength required to see us through to our fabled destination, and they have overthrown my ship in mutiny!\n\nBinding my arms tightly behind my back, they throw me by the rigging as they debate what's to be done with me. Then, their apparent ringleader, [mutiny_leader.GetTitledFirstNameNicknamed], drags me to my feet and forces me onto the hastily assembled plank hanging over the side of the ship, guarding my retreat with an outstretched sword.\n\n"Walk, tyrant...""
 agot_sailing.3304.a:0 "Cowards! Traitors!"

 agot_sailing.3305.desc:0 "We have long been at sea, and strong headwinds have meant our progress is little and less than we'd have hoped. What's worse, provisions are running dangerously low...\n\n[host.GetTitledFirstNameNicknamed] has attempted to convince the crew to enforce harsh rations, but it is too little, too late. The last of the supplies are gone, and soon we will be, as well."
 agot_sailing.3305.a:0 "Please, just a bite..."

 agot_sailing.3306.t:0 "Chum on the Water"
 agot_sailing.3306.desc:0 "The voyage has gone terribly awry, and our supplies have dwindled to scraps... Some on the ship have even resorted to gnawing the frayed ends of rope after attempts to catch a rat failed.\n\n[man_meat.GetTitledFirstName] has been whinging incessantly about [man_meat.GetHerHis] hunger pangs, as though the rest of us do not feel the same pain. It's enough to drive a [ROOT.Char.GetWomanMan] #emp mad!#!\n\n[man_meat.GetHerHis|U] complaining has sapped all [man_meat.GetHerHis] energy, it seems, and [man_meat.GetSheHe] has passed out, sprawled across the deck. I can't help but notice how... tender [man_meat.GetHerHis] scrawny legs look. #emp Ah, a taste of flesh... Surely this is what I need to reinvigorate my spirit!#!"
 agot_sailing.3306.a:0 "Meat's back on the menu, boys!"
 agot_sailing.3306.d.tt:0 "You devour [man_meat.GetTitledFirstName] and give your crew a choice to dig in."

 agot_sailing.3307.desc:0 "The voyage has gone terribly awry, and our supplies have dwindled to scraps... Some on the ship have even resorted to gnawing the frayed ends of rope after attempts to catch a rat failed.\n\n[man_meat.GetTitledFirstName] has been whinging incessantly about [man_meat.GetHerHis] hunger pangs, as though the rest of us do not feel the same pain. It's enough to drive a [ROOT.Char.GetWomanMan] #emp mad!#!\n\nOnce [man_meat.GetFirstNameNoTooltip] has passed out, sprawled across the deck, I notice [host.GetTitledFirstNameNicknamed] eyeing [man_meat.GetHerHim] menacingly. #emp Surely, [host.GetSheHe] doesn't mean to eat [man_meat.GetHerHim]!#!\n\nThe kill is quick; fear is said to spoil the taste of meat, and [host.GetFirstNameNoTooltip] slits [man_meat.GetFirstNamePossessiveNoTooltip] throat in [man_meat.GetHerHis] sleep. The iron-rich aroma of blood tingles in my nose. My belly growls. #emp After all, why shouldn't I? [man_meat.GetSheHe|U] is already dead!#!"
 agot_sailing.3307.a:0 "The things we do to survive!"
 agot_sailing.3307.b:0 "No no, I must weather my own temptations."
 agot_sailing.3307.b.success_tt:0 "You manage to stave off the hunger with meager rations"

 agot_sailing.3400.t:0 "The Madness of Valyria's Doom"
 agot_sailing.3400.desc:0 "I awaken to the sounds of hysteria. Emerging from my cabin, I find my normally composed first mate, [first_mate.GetFirstName], sobbing outside my door. I shake [first_mate.GetHerHim], trying to get an answer out of [first_mate.GetHerHim], before looking for another crew member.\n\nI move among the crew, questioning sailors with trembling hands and hollow eyes. Each man speaks of the same vision — Valyria's Doom reborn in flame and ash, a firestorm that devours stone and flesh alike, that boils the very sea. The images have seared themselves into their minds like brands.\n\nMy ship lies dead in the water. Not a sail raised, not an oar moving. The crew huddles in knots across the deck, whispering prayers to gods both old and new. They will not go forward. They #EMP cannot#!.\n\n"Turn back, captain," [first_mate.GetFirstNameNoTooltip] pleads, his voice cracking. "The Doom warns us. We'll burn as the Valyrians burned." The others echo [first_mate.GetHerHis] plea, their fear a living thing that spreads like ship-fever."
 agot_sailing.3400.a:0 "Take heart, my friends: it is but a dream. We are almost there!"
 agot_sailing.3400.a.success:0 "Your words reassure your crew"
 agot_sailing.3400.a.success.tt:0 "You rally your crew, dispelling their doubts in your quest"
 agot_sailing.3400.a.failure:0 "Your words fall on deaf ears"
 agot_sailing.3400.a.failure.tt:0 "Your crew succumbs to despair, taking you captive to ensure their survival"
 agot_sailing.3400.b:0 "The Doom is in your heads, but #EMP I#! am right here!"
 agot_sailing.3400.b.desc:0 "You attempt to use your high [dread|E] to snap your crewmates out of their folly."
 agot_sailing.3400.b.success.tt:0 "You terrify your crew back to work, ignoring their doubts so as to not face your wrath"
 agot_sailing.3400.b.failure.tt:0 "You threats are unable to terrify your crew enough to get past their doubts"
 agot_sailing.3400.c:0 "I can feel the cold in my bones... we need to go back."
 agot_sailing.3400.c.tt:0 "You make your way back to port"

 agot_sailing.3401.t:0 "The Madness Fades"
 agot_sailing.3401.desc:0 "My words cut through the fever-dream that has gripped my crew. I see it happen — the wild light fading from their eyes, replaced by something steadier. Reason returning like the tide.\n\nOne by one, the crew returns to their senses. [first_mate.GetFirstName] joins me, clear-eyed for the journey ahead. We turn our bow east once more, toward those distant, cursed waters.\n\nThe crew works in silence, but it's no longer the silence of terror. It's the silence of men who have stared into the abyss and chosen to sail forward anyway."
 agot_sailing.3401.a:0 "We have mastered fear."

 agot_sailing.3402.t:0 "The Madness Takes Hold"
 agot_sailing.3402.desc:0 "They won't listen. I try reason first, then I try command — my voice sharp as a blade. But the terror has taken them, and terror makes men deaf to everything but their own hammering hearts.\n\nWhen I move toward the helm, [first_mate.GetFirstName] moves to block me. My first mate shakes [first_mate.GetHerHis] head slowly. "I'm sorry, Captain."\n\nBefore I can push past them, hands close around my arms and hold me fast. "You've gone mad," someone whispers, almost gently. "The Doom has touched your mind. We're saving you from yourself.""
 agot_sailing.3402.a:0 "I'm not mad! #EMP You're#! all mad!"

 agot_sailing.3500.t:0 "A Host of Storms"
 agot_sailing.3500.desc:0 "At long last, everything seems to be going well. Based on my measurements, I should be nearing where lost Valyria lies, and the seas have been kind to us — good winds, calm waves.\n\nYet even as I think these thoughts, it all changes. The wind wracks my vessel, the waves pounding upon it like drums in the deep. And then the rain begins to fall — first a trickle, and then a torrent. Out of the calmest day has arisen a storm of such fury, unlike any I have beheld in my life.\n\nThrough the torrential downpour, I believe I can see more and more storm clouds converging on the ship. A wave crashes into my face, collapsing back into the depths. I have no more time to think on that, though — I must choose whether to brave the storm or to turn back at the final hurdle."
 agot_sailing.3500.a:0 "We #EMP must#! master this storm!"
 agot_sailing.3500.a.success:0 "You manage to weather the storm"
 agot_sailing.3500.a.success.tt:0 "You draw upon all your experience at sea to get through the storm safely"
 agot_sailing.3500.a.failure:0 "Your ship is lost to the storm"
 agot_sailing.3500.a.failure.tt:0 "@death_icon! The storm proves too much for you to handle, and you are lost to the waves"
 agot_sailing.3500.b:0 "This is madness! We must turn back!"
 agot_sailing.3500.b.tt:0 "You make your way back to port"

 agot_sailing.3501.t:0 "Riding the Tempest"
 agot_sailing.3501.desc:0 "I grapple with the ship's wheel, pulling it over the crest of another fierce wave. Thunder cracks, and lightning pierces the dark.\n\nI bark orders and commands to adjust the rigging again, sailors furiously working to execute my commands. My ship is battered and bruised, but I refuse to give up.\n\nAt last, however, the winds begin to calm, and the waves fall. The tempest subsides, and when the sun first peeks through the clouds, I can scarcely imagine a more beautiful sight. I have endured a storm without peer, mastering all tides before me.\n\nAnd in the distance... could it be?"
 agot_sailing.3501.a:0 "Unfurl the sails, we are almost there!"

 agot_sailing.3502.t:0 "A Watery Grave"
 agot_sailing.3502.desc:0 "I desperately try to grapple with the storm, barking orders to my men. But this is no mere storm.\n\nI hear a loud crack as the main mast of the ship, long battered by the winds, can take no more, tumbling down on the main deck. The ship begins to fall apart, and the fierce waves sweep me into the deep.\n\nThe last thing I hear is the all-consuming rumbling of the tumultuous waters all around me...\n\nAnd then there is darkness."
 agot_sailing.3502.a:0 "N-ngh..."
 agot_sailing.3503.desc:0 "I hear [host.GetFirstName] trying to command the men to keep going. But this is no mere storm.\n\nI hear a loud crack as the main mast of the ship, long battered by the winds, can take no more, tumbling down on the main deck. The ship begins to fall apart, and the fierce waves sweep me into the deep.\n\nThe last thing I hear is the all-consuming rumbling of the tumultuous waters all around me...\n\nAnd then there is darkness."

 agot_sailing.3900.t:0 "The Fourteen Flames"
 agot_sailing.3900.desc:0 "A wild grin breaks upon my face as I spot the broken islands at last, a slightly hysterical laugh bubbling free. We've done it. The struggles were great, and many doubted it was even possible — but we did it. This must assuredly be what remains of the Fourteen Flames of Valyria.\n\nAs we get close, though, I furrow my brow in thought. Do we attempt to land?\n\nOn all sides, sheer cliff faces appear to prevent any easy landing — and smoke rises all around, from water and rock alike. To land upon it is to risk calling doom on ourselves — just like the doom that befell the dragonlords of old.\n\nI have a choice now — to land, or to merely admire it from afar?"
 agot_sailing.3900.a:0 "It's not worth the risk, merely coming here is worthy of song!"
 agot_sailing.3900.a.tt:0 "You respectfully gaze upon Valyria from your vessel"
 agot_sailing.3900.b:0 "I've come this far, let's look for a landing spot."
 agot_sailing.3900.b.success:0 "You manage to explore the ruins of Valyria"
 agot_sailing.3900.b.failure:0 "Your exploration ends in sudden misadventure."

 agot_sailing.3901.t:0 "The Majesty of Valyria"
 agot_sailing.3901.desc:0 "I decide against attempting to land on any of the broken islands, their high cliffs and rocky shores dissuading me from going any closer. Yet even still, I push the ship as near as I can, sailing closer and closer. As we do so, the full extent of Valyria's Doom becomes visible. Broken towers and pillars, utterly ruined cities and dwellings are seen through the ever-present smoke. And yet, even in such a terrible state, one can still discern how majestic the Fourteen Flames must once have been.\n\nAt last, after having circled it many times over, we finally turn home, contented. We have found what others thought a myth, braved dangers beyond peer, and beheld the last remnant of long-lost Valyria. None can doubt my skill or renown."
 agot_sailing.3901.a:0 "I shall never forget this sight."

 agot_sailing.3902.t:0 "Exploring the Ruins"
 agot_sailing.3902.desc:0 "Gingerly stepping off the ship, trying to find a foothold, I gaze upward. Even now, mostly consumed by the waves, the peak of the volcano that shaped this island pierces the sky, sheer cliffs rising high above the surf. Straining my eyes, I finally uncover a path through the rough rocks, leading to time-worn steps set into the cliff face itself, utterly broken and shattered by the Doom.\n\nAfter climbing the stairs, I at last reach an ancient Valyrian palace, somehow still mostly intact. Smoke emanates from the silent structure, and an air of despair hangs about it. I look around for something of value to find..."
 agot_sailing.3902.a:0 "Nothing but ruins remain here."
 agot_sailing.3902.b:0 "Fan out! Let's see what else we can find!"
 attempt_to_leave_valyria:0 "You attempt to leave Valyria"
 valyrian_artifact:0 "You found an [artifact|E] of Old Valyria"
 guest_reached_valyria_tt:0 "Every guest receives [GetModifier( 'guest_reached_valyria' ).GetNameWithTooltip|L]"

 agot_sailing.3903.t:0 "Maritime Misadventure"
 agot_sailing.3903.desc:0 "I stand on the ship's deck as our course takes us by the broken, steaming cliffs that dot the Smoking Sea. In my mind, I can already see the many treasures we are sure to discover hidden within the ruins of Valyria of old. Gold, gems, and of course the priceless Valyrian steel... Soon, all of them will be mine...\n\nA loud #italic crash#! snaps me back to reality, and suddenly, the skies are filled with ash and fire. A rain of burning rocks engulfs the ship, and quickly, the flames begin to spread. As I look on in terror, the sails catch fire, and the blaze leaps from the mast onto the deck.\n\nAmidst screams of panic and pain, unbearable heat rises all around me. Without thinking, I leap into the raging waters below, only to see the ship founder before my very eyes. I paddle frantically to get away from the wreckage..."
 agot_sailing.3903.a:0 "I— I must... keep swimming..."

 agot_sailing.3904.t:0 "Danger in the Ruins"
 agot_sailing.3904.desc_one:0 "Having made landfall, we find a broken path leading upward to the top of the sharp cliffs that overlook the Smoking Sea. The steps are perilous, forcing us to keep a very slow pace. Finally, we reach the top, arriving at a ruined courtyard that may once have belonged to a great manor of a Valyrian dragonlord.\n\nI turn to my company. "Many doubted that anyone could ever come here, but we have defied all naysayers! Now, the riches of Valyria are ours for the taking! Let us—"\n\nMy speech is cut short by a loud #italic roar#! behind us. I wheel around just in time to see a monstrous, scaled creature leaping toward me at unnatural speed..."
 agot_sailing.3904.desc_two:0 "Having made landfall, we find a broken path leading upward to the top of the sharp cliffs that overlook the Smoking Sea. The steps are perilous, forcing us to keep a very slow pace. Finally, we reach a small cave with smoke pouring out of it\n\n"What's this?" I gasp, as a small creature emerges. Its tufts of fur are white as snow, but from its head sprout dark, scaled tentacles.\n\n"It's merely a rabbit!" But as we approach, the foul beast lunges forward with huge, sharp teeth. I watch in horror as it rips the head off one of my men...\n\n"RUN AWAY!" I shout, but I know it is too late for us all."
 agot_sailing.3904.desc_three:0 "Having made landfall, we find a broken path leading upward to the top of the sharp cliffs that overlook the Smoking Sea. The steps are perilous, forcing us to keep a very slow pace. Finally, we reach a small cave with smoke pouring out of it.\n\nAt the mouth of the cave, I spot a small clutch of scaled stones... #italic Could it be?!#!\n\n#EMP Dragon eggs!#! My heart is pounding as I race toward them. But as my hand touches the largest of the clutch, it spits and hisses, cracking open. The gods have no name for the sound it made next — an earth-shattering, piercing screech. I withstand the pain long enough to feel the warmth of blood gurgling down both sides of my head as my own brain melts from within my head."
 agot_sailing.3904.desc_four:0 "Having made landfall, we find a broken path leading upward to the top of the sharp cliffs that overlook the Smoking Sea. The steps are perilous, so I keep a hand against the rock face as we climb. But my steps are not as cautious, and I trip on a loose stone.\n\nAs I lose my footing, I grasp onto a rocklike appendage for support, but it breaks off into my hand. I crumple to the ground, avoiding the fall to my certain death, but my eyes stay firmly locked on the stone in my grip: #italic Is that... a finger?#!\n\nMy gaze drifts upward, to see a stone face, frozen in horror, melted into the cliff. It almost seems to be staring back at me, when suddenly... Its other hand jolts forward, grabbing me by the throat. I can barely manage a scream through the chokehold."
 agot_sailing.3904.desc_five:0 "Having made landfall, we find a broken path leading upward to the top of the sharp cliffs that overlook the Smoking Sea. The steps are perilous, forcing us to keep a very slow pace. Finally, we reach a small cave with smoke pouring out of it.\n\nAt the mouth of the cave, I spot a large black stone with a shimmering blade lodged into it. Surely the ripples in the metal can mean one thing: #italic Valyrian steel!#!\n\nSuch a prize would make the whole trip worth it. As I grab tightly to the pommel, I feel how strongly it is stuck. Pulling with all my strength seems to do nothing.\n\nI find myself so engrossed with this sword in the stone that I hardly notice my crew has gone silent. As I finally chance a look around, I see a jet black figure standing tall above me; its skin like dragonglass, with sharp scythe-like arms raised above me. One slices down, take my whole arm off, still gripping the priceless blade.\n\nThe other begins its descent toward my head."
 agot_sailing.3904.desc_six:0 "Having made landfall, we find a broken path leading upward to the top of the sharp cliffs that overlook the Smoking Sea. The steps are perilous, forcing us to keep a very slow pace. Finally, we reach a small cave with smoke pouring out of it.\n\nAs I step into the dimly lit space, I am greeted by stone figures, huddled together as if for warmth. #italic No, for protection!#!\n\nThis is no cave; it is a tomb! As I turn to exit, I feel a rocky grip on my leg. One of the stone bodies has grabbed a hold of me, and a sudden sharp pain tears through my calf. As I crumple to the ground, I feel another stone hand on my arm, then my back, then my neck..."
 agot_sailing.3904.a:0 "[ROOT.Char.Custom('Scream')]"
 ship_sunk:0 "Your ship is lost at Valyria"
 ship_sunk_bell:0 "Your Diving Bell is lost with your ship"

 agot_sailing.3905.t:0 "A Treasure in the Ruins"
 agot_sailing.3905.desc:0 "I carefully follow [host.GetTitledFirstNameNicknamed] as we leave the ship, setting foot on the shore of Valyria. A land not visited for hundreds of years, not since the Doom of Valyria, not since [GetScriptedCharacterByHistoryID('Varezys_1').GetName] attempted to retake the land and name himself Emperor.\n\nAs I come ashore, I can see the peak of the volcano that shaped this island as it pierces the sky. We all follow [host.GetFirstNameNoTooltip] through the ruins as [host.GetSheHe] spots the path forward. As [host.GetSheHe] reaches the end of the broken stone stairs, [host.GetSheHe] issues an order to search around the ruin for whatever relics we can uncover.\n\nAs I step forward to begin my search, I see we are in one of the most intact ruins of an old Valyrian palace, beautiful even as smoke still emanates from it.\n\nTime passes as I dig through the rubble until I find it — a [newest_found_artifact.GetName].\n\nAn ancient, precious Valyrian artifact resting beneath some rubble, just waiting for me to claim it... to claim my precious..."
 agot_sailing.3905.a:0 "A relic of Old Valyria!"

 agot_sailing.3938.t:0 "Perilous Island"
 agot_sailing.3938.desc:0 "I step onto the rocky shore of the island our leader has chosen to explore. An uneasy feeling accompanies our party as we begin to search for a way to reach the scorched ruins that can be seen atop the nearby cliffs.\n\nAfter about an hour has passed, we come across a small pathway that seems to lead steadily upward across broken steps of dark stone. Following the path, we finally reach the ruins. This may once have been a palace, or some other building erected by the Valyrians in their days of glory. Now, nothing but bleak stonework remains.\n\nFrom the corner of my eye, I spot movement, but as I begin to turn around, it is already too late. Cold, strong hands grip my neck with unnatural strength, and the last thing I hear before all goes black is a horrible hissing sound..."
 agot_sailing.3938.a:0 "Urghh—"
 agot_sailing.3938.a.tt:0 "The expedition was a failure, and everyone is lost at Valyria, never seen again"

 agot_sailing.3906.t:0 "Ransacking the Ruins"
 agot_sailing.3906.desc:0 "[candle_store.GetName] wasn't enough! Search the ruins and leave no stone unturned. Find something more valuable!\n\nI order the crew out, hoping to salvage something else of great worth.\n\nThe ruins continue to smoke around us; the wreckage the Doom caused is immense, and I will be surprised if there are many things left here. But this place is too dangerous to visit often, so we must take what we can while we are here and then return home.\n\nWho knows what might be lurking in this hellscape? The crew must hurry."
 agot_sailing.3906.a:0 "Leave no stone unturned!"

 agot_sailing.3907.t:0 "The Trip Home"
 agot_sailing.3907.desc_good:0 "The voyage to Old Valyria was a wondrous success, and the end of our journey is met with clear skies and fair winds. The horrors I'd dreamt of were just that: dreams.\n\nAs we make our way home, I feel a slight tickle in my belly. #italic Aha! I haven't eaten in nearly a day!#!"
 agot_sailing.3907.desc_bad:0 "The voyage to Old Valyria was a wondrous success, but the end of our journey is met with dark skies and unpleasant winds. The horrors I'd dreamt of may have been more than dreams.\n\nAs we make our way home, I feel a slight tickle in my belly. Then a gnawing, almost as though my innards are attempting to escape my body.\n\nI notice sweat dripping from my brow, and I swear the skin on my arm wiggles just for an instant. I begin to peel my clothing, down to my smallclothes, but the heat exuding from my insides is too strong. #italic I'm burning up!#!\n\nI clutch my belly, only to feel a strange writhing under the skin. I open my mouth to scream, but only smoke pours out."
 agot_sailing.3907.a_good:0 "Where are those lemon cakes I stashed away?"
 agot_sailing.3907.a_bad:0 "So the tales of fire worms are true?!"

 agot_sailing.3920.t:0 "$agot_sailing.3101.t$"
 agot_sailing.3920.desc:0 "After poring over [host.GetHerHis] nautical charts and notes, [host.GetTitledFirstNameNicknamed] calls forth: "We sail past the lands of the Free Cities, toward Slaver's Bay, then take a bearing of 260 degrees into the Smoking Sea!"\n\nAny of those who doubted [host.GetHerHis] wits breathe a heavy sigh of relief."
 agot_sailing.3920.a:0 "Good work, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"

 agot_sailing.3921.t:0 "$agot_sailing.3102.t$"
 agot_sailing.3921.desc:0 "After poring over [host.GetHerHis] nautical charts and notes, [host.GetTitledFirstNameNicknamed] seems puzzled. Figuring out a likely location for good anchorage within the Fourteen Flames is no small task, and it would seem [host.GetSheHe] is not up to it.\n\nSlowly, [first_mate.GetTitledFirstName] places a hand on [host.GetHerHis] shoulder. "Maybe... we'll find it another time?""
 agot_sailing.3921.a:0 "Such a pity, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]..."

 agot_sailing_kraken_spawn:0 "As we continue sailing, a subtle sense of disquiet settles upon the prow. Far off, I see something shifting below the surface of the sea... impossibly large, and growing larger in its approach.\n\n#EMP A mighty kraken!#! Legends have told of such mythical creatures, but most consider them tall tales of wet nurses and septas."

 agot_sailing.3922.t:0 "$agot_sailing.3200.t$"
 agot_sailing.3922.desc:0 "$agot_sailing_kraken_spawn$\n\n[host.GetTitledFirstNameNicknamed] rushes forth, shouting a clear directive: we must retreat, lest we lose our lives!"
 agot_sailing.3922.a:0 "This voyage is done."

 agot_sailing.3923.t:0 "$agot_sailing.3200.t$"
 agot_sailing.3923.desc:0 "$agot_sailing_kraken_spawn$\n\n[host.GetTitledFirstNameNicknamed] lets out a roar; this moment was planned for. [host.GetSheHe|U] raises the krakenhorn to [host.GetHerHis] lips, letting out a deep, resonant drone. The sound seems to shake the very deck of the ship, and I see those around me grab their ears in pain.\n\nThe kraken, however, seems unfazed. In an instant, a raised tentacle comes down on [host.GetFirstNameNoTooltip] with a crack, cutting off the horn's sound with a splat. I cannot break my gaze as the tentacle lifts from the ruined remains of our captain, now just a clumpy puddle of blood, bone, and sinew. Alas, I don't even notice the tentacle now hovering above me..."
 agot_sailing.3923.a:0 "Oh... oh no!"

 agot_sailing.3924.t:0 "$agot_sailing.3200.t$"
 agot_sailing.3924.desc:0 "$agot_sailing_kraken_spawn$\n\n[host.GetTitledFirstNameNicknamed] calls the attack, and we nock our bows, unleashing a torrent of arrows at the beast. A piercing wail cuts through the air, sending a chill through my bones... then nothing.\n\n[host.GetFirstNameNoTooltip] has done it! [host.GetSheHe|U] slew the kraken!"
 agot_sailing.3924.desc_horn:0 "$agot_sailing_kraken_spawn$\n\nMyself and the rest of the crew retreat behind [host.GetTitledFirstNameNicknamed], as [host.GetSheHe] brings the krakenhorn to [host.GetHerHis] lips and unleash its deep, thunderous cry. The sound rolls across the sea, and moments later the great beast begins to withdraw, vanishing beneath the depths from whence it came. There can be no doubt now that the horn carries true power.\n\nMyself and the rest of the crew erupts into ecstatic cheers, some of the others breaking open hidden stashes of spirits in celebration."
 agot_sailing.3924.a:0 "Get the [host.GetWomanMan] a drink!"

 agot_sailing.3925.t:0 "$agot_sailing.3200.t$"
 agot_sailing.3925.desc:0 "$agot_sailing_kraken_spawn$\n\n[host.GetTitledFirstNameNicknamed] calls the attack, and we nock our bows. But the beast easily shrugs off the arrows. The beast is upon us, plucking crewmates from the deck like lemon cakes from a tray.\n\nA tentacle wraps around my hand with an unfathomable strength, crushing my fingers with a sickening crack. The ruin of my hand is trapped in the monster's grip as it lifts me toward its mouth..."
 agot_sailing.3925.a:0 "No... not like this!"
 agot_sailing.3925.a.success.tt:0 "You somehow manage to escape with your life intact"
 agot_sailing.3925.a.failure.tt:0 "@death_icon! You are swallowed whole, never to be seen again"
 agot_sailing.3925.b:0 "If I could only free myself..."
 agot_sailing.3925.b.success.tt:0 "You escape with your life intact, but without your hand"
 agot_sailing.3925.b.failure.tt:0 "@death_icon! You are swallowed mostly whole, but maybe your hand will float away"

 agot_sailing.3926.t:0 "$agot_sailing.3300.t$"
 agot_sailing.3926.desc:0 "We have long been at sea, and strong headwinds have meant our progress is little and less than we had hoped. What's worse, provisions are running dangerously low...\n\n[host.GetTitledFirstNameNicknamed] has clearly taken note; to avoid starvation before we reach our destination, [host.GetSheHe] has implemented careful rationing of supplies. The astute calculations seem to pay off — though we are all hungry, we are still alive."
 agot_sailing.3926.a:0 "Good work, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"
 agot_sailing.3926.a.fatty:0 "But at what cost? Why would [host.GetFirstNameNoTooltip] do this?!"

 agot_sailing.3927.t:0 "$agot_sailing.3300.t$"
 agot_sailing.3927.desc:0 "We have long been at sea, and strong headwinds have meant our progress is little and less than we had hoped. What's worse, provisions are running dangerously low...\n\n[host.GetTitledFirstNameNicknamed] has attempted to implement strict rations, but [host.GetHerHis] calculations seem to be off... Around us, nothing but sea. On board, no food — only our slow cries as the hunger pangs consume us."
 agot_sailing.3927.a:0 "Please, just a bite..."

 agot_sailing.3928.t:0 "$agot_sailing.3300.t$"
 agot_sailing.3928.desc:0 "We have long been at sea, and strong headwinds have meant our progress is little and less than we had hoped. What's worse, provisions are running dangerously low...\n\n[host.GetTitledFirstNameNicknamed] overheard the crew's protests, but dealt with the loudest among us harshly. Morale has taken a hit, and the sound of rumbling bellies has become commonplace — but at least we live for the journey ahead."
 agot_sailing.3928.a:0 "Good work, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"

 agot_sailing.3929.t:0 "$agot_sailing.3304.t$"
 agot_sailing.3929.desc:0 "We have long been at sea, and strong headwinds have meant our progress is little and less than we had hoped. What's worse, provisions are running dangerously low...\n\n[mutiny_leader.GetTitledFirstNameNicknamed] has sown discord throughout the journey, and now [mutiny_leader.GetHerHis] time has come. As [host.GetTitledFirstNameNicknamed] attempts to convince the crew of the need for harsh rations, [mutiny_leader.GetFirstNameNoTooltip] has another idea...\n\nAfter a brief struggle, [host.GetFirstName] is forced to walk the plank!"
 agot_sailing.3929.a:0 "Goodbye, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]..."

 agot_sailing.3930.t:0 "$agot_sailing.3400.t$"
 agot_sailing.3930.desc:0 "The dream came again last night. #italic Fire that unmakes. Stone melting like tallow, the sea boiling to steam, dragons screaming as their own flame consumes them. And the sound — gods, the sound — like the world itself splitting open.#!\n\n#EMP Valyria's Doom!#!\n\nI see it in every man's eyes. The fear sits in my chest like a stone. But the captain doesn't call us cowards. [host.GetSheHe|U] listens.\n\n"What haunts you is memory, not prophecy. Old terror, passed down until it takes root in our bones," [host.GetTitledFirstName] calmly imparts, and the madness loosens."
 agot_sailing.3930.a:0 "The nightmares may return. But for now, we row."

 agot_sailing.3931.t:0 "$agot_sailing.3400.t$"
 agot_sailing.3931.desc:0 "The dream came again last night. #italic Fire that unmakes. Stone melting like tallow, the sea boiling to steam, dragons screaming as their own flame consumes them. And the sound — gods, the sound — like the world itself splitting open.#!\n\n#EMP Valyria's Doom!#!\n\nI see it in every man's eyes. The fear sits in my chest like a stone. But the captain won't stop. Even after we've told [host.GetHerHim] — #italic begged#! [host.GetHerHim] — [host.GetTitledFirstName] keeps insisting we press on, talking about charts and distances like numbers can hold back the Doom of Valyria, like logic matters when the gods themselves have sent us a warning.\n\n"We have to do this," [first_mate.GetFirstName] says quietly. "For [host.GetHerHis] own sake." Moments later, we throw the captain into [host.GetHerHis] cabin. The lock turns, but through the wood, I hear [host.GetHerHim] shouting, cursing us, promising retribution."
 agot_sailing.3931.a:0 "Better [host.GetHerHis] fury than [host.GetHerHis] funeral pyre."

 agot_sailing.3932.t:0 "$agot_sailing.3501.t$"
 agot_sailing.3932.desc:0 "Good winds, calm waves, and clear skies have been a welcome sight as we near where lost Valyria lies. But that all changes in an instant.\n\nA towering thundercloud rolls toward our ship, followed by another, and another, and another. Their formation almost seems pointed at our position. #EMP A sword of storms#!, it seems!\n\n[host.GetTitledFirstNameNicknamed] jumps forth, barking orders through cracks of thunder and a torrential downpour. "Unfurl the sails, we are almost there!" I hear [host.GetHerHim] shout, and ahead I see [host.GetSheHe] is correct..."
 agot_sailing.3932.a:0 "Could it be?"

 agot_sailing.3933.t:0 "$agot_sailing.3502.t$"
 agot_sailing.3933.desc:0 "Good winds, calm waves, and clear skies have been a welcome sight as we near where lost Valyria lies. But that all changes in an instant.\n\nA towering thundercloud rolls toward our ship, followed by another, and another, and another. Their formation almost seems pointed at our position. #EMP A sword of storms#!, it seems!\n\n[host.GetTitledFirstNameNicknamed] jumps forth, barking orders through cracks of thunder and a torrential downpour. But the orders cannot keep up with the strength of the tempest around us.\n\nThe last thing I hear is the all-consuming rumbling of the tumultuous waters all around me...\n\nAnd then there is darkness."
 agot_sailing.3933.a:0 "N-ngh..."

 agot_sailing.3934.t:0 "$agot_sailing.3900.t$"
 agot_sailing.3934.desc:0 "A wild grin breaks upon [host.GetHerHis] face as [host.GetTitledFirstNameNicknamed] spots the broken islands at last, a slightly hysterical laugh bubbling free. We've done it. The struggles were great, and many doubted it was even possible — but we did it. This must assuredly be what remains of the Fourteen Flames of Valyria.\n\nAs we get close, though, a question is murmured... do we attempt to land?\n\nOn all sides, sheer cliff faces appear to prevent any easy landing — and smoke rises all around, from water and rock alike. To land upon it is to risk calling doom on ourselves — just like the doom that befell the dragonlords of old."
 agot_sailing.3934.a:0 "What will [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )] do?"

 agot_sailing.3935.t:0 "$agot_sailing.3901.t$"
 agot_sailing.3935.desc:0 "[host.GetTitledFirstNameNicknamed] has decided against attempting to land on any of the broken islands, their high cliffs and rocky shores dissuading [host.GetHerHim] from going any closer. Yet even still, we push the ship as near as we can, sailing closer and closer. As we do so, the full extent of Valyria's Doom becomes visible. Broken towers and pillars, utterly ruined cities and dwellings are seen through the ever-present smoke. And yet, even in such a terrible state, one can still discern how majestic the Fourteen Flames must once have been.\n\nAt last, after having circled it many times over, we finally turn home, contented. We have found what others thought a myth, braved dangers beyond peer, and beheld the last remnant of long-lost Valyria. None can doubt [host.GetFirstNamePossessiveNoTooltip] skill or renown."
 agot_sailing.3935.a:0 "Very impressive, [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )]!"

 agot_sailing.3936.t:0 "$agot_sailing.3907.t$"
 agot_sailing.3936.desc_good:0 "The voyage to Old Valyria was a wondrous success, and the end of our journey is met with clear skies and fair winds. The horrors we'd dreamt of were just that: dreams.\n\nAs we make our way home, I feel a slight tickle in my belly. #italic Aha! I haven't eaten in nearly a day!#!"
 agot_sailing.3936.desc_bad:0 "The voyage to Old Valyria was a wondrous success, but the end of our journey is met with dark skies and unpleasant winds. The horrors we'd dreamt of may have been more than dreams.\n\nAs we make our way home, [host.GetTitledFirstName] complains of a slight tickle in [host.GetHerHis] belly. Then [host.GetSheHe] mentions a gnawing feeling, almost as though [host.GetHerHis] innards were attempting to escape [host.GetHerHis] body.\n\nI notice sweat dripping from [host.GetHerHis] brow, and I swear the skin on [host.GetHerHis] arm wiggles just for an instant. As [host.GetSheHe] begins to peel [host.GetHerHis] clothing, down to [host.GetHerHis] smallclothes, I can feel heat exuding from [host.GetHerHim] like a furnace. #italic [host.GetSheHe|U] is burning up!#!\n\n[host.GetFirstNameNoTooltip] clutches [host.GetHerHis] belly, but when [host.GetSheHe] opens [host.GetHerHis] mouth to scream, only smoke pours out...\n\nWhat cruel fate awaits the rest of us? My own skin begins to crawl."
 agot_sailing.3936.desc_bad_two:0 "The voyage to Old Valyria was a wondrous success, but the end of our journey is met with dark skies and unpleasant winds. The horrors we'd dreamt of may have been more than dreams.\n\nAs we make our way home, a scream is heard from the captain's quarters. I rush in, only to find [host.GetTitledFirstName] writhing on the floor in agony. As I approach, I pause... The heat from [host.GetHerHis] body feels like a blazing furnace, though the room is damp and cold. And worse! Beneath [host.GetHerHis] skins, I swear I see wiggling masses moving to and fro.\n\nI jolt away from [host.GetHerHim]; it's too late to be of any comfort. And now I have my own gnawing feeling along my insides. The room, once cold, now feels afire.\n\nI burst out onto the prow of the ship, stripping clothes as I run. The squirming I'd seen under [host.GetFirstNamePossessiveNoTooltip] skin is now clearly visible on my own. And the pain... #EMP How it burns!#!\n\nI clutch my belly, but when I open mouth to scream, only smoke pours out..."
 agot_sailing.3936.desc_cancelled:0 "Though the voyage to Old Valyria was unsuccessful, the end of our journey is met with clear skies and fair winds. Perhaps the horrors are all behind us.\n\nBut as I wander the deck, I feel a slight tingle in my belly... #italic Aha! I haven't eaten in nearly a day!#!"
 agot_sailing.3936.a_good:0 "$agot_sailing.3907.a_good$"
 agot_sailing.3936.a_bad:0 "$agot_sailing.3907.a_bad$"

 agot_sailing.3937.t:0 "$agot_sailing.3903.t$"
 agot_sailing.3937.desc:0 "I stand on the ship's deck as our course takes us by the broken, steaming cliffs that dot the Smoking Sea. In my mind, I can already see the many treasures we are sure to discover hidden within the ruins of Valyria of old. Gold, gems, and of course the priceless Valyrian steel... Soon, all of them will be ours...\n\nA loud #italic crash#! snaps me back to reality, and suddenly, the skies are filled with ash and fire. A rain of burning rocks engulfs the ship, and quickly, the flames begin to spread. As I look on in terror, the sails catch fire, and the blaze leaps from the mast onto the deck.\n\nAmidst screams of panic and pain, unbearable heat rises all around me. Without thinking, I leap into the raging waters below, only to see the ship founder before my very eyes. I paddle frantically to get away from the wreckage..."
 agot_sailing.3937.a:0 "$agot_sailing.3903.a$"

 agot_sailing.5500.t:0 "Hunting a Sea-Creature"
 agot_sailing.5500.desc:0 "As our vessel sails further into the wide openness of the ocean, [first_mate.GetFirstName] approaches me. "We're keeping all eyes out for any denizens of the ocean, captain. As soon as someone spots something, you'll be the first to be informed."\n\nI nod, feeling my anticipation rise. What sort of creature will we encounter today, I wonder?"
 agot_sailing.5500.desc.a:0 "Leaving our previous encounter behind, I instruct the crew to continue to keep a careful watch on the horizon. We will find another sea creature, of that I am sure..."
 agot_sailing.5500.a:0 "Keep your wits about you, men!"
 agot_sailing.5500.a.tt:0 "You will look for a #high sea creature#! to hunt"

 agot_sailing.5501.t:0 "Prey Sighted"
 agot_sailing.5501.desc.a:0 "It does not take long for a call to go out. "Turtle sighted, captain!"\n\nSwimming lazily next to our vessel, a large green #high sea turtle#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.a:0 "This should be easy..."
 agot_sailing.5501.a.tt:0 "You decide to hunt the #high sea turtle#!"

 agot_sailing.5501.desc.b:0 "It does not take long for a call to go out. "Seal sighted, captain!"\n\nSwimming lazily next to our vessel, a rotund grey #high seal#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.b:0 "Go get that seal!"
 agot_sailing.5501.b.tt:0 "You decide to hunt the #high seal#!"

 agot_sailing.5501.desc.c:0 "It does not take long for a call to go out. "Dolphin sighted, captain!"\n\nSwimming excitedly next to our vessel, a slender #high white dolphin#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.c:0 "Let's hunt the dolphin."
 agot_sailing.5501.c.tt:0 "You decide to hunt the #high white dolphin#!"

 agot_sailing.5501.desc.d:0 "It does not take long for a call to go out. "Walrus sighted, captain!"\n\nLounging lazily on a rocky islet near our vessel, a massive #high walrus#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.d:0 "Its tusks will fetch a good price!"
 agot_sailing.5501.d.tt:0 "You decide to hunt the #high walrus#!"

 agot_sailing.5501.desc.e:0 "It does not take long for a call to go out. "Orca sighted, captain!"\n\nSwimming speedily next to our vessel, an imposing #high orca#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.e:0 "Bring me my harpoon!"
 agot_sailing.5501.e.tt:0 "You decide to hunt the #high orca#!"

 agot_sailing.5501.desc.f:0 "It does not take long for a call to go out. "Whale at starboard, captain!"\n\nJust then, a massive eruption of water is blown into the air and the whale's large form bursts through the waves. It is a fully grown #high humpback whale#!. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.f:0 "Time to hunt, men!"
 agot_sailing.5501.f.tt:0 "You decide to hunt the #high humpback whale#!"

 agot_sailing.5501.desc.g:0 "It does not take long for a call to go out. "Whale at starboard, captain!"\n\nJust then, a massive eruption of water is blown into the air and the whale's large form bursts through the waves. It is a fully grown #high sperm whale#!. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.g:0 "This will be worth a fortune!"
 agot_sailing.5501.g.tt:0 "You decide to hunt the #high sperm whale#!"

 agot_sailing.5501.desc.h:0 "It does not take long for a call to go out. "Whale straight ahead, captain!"\n\nJust then, a massive eruption of water is blown into the air and the whale's large form bursts through the waves. It is a massive #high blue whale#!, a true leviathan. "Do we go for it, captain?" [first_mate.GetFirstName] asks."
 agot_sailing.5501.h:0 "A big one! Let's get him!"
 agot_sailing.5501.h.tt:0 "You decide to hunt the #high blue whale#!"

 agot_sailing.5501.desc.i:0 "After a few hours of sailing, I am startled by cries of fear and shock. "Kraken! Kraken!" the men shout, some already running in fear.\n\nIt seems that our prey has found us instead of us finding it. The water behind our ship churns, soon revealing the scaled head of a fully grown #high kraken#!, tentacles thrashing violently around it.\n\n[first_mate.GetFirstName] runs up to me. "What's it going to be, captain? Do we fight? Or attempt to escape?""
 agot_sailing.5501.i:0 "I will not run! Get ready for a fight, men!"
 agot_sailing.5501.i.tt:0 "You decide to hunt the #high kraken#!"

 agot_sailing.5501.desc.j:0 "It does not take long for a call to go out. "Whale at starboard, captain!"\n\nJust then, a massive eruption of water is blown into the air and the whale's large form bursts through the waves. The ship is rocked by a powerful blow, knocking us to our feet. As I struggle to get up, [first_mate.GetFirstName] crawls up to me, face as white as a sheet.\n\n"I—it's the White Dread, captain!" [first_mate.GetSheHe] stammers. I've heard the tales: a white whale of sheer cunning and malice that is said to haunt the waters of the Shivering Sea. It has sunk many ships, and now... it has found us."

 agot_sailing.5501.desc.k:0 "For a long time, the sea remains silent, as if the ocean itself was holding its breath in anticipation. I am restless; pacing up and down near the ship's helm. Then, at last, the lookout calls out. "Whale sighted!"\n\nI rush forward, and my eyes widen in disbelief. It has found us. The White Dread approaches rapidly, plowing through the waves on a direct collision course with our ship.\n\nI close my eyes for a split second before grabbing my harpoon. "Get ready for a fight, men!" I yell, as the white whale dives and begins its vicious attack."

 agot_sailing.5501.reroll:0 "\n\nUnfortunately it has gotten too late in the day to continue searching for new prey, so this will have to do"

 agot_sailing.5501.j:0 "Today, the White Dread breathes its last!"
 agot_sailing.5501.j.tt:0 "You decide to hunt the #high White Dread#!"

 agot_sailing.5501.k:0 "There must be other creatures out there."
 agot_sailing.5501.k.tt:0 "You turn the ship around to look for prey elsewhere"
 agot_sailing.5501.l:0 "We have to get out of here!"

 sailing.hunt.success:0 "Dragging your prize onboard your ship, you set course to return to port"
 sailing.hunt.failure.tt:0 "You miss your shot"
 sailing.hunt.failure:0 "Your prey dives away, vanishing into the depths"

 agot_sailing.5502.t:0 "Hunting a Sea Turtle"
 agot_sailing.5502.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the sea turtle swimming beside the ship.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5502.a:0 "Ready, aim, and..."
 agot_sailing.5502.a.success:0 "You slay the sea turtle"

 agot_sailing.5503.t:0 "Hunting a Seal"
 agot_sailing.5503.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the gray seal swimming beside the ship.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5503.a:0 "Ready, aim, and..."
 agot_sailing.5503.a.success:0 "You slay the seal"

 agot_sailing.5504.t:0 "Hunting a Dolphin"
 agot_sailing.5504.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the slender dolphin swimming beside the ship.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5504.a:0 "Ready, aim, and..."
 agot_sailing.5504.a.success:0 "You slay the dolphin"

 agot_sailing.5505.t:0 "Hunting a Walrus"
 agot_sailing.5505.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the large walrus lounging on a nearby islet.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5505.a:0 "Ready, aim, and..."
 agot_sailing.5505.a.success:0 "You slay the walrus"

 agot_sailing.5506.t:0 "Hunting an Orca"
 agot_sailing.5506.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the fearsome orca prowling the waters near the ship.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5506.a:0 "Ready, aim, and..."
 agot_sailing.5506.a.success:0 "You slay the orca"

 agot_sailing.5507.t:0 "Hunting a Humpback Whale"
 agot_sailing.5507.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the gray humpback whale plowing through the waters near the ship.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5507.a:0 "Ready, aim, and..."
 agot_sailing.5507.a.success:0 "You slay the humpback whale"

 agot_sailing.5508.t:0 "Hunting a Sperm Whale"
 agot_sailing.5508.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the mighty black sperm whale crashing through the water's surface near the ship.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5508.a:0 "Ready, aim, and..."
 agot_sailing.5508.a.success:0 "You slay the sperm whale"

 agot_sailing.5509.t:0 "Hunting a Blue Whale"
 agot_sailing.5509.desc:0 "I stand on the deck, harpoon in hand. The crew watches me in anticipation as I take aim at the majestic blue whale swimming just beneath the ocean's surface near the ship.\n\n"Steady now," I think to myself, tightening my grip on the weapon's shaft."
 agot_sailing.5509.a:0 "Ready, aim, and..."
 agot_sailing.5509.a.success:0 "You slay the blue whale"

 agot_sailing.5510.t:0 "Hunting a Kraken"
 agot_sailing.5510.desc:0 "Utter chaos erupts around the ship as the fearsome kraken begins its assault. Sailors scream in fear, some casting themselves aside in an attempt to flee the creature's wrath. Its mighty tentacles crash against the ship's hull, sending shockwaves through the vessel that throw many of my crew to the deck.\n\nArchers harry the beast, distracting and enraging it further. Its beaked head rears up in wrath, rapidly approaching the ship's bow, where I now stand, harpoon in hand. I tighten my grip on the weapon's shaft in the seconds that remain before impact. This will be the only chance I get, and I have to make it count."
 agot_sailing.5510.a:0 "Your end has come, vile serpent!"
 agot_sailing.5510.a.success:0 "You slay the kraken"
 agot_sailing.5510.a.failure:0 "Your harpoon is swatted aside by the kraken's tentacles"
 agot_sailing.5510.b:0 "Blow the horn!"
 agot_sailing.5510.b_tt:0 "You blow the horn in hopes of distracting the kraken"

 agot_sailing.5511.t:0 "Hunting the White Dread"
 agot_sailing.5511.desc:0 "Another shockwave tears through the ship. Its hull cracked, the vessel begins to list. Frantically, I attempt to spot the beast, but it is too fast. Diving deep beneath the ship, it slams its square forehead into our vessel from below, sending crewmen flying. The White Dread emerges from the waves before the ship, locking eyes with me.\n\nI recognize its cunning, and shivers run down my spine. This is a foe unlike any found within Westerosi seas. And yet, the White Dread has exposed itself, if only for a moment, by daring to mock me. Hastily, I ready my harpoon just as the beast roars in triumph and prepares for yet another assault..."
 agot_sailing.5511.desc.a:0 "I feel my grip tighten around my harpoon, my knuckles turning white. "You will #italic not#! get away this time, beast," I mutter to myself just as another shockwave rocks the entire ship, sending many crewmates flying.\n\nBut my footing remains steady. I am filled with determination to slay this monster and end its vile existence once and for all.\n\nI arrive at the ship's helm just in time to see the White Dread rear up in triumph before me. It locks eyes with me, challenging me. #italic Mocking#! me. Anger washes over me as I raise my arm and take aim..."
 agot_sailing.5511.a:0 "I have you now, beast..."
 agot_sailing.5511.a.success:0 "You slay the White Dread!"
 agot_sailing.5511.a.failure:0 "The White Dread evades your harpoon"

 agot_sailing.5512.t:0 "The Curse of the White Dread"
 agot_sailing.5512.desc:0 "Our ship limps across the ocean, battered and barely staying afloat. The White Dread has vanished into the fog that suddenly arose.\n\nI find myself unable to speak, still reeling from the encounter with that vicious whale. I can still feel its piercing gaze upon me. Watching me. Waiting for me. It is out there somewhere, revelling in the destruction it has caused. Anger rises within me, and I clench my fists in helpless rage.\n\nThis can't stand!"
 agot_sailing.5512.a:0 "I #italic will#! end you, beast!"
 agot_sailing.5512.b:0 "No, I must... I must let go..."
 agot_sailing.5512.c:0 "Failure is a great teacher..."

 agot_sailing.5600.t:0 "Looking for a Creature"
 agot_sailing.5600.desc:0 "As our vessel sails farther into the open ocean, I overhear [host.GetTitledFirstName] and [first_mate.GetFirstName] talking. "We're keeping watch for any denizens of the deep, captain," [first_mate.GetFirstName] explains. "As soon as someone spots something, you'll be the first to know."\n\nI turn toward the serene ocean and wonder what sort of creature we will encounter today.\n\nA while later, I hear a commotion from the main mast — the lookout has spotted something!"
 agot_sailing.5600.a:0 "The hunt is on!"

 agot_sailing.5601.t:0 "Success!"
 agot_sailing.5601.desc.a:0 ""Turtle sighted, captain!"\n\nSwimming eagerly beside our vessel, a large green #high sea turtle#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the turtle, and...\n\n#italic Whack!#! A direct hit! Soon enough, the turtle's green carcass is hauled aboard."
 agot_sailing.5601.desc.b:0 ""Seal sighted, captain!"\n\nSwimming lazily beside our vessel, a rotund #high gray seal#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the seal, and...\n\n#italic Whack!#! A direct hit! Soon enough, the seal's gray carcass is hauled aboard."
 agot_sailing.5601.desc.c:0 ""Dolphin sighted, captain!"\n\nSwimming excitedly beside our vessel, a slender #high white dolphin#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the dolphin, and...\n\n#italic Whack!#! A direct hit! Soon enough, the dolphin's white carcass is hauled aboard."
 agot_sailing.5601.desc.d:0 ""Walrus sighted, captain!"\n\nLounging lazily on a rocky islet near our vessel, a massive #high walrus#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the walrus, and...\n\n#italic Whack!#! A direct hit! Soon enough, the walrus's bulbous carcass is hauled aboard."
 agot_sailing.5601.desc.e:0 ""Orca sighted, captain!"\n\nSwimming swiftly beside our vessel, an imposing #high orca#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the orca, and...\n\n#italic Whack!#! A direct hit! Soon enough, the orca's muscular carcass is hauled aboard."
 agot_sailing.5601.desc.f:0 ""Whale at starboard, captain!"\n\nJust as the call goes out, a massive plume of water erupts into the air and the whale's enormous form bursts through the waves. It is a fully grown #high humpback whale#!. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the whale, and...\n\n#italic Whack!#! A direct hit! But that alone is not enough to slay such a creature. Other sailors ready their projectiles, scoring additional hits on the bleeding whale. After a long struggle, the humpback whale's massive carcass is finally hauled aboard."
 agot_sailing.5601.desc.g:0 ""Whale straight ahead, captain!"\n\nJust as the call goes out, a massive plume of water erupts into the air and a whale's enormous form bursts through the waves. It is a fully grown #high black sperm whale#!. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the whale, and...\n\n#italic Whack!#! A direct hit! But that alone is not enough to slay such a creature. Other sailors ready their projectiles, scoring additional hits on the bleeding whale. After a long struggle, the sperm whale's mighty carcass is finally hauled aboard."
 agot_sailing.5601.desc.h:0 ""Whale straight ahead, captain!"\n\nJust as I hear the call go out, a massive plume of water erupts into the air and the whale's mighty form bursts through the waves. It is a massive #high blue whale#!, a true leviathan. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the whale, and...\n\n#italic Whack!#! A direct hit! But that alone is not enough to slay such a creature. Other sailors ready their projectiles, scoring additional hits on the bleeding whale. After a long struggle, the blue whale's giant carcass is finally hauled aboard."
 agot_sailing.5601.desc.i:0 "After a few hours of sailing, I am startled by cries of fear and shock. "Kraken! A kraken has come!" the men shout, some already fleeing in terror.\n\nIt seems our prey has found us instead. The water behind our ship churns violently, soon revealing the scaled head of a truly monstrous #high kraken#!, its slimy beak snapping with a hideous howl.\n\nI see [first_mate.GetFirstName] rush up to [host.GetTitledFirstNameNicknamed]. "What's it going to be, captain? Do we fight, or attempt to escape?"\n\n"I will not run!" [host.GetTitledFirstNameNoTooltip] exclaims. "Prepare yourselves, men!"\n\nThe kraken is a terrifying monster, and many sailors are struck by its tentacled arms and dragged screaming into the depths. Just as I begin to fear the ship might be lost, a harpoon pierces the creature's eye, vanishing completely into the soft bulk of its bulbous flesh. It shrieks — louder than ever before. And then... it goes limp. At last, the beast is slain."
 agot_sailing.5601.desc.i_two:0 "After a few hours of sailing, I am startled by cries of fear and shock. "Kraken! A kraken has come!" the men shout, some already fleeing in terror.\n\nIt seems our prey has found us instead. The water behind our ship churns violently, soon revealing the scaled head of a truly monstrous #high kraken#!, its slimy beak snapping with a hideous howl.\n\nI see [first_mate.GetFirstName] rush up to [host.GetTitledFirstNameNicknamed]. "What's it going to be, captain? Do we fight, or attempt to escape?"\n\n"I will not run!" [host.GetTitledFirstNameNoTooltip] exclaims. "Prepare yourselves, men!"\n\nThe kraken is a terrifying monster, and many sailors are struck by its tentacled arms and dragged screaming into the depths. [host.GetTitledFirstNameNoTooltip] blows his krakenhorn, the thunderous call distracting the great beast just long enough for a harpoon to pierce the creature's eye, vanishing completely into the soft bulk of its bulbous flesh. It shrieks — louder than ever before. And then... it goes limp. At last, the beast is slain."
 agot_sailing.5601.desc.j:0 "The hunt goes poorly. No creature has been sighted for hours, and I am beginning to grow bored. Just then, a startled shout rings out behind me. "Whale at starboard, captain!"\n\nIn an instant, a massive plume of water erupts into the air and the whale's enormous form bursts through the waves. The ship is rocked by a tremendous blow, knocking us off our feet. As I struggle to rise, [first_mate.GetFirstName] crawls toward me, face as white as a sheet.\n\n"I—it's the White Dread, the... the Terror of the Seas!" [first_mate.GetSheHe] stammers. I've heard the tales: a white whale of terrible cunning and malice said to haunt these waters like a gargantuan ghost. It has sunk many ships, and now... it has found us.\n\n"Make ready to fight!" [host.GetTitledFirstNameNicknamed] shouts, grabbing a harpoon. The ship takes another hit, and I am thrown into a barrel of provisions lashed to the deck. As I regain my footing, I see the White Dread rear up with a deafening howl of pain — somehow, from somewhere, a harpoon has pierced its heart. We have ended a legend today."
 agot_sailing.5601.desc.k:0 "For a long while, the sea remains silent, as though the ocean itself were holding its breath in anticipation. I pace restlessly near the ship's helm. Then, at last, the lookout cries out, "Whale sighted!"\n\nI rush forward, and my eyes widen in disbelief. It has found us once again. The White Dread approaches rapidly, plowing through the waves on a direct collision course with our ship.\n\nI close my eyes for a split second before grabbing one of the harpoons. This time, I will not sit idly by, I swear, as the white whale dives and begins its vicious assault.\n\nThe ship is rocked by a tremendous impact, and I hear wood crack beneath me. My grip tightens around the harpoon as I force myself upright. Gathering my remaining strength, I hurl the weapon at the White Dread, piercing it through the chest as it rears up for another attack. It lets out a deafening howl of pain... and then, thrashing all the while, it dies."
 agot_sailing.5601.a:0 "Well done!"

 agot_sailing.5602.t:0 "Failure..."
 agot_sailing.5602.desc.a:0 ""Turtle sighted, captain!" Swimming eagerly beside our vessel, a large green #high sea turtle#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the turtle, and...\n\n#italic A miss!#! The turtle silently slips beneath the water and is gone."
 agot_sailing.5602.desc.b:0 ""Seal sighted, captain!"\n\nSwimming lazily beside our vessel, a rotund #high gray seal#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the seal, and...\n\n#italic A miss!#! The seal lets out an insulted yowl, dives, and is gone."
 agot_sailing.5602.desc.c:0 ""Dolphin sighted, captain!"\n\nSwimming excitedly beside our vessel, a slender #high white dolphin#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the dolphin, and...\n\n#italic A miss!#! The dolphin lets out a frightened whine, dives, and is gone."
 agot_sailing.5602.desc.d:0 ""Walrus sighted, captain!"\n\nLounging lazily on a rocky islet near our vessel, a massive #high walrus#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the walrus, and...\n\n#italic A miss!#! The walrus lets out an angry howl, dives into the waves, and is gone."
 agot_sailing.5602.desc.e:0 ""Orca sighted, captain!"\n\nSwimming swiftly beside our vessel, an imposing #high orca#! can be seen. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the orca, and...\n\n#italic A miss!#! The orca lets out a startled cry, dives, and is gone."
 agot_sailing.5602.desc.f:0 ""Whale at starboard, captain!"\n\nJust as the call goes out, a massive plume of water erupts into the air and the whale's enormous form bursts through the waves. It is a fully grown #high humpback whale#!. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the whale, and...\n\n#italic A miss!#! The humpback whale turns away from the ship, dives, and is gone."
 agot_sailing.5602.desc.g:0 ""Whale straight ahead, captain!"\n\nJust as the call goes out, a massive plume of water erupts into the air and a whale's enormous form bursts through the waves. It is a fully grown #high black sperm whale#!. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the whale, and...\n\n#italic A miss!#! The sperm whale slaps the side of the ship with its tail, rocking it hard enough to make me stumble. Then it dives, and is gone."
 agot_sailing.5602.desc.h:0 ""Whale straight ahead, captain!"\n\nJust as I hear the call go out, a massive plume of water erupts into the air and the whale's mighty form bursts through the waves. It is a massive #high blue whale#!, a true leviathan. "Do we go for it, captain?" [first_mate.GetFirstName] asks.\n\n[host.GetTitledFirstNameNicknamed] grabs a harpoon, takes aim at the whale, and...\n\n#italic A miss!#! The blue whale reacts swiftly. It turns away from our ship and dives, vanishing from sight."
 agot_sailing.5602.desc.i:0 "After a few hours of sailing, I am startled by cries of fear and shock. "Kraken! A kraken has come!" the men shout, some already fleeing in terror.\n\nIt seems our prey has found us instead. The water behind our ship churns violently, soon revealing the scaled head of a truly monstrous #high kraken#!, its slimy beak snapping with a hideous howl.\n\nI see [first_mate.GetFirstName] rush up to [host.GetTitledFirstNameNicknamed]. "What's it going to be, captain? Do we fight, or attempt to escape?"\n\n"I will not run!" [host.GetFirstName] exclaims. "Prepare yourselves, men!"\n\nThe kraken is a terrifying monster, and many sailors are struck by its tentacled arms and dragged into the depths. Harpoons simply slide off its slimy skin. It will not die! Luckily for us, the kraken finally loses interest and dives, taking a good number of unlucky souls with it and leaving us with nothing to show for it but wounds and a damaged ship."
 agot_sailing.5602.desc.i_two:0 "After a few hours of sailing, I am startled by cries of fear and shock. "Kraken! A kraken has come!" the men shout, some already fleeing in terror.\n\nIt seems our prey has found us instead. The water behind our ship churns violently, soon revealing the scaled head of a truly monstrous #high kraken#!, its slimy beak snapping with a hideous howl.\n\nI see [first_mate.GetFirstName] rush up to [host.GetTitledFirstNameNicknamed]. "What's it going to be, captain? Do we fight, or attempt to escape?"\n\n"I will not run!" [host.GetFirstName] exclaims. "Prepare yourselves, men!"\n\nThe kraken is a terrifying monster, and many sailors are struck by its tentacled arms and dragged into the depths. [host.GetTitledFirstNameNoTooltip] blows his krakenhorn, drawing the beast's attention, but wounded and beset from all sides, the monster's will to survive proves too strong to keep it docile more than a moment. Harpoons simply slide off its slimy skin. It will not die! Luckily for us, the kraken finally loses interest and dives, taking a good number of unlucky souls with it and leaving us with nothing to show for it but wounds and a damaged ship."
 agot_sailing.5602.desc.j:0 "The hunt goes poorly. No creature has been sighted for hours, and I am beginning to grow bored. Just then, a startled shout rings out behind me. "Whale at starboard, captain!"\n\nIn an instant, a massive plume of water erupts into the air and the whale's enormous form bursts through the waves. The ship is rocked by a tremendous blow, knocking us off our feet. As I struggle to rise, [first_mate.GetFirstName] crawls toward me, face as white as a sheet.\n\n"I—it's the White Dread, the... the Terror of the Seas!" [first_mate.GetSheHe] stammers. I've heard the tales: a white whale of terrible cunning and malice said to haunt these waters like a gargantuan ghost. It has sunk many ships, and now... it has found us.\n\n"Make ready to fight!" [host.GetTitledFirstNameNicknamed] shouts, grabbing a harpoon. The ship takes another hit, and I am thrown into a barrel of provisions lashed to the deck. As I regain my footing, I see the White Dread rear up with a deafening howl of triumph — it has torn our ship nearly to shreds and deems us defeated. As it dives, I feel my heart pounding louder than ever before. This monster will haunt my nightmares, I fear..."
 agot_sailing.5602.desc.k:0 "For a long while, the sea remains silent, as though the ocean itself were holding its breath in anticipation. I pace restlessly near the ship's helm. Then, at last, the lookout cries out, "Whale sighted!"\n\nI rush forward, and my eyes widen in disbelief. It has found us once again. The White Dread approaches rapidly, plowing through the waves on a direct collision course with our ship.\n\nI close my eyes for a split second before grabbing one of the harpoons. This time, I will not sit idly by, I swear, as the white whale dives and begins its vicious assault.\n\nThe ship is rocked by a tremendous impact, and I hear wood cracking beneath me. My grip tightens around the harpoon as I force myself upright. Gathering my remaining strength, I hurl the weapon at the White Dread — only for it to evade my shot with arrogant ease! The whale rears up with a deafening howl of triumph — it has torn our ship nearly to shreds and deems us defeated once more. Almost mockingly, it blows a great spout of water into the air before diving beneath the waves once again."
 agot_sailing.5602.a:0 "And we were so close..."

 agot_sailing.5603.t:0 "The White Dread Escapes"
 agot_sailing.5603.desc:0 "The sea is quiet today — almost serene, even. I stand on the deck, watching the waves bump softly against our vessel's hull. Just then, my eye catches movement beneath the water's dark surface. There is something down there — a white spot, growing larger, and larger, and—\n\nWith a deafening crash, a massive creature rocks the ship and throws me down. As I stand up again, I see an unusually white whale rear up, out of the waves, its red eyes fixed upon our ship.\n\n"I—it's the White Dread, the... the Terror of the Seas!" someone stammers. I've heard the tales: a white whale of sheer cunning and malice that is said to haunt these waters like a gargantuan ghost. It has sunk many ships, and now... it has found us.\n\nBut the White Dread does not seem to be interested in a fight. It circles our ship for a few, terrifying minutes, staying just out of harpoon's reach, before mocking us with a spout of water from its blowhole, only to dive beneath the waves and to disappear."
 agot_sailing.5603.a:0 "What #italic was#! that monster?"

 # Sunken Treasure events
 agot_sailing.6000.toast:0 "You stole a treasure map during the siege."
 agot_sailing.6000.toast_desc:0 "You uncover a collection of research pointing toward [sunken_ship_province.GetName], where a wealthy merchant ship was lost."

 agot_sailing.6001.t:0 "Looking for the Wreckage"
 agot_sailing.6001.desc:0 "As we sail along the coast, I check the map once more. We are approaching the ship's last known location. It should be near here, where it sank to the ocean floor.\n\nI call out to [first_mate.GetName] and order [first_mate.GetHerHim] to have the crew keep watch for any sign of wreckage. I also order the diving bell prepared. When we find the wreck, I want to be ready to dive as soon as possible.\n\nI wonder what riches lie hidden upon the ocean floor!"
 agot_sailing.6001.a:0 "Search the area!"
 agot_sailing.6001.a.success.tt:0 "You find signs of the wreckage"
 agot_sailing.6001.a.failure.tt:0 "You are unable to find any trace of the ship"

 agot_sailing.6002.t:0 "Preparing to Dive"
 agot_sailing.6002.desc:0 ""My [host.GetLadyLord]!"\n\n[first_mate.GetName] shouts to get my attention as I stare out across the sea.\n\nI make my way over to where [first_mate.GetSheHe] stands at the ship's edge, peering into the water a short sail from where we are anchored — and then I see it.\n\nFar beneath the still water lies a wreck!"
 agot_sailing.6002.a:0 "Time to go swimming!"
 agot_sailing.6002.b:0 "This is too dangerous."

 agot_sailing.6003.t:0 "Delving into the Depths"
 agot_sailing.6003.desc:0 "As the bell begins to descend, I follow it down into the depths until it reaches the ocean floor. As we sink deeper beneath the waves, I look around to get my bearings.\n\nThe ship I came to loot lies shattered, its remains scattered across the seabed.\n\nI can't tell what dangers might lurk among the wreckage, nor what treasures may yet remain hidden here, but the thought of untold riches sets my heart racing."
 agot_sailing.6003.a:0 "Let's see what I can find!"

 agot_sailing.6004.t:0 "The White Whale!"
 agot_sailing.6004.desc:0 "As I approach the wreckage, I can't help but notice how empty the waters are. No predators lurk among the ruins, and scarcely a fish swims nearby.\n\nAs I ponder this uneasy silence, I hear the distant call of a great beast.\n\nA white whale!\n\nI spot her in the distance at last. This must be why no other creatures dare approach. A blessing from the beast herself!\n\nI can search the wreck carefully and claim whatever treasures still remain."
 agot_sailing.6004.a:0 "Let's get this treasure back to the ship."

 agot_sailing.6005.t:0 "Sharks Block the Path"
 agot_sailing.6005.desc:0 "A pack of sharks circles the path leading to the wreckage. I could try to force my way through them or attempt to sneak past them. Otherwise, I may have to abandon the treasure if the danger proves too great."
 agot_sailing.6005.a:0 "I will force my way through!"
 agot_sailing.6005.a.success:0 "You force the sharks aside"
 agot_sailing.6005.toast.a.success:0 "You force your way past the sharks and reach the treasure"
 agot_sailing.6005.a.failure:0 "The sharks prove too much to handle"
 agot_sailing.6005.toast.a.failure:0 "The sharks overwhelm you, forcing you to flee"
 agot_sailing.6005.b:0 "I can carefully sneak around them."
 agot_sailing.6005.b.success:0 "You sneak past the sharks"
 agot_sailing.6005.toast.b.success:0 "You slip past the sharks and reach the treasure"
 agot_sailing.6005.b.failure:0 "You fail to sneak past the sharks"
 agot_sailing.6005.toast.b.failure:0 "The sharks notice you and force you to flee"
 agot_sailing.6005.c:0 "This is far too dangerous."

 agot_sailing.6006.t:0 "In These Dark Depths"
 agot_sailing.6006.desc:0 "Monstrous sights are oft ill portents, and my nerves stand on edge as I watch the scene unfold before me: A tentacled beast, surely a kraken of legend, twists and tangles with its prey... a great gray whale twice the size of my flagship.\n\nBut the treasure resting below is so close now. The dive ahead is perilous, but can I truly afford to turn back?"
 agot_sailing.6006.a:0 "The treasure is worth the risk!"
 agot_sailing.6006.a.success:0 "You will escape with the treasure"
 agot_sailing.6006.toast.a.success:0 "You have return to the ship with treasure"
 agot_sailing.6006.a.failure:0 "You get caught in the battle between the behemoths"
 agot_sailing.6006.toast.a.failure:0 "You have been wounded in the behemoths' struggle"
 agot_sailing.6006.b:0 "You won't risk your life for this!"
 death_by_kraken:0 "@death_icon! You are crushed by the kraken"

 agot_sailing.6007.t:0 "A Wasted Journey"
 agot_sailing.6007.desc:0 "[host.GetTitledFirstName] returns to the safety of the ship, but without any treasure to show for the expedition. [host.GetSheHe|U] led us all out here, and now [host.GetHerHis] failure will be all we have to show for it..."
 agot_sailing.6007.a:0 "Let us head home."

 agot_sailing.6010.t:0 "The Captain's Return"
 agot_sailing.6010.desc_big:0 "[host.GetTitledFirstName] returns with a chest recovered from the wreckage. Though rusted and swollen from years beneath the sea, it is quickly pried open, revealing a vast trove of riches long thought lost to the depths."
 agot_sailing.6010.desc_normal:0 "[host.GetTitledFirstName] returns with a chest recovered from the wreckage. Though rusted and swollen from years beneath the sea, it is quickly pried open, revealing a trove of riches long thought lost to the depths."
 agot_sailing.6010.desc_small:0 "[host.GetTitledFirstName] returns with a chest recovered from the wreckage. Though rusted and swollen from years beneath the sea, it is quickly pried open, revealing a small trove of riches long thought lost to the depths."
 agot_sailing.6010.desc:0 "[host.GetTitledFirstName] returns without treasure. The wreckage proved too dangerous to reach, and the expedition has nothing to show for the journey."
 agot_sailing.6010.a:0 "Let us head home."

 agot_sailing.6012.t:0 "A Wasted Journey"
 agot_sailing.6012.desc:0 "I make it back to the ship safely, but without any treasure to show for the expedition. I led all these people out here, and now my failure is the only thing they will remember."
 agot_sailing.6012.a:0 "Let's just head home..."

 agot_sailing.6013.t:0 "Time for a Swim"
 agot_sailing.6013.desc:0 ""My [host.GetLadyLord]!"\n\n[first_mate.GetName] shouts to get [host.GetTitledFirstNamePossessive] attention as [host.GetSheHe] gazes out across the sea.\n\nI join [first_mate.GetHerHim] at the railing, peering into the water a short sail from where we are anchored — and then I see it!\n\nFar beneath the still water lies a wreck!"
 agot_sailing.6013.a:0 "Then [ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('host') )] shall have [host.GetHerHis] dive..."

 agot_sailing.6014.t:0 "A Successful Salvage"
 agot_sailing.6014.desc:0 "I return to the ship with a chest recovered from the wreckage. Though rusted and swollen from years beneath the sea, we manage to pry it open, revealing treasures long thought lost to the depths. At last, we can leave this cursed place behind."
 agot_sailing.6014.vermax_skull:0 "\n\nUpon the ocean floor, I also discovered the remains of [GetScriptedCharacterByHistoryID('dragon_vermax').GetName]. [vermax.GetSheHe|U] was said to have fallen here in the Gullet during the Dance of Dragons. Who could have imagined we would uncover [vermax.GetHerHis] resting place while searching for treasure?"
 agot_sailing.6014.a:0 "A worthy haul!"
 agot_sailing.6014.a_generic_artifact:0 "#V You#! gained [generic_artifact.GetNameNoTooltip] [artifact|E]"
 agot_sailing.6014.a_valyrian_steel_sword:0 "#V You#! gained [valyrian_steel_sword.GetNameNoTooltip] [artifact|E]"
 agot_sailing.6014.a_spare:0 "#V You#! gained a [spare.GetNameNoTooltip] [artifact|E]"
 found_new_map:0 "You found a new treasure map"

 # Sailing:0 End results
 agot_sailing.9001.t:0 "End of a Voyage" #(Mariner trait +1)
 agot_sailing.9001.desc:0 "My long voyage comes to an end as my ship pulls back into port. A sense of accomplishment washes over me, and I know my skills as a sailor have grown sharper through the journey. Though part of me longs to remain at sea, I must now return to the business of ruling my realm..."
 agot_sailing.9001.a:0 "...and yet my heart yearns for the sea once more."

 agot_sailing.9002.t:0 "End of a Voyage" #(Mariner trait +1)
 agot_sailing.9002.desc:0 "My long voyage comes to an end as my ship pulls back into port. Though the journey did not end as I had hoped, I must now turn the page and return to the business of ruling my realm..."
 agot_sailing.9002.a:0 "...and yet my heart yearns for the sea once more."

 # Sailing:0 Go on a raid
 agot_sailing.9100.t:0 "Piratical Preparations"
 agot_sailing.9100.desc:0 "I stride down to the docks, drawing the salty sea air deep into my lungs. It invigorates me, though not nearly as much as the sight of my vessel at anchor. Both ship and dockside bustle with activity as my crew loads provisions while singing bawdy songs.\n\nThe quartermaster notices my approach and bows with an exaggerated flourish. I smile and nod in return as I cross the gangplank. My first mate cries out, "Captain on deck!" to a chorus of cheers from the crew. They seem eager and hungry for action.\n\nNow all that remains is to decide upon our mission. Will we sail into open waters in search of a prize, or launch a raid against hostile shores?"
 agot_sailing.9100.a:0 "We're going on a coastal raid!"
 agot_sailing.9100.b:0 "We'll prowl the open waters!"

 agot_sailing.9110.t:0 "Choosing a Target"
 agot_sailing.9110.desc:0 "My officers gather in the wardroom, where I have unrolled a collection of maps across the long oak table. I've informed them that we will be taking the ship on a raid, though I have yet to choose our destination. I judge that allowing them a say in the matter will bolster morale, and so I listen as they debate the merits of each target.\n\nAfter an hour, the discussion begins to grow heated, and I decide it is time to settle the matter. I slam my goblet down upon the table, and the men fall silent, turning to stare at me in anticipation."
 agot_sailing.9110.a:0 "Let's raid [piracy_destination_1.GetName]"
 agot_sailing.9110.b:0 "We will plunder [piracy_destination_2.GetName]!"
 agot_sailing.9110.c:0 "How about sabotaging [piracy_destination_3.GetName]?"
 agot_sailing.9110.d:0 "Seems there are no places to raid nearby"

 agot_sailing.9111.t:0 "Naval Patrol Sighted!"
 agot_sailing.9111.desc:0 "As we approach our target, anticipation rises among the crew. The black sails have been unfurled, and a strong tailwind drives us forward, the ship's prow cutting through the waves like a whetted blade.\n\nSuddenly, a cry rings out from the crow's nest — a patrol ship has been sighted. The vessel is sleek and bristling with armed crewmen. I must make a choice: attack the ship head-on, attempt to outmaneuver it, or turn tail and head for home..."
 agot_sailing.9111.a:0 "Make ready, sailors! We engage them!"
 agot_sailing.9111.a.success:0 "You sink the patrol ship"
 agot_sailing.9111.a.failure:0 "Your ship is damaged in battle, but you manage to limp home"
 agot_sailing.9111.toast.a.success:0 "Patrol ship sunk!"
 agot_sailing.9111.toast.a.failure:0 "Your ship is damaged!"

 agot_sailing.9111.c:0 "Hoist the sails! We'll outrun them!"
 agot_sailing.9111.c.success:0 "You evade the patrol ship"
 agot_sailing.9111.c.failure:0 "The patrol ship damages your vessel and forces you to retreat"
 agot_sailing.9111.toast.c.success:0 "Patrol ship evaded!"
 agot_sailing.9111.toast.c.failure:0 "Your ship is damaged, and you are forced to retreat"
 agot_sailing.9111.e:0 "This is too risky. Turn the ship around!"

 agot_sailing.9114.t:0 "The Raid"
 agot_sailing.9114.desc:0 "At last, we spy the coast ahead, and the outline of our target begins to emerge upon the horizon. Gulls circle overhead around the mast while my crew assembles on deck, sharpening weapons and swigging liquor for courage.\n\nNow comes the real decision — how best to profit from this nefarious venture?"
 agot_sailing.9114.a:0 "Let's sabotage production in [selected_piracy_destination.GetName]."
 agot_sailing.9114.a.success:0 "You reduce [selected_piracy_destination.GetName] [development|E] factor and [garrison|E] size"
 agot_sailing.9114.a.failure:0 "You are wounded by the guards"
 agot_sailing.9114.toast.a.success:0 "Province sabotaged!"
 agot_sailing.9114.toast.a.failure:0 "Sabotage failed!"

 agot_sailing.9114.b:0 "Time to earn your pay! We'll pillage [selected_piracy_destination.GetName]."
 agot_sailing.9114.b.success:0 "You pillage [selected_piracy_destination.GetNameNoTooltip]"
 agot_sailing.9114.b.failure:0 "You are wounded by the guards"
 agot_sailing.9114.toast.b.success:0 "Province pillaged!"
 agot_sailing.9114.toast.b.failure:0 "Pillage failed!"

 agot_sailing.9114.c:0 "Let's go after [selected_piracy_destination_baron.GetName] directly."
 agot_sailing.9114.c.success:0 "You wound [selected_piracy_destination_baron.GetName]"
 agot_sailing.9114.c.failure:0 "You are wounded by [selected_piracy_destination_baron.GetName]"
 agot_sailing.9114.toast.c.success:0 "You win the duel!"
 agot_sailing.9114.toast.c.failure:0 "You lose the duel!"

 agot_sailing.9114.d:0 "We should abduct some villagers!"
 agot_sailing.9114.d.success:0 "You abduct a villager"
 agot_sailing.9114.d.failure:0 "You are wounded by the guards"
 agot_sailing.9114.toast.d.success:0 "Villager abducted!"
 agot_sailing.9114.toast.d.failure:0 "Abduction failed!"

 agot_sailing.9114.e:0 "This is too risky. Turn the ship around!"

 agot_sailing.9120.t:0 "The Merchant Ship"
 agot_sailing.9120.desc:0 "The weather has been fair and the winds favorable, yet we have sailed for several days without sighting another vessel. The crew grows restless and quarrelsome. I begin to fear that, if their energy is not soon directed elsewhere, they may turn on one another.\n\nThen the cry rings out — sails upon the western horizon! I order the ship turned about and set on a direct course for our quarry. As we draw nearer, I can't help but smile — this is a worthy prize. A fat cog, riding low in the water beneath the weight of its cargo."
 agot_sailing.9120.a:0 "Ready yourselves, men! We'll plunder that merchant ship!"
 agot_sailing.9120.a.success:0 "You plunder the merchant ship!"
 agot_sailing.9120.toast.a.success:0 "Merchant ship plundered!"
 agot_sailing.9120.a.failure:0 "The ship's defenses prove too strong..."
 agot_sailing.9120.toast.a.failure:0 "Attack failed!"

 agot_sailing.9120.c:0 "Why sink them when we can seize the ship for ourselves?"
 agot_sailing.9120.c.success:0 "You capture the vessel and bring it back to your capital!"
 agot_sailing.9120.toast.c.success:0 "Merchant ship captured!"
 agot_sailing.9120.c.failure:0 "The ship's defenses prove too strong..."
 agot_sailing.9120.toast.c.failure:0 "Capture failed!"

 agot_sailing.9120.e:0 "This is too risky. Turn the ship around!"

 agot_sailing.9130.t:0 "A Clash of Pirates"
 agot_sailing.9130.desc:0 "As we approach [selected_piracy_destination.GetName], a cry rings out that sails have been sighted. A closer look at the approaching vessel reveals that this is no easy prey, but a weathered pirate ship hunting for spoils of its own.\n\nIf we can overcome its crew, we may find great riches aboard, though the battle will not come without risk."
 agot_sailing.9130.a:0 "They won't claim our prize. Attack!"
 agot_sailing.9130.a.success:0 "You plunder the pirate ship!"
 agot_sailing.9130.toast.a.success:0 "Pirate ship plundered!"
 agot_sailing.9130.a.failure:0 "You fail to overcome the enemy crew..."
 agot_sailing.9130.toast.a.failure:0 "Ship damaged!"

 agot_sailing.9130.c:0 "I'll duel their captain, [dueled_pirate.GetName]!"
 agot_sailing.9130.c.success:0 "You decide the fate of [dueled_pirate.GetName]"
 agot_sailing.9130.toast.c.success:0 "Duel won!"
 agot_sailing.9130.c.failure:0 "You lose the duel"
 agot_sailing.9130.toast.c.failure:0 "Defeated!"

 agot_sailing.9130.d:0 "Hoist the sails! We retreat!"

 agot_sailing.9131.t:0 "Captain [dueled_pirate.GetFirstNameNoTooltip] Humbled"
 agot_sailing.9131.desc:0 "After a vicious duel, I finally stand over my defeated foe as [dueled_pirate.GetSheHe] lies crumpled upon the deck. Both crews seem frozen in place, watching me intently as I savor the moment. The silence is broken by a pained whimper from my opponent, who begins begging for mercy.\n\nNow I must decide how best to exploit this victory. I have proven my prowess, but there may yet be greater opportunities before me..."
 agot_sailing.9131.a:0 "To the brig with you!"
 agot_sailing.9131.b:0 "The sea has no mercy for weakness. [dueled_pirate.GetFirstNameNoTooltip] will walk the plank!"
 agot_sailing.9131.c:0 "You fought well — join me!"
 agot_sailing.9131.toast.c.success:0 "[dueled_pirate.GetNameNoTooltip] joins your crew!"
 agot_sailing.9131.d:0 "A skilled crew you have there..."
 agot_sailing.9131.d.success:0 "You recruit the enemy crew"
 agot_sailing.9131.toast.d.success:0 "Crew recruited!"
 agot_sailing.9131.d.failure:0 "You fail to convince the crew"
 agot_sailing.9131.toast.d.failure:0 "The crew refuses to join you"
 agot_sailing.9131.e:0 "I'm not without mercy. Off you go!"
 agot_sailing.9131.toast.e.success:0 "[dueled_pirate.GetNameNoTooltip] released!"

 agot_sailing.9140.t:0 "A Map Among the Loot?"
 agot_sailing.9140.desc:0 "While searching through the defeated captain's quarters, I uncover a pile of maps. At first glance they seem unremarkable, but upon closer inspection I discover something far more valuable — a treasure map leading to the site where a ship was seen sinking beneath the waves.\n\nAccording to the accompanying documents, the vessel was laden with riches. Perhaps some of that treasure still lies upon the ocean floor? If we possess a diving bell, we could set sail and search the wreck for what remains!"
 agot_sailing.9140.a:0 "We must plan a new voyage!"

 agot_sailing.9150.t:0 "A Failure on [host.GetTitledFirstNamePossessiveNoTooltip] Behalf"
 agot_sailing.9150.desc:0 "Our attempts to carry out a successful raid have been thwarted, and the blame lies squarely on the shoulders of [host.GetTitledFirstName]. [host.GetHerHis|U] incapable leadership has led us astray; my disappointment is immeasurable, and my day is ruined."
 agot_sailing.9150.a:0 "What a bust..."

 agot_sailing.9151.t:0 "A Successful Raid!"
 agot_sailing.9151.desc:0 "At last, we spy the coast ahead, and the outline of our target begins to emerge upon the horizon. Gulls circle overhead around the mast while the crew assembles on deck, sharpening weapons and swigging liquor for courage.\n\n[host.GetTitledFirstName] has decided our plan:"
 agot_sailing.9151.desc_sabotaged_production:0 "We shall sabotage the local infrastructure, causing irreparable damage to their means of production.\n\nThe rest is a blur, but I distinctly remember setting fire to a building or two. #EMP Good times!#!"
 agot_sailing.9151.desc_pillage_settlement:0 "We will pillage the settlement and claim their coin for our own.\n\nThe opportunity to pocket some valuables is a welcome one; before I know it, I'm back on the ship, regaling my fellow crewmates of the successful pillage. #EMP What a rush!#!"
 agot_sailing.9151.desc_duel_the_baron:0 "[host.GetSheHe|U] will duel the local ruler in a show of prowess.\n\n[host.GetHerHis|U] plan goes off without a hitch, successfully wounding [host.GetHerHis] opponent with ease. #EMP Impressive!#!"
 agot_sailing.9151.desc_kidnap_villager:0 "We will abduct local villagers.\n\nSurely the locals will be of use to [host.GetTitledFirstNameNoTooltip] in the future. #EMP Great success!#!"
 agot_sailing.9151.a:0 "Well led, [host.GetTitledFirstNameNoTooltip]!"

 agot_sailing.9152.t:0 "A Failed Raid..."
 agot_sailing.9152.desc:0 "At last, we spy the coast ahead, and the outline of our target begins to emerge upon the horizon. Gulls circle overhead around the mast while the crew assembles on deck, sharpening weapons and swigging liquor for courage.\n\n[host.GetTitledFirstName] has decided our plan:"
 agot_sailing.9152.desc_sabotaged_production:0 "We shall sabotage the local infrastructure, causing irreparable damage to their means of production.\n\nThe plan doesn't go well, unfortunately; as I attempted to set fire to a building, a guard emerged and gave me a beating. Next thing I recall, I'm back on the boat. #EMP Ouch!#!"
 agot_sailing.9152.desc_pillage_settlement:0 "We will pillage the settlement and claim their coin for our own.\n\nUnfortunately for our crew, the settlement is well guarded, and our attempt to pocket the valuables of the locals has been rebuffed. #EMP What a pity!#!"
 agot_sailing.9152.desc_duel_the_baron:0 "[host.GetSheHe|U] will duel the local ruler in a show of prowess.\n\n[host.GetHerHis|U] plan doesn't go well, unfortunately, and [host.GetSheHe] is wounded in the process. #EMP A shame!#!"
 agot_sailing.9152.desc_kidnap_villager:0 "We will abduct local villagers.\n\nUnfortunately, we did not expect the settlement to be so well guarded, and our attempts are foiled. #EMP Drats!#!"
 agot_sailing.9152.a:0 "Poorly led, [host.GetTitledFirstNameNoTooltip]..."

 agot_sailing.9501.t:0 "A Tragedy off [ship_province.GetNameNoTooltip]"
 agot_sailing.9501.desc_intro:0 "[admiral.GetName] approaches me carrying a letter. [admiral.GetSheHe|U] wishes to inform me of a recent tragedy at sea.\n\nA ship has met an untimely end off the coast of [ship_province.GetName], with very few survivors."
 agot_sailing.9501.desc_reaction_sadistic:0 "\n\nI wonder why [admiral.GetSheHe] chose to bring this news to me. I feel more sympathy for the lost cargo and wasted coin than for the lives claimed by the sea."
 agot_sailing.9501.desc_reaction:0 "\n\nIt is a terrible tragedy. I can't help but think of those whose lives were lost, and of the families left grieving in their wake."
 agot_sailing.9501.desc_reaction_compassionate:0 "\n\nThis tragedy breaks my heart. So many souls lost beneath the waves, so many families torn apart. The thought of such suffering weighs heavily upon me."
 agot_sailing.9501.desc_greed_greedy:0 "\n\nAs [admiral.GetNameNoTooltip] speaks of the lost cargo, a thought crosses my mind. I know where that ship sank — off the coast of [ship_province.GetNameNoTooltip]. I could outfit a vessel and send divers to salvage what remains... though it seems [admiral.GetNameNoTooltip] was not the first to learn of the wreck. Others may already be making for the site."
 agot_sailing.9501.desc_greed_not_tarth:0 "\n\n[admiral.GetNameNoTooltip] continues reading from the letter, explaining that a great fortune was lost aboard the doomed ship, now scattered across the ocean floor. Perhaps even the famed sapphire seas of Tarth will find competition in beauty now."
 agot_sailing.9501.desc_greed_tarth:0 "\n\n[admiral.GetNameNoTooltip] continues reading from the letter, explaining that a great fortune was lost aboard the doomed ship, now scattered across the ocean floor. The sapphire seas of Tarth may now glimmer with flecks of gold — more beautiful than ever, though at a terrible cost."
 agot_sailing.9501.a:0 "What sorrowful news."

 agot_sailing_end:0 "@warning_icon! #X This option will end the activity#!"
 agot_sailing_end_failure:0 "@warning_icon! #X This will end the activity#!"