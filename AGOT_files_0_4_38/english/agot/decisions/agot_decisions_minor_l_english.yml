l_english:
 start_contraceptives_decision:0 "Use Contraceptives"
 start_contraceptives_decision_desc:0 "By consulting a physician I can acquire contraceptives, such as moon tea, which can be used to ensure that my occasional dalliance does not result in children."
 start_contraceptives_decision_tooltip:0 "Sacrifice some [income|E] to reduce your [fertility|E]."
 start_contraceptives_decision_confirm:0 "I am ready"

 stop_contraceptives_decision:0 "Stop Using Contraceptives"
 stop_contraceptives_decision_desc:0 "It's time for me to put my herbs and poultices aside. I may not have wanted children before, but the time has come to bring sons and daughters into the world."
 stop_contraceptives_decision_tooltip:0 "Stop sacrificing some [income|E] to reduce your [fertility|E]."
 stop_contraceptives_decision_confirm:0 "Let nature run its course"

 can_be_knight_and_commander_decision:0 "Agree to Become Captain or Commander"
 can_be_knight_and_commander_decision_tooltip:0 "Makes it possible to become your liege's captain or commander."
 can_be_knight_and_commander_decision_desc:0 "My liege will be able to appoint me as [ROOT.Char.GetLiege.GetHerHis] captain or commander."
 can_be_knight_and_commander_decision_confirm:0 "I am willing to fight"

 cannot_be_knight_and_commander_decision:0 "Refuse to Become Captain or Commander"
 cannot_be_knight_and_commander_decision_tooltip:0 "Makes it impossible to become your liege's captain or commander."
 cannot_be_knight_and_commander_decision_desc:0 "My liege will not be able to appoint me as [ROOT.Char.GetLiege.GetHerHis] captain or commander"
 cannot_be_knight_and_commander_decision_confirm:0 "I am no longer willing to fight"

 stress_loss_uncouth_decision:0 "Let Yourself Go"
 stress_loss_uncouth_decision_desc:0 "The pressures of this world have become far too much. If the world would see me as a monster, a monster they shall see."
 stress_loss_uncouth_decision_tooltip:0 "You'll give up on maintaining appearances, letting your hair and nails grow wild"
 stress_loss_uncouth_decision_confirm:0 "Who needs to bathe?"
 uncouth_stopped_cutting:0 "Uncut Hair"
 uncouth_stopped_cutting_desc:0 "This character has stopped cutting their hair, creating an unkempt appearance"

