 set_risk_level_tooltip:0 "You will be able to choose between low, medium, and high [agot_bank_risk_levels_l|E] for loans and investments."

 set_dividend_level_name:0 "Adjust Dividend Rates"
 set_dividend_level_tooltip:0 "You will be able to choose between low, medium, and high rates of [agot_bank_dividends|El]."

 set_interest_level_name:0 "Adjust Interest Rates"
 set_interest_level_tooltip:0 "You will be able to choose between lower, normal, and higher [agot_bank_interest_rates_l|E]. The lower the interest rate, the more customers you will attract, but the lower your [agot_bank_profits|El] per loan will be, and vice versa."

