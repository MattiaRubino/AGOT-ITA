l_english:
 #Marked for Review

 agot_proclaim_iron_throne:0 "Proclaim the Iron Throne"
 agot_proclaim_iron_throne_tooltip:0 "This decision will allow you to unite the realm under the Iron Throne."
 agot_proclaim_iron_throne_desc:0 "The Iron Throne long stood as a symbol of unity and power in Westeros. With the realm's countless petty fiefdoms now under our banners, the time has come to gather the blades of the defeated and forge a new Iron Throne for all the realm.\n\nDo I have the strength, the cunning, and the will to claim the Iron Throne? Does House [ROOT.Char.GetHouse.GetName] have what it takes to be the one true ruler of Westeros?"
 agot_proclaim_iron_throne_confirm:0 "Send the ravens"

 set_capital_kingslanding_decision:0 "Reclaim King's Landing"
 set_capital_kingslanding_decision_tooltip:0 "Restore King's Landing as the capital of your realm."
 set_capital_kingslanding_decision_desc:0 "King's Landing is the rightful capital of the Iron Throne, and as such it belongs to me."
 set_capital_kingslanding_decision_confirm:0 "Restore the true seat of the realm!"

 end_the_ironborn_decision:0 "End the Ironborn"
 end_the_ironborn_decision_desc:0 "For centuries, the mongrel dogs that are the Ironborn have raped, pillaged, and reaved their way across Westeros and beyond. It has now become inevitable that we must take action against these seafaring brigands and crush their power once and for all. We must wage a war of such devastation against them that never again will an Iron King sit the Seastone Chair."
 end_the_ironborn_decision_confirm_text_desc:0 "To arms!"
 end_the_ironborn_decision_tooltip:0 "Death to the Ironborn."

 regrow_oakenseat_decision:0 "Regrow the Oakenseat"
 regrow_oakenseat_decision_tooltip:0 "Call upon a skilled gardener to regrow the Oakenseat."
 regrow_oakenseat_decision_desc:0 "The Oakenseat, a living throne planted by Garth Greenhand, was destroyed by a Dornish king during the reign of King Garth X Gardener and is no more than legend.\n\nThough it is no small task, regrowing the Oakenseat would bring my House great fame, authority, and influence within the Reach — and throughout the Seven Kingdoms."
 regrow_oakenseat_decision_confirm:0 "Plant the seed"
 regrow_oakenseat_excellent_aptitude:0 "Your $court_gardener_court_position$ needs an aptitude of #V Excellent#!"
 agot_major_decisions_events.1001.t:0 "The Oakenseat Regrown"
 agot_major_decisions_events.1001.desc:0 "Legend tells that [greenhand.GetFullNameNicknamed] carved the original living Oakenseat by his own green hand, and the [greenhand.GetHouse.GetName] kings ruled from that very throne for generations.\n\nIts destruction tore the root — and heart — out of the Highgarden.\n\nFinally, after decades of careful growth, pruning, and propagation, the once-proud Oakenseat has been regrown. Near and far, all shall know the glory of House [ROOT.Char.GetHouse.GetName] for our famed seat. Perhaps I can even claim to be the true successor of Garth Greenhand himself..."
 agot_major_decisions_events.1001.a:0 "A legend restored!"

 ironborn_rebellion_decision:0 "Rebel against the Iron Throne"
 ironborn_rebellion_decision_desc:0 "For too long now, the men of the green lands have slept comfortably in their beds. Indeed, not since the death of Harren the Black has Westeros truly known to fear the Ironborn, only occasional parties of reavers going ashore to pay the iron price. Kings, one after another, have sat upon their Iron Throne. But, have we forgotten that we have our own throne, that for centuries we had our own kings?\n\nOther men may have, but I have not. I will cast off the chains that bind our people; I will be the King of Salt and Rock. The Andals, Rhoynar, and First Men will once again know what it is to fear the Ironborn."
 ironborn_rebellion_decision_tooltip:0 "Weep, o Westeros, that the Isles rise again!"
 ironborn_rebellion_decision_confirm_text_desc:0 "We will pay the iron price!"

 defy_winter_lords_decision:0 "Defy the Winter Lords"
 defy_winter_lords_decision_desc:0 "The Stoneborn know nothing but derision from the Northmen, who consider us no better than Wildlings. Skagos was once free and independent of the Winter Lords — and so it shall be once more. Our might will cause [ROOT.Char.GetLiege.GetNameNicknamedRegnal] to tremble!"
 defy_winter_lords_decision_tooltip:0 "You will declare your independence, returning the Skagosi to the seas once more."
 defy_winter_lords_decision_confirm_text_desc:0 "The North will remember to fear Skagos!"

 agot_minor_decisions_events.0001:0 "Defy the Winter Lords"
 agot_minor_decisions_events.0001.desc:0 "Many Stoneborn have dreamt of the day that Skagos took its freedom once more. When King Brandon Stark broke our power, he forbade us the sea. Now, the North shall tremble when our ships draw near!"
 agot_minor_decisions_events.0001.a:0 "We swear fealty #bold no more#!."
 agot_minor_decisions_events.0001.a_tt:0 "Surely the North will not take this act of disloyalty without a fight. Are you prepared for war?"

 agot_minor_decisions_events.0002:0 "An Independent Skagos"
 agot_minor_decisions_events.0002.desc:0 "The Stoneborn rule themselves once more! The Bay of Seals will know our banners.\n\nI have etched my legacy in stone, and all Stoneborn will remember my name."
 agot_minor_decisions_events.0002.a:0 "My legacy will stand the test of time."
 agot_minor_decisions_events.0002.a_tt:0 "Skagos gains its independence."

 agot_adopt_kneeler_ways_decision:0 "Conform to Southron Customs"
 agot_adopt_kneeler_ways_decision_desc:0 "Life in the cruel wasteland of the Far North has made us into ruthless and unyielding folk, very different from those living on the other side of the Wall. Now that we made our home among them, perhaps it would be wise to adapt to their way of life, laws and customs."
 agot_adopt_kneeler_ways_decision_confirm:0 "Time to loosen up our knees"
 agot_adopt_kneeler_ways_decision_tooltip:0 "Your people will adopt the ways of the subjects of the Iron Throne. This will allow for more interactions with rulers south of the Wall, but cost you the benefits of being free folk."
 is_culture_head:0 "You are the head of your culture"
 hybridized_with_kneelers:0 "Your culture was hybridized with one existing south of the Wall"
 capital_south_of_the_wall:0 "Your capital is south of the Wall"
 agot_major_decisions_events.1003.t:0 "On the Other Side..."
 agot_major_decisions_events.1003.desc:0 "Our generations-long dream to escape the harsh realities of life on the wrong side of the Wall is fulfilled. Would it not be a display of hubris to defiantly carry on as we were back there and disregard the laws and customs of our new neighbors? The folk on the southern side of the wall may be timid and soft, but their lives are long and comfortable. They clearly know how to make the most of this pleasant land and if their laws help them in this, then we shall adopt them as well."
 agot_major_decisions_events.1003.a:0 "To a new, milder future!"
 every_freefolk_ruler_tt:0 "Every Free Folk Chief"