l_english:
 reveal_identity_decision:0 "Reveal Identity"
 reveal_identity_decision_tooltip:0 "Reveal your identity to the world."
 reveal_identity_decision_desc:0 "I have been hiding this secret for some time now, maybe it is time to reveal it to the world?"
 reveal_identity_decision_confirm:0 "Reveal the truth!"
 knight_of_the_laughing_tree_effect:0 "You will be revealed as #Bold Knight of the Laughing Tree#!"
 generic_secret_identity_tooltip:0 "You will be revealed as your true self."

 select_dynastic_nickname:0 "Proclaim Dynastic Nickname"
 select_dynastic_nickname_desc:0 "The great houses of the realm are intrinsically tied to their sigils. It is time for us to adopt the cloak of a symbol through which we will be recognized across the realm."
 select_dynastic_nickname_tooltip:0 "Select a symbol for your house's nicknames"
 select_dynastic_nickname_tt:0 "You will be given the opportunity to select a symbol for your house's nicknames."
 select_dynastic_nickname_confirm:0 "Know me!"

 agot_beg_bittersteel_to_make_golden_company:0 "Beneath the Gold, the Bitter Steel"
 agot_beg_bittersteel_to_make_golden_company_desc:0 "Bittersteel has been working hard for the Blackfyre cause... as a sellsword. But he has privately expressed concern that support for our cause is fading among exiles as they are forced to serve in a dozen different companies. Perhaps it's time for a new company to be formed...one that will always serve the Black Dragon."
 agot_beg_bittersteel_to_make_golden_company_effect:0 "Bittersteel will form the Golden Company"
 agot_beg_bittersteel_to_make_golden_company_confirm:0 "Form the Golden Company"
 agot_beg_bittersteel_to_make_golden_company_tooltip:0 "$agot_beg_bittersteel_to_make_golden_company_effect$ — a hireable mercenary company"
 AGOT_PREFIX_THE:0 "The"

 agot_mega_war_declare_independence_decision:0 "Declare Independence"
 agot_mega_war_declare_independence_decision_desc:0 "I will declare independence from [ROOT.Var('agot_pwl_direct').Char.GetTitledFirstName]. However, [ROOT.Var('agot_pwl_direct').Char.GetSheHe] might not like my seccession from the realm and attempt to bring me back into the realm by force. Some of my own vassals may question their loyalties as well..."
 agot_mega_war_declare_independence_decision_tooltip:0 "You will become a fully independent realm, or you will be considered a rebel in a #R war#! against your liege."
 agot_mega_war_declare_independence_decision_confirm:0 "Time has come to make my split!"
 # MEGA_WARS_DECLARE_INDEPENDENCE_TOOLTIP:0 "You will become a fully independent realm, or you will be considered a rebel in a #R war#! against your liege."

 agot_mega_war_declare_rebellion_decision:0 "Declare Rebellion"
 agot_mega_war_declare_rebellion_decision_desc.1:0 "Deposing [ROOT.Var('agot_pwl_direct').Char.GetTitledFirstName] may not be enough to right [ROOT.Var('agot_pwl_direct').Char.GetHerHis] wrongs. It may be time to cast aside the old order and forge a new one."
 agot_mega_war_declare_rebellion_decision_desc.2:0 "Deposing [ROOT.Char.GetLiege.GetTitledFirstName] may not be enough to right [ROOT.Var('agot_pwl_direct').Char.GetHerHis] wrongs. It may be time to cast aside the old order and forge a new one."
 agot_mega_war_declare_rebellion_decision_tooltip:0 "You will rise in open rebellion"
 agot_mega_war_declare_rebellion_decision_confirm:0 "Our time has come!"