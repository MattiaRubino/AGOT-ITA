l_english:
 agot_go_on_reaving_decision:0 "Go on a Reaving"
 agot_go_on_reaving_decision_opening_desc:0 "#F Pay the Iron Price and Organize a great reaving to scour the lands across the Narrow Sea. Ironborn will come from across the realm to your fleet to ravage these lands of saffron and silk!#!"
 reaving_effect_1:0 "You will choose a destination ripe for plunder"
 reaving_effect_2:0 "The more successful your reaving, the more [piety|E] and [prestige|E] you will gain"
 reaving_effect_3:0 "You may gain the [GetTrait('viking').GetName( GetNullCharacter )] trait"
 agot_go_on_reaving_decision_tooltip:0 "A Great [reaving|E] will be called."
 agot_go_on_reaving_decision_confirm:0 "The greenlanders will fear the ironborn!"

 agot_buy_diving_bell:0 "Buy a Diving Bell"
 agot_buy_diving_bell_desc:0 "I shall have a diving bell fitted to my ship, that my house may follow old maps of sunken treasure and delve into wreckage upon the ocean floor."
 agot_buy_diving_bell_tooltip:0 "Have a diving bell fitted"
 agot_buy_diving_bell_effect_tooltip:0 "Unlocks the $agot_sailing_type_treasure$ [GetActivityType('activity_agot_sailing').GetName] [activity|E]"
 agot_buy_diving_bell_confirm_text_desc:0 "Call for the shipwright"

 agot_buy_ship:0 "Buy a Ship"
 agot_buy_ship_desc:0 "The seas offer wealth, glory, and adventure to those bold enough to sail them. A fine vessel would serve my House well, carrying my banner to distant shores and opening new opportunities upon the waves. Now I need only decide what sort of ship I shall commission."
 agot_buy_ship_tooltip:0 "Commission a ship for your House"
 agot_buy_ship_effect_1_tooltip:0 "Unlocks the $agot_sailing_type_raid$ [GetActivityType('activity_agot_sailing').GetName]"
 agot_buy_ship_effect_2_tooltip:0 "Unlocks the $agot_sailing_type_valyria$ [GetActivityType('activity_agot_sailing').GetName]"
 agot_buy_ship_confirm_text_desc:0 "Call for the shipwrights"
 agot_buy_ship_small_ship:0 "Purchase a $owns_small_ship$"
 agot_buy_ship_small_ship_desc:0 "A modest vessel, suitable for carrying my banner across the seas without emptying my coffers."
 agot_buy_ship_small_ship_tooltip:0 "$agot_buy_ship_small_ship_desc$"
 agot_buy_ship_big_ship:0 "Purchase a $owns_big_ship$"
 agot_buy_ship_big_ship_desc:0 "A grand vessel worthy of a mighty House, certain to draw admiring eyes wherever it drops anchor."
 agot_buy_ship_big_ship_tooltip:0 "$agot_buy_ship_big_ship_desc$"