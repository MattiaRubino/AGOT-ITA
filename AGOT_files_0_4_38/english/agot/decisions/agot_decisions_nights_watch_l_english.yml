l_english:
 #Marked for Review

 restore_the_nights_watch:0 "Restore the Night's Watch"
 restore_the_nights_watch_desc:0 "Ever since their destruction, our walls and our people have been under the threat of savages and other ungodly creatures lurking in the far north. We must bring back the night's watch for order to be reintroduced in the north and so our women and children can sleep safely at night."
 restore_the_nights_watch_tooltip:0 "We must bring back the night's watch for order to be reintroduced in the north and so our women and children can sleep safely at night."
 restore_the_nights_watch.tooltip.1:0 "A new Lord Commander will be found to hold and manage the Wall."
 restore_the_nights_watch.tooltip.2:0 "#N You will lose the lands surrounding the wall! #!"
 restore_the_nights_watch_confirm:0 "For the Realm!"

 dissolve_the_nights_watch:0 "Dissolve the Night's Watch"
 dissolve_the_nights_watch_desc:0 "Our people have been threatened by the Night's Watch and their Wall for too long! After taking control of the Wall, it is time to finally put an end to the black brotherhood and grant our people the freedom and peace they have been robbed of for thousands of years."
 dissolve_the_nights_watch_tooltip:0 "The rule of the Night's Watch will end."
 dissolve_the_nights_watch_confirm:0 "For the People!"

 rebuild_nights_watch_fort:0 "Rebuild a Fort on the Wall"
 rebuild_nights_watch_fort_desc:0 "For centuries, the ancient order of the Night's Watch has been deteriorating. This has left the numerous forts that line the Wall to concede to the ravages of time. Provided the recent upturn of the Watch's finances, most believe it is time to rebuild what has been lost."
 rebuild_nights_watch_fort_tooltip:0 "Restore a fort along the Wall."
 rebuild_nights_watch_fort_confirm:0 "Bring me the First Builder!"

 #Desert the Night's Watch Decision for First Ranger
 desert_the_nw:0 "$game_concept_agot_desert_nw$"
 desert_the_nw_desc:0 "The Wall has taken much and given little. To desert the Night's Watch is to forsake my vows, my brothers, and the safety of duty, but freedom lies beyond the Wall, if I dare claim it."
 desert_the_nw_tooltip:0 "You will desert the [nw_govt|E]"
 desert_the_nw_confirm:0 "Desert the Watch"

 reclaim_brandons_gift_decision:0 "Reclaim Brandon's Gift"
 reclaim_brandons_gift_decision_desc:0 "The lands of Brandon's Gift once swore fealty to the North rather than the Night's Watch. It's time to reclaim our rightful lands and raise new lords to develop the lands that the Watch has mismanaged."
 reclaim_brandons_gift_decision_tooltip:0 "Reclaim Brandon's Gift"
 reclaim_gift_decision.requirements:0 "One of the following must be valid:\n$EFFECT_LIST_BULLET$You are allied to the Night's Watch\n$EFFECT_LIST_BULLET$You have the [GetPerk('diplomat_perk').GetName( GetNullCharacter )] perk\n$EFFECT_LIST_BULLET$The Lord Commander of the Night's Watch has 100 opinion of you"
 reclaim_brandons_gift_decision_confirm:0 "$reclaim_brandons_gift_decision_tooltip$"

 reclaim_gift_decision:0 "Reclaim the New Gift"
 reclaim_gift_decision_desc:0 "The lands of the New Gift once swore fealty to the North rather than the Night's Watch. It's time to reclaim our rightful lands and raise new lords to develop the lands that the Watch has mismanaged."
 reclaim_gift_decision_tooltip:0 "Reclaim the New Gift"
 reclaim_gift_decision_confirm:0 "$reclaim_gift_decision_tooltip$"
 reclaim_gift_decision_desc_effect:0 "[GetTitleByKey('k_the_wall').GetHolder.GetName] will be sent a proposal concerning returning the [GetTitleByKey('d_new_gift').GetNameNoTier] to the North."

 reclaim_brandons_gift_decision_desc_effect:0 "[GetTitleByKey('k_the_wall').GetHolder.GetName] will be sent a proposal concerning returning the [GetTitleByKey('d_brandons_gift').GetNameNoTier] to the North."
 reclaim_gift_decision_desc_use_hook_tt:0 "Your [hook|e] on your [top_liege|E] will be used."

 agot_nights_watch.3000.t:0 "The New Gift"
 agot_nights_watch.3000.desc:0 "[winterfell_petitioner.GetName] has asked that we return the New Gift to the North, in exchange for a large sum of gold. Four new lords will be raised up in these lands, but they will be sworn to the North, ending the Night's Watch's dominion over those lands for the first time in generations."
 agot_nights_watch.3000.desc_brandons_gift:0 "[winterfell_petitioner.GetName] has asked that we return Brandon's Gift to the North, in exchange for a large sum of gold. Three new lords will be raised up in these lands, but they will be sworn to the North, ending the Night's Watch's dominion over those lands for the first time in generations."
 agot_nights_watch.3000.a:0 "I agree, the North may have its land back."
 agot_nights_watch.3000.b:0 "I refuse. The land is the property of the Night's Watch."
 agot_nights_watch.3001.t:0 "The Gift: Request Granted"
 agot_nights_watch.3001.desc:0 "[nw_lc.GetName] has agreed to return the Gift to the dominion of the North.\n\nNow it is time to appoint the new lords that will settle the counties in the region."
 agot_nights_watch.3001.a:0 "I will personally pick the new lords."
 agot_nights_watch.3001.b:0 "Issue the lands to anyone."
 agot_nights_watch.3003.t:0 "New Lords of the New Gift"
 agot_nights_watch.3003.desc:0 "It is time to select a lord of [new_gift_county_to_give_away.GetNameNoTier]."
 agot_nights_watch.3003.a:0 "This person will do."
 agot_nights_watch.3003.b:0 "Actually, grant the title to a random person."
 nw_proposal_rejected:0 "Proposal Rejected"

 agot_nights_watch.3004.t:0 "Gifts Reclaimed"
 agot_nights_watch.3004.desc:0 "The New Gift has been returned to the dominion of the North after years of governance from the Night's Watch. [winterfell_petitioner.GetName] raised the following lords to populate the lands:\n\n$BULLET$[norlinton_holder.GetFirstName] [norlinton_holder.GetHouse.GetName] of [GetTitleByKey('c_norlinton').GetNameNoTier]\n$BULLET$[boreharrow_holder.GetFirstName] [boreharrow_holder.GetHouse.GetName] of [GetTitleByKey('c_boreharrow').GetNameNoTier]\n$BULLET$[whitecross_holder.GetFirstName] [whitecross_holder.GetHouse.GetName] of [GetTitleByKey('c_whitecross').GetNameNoTier]\n$BULLET$[giantsbeard_holder.GetFirstName] [giantsbeard_holder.GetHouse.GetName] of [GetTitleByKey('c_giantsbeard').GetNameNoTier]"
 agot_nights_watch.3004.desc_brandons_gift:0 "Brandon's Gift has been returned to the dominion of the North after years of governance from the Night's Watch. [winterfell_petitioner.GetName] raised the following lords to populate the lands:\n\n$BULLET$[weatherback_ridge_holder.GetFirstName] [weatherback_ridge_holder.GetHouse.GetName] of [GetTitleByKey('c_weatherback_ridge').GetNameNoTier]\n$BULLET$[moles_town_holder.GetFirstName] [moles_town_holder.GetHouse.GetName] of [GetTitleByKey('c_moles_town').GetNameNoTier]\n$BULLET$[hoarburn_holder.GetFirstName] [hoarburn_holder.GetHouse.GetName] of [GetTitleByKey('c_hoarburn').GetNameNoTier]"
 agot_nights_watch.3004.a:0 "My deeds will benefit the North for generations to come."

 agot_nights_watch.holding_conversion_tt:0 "[new_gift_county_to_give_away.GetNameNoTier] will be converted into a [castle_holding|E]"
 agot_nights_watch.new_capital_tt:0 "[new_capital.GetName] will become the capital of [new_gift_county_to_give_away.GetNameNoTier]."

 donate_land_to_nw_decision_desc:0 "We hold some of the Night's Watch's historical lands. Perhaps returning the land to them can strengthen their position."
 donate_land_to_nw_decision_tooltip:0 "Return the Land!"
 donate_land_to_nw_decision:0 "Return Historical Land to the Night's Watch"
 donate_land_to_nw_decision_confirm:0 "Return the Land!"

 brandons_gift_will_be_returned_to_nw_tt:0 "Every county in the [GetTitleByKey('d_brandons_gift').GetName] will be granted to [GetTitleByKey('k_the_wall').GetHolder.GetName]"
 new_gift_will_be_returned_to_nw_tt:0 "Every county in the [GetTitleByKey('d_new_gift').GetName] will be granted to [GetTitleByKey('k_the_wall').GetHolder.GetName]"

 agot_nights_watch.3005.t:0 "Territory Returned"
 agot_nights_watch.3005.desc:0 "Though the North reclaimed the New Gift, they have now generously returned it to the control of the Night's Watch.\n\n[GetTitleByKey('c_norlinton').GetNameNoTier], [GetTitleByKey('c_boreharrow').GetNameNoTier], [GetTitleByKey('c_whitecross').GetNameNoTier], and [GetTitleByKey('c_giantsbeard').GetNameNoTier] are now the property of the Night's Watch once again!"
 agot_nights_watch.3005.desc_brandons_gift:0 "Though the North reclaimed Brandon's Gift, they have now generously returned it to the control of the Night's Watch.\n\n[GetTitleByKey('c_weatherback_ridge').GetNameNoTier], [GetTitleByKey('c_moles_town').GetNameNoTier], and [GetTitleByKey('c_hoarburn').GetNameNoTier] are now the property of the Night's Watch once again!"
 agot_nights_watch.3005.a:0 "We cannot squander this generosity."