l_english:

 # agot_pirate_convert_whole_realm_to_feudalism_decision and effects and event following
 agot_pirate_convert_whole_realm_to_feudalism_decision:0 "Adopt Feudalism"
 agot_pirate_convert_whole_realm_to_feudalism_decision_desc:0 "As my realm grows, so does the challenge to control it. If [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] is to keep expanding, we must leave the old ways behind and convert to feudalism."
 agot_pirate_convert_whole_realm_to_feudalism_decision_confirm:0 "Adopt Feudal Ways"
 agot_pirate_convert_whole_realm_to_feudalism_decision_tooltip:0 "Change government type by becoming  [GetGovernment( 'lp_feudal_government' ).GetName] or [GetGovernment( 'feudal_government' ).GetName]"
 pirate_vassals_will_convert:0 "My [GetGovernment( 'pirate_government' ).GetName] vassals will change to [GetGovernment( 'feudal_government' ).GetName]"
 pirate_vassals_will_convert_lp:0 "My [GetGovernment( 'pirate_government' ).GetName] vassals will change to [GetGovernment( 'lp_feudal_government' ).GetName]"
 msg_vassal_common_feudalised:0 "Vassal has become Feudal"
 msg_vassal_common_feudalised_desc:0 "Your vassal, [ROOT.Char.GetShortUIName], has given up [ROOT.Char.GetHerHis]  [GetGovernment( 'pirate_government' ).GetNameNoTooltip] and become [GetGovernment( 'feudal_government' ).GetNameNoTooltip]"
 msg_vassal_lp_feudalised:0 "Vassal has become Feudal"
 msg_vassal_lp_feudalised_desc:0 "Your vassal, [ROOT.Char.GetShortUIName], has given up [ROOT.Char.GetHerHis]  [GetGovernment( 'pirate_government' ).GetNameNoTooltip] and become [GetGovernment( 'lp_feudal_government' ).GetNameNoTooltip]"
 all_pirate_holding_will_change:0 "All [pirate_den_holding|E] in the realm will become [castle_holdings|E]"
 agot_pirate_events.0001.t:0 "A New Era"
 agot_pirate_events.0001.desc:0 "The old ways have served us well, and we will always honor them. However, as the [ROOT.Char.GetTitleAsNameNoTooltip] of [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], I have concluded that we must adopt feudalism and its principles if we shall continue to prosper. It is the crucial next step on our road to greatness!"
 agot_pirate_events.0001.a:0 "Long live [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]!"
 agot_pirate_events.0002.opening:0 "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_converting_to_admin_kings_become_lp_feudal:0 "Any [kingdom|E] [title_tier|E] [vassal|E] will change [government|E] type into [GetGovernment( 'lp_feudal_government' ).GetName]"

 become_landless_pirate_decision:0 "Become a Pirate"
 become_landless_pirate_decision_desc:0 "I have tasted glory and gold as a freebooter. Now it is time to shed my mask and embrace my true nature as a pirate."
 become_landless_pirate_decision_tooltip:0 "Change government type by becoming [GetGovernment( 'pirate_government' ).GetName]"
 become_landless_pirate_decision_confirm:0 "Become a Pirate"

 agot_located_in_pirating_region:0 "You must be located in a region known for piracy, such as the [GetGeographicalRegion('world_stepstones').GetName]."
 become_landless_pirate_decision_tt:0 "You become a landless [pirate_govt|E]"

 abandon_pirate_holdings_decision:0 "Become a Landless Pirate"
 abandon_pirate_holdings_decision_desc:0 "Ruling over dull rocks and pirate dens is a tedious life. It is time to devote myself wholly to the seas, as a plunderer and corsair!"
 abandon_pirate_holdings_decision_tooltip:0 "Reject your landed titles and become a landless pirate"
 abandon_pirate_holdings_decision_confirm:0 "Abandon my Landed Holdings"

 agot_pirate_higher_tier_title_decision:0 "[ROOT.Char.Custom('GetDominateTitleLoc')]"
 agot_pirate_higher_tier_title_decision_title:0 "Dominate [ROOT.Char.GetPrimaryTitle.GetDeJureLiege.GetBaseNameNoTierNoTooltip]"
 agot_pirate_higher_tier_title_decision_desc:0 "It is time to prove my dominance over the area, and subjugate those who live here."
 agot_pirate_higher_tier_title_decision_tooltip:0 "Attempt to gain a higher [title_tier|E] [title|E]"
 agot_pirate_higher_tier_title_decision_confirm:0 "They will fall before me"

 agot_become_landed_pirate_decision:0 "Embrace Piracy"
 agot_become_landed_pirate_decision_desc:0 "If I am to thrive among pirates, I must fully embrace piracy as my form of government."
 agot_become_landed_pirate_decision_tooltip:0 "Become a Pirate"
