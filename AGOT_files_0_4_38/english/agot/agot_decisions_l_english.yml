 decision_reforge_longthorn_alt:0 "Restore Longthorn"
 decision_reforge_longthorn_desc_alt:0 "The blade of Longthorn survives, for Valyrian steel endures even dragonflame. It shall at last be restored to its former glory, its ancient splendor returned anew."

