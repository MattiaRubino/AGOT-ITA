 #Longthorn
 decision_reforge_longthorn:0 "Restore Longthorn"
 decision_reforge_longthorn_desc:0 "The blade of Longthorn survives, for Valyrian steel endures even dragonflame. Yet our house swore a solemn oath that it would not be reforged until Highgarden is reclaimed and House Gardener restored to glory."
 decision_reforge_longthorn_tooltip:0 "You will have the blade of Longthorn reforged into a usable sword"
