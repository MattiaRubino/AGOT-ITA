 building_type_agot_great_fleet_01: "Fleetport"
 building_type_agot_great_fleet_01_desc: "This port maintains a great fleet, projecting naval power over the nearby seas and shores."

 building_agot_great_fleet_01: "Fleetport"
 building_agot_great_fleet_01_desc: "This port maintains a great fleet, projecting naval power over the nearby seas and shores. Such a construction can only be achieved through a [great_project|E]."

 building_agot_great_fleet_02: "Extensive Fleetport"
 building_agot_great_fleet_02_desc: "This port has been expanded to support a far larger fleet, extending its reach and projecting both naval power and growing wealth across the nearby seas and shores. Such a construction can only be achieved through a [great_project|E]."

 building_agot_great_fleet_03: "Formidable Armament"
 building_agot_great_fleet_03_desc: "This port now anchors a massive fleet, transforming it into a decisive instrument of war and commerce that dominates the nearby seas and shores. It stands as a formidable military force, capable of crushing enemy navies and enforcing its will upon the waves. Such a construction can only be achieved through a [great_project|E]."