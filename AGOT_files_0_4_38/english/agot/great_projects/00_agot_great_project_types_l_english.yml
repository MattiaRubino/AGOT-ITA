l_english:

 ### Great Fleet ###
 great_project_type_construct_great_fleet_01: "Build a Great Fleet"
 great_project_type_construct_great_fleet_01_desc: "The coasts of my [domain|E] must be protected, and what better way to ensure safety and project power across the seas than by building a great fleet?"
 great_project_type_construct_great_fleet_01_coastal_barony: "Must be a coastal barony"

 great_project_type_construct_great_fleet_02: "Expand the Great Fleet"
 great_project_type_construct_great_fleet_02_desc: "Having developed a great fleet to protect the [domain|E], we have realized that the fleet has room to grow. What better way to project our wealth and power than by expanding it further?"
 great_project_type_construct_great_fleet_02_coastal_county: "Must be a coastal county and have $building_agot_great_fleet_01$"

 great_project_type_construct_great_fleet_03: "Establish a Fleet Armament"
 great_project_type_construct_great_fleet_03_desc: "Now that the great fleet has been expanded, it stands as a beacon of development within my [domain|E]. Yet such prosperity must be protected. We must assemble a great armament to properly defend the waters of my realm!"
 great_project_type_construct_great_fleet_03_coastal_county: "Must be a coastal county and have $building_agot_great_fleet_02$"

 great_project_type_construct_great_fleet_01_contribution_materials: "Materials"
 great_project_type_construct_great_fleet_01_contribution_materials_desc: "Nothing can be built from nothing. We will provide the [great_project|E] with all the materials needed to complete work on the fleet."

 great_project_type_construct_great_fleet_01_contribution_workforce: "Workforce"
 great_project_type_construct_great_fleet_01_contribution_workforce_desc: "Ships don't build themselves! We will supply the [great_project|E] with the manpower needed to complete this great undertaking."

 great_project_type_construct_great_fleet_01_contribution_engineers: "Naval Engineers"
 great_project_type_construct_great_fleet_01_contribution_engineers_desc: "Skilled shipwrights and naval engineers will lend their expertise to the [great_project|E], improving the fleet's construction effort."

 great_project_type_construct_great_fleet_01_contribution_military_wharf: "Military Wharf"
 great_project_type_construct_great_fleet_01_contribution_military_wharf_desc: "Adding a dedicated harbor and drydock to the [great_project|E] will increase the fleet's durability and longevity."

 great_project_type_construct_great_fleet_01_contribution_merchant_quays: "Merchant Quays"
 great_project_type_construct_great_fleet_01_contribution_merchant_quays_desc: "Adding dedicated merchant quays to the [great_project|E] will increase the trade and revenue flowing through the fleetport."

