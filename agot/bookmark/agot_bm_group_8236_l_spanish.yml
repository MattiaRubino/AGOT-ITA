  agot_bm_group_8236:0 "236 A.C."
  
  bookmark_236_lyonel_baratheon:0 "Lord Lyonel"
  bookmark_236_lyonel_baratheon_subheading:0 "Lord Protettore delle Terre della Tempesta"
  bookmark_236_lyonel_baratheon_desc:0 "[Concept( 'story_content_lyonel_baratheon_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_lyonel_baratheon_236', '$bm_story_content_available_copy|q$' )|E]\nNoto come la «Tempesta che Ride», Lord Lyonel Baratheon è un uomo gigantesco e spavaldo. Si coprì di gloria al torneo di Ashford Meadow nel 209 A.C., sebbene una cupa ombra gravi su quella fatidica giostra. Fu il giovane Principe Aegon a invitare Lord Lyonel a unirsi a Ser Duncan «l'Alto» nella sua Prova dei Sette... una vittoria dal costo terribile.\n\nOra, con un'altra ribellione Blackfyre all'orizzonte, Re Aegon V Targaryen spera di assicurarsi un'alleanza promettendo il suo primogenito ed erede, il Principe Duncan Targaryen, alla figlia di Lord Lyonel — #bold ma la Tempesta che Ride si schiererà ancora una volta dalla parte dei vincitori?#!"
  
  bookmark_236_ormund_baratheon:0 "Ormund"
  bookmark_236_cassandra_baratheon:0 "Cassandra"
  
  bookmark_236_aegon_targaryen:0 "Re Aegon V"
  bookmark_236_aegon_targaryen_subheading:0 "$BOOKMARK_SUBHEADING_IRON_THRONE_DEFAULT$"
  bookmark_236_aegon_targaryen_desc:0 "[Concept( 'story_content_aegon_v_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_aegon_v_236', '$bm_story_content_available_copy|q$' )|E]\nIl regno di Re Aegon V Targaryen ebbe inizio nel pieno di un rigido inverno, che solo ora è finalmente terminato. Nei primi anni del suo dominio, il Re Improbabile inviò ingenti carichi di viveri e granaglie per soccorrere una popolazione affamata, guadagnandosi l'ammirazione del popolo minuto. Benché sia amato dai piccoli, tra i lord del reame vi sono coloro che si sentono privati dei propri poteri dalle nuove riforme del re.\n\n#bold I lord del reame si raccoglieranno attorno al loro legittimo sovrano, o volteranno gabbana per unirsi alla causa di Daemon Blackfyre?#!"
  
  bookmark_236_duncan_targaryen:0 "Principe Duncan «il Piccolo»"
  bookmark_236_duncan_targaryen_subheading:0 "Principe di Roccia del Drago"
  bookmark_236_duncan_targaryen_desc:0 "Chiamato così in onore del mentore del re e suo vecchio amico, Ser Duncan «l'Alto», il Principe Duncan «il Piccolo» è il primogenito del re, Principe di Roccia del Drago ed erede al Trono di Spade. Suo padre nutre grandi disegni per il suo fidanzamento, così da rinsaldare i legami di Casa Targaryen con gli alti lord del reame e lenire il loro amor proprio ferito alla luce delle riforme del sovrano. Duncan, tuttavia, è un principe di forte volontà. Se suo padre sposò per amore, perché mai non dovrebbe fare altrettanto?\n\n#bold Duncan «il Piccolo» manterrà il proprio dovere verso il reame e il suo re, o prenderà in moglie una sposa di sua scelta?#!"
  bookmark_236_jaehaerys_targaryen:0 "Principe Jaehaerys"
  
  bookmark_236_betha_blackwood:0 "Betha «la Nera»"
  bookmark_236_duncan_tall:0 "Ser Duncan"
  
  bookmark_236_gerold_lannister:0 "Lord Gerold «il Dorato»"
  bookmark_236_gerold_lannister_subheading:0 "Guardiano dell'Ovest"
  bookmark_236_gerold_lannister_desc:0 "Gerold Lannister, Lord di Castel Granito e Guardiano dell'Ovest, iniziò il proprio governo dopo la morte sospetta e prematura tanto di suo fratello Tybolt quanto di sua nipote Cerelle. Né i suoi vassalli né il popolo minuto nutrono affetto per lui, ritenendolo un uccisore di parenti. Cionondimeno, il suo dominio è stato prospero, e Gerold «il Dorato» è riuscito ad accrescere grandemente la ricchezza e l'influenza di Casa Lannister. Ma il lord un tempo capace è ora confinato ai suoi appartamenti, lasciando il governo di Castel Granito all'ambiziosa Lady Ellyn Reyne, moglie di suo figlio ed erede, Tion.\n\n#bold Il leone dorato lascerà che il proprio potere e la propria eredità cadano nelle zampe rapaci di una leonessa rossa?#!"
  bookmark_236_ellyn_reyne:0 "Ellyn"
  bookmark_236_tion_lannister:0 "Ser Tion"
  
  bookmark_236_bittersteel:0 "Capitano-Generale Aegor"
  bookmark_236_bittersteel_subheading:0 "Capitano-Generale della Compagnia Dorata"
  bookmark_236_bittersteel_desc:0 "[Concept( 'story_content_bittersteel_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_bittersteel_236', '$bm_story_content_available_copy|q$' )|E]\nSpinto da fuoco e furia, Aegor «Bittersteel» si è ritagliato fama oltre i Sette Regni. Il feroce Capitano-Generale della Compagnia Dorata ha incoronato Daemon III Blackfyre quale legittimo Re del Trono di Spade, e i due stanno preparando un'invasione di Westeros. La forza congiunta della Compagnia Dorata, dell'Oste Blackfyre e di qualunque lord scelga di unirsi alla loro causa costituirà senz'altro una sfida poderosa per il falso Re Aegon V e i suoi lealisti.\n\n#bold Bittersteel riuscirà infine a porre un Blackfyre sul Trono di Spade?#!"
  
  bookmark_236_daemon_blackfyre:0 "Re Daemon III"
  bookmark_236_daemon_blackfyre_subheading:0 "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_236_daemon_blackfyre_desc:0 "[Concept( 'story_content_daemon_blackfyre_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_daemon_blackfyre_236', '$bm_story_content_available_copy|q$' )|E]\nDaemon III Blackfyre, figlio maggiore di Haegon I Blackfyre e terzo del suo nome, è stato incoronato da Aegor «Bittersteel» Rivers a Tyrosh. Egli guida un'armata di cavalieri esuli e guerrieri delle Città Libere pronta a salpare attraverso il Mare Stretto, nella speranza di conquistare, una volta per tutte, il Trono di Spade per Casa Blackfyre. Benché il temibile Bittersteel gli stia al fianco, Daemon ha ancora bisogno di attirare alla sua causa alcuni dei lord del reame.\n\n#bold La Quarta Ribellione Blackfyre riuscirà finalmente?#!"
  
  bookmark_236_maelys:0 "Maelys «il Mostruoso»"
  bookmark_236_aemond_blackfyre:0 "Principe Aemon"