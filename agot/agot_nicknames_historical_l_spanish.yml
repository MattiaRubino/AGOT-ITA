  nick_agot_historical_the_bad_apple_desc:0 "Uno della famigerata Banda dei Nove, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] un cavaliere esiliato dalla reputazione nera."
  nick_agot_historical_the_bald:0 "il Calvo"
  nick_agot_historical_the_barber_nute:0 "il Barbiere"
  nick_agot_historical_the_barber_nute_desc:0 "Si dice che tanta sia l'abilità di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] con l'ascia, che [CharYouSheHe(CHARACTER)] possa radere un uomo con un colpo lanciato da venti iarde di distanza."
  nick_agot_historical_the_bard_bael:0 "il Bardo"
  nick_agot_historical_the_bard_bael_desc:0 "Re-oltre-la-Barriera e tra i più grandi razziatori del suo tempo, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] anche celebre per l'arte del canto — con cui ottenne il fiore più bello che crescesse nei giardini di Winterfell."
  nick_agot_historical_the_bard_loron:0 "il Bardo"
  nick_agot_historical_the_bard_loron_desc:0 "Signore degli Uomini di Ferro, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] per la grande e tragica amicizia con un cavaliere delle terre verdi."
  nick_agot_historical_the_barren:0 "lo Sterile"
  nick_agot_historical_the_bastard:0 "il Bastardo"
  nick_agot_historical_the_bat:0 "il Pipistrello"
  nick_agot_historical_the_bear:0 "l'Orso"
  nick_agot_historical_the_beast_of_harrenhal:0 "la Bestia di Harrenhal"
  nick_agot_historical_the_beautiful:0 "il Bell[Select_CString(CHARACTER.IsFemale,'a','o')]"
  nick_agot_historical_the_beggar_king:0 "il Re Mendicante"
  nick_agot_historical_the_beggar_king_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] potrebbe essere re di diritto, ma la realtà lascia molto a desiderare."
  nick_agot_historical_the_belly:0 "il Pancione"
  nick_agot_historical_the_belly_lorimer:0 "il Pancione"
  nick_agot_historical_the_belly_lorimer_desc:0 "Pingue e dal ventre grande, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharHaveHas(CHARACTER)] difficoltà a tenere le mani lontane dal cibo."
  nick_agot_historical_the_besieger:0 "l'Assediante"
  nick_agot_historical_the_big:0 "il Grand[Select_CString(CHARACTER.IsFemale,'e','e')]"
  nick_agot_historical_the_big_bucket:0 "il Grande Secchio"
  nick_agot_historical_the_big_man:0 "il Gigante"
  nick_agot_historical_the_big_man_desc:0 "Alto sei piedi e mezzo, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharHaveHas(CHARACTER)] gambe come tronchi d'albero, mani grandi come prosciutti e nessun collo."
  nick_agot_historical_the_big_prefix:0 "Grande"
  nick_agot_historical_the_bitter:0 "l'Amaro"
