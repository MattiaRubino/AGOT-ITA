  nick_agot_historical_bronze_axe:0 "Ascia di Bronzo"
  nick_agot_historical_bronze_bitch:0 "la Cagna di Bronzo"
  nick_agot_historical_bronze_bitch_desc:0 "Così soprannominat[Select_CString(CHARACTER.IsFemale,'a','o')] dal marito Daemon, in scherno riferimento all'antica armatura della sua Casa."
  nick_agot_historical_brown:0 "Bruno"
  nick_agot_historical_browntooth:0 "Dentebruno"
  nick_agot_historical_buckets:0 "Secchi"
  nick_agot_historical_buttercat:0 "Gattodiburre"
  nick_agot_historical_butterkitten:0 "Gattinodiburre"
  nick_agot_historical_cleftjaw:0 "Mandibolascheggiata"
  nick_agot_historical_cleftjaw_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] bear[_s(CHARACTER)] una cicatrice orribile sulla bocca, dove fu quasi spaccat[Select_CString(CHARACTER.IsFemale,'a','o')] in due dal fendente di una lunga ascia."
  nick_agot_historical_clubfoot:0 "Piedetorto"
  nick_agot_historical_clubfoot_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] nat[Select_CString(CHARACTER.IsFemale,'a','o')] con un piede contorto e deformato, un male che ha afflitto [Select_CString(CHARACTER.IsFemale,'lei','lui')] per tutta la vita."
  nick_agot_historical_coldwind:0 "Ventofreddo"
  nick_agot_historical_cornburner:0 "Bruciagranoturco"
  nick_agot_historical_corpse:0 "Cadavere"
  nick_agot_historical_cotter:0 "Cotter"
  nick_agot_historical_crabfeeder:0 "Mangiagranchi"
  nick_agot_historical_crabfeeder_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ordinò che centinaia di pirati venissero impalati sulle spiagge delle Pietre del Passo."
  nick_agot_historical_crowfood:0 "Cibodicorvi"
  nick_agot_historical_crowfood_desc:0 "Mentre dormiva ai bordi di una strada, un corvo cavò l'occhio di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]. [CharYouSheHe(CHARACTER)] ripagò il favore mordendogli via la testa."
  nick_agot_historical_crowkiller:0 "Ammazzacorvi"
  nick_agot_historical_crowkiller_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] guadagnò infamia uccidendo confratelli neri dei Guardiani della Notte."
  nick_agot_historical_crows_eye:0 "Occhio di Corvo"
  nick_agot_historical_crows_eye_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] wear[_s(CHARACTER)] una benda di cuoio nero sull'occhio sinistro, che alcuni bisbigliano essere un globo nero splendente di malizia."
  nick_agot_historical_dame_of_andalos:0 "la Dama di Andalos"
  nick_agot_historical_damphair:0 "Capellibagnati"
  nick_agot_historical_damphair_desc:0 "Ritrovandosi miracolosamente a riva dopo essere quasi mort[Select_CString(CHARACTER.IsFemale,'a','o')] in una tempesta, [CHARACTER.GetShortUINameNoTooltipNoFormat] avrebbe consacrato la sua vita al Dio Abissale, e da allora avrebbe mantenuto i capelli bagnati."
  nick_agot_historical_dance_for_me:0 "Danza-Per-Me"
  nick_agot_historical_darkrobin:0 "Pettiroscuro"
  nick_agot_historical_darkstar:0 "Stella Oscura"
  nick_agot_historical_darkstar_desc:0 "Gli uomini chiamano [Select_CString(CHARACTER.IsFemale,'lei','lui')] 'Stella Oscura.' [CharYouSheHe(CHARACTER)|U] [CharAreIs(CHARACTER)] della notte."
  nick_agot_historical_dashing_prefix:0 "Sfolgorante"
  nick_agot_historical_deaf:0 "Sordo"
  nick_agot_historical_dim:0 "Ottuso"
