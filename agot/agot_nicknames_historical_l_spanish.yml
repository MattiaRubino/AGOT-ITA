  nick_agot_historical_iron:0 "Ferro"
  nick_agot_historical_iron_banger:0 "Picchiaferro"
  nick_agot_historical_ironfoot:0 "Piede di Ferro"
  nick_agot_historical_ironhand:0 "Mano di Ferro"
  nick_agot_historical_ironhand_desc:0 "Cavalierizzat[Select_CString(CHARACTER.IsFemale,'a','o')] per il valore durante l'Assedio di Pyke, [CHARACTER.GetShortUINameNoTooltipNoFormat] perse la mano destra nei combattimenti, sostituendola poi con una mano di ferro."
  nick_agot_historical_ironrod:0 "Verga di Ferro"
  nick_agot_historical_jingelbells:0 "Campanellino"
  nick_agot_historical_jingelbells_desc:0 "Il Folle tardo di mente dei the Twins, [CHARACTER.GetShortUINameNoTooltipNoFormat] indossa una corona e un collare decorati con piccoli sonagli di ottone."
  nick_agot_historical_kegs:0 "Barili"
  nick_agot_historical_kin_killer:0 "Uccisore di Parenti"
  nick_agot_historical_kin_killer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] uccise il proprio fratello Durran, che s'era invaghito della figlia di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U]."
  nick_agot_historical_knight_of_the_moon:0 "Cavaliere della Luna"
  nick_agot_historical_knight_of_the_pantry:0 "il Cavaliere della Dispensa"
  nick_agot_historical_lady_bird:0 "la Coccinella"
  nick_agot_historical_lame:0 "Zoppo"
