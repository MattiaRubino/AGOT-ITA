  nick_agot_historical_dusteye:0 "Occhiodipolvere"
  nick_agot_historical_evenstar:0 "Stella della Sera"
  nick_agot_historical_ever_sweet:0 "Sempre Dolce"
  nick_agot_historical_ever_sweet_desc:0 "La leggenda narra che [CHARACTER.GetShortUINameNoTooltipNoFormat] amasse talmente il miele che [CharYouSheHe(CHARACTER)] strinse un patto con il Re delle Api per prendersi cura dei suoi figli, e dei figli dei suoi figli, per tutto il tempo a venire."
  nick_agot_historical_fair:0 "Bello"
  nick_agot_historical_fairhands:0 "Mani Belle"
  nick_agot_historical_falconhelm:0 "Elmo di Falco"
  nick_agot_historical_fat:0 "Grasso"
  nick_agot_historical_fighting_fool:0 "Folle Combattente"
  nick_agot_historical_fireball:0 "Palla di Fuoco"
  nick_agot_historical_fireball_desc:0 "Così chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] per i capelli rossi e il temperamento ardente, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] considerat[Select_CString(CHARACTER.IsFemale,'a','o')] uno dei migliori cavalieri del tempo di [CharYourHerHis(CHARACTER)]."
  nick_agot_historical_first_goose:0 "Prima Piuma"
  nick_agot_historical_first_goose_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] il primo di una terna di gemelli."
  nick_agot_historical_flatnose:0 "Nasopiatto"
  nick_agot_historical_fletcher:0 "Impennatore"
  nick_agot_historical_four_groats:0 "Quattro Soldi"
  nick_agot_historical_fourskins:0 "Quattro Pelli"
  nick_agot_historical_fourskins_desc:0 "Mutapelle di grande talento, [CHARACTER.GetShortUINameNoTooltipNoFormat] indossa le pelli di quattro bestie."
  nick_agot_historical_foxglove:0 "Digitale"
  nick_agot_historical_frostfinger:0 "Dito Gelato"
  nick_agot_historical_frostfinger_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] perse due dita per congelamento mentre veniva tenut[Select_CString(CHARACTER.IsFemale,'a','o')] in una gabbia di ghiaccio."
  nick_agot_historical_gatehouse:0 "Portineria"
  nick_agot_historical_gatehouse_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] si dice alzi la saracinesca per ogni cavaliere che passa."
  nick_agot_historical_giantsbane:0 "Flagello dei Giganti"
  nick_agot_historical_giantsbane_desc:0 "Si dice abbia ucciso un gigante; [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharYourHerHimself(CHARACTER)] afferma invece che [CharYouSheHe(CHARACTER)] ne squarciò il ventre e vi si arrampicò dentro per scaldarsi — e poi lo allattò per tre mesi dopo che quello si risvegliò."
  nick_agot_historical_ginger:0 "Rosso"
  nick_agot_historical_godsgrief:0 "Cordoglio degli Dei"
  nick_agot_historical_godsgrief_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] conquistò l'amore della bella Elenei, figlia degli dei, e la prese in moglie. Per questo, il dio del mare e la dea del vento scatenarono la loro ira sulla dimora di [CharYourHerHis(CHARACTER)], distruggendone una dopo l'altra, finché non venne infine resistito dalla settima e ultima fortezza — Storm's End."
  nick_agot_historical_gold_tree:0 "Albero d'Oro"
  nick_agot_historical_golden:0 "Dorato"
  nick_agot_historical_goldstag:0 "Cervo d'Oro"
  nick_agot_historical_great_axe:0 "Grande Ascia"
  nick_agot_historical_greatheart:0 "Gran Cuore"
  nick_agot_historical_greatjon:0 "Granjon"
  nick_agot_historical_greatjon_desc:0 "Uomo enorme, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] alto sette piedi e largo il doppio. Guerriero formidabile con pugni grossi come prosciutti, molti considerano [CharYourHerHim(CHARACTER)] uno degli uomini viventi più forti di Westeros."
  nick_agot_historical_greenbeard:0 "Barbaverde"
  nick_agot_historical_greenbeard_desc:0 "La barba di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] è tinta di una brillante sfumatura di verde."
  nick_agot_historical_greenhand:0 "Manoverde"
  nick_agot_historical_greensail:0 "Velaverde"
  nick_agot_historical_grey_eyes:0 "Occhi Grigi"
  nick_agot_historical_greybeard:0 "Barbagrigia"
  nick_agot_historical_greycloak:0 "Mantogrigio"
  nick_agot_historical_greysteel:0 "Acciaiogrigio"
  nick_agot_historical_greysteel_desc:0 "Cavaliere di una certa fama, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] tanto abile nelle armi da poterlo insegnare ad altri."
  nick_agot_historical_grim:0 "Truce"
  nick_agot_historical_half_hoare:0 "Mezzo Hoare"
  nick_agot_historical_halfblood:0 "Mezzosangue"
