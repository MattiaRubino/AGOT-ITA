  nick_agot_historical_ambercloak:0 "Mantello d'Ambra"
  nick_agot_historical_anvil_of_hammerhal:0 "l'Incudine di Hammerhal"
  nick_agot_historical_anvilbreaker:0 "Spezzaincudine"
  nick_agot_historical_anvilbreaker_desc:0 "Un potente guerriero degli Uomini di Ferro, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharHaveHas(CHARACTER)] da tempo perso il conto di quante teste [CharYouSheHe(CHARACTER)] [CharHaveHas(CHARACTER)] schiacciato contro [Select_CString(CHARACTER.IsFemale,'la sua','il suo')] incudine."
  nick_agot_historical_apple_eater:0 "Mangiamele"
  nick_agot_historical_apple_eater_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] si distinse [CharYourHerHimself(CHARACTER)] durante la Battaglia delle Acque Nere, guadagnandosi questo nome catturando un cavaliere di Casa Fossoway e uccidendone altri due."
  nick_agot_historical_appleseed:0 "Sementamela"
  nick_agot_historical_badbrother:0 "Fratellocattivo"
  nick_agot_historical_badbrother_desc:0 "Il primo atto di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] da re fu far uccidere tutti i figli del suo predecessore, un gesto che portò molti a ritenere [Select_CString(CHARACTER.IsFemale,'lei','lui')] indegn[Select_CString(CHARACTER.IsFemale,'a','o')] del nome della sua Casa."
  nick_agot_historical_be_lucky:0 "Sii-Fortunato"
  nick_agot_historical_be_lucky_desc:0 "Con un solo occhio rimasto al suo volto, alcuni hanno iniziato a domandarsi se [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] davvero degn[Select_CString(CHARACTER.IsFemale,'a','o')] di questo appellativo."
  nick_agot_historical_big:0 "Grosso"
  nick_agot_historical_big_desc:0 "Di corporatura possente e braccio vigoroso, [CHARACTER.GetShortUINameNoTooltipNoFormat] sovrasta facilmente i suoi pari."
  nick_agot_historical_big_belly:0 "Pancione"
  nick_agot_historical_big_liddle:0 "Grande Liddle"
  nick_agot_historical_big_liddle_desc:0 "Chiamato così perché primogenito del Liddle, [CHARACTER.GetShortUINameNoTooltipNoFormat] stand[_s(CHARACTER)] poco più alto dell'uomo comune."
  nick_agot_historical_big_walder_frey:0 "Grosso"
  nick_agot_historical_big_walder_frey_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] nat[Select_CString(CHARACTER.IsFemale,'a','o')] cinquantadue giorni prima del cugino 'Piccolo Walder', sebbene questi appellativi potrebbero non riflettere le stature fisiche [CharYourTheir(CHARACTER)]."
  nick_agot_historical_bitterbee:0 "Apeamara"
  nick_agot_historical_bittersteel:0 "Acciaio Amaro"
  nick_agot_historical_bittersteel_desc:0 "Bastard[Select_CString(CHARACTER.IsFemale,'a','o')] di Aegon IV, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] per la sua natura amara e per la feroce abilità in combattimento."
  nick_agot_historical_black:0 "Nero"
  nick_agot_historical_black_bear:0 "Orso Nero"
  nick_agot_historical_black_pearl:0 "Perla Nera"
  nick_agot_historical_blackbean:0 "Fagiolonero"
  nick_agot_historical_blackbolt:0 "Dardonerо"
  nick_agot_historical_blackcrown:0 "Corona Nera"
  nick_agot_historical_blackfish:0 "Pesce Nero"
  nick_agot_historical_blackfish_desc:0 "Chiamato 'la capra nera del gregge dei Tully' da suo fratello, [CHARACTER.GetShortUINameNoTooltipNoFormat] prese una trota nera come sigillo, e per essa divenne not[Select_CString(CHARACTER.IsFemale,'a','o')] a tutti."
  nick_agot_historical_blackheart:0 "Cuor Nero"
  nick_agot_historical_blackheart_desc:0 "Detto così a causa del sigillo della sua Casa, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharHaveHas(CHARACTER)] una fama temibile, eppure sotto di essa bear[_s(CHARACTER)] un cuore che smenti[_s(CHARACTER)] il suo nome."
  nick_agot_historical_blacklance:0 "Lancia Nera"
  nick_agot_historical_blackshield:0 "Scudo Nero"
  nick_agot_historical_blacksword:0 "Spadanera"
  nick_agot_historical_blackthumb:0 "Pollicenero"
  nick_agot_historical_bleak:0 "Tristo"
  nick_agot_historical_bloodaxe:0 "Ascia di Sangue"
  nick_agot_historical_bloodbeard:0 "Barba di Sangue"
  nick_agot_historical_bloodbeard_desc:0 "Not[Select_CString(CHARACTER.IsFemale,'a','o')] per il folto cespuglio di barba con baffi rosso fuoco e lunghe trecce, [CHARACTER.GetShortUINameNoTooltipNoFormat] altrettanto revel[_s(CHARACTER)] nello spargere ciò che è divenuto il suo nome."
  nick_agot_historical_bloodborn:0 "Nato nel Sangue"
  nick_agot_historical_bloodless:0 "Senzasangue"
  nick_agot_historical_bloodraven:0 "Corvo di Sangue"
  nick_agot_historical_bloodraven_desc:0 "Bastard[Select_CString(CHARACTER.IsFemale,'a','o')] di Aegon IV, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] nat[Select_CString(CHARACTER.IsFemale,'a','o')] con un segno rosso a forma di corvo sul collo, che risalta contro la sua pelle d'albino."
  nick_agot_historical_bloody:0 "Sanguinoso"
  nick_agot_historical_bluespur:0 "Sperone Blu"
  nick_agot_historical_bluetooth:0 "Denteblu"
  nick_agot_historical_bonehand:0 "Manodossa"
  nick_agot_historical_bonesuckled:0 "Noccad'ossa"
  nick_agot_historical_books:0 "Libri"
  nick_agot_historical_brave_bentbow:0 "Arco Curvo il Coraggioso"
  nick_agot_historical_breakbones:0 "Spezzaossa"
  nick_agot_historical_breakbones_desc:0 "Benedett[Select_CString(CHARACTER.IsFemale,'a','o')] da una struttura enorme e possente, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] celebrat[Select_CString(CHARACTER.IsFemale,'a','o')] come l'uomo più forte dei Sette Regni."
  nick_agot_historical_breakspear:0 "Spezzalancia"
  nick_agot_historical_breakspear_desc:0 "All'età di diciassette anni, [CHARACTER.GetShortUINameNoTooltipNoFormat] disarcionò in giostra il grande guerriero Ser Daemon Blackfyre, guadagnandosi il soprannome di Spezzalancia."
  nick_agot_historical_breaksword:0 "Spezzaspada"
  nick_agot_historical_brightflame:0 "Fiammafulgida"
  nick_agot_historical_brightflame_desc:0 "Not[Select_CString(CHARACTER.IsFemale,'a','o')] per il suo comportamento eccentrico, [CHARACTER.GetShortUINameNoTooltipNoFormat] prefer[_s(CHARACTER)] farsi chiamare 'Fiammafulgida'."
  nick_agot_historical_brightmane:0 "Crinierafulgida"
  nick_agot_historical_brightrune:0 "Runefulgide"
  nick_agot_historical_brightsmile:0 "Sorrisolucente"
