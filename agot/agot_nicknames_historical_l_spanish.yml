  nick_agot_historical_sick_leek:0 "Porro Malato"
  nick_agot_historical_silveraxe:0 "Ascia d'Argento"
  nick_agot_historical_silverhair_sigfryd:0 "Chioma d'Argento"
  nick_agot_historical_silverhair_sigfryd_desc:0 "Un vecchio, alcuni credono che [CHARACTER.GetShortUINameNoTooltipNoFormat] intend[_s(CHARACTER)] vivere in eterno."
