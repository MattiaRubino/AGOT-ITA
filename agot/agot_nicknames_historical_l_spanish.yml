  nick_agot_historical_stonesnake:0 "Serpente di Pietra"
  nick_agot_historical_stormborn:0 "Nat[Select_CString(CHARACTER.IsFemale,'a','o')] nella Tempesta"
  nick_agot_historical_stormborn_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] nat[Select_CString(CHARACTER.IsFemale,'a','o')] durante una grande tempesta che causò molta distruzione."
  nick_agot_historical_stormsword:0 "Spada della Tempesta"
  nick_agot_historical_strong_prefix:0 "Forte"
  nick_agot_historical_strongboar:0 "Cinghialeforte"
  nick_agot_historical_strongboar_desc:0 "Dotat[Select_CString(CHARACTER.IsFemale,'a','o')] di un corpo grande e di una voce tonante, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] considerat[Select_CString(CHARACTER.IsFemale,'a','o')] da molti l'uomo vivente più forte di Westeros."
  nick_agot_historical_stump_hand:0 "Mano Mozza"
  nick_agot_historical_sunbane:0 "Flagello del Sole"
  nick_agot_historical_stump_hand_desc:0 "La leggenda narra che [CHARACTER.GetShortUINameNoTooltipNoFormat] conquistò la corona in una danza delle dita, al prezzo di due delle sue dita."
  nick_agot_historical_sweetberry:0 "Baccadolce"
  nick_agot_historical_sweetberry_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] così dalla Principessa Saera, che lo considerava tra i suoi prediletti."
