  nick_agot_historical_lemoncloak_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] così chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] per il mantello che [CharYouSheHe(CHARACTER)] wear[_s(CHARACTER)]: un grande mantello giallo con cappuccio che fa sembrare [CharYouHerHim(CHARACTER)] un enorme uccello giallo."
  nick_agot_historical_lightheart:0 "Cuorleggero"
