  nick_agot_historical_the_black_harren:0 "il Nero"
  nick_agot_historical_the_black_harren_desc:0 "Tiranno vano e sanguinario, odiato da coloro che governava, [CHARACTER.GetShortUINameNoTooltipNoFormat] sovrintese al completamento di Harrenhal al prezzo di grandi sofferenze per le Terre dei Fiumi e le Isole di Ferro."
  nick_agot_historical_the_black_lion:0 "il Leone Nero"
  nick_agot_historical_the_black_prefix:0 "Nero"
  nick_agot_historical_the_black_priest:0 "il Prete Nero"
  nick_agot_historical_the_black_rose:0 "la Rosa Nera"
  nick_agot_historical_the_black_shepherd:0 "il Pastore Nero"
  nick_agot_historical_the_black_swan:0 "il Cigno Nero"
  nick_agot_historical_the_black_swan_historical_desc:0 "Schiavizzat[Select_CString(CHARACTER.IsFemale,'a','o')] in gioventù, [CHARACTER.GetShortUINameNoTooltipNoFormat] divenne una cortigiana celebrata e la sovrana di Lys in tutto fuorché nel nome."
  nick_agot_historical_the_black_tempest:0 "la Tempesta Nera"
  nick_agot_historical_the_black_widow:0 "la Vedova Nera"
  nick_agot_historical_the_blackhand:0 "Manonera"
