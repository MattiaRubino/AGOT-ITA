  nick_agot_historical_silvertongue:0 "Lingua d'Argento"
  nick_agot_historical_sixskins:0 "Sei Pelli"
  nick_agot_historical_sixskins_desc:0 "Mutapelle di grande talento, [CHARACTER.GetShortUINameNoTooltipNoFormat] indossa le pelli di tre lupi, un orso delle nevi, un gattoombra e un'aquila."
  nick_agot_historical_sly:0 "Furbo"
  nick_agot_historical_small:0 "Piccolo"
  nick_agot_historical_smalljon:0 "Piccolo Jon"
  nick_agot_historical_smalljon_desc:0 "Nonostante il soprannome, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] robust[Select_CString(CHARACTER.IsFemale,'a','o')] come l'enorme padre, e con il tempo minaccia perfino di superarl[Select_CString(CHARACTER.IsFemale,'a','o')]."
  nick_agot_historical_snowbeard:0 "Barbaneve"
  nick_agot_historical_snowbeard_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] governò il Nord per quasi cent'anni — un regno segnato da minacce di nemici, dentro e fuori."
  nick_agot_historical_softspear:0 "Lancia Molle"
  nick_agot_historical_softspear_desc:0 "Ultimo re Massey, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] uccis[Select_CString(CHARACTER.IsFemale,'a','o')] dal Re della Tempesta Qarlton II Durrandon nella sua conquista di Massey's Hook."
  nick_agot_historical_sourmouth:0 "Boccaamara"
  nick_agot_historical_speardancer:0 "Danzalancia"
  nick_agot_historical_spearlover:0 "Amalancia"
  nick_agot_historical_spotted:0 "Macchiato"
  nick_agot_historical_spotted_butcher:0 "Macchiato"
  nick_agot_historical_spotted_butcher_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] è conosciut[Select_CString(CHARACTER.IsFemale,'a','o')] come Tom 'Macchiato'. Semplice."
  nick_agot_historical_squire:0 "Scudiero"
  nick_agot_historical_stammerer:0 "Balbettante"
  nick_agot_historical_star_eyes:0 "Occhi di Stella"
  nick_agot_historical_star_eyes_desc:0 "Le vecchie canzoni narrano che [CHARACTER.GetShortUINameNoTooltipNoFormat] rimpiazzò gli occhi perduti con zaffiri stellati."
  nick_agot_historical_starfire_samwell:0 "Fuoco Stellare"
  nick_agot_historical_starfire_samwell_desc:0 "Come Re del Torrentine e signore di Starfall, [CHARACTER.GetShortUINameNoTooltipNoFormat] saccheggiò con successo Oldtown."
  nick_agot_historical_steelshanks:0 "Gambe d'Acciaio"
  nick_agot_historical_steelshanks_desc:0 "Uomo alto e cupo, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] per gli schinieri d'acciaio che [CharYouSheHe(CHARACTER)] wear[_s(CHARACTER)] sopra le lunghe gambe di [CharYourHerHis(CHARACTER)]."
  nick_agot_historical_steelsong:0 "Canto d'Acciaio"
  nick_agot_historical_stonehand:0 "Mano di Pietra"
