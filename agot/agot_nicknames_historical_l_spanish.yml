  nick_agot_historical_the_bold_desc:0 "Entrando in una giostra come cavaliere misterioso alla sola età di dieci anni, [CHARACTER.GetShortUINameNoTooltipNoFormat] ricevette questo epiteto per la prima volta dal Principe delle Libellule e, con le [Select_CString(CHARACTER.IsFemale,'sue','sue')] imprese, dimostrò [CharYourHerHimself(CHARACTER)] di esserne più che degn[Select_CString(CHARACTER.IsFemale,'a','o')]."
