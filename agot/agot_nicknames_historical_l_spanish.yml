  nick_agot_historical_hard:0 "Duro"
  nick_agot_historical_hardhand:0 "Manodura"
  nick_agot_historical_hardstone:0 "Pietradura"
  nick_agot_historical_hodor:0 "Hodor"
  nick_agot_historical_hodor_desc:0 "Hodor."
  nick_agot_historical_homeless:0 "Senza Casa"
  nick_agot_historical_homeless_desc:0 "Nat[Select_CString(CHARACTER.IsFemale,'a','o')] in esilio e cresciut[Select_CString(CHARACTER.IsFemale,'a','o')] nella vagabonda Compagnia Dorata, [CHARACTER.GetShortUINameNoTooltipNoFormat] non ebbe mai un luogo da poter davvero chiamare casa."
  nick_agot_historical_honeyed:0 "Mielato"
  nick_agot_historical_hot:0 "Caldo"
  nick_agot_historical_ice_eyes:0 "Occhi di Ghiaccio"
