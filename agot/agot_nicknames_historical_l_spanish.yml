  nick_agot_historical_little_walder_frey:0 "Piccolo"
  nick_agot_historical_little_walder_frey_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] nat[Select_CString(CHARACTER.IsFemale,'a','o')] 52 giorni dopo il cugino, 'Grande Walder', sebbene questo soprannome potrebbe non riflettere le reali dimensioni di [CharYourTheir(CHARACTER)]."
  nick_agot_historical_littlefinger:0 "Ditocorto"
  nick_agot_historical_littlefinger_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] così chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] per la corporatura minuta e snella — e perché la sua Casata possiede soltanto la più piccola delle Fingers."
  nick_agot_historical_littlefoot:0 "Piedino"
  nick_agot_historical_long:0 "Lungo"
  nick_agot_historical_longaxe:0 "Ascia Lunga"
  nick_agot_historical_longinch:0 "Pollice Lungo"
  nick_agot_historical_longneck:0 "Collo Lungo"
  nick_agot_historical_longneck_the_hanged:0 "Collo Lungo l'Impiccato"
  nick_agot_historical_longneck_the_thrice_hanged:0 "Collo Lungo l'Impiccato per Tre Volte"
  nick_agot_historical_longneck_the_twice_hanged:0 "Collo Lungo l'Impiccato per Due Volte"
  nick_agot_historical_longspear_ryk:0 "Lancia Lunga"
  nick_agot_historical_longspear_ryk_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] non fu mai not[Select_CString(CHARACTER.IsFemale,'a','o')] per portare una lancia, se non quella che [CharYouSheHe(CHARACTER)] keep[_s(CHARACTER)] sotto le brache di [CharYourHerHis(CHARACTER)]."
  nick_agot_historical_longthorn:0 "Spina Lunga"
  nick_agot_historical_lophand:0 "Mozzamano"
  nick_agot_historical_lophand_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] perse una mano dopo essere stat[Select_CString(CHARACTER.IsFemale,'a','o')] colto in flagrante a rubare; una punizione crudele che [CharYouSheHe(CHARACTER)] [CharHaveHas(CHARACTER)] covato in rancore da allora."
  nick_agot_historical_lord_of_battles:0 "Signore delle Battaglie"
  nick_agot_historical_lord_of_daughters:0 "il Signore delle Figlie"
  nick_agot_historical_mad:0 "Folle"
  nick_agot_historical_maidensbane:0 "Flagello delle Fanciulle"
  nick_agot_historical_maidensbane_desc:0 "Da Alto Re delle Isole di Ferro, [CHARACTER.GetShortUINameNoTooltipNoFormat] razziò l'Arbor e portò via ogni donna sotto i trent'anni."
  nick_agot_historical_merry:0 "Allegro"
  nick_agot_historical_middle_liddle:0 "Liddle di Mezzo"
  nick_agot_historical_middle_liddle_desc:0 "Così chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] perché secondogenit[Select_CString(CHARACTER.IsFemale,'a','o')] dei Liddle, anche se non spesso in presenza di [CharYourHerHis(CHARACTER)]."
  nick_agot_historical_milk_eye:0 "Occhio di Latte"
  nick_agot_historical_milk_eye_desc:0 "Famigerato re-pirata, [CHARACTER.GetShortUINameNoTooltipNoFormat] combatté in una guerra per Massey's Hook contro il Re della Tempesta Erich VII Durrandon."
  nick_agot_historical_mossdear:0 "Muschiocaro"
  nick_agot_historical_mudfoot:0 "Piede di Fango"
  nick_agot_historical_nine_eyes:0 "Nove Occhi"
  nick_agot_historical_nine_eyes_desc:0 "Il temuto capitano dei 'Compagni Allegri', [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] uno degli infami della Banda dei Nove."
  nick_agot_historical_noseless:0 "Senzanaso"
  nick_agot_historical_noseless_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] perse la punta del naso per un congelamento."
  nick_agot_historical_oakenfist:0 "Pugnodirovere"
  nick_agot_historical_oakenfist_desc:0 "Durante la Guerra delle Figlie, [CHARACTER.GetShortUINameNoTooltipNoFormat] affondò il dromone braavosiano 'Grand Defiance' usando la sua stessa ammiraglia, la 'Regina Rhaenys', come un grande pugno di rovere."
  nick_agot_historical_oakenshield:0 "Scudodirovere"
  nick_agot_historical_oakshanks:0 "Gambedirovere"
  nick_agot_historical_ocean_eyes:0 "Occhi di Oceano"
  nick_agot_historical_of_many_honors:0 "dai Molti Onori"
  nick_agot_historical_of_oldstones:0 "di Oldstones"
  nick_agot_historical_of_oldstones_desc:0 "Strana fanciulla che portava fiori tra i capelli, [CHARACTER.GetShortUINameNoTooltipNoFormat] sosteneva di discendere dagli antichi re dei fiumi di Oldstones."
  nick_agot_historical_of_red_lake:0 "di Red Lake"
  nick_agot_historical_of_red_lake_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], figlia del leggendario Garth Greenhand, fece la sua dimora presso Red Lake. I discendenti [Select_CString(CHARACTER.IsFemale,'suoi','suoi')|U] vi vivono ancora oggi, e la leggenda narra che le donne della loro stirpe possano trasformarsi in gru."
  nick_agot_historical_of_sour_hill:0 "di Sour Hill"
  nick_agot_historical_of_sour_hill_desc:0 "Vecchio cavaliere canuto che rimane più rapido di uomini con la metà dei suoi anni, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] ritenut[Select_CString(CHARACTER.IsFemale,'a','o')] aver combattuto in centinaia di battaglie."
  nick_agot_historical_of_the_black_hood:0 "del Cappuccio Nero"
  nick_agot_historical_of_the_black_hood_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] proseguì la cupa fama di [Select_CString(CHARACTER.IsFemale,'suo','suo')] padre come lord di Harrenhal."
  nick_agot_historical_of_the_bloody_blade:0 "della Lama Insanguinata"
  nick_agot_historical_of_the_bloody_blade_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] ritenut[Select_CString(CHARACTER.IsFemale,'a','o')] aver ucciso così tanti figli della foresta presso Blue Lake che da allora esso divenne noto come Red Lake."
  nick_agot_historical_of_the_brown_shield:0 "dello Scudo Bruno"
  nick_agot_historical_of_the_brown_shield_desc:0 "Cavaliere errante di pessima fama, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] per portare un alto scudo a mandorla di legno scuro non dipinto, bordato di ferro."
  nick_agot_historical_of_the_golden_bowl:0 "della Coppa d'Oro"
  nick_agot_historical_of_the_high_tower:0 "dell'Alta Torre"
  nick_agot_historical_of_the_horn:0 "del Corno"
  nick_agot_historical_of_the_mirror_shield:0 "dello Scudo Specchio"
  nick_agot_historical_of_the_mirror_shield_desc:0 "La leggenda narra che [CHARACTER.GetShortUINameNoTooltipNoFormat] ingannò il drago Urrax con il suo stesso riflesso, avvicinandosi alle sue spalle dietro [Select_CString(CHARACTER.IsFemale,'il suo','il suo')] scudo lucidato, prima di ucciderlo con una lancia nell'occhio."
  nick_agot_historical_of_the_red_smile:0 "del Sorriso Rosso"
  nick_agot_historical_of_the_tower:0 "della Torre"
  nick_agot_historical_of_the_vines:0 "delle Viti"
  nick_agot_historical_of_the_vines_desc:0 "Figlio del leggendario Garth Greenhand, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] ritenut[Select_CString(CHARACTER.IsFemale,'a','o')] aver insegnato agli uomini dell'Arbor come fare il vino."
  nick_agot_historical_of_the_woods:0 "dei Boschi"
  nick_agot_historical_old_hawk:0 "Vecchio Falco"
  nick_agot_historical_old_tattersalt:0 "il Vecchio Tattersalt"
  nick_agot_historical_old_tattersalt_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] per gli abiti neri macchiati e sbiaditi che [CharYouSheHe(CHARACTER)] wear[_s(CHARACTER)]."
  nick_agot_historical_one_ear:0 "Unorecchio"
  nick_agot_historical_one_eye:0 "Unocchio"
  nick_agot_historical_one_eye_historical_aemond:0 "Unocchio"
  nick_agot_historical_one_eye_historical_aemond_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] perse un occhio, e in cambio ottenne un drago, ritenendolo uno scambio equo."
  nick_agot_historical_one_eye_historical_jonnel:0 "Unocchio"
  nick_agot_historical_one_hand:0 "Unamano"
  nick_agot_historical_one_hand_desc:0 "Catturata in battaglia durante la Prima Guerra Dorniana, la mano della spada di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] fu mozzata affinché [CharYouSheHe(CHARACTER)] non potesse mai più alzarla contro Dorne."
  nick_agot_historical_palehair_gaemon:0 "Capellichiari"
  nick_agot_historical_palehair_gaemon_desc:0 "Sostenut[Select_CString(CHARACTER.IsFemale,'a','o')] da [Select_CString(CHARACTER.IsFemale,'sua','sua')] madre come bastardo di Aegon II, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharHaveHas(CHARACTER)] i caratteristici capelli chiari dei presunti parenti [Select_CString(CHARACTER.IsFemale,'suoi','suoi')]."
  nick_agot_historical_pennylover:0 "Amadeni"
  nick_agot_historical_pimple:0 "Brufolo"
  nick_agot_historical_pimple_desc:0 "Il volto di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] è coperto dal suo omonimo, un fatto che gli altri non dimenticheranno presto di ricordar[Select_CString(CHARACTER.IsFemale,'le','gli')]."
  nick_agot_historical_pinchface:0 "Faccapizzicata"
  nick_agot_historical_pinchpenny:0 "Tirchiodeno"
  nick_agot_historical_preachfire:0 "Predicafuoco"
  nick_agot_historical_pretty:0 "Grazioso"
  nick_agot_historical_priestkiller:0 "Ammazzapreti"
  nick_agot_historical_priestkiller_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] massacrò i sacerdoti del Dio Abissale che insorsero in ribellione dopo che [CharYouSheHe(CHARACTER)] permise la costruzione di un tempio a Old Wyk."
  nick_agot_historical_queen_lorea:0 "Regina Lorea"
  nick_agot_historical_queen_lorea_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ama vestirsi con gli abiti di [Select_CString(CHARACTER.IsFemale,'sua','sua')] moglie e vagare per i moli di Lannisport sotto le spoglie di una comune prostituta."
  nick_agot_historical_ragged:0 "Cencioso"
  nick_agot_historical_ragged_desc:0 "Capo dei Poveri Compagni, [CHARACTER.GetShortUINameNoTooltipNoFormat] e i seguaci [Select_CString(CHARACTER.IsFemale,'suoi','suoi')] sono a stento distinguibili dai fuorilegge."
  nick_agot_historical_rattleshirt:0 "Corazzadossa"
  nick_agot_historical_raven_feeder:0 "Nutridorcorvi"
  nick_agot_historical_raven_feeder_desc:0 "Dopo che Erich il Brutto fu rovesciato da Galon Whitestaff, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] scelt[Select_CString(CHARACTER.IsFemale,'a','o')] al kingsmoot come nuovo Alto Re delle Isole di Ferro."
  nick_agot_historical_ravenfriend:0 "Amicodicorvi"
  nick_agot_historical_reaversbane:0 "Flagellodeipredoni"
