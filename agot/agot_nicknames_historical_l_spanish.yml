  nick_agot_historical_the_jolly:0 "l'Allegro"
  nick_agot_historical_the_jousting_lord:0 "il Lord delle Giostre"
  nick_agot_historical_the_jousting_lord_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] ben not[Select_CString(CHARACTER.IsFemale,'a','o')] per l'abilità [Select_CString(CHARACTER.IsFemale,'sua','sua')] nella lizza."
  nick_agot_historical_the_joyful:0 "il Gioioso"
  nick_agot_historical_the_just:0 "il Giusto"
  nick_agot_historical_the_keg_o_ale:0 "il Barile di Birra"
  nick_agot_historical_the_king_who_flew:0 "il Re che Volò"
  nick_agot_historical_the_king_who_flew_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] volò per tre volte in groppa a Vhagar attorno alla cima della Lancia del Gigante da piccolo re, e atterrò per ritrovarsi piccolo lord."
  nick_agot_historical_the_king_who_knelt:0 "il Re che si Inchinò"
  nick_agot_historical_the_king_who_knelt_desc:0 "Temendo di fare la stessa fine toccata a Harrenhal e a coloro che bruciarono al Campo di Fuoco, [CHARACTER.GetShortUINameNoTooltipNoFormat] scelse invece di piegare il ginocchio davanti al Conquistatore, e non si rialzò più come re."
  nick_agot_historical_the_kingmaker:0 "il Fattore di Re"
  nick_agot_historical_the_kingslayer:0 "l'Uccisore di Re"
  nick_agot_historical_the_kinslayer:0 "l'Uccisore di Sangue"
  nick_agot_historical_the_kinslayer_desc:0 "Autoproclamandosi Re della Montagna e della Valle, [CHARACTER.GetShortUINameNoTooltipNoFormat] fece volare il fratello [Select_CString(CHARACTER.IsFemale,'suo','suo')] dalla Porta della Luna dopo che i lord della Valle chiesero la liberazione del loro legittimo signore."
  nick_agot_historical_the_knight:0 "il Cavaliere"
  nick_agot_historical_the_knight_of_flowers:0 "il Cavaliere dei Fiori"
  nick_agot_historical_the_knight_of_kisses:0 "il Cavaliere dei Baci"
  nick_agot_historical_the_knight_of_the_flame:0 "il Cavaliere della Fiamma"
  nick_agot_historical_the_knight_of_the_fountains:0 "il Cavaliere delle Fontane"
  nick_agot_historical_the_knight_of_the_fountains_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] un cavaliere da giostra di discreta fama."
  nick_agot_historical_the_knight_of_the_twilight:0 "il Cavaliere del Crepuscolo"
  nick_agot_historical_the_knight_of_the_twilight_desc:0 "Un tempo ostaggio alla Fortezza Rossa durante la Conquista di Dorne, [CHARACTER.GetShortUINameNoTooltipNoFormat] divenne uno dei membri fondatori dei Figli della Lancia."
  nick_agot_historical_the_krakens_daughter:0 "la Figlia del Kraken"
  nick_agot_historical_the_lace_serpent:0 "il Serpente di Merletto"
  nick_agot_historical_the_lackwit:0 "l'Imbecille"
  nick_agot_historical_the_lame:0 "lo Zoppo"
  nick_agot_historical_the_last:0 "l'Ultimo"
  nick_agot_historical_the_last_loren:0 "l'Ultimo"
  nick_agot_historical_the_last_loren_desc:0 "Ultimo Re della Roccia, [CHARACTER.GetShortUINameNoTooltipNoFormat] piegò il ginocchio ad Aegon il Conquistatore dopo essere sopravvissut[Select_CString(CHARACTER.IsFemale,'a','o')] al Campo di Fuoco."
  nick_agot_historical_the_last_reaver:0 "l'Ultimo Predone"
  nick_agot_historical_the_last_reaver_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] aspirò a fare del Mare del Tramonto il dominio [Select_CString(CHARACTER.IsFemale,'suo','suo')] e devastò le coste occidentali — l'ultimo lord degli Uomini di Ferro a farlo per molti anni."
  nick_agot_historical_the_last_valyrian:0 "l'Ultimo Valyriano"
  nick_agot_historical_the_last_valyrian_desc:0 "Predone notorio, [CHARACTER.GetShortUINameNoTooltipNoFormat] provi[_s(CHARACTER)] da una stirpe lysena di lord pirati che si dice discenda dai Valyriani."
  nick_agot_historical_the_late_lord:0 "il Lord Tardivo"
  nick_agot_historical_the_late_lord_desc:0 "Durante la Ribellione di Robert, [CHARACTER.GetShortUINameNoTooltipNoFormat] giunse alla Battaglia del Tridente dopo la vittoria dei ribelli, spingendo il signore liege [Select_CString(CHARACTER.IsFemale,'suo','suo')] a conferir[Select_CString(CHARACTER.IsFemale,'le','gli')] questo epiteto poco lusinghiero."
  nick_agot_historical_the_latecomer:0 "il Ritardatario"
  nick_agot_historical_the_latecomer_desc:0 "Quando suo padre morì, [CHARACTER.GetShortUINameNoTooltipNoFormat] stava predando lungo il Mander e non gli fu mandato alcun messaggio del kingsmoot. Al ritorno [Select_CString(CHARACTER.IsFemale,'suo','suo')], [CharYouSheHe(CHARACTER)] denunciò il kingsmoot come illegittimo e si ribellò con successo contro Urrathon IV Goodbrother, prendendo il trono [Select_CString(CHARACTER.IsFemale,'suo','suo')] — e questo nome."
  nick_agot_historical_the_laughing_lion:0 "il Leone Ridente"
  nick_agot_historical_the_laughing_storm:0 "La Tempesta che Ride"
  nick_agot_historical_the_laughing_storm_desc:0 "Spesso esplodendo in una risata fragorosa mentre combatteva gli avversari [Select_CString(CHARACTER.IsFemale,'suoi','suoi')], [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] ritenut[Select_CString(CHARACTER.IsFemale,'a','o')] uno dei migliori guerrieri del tempo [Select_CString(CHARACTER.IsFemale,'suo','suo')]."
  nick_agot_historical_the_laughing_wolf:0 "il Metalupo Ridente"
  nick_agot_historical_the_laughing_wolf_desc:0 "Not[Select_CString(CHARACTER.IsFemale,'a','o')] per il buon carattere [Select_CString(CHARACTER.IsFemale,'suo','suo')], [CHARACTER.GetShortUINameNoTooltipNoFormat] strappò L'Incollatura al Re delle Paludi e ne prese la figlia in moglie."
  nick_agot_historical_the_learned:0 "il Dotto"
  nick_agot_historical_the_leech_lord:0 "il Lord Sanguisuga"
  nick_agot_historical_the_leech_lord_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] crede che i salassi con sanguisughe siano il segreto di una lunga vita, e ciò porta alcuni a chiamar[CharYouHerHim(CHARACTER)] con questo nome, sebbene mai in faccia [Select_CString(CHARACTER.IsFemale,'a lei','a lui')]."
  nick_agot_historical_the_leopard:0 "il Leopardo"
  nick_agot_historical_the_liar:0 "il Bugiardo"
  nick_agot_historical_the_limp:0 "lo Zoppicante"
  nick_agot_historical_the_limper:0 "lo Zoppicante"
  nick_agot_historical_the_lion:0 "il Leone"
  nick_agot_historical_the_lion_king:0 "il Re Leone"
  nick_agot_historical_the_lion_king_desc:0 "Re della Roccia, [CHARACTER.GetShortUINameNoTooltipNoFormat] fu chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] così in una cronaca volantena che narrava della flotta dorata e della spedizione [Select_CString(CHARACTER.IsFemale,'sua','sua')] a Valyria — un viaggio dal quale non fecero ritorno né [Select_CString(CHARACTER.IsFemale,'lei','lui')], né la grande spada Brightroar."
  nick_agot_historical_the_lion_of_braavos:0 "il Leone di Braavos"
  nick_agot_historical_the_lionslayer:0 "l'Uccisore di Leoni"
  nick_agot_historical_the_lionslayer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] inflisse una ferita mortale a Lord Jason Lannister durante la Battaglia presso la Forca Rossa e, da allora, fu chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] Longleaf l'Uccisore di Leoni."
  nick_agot_historical_the_little:0 "il Piccolo"
  nick_agot_historical_the_little_bear:0 "il Piccolo Orso"
  nick_agot_historical_the_little_bee:0 "la Piccola Ape"
  nick_agot_historical_the_little_lemon:0 "il Piccolo Limone"
  nick_agot_historical_the_little_lion:0 "il Piccolo Leone"
  nick_agot_historical_the_little_pussy:0 "la Piccola Gatta"
  nick_agot_historical_the_little_witch:0 "la Piccola Strega"
  nick_agot_historical_the_long_prefix:0 "Lungo"
  nick_agot_historical_the_longknife:0 "il Lungo Coltello"
  nick_agot_historical_the_lord_lamprey:0 "Lord Lampreda"
  nick_agot_historical_the_lord_lamprey_desc:0 "Deriso dal suo stesso popolo con questo nome a causa dell'appetito vorace [Select_CString(CHARACTER.IsFemale,'suo','suo')], [CHARACTER.GetShortUINameNoTooltipNoFormat] nasconde una mente acuta dietro l'aspetto rotondo [Select_CString(CHARACTER.IsFemale,'suo','suo')]."
  nick_agot_historical_the_loud:0 "il Chiassoso"
  nick_agot_historical_the_lusty:0 "il Lascivo"
  nick_agot_historical_the_lusty_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] infranse i voti della Guardia Reale sposandosi in segreto per tre volte e generando sedici figli tra le tre mogli [Select_CString(CHARACTER.IsFemale,'sue','sue')]."
  nick_agot_historical_the_mad:0 "il Folle"
  nick_agot_historical_the_mad_bard:0 "il Bardo Folle"
  nick_agot_historical_the_mad_huntsman:0 "il Cacciatore Folle"
  nick_agot_historical_the_mad_king:0 "il Re Folle"
  nick_agot_historical_the_mad_king_desc:0 "Incline ad accessi di paranoia, crudeltà sconsiderata e distacco dalla realtà più basilare, la follia di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] è chiara a tutto il reame."
  nick_agot_historical_the_mad_maid:0 "la Pulzella Folle"
  nick_agot_historical_the_mad_maid_desc:0 "Primogenita non sposata del lord di Oldtown, [CHARACTER.GetShortUINameNoTooltipNoFormat] è not[Select_CString(CHARACTER.IsFemale,'a','o')] per consultare libri di incantesimi."
  nick_agot_historical_the_mad_mouse:0 "il Topo Folle"
  nick_agot_historical_the_madling:0 "il Folletto Folle"
  nick_agot_historical_the_mage:0 "il Mago"
  nick_agot_historical_the_mage_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] viaggiò a est per studiare i più alti misteri e, al ritorno [Select_CString(CHARACTER.IsFemale,'suo','suo')], fu chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] così — un nome che si diffuse in fretta, con grande irritazione del gregge grigio."
  nick_agot_historical_the_magnificent:0 "il Magnifico"
  nick_agot_historical_the_magnificent_desc:0 "Le storie delle imprese splendide [Select_CString(CHARACTER.IsFemale,'sue','sue')] sono raccontate dalla Barriera alle Terre dell'Ombra oltre Asshai."
  nick_agot_historical_the_maid:0 "la Pulzella"
  nick_agot_historical_the_mason:0 "il Muratore"
  nick_agot_historical_the_maul:0 "la Mazza"
  nick_agot_historical_the_meek:0 "il Mansueto"
  nick_agot_historical_the_merciful:0 "il Misericordioso"
  nick_agot_historical_the_merling_queen:0 "la Regina Tritone"
  nick_agot_historical_the_merry:0 "l'Allegro"
  nick_agot_historical_the_mighty:0 "il Possente"
  nick_agot_historical_the_mistress_of_swords:0 "la Maestra delle Spade"
  nick_agot_historical_the_monstrous:0 "il Mostruoso"
  nick_agot_historical_the_moon_king:0 "il Re della Luna"
  nick_agot_historical_the_moonshadow:0 "l'Ombra della Luna"
  nick_agot_historical_the_mordant:0 "il Mordace"
  nick_agot_historical_the_morningstar:0 "la Stella del Mattino"
  nick_agot_historical_the_mother:0 "la Madre"
  nick_agot_historical_the_mother_hen:0 "la Chioccia"
  nick_agot_historical_the_mountain_that_rides:0 "la Montagna che Cavalca"
  nick_agot_historical_the_mountain_that_rides_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] così enorme che veder[CharYouHerHim(CHARACTER)] cavalcare è come pensare che una montagna stia avanzando."
  nick_agot_historical_the_mouse:0 "il Topo"
  nick_agot_historical_the_mummer:0 "il Saltimbanco"
  nick_agot_historical_the_mummer_desc:0 "Celebre per la perizia con spada e scudo, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] per essere rapid[Select_CString(CHARACTER.IsFemale,'a','o')], fort[Select_CString(CHARACTER.IsFemale,'e','e')] e osservator[Select_CString(CHARACTER.IsFemale,'a','e')]."
  nick_agot_historical_the_musician:0 "il Musicista"
  nick_agot_historical_the_nail:0 "il Chiodo"
  nick_agot_historical_the_necromancer:0 "il Negromante"
  nick_agot_historical_the_necromancer_desc:0 "Leggendario razziatore degli Uomini di Ferro nell'Età degli Eroi, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] così chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] per l'arte nera che [CharYouSheHe(CHARACTER)] practice[_s(CHARACTER)]."
  nick_agot_historical_the_neveryield:0 "l'Irremovibile"
  nick_agot_historical_the_niggardly:0 "l'Avaro"
  nick_agot_historical_the_niggardly_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] per la meschinità."
  nick_agot_historical_the_nightingale:0 "l'Usignolo"
  nick_agot_historical_the_nights_king:0 "il Re della Notte"
  nick_agot_historical_the_nimble:0 "l'Agile"
  nick_agot_historical_the_nocturnal:0 "il Notturno"
  nick_agot_historical_the_northman:0 "l'Uomo del Nord"
  nick_agot_historical_the_oak:0 "la Quercia"
  nick_agot_historical_the_oak_desc:0 "Leggendario fondatore di Casa Oakheart, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] detto alt[Select_CString(CHARACTER.IsFemale,'a','o')] otto piedi (dieci o dodici in alcune storie)."
  nick_agot_historical_the_old:0 "il Vecchio"
  nick_agot_historical_the_old_bear:0 "il Vecchio Orso"
  nick_agot_historical_the_old_bear_desc:0 "Chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] così per il sigillo della casata, [CHARACTER.GetShortUINameNoTooltipNoFormat] resta fort[Select_CString(CHARACTER.IsFemale,'e','e')] anche in età avanzata."
  nick_agot_historical_the_old_falcon:0 "il Vecchio Falco"
  nick_agot_historical_the_old_grey_gull:0 "il Vecchio Gabbiano Grigio"
  nick_agot_historical_the_old_grey_gull_desc:0 "Sacerdote del Dio Abissale, il vero nome di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] è sconosciuto."
  nick_agot_historical_the_old_king:0 "il Vecchio Re"
  nick_agot_historical_the_old_king_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharHaveHas(CHARACTER)] vissuto fino a un'età davvero veneranda che, nel bene o nel male, ha oscurato le altre opere della vita."
  nick_agot_historical_the_old_kraken:0 "il Vecchio Kraken"
  nick_agot_historical_the_old_kraken_desc:0 "Re delle Isole di Ferro, [CHARACTER.GetShortUINameNoTooltipNoFormat] invase le coste occidentali del nord, prendendo Bear Island e Cape Kraken."
  nick_agot_historical_the_old_ox:0 "il Vecchio Bue"
  nick_agot_historical_the_old_ox_desc:0 "Cavaliere anziano di una certa fama, [CHARACTER.GetShortUINameNoTooltipNoFormat] è corazzat[Select_CString(CHARACTER.IsFemale,'a','o')] d'armatura rosso sangue e di un elmo con corna di toro nere."
  nick_agot_historical_the_old_prefix:0 "Vecchio"
  nick_agot_historical_the_old_steelhand:0 "il Vecchio Mano d'Acciaio"
  nick_agot_historical_the_oldfather:0 "il Vecchio Padre"
  nick_agot_historical_the_oldfather_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] famos[Select_CString(CHARACTER.IsFemale,'a','o')] per aver generato cento figli."
  nick_agot_historical_the_one_after_the_fat_one:0 "Quello dopo il Grassone"
  nick_agot_historical_the_one_after_the_fat_one_desc:0 "Questo Alto Septon è noto soltanto per l'enormità del proprio predecessore."
  nick_agot_historical_the_onion_knight:0 "il Cavaliere della Cipolla"
  nick_agot_historical_the_onion_knight_desc:0 "Durante l'Assedio di Storm's End, [CHARACTER.GetShortUINameNoTooltipNoFormat] eluse la flotta che teneva il blocco per contrabbandare cipolle e pesce salato ai difensori affamati, guadagnandosi terre e cavalierato come ricompensa."
  nick_agot_historical_the_onion_lord:0 "il Lord della Cipolla"
  nick_agot_historical_the_openhanded:0 "a Mano Aperta"
  nick_agot_historical_the_openhanded_desc:0 "Cavaliere della Guardia Reale caduto in disgrazia, [CHARACTER.GetShortUINameNoTooltipNoFormat] ha infangato il mantello bianco con la codardia."
  nick_agot_historical_the_orange:0 "l'Arancione"
  nick_agot_historical_the_painter:0 "il Pittore"
  nick_agot_historical_the_pale:0 "il Pallido"
  nick_agot_historical_the_pale_griffin:0 "il Grifone Pallido"
  nick_agot_historical_the_pale_griffin_desc:0 "Chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] così per il sigillo della casata, [CHARACTER.GetShortUINameNoTooltipNoFormat] serve[_s(CHARACTER)] come cavaliere della Guardia Reale."
  nick_agot_historical_the_pander:0 "il Ruffiano"
  nick_agot_historical_the_pander_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] si dice abbia permesso ad Aegon l'Indegno di portare a letto sia la moglie sia la figlia — alcuni dicono nello stesso momento."
  nick_agot_historical_the_patriarch:0 "il Patriarca"
  nick_agot_historical_the_patternmaker:0 "il Creatore di Trame"
  nick_agot_historical_the_penniless:0 "Senzasoldi"
  nick_agot_historical_the_penniless_desc:0 "Cavaliere errante pratico ma povero, [CHARACTER.GetShortUINameNoTooltipNoFormat] wield[_s(CHARACTER)] una lama malconcia e ride[_s(CHARACTER)] un cavallo mezzo affamat[Select_CString(CHARACTER.IsFemale,'a','o')]."
  nick_agot_historical_the_piglet:0 "il Porcellino"
  nick_agot_historical_the_pious:0 "il Pio"
  nick_agot_historical_the_pious_will:0 "Will il Pio"
  nick_agot_historical_the_pirate:0 "il Pirata"
  nick_agot_historical_the_plowman:0 "l'Aratore"
  nick_agot_historical_the_plowman_desc:0 "Leggendario fondatore di Casa Moreland, [CHARACTER.GetShortUINameNoTooltipNoFormat] visse durante l'Età degli Eroi."
  nick_agot_historical_the_poet:0 "il Poeta"
  nick_agot_historical_the_poetess:0 "la Poetessa"
  nick_agot_historical_the_proud_perwyn:0 "il Superbo"
  nick_agot_historical_the_proud_perwyn_desc:0 "Come capo di Casa Osgrey, [CHARACTER.GetShortUINameNoTooltipNoFormat] edificò il più grande dei loro castelli — Coldmoat."
  nick_agot_historical_the_puppeteer:0 "il Burattinaio"
  nick_agot_historical_the_purple:0 "il Porpora"
  nick_agot_historical_the_queen_of_thorns:0 "la Regina di Spine"
  nick_agot_historical_the_queen_of_thorns_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] è famigerat[Select_CString(CHARACTER.IsFemale,'a','o')] per la lingua tagliente e l'arguzia mordace."
  nick_agot_historical_the_queen_who_never_was:0 "la Regina che Non Fu Mai"
  nick_agot_historical_the_queen_who_never_was_desc:0 "Sebbene fosse quasi stata fatta [CHARACTER.Custom('GetQueenKing')] dopo la morte dell'ultimo sovrano, il grande concilio si pronunciò contro la rivendicazione di [CharYourHerHis(CHARACTER)]."
  nick_agot_historical_the_queer:0 "lo Strano"
  nick_agot_historical_the_quick:0 "il Rapido"
  nick_agot_historical_the_quickfinger:0 "Ditolesto"
  nick_agot_historical_the_quiver:0 "la Faretra"
  nick_agot_historical_the_raper:0 "lo Stupratore"
  nick_agot_historical_the_raper_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] governò Bear Island come razziatore degli Uomini di Ferro, prima d'essere ucciso in battaglia dallo stesso Lupo Affamato."
  nick_agot_historical_the_raven:0 "il Corvo"
  nick_agot_historical_the_reader:0 "il Lettore"
  nick_agot_historical_the_reader_desc:0 "Diversamente dalla maggior parte degli Uomini di Ferro, [CHARACTER.GetShortUINameNoTooltipNoFormat] feel[_s(CHARACTER)] più a casa tra le pagine di un libro che sul ponte di una nave."
  nick_agot_historical_the_realms_delight:0 "Delizia del Reame"
  nick_agot_historical_the_reaper:0 "il Mietitore"
  nick_agot_historical_the_reaver:0 "il Predone"
  nick_agot_historical_the_red:0 "il Rosso"
  nick_agot_historical_the_red_crab:0 "il Granchio Rosso"
  nick_agot_historical_the_red_dog:0 "il Cane Rosso delle Colline"
  nick_agot_historical_the_red_dog_desc:0 "Come Gran Capitano dei Figli del Guerriero, [CHARACTER.GetShortUINameNoTooltipNoFormat] governò le colline a nord del Dente d'Oro in tutto fuorché nel nome."
  nick_agot_historical_the_red_kraken:0 "il Kraken Rosso"
  nick_agot_historical_the_red_kraken_desc:0 "Come mercenario di mare nelle Stepstones, [CHARACTER.GetShortUINameNoTooltipNoFormat] emerse da una battaglia intris[Select_CString(CHARACTER.IsFemale,'a','o')] di sangue per una dozzina di ferite."
  nick_agot_historical_the_red_lion:0 "il Leone Rosso"
  nick_agot_historical_the_red_lion_desc:0 "Chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] così per il sigillo della casata, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] ritenut[Select_CString(CHARACTER.IsFemale,'a','o')] uno degli uomini più letali delle Terre dell'Ovest. Uomo d'orgoglio smisurato, [CharYouSheHe(CHARACTER)] [CharAreIs(CHARACTER)] dell'idea che, che un leone porti oro o rosso, gli artigli restino comunque lunghi e affilati."
  nick_agot_historical_the_red_viper:0 "la Vipera Rossa"
  nick_agot_historical_the_red_viper_desc:0 "Da giovane, [CHARACTER.GetShortUINameNoTooltipNoFormat] sfidò in duello Lord Edgar Yronwood dopo essere stat[Select_CString(CHARACTER.IsFemale,'a','o')] trovato a letto con l'amante — guadagnando notorietà quando il lord in seguito morì per il veleno usato sulla lama di [CharYourHerHis(CHARACTER)]."
  nick_agot_historical_the_red_widow:0 "la Vedova Rossa"
  nick_agot_historical_the_red_widow_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] sopravvisse a quattro mariti in giovane età, senza che alcuno dei figli superasse l'infanzia."
  nick_agot_historical_the_redsmile:0 "il Sorrisorosso"
  nick_agot_historical_the_regent:0 "il Reggente"
  nick_agot_historical_the_rhoynar:0 "il Rhoynar"
  nick_agot_historical_the_rhymer:0 "il Rimatore"
  nick_agot_historical_the_riverman:0 "l'Uomo delle Terre dei Fiumi"
  nick_agot_historical_the_rodent:0 "il Roditore"
  nick_agot_historical_the_rogue_prince:0 "il Principe Ribelle"
  nick_agot_historical_the_rogue_prince_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] not[Select_CString(CHARACTER.IsFemale,'a','o')] ovunque per la natura avventurosa e ribelle, avendo respinto e ispirato molti nel corso del suo tempo."
  nick_agot_historical_the_rook:0 "la Torre"
  nick_agot_historical_the_ruin:0 "la Rovina"
  nick_agot_historical_the_ruin_desc:0 "Combattente selvaggi[Select_CString(CHARACTER.IsFemale,'a','o')], [CHARACTER.GetShortUINameNoTooltipNoFormat] è not[Select_CString(CHARACTER.IsFemale,'a','o')] per essere talmente ubriac[Select_CString(CHARACTER.IsFemale,'a','o')] nella frenesia della battaglia da non sentire le proprie ferite."
  nick_agot_historical_the_ruined:0 "il Rovinato"
  nick_agot_historical_the_rune:0 "la Runa"
  nick_agot_historical_the_saddlesore:0 "Sellaferita"
  nick_agot_historical_the_saddlesore_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] trascorse l'intero regno a cavallo, schiacciando ribellioni e impiccando ostaggi in tutte le Terre dei Fiumi."
  nick_agot_historical_the_sailmaker:0 "il Velaio"
  nick_agot_historical_the_sailmaker_desc:0 "Da Re delle Terre della Tempesta, [CHARACTER.GetShortUINameNoTooltipNoFormat] veleggiò verso sud per rivendicare Estermont e le isole vicine per il Regno della Tempesta."
  nick_agot_historical_the_salt_rat:0 "il Ratto del Sale"
  nick_agot_historical_the_sand_dog:0 "il Cane delle Sabbie"
  nick_agot_historical_the_savage:0 "il Selvaggio"
  nick_agot_historical_the_scaly_prefix:0 "Squamoso"
  nick_agot_historical_the_scrapesword:0 "Grattaspada"
  nick_agot_historical_the_scribe:0 "lo Scriba"
  nick_agot_historical_the_sculptor:0 "lo Scultore"
  nick_agot_historical_the_sea_dragon:0 "il Drago del Mare"
  nick_agot_historical_the_sea_lion_leo:0 "il Leone del Mare"
  nick_agot_historical_the_sea_lion_leo_desc:0 "Marinaio canuto, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] abil[Select_CString(CHARACTER.IsFemale,'e','e')] nel comandare le flotte de L'Altopiano."
  nick_agot_historical_the_sea_lion_lymond:0 "il Leone del Mare"
  nick_agot_historical_the_sea_lion_lymond_desc:0 "Dopo aver giurato fedeltà a L'Altopiano, [CHARACTER.GetShortUINameNoTooltipNoFormat] rivolse l'attenzione [Select_CString(CHARACTER.IsFemale,'sua','sua')] al [Select_CString(CHARACTER.IsFemale,'suo','suo')] 'grande proposito' — costruire navi e conquistare via mare."
  nick_agot_historical_the_sea_snake:0 "il Serpente di Mare"
  nick_agot_historical_the_sea_snake_desc:0 "Dopo aver compiuto innumerevoli viaggi per mare, [CHARACTER.GetShortUINameNoTooltipNoFormat] ora porta il nome della nave [Select_CString(CHARACTER.IsFemale,'sua','sua')] come se fosse il nome [Select_CString(CHARACTER.IsFemale,'suo','suo')]."
  nick_agot_historical_the_seeker:0 "il Cercatore"
  nick_agot_historical_the_shade_of_ghost_hill:0 "l'Ombra di Ghost Hill"
  nick_agot_historical_the_shadow_sandoq:0 "l'Ombra"
  nick_agot_historical_the_shadow_sandoq_desc:0 "Il volto di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] è orrendamente sfigurato — un male che [CharYouSheHe(CHARACTER)] nascond[_s(CHARACTER)] sotto un velo di seta nera."
  nick_agot_historical_the_shaker:0 "lo Scuotitore"
  nick_agot_historical_the_shebear:0 "l'Orsa"
  nick_agot_historical_the_shepherd:0 "il Pastore"
  nick_agot_historical_the_shieldsmasher:0 "lo Spaccascudi"
  nick_agot_historical_the_shipwright:0 "il Maestro d'Ascia"
  nick_agot_historical_the_shipwright_desc:0 "Not[Select_CString(CHARACTER.IsFemale,'a','o')] per l'amore [Select_CString(CHARACTER.IsFemale,'suo','suo')] per le acque aperte, [CHARACTER.GetShortUINameNoTooltipNoFormat] salpò per solcare il Mare del Tramonto e non fu mai più vist[Select_CString(CHARACTER.IsFemale,'a','o')]."
  nick_agot_historical_the_silver_lion:0 "il Leone d'Argento"
  nick_agot_historical_the_silver_prefix:0 "d'Argento"
  nick_agot_historical_the_silver_rose:0 "la Rosa d'Argento"
  nick_agot_historical_the_simple_vaella:0 "la Semplice"
  nick_agot_historical_the_simple_vaella_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] è dolce, ma di mente semplice."
  nick_agot_historical_the_sisterman:0 "l'Uomo delle Sorelle"
  nick_agot_historical_the_sisterman_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] proviene dalle Tre Sorelle."
  nick_agot_historical_the_sleepy:0 "l'Assonnato"
  nick_agot_historical_the_sleepy_jack:0 "l'Assonnato"
  nick_agot_historical_the_sleepy_jack_desc:0 "Da Lord Comandante, [CHARACTER.GetShortUINameNoTooltipNoFormat] non solo lasciò che un esercito di Bruti passasse oltre la Barriera, ma arrivò anche troppo tardi per unirsi alla battaglia contro di loro."
  nick_agot_historical_the_small:0 "il Piccolo"
  nick_agot_historical_the_smiling_knight:0 "il Cavaliere Sorridente"
  nick_agot_historical_the_smith:0 "il Fabbro"
  nick_agot_historical_the_snail:0 "la Lumaca"
  nick_agot_historical_the_snail_desc:0 "Alcuni dicono che [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] degn[Select_CString(CHARACTER.IsFemale,'a','o')] di questo nome non solo per l'emblema personale [Select_CString(CHARACTER.IsFemale,'suo','suo')], ma anche per la propensione [Select_CString(CHARACTER.IsFemale,'sua','sua')] a 'nascondersi nel guscio [Select_CString(CHARACTER.IsFemale,'suo','suo')]'."
  nick_agot_historical_the_snake_eater:0 "Mangiabisce"
  nick_agot_historical_the_sneaky:0 "il Furtivo"
  nick_agot_historical_the_snowman:0 "l'Uomo di Neve"
  nick_agot_historical_the_soulless:0 "Senzanima"
  nick_agot_historical_the_sour:0 "l'Acido"
  nick_agot_historical_the_sparrow:0 "il Passero"
  nick_agot_historical_the_spring_king:0 "il Re di Primavera"
  nick_agot_historical_the_spring_prince:0 "il Principe di Primavera"
  nick_agot_historical_the_spring_prince_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] nat[Select_CString(CHARACTER.IsFemale,'a','o')] due giorni dopo che i corvi bianchi erano volati dalla Cittadella per annunciare l'arrivo della primavera."
  nick_agot_historical_the_stargazer:0 "l'Astronomo"
  nick_agot_historical_the_stargazer_desc:0 "Da Arcimaestro della Cittadella, [CHARACTER.GetShortUINameNoTooltipNoFormat] insegn[_es(CHARACTER)] e giudic[_s(CHARACTER)] le questioni del cielo."
  nick_agot_historical_the_starvling:0 "l'Affamatello"
  nick_agot_historical_the_starvling_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] un membro di spicco dell'ordine dei Poveri Compagni."
  nick_agot_historical_the_steelhand:0 "Manodacciaio"
  nick_agot_historical_the_stinger:0 "il Pungiglione"
  nick_agot_historical_the_stinger_desc:0 "Abil[Select_CString(CHARACTER.IsFemale,'e','e')] nelle armi, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] ritenut[Select_CString(CHARACTER.IsFemale,'a','o')] la migliore lancia de L'Altopiano."
  nick_agot_historical_the_stonemason:0 "il Tagliapietre"
  nick_agot_historical_the_stonemason_desc:0 "Questo Alto Septon è noto per l'abilità nella lavorazione della pietra; alcuni arrivano perfino a sostenere che sia il Fabbro in carne e ossa."
  nick_agot_historical_the_stormbreaker:0 "Spezzatempesta"
  nick_agot_historical_the_stormbreaker_desc:0 "Cavaliere celebre, [CHARACTER.GetShortUINameNoTooltipNoFormat] si guadagnò questo nome sconfiggendo due 'Tempeste' in una giostra."
  nick_agot_historical_the_storyteller:0 "il Cantastorie"
  nick_agot_historical_the_stray:0 "il Randagio"
  nick_agot_historical_the_strong:0 "il Forte"
  nick_agot_historical_the_strummer:0 "lo Strimpellatore"
  nick_agot_historical_the_strummer_desc:0 "Sia cavaliere che cantore, [CHARACTER.GetShortUINameNoTooltipNoFormat] schernisc[_s(CHARACTER)] gli avversari [Select_CString(CHARACTER.IsFemale,'suoi','suoi')] con canzoni salaci prima della battaglia."
  nick_agot_historical_the_survivor:0 "il Sopravvissuto"
  nick_agot_historical_the_sweet:0 "il Dolce"
  nick_agot_historical_the_sweet_prefix:0 "Dolce"
  nick_agot_historical_the_sweetling:0 "il Dolcetto"
  nick_agot_historical_the_sweetling_desc:0 "Dalla voce gentile e bell[Select_CString(CHARACTER.IsFemale,'a','o')], [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] nondimeno un membro crudele e sadico degli uomini della Montagna."
  nick_agot_historical_the_sword_of_the_evening:0 "la Spada della Sera"
  nick_agot_historical_the_sword_of_the_evening_desc:0 "Rinomat[Select_CString(CHARACTER.IsFemale,'a','o')] come il più grande cavaliere di tutta Dorne, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] sconfitt[Select_CString(CHARACTER.IsFemale,'a','o')] da Nymeria e, in seguito, mandata alla Barriera in catene d'oro — una Spada dell'Alba vestita di nero."
  nick_agot_historical_the_sybarite:0 "il Sibarita"
  nick_agot_historical_the_tall_duncan:0 "l'Alto"
  nick_agot_historical_the_tall_duncan_desc:0 "A un solo pollice dai sette piedi, [CHARACTER.GetShortUINameNoTooltipNoFormat] sovrast[_s(CHARACTER)] la maggior parte degli uomini."
  nick_agot_historical_the_tall_gerhard:0 "l'Alto"
  nick_agot_historical_the_tall_gerhard_desc:0 "D'alta statura, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] il fondatore di Casa Forrester."
  nick_agot_historical_the_tall_john:0 "l'Alto"
  nick_agot_historical_the_tall_john_desc:0 "Da Re de L'Altopiano, [CHARACTER.GetShortUINameNoTooltipNoFormat] risalì il Mander con la chiatta [Select_CString(CHARACTER.IsFemale,'sua','sua')] fino alle stesse sorgenti e ricevette omaggio da coloro le cui terre costeggiavano le rive del fiume."
  nick_agot_historical_the_tall_tallad:0 "l'Alto"
  nick_agot_historical_the_tall_tallad_desc:0 "Grosso e robusto, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] un cavaliere promettente nonostante le origini comuni [Select_CString(CHARACTER.IsFemale,'sue','sue')]."
  nick_agot_historical_the_tall_toregg:0 "l'Alto"
  nick_agot_historical_the_tall_toregg_desc:0 "Figlio maggiore di Tormund Uccisore di Giganti, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] più alto di un piede rispetto al padre [Select_CString(CHARACTER.IsFemale,'suo','suo')], già enorme."
  nick_agot_historical_the_talon:0 "l'Artiglio"
  nick_agot_historical_the_talon_desc:0 "Feroce Re della Montagna e della Valle, [CHARACTER.GetShortUINameNoTooltipNoFormat] catturò e bruciò il castello della Tana del Lupo durante le guerre tra il Nord e la Valle."
  nick_agot_historical_the_tame:0 "il Mansueto"
  nick_agot_historical_the_tame_desc:0 "Malaticci[Select_CString(CHARACTER.IsFemale,'a','o')] dalla nascita, [CHARACTER.GetShortUINameNoTooltipNoFormat] non [CharAreIs(CHARACTER)] granché come combattente."
  nick_agot_historical_the_tanglebeard:0 "Barbaarruffata"
  nick_agot_historical_the_tanglebeard_desc:0 "Uomo semplice di Roccia del Drago, [CHARACTER.GetShortUINameNoTooltipNoFormat] bear[_s(CHARACTER)] una barba incolta."
  nick_agot_historical_the_tangletongue:0 "Linguaingarbugliata"
  nick_agot_historical_the_tangletongue_desc:0 "Nat[Select_CString(CHARACTER.IsFemale,'a','o')] con una balbuzie, si dice che [CHARACTER.GetShortUINameNoTooltipNoFormat] abbia udito più di quanto [CharYouSheHe(CHARACTER)] abbia detto."
  nick_agot_historical_the_tattered_prince:0 "il Principe Lacero"
  nick_agot_historical_the_tattered_prince_desc:0 "Un tempo scelto come Principe di Pentos, [CHARACTER.GetShortUINameNoTooltipNoFormat] fuggì nelle Terre Contese temendo la nuova posizione [Select_CString(CHARACTER.IsFemale,'sua','sua')]. Da capo dei Windblown, [CharYouSheHe(CHARACTER)] wear[_s(CHARACTER)] un mantello lacero cucito con torsioni di stoffa di colori diversi."
  nick_agot_historical_the_terrible:0 "il Terribile"
  nick_agot_historical_the_terrible_togarion:0 "il Terribile"
  nick_agot_historical_the_terrible_togarion_desc:0 "Temuto signore della guerra andalo, [CHARACTER.GetShortUINameNoTooltipNoFormat] scacciò gli uomini delle Terre della Tempesta e forgiò un nuovo regno a Massey's Hook."
  nick_agot_historical_the_thrall:0 "il Servo"
  nick_agot_historical_the_thrall_desc:0 "Un tempo schiavo [CharYourHerHimself(CHARACTER)], [CHARACTER.GetShortUINameNoTooltipNoFormat] ora raid[_s(CHARACTER)] al fianco degli Uomini di Ferro."
  nick_agot_historical_the_threadbare:0 "lo Stracciato"
  nick_agot_historical_the_threadbare_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] così chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] per l'emblema personale — una manica sfilacciata, bianca su marrone."
  nick_agot_historical_the_thrice_drowned:0 "l'Affogato per Tre Volte"
  nick_agot_historical_the_thrice_drowned_desc:0 "Sacerdote del Dio Abissale, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] rinomat[Select_CString(CHARACTER.IsFemale,'a','o')] per lo straordinario successo nel compiere il bacio della vita."
  nick_agot_historical_the_thrice_widowed:0 "Tre Volte Vedov[Select_CString(CHARACTER.IsFemale,'a','o')]"
  nick_agot_historical_the_tickler_jon:0 "il Solleticatore"
  nick_agot_historical_the_tickler_jon_desc:0 "Uno degli uomini della Montagna, [CHARACTER.GetShortUINameNoTooltipNoFormat] serve[_s(CHARACTER)] come torturatore per Ser Gregor Clegane — un mestiere di cui [CharYouSheHe(CHARACTER)] seem[_s(CHARACTER)] compiacersi."
  nick_agot_historical_the_tiger:0 "la Tigre"
  nick_agot_historical_the_tiger_tessario:0 "la Tigre"
  nick_agot_historical_the_tiger_tessario_desc:0 "Segnat[Select_CString(CHARACTER.IsFemale,'a','o')] da strisce di tigre su volto e schiena, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] dett[Select_CString(CHARACTER.IsFemale,'a','o')] essere stat[Select_CString(CHARACTER.IsFemale,'a','o')] un tempo un mantello di tigre di Volantis."
  nick_agot_historical_the_titans_bastard:0 "il Bastardo del Titano"
  nick_agot_historical_the_titans_bastard_desc:0 "Famigerato mercenario braavosiano, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharHaveHas(CHARACTER)] una reputazione malvagia e spesso prove[_s(CHARACTER)] d'essere pericolos[Select_CString(CHARACTER.IsFemale,'a','o')] tanto per i datori di lavoro quanto per i nemici."
  nick_agot_historical_the_toothless_lion:0 "il Leone Senza Denti"
  nick_agot_historical_the_toothless_lion_desc:0 "Debole di volontà e ansios[Select_CString(CHARACTER.IsFemale,'a','o')] di compiacere, i vassalli di [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] lo sfidano apertamente e lo deridono in faccia — un'usanza che alcuni chiamano 'torcere la coda al leone'."
  nick_agot_historical_the_tormentor_tyrion:0 "il Tormentatore"
  nick_agot_historical_the_tormentor_tyrion_desc:0 "Not[Select_CString(CHARACTER.IsFemale,'a','o')] per il piacere che trae dalla tortura, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharAreIs(CHARACTER)] dett[Select_CString(CHARACTER.IsFemale,'a','o')] non provare alcun diletto con le donne, se prima [CharYouSheHe(CHARACTER)] non make[_s(CHARACTER)] loro sanguinare."
  nick_agot_historical_the_trader:0 "il Mercante"
  nick_agot_historical_the_true:0 "il Vero"
  nick_agot_historical_the_trueborn:0 "il Legittimo"
  nick_agot_historical_the_twisted_peremore:0 "lo Storto"
  nick_agot_historical_the_twisted_peremore_desc:0 "Nat[Select_CString(CHARACTER.IsFemale,'a','o')] con un braccio rinsecchito e la schiena contorta, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] costrett[Select_CString(CHARACTER.IsFemale,'a','o')] a letto per gran parte della breve vita."
  nick_agot_historical_the_ugly_erich:0 "il Brutto"
  nick_agot_historical_the_ugly_erich_desc:0 "Condannat[Select_CString(CHARACTER.IsFemale,'a','o')] a morte dopo aver proclamato illegalmente [CharYourHerHimself(CHARACTER)] Alto Re, [CHARACTER.GetShortUINameNoTooltipNoFormat] evitò il destino gettando la corona del padre in mare."
  nick_agot_historical_the_uncrowned:0 "Senza Corona"
  nick_agot_historical_the_uncrowned_desc:0 "Usurpat[Select_CString(CHARACTER.IsFemale,'a','o')] ingiustamente dallo zio, [CHARACTER.GetShortUINameNoTooltipNoFormat] non sopravvisse al genitore abbastanza a lungo da essere incoronat[Select_CString(CHARACTER.IsFemale,'a','o')] come prossim[Select_CString(CHARACTER.IsFemale,'a','o')] [CHARACTER.Custom('GetQueenKing')|U] dei Sette Regni."
  nick_agot_historical_the_unlikely:0 "l'Improbabile"
  nick_agot_historical_the_unlikely_desc:0 "Non aspettandosi mai di ereditare, [CHARACTER.GetShortUINameNoTooltipNoFormat] passò da parente lontan[Select_CString(CHARACTER.IsFemale,'a','o')] a prossim[Select_CString(CHARACTER.IsFemale,'a','o')] in linea, per una serie di sfortunate circostanze."
  nick_agot_historical_the_unready_erich:0 "l'Impreparato"
  nick_agot_historical_the_unready_erich_desc:0 "Dichiarando di non avere interesse nelle liti di estranei in una terra lontana, [CHARACTER.GetShortUINameNoTooltipNoFormat] ignorò l'invasione che presto avrebbe inghiottito tutto Westeros."
  nick_agot_historical_the_unsmiling:0 "l'Imbronciato"
  nick_agot_historical_the_unsmiling_desc:0 "Acclamat[Select_CString(CHARACTER.IsFemale,'a','o')] come il più feroce predone del suo tempo, [CHARACTER.GetShortUINameNoTooltipNoFormat] non fu mai not[Select_CString(CHARACTER.IsFemale,'a','o')] per sorridere."
  nick_agot_historical_the_unworthy:0 "l'Indegno"
  nick_agot_historical_the_unworthy_desc:0 "Invece di sforzarsi d'essere all'altezza della responsabilità ereditata, [CHARACTER.GetShortUINameNoTooltipNoFormat] wiled away [CharYourHerHis(CHARACTER)] days, con grande delusione di tutti."
  nick_agot_historical_the_valiant_victor:0 "Descritt[Select_CString(CHARACTER.IsFemale,'a','o')] come dal cuore buono, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CharWereWas(CHARACTER)] fatt[Select_CString(CHARACTER.IsFemale,'a','o')] cavaliere della Guardia Reale per essere stat[Select_CString(CHARACTER.IsFemale,'a','o')] uno dei campioni della Guerra per i Mantelli Bianchi."
  nick_agot_historical_the_veiled_lady:0 "la Dama Velata"
  nick_agot_historical_the_visitor:0 "il Visitatore"
  nick_agot_historical_the_vole:0 "l'Arvicola"
  nick_agot_historical_the_vole_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] un uomo piccolo, peloso e di aspetto dimesso."
  nick_agot_historical_the_vulture:0 "l'Avvoltoio"
  nick_agot_historical_the_vulture_king:0 "il Re Avvoltoio"
  nick_agot_historical_the_wanderer:0 "il Vagabondo"
  nick_agot_historical_the_wanderer_desc:0 "Abile nelle armi, [CHARACTER.GetShortUINameNoTooltipNoFormat] serve[_s(CHARACTER)] i Sette come cavaliere dei Figli del Guerriero."
  nick_agot_historical_the_wandering_wolf:0 "il Lupo Errante"
  nick_agot_historical_the_wandering_wolf_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] viaggiò lontano dalla casa nel Nord e servì come mercenario con i Secondi Figli."
  nick_agot_historical_the_war_hound:0 "il Mastino da Guerra"
  nick_agot_historical_the_wasp:0 "la Vespa"
