  nick_agot_historical_redarm_royce_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] infam[Select_CString(CHARACTER.IsFemale,'e','e')] per strappare le viscere dei prigionieri [Select_CString(CHARACTER.IsFemale,'suoi','suoi')] a mani nude."
  nick_agot_historical_redback:0 "Schienarosso"
  nick_agot_historical_redbeard:0 "Barbarossa"
  nick_agot_historical_redhand_line:0 "Manorosso"
  nick_agot_historical_redhand_line_desc:0 "Questa è la stirpe di Urron Greyiron, il primo Re delle Isole di Ferro che pose fine al kingsmoot e rese la regalità ereditaria."
  nick_agot_historical_redhand_urron:0 "Manorosso"
  nick_agot_historical_redhand_urron_desc:0 "Con i suoi uomini con l'ascia, [CHARACTER.GetShortUINameNoTooltipNoFormat] calò su Nagga's Hill e uccise tutti coloro che si erano radunati per il kingsmoot, ponendo fine all'antica tradizione."
  nick_agot_historical_redraven:0 "Corvorosso"
  nick_agot_historical_redraven_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fu chiamat[Select_CString(CHARACTER.IsFemale,'a','o')] così per i caratteristici capelli rossi — e perché i cantori avevano bisogno di una parola che facesse rima con 'vile'."
  nick_agot_historical_redsteel:0 "Acciaiorosso"
  nick_agot_historical_redtusk:0 "Zannarossa"
  nick_agot_historical_reek:0 "Puzzo"
