 # Positions
  maester_court_position:0 "Maestro" #[CharacterWindow.GetCourtOwner.Custom('MaesterCourtPosition')]
  maester_tradition_bonus:0 "Da [culture_tradition|E]"
  maester_court_position_desc:1 "Il $maester_court_position$ è responsabile della salute e del benessere della [court|E] nella quale si trova. Curerà le malattie e suturerà le ferite al meglio delle proprie capacità."
  maester_employer_custom_effect_description:1 "Esegue [medical_treatments|E]#!\nMiglia i risultati dell'[education|E]\nSblocca l'[interaction|E] #V $make_child_learn_language_interaction$#!\n@warning_icon!#X [agent|E] Potente nei [hostile_schemes|E] contro di te#!"

  grandmaester_court_position:0 "Gran Maestro" #[CharacterWindow.GetCourtOwner.Custom('MaesterCourtPosition')]
  grandmaester_tradition_bonus:0 "Da [culture_tradition|E]"
  grandmaester_court_position_desc:1 "Il $grandmaester_court_position$ è responsabile della salute e del benessere della famiglia reale. Curano le malattie e suturano le ferite nel miglior modo possibile."
  grandmaester_employer_custom_effect_description:1 "Effettua [medical_treatments|E]#!\nMigliora gli esiti dell'[education|E]\nSblocca l'interazione #V $make_child_learn_language_interaction$#! [interaction|E]\n@warning_icon!#X [agent|E] Potente nei [hostile_schemes|E] contro di te#!"

  household_guard_court_position:0 "Capitano della Guardia della Casata"
  household_guard_tradition_bonus:0 "Da [culture_tradition|E]"
  household_guard_court_position_desc:0 "Il $household_guard_court_position$ è responsabile dell'organizzazione della protezione della [house|E] che serve."
household_guard_employer_custom_effect_description: 2 "Riduce il rischio che tu muoia o venga catturato nelle battaglie in cui combattete entrambi#!\n@warning_icon!#X Potente [agent|E] in [hostile_schemes|E] contro di te#!"

admiral_court_position: 0 "Ammiraglio"
admiral_court_position_desc: 0 "L'$admiral_court_position$ è responsabile delle questioni nautiche e navali. Grande capitano della tua [fleet|E], e supervisore dell'imbarco dei tuoi eserciti."
admiral_fleet: 0 "Disperdi le flotte"
admiral_fleet_desc: 0 "Questo personaggio sta disperdendo le flotte del regno per pattugliare acque più vaste e rispondere con rapidità alle minacce lungo la costa."
admiral_maritime: 0 "Proteggi i commerci"
admiral_maritime_desc: 0 "A questo personaggio è affidato il compito di proteggere le rotte commerciali marittime e garantire il costante flusso di merci attraverso i tuoi porti."
admiral_raid: 0 "Incoraggia i razziatori"
admiral_raid_desc: 0 "Questo personaggio incoraggia azioni aggressive in mare, privilegiando colpi rapidi e saccheggio rispetto alla prudenza o alla moderazione."

  septon_court_position:0 "Septon"
septon_tradition_bonus: 0 "Da [culture_tradition|E]"
septon_court_position_desc: 1 "Il $septon_court_position$ fornisce servizi religiosi ai membri della tua [court|E] che appartengono alla Fede dei Sette."

  septa_court_position:0 "Septa"
septa_tradition_bonus: 0 "Da [culture_tradition|E]"
  septa_court_position_desc:1 "La $septa_court_position$ è responsabile dell'educazione dei tuoi [children|E] che non hanno un [guardian|E]."

  gaoler_court_position:0 "Guardiano delle Celle"
gaoler_court_position_desc: 1 "Nelle umide profondità del castello si estendono le segrete, dove i prigionieri gemono, e il $gaoler_court_position$ veglia su di esse."

  harbormaster_court_position:0 "Maestro della Flotta"
  harbormaster_tradition_bonus:0 "Da [culture_tradition|E]"
  harbormaster_court_position_desc:0 "Il $harbormaster_court_position$ è il funzionario che regola il commercio marittimo e supervisiona le dogane nei tuoi porti."

  warden_of_the_north_court_position:0 "Protettore del Nord"
  warden_of_the_north_court_position_desc:1 "Il Protettore del Nord è incaricato di difendere il Nord in caso di minacce o invasioni straniere."
  warden_of_the_east_court_position:0 "Protettore dell'Est"
  warden_of_the_east_court_position_desc:1 "Il Protettore dell'Est è incaricato di difendere l'Est in caso di minacce o invasioni straniere."
  warden_of_the_west_court_position:0 "Protettore dell'Ovest"
  warden_of_the_west_court_position_desc:1 "Il Protettore dell'Ovest è incaricato di difendere l'Ovest in caso di minacce o invasioni straniere."
  warden_of_the_south_court_position:0 "Protettore del Sud"
  warden_of_the_south_court_position_desc:1 "Il Protettore del Sud è incaricato di difendere il Sud in caso di minacce o invasioni straniere."

  goldcloaks_court_position:0 "Comandante della Guardia Cittadina"
  goldcloaks_tradition_bonus:0 "Da [culture_tradition|E]"
goldcloaks_court_position_desc: 0 "Il $goldcloaks_court_position$ comanda la Guardia Cittadina di Approdo del Re, una posizione di notevole prestigio e importanza."
  goldcloaks_employer_custom_effect_description:2 "#!\n@warning_icon!#X [agent|E] Potente nei [hostile_schemes|E] contro di te#!"

generic_scheme_warning_employer_custom_effect_description: 0 "#!\n@warning_icon!#X Potente [agent|E] in [hostile_schemes|E] contro di te#!"

sea_watch_commander_court_position: 0 "Comandante della Guardia del Mare"
sea_watch_commander_court_position_desc: 0 "Il capo della flotta di pattuglia che sorveglia le acque della Baia delle Acque Nere attorno ad Approdo del Re, estendendosi verso Crackclaw Point, le coste del Kingswood e l'Uncino di Massey."

royal_counter_court_position: 0 "Contatore Reale"
royal_counter_court_position_desc: 0 "Il $royal_counter_court_position$ è responsabile della gestione della tassazione del regno, assicurando che tutte le entrate dovute siano correttamente riscosse."

royal_scales_court_position: 0 "Bilance Reali"
royal_scales_court_position_desc: 0 "Custode ufficiale dei pesi e delle misure reali, il $royal_scales_court_position$ ha l'incarico di farli rispettare come standard in tutto il regno."

high_reeve_court_position: 0 "Alto Balivo"
high_reeve_court_position_desc: 0 "L'$high_reeve_court_position$ ha l'incarico di giudicare tutti i casi di bassa giustizia nella capitale, come furti e borseggi."

justiciar_court_position: 0 "Giustiziere"
justiciar_court_position_desc: 0 "Ai Giustizieri sono concessi poteri di alta giustizia direttamente dal monarca regnante. Viaggiano per il regno, autorizzati a giudicare questioni che riguardano fosse e forche, e ad amministrare la giustizia in nome del re ovunque sia necessario. Ciò può avvenire con la loro stessa spada o con quella dei loro attendenti."

royal_mint_officer_court_position: 0 "Guardiano della Zecca Reale"
royal_mint_officer_court_position_desc: 0 "Gli ufficiali della zecca reale sovrintendono alla produzione di moneta nelle zecche reali delle rispettive città."

keeper_of_keys_court_position: 0 "Custode delle Chiavi"
keeper_of_keys_court_position_desc: 0 "Il $keeper_of_keys_court_position$ è responsabile della custodia delle chiavi che aprono determinate porte e casse all'interno della casa reale. Alcune custodiscono i gioielli della corona, altre i fondi personali del monarca; tutte sono di grande importanza."

 # Grey Cloaks Commander
grey_cloaks_commander_court_position: 0 "Comandante della Guardia dei Mantelli Grigi"
grey_cloaks_commander_court_position_desc: 0 "Il $grey_cloaks_commander_court_position$ comanda la ben finanziata Guardia Cittadina di Vecchia Città."

 # Crimson Cloaks Commander
crimson_cloaks_commander_court_position: 0 "Comandante dei Mantelli Cremisi"
crimson_cloaks_commander_court_position_desc: 0 "Il $crimson_cloaks_commander_court_position$ comanda la ben addestrata e ben finanziata Guardia Cittadina di Lannisport."

 # Warden of the White Knife
white_knife_court_position: 0 "Guardiano della White Knife"
white_knife_court_position_desc: 0 "Il $white_knife_court_position$ è responsabile della difesa della foce della White Knife al Morso."

 # Warden of the Stone Way
stone_way_court_position: 0 "Guardiano della Via di Pietra"
stone_way_court_position_desc: 0 "Il $stone_way_court_position$ viene conferito al principale difensore di quella che più comunemente è nota come la 'Boneway'. Questa posizione conferisce anzianità militare su tutti gli altri vassalli durante la difesa della Via di Pietra."

 # Warden of the Prince's Pass
princes_pass_court_position: 0 "Guardiano del Passo del Principe"
princes_pass_court_position_desc: 0 "Il $princes_pass_court_position$ viene conferito al principale difensore di quello che storicamente è noto come la 'Via Larga'. Questa posizione conferisce anzianità militare su tutti gli altri vassalli durante la difesa del Passo del Principe."

  master_at_arms_court_position:0 "Maestro d'armi"
master_at_arms_court_position_desc: 1 "Il $master_at_arms_court_position$ è responsabile delle armi del regno, preservando e sovrintendendo alle questioni araldiche ed armoriali; spesso funge anche da araldo di corte del proprio signore."

  court_smith_court_position:0 "Fabbro di Corte"
court_smith_court_position_desc: 2 "Il $court_smith_court_position$ è responsabile della manutenzione e della cura delle opere metalliche."

 # Bloodrider
  bloodrider_court_position:0 "Cavaliere di Sangue"
bloodrider_court_position_desc: 0 "Un $bloodrider_court_position$ è un guardiano, legato nel sangue come fratello e compagno, giurato a proteggere il proprio capo. È più di un semplice vincolo di servizio; è un'unione infrangibile delle loro anime finché il loro capo non cade. Se falliscono nel loro dovere di protezione, esso si trasforma in uno di vendetta e poi di morte, quando raggiungono il loro capo nell'aldilà."
  bloodrider_employer_custom_effect_description: "$BULLET$Ha una possibilità di sventare complotti di [GetScheme('murder').GetTypeName] [schemes|E]#!\n$BULLET$Riduce il rischio che tu muoia o venga catturato in [battles|E] in cui combattete insieme#!\n$BULLET$Otterrà il tratto [GetTrait('loyal').GetName( GetNullCharacter )] [trait|E] e diventerà tuo [friend|E], se non lo è già\n$BULLET$Si toglierà la vita alla tua morte per onorare il giuramento di sangue"

  first_sword_court_position:0 "Primo Spada di Braavos"
  first_sword_court_position_desc:0 "Il $first_sword_court_position$ è il principale protettore del Signore del Sigillo di Braavos."

