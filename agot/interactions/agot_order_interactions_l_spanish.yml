  CITADEL_PENSIVE:1 "[GetTrait('pensive').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_ROWDY:1 "[GetTrait('rowdy').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_CURIOUS:1 "[GetTrait('curious').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_WRATHFUL:1 "[GetTrait('wrathful').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_LAZY:1 "[GetTrait('lazy').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_INTELLECT_BAD:1 "[personality|E] — #italic È debole di mente:#! $VALUE|=+0$"
  CITADEL_SQUIRE:1 "[GetTrait('squire').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_KNIGHT:1 "[GetTrait('knight').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_FIGHTER:1 "[personality|E] — #italic Preferirebbe la vita sul campo di battaglia:#! $VALUE|=+0$"
  CITADEL_WANTS_TO_LEARN:1 "[personality|E] — #italic Desidera apprendere:#! $VALUE|=+0$"
  CITADEL_LUSTFUL:1 "[GetTrait('lustful').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_PHYSICIAN:1 "[personality|E] — #italic Ha studiato la condizione umana:#! $VALUE|=+0$"
  CITADEL_ZEALOUS:1 "[personality|E] — #italic Preferirebbe servire la fede:#! $VALUE|=+0$"
  CITADEL_GREED:1 "[personality|E] — #italic Non desidera rinunciare ai piaceri terreni:#! $VALUE|=+0$"
  CITADEL_WEAK:1 "[personality|E] — #italic La sua debolezza renderebbe difficile conquistare gloria in battaglia:#! $VALUE|=+0$"
  agot_the_citadel.1000.desc:0 "Non riesco a immaginare gioia più grande che consacrare la mia vita alle occupazioni erudite. Mi metterò subito in viaggio verso la Cittadella."
  agot_the_citadel.1000.positive:0 "Sono lieto che [recipient.GetFirstNameNoTooltip] abbia compreso la saggezza di questa decisione."
  agot_the_citadel.1001.desc:0 "Il vostro suggerimento che io sradichi tutta la mia vita e corra alla Cittadella è ridicolo. Sono felice dove mi trovo, e non ho alcuna intenzione di cambiare."
  agot_the_citadel.1001.negative:0 "Davvero sfortunato..."
  
  send_to_silent_sisterhood_interaction:0 "Invia alla Sorellanza del Silenzio"
  send_to_silent_sisterhood_interaction_desc:0 "Invia [recipient.GetShortUINameNoTooltip] a pronunciare i voti del silenzio e a unirsi alla sorellanza."
  
  take_vows_septon_interaction:0 "Chiedi di prendere i voti"
