l_spanish:

 #Nightswatch
  send_to_nightswatch_interaction:0 "Invia ai Guardiani della Notte #weak (Dinastia)#!"
  send_to_nightswatch_interaction_extra_icon:0 "$hook_extra_icon$"
  send_to_nightswatch_interaction_desc:0 "$dynasty_interaction_header$Manda via [recipient.GetShortUINameNoTooltip] affinché serva come scudo degli uomini nei Guardiani della Notte. Non genererà figli né deterrà terre, ma è un dovere sacro e onorevole."
  send_to_nightswatch_interaction_toast:1 "[recipient.GetShortUIName] è partito per i Guardiani della Notte"
  send_to_nightswatch_interaction_toast_desc:0 "Ora ha inizio il suo servizio."
  
  CHARACTER_INTERACTION_NOT_ALLOWED_IN_NIGHTSWATCH:0 "[Select_CString(recipient.IsFemale,'Lei','Lui')] non può servire come [knight|E] nella [court|E] di destinazione"
  
  send_to_nightswatch_interaction_effect_desc:1 "#weak [CHARACTER.GetShortUIName] lascerà la tua corte per servire nei Guardiani della Notte. [Select_CString(CHARACTER.IsFemale,'Lei','Lui')] rinuncerà a ogni eredità e diritto per servire nella difesa del regno.#!"
  
  agot_send_to_citadel_interaction:0 "Invia alla Cittadella"
  agot_send_to_citadel_interaction_desc:0 "Invia [recipient.GetFirstNameNoTooltip] alla Cittadella"
  agot_send_to_citadel_interaction_extra_icon:0 "$hook_extra_icon$"
  agot_send_to_citadel_effect_desc:0 "#weak [CHARACTER.GetShortUIName] lascerà la tua corte per studiare alla Cittadella. Dopo aver pronunciato i suoi voti, metterà da parte il nome della sua casata e rinuncerà a ogni eredità per servire il regno.#!"
  citadel_decline_summary:0 "Se [recipient.GetShortUINameNoTooltip] rifiuta, rimarrà nella tua [court|E]"
  tried_to_send_me_to_citadel_opinion:0 "Ha tentato di mandarmi alla Cittadella"
  REQUEST_CITADEL_NOTIFICATION_TEXT:0 "Ti viene chiesto di lasciare la tua posizione a corte e recarti alla Cittadella per iniziare la formazione da maestro."
  CITADEL_PATIENT:1 "[GetTrait('patient').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_CALM:1 "[GetTrait('calm').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_DILIGENT:1 "[GetTrait('diligent').GetName( recipient.Self )]: $VALUE|=+0$"
  CITADEL_HERBALIST:1 "[GetTrait('lifestyle_herbalist').GetName( recipient.Self )]: $VALUE|=+0$"
