l_spanish:

agot_proclamation_events.1000.t: "Una Nuova Grande Casa"
agot_proclamation_events.1000.desc_intro: "Mi inginocchio davanti a [Select_CString(king.IsFemale,'la mia Regina','il mio Re')] [king.GetFirstName], giurando la mia fedeltà mentre [king.GetSheHe] mi conferisce un nuovo titolo, [kingdom_title_to_grant.GetName], e il dominio sulle terre che vi rientrano.\n\n"
agot_proclamation_events.1000.desc.not_legitimate_house: "Sotto gli occhi dei miei vassalli, vecchi e nuovi, vengo innalzat[Select_CString(ROOT.Char.IsFemale,'a','o')] a una condizione mai detenuta prima dalla mia stirpe. Nel mio reame nasce una nuova Grande Casa, e il suo nome echeggia per la terra. Eppure permangono sussurri di dubbio, e alcuni mettono in discussione il mio diritto a reclamarla, poiché non sono membro di Casa [legitimate_house.GetBaseName]."
agot_proclamation_events.1000.desc.legitimate_house: "Sotto gli occhi dei miei vassalli, vecchi e nuovi, riprendo l’antico dominio della mia famiglia: la restaurazione di una Grande Casa al suo giusto posto. Giuro di onorare i miei antenati e di assicurare che questo titolo non ci venga mai più sottratto."
agot_proclamation_events.1000.a: "Il futuro è luminoso per Casa [new_holder.GetHouse.GetBaseNameNoTooltip]."

agot_proclamation_it_succession_msg_title: 0 "Successione del Trono di Spade"
agot_proclamation_it_succession_msg_inheritance: 0 ""Mio [player.GetLadyLord|U], è giunta una lettera recante il sigillo di Casa [new_holder.GetHouse.GetBaseName] da [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]; [previous_holder.Custom('IT_NAM_COL3')][previous_holder.GetTitledFirstName|U] [previous_holder.GetDeathReason] — possa riposare in pace.\n\n[new_holder.GetFirstName] [new_holder.GetHouse.GetBaseName] è stat[Select_CString(new_holder.IsFemale,'a','o')] proclamat[Select_CString(new_holder.IsFemale,'a','o')] legittim[Select_CString(new_holder.IsFemale,'a','o')] success[Select_CString(new_holder.IsFemale,'ora','ore')] di [new_holder.GetPrimaryTitle.GetNameNoTooltip].""
agot_proclamation_it_succession_msg_conquest: 0 ""Mio [player.GetLadyLord|U], è giunta una lettera recante il sigillo di Casa [new_holder.GetHouse.GetBaseName] da [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]; le forze guidate da [previous_holder.GetFirstName] [previous_holder.GetHouse.GetBaseName] sono state sconfitte e [new_holder.Custom('IT_NAM_COL3')][new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] ha preso il Trono di Spade per diritto di conquista.""
agot_proclamation_it_succession_msg_abdication: 0 ""Mio [player.GetLadyLord|U], è giunta una lettera recante il sigillo di Casa [new_holder.GetHouse.GetBaseName] da [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]; con un inatteso volgere degli eventi, Sua Grazia [previous_holder.GetFirstNameRegnal] [new_holder.GetHouse.GetBaseName] ha rinunciato al proprio diritto di governare. Pertanto, [new_holder.Custom('IT_NAM_COL3')][new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] è stat[Select_CString(new_holder.IsFemale,'a','o')] proclamat[Select_CString(new_holder.IsFemale,'a','o')] su[Select_CString(previous_holder.IsFemale,'a','o')] success[Select_CString(previous_holder.IsFemale,'ora','ore')] e ascenderà al Trono di Spade per governare i Sette Regni.""
agot_proclamation_it_succession_msg_usurped: 0 ""Mio [player.GetLadyLord|U], è giunta una lettera recante il sigillo di Casa [new_holder.GetHouse.GetBaseName] da [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]; [new_holder.Custom('IT_NAM_COL3')][new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] ha preso il Trono di Spade a [previous_holder.GetFirstName] [previous_holder.GetHouse.GetBaseName] ed è stat[Select_CString(new_holder.IsFemale,'a','o')] proclamat[Select_CString(new_holder.IsFemale,'a','o')] nuov[Select_CString(new_holder.IsFemale,'a','o')] sovran[Select_CString(new_holder.IsFemale,'a','o')] dei Sette Regni.\n\nBenché alcuni possano chiamar[Select_CString(new_holder.IsFemale,'la','lo')] usurpat[Select_CString(new_holder.IsFemale,'rice','ore')] a bassa voce, non si può negare che il Trono di Spade sia ora saldamente nella sua stretta.""
agot_proclamation_it_succession_msg_fallback: 0 ""Mio [player.GetLadyLord|U], è giunta una lettera recante il sigillo di Casa [new_holder.GetHouse.GetBaseName] da [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]; [new_holder.Custom('IT_NAM_COL3')][new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] è stat[Select_CString(new_holder.IsFemale,'a','o')] proclamat[Select_CString(new_holder.IsFemale,'a','o')] nuov[Select_CString(new_holder.IsFemale,'a','o')] sovran[Select_CString(new_holder.IsFemale,'a','o')] dei Sette Regni.""
