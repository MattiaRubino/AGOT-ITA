l_spanish:

  agot_title_and_name_events.0001.t:0 "Una Questione di Sangue Reale"
  agot_title_and_name_events.0001.desc:0 "[Select_CString(child.IsFemale,'La mia','Il mio')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('child'))], [AGOTGetName(child)], ha sangue reale, ma ancora non ne gode il dovuto riconoscimento. In quanto [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip], è in mio potere conferir[child.Custom('DE_PRO_PER_P_3P_O')] tali onori, affinché tutti conoscano la [Select_CString(child.IsFemale,'sua','suo')] stirpe reale."
  agot_title_and_name_events.0001.desc.twins:0 "[AGOTGetName(child)] e [AGOTGetName(child_2)], i figli appena nati del[scoped_relative.Custom('DE_PRO_PER_P_3P_G')] mi[Select_CString(scoped_relative.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('scoped_relative'))], [AGOTGetName(scoped_relative)], hanno sangue reale, ma ancora non ne godono il dovuto riconoscimento. In quanto [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip], è in mio potere conferir loro tali onori, affinché tutti conoscano la loro stirpe reale."
  agot_title_and_name_events.0001.desc.triplets:0 "[AGOTGetName(child)], [AGOTGetName(child_2)] e [AGOTGetName(child_3)], i figli appena nati del[scoped_relative.Custom('DE_PRO_PER_P_3P_G')] mi[Select_CString(scoped_relative.IsFemale,'a','o')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('scoped_relative'))], [AGOTGetName(scoped_relative)], hanno sangue reale, ma ancora non ne godono il dovuto riconoscimento. In quanto [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip], è in mio potere conferir loro tali onori, affinché tutti conoscano la loro stirpe reale."
  agot_title_and_name_events.0001.a:0 "Il sangue reale esige un riconoscimento regale."
  agot_title_and_name_events.0001.b:0 "I parenti lontani non meritano un tale onore."
  agot_title_and_name_events.0001.b.flavor:0 "@alert_icon! #alert_trial Potrai conferire titoli reali più tardi#!"
  agot_title_and_name_events.0002.desc:0 "I membri della mia Casata hanno sangue reale, ma ancora non ne godono il dovuto riconoscimento. In quanto [ROOT.Char.Custom('IT_NAM_COL3')][ROOT.Char.GetTitleAsNameNoTooltip], è in mio potere conferir loro tali onori, affinché tutti conoscano la loro stirpe reale.\n\n#I Seleziona i parenti ai quali conferire titoli reali#!"