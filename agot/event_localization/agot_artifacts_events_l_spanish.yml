l_spanish:
  agot_artifact_events.0010.t:0 "Gli Averi di [prisoner.Custom('IT_NAM_COL2')][prisoner.GetTitledFirstNameNoTooltip]"
  agot_artifact_events.0010.desc:0 "[prisoner.GetNameNicknamed] rimane sotto la mia custodia e, poiché [Select_CString(prisoner.IsFemale,'la sua libertà','la sua libertà')] le è ancora negata, la questione dei [Select_CString(prisoner.IsFemale,'suoi averi','suoi averi')] grava sui miei pensieri.\n\nIn quanto [Select_CString(prisoner.IsFemale,'sua carceriera','suo carceriere')], posso reclamare alcuni manufatti come condizione per il rilascio. Tali oggetti potrebbero rivelarsi preziosi, se le mie richieste verranno scelte con cura."
  agot_artifact_events.0010.a:0 "Dovrei decidere che fare di ciascuno..."
  agot_artifact_events.0010.a_tt:0 "Valuterò ciascuno degli oggetti di [prisoner.Custom('IT_NAM_COL2')][prisoner.GetTitledFirstNameNoTooltip], uno alla volta."
  agot_artifact_events.0010.a_tt_artifact:0 "Valuterò che fare di [artifact_to_inform.GetName]."
  agot_artifact_events.0010.b:0 "Rivedrò le mie richieste."
  agot_artifact_events.0010.c:0 "Questi basteranno."
  agot_artifact_events.0010.c_tt:0 "Richiederò [artifact_to_show.GetNameNoTooltip]."
  
  agot_artifact_events.0011.t:0 "$agot_artifact_events.0010.t$"
  agot_artifact_events.0011.desc:0 "Ho deciso di offrire a [prisoner.Custom('IT_NAM_COL4')][prisoner.GetTitledFirstName] la possibilità di lasciare la mia custodia in cambio di alcuni dei [Select_CString(prisoner.IsFemale,'suoi averi','suoi averi')]. Ora devo decidere quali oggetti esigere.\n\n[artifact_to_steal.GetName] mi viene in mente. Dovrei aggiungerlo alla lista delle mie richieste, o lasciarlo dov'è? [Select_CString(prisoner.IsFemale,'Sarà lei disposta','Sarà lui disposto')] a separarsi da questo manufatto se avanzerò l'offerta?"
  agot_artifact_events.0011.a:0 "Lo aggiungerò alla lista delle mie richieste."
  agot_artifact_events.0011.a_valyrian_tt_no_house:0 "Se [prisoner.GetTitledFirstNameNoTooltip] accetta, i membri di Casa [prisoner.GetHouse.GetNameNoTooltip] ti serberanno rancore per aver preso un cimelio di famiglia."
  agot_artifact_events.0011.a_illustrious:0 "A causa della sua rarità, questo manufatto costerà [prestige_i|E] #N 1000#! per essere preso come riscatto."
  agot_artifact_events.0011.a_famed:0 "A causa della sua rarità, questo manufatto costerà [prestige_i|E] #N 500#! per essere preso come riscatto."
  agot_artifact_events.0011.a_masterwork:0 "A causa della sua rarità, questo manufatto costerà [prestige_i|E] #N 250#! per essere preso come riscatto."
  agot_artifact_events.0011.a_common:0 "A causa della sua rarità, questo manufatto costerà [prestige_i|E] #N 100#! per essere preso come riscatto."
  agot_artifact_events.0011.b:0 "Non ho alcun interesse a prendere questo manufatto."
  agot_artifact_events.0011.b_tt:0 "Questo manufatto appartiene al suo legittimo proprietario."
  agot_artifact_events.0011.c:0 "Ho finito di esaminare i manufatti."
