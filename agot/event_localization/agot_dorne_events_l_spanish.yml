l_spanish:

 agot_dorne.0001.t: "Un serpente nella sabbia"
agot_dorne.0001.desc: 0 "I miei impulsi sono sempre stati il mio veleno, eppure a Dorne ciò non è una cosa tanto negativa. Oggi, mentre passeggio per i Giardini dell'Acqua, l'affascinante figlia di Lord Uller attira il mio sguardo. Ma non ricambia la mia attenzione con il solito languore. Anzi, socchiude gli occhi e sogghigna..."
agot_dorne.0001.a: 0 "Le tue labbra sono velenose; abbracciamoci..."
 agot_dorne.0001.b: "Una semplice prostituta non merita la mia attenzione..." 
