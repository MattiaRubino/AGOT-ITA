l_spanish:
  #Headers
  agot_multi_duel.header:0 "Scontro a [background_terrain_scope.GetNameNoTooltip]"
  agot_multi_duel.tos_header:0 "Una Prova dei Sette"

  agot_multi_duel.1002.a.t:0 "$agot_multi_duel.tos_header$: Ancora in Piedi"
  agot_multi_duel.1002.desc.tos.stands_winner_pov:0 "Ho atterrato [loser_multi_duelist.Custom('IT_NAM_COL4')][loser_multi_duelist.GetTitledFirstName], certo che lo scontro fosse finito. Per il tempo d'un battito di cuore, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] è rimast[Select_CString(loser_multi_duelist.IsFemale,'a','o')] immobile nel turbine della battaglia.\n\nPoi [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] si rialza. Copert[Select_CString(loser_multi_duelist.IsFemale,'a','o')] di sangue, instabil[Select_CString(loser_multi_duelist.IsFemale,'e','e')], ma ancora una volta in piedi, si fa nuovamente largo nella lotta come se dolore e senno fossero stati ugualmente gettati via."
  agot_multi_duel.1002.desc.tos.stands_loser_pov:0 "Il colpo di [winner_multi_duelist.GetTitledFirstNamePossessive] mi scaraventa a terra, mentre il mondo gira e acciaio e clamore mi si infrangono attorno. Per un istante, pare che il combattimento sia finito.\n\nMi costringo a rialzarmi attraverso il dolore, il respiro spezzato, le membra che urlano per la protesta. Qualunque cosa venga ora, non resterò a terra."
  agot_multi_duel.1002.desc.tos.stands_winner_pov.friend:0 "Ho atterrato [loser_multi_duelist.Custom('IT_NAM_COL4')][loser_multi_duelist.GetTitledFirstName], certo che lo scontro fosse finito. Per il tempo d'un battito di cuore, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] è rimast[Select_CString(loser_multi_duelist.IsFemale,'a','o')] immobile nel turbine della battaglia."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.friend:0 "Il colpo di [winner_multi_duelist.GetTitledFirstNamePossessive] mi scaraventa a terra, mentre il mondo gira e acciaio e clamore mi si infrangono attorno. Per un istante, pare che il combattimento sia finito."
  
  agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_1:0 "\n\nUna voce squarcia il fragore, mentre [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] grida dalla folla.\n\n#EMP «In piedi, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Questo scontro non spetta a te perderlo!»#! \n\nE in qualche modo, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] si rialza. Copert[Select_CString(loser_multi_duelist.IsFemale,'a','o')] di sangue, instabil[Select_CString(loser_multi_duelist.IsFemale,'e','e')], ma ancora una volta in piedi, si fa nuovamente largo nella lotta come se dolore e senno fossero stati ugualmente gettati via."
  agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_2:0 "\n\nUn grido attraversa lo scontro, mentre [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] chiama dalla folla.\n\n#EMP «In piedi, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Non è qui che cadrai!»#! \n\nContro ogni buon senso, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] si rimette in piedi a fatica, malconci[Select_CString(loser_multi_duelist.IsFemale,'a','o')] ma non piegat[Select_CString(loser_multi_duelist.IsFemale,'a','o')], mentre il duello riprende."
  agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_3:0 "\n\nAl di sopra del fragore dell'acciaio, la voce di [loser_duelist_friend.GetTitledFirstNamePossessive] risuona limpida.\n\n#EMP «Alzati, ser! Mostra loro che sei ancora in piedi!»#! \n\nUn istante dopo, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] torna sui [Select_CString(loser_multi_duelist.IsFemale,'suoi piedi','suoi piedi')], vacillant[Select_CString(loser_multi_duelist.IsFemale,'e','e')] ma pront[Select_CString(loser_multi_duelist.IsFemale,'a','o')] a continuare a combattere."
  agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_4:0 "\n\nUn grido disperato squarcia il frastuono, mentre [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] lo sprona.\n\n#EMP «Su, adesso! I Sette ti guardano: non cedere!»#! \n\nCon un respiro spezzato, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] si rialza ancora una volta, rifiutandosi di lasciare che lo scontro finisca."
  agot_multi_duel.1002.desc.tos.stands_winner_pov.friend.outro_5:0 "\n\nDal margine della folla, [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] grida con feroce risolutezza.\n\n#EMP «In piedi, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! In piedi e affrontali!»#! \n\nLentamente, ostinatamente, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] ritrova l'equilibrio e rientra nello scontro."
  
  agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_1:0 "\n\nAttraverso la foschia, odo [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] gridare sopra il caos.\n\n#EMP «In piedi, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! In piedi e combatti!»#! \n\nQuel suono squarcia la nebbia, e mi costringo a rimettermi in piedi attraverso il dolore, col respiro spezzato e le membra che urlano per la protesta. Qualunque cosa venga ora, non resterò a terra."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_2:0 "\n\nAttraverso il caos, la voce di [loser_duelist_friend.GetTitledFirstNamePossessive] mi raggiunge.\n\n#EMP «Su, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Non sei ancora sconfitto!»#! \n\nQuelle parole bruciano attraverso la foschia, e mi costringo a rialzarmi, rifiutando di lasciare che il combattimento finisca qui."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_3:0 "\n\nUna voce familiare squarcia il ronzio nelle mie orecchie: [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName], feroc[Select_CString(loser_duelist_friend.IsFemale,'e','e')] e inflessibil[Select_CString(loser_duelist_friend.IsFemale,'e','e')].\n\n#EMP «Alzati, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! In piedi, e combatti!»#! \n\nStringendo i denti, mi trascino di nuovo in piedi, mentre il dolore accompagna ogni movimento."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_4:0 "\n\nAl di sopra dello scontro dell'acciaio, sento [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] chiamare il mio nome.\n\n#EMP «Resisti! Non cadere ora!»#! \n\nQuel grido mi ridà fermezza, e mi spingo attraverso il dolore per rialzarmi ancora una volta."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.friend.outro_5:0 "\n\nDa qualche parte oltre il frastuono, [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] grida con disperata urgenza.\n\n#EMP «Su, [loser_multi_duelist.GetTitledFirstNameNoTooltip]! Il combattimento è tuo: alzati!»#! \n\nQuelle parole squarciano la nebbia, e mi rimetto in piedi a forza, col respiro spezzato ma con la risolutezza intatta."

  agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_1:0 "\n\nIl mondo svanisce per il tempo d'un battito di cuore, e vedo [my_teacher_knight.Custom('IT_NAM_COL3')][my_teacher_knight.GetTitledFirstName] in piedi sopra di me nel cortile d'addestramento, mentre osserva i miei sforzi per rialzarmi dalla polvere. [my_teacher_knight.GetSheHe|U] scuote il capo, la voce ferma e familiare.\n\n#EMP «In piedi. Un cavaliere si rialza, per quanto duramente cada.»#! \n\nL'acciaio torna a infrangersi nei miei sensi e il ricordo si spezza. Trascino un respiro spezzato, puntando la mano sul terreno sconvolto e costringendomi a rimettermi in piedi ancora una volta."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_2:0 "\n\nL'oscurità si stringe attorno a me finché la voce di [my_teacher_knight.GetTitledFirstNamePossessive] non la squarcia, calma e inflessibile, proprio come un tempo, quando ogni livido era una lezione e ogni caduta meritava un nuovo comando.\n\n#EMP «Il dolore passa. Restare in piedi è una scelta.»#! \n\nIl ruggito della battaglia ritorna, netto e travolgente. Stringendo i denti, mi faccio strada oltre il male e torno a rimettermi in piedi."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_3:0 "\n\nPer un istante, non sono più sul campo ma nella polvere d'un ricordo lontano, con [my_teacher_knight.Custom('IT_NAM_COL3')][my_teacher_knight.GetTitledFirstName] che osserva a braccia conserte mentre io mi affanno per mostrarmi degno della lama.\n\n#EMP «Di nuovo. Finché non imparerai a non restare a terra.»#! \n\nIl ricordo si dissolve sotto il fragore dell'acciaio. Col respiro che mi brucia nei polmoni, barcollo e mi rialzo, rifiutando di lasciare che la lezione finisca qui."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_4:0 "\n\nIl frastuono svanisce, e odo la voce di [my_teacher_knight.GetTitledFirstNamePossessive] con la stessa chiarezza di quando [my_teacher_knight.GetSheHe] stava accanto a me su qualche strada dimenticata, spronandomi a proseguire quando la stanchezza minacciava di sopraffarmi.\n\n#EMP «Un vero cavaliere resiste.»#! \n\nIl presente mi piomba addosso con il clangore dell'acciaio e le grida degli ordini. Attingendo a quella vecchia forza, costringo le membra a obbedirmi e mi rialzo ancora una volta."
  agot_multi_duel.1002.desc.tos.stands_loser_pov.memory.outro_5:0 "\n\nPer un istante, la battaglia svanisce, sostituita dallo sguardo severo di [my_teacher_knight.Custom('IT_NAM_COL3')][my_teacher_knight.GetTitledFirstName] dopo uno scontro d'addestramento fallito, mentre aspetta in silenzio che io mi rialzi invece di tendermi una mano.\n\n#EMP «Non aspettare misericordia. Alzati.»#! \n\nLa visione svanisce come fumo mentre il peso del presente ritorna. Con un respiro aspro e una risolutezza tremante, mi rimetto in piedi e torno nello scontro."
  
  agot_multi_duel.1002.a:0 "Il combattimento continua."

  agot_multi_duel.1003.a.t:0 "$agot_multi_duel.tos_header$: Abbattuto"
  agot_multi_duel.1003.desc.tos.downed_winner_pov:0 "[loser_multi_duelist.Custom('IT_NAM_COL3')][loser_multi_duelist.GetTitledFirstName] tenta di rialzarsi di nuovo, ma le forze l[Select_CString(loser_multi_duelist.IsFemale,'a','o')] hanno abbandonat[Select_CString(loser_multi_duelist.IsFemale,'a','o')]. Qualunque cosa [Select_CString(loser_multi_duelist.IsFemale,'l’avesse','l’avesse')] tenut[Select_CString(loser_multi_duelist.IsFemale,'a','o')] in piedi fino a ora è infine venuta meno, e [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] ricade al suolo.\n\nIl combattimento è terminato. [loser_multi_duelist.GetSheHe|U] respira ancora, ma [loser_multi_duelist.GetSheHe] non può più rispondere all'acciaio con l'acciaio."
  agot_multi_duel.1003.desc.tos.downed_loser_pov:0 "Cerco di rimettermi in piedi, ma il mio corpo mi rifiuta. Il dolore soffoca ogni altra cosa e le mie membra non mi obbediscono più.\n\nIl combattimento è andato avanti senza di me, e qui finisce. Vedo [winner_multi_duelist.Custom('IT_NAM_COL3')][winner_multi_duelist.GetTitledFirstName] sopra di me, copert[Select_CString(winner_multi_duelist.IsFemale,'a','o')] di sangue ma intatt[Select_CString(winner_multi_duelist.IsFemale,'a','o')], mentre assapora un trionfo che io non posso più raggiungere."
  agot_multi_duel.1003.a:0 "Uno in meno resta in piedi."

  agot_multi_duel.1004.a.t:0 "$agot_multi_duel.tos_header$: L'Accusa Ritirata"
  agot_multi_duel.1004.desc.tos.yields_winner_pov:0 "[loser_multi_duelist.Custom('IT_NAM_COL3')][loser_multi_duelist.GetTitledFirstName] vacilla infine, con le forze consunte e la volontà spezzata. Prima che l'acciaio possa rispondere ancora, [Select_CString(loser_multi_duelist.IsFemale,'lei','lui')] si arrende.\n\nLe parole giungono poco dopo. L'accusa contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName] viene ritirata, la sfida abbandonata in piena vista del reame. Ciò che era stato messo in dubbio non è più conteso, e la Prova dei Sette termina non nel sangue, ma nella resa."
  agot_multi_duel.1004.desc.tos.yields_loser_pov:0 "Le forze mi abbandonano, e con esse la certezza che mi ha condotto fin qui. Abbasso la mia [loser_multi_duelist.Custom('signature_weapon')] e mi arrendo, sapendo che non vi è più nulla da guadagnare restando in piedi.\n\nDinanzi a tutti i presenti, ritiro l'accusa e abbandono la prova che avevo chiamato contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName]. La verità che cercavo di provare non sarà provata dalla mia mano. La Prova dei Sette termina qui, disfatta dalla mia resa."
  agot_multi_duel.1004.desc.tos.yields_observer_pov:0 "Lo scontro rallenta, poi si arresta. [loser_multi_duelist.Custom('IT_NAM_COL3')][loser_multi_duelist.GetTitledFirstName], che aveva chiesto la prova e mosso l'accusa contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName] dinanzi al reame, si arrende infine.\n\nCon quella resa, l'accusa stessa viene ritirata. La Prova dei Sette termina non con un colpo finale, ma con le stesse parole dell'accusatore che disfanno ciò che era stato iniziato. Dinanzi a tutti coloro che vi assistono, la questione è chiusa, e l'accusa viene sepolta."
  agot_multi_duel.1004.a:0 "La prova finisce qui."

  agot_multi_duel.1005.t.tos:0 "$agot_multi_duel.tos_header$: Una Prova Interrotta"
  agot_multi_duel.1005.desc.tos:0 "Prima che la Prova dei Sette potesse giungere al proprio esito, giunge notizia che [dead_enemy_leader.Custom('IT_NAM_COL3')][dead_enemy_leader.GetTitledFirstName] è mort[Select_CString(dead_enemy_leader.IsFemale,'a','o')] al di fuori del campo. Per caso, per sventura o per mano d'altri, la causa che aveva riunito i campioni non ha più ragione d'essere.\n\nSenza accusatore né accusato che rispondano dell'accusa, la prova non può continuare. Le lame radunate vengono congedate, e ciò che doveva essere deciso con l'acciaio scivola invece nel silenzio."
  agot_multi_duel.1005.a:0 "È finita."

