  agot_multi_duel.0020.desc.intro1:0 "Lo scontro fra [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] erompe come una tempesta nel caos della battaglia, attirando il mio sguardo mentre le loro armi danzano nella luce fioca."
  agot_multi_duel.0020.desc.intro2:0 "Scorgo [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] mentre si girano attorno con intenti mortali, e il clamore della battaglia svanisce mentre il loro duello occupa il centro della scena."
  agot_multi_duel.0020.desc.intro3:0 "Nel mezzo della mischia vorticosa, la mia attenzione è attirata da [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] mentre si lanciano l[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'una','uno')] contro l'altr[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'a','o')], con le lame che scintillano di un intento letale."
  agot_multi_duel.0020.desc.intro4:0 "[winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] si affrontano con una ferocia che riecheggia su tutto il campo di battaglia, un duello mortale che impone la mia attenzione."
  agot_multi_duel.0020.desc.intro5:0 "Attraverso il caos, noto [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] mentre si fissano negli occhi, entramb[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'e','i')] determinat[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'e','i')] a dimostrare il proprio valore in un duello che potrebbe volgere l'esito della battaglia."
  agot_multi_duel.0020.desc.intro6:0 "Mentre la battaglia infuria, scorgo [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] avvicinarsi l[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'una','uno')] all'altr[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'a','o')], con ogni mossa calcolata e mortale."
  agot_multi_duel.0020.desc.intro7:0 "[winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] si misurano in una contesa feroce, le loro armi si urtano con un fragore che squarcia il frastuono della guerra."
  agot_multi_duel.0020.desc.intro8:0 "I miei occhi sono attratti da [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] mentre si fanno strada sul campo di battaglia, le armi pronte a colpire in un duello che potrebbe finire nel sangue."
  agot_multi_duel.0020.desc.intro9:0 "Nel mezzo del combattimento, il duello fra [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] spicca come un faro, con l'abilità di entramb[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'e','i')] in piena mostra mentre combattono per sopravvivere."
  agot_multi_duel.0020.desc.intro10:0 "[winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstName] e [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstName] si scontrano in una collisione violenta, con le scintille delle loro lame che illuminano il campo di battaglia mentre il duello si dispiega."
  
  agot_multi_duel.0020.desc.middle1:0 "[winner_duelist.GetTitledFirstNameNoTooltip] si lancia in avanti con una rapida stoccata, ma [loser_duelist.GetTitledFirstNameNoTooltip] scarta di lato e risponde con un brutale [loser_duelist.Custom('AGOT_SignatureWeaponCritical')] che quasi va a segno."
  agot_multi_duel.0020.desc.middle2:0 "La [loser_duelist.Custom('signature_weapon')] di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] sibila nell'aria mentre [winner_duelist.GetTitledFirstNameNoTooltip] si abbassa sotto di essa, replicando con un rapido [winner_duelist.Custom('AGOT_SignatureVerb')] al fianco di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] che fa sgorgare il sangue."
  agot_multi_duel.0020.desc.middle3:0 "Il duello si fa più intenso quando [winner_duelist.GetTitledFirstNameNoTooltip] blocca un colpo possente di [loser_duelist.GetTitledFirstNameNoTooltip], respingendol[Select_CString(loser_duelist.IsFemale,'a','o')] all'indietro prima di scatenare una raffica di colpi."
  agot_multi_duel.0020.desc.middle4:0 "[loser_duelist.GetTitledFirstNameNoTooltip] finge a sinistra, inducendo la guardia di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] a spostarsi, prima di assestare un colpo di [winner_duelist.Custom('AGOT_SignatureWeaponHeavy')] che quasi strappa [winner_duelist.Custom('IT_NAM_COL4')][winner_duelist.GetTitledFirstNameNoTooltip] dai [winner_duelist.Custom('DE_PRO_PER_P_3P_G')] piedi."
  agot_multi_duel.0020.desc.middle5:0 "[winner_duelist.GetTitledFirstNameNoTooltip] devia il fendente dall'alto di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] e si fa sotto, piantando il [winner_duelist.Custom('DE_PRO_PER_P_3P_G')] ginocchio nel ventre di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] prima di ricacciarl[Select_CString(loser_duelist.IsFemale,'a','o')] indietro."
  agot_multi_duel.0020.desc.middle6:0 "[loser_duelist.GetTitledFirstNameNoTooltip] sferra un colpo basso con la [loser_duelist.Custom('DE_PRO_PER_S_3P_G')][loser_duelist.Custom('signature_weapon')], mirando alle gambe di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip], ma [winner_duelist.GetTitledFirstNameNoTooltip] balza oltre l'attacco e risponde con un feroce [winner_duelist.Custom('AGOT_SignatureWeaponCritical')] alla spalla di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]."
  agot_multi_duel.0020.desc.middle7:0 "[winner_duelist.GetTitledFirstNameNoTooltip] e [loser_duelist.GetTitledFirstNameNoTooltip] si scambiano colpi in una serie furiosa, ciascun[Select_CString(Or(winner_duelist.IsFemale, loser_duelist.IsFemale),'a','o')] evitando di stretta misura la morte mentre incalza l'attacco."
  agot_multi_duel.0020.desc.middle8:0 "[loser_duelist.GetTitledFirstNameNoTooltip] ruota via da un colpo pesante, usando l'impeto per infliggere una ferita di striscio al braccio di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip], tracciando una linea cremisi."
  agot_multi_duel.0020.desc.middle9:0 "[winner_duelist.GetTitledFirstNameNoTooltip] attira [loser_duelist.GetTitledFirstNameNoTooltip] a scoprirsi con una falsa ritirata, poi avanza e infligge un colpo feroce al petto di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]."
  agot_multi_duel.0020.desc.middle10:0 "La [loser_duelist.Custom('signature_weapon')] di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] si schianta contro la [winner_duelist.Custom('signature_weapon')] di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] con fragore possente, ma [winner_duelist.GetTitledFirstNameNoTooltip] replica con prontezza, spingendo la [winner_duelist.Custom('DE_PRO_PER_S_3P_G')][winner_duelist.Custom('signature_weapon')] verso il collo di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]."
  
  #DUEL OUTRO TEXTS - Fatal
  agot_multi_duel.0020.desc.outro1:0 "\n\nCon un ultimo, disperato affondo, [winner_duelist.GetTitledFirstNameNoTooltip] pianta la [winner_duelist.Custom('DE_PRO_PER_S_3P_G')][winner_duelist.Custom('signature_weapon')] nel petto di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip], ponendo fine al duello in uno spruzzo di sangue. [loser_duelist.GetTitledFirstNameNoTooltip] cade a terra, per non rialzarsi mai più."
  agot_multi_duel.0020.desc.outro2:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] riesce a disarmare [winner_duelist.Custom('IT_NAM_COL4')][winner_duelist.GetTitledFirstNameNoTooltip], ma prima che [loser_duelist.GetSheHe] possa finir[Select_CString(winner_duelist.IsFemale,'la','lo')], la [winner_duelist.Custom('signature_weapon')] di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] trova la via del cuore di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]. [loser_duelist.GetTitledFirstNameNoTooltip] si accascia al suolo, mort[Select_CString(loser_duelist.IsFemale,'a','o')] ancor prima di toccarlo."
  agot_multi_duel.0020.desc.outro3:0 "\n\nLa [winner_duelist.Custom('signature_weapon')] di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] coglie [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] alla gola, e uno spruzzo di sangue segna la fine del duello mentre [loser_duelist.GetTitledFirstNameNoTooltip] crolla, privo di vita."
  agot_multi_duel.0020.desc.outro4:0 "\n\nL'ultimo, disperato fendente di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] manca il bersaglio, lasciandol[Select_CString(loser_duelist.IsFemale,'a','o')] scopert[Select_CString(loser_duelist.IsFemale,'a','o')] al colpo mortale di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip]. La [winner_duelist.Custom('signature_weapon')] di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')] il cuore di [loser_duelist.GetTitledFirstNameNoTooltip], e [loser_duelist.GetTitledFirstNameNoTooltip] cade con un ultimo rantolo."
  agot_multi_duel.0020.desc.outro5:0 "\n\nCon un brutale fendente, [winner_duelist.GetTitledFirstNameNoTooltip] decapita [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip], ponendo fine al duello con un unico colpo risolutivo. Il corpo di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] crolla al suolo."
  agot_multi_duel.0020.desc.outro6:0 "\n\nL'ultimo colpo di [winner_duelist.GetTitledFirstNamePossessiveNoTooltip] [winner_duelist.Custom('AGOT_SignatureWeaponCriticalPresent')] il fianco di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip], e la ferita mortale fa cadere [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] in ginocchio prima che [loser_duelist.GetSheHe] crolli mort[Select_CString(loser_duelist.IsFemale,'a','o')]."
  agot_multi_duel.0020.desc.outro7:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] infligge un colpo mortale a [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip], affondando la [winner_duelist.Custom('DE_PRO_PER_S_3P_G')][winner_duelist.Custom('signature_weapon')] nel petto di [Select_CString(loser_duelist.IsFemale,'colei che','colui che')] gli si oppone. Il corpo senza vita di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] si affloscia al suolo."
  agot_multi_duel.0020.desc.outro8:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] si scopre troppo, e [winner_duelist.GetTitledFirstNameNoTooltip] ne approfitta, trapassandol[Select_CString(loser_duelist.IsFemale,'a','o')] con un unico, preciso affondo della [winner_duelist.Custom('DE_PRO_PER_S_3P_G')][winner_duelist.Custom('signature_weapon')]. [loser_duelist.GetTitledFirstNameNoTooltip] cade, mort[Select_CString(loser_duelist.IsFemale,'a','o')] prima ancora di toccare terra."
  agot_multi_duel.0020.desc.outro9:0 "\n\nCon un colpo rapido e feroce, [winner_duelist.GetTitledFirstNameNoTooltip] squarcia la gola di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]. Gli occhi di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] si spalancano per lo shock mentre [loser_duelist.GetSheHe] crolla, col sangue che sgorga dalla ferita."
  agot_multi_duel.0020.desc.outro10:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] oltrepassa la guardia di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] e affonda la [winner_duelist.Custom('DE_PRO_PER_S_3P_G')][winner_duelist.Custom('signature_weapon')] nelle viscere di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip]. [loser_duelist.GetTitledFirstNameNoTooltip] barcolla per un battito di cuore, poi crolla privo di vita sul terreno macchiato di sangue."
  
  agot_multi_duel.0020.desc.outro_survived1:0 "\n\nEntrambi i contendenti restano insanguinati e malconci, ma vivi, mentre si disimpegnano e si ritirano per curare le proprie ferite."
  agot_multi_duel.0020.desc.outro_survived2:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] riesce a disarmare [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip], ma invece di assestare il colpo mortale, [winner_duelist.GetSheHe] gli risparmia la vita, lasciando che [Select_CString(loser_duelist.IsFemale,'lei','lui')] strisci via dal combattimento."
  agot_multi_duel.0020.desc.outro_survived3:0 "\n\nIl duello termina in una situazione di stallo, con entrambi troppo esausti per continuare. Si studiano con diffidenza prima di indietreggiare, con l'onore intatto."
  agot_multi_duel.0020.desc.outro_survived4:0 "\n\nUn'improvvisa distrazione sul campo di battaglia induce sia [winner_duelist.Custom('IT_NAM_COL3')][winner_duelist.GetTitledFirstNameNoTooltip] sia [loser_duelist.Custom('IT_NAM_COL3')][loser_duelist.GetTitledFirstNameNoTooltip] a interrompere il duello, poiché nessuno dei due è disposto a rischiare un colpo in tanta incertezza."
  agot_multi_duel.0020.desc.outro_survived5:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] e [loser_duelist.GetTitledFirstNameNoTooltip] si girano attorno con cautela, ma nessuno dei due trova un varco per assestare il colpo mortale. Alla fine si separano, entrambi contusi ma vivi."
  agot_multi_duel.0020.desc.outro_survived6:0 "\n\nIl combattimento viene interrotto da un'ondata di soldati nemici, costringendo [winner_duelist.Custom('IT_NAM_COL4')][winner_duelist.GetTitledFirstNameNoTooltip] e [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] a troncare il duello e a tornare alla battaglia più ampia."
  agot_multi_duel.0020.desc.outro_survived7:0 "\n\nEntrambi sono sull'orlo del crollo, ma nessuno cede. Alla fine, acconsentono a interrompere il duello, rispettando ciascuno l'abilità dell'altro."
  agot_multi_duel.0020.desc.outro_survived8:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] riesce a ferire [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip], ma prima che [winner_duelist.GetSheHe] possa finir[Select_CString(loser_duelist.IsFemale,'la','lo')], altri combattenti si gettano fra loro, spezzando l'attimo e ponendo fine al duello."
  agot_multi_duel.0020.desc.outro_survived9:0 "\n\nMan mano che entrambi si stancano, i loro colpi perdono forza, e alla fine arretrano, riconoscendo il pareggio con un cenno del capo prima di tornare nella mischia."
  agot_multi_duel.0020.desc.outro_survived10:0 "\n\n[winner_duelist.GetTitledFirstNameNoTooltip] assesta un colpo che avrebbe dovuto essere mortale, ma l'armatura di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] [Select_CString(loser_duelist.IsFemale,'la salva','lo salva')]. Rendendosi conto che il combattimento potrebbe protrarsi all'infinito, si separano, entrambi col respiro pesante."
  
  agot_multi_duel.0020.desc.outro_survived1.stands_up:0 "\n\nUn colpo pesante scaraventa [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] a terra, perdut[Select_CString(loser_duelist.IsFemale,'a','o')] per un istante nel turbine della battaglia. Proprio quando pare che il duello stia per essere deciso, [loser_duelist.GetSheHe] si trascina di nuovo sui [loser_duelist.Custom('DE_PRO_PER_P_3P_G')] piedi e continua."
  agot_multi_duel.0020.desc.outro_survived2.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] inciampa e cade rovinosamente, e l'impatto strappa un brusco respiro agli astanti vicini. Eppure, pochi istanti dopo, [loser_duelist.GetSheHe] si rialza, scrollandosi di dosso il colpo e ributtandosi nel combattimento."
  agot_multi_duel.0020.desc.outro_survived3.stands_up:0 "\n\nLo scontro termina con [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] ricacciat[Select_CString(loser_duelist.IsFemale,'a','o')] a terra, con la [loser_duelist.Custom('signature_weapon')] che sfugge [Select_CString(loser_duelist.IsFemale,'alla sua presa','alla sua presa')]. Con sforzo e determinazione, [loser_duelist.GetSheHe] la recupera e si rimette in piedi per affrontare ancora una volta il combattimento."
  agot_multi_duel.0020.desc.outro_survived4.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] viene sbalzato fuori equilibrio e finisce distes[Select_CString(loser_duelist.IsFemale,'a','o')] fra la calca dei corpi. Per un battito di cuore il duello vacilla, prima che [loser_duelist.GetSheHe] si rialzi di nuovo, ferit[Select_CString(loser_duelist.IsFemale,'a','o')] ma non dispost[Select_CString(loser_duelist.IsFemale,'a','o')] a cedere."
  agot_multi_duel.0020.desc.outro_survived5.stands_up:0 "\n\nAcciaio e forza ricacciano [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] al suolo, mescolando polvere e sangue sotto [Select_CString(loser_duelist.IsFemale,'di lei','di lui')]. Eppure [loser_duelist.GetSheHe] non vi rimane, risalendo a fatica sui [loser_duelist.Custom('DE_PRO_PER_P_3P_G')] piedi mentre la battaglia continua a ruggire."
  agot_multi_duel.0020.desc.outro_survived6.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] cade sotto l'assalto, mentre il respiro [Select_CString(loser_duelist.IsFemale,'le','gli')] viene strappato via quando il terreno [Select_CString(loser_duelist.IsFemale,'la','lo')] accoglie. Un attimo dopo, [loser_duelist.GetSheHe] si rimette di nuovo in piedi, rifiutandosi di lasciar finire così facilmente il duello."
  agot_multi_duel.0020.desc.outro_survived7.stands_up:0 "\n\nUn violento scambio manda [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] nella polvere, immobile e stordit[Select_CString(loser_duelist.IsFemale,'a','o')]. La pausa è breve, e ben presto [loser_duelist.GetSheHe] si rialza ancora, con la tenacia e la determinazione che [Select_CString(loser_duelist.IsFemale,'la','lo')] riportano nella mischia."
  agot_multi_duel.0020.desc.outro_survived8.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] viene ricacciat[Select_CString(loser_duelist.IsFemale,'a','o')] indietro e a terra, e la caduta interrompe per un attimo il duello. Con un respiro brusco e i denti stretti, [loser_duelist.GetSheHe] ritrova l'equilibrio e avanza di nuovo."
  agot_multi_duel.0020.desc.outro_survived9.stands_up:0 "\n\nLa violenza dello scontro finisce per scaraventare [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] al suolo, con le armi che stridono sulla terra. Eppure [loser_duelist.GetSheHe] non cede, si rimette in piedi e torna nello scontro."
  agot_multi_duel.0020.desc.outro_survived10.stands_up:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] viene abbattut[Select_CString(loser_duelist.IsFemale,'a','o')] e inghiottit[Select_CString(loser_duelist.IsFemale,'a','o')] per un istante dal caos che [Select_CString(loser_duelist.IsFemale,'la','lo')] circonda. Poi [loser_duelist.GetSheHe] riemerge, malconci[Select_CString(loser_duelist.IsFemale,'a','o')] ma ancora in piedi, e il duello prosegue."

  agot_multi_duel.0020.desc.outro_survived1.stands_up.friend:0 "\n\nUn colpo pesante abbatte [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip], e il respiro [Select_CString(loser_duelist.IsFemale,'le','gli')] sfugge di colpo. Mentre il duello minaccia di finire, una voce squarcia il frastuono: [ loser_duelist_friend.Custom('IT_NAM_COL3') ][ loser_duelist_friend.GetTitledFirstName ] grida dalla folla.\n\n#EMP «In piedi, [loser_duelist.GetTitledFirstNameNoTooltip]! Sui tuoi piedi, lo scontro non è finito!»#! \n\nScoss[Select_CString(loser_duelist.IsFemale,'a','o')] da quel grido, [loser_duelist.GetSheHe] si costringe a rialzarsi."
                                                                                                                                                                                                                                                                                          agot_multi_duel.0020.desc.outro_survived2.stands_up.friend:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] cade rovinosamente, sollevando polvere quando colpisce la terra. Per un battito di cuore lo scontro vacilla, finché la voce di [loser_duelist_friend.GetTitledFirstNamePossessive] non squarcia il fragore.\n\n#EMP «In piedi, [loser_duelist.GetFirstNameNoTooltip]! In piedi e affrontali!»#! \n\nCon un respiro brusco, [loser_duelist.GetSheHe] si trascina di nuovo sui [loser_duelist.Custom('DE_PRO_PER_P_3P_G')] piedi."
                                                                                                                                                                                                                                                                                          agot_multi_duel.0020.desc.outro_survived3.stands_up.friend:0 "\n\nL'acciaio ricaccia [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] indietro e a terra, con la [loser_duelist.Custom('signature_weapon')] che sfugge [Select_CString(loser_duelist.IsFemale,'alla sua presa','alla sua presa')]. Prima che l'attimo possa cristallizzarsi, un grido si leva dalla folla, mentre [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] lo sprona.\n\n#EMP «Alzati! Non sei ancora sconfitto, alzati!»#! \n\nStringendo i denti, [loser_duelist.GetSheHe] si rimette in piedi ancora una volta."
  agot_multi_duel.0020.desc.outro_survived4.stands_up.friend:0 "\n\nLa violenza dello scambio scaraventa [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] sulla terra sconvolta. Mormorii si diffondono tra gli astanti, finché una voce non si leva sopra tutte le altre: [ loser_duelist_friend.Custom('IT_NAM_COL3') ][ loser_duelist_friend.GetTitledFirstName ], feroce e inflessibil[Select_CString(loser_duelist_friend.IsFemale,'e','e')].\n\n#EMP «Sui tuoi piedi, [loser_duelist.GetFirstNameNoTooltip], mostra loro la tua forza!»#! \n\nRispondendo al richiamo, [loser_duelist.GetSheHe] si rialza ancora, vacillante ma non spezzat[Select_CString(loser_duelist.IsFemale,'a','o')]."
                                                                                                                                                                                                                                                               agot_multi_duel.0020.desc.outro_survived5.stands_up.friend:0 "\n\nRicacciat[Select_CString(loser_duelist.IsFemale,'a','o')] in basso dall'assalto, [loser_duelist.GetTitledFirstNameNoTooltip] crolla fra polvere e acciaio. Il duello sembra ormai deciso quando un grido risuona nitido da oltre i combattenti, mentre [loser_duelist_friend.Custom('IT_NAM_COL3')][loser_duelist_friend.GetTitledFirstName] chiama.\n\n#EMP «Alzati adesso! I Sette ti guardano, non cadere!»#! \n\nMentre quelle parole attraversano il campo, [loser_duelist.GetSheHe] si rimette in piedi."
                                                                                                                                                                                                                                                               
                                                                                                                                                                                                                                                               agot_multi_duel.0020.desc.outro_survived1.downed:0 "\n\nUn violento scambio scaraventa [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] a terra, e questa volta non vi è rapida ripresa. [loser_duelist.GetSheHe] lotta per rialzarsi, ma le forze [Select_CString(loser_duelist.IsFemale,'l’hanno','l’hanno')] abbandonat[Select_CString(loser_duelist.IsFemale,'a','o')], e il duello finisce là dove [loser_duelist.GetSheHe] è cadut[Select_CString(loser_duelist.IsFemale,'a','o')]."
                                                                                                                                                                                                                                                               agot_multi_duel.0020.desc.outro_survived2.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] viene ricacciat[Select_CString(loser_duelist.IsFemale,'a','o')] con violenza al suolo, e l'impatto [Select_CString(loser_duelist.IsFemale,'la','lo')] priva del combattimento. Pur muovendosi ancora, [loser_duelist.GetSheHe] non riesce più a rimettersi in piedi."
                                                                                                                                                                                                                                                               agot_multi_duel.0020.desc.outro_survived3.downed:0 "\n\nAcciaio e forza scaraventano [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] a terra. [loser_duelist.GetSheHe] cerca un equilibrio che non ritorna, e il duello viene deciso in quell'istante."
                                                                                                                                                                                                                                                               agot_multi_duel.0020.desc.outro_survived4.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] cade sotto l'assalto e vi rimane, col respiro spezzato e le membra che non rispondono più. Il tentativo di rialzarsi vacilla, e il combattimento è finito."
                                                                                                                                                                                                                                                               agot_multi_duel.0020.desc.outro_survived5.downed:0 "\n\nUn ultimo colpo scaraventa [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] al suolo, con polvere e sangue a segnare il punto in cui [loser_duelist.GetSheHe] cade. [loser_duelist.GetSheHe|U] non si rialza più, e il duello giunge alla sua fine."
  agot_multi_duel.0020.desc.outro_survived6.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] crolla sotto lo sforzo del combattimento, e il tentativo di rialzarsi finisce nel fallimento. La folla può ormai vederlo chiaramente: [ loser_duelist.GetSheHe ] non può continuare."
  agot_multi_duel.0020.desc.outro_survived7.downed:0 "\n\nLo scontro termina con [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip] ricacciat[Select_CString(loser_duelist.IsFemale,'a','o')] a terra, con le forze esaurite e la determinazione consumata. Benché [loser_duelist.GetSheHe] si muova ancora, [loser_duelist.GetSheHe] non può rialzarsi per affrontare nuovamente il combattimento."
  agot_multi_duel.0020.desc.outro_survived8.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] viene sbalzato fuori equilibrio e resta dov[Select_CString(loser_duelist.IsFemale,'e è','e è')] cadut[Select_CString(loser_duelist.IsFemale,'a','o')]. Il duello s'interrompe, poi finisce, quando diventa chiaro che [loser_duelist.GetSheHe] non può più restare in piedi."
  agot_multi_duel.0020.desc.outro_survived9.downed:0 "\n\nLa violenza dello scontro finisce infine per sopraffare [loser_duelist.Custom('IT_NAM_COL4')][loser_duelist.GetTitledFirstNameNoTooltip], mandandol[Select_CString(loser_duelist.IsFemale,'a','o')] a terra. Il tentativo di rialzarsi fallisce, e l'esito non è più in dubbio."
  agot_multi_duel.0020.desc.outro_survived10.downed:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] viene abbattut[Select_CString(loser_duelist.IsFemale,'a','o')] e resta a terra, con la volontà di combattere spezzata dalla stanchezza e dal dolore. Il duello finisce non con un altro colpo, ma con l'incapacità di [loser_duelist.GetTitledFirstNamePossessiveNoTooltip] di rialzarsi."
  
  agot_multi_duel.0020.desc.outro_survived1.yielded:0 "\n\nLo scontro rallenta mentre [loser_duelist.GetTitledFirstNameNoTooltip] abbassa la [loser_duelist.Custom('DE_PRO_PER_S_3P_G')][loser_duelist.Custom('signature_weapon')] e si arrende davanti a tutti i presenti. Segue un silenzio, mentre il significato del gesto si posa su ogni cosa.\n\nCon quella resa, la Prova dei Sette perde il suo scopo. [loser_duelist.GetSheHe|U] ritira l'accusa contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName], e l'accusa che aveva chiamato l'acciaio sul campo viene disfatta dalle [loser_duelist.Custom('DE_PRO_PER_P_3P_G')] stesse parole."
  agot_multi_duel.0020.desc.outro_survived2.yielded:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] arretra dal combattimento, con la [loser_duelist.Custom('signature_weapon')] abbassata e la volontà esaurita, arrendendosi sotto gli occhi del reame. Il duello termina non con un colpo finale, ma con una resa.\n\nLa Prova dei Sette si disfa in quell'istante. [loser_duelist.GetSheHe|U] ritira l'accusa contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName], e la sfida che ha scosso il reame viene deposta."
  agot_multi_duel.0020.desc.outro_survived3.yielded:0 "\n\nUn silenzio si diffonde sul campo quando [loser_duelist.GetTitledFirstNameNoTooltip] si arrende, abbassando la [loser_duelist.Custom('DE_PRO_PER_S_3P_G')][loser_duelist.Custom('signature_weapon')] davanti agli dèi e agli uomini. Il significato è chiaro a tutti coloro che vi assistono.\n\nCedendo, [loser_duelist.GetSheHe] ritira l'accusa contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName], privando la Prova dei Sette della sua causa. Ciò che era stato portato a giudizio viene disfatto non dal sangue, ma dalla resa."
  agot_multi_duel.0020.desc.outro_survived4.yielded:0 "\n\n[loser_duelist.GetTitledFirstNameNoTooltip] vacilla, poi si arrende, abbassando la [loser_duelist.Custom('DE_PRO_PER_S_3P_G')][loser_duelist.Custom('signature_weapon')] mentre lo scontro finalmente tace. Il campo attende, in ascolto.\n\nCon la resa dell'accusatore, la Prova dei Sette crolla. [loser_duelist.GetSheHe|U] ritira l'accusa contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName], e l'addebito che richiedeva giudizio nell'acciaio viene pubblicamente disfatto."
  agot_multi_duel.0020.desc.outro_survived5.yielded:0 "\n\nL'attimo si spezza quando [loser_duelist.GetTitledFirstNameNoTooltip] si arrende, con le forze e la certezza ormai esaurite. L'acciaio tace, e il duello termina senza un altro colpo.\n\nLa Prova dei Sette non può continuare. [loser_duelist.GetSheHe|U] ritira la [loser_duelist.Custom('DE_PRO_PER_S_3P_G')] pretesa contro [tos_accused.Custom('IT_NAM_COL4')][tos_accused.GetTitledFirstName], lasciando l'accusa priva di voce e di campione che possa portarla oltre."
  
  agot_multi_duel.0020.a.a:0 "Resta concentrat[Select_CString(ROOT.Char.IsFemale,'a','o')]!"
  agot_multi_duel.0020.a.b:0 "Tieni alta la guardia!"
  agot_multi_duel.0020.a.c:0 "Finiscil[Select_CString(scope:loser_duelist.IsFemale,'a','o')], presto!"
  agot_multi_duel.0020.a.d:0 "Guardati le spalle!"
  agot_multi_duel.0020.a.e:0 "Non perdere la concentrazione!"
  agot_multi_duel.0020.a.f:0 "Continua a combattere!"

