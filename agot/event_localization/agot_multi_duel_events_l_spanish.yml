  agot_multi_duel.0030.desc.intro.a:0 "Mi ritrovo faccia a faccia con [duelist_enemy.GetTitledFirstName], colui che si frappone tra me e la vittoria."
  agot_multi_duel.0030.desc.intro.b:0 "È giunto il momento di affrontare [duelist_enemy.GetTitledFirstName]. Ormai non si può più tornare indietro."
  agot_multi_duel.0030.desc.intro.c:0 "Davanti a me si erge [duelist_enemy.Custom('IT_NAM_COL3')][duelist_enemy.GetTitledFirstName], un avversario risoluto e pronto alla battaglia."
  agot_multi_duel.0030.desc.intro.d:0 "La tensione è palpabile mentre mi preparo a duellare contro [duelist_enemy.GetTitledFirstName]."
  agot_multi_duel.0030.desc.intro.e:0 "Eccoci. [duelist_enemy.GetTitledFirstName] ed io stiamo per scontrarci in una lotta fino alla fine."
  agot_multi_duel.0030.desc.intro.f:0 "C'è una fredda risolutezza negli occhi di [duelist_enemy.GetTitledFirstNamePossessive] mentre ci prepariamo alla battaglia."
  agot_multi_duel.0030.desc.intro.g:0 "Sono pronto, di fronte a [duelist_enemy.GetTitledFirstName], sapendo che soltanto uno di noi se ne andrà sulle proprie gambe."
  agot_multi_duel.0030.desc.intro.h:0 "Ora ci siamo solo io e [duelist_enemy.GetTitledFirstName]. L'esito di questo duello cambierà ogni cosa."
  agot_multi_duel.0030.desc.intro.i:0 "L'aria è greve d'attesa mentre affronto [duelist_enemy.GetTitledFirstName], il mio rivale in questo scontro mortale."
  agot_multi_duel.0030.desc.intro.j:0 "Stringo con forza la mia [player_duelist.Custom('signature_weapon')], sapendo che [duelist_enemy.GetTitledFirstName] sta facendo lo stesso."
  agot_multi_duel.0030.desc.intro.k:0 "Inchiodo lo sguardo su [duelist_enemy.GetTitledFirstName], sapendo che questo duello potrebbe essere l'ultimo della mia vita."
  agot_multi_duel.0030.desc.intro.l:0 "Mentre mi trovo dinanzi a [duelist_enemy.GetTitledFirstName], non vi è spazio per la paura, ma solo per la concentrazione."
  agot_multi_duel.0030.desc.intro.m:0 "Scorgo la determinazione nella postura di [duelist_enemy.GetTitledFirstNamePossessive] mentre ci prepariamo a combattere."
  agot_multi_duel.0030.desc.intro.n:0 "Con [duelist_enemy.GetTitledFirstName] davanti a me, so che questa è una battaglia che devo vincere."
  agot_multi_duel.0030.desc.intro.o:0 "Faccio un respiro profondo, ritrovando la calma mentre mi preparo a duellare contro [duelist_enemy.GetTitledFirstName]."
  agot_multi_duel.0030.desc.intro.p:0 "Il campo di battaglia svanisce mentre concentro tutta la mia attenzione su [duelist_enemy.GetTitledFirstName], il mio avversario."
  agot_multi_duel.0030.desc.intro.q:0 "È tempo di dimostrare il mio valore. [duelist_enemy.GetTitledFirstName] ed io stiamo per scontrarci."
  agot_multi_duel.0030.desc.intro.r:0 "Ho affrontato molte prove, ma nessuna davvero simile a [duelist_enemy.GetTitledFirstName]."
  agot_multi_duel.0030.desc.intro.s:0 "Mentre affronto [duelist_enemy.GetTitledFirstName], sento crescere dentro di me un'ondata di determinazione."
  agot_multi_duel.0030.desc.intro.t:0 "Non vi è modo di sfuggire a questo. [duelist_enemy.GetTitledFirstName] ed io stiamo per combattere."
  agot_multi_duel.0030.desc.outro.a:0 "Mentre ci troviamo sull'orlo della battaglia, avverto tutto il peso di ciò che sta per accadere."
  agot_multi_duel.0030.desc.outro.b:0 "Il mondo pare trattenere il respiro mentre ci prepariamo allo scontro. La tensione è soffocante, eppure esaltante. So che i prossimi istanti decideranno ogni cosa."
  agot_multi_duel.0030.desc.outro.c:0 "Soffia un vento gelido, recando con sé il peso di innumerevoli battaglie combattute e vinte. Questa non è diversa, eppure sembra che tutto sia in bilico."
  agot_multi_duel.0030.desc.outro.d:0 "A ogni battito del cuore, il momento della verità si avvicina. Posso sentire il potere nelle mie mani, la forza della mia volontà."
  agot_multi_duel.0030.desc.outro.e:0 "Il campo di battaglia attorno a noi svanisce nell'insignificanza. Restiamo soltanto io e [duelist_enemy.GetTitledFirstNameNoTooltip], ciascuno sospinto dalle forze che ci hanno condotti fin qui."
  agot_multi_duel.0030.desc.outro.f:0 "L'aria è carica della promessa di violenza. Tutto ciò che abbiamo fatto, tutto ciò che siamo diventati, conduce a questo momento. Sento la tensione nei muscoli, la prontezza nella mia postura."
  agot_multi_duel.0030.desc.outro.g:0 "Ogni respiro, ogni istante, ci avvicina all'inevitabile scontro. Non vi è più tempo per esitare."
  agot_multi_duel.0030.desc.outro.h:0 "Il peso della mia [player_duelist.Custom('signature_weapon')] mi pare più gravoso che mai, non per la sua massa, ma per il fardello di ciò che sta per compiersi."
  agot_multi_duel.0030.desc.outro.i:0 "Questo è il culmine di tutto ciò che ci ha condotti fin qui. La battaglia che ci attende non riguarda soltanto la sopravvivenza; riguarda il destino, ciò che siamo e ciò per cui ci battiamo."
  agot_multi_duel.0030.desc.outro.j:0 "Nel silenzio che precede la tempesta, raccolgo i miei pensieri e il mio coraggio. Non vi è scampo alla realtà di ciò che sta per accadere."
  agot_multi_duel.0030.desc.outro.k:0 "Il mondo si restringe a questo unico, terribile istante. Tutto il frastuono, tutto il caos della battaglia, si ritrae sullo sfondo."
  agot_multi_duel.0030.desc.outro.l:0 "Mentre ci prepariamo a colpire, l'enormità di ciò che sta per accadere grava su di me. Questa non è soltanto una battaglia; è la fine di un cammino, un'ultima prova di forza e volontà."
  agot_multi_duel.0030.desc.outro.m:0 "La tensione è insopportabile, eppure mi costringo a restare calmo. Ho affrontato prove prima d'ora, ma nulla di simile."
  agot_multi_duel.0030.desc.outro.n:0 "Il tempo sembra rallentare mentre il duello si avvicina. Ogni dettaglio si fa più nitido nella mia mente: il peso della mia [player_duelist.Custom('signature_weapon')], il terreno sotto i miei piedi, la risolutezza negli occhi di [duelist_enemy.GetTitledFirstNamePossessiveNoTooltip]."
  agot_multi_duel.0030.desc.outro.o:0 "L'attesa è come una creatura viva, raccolta e pronta a colpire. La sento in ogni fibra del mio essere, nella certezza che questo duello non somiglierà a nessun altro."
  agot_multi_duel.0030.desc.outro.p:0 "Mentre ci fronteggiamo, il peso del destino preme su di noi. Questo non è soltanto un duello; è un crocevia, un istante che determinerà il corso delle nostre vite."
  agot_multi_duel.0030.desc.outro.q:0 "Il silenzio prima della tempesta è assordante, una calma che cela la violenza in arrivo. In questo istante è chiaro che nulla conta più del duello."
  agot_multi_duel.0030.desc.outro.r:0 "A ogni secondo che passa, l'inevitabile si avvicina. Il duello è più di una lotta; è una prova di tutto ciò che ho appreso, di tutto ciò che sono."
  agot_multi_duel.0030.desc.outro.s:0 "C'è un senso di irrevocabilità in questo istante, come se tutto avesse condotto fin qui."
  agot_multi_duel.0030.desc.outro.t:0 "Mentre mi preparo ad affrontare [duelist_enemy.GetTitledFirstNameNoTooltip], posso sentire il peso di ogni scelta che ho compiuto."
  
  #POV EVENT OUTRO Part2 TEXTS
  agot_multi_duel.0030.desc.outro2.a:0 "\n\nOgni decisione, ogni mossa, determinerà non soltanto l'esito di questo duello, ma anche il cammino che seguirà. Non vi è spazio per l'errore."
  agot_multi_duel.0030.desc.outro2.b:0 "\n\nLa vittoria arriderà soltanto a chi saprà ghermirla."
  agot_multi_duel.0030.desc.outro2.c:0 "\n\nLa mia risolutezza si fa più salda. Devo essere io a uscire vivo da tutto questo."
  agot_multi_duel.0030.desc.outro2.d:0 "\n\nMa basterà? Presto non vi saranno più domande, soltanto la fredda realtà del duello."
  agot_multi_duel.0030.desc.outro2.e:0 "\n\nUno solo emergerà vittorioso, e la posta in gioco non potrebbe essere più alta."
  agot_multi_duel.0030.desc.outro2.f:0 "\n\nÈ tempo di dimostrare chi è il più forte."
  agot_multi_duel.0030.desc.outro2.g:0 "\n\nIl duello avrà inizio, e soltanto uno di noi ne vedrà la fine. Sono deciso a far sì che sia io."
  agot_multi_duel.0030.desc.outro2.h:0 "\n\nIl duello è più di una semplice lotta; è una resa dei conti, un giudizio pronunciato da acciaio e abilità."
  agot_multi_duel.0030.desc.outro2.i:0 "\n\nÈ giunto il tempo di agire."
  agot_multi_duel.0030.desc.outro2.j:0 "\n\nSiamo due forze che si scontrano, e quando la polvere si poserà soltanto una resterà in piedi."
  agot_multi_duel.0030.desc.outro2.k:0 "\n\nCiò che conta ora è il duello che ci attende, il banco di prova sul quale uno di noi cadrà."
  agot_multi_duel.0030.desc.outro2.l:0 "\n\nPosso solo sperare di essere pronto."
  agot_multi_duel.0030.desc.outro2.m:0 "\n\nQuesto duello sarà il momento decisivo, la battaglia che o mi spezzerà o mi vedrà vittorioso."
  agot_multi_duel.0030.desc.outro2.n:0 "\n\nNon vi è modo di evitare ciò che verrà."
  agot_multi_duel.0030.desc.outro2.o:0 "\n\nQuesto è un momento che cambierà ogni cosa."
  agot_multi_duel.0030.desc.outro2.p:0 "\n\nRendo più regolare il mio respiro, sapendo che ciò che accadrà ora definirà chi sono."
  agot_multi_duel.0030.desc.outro2.q:0 "\n\nL'esito plasmerà il futuro in modi che nessuno di noi due può prevedere."
  agot_multi_duel.0030.desc.outro2.r:0 "\n\nPosso solo sperare di essere abbastanza forte da resistere sino alla fine."
  agot_multi_duel.0030.desc.outro2.s:0 "\n\nQuesto duello non riguarda soltanto la vittoria o la sconfitta; riguarda il dimostrare qualcosa di fondamentale — a me stesso e a [duelist_enemy.Custom('IT_NAM_COL4')][duelist_enemy.GetTitledFirstNameNoTooltip]."
  agot_multi_duel.0030.desc.outro2.t:0 "\n\nQuesto duello sarà la prova suprema, il momento che o mi innalzerà o mi spezzerà."
  agot_multi_duel.1000.b:0 "Forse è più saggio cedere ora."
  agot_multi_duel.0030.a.a:0 "E ora comincia."
  agot_multi_duel.0030.a.b:0 "Vieni a prendermi!"
  agot_multi_duel.0030.a.c:0 "È tempo di combattere."
  agot_multi_duel.0030.a.d:0 "Basta con i giochi."
  agot_multi_duel.0030.a.e:0 "Finisce qui."
  agot_multi_duel.0030.a.f:0 "Ora finisce."
  agot_multi_duel.0030.a.g:0 "Per l'onore!"
  agot_multi_duel.0030.a.h:0 "Affrontami!"
  agot_multi_duel.0030.a.i:0 "Sono pronto."
  agot_multi_duel.0030.a.j:0 "All'ultimo sangue!"
  agot_multi_duel.0030.a.k:0 "Finisce adesso."
  agot_multi_duel.0100.t.tos.accuser_yielded:0 "$agot_multi_duel.tos_header$: La resa dell'accusatore"
  agot_multi_duel.0100.t.tos.accuser_downed:0 "$agot_multi_duel.tos_header$: Un accusatore spezzato"
  agot_multi_duel.0100.t.tos.accuser_dead:0 "$agot_multi_duel.tos_header$: La caduta dell'accusatore"
  agot_multi_duel.0100.t.tos.accused_downed:0 "$agot_multi_duel.tos_header$: Giudizio pronunciato"
  agot_multi_duel.0100.t.tos.accused_dead:0 "$agot_multi_duel.tos_header$: La colpa provata nel sangue"
  agot_multi_duel.0100.desc.accuser_yielded:0 "Lo scontro si conclude senza un altro colpo. [main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] cede dinanzi al regno, abbassando [Select_CString(main_loser_leader.IsFemale,'la sua','il suo')] [main_loser_leader.Custom('signature_weapon')] e ritirandosi dall'accusa che ha portato l'acciaio sul campo.\n\nLe parole che seguono contano più di qualunque fendente. L'accusa viene ritirata al cospetto di dèi e uomini, e il Processo dei Sette viene disfatto dalla resa anziché dal sangue. Io ne esco rivendicato, il mio nome mondato non per decreto, ma per la ritirata stessa dell'accusatore. Il regno ne è testimone, mentre l'accusa contro di me viene deposta dalle stesse parole di [main_loser_leader.Custom('IT_NAM_COL2')][main_loser_leader.GetTitledFirstNameNoTooltip]."
  agot_multi_duel.0100.desc.accuser_downed:0 "Lo scontro lascia [main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] spezzat[Select_CString(main_loser_leader.IsFemale,'a','o')] sul campo, con le forze esaurite e incapace di rialzarsi. Qualunque risolutezza [Select_CString(main_loser_leader.IsFemale,'l’abbia','lo abbia')] condott[Select_CString(main_loser_leader.IsFemale,'a','o')] a questa prova è infine venuta meno.\n\nCon l'accusatore incapace di proseguire, il Processo dei Sette giunge al termine. Per legge e consuetudine, l'accusa cade con la sconfitta di [main_loser_leader.Custom('IT_NAM_COL2')][main_loser_leader.GetTitledFirstNameNoTooltip]. Io resto provato innocente davanti a tutti coloro che hanno assistito a questo giudizio d'acciaio, la mia causa sostenuta non da parole, ma dalla resistenza nel momento in cui più contava."
  agot_multi_duel.0100.desc.accuser_dead:0 "Lo scontro finale lascia [main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] esanime sul campo, e la voce che aveva chiamato questa prova viene infine ridotta al silenzio.\n\nCon l'accusatore caduto, il Processo dei Sette si conclude nel sangue e nella definitività. Non resta alcuna sfida cui rispondere, né alcuna accusa da contestare. Io ne esco rivendicato per il solo fatto di essere sopravvissuto, la mia causa provata là dove giuramenti e accuse avevano fallito, e al regno non resta più alcun dubbio su dove sia caduto il giudizio."
  agot_multi_duel.0100.desc.accused_downed:0 "[main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] viene abbattut[Select_CString(main_loser_leader.IsFemale,'a','o')] sul campo, e le forze [Select_CString(main_loser_leader.IsFemale,'la','lo')] abbandonano infine. La lotta si conclude con [Select_CString(main_loser_leader.IsFemale,'lei','lui')] incapace di reggersi ancora in piedi.\n\nIl Processo dei Sette pronuncia infine il suo giudizio. Io rimango in piedi là dove l'accusato non riesce a farlo, e tanto per acciaio quanto per consuetudine, la colpa ricade sul nome di [main_loser_leader.Custom('IT_NAM_COL2')][main_loser_leader.GetTitledFirstNameNoTooltip]. Dinanzi al regno, l'accusa che ho mosso è provata, e il giudizio che ho reclamato viene concesso."
  agot_multi_duel.0100.desc.accused_dead:0 "Il duello termina nel sangue quando [main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] cade sotto il giudizio chiamato contro [Select_CString(main_loser_leader.IsFemale,'di lei','di lui')]. Il campo si acquieta mentre il significato di quell'istante si posa su ogni cosa.\n\nIl Processo dei Sette è infine deciso. Io resto vittorioso là dove l'accusato non riesce a farlo, e l'accusa viene provata sul campo, sotto gli occhi di tutti. Non occorrono altre parole, né permane alcun dubbio. Il regno ha la sua risposta, scritta chiaramente nell'acciaio."
  agot_multi_duel.0100.desc.accuser_yielded.observer:0 "Lo scontro si arresta quando [main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] cede, abbassando [Select_CString(main_loser_leader.IsFemale,'la sua','il suo')] [main_loser_leader.Custom('signature_weapon')] davanti a tutti coloro che osservano. Il suono dell'acciaio svanisce, sostituito da un silenzio teso, mentre il significato dell'istante cala sul campo.\n\nCon l'accusa ritirata, il Processo dei Sette crolla su sé stesso. L'accusa contro [main_winner_leader.Custom('IT_NAM_COL4')][main_winner_leader.GetTitledFirstName] viene meno non per sangue, ma per la resa dell'accusatore. Dinanzi agli dèi e agli uomini, la questione si chiude senza un altro colpo, e il regno è lasciato a fare i conti con un giudizio pronunciato da parole anziché dall'acciaio."
  agot_multi_duel.0100.desc.accuser_downed.observer:0 "[main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] viene sospint[Select_CString(main_loser_leader.IsFemale,'a','o')] a terra e non riesce più a rialzarsi. Il campo resta in un'attesa tesa e immobile, in cerca d'un movimento che non giunge.\n\nIl Processo dei Sette termina con l'accusatore sconfitto sul campo. Per consuetudine e per legge, l'accusa fallisce là dove il suo campione non ha saputo resistere. [main_winner_leader.Custom('IT_NAM_COL3')][main_winner_leader.GetTitledFirstName] resta rivendicat[Select_CString(main_winner_leader.IsFemale,'a','o')] davanti al regno, l'accusa dissolta dalla forza che è rimasta salda quando l'altra è venuta meno."
  agot_multi_duel.0100.desc.accuser_dead.observer:0 "L'ultimo scambio lascia [main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] esanime sul campo, e con [Select_CString(main_loser_leader.IsFemale,'lei','lui')] cade anche la voce che aveva dato origine a questa prova. Lo scontro termina mentre il campo assorbe la definitività dell'istante.\n\nIl Processo dei Sette viene deciso nel sangue. [main_winner_leader.Custom('IT_NAM_COL3')][main_winner_leader.GetTitledFirstName] resta in piedi là dove l'accusatore non riesce a farlo, e l'accusa trova risposta nel solo fatto della sopravvivenza. Non occorre alcun altro giudizio, e il regno assiste a un verdetto scritto chiaramente nell'acciaio."
  agot_multi_duel.0100.desc.accused_downed.observer:0 "[main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] viene abbattut[Select_CString(main_loser_leader.IsFemale,'a','o')] e non può più proseguire lo scontro. La lotta si esaurisce finché non diviene chiaro che l'accusato non può rialzarsi per rispondere all'accusa.\n\nIl Processo dei Sette pronuncia infine il suo giudizio. [main_winner_leader.Custom('IT_NAM_COL3')][main_winner_leader.GetTitledFirstName] resta vittorios[Select_CString(main_winner_leader.IsFemale,'a','o')] dinanzi a tutti coloro che ne sono testimoni, e la colpa viene posta sull'accusato sotto gli occhi dell'intero regno. Ciò che era stato messo in dubbio ora trova risposta senza ambiguità."
  agot_multi_duel.0100.desc.accused_dead.observer:0 "Il duello si conclude con [main_loser_leader.Custom('IT_NAM_COL3')][main_loser_leader.GetTitledFirstName] abbattut[Select_CString(main_loser_leader.IsFemale,'a','o')] sul campo, e il colpo finale riduce al silenzio ogni ulteriore diniego dell'accusa.\n\nIl Processo dei Sette si conclude nel sangue e nella certezza. L'accusa è provata dall'acciaio, e [main_winner_leader.Custom('IT_NAM_COL3')][main_winner_leader.GetTitledFirstName] emerge vittorios[Select_CString(main_winner_leader.IsFemale,'a','o')] mentre il regno osserva. Non resta alcun dubbio su dove sia caduto il giudizio, e la questione è risolta per sempre."
  agot_multi_duel.0100.desc.accuser_yielded.loser:0 "Le forze mi abbandonano, e con esse la certezza che mi aveva condotto fin qui. Il mio braccio trema mentre abbasso la mia [main_loser_leader.Custom('signature_weapon')], e il peso di quell'istante è più greve di qualsiasi ferita.\n\nDinanzi a tutti coloro che osservano, cedo. Ritiro l'accusa che ho mosso e abbandono la sfida che ha portato l'acciaio sul campo. Il Processo dei Sette si conclude per mia stessa resa, e l'accusa che avevo pronunciato con tanta audacia muore con le mie parole, lasciando al regno il ricordo che mi sono ritirat[Select_CString(ROOT.Char.IsFemale,'a','o')] quando non potevo più andare oltre."
  agot_multi_duel.0100.desc.accuser_downed.loser:0 "Cerco di rialzarmi, ma il mio corpo mi rifiuta. Il terreno pare lontano e instabile, e il fragore della battaglia si fa indistinto mentre il dolore sommerge ogni altra cosa.\n\nLa verità si fa inevitabile. Non posso più restare in piedi per sostenere l'accusa che ho portato dinanzi al regno. Il Processo dei Sette si conclude con la mia sconfitta, e la mia accusa fallisce là dove hanno fallito le mie forze. Dinanzi a tutti coloro che osservano, la mia sfida si disfa sul campo."
  agot_multi_duel.0100.desc.accused_downed.loser:0 "Lo scontro prosciuga le mie forze finché le gambe cedono sotto di me e non riesco più a restare in piedi. Ogni respiro brucia, e il campo vacilla mentre lotto per restare cosciente di ciò che è stato deciso.\n\nIl Processo dei Sette risponde all'accusa contro di me con l'acciaio. Rimango spezzat[Select_CString(ROOT.Char.IsFemale,'a','o')] al suolo mentre il giudizio viene pronunciato davanti a tutti coloro che osservano, il mio destino sigillato non da parole o giuramenti, ma dalla mia incapacità di resistere quando l'istante lo esigeva."
  agot_multi_duel.0100.a:0 "È compiuto."
