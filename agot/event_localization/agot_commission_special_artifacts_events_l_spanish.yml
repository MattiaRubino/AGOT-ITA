l_spanish:

  agot_commission_special_artifact_crown.0001.t:0 "Commissione di una Corona"
  agot_commission_special_artifact_crown.0001.desc:0 "Pochi a Westeros possono possedere una corona. Ancora meno hanno l'autorità di portarne una. È giunto il momento di forgiare un nuovo simbolo di potere che rappresenti e legittimi il mio regno. Che la storia si ricordi di me per il mio nome, le mie gesta e i simboli che scelgo di portare. Commissionerò una corona che diverrà un cimelio, tramandato di generazione in generazione, mostrando apertamente il mio potere e la mia influenza."
  agot_commission_special_artifact_crown.0001.desc_coronation:0 "Ogni incoronazione richiede una corona, e così ne commissionerò una. Diverrà un cimelio, tramandato di generazione in generazione, mostrando apertamente il mio potere e la mia influenza."
  agot_commission_special_artifact_crown.0001.a:0 "È questa."
  agot_commission_special_artifact_crown.0001.b:0 "Ho cambiato idea. Non desidero più forgiare una nuova corona."
  
  agot_commission_special_artifact_crown_spouse.0001.desc:0 "Pochi a Westeros possono possedere una corona. Ancora meno hanno l'autorità di portarne una. Commissionerò una nuova corona da donare al mio consorte."
  
  agot_commission_special_artifact_armor.0001.t:0 "Commissione di un'Armatura"
  agot_commission_special_artifact_armor.0001.desc:0 "Un'armatura è più di una semplice protezione; riflette lo status e la presenza di chi la indossa. Ne commissionerò una nuova, forgiata su mia misura e degna di essere ricordata."
  agot_commission_special_artifact_armor.0001.a:0 "È questa."
  agot_commission_special_artifact_armor.0001.b:0 "Ho cambiato idea. Non desidero più forgiare una nuova armatura."