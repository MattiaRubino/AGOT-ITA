 ##############################

 # backup in case loc comes in handy
 #agot_events_rr_minor.0903.desc.jonnya:0 "The man who I see as a second father, [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName], has been proclaimed king before all of the rebel forces. There are some groans, but at the end of the day, no one will challenge my decision. After all, I lead all of these men to victory against a dynasty that tamed Westeros for almost 300 years...\n\nIt is up to Jon to lead the realm anew, now. I have done my duty in defeating the [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName]s, but Jon now has a far greater task ahead of him."

