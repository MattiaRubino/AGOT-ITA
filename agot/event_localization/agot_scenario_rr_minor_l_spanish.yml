 ##############################
 #   Uber's Tywin and Aerys Events  #
 ##############################
  agot_events_rr_minor.0124.t:0 "Il Leone e il Drago"
agot_events_rr_minor.0124.desc: 0 "Nelle mie stanze, circondato da mappe e lettere, medito sul caos che sta inghiottendo i Sette Regni. La ribellione contro il Re Folle [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] si rafforza, e devo decidere presto. \n\nAerys ed io fummo un tempo amici, ma il nostro rapporto si è guastato negli anni per varie ragioni, l'ultima delle quali è stata la nomina di mio figlio ed erede [GetScriptedCharacterByHistoryID('Lannister_7').GetFirstName] a [GetTitleByKey('d_kingsguard').GetNameNoTier]. La follia di Aerys non ha fatto che peggiorare, e il suo governo si è fatto ogni giorno più tirannico;\n\nAl contrario, [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] si è dimostrato un valido guerriero quale capo dei ribelli, mentre grandi dubbi restano sulla sua capacità di governare. \n\nL'idea di tradire Aerys è rischiosa, ma allettante; eppure attendere, almeno per ora, potrebbe essere la scelta migliore, poiché la sorte può ancora volgere da una parte o dall'altra."
  agot_events_rr_minor.0124.a:0 "Il destino dei Sette Regni è in bilico."
  agot_events_rr_minor.0124.a.tt:0 "Come giocatore, puoi scegliere di schierarti con il Trono di Spade o di schierarti direttamente con i ribelli, nel caso il [war_score|E] del Trono di Spade scenda al di sotto del 50"
  MarchOnKingsLanding:0 "Devi guidare fisicamente il tuo esercito verso Approdo del Re per continuare il tuo piano; Aerys sarebbe sospettoso se non fossi lì personalmente per 'difendere' la città!\n"
  agot_events_rr_minor.0103.tta:0 "[jaime_scope.GetFirstName] respinge [defending_kingsguard.GetName] e uccide [pyromancer_plotter.GetFirstName]."
  agot_events_rr_minor.0103.ttb:0 "[jaime_scope.GetFirstName] viene gettato a terra da [defending_kingsguard.GetName] e non riesce a uccidere [pyromancer_plotter.GetFirstName]."
  agot_events_rr_minor.0103.ttc:0 "Senza nessun altro della Guardia Reale ad ostacolarlo, [jaime_scope.GetFirstName] uccide [aerys_scope.GetFirstName] e [pyromancer_plotter.GetFirstName], ponendo fine al complotto."
  agot_events_rr_minor.0103.ttd:0 "[jaime_scope.GetFirstName] uccide [aerys_scope.GetFirstName] e [pyromancer_plotter.GetFirstName], ponendo fine al complotto."

  agot_events_rr_minor.0126.t:0 "La Fine del Trono di Spade"
agot_events_rr_minor.0126.desc: 0 "Un corvo dalle Terre della Corona reca una notizia inconcepibile dai tempi dell'antica Valyria: il Trono di Spade, la Fortezza Rossa, [GetTitleByKey('c_kings_landing').GetNameNoTier] e le sue centinaia di migliaia di abitanti, in un solo istante, non erano più. Una palla di fuoco verde come uno smeraldo ha divorato la città per intero, e il boato dell'esplosione ha riecheggiato da [GetTitleByKey('c_the_eyrie').GetNameNoTier] a [GetTitleByKey('c_highgarden').GetNameNoTier]. Abbondano le voci: il Re Folle [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] avrebbe orchestrato il piano; coloro che si sono levati contro la corona avrebbero distrutto la città in un disperato tentativo di vincere la guerra; alcuni giungono persino a sostenere che un drago sia stato avvistato tra le rovine. Voci a parte, una verità resta: Approdo del Re non è ormai altro che cenere e macerie."
  agot_events_rr_minor.0126.a:0 "Dobbiamo tracciare un nuovo corso in questo nuovo e spaventoso mondo."
  agot_events_rr_minor.0126.b:0 "Con il Folle Re morto, questa guerra può finire."

  agot_events_rr_minor.0128.t: "Alla Difesa delle Terre della Tempesta"
agot_events_rr_minor.0128.desc: "Insieme a [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName], abbiamo appena ottenuto una vittoria significativa, la prima di questa ribellione. Dopo il fortunato assedio, siamo riusciti a prendere [GetTitleByKey('c_gulltown').GetNameNoTier], la città strategica che mi sbarrava la via per salpare e fare ritorno nelle Terre della Tempesta.\n\nOra che Gulltown è sotto il nostro controllo, è tempo di levare le vele e radunare gli eserciti delle Terre della Tempesta alla mia causa. I venti sono favorevoli e le navi sono pronte a partire."
agot_events_rr_minor.0128.a: "Verso [GetTitleByKey('c_storms_end').GetNameNoTier]!"

  agot_events_rr_minor.0131.t: "Dalle Valli a Grande Inverno"
agot_events_rr_minor.0131.desc: "Mentre [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName] e [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] si occupano delle conseguenze di [GetTitleByKey('c_gulltown').GetNameNoTier], preparo i miei bagagli e il mio cavallo, poiché sto per lasciare la Valle e fare ritorno a [GetTitleByKey('c_winterfell').GetNameNoTier], cavalcando attraverso le Dita. Con un viaggio rapido, spero di poter radunare le forze del Nord e cavalcare verso sud in tutta fretta per contribuire a questa guerra."
  agot_events_rr_minor.0131.a: "Verso Grande Inverno!"


  agot_events_rr_minor.0132.desc_opening:0 "[informer.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
agot_events_rr_minor.0132.desc_body: 0 "Ci è giunta notizia dai sudroni di un grande avvenimento nella loro guerra. Il guerriero che sarebbe re, [baratheon.GetFullName], ha ucciso il drago [targaryen.GetName] nella Battaglia di [location.GetName], infrangendo l'ultima speranza della dinastia [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName]. Ora è tempo per noi di ingraziarci questo nuovo Re, e trovare un pretesto per depredare le terre verdi!"
  agot_events_rr_minor.0132.a: "Preparate le lunghe navi, temeranno di nuovo gli Uomini di Ferro."
  agot_events_rr_minor.0132.b: "Non mi interessa delle guerre dei popoli delle terre verdi."


 #######################
 #   THE ONION KNIGHT  #
 #######################

  agot_events_rr_minor.0400.t: "L'Assedio di Capo Tempesta"
  agot_events_rr_minor.0400.desc: "Ricordate, se volete, il nome di questo castello."
  agot_events_rr_minor.0400.a: "Sembra spaventoso."

  agot_events_rr_minor.0401.t: "Il Cavaliere delle Cipolle"
agot_events_rr_minor.0401.desc: "Per un mese la guarnigione di [GetTitleByKey('c_storms_end').GetNameNoTier] ha sopportato un brutale assedio, riducendosi a mangiare cavalli, cani e ratti pur di non morire di fame. Il morale è basso, eppure non tutto è perduto. A tarda notte, una piccola scialuppa viene avvistata mentre serpeggia tra le acque insidiose della Baia del Naufragio, attraccando con stupore di ogni uomo della guarnigione.\n\nUna figura solitaria balza giù dall'imbarcazione e si toglie un guanto, porgendolo al capitano più vicino.\n\n"Spero che vi piacciano le cipolle", dice."
  agot_events_rr_minor.0401.a: "Un tale coraggio dovrebbe essere ricompensato immediatamente!"
  agot_events_rr_minor.0401.b: "Ricompensate quest'uomo, ma a un prezzo."
  agot_events_rr_minor.0401.c: "I contrabbandieri meritano solo la morte."

 #########################
 ## TARGARYENS IN ESSOS ##
 #########################

  agot_events_rr_minor.1000.t:0 "La Fuga dei Targaryen"
agot_events_rr_minor.1000.desc: 0 "Dopo la loro fuga oltre il mare Stretto, i [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName] hanno trovato rifugio in [exile_region.GetNameNoTier].\n\n[exile.Custom('IT_NAM_COL3')][exile.GetTitledFirstName] funge ora da capo dei Targaryen."
  agot_events_rr_minor.1000.a:0 "Interessante."
