l_spanish:
 # Trident's Aftermath
agot_events_rr_minor.0001.t: 0 "La Battaglia di [duel_location.GetNameNoTooltip]"
  agot_events_rr_minor.0001.desc.a:0 "Mi sono alzato dalla mia tenda per indossare la mia armatura presto questa mattina; l'aria era densa di umidità fredda che tagliava fino alle ossa. La rugiada del mattino si aggrappava ai rubini sulla mia corazza, facendoli brillare ancora di più, e all'orizzonte si trovava il campo del presunto usurpatore, con il fumo che si alzava tra le tende, la sua tenda al centro del caos. Così vicino, eppure così lontano.\n\nPiù della sola freddo nelle ossa, lo sento, la sua rabbia, e so che ci incontreremo in questa battaglia, che spada e martello si scontreranno. Il pensiero ha fatto affondare lo stomaco per solo un secondo. Uno dei miei servitori mi ha chiesto se ci fosse qualcosa che non andasse, e ho riso per un secondo prima di riprendere il controllo. 'No, amico mio, non c'è nulla che non va', ho detto.\n\n”Oggi non è il giorno in cui morirò.'"
  agot_events_rr_minor.0001.desc.b:0 "L'aria si sente frizzante e tonificante stamattina mentre guardo all'orizzonte e vedo la tenda di quel dannato bastardo di drago sventolare al vento, il fumo che si disperde tra le terre tra i nostri due accampamenti dove la battaglia avrà presto inizio. Lo so nel mio cuore che seguirò l'orgoglioso principe nel bel mezzo del clamore e infilerò il mio martello nel suo cranio. Tutto è stato costruito fino a questo punto; ogni battaglia, ogni schermaglia, ogni cavaliere morto ci ha portato a questo punto. È il momento di far sanguinare Rhaegar."
  agot_events_rr_minor.0001.a:0 "La giustizia sarà fatta, finalmente"
agot_events_rr_minor.0002.t: 0 "La Battaglia di [duel_location.GetNameNoTooltip]"
  agot_events_rr_minor.0002.t.alt:0 "La Morte di un Drago"
agot_events_rr_minor.0002.desc: 0 "Il mio cuore sprofondò ancor più di quanto già non avesse fatto non appena appresi la notizia di ciò che era accaduto a mio figlio... Il mio povero, amatissimo ragazzo, il mio primogenito! Strappato via da me come tanti dei miei figli prima di lui! La depravazione e l'ingiustizia di questi cani traditori non conoscono forse limiti? Non posso forse tenere al sicuro alcuno della mia famiglia da questo assalto senza fine?\n\nDevo... devo agire; devo tenere al sicuro la mia famiglia, poiché è chiaro che nessuno dei miei sottoposti ne sia capace... Li manderò a [GetTitleByKey('c_dragonstone').GetNameNoTier]! Sì, a Roccia del Drago. Nessuno potrà nuocere loro laggiù... Resta però la domanda: i figli del mio defunto figlio dovranno essere mandati a Roccia del Drago con mia moglie e mio figlio?"
agot_events_rr_minor.0002.a: 0 "Manderò soltanto [GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstName] e [GetScriptedCharacterByHistoryID('Targaryen_8').GetFirstName]."
AGOT_EVENTS_RR_MINOR_0002_TOOLTIP: 0 "[GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstName] terrà Roccia del Drago fino al termine della guerra."
  agot_events_rr_minor.0002.b:0 "Tutta la mia famiglia deve essere tenuta al sicuro!"
 # agot_events_rr_minor.0003.t:0 "Victory, at Last"
 # agot_events_rr_minor.0003.desc:0 "It was not the first rebellion against the rightful heirs of the Conqueror and it will not be the last, but in the end, the blood of the Dragon always shows true. [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] has been put down, never to rise again, and Westeros shall know order for generations to come.\n\nThere remain, however, several questions to be settled before the realm can truly be said to be in good order. Not the least of these questions is this: to whom shall the ancestral [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName] seat of [GetTitleByKey('c_dragonstone').GetNameNoTier] be awarded? Shall we continue the tradition of bestowing it upon the heir apparent to the Iron Throne? Or might now be the moment to break with ancient customs that no longer suit us?"
 # agot_events_rr_minor.0003.a:0 "Tradition is important."
 # AGOT_EVENTS_RR_MINOR_0003_TOOLTIP:0 "O, Dragonstone..."
 # agot_events_rr_minor.0003.b:0 "After all, why not? Why shouldn't I keep it?"
  agot_events_rr_minor.0004.t:0 "Senza possibilità di scelta"
  agot_events_rr_minor.0004.t_defeated_and_imprisoned:0 "Sconfitto dai Ribelli"
agot_events_rr_minor.0004.desc: 0 ""Mio [ROOT.Char.GetLadyLord]," l'emissario della corte di [iron_throne_ruler.GetFirstName] s'inchina e reca la notizia con solennità: "#N Approdo del Re è caduta#!. [GetTitleByKey('c_dragonstone').GetNameNoTier] è sola."\n\nLe opzioni mi balenano davanti come fiammelle di candela in una sala battuta dal vento: potremmo mantenere la nostra posizione a Roccia del Drago, radunando le forze che ci restano, o forse perfino chiedere un parlamento all'Usurpatore per conservare il nostro seggio. Eppure, la probabilità che le nostre suppliche trovino orecchie disposte ad ascoltare è certa quanto l'esito di qualunque difesa potremmo approntare.\n\nUn pesante sospiro sfugge dalle mie labbra mentre valuto le nostre esigue possibilità. Pare che la via più saggia, per ciò che resta della mia casata e per coloro che ancora sono fedeli alla nostra causa, sia cercare rifugio nelle Città Libere. Là, tra il fermento di strade sconosciute e lingue straniere, potremmo ricostruire le nostre forze e forgiare di nuovo l'eredità di Casa [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName]."
agot_events_rr_minor.0004.desc.imprisoned: 0 "I ribelli hanno preso d'assalto la grande sala di [GetTitleByKey('c_dragonstone').GetNameNoTier], sfondando la nostra ultima linea di difesa. Lo scontro è stato feroce, una tempesta caotica di spade e grida disperate, ma tragicamente #italic non è bastato#!. Abbiamo pagato il prezzo supremo quando il castello è caduto in mani nemiche. Quando la polvere si è posata, mi sono ritrovat[Select_CString(ROOT.Char.IsFemale,'a','o')] spogliat[Select_CString(ROOT.Char.IsFemale,'a','o')] della mia dignità, costrett[Select_CString(ROOT.Char.IsFemale,'a','o')] in ginocchio dinanzi a [iron_throne_ruler.GetFullName] in una mortificante dimostrazione di sconfitta.\n\nOra attendo il giudizio di [iron_throne_ruler.GetFirstNamePossessiveNoTooltip] nelle sue segrete. Ogni istante che passa è un'agonia. Posso soltanto offrire silenziose preghiere a [ROOT.Char.GetFaith.HighGodName], affinché l'ira dell'Usurpatore non giunga a reclamare la mia testa quale ultimo prezzo del mio fallimento."
  agot_events_rr_minor.0004.a:0 "Dobbiamo fuggire a Essos, come re attraverso il Mare Stretto"
  agot_events_rr_minor.0004.a.tt:0 "Tu, la tua famiglia e alcuni dei tuoi cortigiani fuggirete a [exile_destination.GetName]"
  agot_events_rr_minor.0004.c:0 "Siamo alla mercé dei nostri carcerieri"

  agot_events_rr_minor.0005.t:0 "Nata nella Tempesta"
agot_events_rr_minor.0005.desc: 0 "Nonostante la grandine assordante della tempesta colpisca con violenza il tetto di [GetTitleByKey('c_dragonstone').GetNameNoTier], le urla di [GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstNamePossessive] sembrano comunque levarsi sopra tutto quel frastuono. Le sue doglie, come la tempesta, si trascinano ben oltre il consueto, e proprio come ciò che resta della flotta di Casa [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName], Rhaella versa in cattive condizioni. Le sue dame corrono dentro e fuori dalla stanza con lenzuola e mani intrise di sangue, e il Maestro poco può fare se non pregare mentre ella si contorce nel letto del parto.\n\nNel medesimo istante in cui un fragore di tuono assordante, che pare scoppiare proprio sopra il castello, squarcia il cielo, Rhaella lancia un urlo raggelante, più terribile di tutti i precedenti. Per grazia degli dèi, tuono, vento e grandine cessano quel tanto che basta perché tutti possano udirlo: il pianto di un neonato.\n\nPer la prima volta dopo giorni, Rhaella lascia sfuggire una risata di sollievo, stringendo il neonato fra le braccia tremanti, con il volto malato e dissanguato che sorride al proprio figlio. Dopo tutto ciò che ha patito, questo è un unico e fugace sollievo dagli orrori che ha affrontato e che ancora dovrà affrontare. "Nata dalla Tempesta", mormora piano, con voce malferma, mentre il maestro le porta via il bambino per visitarlo. \n\nUn altro tuono accompagna un gemito di dolore di Rhaella: il bimbo è venuto al mondo, ma lei continua a sanguinare a un ritmo allarmante. Mentre coloro che stanno ai moli accettano la possibilità che la flotta possa non esistere più all'alba, coloro che vegliano al suo capezzale fanno lo stesso per Rhaella. Nata dal fuoco e dal sangue, nata tra lampi e tuoni: quale destino hanno posto gli dèi per una creatura dai simili inizi?"
agot_events_rr_minor.0005.exiled.desc: 0 "Nonostante la grandine assordante della tempesta colpisca con violenza il tetto di [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], le urla di [GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstNamePossessive] sembrano comunque levarsi sopra tutto quel frastuono. Le sue doglie, come la tempesta, si trascinano ben oltre il consueto, e proprio come ciò che resta della causa di Casa [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName], Rhaella versa in cattive condizioni. Le sue dame corrono dentro e fuori dalla stanza con lenzuola e mani intrise di sangue, e il Maestro poco può fare se non pregare mentre ella si contorce nel letto del parto.\n\nNel medesimo istante in cui un fragore di tuono assordante, che pare scoppiare proprio sopra la fortezza, squarcia il cielo, Rhaella lancia un urlo raggelante, più terribile di tutti i precedenti. Per grazia degli dèi, tuono, vento e grandine cessano quel tanto che basta perché tutti possano udirlo: il pianto di un neonato.\n\nPer la prima volta dopo giorni, Rhaella lascia sfuggire una risata di sollievo, stringendo il neonato fra le braccia tremanti, con il volto malato e dissanguato che sorride al proprio figlio. Dopo tutto ciò che ha patito, questo è un unico e fugace sollievo dagli orrori che ha affrontato e che ancora dovrà affrontare. "Nata dalla Tempesta", mormora piano, con voce malferma, mentre il maestro le porta via il bambino per visitarlo. \n\nUn altro tuono accompagna un gemito di dolore di Rhaella: il bimbo è venuto al mondo, ma lei continua a sanguinare a un ritmo allarmante. Nata dal fuoco e dal sangue, nata tra lampi e tuoni: quale destino hanno posto gli dèi per una creatura dai simili inizi?"
  agot_events_rr_minor.0005.a:0 "Solo gli dei sanno con certezza..."

  agot_events_rr_minor.0006.t:0 "Qualcuno pensi per favore ai bambini?"
agot_events_rr_minor.0006.desc.a: 0 "Benché le sue doglie siano state lunghe e penose, la morte di [GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstNamePossessive] è giunta, per fortuna, abbastanza in fretta una volta partorito il bambino; l'ha colta nel letto del parto prima che il mondo in guerra al di fuori potesse aggiungere altro alla sua agonia. Tutto ciò che sopravvive della sua un tempo potente dinastia sono i suoi due figli. \n\nPer quanto piccoli, restano pur sempre Targaryen, e finché resterà memoria del Re Folle, questi bambini saranno braccati; e vi sarà senza dubbio una grande ricompensa per chiunque li consegni al Trono di Spade. \n\nPoiché il tempo lavora contro di loro, rimane ben poca scelta per la loro sopravvivenza se non farli uscire di nascosto da [GetTitleByKey('c_dragonstone').GetNameNoTier] e traghettarli oltre il mare, nelle Città Libere. Forse là il tempo e la distanza permetteranno ai lealisti di riorganizzarsi, o forse, almeno, i nomi dei bambini svaniranno nell'oscurità man mano che cresceranno. Forse conosceranno la pace."
agot_events_rr_minor.0006.desc.b: 0 "Non so se siano state le preghiere altrui, il fuoco del drago che arde nel mio sangue, o soltanto puro dispetto a salvarmi, ma per qualche grande miracolo il letto del parto non è divenuto il mio letto di morte. Vi è ben poco riposo da trovare, tuttavia. Nessun luogo di Westeros sarà sicuro per loro, con o senza pretese. \n\nPotrei fuggire oltre il mare con i bambini nelle Città Libere, guadagnando tempo per riprenderci e riorganizzarci. Tuttavia è più facile nascondere due bambini che un'ex regina; restare a [GetTitleByKey('c_dragonstone').GetNameNoTier] potrebbe offrire ai bambini maggiore discrezione. Se riuscirò a resistere, Roccia del Drago potrebbe rivelarsi politicamente vantaggiosa per loro quando giungeranno all'età adulta. \n\nQualunque decisione io prenda, dev'essere presa presto. Non ho alcun dubbio che tutta Westeros dia la caccia ai miei figli, in cerca di vendetta, gloria o di qualunque taglia malata il Trono di Spade stia offrendo."
  agot_events_rr_minor.0006.desc.c:0 "agot_events_rr_minor.0006.desc.c"
  agot_events_rr_minor.0006.a:0 "Abbandonare i bambini? Neanche per sogno! Andrò con loro."
  agot_events_rr_minor.0006.b:0 "Rimarrò, ma li aiuterò a prepararsi."
  agot_events_rr_minor.0006.c:0 "Esattamente QUANTO pensi che valgano? Chiedo per un amico."

  agot_events_rr_minor.0007.t:0 "Gli Ultimi Bagliori"
agot_events_rr_minor.0007.desc: 0 "Il viaggio oltre il mare Stretto pare trascorrere col fiato sospeso. Vi sono troppe occasioni perché tutto vada in modo disastroso, e ogni sguardo rivolto indietro verso Westeros basta a far sprofondare lo stomaco e accelerare il cuore. \n\nQuando i piedi dei bambini toccano terra nelle Città Libere, coloro che li accompagnano riescono finalmente a respirare con un po' più di sollievo. Non è la fine delle loro sventure, ben lungi da ciò, ma gli ultimi resti del regno di Casa [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName] sono finalmente sottratti alla stretta immediata del pericolo."
  agot_events_rr_minor.0007.a:0 "Fuoco e sangue."

 # Under a False Banner
  agot_events_rr_minor.0100.t:0 "Sotto uno Falso Stendardo"
agot_events_rr_minor.0100.desc: 0 "È giunto il momento di prendere un'importante decisione. La guerra che [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] ha provocato ha indebolito la sua posizione e quella della sua casata in Westeros, tanto che la Fortezza Rossa di Approdo del Re è ormai la sua ultima grande roccaforte. Con una finta ben eseguita potrei riuscire a prendere la città e la Fortezza Rossa e porre fine all'abominio dei Sette Inferi. I giorni del suo regno devono giungere al termine."
  agot_events_rr_minor.0100.a:0 "Lui sentirà il mio ruggito..."
  agot_events_rr_minor.0100.b:0 "È un pericolo troppo grande...""

  agot_events_rr_minor.0101.t:0 "Cos'è la Lealtà?"
agot_events_rr_minor.0101.desc: 0 "Le mie guardie si affrettano da me nella sala del trono, recando notizia: [traitor_scope.Custom('IT_NAM_COL3')][traitor_scope.GetTitledFirstName] ha condotto le forze delle Terre dell'Ovest fino alle porte di Approdo del Re per proteggermi dai bastardi traditori delle case [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName], [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName], [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName] e [GetScriptedCharacterByHistoryID('Tully_1').GetHouse.GetName]! \n\nDa entrambe le parti il mio consiglio mi incalza. [advisor.GetName] mi esorta a non lasciarlo entrare in città, poiché teme che [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName] possa celare le proprie vere intenzioni, mentre [traitor.GetName] si esprime in favore di Lord [traitor_scope.GetHouse.GetBaseNameNoTooltip]..."

  agot_events_rr_minor.0101.a:0 "È un servo leale, lasciatelo entrare!"
  agot_events_rr_minor.0101.a.tt:0 "Dovrai aprire le porte..."

  agot_events_rr_minor.0101.b:0 "Solo un altro traditore!"

  agot_events_rr_minor.0102.t:0 "Sotto uno Falso Stendardo"
agot_events_rr_minor.0102.desc.a: 0 "Con le porte della città aperte e le vaste strade di [GetTitleByKey('c_kings_landing').GetNameNoTier] stese davanti a me e ai miei uomini, sono un passo più vicino al mio obiettivo. Eppure i soldati hanno bisogno di bottino, i miei uomini sono affamati e la città è matura per essere mietuta. Mentre sciolgo i miei cani sulle pecore nelle strade, continuo la mia ascesa sull'Alta Collina di Aegon, con [GetTitleByKey('b_the_red_keep').GetNameNoTier] che incombe sopra di me. Quando raggiungiamo i cancelli, li troviamo sbarrati, con la guarnigione del castello che mantiene la propria posizione. Mentre piovono frecce, [killer_1.GetFirstName] e [killer_2.GetFirstName], insieme a soldati scelti con cura, iniziano a scalare le pallide mura rosse. \n\nDelle grida si levano dalla sommità dei gradini della Fortezza Rossa..."
agot_events_rr_minor.0102.desc.b: 0 ""Le porte resteranno chiuse" fu l'unica cosa che l'inviato gridò dalla porta della città. I miei piani per eliminare [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] e la sua abominevole stirpe si sono arrestati. Poiché per loro la guerra è comunque perduta, devo mostrare ai ribelli che finalmente ho risposto al loro richiamo..."
  agot_events_rr_minor.0102.a:0 "Portami la sua testa."
  agot_events_rr_minor.0102.b:0 "Iniziamo l'assedio."

  agot_events_rr_minor.0103.t:0 "Sotto uno Falso Stendardo"
agot_events_rr_minor.0103.desc: 0 "Quando le porte della città furono aperte, i soldati [GetScriptedCharacterByHistoryID('Lannister_1').GetHouse.GetName] si riversarono all'interno e cominciarono a saccheggiarla, mentre la guarnigione non ebbe alcuna speranza di opporsi. Con migliaia di nemici ormai in città, tutto è davvero perduto. Rivolgo la mia ira verso [jaime_scope.GetName], il figlio maggiore di [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstNamePossessive], e gli ordino di portarmi la testa di suo padre. Lascio Jaime colmo d'ira e tengo udienza con il mio piromante [pyromancer_plotter.GetFirstName]: "Che brucino per il loro tradimento! Accendi le riserve di altofuoco sparse per la città: l'Usurpatore non avrà altro che cenere e ossa!" Il piromante si allontana in fretta. Attendo nella sala del trono la rovina della città. \n\nMa poco tempo dopo entra [jaime_scope.GetName]: "Ho ucciso il vostro piromante." Sconvolto, atterrito e temendo ciò che Jaime stesse per fare, tento di fuggire. Mentre salgo i gradini del trono, sento un freddo tagliente riempirmi la gola. Privo di forze, il mio corpo crolla e rotola giù per i gradini del Trono di Spade, mentre il mio sangue inonda il pavimento e tinge di tonalità più scure la pietra rosso pallido della Fortezza Rossa..."
  agot_events_rr_minor.0103.a:0 "Bruciali tutti! #EMP Bruciali tutti...#!"

  agot_events_rr_minor.0104.t:0 "Sotto uno Falso Stendardo"
agot_events_rr_minor.0104.desc: 0 "L'aria era greve di sangue e di morte quando [killer_1.GetFirstName] e [killer_2.GetFirstName] si avvicinarono a me. Entrambi grondanti sangue, con gli occhi colmi di brama. I loro sguardi non lasciavano dubbi: l'opera era compiuta. I lealisti hanno mantenuto la propria posizione nella [GetTitleByKey('b_the_red_keep').GetNameNoTier], ma non hanno avuto alcuna speranza contro il leone dell'ovest. I miei esploratori mi hanno già informato che le forze ribelli stanno marciando verso la capitale. Una nuova era si apre..."
  agot_events_rr_minor.0104.a:0 "Il leone ha ancora gli artigli..."

  agot_events_rr_minor.0105.t:0 "Speranze infrante, pretendenti infranti"
agot_events_rr_minor.0105.desc.b: 0 "Un leone ruggente sventola alto sopra le porte di [GetTitleByKey('c_kings_landing').GetNameNoTier], dove un tempo risiedeva il drago a tre teste. La città è caduta nelle mani dei [GetScriptedCharacterByHistoryID('Lannister_1').GetHouse.GetName]. \n\nLa città è stata saccheggiata e, quando giungiamo a [GetTitleByKey('b_the_red_keep').GetNameNoTier], gli uomini di [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstNamePossessive] stanno caricando carri con i corpi dei lealisti e di chiunque altro si sia trovato sulla loro strada. Le un tempo immacolate vesti e decorazioni della fortezza sono intrise di sangue, donando un nuovo significato al suo nome, uno che non dimenticherò presto. \n\nLa sala del trono non è migliore: il tappeto un tempo illustre ai piedi del trono è ora completamente fradicio di sangue. Eppure, ciò che davvero mi scuote è chi trovo seduto sul Trono di Spade: [GetScriptedCharacterByHistoryID('Lannister_7').GetFirstName] [GetScriptedCharacterByHistoryID('Lannister_7').GetHouse.GetName], cavaliere giurato di [GetTitleByKey('d_kingsguard').GetNameNoTier]. \n\nQuando mi dissero della sorte del Re Folle, avevo certamente creduto che fosse menzogna. E invece eccola qui, l'orrida verità, dinanzi a me, sotto i miei stessi occhi. Uno dei miei uomini si avvicina. "Mio signore, l'armata di Lord [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstNamePossessive] si sta avvicinando alla città.""
agot_events_rr_minor.0105.desc.a: 0 "Nonostante vi sia motivo di festeggiare, l'animo lieto di coloro che si trovano nella fortezza viene in parte spento quando due fagotti cremisi vengono deposti dinanzi a [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName], assai più piccoli di quanto dovrebbero essere. [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName] osserva in silenzio mentre Robert esamina i fagotti, scostando muto i mantelli che coprono i corpi al loro interno. [GetScriptedCharacterByHistoryID('Targaryen_10').GetFirstName], e... \n\nTywin allunga una mano, invitando Robert a fermarsi mentre egli si appresta a scoprire il secondo fagotto. "[GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] [GetScriptedCharacterByHistoryID('Targaryen_11').GetHouse.GetName]," annuncia Tywin. "Vi consiglierei di risparmiarvi questo turbamento, mio signore. Vi è ben poco da vedere." Robert esita per un momento, ma alla fine decide che sia nel suo interesse vedere con i propri occhi, cosa di cui si pente subito quando solleva il mantello e si trova dinanzi a un orrore senza volto di ossa e sangue. Ricopre rapidamente il corpo, affrettandosi a distogliersi dai cadaveri che gli sono stati presentati. Oggi Tywin ha dimostrato la sua fedeltà, sebbene pochi di coloro che vengono dopo Robert abbiano il coraggio di guardare le spoglie di Aegon."
agot_events_rr_minor.0105.desc.c: 0 "[GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] si erge dinanzi ai due fagotti che ho disposto al suo cospetto. [GetScriptedCharacterByHistoryID('Targaryen_10').GetFirstName] e [GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName], entrambi avvolti in mantelli cremisi nella speranza di celare tutto il sangue. Robert esamina i corpi, uno dopo l'altro, sollevando i mantelli per vederne il volto e confermarne l'identità. Quando giunge al più piccolo dei due, alzo una mano per invitarlo ad attendere. \n\n"Il corpo di Aegon Targaryen", dichiaro, avendo visto con i miei stessi occhi lo scempio sotto il mantello. "Vi consiglierei di risparmiarvi questo turbamento, mio signore. Vi è ben poco da vedere." Robert esita per un momento, ma alla fine decide che sia nel suo interesse vedere con i propri occhi, cosa di cui si pente subito quando solleva il mantello e si trova dinanzi a un orrore senza volto di ossa e sangue. La debole forma del cranio di Aegon ancora permane, ma del cervello non resta neppure un'oncia dove dovrebbe essere. Robert ricopre rapidamente il corpo, affrettandosi a passare oltre. \n\n"Molto bene," è tutto ciò che riesce a dire, mentre mi rivolge un cenno di riconoscimento."
  agot_events_rr_minor.0105.a:0 "Affare terribile, davvero."

  agot_events_rr_minor.0106.t:0 "Sangue per sangue"
agot_events_rr_minor.0106.desc.a: 0 ""Erano #italic bambini,#! Robert!" Ned cammina avanti e indietro mentre parla, visibilmente sconvolto. È sempre stato fin troppo tenero di cuore. \n\n"E i bambini crescono e diventano pretendenti," gli ricordo.\n\n"[GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] [GetScriptedCharacterByHistoryID('Targaryen_11').GetHouse.GetName] non aveva nemmeno smesso di poppare," grida Ned. "C'erano altri modi..."\n\n"C'erano altri modi per [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] di affrontare il rapimento di [GetScriptedCharacterByHistoryID('Stark_5').GetFirstNamePossessive]," ribatto secco. Ha forse dimenticato di che cosa si tratti? "Sangue per sangue, dico io."\n\nNed scuote il capo. "E come glielo spiegherai?" chiede. "Come guarderai mia sorella negli occhi e le spiegherai l'assassinio di quei bambini?" \n\nNon posso credere a ciò che sto udendo. Per della semplice progenie di drago? Ned esce furibondo dalla stanza."
agot_events_rr_minor.0106.desc.b: 0 "Il mio cuore batte all'impazzata e non riesco a stare fermo mentre tento di comprendere ciò che ho appena visto. "Erano #italic bambini,#! Robert!"\n\n"E i bambini crescono e diventano pretendenti," ribatte lui.\n\n"[GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] [GetScriptedCharacterByHistoryID('Targaryen_11').GetHouse.GetName] non aveva nemmeno smesso di poppare," mi ritrovo a gridare. "C'erano altri modi..." \n\n"C'erano altri modi per [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] di affrontare il rapimento di [GetScriptedCharacterByHistoryID('Stark_5').GetFirstNamePossessive]," mi interrompe Robert. "Sangue per sangue, dico io." \n\nSono atterrit[Select_CString(ROOT.Char.IsFemale,'a','o')]. "E come glielo spiegherai?" gli chiedo. "Come guarderai mia sorella negli occhi e le spiegherai l'assassinio di quei bambini?" \n\nNon posso credere che Robert, il mio più caro amico, sia divenuto tanto vendicativo da accettare che venga versato il sangue di bambini. Il mio lutto dovrà attendere, tuttavia, finché Lyanna non sarà tornata a casa."
  agot_events_rr_minor.0106.a:0 "La ricerca di Lyanna continua."
  agot_events_rr_minor.0107.t:0 "E così le campane suonano..."
  agot_events_rr_minor.0107.desc:0 "Si sappia ovunque, da Westeros ad Essos e in tutte le terre: \n\n#bold Il Re Pazzo, Aerys II Targaryen, è morto.#! \n\nApprodo del Re è caduta, portando con sé la dinastia Targaryen con se."
  agot_events_rr_minor.0107.a:0 "Valar morghulis."

  agot_events_rr_minor.0200.t:0 "Sotto uno Falso Stendardo"
  agot_events_rr_minor.0200.desc:0 "Ho ora portato le mie forze dalle Terre Occidentali verso la Porta. Salutiamo le guardie e diciamo loro di dire al re che siamo venuti per salvarli e che devono aprire la porta in modo che possiamo difendere la città."
  agot_events_rr_minor.0200.a:0 "Non sospettano nulla"

  agot_events_rr_minor.0117.t:0 "Bruciali tutti"
agot_events_rr_minor.0117.desc: 0 "Bruciateli tutti, dico a [GetScriptedCharacterByHistoryID('Pyromancer_1').GetFirstName], mentre riprendo posto sul mio trono, e guardo il leone traditore agitarsi sapendo che non può sconfiggere il fuoco di un drago. Riuscirono a sfuggire al drago di Aegon durante il Campo di Fuoco, ma io devo correggere gli errori del mio antenato e negare il trono ai traditori"
  agot_events_rr_minor.0117.a:0 "Regneranno su un trono di cenere"

  agot_events_rr_minor.0118.t:0 "Bruciali tutti"
 #agot_events_rr_minor.0118.desc:0 "Burn them all, I say to [GetScriptedCharacterByHistoryID('Pyromancer_1').GetFirstName], as I retake my seat upon my throne, I watch the traitorous Lion squirm as he knows he cannot defeat the fire of a Dragon. They managed to evade Aegon's dragon during the Field of Fire, but I ought to correct my ancestor's mistakes, and deny the throne to the traitors"
  agot_events_rr_minor.0118.a:0 "Regneranno su un trono di cenere."

  agot_events_rr_minor.0119.t:0 "Fiamme Verdi"
agot_events_rr_minor.0119.desc: 0 "[GetTitleByKey('c_kings_landing').GetNameNoTier] versa in uno stato di assoluto caos. La città è caduta, e i soldati marciano per le strade, lasciando ben poche proprietà non saccheggiate.\n\nParrebbe però che i saccheggi e la devastazione siano l'ultimo dei problemi del popolo, poiché il suono di esplosioni riecheggia per tutta la città. Le odo, e perfino le sento; nel profondo delle ossa so che la mia fine è giunta. Cerco di correre, di trovare riparo in una delle case mentre all'esterno una calca di persone si travolge a vicenda. Raggiungo infine la casa, ma ahimè! Vedo la fiamma verde riversarsi per le strade, e mentre esalo il mio ultimo respiro, sento che mi avvolge. "
  agot_events_rr_minor.0119.a:0 "Sembra che abbia incontrato un terribile destino."

 # Siege of Gulltown - Stark
agot_events_rr_minor.0108.t: 0 "La Scintilla della Ribellione"
agot_events_rr_minor.0108.desc: 0 "Il ricordo delle parole del messaggero sa ancora di cenere. Mio padre è morto. [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] è morto. La "giustizia" del Re Folle non fu altro che una pira. Mia sorella è ancora nelle mani di [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUINamePossessive].\n\nOra [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] pretende che [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] consegni me e [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] a lui, senza dubbio per farci subire la stessa sorte dei miei parenti. Jon ha risposto a quella richiesta con l'acciaio.\n\nIl peso del Nord grava su di me, una signoria pagata in sangue e altofuoco, insieme a un patto di nozze con una donna che a malapena conosco. Eppure non posso restare inerte mentre la mia famiglia viene distrutta e mia sorella resta prigioniera.\n\nRobert, Jon ed io ci leviamo insieme in aperta sfida. Per il padre che mi ha cresciuto, per il fratello che dovrebbe essere qui al mio posto, e per Lyanna, marcio. Oggi i nostri stendardi si levano dinanzi alle porte di [GetTitleByKey('c_gulltown').GetNameNoTier], e il regno del drago comincia a sgretolarsi."
agot_events_rr_minor.0108.a: 0 "Per la giustizia."

agot_events_rr_minor.0109.t: 0 "La Scintilla della Ribellione"
agot_events_rr_minor.0109.desc: 0 "Ogni notte vedo il suo volto, e ogni mattina mi desto con la consapevolezza che quella progenie di drago di [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName] ancora respira mentre la mia [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] resta nelle sue sudicie grinfie. Gli dèi sono impazziti, e [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] è il loro araldo: ha arso Lord [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName] e strangolato suo figlio [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] in una corte divenuta un mattatoio.\n\nOra il Re Folle vuole le nostre teste? Ci chiama traditori per il solo crimine di respirare? Che venga pure. [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] ha dato la sua risposta con l'acciaio, e la mia è già stretta nel pugno.\n\nIl lupo, il falco e la trota stanno con il cervo, e non avremo requie finché Lyanna non sarà restituita. Vedrò Rhaegar morto e Aerys abbattuto.\n\nForse non sappiamo ancora chi debba succedere al re, ma una cosa è certa: il regno del drago è finito! Oggi i nostri stendardi schioccano al vento dinanzi alle porte di [GetTitleByKey('c_gulltown').GetNameNoTier]."
  agot_events_rr_minor.0109.a:0 "Per Lyanna!"

agot_events_rr_minor.0110.t: 0 "La Scintilla della Ribellione"
agot_events_rr_minor.0110.desc: 0 "Un corvo è giunto la settimana scorsa. Quando la crudeltà del Folle [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUINamePossessive] ha reclamato la vita del mio vecchio amico, Lord [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName], e del suo erede, [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName], pensavo che ciò avesse già posto le basi della ribellione. Ma ora pretende che io gli consegni i miei protetti: [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] e [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName], il secondo figlio di Rickard, definendoli traditori senza motivo.\n\nHo rifiutato.\n\nInsieme a Ned, ora Lord di [GetTitleByKey('c_winterfell').GetNameNoTier] e da poco sposato con Lady [GetScriptedCharacterByHistoryID('Tully_4').GetFirstName] [GetScriptedCharacterByHistoryID('Tully_4').GetHouse.GetName] di [GetTitleByKey('c_riverrun').GetNameNoTier], e con Robert che guida i suoi uomini dalle Terre della Tempesta, io e i miei cavalieri della Valle ci siamo levati in aperta ribellione contro il Trono di Spade.\n\nOggi i nostri stendardi gettano la loro ombra sulle porte della traditrice [GetTitleByKey('c_gulltown').GetNameNoTier]."
agot_events_rr_minor.0110.a: 0 "Non si torna più indietro."

 # After the Rebellion - Cersei and Robert Marriage
  agot_events_rr_minor.0111.t:0 "Una Grande Opportunità" 
agot_events_rr_minor.0111.desc: 0 "Con la morte della fanciulla [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName], il nuovo Lord dei Sette Regni, [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName], è senza moglie. \n\nForse dovrei offrirgli mia figlia: una regina [GetScriptedCharacterByHistoryID('Lannister_6').GetHouse.GetName], dopotutto, gioverebbe immensamente alla nostra famiglia a corte e fuori da essa."
  agot_events_rr_minor.0111.a:0 "Ha tutto il senso!" 
  agot_events_rr_minor.0111.a.tt:0 "Invii la proposta"
  agot_events_rr_minor.0111.b:0 "Re o no — nessuna mia figlia sposerà un ubriacone!" 
  agot_events_rr_minor.0111.b.tt:0 "Non invii la proposta"

  agot_events_rr_minor.0112.t:0 "La Sposa Dorata"
agot_events_rr_minor.0112.desc: 0 "La mia amata [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] è morta, e il mio cuore non ha mai conosciuto un dolore tanto profondo. Il vino attenua gran parte del tormento, ma resta un vuoto che indugia e che proprio non riesco a scacciare. Oh, mia dolce, dolce Lyanna...\n\nDopo qualche altro giorno di lutto, il Gran Maestro mi informa di una proposta di Lord [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName]: mi ha offerto la mano di sua figlia. Mi dicono che sia bella, piacevole e in tutto perfetta; eppure, può davvero reggere il confronto con il mio amore perduto?"
  agot_events_rr_minor.0112.a:0 "Ogni re ha bisogno di una regina. Se nient'altro, credo che lei faccia al caso mio..."
  agot_events_rr_minor.0112.a.tt:0 "Accetti la proposta."
  agot_events_rr_minor.0112.b:0 "Ho amato solo una volta. Mai più."
  agot_events_rr_minor.0112.b.tt:0 "Rifiuti la proposta."

  agot_events_rr_minor.0113.t:0 "Sempre Intrecciati"
agot_events_rr_minor.0113.desc: 0 "Il mio Jaime. Il mio caro, dolce, bellissimo Jaime, mio fratello, il mio gemello, il mio amore... \n\nSiamo sempre stati insieme, persino nel ventre materno. La mia mano appartiene a [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName], sì, ma Jaime è ancora #italic il mio#! Jaime, e non posso fare a meno di desiderarlo. \n\nMa se ci scoprissero? Se fosse lui a generare i miei figli e #italic qualcuno#! venisse a conoscere la verità? Oh, le conseguenze sarebbero indicibili. \n\nMi stringe tra le braccia, ed è tutto ciò che Robert non è, ma è anche mio fratello e dovremmo vergognarcene, e invece #italic non ce ne vergogniamo!#! Se il nostro amore è tanto innaturale e vergognoso quanto dicono, perché il suo tocco è così delizioso? Perché privarcene?"
  agot_events_rr_minor.0113.a:0 "Non sono completa senza di te."
  agot_events_rr_minor.0113.a.tt:0 "Ti concedi a Jaime."
  agot_events_rr_minor.0113.b:0 "Questo finisce ora, prima che facciamo qualcosa che non può essere annullato."
  agot_events_rr_minor.0113.b.tt:0 "Rifiuti Jaime."

 # Robert's Rebellion - Whent picks a side

  agot_events_rr_minor.0114.t:0 "Il Torneo di Harrenhal"
agot_events_rr_minor.0114.desc: 0 "È il mio orgoglio che ha attirato questo sul regno. Al mio torneo si radunarono i grandi lord, e i grandi lord cospirarono. E quando il Principe di [GetTitleByKey('c_dragonstone').GetNameNoTier] scelse non mia figlia [daughter.GetName] quale Regina d'Amore e Bellezza, bensì un'altra, i semi di questo caos furono sparsi nel terreno.\n\nOra mio fratello [brother.Custom('IT_NAM_COL3')][brother.GetTitledFirstName] mi scrive, e le sue parole mi implorano di riporre fiducia in questo Principe. Che il piano di [rhaegar.Custom('IT_NAM_COL2')][rhaegar.GetTitledFirstName] vedrà il fulgido ritorno di Casa [rhaegar.GetDynastyName] alla sua piena gloria.\n\nMa che ne sarà del futuro di Casa [ROOT.Char.GetDynastyName]? I nostri signori, Casa [tully.GetDynastyName], si sono levati con i ribelli, e [tully.Custom('IT_NAM_COL3')][tully.GetTitledFirstName] è nostro cognato, i suoi figli sono del nostro sangue. Dovrò stare a guardare i figli di [sister.GetFirstNamePossessive] incontrare la stessa sorte di Lord [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName]?"
  agot_events_rr_minor.0114.a:0 "Porgerò la mia fiducia nella lealtà di mio fratello."
  agot_events_rr_minor.0114.a.tt:0 "Resterai fedele."
  agot_events_rr_minor.0114.b:0 "Un figlio per ciascun campo garantirà il futuro della Casa [ROOT.Char.GetDynastyName]"
  agot_events_rr_minor.0114.b.tt:0 "Rimarrai neutrale."
  agot_events_rr_minor.0114.c:0 "Manda parola all'Usurpatore che il Pipistrello ha preso il volo."
  agot_events_rr_minor.0114.c.tt:0 "Ti unirai alla Ribellione di Robert."

 # Robert's Rebellion - The Kraken in Winter

  agot_events_rr_minor.0115.t:0 "The Kraken in Winter"
  agot_events_rr_minor.0115.desc:0 "Questi ragazzi saranno la mia morte! Mentre i terrestri si lacerano a vicenda per il loro trono di Spade, noi Uomini di Ferro siamo in tumulto. \n\nI miei figli mi incitano a unirmi alla lotta contro il Drago, sbavando alla mia salute malandata. Sanno che il mio prossimo viaggio sarà probabilmente il mio ultimo, eppure, nessuno è adatto a seguirmi. Devo sopportare le continue lamentele di [balon.GetNamePossessive] per la perdita della Vecchia Via, la mancanza di compostezza di [victarian.GetNamePossessive], e le perverse ambizioni di [euron.GetNamePossessive] - che non oserei dettagliare, se volessi che tale degradazione diventasse realtà.\n\nLa mia [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('piper'))] [piper.GetTitledFirstName] è il mio unico conforto. Il giovane [robin.GetName] tra le sue braccia, il ponte tra i nostri due mondi, nato da un seme vecchio e debole. Ho estratto pietre, ma camminiamo su un ponte traballante in una tempesta.\n\nOra, mentre guardo la mia stessa mortalità in faccia, lo vedo chiaramente: #bold la mia eredità sarà strappata via dai miei stessi piccoli!#! Un branco di corvi che litigano sulla carne morta."
  agot_events_rr_minor.0115.a:0 "Vediamo se il Toro può infilzare il Drago." #Scelta canonica
  agot_events_rr_minor.0115.a.tt:0 "Il Vecchio Kraken rifletterà sulla guerra." #Scelta canonica
  agot_events_rr_minor.0115.b:0 "Un momento drastico, un'azione drastica."

 # Robert's Rebellion - Stormlord Joins Bob

  agot_events_rr_minor.0116.t:0 "Battaglia di [location.GetName]"
agot_events_rr_minor.0116.desc: 0 "Durante il mio scontro con i lealisti di Casa [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName] nella battaglia di [location.GetName], [stormlander_lord.Custom('IT_NAM_COL3')][stormlander_lord.GetTitledFirstName] si è presentat[Select_CString(stormlander_lord.IsFemale,'a','o')] dinanzi a me per offrirmi la propria sottomissione. Chiaramente, dopo aver visto il mio valore in battaglia e il mio munifico trattamento riservato ad altri ex lealisti, [Select_CString(stormlander_lord.IsFemale,'lei','lui')] ha compreso che è molto più saggio schierarsi con la nostra giusta causa."
  agot_events_rr_minor.0116.a:0 "Il Toro cresce sempre più forte." #Scelta canonica
  agot_events_rr_minor.0116.a.tt:0 "[stormlander_lord.GetTitledFirstName] sarà ora dalla tua parte nel conflitto." #Scelta canonica


