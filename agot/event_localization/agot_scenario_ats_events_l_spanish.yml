  ##########
  # Rohanne #
  ##########
  
  # Dunk offered Rohanne gold and asked for the dam to come down
  # Available scopes: dunk/bennis/eustace/longinch
  agot_scenario_ats.3010.t:0 "Un'Offerta d'Oro"
  agot_scenario_ats.3010.desc:0 "Mentre mi esercito con l'arco, mi viene annunciato l'arrivo d'un inviato mandato al posto di [eustace.Custom('IT_NAM_COL2')][eustace.GetTitledFirstName]. [Select_CString(dunk.IsFemale,'Lei','Lui')] si presenta come [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed], un cavaliere errante. [Select_CString(dunk.IsFemale,'È','È')] davvero più alt[Select_CString(dunk.IsFemale,'a','o')] perfino di [longinch.GetNicknameNoTooltip]; larg[Select_CString(dunk.IsFemale,'a','o')] di spalle, ben fatt[Select_CString(dunk.IsFemale,'a','o')] e avvenente in modo semplice. Tra noi nasce un gioco di civetteria più spontaneo di quanto mi aspettassi, benché [Select_CString(dunk.IsFemale,'lei','lui')] abbia chiaramente ben poca esperienza.\n\nLasciando da parte le cortesie, e quella naturale civetteria, [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip] mi offre un sacchetto d'oro come compenso per il mio contadino ferito e mi chiede di rimuovere la diga sul Chequy Water, arrivando persino a sostenere che appartenga a Casa Osgrey, nonostante abbiano perduto il corso d'acqua dopo il [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )]."
  agot_scenario_ats.3010.a:0 "Prenderò l'oro e rimuoverò la diga."
  agot_scenario_ats.3010.a.tt:0 "Abbatterai la diga; vi sarà meno acqua per tutti i coinvolti"
  agot_scenario_ats.3010.b:0 "Prenderò il tuo oro, ma il mio fossato non può prosciugarsi."
  agot_scenario_ats.3010.b.tt:0 "Prenderai l'oro per la ferita del tuo contadino, ma manterrai la diga"
  agot_scenario_ats.3010.c:0 "Non avrò il tuo oro, e tu non avrai la mia acqua."
  agot_scenario_ats.3010.c.tt:0 "Non prenderai alcun oro e manterrai la diga"
  
  agot_scenario_ats.3011.t:0 "Un'Offerta di Sangue"
  agot_scenario_ats.3011.desc:0 "Mentre mi esercito con l'arco, mi viene annunciato l'arrivo d'un inviato mandato al posto di [eustace.Custom('IT_NAM_COL2')][eustace.GetTitledFirstName]. [Select_CString(dunk.IsFemale,'Lei','Lui')] si presenta come [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed], un cavaliere errante. [Select_CString(dunk.IsFemale,'È','È')] davvero più alt[Select_CString(dunk.IsFemale,'a','o')] perfino di [longinch.GetNicknameNoTooltip]; larg[Select_CString(dunk.IsFemale,'a','o')] di spalle, ben fatt[Select_CString(dunk.IsFemale,'a','o')] e avvenente in modo semplice. Tra noi nasce un gioco di civetteria più spontaneo di quanto mi aspettassi, benché [Select_CString(dunk.IsFemale,'lei','lui')] abbia chiaramente ben poca esperienza.\n\nLasciando da parte le cortesie, [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip] mi offre la vita di Ser [bennis.GetFirstNameNicknamed] come compenso per il mio contadino ferito e mi chiede di rimuovere la diga sul Chequy Water. Arriva persino a sostenere che appartenga a Casa Osgrey, nonostante abbiano perduto il corso d'acqua dopo il [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )]."
  agot_scenario_ats.3011.a:0 "Prenderò l'uomo e rimuoverò la diga."
  agot_scenario_ats.3011.a.tt:0 "Abbatterai la diga; vi sarà meno acqua per tutti i coinvolti"
  agot_scenario_ats.3011.b:0 "Prenderò il tuo uomo, ma il mio fossato non può prosciugarsi."
  agot_scenario_ats.3011.b.tt:0 "Prenderai il prigioniero per la ferita del tuo contadino, ma manterrai la diga"
  agot_scenario_ats.3011.c:0 "Non mi darò pena per il tuo cavaliere errante."
  agot_scenario_ats.3011.c.tt:0 "Rifiuterai il prigioniero e manterrai la diga"
  
  agot_scenario_ats.3012.t:0 "Un'Offerta d'Oro"
  agot_scenario_ats.3012.desc:0 "Mentre mi esercito con l'arco, odo i cancelli di Fossafredda gemere quando vengono aperti. Tutti coloro che sono radunati nel cortile si immobilizzano quando un cavaliere solitario entra. [Select_CString(eustace.IsFemale,'Lei','Lui')] ordina che il [Select_CString(eustace.IsFemale,'suo cavallo','suo cavallo')] venga condotto alle stalle, poi avanza verso di me. È Ser [eustace.GetFirstName], col volto rosso di collera.\n\n[Select_CString(eustace.IsFemale,'Lei','Lui')] si ferma a un passo da me, ignorando [longinch.GetNickname], che tenta di frapporsi fra noi. Ser [eustace.GetFirstNameNoTooltip] è qui per trattare: ancora alt[Select_CString(eustace.IsFemale,'a','o')], robust[Select_CString(eustace.IsFemale,'a','o')] e vigoros[Select_CString(eustace.IsFemale,'a','o')] come lo ricordo, sebbene vi sia un vuoto nei [Select_CString(eustace.IsFemale,'suoi occhi','suoi occhi')] che non c'era prima del [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )].\n\nDopo un breve tragitto fino alla sala ove attende il mio trono, Ser [eustace.GetFirstNameNoTooltip] mi offre dell'oro quale compenso per il mio contadino ferito e mi chiede di rimuovere la diga, lasciando meno acqua a entrambi."
  agot_scenario_ats.3012.a:0 "Prenderò l'oro e rimuoverò la diga."
  agot_scenario_ats.3012.a.tt:0 "Abbatterai la diga; vi sarà meno acqua per tutti i coinvolti"
  agot_scenario_ats.3012.b:0 "Prenderò il tuo oro, ma il mio fossato non può prosciugarsi."
  agot_scenario_ats.3012.b.tt:0 "Prenderai l'oro per la ferita del tuo contadino, ma manterrai la diga"
  agot_scenario_ats.3012.c:0 "Non avrò il tuo oro, e tu non avrai la mia acqua."
  agot_scenario_ats.3012.c.tt:0 "Non prenderai alcun oro e manterrai la diga"
  
  agot_scenario_ats.3013.t:0 "Un'Offerta di Sangue"
  agot_scenario_ats.3013.desc:0 "Mentre mi esercito con l'arco, odo i cancelli di Fossafredda gemere quando vengono aperti. Tutti coloro che sono radunati nel cortile si immobilizzano quando un cavaliere solitario entra. [Select_CString(eustace.IsFemale,'Lei','Lui')] ordina che il [Select_CString(eustace.IsFemale,'suo cavallo','suo cavallo')] venga condotto alle stalle, poi avanza verso di me. È Ser [eustace.GetFirstName], col volto rosso di collera.\n\n[Select_CString(eustace.IsFemale,'Lei','Lui')] si ferma a un passo da me, ignorando [longinch.GetNickname], che tenta di frapporsi fra noi. Ser [eustace.GetFirstNameNoTooltip] è qui per trattare: ancora alt[Select_CString(eustace.IsFemale,'a','o')], robust[Select_CString(eustace.IsFemale,'a','o')] e vigoros[Select_CString(eustace.IsFemale,'a','o')] come lo ricordo, sebbene vi sia un vuoto nei [Select_CString(eustace.IsFemale,'suoi occhi','suoi occhi')] che non c'era prima del [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )].\n\nDopo un breve tragitto fino alla sala ove attende il mio trono, Ser [eustace.GetFirstNameNoTooltip] mi offre Ser [bennis.GetFirstNameNicknamed] in catene quale compenso per il mio contadino ferito e mi chiede di rimuovere la diga. In mezzo a questa siccità, togliere la diga potrebbe soltanto arrecare ulteriori sofferenze a entrambi."
  agot_scenario_ats.3013.a:0 "Prenderò l'uomo e rimuoverò la diga."
  agot_scenario_ats.3013.a.tt:0 "Abbatterai la diga; vi sarà meno acqua per tutti i coinvolti"
  agot_scenario_ats.3013.b:0 "Prenderò il tuo uomo, ma il mio fossato non può prosciugarsi."
  agot_scenario_ats.3013.b.tt:0 "Prenderai il prigioniero per la ferita del tuo contadino, ma manterrai la diga"
  agot_scenario_ats.3013.c:0 "Non mi darò pena per il tuo cavaliere errante, e tu non avrai la mia acqua."
  agot_scenario_ats.3013.c.tt:0 "Rifiuterai il prigioniero e manterrai la diga"
  
  agot_scenario_ats.3020.t:0 "Un Accordo con un Ragno"
  agot_scenario_ats.3020.desc:0 "Attendo per poco prima di essere invitato nella sala del trono di [rohanne.GetFullNamePossessive]. [Select_CString(rohanne.IsFemale,'Lei','Lui')] comincia con qualche cortesia, pur sedendo su un trono destinato alla mia Casata, nel castello che fu la nostra sede. Reprimendo la mia furia e il mio orrore, devo fare ciò per cui ho infranto il mio giuramento.\n\nChe cosa offrirò a [rohanne.Custom('IT_NAM_COL4')][rohanne.GetLadyLord] di Fossafredda: oro o sangue? Quale delle due cose la persuaderebbe a rimuovere questa maledetta diga?"
  agot_scenario_ats.3020.a:0 "L'oro dovrà bastare per il tuo contadino ferito. Ora rimuoverai questa diga?"
  agot_scenario_ats.3020.a.tt:0 "Offrirai a [rohanne.GetNameNoTooltip] dell'oro come compenso"
  agot_scenario_ats.3020.b:0 "Prendi Ser [bennis.GetFirstNameNicknamed] e abbatti la tua diga."
  agot_scenario_ats.3020.b.tt:0 "Offrirai Ser [bennis.GetFirstNameNoTooltip] come prigioniero e chiederai che la diga venga rimossa"
  
  agot_scenario_ats.3021.t:0 "Il Mio Chequy Water"
  agot_scenario_ats.3021.desc:0 "[rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstNameNicknamed] ha ceduto e ha rimosso la diga che bloccava il Chequy Water. Sebbene la siccità ora colpirà entrambi, almeno le terre di Standfast sopravvivranno.\n\nNon ci resta che sperare che giunga la pioggia... e presto."
  agot_scenario_ats.3021.a:0 "Forse questa Vedova Rossa non è poi tanto crudele..."
  agot_scenario_ats.3021.a.tt:0 "La diga è stata rimossa da Standfast, prolungando il corso del Chequy Water"
  
  agot_scenario_ats.3030.t:0 "Il Leone o la Quercia?"
  agot_scenario_ats.3030.desc:0 "Ser [eustace.GetFirstName] ha accettato la mia offerta di andare al [Select_CString(eustace.IsFemale,'suo','suo')] posto a Fossafredda per trattare con la Vedova Rossa. La mia mente corre senza posa attraverso le dicerie sulla Signora di Fossafredda: delle sue dita ossute e invecchiate, dell'assassinio dei [Select_CString(rohanne.IsFemale,'suoi mariti','suoi mariti')] defunti, delle empie stregonerie compiute nel suo castello sotto il pallido chiarore lunare. Può darsi che cavalchi verso Fossafredda per andare incontro alla mia rovina, ma almeno l'affronto al servizio del mio signore.\n\nMentre Egg e io ci lasciamo Standfast alle spalle, parliamo d'etichetta e di quale sia il modo migliore di rivolgersi a una dama d'alto lignaggio. Se vogliamo sopravvivere a un incontro con la pericolosa strega di Casa Webber, dovrò parlarle come si conviene a una donna del suo rango. Almeno, questo è ciò che mi dice Egg."
  agot_scenario_ats.3030.desc.eustacegoing:0 "Ser [eustace.GetFirstName] ha rifiutato la mia offerta di andare al [Select_CString(eustace.IsFemale,'suo','suo')] posto a Fossafredda per trattare con la Vedova Rossa. [Select_CString(eustace.IsFemale,'Lei','Lui')] vi andrà [Select_CString(eustace.IsFemale,'di persona','di persona')] nella speranza che ciò trasmetta un messaggio migliore, nonostante i giuramenti che ha pronunciato di restare lontan[Select_CString(eustace.IsFemale,'a','o')] dall'antica dimora della sua famiglia. Trascorro il tempo dopo la partenza di Ser Eustace camminando avanti e indietro al piano più alto di Standfast, domandandomi se il leone scaccato non abbia ceduto troppo del proprio orgoglio solo per cavalcare dentro la mortale ragnatela d'un ragno."
  agot_scenario_ats.3030.a:0 "Speriamo che si possa ragionare con la Vedova Rossa."
  agot_scenario_ats.3030.a.tt:0 "Le trattative proseguiranno"
  
  agot_scenario_ats.3033.t:0 "Nella Tana della Vedova"
  agot_scenario_ats.3033.desc:0 "Egg e io varchiamo i cancelli di Fossafredda, passando sotto il rilievo scolorito d'un leone scaccato che tradisce la sua lunga storia. Nonostante i depistaggi e gli scherzi di Ser [longinch.GetNameNicknamed], alla fine mi viene presentata [rohanne.GetFullNameNicknamed]. Da tutte le storie che avevo udito, la Vedova Rossa era una vecchia megera che aveva ucciso tutti i [Select_CString(rohanne.IsFemale,'suoi mariti','suoi mariti')] con empie stregonerie.\n\nDavanti a me si trova una donna di forse venticinque anni, minuta e graziosa. Allontanandosi dal campo di tiro con l'arco, [Select_CString(rohanne.IsFemale,'lei','lui')] pare squadrarmi, facendo scorrere le mani sulla mia tunica presa in prestito, che reca il leone scaccato di Casa Osgrey, e parlando con un tono che mi fa salire il sangue al volto.\n\nSer [eustace.GetFirstName] mi ha affidato le trattative, ma quale offerta potrebbe meglio compiacere questa Vedova Rossa? E come potrò convincerla ad abbattere la diga?"
  agot_scenario_ats.3033.a:0 "Prendete quest'oro, mia [rohanne.GetLadyLord], e lasciate che il Chequy Water torni a scorrere."
  agot_scenario_ats.3033.a.tt:0 "Offri oro per il contadino ferito e chiedi che la diga venga abbattuta"
  agot_scenario_ats.3033.b:0 "Prendete Ser [bennis.GetFirstNameNicknamedNoTooltip] e abbattete la diga."
  agot_scenario_ats.3033.b.tt:0 "Offri [bennis.GetFirstNameNoTooltip] come prigioniero e chiedi che la diga venga abbattuta"
  
  agot_scenario_ats.3031.t:0 "Il Morso d'una Vedova"
  agot_scenario_ats.3031.desc:0 "Lady [rohanne.GetFirstName] non ha accolto bene la mia offerta e la diga non sarà abbattuta. Senza quell'acqua, le terre possedute da Ser [eustace.GetFirstName] avvizziranno e il suo popolo morirà.\n\nRicordando una storia che Ser [eustace.GetFirstNameNoTooltip] mi raccontò, su suo figlio [addam.GetFirstName] e la sua lunga amicizia con Lady [rohanne.GetFirstNameNoTooltip], tento di supplicarla evocando il suo ricordo e il legame che li univa.\n\nIl suo volto si contorce di rabbia e, prima che io possa reagire, la sua mano scatta come una freccia, colpendomi la guancia e facendovi correre fitte di dolore. [Select_CString(rohanne.IsFemale,'Lei','Lui')] mi racconta di come Ser [eustace.GetFirstNameNoTooltip] portò i propri figli in guerra, pensando che il Drago Nero avrebbe restituito ciò che il Drago Rosso aveva tolto a Casa Osgrey, e di come li uccise. Tutto ciò che posso fare è restare in un silenzio attonito mentre apprendo che il mio signore fu un traditore. [Select_CString(rohanne.IsFemale,'Lei','Lui')] mi strappa infine al mio torpore: "Andatevene, ser, e sappiate che difenderò le mie terre e il mio fossato con #italic fuoco e spada!#!""
  agot_scenario_ats.3031.desc.tookbennis:0 "Lady [rohanne.GetFirstName] non ha accolto bene la mia offerta, pur avendo preso Bennis e mantenuto la sua diga. Senza quell'acqua, le terre possedute da Ser [eustace.GetFirstName] avvizziranno e il suo popolo morirà.\n\nRicordando una storia che Ser [eustace.GetFirstNameNoTooltip] mi raccontò, su suo figlio [addam.GetFirstName] e la sua lunga amicizia con Lady [rohanne.GetFirstNameNoTooltip], tento di supplicarla evocando il suo ricordo e il legame che li univa.\n\nIl suo volto si contorce di rabbia e, prima che io possa reagire, la sua mano scatta come una freccia, colpendomi la guancia e facendovi correre fitte di dolore. [Select_CString(rohanne.IsFemale,'Lei','Lui')] mi racconta di come Ser [eustace.GetFirstNameNoTooltip] portò i propri figli in guerra, pensando che il Drago Nero avrebbe restituito ciò che il Drago Rosso aveva tolto a Casa Osgrey, e di come li uccise. Tutto ciò che posso fare è restare in un silenzio attonito mentre apprendo che il mio signore fu un traditore. [Select_CString(rohanne.IsFemale,'Lei','Lui')] mi strappa infine al mio torpore: "Andatevene, ser, e sappiate che difenderò le mie terre e il mio fossato con #italic fuoco e spada!#!""
  agot_scenario_ats.3031.a:0 "Temo ciò che nascerà dall'ira della Vedova."
  agot_scenario_ats.3031.a.tt:0 "Attenderai di vedere che cosa accadrà"
  
  agot_scenario_ats.4010.t:0 "Un Cielo in Fiamme"
  agot_scenario_ats.4010.desc:0 "Voci concitate e una luce intensa mi destano dal sonno. Esco e supero un gruppo di guardie del castello per vedere ciò che sembra il sole che sorge a est. In un istante, il fumo che s'alza e il ruggire delle fiamme smentiscono quell'illusione.\n\nIl Bosco di Wat brucia e, se il vento cambia, i nostri campi non tarderanno a seguirlo."
  agot_scenario_ats.4010.a:0 "Ne daranno la colpa a me."
  agot_scenario_ats.4010.a.tt:0 "Ci si aspetterà che tu raggiunga il fiume, poiché Standfast ti riterrà responsabile"
  
  ##########
  # Eustace #
  ##########
  
  # Eustace is confronted by Dunk
  # Available scopes: dunk/rohanne
  cagot_scenario_ats.5010.t:0 "Tra le Ceneri"
  agot_scenario_ats.5010.desc.dunkstayed:0 "I miei esploratori riferiscono che Ser [eustace.GetFirstName] sta radunando le [Select_CString(eustace.IsFemale,'sue truppe','sue truppe')] e i [Select_CString(eustace.IsFemale,'suoi cavalieri erranti','suoi cavalieri erranti')] sulla scia dell'incendio nel Bosco di Wat. Ho due strade dinanzi a me: marciare su Standfast e fare guerra, oppure incontrarli al torrente che ci separa e accettare un parlamento.\n\nVi è poco onore nel fare guerra adesso, ma potrei impadronirmi di Standfast prima che [Select_CString(eustace.IsFemale,'lei','lui')] abbia il tempo di reagire.\n\nUn parlamento mi offrirebbe la possibilità di chiedere un Singolar Tenzone e, forse, di liberarmi del Longinch, soprattutto se [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] fosse disposto a combattere. In ogni caso, i miei cavalieri attendono la mia decisione."
  agot_scenario_ats.5010.desc.dunkleft:0 "I miei esploratori riferiscono che Ser [eustace.GetFirstName] sta radunando le [Select_CString(eustace.IsFemale,'sue truppe','sue truppe')] e i [Select_CString(eustace.IsFemale,'suoi cavalieri erranti','suoi cavalieri erranti')] sulla scia dell'incendio in [wats_wood]. Ho due strade dinanzi a me: marciare su Standfast e fare guerra, oppure incontrarli al torrente che ci separa e accettare un parlamento.\n\nVi è poco onore nel fare guerra adesso, ma potrei impadronirmi di Standfast prima che [Select_CString(eustace.IsFemale,'lei','lui')] abbia il tempo di reagire.\n\nUn parlamento mi offrirebbe la possibilità di chiedere un Singolar Tenzone e, forse, di liberarmi del Longinch. In ogni caso, i miei cavalieri attendono la mia decisione."
  agot_scenario_ats.5010.a:0 "Cavalchiamo verso il torrente!"
  agot_scenario_ats.5010.a.tt:0 "Incontrerai Ser [eustace.GetFirstNameNoTooltip] e [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip]"
  agot_scenario_ats.5010.b:0 "Cavalchiamo in guerra! Con fuoco e spada!"
  agot_scenario_ats.5010.c:0 "Cavalchiamo verso il torrente!"
  agot_scenario_ats.5010.c.tt:0 "Incontrerai Ser [eustace.GetFirstNameNoTooltip]"
  
  agot_scenario_ats.5011.t:0 "Il Parlamento"
  agot_scenario_ats.5011.desc:0 "[longinch.GetFirstNameNicknamed], i miei cavalieri e io arriviamo e troviamo [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] e Ser [eustace.GetFirstName] in attesa sull'altra riva del torrente. Ser [eustace.GetFirstNameNoTooltip] non perde tempo e mi attribuisce subito l'incendio del Bosco di Wat. «Guardate i miei campi, così aridi; sarei stata una sciocca ad appiccare quell'incendio,» ribatto, ma [Select_CString(eustace.IsFemale,'lei','lui')] non vuole sentir ragioni. Per [Select_CString(eustace.IsFemale,'lei','lui')], io sono la malvagia Vedova Rossa di Fossafredda, artefice di empie magie.\n\n[dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip] mi fa cenno d'avvicinarmi e ci incontriamo nel mezzo del torrente, dove nessuno, tranne noi, potrà udirci. [Select_CString(dunk.IsFemale,'Lei','Lui')] estrae un piccolo anello che reca un sigillo: quattro draghi squartati che sputano fuoco, ciascuno con tre teste. Il sigillo di [maekar.Custom('IT_NAM_COL2')][maekar.GetTitledFirstName] di Sala dell'Estate. Lo scudiero di [dunk.GetFirstNamePossessiveNoTooltip] è figlio del principe, e schiacciarli ora potrebbe attirarmi la sua ira — e io preferirei essere amica d'un drago. Eppure non posso cedere tanto facilmente, o i miei nemici mi crederanno debole, oltre ad avermi accusata d'un crimine atroce.\n\nCol rumore del torrente che mi riempie l'udito, getto uno sguardo a [longinch.GetFirstName] e capisco che questa potrebbe essere la mia occasione. Un Singolar Tenzone per provare la mia innocenza riguardo all'incendio."
  agot_scenario_ats.5011.a:0 "Esigo un Singolar Tenzone! [longinch.GetFirstNameNoTooltip] sarà il mio campione!"
  agot_scenario_ats.5011.a.tt:0 "Esigerai un Singolar Tenzone da Eustace"
  agot_scenario_ats.5011.b:0 "Non vi sarà alcun processo, in guerra!"
  agot_scenario_ats.5011.c:0 "Ammetto la mia colpa e rimuoverò la diga."
  agot_scenario_ats.5011.c.tt:0 "Cederai e potresti apparire debole"
  
  agot_scenario_ats.5012.t:0 "Il Parlamento"
  agot_scenario_ats.5012.desc:0 "Quando io e i miei cavalieri arriviamo al torrente, troviamo Ser [eustace.GetFirstName] in attesa sull'altra riva, solo con pochi contadini appena armati. «So che siete stata voi ad appiccare l'incendio, strega! Con qualche oscura magia!» grida [Select_CString(eustace.IsFemale,'lei','lui')] al di sopra dello scroscio dell'acqua.\n\n«Guardate i miei campi, così aridi; sarei stata una sciocca ad appiccare quell'incendio,» ribatto, ma [eustace.GetFirstNameNoTooltip] non vuole sentir ragioni. Per [Select_CString(eustace.IsFemale,'lei','lui')], io sono la malvagia Vedova Rossa di Fossafredda, artefice di empie magie.\n\nSer [eustace.GetFirstNameNoTooltip] sguaina la [Select_CString(eustace.IsFemale,'sua spada','sua spada')] e aspetta che attraversiamo. Potrei avanzare col mio esercito, e vi sarebbero ben poche possibilità che Standfast resista, ma disonorerei il mio amico d'infanzia... il mio dolce [addam.GetFirstName].\n\nGetto uno sguardo a [longinch.GetFirstNameNicknamed] e un piano comincia a prendere forma. Potrei evitare una battaglia esigendo un Singolar Tenzone per i crimini che mi vengono imputati. Una raffica di pensieri mi attraversa la mente...\n\nUna battaglia sarebbe più rapida, ma più sanguinosa. Il mio campione potrebbe vincere il duello e io non guadagnerei nulla se non una vecchia torre. D'altra parte, forse dovrei cedere, e torneremmo a dividere l'acqua in questo tempo di siccità. #italic Qualunque sia la scelta, dev'essere presa #bold ora#!.#!"
  agot_scenario_ats.5012.a:0 "Esigo un Singolar Tenzone! Ser [longinch.GetFirstNameNoTooltip] sarà il mio campione!"
  agot_scenario_ats.5012.a.tt:0 "Esigerai un Singolar Tenzone da Eustace"
  agot_scenario_ats.5012.b:0 "Non vi sarà alcun processo, in guerra!"
  agot_scenario_ats.5012.c:0 "Ammetto la mia colpa e rimuoverò la diga."
  agot_scenario_ats.5012.c.tt:0 "Cederai e potresti apparire debole"
  
  agot_scenario_ats.5013.t:0 "L'Ira del Leone"
  agot_scenario_ats.5013.desc:0 "Nonostante i miei tentativi di pazienza e ragionevolezza, Ser [eustace.GetFirstName] ha insistito nel prendere le armi contro di me. Purtroppo per [Select_CString(eustace.IsFemale,'lei','lui')], non verrò più soltanto per l'acqua: annienterò quel poco che resta di Casa Osgrey!\n\nCasa Webber cancellerà una volta per tutte la macchia scaccata dall'Altopiano."
  agot_scenario_ats.5013.desc.eustacerefused:0 "Ser [eustace.GetFirstName] ha rifiutato la richiesta di Singolar Tenzone e ha insistito nel prendere le armi contro di me. Purtroppo per [Select_CString(eustace.IsFemale,'lei','lui')] non verrò più soltanto per l'acqua: annienterò quel poco che resta di Casa Osgrey.\n\nCasa Webber cancellerà una volta per tutte la macchia scaccata dall'Altopiano."
  agot_scenario_ats.5013.a:0 "Con fuoco e spada! In guerra!"
  agot_scenario_ats.5013.a.tt:0 "Combatterai una guerra contro Eustace"
  
  agot_scenario_ats.5014.t:0 "Una Prova di Sangue"
  agot_scenario_ats.5014.desc:0 "Ser [eustace.GetFirstName] ha inviato una richiesta: un Singolar Tenzone. Se il mio campione dovesse perdere, rimuoverò la diga sul Chequy Water e sarò dichiarata colpevole per l'incendio del Bosco di Wat.\n\nOrmai resta ben poca scelta se non accettare."
  agot_scenario_ats.5014.a:0 "[longinch.GetFirstNameNicknamed] sarà il mio campione."
  agot_scenario_ats.5014.a.tt:0 "Il Longinch prenderà parte a un Singolar Tenzone"
  
  agot_scenario_ats.5020.t:0 "Tra le Ceneri"
  agot_scenario_ats.5020.desc.dunkstayed:0 "Gran parte del Bosco di Wat è ormai ridotta in cenere e, senza pioggia, passerà molto tempo prima che si riprenda. Sono quasi certo che sia stata la Vedova Rossa di Fossafredda a farlo, servendosi di qualche magia infernale per trarre vantaggio dalla lunga siccità. [Select_CString(rohanne.IsFemale,'Lei','Lui')] marcerà ora sulle mie terre, lasciandomi soltanto due scelte:\n\nPosso marciare in guerra — senza alleati e con poche truppe al mio comando — e sperare che il leone scaccato abbia ancora qualche morso. Oppure posso incontrarla e tentare un parlamento. [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] ritiene che dovrei scegliere questa seconda via e vedere quale accordo si possa stringere. [Select_CString(dunk.IsFemale,'È','È')] giovan[Select_CString(dunk.IsFemale,'e','e')], con ben poca conoscenza della vera crudeltà del mondo, ma potrebbe nondimeno avere ragione.\n\nDevo scegliere ora, però, poiché una guerra più tardi avrebbe ancor meno speranza di vittoria."
  agot_scenario_ats.5020.desc.dunkleft:0 "Gran parte del Bosco di Wat è ormai ridotta in cenere e, senza pioggia, passerà molto tempo prima che si riprenda. Sono quasi certo che sia stata la Vedova Rossa di Fossafredda a farlo, servendosi di qualche magia infernale per trarre vantaggio dalla lunga siccità. [Select_CString(rohanne.IsFemale,'Lei','Lui')] marcerà ora sulle mie terre, lasciandomi soltanto due scelte:\n\nPosso marciare in guerra — senza alleati e con poche truppe al mio comando — e sperare che il leone scaccato abbia ancora gli artigli. Oppure posso incontrarla e tentare un parlamento. [addam.GetFirstName] mi avrebbe consigliato di parlamentare, se non altro per l'amicizia che lo legava a [Select_CString(rohanne.IsFemale,'lei','lui')]. Onorarne la memoria potrebbe essere anche la scelta più saggia, poiché forse si potrebbe stringere un accordo capace di salvare le mie terre e quel che resta della mia casata.\n\nDevo scegliere ora, però, poiché una guerra più tardi avrebbe ancor meno speranza di vittoria."
  agot_scenario_ats.5020.a:0 "Incontreremo questa strega al torrente e tenteremo un accordo."
  agot_scenario_ats.5020.a.tt:0 "Incontrerai [rohanne.GetNameNoTooltip] al Chequy Water"
  agot_scenario_ats.5020.b:0 "Mostrerò a tutti che il leone scaccato ha ancora gli artigli!"
  
  agot_scenario_ats.5021.t:0 "Il Parlamento"
  agot_scenario_ats.5021.desc:0 "[dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstName] e io siamo giunti alla riva del Chequy Water. Non passa molto prima che [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] compaia sull'altra sponda, vestita di seta come un ragno e d'armatura a scaglie sul dorso d'un grande destriero nero. I cavalieri di [Select_CString(rohanne.IsFemale,'lei','lui')] la circondano, apparentemente pronti alla guerra. La sola vista della Vedova Rossa fa ribollire il mio vecchio sangue e, prima ancora di riflettere, mi ritrovo a gridare le mie accuse.\n\n«Perché mai dovrei appiccare un incendio così vicino alle mie stesse terre, ser?» Prima che io possa ribattere alla sua risposta con una mia, [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] avanza al trotto, chiedendo d'incontrare la Vedova Rossa nel mezzo del torrente.\n\nGlielo permetto, sperando che la sua testa sia più fredda della mia. Mentre i due s'incontrano in mezzo al corso d'acqua, ansimo quando [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip] estrae il coltello... per poi tagliarsi il volto con la lama. I due terminano il loro colloquio e il mio cavaliere errante fa ritorno da me.\n\n[rohanne.GetTitledFirstNameNoTooltip] ha chiesto un Singolar Tenzone per le mie accuse, dice [Select_CString(dunk.IsFemale,'lei','lui')], invitandomi a scegliere il mio campione. Questa è un'occasione per porre fine all'intera contesa senza guerra, e potrebbe essere per mia stessa mano, anche se forse [dunk.GetTitledFirstNameNoTooltip] sarebbe la scelta migliore."
  agot_scenario_ats.5021.a:0 "[dunk.GetTitledFirstNameNoTooltip] sarà il mio campione."
  agot_scenario_ats.5021.a.tt:0 "Farai combattere [dunk.GetFirstNameNoTooltip] nel Singolar Tenzone"
  agot_scenario_ats.5021.b:0 "Combatterò per me stesso!"
  agot_scenario_ats.5021.b.tt:0 "Combatterai nel Singolar Tenzone"
  agot_scenario_ats.5021.c:0 "Al diavolo il processo, attaccate!"
  agot_scenario_ats.5021.c.tt:0 "Andrai in guerra contro [rohanne.GetFullNameNoTooltip]"
  
  agot_scenario_ats.5022.t:0 "Il Parlamento"
  agot_scenario_ats.5022.desc:0 "Sono giunto alla riva del Chequy Water, solo con pochi dei miei contadini levati. Non passa molto prima che [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] compaia sull'altra sponda, vestita di seta come un ragno e d'armatura a scaglie sul dorso d'un grande destriero nero. I cavalieri di [Select_CString(rohanne.IsFemale,'lei','lui')] la circondano, apparentemente pronti alla guerra. La sola vista della Vedova Rossa fa ribollire il mio vecchio sangue e, prima ancora di riflettere, mi ritrovo a gridare le mie accuse.\n\n[rohanne.GetTitledFirstNameNoTooltip] le nega, sostenendo che avrebbe ben poco senso per [Select_CString(rohanne.IsFemale,'lei','lui')] appiccare l'incendio così vicino ai [Select_CString(rohanne.IsFemale,'suoi campi','suoi campi')], anche se faccio fatica a crederlo.\n\nPassiamo un breve tempo a discutere prima di giungere al vero scopo di questo incontro: [ rohanne.GetTitledFirstNameNoTooltip ] chiede un Singolar Tenzone per le mie accuse e per risolvere il cattivo sangue fra noi, invitandomi a scegliere il mio campione. Questa è un'occasione per ottenere vittoria in questa faida, e farlo di mia stessa mano. Oppure potrei tentare di colpire adesso con le mie poche truppe, mentre non se l'aspettano."
  agot_scenario_ats.5022.a:0 "Affronterò il vostro campione!"
  agot_scenario_ats.5022.a.tt:0 "Combatterai in un Singolar Tenzone"
  agot_scenario_ats.5022.b:0 "Al diavolo il processo, attaccate!"
  agot_scenario_ats.5022.b.tt:0 "Andrai in guerra contro [rohanne.GetFullNameNoTooltip]"
  
  # Rohanne started a war with Eustace (Eustace POV)
  agot_scenario_ats.5024.t:0 "Fuoco e Spada"
  agot_scenario_ats.5024.desc:0 "La Vedova Rossa mi ha dichiarato guerra! Dubito che il nostro signore verrà in mio aiuto, dunque spetta a me e ai miei difenderci.\n\nMostrerò a tutti che il leone scaccato ha ancora gli artigli!"
  agot_scenario_ats.5024.a:0 "In guerra!"
  agot_scenario_ats.5024.a.tt:0 "Avrà inizio una guerra"
  
  agot_scenario_ats.5025.t:0 "Duello sull'Acqua"
  agot_scenario_ats.5025.desc:0 "[rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] ha chiesto un Singolar Tenzone per risolvere tanto le accuse riguardo all'incendio del Bosco di Wat quanto la faida tra noi. Benché sia difficile fidarsi di [Select_CString(rohanne.IsFemale,'lei','lui')], ben pochi oserebbero sfidare la volontà degli dèi in un Singolar Tenzone.\n\nLa decisione, dunque, spetta a me: o scelgo un campione, oppure sguainiamo le spade per la guerra."
  agot_scenario_ats.5025.desc.dunkrefused:0 "Nonostante il suo giuramento di servizio nei miei confronti e il suo presunto onore, [Select_CString(dunk.IsFemale,'lei','lui')] ha rifiutato di combattere in mio nome. Ora ho ben poca scelta: devo affrontare io stesso il campione di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstNamePossessive], oppure marciare in guerra per ottenere soddisfazione.\n\nDunque, devo muovere guerra alla Vedova Rossa? Oppure sguainare la mia vecchia spada un'ultima volta?"
  agot_scenario_ats.5025.a:0 "Affronterò il vostro campione!"
  agot_scenario_ats.5025.a.tt:0 "Combatterai nel Singolar Tenzone"
  agot_scenario_ats.5025.b:0 "Farò combattere [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip] in mio nome."
  agot_scenario_ats.5025.b.tt:0 "Dunk combatterà nel Singolar Tenzone"
  agot_scenario_ats.5025.c:0 "Al diavolo il processo, attaccate!"
  agot_scenario_ats.5025.c.tt:0 "Andrai in guerra contro [rohanne.GetFullNameNoTooltip]"
  
  agot_scenario_ats.5026.t:0 "Una Faida Risolta"
  agot_scenario_ats.5026.desc:0 "Un messaggero giunge da Fossafredda: [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] ha chiesto che la nostra faida abbia fine e ha compiuto il passo di rimuovere la diga dal Chequy Water. Questo salverà le mie terre dalla siccità, a rischio delle [Select_CString(rohanne.IsFemale,'sue','sue')].\n\nForse mi sbagliavo sulla Vedova Rossa, forse è tempo di lasciarsi il passato alle spalle. L'acqua resterà scarsa, ancor più per [rohanne.GetTitledFirstNameNoTooltip] senza la diga a trattenerla, ma le nostre possibilità sono ora di molto migliorate."
  agot_scenario_ats.5026.a:0 "Il mio Chequy Water è tornato."
  agot_scenario_ats.5026.a.tt:0 "La diga viene rimossa, anche se l'acqua resta scarsa"
  
  agot_scenario_ats.5030.t:0 "Il Parlamento"
  agot_scenario_ats.5030.desc:0 "Il nostro misero seguito giunge al torrente, soltanto per non trovarvi nessuno in attesa. Getto uno sguardo a Egg, ma il ragazzo ha tenuto il capo chino per tutta la mattina. #italic Lo farei anch'io, se fossi al suo posto.#!\n\nNon molto dopo, [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] arriva con al seguito i suoi cavalieri. Ser [eustace.GetFirstNameNoTooltip] non tarda a gridare le proprie accuse, benché la Vedova Rossa neghi qualunque coinvolgimento nel rovinoso incendio. Prima che la situazione degeneri oltre, sprono il mio destriero in avanti, chiedendo a [rohanne.GetFirstNameNoTooltip] d'incontrarmi da sola nel mezzo del torrente. Cavalieri e fanti si scambiano sguardi confusi mentre avanzo tra gli spruzzi del Chequy Water.\n\nQuando [Select_CString(rohanne.IsFemale,'lei','lui')] mi raggiunge al centro del torrente, le mostro l'anello col sigillo del padre di Egg. Ben pochi oserebbero mettersi contro il figlio d'un principe Targaryen, dopotutto. Benché [Select_CString(rohanne.IsFemale,'lei','lui')] comprenda la gravità di quell'anello, [Select_CString(rohanne.IsFemale,'lei','lui')] non può nemmeno permettersi di apparire debole.\n\nCon rapidità estraggo il pugnale dal fodero e me lo passo netto sulla guancia. Il sangue gocciola nel torrente sottostante, ma dal volto di [rohanne.GetTitledFirstNamePossessiveNoTooltip] capisco d'averla colpita e d'aver compensato la ferita inflitta al contadino.\n\nOra dobbiamo affrontare le accuse: [Select_CString(rohanne.IsFemale,'lei','lui')] offre un Singolar Tenzone con uno sguardo compiaciuto rivolto a Ser [longinch.GetFirstNameNicknamed]."
  agot_scenario_ats.5030.a:0 "Accettiamo, e combatterò io come campione di Ser [eustace.GetFirstNamePossessiveNoTooltip]!"
  agot_scenario_ats.5030.a.tt:0 "Combatterai nel Singolar Tenzone"
  agot_scenario_ats.5030.b:0 "Devo lasciare la decisione a Ser [eustace.GetFirstNameNoTooltip]."
  agot_scenario_ats.5030.b.tt:0 "Lascerai decidere [eustace.GetFirstNameNoTooltip]"
  
  agot_scenario_ats.5031.t:0 "Duello sull'Acqua"
  agot_scenario_ats.5031.desc:0 "Vi sarà un Singolar Tenzone nel torrente, un duello tra cavalieri per decidere la fine di questa faida. Devo decidere se accetterò di combattere in nome di Ser [eustace.GetFirstName], oppure se lasciare che sia [Select_CString(eustace.IsFemale,'lei','lui')] a combattere per sé contro qualunque campione scelga [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName]."
  agot_scenario_ats.5031.a:0 "Sarò io il vostro campione."
  agot_scenario_ats.5031.a.tt:0 "Combatterai nel Singolar Tenzone"
  agot_scenario_ats.5031.b:0 "Il leone scaccato dovrebbe combattere le proprie battaglie."
  agot_scenario_ats.5031.b.tt:0 "Rifiuterai di combattere nel Singolar Tenzone"
  
  agot_scenario_ats.5032.t:0 "Duello sull'Acqua"
  agot_scenario_ats.5032.desc:0 "Nonostante l'età di [eustace.GetFirstName] e il mio giuramento di servizio, Ser [eustace.GetFirstName] ha scelto di combattere come proprio campione nel prossimo Singolar Tenzone.\n\nOra non posso far altro che guardare e sperare che il mio [eustace.GetLadyLord] esca vittorioso dal torrente."
  agot_scenario_ats.5032.a:0 "Guarderò il duello."
  agot_scenario_ats.5032.a.tt:0 "Sarai informato dell'esito del duello."
  
  agot_scenario_ats.6010.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6010.desc:0 "[dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] e Ser [longinch.GetFirstNameNicknamed] giacciono inerti nell'acqua, mentre il sangue sgorga da una ferita appena sotto il braccio del Longinch. [dunk.GetTitledFirstNameNoTooltip] ha vinto, ma [Select_CString(dunk.IsFemale,'si è ritrovata','si è ritrovato')] i polmoni pieni d'acqua per questo.\n\nEssere ritenuta colpevole dell'incendio del Bosco di Wat è un problema, sì, ma impallidisce di fronte alla possibilità di liberarmi del Longinch e rendermi libera.\n\nTutti aspettiamo che [dunk.GetTitledFirstNameNoTooltip] si levi dall'acqua, ma vi sono ben pochi movimenti. Il mio maestro accorre in avanti, un Uomo di Ferro avvezzo a salvare gli annegati."
  agot_scenario_ats.6010.a:0 "[Select_CString(dunk.IsFemale,'Lei','Lui')] guarirà a Fossafredda!"
  agot_scenario_ats.6010.a.tt:0 "Ora potrai scegliere un marito per te stessa"
  
  agot_scenario_ats.6011.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6011.desc:0 "Ser [longinch.GetFirstNameNicknamed] esce a fatica dal torrente, ansimando in cerca d'aria, mentre il corpo inerte di Ser [longinch_opponent.GetFirstNameNicknamed] galleggia insanguinato e spezzato sulla superficie dell'acqua. Non provo alcun affetto per il Longinch — anzi, avevo perfino sperato che [Select_CString(longinch.IsFemale,'lei','lui')] morisse in questo duello — ma almeno ora la via è sgombra perché io possa prendere Standfast.\n\nResta ben poco a fermarmi e avrei il sostegno del mio signore. Non mi resta che cavalcare laggiù e prenderla."
  agot_scenario_ats.6011.a:0 "Inviate la richiesta a Ser [eustace.GetFirstNameNoTooltip], Standfast è mia."
  agot_scenario_ats.6011.a.tt:0 "Rivendicherai Standfast, anche se [eustace.GetFirstName] potrebbe rifiutare"
  agot_scenario_ats.6011.b:0 "Standfast è mia."
  agot_scenario_ats.6011.b.tt:0 "Diventerai il nuovo signore di Standfast"
  
  eustace_gave_up_standfast:0 "Ser [eustace.GetFirstName] mi ha ceduto Standfast!"
  
  agot_scenario_ats.6012.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6012.desc:0 "Ser [eustace.GetFirstName] esce a fatica dal torrente, ansimando in cerca d'aria, mentre il corpo inerte del [longinch.GetName] riempie il torrente di sangue. Sono colpevole, agli occhi degli dèi e degli uomini, d'aver appiccato l'incendio del Bosco di Wat, che sia vero oppure no.\n\nSer [eustace.GetFirstNameNoTooltip] quasi certamente pretenderà ora che io rimuova la diga e avrò ben poca scelta, anche se almeno, con la morte di Ser [longinch.GetFirstName], il testamento di mio padre desta assai meno preoccupazione."
  agot_scenario_ats.6012.a:0 "Vedremo che cosa pretenderà davvero [eustace.GetFirstNameNoTooltip]."
  agot_scenario_ats.6012.a.tt:0 "Conoscerai le richieste di Eustace"
  
  agot_scenario_ats.6013.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6013.desc:0 "I corpi senza vita di [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] e di Ser [longinch.GetFirstNameNicknamed] restano sospesi nelle acque basse del torrente, mentre il sangue cola da numerose ferite e si mescola alle acque torbide. La mia colpa non è stata provata, né la mia innocenza, ma la questione è ormai risolta quanto più può esserlo.\n\nCon il Longinch scomparso sarò libera di scegliere il mio sposo e, senza prove dinanzi agli dèi e agli uomini, per Ser [eustace.GetFirstName] sarà difficile accusarmi dell'incendio del Bosco di Wat.\n\nOra non resta che risolvere il testamento di mio padre e andare avanti."
  agot_scenario_ats.6013.a:0 "Una fine tragica, ma necessaria."
  agot_scenario_ats.6013.a.tt:0 "Passerai alla scelta d'un marito"
  
  agot_scenario_ats.6014.t:0 "La Richiesta"
  agot_scenario_ats.6014.desc:0 "Dopo la sconfitta del mio campione nel Singolar Tenzone al torrente, Ser [eustace.GetFirstName] mi ha inviato una richiesta di rimuovere la diga. Farlo, persino adesso, potrebbe comunque farmi apparire debole. Inoltre, ciò disperderebbe la nostra riserva d'acqua in un tempo di siccità.\n\nRifiutare questa richiesta significherebbe, in sostanza, dichiarare guerra, dunque devo ponderare con cura la mia prossima mossa."
  agot_scenario_ats.6014.a:0 "E va bene, rimuoverò la diga."
  agot_scenario_ats.6014.a.tt:0 "Rimuoverai la diga e apparirai debole"
  agot_scenario_ats.6014.b:0 "Sembrerò traditrice prima di sembrare debole!"
  
  agot_scenario_ats.6020.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6020.desc:0 "[dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] e Ser [longinch.GetFirstNameNicknamed] giacciono inerti nell'acqua, mentre il sangue sgorga da una ferita appena sotto il braccio del Longinch. [dunk.GetTitledFirstNameNoTooltip] ha vinto, ma [Select_CString(dunk.IsFemale,'si è ritrovata','si è ritrovato')] i polmoni pieni d'acqua per questo.\n\nOra che [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] è stata riconosciuta colpevole dell'incendio del Bosco di Wat, ho la leva che mi serve per pretendere che la diga venga abbattuta e che il mio Chequy Water torni a scorrere!"
  agot_scenario_ats.6020.a:0 "È tempo d'inviare la mia richiesta, la diga deve cadere!"
  agot_scenario_ats.6020.a.tt:0 "Pretenderai che [rohanne.GetFullNameNoTooltip] abbatta la diga"
  
  agot_scenario_ats.6021.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6021.desc:0 "Ser [longinch.GetFirstNameNicknamed] esce dal torrente, lasciandosi dietro il corpo inerte di [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed], che sanguina nel corso d'acqua. Sento lacrime involontarie scendermi lungo le guance; avevo detto al ragazzo che, se mia figlia fosse stata ancora in vita, mi sarebbe piaciuto darla in sposa a [Select_CString(dunk.IsFemale,'lei','lui')], e ora [Select_CString(dunk.IsFemale,'lei','lui')] è con lei e con il resto della mia casata nell'aldilà. Egg, il giovane scudiero, piange accanto a me mentre [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] posa un lungo sguardo sul corpo del valoroso cavaliere.\n\n[Select_CString(rohanne.IsFemale,'Lei','Lui')] è ormai libera dalle mie accuse ed è in una posizione forte per prendersi le mie terre, se così [Select_CString(rohanne.IsFemale,'le','gli')] aggrada. Dovrò sperare che quella richiesta non giunga, oppure affidarmi alla forza delle mie armi per affrontarla."
  agot_scenario_ats.6021.a:0 "Addio, [dunk.GetTitledFirstNameNoTooltip]..."
  agot_scenario_ats.6021.a.tt:0 "Attenderai ciò che verrà"
  
  agot_scenario_ats.6022.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6022.desc:0 "Mi aggrappo alle sponde del torrente, trascinandomi fuori dall'acqua e strappandomi l'elmo dal capo. Vedo il cadavere insanguinato di Ser [longinch.GetFirstNameNicknamed] galleggiare nell'acqua bassa, mentre il sangue sgorga dalla ferita all'ascella che ha posto fine al nostro duello.\n\n[rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] osserva mentre il corpo viene tratto fuori dal torrente, poi ci separiamo ciascuno per la propria strada. Ora che le mie accuse sono state provate dinanzi agli dèi e agli uomini, posso finalmente pretendere senza indugio che la diga venga rimossa e che l'acqua torni a scorrere verso le mie terre!"
  agot_scenario_ats.6022.a:0 "Abbattete quella diga!"
  agot_scenario_ats.6022.a.tt:0 "Pretenderai che la diga venga rimossa dal Chequy Water" 
  
  # Eustace result if both dunk and longinch die
  # Available scopes: rohanne/dunk/longinch
  agot_scenario_ats.6023.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6023.desc:0 "Sia [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed] sia Ser [longinch.GetFirstNameNicknamed] galleggiano nel torrente, insanguinati e spezzati. [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] fa recuperare dai suoi uomini il corpo di Ser [longinch.GetFirstNameNoTooltip], mentre lo scudiero Egg mi aiuta a raccogliere il corpo di [dunk.Custom('IT_NAM_COL2')][dunk.GetTitledFirstNameNoTooltip].\n\nCiascuno di noi ha cercato di dimostrare le proprie ragioni in questo Singolar Tenzone, e ora due cavalieri sono morti senza che nulla sia divenuto più vero agli occhi degli dèi e degli uomini. Senza prove non posso accusare [rohanne.GetTitledFirstNameNoTooltip] di alcunché, e il sospetto impedirà senz'altro a [Select_CString(rohanne.IsFemale,'lei','lui')] di muoversi contro di me adesso."
  agot_scenario_ats.6023.a:0 "Che spreco d'un buon cavaliere..."
  agot_scenario_ats.6023.a.tt:0 "Farai ritorno a Standfast"
  
  agot_scenario_ats.6024.t:0 "Veleno e Artigli"
  agot_scenario_ats.6024.desc:0 "Nonostante la sua sconfitta nel Singolar Tenzone, [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] non soltanto ha rifiutato la mia richiesta di rimuovere la diga sul Chequy Water, ma ha anche rivendicato le terre che ancora mi restano e marciato con un esercito per prendersele.\n\nOrmai non mi resta che dimostrare d'avere ancora gli artigli sul campo di battaglia e far guerra a questa Vedova Rossa finché uno di noi non conosca il morso della sconfitta!"
  agot_scenario_ats.6024.a:0 "Questo Leone mostrerà gli artigli!"
  agot_scenario_ats.6024.a.tt:0 "Combatterai [rohanne.GetFullNameNoTooltip] in una guerra per la sua pretesa sulle tue terre"
  
  agot_scenario_ats.6025.t:0 "Una Torre Assediata"
  agot_scenario_ats.6025.desc:0 "Con la mia sconfitta nel Singolar Tenzone e la perdita di ciò che resta della mia dignità, sono costretto a considerare la richiesta di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstNameNoTooltip] riguardo a Standfast. Potrei combattere per l'ultimo residuo dell'antico diritto della mia Casata su queste terre, e con ogni probabilità morire nel tentativo di conservarlo, trascinando con me forse centinaia del mio stesso popolo.\n\nForse sarebbe meglio, allora, fare ciò che avrei dovuto fare quando perdemmo al [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )]: abbandonare tutto e prendere la via del mercenario, come fece [bittercringe.GetNickname]. Forse potrei perfino unirmi alla sua compagnia, se davvero se n'è formata una, e impugnare ancora le armi coi Draghi Neri rimasti, come un tempo feci con Daemon.\n\nLa decisione va presa ora: combattere per il passato, o partire verso un futuro nuovo?"
  agot_scenario_ats.6025.a:0 "Non cederò ancora le ossa dei miei avi!"
  agot_scenario_ats.6025.a.tt:0 "Combatterai una guerra per Standfast"
  agot_scenario_ats.6025.b:0 "Tieni pure questa vecchia torre, io troverò una nuova strada."
  agot_scenario_ats.6025.b.tt:0 "Diventerai un avventuriero senza terre"
  
  agot_scenario_ats.6030.t:0 "Una Vittoria Dolorosa"
  agot_scenario_ats.6030.desc:0 "Mi desto in un castello che non è il mio, con una cicatrice che mi segna il volto e ossa rotte e lividi su tutto il corpo. Ho vinto il Singolar Tenzone e ci si aspetta che la pace possa essere negoziata. Un maestro si prende cura di me mentre le mie ferite si rimarginano e mi informa che Ser [eustace.GetFirstName] e [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] sono proprio nel mezzo di quelle trattative, e che, una volta ristabilito, sarò libero di andare dove vorrò. Col passare dei giorni, [rohanne.GetTitledFirstNameNoTooltip] evita a quanto pare di farmi visita, poiché non la vedo mai per tutta la durata della mia permanenza.\n\nLa mia amarezza cresce, mentre Egg resta saldo al mio fianco e mi aiuta nella guarigione in ogni modo possibile. Tutto quel dolore, tutta quella lotta e tutto quel tira e molla soltanto per giungere a un accordo che un solo incontro avrebbe potuto ottenere.\n\nQualunque sia l'esito di queste trattative, so che devo insegnare a Egg il valore della gente comune, che non è fatta di semplici pezzi da usare nei giochi dei nobili e che l'orgoglio non è una scusa sufficiente per infliggere tanta sofferenza."
  agot_scenario_ats.6030.a:0 "Attenderemo l'esito delle trattative, poi andremo avanti."
  agot_scenario_ats.6030.a.tt:0 "Attenderai di vedere se scoppierà una guerra o se verrà conclusa la pace"
  
  agot_scenario_ats.6031.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6031.desc:0 "Ser [eustace.GetFirstNameNicknamed] esce a fatica dal torrente e si gode la propria vittoria, mentre il corpo del suo avversario sanguina nell'acqua alle sue spalle. [Select_CString(eustace.IsFemale,'Lei','Lui')] mi sorride, poi lascia sfuggire un sospiro di sollievo, sapendo che presto il Chequy Water tornerà a scorrere libero.\n\nDopo un ultimo, struggente sguardo verso [rohanne.Custom('IT_NAM_COL4')][rohanne.GetTitledFirstName], mi lascio il torrente alle spalle e ritorno a Standfast."
  agot_scenario_ats.6031.a:0 "Ora la diga cadrà di certo."
  agot_scenario_ats.6031.a.tt:0 "Attenderai di vedere se [rohanne.GetTitledFirstNameNoTooltip] accetterà l'esito del duello"
  
  agot_scenario_ats.6032.t:0 "Sangue nell'Acqua"
  agot_scenario_ats.6032.desc:0 "Ser [longinch.GetFirstNameNicknamed] esce dal torrente, lasciandosi alle spalle il corpo inerte di Ser [eustace.GetFirstNameNicknamed], che sanguina nell'acqua dietro [Select_CString(longinch.IsFemale,'di lei','di lui')]. Sento la colpa lacerarmi il cuore mentre il corpo sbatte contro il margine del torrente. Mi volto a guardare [rohanne.Custom('IT_NAM_COL4')][rohanne.GetTitledFirstName], aspettandomi di vedere un sorriso soddisfatto sul suo bel volto. Invece vi scorgo malinconia e, forse, persino dolore.\n\n[Select_CString(rohanne.IsFemale,'Lei','Lui')] è ora libera da ogni accusa e di prendere l'ultima parte delle terre del leone scaccato. Mentre Egg ed io ci lasciamo alle spalle l'acqua e facciamo ritorno a Standfast, sento le lacrime scendermi sul viso per la morte del vecchio cavaliere."
  agot_scenario_ats.6032.a:0 "Addio, Ser [eustace.GetFirstNameNoTooltip]..."
  agot_scenario_ats.6032.a.tt:0 "Attenderai ciò che verrà"
  
  agot_scenario_ats.7010.t:0 "Rose d'Estate"
  agot_scenario_ats.7010.desc.start:0 "Ora che le recenti ostilità sono alle spalle e il testamento di mio padre incombe dinanzi a me, è tempo di trovare un altro marito.\n\n"
  agot_scenario_ats.7010.desc.e:0 "Ser [eustace.GetFirstName] rappresenta un'occasione per unire le nostre pretese su Fossafredda, salvare il suo orgoglio e assicurarmi un marito con scarso interesse nel governare le mie terre, che morirà molto prima di me. Non sarebbe un matrimonio d'amore, ma sarebbe una scelta saggia per la politica locale."
  agot_scenario_ats.7010.desc.d:0 "[dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstName] è alto, avvenente e gradevole, con un senso dell'onore che commuove e una volontà di mettersi in pericolo in suo nome. Non sarebbe un matrimonio vantaggioso sul piano politico, ma potrebbe essere felice."
  agot_scenario_ats.7010.desc.g:0 "Ser [gerold.GetNameNicknamed] è un candidato assai valido. Mi manda spesso lettere, che ho imparato ad apprezzare, e inoltre è il fratello capace e influente del lord più ricco del regno. Nutro qualche dubbio sul fatto che sarebbe soddisfatto d'una vita a Fossafredda, così lontano dalla corte del Leone, e dunque il matrimonio non sarebbe privo di rischi."
  agot_scenario_ats.7010.desc.l:0 "Ser [longinch.GetFirstNameNicknamed] è un uomo spregevole, crudele nello spirito e povero di gioia. Se avessi potuto predisporne la morte, forse lo avrei fatto, eppure era lui che mio padre desiderava io sposassi, dunque devo comunque prenderlo in considerazione."
  agot_scenario_ats.7010.desc.ed:0 "Ser [eustace.GetFirstName] rappresenta un'occasione per unire le nostre pretese su Fossafredda, salvare il suo orgoglio e assicurarmi un marito con scarso interesse nel governare le mie terre, che morirà molto prima di me. Eppure devo considerare anche la mia felicità personale, e a questo riguardo il mio pensiero va a [dunk.Custom('IT_NAM_COL4')][dunk.GetTitledFirstName], un cavaliere bello e valoroso per il quale ho nutrito una certa tenerezza nel poco tempo che abbiamo trascorso insieme, e che mi lascerebbe governare le mie terre come meglio credo."
  agot_scenario_ats.7010.desc.eg:0 "Ser [eustace.GetFirstName] rappresenta un'occasione per unire le nostre pretese su Fossafredda, salvare il suo orgoglio e assicurarmi un marito con scarso interesse nel governare le mie terre, che morirà molto prima di me. Devo però considerare anche un'unione ancor più vantaggiosa sul piano politico. Ser [gerold.GetNameNicknamed] mi scrive spesso, lettere che ho imparato ad attendere con piacere, ed è un rampollo della Casata più ricca di Westeros. Per quanto potrebbe trovare poca gioia a Fossafredda e dunque rappresentare un rischio come marito, non posso ignorarlo."
  agot_scenario_ats.7010.desc.el:0 "Ser [eustace.GetFirstName] rappresenta un'occasione per unire le nostre pretese su Fossafredda, salvare il suo orgoglio e assicurarmi un marito con scarso interesse nel governare le mie terre, che morirà molto prima di me. Poi vi è Ser [longinch.GetFirstNameNicknamed], un uomo spregevole, crudele nello spirito e povero di gioia. Se avessi potuto predisporne la morte, forse lo avrei fatto, eppure era lui che mio padre desiderava io sposassi, dunque devo comunque prenderlo in considerazione."
  agot_scenario_ats.7010.desc.edg:0 "Ser [eustace.GetFirstName] rappresenta un'occasione per unire le nostre pretese su Fossafredda, salvare il suo orgoglio e assicurarmi un marito con scarso interesse nel governare le mie terre, che morirà molto prima di me. Eppure, quando considero la mia felicità, altri due candidati si fanno avanti. [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstName] è alto, avvenente e ho imparato ad affezionarmi a [Select_CString(dunk.IsFemale,'lei','lui')] nel poco tempo che abbiamo trascorso insieme. Dall'altra parte c'è Ser [gerold.GetNameNicknamed], che mi manda ogni giorno dolci lettere e proviene dalla Casata più ricca di Westeros. Ciascuno di loro potrebbe essere un marito degno; non mi resta che chiedere."
  agot_scenario_ats.7010.desc.edl:0 "Ser [eustace.GetFirstName] rappresenta un'occasione per unire le nostre pretese su Fossafredda, salvare il suo orgoglio e assicurarmi un marito con scarso interesse nel governare le mie terre, che morirà molto prima di me. Devo però considerare anche la mia felicità personale, e a tal fine il mio sguardo si posa su [dunk.Custom('IT_NAM_COL4')][dunk.GetTitledFirstName], un cavaliere bello e valoroso per il quale ho nutrito una certa tenerezza nel poco tempo che abbiamo trascorso insieme, e che mi lascerebbe governare le mie terre come meglio credo. Infine devo considerare Ser [longinch.GetNameNicknamed], se non altro perché mio padre si aspettava che ci sposassimo, per quanto poco mi piaccia quell'uomo."
  agot_scenario_ats.7010.desc.egl:0 "Ser [eustace.GetFirstName] rappresenta un'occasione per unire le nostre pretese su Fossafredda, salvare il suo orgoglio e assicurarmi un marito con scarso interesse nel governare le mie terre, che morirà molto prima di me. Un altro leone mi viene però in mente, poiché Ser [gerold.GetNameNicknamed] è un candidato assai valido. Mi manda spesso lettere, che ho imparato ad apprezzare, e inoltre è il fratello del lord più ricco del regno. Infine devo considerare Ser [longinch.GetNameNicknamed], se non altro perché mio padre si aspettava che ci sposassimo, per quanto poco mi piaccia quell'uomo."
  agot_scenario_ats.7010.desc.edgl:0 "Quattro scelte mi si presentano mentre considero le mie possibilità. Ser [eustace.GetFirstName] offre stabilità, unendo le nostre pretese su Fossafredda, e vantaggi nella politica locale. [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstName] è valoroso e avvenente, e l'affetto che provo per [Select_CString(dunk.IsFemale,'lei','lui')] sorprende persino me, anche se un'unione simile offrirebbe ben pochi guadagni... potrebbe però essere felice. Ser [gerold.GetNameNicknamed] è una scelta solida, poiché le sue lettere mi sono state di conforto negli ultimi tempi e la forza e la ricchezza di Casa Lannister non hanno pari. Infine devo considerare Ser [longinch.GetNameNicknamed], un uomo spregevole che prendo in considerazione soltanto perché mio padre riteneva che avremmo dovuto sposarci."
  agot_scenario_ats.7010.desc.dg:0 "Due possibili pretendenti mi vengono in mente. [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstName] è un cavaliere onesto e valoroso, e l'affetto che provo per [Select_CString(dunk.IsFemale,'lei','lui')] è cresciuto rapidamente nel poco tempo che abbiamo trascorso insieme. Un'unione simile offrirebbe ben pochi vantaggi politici, ma potrebbe essere felice. L'altro è Ser [gerold.GetNameNicknamed], le cui lettere ho imparato ad attendere con piacere. È inoltre membro della Casata più ricca del regno e rappresenterebbe un ottimo matrimonio politico, anche se dubito che sarebbe soddisfatto d'una vita a Fossafredda, così lontano dalla corte del Leone."
  agot_scenario_ats.7010.desc.dgl:0 "Tre possibili pretendenti mi vengono in mente. [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstName] è un cavaliere onesto e valoroso, e l'affetto che provo per [Select_CString(dunk.IsFemale,'lei','lui')] è cresciuto rapidamente nel poco tempo che abbiamo trascorso insieme. Un'unione simile offrirebbe ben pochi vantaggi politici, ma potrebbe essere felice. L'altro è Ser [gerold.GetNameNicknamed], le cui lettere ho imparato ad attendere con piacere. È inoltre membro della Casata più ricca del regno e rappresenterebbe un ottimo matrimonio politico, anche se dubito che sarebbe soddisfatto d'una vita a Fossafredda, così lontano dalla corte del Leone. Infine devo considerare Ser [longinch.GetNameNicknamed], un uomo spregevole che prendo in considerazione soltanto perché mio padre riteneva che avremmo dovuto sposarci."
  agot_scenario_ats.7010.desc.dl:0 "Due possibili pretendenti mi vengono in mente. [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstName] è un cavaliere onesto e valoroso, e l'affetto che provo per [Select_CString(dunk.IsFemale,'lei','lui')] è cresciuto rapidamente nel poco tempo che abbiamo trascorso insieme. Un'unione simile offrirebbe ben pochi vantaggi politici, ma potrebbe essere felice. L'altro è Ser [longinch.GetNameNicknamed], un uomo spregevole che prendo in considerazione soltanto perché mio padre riteneva che avremmo dovuto sposarci."
  agot_scenario_ats.7010.desc.gl:0 "Due possibili pretendenti mi vengono in mente. Ser [gerold.GetNameNicknamed], le cui lettere ho imparato ad attendere con piacere, e che è il fratello del lord più ricco del regno. Per quanto sarebbe una scelta pregevole, dubito che troverebbe soddisfazione in una vita a Fossafredda, così lontano dalla corte del Leone. L'altro è Ser [longinch.GetNameNicknamed], un uomo spregevole che prendo in considerazione soltanto perché mio padre riteneva che avremmo dovuto sposarci."
  agot_scenario_ats.7010.desc.finish:0 "\n\nCome devo decidere?"
  agot_scenario_ats.7010.a:0 "Il ragno sposerà il leone scaccato."
  agot_scenario_ats.7010.b:0 "Sposerò [dunk.GetTitledFirstNameNoTooltip] e spero di trovare la felicità."
  agot_scenario_ats.7010.c:0 "Spero che il leone dorato possa dirsi soddisfatto."
  agot_scenario_ats.7010.d:0 "Manderò giù l'unione voluta da mio padre."
  agot_scenario_ats.7010.e:0 "Troverò marito altrove, ma dovrò agire in fretta."
  agot_scenario_ats.7010.e.tt:0 "Cercherai un altro sposo, ma avrai soltanto sei mesi per farlo"
  
  agot_scenario_ats.7011.t:0 "La Storia Ricorda i Nomi"
  agot_scenario_ats.7011.desc:0 "Ho ricevuto una risposta da Ser [eustace.GetFirstName] riguardo alla mia proposta di matrimonio. Benché [Select_CString(eustace.IsFemale,'lei','lui')] abbia mostrato interesse dopo che abbiamo condiviso il dolore per la perdita di suo figlio, non permetterà che i nostri figli portino il nome Webber.\n\nSe devo sposare Ser [eustace.GetFirstNameNoTooltip], dovrà avvenire nel modo tradizionale, con i nostri futuri figli destinati a portare il nome Osgrey e il leone scaccato come stemma.\n\nSe rifiuterò questa richiesta, dovrò trovare marito altrove: quanto vale, dunque, il nome Webber?"
  agot_scenario_ats.7011.a:0 "Accetterò queste condizioni."
  agot_scenario_ats.7011.a.tt:0 "Sposerai [eustace.GetNameNoTooltip] in un matrimonio non matrilineare"
  agot_scenario_ats.7011.b:0 "Altrove troverò una scelta migliore."
  agot_scenario_ats.7011.b.tt:0 "Cercherai liberamente un marito"
  
  rohanne_patrimarried_eustace:0 "Lady Rohanne ha accettato la mia proposta di un matrimonio tradizionale!"
  
  agot_scenario_ats.7012.t:0 "Un Duro Rifiuto"
  agot_scenario_ats.7012.desc:0 "È giunta parola da Ser [eustace.GetFirstName]: [Select_CString(eustace.IsFemale,'lei','lui')] ha respinto la mia proposta di matrimonio e mi ha intimato di cercare marito altrove.\n\nDevo tornare a cercare per soddisfare il testamento di mio padre."
  agot_scenario_ats.7012.a:0 "Altrove troverò una scelta migliore."
  agot_scenario_ats.7012.a.tt:0 "Cercherai liberamente un marito"
  
  agot_scenario_ats.7013.t:0 "Un Duro Rifiuto"
  agot_scenario_ats.7013.desc:0 "Ho ricevuto notizie da [dunk.Custom('IT_NAM_COL2')][dunk.GetTitledFirstName] riguardo alla mia proposta di matrimonio. Nonostante la sua umile nascita e l'altezza della mia, e persino la possibilità per il suo scudiero di servire a Fossafredda nella sicurezza d'un castello, sono stata respinta da un misero cavaliere errante.\n\nPare che io debba tornare a cercare, per quanto sorprendente ciò possa essere."
  agot_scenario_ats.7013.a:0 "Altrove troverò una scelta migliore."
  agot_scenario_ats.7013.a.tt:0 "Cercherai liberamente un marito"
  
  agot_scenario_ats.7020.t:0 "Un'Offerta Sorprendente"
  agot_scenario_ats.7020.desc:0 "È giunta una richiesta da [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstName] per ottenere accesso alle mie terre e visitare la tomba di mio figlio [addam.GetFirstName]. Le concedo il permesso quasi senza riflettere, e poco dopo la trovo in lacrime accanto alla sua sepoltura. Una parte di me, che credevo morta da tempo, mi spinge a confortarla, e presto ci ritroviamo a ricordare insieme memorie care accanto al mio fuoco, mangiando more in ricordo del passato. Non molto dopo la sua partenza, giunge un corriere recando una proposta di matrimonio.\n\nSarei stolto a non prenderla in considerazione, poiché un patto matrimoniale mi renderebbe signore di Fossafredda almeno nel nome e salverebbe la mia Casata dall'estinzione. Eppure desidera che i nostri figli siano Webber, e devo rispondere tenendolo bene a mente."
  agot_scenario_ats.7020.a:0 "Accetterò, ma soltanto se i nostri figli porteranno il leone scaccato."
  agot_scenario_ats.7020.a.tt:0 "Chiederai un matrimonio non matrilineare"
  agot_scenario_ats.7020.b:0 "Accetto le sue condizioni, i nostri figli saranno ragni."
  agot_scenario_ats.7020.c:0 "Al diavolo ogni cosa, rifiuto."
  agot_scenario_ats.7020.c.tt:0 "Rifiuti la proposta di matrimonio"
  
  agot_scenario_ats.7021.t:0 "Un Duro Rifiuto"
  agot_scenario_ats.7021.desc:0 "Nonostante l'iniziale interesse di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstNamePossessive] per un patto matrimoniale fra noi, pare che l'idea di vedere i suoi figli portare il fiero leone scaccato sia un passo troppo lungo! [Select_CString(rohanne.IsFemale,'Lei','Lui')] mi ha dunque inviato un duro rifiuto alla mia richiesta di un matrimonio tradizionale, ponendo fine senz'altro ai nostri colloqui matrimoniali.\n\nPare che il ragno e il leone scaccato non fossero destinati a unirsi."
  agot_scenario_ats.7021.a:0 "È meglio voltare pagina e trovare una moglie per conto mio."
  agot_scenario_ats.7021.a.tt:0 "Lascerai questa storia alle spalle."
  
  
  ##########
  #  Dunk  #
  ##########
  
  # Dunk chosen for marriage, can choose to accept or decline
  # Available scopes: rohanne
  agot_scenario_ats.7031.t:0 "L'Offerta della Vedova Rossa"
  agot_scenario_ats.7031.desc:0 "È giunto un messaggero da [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstName]. Spezzando il sigillo del ragno, vi trovo una lettera fin troppo dolce e una proposta di matrimonio. A stento riesco a contenere il mio stupore mentre continuo a leggere. Un[rohanne.Custom('DE_PRO_PER_P_3P_G')] bell[Select_CString(rohanne.IsFemale,'a','o')] [rohanne.GetLadyLord] d'alto lignaggio ha scelto proprio me come [Select_CString(rohanne.IsFemale,'marito','marito')]? Spingendosi persino a offrire a Egg un posto tra gli scudieri del castello e a me il comando dei cavalieri della casa.\n\nQuesto cambierebbe ogni cosa: non sarei più un cavaliere errante, ma il consorte della Signora di Fossafredda. Egg potrebbe crescere in un vero castello, continuando a imparare il mondo, ma al sicuro entro mura e circondato da scudieri della sua età.\n\nOltre a ciò, [rohanne.GetTitledFirstNameNoTooltip] è una sposa degna di qualunque uomo. Sarebbe duro abbandonare la vita delle siepi, ma ne varrebbe la pena per avere una casa... e forse persino amore?"
  agot_scenario_ats.7031.b:0 "Sposerò la vedova e mi lascerò alle spalle le siepi."
  agot_scenario_ats.7031.b.tt:0 "Sposerai [rohanne.GetNameNoTooltip] con matrimonio matrilineare e passerai a [Select_CString(rohanne.IsFemale,'lei','lui')]"
  agot_scenario_ats.7031.c:0 "Non posso lasciarmi alle spalle le siepi, sono tutto ciò che conosco."
  agot_scenario_ats.7031.c.tt:0 "Rifiuterai la proposta di matrimonio"
  
  agot_scenario_ats.8030.t:0 "Piogge d'Estate e Dolci Addii"
  agot_scenario_ats.8030.desc:0 "Mentre la pioggia finalmente cade sull'Altopiano, mi preparo a lasciare Fossafredda e tutta la faccenda tra essa e Standfast alle spalle. Vengo fermato alle scuderie dalla figura minuta di [rohanne.GetName]. Benché io sia abbattuto dopo aver appreso del suo imminente matrimonio, e dell'inutilità di questo conflitto fin dall'inizio, è bello vedere il volto di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstNamePossessive]. [Select_CString(rohanne.IsFemale,'Lei','Lui')] si scusa e sembra dibattersi fra il dire qualcosa e il tacere, mentre i cavalli si agitano e si riassestano nelle loro stalle.\n\nAlla fine, mi offre un posto come cavaliere della casa ed a Egg uno come scudiero del castello, dicendo che sperava di non perderci sulla strada.\n\nÈ un'offerta allettante, ma le siepi sono tutto ciò che ho mai conosciuto e questo luogo mi ha lasciato un gusto amaro. Se non vorrò accettare, [Select_CString(rohanne.IsFemale,'lei','lui')] si offre almeno di farmi un qualche dono."
  agot_scenario_ats.8030.a:0 "Diventerò il vostro cavaliere."
  agot_scenario_ats.8030.a.tt:0 "Diventerai un cortigiano di [rohanne.GetNameNoTooltip] e passerai a [Select_CString(rohanne.IsFemale,'lei','lui')]"
  agot_scenario_ats.8030.b:0 "Non posso accettare, ma chiederei un bacio e un piccolo dono."
  agot_scenario_ats.8030.b.tt:0 "Te ne andrai con null'altro che qualche ciocca di capelli"
  
  agot_scenario_ats.9000.t:0 "Il Diritto di Nascita del Drago Nero"
  agot_scenario_ats.9000.desc:0 "[Select_CString(bittercringe.IsFemale,'La mia','Il mio')] [ROOT.Char.Custom2('RelationToMeShort', bittercringe)] [bittercringe.GetFirstName] ha mandato notizia: ha radunato tutti coloro che i draghi rossi hanno offeso, esiliato e derubato. Si sono raccolti attorno a [Select_CString(bittercringe.IsFemale,'lei','lui')] sotto un vessillo dorato, formando una nuova compagnia più grande di qualunque altra le Città Libere abbiano ancora veduto.\n\nDa quando ho ottenuto Blackfyre e guadagnato il suo sostegno, [Select_CString(bittercringe.IsFemale,'lei','lui')] è pront[Select_CString(bittercringe.IsFemale,'a','o')] a far guerra in mio nome e ad aiutarmi a reclamare il Trono di Spade dall'Usurpatore [ITRuler.GetFirstName]. Migliaia moriranno e il regno che spero di governare sanguinerà, se sceglierò di dare inizio a questa guerra, ma senza di essa forse i draghi rossi non verranno mai sfidati. Qualunque sia la mia decisione, devo prenderla ora.\n\nMarcerò per il mio diritto di nascita, o lascerò che il mio popolo sia governato dai draghi bastardi?"
  agot_scenario_ats.9000.a:0 "Marciamo in guerra!"
  agot_scenario_ats.9000.b:0 "Devo trovare la mia via al potere; non è ancora il momento."
  
  agot_scenario_ats.9010.t:0 "L'Ultimo Leone Scaccato"
  agot_scenario_ats.9010.desc:0 "Con la morte di Ser [eustace.GetFirstName], il conflitto per la diga è finito e il mio fossato resterà pieno e pronto. Vi è in me una certa tristezza nel veder seppellire l'ultimo rampollo di una stirpe tanto nobile e il padre del ragazzo che avevo amato, ma ho già seppellito vecchi uomini in passato.\n\nOra, nonostante il peso sul cuore, passerò ad altre occupazioni."
  agot_scenario_ats.9010.a:0 "Una triste fine per una triste vita."
  agot_scenario_ats.9010.a.tt:0 "Proseguirai verso compiti più urgenti"
  
  agot_scenario_ats.9011.t:0 "Un'Ultima Occasione"
  agot_scenario_ats.9011.desc:0 "Il testamento di mio padre grava su di me come un peso enorme. Devo sposarmi entro la settimana, oppure vedrò i miei titoli sottratti e il mio erede legittimo impadronirsi dei miei castelli. Ho inviato corvi e cavalieri per scoprire quali degli uomini che avevo esaminato in precedenza siano ancora disponibili, e le scelte mi sono state presentate.\n\nSceglierò infine un consorte? O tenterò ancora una volta il fato prendendo la ricerca nelle mie mani?"
  agot_scenario_ats.9011.a:0 "Il leone scaccato potrebbe ancora sposare il ragno."
  agot_scenario_ats.9011.a.tt:0 "Contatterai Ser [eustace.GetFirstNameNoTooltip] riguardo a un patto matrimoniale."
  agot_scenario_ats.9011.b:0 "[dunk.GetTitledFirstNameNoTooltip] potrebbe ancora essere il mio salvatore."
  agot_scenario_ats.9011.b.tt:0 "Contatterai [dunk.GetTitledFirstNameNoTooltip] riguardo a un patto matrimoniale."
  agot_scenario_ats.9011.c:0 "Potrei vedere se [gerold.GetFirstNameNoTooltip] potrebbe dirsi soddisfatto qui."
  agot_scenario_ats.9011.c.tt:0 "Sposerai Ser [gerold.GetFirstNameNoTooltip]."
  agot_scenario_ats.9011.d:0 "Potrei mandar giù un'unione con Ser [longinch.GetFirstNameNoTooltip]."
  agot_scenario_ats.9011.d.tt:0 "Sposerai Ser [longinch.GetFirstNameNoTooltip]"
  agot_scenario_ats.9011.e:0 "Devo tentare, un'ultima volta."
  agot_scenario_ats.9011.e.tt:0 "Potrai cercare di nuovo un coniuge per conto tuo, ma avrai soltanto un'altra settimana."
  
  agot_scenario_ats.9012.t:0 "La Ragnatela d'un Padre"
  agot_scenario_ats.9012.desc:0 "La trappola di mio padre mi ha infine raggiunta. Nonostante tutti i miei sforzi, ormai ho ben poca scelta. Devo cedere le mie terre e lasciare i miei castelli al mio erede. Non era certo questo il destino che desideravo, ma ormai vi è ben poco da fare.\n\nLa Vedova Rossa di Fossafredda non esiste più; ora sono soltanto Lady Rohanne."
  agot_scenario_ats.9012.a:0 "Addio, Fossafredda."
  agot_scenario_ats.9012.b:0 "Cercherò Ser Duncan e mi unirò al suo campo."
  agot_scenario_ats.9012.b.tt:0 "Passerai a Ser Duncan l'Alto e Rohanne diventerà una seguace."
  agot_scenario_ats.9012.c:0 "Mi lascerò alle spalle queste terre e forgerò una nuova via."
  agot_scenario_ats.9012.c.tt:0 "Rinuncerai ai tuoi titoli e formerai un campo d'avventura."
  
  agot_scenario_ats.9013.t:0 "Una Torre Ridotta a Torcia"
  agot_scenario_ats.9013.desc:0 "Mentre gli incendi divampano intorno a Standfast e le misere forze schierate da Ser [eustace.GetFirstName] contro di noi svaniscono nel nulla, io mi ergo vittoriosa. Ora che la polvere si posa, posso ricostruire e occuparmi infine del testamento di mio padre."
  agot_scenario_ats.9013.a:0 "La torre è mia e la diga può cadere!"
  agot_scenario_ats.9013.a.tt:0 "Standfast e Fossafredda condivideranno l'acqua"
  
  agot_scenario_ats.9014.t:0 "Il Leone Senza Denti"
  agot_scenario_ats.9014.desc:0 "Nonostante l'enorme divario tra le nostre risorse, Ser [eustace.GetFirstName] ha comunque ritenuto opportuno muovere guerra alla Vedova di Fossafredda. Ora la sua misera forza è stata schiacciata ed egli è ridotto a una rovina. Con questa faccenda risolta e la vittoria nelle mie mani, posso finalmente occuparmi del testamento di mio padre e del rafforzamento della mia posizione."
  agot_scenario_ats.9014.a:0 "Ad altre questioni."
  agot_scenario_ats.9014.a.tt:0 "Riceverai una scelta di opzioni matrimoniali"
  
  agot_scenario_ats.9015.t:0 "Le Ragnatele in Fiamme"
  agot_scenario_ats.9015.desc:0 "I corpi degli uomini dei Webber giacciono disseminati nei campi insanguinati fuori da Fossafredda, mentre il fiero leone scaccato attende ai cancelli. Ho mosso contro Ser [eustace.GetFirstName] e ho pagato il prezzo del fallimento. Sono umiliata e la mia diga è stata abbattuta, lasciando meno acqua per i raccolti di Fossafredda nei giorni a venire.\n\nOra non posso far altro che pregare per la pioggia."
  agot_scenario_ats.9015.a:0 "Devo solo attendere la fine di questa siccità e tramare la mia prossima mossa"
  agot_scenario_ats.9015.a.tt:0 "La diga cadrà e passerai alla scelta d'un coniuge"
  
  agot_scenario_ats.9016.t:0 "Un Diritto di Nascita Perduto"
  agot_scenario_ats.9016.desc:0 "Il leone scaccato sventola di nuovo fiero sopra Fossafredda, mentre i vessilli del ragno dell'antico castello vengono strappati e gettati nelle fiamme sottostanti. Mi ritrovo a domandarmi se mio padre avesse ragione, se davvero non fossi in grado di governare da sola, mentre la parte più grande del mio diritto di nascita mi viene strappata di mano.\n\nChe cosa verrà ora? Vendetta? O accettazione?"
  agot_scenario_ats.9016.a:0 "Passerò ad altre questioni e valuterò la mia prossima mossa."
  agot_scenario_ats.9016.a.tt:0 "Sceglierai da una lista di potenziali sposi"
  
  agot_scenario_ats.9020.t:0 "Una Vedova Morta"
  agot_scenario_ats.9020.desc:0 "Con la morte di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstName], il conflitto per la diga è finito, almeno per ora. Non posso fare a meno di provare dolore mentre l'amore d'infanzia di mio figlio viene sepolto all'ombra del castello della mia famiglia. Tanta morte e tanta distruzione nella mia vita, eppure nulla di tutto questo ha significato alcunché. Sarà difficile compiere altre mosse, poiché il mio signore osserverà troppo da vicino, quindi non mi resta che resistere alla siccità finché la pioggia non verrà a salvarci.\n\nSpero che giunga presto."
  agot_scenario_ats.9020.a:0 "Piangeremo i morti e pregheremo per i vivi."
  agot_scenario_ats.9020.a.tt:0 "Attenderai che la siccità finisca"
  
  agot_scenario_ats.9021.t:0 "Il Leone Trionfante"
  agot_scenario_ats.9021.desc:0 "In quella che verrà ricordata per generazioni come una vittoria straordinaria, ho annientato gli eserciti di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstName], lasciando i suoi uomini in un mucchio insanguinato fuori da Fossafredda. Mentre avanzo verso la possente porta del castello, prendendomi il tempo di esaminare ciascuna delle antiche mura che la mia Casata un tempo costruì, un ampio sorriso mi si disegna sul volto. Strappando il vessillo dei Webber, il ragno bianco ondeggia nella brezza mentre scende al suolo, e il mio sorriso si allarga alla vista del leone scaccato restaurato, tornato al suo posto d'onore.\n\nInfine, ho restaurato la mia Casata."
  agot_scenario_ats.9021.a:0 "La diga sarà abbattuta e io governerò."
  agot_scenario_ats.9021.a.tt:0 "Fossafredda e Standfast condivideranno l'acqua"
  
  agot_scenario_ats.9022.t:0 "Il Leone Trionfante"
  agot_scenario_ats.9022.desc:0 "Nonostante tutte le minacce di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstNamePossessive], ho dimostrato che il veleno di questa vedova era ben debole. I suoi uomini giacciono spezzati e sanguinanti nei campi fuori da Standfast, mentre la mia torre resta inespugnata. Ho vinto contro ogni previsione e ho portato nuovo orgoglio e nuova gloria alla mia antica Casata. Rohanne è costretta ad accettare una pace umiliante, lasciando la Vedova Rossa indebolita e il leone scaccato più forte che mai."
  agot_scenario_ats.9022.a:0 "Abbattete quella diga!"
  agot_scenario_ats.9022.a.tt:0 "Abbatterai la diga"
  
  agot_scenario_ats.9023.t:0 "La Fine del Leone Scaccato"
  agot_scenario_ats.9023.desc:0 "Con la caduta di Standfast, [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] ha spezzato le mie forze e reclamato l'ultima fortezza rimasta alla mia Casata. Ora sono un cavaliere senza terra, senza casa, senza speranza.\n\nVorrei che non si fosse mai giunti a questo, che mi fossi tirato indietro quando ancora ne avevo l'occasione, ma ora non mi restano che rovine."
  agot_scenario_ats.9023.a:0 "La mia Casata è caduta."
  agot_scenario_ats.9023.a.tt:0 "Hai perduto Standfast"
  
  agot_scenario_ats.9024.t:0 "Il Leone Senza Artigli"
  agot_scenario_ats.9024.desc:0 "Con la sconfitta dei miei eserciti e l'incendio delle mie terre, Casa Osgrey è stata ancora una volta dimostrata debole. Ho disonorato la mia Casata più di quanto avrei mai immaginato. La mia famiglia in rovina, le mie terre devastate e la mia posizione politica più fragile che mai.\n\nOra sono un leone senza artigli e sono alla mercé di questa vedova."
  agot_scenario_ats.9024.a:0 "La diga resterà, e dovrò convivere con i miei fallimenti."
  agot_scenario_ats.9024.a.tt:0 "Attenderai ciò che verrà"
  
  agot_scenario_ats.9030.t:0 "Una Vedova Morta"
  agot_scenario_ats.9030.desc:0 "Con la morte di [rohanne.GetFullName], il conflitto per la diga è finito, almeno per ora. Mi addolora vedere la minuta figura della Signora di Fossafredda sepolta nella sua ombra.\n\nOra che questo conflitto è concluso, Egg ed io siamo liberi di scegliere se restare e lavorare qui o proseguire verso pascoli forse più verdi. In ogni caso, le siepi ci attendono."
  agot_scenario_ats.9030.a:0 "Un addio alla vedova."
  agot_scenario_ats.9030.a.tt:0 "Tornerai a svolgere contratti"
  
  agot_scenario_ats.9031.t:0 "L'Ultimo Leone Scaccato"
  agot_scenario_ats.9031.desc:0 "Con la morte di Ser [eustace.GetFirstName], Egg ed io ci ritroviamo ancora una volta senza servire alcun padrone. Pare proprio che sia tempo di rimettersi in viaggio e mostrare a Egg una parte più ampia del mondo.\n\nL'ultimo leone scaccato forse è scomparso, ma le siepi ci attendono sempre."
  agot_scenario_ats.9031.a:0 "Addio, leone scaccato."
  agot_scenario_ats.9031.a.tt:0 "Tornerai a svolgere contratti"
  
  agot_scenario_ats.9032.t:0 "Fuoco e Spada"
  agot_scenario_ats.9032.desc:0 "[rohanne.GetFullName] e Ser [eustace.GetFirstName] sono ora in guerra! I nostri giuramenti di servizio esigono che Egg ed io ci uniamo a Ser [eustace.GetFirstNameNoTooltip] e combattiamo al suo fianco, e [Select_CString(eustace.IsFemale,'lei','lui')] mi ha offerto truppe da comandare, ma mettere a rischio Egg è una scelta difficile.\n\nLa guerra non è cosa lieve, e portare con sé perfino uno scudiero assai capace può essere pericoloso. Devo scegliere con cura se prestare il mio aiuto."
  agot_scenario_ats.9032.a:0 "Per il leone scaccato!"
  agot_scenario_ats.9032.a.tt:0 "Guiderai truppe dalla parte di [eustace.GetNameNoTooltip]"
  agot_scenario_ats.9032.b:0 "Non posso immischiarmi in questo, non adesso."
  agot_scenario_ats.9032.b.tt:0 "Rifiuterai di unirti a Ser [eustace.GetFirstNameNoTooltip]"
  
  rohanne_hair_token.desc:0 "Una ciocca di capelli legata con un nastro di seta, presa dalla lunga treccia rossa di [rohanne.Custom('IT_NAM_COL2')][rohanne.GetTitledFirstName] durante il soggiorno di [dunk.GetTitledFirstNameNicknamedPossessive] a Standfast."
  
  agot_scenario_ats.9033.t:0 "Il Leone Spezzato"
  agot_scenario_ats.9033.desc:0 "Forse non dovrebbe sorprendermi, visto quanto era piccolo l'esercito al comando di Ser [eustace.GetFirstNamePossessive], che i suoi uomini giacciano morti e spezzati tutt'intorno a me. Il campo è disseminato di cadaveri sanguinanti mentre [rohanne.Custom('IT_NAM_COL3')][rohanne.GetTitledFirstName] rivendica la propria vittoria sotto il cielo rosso sangue del mattino. I miei uomini, concessimi da Ser [eustace.GetFirstNameNoTooltip], fanno ritorno alle loro case.\n\nEgg ed io, come sempre, torneremo alle siepi e cercheremo di dimenticare tutto ciò che abbiamo veduto."
  agot_scenario_ats.9033.a:0 "Addio, leone scaccato."
  agot_scenario_ats.9033.a.tt:0 "Tornerai a svolgere contratti"
  
  agot_scenario_ats.9034.t:0 "Il Leone Vittorioso"
  agot_scenario_ats.9034.desc:0 "L'esercito della vedova giace in frantumi, mentre le forze dell'esperto Ser [eustace.GetFirstName] lasciano il campo da vincitrici. Questa notevole vittoria su forze immensamente superiori rende il leone scaccato più forte che mai e con ancor meno bisogno d'un comune cavaliere delle siepi. Mentre il cielo del mattino si tinge d'un cremisi sanguigno, restituisco il comando degli uomini che Ser [eustace.GetFirstNameNoTooltip] mi aveva affidato, raccolgo le mie cose e mi preparo a partire.\n\nEgg ed io, come sempre, torneremo alle siepi."
  agot_scenario_ats.9034.a:0 "Addio, leone scaccato."
  agot_scenario_ats.9034.a.tt:0 "Tornerai a svolgere contratti"
  
