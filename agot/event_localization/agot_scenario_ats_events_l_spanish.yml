l_spanish:
  # Intro Events

  # Daemon II Blackfyre
  #Available scopes daemon2/daemon1 (Daemon I Blackfyre)/bittercringe
  agot_scenario_ats.1000.t:0 "Il Drago Nero all'Estero"
  agot_scenario_ats.1000.desc:0 "Quando mi abbandono al sonno, nel cuore della notte, i sogni tormentano le mie ore silenziose. Sogni dei miei fratelli, soffocati nel loro stesso sangue in mezzo a un mare d'erba cremisi. Di come vidi un martello infrangere l'esercito di mio padre contro una fredda incudine di ferro. La freccia d'un fratello che trovava il cuore d'un drago nero sotto un crinale piangente.\n\nQuelle visioni si rivelarono terribilmente vere, proprio come so che lo saranno i miei nuovi sogni. Ultimamente, ho visto un possente drago squarciare il suo freddo guscio nel mezzo d'un banchetto nuziale. Ho visto un gigante, rivestito di scintillante armatura bianca con un mantello abbinato che si gonfiava dietro di lui, ergersi accanto a un re dai capelli d'argento. Mi sono tormentato su ogni dettaglio di quelle visioni, su ogni interpretazione. Ora so che il primo sarà un drago destinato a reclamare il mio diritto di nascita, e il gigante sarà il guardiano che mi aiuterà a conservarlo.\n\nQuesti sogni preannunciano la mia regalità, la prova finale che sono il figlio di mio padre. Ma prima di dimostrarlo al mondo, devo dimostrarlo a mio zio [bittercringe.GetNameNicknamed]."
  agot_scenario_ats.1000.a:0 "Gli mostrerò che #italic io sono il Drago Nero!#!"
  agot_scenario_ats.1000.a.tt:0 "Sceglierai come affrontare Bittersteel"
  
  agot_scenario_ats.1001.t:0 "Pietra, Acciaio e Acqua"
  agot_scenario_ats.1001.desc:0 "'La Vedova Rossa', così mi chiamano, sogghignando e spettegolando sulla vecchia di Fossafredda. La loro Vedova Rossa era una bambina di dieci anni quando perse il suo primo marito, ucciso al [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )]. Pensavo che le perdite sarebbero finite allora, ma ve ne furono altre. Mio figlio, mia figlia, mio padre e altri tre mariti se ne sono andati.\n\nMio padre mi lasciò Fossafredda, ma mi intrappolò in una ragnatela quando allungai la mano per prenderla. Devo sposarmi prima che la luna volga, altrimenti il testamento di mio padre consegnerà le mie terre a un cugino. Vedo come Ser [longinch.GetFullNameNicknamed] mi guarda con occhi famelici; [Select_CString(longinch.IsFemale,'vorrebbe','vorrebbe')] le mie terre per sé, e al diavolo i miei desideri.\n\nCome se il testamento di mio padre non bastasse, i lord vicini pensano che senza un uomo al mio fianco io sia debole. Quello che non sanno è che non ripongo più la mia fiducia negli uomini. Ripongo la mia fiducia nella pietra, nell'acciaio e nell'acqua. Ripongo la mia fiducia nei fossati, e il mio non si prosciugherà, siccità o no. Coloro che vorranno nuocermi scopriranno che questa vedova è davvero forte, e piena di veleno."
  agot_scenario_ats.1001.a:0 "Tenete colmo il fossato!"
  agot_scenario_ats.1001.a.tt:0 "Farai sbarrare il Chequy Water"
  
  agot_scenario_ats.1002.t:0 "Il Leone Scaccato"
  agot_scenario_ats.1002.desc:0 "Mentre guardo dal balcone in cima alla torre di Standfast, vengo colpito da quanto piccolo e fiacco io sia diventato. Posso ancora starmene ritto, ma la mia Casata è una cosa infranta e in rovina, spogliata di tutto ciò che eravamo da un drago rosso; per la cui misericordia dicono che dovrei essere grato.\n\nLa misericordia che mi portò via i figli al [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )], che colpì mia moglie con gli stessi colpi, che mi tolse mia figlia in compenso per essermi schierato con il solo vero re... Una silenziosa sorella la rese, e non pronunciò nemmeno il nome di suo padre quando la vidi l'ultima volta.\n\nAl mio servizio, ho soltanto due cavalieri erranti, Ser [bennis.GetFirstNameNicknamed] e [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNicknamed]; quest'ultimo è un giovane valente, ma non del mio sangue. No, l'ultimo del mio sangue se n'è andato con il Morbo della Grande Primavera ad Approdo del Re, ancora silenziosa come un fantasma mentre la misericordia di Daeron mi strappava un'ultima cosa.\n\nPer cosa, dunque, dovrei essere riconoscente?"
  agot_scenario_ats.1002.a:0 "La misericordia d'un re è un dono avvelenato."
  agot_scenario_ats.1002.a.tt:0 "Resterai saldo, solo"
  
  agot_scenario_ats.1003.t:0 "Denso come un Muro di Castello"
  agot_scenario_ats.1003.desc:0 "Sono passati due anni dalla morte di Ser Arlan, due anni da Ashford, e due anni da quando il regno ha perduto il suo amato principe. Tre uomini valorosi morirono quel giorno per salvare la mia gamba. Come potrei giustificare #italic io#! la loro perdita?\n\nQuando [maekar.Custom('IT_NAM_COL3')][maekar.GetTitledFirstName] mi affidò il suo figlio più giovane, vidi un'occasione per ripagare il debito che porto. Dopo Ashford, ci mettemmo in viaggio per Dorne, per visitare i parenti di Egg, proprio mentre giungeva il Morbo della Grande Primavera. Con la morte del nonno di Egg, suo zio [aerys.GetFirstName] ereditò il Trono di Spade, e [bloodraven.GetFirstNameNicknamed] ne fu la Mano. Mille occhi, e uno, possiede, e il regno vive nel timore sotto un duro sole estivo.\n\nQuando la siccità colpì il regno, facemmo visita al fratello di Egg, [aemon.GetFirstName], alla Cittadella, prima di cercare servizio nell'Altopiano. Quel servizio lo abbiamo trovato presso [eustace.GetFullName], un vecchio cavaliere cui resta ben poco se non il suo nome e qualche vecchio ninnolo. Sebbene la primavera sia finita e sia giunta una dura estate, servirò bene il mio signore, per i tre uomini valorosi cui devo il mio debito."
  agot_scenario_ats.1003.a:0 "Andiamo, Egg."
  agot_scenario_ats.1003.a.tt:0 "Tornerai verso Standfast"
  
  agot_scenario_ats.2000.t:0 "Il Re Senza la Spada"
  agot_scenario_ats.2000.desc:0 "Quando mio padre e i miei fratelli maggiori morirono al [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )], fu mio zio [bittercringe.GetName] a prendere Blackfyre e a guidare la nostra famiglia a Tyrosh, la patria di mia madre. [Select_CString(bittercringe.IsFemale,'Lei','Lui')] ha preso servizio come mercenari[Select_CString(bittercringe.IsFemale,'a','o')] mentre viviamo in esilio, e non si è ancora deciso a sostenere la mia pretesa al Trono di Spade, né mi ha consegnato la spada che porta il nome della mia casata. Senza di essa, e senza il suo sostegno, sarà difficile convincere qualcuno a sostenere la mia causa.\n\nDevo però scegliere con cura come avvicinarmi a [Select_CString(bittercringe.IsFemale,'lei','lui')]. [bittercringe.GetNameNicknamedNoTooltip] comprende l'acciaio e la forza, dunque un duello potrebbe essere la via migliore, anche se nessuno oserebbe dubitare della sua abilità con la lama. Potrei tentare di far ragionare [Select_CString(bittercringe.IsFemale,'lei','lui')], cosa che rientra tra le mie capacità, anche se è improbabile che ascolti. Forse dovrei semplicemente salpare verso ovest e lasciare [Select_CString(bittercringe.IsFemale,'lei','lui')] a rimuginare nel suo broncio."
  agot_scenario_ats.2000.a:0 "Lo sfiderò con l'acciaio!"
  agot_scenario_ats.2000.a.tt:0 "Combatterai Bittersteel"
  agot_scenario_ats.2000.b:0 "Userò parole melliflue con [Select_CString(bittercringe.IsFemale,'lei','lui')]."
  agot_scenario_ats.2000.b.tt:0 "Cercherai di convincere Bittersteel che deve consegnarti Blackfyre."
  agot_scenario_ats.2000.c:0 "Lascerò indietro [bittercringe.GetNameNicknamedNoTooltip] e troverò la mia strada."
  agot_scenario_ats.2000.c.tt:0 "Rinuncerai a ottenere Blackfyre e il sostegno di Bittersteel"
  
  agot_scenario_ats.2001.t:0 "Il Re che Impugna la Spada"
  agot_scenario_ats.2001.desc.daemonwins:0 "Mi ergo sulla figura malconcia di [bittercringe.GetNameNicknamed], con la spada levata alta sopra il capo. "Arrenditi!" esigo, mentre [Select_CString(bittercringe.IsFemale,'lei','lui')] non riesce a rialzarsi per affrontarmi. [Select_CString(bittercringe.IsFemale,'Lei','Lui')] ricade al suolo in un ammasso inerme e fa cenno della propria resa. Aiuto [Select_CString(bittercringe.IsFemale,'lei','lui')] a rimettersi in piedi e, dopo un istante di riflessione, [Select_CString(bittercringe.IsFemale,'lei','lui')] si avvicina al luogo dove riposa [blackfyre.GetName].\n\nSguainando la spada dal fodero e piegando un ginocchio a terra, dice: "Non credevo che fossi il figlio di tuo padre; ora vedo che Daemon è tornato. Prendi Blackfyre, e tutto l'aiuto che posso darti." Tendo le mani tremanti e sollevo in alto la Lama del Conquistatore.\n\n#italic Sarò#! re!"
  agot_scenario_ats.2001.desc.daemonloses:0 "Cado a terra, pesto e sconfitto, mentre [bittercringe.GetNameNicknamed] si erge sopra di me con un'espressione di puro disgusto. "Non porterai la Lama del Conquistatore, ragazzo, né riceverai il mio aiuto. I tuoi sogni sono deliri da stolto."\n\nOra non ho scelta; devo continuare senza il suo aiuto."
  agot_scenario_ats.2001.a:0 "Ora devo pianificare la mia conquista!"
  agot_scenario_ats.2001.a.tt:0 "Potrai scegliere come procedere per conquistare il Trono di Spade"
  agot_scenario_ats.2001.b:0 "Non sono riuscito a conquistare la spada; ora devo restare solo."
  agot_scenario_ats.2001.b.tt:0 "Dovrai continuare da solo"
  
  agot_scenario_ats.2002.t:0 "Il Re che Impugna la Spada"
  agot_scenario_ats.2002.desc.intro:0 ""Zio," comincio. "Mezzo zio," mi interrompe bruscamente [bittercringe.GetNameNicknamed], con un luccichio negli occhi.\n\n"Sì, certo," proseguo, sfoggiando un sorriso disinvolto nonostante il mio disagio. "I miei sogni sono sempre stati profetici, ma uno sovrasta tutti gli altri: tornare al mio diritto di nascita, reclamare il Trono di Spade. E per farlo, mi servono due cose. Una spada e una Mano..."\n\n"
  agot_scenario_ats.2002.desc.daemonhassword:0 "La mia supplica appassionata ha convinto [bittercringe.GetNicknameNoTooltip] della verità dei miei sogni e della mia capacità di reclamare il mio diritto di nascita. [Select_CString(bittercringe.IsFemale,'Lei','Lui')] mi ha concesso la spada [blackfyre.GetName] e mi ha offerto tutto il sostegno che può darmi.\n\nCon la lama del Conquistatore #italic forgerò#! un nuovo futuro per la nostra famiglia e prenderò il nostro legittimo posto sul Trono di Spade!"
  agot_scenario_ats.2002.desc.nosword:0 "[bittercringe.GetNicknameNoTooltip] mi studia, gli occhi viola d'acciaio che mi scrutano. Poi, con un sogghigno, rifiuta la mia richiesta, giurando che finché vivrà non porterò mai [blackfyre.GetName], né avrò il suo sostegno. Nonostante questo fallimento, so che i miei sogni dicono il vero e che il mio tempo d'ascesa si avvicina.\n\n#italic Siederò#! sul Trono di Spade e vedrò tutti coloro che dubitano di me inginocchiarsi ai miei piedi!"
  agot_scenario_ats.2002.a:0 "Ora devo pianificare la mia conquista!"
  agot_scenario_ats.2002.a.tt:0 "Potrai scegliere come procedere per conquistare il Trono di Spade"
  agot_scenario_ats.2002.b:0 "Non sono riuscito a conquistare la spada; ora devo restare solo."
  agot_scenario_ats.2002.b.tt:0 "Dovrai continuare da solo"
  
  agot_scenario_ats.2010.t:0 "Guai alla Diga"
  agot_scenario_ats.2010.desc:0 "Un servitore irrompe di corsa nel cortile di Fossafredda, col respiro pesante e spezzato. "Mia [rohanne.GetLadyLord], ci sono stati guai alla diga!" riesce a dire in fretta. Con volto nervoso, spiega che uno dei contadini mandati a lavorare alla diga è stato sfregiato al volto da Ser [bennis.GetFirstNameNicknamed], un cavaliere errante al servizio di Ser [eustace.GetFirstName]. Era presente anche un altro cavaliere errante, più giovane e molto più alto.\n\nAvevo creduto che ciò che avevo dovuto fare al contadino Dake sarebbe bastato a dissuaderli, ma pare che mi sbagliassi.\n\nOra non ho altra scelta che cercare vendetta, anche se forse potrei volgere la cosa a mio vantaggio... se resto in agguato."
  agot_scenario_ats.2010.a:0 "Aspetterò un inviato di Ser [eustace.GetFirstNameNoTooltip]."
  agot_scenario_ats.2010.a.tt:0 "Aspetterai di vedere chi arriverà da Standfast"
  
  agot_scenario_ats.2020.t:0 "Guai alla Diga"
  agot_scenario_ats.2020.desc:0 "[dunk.GetFullName] giunge in cima ai gradini che salgono serpeggiando verso la mia torre di Standfast, interrompendo i miei sogni a occhi aperti di tempi antichi che non nacqui per vedere, con un'espressione preoccupata sul volto.\n\nQuando chiedo spiegazioni, apprendo che [Select_CString(dunk.IsFemale,'lei','lui')] e [bennis.GetFullName] hanno trovato il Chequy Water, #italic il mio#! Chequy Water, asciutto e misero quando raggiunge le mie terre. [rohanne.GetFullNameNicknamed] lo ha sbarrato, e per rappresaglia [bennis.Custom('IT_NAM_COL3')][bennis.GetTitledFirstNameNoTooltip] ha colpito uno dei contadini di [Select_CString(rohanne.IsFemale,'lei','lui')]. Se voglio scongiurare un conflitto aperto, devo mandare un inviato a incontrare la Vedova Rossa e sperare di poter offrire abbastanza per far abbattere la diga e proteggere le mie terre.\n\n[dunk.GetFullNameNoTooltip] si è offert[Select_CString(dunk.IsFemale,'a','o')] di andare al mio posto, poiché ho giurato di non entrare mai più nella sede di Fossafredda, a meno che non sia come suo signore. Anche se so che il messaggio sarebbe accolto meglio se venisse da me, dovrei accettare la sua offerta?"
  agot_scenario_ats.2020.desc.nodunk:0 "Un servitore giunge in cima ai gradini che salgono serpeggiando verso la mia torre di Standfast, interrompendo i miei sogni a occhi aperti di tempi antichi che non nacqui per vedere, con un'espressione preoccupata sul volto.\n\nQuando chiedo spiegazioni, apprendo che il mio cavaliere [bennis.GetFullName] ha trovato il Chequy Water, #italic il mio#! Chequy Water, asciutto e misero quando raggiunge le mie terre. [rohanne.GetFullNameNicknamed] lo ha sbarrato, e per rappresaglia [bennis.Custom('IT_NAM_COL3')][bennis.GetTitledFirstNameNoTooltip] ha colpito uno dei contadini di [Select_CString(rohanne.IsFemale,'lei','lui')]. Se voglio scongiurare un conflitto aperto, devo aprire al più presto trattative con la Vedova Rossa.\n\nEppure un vecchio giuramento mi aleggia ancora nella mente. Giurai di non entrare mai più a Fossafredda, a meno che non fosse come suo restaurato signore. Eppure ora non resta altra scelta se non infrangerlo."
  agot_scenario_ats.2020.a:0 "Andrà [dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip]."
  agot_scenario_ats.2020.a.tt:0 "[dunk.Custom('IT_NAM_COL3')][dunk.GetTitledFirstNameNoTooltip] sarà inviato a Fossafredda per negoziare"
  agot_scenario_ats.2020.b:0 "Andrò io, per quanto mi costi."
  agot_scenario_ats.2020.b.tt:0 "Andrai a Fossafredda nonostante il tuo giuramento"
  
  agot_scenario_ats.2021.t:0 "Il Leone Assopito"
  agot_scenario_ats.2021.desc:0 "Mentre mi avvicino ai cancelli di Fossafredda, resto colpito dalla sua forza. Standfast è poco più che una torre con attorno mura mediocri; Fossafredda è una vera fortezza.\n\nIl mio cuore brucia mentre passo sotto i grandi ragni di Casa Webber e il rilievo di pietra scolorito d'un leone scaccato addormentato nella pietra sopra il cancello."
  agot_scenario_ats.2021.a:0 "Così il mio giuramento è infranto..."
  agot_sceanrio_ats.2021.a.tt:0 "Entrerai a Fossafredda"
  
  agot_scenario_ats.2030.t:0 "Guai alla Diga"
  agot_scenario_ats.2030.desc:0 "Mentre Egg e io torniamo verso la torre di Standfast, notiamo che il corso costante d'acqua che alimenta il bosco locale e i raccolti è quasi del tutto in secca. [bennis.GetTitledFirstNameNicknamed], un altro cavaliere errante al servizio di [eustace.Custom('IT_NAM_COL2')][eustace.GetTitledFirstName], si unisce a noi mentre risaliamo il corso in cerca di risposte, poiché, per quanto la recente siccità sia stata dura, non avrebbe prosciugato il torrente così in fretta.\n\nDopo una breve cavalcata vediamo la diga che ha prosciugato l'acqua e un gruppo di contadini al servizio della vicina sede di Fossafredda. Prima che io possa reagire, [bennis.Custom('IT_NAM_COL3')][bennis.GetTitledFirstNameNoTooltip] è già su di loro, e una discussione degenera presto in violenza, lasciando uno dei contadini con una cicatrice sul volto per i loro guai.\n\nDi ritorno a Standfast, informiamo [eustace.Custom('IT_NAM_COL4')][eustace.GetTitledFirstNameNoTooltip] dello scontro e vediamo chi [Select_CString(eustace.IsFemale,'lei','lui')] manderà a incontrare la Vedova Rossa di Fossafredda."
  agot_scenario_ats.2030.a:0 "Ora tocca al mio signore."
  agot_scenario_ats.2030.a.tt:0 "Aspetterai di sapere chi Eustace invierà"
  
