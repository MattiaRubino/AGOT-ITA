l_spanish:
  #Marked for Review

  agot_culture_desc_fallback:0 "I nostri archivi non contengono informazioni su questa cultura."
  AGOT_CULTURE_COOLTIP_CLICK:0 "#I Clicca per visualizzare [Culture.GetNameNoTooltip]#!\n\n#weak [Culture.MakeScope.Var('agot_culture_tt_desc').Char.Custom('GetAGOTCultureDesc')]#!"
  AGOT_CULTURE_COOLTIP_RD:0 "#weak [Culture.MakeScope.Var('agot_culture_tt_desc').Char.Custom('GetAGOTCultureDesc')]#!"
  
  agot_culture_children_desc:0 "Coloro che cantano il Canto della Terra, i Woh Dak Nag Gram, o i Figli della Foresta, qualunque sia il nome con cui vengono chiamati, sono ormai da lungo tempo svaniti dal mondo. Si sono assottigliati sin dall'Età dell'Alba e dall'avvento dell'uomo, e ora appartengono al mito e alla leggenda."
  agot_culture_dragon_desc:0 "I draghi sono le grandi armi e meraviglie della Valyria. Sono fuoco cui è stata data vita, armatura cui sono state date ali, e morte cui è stata data astuzia."
  agot_culture_giant_desc:0 "I giganti sono una delle due specie native di Westeros, l'altra essendo i Figli della Foresta. Come i Figli, anche i Giganti si sono ridotti con l'arrivo dell'uomo, sebbene alcuni esistano ancora nell'estremo nord oltre la Bariera."
  agot_culture_ifequevron_desc:0 "I camminatori dei boschi del nord di Essos, o Ifequevron come li chiamavano i Dothraki, sono un altro popolo perduto da tempo nelle età passate. Si ritiene che possano essere stati imparentati con i Figli, se si deve dar credito ai resoconti sugli alberi scolpiti."
  agot_culture_jhogwin_desc:0 "I giganti di pietra delle ossa settentrionali, o gli Jhogwin come li chiamavano i Dothraki, erano un gruppo di quelli che sembravano giganti e che furono sterminati dai Jogos Nhai."
  agot_culture_fisher_queen_race_desc:0 "Le Regine Pescatrici guidavano un regno leggendario prima della Lunga Notte, situato sul Mare Argenteo. Si ritiene che quel regno sia crollato durante la Lunga Notte, quando l'ultima Regina Pescatrice diede alla luce Huzhor Amai e, così, i Sarnori."
  agot_culture_others_desc:0 "Gli Estranei, i White Walkers delle Terre dell'Eterno Inverno, esistono nel mito e nella leggenda, o così dice la Cittadella. Ma le tribù dei Bruti nei recessi più remoti oltre la Bariera, e i vecchi uomini e donne del Nord, sostengono che una seconda Lunga Notte verrà, e con essa gli Estranei."
  agot_culture_mazemaker_desc:0 "In tutto il mondo si possono vedere labirinti di pietra nera, da Vecchio Città a Lorath, e il più grande e magnifico si trova a Lorassoyon. I costruttori di questi labirinti potrebbero essere stati il frutto dell'unione fra uomo e gigante. Sebbene siano scomparsi da lungo tempo, alcuni dicono che furono uccisi da tritoni, selkie, uomini-tricheco o dagli Abissali."
  agot_culture_andal_desc:0 "Investiti di un compito divino, gli Andali salparono verso occidente e diedero inizio alla conquista. Lo fecero con le armi e con le parole, prendendo o convertendo a sé tutti i regni meridionali."
  agot_culture_andalosi_desc:0 "Quando Qarlon, Re di Tutti gli Andali, marciò contro Norvos, fece infuriare l'antico Dominio e attirò su di sé, sul suo regno e sul suo popolo il fuoco dei draghi. I superstiti sono ora un popolo sparso e diviso, governato dalle Città Libere e da altre potenze essosi."
  agot_culture_crownlander_desc:0 "I popoli attorno alla Baia delle Acque Nere si unirono davvero solo con l'arrivo dei Draghi e la creazione delle Terre della Corona. Prima di allora erano divisi fra regni differenti. Ma con il Trono di Spade e la città di Approdo del Re, il popolo ha un fulcro attorno al quale unirsi."
  agot_culture_sandman_desc:0 "Dorne fu sempre la regione meno popolata di Westeros e, quando giunsero gli Andali, poterono in gran parte occupare le dune e le coste. Persino gli antichi regni delle Montagne Rosse sarebbero infine passati sotto il dominio andalo, con la spada o con il matrimonio."
  agot_culture_vineman_desc:0 "L'Arbor è rinomata in tutto il mondo per i suoi vini, e la sua gente è nota per la mano sapiente con la vite. Per portare l'uva ai mercati, ha costruito una grande flotta, temuta tanto sul piano militare quanto su quello economico."
  agot_culture_groveman_desc:0 "Gli uomini della Marca del Nord sono da lungo tempo un baluardo dell'Altopiano contro le Terre dell'Ovest e gli Uomini delle Terre dei Fiumi. Mentre i Marcher a sud hanno le Montagne Rosse a proteggerli, là l'unica difesa sono le foreste che li circondano e le loro picche."
  agot_culture_honeywiner_desc:0 "Le genti che vivono lungo il Mielevino e i suoi affluenti furono le ultime a essere incorporate nell'Altopiano. Guardavano a Vecchio Città più che ad Alto Giardino, e molti lo fanno ancora."
  agot_culture_reachman_desc:0 "Le genti che vivono sul Mander e i suoi affluenti costituivano l'antico cuore dell'Altopiano. Fu questo il regno che i Re Giardinieri governarono prima di incorporare i loro vicini, e il suo popolo conserva le usanze della Mano Verde."
  agot_culture_shieldman_desc:0 "Gli uomini e le donne delle Isole Scudo sono un popolo temprato, all'altezza del proprio nome nel proteggere la gente dell'Altopiano dalle minacce degli Uomini di Ferro e da altri pericoli venuti dal mare."
  agot_culture_riverlander_desc:0 "Quegli Uomini delle Terre dei Fiumi che confinano direttamente con il Tridente percorrono le sue diramazioni per il commercio, la guerra e il sostentamento. Sono stati il nucleo dei tre grandi regni delle Terre dei Fiumi e saranno il nucleo del prossimo."
  agot_culture_bay_riverman_desc:0 "Gli Uomini delle Terre dei Fiumi che si affacciano sulle baie del Mare Stretto somigliano molto ai loro fratelli lungo il Tridente, ma incontrano e si mescolano assai più con i loro vicini al di fuori delle Terre dei Fiumi."
  agot_culture_cape_riverman_desc:0 "Gli Uomini delle Terre dei Fiumi del Capo delle Aquile sono stati a lungo la punta della lancia contro il loro nemico più odiato: gli Uomini di Ferro. Vigilano e proteggono il resto delle Terre dei Fiumi dai razziatori e predoni del Mare del Tramonto."
  agot_culture_green_riverman_desc:0 "Gli Uomini delle Terre dei Fiumi che confinano con l'Incollatura lungo il margine settentrionale della Forca Verde lottano da lungo tempo contro i Demoni della Palude del Nord. Malgrado tale lotta, gli uomini di quelle terre si sono arricchiti grazie ai commerci che attraversano la regione."
  agot_culture_highland_riverman_desc:0 "Gli Uomini delle Terre dei Fiumi che dimorano a est della Forca Verde, fra gli altipiani e le colline ai piedi delle Montagne della Luna, sono un popolo schivo. Condividono alcune somiglianze con gli uomini della Valle, pur mantenendo i loro legami con i fratelli e le sorelle delle Terre dei Fiumi."
  agot_culture_lake_riverman_desc:0 "Gli Uomini delle Terre dei Fiumi che vivono attorno all'Occhio degli Dei traggono il proprio sostentamento dalle acque. Sono diversi, perché il lago stesso è la loro dimora. Sono stati spesso soggetti a potenze straniere di vario genere, eppure hanno conservato la loro fede e le loro tradizioni."
  agot_culture_rush_riverman_desc:0 "I più meridionali fra gli Uomini delle Terre dei Fiumi, quelli che vivono lungo il Tumulto delle Acque Nere, sono stati spesso il crocevia dei grandi regni del sud andalo e hanno così assistito a molte delle battaglie decisive fra essi."
  agot_culture_cape_stormlander_desc:0 "Gli uomini della Tempesta che dimorano sul Capo dell'Ira sono noti per la loro abilità nel sopportare le piogge torrenziali che flagellano la grande foresta dominante la loro terra. Vivere là è un affare umido, ma essi non vi rinuncerebbero mai."
  agot_culture_hook_stormlander_desc:0 "Gli uomini della Tempesta del Bosco del Re e dell'Uncino di Massey sono spesso un gruppo estraneo. Pur condividendo molte somiglianze con i loro vicini, e talvolta persino la lealtà, restano nondimeno inflessibili nei loro princìpi."
  agot_culture_stormlander_desc:0 "Gli uomini e le donne al cuore dell'antico regno Durrandon sono coloro che hanno resistito con fermezza a ogni minaccia, fossero uomini, tempeste o persino draghi."
  agot_culture_tarthman_desc:0 "Gli uomini della Tempesta dell'Isola di Zaffiro sono un popolo fiero. Più andali dei loro fratelli della terraferma, la loro isola fu un tempo sede di un saldo regno costruito nel marmo."
  agot_culture_marcher_desc:0 "Gli uomini e le donne delle Terre Basse di Dorne sono un popolo temprato. Avvezzi da lungo tempo a trattare con i razziatori provenienti da sud delle Montagne Rosse, usano i loro archi lunghi contro qualunque minaccia si presenti."
  agot_culture_bite_valeman_desc:0 "Gli uomini della Valle del Morso sono quelli più simili ai loro vicini. La stretta prossimità tanto alle Terre dei Fiumi quanto al Nord ha permesso che alcune usanze di entrambi penetrassero nella loro cultura."
  agot_culture_valeman_finger_desc:0 "Il primo luogo di Westeros in cui approdarono gli Andali furono le Dita, e lasciarono il loro segno tanto sulla terra quanto sulla gente. Essendo una delle regioni più povere, gli uomini della Valle delle Dita conducono una vita dura fra le rocce spazzate da vento e mare che chiamano casa."
  agot_culture_valeman_desc:0 "Gli uomini della Bassa Valle si trovano nelle pianure, nella Valle propriamente detta dell'antico Regno della Montagna e della Valle. Là, in mezzo ad alcune delle terre più fertili di tutta Westeros, crearono una società fondata sugli ideali di cavalleria, galanteria e valore cavalleresco."
  agot_culture_sisterman_desc:0 "Gli uomini delle Sorelle sono un popolo singolare secondo i canoni degli altri uomini della Valle. Conquistati dagli Andali come il resto della Valle, continuarono nondimeno a praticare molte delle loro antiche usanze. Spesso nascono con dita delle mani e dei piedi palmate, che si dice siano il marchio della loro antica dea."
  agot_culture_valeman_upper_desc:0 "Gli uomini dell'Alta Valle, quelli stanziati più vicino alle Montagne della Luna, sono di indole tradizionale. Da lungo tempo difendono le proprie terre contro gli infidi Clan delle Montagne, e sono prudenti tanto in guerra quanto nel governo, preferendo custodire i loro antichi riti."
  agot_culture_green_westerman_desc:0 "Gli uomini dell'Ovest delle terre meridionali delle Terre dell'Ovest condividono somiglianze con gli uomini dell'Altopiano a sud. Abili nel coltivare le loro colline, hanno sviluppato una fonte di ricchezza aggiuntiva oltre ai minerali custoditi nella terra."
  agot_culture_hill_westerman_desc:0 "Gli uomini dell'Ovest che abitano nel profondo delle colline e degli altipiani dell'interno delle Terre dell'Ovest sorvegliano i passi verso le Terre dei Fiumi e sono i primi a colpire i nemici delle Terre dell'Ovest."
  agot_culture_westerman_desc:0 "Gli uomini dell'Ovest delle regioni centrali dell'antico Regno della Roccia sono celebri per le loro vaste miniere e per le sale sotterranee che vi hanno scavato."
  agot_culture_shore_westerman_desc:0 "Gli uomini dell'Ovest che vivono lungo le coste e sulle isole delle Terre dell'Ovest solcano il Mare del Tramonto in cerca di ricchezza e gloria. Ciò significa anche che sono stati coloro che hanno dovuto affrontare gli Uomini di Ferro prima dei loro fratelli delle Terre dell'Ovest."
  agot_culture_clawman_desc:0 "Gli uomini di Punta Artiglio Incrinato sono un popolo strano, che si dice mezzo selvatico. Sono ancora in gran parte di stirpe dei Primi Uomini, poiché gli Andali furono sconfitti più dalla terra che dalla gente. Eppure là la Fede attecchì, e sono sempre stati un popolo litigioso."
  agot_culture_first_man_desc:0 "I Primi Uomini giunsero con bronzo e cavalli e si riversarono sulle pianure e sulle colline di Westeros."
  agot_culture_barrowman_desc:0 "Gli uomini dei Tumuli sono il secondo gruppo più numeroso del Nord e dominano le Terre dei Tumuli e i Rills a oriente. La gente di queste terre è nota per il profondo legame con i cavalli, addestrati e selvatici, che vagano per la regione."
  agot_culture_bearman_desc:0 "La gente dell'Isola dell'Orso è un popolo temprato, avvezzo da lungo tempo alle razzie tanto degli Uomini di Ferro quanto dei Bruti. Una simile vita di lotta incessante ha portato le donne dell'isola a impugnare le armi accanto ai loro uomini, e si dice che siano feroci quanto un'orsa che protegge i suoi cuccioli."
  agot_culture_crannogman_desc:0 "I Crannogmen sono un popolo schivo, spesso disprezzato per la bassa statura e l'uso dei veleni. Sono amici feroci e nemici mortali. Hanno protetto il Nord dagli Andali del sud per migliaia d'anni, guadagnandosi il nome di Demoni della Palude da parte degli aspiranti invasori."
  agot_culture_harborman_desc:0 "Gli uomini di Porto Bianco e dei suoi dintorni sono un gruppo singolare. Restano uomini del Nord e condividono molte somiglianze con chi li circonda. Eppure sono assai più cosmopoliti, non soltanto per via della città stessa ma anche grazie ai vasti commerci con altre potenze del Mare Stretto."
  agot_culture_krakenman_desc:0 "I Krakenmen sono il popolo del Nord un tempo governato dagli Uomini di Ferro. Questa storia comune, tuttavia, non ha generato benevolenza fra i due popoli. I Krakenmen scrutano sempre il Mare del Tramonto in cerca di minacce provenienti dalle Isole di Ferro."
  agot_culture_northern_clan_desc:0 "I clan del Nord, stanziati fra colline e montagne, sono un popolo feroce e tribale. Disprezzando le comodità del sud e delle regioni più sviluppate, i Clan del Nord sono gente semplice, ma ferocemente fedele ai propri giuramenti e alle proprie tradizioni."
  agot_culture_northman_desc:0 "Gli uomini del Nord, il più grande e prominente fra i popoli del Nord, discendono dai Primi Uomini e conservano le loro antiche tradizioni. La loro ascendenza è motivo d'orgoglio, poiché guidarono il Nord nel respingere gli Andali, unica regione di Westeros a riuscirvi."
  agot_culture_skagosi_desc:0 "Gli uomini di Pietra sono il popolo di Skagos e il meno civilizzato fra i popoli del Nord. Disprezzati dai loro compagni nordici come 'Skaggs', poco più che Bruti, essi sono nondimeno gli unici uomini del Nord a continuare a usare l'Antica Lingua. Soltanto loro preservano davvero le antiche tradizioni, persino quelle più oscure."
  agot_culture_wolfswood_clansman_desc:0 "Gli uomini del Wolfswood sono definiti dalla grande foresta che chiamano casa. Essa provvede a tutto ciò di cui hanno bisogno: nutrimento dagli animali che vi abitano e materiali dagli alberi."
  agot_culture_first_clan_desc:0 "Quando Brandon il Costruttore innalzò la Bariera dopo la Lunga Notte, vi erano alcuni Primi Uomini sul lato più lontano. È da questi primi clan che discendono i differenti popoli che popolano il Vero Nord."
  agot_culture_axeman_desc:0 "Laddove la maggior parte degli Andali si diresse verso occidente, gli Uomini dell'Ascia tornarono a oriente, nella loro antica patria, l'Ascia. Là trovarono solitudine e sicurezza e, pur rendendo omaggio ad altre potenze, restano saldi nelle proprie terre."
  agot_culture_chroyanar_desc:0 "I Rhoynar della città festiva di Chroyane furono probabilmente i più grandi di tutti i Rhoynar. Erano coloro cui gli altri guardavano tanto in guerra quanto in pace."
  agot_culture_mellar_desc:0 "I Rhoynar di Sar Mell e delle paludi orientali sono stati a lungo il baluardo contro le minacce provenienti da est."
  agot_culture_noynar_desc:0 "I Rhoynar si espansero lungo il Noyne, facendo di Norvos la propria città. Hanno abbracciato le colline pur continuando a ritenere sacre le acque che le attraversano, in particolar modo le acque impetuose del Noyne."
  agot_culture_qhoynar_desc:0 "I Rhoynar lungo il Qhoyne sono noti per le loro grandi opere in marmo e per la loro abilità nel navigare il Lago dei Pugnali."
  agot_culture_rhoynar_original_desc:0 "Popolo del grande fiume, figli di Madre Rhoyne, i Rhoynar sono celebri per il precoce uso del ferro e per la loro arte fluviale. Per lungo tempo solcarono il loro grande fiume madre e i suoi affluenti."
  agot_culture_sarhar_desc:0 "I Rhoynar della città più meridionale, Sarhoy, sono un popolo curioso secondo i canoni rhoynish. Mentre la maggior parte dei Rhoynar resta fedele alla propria Madre, il grande fiume e i suoi affluenti, la gente di Sarhoy si è spinta oltre, navigando anche le acque del Mare d'Estate."
  agot_culture_sarar_desc:0 "Ny Sar, la città delle fontane, era la maggiore potenza dei Rhoynar sul Rhoyne settentrionale e sul Noyne. Fu da là che Garin guidò le forze contro gli Uomini Pelosi, e fu da là che regnò Nymeria."
  agot_culture_trimbaez_fen_desc:0 "La gente di Kasath, i Trimbaez Fen, o Uomini Parlanti, è nota per i suoi vasti viaggi e le sue numerose carovane."
  agot_culture_cymmeri_desc:0 "Popolo tribale che dimorava attorno al Mare Argenteo, i Cymmeri erano celebri per il loro uso del ferro."
  agot_culture_gipps_desc:0 "Popolo tribale che dimorava attorno al Mare Argenteo, i Gipps erano celebri per i loro scudi di vimini."
  agot_culture_zoqora_desc:0 "Popolo tribale che dimorava attorno al Mare Argenteo, i Zoqora erano celebri per i loro carri da guerra."
  agot_culture_goraez_fen_desc:0 "A Gornath, presso il lago, i Goraez Fen, o Uomini del Lago, sono noti per l'uso delle erbe che crescono sulle rive per curare i mali."
  agot_culture_zanhar_fen_desc:0 "La gente di Sallosh, gli Zanhar Fen o Uomini Studiosi, è nota per la ricerca della conoscenza e per le sue grandi biblioteche."
  agot_culture_madekh_fen_desc:0 "La gente della città di Mardosh, i Madekh Fen o Uomini Marziali, è nota per la propria dedizione alla guerra e alla disciplina."
  agot_culture_tagaez_fen_desc:0 "I Tagaez Fen, o Uomini Alti nella lingua comune, erano il popolo di Huzhor Amai, eredi delle Regine Pescatrici, e frutto dell'unione di Cymmeri, Zoqora e Gipps. Edificarono una delle grandi civiltà del mondo sulle rovine della Lunga Notte."
  agot_culture_gilal_fen_desc:0 "I Gilal Fen, o Uomini Musicali, di Sathar sono celebri per le loro feste incentrate sulle cascate che circondano la città."
  agot_culture_cenaakh_fen_desc:0 "I Cenaakh Fen, gli Uomini Sacerdotali, sono noti in tutta Sarnor per la loro devozione e pietà, facendo davvero di Kyth la Città dei Templi."
  agot_culture_giren_fen_desc:0 "I Giren Fen, o Uomini delle Colline, sono un popolo misto nato dai Sarnori e dai nativi delle colline di Essaria, ed è noto come il più litigioso fra questi popoli turbolenti."
  agot_culture_zivylar_fen_desc:0 "Gli Uomini Dorati, o Zivylar Fen, che abitano a Rathylar, la Città delle Monete, sono noti in Sarnor per la grande ricchezza prodotta dalla loro città."
  agot_culture_cewi_fen_desc:0 "Gli uomini di Sarys, gli Uomini del Delta, i Cewi Fen, dimorano nelle terre umide del Delta del Sarne."
  agot_culture_dawiz_fen_desc:0 "A Saath, l'unica città sarnori rimasta, gli uomini di laggiù hanno assunto il nome di Dawiz Fen, gli Ultimi Uomini. Se mai dovesse esservi una rinascita del popolo sarnori, essa verrebbe da lì."
  agot_culture_essosi_valyrian_desc:0 "Anche con la caduta dell'Antica Valyria e il mescolarsi con altri popoli, si possono ancora trovare famiglie in tutte le Città Libere e oltre che conservano gran parte delle usanze dell'Antica Valyria. Pur non discendendo dai Signori dei Draghi, abbracciano ancora il proprio retaggio ancestrale."
  agot_culture_valyrian_original_desc:0 "Le Terre della Lunga Estate diedero origine alla più grande civiltà che il mondo abbia conosciuto, il Dominio Valyriano. Essa fu portata alla vita dalla maestria dei Valyriani sui draghi, sulla stregoneria e sul sangue."
  agot_culture_braavosi_desc:0 "I Braavosi sono un popolo industrioso, prospero nella banca, nei coloranti e nella costruzione navale. Le loro navi si trovano in ogni porto del mondo, riconoscibili per le loro vele di un viola cupo."
  
  agot_culture_essarian_desc:0 "È dal Sole, il Glorioso, che tutte le cose hanno origine, o così credono gli Essari. Abbandonando la tolleranza religiosa di Valyria, questo popolo cercò un luogo puro dove adorare il proprio dio come meglio crede."
  agot_culture_lorathi_desc:0 "Fra i celebri labirinti e i resti bruciati degli Andali, i Lorathi hanno trovato un luogo per sé. Essendosi allontanata dagli antichi adoratori di Boash, oggi Lorath è più accogliente, sebbene la si trovi spesso a difendere i propri interessi sulla terraferma dalle minacce straniere."
  agot_culture_norvoshi_desc:0 "I Norvoshi consideravano sacrilega la tolleranza verso molte religioni differenti e cercarono dunque un luogo in cui poter adorare con purezza. Da allora hanno difeso con zelo le proprie terre e le proprie scritture da ogni minaccia."
  agot_culture_pentoshi_desc:0 "I Pentoshi, come molti delle Città Libere, si sono consacrati alla ricerca della moneta. Facendo ciò, si sono vincolati al suo corso, nel bene e nel male."
  agot_culture_nonteloshi_desc:0 "Le terre strette fra Pentos e Myr sono assai diverse dalle Terre Disputate, contese senza fine dalle Tre Figlie. I Nonteloshi hanno invece fatto affidamento sulla diplomazia e sulla cortesia, accogliendo qualunque nuovo sovrano esiga la loro fedeltà."
  agot_culture_qohorik_desc:0 "Fu accanto alla Foresta Nera che i Qohorik trovarono un luogo dove adorare il loro dio oscuro e praticare le loro arti oscure. Da lungo tempo custodiscono i propri segreti, soprattutto quelli della forgia, restando l'unico popolo a conoscere il modo di riforgiare l'acciaio valyriano."
  agot_culture_hartalari_desc:0 "Nelle contese fra le Tre Figlie, sono i popoli nativi del Tallone, gli Hartalari, a trovarsi intrappolati nel mezzo. Il conflitto incessante ha devastato il Tallone, un tempo fertile, trasformandolo nelle Terre Disputate devastate dalla guerra."
  agot_culture_lyseni_desc:0 "La gente di Lys la Bella somiglia molto alla propria città: bella e splendente all'esterno, ma oscura e rapace nell'intimo. I Lyseni sono ben noti per i loro legami con la schiavitù e la pirateria, ma anche per l'accoglienza riservata a chiunque giunga nella loro dimora simile a un paradiso."
  agot_culture_myrish_desc:0 "I Myrish sono un popolo singolare, assai più riservato dei loro vicini appariscenti. La loro abilità manifatturiera non ha eguali, sostenuta dagli schiavi, e i loro guerrieri impugnano letali balestre."
  agot_culture_tyroshi_desc:0 "I Tyroshi sono un popolo appassionato, che mette tutto sé stesso in ciò che fa, sia esso guerra, amore, artigianato, commercio o qualunque altra impresa. Celebri per i loro elmi e i loro tintori, si servono di entrambi per esprimere la propria individualità."
  agot_culture_volantene_desc:0 "I Volanteni si definiscono con orgoglio la Prima Figlia di Valyria e un tempo cercarono di emulare la madre soggiogando i loro fratelli. Col tempo, tuttavia, crebbero in una propria identità, con triarchi, elefanti, tigri e interessi distinti da quelli della loro genitrice caduta."
  agot_culture_ghaeni_desc:0 "Con la caduta di Antica Ghis nella Quinta Guerra Ghiscari, molti Ghiscari cercarono di ricostruire il proprio stile di vita al di là della portata del Dominio. Così nacque Nuova Ghis sull'isola di Ghaen, dove imitarono le antiche usanze adottandone però anche di nuove, tra cui il governo di un re."
  agot_culture_ghardaqi_desc:0 "I coloni ghiscari insediatisi a monte di Meereen abbracciarono la vita ai confini tra l'Erba Grande e le terre del sud, servendosi dei signori dei cavalli per raccogliere schiavi, poi convogliati a sud verso il cuore di Ghis."
  agot_culture_ghiscari_original_desc:0 "Antico era l'impero di Ghis, perfino se paragonato ai Regni di Sarnor e all'Impero Dorato di Yi Ti. Era edificato sul sangue e sui mattoni: il sangue degli schiavi e dei Ghiscari, di coloro che marciavano nelle sue legioni serrate e di coloro che innalzavano le sue grandi piramidi."
  agot_culture_shuzduni_desc:0 "I coloni ghiscari che si stabilirono a sud dei Lhazareen adottarono le usanze dei signori dei cavalli dell'Erba Grande, muovendosi con rapidità ed efficienza attraverso la regione."
  agot_culture_hazdahni_desc:0 "I coloni ghiscari del nord, nel profondo delle colline e delle pianure dell'Erba Grande, abbracciarono il commercio con le tribù e i popoli delle piane."
  agot_culture_astapori_desc:0 "Astapor e la sua gente si sono sempre considerate gli eredi marziali di Antica Ghis. Da loro, le legioni serrate rinacquero come gli Immacolati, destinati a costituire la spina dorsale di una rinascita ghiscari."
  agot_culture_meereenese_desc:0 "Malgrado le pretese delle sue città sorelle, Meereen è la più grande sede rimasta del popolo ghiscari, cosa che qualunque meereenese si affretterà a sottolineare. Vanta la piramide più grande, la popolazione più numerosa e la dimora delle grandi fosse combattenti."
  agot_culture_yunkaii_desc:0 "Yunkai, la vera Regina delle Città, è la più bella e colta tra le città ghiscari, che già superano tutte le altre. Gli Yunkai'i hanno abbracciato gli aspetti più elevati di Antica Ghis, lasciando quelli più venali alle loro città sorelle."
  agot_culture_gorgari_desc:0 "Gorgai è la più grande città ghiscari delle regioni meridionali. Dall'Isola delle Lacrime, i Gorgari lavorano i nativi per rispedirli nella madrepatria ghiscari, creando un mercato pari a qualunque altro in patria."
  agot_culture_goroshari_desc:0 "Gorosh fu edificata sulle rive di Wyvern's Point, e la sua gente affronta minacce non soltanto dalle lucertole volanti sopra di loro, ma anche dagli innumerevoli pericoli delle paludi sottostanti, cosa che rende i Goroshari più forti dei loro cugini."
  agot_culture_zamettari_desc:0 "Zamettar, edificata presso la foce dello Zamoyos, funge da bastione contro la giungla ostile, costringendo la sua gente a combattere le minacce che risalgono il fiume."
  agot_culture_dothraki_desc:0 "Grandi e temuti signori dei cavalli dell'Erba Grande, i Dothraki sono una piaga per la civiltà e per gli altri regni degli uomini. Portano rovina a chiunque osi deturpare il volto della terra, che essi considerano la Grande Madre del loro popolo."
  agot_culture_lhazareen_desc:0 "Il popolo di Lhazaar è una pacifica società di pastori. La loro religione predica il pacifismo, il che li rende schiavi ideali agli occhi dei loro vicini, eppure le loro grandi mura cittadine tengono ancora lontane le minacce dei Dothraki e dei Ghiscari."
  agot_culture_omberi_desc:0 "La gente di Omber è composta da persone quiete, sopravvissute ai vicini dothraki offrendo generosi doni a qualunque Khal passi da quelle parti e restando per il resto soddisfatta delle proprie terre."
  agot_culture_hairy_forest_desc:0 "Gli Uomini Pelosi erano un popolo antico che incuteva timore in tutto il mondo conosciuto. Alcune tribù dimoravano nelle grandi foreste di Essos, combattendo e razziando tutti i loro vicini."
  agot_culture_hairy_isle_desc:0 "Gli Uomini Pelosi erano un popolo antico che incuteva timore in tutto il mondo conosciuto. Alcune tribù dimoravano sulle isole e sulle coste del Mare dei Brividi, combattendo e razziando tutti i loro vicini."
  agot_culture_hairy_rivers_desc:0 "Gli Uomini Pelosi erano un popolo antico che incuteva timore in tutto il mondo conosciuto. Alcune tribù dimoravano fra le colline attorno agli affluenti settentrionali del Rhoyne, combattendo e razziando tutti i loro vicini."
  agot_culture_bayasabhadan_desc:0 "Nel profondo delle Montagne delle Ossa si trovano gli ultimi resti del Retaggio di Hyrkoon. A sud, sulla Via della Sabbia, sorge la grande città bastione di Bayasbhad. La sua gente, come i loro cugini delle altre città, respinge ogni minaccia e al contempo funge da anello essenziale nel commercio terrestre tra l'est e le terre oltre le Ossa."
  agot_culture_hyrkoonan_original_desc:0 "Il popolo del Retaggio di Hyrkoon è il vero discendente del grande eroe che redense il mondo e respinse la Lunga Notte. Tale eredità è un grande fardello: soltanto gli uomini più forti e migliori possono trasmettere il proprio retaggio alle generazioni future, assicurando che i più possenti siano pronti quando la Lunga Notte tornerà."
  agot_culture_kayakayanayan_desc:0 "Nel profondo delle Montagne delle Ossa si trovano gli ultimi resti del Retaggio di Hyrkoon. A nord, sulla Via dell'Acciaio, sorge la grande città bastione di Kayakayanaya. La sua gente, come i loro cugini delle altre città, respinge ogni minaccia, soprattutto i Jogos N'hai, con i quali condivide un'antica e aspra inimicizia."
  agot_culture_shamyrianan_desc:0 "Nel profondo delle Montagne delle Ossa si trovano gli ultimi resti del Retaggio di Hyrkoon. Sulla Via della Pietra sorge la grande città bastione di Shamyriana. La sua gente, come i loro cugini delle altre città, respinge ogni minaccia, scavando e cavando le Ossa per fortificare ancor più i propri bastioni e avamposti."
  agot_culture_shan_ren_desc:0 "Molto tempo fa, quando il Retaggio era più di tre avamposti solitari, prima che la terra si trasformasse nella polvere del Grande Mare di Sabbia, una delle sue città era Asabhad. Quando il Retaggio cadde, Asabhad e la sua gente trovarono una nuova dimora e un nuovo protettore nell'Impero Dorato. Adottandone le usanze e mescolandosi al suo popolo nacquero gli Shan Ren, uno dei molti popoli dell'impero."
  agot_culture_ibbatese_desc:0 "Gli uomini di Ib che cercano conforto tra le montagne e gli altopiani della loro isola natale sono ancora più schivi dei loro fratelli costieri, eppure non meno feroci."
  agot_culture_ibbenese_desc:0 "Gli uomini di Ib sono un popolo schivo, sebbene le loro navi si trovino in lungo e in largo. Sono alleati saldi e nemici feroci, ben noti per le loro grandi baleniere."
  agot_culture_ib_sarese_desc:0 "Ib Sar nacque come colonia penale, e tale eredità segna ancora la sua gente. Gli uomini di Ib Sar sono di tempra più dura dei loro fratelli dell'isola principale."
  agot_culture_greenborn_desc:0 "Gli Uomini di Ferro che hanno fatto delle Terre Verdi la propria dimora possono essere guardati con disprezzo dagli Ironborn, eppure sono proprio loro ad aver esteso il dominio del Dio Abissale alla sua massima ampiezza."
  agot_culture_ironborn_desc:0 "Tutti coloro che nascono nelle Isole di Ferro sono Uomini di Ferro, eredi del Re Grigio e progenie del Dio Abissale. Sono il terrore di chiunque possa sentire l'odore salmastro del mare, che venga dal Mare del Tramonto o da oltre."
  agot_culture_jade_islander_desc:0 "Gli uomini che fecero delle isole del Mare di Giada la propria dimora, gli isolani di Giada, solcano da lungo tempo le sue acque scintillanti per commercio e guerra."
  agot_culture_lengii_desc:0 "La gente dell'Isola Sacra di Leng, i Lengii, è fieramente indipendente e resiste a ogni potenza straniera che cerchi di soggiogarla."
  agot_culture_manticorian_desc:0 "La gente delle Isole Manticoresche è nota per essere pericolosa quanto i suoi celebri insetti."
  agot_culture_marahaiian_desc:0 "La gente dell'isola paradisiaca, i Marahaiiani, apprezza profondamente i grandi doni che la propria isola offre."
  agot_culture_bloodless_man_desc:0 "Si dice che gli Uomini Esangui vivano in città oltre i Cinque Forti, dove la leggenda e il mito sostengono che dissanguino le loro vittime, o che essi stessi siano così pallidi da ricordare il marmo."
  agot_culture_carcosan_desc:0 "Nel profondo delle Montagne del Mattino, sulle rive del Mare Nascosto, sorge la città di Carcosa. Si dice che gli uomini di là siano stregoni e maghi che stringono patti con gli oscuri dèi delle profondità."
  agot_culture_dathian_desc:0 "Gli abitanti di K'Dath, che si trova nelle grandi pianure a est del Mare Sanguinante, sono noti per i loro tentativi di estendere il proprio dominio sui vicini, come Bonetown, la Terra degli Shryke e la Distesa Grigia a nord."
  agot_culture_grey_man_desc:0 "Gli uomini della Distesa Grigia si affidano alle razzie per riportare a casa ricchezza e risorse, poiché la Distesa Grigia porta bene il proprio nome e offre ben poco ai suoi abitanti."
  agot_culture_fish_man_desc:0 "Coloro che chiamano casa le Mille Isole sono un popolo xenofobo circondato da strani miti e voci. Si dice che siano mezzi pesci e che divorino chiunque visiti le loro isole."
  agot_culture_lion_man_desc:0 "Prima del Tradimento di Sangue, si diceva che le terre oltre i Cinque Forti appartenessero al Leone della Notte. Quando la Fanciulla-Fatta-di-Luce e il Dio-sulla-Terra voltarono le spalle all'Impero dell'Alba, gli Uomini Leone furono liberi di punire gli uomini per il loro tradimento."
  agot_culture_mossovite_desc:0 "Gli uomini della lontana Mossovy sono noti per la loro indole fredda e riservata e per i profondi legami con la propria fede."
  agot_culture_shryke_desc:0 "Gli Shryke sono un popolo di cui si parla nelle storie esagerate e nei pettegolezzi da taverna. Ciò che si può supporre con sicurezza è che dominino una vasta distesa di terre oltre i Cinque Forti e siano rapidi e mobili."
  agot_culture_winged_man_desc:0 "Gli Uomini Alati sono un popolo oltre i Cinque Forti che si dice voli con le ali, sebbene ciò sia probabilmente un'iperbole. Si racconta che mantengano città in quella regione caotica."
  agot_culture_farosi_desc:0 "I Farosi dominano la parte centro-settentrionale della Grande Moraq. La loro città è uno dei principali porti commerciali lungo le rotte della cannella che aggirano le Porte di Giada e Qarth, creando una forte inimicizia tra i due popoli."
  agot_culture_moraqi_desc:0 "I Moraqi sono il popolo della Grande Moraq. La nazione è incentrata sulla parte meridionale dell'isola, dopo che i Qartheen presero il nord e i Farosi vennero a dominare le terre centrali."
  agot_culture_vahari_desc:0 "I Vahari sono commercianti e marinai nati, arricchitisi grazie al commercio di spezie e di altre merci, soprattutto a sud delle Porte di Giada."
  agot_culture_zabhadi_desc:0 "Gli Zabhadi vivono sull'Isola degli Elefanti e da questi animali traggono la loro ricchezza. L'avorio è al tempo stesso una delle principali merci d'esportazione e un simbolo di prestigio e posizione sociale nella loro cultura."
  agot_culture_jogos_nhai_desc:0 "I temuti nomadi oltre le Ossa, i Jogos N'hai, sono da tempo immemorabile il flagello di Yi Ti, Hyrkoon, N'ghai, degli Jhogwin e di molti altri. Colpendo con le loro teste coniche e i loro zorse striati, portano distruzione e morte a tutti gli stranieri, ma non combattono mai gli uni contro gli altri."
  agot_culture_nefer_desc:0 "Gli N'ghai sono un popolo decaduto che un tempo si estendeva su un vasto regno. I Jogos N'hai li hanno ricacciati fino al loro ultimo rifugio a Nefer, ma entro la città segreta resta vivo il desiderio di respingere le teste coniche e ristabilire la propria nazione."
  agot_culture_qaathi_desc:0 "I Qaathi sono un popolo in declino. Un tempo uno dei molti gruppi tribali che vivevano nelle pianure attorno al Mare Argenteo, furono scacciati dai Sarnori. Dopo numerose guerre, fuggirono a sud verso terre allora verdi e rigogliose, che però ben presto avvizzirono e si fecero rosse. Tuttavia, fu solo con l'arrivo dei Dothraki che i Qaathi al di fuori di Qaarth e dei suoi domini giunsero infine alla fine."
  agot_culture_qaleen_desc:0 "I Qaleen traggono la propria discendenza dagli artigiani delle gilde e dai mercanti di Qaarth e dai nativi isolani di Giada dell'isola di Qal. Oggi fungono da baluardo orientale e fortezza delle Porte di Giada."
  agot_culture_qartheen_desc:0 "Ultimi dei Qaathi, i Qartheen si considerano l'unico popolo davvero civilizzato del mondo, mentre si aggrappano alla loro città, unico residuo del popolo qaathi."
  agot_culture_greenblood_desc:0 "Laddove la maggior parte dei Rhoynar si fuse con i nativi di Dorne, il Greenblood non lo fece. Conservò le proprie antiche usanze il più pure possibile e sogna di fare ritorno alla Madre."
  agot_culture_salt_dornish_desc:0 "I Dorniani che vivono nelle regioni orientali della penisola possiedono la maggior parte del sangue rhoynar. Sono l'espressione più vera della mescolanza tra Rhoynar e westerosi, l'unione più stretta delle due culture."
  agot_culture_sand_dornish_desc:0 "Le dune e i deserti dell'interno di Dorne hanno plasmato la sua gente tanto quanto i loro conquistatori. Aver imparato a vivere con poca acqua e a svanire nei mari di sabbia senza essere visti rende questi uomini di Dorne nemici letali."
  agot_culture_stone_dornish_desc:0 "Gli uomini di Dorne delle Montagne Rosse sono un popolo tenace e litigioso. Pur avendo la minore influenza rhoynar di tutta Dorne, essi, come i loro fratelli delle dune e delle coste, sono visti come estranei dagli Andali del nord. Celebri per le loro razzie e la loro brutalità, sono nemici pericolosi e rancorosi."
  agot_culture_abular_desc:0 "Quando Nymeria unificò i Rhoynar e fuggì dal Dominio, non si diresse subito verso Dorne. Andò prima a Sothoryos, ma ciò si rivelò infausto, quindi alle Isole dell'Estate, dove alcuni rimasero sull'Isola delle Donne, adottando le usanze degli isolani nativi."
  agot_culture_asshaii_desc:0 "All'ombra dell'Ombra, fra gli edifici e le mura di pietra nera unta di Asshai, gli Asshai'i sono un popolo strano e oscuro. Si dice siano solenni, e sono celebri per indossare maschere laccate."
  agot_culture_shadowman_desc:0 "Gli uomini che abitano nell'Ombra sono un popolo che perfino gli Asshai'i temono. Abbracciano e prosperano nelle tenebre che gli altri si limitano appena a visitare."
  agot_culture_basiliskite_desc:0 "Gli uomini che fanno delle Isole del Basilisco la propria dimora sono noti per i loro modi frammentati e pirateschi. Spesso flagello delle Città Libere, di Naath e delle Isole dell'Estate, sono una piaga per gran parte dei mari."
  agot_culture_brindled_man_desc:0 "Gli Uomini Striati, così chiamati per l'estesa tigratura della loro pelle, sono i nativi di Sothoryos. Popolo isolazionista e spesso xenofobo, mantengono solo contatti limitati con le piccole comunità costiere, praticando un commercio ristretto e poco altro."
  agot_culture_gogossite_desc:0 "I Gogossiti sono un popolo nato dai dominatori valyriani e dai nativi gorgari. Hanno abbracciato la cupa storia della loro isola e della vicina Yeen."
  agot_culture_yeenite_desc:0 "I nativi di Yeen, la cupa città di Sothoryos, sono tornati e hanno ricominciato a espandere la propria nazione."
  agot_culture_naathi_desc:0 "I Naathi, o Popolo Pacifico, vivono sull'Isola delle Farfalle. Noti per il loro pacifismo, sono purtroppo preda di schiavisti e razziatori."
  agot_culture_jhalai_desc:0 "La gente di Jhala, la più grande delle Isole dell'Estate, è ardente e spesso più marziale dei loro fratelli delle altre isole. Fu da lì che gli schiavisti vennero scacciati."
  agot_culture_moluuni_desc:0 "I Moluuni abitano le isole occidentali e, sebbene tutti gli isolani dell'Estate siano marinai prolifici, essi sono i più grandi di tutti. Da là vennero i grandi cigni di mare che tracciarono i mari e gli oceani."
  agot_culture_omborui_desc:0 "La gente di Omboru è celebre per le proprie feste e i propri banchetti. Accoglienti verso gli stranieri sin da tempi antichi, molti fra loro finiscono anch'essi come esuli o vagabondi."
  agot_culture_walanoi_desc:0 "I Walanoi sono il popolo delle isole settentrionali. Sono spesso coloro che hanno più contatti con il mondo esterno e sono noti per i loro resoconti dettagliati, che incidono su alberi viventi."
  agot_culture_painted_clansman_desc:0 "Persino nei domini dell'antico Dominio esistevano popoli tribali, come si vede fra le genti delle Montagne Dipinte. Gruppo selvaggio che, pur condividendo il retaggio con i propri cugini civilizzati del sud, adora i draghi che quei cugini addomesticarono."
  agot_culture_elyrian_desc:0 "Fondata dal Dominio Valyriano, Elyria e la sua gente hanno abbracciato con convinzione il commercio degli schiavi con le città ghiscari, al punto che i loro legami divennero più stretti con Ghis che con Valyria. Oggi gli Elyriani fanno ancora risalire la propria discendenza ai Valyriani, ma adottano gran parte delle usanze di Ghis."
  agot_culture_bhorashi_desc:0 "Bhorash giaceva un tempo in rovina lungo la strada dei demoni fra Mantarys e Meereen, ma oggi pullula di anime coraggiose che traggono sostentamento dal commercio lungo i suoi famigerati sentieri."
  agot_culture_mantaryan_desc:0 "Si dice che Mantarys e il suo popolo siano sinistri e mostruosi. Deformità e malanni sembrano affliggere la popolazione, eppure restano una forza poderosa, controllando la principale via terrestre tra le Città Libere e la Baia degli Schiavisti: la Strada dei Demoni."
  agot_culture_tolosi_desc:0 "Sulle Scogliere Nere, Tolos e la sua gente sono celebri in tutto il mondo per i loro frombolieri. Come i loro vicini, hanno abbracciato il commercio degli schiavi con le città ghiscari a est e si avvicinano sempre più alla Baia degli Schiavisti."
  agot_culture_high_valyrian_desc:0 "Gli Alti Valyriani, signori del Dominio Valyriano, erano un popolo distinto da tutti gli altri. Governavano dall'alto dei loro draghi e si ritenevano superiori a chiunque, uomo o dio. Tale arroganza perdurò persino dopo il Flagello, quando persero patria e impero, pur conservando i loro draghi e continuando a volare al di sopra di tutti."
  agot_culture_westerosi_valyrian_desc:0 "Prima che i Signori dei Draghi di Casa Targaryen giungessero a Westeros, altri Valyriani avevano già fatto delle Terre del Tramonto la loro dimora. Questi Valyriani adottarono molte usanze native di Westeros, pur mantenendo alcune delle proprie tradizioni e dei legami con l'antico Dominio."
  agot_culture_cave_dweller_desc:0 "Quando Gorne e Gendel guidarono il Popolo Libero a sud sotto la Bariera, attraverso la Via di Gorne, condannarono molti dei loro seguaci. Sconfitto dagli Stark, Gorne cadde, e Gendel ricondusse il suo popolo sconfitto sottoterra, solo per perdersi nelle caverne sottostanti. Così nacque il popolo che ancora oggi dimora nelle grotte."
  agot_culture_fangman_desc:0 "La gente che chiama casa le Zanne Ghiacciate è temprata e feroce. Nota per la sua grande attitudine all'arrampicata, persino sulla Bariera, forma razziatori letali."
  agot_culture_forestman_desc:0 "La gente che vive nella Foresta Stregata è il gruppo di Bruti più comunemente incontrato dai Guardiani della Notte e dai maestri. È litigiosa e incline a suddividere i propri reami nelle più piccole divisioni possibili."
  agot_culture_frozen_shoreman_desc:0 "La gente della Riva Gelata è strana, persino rispetto agli altri Bruti. Abbondano le voci di slitte d'ossa trainate da foche e trichechi, ma ciò che si sa con certezza è che sono razziatori provetti."
  agot_culture_hornfoot_desc:0 "Gli Hornfoot sono una tribù dell'estremo nord, nota per i frequenti conflitti con i Nightrunners e per la propria mancanza di scarpe. Che i loro piedi non siano andati perduti per il gelo resta una meraviglia."
  agot_culture_ice_riverman_desc:0 "I clan che dimorano lungo i fiumi di ghiaccio sulle calotte occidentali sono schivi. Si dice che la pratica del cannibalismo sia comune, a causa della mancanza di altre fonti di carne."
  agot_culture_lakefolk_desc:0 "La gente che vive attorno ai grandi laghi ghiacciati dell'estremo nord è riuscita a costruirsi una vita accanto, e talvolta sopra, i laghi gelati. Queste acque di rado — se mai accade — vedono abbastanza calore da sciogliersi anche solo in minima parte."
  agot_culture_milkwaterman_desc:0 "La gente che si aggrappa al Milkwater, il grande fiume che scorre dalle Zanne Ghiacciate settentrionali fino alla Baia del Ghiaccio. È qui, lungo il suo corso, che si trovano i tumuli dei grandi eroi dei Bruti."
  agot_culture_nightrunner_desc:0 "I Nightrunners sono una tribù dell'estremo nord, nota per le proprie abili razzie notturne e per le abitudini quasi notturne. Sono nemici temibili per chiunque non dorma con un occhio aperto."
  agot_culture_thenn_desc:0 "I Thenn sono una tribù schiva dell'estremo nord, che vive in una valle che li ripara dal freddo circostante. Più organizzati della maggior parte dei loro vicini, sono noti per la fusione del bronzo e rappresentano quanto di più vicino a una società disciplinata esista oltre la Bariera."
  agot_culture_moon_clan_desc:0 "I clan delle Montagne della Luna discendono da coloro che rifiutarono di piegarsi ai re Arryn. Rinunciarono alla civiltà e alla società per vivere da fuorilegge, sperando un giorno di riconquistare il proprio regno."
  agot_culture_aobao_ren_desc:0 "Gli Aobao Ren sono gli abitanti di Yi Ti delle pianure centrali. Ben noti per essere sudditi operosi, sono celebri per la loro lealtà una volta concessa."
  agot_culture_bixi_ren_desc:0 "I Bixi Ren delle terre orientali affrontano costantemente le razzie degli uomini dell'Ombra e le minacce provenienti da oltre i Cinque Forti. Sono un popolo devoto, consacrato alla difesa delle marche orientali."
  agot_culture_haungyu_ren_desc:0 "Gli Haungyu Ren vivono nelle giungle centrali a nord della Costa di Giada. Sono noti per le loro salde convinzioni, spesso spinte fino alla follia, e per i loro mistici erranti."
  agot_culture_heinao_ren_desc:0 "Gli Heinao Ren del nord sono un popolo temprato, ben noto per la propria eredità marziale. Affrontano i Jogos N'hai e si sforzano di difendere l'Impero da questi nemici odiati."
  agot_culture_feicui_ren_desc:0 "I Feicui Ren sono il cosmopolita popolo meridionale di Yi Ti. Edificarono le grandi città lungo il Mare di Giada, commerciarono sulle sue rive e portarono l'Impero Dorato alla sua massima estensione."
  agot_culture_zhenzhu_ren_desc:0 "Gli Zhenzhu Ren sono il popolo originario di Yi Ti, o così si dice. Sono sacerdoti studiosi dell'Impero Dorato, che tracciano con diligenza la storia di Yi Ti fino a risalire al Grande Impero dell'Alba."