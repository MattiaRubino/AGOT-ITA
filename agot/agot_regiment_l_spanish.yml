  game_concept_chariot_cavalry_desc:0 "I carri sono [men_at_arms|E], un'unità di cavalleria robusta che [counters|E] [heavy_cavalry|E] e [heavy_infantry|E]. A loro volta vengono neutralizzati da [spearmen|E] e crossbowmen."
